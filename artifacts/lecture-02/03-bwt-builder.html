<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BWT Builder</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Source+Serif+4:ital,opt_size,wght@0,8..60,400;0,8..60,500&display=swap">
  <link rel="stylesheet" href="../_shared/artifact-theme.css">

  <style>
    body { padding: 2rem; }
    .artifact { max-width: 1100px; margin: 0 auto; }
    .artifact-head { margin-bottom: 1.5rem; }
    .artifact-head h1 {
      font-family: var(--font-serif); font-size: var(--text-3xl);
      letter-spacing: -0.02em; margin: 0 0 0.25rem;
    }
    .artifact-head p {
      color: var(--fg-muted); font-size: var(--text-sm);
      line-height: var(--leading-relaxed); margin: 0; max-width: 60ch;
    }
    .panel {
      background: var(--bg-elevated);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.25rem 1.5rem; margin-bottom: 1.25rem;
    }
    .panel-label {
      font-family: var(--font-sans); font-size: var(--text-xs);
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--fg-subtle); margin: 0 0 0.85rem; font-weight: 600;
    }
    .field-label {
      font-family: var(--font-sans); font-size: var(--text-xs);
      letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600;
      color: var(--fg-muted); display: block; margin-bottom: 0.4rem;
    }
    .seq-input {
      width: 100%; font-family: var(--font-mono); font-size: var(--text-base);
      padding: 0.55rem 0.75rem; background: var(--bg-muted);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      letter-spacing: 0.05em;
    }
    .seq-input:focus { background: var(--bg-elevated); border-color: var(--accent-bright); }
    .btn {
      font-family: var(--font-sans); font-size: var(--text-sm); font-weight: 500;
      padding: 0.5rem 0.9rem; background: var(--bg-muted);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--fg); cursor: pointer;
    }
    .btn:hover:not(:disabled) { background: var(--bg-inset); border-color: var(--border-strong); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn--primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn--primary:hover:not(:disabled) { background: var(--accent-hover); border-color: var(--accent-hover); }
    .controls { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-top: 0.75rem; }

    .rotations-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1.5rem;
      align-items: start;
      margin-top: 1rem;
    }

    .rot-col h4 {
      font-family: var(--font-sans);
      font-size: var(--text-xs); letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--fg-subtle); margin: 0 0 0.5rem;
    }

    .rot-table {
      font-family: var(--font-mono); font-size: 1rem; letter-spacing: 0.1em;
      background: var(--bg-muted); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 0.5rem 0.75rem;
      overflow-x: auto;
    }
    .rot-row { display: block; line-height: 1.7; padding: 2px 4px; border-radius: 2px; transition: background 180ms ease, transform 300ms ease; }
    .rot-row.highlight { background: #eef2ff; }
    .rot-row .first { color: var(--accent); font-weight: 600; padding: 0 3px; background: #eef2ff; border-radius: 2px; }
    .rot-row .last  { color: var(--accent); font-weight: 600; padding: 0 3px; background: #eef2ff; border-radius: 2px; }
    .rot-row .dollar { color: var(--fg-subtle); }

    .rot-col-heads {
      display: flex;
      gap: 0.75rem;
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.14em;
      padding: 0 0.75rem 0.25rem;
    }

    .arrow-col {
      display: flex; align-items: center; justify-content: center;
      padding-top: 40px;
      color: var(--accent);
      font-size: 1.75rem;
    }

    .output {
      margin-top: 1.25rem;
      padding: 1rem 1.25rem;
      background: var(--bg-inset); border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap;
    }
    .output .label {
      font-family: var(--font-sans); font-size: var(--text-xs);
      letter-spacing: 0.14em; text-transform: uppercase;
      font-weight: 600; color: var(--fg-muted);
    }
    .output .bwt {
      font-family: var(--font-mono); font-size: var(--text-xl);
      font-weight: 500; color: var(--accent); letter-spacing: 0.1em;
    }

    @media (max-width: 860px) {
      .rotations-grid { grid-template-columns: 1fr; }
      .arrow-col { padding-top: 0; transform: rotate(90deg); }
    }
    @media (max-width: 720px) {
      body { padding: 1rem; }
      .panel { padding: 1rem; }
      .artifact-head h1 { font-size: var(--text-2xl); }
    }
  </style>
</head>
<body>

<main class="artifact" data-artifact="bwt-builder">

  <header class="artifact-head">
    <h1>BWT Builder</h1>
    <p>Watch the Burrows-Wheeler Transform emerge as the last column of the sorted rotation matrix. The "<code>$</code>" terminator is appended automatically; letters A, C, G, T, and ordinary alphabet are accepted.</p>
  </header>

  <section class="panel">
    <label class="field-label" for="input-string">Input string (≤ 12 chars, $ appended automatically)</label>
    <input id="input-string" class="seq-input" type="text" spellcheck="false" value="ACAACG" maxlength="12">
    <div class="controls">
      <button id="build-btn" class="btn btn--primary" type="button">Build BWT</button>
      <button id="animate-btn" class="btn" type="button">Animate sort</button>
      <button id="step-btn" class="btn" type="button">Step sort</button>
      <button id="reset-sort-btn" class="btn" type="button">Reset sort</button>
      <label style="display: flex; align-items: center; gap: 0.4rem; font-size: var(--text-sm); color: var(--fg-muted);">
        Speed <input id="speed" type="range" min="1" max="10" value="3" style="width: 100px; accent-color: var(--accent);">
      </label>
    </div>
  </section>

  <section class="panel">
    <p class="panel-label">Rotations</p>
    <div class="rotations-grid">
      <div class="rot-col">
        <h4>Unsorted</h4>
        <div class="rot-table" id="unsorted"></div>
      </div>
      <div class="arrow-col">→</div>
      <div class="rot-col">
        <h4>Sorted</h4>
        <div class="rot-col-heads">
          <span style="width: 1ch">F</span>
          <span style="margin-left: auto; width: 1ch">L</span>
        </div>
        <div class="rot-table" id="sorted"></div>
      </div>
    </div>

    <div class="output">
      <span class="label">BWT (L column)</span>
      <span class="bwt" id="bwt-output">—</span>
    </div>
  </section>
</main>

<script src="../_shared/resize.js" defer></script>

<script>
(() => {
  'use strict';

  const $ = (id) => document.getElementById(id);
  const inputEl = $('input-string');
  const buildBtn = $('build-btn');
  const animateBtn = $('animate-btn');
  const stepBtn = $('step-btn');
  const resetSortBtn = $('reset-sort-btn');
  const speedEl = $('speed');
  const unsortedEl = $('unsorted');
  const sortedEl = $('sorted');
  const bwtEl = $('bwt-output');

  let rotations = [];       // unsorted (in input order)
  let sortedFinal = [];     // final sorted order
  let working = [];         // current state of the sort-in-progress
  let sortIdx = 1;          // outer insertion-sort index
  let sortSubIdx = 0;       // inner swap counter
  let animTimer = null;

  function sanitize(s) { return (s || '').toUpperCase().replace(/[^A-Z]/g, ''); }

  function build() {
    stopAnimation();
    let t = sanitize(inputEl.value).slice(0, 12);
    if (!t) t = 'ACAACG';
    const s = t + '$';
    const n = s.length;
    rotations = [];
    for (let i = 0; i < n; i++) rotations.push({ str: s.slice(i) + s.slice(0, i), origin: i });
    sortedFinal = rotations.slice().sort((a, b) => a.str < b.str ? -1 : 1);
    // Default: show final sorted state (so the artifact is instructive on load).
    working = sortedFinal.slice();
    sortIdx = sortedFinal.length;   // sentinel: sort complete
    sortSubIdx = 0;
    renderBoth();
    renderBwt();
  }

  // Reset sort: show the unsorted order on the right panel and allow step-by-step sorting.
  function resetSort() {
    stopAnimation();
    working = rotations.slice();
    sortIdx = 1;
    sortSubIdx = 0;
    renderBoth();
    renderBwt();
  }

  // Perform ONE swap of the insertion sort. Return true if a swap happened.
  function stepSort() {
    if (sortIdx >= working.length) return false;
    const i = sortIdx;
    if (sortSubIdx === 0) sortSubIdx = i;  // initialise inner pointer
    const j = sortSubIdx;
    if (j > 0 && working[j - 1].str > working[j].str) {
      [working[j - 1], working[j]] = [working[j], working[j - 1]];
      sortSubIdx = j - 1;
    } else {
      sortIdx = i + 1;
      sortSubIdx = 0;
    }
    renderBoth();
    renderBwt();
    return true;
  }

  function stopAnimation() {
    if (animTimer) { clearInterval(animTimer); animTimer = null; }
  }

  function renderBoth() {
    unsortedEl.innerHTML = rotations.map((r) => renderRow(r.str, r.origin, false)).join('');
    sortedEl.innerHTML   = working.map((r) => renderRow(r.str, r.origin, true)).join('');

    // Cross-highlight on hover
    document.querySelectorAll('.rot-row').forEach(row => {
      row.addEventListener('mouseenter', () => {
        const origin = row.dataset.origin;
        document.querySelectorAll(`[data-origin="${origin}"]`).forEach(r => r.classList.add('highlight'));
      });
      row.addEventListener('mouseleave', () => {
        document.querySelectorAll('.rot-row.highlight').forEach(r => r.classList.remove('highlight'));
      });
    });
  }

  function renderRow(str, origin, showFL) {
    const chars = [];
    for (let k = 0; k < str.length; k++) {
      const c = str[k];
      let cls = c === '$' ? 'dollar' : '';
      if (showFL && k === 0) cls += ' first';
      if (showFL && k === str.length - 1) cls += ' last';
      chars.push(cls ? `<span class="${cls.trim()}">${c}</span>` : c);
    }
    return `<span class="rot-row" data-origin="${origin}">${chars.join('')}</span>`;
  }

  function renderBwt() {
    // Only show BWT when sort is complete (otherwise show a dash)
    if (sortIdx < working.length) {
      bwtEl.innerHTML = '<span style="color: var(--fg-subtle)">sorting…</span>';
      return;
    }
    const bwt = working.map(r => r.str[r.str.length - 1]).join('');
    const chars = bwt.split('').map(c => c === '$' ? `<span style="color: var(--fg-subtle)">$</span>` : c).join('');
    bwtEl.innerHTML = chars;
  }

  function animateSort() {
    stopAnimation();
    resetSort();
    const delay = () => 600 - (+speedEl.value - 1) * 55;  // 600ms slow … 100ms fast
    animTimer = setInterval(() => {
      const didSwap = stepSort();
      if (!didSwap) stopAnimation();
    }, delay());
  }

  inputEl.addEventListener('input', build);
  buildBtn.addEventListener('click', build);
  animateBtn.addEventListener('click', animateSort);
  stepBtn.addEventListener('click', () => {
    stopAnimation();
    // If sort is complete or unstarted, begin fresh
    if (sortIdx >= working.length) resetSort();
    stepSort();
  });
  resetSortBtn.addEventListener('click', resetSort);
  speedEl.addEventListener('input', () => {
    if (animTimer) { stopAnimation(); animateSort(); }
  });

  build();
})();
</script>

</body>
</html>
