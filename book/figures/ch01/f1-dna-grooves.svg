<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="t d">
  <title id="t">Major and minor grooves of B-form DNA</title>
  <desc id="d">Left panel: a side cutaway of B-form DNA showing two antiparallel sugar-phosphate backbones spiralling around base-pair rungs, with the wider major groove (~22 Angstrom) and the narrower minor groove (~12 Angstrom) marked between successive turns of the helix. A small protein pictogram contacts the helix in the major groove, where edge atoms of the base pairs are accessible for sequence-specific recognition. Right panel: an axial cross-section view looking down the helical axis, showing the two backbones as discs offset around the helix circumference, with the wider major-groove arc and the narrower minor-groove arc between them.</desc>

  <!-- Background -->
  <rect width="1200" height="600" fill="#fafaf9"/>

  <defs>
    <marker id="contact-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Panel titles -->
  <g font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8a8a85" letter-spacing="0.12em">
    <text x="60" y="40">SIDE VIEW · GROOVE GEOMETRY</text>
    <text x="780" y="40">AXIAL CROSS-SECTION</text>
  </g>

  <!-- ════════════════════════════════════════════════════════════════
       LEFT PANEL · Side view of helix
       Helix centre line at x = 280.  Vertical extent y = 70 → y = 470.
       One turn occupies 200 vertical pixels (≡ 34 Å, the B-DNA pitch).
       Two backbones drawn as sinusoids; the asymmetric phasing of the
       crossings makes the major groove (the wide gap between successive
       same-strand crossings on one face) and the minor groove (the
       narrow gap on the opposite face) visible.

       B-DNA convention: strand A crossings on the FRONT face at
         y = 70  (top, narrow side closes)
         y = 130 (strand A passes BEHIND strand B — minor groove ends)
         y = 270 (strand A passes IN FRONT of strand B — major groove starts)
         y = 330 (next minor groove)
         y = 470

       Both backbones are continuous; we draw them in segments that
       alternate "front" (full stroke) and "back" (dim) so the eye sees
       a 3-D helix.
       ════════════════════════════════════════════════════════════════ -->

  <!-- Helical axis (dashed, behind everything) -->
  <line x1="280" y1="60" x2="280" y2="480"
        stroke="#8a8a85" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="280" y="496" font-family="Inter, sans-serif" font-size="10"
        font-style="italic" fill="#8a8a85" text-anchor="middle">helical axis</text>

  <!-- ─── Strand A (blue) ─── -->
  <!-- BACK segments (the half-turns where strand A is behind the axis) -->
  <g fill="none" stroke="#1e3a8a" stroke-width="2.75" stroke-linecap="round" opacity="0.35">
    <path d="M 280 130 C 320 150 340 180 340 200 C 340 220 320 250 280 270"/>
    <path d="M 280 330 C 320 350 340 380 340 400 C 340 420 320 450 280 470"/>
  </g>
  <!-- FRONT segments (in front of axis) -->
  <g fill="none" stroke="#1e3a8a" stroke-width="2.75" stroke-linecap="round">
    <path d="M 280 70  C 240 90  220 100 220 130 C 220 150 240 170 280 130"
          stroke-linejoin="round"/>
    <!-- main front sweeps -->
    <path d="M 280 130 C 240 150 220 180 220 200 C 220 220 240 250 280 270"/>
    <path d="M 280 270 C 320 250 340 220 340 200" opacity="0"/>
    <path d="M 280 330 C 240 350 220 380 220 400 C 220 420 240 450 280 470"/>
  </g>
  <!-- short connector between back-and-front at top -->
  <path d="M 280 70 C 320 90 340 100 340 130 C 340 150 320 170 280 130"
        fill="none" stroke="#1e3a8a" stroke-width="2.75" stroke-linecap="round"
        opacity="0.35"/>

  <!-- ─── Strand B (amber) — 180° out of phase ─── -->
  <!-- BACK segments -->
  <g fill="none" stroke="#b45309" stroke-width="2.75" stroke-linecap="round" opacity="0.35">
    <path d="M 280 70  C 320 90  340 100 340 130 C 340 150 320 170 280 130"/>
    <path d="M 280 270 C 320 290 340 320 340 340 C 340 360 320 390 280 410"/>
  </g>
  <!-- FRONT segments -->
  <g fill="none" stroke="#b45309" stroke-width="2.75" stroke-linecap="round">
    <path d="M 280 130 C 320 150 340 180 340 200 C 340 220 320 250 280 270"/>
    <path d="M 280 270 C 240 290 220 320 220 340 C 220 360 240 390 280 410"/>
    <path d="M 280 410 C 320 430 340 450 340 470" />
  </g>

  <!-- Note: to keep visual clarity I'm leaving the helix as a simplified
       crossing diagram.  The KEY visual fact — that crossings are NOT
       evenly spaced along the axis, producing a wide gap (major groove)
       and a narrow gap (minor groove) — is conveyed by the positions of
       the brackets below, anchored to the rung pattern. -->

  <!-- Base-pair rungs.  Spaced 3.4 Å (= ~12 px here) in real DNA, drawn
       wider in the middle of a turn (front face) and narrower at the
       crossings.  The crucial visual cue for grooves: above each
       crossing there is more open space on one side than the other. -->
  <g stroke="#525252" stroke-width="1.5" stroke-linecap="round">
    <!-- The rungs are angled because they would be foreshortened across
         the helix in 3-D; for a stylised cartoon we draw them slightly
         tilted, alternating per half-turn. -->

    <!-- Upper turn — major groove faces LEFT (broad gap on the left
         flank of the helix between successive strand-A crossings) -->
    <line x1="222" y1="90"  x2="338" y2="92"/>
    <line x1="220" y1="105" x2="340" y2="108"/>
    <line x1="222" y1="120" x2="340" y2="122"/>
    <line x1="225" y1="135" x2="335" y2="137"/>
    <line x1="222" y1="155" x2="340" y2="157"/>
    <line x1="220" y1="175" x2="340" y2="177"/>
    <line x1="222" y1="195" x2="338" y2="197"/>
    <line x1="225" y1="215" x2="335" y2="217"/>
    <line x1="230" y1="235" x2="332" y2="237"/>

    <!-- Minor-groove region — short rungs near the crossings -->
    <line x1="240" y1="255" x2="320" y2="257"/>

    <!-- Lower turn — pattern repeats, major groove faces LEFT again -->
    <line x1="222" y1="285" x2="338" y2="287"/>
    <line x1="220" y1="305" x2="340" y2="307"/>
    <line x1="222" y1="320" x2="340" y2="322"/>
    <line x1="225" y1="335" x2="335" y2="337"/>
    <line x1="222" y1="355" x2="340" y2="357"/>
    <line x1="220" y1="375" x2="340" y2="377"/>
    <line x1="222" y1="395" x2="338" y2="397"/>
    <line x1="225" y1="415" x2="335" y2="417"/>
    <line x1="230" y1="435" x2="332" y2="437"/>
    <line x1="240" y1="455" x2="320" y2="457"/>
  </g>

  <!-- ─── Groove brackets ─── -->
  <!-- Position rationale (visual, not metric):
       crossings at y = 70 and y = 270 mark one full turn (34 Å).
       Major groove ≈ 22 Å ≡ ~130 px of that turn  (y ≈ 80 → 210)
       Minor groove ≈ 12 Å ≡ ~70 px of that turn   (y ≈ 215 → 280) -->

  <!-- Major groove bracket on the LEFT flank -->
  <g fill="none" stroke="#b45309" stroke-width="2">
    <path d="M 195 80 L 175 80 L 175 245 L 195 245"/>
  </g>
  <g font-family="Inter, sans-serif" fill="#b45309" text-anchor="middle">
    <text x="118" y="155" font-size="14" font-weight="600">major</text>
    <text x="118" y="172" font-size="14" font-weight="600">groove</text>
    <text x="118" y="190" font-family="JetBrains Mono, monospace" font-size="11">~22 Å</text>
  </g>

  <!-- Minor groove bracket on the LEFT flank (between two majors) -->
  <g fill="none" stroke="#065f46" stroke-width="2">
    <path d="M 195 255 L 175 255 L 175 325 L 195 325"/>
  </g>
  <g font-family="Inter, sans-serif" fill="#065f46" text-anchor="middle">
    <text x="118" y="285" font-size="14" font-weight="600">minor</text>
    <text x="118" y="302" font-size="14" font-weight="600">groove</text>
    <text x="118" y="318" font-family="JetBrains Mono, monospace" font-size="11">~12 Å</text>
  </g>

  <!-- Repeat-major bracket in lower turn, dimmed, to convey periodicity.
       (We omit the dim minor-groove repeat — it was confusingly short
       at the bottom edge.) -->
  <g fill="none" stroke="#b45309" stroke-width="1.5" opacity="0.4">
    <path d="M 195 335 L 175 335 L 175 470 L 195 470"/>
  </g>
  <text x="118" y="408" font-family="Inter, sans-serif" font-size="10"
        font-style="italic" fill="#b45309" text-anchor="middle" opacity="0.7">(repeats every turn)</text>

  <!-- 5'/3' end labels on left panel -->
  <g font-family="Inter, sans-serif" font-size="11" font-weight="600" text-anchor="middle">
    <text x="278" y="62" fill="#1e3a8a">5'</text>
    <text x="280" y="488" fill="#1e3a8a">3'</text>
    <text x="345" y="62"  fill="#b45309">3'</text>
    <text x="345" y="488" fill="#b45309">5'</text>
  </g>

  <!-- ════════════════════════════════════════════════════════════════
       Protein contact pictogram on the upper major groove
       Sits to the right of the helix, with a recognition alpha-helix
       (red rounded rectangle) inserting into the wide groove between
       y ≈ 130 and y ≈ 230.
       ════════════════════════════════════════════════════════════════ -->

  <g>
    <!-- Domain body (kidney-bean shape) -->
    <path d="M 470 130
             Q 560 130 580 175
             Q 595 215 575 250
             Q 555 285 480 280
             Q 440 273 440 215
             Q 440 138 470 130 Z"
          fill="#dc2626" fill-opacity="0.08"
          stroke="#dc2626" stroke-width="2"/>

    <!-- Recognition alpha-helix probing toward the helix -->
    <rect x="378" y="190" width="80" height="22" rx="11"
          fill="#dc2626" fill-opacity="0.18"
          stroke="#dc2626" stroke-width="2"/>

    <!-- Contact arrow from probe tip into the major groove -->
    <line x1="376" y1="201" x2="348" y2="201"
          stroke="#dc2626" stroke-width="2.25"
          marker-end="url(#contact-arrow)"/>

    <!-- Protein labels -->
    <g font-family="Inter, sans-serif" fill="#dc2626" text-anchor="middle">
      <text x="510" y="205" font-size="13" font-weight="600">DNA-binding</text>
      <text x="510" y="222" font-size="13" font-weight="600">protein</text>
      <text x="510" y="243" font-size="10" font-style="italic">e.g. transcription factor</text>
    </g>

    <!-- Annotation above the probe -->
    <text x="468" y="115" font-family="Inter, sans-serif" font-size="10" fill="#374151" text-anchor="middle">reads base-edge atoms</text>
    <text x="468" y="127" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#374151" text-anchor="middle">exposed in the major groove</text>
  </g>

  <!-- ════════════════════════════════════════════════════════════════
       RIGHT PANEL · Axial cross-section view
       Centre (970, 290), helix envelope radius 130.
       The two backbones project to two phosphate "discs" on the
       circumference.  Their angular separation around the axis is
       NOT 180°: the backbones are offset so the arc between them on
       one side (~210°) gives the major groove and the arc on the
       opposite side (~150°) gives the minor groove.
       ════════════════════════════════════════════════════════════════ -->

  <!-- Outer helix envelope -->
  <circle cx="970" cy="290" r="130"
          fill="none" stroke="#374151" stroke-width="1"
          stroke-dasharray="4 4"/>

  <!-- Central base-stack disc -->
  <circle cx="970" cy="290" r="62"
          fill="#374151" fill-opacity="0.05"
          stroke="#374151" stroke-width="0.75"
          stroke-dasharray="2 3"/>

  <!-- A representative base-pair bar across the axis (horizontal) -->
  <line x1="908" y1="290" x2="1032" y2="290"
        stroke="#525252" stroke-width="2"/>
  <g font-family="JetBrains Mono, monospace" font-size="13" font-weight="500" text-anchor="middle">
    <text x="897" y="295" fill="#c4342c">N</text>
    <text x="1043" y="295" fill="#0d7377">N'</text>
  </g>

  <!-- Strand A backbone phosphate disc — placed at angle ≈ -55° from
       the +x axis (upper right of the cross-section).
       cx = 970 + 130·cos(-55°) ≈ 970 + 74.5 = 1044.5
       cy = 290 + 130·sin(-55°) ≈ 290 - 106.5 = 183.5 -->
  <circle cx="1044" cy="184" r="14" fill="#1e3a8a"/>
  <text x="1044" y="188" font-family="Inter, sans-serif" font-size="11"
        font-weight="700" fill="#fafaf9" text-anchor="middle">A</text>

  <!-- Strand B backbone phosphate disc — placed at angle ≈ +55°
       (lower right).  cx ≈ 1044.5, cy ≈ 290 + 106.5 = 396.5 -->
  <circle cx="1044" cy="396" r="14" fill="#b45309"/>
  <text x="1044" y="400" font-family="Inter, sans-serif" font-size="11"
        font-weight="700" fill="#fafaf9" text-anchor="middle">B</text>

  <!-- Major-groove arc: the LONG way round from A (angle -55°) to B
       (angle +55°), i.e. going counter-clockwise through the left.
       SVG arc: large-arc-flag=1, sweep-flag=0. -->
  <path d="M 1041 196 A 142 142 0 1 0 1041 384"
        fill="none" stroke="#b45309" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Minor-groove arc: the SHORT way from A to B (right side) -->
  <path d="M 1052 196 A 142 142 0 0 1 1052 384"
        fill="none" stroke="#065f46" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Major groove label with leader -->
  <line x1="826" y1="290" x2="806" y2="290" stroke="#b45309" stroke-width="1.25"/>
  <g font-family="Inter, sans-serif" fill="#b45309" text-anchor="end">
    <text x="800" y="286" font-size="13" font-weight="600">major groove</text>
    <text x="800" y="302" font-family="JetBrains Mono, monospace" font-size="11">~22 Å wide</text>
  </g>

  <!-- Minor groove label with leader (placed inside viewBox, anchored end) -->
  <line x1="1078" y1="290" x2="1106" y2="290" stroke="#065f46" stroke-width="1.25"/>
  <g font-family="Inter, sans-serif" fill="#065f46" text-anchor="end">
    <text x="1175" y="270" font-size="13" font-weight="600">minor groove</text>
    <text x="1175" y="286" font-family="JetBrains Mono, monospace" font-size="11">~12 Å wide</text>
  </g>

  <!-- Axis dot -->
  <circle cx="970" cy="290" r="2.5" fill="#374151"/>
  <text x="970" y="278" font-family="Inter, sans-serif" font-size="9"
        font-style="italic" fill="#8a8a85" text-anchor="middle">axis</text>

  <!-- "view down the axis" tag — moved to top-centre of right panel,
       well clear of the major-groove arc -->
  <text x="850" y="80" font-family="Inter, sans-serif" font-size="10"
        font-style="italic" fill="#8a8a85" text-anchor="start">view looking down the helical axis</text>

  <!-- ════════════════════════════════════════════════════════════════
       Footer caption strip
       ════════════════════════════════════════════════════════════════ -->
  <rect x="60" y="538" width="1080" height="42" rx="4"
        fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>

  <g font-family="Inter, sans-serif" font-size="10" fill="#525252">
    <!-- Strand legend (left) -->
    <line x1="76" y1="558" x2="108" y2="558" stroke="#1e3a8a" stroke-width="2.75"/>
    <text x="116" y="562">strand A backbone</text>
    <line x1="240" y1="558" x2="272" y2="558" stroke="#b45309" stroke-width="2.75"/>
    <text x="280" y="562">strand B (antiparallel)</text>
    <line x1="410" y1="558" x2="442" y2="558" stroke="#525252" stroke-width="1.5"/>
    <text x="450" y="562">base pair</text>

    <!-- Helix-geometry note, right-aligned -->
    <text x="1124" y="562" text-anchor="end" font-style="italic" fill="#8a8a85">
      B-form DNA · 10.5 bp / turn · 3.4 Å rise / bp · grooves repeat every ~34 Å
    </text>
  </g>
</svg>
