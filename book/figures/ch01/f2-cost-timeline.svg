<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="t d">
  <title id="t">Cost per human genome, 2001–2025 (log scale)</title>
  <desc id="d">NHGRI "Cost per Genome" curve plotted on a logarithmic vertical axis from $1 to $100,000,000, across the years 2001 to 2025. A muted reference line shows Moore's Law (cost halving every 18 months). The sequencing-cost curve tracks Moore's Law until 2007, then drops several orders of magnitude between 2007 and 2010 with the introduction of short-read next-generation sequencing, far outpacing semiconductor scaling. Milestone annotations mark the Human Genome Project completion in 2003, the first NGS instruments in 2007, the Illumina Genome Analyzer in 2008, the HiSeq X $1,000-genome milestone in 2014, the NovaSeq X in 2022, and the present-day ~$100 mark in 2025.</desc>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="600" fill="#fafaf9"/>

  <defs>
    <!-- Tiny arrowhead for the discontinuity callout -->
    <marker id="arrow-callout" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- ════════ Title block ════════ -->
  <g font-family="Inter, sans-serif" fill="#374151">
    <text x="60" y="38" font-size="18" font-weight="600">Cost per human genome, 2001–2025</text>
    <text x="60" y="56" font-size="12" fill="#6b7280">NHGRI sequencing-cost survey, log scale. Moore's Law shown for comparison (cost halving every 18 months from the 2001 value).</text>
  </g>

  <!-- ════════ Plot area: x [110, 1130], y [70, 510] ════════ -->

  <!-- Horizontal gridlines (one per decade) -->
  <g stroke="#e5e7eb" stroke-width="0.5" fill="none">
    <line x1="110" y1="70"  x2="1130" y2="70"/>
    <line x1="110" y1="125" x2="1130" y2="125"/>
    <line x1="110" y1="180" x2="1130" y2="180"/>
    <line x1="110" y1="235" x2="1130" y2="235"/>
    <line x1="110" y1="290" x2="1130" y2="290"/>
    <line x1="110" y1="345" x2="1130" y2="345"/>
    <line x1="110" y1="400" x2="1130" y2="400"/>
    <line x1="110" y1="455" x2="1130" y2="455"/>
    <line x1="110" y1="510" x2="1130" y2="510"/>
  </g>

  <!-- Vertical gridlines (every 5 years) -->
  <g stroke="#e5e7eb" stroke-width="0.5" fill="none">
    <line x1="280"   y1="70" x2="280"   y2="510"/>
    <line x1="492.5" y1="70" x2="492.5" y2="510"/>
    <line x1="705"   y1="70" x2="705"   y2="510"/>
    <line x1="917.5" y1="70" x2="917.5" y2="510"/>
  </g>

  <!-- Axes -->
  <g stroke="#374151" stroke-width="1" fill="none">
    <line x1="110" y1="70"  x2="110"  y2="510"/>
    <line x1="110" y1="510" x2="1130" y2="510"/>
  </g>

  <!-- Y-axis tick labels (dollar values, JetBrains Mono) -->
  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#374151" text-anchor="end">
    <text x="100" y="74">$100,000,000</text>
    <text x="100" y="129">$10,000,000</text>
    <text x="100" y="184">$1,000,000</text>
    <text x="100" y="239">$100,000</text>
    <text x="100" y="294">$10,000</text>
    <text x="100" y="349">$1,000</text>
    <text x="100" y="404">$100</text>
    <text x="100" y="459">$10</text>
    <text x="100" y="514">$1</text>
  </g>

  <!-- Y-axis short ticks -->
  <g stroke="#374151" stroke-width="1">
    <line x1="106" y1="70"  x2="110" y2="70"/>
    <line x1="106" y1="125" x2="110" y2="125"/>
    <line x1="106" y1="180" x2="110" y2="180"/>
    <line x1="106" y1="235" x2="110" y2="235"/>
    <line x1="106" y1="290" x2="110" y2="290"/>
    <line x1="106" y1="345" x2="110" y2="345"/>
    <line x1="106" y1="400" x2="110" y2="400"/>
    <line x1="106" y1="455" x2="110" y2="455"/>
    <line x1="106" y1="510" x2="110" y2="510"/>
  </g>

  <!-- X-axis tick labels -->
  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#374151" text-anchor="middle">
    <text x="110"   y="528">2001</text>
    <text x="280"   y="528">2005</text>
    <text x="492.5" y="528">2010</text>
    <text x="705"   y="528">2015</text>
    <text x="917.5" y="528">2020</text>
    <text x="1130"  y="528">2025</text>
  </g>

  <!-- X-axis short ticks -->
  <g stroke="#374151" stroke-width="1">
    <line x1="110"   y1="510" x2="110"   y2="514"/>
    <line x1="280"   y1="510" x2="280"   y2="514"/>
    <line x1="492.5" y1="510" x2="492.5" y2="514"/>
    <line x1="705"   y1="510" x2="705"   y2="514"/>
    <line x1="917.5" y1="510" x2="917.5" y2="514"/>
    <line x1="1130"  y1="510" x2="1130"  y2="514"/>
  </g>

  <!-- Axis titles -->
  <g font-family="Inter, sans-serif" font-size="12" fill="#374151">
    <text x="620" y="558" text-anchor="middle" font-weight="500">Year</text>
    <text x="32"  y="290" text-anchor="middle" font-weight="500" transform="rotate(-90 32 290)">Cost per human genome (US dollars, log scale)</text>
  </g>

  <!-- ════════ Moore's Law reference line (muted gray, dashed) ════════ -->
  <g stroke="#9ca3af" stroke-width="2" fill="none" stroke-dasharray="6 4">
    <polyline points="110,71 280,115 492.5,171 705,226 917.5,281 1130,336"/>
  </g>

  <!-- Moore's Law label -->
  <g font-family="Inter, sans-serif" font-size="11" fill="#6b7280">
    <text x="945" y="270" font-style="italic">Moore's Law</text>
    <text x="945" y="284" font-size="10">(2× every 18 months)</text>
  </g>

  <!-- ════════ Main NHGRI curve (cobalt) ════════ -->
  <g stroke="#1e3a8a" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <polyline points="110,71 195,87 280,108 365,125 408,180 450,218 492.5,252 578,290 663,345 748,345 875,354 1003,383 1130,400"/>
  </g>

  <!-- Data point markers -->
  <g fill="#1e3a8a" stroke="#fafaf9" stroke-width="1">
    <circle cx="110"   cy="71"  r="3.5"/>
    <circle cx="195"   cy="87"  r="3.5"/>
    <circle cx="365"   cy="125" r="3.5"/>
    <circle cx="408"   cy="180" r="3.5"/>
    <circle cx="663"   cy="345" r="3.5"/>
    <circle cx="1003"  cy="383" r="3.5"/>
    <circle cx="1130"  cy="400" r="3.5"/>
  </g>

  <!-- ════════ Milestone annotations ════════ -->
  <g font-family="Inter, sans-serif" font-size="11" fill="#374151">

    <!-- 2001 — HGP era cost -->
    <line x1="110" y1="71" x2="148" y2="48" stroke="#9ca3af" stroke-width="0.75"/>
    <text x="152" y="46" font-weight="600">2001</text>
    <text x="152" y="60" font-size="10" fill="#6b7280">HGP-era, ~$100M</text>

    <!-- 2003 — HGP complete -->
    <line x1="195" y1="87" x2="232" y2="100" stroke="#9ca3af" stroke-width="0.75"/>
    <text x="236" y="98" font-weight="600">2003</text>
    <text x="236" y="112" font-size="10" fill="#6b7280">HGP complete, ~$50M</text>

    <!-- 2007 — First NGS (454/Solexa) -->
    <line x1="365" y1="125" x2="395" y2="105" stroke="#9ca3af" stroke-width="0.75"/>
    <text x="399" y="103" font-weight="600">2007</text>
    <text x="399" y="117" font-size="10" fill="#6b7280">First NGS (454/Solexa), ~$10M</text>

    <!-- 2008 — Illumina GA: the dramatic break -->
    <line x1="408" y1="180" x2="455" y2="160" stroke="#9ca3af" stroke-width="0.75"/>
    <text x="459" y="158" font-weight="600" fill="#1e3a8a">2008</text>
    <text x="459" y="172" font-size="10" fill="#6b7280">Illumina GA, ~$1M</text>

    <!-- Discontinuity callout: the elbow -->
    <g>
      <path d="M 545 220 Q 500 215 425 195" stroke="#374151" stroke-width="1" fill="none" marker-end="url(#arrow-callout)"/>
      <text x="552" y="218" font-size="11" font-weight="600" fill="#374151">the discontinuity</text>
      <text x="552" y="232" font-size="10" fill="#6b7280">short-read NGS breaks</text>
      <text x="552" y="244" font-size="10" fill="#6b7280">away from Moore's Law</text>
    </g>

    <!-- 2014 — HiSeq X, $1000 genome -->
    <line x1="663" y1="345" x2="678" y2="378" stroke="#9ca3af" stroke-width="0.75"/>
    <text x="682" y="380" font-weight="600">2014</text>
    <text x="682" y="394" font-size="10" fill="#6b7280">HiSeq X, $1,000-genome milestone</text>

    <!-- 2022 — NovaSeq X -->
    <line x1="1003" y1="383" x2="990" y2="430" stroke="#9ca3af" stroke-width="0.75"/>
    <text x="908" y="444" font-weight="600">2022</text>
    <text x="908" y="458" font-size="10" fill="#6b7280">NovaSeq X, ~$200</text>

    <!-- 2025 — current -->
    <line x1="1130" y1="400" x2="1120" y2="438" stroke="#9ca3af" stroke-width="0.75"/>
    <text x="1080" y="452" font-weight="600" text-anchor="end">2025</text>
    <text x="1080" y="466" font-size="10" fill="#6b7280" text-anchor="end">current, ~$100</text>
  </g>

  <!-- ════════ Legend (bottom-left of plot) ════════ -->
  <g font-family="Inter, sans-serif" font-size="11" fill="#374151">
    <g transform="translate(135 478)">
      <rect x="0" y="0" width="190" height="44" rx="3" fill="#fafaf9" stroke="#e5e7eb" stroke-width="0.5"/>
      <line x1="10" y1="16" x2="40" y2="16" stroke="#1e3a8a" stroke-width="2"/>
      <circle cx="25" cy="16" r="3" fill="#1e3a8a" stroke="#fafaf9" stroke-width="1"/>
      <text x="48" y="20">NHGRI cost per genome</text>
      <line x1="10" y1="34" x2="40" y2="34" stroke="#9ca3af" stroke-width="2" stroke-dasharray="6 4"/>
      <text x="48" y="38">Moore's Law (1.5-yr halving)</text>
    </g>
  </g>

</svg>
