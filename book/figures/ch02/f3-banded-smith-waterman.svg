<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="t d">
  <title id="t">Banded Smith-Waterman: restricting the DP matrix to a diagonal band</title>
  <desc id="d">A side-by-side comparison of full Smith-Waterman against banded Smith-Waterman. Left panel: the full DP matrix as a grid, showing every cell as a candidate for computation, with the optimal alignment path drawn diagonally. Right panel: the same matrix with only a narrow diagonal band of cells active around the seed diagonal; cells outside the band are greyed out to indicate they are not computed. A small annotation underneath shows the cost reduction from O(|r||R|) to O(|r| times band-width b).</desc>

  <rect width="1200" height="600" fill="#fafaf9"/>

  <defs>
    <marker id="band-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
    <marker id="band-arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="40" y="34" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-weight="600" fill="#8a8a85" letter-spacing="0.14em">
    BANDED SMITH-WATERMAN · CUT THE MATRIX TO A DIAGONAL BAND
  </text>

  <!-- ============ LEFT PANEL: full SW grid ============ -->
  <g transform="translate(60, 80)">
    <text x="0" y="-20" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-weight="600" fill="#374151" letter-spacing="0.10em">FULL · O(|r| · |R|)</text>

    <!-- Grid 20 cols x 20 rows; cell = 20 -->
    <!-- background -->
    <rect x="0" y="0" width="400" height="400" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.5"/>

    <!-- gridlines -->
    <g stroke="#c4c1b6" stroke-width="0.5">
      <!-- vertical -->
      <line x1="20" y1="0" x2="20" y2="400"/>
      <line x1="40" y1="0" x2="40" y2="400"/>
      <line x1="60" y1="0" x2="60" y2="400"/>
      <line x1="80" y1="0" x2="80" y2="400"/>
      <line x1="100" y1="0" x2="100" y2="400"/>
      <line x1="120" y1="0" x2="120" y2="400"/>
      <line x1="140" y1="0" x2="140" y2="400"/>
      <line x1="160" y1="0" x2="160" y2="400"/>
      <line x1="180" y1="0" x2="180" y2="400"/>
      <line x1="200" y1="0" x2="200" y2="400"/>
      <line x1="220" y1="0" x2="220" y2="400"/>
      <line x1="240" y1="0" x2="240" y2="400"/>
      <line x1="260" y1="0" x2="260" y2="400"/>
      <line x1="280" y1="0" x2="280" y2="400"/>
      <line x1="300" y1="0" x2="300" y2="400"/>
      <line x1="320" y1="0" x2="320" y2="400"/>
      <line x1="340" y1="0" x2="340" y2="400"/>
      <line x1="360" y1="0" x2="360" y2="400"/>
      <line x1="380" y1="0" x2="380" y2="400"/>
      <!-- horizontal -->
      <line x1="0" y1="20"  x2="400" y2="20"/>
      <line x1="0" y1="40"  x2="400" y2="40"/>
      <line x1="0" y1="60"  x2="400" y2="60"/>
      <line x1="0" y1="80"  x2="400" y2="80"/>
      <line x1="0" y1="100" x2="400" y2="100"/>
      <line x1="0" y1="120" x2="400" y2="120"/>
      <line x1="0" y1="140" x2="400" y2="140"/>
      <line x1="0" y1="160" x2="400" y2="160"/>
      <line x1="0" y1="180" x2="400" y2="180"/>
      <line x1="0" y1="200" x2="400" y2="200"/>
      <line x1="0" y1="220" x2="400" y2="220"/>
      <line x1="0" y1="240" x2="400" y2="240"/>
      <line x1="0" y1="260" x2="400" y2="260"/>
      <line x1="0" y1="280" x2="400" y2="280"/>
      <line x1="0" y1="300" x2="400" y2="300"/>
      <line x1="0" y1="320" x2="400" y2="320"/>
      <line x1="0" y1="340" x2="400" y2="340"/>
      <line x1="0" y1="360" x2="400" y2="360"/>
      <line x1="0" y1="380" x2="400" y2="380"/>
    </g>

    <!-- Optimal diagonal path -->
    <g stroke="#1e3a8a" stroke-width="2" fill="none">
      <path d="M 10 10 L 70 70 L 90 90 L 110 110 L 130 130 L 150 130 L 170 150 L 190 170 L 210 190 L 230 210 L 250 230 L 270 250 L 290 270 L 310 290 L 330 290 L 350 310 L 370 330 L 390 350"/>
    </g>

    <!-- Axis labels -->
    <text x="200" y="-4" font-family="Inter, Helvetica Neue, sans-serif" font-size="10" fill="#8a8a85" text-anchor="middle">reference window  →  |R'|</text>
    <text x="-12" y="200" font-family="Inter, Helvetica Neue, sans-serif" font-size="10" fill="#8a8a85" text-anchor="middle" transform="rotate(-90, -12, 200)">read  →  |r|</text>

    <!-- Cells filled count -->
    <text x="200" y="430" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" fill="#374151" text-anchor="middle">cells computed = |r| · |R'|</text>
  </g>

  <!-- ============ RIGHT PANEL: banded SW ============ -->
  <g transform="translate(620, 80)">
    <text x="0" y="-20" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-weight="600" fill="#374151" letter-spacing="0.10em">BANDED · O(|r| · b),  b ≪ |R'|</text>

    <rect x="0" y="0" width="400" height="400" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.5"/>

    <!-- Greyed-out background grid for context -->
    <g stroke="#c4c1b6" stroke-width="0.5" opacity="0.5">
      <line x1="20" y1="0" x2="20" y2="400"/>
      <line x1="40" y1="0" x2="40" y2="400"/>
      <line x1="60" y1="0" x2="60" y2="400"/>
      <line x1="80" y1="0" x2="80" y2="400"/>
      <line x1="100" y1="0" x2="100" y2="400"/>
      <line x1="120" y1="0" x2="120" y2="400"/>
      <line x1="140" y1="0" x2="140" y2="400"/>
      <line x1="160" y1="0" x2="160" y2="400"/>
      <line x1="180" y1="0" x2="180" y2="400"/>
      <line x1="200" y1="0" x2="200" y2="400"/>
      <line x1="220" y1="0" x2="220" y2="400"/>
      <line x1="240" y1="0" x2="240" y2="400"/>
      <line x1="260" y1="0" x2="260" y2="400"/>
      <line x1="280" y1="0" x2="280" y2="400"/>
      <line x1="300" y1="0" x2="300" y2="400"/>
      <line x1="320" y1="0" x2="320" y2="400"/>
      <line x1="340" y1="0" x2="340" y2="400"/>
      <line x1="360" y1="0" x2="360" y2="400"/>
      <line x1="380" y1="0" x2="380" y2="400"/>
      <line x1="0" y1="20"  x2="400" y2="20"/>
      <line x1="0" y1="40"  x2="400" y2="40"/>
      <line x1="0" y1="60"  x2="400" y2="60"/>
      <line x1="0" y1="80"  x2="400" y2="80"/>
      <line x1="0" y1="100" x2="400" y2="100"/>
      <line x1="0" y1="120" x2="400" y2="120"/>
      <line x1="0" y1="140" x2="400" y2="140"/>
      <line x1="0" y1="160" x2="400" y2="160"/>
      <line x1="0" y1="180" x2="400" y2="180"/>
      <line x1="0" y1="200" x2="400" y2="200"/>
      <line x1="0" y1="220" x2="400" y2="220"/>
      <line x1="0" y1="240" x2="400" y2="240"/>
      <line x1="0" y1="260" x2="400" y2="260"/>
      <line x1="0" y1="280" x2="400" y2="280"/>
      <line x1="0" y1="300" x2="400" y2="300"/>
      <line x1="0" y1="320" x2="400" y2="320"/>
      <line x1="0" y1="340" x2="400" y2="340"/>
      <line x1="0" y1="360" x2="400" y2="360"/>
      <line x1="0" y1="380" x2="400" y2="380"/>
    </g>

    <!-- The diagonal band fill (cobalt-tinted) -->
    <g fill="#eef2ff" stroke="none">
      <polygon points="0,0 80,0 400,320 400,400 320,400 0,80"/>
    </g>

    <!-- Solid band outline -->
    <g stroke="#1e3a8a" stroke-width="1.2" fill="none">
      <line x1="0" y1="80" x2="320" y2="400"/>
      <line x1="80" y1="0" x2="400" y2="320"/>
    </g>

    <!-- Band centre dashed (seed diagonal) -->
    <g stroke="#1e3a8a" stroke-width="0.8" stroke-dasharray="4 3" fill="none">
      <line x1="0" y1="0" x2="400" y2="400"/>
    </g>

    <!-- Optimal path inside band -->
    <g stroke="#1e3a8a" stroke-width="2" fill="none">
      <path d="M 10 10 L 70 70 L 90 90 L 110 110 L 130 130 L 150 130 L 170 150 L 190 170 L 210 190 L 230 210 L 250 230 L 270 250 L 290 270 L 310 290 L 330 290 L 350 310 L 370 330 L 390 350"/>
    </g>

    <!-- Band width annotation -->
    <g stroke="#1e3a8a" stroke-width="1" fill="none">
      <line x1="180" y1="220" x2="240" y2="220" marker-start="url(#band-arr)" marker-end="url(#band-arr)"/>
    </g>
    <text x="210" y="214" font-family="Inter, Helvetica Neue, sans-serif" font-size="10" fill="#1e3a8a" font-weight="600" text-anchor="middle">band b</text>

    <!-- Excluded regions label -->
    <text x="350" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="10" fill="#8a8a85" text-anchor="middle">excluded</text>
    <text x="50" y="360" font-family="Inter, Helvetica Neue, sans-serif" font-size="10" fill="#8a8a85" text-anchor="middle">excluded</text>

    <!-- Axis labels -->
    <text x="200" y="-4" font-family="Inter, Helvetica Neue, sans-serif" font-size="10" fill="#8a8a85" text-anchor="middle">reference window  →  |R'|</text>
    <text x="-12" y="200" font-family="Inter, Helvetica Neue, sans-serif" font-size="10" fill="#8a8a85" text-anchor="middle" transform="rotate(-90, -12, 200)">read  →  |r|</text>

    <text x="200" y="430" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" fill="#374151" text-anchor="middle">cells computed ≈ |r| · b</text>
  </g>

  <!-- ============ BOTTOM: rationale ============ -->
  <g transform="translate(60, 540)">
    <rect x="0" y="0" width="1080" height="40" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.5"/>
    <text x="20" y="26" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" fill="#374151">
      <tspan font-weight="600" fill="#1e3a8a" letter-spacing="0.10em">RATIONALE  ·  </tspan>
      if the seed places the alignment near the main diagonal, a true match cannot stray further than b/2 from it without exceeding the read's error budget — so cells outside the band are guaranteed to be sub-optimal and can be skipped.
    </text>
  </g>

</svg>
