<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="t d">
  <title id="t">Minimizer-based seed-chain-extend for a long read</title>
  <desc id="d">A schematic of how minimap2 aligns a long read against a reference. Top: a reference track with minimizer positions marked along it. Middle: a long read with its own minimizers, plus an inset showing the sliding-window choice that defines a minimizer as the lexicographically smallest k-mer in a window. Lower middle: a dot-plot of all minimizer hits between read and reference, with colinear hits joined by a cobalt chain and outliers shown as scattered dots. Bottom: small Smith-Waterman extension boxes anchored to each chain segment, filling in base-level alignment within a narrow band. A right-hand summary panel contrasts dense k-mer indexing against minimizer indexing, noting the roughly w-fold sparsification.</desc>

  <rect width="1200" height="640" fill="#fafaf9"/>

  <defs>
    <marker id="chain-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="40" y="34" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-weight="600" fill="#8a8a85" letter-spacing="0.14em">
    MINIMIZER SEED · CHAIN · BANDED EXTEND  ·  THE MINIMAP2 SKELETON
  </text>

  <!-- ============ TOP: reference track and minimizers ============ -->
  <g transform="translate(60, 70)">
    <text x="0" y="0" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-weight="600" fill="#374151" letter-spacing="0.10em">REFERENCE</text>
    <line x1="0" y1="18" x2="780" y2="18" stroke="#374151" stroke-width="2.2"/>

    <!-- Reference minimizer marks (sparse, every ~50-80 px) -->
    <g fill="#1e3a8a">
      <circle cx="40"  cy="18" r="4"/>
      <circle cx="110" cy="18" r="4"/>
      <circle cx="170" cy="18" r="4"/>
      <circle cx="240" cy="18" r="4"/>
      <circle cx="310" cy="18" r="4"/>
      <circle cx="380" cy="18" r="4"/>
      <circle cx="445" cy="18" r="4"/>
      <circle cx="520" cy="18" r="4"/>
      <circle cx="585" cy="18" r="4"/>
      <circle cx="650" cy="18" r="4"/>
      <circle cx="720" cy="18" r="4"/>
    </g>

    <text x="0" y="48" font-family="Inter, Helvetica Neue, sans-serif" font-size="10" fill="#525252">
      cobalt dots: minimizer positions stored in the index.
    </text>

    <!-- True alignment region highlight -->
    <rect x="170" y="6" width="320" height="24" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.55"/>
    <text x="330" y="-2" font-family="Inter, Helvetica Neue, sans-serif" font-size="10" fill="#1e3a8a" text-anchor="middle">read's true mapping region</text>
  </g>

  <!-- Read track -->
  <g transform="translate(60, 150)">
    <text x="0" y="0" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-weight="600" fill="#374151" letter-spacing="0.10em">READ (long, ~10 kb)</text>
    <line x1="0" y1="18" x2="320" y2="18" stroke="#b45309" stroke-width="2.2"/>

    <!-- Read minimizer marks -->
    <g fill="#b45309">
      <circle cx="20"  cy="18" r="4"/>
      <circle cx="70"  cy="18" r="4"/>
      <circle cx="115" cy="18" r="4"/>
      <circle cx="155" cy="18" r="4"/>
      <circle cx="200" cy="18" r="4"/>
      <circle cx="245" cy="18" r="4"/>
      <circle cx="295" cy="18" r="4"/>
    </g>
  </g>

  <!-- Minimizer-window inset -->
  <g transform="translate(420, 130)">
    <rect x="0" y="0" width="380" height="80" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.5"/>
    <text x="14" y="20" font-family="Inter, Helvetica Neue, sans-serif" font-size="10" font-weight="600" fill="#374151" letter-spacing="0.10em">
      MINIMIZER OF (k=5, w=4)
    </text>
    <g font-family="JetBrains Mono, Menlo, monospace" font-size="13" fill="#374151" letter-spacing="0.05em">
      <text x="14" y="44">ACGTC  CGTCA  GTCAA  TCAAT</text>
    </g>
    <g font-family="Inter, Helvetica Neue, sans-serif" font-size="10" fill="#525252">
      <text x="14" y="64">four consecutive 5-mers in a window of length w + k − 1; the lex-smallest is the minimizer.</text>
    </g>
    <!-- highlight winning k-mer -->
    <rect x="74" y="32" width="56" height="16" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.6"/>
  </g>

  <!-- ============ MIDDLE: dot plot of hits ============ -->
  <g transform="translate(60, 240)">
    <text x="0" y="0" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-weight="600" fill="#374151" letter-spacing="0.10em">
      DOT PLOT OF MINIMIZER HITS  ·  CHAIN COLINEAR ONES
    </text>

    <!-- Plot bg -->
    <rect x="0" y="14" width="540" height="200" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.5"/>

    <!-- gridlines -->
    <g stroke="#c4c1b6" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.8">
      <line x1="0" y1="64"  x2="540" y2="64"/>
      <line x1="0" y1="114" x2="540" y2="114"/>
      <line x1="0" y1="164" x2="540" y2="164"/>
      <line x1="135" y1="14" x2="135" y2="214"/>
      <line x1="270" y1="14" x2="270" y2="214"/>
      <line x1="405" y1="14" x2="405" y2="214"/>
    </g>

    <!-- Axis labels -->
    <text x="270" y="234" font-family="Inter, Helvetica Neue, sans-serif" font-size="10" fill="#8a8a85" text-anchor="middle">reference position</text>
    <text x="-30" y="114" font-family="Inter, Helvetica Neue, sans-serif" font-size="10" fill="#8a8a85" text-anchor="middle" transform="rotate(-90, -30, 114)">read position</text>

    <!-- Random scattered noise hits -->
    <g fill="#525252" opacity="0.7">
      <circle cx="40"  cy="40" r="2.5"/>
      <circle cx="60"  cy="180" r="2.5"/>
      <circle cx="450" cy="50" r="2.5"/>
      <circle cx="490" cy="190" r="2.5"/>
      <circle cx="100" cy="200" r="2.5"/>
      <circle cx="120" cy="30" r="2.5"/>
      <circle cx="400" cy="195" r="2.5"/>
      <circle cx="20"  cy="120" r="2.5"/>
      <circle cx="510" cy="80"  r="2.5"/>
      <circle cx="160" cy="200" r="2.5"/>
    </g>

    <!-- Chain of colinear hits along a diagonal -->
    <g fill="#1e3a8a">
      <circle cx="150" cy="170" r="4"/>
      <circle cx="190" cy="148" r="4"/>
      <circle cx="225" cy="128" r="4"/>
      <circle cx="265" cy="108" r="4"/>
      <circle cx="305" cy="86"  r="4"/>
      <circle cx="345" cy="66"  r="4"/>
      <circle cx="385" cy="46"  r="4"/>
    </g>

    <!-- Chain line connecting them -->
    <g stroke="#1e3a8a" stroke-width="1.6" fill="none">
      <path d="M 150 170 L 190 148 L 225 128 L 265 108 L 305 86 L 345 66 L 385 46"/>
    </g>

    <!-- A small indel kink (one hit shifted slightly off the diagonal) -->
    <g stroke="#b45309" stroke-width="0.8" stroke-dasharray="3 2" fill="none">
      <line x1="260" y1="120" x2="265" y2="108"/>
    </g>

    <text x="540" y="44" font-family="Inter, Helvetica Neue, sans-serif" font-size="10" fill="#1e3a8a" font-weight="600">chain</text>
    <text x="540" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="10" fill="#525252">(colinear)</text>

    <text x="540" y="180" font-family="Inter, Helvetica Neue, sans-serif" font-size="10" fill="#525252" font-weight="600">noise hits</text>
    <text x="540" y="194" font-family="Inter, Helvetica Neue, sans-serif" font-size="10" fill="#525252">(off-diagonal)</text>
  </g>

  <!-- ============ RIGHT-MIDDLE: dense vs minimizer summary ============ -->
  <g transform="translate(840, 240)">
    <rect x="0" y="14" width="300" height="200" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.5"/>
    <text x="14" y="36" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-weight="600" fill="#374151" letter-spacing="0.10em">INDEX SIZE</text>

    <g font-family="Inter, Helvetica Neue, sans-serif" font-size="10" fill="#374151">
      <text x="14" y="64" font-weight="600">Dense k-mer index</text>
      <text x="14" y="78" fill="#525252">every k-mer in R is stored as a seed</text>
    </g>
    <!-- bar -->
    <rect x="14" y="86" width="270" height="14" fill="#dc2626" opacity="0.55"/>

    <g font-family="Inter, Helvetica Neue, sans-serif" font-size="10" fill="#374151">
      <text x="14" y="124" font-weight="600">Minimizer index, window w</text>
      <text x="14" y="138" fill="#525252">≈ 2/(w+1) of the dense k-mers stored</text>
    </g>
    <!-- bar (shorter) -->
    <rect x="14" y="146" width="55" height="14" fill="#1e3a8a"/>

    <text x="14" y="184" font-family="Inter, Helvetica Neue, sans-serif" font-size="10" fill="#525252">
      For w = 10, the index shrinks by ~5×;
    </text>
    <text x="14" y="198" font-family="Inter, Helvetica Neue, sans-serif" font-size="10" fill="#525252">
      homologous regions still share minimizers w.h.p.
    </text>
  </g>

  <!-- ============ BOTTOM: extension windows ============ -->
  <g transform="translate(60, 500)">
    <text x="0" y="0" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-weight="600" fill="#374151" letter-spacing="0.10em">
      EXTEND  ·  BANDED SMITH-WATERMAN ANCHORED TO CHAIN SEGMENTS
    </text>

    <!-- Chain anchors with extension windows -->
    <line x1="0" y1="40" x2="1080" y2="40" stroke="#c4c1b6" stroke-width="0.5"/>

    <g>
      <!-- Anchor 1 -->
      <rect x="60"  y="26" width="100" height="28" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
      <text x="110" y="46" font-family="JetBrains Mono, monospace" font-size="10" fill="#1e3a8a" text-anchor="middle">band-SW</text>
      <circle cx="110" cy="40" r="3" fill="#1e3a8a"/>

      <!-- Anchor 2 -->
      <rect x="220" y="26" width="100" height="28" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
      <text x="270" y="46" font-family="JetBrains Mono, monospace" font-size="10" fill="#1e3a8a" text-anchor="middle">band-SW</text>
      <circle cx="270" cy="40" r="3" fill="#1e3a8a"/>

      <!-- Anchor 3 -->
      <rect x="380" y="26" width="100" height="28" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
      <text x="430" y="46" font-family="JetBrains Mono, monospace" font-size="10" fill="#1e3a8a" text-anchor="middle">band-SW</text>
      <circle cx="430" cy="40" r="3" fill="#1e3a8a"/>

      <!-- Anchor 4 -->
      <rect x="540" y="26" width="100" height="28" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
      <text x="590" y="46" font-family="JetBrains Mono, monospace" font-size="10" fill="#1e3a8a" text-anchor="middle">band-SW</text>
      <circle cx="590" cy="40" r="3" fill="#1e3a8a"/>

      <!-- Anchor 5 -->
      <rect x="700" y="26" width="100" height="28" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
      <text x="750" y="46" font-family="JetBrains Mono, monospace" font-size="10" fill="#1e3a8a" text-anchor="middle">band-SW</text>
      <circle cx="750" cy="40" r="3" fill="#1e3a8a"/>

      <!-- Anchor 6 -->
      <rect x="860" y="26" width="100" height="28" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
      <text x="910" y="46" font-family="JetBrains Mono, monospace" font-size="10" fill="#1e3a8a" text-anchor="middle">band-SW</text>
      <circle cx="910" cy="40" r="3" fill="#1e3a8a"/>
    </g>

    <!-- Connection lines under boxes (the chain) -->
    <g stroke="#1e3a8a" stroke-width="1.5" fill="none">
      <line x1="160" y1="40" x2="220" y2="40"/>
      <line x1="320" y1="40" x2="380" y2="40"/>
      <line x1="480" y1="40" x2="540" y2="40"/>
      <line x1="640" y1="40" x2="700" y2="40"/>
      <line x1="800" y1="40" x2="860" y2="40"/>
    </g>

    <text x="540" y="86" font-family="Inter, Helvetica Neue, sans-serif" font-size="10" fill="#525252" text-anchor="middle">
      each band-SW fills only a narrow stripe (size b) along the chain diagonal — total cost stays linear in read length.
    </text>
  </g>

</svg>
