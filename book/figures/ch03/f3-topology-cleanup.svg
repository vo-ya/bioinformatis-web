<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="t d">
  <title id="t">Graph cleanup operations on a de Bruijn graph</title>
  <desc id="d">A two-row figure showing before-and-after the two standard graph cleanup operations. Top row: tip clipping. The before-panel shows a linear main path with a short two-edge dead-end branch sprouting off one node. The after-panel shows the dead-end removed, the main path now uninterrupted. Bottom row: bubble popping. The before-panel shows two parallel paths between the same pair of branch nodes, one path with coverage 32 and the other with coverage 2. The after-panel shows the low-coverage path removed, the two branch nodes merged into a clean linear stretch.</desc>

  <rect width="1200" height="640" fill="#fafaf9"/>

  <defs>
    <marker id="ar-d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <marker id="ar-mute" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c4c1b6"/>
    </marker>
    <marker id="ar-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Title -->
  <g font-family="Inter, sans-serif" fill="#374151">
    <text x="60" y="36" font-size="18" font-weight="600">Graph cleanup — pattern matching, then a fixed remediation</text>
    <text x="60" y="54" font-size="11" fill="#6b7280">Each topological signature has a known fix. Tips get clipped; bubbles get popped; tangles get reported.</text>
  </g>

  <!-- Section labels -->
  <g font-family="Inter, sans-serif">
    <text x="60" y="92" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">TIP CLIP  ·  REMOVE DEAD-END BRANCHES SHORTER THAN 2k</text>
  </g>

  <!-- ============== TIP: BEFORE ============== -->
  <g transform="translate(60 120)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">Before</text>

    <!-- Main linear path: 7 nodes -->
    <g>
      <circle cx="40" cy="70" r="14" fill="#fafaf9" stroke="#374151" stroke-width="1.25"/>
      <circle cx="110" cy="70" r="14" fill="#fafaf9" stroke="#374151" stroke-width="1.25"/>
      <circle cx="180" cy="70" r="14" fill="#fafaf9" stroke="#374151" stroke-width="1.25"/>
      <circle cx="250" cy="70" r="14" fill="#fafaf9" stroke="#374151" stroke-width="1.25"/>
      <circle cx="320" cy="70" r="14" fill="#fafaf9" stroke="#374151" stroke-width="1.25"/>
      <circle cx="390" cy="70" r="14" fill="#fafaf9" stroke="#374151" stroke-width="1.25"/>
      <circle cx="460" cy="70" r="14" fill="#fafaf9" stroke="#374151" stroke-width="1.25"/>
    </g>
    <g stroke="#374151" stroke-width="1.25" fill="none">
      <line x1="54" y1="70" x2="96" y2="70" marker-end="url(#ar-d)"/>
      <line x1="124" y1="70" x2="166" y2="70" marker-end="url(#ar-d)"/>
      <line x1="194" y1="70" x2="236" y2="70" marker-end="url(#ar-d)"/>
      <line x1="264" y1="70" x2="306" y2="70" marker-end="url(#ar-d)"/>
      <line x1="334" y1="70" x2="376" y2="70" marker-end="url(#ar-d)"/>
      <line x1="404" y1="70" x2="446" y2="70" marker-end="url(#ar-d)"/>
    </g>

    <!-- The tip: two-edge dead-end branching off node 4 (x=250) -->
    <g>
      <circle cx="285" cy="135" r="14" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
      <circle cx="320" cy="180" r="14" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
    </g>
    <g stroke="#dc2626" stroke-width="1.5" fill="none">
      <line x1="261" y1="82" x2="275" y2="124" marker-end="url(#ar-red)"/>
      <line x1="296" y1="146" x2="310" y2="170" marker-end="url(#ar-red)"/>
    </g>
    <text x="340" y="165" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#dc2626">single-read error</text>
    <text x="340" y="180" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#dc2626">creates a 2-edge tip</text>

    <!-- coverage tags on the tip -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#dc2626">
      <text x="252" y="118">cov 1</text>
      <text x="287" y="163">cov 1</text>
    </g>
    <!-- coverage tags on main path -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">
      <text x="75" y="62">31×</text>
      <text x="145" y="62">30×</text>
      <text x="215" y="62">32×</text>
      <text x="285" y="62">29×</text>
      <text x="355" y="62">30×</text>
      <text x="425" y="62">31×</text>
    </g>
  </g>

  <!-- Arrow between before and after -->
  <g transform="translate(545 195)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#ar-d)"/>
    <text x="20" y="-8" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a" font-weight="600" text-anchor="middle" letter-spacing="0.1em">CLIP</text>
  </g>

  <!-- ============== TIP: AFTER ============== -->
  <g transform="translate(620 120)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">After</text>

    <g>
      <circle cx="40" cy="70" r="14" fill="#fafaf9" stroke="#374151" stroke-width="1.25"/>
      <circle cx="110" cy="70" r="14" fill="#fafaf9" stroke="#374151" stroke-width="1.25"/>
      <circle cx="180" cy="70" r="14" fill="#fafaf9" stroke="#374151" stroke-width="1.25"/>
      <circle cx="250" cy="70" r="14" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
      <circle cx="320" cy="70" r="14" fill="#fafaf9" stroke="#374151" stroke-width="1.25"/>
      <circle cx="390" cy="70" r="14" fill="#fafaf9" stroke="#374151" stroke-width="1.25"/>
      <circle cx="460" cy="70" r="14" fill="#fafaf9" stroke="#374151" stroke-width="1.25"/>
    </g>
    <g stroke="#374151" stroke-width="1.25" fill="none">
      <line x1="54" y1="70" x2="96" y2="70" marker-end="url(#ar-d)"/>
      <line x1="124" y1="70" x2="166" y2="70" marker-end="url(#ar-d)"/>
      <line x1="194" y1="70" x2="236" y2="70" marker-end="url(#ar-d)"/>
      <line x1="264" y1="70" x2="306" y2="70" marker-end="url(#ar-d)"/>
      <line x1="334" y1="70" x2="376" y2="70" marker-end="url(#ar-d)"/>
      <line x1="404" y1="70" x2="446" y2="70" marker-end="url(#ar-d)"/>
    </g>
    <text x="250" y="130" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#065f46" text-anchor="middle">tip removed; main path linear</text>
  </g>

  <!-- Separator -->
  <line x1="60" y1="345" x2="1140" y2="345" stroke="#c4c1b6" stroke-width="0.5" stroke-dasharray="2 3"/>

  <g font-family="Inter, sans-serif">
    <text x="60" y="380" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">BUBBLE POP  ·  COLLAPSE TWO PARALLEL PATHS; KEEP THE HIGHER-COVERAGE ONE</text>
  </g>

  <!-- ============== BUBBLE: BEFORE ============== -->
  <g transform="translate(60 410)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">Before</text>

    <!-- branching node "L", merging node "R" -->
    <g>
      <circle cx="40" cy="80" r="14" fill="#fafaf9" stroke="#374151" stroke-width="1.25"/>
      <circle cx="110" cy="80" r="14" fill="#fafaf9" stroke="#374151" stroke-width="1.5"/>
      <text x="110" y="105" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">branch</text>
      <!-- upper path -->
      <circle cx="200" cy="40" r="14" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
      <circle cx="290" cy="40" r="14" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
      <!-- lower path -->
      <circle cx="200" cy="120" r="14" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
      <circle cx="290" cy="120" r="14" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
      <!-- merge -->
      <circle cx="380" cy="80" r="14" fill="#fafaf9" stroke="#374151" stroke-width="1.5"/>
      <text x="380" y="105" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">merge</text>
      <circle cx="450" cy="80" r="14" fill="#fafaf9" stroke="#374151" stroke-width="1.25"/>
    </g>

    <g stroke="#374151" stroke-width="1.25" fill="none">
      <line x1="54" y1="80" x2="96" y2="80" marker-end="url(#ar-d)"/>
      <line x1="394" y1="80" x2="436" y2="80" marker-end="url(#ar-d)"/>
    </g>

    <!-- Upper (high-coverage) path -->
    <g stroke="#1e3a8a" stroke-width="2" fill="none">
      <line x1="122" y1="72" x2="184" y2="48" marker-end="url(#ar-d)"/>
      <line x1="214" y1="40" x2="276" y2="40" marker-end="url(#ar-d)"/>
      <line x1="304" y1="48" x2="366" y2="72" marker-end="url(#ar-d)"/>
    </g>
    <!-- Lower (low-coverage) path -->
    <g stroke="#dc2626" stroke-width="1.5" fill="none">
      <line x1="122" y1="88" x2="184" y2="112" marker-end="url(#ar-red)"/>
      <line x1="214" y1="120" x2="276" y2="120" marker-end="url(#ar-red)"/>
      <line x1="304" y1="112" x2="366" y2="88" marker-end="url(#ar-red)"/>
    </g>

    <!-- coverage labels -->
    <g font-family="JetBrains Mono, monospace" font-size="10" fill="#1e3a8a" text-anchor="middle">
      <text x="245" y="25">cov 32</text>
    </g>
    <g font-family="JetBrains Mono, monospace" font-size="10" fill="#dc2626" text-anchor="middle">
      <text x="245" y="148">cov 2</text>
    </g>

    <text x="500" y="80" font-family="Inter, sans-serif" font-size="11" fill="#374151" font-style="italic">A bubble — two parallel paths.</text>
    <text x="500" y="96" font-family="Inter, sans-serif" font-size="11" fill="#374151" font-style="italic">Read coverage decides which is real.</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(545 510)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#ar-d)"/>
    <text x="20" y="-8" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a" font-weight="600" text-anchor="middle" letter-spacing="0.1em">POP</text>
  </g>

  <!-- ============== BUBBLE: AFTER ============== -->
  <g transform="translate(620 410)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">After</text>

    <g>
      <circle cx="40" cy="80" r="14" fill="#fafaf9" stroke="#374151" stroke-width="1.25"/>
      <circle cx="110" cy="80" r="14" fill="#fafaf9" stroke="#374151" stroke-width="1.25"/>
      <circle cx="200" cy="80" r="14" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
      <circle cx="290" cy="80" r="14" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
      <circle cx="380" cy="80" r="14" fill="#fafaf9" stroke="#374151" stroke-width="1.25"/>
      <circle cx="450" cy="80" r="14" fill="#fafaf9" stroke="#374151" stroke-width="1.25"/>
    </g>
    <g stroke="#374151" stroke-width="1.25" fill="none">
      <line x1="54" y1="80" x2="96" y2="80" marker-end="url(#ar-d)"/>
      <line x1="124" y1="80" x2="186" y2="80" marker-end="url(#ar-d)"/>
      <line x1="214" y1="80" x2="276" y2="80" marker-end="url(#ar-d)"/>
      <line x1="304" y1="80" x2="366" y2="80" marker-end="url(#ar-d)"/>
      <line x1="394" y1="80" x2="436" y2="80" marker-end="url(#ar-d)"/>
    </g>
    <text x="240" y="148" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#065f46" text-anchor="middle">bubble collapsed; one linear stretch through the variant locus</text>
  </g>

</svg>
