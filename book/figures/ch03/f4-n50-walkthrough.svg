<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="t d">
  <title id="t">N50 and NG50 computed on a worked example</title>
  <desc id="d">A worked computation of N50 and NG50 on a ten-contig assembly. Top: contigs drawn as horizontal bars sorted by length, longest first, with lengths shown. The cumulative running total is annotated below each bar. Middle: a vertical reference at 50 percent of total assembly length picks out the contig where the running total first crosses it, identifying N50. A second vertical reference at 50 percent of expected genome length (which is larger than total assembly because the assembly is not complete) sits further along and identifies NG50. Bottom right: a summary table giving N50, NG50, total length, expected genome length, largest contig, number of contigs, and L50.</desc>

  <rect width="1200" height="620" fill="#fafaf9"/>

  <defs>
    <marker id="ar-n" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- Title -->
  <g font-family="Inter, sans-serif" fill="#374151">
    <text x="60" y="36" font-size="18" font-weight="600">N50 and NG50 on a ten-contig assembly</text>
    <text x="60" y="54" font-size="11" fill="#6b7280">Contigs sorted by length, longest first. Walk down the list summing lengths. N50 is the contig at which the running total first crosses 50% of total assembly; NG50, at 50% of expected genome size.</text>
  </g>

  <!-- ============ Contigs as bars ============ -->
  <!-- Plot area: x [110, 1100], y [110, 320] -->
  <!-- Lengths (kb): 800, 600, 500, 400, 300, 250, 200, 150, 100, 50. Total = 3,350 kb. Expected genome = 4,500 kb. -->
  <!-- Cumulative: 800 1400 1900 2300 2600 2850 3050 3200 3300 3350 -->
  <!-- 50% of total = 1,675 → 3rd contig (length 500) at cumulative 1900 — N50 = 500. L50 = 3. -->
  <!-- 50% of genome = 2,250 → 4th contig (length 400) at cumulative 2300 — NG50 = 400. LG50 = 4. -->

  <!-- X-axis represents cumulative-length position in kb; scale: 1 kb = 0.275 px → 3500 kb = 962 px. plot from 110 to 1072. -->

  <!-- Axes -->
  <g stroke="#374151" stroke-width="1" fill="none">
    <line x1="110" y1="320" x2="1100" y2="320"/>
    <line x1="110" y1="110" x2="110" y2="320"/>
  </g>

  <!-- X-axis ticks (every 500 kb) -->
  <g stroke="#374151" stroke-width="0.75">
    <line x1="110" y1="320" x2="110" y2="324"/>
    <line x1="247.5" y1="320" x2="247.5" y2="324"/>
    <line x1="385" y1="320" x2="385" y2="324"/>
    <line x1="522.5" y1="320" x2="522.5" y2="324"/>
    <line x1="660" y1="320" x2="660" y2="324"/>
    <line x1="797.5" y1="320" x2="797.5" y2="324"/>
    <line x1="935" y1="320" x2="935" y2="324"/>
    <line x1="1072.5" y1="320" x2="1072.5" y2="324"/>
  </g>
  <g font-family="JetBrains Mono, monospace" font-size="10" fill="#374151" text-anchor="middle">
    <text x="110" y="340">0</text>
    <text x="247.5" y="340">500</text>
    <text x="385" y="340">1000</text>
    <text x="522.5" y="340">1500</text>
    <text x="660" y="340">2000</text>
    <text x="797.5" y="340">2500</text>
    <text x="935" y="340">3000</text>
    <text x="1072.5" y="340">3500</text>
  </g>
  <text x="605" y="360" font-family="Inter, sans-serif" font-size="11" fill="#374151" text-anchor="middle" font-weight="500">cumulative length (kb)</text>

  <!-- Contig bars: each bar at a fixed y, length proportional to its kb-length -->
  <!-- bar height 14, gap 4, starting y=120 -->
  <g>
    <!-- 1: 800 kb cumul start 0 end 800 -->
    <rect x="110" y="120" width="220" height="14" fill="#1e3a8a" stroke="#1e3a8a" stroke-width="1"/>
    <!-- 2: 600 kb cumul 800-1400 -->
    <rect x="330" y="120" width="165" height="14" fill="#1e3a8a" stroke="#1e3a8a" stroke-width="1"/>
    <!-- 3: 500 kb cumul 1400-1900  ← N50 contig -->
    <rect x="495" y="120" width="137.5" height="14" fill="#b45309" stroke="#b45309" stroke-width="1"/>
    <!-- 4: 400 kb cumul 1900-2300 ← NG50 contig -->
    <rect x="632.5" y="120" width="110" height="14" fill="#7c3aed" stroke="#7c3aed" stroke-width="1"/>
    <!-- 5: 300 kb cumul 2300-2600 -->
    <rect x="742.5" y="120" width="82.5" height="14" fill="#374151" stroke="#374151" stroke-width="1"/>
    <!-- 6: 250 kb cumul 2600-2850 -->
    <rect x="825" y="120" width="68.75" height="14" fill="#374151" stroke="#374151" stroke-width="1"/>
    <!-- 7: 200 kb cumul 2850-3050 -->
    <rect x="893.75" y="120" width="55" height="14" fill="#374151" stroke="#374151" stroke-width="1"/>
    <!-- 8: 150 kb cumul 3050-3200 -->
    <rect x="948.75" y="120" width="41.25" height="14" fill="#374151" stroke="#374151" stroke-width="1"/>
    <!-- 9: 100 kb cumul 3200-3300 -->
    <rect x="990" y="120" width="27.5" height="14" fill="#374151" stroke="#374151" stroke-width="1"/>
    <!-- 10: 50 kb cumul 3300-3350 -->
    <rect x="1017.5" y="120" width="13.75" height="14" fill="#374151" stroke="#374151" stroke-width="1"/>
  </g>

  <!-- Bar labels (length above) -->
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#374151" text-anchor="middle">
    <text x="220" y="115">800</text>
    <text x="412.5" y="115">600</text>
    <text x="563.75" y="115" font-weight="600" fill="#b45309">500</text>
    <text x="687.5" y="115" font-weight="600" fill="#7c3aed">400</text>
    <text x="783.75" y="115">300</text>
    <text x="859.4" y="115">250</text>
    <text x="921.25" y="115">200</text>
    <text x="969.4" y="115">150</text>
    <text x="1003.75" y="115">100</text>
    <text x="1024.4" y="115">50</text>
  </g>

  <!-- Contig index labels (below the bars) -->
  <g font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">
    <text x="220" y="148">c1</text>
    <text x="412.5" y="148">c2</text>
    <text x="563.75" y="148" font-weight="600" fill="#b45309">c3 (N50)</text>
    <text x="687.5" y="148" font-weight="600" fill="#7c3aed">c4 (NG50)</text>
    <text x="783.75" y="148">c5</text>
    <text x="859.4" y="148">c6</text>
    <text x="921.25" y="148">c7</text>
    <text x="969.4" y="148">c8</text>
    <text x="1003.75" y="148">c9</text>
    <text x="1024.4" y="148">c10</text>
  </g>

  <!-- ============ Cumulative line ============ -->
  <!-- cumulative running total drawn as a stepped polyline -->
  <!-- y-axis: 0% at y=320, 100% (=3350 kb) at y=180 → range 140 px -->
  <!-- We'll plot running-total %. -->
  <!-- Step polyline: from (110,320) → (110, 320-(800/3350)*140) = (110, 320-33.4) = (110, 286.6) ... -->

  <g stroke="#1e3a8a" stroke-width="1.5" fill="none" stroke-linejoin="miter">
    <polyline points="
      110,320
      110,286.57
      330,286.57
      330,261.49
      495,261.49
      495,240.6
      632.5,240.6
      632.5,223.88
      742.5,223.88
      742.5,211.34
      825,211.34
      825,200.9
      893.75,200.9
      893.75,192.54
      948.75,192.54
      948.75,186.27
      990,186.27
      990,182.09
      1017.5,182.09
      1017.5,180
      1031.25,180
    "/>
  </g>

  <!-- Markers at the kink points -->
  <g fill="#1e3a8a">
    <circle cx="330" cy="286.57" r="2.5"/>
    <circle cx="495" cy="261.49" r="2.5"/>
    <circle cx="632.5" cy="240.6" r="2.5"/>
    <circle cx="742.5" cy="223.88" r="2.5"/>
    <circle cx="825" cy="211.34" r="2.5"/>
    <circle cx="893.75" cy="200.9" r="2.5"/>
    <circle cx="948.75" cy="192.54" r="2.5"/>
    <circle cx="990" cy="186.27" r="2.5"/>
    <circle cx="1017.5" cy="182.09" r="2.5"/>
    <circle cx="1031.25" cy="180" r="2.5"/>
  </g>

  <!-- Y-axis (percentage) -->
  <g stroke="#374151" stroke-width="0.5" fill="none">
    <line x1="106" y1="180" x2="110" y2="180"/>
    <line x1="106" y1="215" x2="110" y2="215"/>
    <line x1="106" y1="250" x2="110" y2="250"/>
    <line x1="106" y1="285" x2="110" y2="285"/>
    <line x1="106" y1="320" x2="110" y2="320"/>
  </g>
  <g font-family="JetBrains Mono, monospace" font-size="10" fill="#374151" text-anchor="end">
    <text x="100" y="184">100%</text>
    <text x="100" y="219">75%</text>
    <text x="100" y="254">50%</text>
    <text x="100" y="289">25%</text>
    <text x="100" y="324">0%</text>
  </g>
  <text x="38" y="240" font-family="Inter, sans-serif" font-size="11" fill="#374151" font-weight="500" text-anchor="middle" transform="rotate(-90 38 240)">cumulative %</text>

  <!-- ============ N50 reference line ============ -->
  <!-- 50% of total = 1675 kb. position x = 110 + (1675/3500)*962.5 = 110 + 460.7 = 570.7 -->
  <g stroke="#b45309" stroke-width="1.25" stroke-dasharray="5 3">
    <line x1="110" y1="250" x2="1100" y2="250"/>
  </g>
  <g font-family="Inter, sans-serif" font-size="10" fill="#b45309">
    <text x="1110" y="254" font-weight="600">50% of total</text>
    <text x="1110" y="266" font-size="9">= 1,675 kb</text>
  </g>

  <!-- The N50 crossing point: x where the polyline first reaches y=250 -->
  <!-- cumulative reaches 50% inside contig 3 — let's mark the crossing arrow -->
  <g>
    <circle cx="563.75" cy="250" r="4" fill="#b45309" stroke="#fafaf9" stroke-width="1.5"/>
    <line x1="563.75" y1="250" x2="563.75" y2="120" stroke="#b45309" stroke-width="0.75" stroke-dasharray="2 2"/>
    <text x="570" y="244" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b45309">N50 = 500 kb</text>
  </g>

  <!-- ============ NG50 reference line ============ -->
  <!-- 50% of expected genome = 2250 kb. Position on plot's running total: y for 2250/3350 = 67.16% -->
  <!-- y = 320 - 0.6716 * 140 = 320 - 94.03 = 225.97 -->
  <g stroke="#7c3aed" stroke-width="1.25" stroke-dasharray="5 3">
    <line x1="110" y1="225.97" x2="1100" y2="225.97"/>
  </g>
  <g font-family="Inter, sans-serif" font-size="10" fill="#7c3aed">
    <text x="1110" y="229.97" font-weight="600">50% of genome</text>
    <text x="1110" y="241.97" font-size="9">= 2,250 kb (67% of total)</text>
  </g>

  <g>
    <circle cx="687.5" cy="225.97" r="4" fill="#7c3aed" stroke="#fafaf9" stroke-width="1.5"/>
    <line x1="687.5" y1="225.97" x2="687.5" y2="120" stroke="#7c3aed" stroke-width="0.75" stroke-dasharray="2 2"/>
    <text x="695" y="220" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#7c3aed">NG50 = 400 kb</text>
  </g>

  <!-- Tick marks on bottom right -->
  <!-- ============ Summary table ============ -->
  <g transform="translate(60 410)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">SUMMARY</text>

    <rect x="0" y="14" width="540" height="190" fill="#fafaf9" stroke="#e5e3dc" stroke-width="0.75" rx="3"/>

    <g font-family="Inter, sans-serif" font-size="11" fill="#374151">
      <text x="20" y="44">Total assembly length</text>
      <text x="20" y="68">Expected genome length</text>
      <text x="20" y="92">Number of contigs</text>
      <text x="20" y="116">Largest contig</text>
      <text x="20" y="140">N50</text>
      <text x="20" y="164">NG50</text>
      <text x="20" y="188">L50  (number of contigs to cover 50%)</text>
    </g>

    <g font-family="JetBrains Mono, monospace" font-size="11" fill="#374151" text-anchor="end">
      <text x="520" y="44">3,350 kb</text>
      <text x="520" y="68">4,500 kb</text>
      <text x="520" y="92">10</text>
      <text x="520" y="116">800 kb</text>
      <text x="520" y="140" font-weight="600" fill="#b45309">500 kb</text>
      <text x="520" y="164" font-weight="600" fill="#7c3aed">400 kb</text>
      <text x="520" y="188">3</text>
    </g>
  </g>

  <!-- Right-side commentary -->
  <g transform="translate(640 410)" font-family="Inter, sans-serif" font-size="11" fill="#374151">
    <text x="0" y="0" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">WHY THE TWO METRICS DIFFER</text>

    <text x="0" y="30">Genome fraction covered is only 3,350 ÷ 4,500 = 74%.</text>
    <text x="0" y="50">N50 ignores the missing 26% — it splits the assembly</text>
    <text x="0" y="68">in half using only what was assembled.</text>

    <text x="0" y="100">NG50 corrects for that: it asks "how long is the contig at</text>
    <text x="0" y="118">which half the actual genome is covered?"</text>

    <text x="0" y="150" font-style="italic" fill="#6b7280">Two assemblies with the same N50 but different completeness</text>
    <text x="0" y="166" font-style="italic" fill="#6b7280">have very different NG50 — always report both alongside total length.</text>
  </g>

</svg>
