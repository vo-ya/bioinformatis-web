<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-labelledby="t d">
  <title id="t">Worked Bayesian genotype call from a 12-read pileup</title>
  <desc id="d">A four-panel worked numeric example. Panel A: a pileup of 12 reads at one position, 8 supporting REF and 4 supporting ALT, all at PHRED quality 30. Panel B: per-genotype log-likelihoods derived from the binomial likelihood with per-base error rate epsilon equals one in one thousand. Panel C: standard human germline genotype prior with hom-ref dominant at 0.999 and the two non-reference genotypes at smaller fractions. Panel D: the posterior obtained by multiplying likelihood and prior, with the MAP genotype labelled and a separate box computing the PHRED-scaled genotype quality from the second-best posterior.</desc>

  <rect x="0" y="0" width="1200" height="660" fill="#fafaf9"/>

  <!-- Header -->
  <g>
    <text x="60" y="40" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">A BAYESIAN GENOTYPE CALL, START TO FINISH</text>
    <text x="60" y="58" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">12 reads · 8 REF · 4 ALT · all Q30 (ε = 10⁻³)</text>
  </g>

  <!-- ============ PANEL A: pileup ============ -->
  <g transform="translate(60, 90)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(A)  THE  PILEUP</text>

    <!-- container -->
    <rect x="0" y="14" width="500" height="240" rx="4" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>

    <!-- reference row -->
    <rect x="20" y="32" width="460" height="22" rx="3" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.7"/>
    <text x="30" y="48" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">REF</text>
    <g font-family="JetBrains Mono, monospace" font-size="13" fill="#0a0a0a">
      <text x="100" y="48" text-anchor="middle">T</text>
      <text x="140" y="48" text-anchor="middle">A</text>
      <text x="180" y="48" text-anchor="middle">C</text>
      <text x="220" y="48" text-anchor="middle">G</text>
      <text x="260" y="48" text-anchor="middle" font-weight="700" fill="#1e3a8a">A</text>
      <text x="300" y="48" text-anchor="middle">T</text>
      <text x="340" y="48" text-anchor="middle">G</text>
      <text x="380" y="48" text-anchor="middle">C</text>
      <text x="420" y="48" text-anchor="middle">A</text>
    </g>
    <line x1="246" y1="58" x2="274" y2="58" stroke="#1e3a8a" stroke-width="2"/>

    <!-- 12 reads, simplified -->
    <g>
      <!-- REF reads at column 260 -->
      <g>
        <!-- row 1..8 REF -->
        <g font-family="JetBrains Mono, monospace" font-size="11" fill="#ffffff">
          <rect x="252" y="68" width="16" height="14" fill="#2d7a3e"/><text x="260" y="79" text-anchor="middle" font-weight="700">A</text>
          <rect x="252" y="84" width="16" height="14" fill="#2d7a3e"/><text x="260" y="95" text-anchor="middle" font-weight="700">A</text>
          <rect x="252" y="100" width="16" height="14" fill="#2d7a3e"/><text x="260" y="111" text-anchor="middle" font-weight="700">A</text>
          <rect x="252" y="116" width="16" height="14" fill="#2d7a3e"/><text x="260" y="127" text-anchor="middle" font-weight="700">A</text>
          <rect x="252" y="132" width="16" height="14" fill="#2d7a3e"/><text x="260" y="143" text-anchor="middle" font-weight="700">A</text>
          <rect x="252" y="148" width="16" height="14" fill="#2d7a3e"/><text x="260" y="159" text-anchor="middle" font-weight="700">A</text>
          <rect x="252" y="164" width="16" height="14" fill="#2d7a3e"/><text x="260" y="175" text-anchor="middle" font-weight="700">A</text>
          <rect x="252" y="180" width="16" height="14" fill="#2d7a3e"/><text x="260" y="191" text-anchor="middle" font-weight="700">A</text>
          <!-- ALT reads 1..4 -->
          <rect x="252" y="196" width="16" height="14" fill="#b45309"/><text x="260" y="207" text-anchor="middle" font-weight="700">G</text>
          <rect x="252" y="212" width="16" height="14" fill="#b45309"/><text x="260" y="223" text-anchor="middle" font-weight="700">G</text>
          <rect x="252" y="228" width="16" height="14" fill="#b45309"/><text x="260" y="239" text-anchor="middle" font-weight="700">G</text>
        </g>
      </g>
      <!-- row faint lines -->
      <g stroke="#c4c1b6" stroke-width="0.6">
        <line x1="20" y1="75" x2="480" y2="75"/>
        <line x1="20" y1="91" x2="480" y2="91"/>
        <line x1="20" y1="107" x2="480" y2="107"/>
        <line x1="20" y1="123" x2="480" y2="123"/>
        <line x1="20" y1="139" x2="480" y2="139"/>
        <line x1="20" y1="155" x2="480" y2="155"/>
        <line x1="20" y1="171" x2="480" y2="171"/>
        <line x1="20" y1="187" x2="480" y2="187"/>
        <line x1="20" y1="203" x2="480" y2="203"/>
        <line x1="20" y1="219" x2="480" y2="219"/>
        <line x1="20" y1="235" x2="480" y2="235"/>
      </g>

      <!-- bracket annotations -->
      <line x1="430" y1="69" x2="430" y2="195" stroke="#1e3a8a" stroke-width="1.2"/>
      <line x1="430" y1="69" x2="436" y2="69" stroke="#1e3a8a" stroke-width="1.2"/>
      <line x1="430" y1="195" x2="436" y2="195" stroke="#1e3a8a" stroke-width="1.2"/>
      <text x="442" y="135" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a">8 × REF</text>

      <line x1="430" y1="197" x2="430" y2="241" stroke="#b45309" stroke-width="1.2"/>
      <line x1="430" y1="197" x2="436" y2="197" stroke="#b45309" stroke-width="1.2"/>
      <line x1="430" y1="241" x2="436" y2="241" stroke="#b45309" stroke-width="1.2"/>
      <text x="442" y="222" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#b45309">4 × ALT</text>

      <!-- 12 Q30 dots at left -->
      <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">
        <text x="30" y="79">Q30</text>
        <text x="30" y="95">Q30</text>
        <text x="30" y="111">Q30</text>
        <text x="30" y="127">Q30</text>
        <text x="30" y="143">Q30</text>
        <text x="30" y="159">Q30</text>
        <text x="30" y="175">Q30</text>
        <text x="30" y="191">Q30</text>
        <text x="30" y="207">Q30</text>
        <text x="30" y="223">Q30</text>
        <text x="30" y="239">Q30</text>
      </g>
    </g>
  </g>

  <!-- ============ PANEL B: log-likelihoods ============ -->
  <g transform="translate(620, 90)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(B)  PER-GENOTYPE  LOG-LIKELIHOODS</text>

    <rect x="0" y="14" width="520" height="240" rx="4" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>

    <!-- formula card -->
    <rect x="16" y="32" width="488" height="38" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
    <text x="28" y="46" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">PER-READ EVIDENCE</text>
    <text x="28" y="62" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">log P(b | G=hom) = log(1−ε) if b matches, log(ε) if not  ·  log P(b | het) = log(½)</text>

    <!-- three rows of likelihood -->
    <g font-family="JetBrains Mono, monospace" font-size="12">
      <!-- hom-ref row -->
      <text x="20" y="100" fill="#525252">G = 0/0:</text>
      <text x="20" y="118" fill="#0a0a0a">  8·log(1−ε)  +  4·log(ε)</text>
      <text x="20" y="136" fill="#0a0a0a">  =  8·(−0.001) + 4·(−6.908)</text>
      <text x="320" y="118" font-weight="700" fill="#dc2626" text-anchor="end">log L₀ = −27.64</text>
      <text x="430" y="118" font-family="Inter, sans-serif" font-size="11" fill="#525252">nats</text>

      <!-- het row -->
      <text x="20" y="170" fill="#525252">G = 0/1:</text>
      <text x="20" y="188" fill="#0a0a0a">  12·log(½)</text>
      <text x="20" y="206" fill="#0a0a0a">  =  12·(−0.693)</text>
      <text x="320" y="188" font-weight="700" fill="#065f46" text-anchor="end">log L₁ = − 8.32</text>
      <text x="430" y="188" font-family="Inter, sans-serif" font-size="11" fill="#525252">nats</text>

      <!-- hom-alt row -->
      <text x="20" y="240" fill="#525252">G = 1/1:</text>
      <text x="20" y="258" fill="#0a0a0a">  8·log(ε) + 4·log(1−ε)</text>
      <text x="320" y="240" font-weight="700" fill="#dc2626" text-anchor="end">log L₂ = −55.27</text>
      <text x="430" y="240" font-family="Inter, sans-serif" font-size="11" fill="#525252">nats</text>
    </g>

    <!-- arrow highlighting het win -->
    <path d="M 470 188 L 504 188" stroke="#065f46" stroke-width="1.8" marker-end="url(#arrow-green)"/>
    <text x="510" y="192" font-family="Inter, sans-serif" font-size="10" fill="#065f46" font-weight="700">MAP</text>
  </g>

  <!-- arrow marker -->
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#065f46"/>
    </marker>
    <marker id="arrow-cobalt" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <!-- ============ PANEL C: prior ============ -->
  <g transform="translate(60, 360)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(C)  GERMLINE  PRIOR  P(G)</text>

    <rect x="0" y="14" width="500" height="240" rx="4" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>

    <text x="20" y="40" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">Common-allele site, gnomAD background</text>

    <!-- bars on a log scale -->
    <g font-family="Inter, sans-serif" font-size="11" fill="#0a0a0a">
      <!-- baseline ticks -->
      <line x1="120" y1="68" x2="120" y2="220" stroke="#c4c1b6" stroke-width="0.6"/>

      <!-- row: 0/0 -->
      <text x="100" y="92" text-anchor="end" font-family="JetBrains Mono, monospace">G = 0/0</text>
      <rect x="120" y="78" width="300" height="22" fill="#1e3a8a"/>
      <text x="430" y="93" font-family="JetBrains Mono, monospace" fill="#0a0a0a">P = 0.999</text>

      <!-- row: 0/1 -->
      <text x="100" y="132" text-anchor="end" font-family="JetBrains Mono, monospace">G = 0/1</text>
      <rect x="120" y="118" width="80" height="22" fill="#2563eb"/>
      <text x="430" y="133" font-family="JetBrains Mono, monospace" fill="#0a0a0a">P = 7 × 10⁻⁴</text>

      <!-- row: 1/1 -->
      <text x="100" y="172" text-anchor="end" font-family="JetBrains Mono, monospace">G = 1/1</text>
      <rect x="120" y="158" width="40" height="22" fill="#7c3aed"/>
      <text x="430" y="173" font-family="JetBrains Mono, monospace" fill="#0a0a0a">P = 2.5 × 10⁻⁴</text>

      <text x="120" y="208" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">(bars not to scale — true ratio ~1400:1)</text>
    </g>
  </g>

  <!-- ============ PANEL D: posterior + GQ ============ -->
  <g transform="translate(620, 360)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(D)  POSTERIOR  AND  GQ</text>

    <rect x="0" y="14" width="520" height="240" rx="4" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>

    <!-- log-posterior numbers -->
    <g font-family="JetBrains Mono, monospace" font-size="11">
      <text x="20" y="44" fill="#525252">log P(G|D) ∝ log L(G) + log P(G)</text>

      <text x="20" y="68" fill="#0a0a0a">G = 0/0:</text>
      <text x="180" y="68" text-anchor="end" fill="#0a0a0a">−27.64 + (−0.001)  ≈ −27.64</text>

      <text x="20" y="86" fill="#0a0a0a">G = 0/1:</text>
      <text x="180" y="86" text-anchor="end" fill="#065f46" font-weight="700">  −8.32  +  (−7.26)  ≈ −15.58</text>

      <text x="20" y="104" fill="#0a0a0a">G = 1/1:</text>
      <text x="180" y="104" text-anchor="end" fill="#0a0a0a">−55.27 + (−8.29)  ≈ −63.56</text>
    </g>

    <!-- normalised posterior box -->
    <rect x="16" y="120" width="488" height="68" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
    <text x="28" y="138" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">NORMALISED POSTERIOR</text>
    <text x="28" y="158" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">P(0/0|D) ≈ 3 × 10⁻⁶   P(0/1|D) ≈ 1 − 3×10⁻⁶   P(1/1|D) ≈ 10⁻²¹</text>
    <text x="28" y="178" font-family="Inter, sans-serif" font-size="11" fill="#1e3a8a" font-weight="700">→  MAP genotype: 0/1</text>

    <!-- GQ formula box -->
    <rect x="16" y="200" width="488" height="32" rx="4" fill="#ffffff" stroke="#065f46" stroke-width="1.2"/>
    <text x="28" y="220" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">GQ = −10 · log₁₀(1 − P_MAP) = −10 · log₁₀(3 × 10⁻⁶)  ≈ 55  →  reported 55 (or capped at 99)</text>
  </g>

  <!-- Bottom note -->
  <g transform="translate(60, 624)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">Reading the math: a 12-read pileup with 8 REF and 4 ALT places the het hypothesis ~19 nats (≈ 10⁸ in likelihood ratio) above the alternatives. The prior tilts hom-ref up by ~10³, but the likelihood still dominates and the called genotype is 0/1.</text>
  </g>
</svg>
