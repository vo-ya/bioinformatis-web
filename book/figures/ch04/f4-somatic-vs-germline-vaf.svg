<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="t d">
  <title id="t">Expected VAF distributions — germline diploid versus tumour mixture</title>
  <desc id="d">Two side-by-side panels with a shared horizontal axis from VAF 0 to VAF 1. Left: a germline diploid sample with three sharp peaks at VAF 0 (hom-ref), VAF 0.5 (heterozygous), and VAF 1.0 (hom-alt). Right: a tumour sample at 30 percent purity with a smeared distribution showing germline peaks at the same positions but additional clusters at VAF 0.15 (clonal somatic variant in pure tumour cells, diluted by normal tissue) and VAF 0.04 (sub-clonal variant in a quarter of tumour cells). Annotations highlight the 0.15 cluster as the diagnostic challenge for somatic callers — it sits where germline thresholds reject.</desc>

  <rect x="0" y="0" width="1200" height="600" fill="#fafaf9"/>

  <!-- Header -->
  <g>
    <text x="60" y="40" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">GERMLINE VS SOMATIC — EXPECTED VAF DISTRIBUTIONS</text>
    <text x="60" y="58" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">Same axis, completely different statistical problem</text>
  </g>

  <!-- ============ LEFT PANEL: germline ============ -->
  <g transform="translate(60, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(A)  GERMLINE  DIPLOID</text>
    <text x="0" y="18" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">three discrete peaks at 0, 0.5, 1.0</text>

    <!-- Axes -->
    <g transform="translate(0, 40)">
      <!-- chart frame -->
      <rect x="0" y="0" width="500" height="320" fill="#ffffff" stroke="#e5e3dc" stroke-width="1"/>

      <!-- y axis -->
      <line x1="40" y1="20" x2="40" y2="280" stroke="#374151" stroke-width="1"/>
      <line x1="40" y1="280" x2="480" y2="280" stroke="#374151" stroke-width="1"/>

      <!-- y label -->
      <text x="12" y="148" font-family="Inter, sans-serif" font-size="10" fill="#525252" transform="rotate(-90, 12, 148)" text-anchor="middle">site density</text>

      <!-- x ticks -->
      <g font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">
        <line x1="40"  y1="280" x2="40"  y2="284" stroke="#374151"/>
        <text x="40"  y="298" text-anchor="middle">0.0</text>
        <line x1="150" y1="280" x2="150" y2="284" stroke="#374151"/>
        <text x="150" y="298" text-anchor="middle">0.25</text>
        <line x1="260" y1="280" x2="260" y2="284" stroke="#374151"/>
        <text x="260" y="298" text-anchor="middle">0.5</text>
        <line x1="370" y1="280" x2="370" y2="284" stroke="#374151"/>
        <text x="370" y="298" text-anchor="middle">0.75</text>
        <line x1="480" y1="280" x2="480" y2="284" stroke="#374151"/>
        <text x="480" y="298" text-anchor="middle">1.0</text>
      </g>
      <text x="260" y="316" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" text-anchor="middle">Variant Allele Frequency (VAF)</text>

      <!-- Three Gaussian-ish peaks centred at 0, 0.5, 1.0 -->
      <!-- peak at 0 (homo-ref) - tallest -->
      <path d="M 40 280
               Q 50 60, 60 280 Z"
            fill="#1e3a8a" opacity="0.85"/>
      <!-- peak at 0.5 (het) -->
      <path d="M 230 280
               Q 260 110, 290 280 Z"
            fill="#065f46" opacity="0.85"/>
      <!-- peak at 1.0 (hom-alt) -->
      <path d="M 460 280
               Q 470 150, 480 280 L 480 280 Z"
            fill="#b45309" opacity="0.85"/>

      <!-- annotations -->
      <g font-family="Inter, sans-serif" font-size="10">
        <text x="60" y="56" fill="#1e3a8a" font-weight="700">0/0  hom-ref</text>
        <text x="60" y="70" fill="#525252">~2.9 × 10⁹ sites</text>

        <text x="260" y="98" fill="#065f46" font-weight="700" text-anchor="middle">0/1  het</text>
        <text x="260" y="112" fill="#525252" text-anchor="middle">~2 × 10⁶</text>

        <text x="465" y="138" fill="#b45309" font-weight="700" text-anchor="middle">1/1</text>
        <text x="465" y="152" fill="#525252" text-anchor="middle">~1 × 10⁶</text>
      </g>

      <!-- expected position guides -->
      <g stroke="#8a8a85" stroke-width="0.7" stroke-dasharray="3 2">
        <line x1="40"  y1="280" x2="40"  y2="40"/>
        <line x1="260" y1="280" x2="260" y2="40"/>
        <line x1="480" y1="280" x2="480" y2="40"/>
      </g>

      <!-- germline call thresholds -->
      <rect x="100" y="240" width="120" height="20" fill="#dc2626" opacity="0.12"/>
      <text x="160" y="254" font-family="Inter, sans-serif" font-size="9" fill="#dc2626" font-weight="700" text-anchor="middle">artifact zone</text>
      <text x="160" y="265" font-family="Inter, sans-serif" font-size="8" fill="#dc2626" text-anchor="middle">(contamination, mapping, mosaicism)</text>
    </g>
  </g>

  <!-- ============ RIGHT PANEL: tumour ============ -->
  <g transform="translate(640, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(B)  TUMOUR  @ 30 % PURITY</text>
    <text x="0" y="18" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">germline peaks intact + smeared somatic clusters</text>

    <g transform="translate(0, 40)">
      <rect x="0" y="0" width="500" height="320" fill="#ffffff" stroke="#e5e3dc" stroke-width="1"/>

      <line x1="40" y1="20" x2="40" y2="280" stroke="#374151" stroke-width="1"/>
      <line x1="40" y1="280" x2="480" y2="280" stroke="#374151" stroke-width="1"/>

      <text x="12" y="148" font-family="Inter, sans-serif" font-size="10" fill="#525252" transform="rotate(-90, 12, 148)" text-anchor="middle">site density</text>

      <g font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">
        <line x1="40"  y1="280" x2="40"  y2="284" stroke="#374151"/>
        <text x="40"  y="298" text-anchor="middle">0.0</text>
        <line x1="150" y1="280" x2="150" y2="284" stroke="#374151"/>
        <text x="150" y="298" text-anchor="middle">0.25</text>
        <line x1="260" y1="280" x2="260" y2="284" stroke="#374151"/>
        <text x="260" y="298" text-anchor="middle">0.5</text>
        <line x1="370" y1="280" x2="370" y2="284" stroke="#374151"/>
        <text x="370" y="298" text-anchor="middle">0.75</text>
        <line x1="480" y1="280" x2="480" y2="284" stroke="#374151"/>
        <text x="480" y="298" text-anchor="middle">1.0</text>
      </g>
      <text x="260" y="316" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" text-anchor="middle">Variant Allele Frequency (VAF)</text>

      <!-- germline peaks (still present, but greyer to de-emphasise) -->
      <path d="M 40 280 Q 50 100, 60 280 Z" fill="#1e3a8a" opacity="0.5"/>
      <path d="M 230 280 Q 260 150, 290 280 Z" fill="#065f46" opacity="0.5"/>
      <path d="M 460 280 Q 470 180, 480 280 Z" fill="#b45309" opacity="0.5"/>

      <!-- somatic clonal cluster at 0.15 (broad Gaussian) -->
      <path d="M 70 280
               C 80 280, 92 90, 105 90
               C 118 90, 130 280, 140 280 Z"
            fill="#dc2626" opacity="0.85"/>

      <!-- sub-clonal cluster at 0.04 (narrow, near baseline) -->
      <path d="M 50 280
               C 56 280, 60 200, 65 200
               C 70 200, 74 280, 78 280 Z"
            fill="#7c3aed" opacity="0.85"/>

      <!-- guides for somatic peaks -->
      <g stroke="#dc2626" stroke-width="0.8" stroke-dasharray="3 2">
        <line x1="105" y1="280" x2="105" y2="80"/>
      </g>
      <g stroke="#7c3aed" stroke-width="0.7" stroke-dasharray="3 2">
        <line x1="65" y1="280" x2="65" y2="195"/>
      </g>

      <!-- annotations on somatic clusters -->
      <g font-family="Inter, sans-serif" font-size="10">
        <text x="135" y="86" fill="#dc2626" font-weight="700">clonal somatic</text>
        <text x="135" y="100" fill="#525252">~ VAF 0.15 (50% × 30%)</text>

        <text x="80" y="192" fill="#7c3aed" font-weight="700">sub-clonal</text>
        <text x="80" y="206" fill="#525252">~ VAF 0.04 (12% × 30%)</text>

        <!-- germline labels muted -->
        <text x="40" y="96" fill="#1e3a8a" font-style="italic">germline hom-ref</text>
        <text x="260" y="148" fill="#065f46" font-style="italic" text-anchor="middle">germline het</text>
        <text x="465" y="178" fill="#b45309" font-style="italic" text-anchor="middle">germline hom-alt</text>
      </g>

      <!-- The detection challenge box -->
      <rect x="80" y="232" width="80" height="44" rx="3" fill="#dc2626" opacity="0.12" stroke="#dc2626" stroke-width="1.4"/>
      <text x="120" y="248" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#dc2626" text-anchor="middle">detection</text>
      <text x="120" y="260" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#dc2626" text-anchor="middle">challenge</text>
      <text x="120" y="272" font-family="Inter, sans-serif" font-size="8" fill="#dc2626" text-anchor="middle">signal ≈ noise floor</text>
    </g>
  </g>

  <!-- bottom interpretation -->
  <g transform="translate(60, 460)">
    <rect x="0" y="0" width="1080" height="120" rx="4" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>
    <text x="20" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">READING THE PANELS</text>

    <g font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">
      <text x="20" y="48">Germline: every position is one of three genotypes; the VAF histogram is three sharp peaks. A VAF of 0.15 means contamination or mapping error.</text>
      <text x="20" y="66">Tumour at 30% purity: a clonal variant in every cancer cell appears at VAF ≈ 0.5 × 0.3 = 0.15. A variant in a quarter of cancer cells appears at VAF ≈ 0.04.</text>
      <text x="20" y="84">Both sit far below the germline het peak. A naive germline-style filter (drop everything outside 0.4–0.6 for het) would discard every somatic call.</text>
      <text x="20" y="102" font-style="italic" fill="#525252">Mutect2, Strelka2 somatic mode, and DeepSomatic all model the mixture explicitly and subtract the matched-normal pileup before calling.</text>
    </g>
  </g>
</svg>
