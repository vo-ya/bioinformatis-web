<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="t d">
  <title id="t">A junction-spanning read traced through the STAR algorithm</title>
  <desc id="d">Three panels. Panel A shows the read and a reference region containing two exons separated by a 5,000 base-pair intron flanked by canonical GT and AG splice motifs. Panel B shows the three maximal mappable prefixes that the seed search recovers, two of which cluster on the same chromosome within fifty kilobases. Panel C shows the trellis the extension phase searches: a path of match edges within each exon and a single long-skip edge across the intron at zero alignment cost because the boundary lands on a GT-AG motif, with a Smith-Waterman alternative shown as a much costlier gap-open path.</desc>

  <rect x="0" y="0" width="1200" height="620" fill="#fafaf9"/>

  <defs>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b91c1c"/>
    </marker>
  </defs>

  <!-- Header -->
  <g>
    <text x="60" y="38" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">A JUNCTION READ THROUGH STAR</text>
    <text x="60" y="56" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">Read length 150 bp · two exons · 5 kb intron · canonical GT-AG splice motif</text>
  </g>

  <!-- ============ PANEL A: read and reference ============ -->
  <g transform="translate(60, 80)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(A)  READ  AND  REFERENCE</text>

    <!-- Read bar -->
    <text x="0" y="32" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">Read (150 bp)</text>
    <rect x="120" y="20" width="180" height="20" rx="3" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.2"/>
    <text x="170" y="34" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a" text-anchor="middle">…GCT|AGC…</text>
    <line x1="210" y1="20" x2="210" y2="40" stroke="#b45309" stroke-width="2" stroke-dasharray="3 2"/>
    <text x="210" y="14" font-family="Inter, sans-serif" font-size="9" fill="#b45309" text-anchor="middle">junction in read</text>
    <text x="135" y="56" font-family="Inter, sans-serif" font-size="9" fill="#525252">80 bp from exon 1</text>
    <text x="265" y="56" font-family="Inter, sans-serif" font-size="9" fill="#525252">70 bp from exon 2</text>

    <!-- Reference bar -->
    <text x="0" y="92" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">Reference</text>
    <rect x="120" y="80" width="160" height="20" rx="3" fill="#f4f3ee" stroke="#374151" stroke-width="1"/>
    <text x="200" y="94" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a" text-anchor="middle">EXON 1</text>
    <rect x="280" y="80" width="500" height="20" rx="0" fill="#ebeae3" stroke="#8a8a85" stroke-width="0.7" stroke-dasharray="4 3"/>
    <text x="530" y="94" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle" font-style="italic">INTRON · 5,000 bp · not in transcript</text>
    <rect x="780" y="80" width="160" height="20" rx="3" fill="#f4f3ee" stroke="#374151" stroke-width="1"/>
    <text x="860" y="94" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a" text-anchor="middle">EXON 2</text>

    <!-- splice motif labels -->
    <text x="290" y="118" font-family="JetBrains Mono, monospace" font-size="11" fill="#065f46" font-weight="600">GT</text>
    <text x="290" y="130" font-family="Inter, sans-serif" font-size="8" fill="#065f46">donor</text>
    <line x1="288" y1="105" x2="288" y2="78" stroke="#065f46" stroke-width="1.5"/>

    <text x="755" y="118" font-family="JetBrains Mono, monospace" font-size="11" fill="#065f46" font-weight="600">AG</text>
    <text x="755" y="130" font-family="Inter, sans-serif" font-size="8" fill="#065f46">acceptor</text>
    <line x1="772" y1="105" x2="772" y2="78" stroke="#065f46" stroke-width="1.5"/>

    <!-- coordinate annotations -->
    <text x="200" y="148" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">chr1:101,920–102,000</text>
    <text x="860" y="148" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">chr1:107,000–107,070</text>
  </g>

  <!-- ============ PANEL B: MMPs and clustering ============ -->
  <g transform="translate(60, 250)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(B)  SEED  SEARCH  ·  THREE  MMPs  RECOVERED</text>

    <!-- horizontal track -->
    <line x1="0" y1="40" x2="1080" y2="40" stroke="#c4c1b6" stroke-width="0.8"/>

    <!-- MMP 1 in exon 1 -->
    <rect x="120" y="32" width="80" height="16" rx="2" fill="#1e3a8a"/>
    <text x="160" y="44" font-family="Inter, sans-serif" font-size="9" fill="#ffffff" font-weight="600" text-anchor="middle">MMP 1 (80 nt)</text>
    <text x="160" y="64" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">chr1:101,920</text>

    <!-- MMP 2 in exon 2 -->
    <rect x="780" y="32" width="70" height="16" rx="2" fill="#1e3a8a"/>
    <text x="815" y="44" font-family="Inter, sans-serif" font-size="9" fill="#ffffff" font-weight="600" text-anchor="middle">MMP 2 (70 nt)</text>
    <text x="815" y="64" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">chr1:107,000</text>

    <!-- spurious MMP elsewhere -->
    <rect x="950" y="32" width="35" height="16" rx="2" fill="#b91c1c" opacity="0.85"/>
    <text x="967" y="44" font-family="Inter, sans-serif" font-size="9" fill="#ffffff" font-weight="600" text-anchor="middle">MMP 3</text>
    <text x="967" y="64" font-family="JetBrains Mono, monospace" font-size="9" fill="#b91c1c" text-anchor="middle">chr11:42 M</text>
    <text x="967" y="76" font-family="Inter, sans-serif" font-size="8" fill="#b91c1c" text-anchor="middle" font-style="italic">spurious · discarded</text>

    <!-- cluster brace -->
    <path d="M 120 90 Q 120 100 130 100 L 480 100 Q 490 100 490 110 L 490 110 Q 490 100 500 100 L 840 100 Q 850 100 850 90" fill="none" stroke="#1e3a8a" stroke-width="1.2"/>
    <text x="485" y="124" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" text-anchor="middle" font-weight="600">cluster: same chromosome, distance &lt; 50 kb · candidate splice</text>
  </g>

  <!-- ============ PANEL C: trellis ============ -->
  <g transform="translate(60, 410)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(C)  EXTENSION  TRELLIS  ·  THE  SPLICE  MOVE  COSTS  ZERO</text>

    <!-- exon 1 nodes -->
    <g>
      <circle cx="60" cy="60" r="9" fill="#1e3a8a"/>
      <circle cx="120" cy="60" r="9" fill="#1e3a8a"/>
      <circle cx="180" cy="60" r="9" fill="#1e3a8a"/>
      <circle cx="240" cy="60" r="9" fill="#1e3a8a"/>
      <line x1="69" y1="60" x2="111" y2="60" stroke="#1e3a8a" stroke-width="2"/>
      <line x1="129" y1="60" x2="171" y2="60" stroke="#1e3a8a" stroke-width="2"/>
      <line x1="189" y1="60" x2="231" y2="60" stroke="#1e3a8a" stroke-width="2"/>
      <text x="150" y="36" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a" text-anchor="middle" font-weight="600">match edges · cost 0</text>
      <text x="150" y="86" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle" font-style="italic">positions 1 … 80 in exon 1</text>
    </g>

    <!-- splice edge (the move that matters) -->
    <g>
      <path d="M 250 60 Q 480 -20 720 60" fill="none" stroke="#065f46" stroke-width="2.5" marker-end="url(#arrow-accent)"/>
      <text x="485" y="-2" font-family="Inter, sans-serif" font-size="11" fill="#065f46" text-anchor="middle" font-weight="700">SPLICE · long-skip · 5,000 bp · cost 0</text>
      <text x="485" y="14" font-family="Inter, sans-serif" font-size="9" fill="#065f46" text-anchor="middle" font-style="italic">enabled only at canonical GT-AG</text>
    </g>

    <!-- exon 2 nodes -->
    <g>
      <circle cx="720" cy="60" r="9" fill="#1e3a8a"/>
      <circle cx="780" cy="60" r="9" fill="#1e3a8a"/>
      <circle cx="840" cy="60" r="9" fill="#1e3a8a"/>
      <circle cx="900" cy="60" r="9" fill="#1e3a8a"/>
      <line x1="729" y1="60" x2="771" y2="60" stroke="#1e3a8a" stroke-width="2"/>
      <line x1="789" y1="60" x2="831" y2="60" stroke="#1e3a8a" stroke-width="2"/>
      <line x1="849" y1="60" x2="891" y2="60" stroke="#1e3a8a" stroke-width="2"/>
      <text x="810" y="86" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle" font-style="italic">positions 81 … 150 in exon 2</text>
    </g>

    <!-- alternative: gap-extend path -->
    <g transform="translate(0, 120)">
      <path d="M 250 0 Q 480 80 720 0" fill="none" stroke="#b91c1c" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/>
      <text x="485" y="68" font-family="Inter, sans-serif" font-size="10" fill="#b91c1c" text-anchor="middle" font-weight="600">alternative: 5,000 gap-extensions</text>
      <text x="485" y="84" font-family="Inter, sans-serif" font-size="9" fill="#b91c1c" text-anchor="middle" font-style="italic">cost ≈ gap_open + 5,000 × gap_extend  →  rejected</text>
    </g>

    <!-- Caption banner -->
    <rect x="0" y="170" width="1080" height="28" rx="3" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="0.7"/>
    <text x="540" y="188" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a" text-anchor="middle">
      <tspan font-weight="700">Result.</tspan>
      <tspan>  Viterbi-best path: 80 matches → splice (free) → 70 matches.   Total alignment cost: 0.   The DNA-seq aligner of Chapter 3 would refuse the splice edge and report unmapped.</tspan>
    </text>
  </g>
</svg>
