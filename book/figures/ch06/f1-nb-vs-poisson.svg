<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="t d">
  <title id="t">Negative-binomial and Poisson probability mass functions at three mean counts</title>
  <desc id="d">Three side-by-side panels comparing the negative-binomial probability mass function (alpha = 0.2) to the Poisson at the same mean. Panel A shows mu = 0.5, where the two distributions nearly coincide with most mass on zero. Panel B shows mu = 5, where the NB has a slightly heavier right tail. Panel C shows mu = 50, where the NB has visibly broader spread and mass past the Poisson's effective support.</desc>

  <rect x="0" y="0" width="1200" height="560" fill="#fafaf9"/>

  <!-- Title -->
  <g>
    <text x="60" y="38" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">NB VS POISSON — PMF AT THREE MEAN COUNTS</text>
    <text x="60" y="56" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">Dispersion alpha = 0.2 throughout. At low means the two look nearly identical; at high means the NB spreads.</text>
  </g>

  <!-- ============= PANEL A: mu = 0.5 ============= -->
  <g transform="translate(60, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(A)  mu = 0.5  ·  POISSON-LIKE</text>
    <text x="0" y="18" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">zero-inflated; overdispersion invisible</text>

    <!-- Axes -->
    <g transform="translate(0, 40)">
      <line x1="40" y1="320" x2="340" y2="320" stroke="#374151" stroke-width="1.2"/>
      <line x1="40" y1="40" x2="40" y2="320" stroke="#374151" stroke-width="1.2"/>

      <!-- Y axis ticks: 0.0, 0.2, 0.4, 0.6 -->
      <g font-family="Inter, sans-serif" font-size="9" fill="#525252">
        <line x1="36" y1="320" x2="40" y2="320" stroke="#374151" stroke-width="1"/>
        <text x="32" y="324" text-anchor="end">0.0</text>
        <line x1="36" y1="250" x2="40" y2="250" stroke="#374151" stroke-width="1"/>
        <text x="32" y="254" text-anchor="end">0.2</text>
        <line x1="36" y1="180" x2="40" y2="180" stroke="#374151" stroke-width="1"/>
        <text x="32" y="184" text-anchor="end">0.4</text>
        <line x1="36" y1="110" x2="40" y2="110" stroke="#374151" stroke-width="1"/>
        <text x="32" y="114" text-anchor="end">0.6</text>
      </g>

      <!-- X axis ticks: 0, 1, 2, 3, 4, 5 -->
      <g font-family="Inter, sans-serif" font-size="9" fill="#525252">
        <line x1="60"  y1="320" x2="60"  y2="324" stroke="#374151" stroke-width="1"/>
        <text x="60" y="338" text-anchor="middle">0</text>
        <line x1="110" y1="320" x2="110" y2="324" stroke="#374151" stroke-width="1"/>
        <text x="110" y="338" text-anchor="middle">1</text>
        <line x1="160" y1="320" x2="160" y2="324" stroke="#374151" stroke-width="1"/>
        <text x="160" y="338" text-anchor="middle">2</text>
        <line x1="210" y1="320" x2="210" y2="324" stroke="#374151" stroke-width="1"/>
        <text x="210" y="338" text-anchor="middle">3</text>
        <line x1="260" y1="320" x2="260" y2="324" stroke="#374151" stroke-width="1"/>
        <text x="260" y="338" text-anchor="middle">4</text>
        <line x1="310" y1="320" x2="310" y2="324" stroke="#374151" stroke-width="1"/>
        <text x="310" y="338" text-anchor="middle">5</text>
      </g>

      <!-- Y axis label -->
      <text x="-180" y="14" font-family="Inter, sans-serif" font-size="10" fill="#525252" transform="rotate(-90)" text-anchor="middle">P(Y = k)</text>
      <!-- X axis label -->
      <text x="190" y="358" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">k (counts)</text>

      <!-- Poisson bars (light cobalt), offset left of integer ticks -->
      <!-- mu=0.5: P(0)=0.6065, P(1)=0.3033, P(2)=0.0758, P(3)=0.0126, P(4)=0.0016, P(5)=0.0002 -->
      <g fill="#93c5fd" opacity="0.85">
        <rect x="48"  y="107"  width="11" height="213"/>
        <rect x="98"  y="214"  width="11" height="106"/>
        <rect x="148" y="293"  width="11" height="27"/>
        <rect x="198" y="316"  width="11" height="4"/>
      </g>

      <!-- NB bars (cobalt outline), offset right of integer ticks. alpha=0.2 -->
      <!-- mu=0.5, alpha=0.2: r=5, p=10/11. P(0)=(10/11)^5=0.6209, P(1)=0.2823, P(2)=0.0770, P(3)=0.0164, P(4)=0.0030, P(5)=0.0005 -->
      <g fill="none" stroke="#1e3a8a" stroke-width="1.6">
        <rect x="61"  y="103"  width="11" height="217"/>
        <rect x="111" y="221"  width="11" height="99"/>
        <rect x="161" y="293"  width="11" height="27"/>
        <rect x="211" y="314"  width="11" height="6"/>
      </g>

      <!-- Legend -->
      <g transform="translate(180, 50)">
        <rect x="0" y="0" width="14" height="10" fill="#93c5fd" opacity="0.85"/>
        <text x="20" y="9" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">Poisson</text>
        <rect x="80" y="0" width="14" height="10" fill="none" stroke="#1e3a8a" stroke-width="1.6"/>
        <text x="100" y="9" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">NB (alpha=0.2)</text>
      </g>
    </g>

    <!-- Summary card -->
    <g transform="translate(0, 400)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">VAR / MEAN</text>
      <text x="0" y="18" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">Poisson:  Var = 0.500</text>
      <text x="0" y="34" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">NB:       Var = 0.550</text>
    </g>
  </g>

  <!-- ============= PANEL B: mu = 5 ============= -->
  <g transform="translate(440, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(B)  mu = 5  ·  MILD OVERDISPERSION</text>
    <text x="0" y="18" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">right tail starting to thicken</text>

    <g transform="translate(0, 40)">
      <line x1="40" y1="320" x2="340" y2="320" stroke="#374151" stroke-width="1.2"/>
      <line x1="40" y1="40" x2="40" y2="320" stroke="#374151" stroke-width="1.2"/>

      <g font-family="Inter, sans-serif" font-size="9" fill="#525252">
        <line x1="36" y1="320" x2="40" y2="320" stroke="#374151" stroke-width="1"/>
        <text x="32" y="324" text-anchor="end">0.00</text>
        <line x1="36" y1="250" x2="40" y2="250" stroke="#374151" stroke-width="1"/>
        <text x="32" y="254" text-anchor="end">0.05</text>
        <line x1="36" y1="180" x2="40" y2="180" stroke="#374151" stroke-width="1"/>
        <text x="32" y="184" text-anchor="end">0.10</text>
        <line x1="36" y1="110" x2="40" y2="110" stroke="#374151" stroke-width="1"/>
        <text x="32" y="114" text-anchor="end">0.15</text>
        <line x1="36" y1="60" x2="40" y2="60" stroke="#374151" stroke-width="1"/>
        <text x="32" y="64" text-anchor="end">0.20</text>
      </g>

      <!-- X ticks: 0..15 -->
      <g font-family="Inter, sans-serif" font-size="9" fill="#525252">
        <line x1="50"  y1="320" x2="50"  y2="324" stroke="#374151" stroke-width="1"/>
        <text x="50" y="338" text-anchor="middle">0</text>
        <line x1="110" y1="320" x2="110" y2="324" stroke="#374151" stroke-width="1"/>
        <text x="110" y="338" text-anchor="middle">5</text>
        <line x1="170" y1="320" x2="170" y2="324" stroke="#374151" stroke-width="1"/>
        <text x="170" y="338" text-anchor="middle">10</text>
        <line x1="230" y1="320" x2="230" y2="324" stroke="#374151" stroke-width="1"/>
        <text x="230" y="338" text-anchor="middle">15</text>
      </g>

      <text x="-180" y="14" font-family="Inter, sans-serif" font-size="10" fill="#525252" transform="rotate(-90)" text-anchor="middle">P(Y = k)</text>
      <text x="190" y="358" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">k (counts)</text>

      <!-- Poisson PMF mu=5: P0=.0067 P1=.0337 P2=.0842 P3=.1404 P4=.1755 P5=.1755 P6=.1462 P7=.1044 P8=.0653 P9=.0363 P10=.0181 P11=.0082 P12=.0034 P13=.0013 P14=.0005 P15=.0002 -->
      <!-- height scale: 0.20 -> 260 px. So y = 320 - p * 1300 -->
      <g fill="#93c5fd" opacity="0.85">
        <rect x="44"  y="311" width="6" height="9"/>
        <rect x="56"  y="276" width="6" height="44"/>
        <rect x="68"  y="211" width="6" height="109"/>
        <rect x="80"  y="138" width="6" height="182"/>
        <rect x="92"  y="92"  width="6" height="228"/>
        <rect x="104" y="92"  width="6" height="228"/>
        <rect x="116" y="130" width="6" height="190"/>
        <rect x="128" y="184" width="6" height="136"/>
        <rect x="140" y="235" width="6" height="85"/>
        <rect x="152" y="273" width="6" height="47"/>
        <rect x="164" y="297" width="6" height="23"/>
        <rect x="176" y="309" width="6" height="11"/>
        <rect x="188" y="315" width="6" height="5"/>
        <rect x="200" y="318" width="6" height="2"/>
      </g>

      <!-- NB PMF mu=5, alpha=0.2, r=5, p=0.5. Stirling/pmf: P0=.03125 P1=.07813 P2=.11719 P3=.13672 P4=.13672 P5=.12305 P6=.10254 P7=.08057 P8=.06042 P9=.04362 P10=.03053 P11=.02082 P12=.01388 P13=.00908 P14=.00584 P15=.00370 -->
      <g fill="none" stroke="#1e3a8a" stroke-width="1.4">
        <rect x="51"  y="279" width="6" height="41"/>
        <rect x="63"  y="218" width="6" height="102"/>
        <rect x="75"  y="168" width="6" height="152"/>
        <rect x="87"  y="142" width="6" height="178"/>
        <rect x="99"  y="142" width="6" height="178"/>
        <rect x="111" y="160" width="6" height="160"/>
        <rect x="123" y="187" width="6" height="133"/>
        <rect x="135" y="215" width="6" height="105"/>
        <rect x="147" y="241" width="6" height="79"/>
        <rect x="159" y="263" width="6" height="57"/>
        <rect x="171" y="280" width="6" height="40"/>
        <rect x="183" y="293" width="6" height="27"/>
        <rect x="195" y="302" width="6" height="18"/>
        <rect x="207" y="308" width="6" height="12"/>
        <rect x="219" y="312" width="6" height="8"/>
        <rect x="231" y="315" width="6" height="5"/>
      </g>

      <!-- Annotation pointing to right tail -->
      <g>
        <line x1="220" y1="240" x2="195" y2="300" stroke="#b45309" stroke-width="1.2" stroke-dasharray="3 2"/>
        <text x="226" y="236" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#b45309">heavier right tail</text>
      </g>
    </g>

    <g transform="translate(0, 400)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">VAR / MEAN</text>
      <text x="0" y="18" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">Poisson:  Var = 5.0</text>
      <text x="0" y="34" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">NB:       Var = 10.0</text>
    </g>
  </g>

  <!-- ============= PANEL C: mu = 50 ============= -->
  <g transform="translate(820, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(C)  mu = 50  ·  HEAVY OVERDISPERSION</text>
    <text x="0" y="18" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">NB visibly broader; Poisson cannot reach the tails</text>

    <g transform="translate(0, 40)">
      <line x1="40" y1="320" x2="340" y2="320" stroke="#374151" stroke-width="1.2"/>
      <line x1="40" y1="40" x2="40" y2="320" stroke="#374151" stroke-width="1.2"/>

      <g font-family="Inter, sans-serif" font-size="9" fill="#525252">
        <line x1="36" y1="320" x2="40" y2="320" stroke="#374151" stroke-width="1"/>
        <text x="32" y="324" text-anchor="end">0.00</text>
        <line x1="36" y1="250" x2="40" y2="250" stroke="#374151" stroke-width="1"/>
        <text x="32" y="254" text-anchor="end">0.02</text>
        <line x1="36" y1="180" x2="40" y2="180" stroke="#374151" stroke-width="1"/>
        <text x="32" y="184" text-anchor="end">0.04</text>
        <line x1="36" y1="110" x2="40" y2="110" stroke="#374151" stroke-width="1"/>
        <text x="32" y="114" text-anchor="end">0.06</text>
      </g>

      <g font-family="Inter, sans-serif" font-size="9" fill="#525252">
        <line x1="50"  y1="320" x2="50"  y2="324" stroke="#374151" stroke-width="1"/>
        <text x="50" y="338" text-anchor="middle">0</text>
        <line x1="110" y1="320" x2="110" y2="324" stroke="#374151" stroke-width="1"/>
        <text x="110" y="338" text-anchor="middle">25</text>
        <line x1="170" y1="320" x2="170" y2="324" stroke="#374151" stroke-width="1"/>
        <text x="170" y="338" text-anchor="middle">50</text>
        <line x1="230" y1="320" x2="230" y2="324" stroke="#374151" stroke-width="1"/>
        <text x="230" y="338" text-anchor="middle">75</text>
        <line x1="290" y1="320" x2="290" y2="324" stroke="#374151" stroke-width="1"/>
        <text x="290" y="338" text-anchor="middle">100</text>
      </g>

      <text x="-180" y="14" font-family="Inter, sans-serif" font-size="10" fill="#525252" transform="rotate(-90)" text-anchor="middle">P(Y = k)</text>
      <text x="190" y="358" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">k (counts)</text>

      <!-- Schematic curve overlays — Poisson density (normal-approx) bell at mu=50 width sigma=7.07; NB sigma=sqrt(550)=23.45 -->
      <!-- Poisson: tall narrow bell. Peak height ~0.0563. Scale 0.06 -> 210 px. y = 320 - p*3500 -->
      <!-- Poisson bell as filled path -->
      <path d="
        M 50  320
        L 86  320
        L 96  318
        L 106 314
        L 116 308
        L 126 299
        L 136 286
        L 146 268
        L 156 246
        L 162 230
        L 168 213
        L 170 197
        L 172 213
        L 178 230
        L 184 246
        L 194 268
        L 204 286
        L 214 299
        L 224 308
        L 234 314
        L 244 318
        L 254 320
        L 290 320
        Z
      " fill="#93c5fd" opacity="0.85"/>

      <!-- NB bell as outline — wider. Peak height ~0.017. Scale 0.04 -> ~140px. Skewed right slightly -->
      <path d="
        M 50  320
        L 60  319
        L 75  315
        L 90  308
        L 105 297
        L 120 282
        L 135 263
        L 150 246
        L 160 234
        L 168 228
        L 174 226
        L 180 228
        L 188 234
        L 200 250
        L 215 270
        L 230 286
        L 245 298
        L 260 308
        L 280 315
        L 300 318
        L 330 320
      " fill="none" stroke="#1e3a8a" stroke-width="1.8"/>

      <!-- Annotation -->
      <g>
        <line x1="265" y1="288" x2="232" y2="310" stroke="#b45309" stroke-width="1.2" stroke-dasharray="3 2"/>
        <text x="248" y="278" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#b45309">NB tail reaches</text>
        <text x="248" y="291" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#b45309">k = 100+</text>
      </g>

      <line x1="170" y1="40" x2="170" y2="320" stroke="#525252" stroke-width="0.6" stroke-dasharray="3 3"/>
      <text x="170" y="34" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#525252">mu = 50</text>
    </g>

    <g transform="translate(0, 400)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">VAR / MEAN</text>
      <text x="0" y="18" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">Poisson:  Var = 50</text>
      <text x="0" y="34" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">NB:       Var = 550</text>
    </g>
  </g>

  <!-- Bottom note -->
  <g transform="translate(60, 530)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" fill="#525252">Var[Y] = mu + alpha mu^2 for NB; Var[Y] = mu for Poisson. The quadratic term dominates at high mu.</text>
  </g>
</svg>
