<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="t d">
  <title id="t">End-to-end differential-expression pipeline</title>
  <desc id="d">A vertical sequence of boxed stages from raw count matrix to annotated DE gene list. Stages: count matrix; size-factor estimation; per-gene dispersion MLE; mean-dispersion trend fit; empirical-Bayes shrinkage; NB GLM refit; Wald or LRT test; Benjamini-Hochberg FDR correction; independent filtering; enrichment analysis. Each stage shows its key input, output, and the tool or method that implements it. Right-side annotations call out which sections of the chapter describe each step.</desc>

  <rect x="0" y="0" width="1200" height="620" fill="#fafaf9"/>

  <!-- Title -->
  <g>
    <text x="60" y="36" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">THE DE PIPELINE — COUNT MATRIX TO ANNOTATED GENE LIST</text>
    <text x="60" y="54" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">DESeq2 and edgeR agree on the shape; they differ only on dispersion and test details.</text>
  </g>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow-pipeline" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <!-- Two-column vertical flow. Left column = pipeline stages; right column = annotations. -->
  <!-- Stage geometry: each stage is a rounded rect 360 wide × 44 tall, with arrows between. Stage spacing 56 px. -->

  <g transform="translate(380, 80)">
    <!-- Stage 1: count matrix -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="360" height="44" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
      <text x="14" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">STAGE 1 · INPUT</text>
      <text x="14" y="36" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">Count matrix · 20k genes × n samples</text>
    </g>

    <line x1="180" y1="44" x2="180" y2="64" stroke="#1e3a8a" stroke-width="1.8" marker-end="url(#arrow-pipeline)"/>

    <!-- Stage 2: size factors -->
    <g transform="translate(0, 64)">
      <rect x="0" y="0" width="360" height="44" rx="4" fill="#ffffff" stroke="#c4c1b6" stroke-width="1"/>
      <text x="14" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">STAGE 2 · NORMALISE</text>
      <text x="14" y="36" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#0a0a0a">Estimate size factors  ·  median of ratios</text>
    </g>

    <line x1="180" y1="108" x2="180" y2="128" stroke="#1e3a8a" stroke-width="1.8" marker-end="url(#arrow-pipeline)"/>

    <!-- Stage 3: per-gene MLE dispersion -->
    <g transform="translate(0, 128)">
      <rect x="0" y="0" width="360" height="44" rx="4" fill="#ffffff" stroke="#c4c1b6" stroke-width="1"/>
      <text x="14" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">STAGE 3 · NOISE PER GENE</text>
      <text x="14" y="36" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#0a0a0a">Per-gene dispersion MLE  ·  Newton-Raphson on NB likelihood</text>
    </g>

    <line x1="180" y1="172" x2="180" y2="192" stroke="#1e3a8a" stroke-width="1.8" marker-end="url(#arrow-pipeline)"/>

    <!-- Stage 4: trend fit -->
    <g transform="translate(0, 192)">
      <rect x="0" y="0" width="360" height="44" rx="4" fill="#ffffff" stroke="#c4c1b6" stroke-width="1"/>
      <text x="14" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">STAGE 4 · GLOBAL TREND</text>
      <text x="14" y="36" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#0a0a0a">Fit mean-dispersion trend  ·  alpha_trend(mu) = a0 + a1/mu</text>
    </g>

    <line x1="180" y1="236" x2="180" y2="256" stroke="#1e3a8a" stroke-width="1.8" marker-end="url(#arrow-pipeline)"/>

    <!-- Stage 5: EB shrinkage (highlighted) -->
    <g transform="translate(0, 256)">
      <rect x="0" y="0" width="360" height="44" rx="4" fill="#fefce8" stroke="#b45309" stroke-width="1.8"/>
      <text x="14" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#b45309" letter-spacing="0.06em">STAGE 5 · EB SHRINKAGE  ★</text>
      <text x="14" y="36" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">Shrink MLE toward trend  ·  why DE works at n = 3</text>
    </g>

    <line x1="180" y1="300" x2="180" y2="320" stroke="#1e3a8a" stroke-width="1.8" marker-end="url(#arrow-pipeline)"/>

    <!-- Stage 6: refit GLM -->
    <g transform="translate(0, 320)">
      <rect x="0" y="0" width="360" height="44" rx="4" fill="#ffffff" stroke="#c4c1b6" stroke-width="1"/>
      <text x="14" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">STAGE 6 · REFIT GLM</text>
      <text x="14" y="36" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#0a0a0a">Refit NB GLM with shrunk alpha  ·  log mu = log s + X beta</text>
    </g>

    <line x1="180" y1="364" x2="180" y2="384" stroke="#1e3a8a" stroke-width="1.8" marker-end="url(#arrow-pipeline)"/>

    <!-- Stage 7: test -->
    <g transform="translate(0, 384)">
      <rect x="0" y="0" width="360" height="44" rx="4" fill="#ffffff" stroke="#c4c1b6" stroke-width="1"/>
      <text x="14" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">STAGE 7 · HYPOTHESIS TEST</text>
      <text x="14" y="36" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#0a0a0a">Wald (single coef) or LRT (multi-coef)  →  raw p-values</text>
    </g>

    <line x1="180" y1="428" x2="180" y2="448" stroke="#1e3a8a" stroke-width="1.8" marker-end="url(#arrow-pipeline)"/>

    <!-- Stage 8: BH (highlighted) -->
    <g transform="translate(0, 448)">
      <rect x="0" y="0" width="360" height="44" rx="4" fill="#fefce8" stroke="#b45309" stroke-width="1.8"/>
      <text x="14" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#b45309" letter-spacing="0.06em">STAGE 8 · FDR CONTROL  ★</text>
      <text x="14" y="36" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">Benjamini-Hochberg  ·  padj over 20k tests</text>
    </g>

    <line x1="180" y1="492" x2="180" y2="512" stroke="#1e3a8a" stroke-width="1.8" marker-end="url(#arrow-pipeline)"/>

    <!-- Stage 9: enrichment -->
    <g transform="translate(0, 512)">
      <rect x="0" y="0" width="360" height="44" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
      <text x="14" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">STAGE 9 · INTERPRET</text>
      <text x="14" y="36" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">Enrichment (ORA, GSEA)  →  annotated gene list</text>
    </g>
  </g>

  <!-- Right-side annotations -->
  <g transform="translate(780, 86)" font-family="Inter, sans-serif" fill="#525252">
    <text x="0" y="14" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">CHAPTER 5  §5.4</text>
    <text x="0" y="86" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">§6.2.3 · CH 5 §4.3</text>
    <text x="0" y="158" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">§6.3.1</text>
    <text x="0" y="230" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">§6.3.2</text>
    <text x="0" y="302" font-size="10" font-weight="700" fill="#b45309" letter-spacing="0.06em">§6.3.2  ★</text>
    <text x="0" y="374" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">§6.2.2</text>
    <text x="0" y="446" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">§6.3.3</text>
    <text x="0" y="518" font-size="10" font-weight="700" fill="#b45309" letter-spacing="0.06em">§6.4.1  ★</text>
    <text x="0" y="590" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">§6.5</text>
  </g>

  <!-- Left-side annotations: tool names -->
  <g transform="translate(60, 86)" font-family="JetBrains Mono, monospace" fill="#525252">
    <text x="0" y="14" font-size="9">e.g. featureCounts</text>
    <text x="0" y="86" font-size="9">DESeq2: estimateSizeFactors</text>
    <text x="0" y="158" font-size="9">DESeq2: estimateDispersions</text>
    <text x="0" y="230" font-size="9">DESeq2: parametricDispFit</text>
    <text x="0" y="302" font-size="9" fill="#b45309">edgeR: estimateGLMTagwise</text>
    <text x="0" y="374" font-size="9">DESeq2: nbinomWaldTest</text>
    <text x="0" y="446" font-size="9">test = "Wald" or "LRT"</text>
    <text x="0" y="518" font-size="9" fill="#b45309">p.adjust(method = "BH")</text>
    <text x="0" y="590" font-size="9">clusterProfiler, fgsea</text>
  </g>

  <!-- Star legend -->
  <g transform="translate(60, 580)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#b45309" letter-spacing="0.06em">★  THE TWO STAGES THAT MAKE OR BREAK A DE ANALYSIS</text>
    <text x="0" y="16" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">EB shrinkage rescues small-n; BH controls the gene-list error rate.</text>
  </g>
</svg>
