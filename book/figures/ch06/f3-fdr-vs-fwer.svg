<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="t d">
  <title id="t">Bonferroni FWER versus Benjamini-Hochberg FDR on the same simulated DE experiment</title>
  <desc id="d">Left panel: a sorted p-value plot from 20,000 simulated tests including 1000 true differentially expressed genes. The x-axis is rank from 1 to 20,000 on log scale, the y-axis is the sorted p-value on log scale. The Benjamini-Hochberg line p = (k/m)alpha is drawn; below it are the rejected genes (BH list). A flat Bonferroni threshold at alpha/m is drawn separately; the Bonferroni rejected set is the small intersection below the flat line. Right panel: a stacked bar comparing the four outcomes — true positives, false positives, true negatives, false negatives — for Bonferroni and BH, illustrating that Bonferroni controls FWER at the cost of dramatic loss of power while BH controls FDR with much higher recall.</desc>

  <rect x="0" y="0" width="1200" height="620" fill="#fafaf9"/>

  <!-- Title -->
  <g>
    <text x="60" y="36" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">FWER VS FDR — TWO PROCEDURES, ONE DATASET</text>
    <text x="60" y="54" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">Simulated DE: 20,000 genes, 1,000 true positives, alpha = 0.05.</text>
  </g>

  <!-- ============ LEFT: sorted p-values + thresholds ============ -->
  <g transform="translate(60, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(A)  SORTED P-VALUES, LOG-LOG</text>
    <text x="0" y="18" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">true positives at the bottom of the rank; the BH line slopes; Bonferroni is flat</text>

    <g transform="translate(0, 40)">
      <!-- Plot frame -->
      <line x1="60" y1="400" x2="540" y2="400" stroke="#374151" stroke-width="1.2"/>
      <line x1="60" y1="40" x2="60" y2="400" stroke="#374151" stroke-width="1.2"/>

      <!-- Y axis: log p from -8 to 0 -->
      <g font-family="Inter, sans-serif" font-size="9" fill="#525252">
        <line x1="56" y1="400" x2="60" y2="400" stroke="#374151" stroke-width="1"/>
        <text x="52" y="404" text-anchor="end">10^0</text>
        <line x1="56" y1="355" x2="60" y2="355" stroke="#374151" stroke-width="1"/>
        <text x="52" y="359" text-anchor="end">10^-1</text>
        <line x1="56" y1="310" x2="60" y2="310" stroke="#374151" stroke-width="1"/>
        <text x="52" y="314" text-anchor="end">10^-2</text>
        <line x1="56" y1="265" x2="60" y2="265" stroke="#374151" stroke-width="1"/>
        <text x="52" y="269" text-anchor="end">10^-3</text>
        <line x1="56" y1="220" x2="60" y2="220" stroke="#374151" stroke-width="1"/>
        <text x="52" y="224" text-anchor="end">10^-4</text>
        <line x1="56" y1="175" x2="60" y2="175" stroke="#374151" stroke-width="1"/>
        <text x="52" y="179" text-anchor="end">10^-5</text>
        <line x1="56" y1="130" x2="60" y2="130" stroke="#374151" stroke-width="1"/>
        <text x="52" y="134" text-anchor="end">10^-6</text>
        <line x1="56" y1="85" x2="60" y2="85" stroke="#374151" stroke-width="1"/>
        <text x="52" y="89" text-anchor="end">10^-7</text>
        <line x1="56" y1="40" x2="60" y2="40" stroke="#374151" stroke-width="1"/>
        <text x="52" y="44" text-anchor="end">10^-8</text>
      </g>

      <!-- X axis: log rank from 1 to 20000 -->
      <g font-family="Inter, sans-serif" font-size="9" fill="#525252">
        <line x1="60" y1="400" x2="60" y2="404" stroke="#374151" stroke-width="1"/>
        <text x="60" y="418" text-anchor="middle">1</text>
        <line x1="170" y1="400" x2="170" y2="404" stroke="#374151" stroke-width="1"/>
        <text x="170" y="418" text-anchor="middle">10</text>
        <line x1="280" y1="400" x2="280" y2="404" stroke="#374151" stroke-width="1"/>
        <text x="280" y="418" text-anchor="middle">100</text>
        <line x1="390" y1="400" x2="390" y2="404" stroke="#374151" stroke-width="1"/>
        <text x="390" y="418" text-anchor="middle">1,000</text>
        <line x1="500" y1="400" x2="500" y2="404" stroke="#374151" stroke-width="1"/>
        <text x="500" y="418" text-anchor="middle">10,000</text>
        <line x1="540" y1="400" x2="540" y2="404" stroke="#374151" stroke-width="1"/>
        <text x="540" y="418" text-anchor="middle">20k</text>
      </g>

      <text x="-220" y="14" font-family="Inter, sans-serif" font-size="10" fill="#525252" transform="rotate(-90)" text-anchor="middle">sorted p-value  (log scale)</text>
      <text x="300" y="438" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">rank k  (log scale)</text>

      <!-- Bonferroni threshold horizontal line at p = 0.05/20000 = 2.5e-6, i.e. log10 = -5.6 -->
      <!-- y at 10^-5.6 = 175 - 0.6*45 = 175 - 27 = 148 -->
      <line x1="60" y1="148" x2="540" y2="148" stroke="#dc2626" stroke-width="1.8" stroke-dasharray="6 4"/>
      <text x="544" y="152" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#dc2626">Bonferroni</text>
      <text x="544" y="164" font-family="JetBrains Mono, monospace" font-size="9" fill="#dc2626">alpha / m</text>

      <!-- BH line: p = (k/m) * alpha. In log-log this is a straight line with slope 1.
           At rank k=1: p = 0.05/20000 = 2.5e-6 (y=148).
           At rank k=20000: p = 0.05 (y=355).
           Slope: log10 spans -5.6 -> -1.3 over rank 1 -> 20000 (log10 1 -> 4.3).
           Actually let's just plot the line from (60, 148) to (540, 355) — straight line in log-log space. -->
      <line x1="60" y1="148" x2="540" y2="355" stroke="#1e3a8a" stroke-width="1.8" stroke-dasharray="6 4"/>
      <text x="486" y="328" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a">BH line</text>
      <text x="486" y="340" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a">(k/m) alpha</text>

      <!-- Sorted p-values:
         - First ~1000 ranks: TRUE POSITIVES — small p-values, scattered between 10^-8 and 10^-3
         - Ranks ~1000 to ~5000: mid p-values (mix)
         - Ranks 5000+: uniformly distributed nulls between 0.05 and 1
        We'll draw as small green/grey circles. -->

      <!-- Helper: log scale on x: rank 1 = 60, rank 20000 = 540. So x = 60 + log10(k) * (540-60)/log10(20000)
           log10(20000) = 4.301, so multiplier = 480/4.301 = 111.6 -->

      <!-- True positives (1000 of them) — green dots, sparse representation -->
      <g fill="#065f46" opacity="0.9">
        <!-- Strong TPs at very low ranks/p -->
        <circle cx="65"  cy="48"  r="2"/>
        <circle cx="75"  cy="55"  r="2"/>
        <circle cx="88"  cy="68"  r="2"/>
        <circle cx="105" cy="82"  r="2"/>
        <circle cx="125" cy="98"  r="2"/>
        <circle cx="148" cy="115" r="2"/>
        <circle cx="172" cy="132" r="2"/>
        <circle cx="195" cy="148" r="2"/>
        <circle cx="218" cy="164" r="2"/>
        <circle cx="240" cy="180" r="2"/>
        <circle cx="262" cy="197" r="2"/>
        <circle cx="285" cy="214" r="2"/>
        <circle cx="305" cy="230" r="2"/>
        <circle cx="325" cy="247" r="2"/>
        <circle cx="345" cy="263" r="2"/>
        <circle cx="362" cy="278" r="2"/>
        <circle cx="380" cy="290" r="2"/>
        <circle cx="395" cy="300" r="2"/>
        <circle cx="408" cy="310" r="2"/>
        <circle cx="418" cy="318" r="2"/>
        <circle cx="427" cy="324" r="2"/>
        <circle cx="434" cy="328" r="2"/>
        <circle cx="441" cy="332" r="2"/>
      </g>

      <!-- A few TPs that "lost" — sit above the BH line (false negatives) -->
      <g fill="#065f46" opacity="0.45">
        <circle cx="450" cy="346" r="2"/>
        <circle cx="455" cy="354" r="2"/>
        <circle cx="461" cy="358" r="2"/>
      </g>

      <!-- Nulls — grey dots spreading uniformly from p=0.05 (at rank 1k actually starting where remaining tests are nulls). -->
      <g fill="#8a8a85" opacity="0.5">
        <circle cx="450" cy="352" r="1.4"/>
        <circle cx="460" cy="357" r="1.4"/>
        <circle cx="470" cy="361" r="1.4"/>
        <circle cx="478" cy="364" r="1.4"/>
        <circle cx="485" cy="367" r="1.4"/>
        <circle cx="492" cy="370" r="1.4"/>
        <circle cx="498" cy="373" r="1.4"/>
        <circle cx="503" cy="376" r="1.4"/>
        <circle cx="508" cy="379" r="1.4"/>
        <circle cx="513" cy="382" r="1.4"/>
        <circle cx="517" cy="385" r="1.4"/>
        <circle cx="521" cy="388" r="1.4"/>
        <circle cx="525" cy="391" r="1.4"/>
        <circle cx="528" cy="394" r="1.4"/>
        <circle cx="532" cy="397" r="1.4"/>
        <circle cx="536" cy="399" r="1.4"/>
        <circle cx="539" cy="400" r="1.4"/>
      </g>

      <!-- Bonferroni rejection callout -->
      <g>
        <rect x="64" y="64" width="100" height="80" fill="none" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="3 2"/>
        <text x="170" y="80" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#dc2626">Bonferroni list</text>
        <text x="170" y="94" font-family="JetBrains Mono, monospace" font-size="9" fill="#dc2626">~ 30 rejections</text>
      </g>

      <!-- BH rejection callout -->
      <g>
        <rect x="64" y="46" width="380" height="296" fill="none" stroke="#1e3a8a" stroke-width="0.8" stroke-dasharray="3 2"/>
        <text x="320" y="370" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a">BH list</text>
        <text x="320" y="384" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a">~ 950 rejections</text>
      </g>
    </g>
  </g>

  <!-- ============ RIGHT: outcome bars ============ -->
  <g transform="translate(680, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(B)  OUTCOMES — POWER VS CONTROL</text>
    <text x="0" y="18" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">stacked bars: TP, FP, FN per procedure</text>

    <g transform="translate(0, 40)">
      <!-- y-axis: counts. Range 0 to 1000 (TPs) for the bottom; we'll only show counts on rejected set. -->

      <!-- Bonferroni column (centered at x=120) -->
      <text x="120" y="14" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#dc2626">BONFERRONI</text>
      <text x="120" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">controls FWER ≤ 0.05</text>

      <!-- The rejected list is small: 30 rejections, basically all TP. -->
      <!-- Scale: 1000 genes = 200 px tall. Plot: vertical from y=80 (top) to y=380 (bottom). 300 px = 1000 genes. -->

      <!-- Stack for Bonferroni: TP=30, FP=0, FN=970, TN=19000+ (we'll abbreviate ~). -->
      <!-- Just show TP rejected vs missed (FN) -->
      <g>
        <!-- Box: TP rejected -->
        <rect x="80" y="372" width="80" height="9" fill="#065f46"/>
        <text x="164" y="380" font-family="JetBrains Mono, monospace" font-size="9" fill="#065f46">TP = 30</text>
        <!-- Box: FN missed -->
        <rect x="80" y="80" width="80" height="290" fill="#fef3c7" stroke="#b45309" stroke-width="0.6"/>
        <text x="120" y="225" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#b45309">FN = 970</text>
        <text x="120" y="242" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#b45309">(missed real DE)</text>
      </g>

      <text x="120" y="402" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">power = 3%  ·  FDR = 0%</text>

      <!-- BH column (centered at x=340) -->
      <text x="340" y="14" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a">BENJAMINI-HOCHBERG</text>
      <text x="340" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">controls FDR ≤ 0.05</text>

      <g>
        <!-- TP rejected = ~915 -->
        <rect x="300" y="106" width="80" height="265" fill="#065f46"/>
        <text x="340" y="240" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#ffffff">TP = 915</text>
        <!-- FP rejected = ~45 (5% FDR of ~960 rejections) -->
        <rect x="300" y="92" width="80" height="14" fill="#dc2626"/>
        <text x="384" y="100" font-family="JetBrains Mono, monospace" font-size="9" fill="#dc2626">FP ≈ 45</text>
        <!-- FN missed = ~85 -->
        <rect x="300" y="80" width="80" height="12" fill="#fef3c7" stroke="#b45309" stroke-width="0.6"/>
        <text x="384" y="88" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309">FN = 85</text>
      </g>

      <text x="340" y="402" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">power = 92%  ·  FDR = 4.7%</text>

      <!-- Legend -->
      <g transform="translate(0, 432)">
        <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">LEGEND</text>
        <rect x="70" y="-10" width="14" height="12" fill="#065f46"/>
        <text x="90" y="0" font-family="Inter, sans-serif" font-size="10" fill="#525252">TP rejected</text>
        <rect x="180" y="-10" width="14" height="12" fill="#dc2626"/>
        <text x="200" y="0" font-family="Inter, sans-serif" font-size="10" fill="#525252">FP rejected</text>
        <rect x="290" y="-10" width="14" height="12" fill="#fef3c7" stroke="#b45309" stroke-width="0.6"/>
        <text x="310" y="0" font-family="Inter, sans-serif" font-size="10" fill="#525252">FN (missed real DE)</text>
      </g>
    </g>
  </g>

  <!-- Bottom takeaway -->
  <g transform="translate(60, 580)">
    <rect x="0" y="-20" width="1080" height="36" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
    <text x="540" y="-2" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a">Bonferroni guarantees the gene list has zero false positives — at the cost of missing 97% of real DE.</text>
    <text x="540" y="12" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">BH guarantees only 5% false positives in the list, recovering 92% of real DE. For biological follow-up, BH always wins.</text>
  </g>
</svg>
