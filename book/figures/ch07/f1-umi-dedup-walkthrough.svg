<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="t d">
  <title id="t">UMI deduplication — three original molecules survive PCR inflation</title>
  <desc id="d">A three-row schematic that walks one cell barcode from three captured mRNA molecules through reverse transcription, exponential PCR amplification, and Illumina sequencing, and shows the final collapse on cell barcode plus UMI back to three distinct molecule counts. Top row shows three mRNAs each ligated to a primer carrying the same cell barcode CB07 plus three distinct UMIs. Middle row shows PCR amplifying each labelled cDNA to many copies that all share the original UMI. Bottom row shows reads coming off the sequencer with cell barcode and UMI fields, and a collapse table that maps the read pool to a final count of three UMIs per gene per cell, independent of how many duplicate reads each molecule produced.</desc>

  <defs>
    <marker id="tri-cobalt-f1" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
    <marker id="tri-muted-f1" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="640" fill="#fafaf9"/>

  <!-- Header -->
  <g>
    <text x="60" y="36" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">UMI DEDUPLICATION — FROM PCR INFLATION BACK TO MOLECULE COUNTS</text>
    <text x="60" y="54" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">Three captured mRNAs, three UMIs, one cell barcode. The amplification channel is invertible because each molecule is tagged before it enters.</text>
  </g>

  <!-- ============ STAGE 1: capture ============ -->
  <g transform="translate(60, 90)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">STAGE 1 — INSIDE THE DROPLET</text>
    <text x="0" y="16" font-family="Inter, sans-serif" font-size="10" fill="#525252">3 mRNA molecules each capture a primer; primer carries cell barcode CB07 and a per-molecule UMI</text>

    <!-- Three mRNA + primer pairs as labelled bars -->
    <g transform="translate(0, 34)">
      <!-- Molecule 1 -->
      <rect x="0" y="0" width="64" height="22" rx="3" fill="#1e3a8a"/>
      <text x="32" y="15" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700" fill="#ffffff">CB07</text>
      <rect x="64" y="0" width="56" height="22" rx="0" fill="#b45309"/>
      <text x="92" y="15" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700" fill="#ffffff">UMI=A1</text>
      <rect x="120" y="0" width="120" height="22" rx="3" fill="#f4f3ee" stroke="#525252" stroke-width="0.8"/>
      <text x="180" y="15" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">mRNA · gene G1</text>

      <!-- Molecule 2 -->
      <rect x="0" y="32" width="64" height="22" rx="3" fill="#1e3a8a"/>
      <text x="32" y="47" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700" fill="#ffffff">CB07</text>
      <rect x="64" y="32" width="56" height="22" rx="0" fill="#b45309"/>
      <text x="92" y="47" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700" fill="#ffffff">UMI=B2</text>
      <rect x="120" y="32" width="120" height="22" rx="3" fill="#f4f3ee" stroke="#525252" stroke-width="0.8"/>
      <text x="180" y="47" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">mRNA · gene G1</text>

      <!-- Molecule 3 -->
      <rect x="0" y="64" width="64" height="22" rx="3" fill="#1e3a8a"/>
      <text x="32" y="79" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700" fill="#ffffff">CB07</text>
      <rect x="64" y="64" width="56" height="22" rx="0" fill="#b45309"/>
      <text x="92" y="79" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700" fill="#ffffff">UMI=C3</text>
      <rect x="120" y="64" width="120" height="22" rx="3" fill="#f4f3ee" stroke="#525252" stroke-width="0.8"/>
      <text x="180" y="79" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">mRNA · gene G2</text>
    </g>

    <text x="0" y="148" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252">All three primers share the bead's cell barcode CB07; UMIs are random and (probably) unique.</text>
  </g>

  <!-- Arrow to stage 2 -->
  <line x1="320" y1="160" x2="380" y2="160" stroke="#1e3a8a" stroke-width="1.4" marker-end="url(#tri-cobalt-f1)"/>
  <text x="350" y="148" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#1e3a8a">RT + PCR</text>

  <!-- ============ STAGE 2: PCR amplification ============ -->
  <g transform="translate(400, 90)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">STAGE 2 — PCR AMPLIFICATION</text>
    <text x="0" y="16" font-family="Inter, sans-serif" font-size="10" fill="#525252">Each labelled cDNA expands to many copies — every copy inherits the original UMI.</text>

    <!-- Bracketed groups -->
    <g transform="translate(0, 34)">
      <!-- Group A1 -->
      <rect x="0" y="0" width="320" height="22" rx="3" fill="none" stroke="#1e3a8a" stroke-width="1"/>
      <text x="-6" y="15" text-anchor="end" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">A1×</text>
      <g font-family="JetBrains Mono, monospace" font-size="9" fill="#ffffff">
        <rect x="6"   y="3" width="46" height="16" fill="#1e3a8a"/><text x="29"  y="15" text-anchor="middle">CB07·A1</text>
        <rect x="60"  y="3" width="46" height="16" fill="#1e3a8a"/><text x="83"  y="15" text-anchor="middle">CB07·A1</text>
        <rect x="114" y="3" width="46" height="16" fill="#1e3a8a"/><text x="137" y="15" text-anchor="middle">CB07·A1</text>
        <rect x="168" y="3" width="46" height="16" fill="#1e3a8a"/><text x="191" y="15" text-anchor="middle">CB07·A1</text>
        <rect x="222" y="3" width="46" height="16" fill="#1e3a8a"/><text x="245" y="15" text-anchor="middle">CB07·A1</text>
        <text x="290" y="15" text-anchor="middle" fill="#525252" font-style="italic">… ×64</text>
      </g>
      <text x="330" y="15" font-family="Inter, sans-serif" font-size="9" fill="#525252">64 reads, same UMI</text>

      <!-- Group B2 -->
      <rect x="0" y="32" width="320" height="22" rx="3" fill="none" stroke="#1e3a8a" stroke-width="1"/>
      <text x="-6" y="47" text-anchor="end" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">B2×</text>
      <g font-family="JetBrains Mono, monospace" font-size="9" fill="#ffffff">
        <rect x="6"   y="35" width="46" height="16" fill="#b45309"/><text x="29"  y="47" text-anchor="middle">CB07·B2</text>
        <rect x="60"  y="35" width="46" height="16" fill="#b45309"/><text x="83"  y="47" text-anchor="middle">CB07·B2</text>
        <rect x="114" y="35" width="46" height="16" fill="#b45309"/><text x="137" y="47" text-anchor="middle">CB07·B2</text>
        <text x="220" y="47" text-anchor="middle" fill="#525252" font-style="italic">… ×128</text>
      </g>
      <text x="330" y="47" font-family="Inter, sans-serif" font-size="9" fill="#525252">128 reads, same UMI</text>

      <!-- Group C3 -->
      <rect x="0" y="64" width="320" height="22" rx="3" fill="none" stroke="#1e3a8a" stroke-width="1"/>
      <text x="-6" y="79" text-anchor="end" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">C3×</text>
      <g font-family="JetBrains Mono, monospace" font-size="9" fill="#ffffff">
        <rect x="6"   y="67" width="46" height="16" fill="#065f46"/><text x="29"  y="79" text-anchor="middle">CB07·C3</text>
        <rect x="60"  y="67" width="46" height="16" fill="#065f46"/><text x="83"  y="79" text-anchor="middle">CB07·C3</text>
        <text x="180" y="79" text-anchor="middle" fill="#525252" font-style="italic">… ×17</text>
      </g>
      <text x="330" y="79" font-family="Inter, sans-serif" font-size="9" fill="#525252">17 reads, same UMI</text>
    </g>

    <text x="0" y="148" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252">PCR factor is uncontrolled. Naive read counts would inflate by 7×, 43×, 5.7× for the same three molecules.</text>
  </g>

  <!-- Arrow to collapse table -->
  <line x1="240" y1="320" x2="240" y2="368" stroke="#1e3a8a" stroke-width="1.4" marker-end="url(#tri-cobalt-f1)"/>
  <text x="252" y="345" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#1e3a8a">collapse on (CB, UMI)</text>

  <!-- ============ STAGE 3: collapse table ============ -->
  <g transform="translate(60, 380)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">STAGE 3 — POST-SEQUENCING DEDUPLICATION</text>
    <text x="0" y="16" font-family="Inter, sans-serif" font-size="10" fill="#525252">Group reads by (cell barcode, UMI). Each unique key counts as one original molecule, regardless of read count.</text>

    <!-- Read pool -->
    <g transform="translate(0, 36)">
      <rect x="0" y="0" width="500" height="160" rx="4" fill="#ffffff" stroke="#e5e3dc" stroke-width="1"/>
      <text x="12" y="18" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">READ POOL (209 READS TOTAL)</text>

      <g font-family="JetBrains Mono, monospace" font-size="9.5" fill="#0a0a0a">
        <text x="12"  y="40">read_001  CB07  A1  …ACGT…   gene G1</text>
        <text x="12"  y="56">read_002  CB07  A1  …ACGT…   gene G1   (duplicate of 001)</text>
        <text x="12"  y="72">read_003  CB07  B2  …GTCA…   gene G1</text>
        <text x="12"  y="88">read_004  CB07  A1  …ACGT…   gene G1   (duplicate)</text>
        <text x="12"  y="104">read_005  CB07  C3  …TTGC…   gene G2</text>
        <text x="12"  y="120">read_006  CB07  B2  …GTCA…   gene G1   (duplicate)</text>
        <text x="12"  y="136" fill="#525252" font-style="italic">…  +203 more reads, mostly duplicates of A1 / B2 / C3 …</text>
      </g>
    </g>

    <!-- Arrow -->
    <line x1="514" y1="120" x2="554" y2="120" stroke="#1e3a8a" stroke-width="1.4" marker-end="url(#tri-cobalt-f1)"/>

    <!-- Collapsed UMI table -->
    <g transform="translate(566, 36)">
      <rect x="0" y="0" width="380" height="160" rx="4" fill="#ffffff" stroke="#065f46" stroke-width="1.5"/>
      <text x="12" y="18" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#065f46" letter-spacing="0.06em">UNIQUE (CB, UMI) KEYS · CELL CB07</text>

      <g font-family="JetBrains Mono, monospace" font-size="10.5" fill="#0a0a0a">
        <text x="12"  y="44">key             gene   reads   counted as</text>
        <line x1="12" y1="50" x2="368" y2="50" stroke="#e5e3dc" stroke-width="0.8"/>
        <text x="12"  y="66">CB07·A1         G1     64       1 mRNA</text>
        <text x="12"  y="84">CB07·B2         G1     128      1 mRNA</text>
        <text x="12"  y="102">CB07·C3         G2     17       1 mRNA</text>
      </g>
      <line x1="12" y1="116" x2="368" y2="116" stroke="#e5e3dc" stroke-width="0.8"/>
      <text x="12" y="134" font-family="Inter, sans-serif" font-size="10" fill="#525252">cell CB07 final count</text>
      <text x="200" y="134" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#065f46">G1 = 2  ·  G2 = 1</text>
      <text x="12" y="150" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">209 reads collapse to 3 molecules</text>
    </g>
  </g>

  <!-- Bottom: formula + framing -->
  <g transform="translate(60, 600)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">FORMAL VIEW</text>
    <text x="80" y="0" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#0a0a0a">count(cell c, gene g) = |{ UMI : ∃ read r, r.CB = c, r.gene = g, r.UMI = UMI }|</text>
    <text x="0" y="20" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252">Reads collapse into a set; cardinality of the set is the molecule count. Independent of amplification factor — provided the UMI space is large enough that collisions are rare (4^10 ≈ 10^6 UMIs versus ~10^4 molecules per cell).</text>
  </g>
</svg>
