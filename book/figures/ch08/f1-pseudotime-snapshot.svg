<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="t d">
  <title id="t">Pseudotime — from snapshot to ordering</title>
  <desc id="d">A two-panel figure. The left panel shows an asynchronous population of about 160 cells scattered along a curving trajectory in a 2D UMAP embedding, all coloured the same muted grey to emphasise that the trajectory is invisible in raw data. The right panel shows the same cells recoloured by inferred pseudotime, with a smooth principal curve overlaid running from a labelled "root" cluster at one end to a labelled "leaf" cluster at the other. A horizontal axis below the right panel maps pseudotime from 0 to 1. Annotations highlight the ergodicity assumption: cells at every point along the trajectory are sampled simultaneously.</desc>

  <defs>
    <marker id="arrow-accent-1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
    <linearGradient id="ptime-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="560" fill="#fafaf9"/>

  <!-- Header strip -->
  <g>
    <text x="60" y="38" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">FROM ASYNCHRONOUS SNAPSHOT TO PSEUDOTIME ORDERING</text>
    <text x="60" y="56" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">A continuous trajectory, densely sampled in one moment — population averaging stands in for time averaging.</text>
  </g>

  <!-- ========== LEFT PANEL: raw snapshot ========== -->
  <g transform="translate(60, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(A)  RAW SNAPSHOT</text>
    <text x="0" y="18" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">one sampling moment, no obvious order</text>

    <rect x="0" y="34" width="500" height="380" fill="#ffffff" stroke="#e5e3dc" stroke-width="1"/>

    <!-- axes (UMAP labels) -->
    <text x="250" y="438" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" text-anchor="middle">UMAP-1</text>
    <text x="-44" y="224" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" text-anchor="middle" transform="rotate(-90, -44, 224)">UMAP-2</text>

    <!-- Cells along an invisible curve. Path: starts (60, 320) - sweeps up and right to (440, 80). -->
    <!-- We render ~160 grey dots near this curve. -->
    <g fill="#525252" opacity="0.85">
      <!-- Block 1: start cluster -->
      <circle cx="70"  cy="330" r="3.2"/>
      <circle cx="78"  cy="320" r="3.2"/>
      <circle cx="74"  cy="312" r="3.2"/>
      <circle cx="86"  cy="328" r="3.2"/>
      <circle cx="90"  cy="316" r="3.2"/>
      <circle cx="82"  cy="304" r="3.2"/>
      <circle cx="100" cy="318" r="3.2"/>
      <circle cx="104" cy="306" r="3.2"/>
      <circle cx="92"  cy="298" r="3.2"/>
      <circle cx="110" cy="296" r="3.2"/>
      <circle cx="118" cy="308" r="3.2"/>
      <circle cx="98"  cy="288" r="3.2"/>
      <circle cx="106" cy="282" r="3.2"/>
      <circle cx="120" cy="290" r="3.2"/>
      <circle cx="124" cy="278" r="3.2"/>

      <!-- Block 2: along the curve -->
      <circle cx="136" cy="278" r="3.0"/>
      <circle cx="140" cy="268" r="3.0"/>
      <circle cx="148" cy="262" r="3.0"/>
      <circle cx="154" cy="254" r="3.0"/>
      <circle cx="160" cy="262" r="3.0"/>
      <circle cx="166" cy="250" r="3.0"/>
      <circle cx="170" cy="242" r="3.0"/>
      <circle cx="174" cy="252" r="3.0"/>
      <circle cx="178" cy="236" r="3.0"/>
      <circle cx="184" cy="228" r="3.0"/>
      <circle cx="190" cy="236" r="3.0"/>
      <circle cx="196" cy="220" r="3.0"/>
      <circle cx="202" cy="212" r="3.0"/>
      <circle cx="208" cy="222" r="3.0"/>
      <circle cx="214" cy="204" r="3.0"/>
      <circle cx="220" cy="196" r="3.0"/>
      <circle cx="226" cy="206" r="3.0"/>
      <circle cx="232" cy="188" r="3.0"/>
      <circle cx="240" cy="180" r="3.0"/>
      <circle cx="244" cy="190" r="3.0"/>
      <circle cx="248" cy="172" r="3.0"/>
      <circle cx="256" cy="166" r="3.0"/>
      <circle cx="262" cy="174" r="3.0"/>
      <circle cx="266" cy="160" r="3.0"/>
      <circle cx="274" cy="152" r="3.0"/>
      <circle cx="280" cy="160" r="3.0"/>
      <circle cx="284" cy="146" r="3.0"/>
      <circle cx="292" cy="140" r="3.0"/>
      <circle cx="298" cy="148" r="3.0"/>
      <circle cx="302" cy="134" r="3.0"/>
      <circle cx="310" cy="126" r="3.0"/>
      <circle cx="316" cy="134" r="3.0"/>

      <!-- Block 3: end cluster -->
      <circle cx="324" cy="120" r="3.2"/>
      <circle cx="330" cy="110" r="3.2"/>
      <circle cx="338" cy="118" r="3.2"/>
      <circle cx="342" cy="104" r="3.2"/>
      <circle cx="350" cy="98"  r="3.2"/>
      <circle cx="356" cy="108" r="3.2"/>
      <circle cx="360" cy="92"  r="3.2"/>
      <circle cx="368" cy="86"  r="3.2"/>
      <circle cx="374" cy="98"  r="3.2"/>
      <circle cx="380" cy="80"  r="3.2"/>
      <circle cx="388" cy="88"  r="3.2"/>
      <circle cx="396" cy="80"  r="3.2"/>
      <circle cx="404" cy="92"  r="3.2"/>
      <circle cx="410" cy="76"  r="3.2"/>
      <circle cx="418" cy="84"  r="3.2"/>
      <circle cx="426" cy="70"  r="3.2"/>
      <circle cx="432" cy="80"  r="3.2"/>
      <circle cx="440" cy="74"  r="3.2"/>

      <!-- Scatter noise around the curve -->
      <circle cx="160" cy="282" r="2.6" opacity="0.6"/>
      <circle cx="200" cy="246" r="2.6" opacity="0.6"/>
      <circle cx="246" cy="206" r="2.6" opacity="0.6"/>
      <circle cx="288" cy="172" r="2.6" opacity="0.6"/>
      <circle cx="330" cy="142" r="2.6" opacity="0.6"/>
      <circle cx="372" cy="116" r="2.6" opacity="0.6"/>
      <circle cx="414" cy="106" r="2.6" opacity="0.6"/>
      <circle cx="148" cy="240" r="2.6" opacity="0.6"/>
      <circle cx="194" cy="200" r="2.6" opacity="0.6"/>
      <circle cx="238" cy="158" r="2.6" opacity="0.6"/>
      <circle cx="282" cy="120" r="2.6" opacity="0.6"/>
      <circle cx="322" cy="84"  r="2.6" opacity="0.6"/>
    </g>

    <!-- Annotation: invisible trajectory -->
    <text x="160" y="358" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85" font-style="italic">cells at every position along an unobserved trajectory</text>

    <!-- Dashed bracket spanning the cells -->
    <path d="M 60 388 L 60 392 L 440 392 L 440 388" stroke="#1e3a8a" stroke-width="1" fill="none" stroke-dasharray="3 3"/>
    <text x="250" y="408" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" text-anchor="middle">one sampling moment ·  N ≈ 160 cells</text>
  </g>

  <!-- ========== RIGHT PANEL: pseudotime-coloured ========== -->
  <g transform="translate(640, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(B)  PSEUDOTIME ORDERING</text>
    <text x="0" y="18" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">same cells, principal curve, scalar pseudotime per cell</text>

    <rect x="0" y="34" width="500" height="380" fill="#ffffff" stroke="#e5e3dc" stroke-width="1"/>

    <text x="250" y="438" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" text-anchor="middle">UMAP-1</text>
    <text x="-44" y="224" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" text-anchor="middle" transform="rotate(-90, -44, 224)">UMAP-2</text>

    <!-- Principal curve through the cloud (cobalt) -->
    <path d="M 70 326 Q 160 280, 200 220 T 300 130 T 440 74"
          stroke="#1e3a8a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Cells coloured by pseudotime: cobalt -> violet -> amber -->
    <g>
      <!-- start (cobalt, low ptime) -->
      <circle cx="70"  cy="330" r="3.2" fill="#1e3a8a"/>
      <circle cx="78"  cy="320" r="3.2" fill="#1e3a8a"/>
      <circle cx="74"  cy="312" r="3.2" fill="#1e3a8a"/>
      <circle cx="86"  cy="328" r="3.2" fill="#1e3a8a"/>
      <circle cx="90"  cy="316" r="3.2" fill="#1e3a8a"/>
      <circle cx="82"  cy="304" r="3.2" fill="#1e3a8a"/>
      <circle cx="100" cy="318" r="3.2" fill="#2563eb"/>
      <circle cx="104" cy="306" r="3.2" fill="#2563eb"/>
      <circle cx="92"  cy="298" r="3.2" fill="#2563eb"/>
      <circle cx="110" cy="296" r="3.2" fill="#2563eb"/>
      <circle cx="118" cy="308" r="3.2" fill="#2563eb"/>
      <circle cx="98"  cy="288" r="3.2" fill="#2563eb"/>
      <circle cx="106" cy="282" r="3.2" fill="#2563eb"/>
      <circle cx="120" cy="290" r="3.2" fill="#2563eb"/>
      <circle cx="124" cy="278" r="3.2" fill="#2563eb"/>

      <!-- mid-1 (violet) -->
      <circle cx="136" cy="278" r="3.0" fill="#7c3aed"/>
      <circle cx="140" cy="268" r="3.0" fill="#7c3aed"/>
      <circle cx="148" cy="262" r="3.0" fill="#7c3aed"/>
      <circle cx="154" cy="254" r="3.0" fill="#7c3aed"/>
      <circle cx="160" cy="262" r="3.0" fill="#7c3aed"/>
      <circle cx="166" cy="250" r="3.0" fill="#7c3aed"/>
      <circle cx="170" cy="242" r="3.0" fill="#7c3aed"/>
      <circle cx="174" cy="252" r="3.0" fill="#7c3aed"/>
      <circle cx="178" cy="236" r="3.0" fill="#7c3aed"/>
      <circle cx="184" cy="228" r="3.0" fill="#7c3aed"/>
      <circle cx="190" cy="236" r="3.0" fill="#7c3aed"/>
      <circle cx="196" cy="220" r="3.0" fill="#7c3aed"/>
      <circle cx="202" cy="212" r="3.0" fill="#7c3aed"/>
      <circle cx="208" cy="222" r="3.0" fill="#7c3aed"/>

      <!-- mid-2 (violet -> amber) -->
      <circle cx="214" cy="204" r="3.0" fill="#9333ea"/>
      <circle cx="220" cy="196" r="3.0" fill="#9333ea"/>
      <circle cx="226" cy="206" r="3.0" fill="#9333ea"/>
      <circle cx="232" cy="188" r="3.0" fill="#9333ea"/>
      <circle cx="240" cy="180" r="3.0" fill="#9333ea"/>
      <circle cx="244" cy="190" r="3.0" fill="#9333ea"/>
      <circle cx="248" cy="172" r="3.0" fill="#9333ea"/>
      <circle cx="256" cy="166" r="3.0" fill="#a855f7"/>
      <circle cx="262" cy="174" r="3.0" fill="#a855f7"/>
      <circle cx="266" cy="160" r="3.0" fill="#a855f7"/>
      <circle cx="274" cy="152" r="3.0" fill="#a855f7"/>
      <circle cx="280" cy="160" r="3.0" fill="#a855f7"/>
      <circle cx="284" cy="146" r="3.0" fill="#c2410c"/>
      <circle cx="292" cy="140" r="3.0" fill="#c2410c"/>
      <circle cx="298" cy="148" r="3.0" fill="#c2410c"/>
      <circle cx="302" cy="134" r="3.0" fill="#c2410c"/>
      <circle cx="310" cy="126" r="3.0" fill="#c2410c"/>
      <circle cx="316" cy="134" r="3.0" fill="#c2410c"/>

      <!-- end (amber) -->
      <circle cx="324" cy="120" r="3.2" fill="#b45309"/>
      <circle cx="330" cy="110" r="3.2" fill="#b45309"/>
      <circle cx="338" cy="118" r="3.2" fill="#b45309"/>
      <circle cx="342" cy="104" r="3.2" fill="#b45309"/>
      <circle cx="350" cy="98"  r="3.2" fill="#b45309"/>
      <circle cx="356" cy="108" r="3.2" fill="#b45309"/>
      <circle cx="360" cy="92"  r="3.2" fill="#b45309"/>
      <circle cx="368" cy="86"  r="3.2" fill="#b45309"/>
      <circle cx="374" cy="98"  r="3.2" fill="#b45309"/>
      <circle cx="380" cy="80"  r="3.2" fill="#b45309"/>
      <circle cx="388" cy="88"  r="3.2" fill="#b45309"/>
      <circle cx="396" cy="80"  r="3.2" fill="#b45309"/>
      <circle cx="404" cy="92"  r="3.2" fill="#b45309"/>
      <circle cx="410" cy="76"  r="3.2" fill="#b45309"/>
      <circle cx="418" cy="84"  r="3.2" fill="#b45309"/>
      <circle cx="426" cy="70"  r="3.2" fill="#b45309"/>
      <circle cx="432" cy="80"  r="3.2" fill="#b45309"/>
      <circle cx="440" cy="74"  r="3.2" fill="#b45309"/>
    </g>

    <!-- root / leaf labels -->
    <circle cx="74" cy="320" r="14" fill="none" stroke="#1e3a8a" stroke-width="1.5" stroke-dasharray="4 2"/>
    <text x="32" y="356" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a">root  (t = 0)</text>

    <circle cx="430" cy="78" r="14" fill="none" stroke="#b45309" stroke-width="1.5" stroke-dasharray="4 2"/>
    <text x="380" y="60" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#b45309">leaf  (t = 1)</text>

    <!-- Pseudotime gradient legend -->
    <g transform="translate(0, 388)">
      <rect x="60" y="0" width="380" height="12" fill="url(#ptime-grad)" stroke="#525252" stroke-width="0.5"/>
      <text x="60"  y="32" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252" text-anchor="start">0.0</text>
      <text x="250" y="32" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" text-anchor="middle">pseudotime  (arc-length along principal curve)</text>
      <text x="440" y="32" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252" text-anchor="end">1.0</text>
    </g>
  </g>

  <!-- Bottom annotation: the move -->
  <g transform="translate(60, 510)">
    <rect x="0" y="0" width="1080" height="38" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
    <text x="14" y="16" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">THE MOVE</text>
    <text x="14" y="32" font-family="Inter, sans-serif" font-size="10.5" fill="#0a0a0a">If the population is asynchronous and the trajectory is continuous, the snapshot's distribution over states equals the time-distribution of any single cell. Population average stands in for time average — exactly the ergodic move in stat mech.</text>
  </g>
</svg>
