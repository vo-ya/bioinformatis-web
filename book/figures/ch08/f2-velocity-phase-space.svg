<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="t d">
  <title id="t">RNA velocity in the spliced-versus-unspliced phase plane</title>
  <desc id="d">A phase-plane scatter for a single gene, with the x-axis showing spliced mRNA count s and the y-axis showing unspliced mRNA count u. A dashed diagonal line labelled "steady-state line u equals gamma over beta times s" crosses the plane. Cells lying close to the line are coloured grey and labelled "steady state". Cells above the line are coloured cobalt and labelled "inducing — du and ds positive". Cells below the line are coloured amber and labelled "repressing — du and ds negative". A short vertical arrow from one example cell to its projection on the steady-state line is annotated "v_s = beta u − gamma s". A small inset to the right shows the two ODEs of the dynamical model with rate-arrow notation.</desc>

  <defs>
    <marker id="arrow-cobalt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="620" fill="#fafaf9"/>

  <!-- Header -->
  <g>
    <text x="60" y="38" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">VELOCITY = THE RESIDUAL FROM THE STEADY-STATE LINE</text>
    <text x="60" y="56" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">One gene, one phase plane. Fit the line; the vertical residual is the velocity.</text>
  </g>

  <!-- ========== PHASE PLANE (main panel) ========== -->
  <g transform="translate(80, 100)">
    <!-- Plot frame -->
    <rect x="0" y="0" width="640" height="460" fill="#ffffff" stroke="#e5e3dc" stroke-width="1"/>

    <!-- axes -->
    <line x1="60" y1="20"  x2="60"  y2="420" stroke="#374151" stroke-width="1"/>
    <line x1="60" y1="420" x2="600" y2="420" stroke="#374151" stroke-width="1"/>

    <!-- axis labels -->
    <text x="330" y="450" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#525252" text-anchor="middle">spliced mRNA  s  (mature)</text>
    <text x="22" y="220" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#525252" text-anchor="middle" transform="rotate(-90, 22, 220)">unspliced mRNA  u  (pre-mRNA)</text>

    <!-- gridlines -->
    <g stroke="#e5e3dc" stroke-width="0.5" stroke-dasharray="2 3">
      <line x1="60" y1="340" x2="600" y2="340"/>
      <line x1="60" y1="260" x2="600" y2="260"/>
      <line x1="60" y1="180" x2="600" y2="180"/>
      <line x1="60" y1="100" x2="600" y2="100"/>
      <line x1="160" y1="20" x2="160" y2="420"/>
      <line x1="260" y1="20" x2="260" y2="420"/>
      <line x1="360" y1="20" x2="360" y2="420"/>
      <line x1="460" y1="20" x2="460" y2="420"/>
      <line x1="560" y1="20" x2="560" y2="420"/>
    </g>

    <!-- Tick labels (just origin and end for cleanliness) -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85">
      <text x="60"  y="436" text-anchor="middle">0</text>
      <text x="600" y="436" text-anchor="middle">smax</text>
      <text x="50"  y="424" text-anchor="end">0</text>
      <text x="50"  y="24"  text-anchor="end">umax</text>
    </g>

    <!-- Steady-state line: slope gamma/beta. Pass through origin. -->
    <!-- Going from (60, 420) toward (560, 60). -->
    <line x1="60" y1="420" x2="560" y2="60" stroke="#374151" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="520" y="56" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#374151" text-anchor="end">u = (γ/β) · s</text>
    <text x="520" y="72" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252" text-anchor="end">steady-state line</text>

    <!-- "Inducing" region label -->
    <text x="200" y="100" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">INDUCING</text>
    <text x="200" y="116" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#1e3a8a">u above the line  →  s about to rise</text>

    <!-- "Repressing" region label -->
    <text x="400" y="372" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#b45309" letter-spacing="0.06em">REPRESSING</text>
    <text x="400" y="388" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#b45309">u below the line  →  s about to fall</text>

    <!-- Cells scattered around the line -->
    <!-- Steady-state cells (grey, near the line) -->
    <g fill="#525252" opacity="0.75">
      <circle cx="120" cy="370" r="3.2"/>
      <circle cx="160" cy="346" r="3.2"/>
      <circle cx="180" cy="334" r="3.2"/>
      <circle cx="200" cy="318" r="3.2"/>
      <circle cx="240" cy="294" r="3.2"/>
      <circle cx="280" cy="274" r="3.2"/>
      <circle cx="320" cy="244" r="3.2"/>
      <circle cx="370" cy="216" r="3.2"/>
      <circle cx="400" cy="200" r="3.2"/>
      <circle cx="440" cy="174" r="3.2"/>
      <circle cx="480" cy="150" r="3.2"/>
      <circle cx="520" cy="118" r="3.2"/>
      <circle cx="540" cy="106" r="3.2"/>
      <circle cx="100" cy="380" r="3.2"/>
      <circle cx="130" cy="360" r="3.2"/>
      <circle cx="260" cy="282" r="3.2"/>
    </g>

    <!-- Inducing cells (cobalt, above line) -->
    <g fill="#1e3a8a">
      <circle cx="140" cy="296" r="3.6"/>
      <circle cx="160" cy="260" r="3.6"/>
      <circle cx="180" cy="230" r="3.6"/>
      <circle cx="200" cy="244" r="3.6"/>
      <circle cx="220" cy="210" r="3.6"/>
      <circle cx="250" cy="186" r="3.6"/>
      <circle cx="270" cy="200" r="3.6"/>
      <circle cx="290" cy="160" r="3.6"/>
      <circle cx="310" cy="178" r="3.6"/>
      <circle cx="340" cy="140" r="3.6"/>
      <circle cx="370" cy="120" r="3.6"/>
      <circle cx="400" cy="100" r="3.6"/>
    </g>

    <!-- Repressing cells (amber, below line) -->
    <g fill="#b45309">
      <circle cx="200" cy="388" r="3.6"/>
      <circle cx="240" cy="370" r="3.6"/>
      <circle cx="280" cy="358" r="3.6"/>
      <circle cx="320" cy="342" r="3.6"/>
      <circle cx="350" cy="326" r="3.6"/>
      <circle cx="390" cy="312" r="3.6"/>
      <circle cx="420" cy="290" r="3.6"/>
      <circle cx="460" cy="270" r="3.6"/>
      <circle cx="490" cy="252" r="3.6"/>
      <circle cx="520" cy="232" r="3.6"/>
      <circle cx="550" cy="216" r="3.6"/>
      <circle cx="370" cy="332" r="3.6"/>
    </g>

    <!-- Worked example: highlight one inducing cell and draw v_s residual to the line -->
    <!-- Example cell at (290, 160) — inducing. The steady-state line at s = 290-60 = 230 of axis-x gives line height: x progresses 60->560, y 420->60. At x=290, fraction = (290-60)/500=0.46, y_line = 420 - 0.46*360 = 420 - 165.6 = 254.4. So the line is at y ≈ 254 when s position is x=290. -->
    <circle cx="290" cy="160" r="6" fill="none" stroke="#1e3a8a" stroke-width="2"/>
    <line x1="290" y1="160" x2="290" y2="254" stroke="#1e3a8a" stroke-width="2"
          marker-end="url(#arrow-cobalt)"/>
    <text x="298" y="200" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#1e3a8a">v_s = β u − γ s</text>
    <text x="298" y="216" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252">vertical residual = velocity</text>

    <!-- Worked example: a repressing cell with residual pointing up -->
    <circle cx="460" cy="270" r="6" fill="none" stroke="#b45309" stroke-width="2"/>
    <!-- line at s=460-60=400 (x=460), fraction=0.8, y_line = 420 - 0.8*360 = 132. So arrow from y=270 up to y=132. -->
    <line x1="460" y1="270" x2="460" y2="132" stroke="#b45309" stroke-width="2"
          marker-end="url(#arrow-amber)"/>
    <text x="468" y="220" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#b45309">v_s &lt; 0</text>
    <text x="468" y="236" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252">gene is turning down</text>
  </g>

  <!-- ========== RIGHT INSET: ODE model ========== -->
  <g transform="translate(770, 100)">
    <rect x="0" y="0" width="370" height="200" fill="#ffffff" stroke="#1e3a8a" stroke-width="1.5" rx="4"/>
    <text x="14" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">TWO-COMPARTMENT KINETIC MODEL</text>

    <!-- Compartment diagram -->
    <g transform="translate(20, 50)">
      <rect x="0" y="0" width="80" height="40" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
      <text x="40" y="18" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#1e3a8a" text-anchor="middle">u</text>
      <text x="40" y="34" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">pre-mRNA</text>

      <rect x="180" y="0" width="80" height="40" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
      <text x="220" y="18" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#1e3a8a" text-anchor="middle">s</text>
      <text x="220" y="34" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">mature mRNA</text>

      <!-- alpha in -->
      <line x1="-44" y1="20" x2="-4" y2="20" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow-muted)"/>
      <text x="-24" y="14" font-family="JetBrains Mono, monospace" font-size="11" fill="#374151" text-anchor="middle">α</text>

      <!-- u -> s -->
      <line x1="84" y1="20" x2="176" y2="20" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow-muted)"/>
      <text x="130" y="14" font-family="JetBrains Mono, monospace" font-size="11" fill="#374151" text-anchor="middle">β</text>

      <!-- s -> dec -->
      <line x1="264" y1="20" x2="320" y2="20" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow-muted)"/>
      <text x="292" y="14" font-family="JetBrains Mono, monospace" font-size="11" fill="#374151" text-anchor="middle">γ</text>
      <text x="324" y="24" font-family="Inter, sans-serif" font-size="9" fill="#525252">∅</text>
    </g>

    <!-- ODEs -->
    <g transform="translate(20, 124)">
      <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="12" fill="#0a0a0a">du/dt = α − β u</text>
      <text x="0" y="20" font-family="JetBrains Mono, monospace" font-size="12" fill="#0a0a0a">ds/dt = β u − γ s</text>
      <text x="0" y="46" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252">Steady state: u/s = γ/β  (the dashed line at left)</text>
    </g>
  </g>

  <!-- Bottom strip: legend + key statement -->
  <g transform="translate(80, 580)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">LEGEND</text>
    <circle cx="72"  cy="-4" r="4" fill="#1e3a8a"/>
    <text   x="82"  y="0"  font-family="Inter, sans-serif" font-size="10" fill="#525252">inducing  (v_s &gt; 0)</text>
    <circle cx="222" cy="-4" r="4" fill="#525252" opacity="0.75"/>
    <text   x="232" y="0"  font-family="Inter, sans-serif" font-size="10" fill="#525252">steady state</text>
    <circle cx="342" cy="-4" r="4" fill="#b45309"/>
    <text   x="352" y="0"  font-family="Inter, sans-serif" font-size="10" fill="#525252">repressing  (v_s &lt; 0)</text>
    <text   x="540" y="0" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252">Per-cell velocity = vertical distance from the steady-state line, summed across genes.</text>
  </g>
</svg>
