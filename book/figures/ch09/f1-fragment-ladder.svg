<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="t d">
  <title id="t">ATAC-seq fragment-length distribution showing the nucleosome ladder</title>
  <desc id="d">A log-density histogram of fragment lengths from a typical ATAC-seq sample plotted against fragment length on a linear x-axis from 0 to 1000 bp. The curve shows four distinct modes: a tall sub-nucleosomal peak below 100 bp, a clear mono-nucleosomal peak near 180 bp, a smaller di-nucleosomal peak near 330 bp, and a faint tri-nucleosomal peak near 500 bp. Overlaid as a dashed amber curve, a typical sonicated ChIP-seq library shows a single smooth log-normal mode near 300 bp without any laddering. Annotations identify each mode with its biological origin: nucleosome-free linker DNA, one nucleosome wrapped, two nucleosomes wrapped, three nucleosomes wrapped.</desc>

  <rect x="0" y="0" width="1200" height="600" fill="#fafaf9"/>

  <!-- Header -->
  <g>
    <text x="60" y="40" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">ATAC-SEQ FRAGMENT-LENGTH LADDER</text>
    <text x="60" y="58" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">The first quality check: each mode corresponds to a number of nucleosomes spanned</text>
  </g>

  <!-- Chart frame -->
  <g transform="translate(80, 100)">
    <rect x="0" y="0" width="1040" height="380" fill="#ffffff" stroke="#e5e3dc" stroke-width="1"/>

    <!-- y axis -->
    <line x1="60" y1="20" x2="60" y2="340" stroke="#374151" stroke-width="1.5"/>
    <!-- x axis -->
    <line x1="60" y1="340" x2="1020" y2="340" stroke="#374151" stroke-width="1.5"/>

    <!-- y-axis ticks (log) -->
    <g font-family="Inter, sans-serif" font-size="10" fill="#525252">
      <line x1="56" y1="340" x2="60" y2="340" stroke="#374151"/>
      <text x="50" y="343" text-anchor="end">10²</text>
      <line x1="56" y1="260" x2="60" y2="260" stroke="#374151"/>
      <text x="50" y="263" text-anchor="end">10³</text>
      <line x1="56" y1="180" x2="60" y2="180" stroke="#374151"/>
      <text x="50" y="183" text-anchor="end">10⁴</text>
      <line x1="56" y1="100" x2="60" y2="100" stroke="#374151"/>
      <text x="50" y="103" text-anchor="end">10⁵</text>
      <line x1="56" y1="20" x2="60" y2="20" stroke="#374151"/>
      <text x="50" y="23" text-anchor="end">10⁶</text>
    </g>
    <text x="20" y="180" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#525252" transform="rotate(-90, 20, 180)" text-anchor="middle">fragments per bin (log)</text>

    <!-- x-axis ticks -->
    <g font-family="Inter, sans-serif" font-size="10" fill="#525252">
      <line x1="60"   y1="340" x2="60"   y2="344" stroke="#374151"/>
      <text x="60"    y="358" text-anchor="middle">0</text>
      <line x1="252"  y1="340" x2="252"  y2="344" stroke="#374151"/>
      <text x="252"   y="358" text-anchor="middle">200</text>
      <line x1="444"  y1="340" x2="444"  y2="344" stroke="#374151"/>
      <text x="444"   y="358" text-anchor="middle">400</text>
      <line x1="636"  y1="340" x2="636"  y2="344" stroke="#374151"/>
      <text x="636"   y="358" text-anchor="middle">600</text>
      <line x1="828"  y1="340" x2="828"  y2="344" stroke="#374151"/>
      <text x="828"   y="358" text-anchor="middle">800</text>
      <line x1="1020" y1="340" x2="1020" y2="344" stroke="#374151"/>
      <text x="1020"  y="358" text-anchor="middle">1000</text>
    </g>
    <text x="540" y="372" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#525252" text-anchor="middle">fragment length (bp)</text>

    <!-- ChIP-seq dashed log-normal: mode near 300 bp, no laddering -->
    <!-- amber dashed; broad single hump centred ~300 bp -->
    <path d="M 60 340
             Q 100 320, 150 285
             Q 200 215, 252 165
             Q 290 130, 336 122
             Q 380 130, 444 165
             Q 500 215, 560 270
             Q 620 310, 700 330
             L 1020 340"
          fill="none" stroke="#b45309" stroke-width="1.7" stroke-dasharray="6 4"/>

    <!-- ATAC-seq solid: multi-modal with peaks at ~50, ~180, ~330, ~500 -->
    <!-- Use piecewise smoothed bezier shape -->
    <path d="M 60 340
             L 70 90
             Q 90 70, 105 65
             Q 130 60, 160 95
             Q 200 145, 244 195
             Q 260 175, 280 140
             Q 305 105, 332 125
             Q 360 160, 400 220
             Q 430 260, 460 245
             Q 490 215, 528 220
             Q 560 230, 600 270
             Q 640 305, 695 320
             Q 760 332, 830 336
             Q 920 338, 1020 340"
          fill="none" stroke="#1e3a8a" stroke-width="2.2"/>

    <!-- Mode annotations -->
    <!-- Sub-nucleosomal (peak near x=70-80, y=75) -->
    <line x1="76" y1="90" x2="76" y2="40" stroke="#1e3a8a" stroke-width="1" stroke-dasharray="3 2"/>
    <circle cx="76" cy="90" r="4" fill="#1e3a8a"/>
    <g transform="translate(76, 36)">
      <rect x="-72" y="-30" width="200" height="34" rx="3" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
      <text x="-66" y="-16" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">SUB-NUCLEOSOMAL</text>
      <text x="-66" y="-4" font-family="Inter, sans-serif" font-size="9" fill="#525252">&lt; 100 bp · open linker DNA</text>
    </g>

    <!-- Mono-nucleosomal (peak ~180, y=130) -->
    <line x1="232" y1="135" x2="232" y2="80" stroke="#1e3a8a" stroke-width="1" stroke-dasharray="3 2"/>
    <circle cx="232" cy="135" r="4" fill="#1e3a8a"/>
    <g transform="translate(232, 76)">
      <rect x="-80" y="-30" width="186" height="34" rx="3" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
      <text x="-74" y="-16" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">MONO-NUCLEOSOMAL</text>
      <text x="-74" y="-4" font-family="Inter, sans-serif" font-size="9" fill="#525252">~180 bp · 1 nucleosome</text>
    </g>

    <!-- Di-nucleosomal (peak ~330, y~125) -->
    <line x1="376" y1="158" x2="376" y2="40" stroke="#1e3a8a" stroke-width="1" stroke-dasharray="3 2"/>
    <circle cx="376" cy="158" r="4" fill="#1e3a8a"/>
    <g transform="translate(376, 36)">
      <rect x="-80" y="-30" width="170" height="34" rx="3" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
      <text x="-74" y="-16" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">DI-NUCLEOSOMAL</text>
      <text x="-74" y="-4" font-family="Inter, sans-serif" font-size="9" fill="#525252">~330 bp · 2 nucleosomes</text>
    </g>

    <!-- Tri-nucleosomal (peak ~500, y~230) -->
    <line x1="540" y1="225" x2="540" y2="80" stroke="#1e3a8a" stroke-width="1" stroke-dasharray="3 2"/>
    <circle cx="540" cy="225" r="4" fill="#1e3a8a"/>
    <g transform="translate(540, 76)">
      <rect x="-78" y="-30" width="170" height="34" rx="3" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
      <text x="-72" y="-16" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">TRI-NUCLEOSOMAL</text>
      <text x="-72" y="-4" font-family="Inter, sans-serif" font-size="9" fill="#525252">~500 bp · 3 nucleosomes</text>
    </g>

    <!-- ChIP label -->
    <g transform="translate(720, 200)">
      <line x1="0" y1="0" x2="-90" y2="80" stroke="#b45309" stroke-width="1" stroke-dasharray="3 2"/>
      <rect x="0" y="-12" width="200" height="32" rx="3" fill="#fef3c7" stroke="#b45309" stroke-width="0.8"/>
      <text x="6" y="2" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#b45309" letter-spacing="0.06em">CHIP-SEQ (SONICATED)</text>
      <text x="6" y="14" font-family="Inter, sans-serif" font-size="9" fill="#525252">single log-normal mode · no ladder</text>
    </g>

    <!-- ATAC label -->
    <g transform="translate(720, 280)">
      <line x1="0" y1="0" x2="-50" y2="50" stroke="#1e3a8a" stroke-width="1" stroke-dasharray="3 2"/>
      <rect x="0" y="-12" width="200" height="32" rx="3" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
      <text x="6" y="2" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">ATAC-SEQ</text>
      <text x="6" y="14" font-family="Inter, sans-serif" font-size="9" fill="#525252">multi-modal · nucleosomal ladder</text>
    </g>

  </g>

  <!-- Bottom interpretation strip -->
  <g transform="translate(80, 510)">
    <rect x="0" y="0" width="1040" height="64" rx="4" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>
    <text x="14" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">QC GATE</text>
    <text x="14" y="38" font-family="Inter, sans-serif" font-size="10" fill="#525252">Clean nucleosomal ladder: salvageable experiment. Absent ladder: failed library — too much / too little Tn5, degraded chromatin, or over-aggressive size selection.</text>
    <text x="14" y="54" font-family="Inter, sans-serif" font-size="10" fill="#525252">147 bp wrapped per nucleosome + ~20 bp linker on each side explains the spacing exactly.</text>
  </g>

</svg>
