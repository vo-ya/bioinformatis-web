<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="t d">
  <title id="t">MACS2 worked example: local Poisson detection at one candidate window</title>
  <desc id="d">A three-panel walkthrough of a single MACS2 peak call. The top panel shows a 30 kilobase genome coverage track with one sharp peak rising to 24 reads per 200 bp window above a low background, surrounded by nested concentric windows at one, five, and ten kilobases. The middle panel lists the five local Poisson rate estimates computed in those windows plus the genome-wide rate and the matched input control, with the maximum identified as the local lambda. The bottom panel shows the Poisson probability mass function at the chosen local lambda, with the observed count plotted as a marker on the extreme right tail; the tail probability is given as a numerical value far below the Benjamini-Hochberg threshold for whole-genome scans.</desc>

  <rect x="0" y="0" width="1200" height="700" fill="#fafaf9"/>

  <!-- Header -->
  <g>
    <text x="60" y="40" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">MACS2 — LOCAL POISSON DETECTION AT ONE CANDIDATE</text>
    <text x="60" y="58" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">Greatest-of CFAR on the genome's coverage track</text>
  </g>

  <!-- ============ PANEL 1: coverage track ============ -->
  <g transform="translate(60, 90)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(1)  COVERAGE  AND  NESTED  WINDOWS</text>
    <text x="0" y="18" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">30 kb of genome around the candidate; nested guard windows around the cell under test</text>

    <!-- Chart frame -->
    <g transform="translate(0, 30)">
      <rect x="0" y="0" width="1080" height="160" fill="#ffffff" stroke="#e5e3dc" stroke-width="1"/>

      <!-- y axis -->
      <line x1="60" y1="20" x2="60" y2="135" stroke="#374151" stroke-width="1.2"/>
      <line x1="60" y1="135" x2="1060" y2="135" stroke="#374151" stroke-width="1.2"/>

      <!-- y ticks -->
      <g font-family="Inter, sans-serif" font-size="9" fill="#525252">
        <line x1="56" y1="135" x2="60" y2="135" stroke="#374151"/>
        <text x="50" y="138" text-anchor="end">0</text>
        <line x1="56" y1="105" x2="60" y2="105" stroke="#374151"/>
        <text x="50" y="108" text-anchor="end">6</text>
        <line x1="56" y1="75" x2="60" y2="75" stroke="#374151"/>
        <text x="50" y="78" text-anchor="end">12</text>
        <line x1="56" y1="45" x2="60" y2="45" stroke="#374151"/>
        <text x="50" y="48" text-anchor="end">18</text>
        <line x1="56" y1="20" x2="60" y2="20" stroke="#374151"/>
        <text x="50" y="23" text-anchor="end">24</text>
      </g>
      <text x="14" y="74" font-family="Inter, sans-serif" font-size="10" fill="#525252" transform="rotate(-90, 14, 74)" text-anchor="middle">reads / 200 bp</text>

      <!-- x ticks -->
      <g font-family="Inter, sans-serif" font-size="9" fill="#525252">
        <line x1="60"   y1="135" x2="60"   y2="139" stroke="#374151"/>
        <text x="60"   y="152" text-anchor="middle">0</text>
        <line x1="227"  y1="135" x2="227"  y2="139" stroke="#374151"/>
        <text x="227"  y="152" text-anchor="middle">5</text>
        <line x1="393"  y1="135" x2="393"  y2="139" stroke="#374151"/>
        <text x="393"  y="152" text-anchor="middle">10</text>
        <line x1="560"  y1="135" x2="560"  y2="139" stroke="#374151"/>
        <text x="560"  y="152" text-anchor="middle">15</text>
        <line x1="727"  y1="135" x2="727"  y2="139" stroke="#374151"/>
        <text x="727"  y="152" text-anchor="middle">20</text>
        <line x1="893"  y1="135" x2="893"  y2="139" stroke="#374151"/>
        <text x="893"  y="152" text-anchor="middle">25</text>
        <line x1="1060" y1="135" x2="1060" y2="139" stroke="#374151"/>
        <text x="1060" y="152" text-anchor="middle">30</text>
      </g>
      <text x="560" y="162" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" text-anchor="middle">genome coordinate (kb)</text>

      <!-- Nested windows: 10kb, 5kb, 1kb (drawn first so the coverage sits on top visually) -->
      <!-- candidate centred at 15 kb -->
      <!-- 10kb window (10kb wide, x range 10..20kb in screen coords ~393..727) -->
      <rect x="393" y="20" width="334" height="115" fill="#f4f3ee" stroke="#8a8a85" stroke-width="0.6" stroke-dasharray="3 2"/>
      <text x="397" y="32" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" font-weight="700">10 kb</text>
      <!-- 5kb window (x range 12.5..17.5kb -> 477..643) -->
      <rect x="477" y="35" width="166" height="100" fill="#ebeae3" stroke="#8a8a85" stroke-width="0.6" stroke-dasharray="3 2"/>
      <text x="481" y="47" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" font-weight="700">5 kb</text>
      <!-- 1kb window (x range 14.5..15.5kb -> 543..577) -->
      <rect x="543" y="40" width="34" height="95" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8" stroke-dasharray="3 2"/>

      <!-- Coverage bars: random-ish low background, a tall peak at x=15kb -->
      <g fill="#374151">
        <!-- Background bars: 1-3 reads -->
        <rect x="63"  y="125" width="6" height="10"/>
        <rect x="72"  y="129" width="6" height="6"/>
        <rect x="81"  y="125" width="6" height="10"/>
        <rect x="90"  y="130" width="6" height="5"/>
        <rect x="99"  y="120" width="6" height="15"/>
        <rect x="108" y="129" width="6" height="6"/>
        <rect x="117" y="125" width="6" height="10"/>
        <rect x="126" y="123" width="6" height="12"/>
        <rect x="135" y="129" width="6" height="6"/>
        <rect x="144" y="125" width="6" height="10"/>
        <rect x="153" y="122" width="6" height="13"/>
        <rect x="162" y="128" width="6" height="7"/>
        <rect x="171" y="120" width="6" height="15"/>
        <rect x="180" y="125" width="6" height="10"/>
        <rect x="189" y="129" width="6" height="6"/>
        <rect x="198" y="122" width="6" height="13"/>
        <rect x="207" y="125" width="6" height="10"/>
        <rect x="216" y="127" width="6" height="8"/>
        <rect x="225" y="124" width="6" height="11"/>
        <rect x="234" y="129" width="6" height="6"/>
        <rect x="243" y="122" width="6" height="13"/>
        <rect x="252" y="125" width="6" height="10"/>
        <rect x="261" y="128" width="6" height="7"/>
        <rect x="270" y="120" width="6" height="15"/>
        <rect x="279" y="125" width="6" height="10"/>
        <rect x="288" y="123" width="6" height="12"/>
        <rect x="297" y="120" width="6" height="15"/>
        <rect x="306" y="118" width="6" height="17"/>
        <rect x="315" y="122" width="6" height="13"/>
        <rect x="324" y="120" width="6" height="15"/>
        <rect x="333" y="115" width="6" height="20"/>
        <rect x="342" y="118" width="6" height="17"/>
        <rect x="351" y="116" width="6" height="19"/>
        <rect x="360" y="113" width="6" height="22"/>
        <rect x="369" y="115" width="6" height="20"/>
        <rect x="378" y="114" width="6" height="21"/>
        <rect x="387" y="112" width="6" height="23"/>
        <rect x="396" y="118" width="6" height="17"/>
        <rect x="405" y="116" width="6" height="19"/>
        <rect x="414" y="113" width="6" height="22"/>
        <rect x="423" y="118" width="6" height="17"/>
        <rect x="432" y="115" width="6" height="20"/>
        <rect x="441" y="112" width="6" height="23"/>
        <rect x="450" y="115" width="6" height="20"/>
        <rect x="459" y="118" width="6" height="17"/>
        <rect x="468" y="113" width="6" height="22"/>
        <rect x="477" y="111" width="6" height="24"/>
        <rect x="486" y="115" width="6" height="20"/>
        <rect x="495" y="110" width="6" height="25"/>
        <rect x="504" y="113" width="6" height="22"/>
        <rect x="513" y="108" width="6" height="27"/>
        <rect x="522" y="110" width="6" height="25"/>
        <rect x="531" y="106" width="6" height="29"/>
      </g>
      <!-- Peak bars (cobalt) centred at x=15kb -> ~540-580 -->
      <g fill="#1e3a8a">
        <rect x="540" y="86"  width="6" height="49"/>
        <rect x="549" y="50"  width="6" height="85"/>
        <rect x="558" y="22"  width="6" height="113"/>
        <rect x="567" y="42"  width="6" height="93"/>
        <rect x="576" y="74"  width="6" height="61"/>
      </g>
      <g fill="#374151">
        <rect x="585" y="107" width="6" height="28"/>
        <rect x="594" y="112" width="6" height="23"/>
        <rect x="603" y="115" width="6" height="20"/>
        <rect x="612" y="118" width="6" height="17"/>
        <rect x="621" y="113" width="6" height="22"/>
        <rect x="630" y="118" width="6" height="17"/>
        <rect x="639" y="116" width="6" height="19"/>
        <rect x="648" y="120" width="6" height="15"/>
        <rect x="657" y="115" width="6" height="20"/>
        <rect x="666" y="118" width="6" height="17"/>
        <rect x="675" y="120" width="6" height="15"/>
        <rect x="684" y="122" width="6" height="13"/>
        <rect x="693" y="125" width="6" height="10"/>
        <rect x="702" y="122" width="6" height="13"/>
        <rect x="711" y="120" width="6" height="15"/>
        <rect x="720" y="125" width="6" height="10"/>
        <rect x="729" y="124" width="6" height="11"/>
        <rect x="738" y="127" width="6" height="8"/>
        <rect x="747" y="123" width="6" height="12"/>
        <rect x="756" y="125" width="6" height="10"/>
        <rect x="765" y="129" width="6" height="6"/>
        <rect x="774" y="125" width="6" height="10"/>
        <rect x="783" y="127" width="6" height="8"/>
        <rect x="792" y="124" width="6" height="11"/>
        <rect x="801" y="129" width="6" height="6"/>
        <rect x="810" y="122" width="6" height="13"/>
        <rect x="819" y="125" width="6" height="10"/>
        <rect x="828" y="127" width="6" height="8"/>
        <rect x="837" y="123" width="6" height="12"/>
        <rect x="846" y="125" width="6" height="10"/>
        <rect x="855" y="129" width="6" height="6"/>
        <rect x="864" y="120" width="6" height="15"/>
        <rect x="873" y="125" width="6" height="10"/>
        <rect x="882" y="123" width="6" height="12"/>
        <rect x="891" y="128" width="6" height="7"/>
        <rect x="900" y="125" width="6" height="10"/>
        <rect x="909" y="129" width="6" height="6"/>
        <rect x="918" y="122" width="6" height="13"/>
        <rect x="927" y="125" width="6" height="10"/>
        <rect x="936" y="127" width="6" height="8"/>
        <rect x="945" y="123" width="6" height="12"/>
        <rect x="954" y="129" width="6" height="6"/>
        <rect x="963" y="125" width="6" height="10"/>
        <rect x="972" y="128" width="6" height="7"/>
        <rect x="981" y="124" width="6" height="11"/>
        <rect x="990" y="125" width="6" height="10"/>
        <rect x="999" y="127" width="6" height="8"/>
        <rect x="1008" y="123" width="6" height="12"/>
        <rect x="1017" y="125" width="6" height="10"/>
        <rect x="1026" y="129" width="6" height="6"/>
        <rect x="1035" y="125" width="6" height="10"/>
        <rect x="1044" y="128" width="6" height="7"/>
        <rect x="1053" y="124" width="6" height="11"/>
      </g>

      <!-- Candidate marker -->
      <line x1="560" y1="20" x2="560" y2="14" stroke="#1e3a8a" stroke-width="2"/>
      <text x="560" y="10" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#1e3a8a" text-anchor="middle">candidate · c = 24</text>

    </g>

    <!-- Window legend rows on right -->
    <g transform="translate(0, 200)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">CANDIDATE</text>
      <rect x="100" y="-10" width="14" height="12" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8" stroke-dasharray="3 2"/>
      <text x="120" y="0" font-family="Inter, sans-serif" font-size="9" fill="#525252">200 bp test window</text>
      <rect x="280" y="-10" width="14" height="12" fill="#f4f3ee" stroke="#8a8a85" stroke-width="0.6" stroke-dasharray="3 2"/>
      <text x="300" y="0" font-family="Inter, sans-serif" font-size="9" fill="#525252">1 / 5 / 10 kb guard windows</text>
      <rect x="500" y="-10" width="14" height="12" fill="#1e3a8a"/>
      <text x="520" y="0" font-family="Inter, sans-serif" font-size="9" fill="#525252">candidate-window coverage</text>
      <rect x="710" y="-10" width="14" height="12" fill="#374151"/>
      <text x="730" y="0" font-family="Inter, sans-serif" font-size="9" fill="#525252">background coverage</text>
    </g>

  </g>

  <!-- ============ PANEL 2: lambda table ============ -->
  <g transform="translate(60, 350)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(2)  LOCAL  POISSON  ESTIMATES — TAKE  THE  MAX</text>

    <g transform="translate(0, 24)">
      <rect x="0" y="0" width="540" height="240" rx="4" fill="#ffffff" stroke="#e5e3dc" stroke-width="1"/>
      <text x="14" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">SOURCE</text>
      <text x="280" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">RATE  (per 200 bp)</text>
      <line x1="12" y1="32" x2="528" y2="32" stroke="#e5e3dc"/>

      <g font-family="JetBrains Mono, monospace" font-size="12" fill="#0a0a0a">
        <text x="14" y="58">λ_bg     (genome-wide)</text>
        <text x="380" y="58">0.5</text>
        <text x="14" y="84">λ_1kb    (1 kb window)</text>
        <text x="380" y="84">2.1</text>
        <text x="14" y="110">λ_5kb    (5 kb window)</text>
        <text x="380" y="110" font-weight="700" fill="#b45309">3.8 ←</text>
        <text x="14" y="136">λ_10kb   (10 kb window)</text>
        <text x="380" y="136">2.9</text>
        <text x="14" y="162">λ_input  (matched control)</text>
        <text x="380" y="162">1.2</text>
      </g>

      <line x1="12" y1="178" x2="528" y2="178" stroke="#1e3a8a" stroke-width="1.2"/>
      <text x="14" y="202" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a">λ_local  =  max(·)  =  3.8</text>
      <text x="14" y="222" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">greatest-of CFAR statistic across nested guard windows</text>
    </g>

  </g>

  <!-- ============ PANEL 3: Poisson tail ============ -->
  <g transform="translate(640, 350)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(3)  POISSON  TAIL  TEST</text>

    <g transform="translate(0, 24)">
      <rect x="0" y="0" width="500" height="240" rx="4" fill="#ffffff" stroke="#e5e3dc" stroke-width="1"/>

      <!-- inner chart -->
      <g transform="translate(40, 20)">
        <!-- y axis -->
        <line x1="0" y1="0" x2="0" y2="160" stroke="#374151" stroke-width="1"/>
        <!-- x axis -->
        <line x1="0" y1="160" x2="420" y2="160" stroke="#374151" stroke-width="1"/>

        <!-- Poisson(3.8) PMF bars: P(k) for k=0..25 -->
        <!-- compute approx: P(k)=e^-3.8 * 3.8^k / k! -->
        <!-- k=0: 0.0224 ; k=1: 0.0850; k=2: 0.1615; k=3: 0.2046; k=4: 0.1944; k=5: 0.1477; k=6:0.0936; k=7:0.0508; k=8:0.0241; k=9:0.0102; k=10:0.0039; ... -->
        <!-- scale: tallest 0.2046 -> 140 units -->
        <!-- bar width 14, gap 2 -->
        <g fill="#374151">
          <rect x="0"   y="145" width="14" height="15"/>
          <rect x="16"  y="102" width="14" height="58"/>
          <rect x="32"  y="50"  width="14" height="110"/>
          <rect x="48"  y="20"  width="14" height="140"/>
          <rect x="64"  y="27"  width="14" height="133"/>
          <rect x="80"  y="59"  width="14" height="101"/>
          <rect x="96"  y="96"  width="14" height="64"/>
          <rect x="112" y="125" width="14" height="35"/>
          <rect x="128" y="143" width="14" height="17"/>
          <rect x="144" y="153" width="14" height="7"/>
          <rect x="160" y="157" width="14" height="3"/>
          <rect x="176" y="159" width="14" height="1"/>
          <rect x="192" y="159" width="14" height="1"/>
        </g>

        <!-- right-tail bars from 12..24 essentially zero -->
        <!-- Mark observed c=24 as a cobalt marker -->
        <g>
          <line x1="384" y1="160" x2="384" y2="40" stroke="#c4342c" stroke-width="2"/>
          <polygon points="384,40 379,50 389,50" fill="#c4342c"/>
          <text x="384" y="32" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#c4342c" text-anchor="middle">c = 24</text>
        </g>

        <!-- Shaded tail region -->
        <rect x="170" y="155" width="240" height="5" fill="#c4342c" opacity="0.4"/>

        <!-- x-axis ticks -->
        <g font-family="Inter, sans-serif" font-size="9" fill="#525252">
          <line x1="0"   y1="160" x2="0"   y2="164" stroke="#374151"/>
          <text x="0"    y="176" text-anchor="middle">0</text>
          <line x1="80"  y1="160" x2="80"  y2="164" stroke="#374151"/>
          <text x="80"   y="176" text-anchor="middle">5</text>
          <line x1="160" y1="160" x2="160" y2="164" stroke="#374151"/>
          <text x="160"  y="176" text-anchor="middle">10</text>
          <line x1="240" y1="160" x2="240" y2="164" stroke="#374151"/>
          <text x="240"  y="176" text-anchor="middle">15</text>
          <line x1="320" y1="160" x2="320" y2="164" stroke="#374151"/>
          <text x="320"  y="176" text-anchor="middle">20</text>
          <line x1="384" y1="160" x2="384" y2="164" stroke="#c4342c"/>
        </g>
        <text x="210" y="190" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" text-anchor="middle">count k (per 200 bp)</text>
        <text x="-30" y="80" font-family="Inter, sans-serif" font-size="10" fill="#525252" transform="rotate(-90, -30, 80)" text-anchor="middle">P(k | λ = 3.8)</text>
      </g>

      <!-- Result text -->
      <g transform="translate(20, 210)">
        <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#065f46">P(X ≥ 24 | λ = 3.8)  ≈  2.4 × 10⁻¹⁴</text>
        <text x="0" y="18" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">survives Benjamini–Hochberg at 1.5 × 10⁷ tests → CALLED AS PEAK</text>
      </g>
    </g>
  </g>

</svg>
