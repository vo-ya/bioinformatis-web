<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="t d">
  <title id="t">ATAC footprint emergence by signal averaging across motif instances</title>
  <desc id="d">A two-part figure illustrating how the ATAC footprint emerges from signal averaging. The left half shows six individual per-site Tn5 cut-count traces, each plotted as a noisy bar chart of cut density relative to the motif centre from minus two hundred to plus two hundred base pairs. Each individual trace is essentially indistinguishable from random Poisson noise; no clear dip is visible at the centre. The right half shows the aggregated cut-count density obtained by averaging the per-position counts across five thousand motif instances. The aggregated trace now shows a clear sharp trough at the motif centre flanked by elevated shoulders on either side. An annotation arrow between the two halves explains that the signal-to-noise ratio improves by the square root of N, where N is the number of motif instances aggregated.</desc>

  <rect x="0" y="0" width="1200" height="600" fill="#fafaf9"/>

  <!-- Header -->
  <g>
    <text x="60" y="40" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">FOOTPRINT EMERGENCE BY √N SIGNAL AVERAGING</text>
    <text x="60" y="58" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">Per-site Tn5 cut profiles are too noisy to read; the trough emerges only in the aggregate</text>
  </g>

  <!-- ============ LEFT PANEL: individual instances ============ -->
  <g transform="translate(60, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(A)  INDIVIDUAL  MOTIF  INSTANCES</text>
    <text x="0" y="18" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">N = 1 each · Tn5 cuts are sparse · per-site SNR is poor</text>

    <!-- Six small noisy traces -->
    <g transform="translate(0, 38)">
      <!-- Each sub-plot: 420 wide x 60 tall -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="440" height="60" fill="#ffffff" stroke="#e5e3dc" stroke-width="0.8"/>
        <!-- baseline -->
        <line x1="20" y1="50" x2="430" y2="50" stroke="#374151" stroke-width="0.6"/>
        <!-- motif centre marker -->
        <line x1="225" y1="8" x2="225" y2="55" stroke="#1e3a8a" stroke-width="0.6" stroke-dasharray="3 2"/>
        <!-- noisy spikes -->
        <g fill="#374151">
          <rect x="32" y="40" width="3" height="10"/>
          <rect x="50" y="28" width="3" height="22"/>
          <rect x="64" y="44" width="3" height="6"/>
          <rect x="80" y="35" width="3" height="15"/>
          <rect x="98" y="42" width="3" height="8"/>
          <rect x="118" y="20" width="3" height="30"/>
          <rect x="136" y="40" width="3" height="10"/>
          <rect x="150" y="42" width="3" height="8"/>
          <rect x="172" y="28" width="3" height="22"/>
          <rect x="190" y="40" width="3" height="10"/>
          <rect x="210" y="44" width="3" height="6"/>
          <rect x="232" y="22" width="3" height="28"/>
          <rect x="250" y="40" width="3" height="10"/>
          <rect x="268" y="32" width="3" height="18"/>
          <rect x="286" y="42" width="3" height="8"/>
          <rect x="304" y="38" width="3" height="12"/>
          <rect x="324" y="44" width="3" height="6"/>
          <rect x="346" y="28" width="3" height="22"/>
          <rect x="366" y="40" width="3" height="10"/>
          <rect x="388" y="35" width="3" height="15"/>
          <rect x="408" y="42" width="3" height="8"/>
        </g>
        <text x="446" y="32" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">site #1</text>
      </g>

      <g transform="translate(0, 70)">
        <rect x="0" y="0" width="440" height="60" fill="#ffffff" stroke="#e5e3dc" stroke-width="0.8"/>
        <line x1="20" y1="50" x2="430" y2="50" stroke="#374151" stroke-width="0.6"/>
        <line x1="225" y1="8" x2="225" y2="55" stroke="#1e3a8a" stroke-width="0.6" stroke-dasharray="3 2"/>
        <g fill="#374151">
          <rect x="28" y="38" width="3" height="12"/>
          <rect x="48" y="30" width="3" height="20"/>
          <rect x="68" y="42" width="3" height="8"/>
          <rect x="86" y="35" width="3" height="15"/>
          <rect x="104" y="40" width="3" height="10"/>
          <rect x="124" y="44" width="3" height="6"/>
          <rect x="142" y="28" width="3" height="22"/>
          <rect x="160" y="40" width="3" height="10"/>
          <rect x="180" y="32" width="3" height="18"/>
          <rect x="200" y="38" width="3" height="12"/>
          <rect x="222" y="40" width="3" height="10"/>
          <rect x="248" y="44" width="3" height="6"/>
          <rect x="266" y="35" width="3" height="15"/>
          <rect x="284" y="40" width="3" height="10"/>
          <rect x="304" y="32" width="3" height="18"/>
          <rect x="324" y="42" width="3" height="8"/>
          <rect x="344" y="40" width="3" height="10"/>
          <rect x="364" y="28" width="3" height="22"/>
          <rect x="386" y="40" width="3" height="10"/>
          <rect x="406" y="44" width="3" height="6"/>
        </g>
        <text x="446" y="32" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">site #2</text>
      </g>

      <g transform="translate(0, 140)">
        <rect x="0" y="0" width="440" height="60" fill="#ffffff" stroke="#e5e3dc" stroke-width="0.8"/>
        <line x1="20" y1="50" x2="430" y2="50" stroke="#374151" stroke-width="0.6"/>
        <line x1="225" y1="8" x2="225" y2="55" stroke="#1e3a8a" stroke-width="0.6" stroke-dasharray="3 2"/>
        <g fill="#374151">
          <rect x="34" y="40" width="3" height="10"/>
          <rect x="54" y="44" width="3" height="6"/>
          <rect x="74" y="32" width="3" height="18"/>
          <rect x="94" y="40" width="3" height="10"/>
          <rect x="114" y="28" width="3" height="22"/>
          <rect x="134" y="42" width="3" height="8"/>
          <rect x="154" y="35" width="3" height="15"/>
          <rect x="174" y="40" width="3" height="10"/>
          <rect x="194" y="44" width="3" height="6"/>
          <rect x="214" y="38" width="3" height="12"/>
          <rect x="234" y="40" width="3" height="10"/>
          <rect x="254" y="32" width="3" height="18"/>
          <rect x="274" y="40" width="3" height="10"/>
          <rect x="294" y="44" width="3" height="6"/>
          <rect x="314" y="28" width="3" height="22"/>
          <rect x="334" y="40" width="3" height="10"/>
          <rect x="354" y="38" width="3" height="12"/>
          <rect x="374" y="42" width="3" height="8"/>
          <rect x="394" y="35" width="3" height="15"/>
          <rect x="414" y="40" width="3" height="10"/>
        </g>
        <text x="446" y="32" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">site #3</text>
      </g>

      <g transform="translate(0, 210)">
        <rect x="0" y="0" width="440" height="60" fill="#ffffff" stroke="#e5e3dc" stroke-width="0.8"/>
        <line x1="20" y1="50" x2="430" y2="50" stroke="#374151" stroke-width="0.6"/>
        <line x1="225" y1="8" x2="225" y2="55" stroke="#1e3a8a" stroke-width="0.6" stroke-dasharray="3 2"/>
        <g fill="#374151">
          <rect x="40" y="38" width="3" height="12"/>
          <rect x="58" y="30" width="3" height="20"/>
          <rect x="78" y="40" width="3" height="10"/>
          <rect x="100" y="44" width="3" height="6"/>
          <rect x="120" y="35" width="3" height="15"/>
          <rect x="140" y="40" width="3" height="10"/>
          <rect x="160" y="28" width="3" height="22"/>
          <rect x="180" y="42" width="3" height="8"/>
          <rect x="200" y="32" width="3" height="18"/>
          <rect x="220" y="44" width="3" height="6"/>
          <rect x="240" y="38" width="3" height="12"/>
          <rect x="260" y="40" width="3" height="10"/>
          <rect x="280" y="35" width="3" height="15"/>
          <rect x="300" y="42" width="3" height="8"/>
          <rect x="320" y="40" width="3" height="10"/>
          <rect x="340" y="32" width="3" height="18"/>
          <rect x="360" y="44" width="3" height="6"/>
          <rect x="380" y="40" width="3" height="10"/>
          <rect x="400" y="28" width="3" height="22"/>
        </g>
        <text x="446" y="32" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">site #4</text>
      </g>

      <g transform="translate(0, 280)">
        <text x="220" y="34" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85" font-style="italic" text-anchor="middle">⋮  5 000 motif sites total  ⋮</text>
      </g>
    </g>

    <!-- x-axis label -->
    <text x="225" y="370" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">position relative to motif centre (bp)</text>
    <g font-family="Inter, sans-serif" font-size="9" fill="#525252">
      <text x="22" y="362" text-anchor="middle">−200</text>
      <text x="120" y="362" text-anchor="middle">−100</text>
      <text x="226" y="362" text-anchor="middle">0</text>
      <text x="328" y="362" text-anchor="middle">+100</text>
      <text x="428" y="362" text-anchor="middle">+200</text>
    </g>

  </g>

  <!-- ============ Arrow between panels ============ -->
  <g transform="translate(560, 270)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="#1e3a8a" stroke-width="2"/>
    <polygon points="80,0 70,-6 70,6" fill="#1e3a8a"/>
    <text x="40" y="-16" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em" text-anchor="middle">SUM over N</text>
    <text x="40" y="20" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#1e3a8a" text-anchor="middle">SNR ∝ √N</text>
  </g>

  <!-- ============ RIGHT PANEL: aggregated footprint ============ -->
  <g transform="translate(660, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(B)  AGGREGATED  ACROSS  5 000  SITES</text>
    <text x="0" y="18" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">N = 5 000 · footprint emerges as a coverage trough flanked by shoulders</text>

    <g transform="translate(0, 38)">
      <rect x="0" y="0" width="500" height="270" fill="#ffffff" stroke="#e5e3dc" stroke-width="1"/>

      <!-- y axis -->
      <line x1="50" y1="20" x2="50" y2="240" stroke="#374151" stroke-width="1"/>
      <!-- x axis -->
      <line x1="50" y1="240" x2="480" y2="240" stroke="#374151" stroke-width="1"/>

      <!-- y ticks -->
      <g font-family="Inter, sans-serif" font-size="9" fill="#525252">
        <line x1="46" y1="240" x2="50" y2="240" stroke="#374151"/>
        <text x="42" y="243" text-anchor="end">0</text>
        <line x1="46" y1="180" x2="50" y2="180" stroke="#374151"/>
        <text x="42" y="183" text-anchor="end">0.4</text>
        <line x1="46" y1="120" x2="50" y2="120" stroke="#374151"/>
        <text x="42" y="123" text-anchor="end">0.8</text>
        <line x1="46" y1="60" x2="50" y2="60" stroke="#374151"/>
        <text x="42" y="63" text-anchor="end">1.2</text>
      </g>
      <text x="14" y="130" font-family="Inter, sans-serif" font-size="10" fill="#525252" transform="rotate(-90, 14, 130)" text-anchor="middle">⟨Tn5 cuts⟩</text>

      <!-- footprint curve: elevated shoulders, trough at centre -->
      <!-- baseline density ≈ 0.5 corresponding to y=165. shoulders ≈ 1.0 corresponding to y=90; trough ≈ 0.15 at centre y=217 -->
      <path d="M 60 165
               Q 100 168, 140 160
               Q 180 148, 215 100
               Q 240 88, 250 92
               L 254 92
               L 256 192
               L 260 218
               L 268 219
               L 274 213
               L 280 205
               L 286 192
               L 292 130
               Q 300 92, 312 90
               Q 340 92, 365 100
               Q 410 145, 450 165
               Q 470 170, 480 168"
            fill="none" stroke="#1e3a8a" stroke-width="2.2"/>

      <!-- Lighter fill below curve -->
      <path d="M 60 165
               Q 100 168, 140 160
               Q 180 148, 215 100
               Q 240 88, 250 92
               L 254 92
               L 256 192
               L 260 218
               L 268 219
               L 274 213
               L 280 205
               L 286 192
               L 292 130
               Q 300 92, 312 90
               Q 340 92, 365 100
               Q 410 145, 450 165
               Q 470 170, 480 168
               L 480 240
               L 60 240 Z"
            fill="#eef2ff" opacity="0.55"/>

      <!-- Motif centre marker -->
      <line x1="265" y1="18" x2="265" y2="240" stroke="#1e3a8a" stroke-width="0.7" stroke-dasharray="3 2"/>
      <text x="265" y="14" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#1e3a8a" text-anchor="middle">motif</text>

      <!-- Shoulder annotation -->
      <g transform="translate(140, 50)">
        <rect x="0" y="0" width="80" height="32" rx="3" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
        <text x="40" y="14" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em" text-anchor="middle">SHOULDER</text>
        <text x="40" y="26" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">flanking accessible DNA</text>
      </g>

      <!-- Trough annotation -->
      <g transform="translate(280, 200)">
        <rect x="0" y="0" width="98" height="32" rx="3" fill="#fde2e2" stroke="#c4342c" stroke-width="0.8"/>
        <text x="49" y="14" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#c4342c" letter-spacing="0.06em" text-anchor="middle">FOOTPRINT</text>
        <text x="49" y="26" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">~ 20 bp protected stretch</text>
      </g>

      <!-- x-axis ticks -->
      <g font-family="Inter, sans-serif" font-size="9" fill="#525252">
        <line x1="60"  y1="240" x2="60"  y2="244" stroke="#374151"/>
        <text x="60"   y="256" text-anchor="middle">−200</text>
        <line x1="162" y1="240" x2="162" y2="244" stroke="#374151"/>
        <text x="162"  y="256" text-anchor="middle">−100</text>
        <line x1="265" y1="240" x2="265" y2="244" stroke="#374151"/>
        <text x="265"  y="256" text-anchor="middle">0</text>
        <line x1="367" y1="240" x2="367" y2="244" stroke="#374151"/>
        <text x="367"  y="256" text-anchor="middle">+100</text>
        <line x1="470" y1="240" x2="470" y2="244" stroke="#374151"/>
        <text x="470"  y="256" text-anchor="middle">+200</text>
      </g>
      <text x="265" y="268" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" text-anchor="middle">position relative to motif centre (bp)</text>

    </g>
  </g>

  <!-- Bottom note -->
  <g transform="translate(60, 530)">
    <rect x="0" y="0" width="1080" height="50" rx="4" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>
    <text x="14" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">WHY  N  MATTERS</text>
    <text x="14" y="38" font-family="Inter, sans-serif" font-size="10" fill="#525252">Per-site SNR is dominated by Poisson shot noise. Averaging N motif copies reduces noise by √N while preserving the systematic footprint signal — exactly the signal-averaging argument from any undergraduate measurements course.</text>
  </g>

</svg>
