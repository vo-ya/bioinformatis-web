<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="t d">
  <title id="t">Beta posterior update for two-group methylation comparison</title>
  <desc id="d">A two-row figure. Top row: three Beta posterior densities side by side showing the posterior update from a Beta(1,1) prior under three successive depths — 4 reads, 10 reads, 50 reads — at one CpG with 80 percent true methylation; the curve sharpens and concentrates around p equals 0.8 as depth grows. Bottom row: two-group comparison at fixed depth 10. Group A posterior Beta(9,3) peaked near 0.75 in cobalt; Group B posterior Beta(3,9) peaked near 0.25 in amber; overlap region shaded; arrow indicating the posterior difference and its credible interval; caption explaining that DMR significance is the integrated tail mass.</desc>

  <rect x="0" y="0" width="1200" height="620" fill="#fafaf9"/>

  <!-- Header -->
  <g>
    <text x="60" y="40" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">BETA POSTERIOR UPDATE — DEPTH, EVIDENCE, AND A TWO-GROUP COMPARISON</text>
    <text x="60" y="58" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">Conjugate update: posterior parameters add the observed counts to the prior.</text>
  </g>

  <!-- ============ TOP ROW: posterior sharpening ============ -->
  <g transform="translate(60, 90)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(A)  POSTERIOR CONCENTRATION WITH DEPTH</text>
    <text x="0" y="16" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">True p = 0.8 — same site, three coverages, single sample, Beta(1,1) prior</text>

    <!-- Panel 1: n=4, m=3 -->
    <g transform="translate(0, 36)">
      <rect x="0" y="0" width="340" height="200" fill="#ffffff" stroke="#e5e3dc" stroke-width="1"/>

      <text x="170" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" text-anchor="middle">n = 4 reads · m = 3</text>
      <text x="170" y="34" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">Beta(4, 2)</text>

      <!-- axes -->
      <line x1="40" y1="160" x2="320" y2="160" stroke="#374151" stroke-width="1"/>
      <line x1="40" y1="50" x2="40" y2="160" stroke="#374151" stroke-width="1"/>

      <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">
        <line x1="40"  y1="160" x2="40"  y2="164" stroke="#374151"/>
        <text x="40"  y="176" text-anchor="middle">0.0</text>
        <line x1="180" y1="160" x2="180" y2="164" stroke="#374151"/>
        <text x="180" y="176" text-anchor="middle">0.5</text>
        <line x1="320" y1="160" x2="320" y2="164" stroke="#374151"/>
        <text x="320" y="176" text-anchor="middle">1.0</text>
      </g>
      <text x="180" y="192" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#525252" text-anchor="middle">methylation proportion p</text>

      <!-- Beta(4,2) curve — broad, peaked near 0.75 -->
      <path d="M 40 160
               Q 80 160, 110 150
               Q 140 138, 170 122
               Q 200 102, 230 84
               Q 250 76, 270 80
               Q 290 90, 310 130
               Q 318 150, 320 160 Z"
            fill="#1e3a8a" opacity="0.30" stroke="#1e3a8a" stroke-width="1.5"/>

      <!-- guide at p=0.75 -->
      <line x1="250" y1="160" x2="250" y2="76" stroke="#1e3a8a" stroke-width="0.8" stroke-dasharray="3 2"/>
      <text x="250" y="60" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#1e3a8a" text-anchor="middle">mean 0.67</text>

      <text x="40" y="100" font-family="Inter, sans-serif" font-size="9" fill="#525252">CI₉₅</text>
      <text x="40" y="112" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">[0.22, 0.96]</text>
    </g>

    <!-- Panel 2: n=10, m=8 -->
    <g transform="translate(370, 36)">
      <rect x="0" y="0" width="340" height="200" fill="#ffffff" stroke="#e5e3dc" stroke-width="1"/>

      <text x="170" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" text-anchor="middle">n = 10 reads · m = 8</text>
      <text x="170" y="34" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">Beta(9, 3)</text>

      <line x1="40" y1="160" x2="320" y2="160" stroke="#374151" stroke-width="1"/>
      <line x1="40" y1="50" x2="40" y2="160" stroke="#374151" stroke-width="1"/>

      <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">
        <line x1="40"  y1="160" x2="40"  y2="164" stroke="#374151"/>
        <text x="40"  y="176" text-anchor="middle">0.0</text>
        <line x1="180" y1="160" x2="180" y2="164" stroke="#374151"/>
        <text x="180" y="176" text-anchor="middle">0.5</text>
        <line x1="320" y1="160" x2="320" y2="164" stroke="#374151"/>
        <text x="320" y="176" text-anchor="middle">1.0</text>
      </g>
      <text x="180" y="192" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#525252" text-anchor="middle">methylation proportion p</text>

      <!-- Beta(9,3) — sharper, peaked around 0.8 -->
      <path d="M 40 160
               L 130 160
               Q 175 156, 210 132
               Q 245 100, 265 70
               Q 275 60, 282 70
               Q 292 90, 306 140
               Q 314 156, 320 160 Z"
            fill="#1e3a8a" opacity="0.55" stroke="#1e3a8a" stroke-width="1.5"/>

      <line x1="262" y1="160" x2="262" y2="64" stroke="#1e3a8a" stroke-width="0.8" stroke-dasharray="3 2"/>
      <text x="262" y="60" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#1e3a8a" text-anchor="middle">mean 0.75</text>

      <text x="40" y="100" font-family="Inter, sans-serif" font-size="9" fill="#525252">CI₉₅</text>
      <text x="40" y="112" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">[0.43, 0.93]</text>
    </g>

    <!-- Panel 3: n=50, m=40 -->
    <g transform="translate(740, 36)">
      <rect x="0" y="0" width="340" height="200" fill="#ffffff" stroke="#e5e3dc" stroke-width="1"/>

      <text x="170" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" text-anchor="middle">n = 50 reads · m = 40</text>
      <text x="170" y="34" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">Beta(41, 11)</text>

      <line x1="40" y1="160" x2="320" y2="160" stroke="#374151" stroke-width="1"/>
      <line x1="40" y1="50" x2="40" y2="160" stroke="#374151" stroke-width="1"/>

      <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">
        <line x1="40"  y1="160" x2="40"  y2="164" stroke="#374151"/>
        <text x="40"  y="176" text-anchor="middle">0.0</text>
        <line x1="180" y1="160" x2="180" y2="164" stroke="#374151"/>
        <text x="180" y="176" text-anchor="middle">0.5</text>
        <line x1="320" y1="160" x2="320" y2="164" stroke="#374151"/>
        <text x="320" y="176" text-anchor="middle">1.0</text>
      </g>
      <text x="180" y="192" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#525252" text-anchor="middle">methylation proportion p</text>

      <!-- Beta(41,11) — very sharp, peaked at ~0.8 -->
      <path d="M 40 160
               L 220 160
               Q 240 158, 252 134
               Q 264 96, 268 64
               Q 270 56, 273 64
               Q 280 96, 288 134
               Q 296 158, 304 160
               L 320 160 Z"
            fill="#1e3a8a" opacity="0.80" stroke="#1e3a8a" stroke-width="1.5"/>

      <line x1="270" y1="160" x2="270" y2="58" stroke="#1e3a8a" stroke-width="0.8" stroke-dasharray="3 2"/>
      <text x="270" y="50" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#1e3a8a" text-anchor="middle">mean 0.79</text>

      <text x="40" y="100" font-family="Inter, sans-serif" font-size="9" fill="#525252">CI₉₅</text>
      <text x="40" y="112" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">[0.66, 0.88]</text>
    </g>
  </g>

  <!-- ============ BOTTOM ROW: two-group comparison ============ -->
  <g transform="translate(60, 360)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(B)  TWO-GROUP COMPARISON AT n = 10</text>
    <text x="0" y="16" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">A vs B at one CpG: posterior shapes carry the evidence; their overlap quantifies DMR significance.</text>

    <g transform="translate(0, 36)">
      <rect x="0" y="0" width="1080" height="210" fill="#ffffff" stroke="#e5e3dc" stroke-width="1"/>

      <!-- axes -->
      <line x1="60" y1="170" x2="1020" y2="170" stroke="#374151" stroke-width="1"/>
      <line x1="60" y1="40" x2="60" y2="170" stroke="#374151" stroke-width="1"/>

      <g font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">
        <line x1="60"   y1="170" x2="60"   y2="174" stroke="#374151"/>
        <text x="60"   y="188" text-anchor="middle">0.0</text>
        <line x1="252"  y1="170" x2="252"  y2="174" stroke="#374151"/>
        <text x="252"  y="188" text-anchor="middle">0.2</text>
        <line x1="444"  y1="170" x2="444"  y2="174" stroke="#374151"/>
        <text x="444"  y="188" text-anchor="middle">0.4</text>
        <line x1="636"  y1="170" x2="636"  y2="174" stroke="#374151"/>
        <text x="636"  y="188" text-anchor="middle">0.6</text>
        <line x1="828"  y1="170" x2="828"  y2="174" stroke="#374151"/>
        <text x="828"  y="188" text-anchor="middle">0.8</text>
        <line x1="1020" y1="170" x2="1020" y2="174" stroke="#374151"/>
        <text x="1020" y="188" text-anchor="middle">1.0</text>
      </g>
      <text x="540" y="204" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" text-anchor="middle">posterior methylation proportion</text>

      <!-- Group B posterior Beta(3, 9), peak at ~0.25 (x=300) -->
      <path d="M 60 170
               Q 100 168, 140 144
               Q 200 100, 252 68
               Q 280 56, 300 60
               Q 340 80, 380 122
               Q 440 158, 500 170
               L 600 170 Z"
            fill="#b45309" opacity="0.35" stroke="#b45309" stroke-width="1.5"/>

      <line x1="300" y1="170" x2="300" y2="60" stroke="#b45309" stroke-width="0.8" stroke-dasharray="3 2"/>
      <text x="300" y="48" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#b45309" text-anchor="middle">Group B · Beta(3, 9)</text>
      <text x="300" y="34" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">2 / 10 methylated · mean 0.25</text>

      <!-- Group A posterior Beta(9, 3), peak at ~0.75 (x=780) -->
      <path d="M 480 170
               L 580 170
               Q 640 158, 700 122
               Q 740 80, 780 60
               Q 800 56, 820 68
               Q 880 100, 940 144
               Q 980 168, 1020 170 Z"
            fill="#1e3a8a" opacity="0.45" stroke="#1e3a8a" stroke-width="1.5"/>

      <line x1="780" y1="170" x2="780" y2="60" stroke="#1e3a8a" stroke-width="0.8" stroke-dasharray="3 2"/>
      <text x="780" y="48" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" text-anchor="middle">Group A · Beta(9, 3)</text>
      <text x="780" y="34" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">8 / 10 methylated · mean 0.75</text>

      <!-- overlap region: from x=480 to x=600 -->
      <g>
        <path d="M 480 170 L 600 170 L 600 170 Q 580 168, 540 165 Q 500 168, 480 170 Z" fill="#7c3aed" opacity="0.35"/>
        <text x="540" y="165" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#7c3aed" text-anchor="middle">overlap</text>
      </g>

      <!-- effect size annotation arrow at the top -->
      <g>
        <line x1="300" y1="100" x2="780" y2="100" stroke="#0a0a0a" stroke-width="1.2"/>
        <line x1="300" y1="95" x2="300" y2="105" stroke="#0a0a0a" stroke-width="1.2"/>
        <line x1="780" y1="95" x2="780" y2="105" stroke="#0a0a0a" stroke-width="1.2"/>
        <rect x="500" y="85" width="80" height="22" fill="#fafaf9" stroke="none"/>
        <text x="540" y="100" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#0a0a0a" text-anchor="middle">Δp ≈ 0.50</text>
      </g>
    </g>
  </g>

  <!-- bottom interpretation strip -->
  <g transform="translate(60, 580)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">Single-CpG evidence here is suggestive but not decisive (intervals overlap). Five adjacent CpGs with the same effect direction compound into a confident DMR call.</text>
    <text x="0" y="16" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252">DSS, methylKit, and BSmooth share information across adjacent sites in exactly this way.</text>
  </g>
</svg>
