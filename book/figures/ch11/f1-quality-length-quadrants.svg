<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" role="img" aria-labelledby="t1 d1">
  <title id="t1">The reference-grade long-read quadrant, 2018 to 2024</title>
  <desc id="d1">A two-axis plot of read length on the x-axis (logarithmic from 100 base pairs to 4 megabases) versus per-base accuracy on the y-axis (Phred Q-score from Q10 to Q35). The upper-left quadrant holds short-read Illumina at 150 base pairs by Q30. The upper-right quadrant, labelled reference-grade, is highlighted in pale cobalt and contains PacBio HiFi 2018 and 2024 at roughly Q30 and 15 to 20 kilobases, plus Oxford Nanopore R10.4 in 2022 at 20 kilobases and Q18 and R10.4.1 in 2024 at 20 kilobases and Q22 with an ultra-long sub-population extending to one megabase. Arrows trace the 2018 to 2024 trajectory of ONT crossing into the quadrant. The lower-right quadrant, marked long and noisy, is now empty.</desc>

  <rect x="0" y="0" width="980" height="620" fill="#fafaf9"/>

  <!-- Title strip -->
  <g>
    <text x="60" y="36" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">READ LENGTH  ×  PER-BASE ACCURACY</text>
    <text x="60" y="54" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">The reference-grade quadrant was empty until 2019. By 2024 both HiFi and modern ONT live there.</text>
  </g>

  <!-- Plot area -->
  <!-- Coordinate system: x from 80 (10^2 bp) to 880 (4*10^6 bp); y from 540 (Q10) to 100 (Q35) -->
  <!-- log10(100)=2; log10(4e6)=6.6 -->
  <!-- Reference-grade quadrant: length >= 10 kb (log10=4), Q >= 20 -->

  <!-- Highlighted quadrant -->
  <!-- x for 10 kb: 80 + (4 - 2) * (880-80)/(6.6 - 2) = 80 + 2*173.9 = 427.8 -->
  <!-- y for Q20: 540 - (20-10) * (540-100)/(35-10) = 540 - 10*17.6 = 364 -->
  <rect x="428" y="100" width="452" height="264" fill="#eef2ff" opacity="0.85"/>
  <text x="868" y="120" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.10em" text-anchor="end">REFERENCE-GRADE</text>
  <text x="868" y="134" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252" text-anchor="end">length ≥ 10 kb  ·  Q ≥ 20</text>

  <!-- Quadrant labels in the corners -->
  <text x="100" y="120" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#8a8a85" letter-spacing="0.10em">SHORT  &amp;  ACCURATE</text>
  <text x="100" y="134" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">where Illumina has always lived</text>

  <text x="868" y="530" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#b45309" letter-spacing="0.10em" text-anchor="end">LONG  &amp;  NOISY</text>
  <text x="868" y="544" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252" text-anchor="end">the pre-2019 long-read regime</text>

  <!-- Axes -->
  <line x1="80" y1="540" x2="880" y2="540" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="80" y1="100" x2="80"  y2="540" stroke="#0a0a0a" stroke-width="1.5"/>

  <!-- X-axis ticks (log scale): 100, 1k, 10k, 100k, 1M -->
  <g font-family="Inter, sans-serif" font-size="10" fill="#525252">
    <!-- 100 bp at x=80 -->
    <line x1="80"  y1="540" x2="80"  y2="546" stroke="#525252" stroke-width="1"/>
    <text x="80" y="562" text-anchor="middle">100 bp</text>
    <!-- 1 kb -->
    <!-- x = 80 + (3-2)/(6.6-2) * 800 = 80 + 173.9 = 253.9 -->
    <line x1="254" y1="540" x2="254" y2="546" stroke="#525252" stroke-width="1"/>
    <text x="254" y="562" text-anchor="middle">1 kb</text>
    <!-- 10 kb -->
    <line x1="428" y1="540" x2="428" y2="546" stroke="#525252" stroke-width="1"/>
    <text x="428" y="562" text-anchor="middle">10 kb</text>
    <!-- 100 kb -->
    <!-- x = 80 + 3*173.9 = 601.7 -->
    <line x1="602" y1="540" x2="602" y2="546" stroke="#525252" stroke-width="1"/>
    <text x="602" y="562" text-anchor="middle">100 kb</text>
    <!-- 1 Mb -->
    <!-- x = 80 + 4*173.9 = 775.6 -->
    <line x1="776" y1="540" x2="776" y2="546" stroke="#525252" stroke-width="1"/>
    <text x="776" y="562" text-anchor="middle">1 Mb</text>
  </g>

  <!-- Y-axis ticks -->
  <g font-family="Inter, sans-serif" font-size="10" fill="#525252">
    <!-- Q10 at y=540, Q35 at y=100, step (540-100)/25 = 17.6 -->
    <line x1="74" y1="540" x2="80" y2="540" stroke="#525252" stroke-width="1"/>
    <text x="68" y="544" text-anchor="end">Q10</text>
    <line x1="74" y1="452" x2="80" y2="452" stroke="#525252" stroke-width="1"/>
    <text x="68" y="456" text-anchor="end">Q15</text>
    <line x1="74" y1="364" x2="80" y2="364" stroke="#525252" stroke-width="1"/>
    <text x="68" y="368" text-anchor="end">Q20</text>
    <line x1="74" y1="276" x2="80" y2="276" stroke="#525252" stroke-width="1"/>
    <text x="68" y="280" text-anchor="end">Q25</text>
    <line x1="74" y1="188" x2="80" y2="188" stroke="#525252" stroke-width="1"/>
    <text x="68" y="192" text-anchor="end">Q30</text>
    <line x1="74" y1="100" x2="80" y2="100" stroke="#525252" stroke-width="1"/>
    <text x="68" y="104" text-anchor="end">Q35</text>
  </g>

  <!-- Q20 horizontal guideline -->
  <line x1="80" y1="364" x2="880" y2="364" stroke="#8a8a85" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="84" y="358" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" font-style="italic">Q20 — per-read consensus threshold</text>

  <!-- Axis labels -->
  <text x="480" y="595" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a" text-anchor="middle">read length (log scale)</text>
  <text x="36" y="320" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a" text-anchor="middle" transform="rotate(-90 36 320)">per-base accuracy  (Phred Q)</text>

  <!-- Marker definition for arrow -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
  </defs>

  <!-- DATA POINTS -->
  <!-- Illumina 150 bp × Q30 -->
  <!-- log10(150) ≈ 2.176 → x = 80 + 0.176*173.9 = 110.6 -->
  <g>
    <circle cx="111" cy="188" r="6.5" fill="#1e3a8a"/>
    <text x="122" y="186" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">Illumina 2x150 bp</text>
    <text x="122" y="200" font-family="Inter, sans-serif" font-size="9" fill="#525252">~Q30, 150 bp</text>
  </g>

  <!-- PacBio HiFi 2018 — 15 kb × Q30 -->
  <!-- log10(15000)=4.176 → x = 80 + 2.176*173.9 = 458.5 -->
  <g>
    <circle cx="459" cy="188" r="6.5" fill="#065f46"/>
    <text x="402" y="186" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a" text-anchor="end">HiFi 2018</text>
    <text x="402" y="200" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="end">~Q30, 15 kb</text>
  </g>

  <!-- PacBio HiFi 2024 — 20 kb × Q33 -->
  <!-- log10(20000)=4.301 → x = 80 + 2.301*173.9 = 480.2 -->
  <g>
    <circle cx="480" cy="135" r="7.5" fill="#065f46" stroke="#fafaf9" stroke-width="1.5"/>
    <text x="500" y="138" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#065f46">PacBio HiFi (Revio, 2024)</text>
    <text x="500" y="152" font-family="Inter, sans-serif" font-size="9" fill="#525252">~Q33, 20 kb  ·  CCS over 8–15 passes</text>
  </g>

  <!-- HiFi trajectory arrow -->
  <path d="M 460 184 Q 470 160 478 140" fill="none" stroke="#065f46" stroke-width="1.5" marker-end="url(#arr)" opacity="0.6"/>

  <!-- ONT 2018 R9.4 — 10 kb × Q12 -->
  <!-- log10(10000)=4 → x = 428 -->
  <g>
    <circle cx="428" cy="505" r="6.5" fill="#b45309"/>
    <text x="370" y="503" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a" text-anchor="end">ONT R9.4 (2018)</text>
    <text x="370" y="517" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="end">~Q12, 10 kb</text>
  </g>

  <!-- ONT 2022 R10.4 — 20 kb × Q18 -->
  <g>
    <circle cx="480" cy="399" r="6.5" fill="#b45309"/>
    <text x="500" y="402" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">R10.4 (2022)</text>
    <text x="500" y="416" font-family="Inter, sans-serif" font-size="9" fill="#525252">~Q18, 20 kb</text>
  </g>

  <!-- ONT 2024 R10.4.1 — 20 kb × Q22 -->
  <g>
    <circle cx="480" cy="329" r="7.5" fill="#b45309" stroke="#fafaf9" stroke-width="1.5"/>
    <text x="500" y="332" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#b45309">ONT R10.4.1 + Q20+ (2024)</text>
    <text x="500" y="346" font-family="Inter, sans-serif" font-size="9" fill="#525252">~Q22 raw, Q25+ polished, 20 kb</text>
  </g>

  <!-- Ultra-long sub-population — 1 Mb × Q22 -->
  <g>
    <circle cx="776" cy="329" r="6" fill="#b45309" opacity="0.55"/>
    <line x1="486" y1="329" x2="770" y2="329" stroke="#b45309" stroke-width="1" stroke-dasharray="5 3" opacity="0.55"/>
    <text x="776" y="316" font-family="Inter, sans-serif" font-size="9" fill="#b45309" text-anchor="middle" font-style="italic">ultra-long tail</text>
    <text x="776" y="350" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">Q22 · 1 Mb+</text>
  </g>

  <!-- ONT trajectory arrow 2018 → 2024 -->
  <path d="M 432 500 Q 460 430 478 335" fill="none" stroke="#b45309" stroke-width="1.5" marker-end="url(#arr-amber)" opacity="0.55"/>
  <text x="455" y="438" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#b45309" transform="rotate(-72 455 438)">2018 → 2024</text>

  <!-- Reference-grade enabling capability list -->
  <g transform="translate(540, 460)">
    <rect x="0" y="0" width="320" height="100" rx="3" fill="#ffffff" stroke="#1e3a8a" stroke-width="1.2"/>
    <text x="14" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">WHAT Q20 + 10 kb UNLOCKS</text>
    <g font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">
      <text x="14" y="40">·  per-read variant calling without deep consensus</text>
      <text x="14" y="56">·  direct phasing (10+ het sites per read)</text>
      <text x="14" y="72">·  modification calling with per-read confidence</text>
      <text x="14" y="88">·  T2T-grade contig assembly</text>
    </g>
  </g>
</svg>
