<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" role="img" aria-labelledby="t3 d3">
  <title id="t3">Phasing as source separation</title>
  <desc id="d3">A three-row schematic. The top row shows two unmixed source signals — the maternal haplotype, drawn in cobalt across five heterozygous sites with alleles A, C, T, G, A, and the paternal haplotype, drawn in amber with alleles G, T, C, A, T. The middle row shows the mixed observation: a stack of long reads, each spanning all five heterozygous sites, with each read carrying the alleles of exactly one parental haplotype. The bottom row shows the recovered haplotypes, identical to the top row, with arrows labelling the recovery step as supervised source separation by majority within each read.</desc>

  <rect x="0" y="0" width="1100" height="540" fill="#fafaf9"/>

  <!-- Title strip -->
  <g>
    <text x="60" y="36" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">PHASING AS SOURCE SEPARATION</text>
    <text x="60" y="54" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">Two haplotypes are superimposed in the read pool. Long reads carry the source label inside themselves.</text>
  </g>

  <!-- ============ TOP: two source haplotypes ============ -->
  <g transform="translate(80, 90)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.10em">SOURCE 1  ·  MATERNAL HAPLOTYPE</text>

    <line x1="0" y1="22" x2="940" y2="22" stroke="#1e3a8a" stroke-width="2"/>
    <g font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#ffffff">
      <rect x="60"  y="10" width="22" height="24" rx="2" fill="#1e3a8a"/>
      <text x="71"  y="28" text-anchor="middle">A</text>
      <rect x="240" y="10" width="22" height="24" rx="2" fill="#1e3a8a"/>
      <text x="251" y="28" text-anchor="middle">C</text>
      <rect x="430" y="10" width="22" height="24" rx="2" fill="#1e3a8a"/>
      <text x="441" y="28" text-anchor="middle">T</text>
      <rect x="620" y="10" width="22" height="24" rx="2" fill="#1e3a8a"/>
      <text x="631" y="28" text-anchor="middle">G</text>
      <rect x="800" y="10" width="22" height="24" rx="2" fill="#1e3a8a"/>
      <text x="811" y="28" text-anchor="middle">A</text>
    </g>

    <text x="0" y="68" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#b45309" letter-spacing="0.10em">SOURCE 2  ·  PATERNAL HAPLOTYPE</text>

    <line x1="0" y1="90" x2="940" y2="90" stroke="#b45309" stroke-width="2"/>
    <g font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#ffffff">
      <rect x="60"  y="78" width="22" height="24" rx="2" fill="#b45309"/>
      <text x="71"  y="96" text-anchor="middle">G</text>
      <rect x="240" y="78" width="22" height="24" rx="2" fill="#b45309"/>
      <text x="251" y="96" text-anchor="middle">T</text>
      <rect x="430" y="78" width="22" height="24" rx="2" fill="#b45309"/>
      <text x="441" y="96" text-anchor="middle">C</text>
      <rect x="620" y="78" width="22" height="24" rx="2" fill="#b45309"/>
      <text x="631" y="96" text-anchor="middle">A</text>
      <rect x="800" y="78" width="22" height="24" rx="2" fill="#b45309"/>
      <text x="811" y="96" text-anchor="middle">T</text>
    </g>

    <!-- Position labels -->
    <g font-family="Inter, sans-serif" font-size="9" fill="#525252">
      <text x="71"  y="120" text-anchor="middle">het 1</text>
      <text x="251" y="120" text-anchor="middle">het 2</text>
      <text x="441" y="120" text-anchor="middle">het 3</text>
      <text x="631" y="120" text-anchor="middle">het 4</text>
      <text x="811" y="120" text-anchor="middle">het 5</text>
    </g>
  </g>

  <!-- ============ MIDDLE: mixed observation — long reads ============ -->
  <g transform="translate(80, 240)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.10em">OBSERVED  ·  POOL OF LONG READS  (one molecule per row, spans all 5 het sites)</text>

    <!-- 6 reads, each spans 0..940 -->
    <!-- Each read is associated with one source (3 maternal, 3 paternal, interleaved) -->
    <g font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#ffffff">

      <!-- Read 1 — maternal -->
      <line x1="0" y1="28" x2="940" y2="28" stroke="#c4c1b6" stroke-width="0.8"/>
      <rect x="60"  y="20" width="20" height="16" fill="#1e3a8a"/><text x="70"  y="33" text-anchor="middle">A</text>
      <rect x="240" y="20" width="20" height="16" fill="#1e3a8a"/><text x="250" y="33" text-anchor="middle">C</text>
      <rect x="430" y="20" width="20" height="16" fill="#1e3a8a"/><text x="440" y="33" text-anchor="middle">T</text>
      <rect x="620" y="20" width="20" height="16" fill="#1e3a8a"/><text x="630" y="33" text-anchor="middle">G</text>
      <rect x="800" y="20" width="20" height="16" fill="#1e3a8a"/><text x="810" y="33" text-anchor="middle">A</text>

      <!-- Read 2 — paternal -->
      <line x1="0" y1="52" x2="940" y2="52" stroke="#c4c1b6" stroke-width="0.8"/>
      <rect x="60"  y="44" width="20" height="16" fill="#b45309"/><text x="70"  y="57" text-anchor="middle">G</text>
      <rect x="240" y="44" width="20" height="16" fill="#b45309"/><text x="250" y="57" text-anchor="middle">T</text>
      <rect x="430" y="44" width="20" height="16" fill="#b45309"/><text x="440" y="57" text-anchor="middle">C</text>
      <rect x="620" y="44" width="20" height="16" fill="#b45309"/><text x="630" y="57" text-anchor="middle">A</text>
      <rect x="800" y="44" width="20" height="16" fill="#b45309"/><text x="810" y="57" text-anchor="middle">T</text>

      <!-- Read 3 — maternal -->
      <line x1="0" y1="76" x2="940" y2="76" stroke="#c4c1b6" stroke-width="0.8"/>
      <rect x="60"  y="68" width="20" height="16" fill="#1e3a8a"/><text x="70"  y="81" text-anchor="middle">A</text>
      <rect x="240" y="68" width="20" height="16" fill="#1e3a8a"/><text x="250" y="81" text-anchor="middle">C</text>
      <rect x="430" y="68" width="20" height="16" fill="#1e3a8a"/><text x="440" y="81" text-anchor="middle">T</text>
      <rect x="620" y="68" width="20" height="16" fill="#1e3a8a"/><text x="630" y="81" text-anchor="middle">G</text>
      <rect x="800" y="68" width="20" height="16" fill="#1e3a8a"/><text x="810" y="81" text-anchor="middle">A</text>

      <!-- Read 4 — paternal -->
      <line x1="0" y1="100" x2="940" y2="100" stroke="#c4c1b6" stroke-width="0.8"/>
      <rect x="60"  y="92" width="20" height="16" fill="#b45309"/><text x="70"  y="105" text-anchor="middle">G</text>
      <rect x="240" y="92" width="20" height="16" fill="#b45309"/><text x="250" y="105" text-anchor="middle">T</text>
      <rect x="430" y="92" width="20" height="16" fill="#b45309"/><text x="440" y="105" text-anchor="middle">C</text>
      <rect x="620" y="92" width="20" height="16" fill="#b45309"/><text x="630" y="105" text-anchor="middle">A</text>
      <rect x="800" y="92" width="20" height="16" fill="#b45309"/><text x="810" y="105" text-anchor="middle">T</text>

      <!-- Read 5 — paternal with one basecall error at het 3 -->
      <line x1="0" y1="124" x2="940" y2="124" stroke="#c4c1b6" stroke-width="0.8"/>
      <rect x="60"  y="116" width="20" height="16" fill="#b45309"/><text x="70"  y="129" text-anchor="middle">G</text>
      <rect x="240" y="116" width="20" height="16" fill="#b45309"/><text x="250" y="129" text-anchor="middle">T</text>
      <rect x="430" y="116" width="20" height="16" fill="#dc2626"/><text x="440" y="129" text-anchor="middle">T</text>
      <rect x="620" y="116" width="20" height="16" fill="#b45309"/><text x="630" y="129" text-anchor="middle">A</text>
      <rect x="800" y="116" width="20" height="16" fill="#b45309"/><text x="810" y="129" text-anchor="middle">T</text>

      <!-- Read 6 — maternal -->
      <line x1="0" y1="148" x2="940" y2="148" stroke="#c4c1b6" stroke-width="0.8"/>
      <rect x="60"  y="140" width="20" height="16" fill="#1e3a8a"/><text x="70"  y="153" text-anchor="middle">A</text>
      <rect x="240" y="140" width="20" height="16" fill="#1e3a8a"/><text x="250" y="153" text-anchor="middle">C</text>
      <rect x="430" y="140" width="20" height="16" fill="#1e3a8a"/><text x="440" y="153" text-anchor="middle">T</text>
      <rect x="620" y="140" width="20" height="16" fill="#1e3a8a"/><text x="630" y="153" text-anchor="middle">G</text>
      <rect x="800" y="140" width="20" height="16" fill="#1e3a8a"/><text x="810" y="153" text-anchor="middle">A</text>
    </g>

    <!-- Error annotation -->
    <text x="466" y="129" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#dc2626">basecall error — outvoted by 2 other paternal reads</text>
  </g>

  <!-- ============ BOTTOM: recovered + arrow ============ -->
  <g transform="translate(80, 430)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#0a0a0a" letter-spacing="0.10em">RECOVERED  ·  TWO HAPLOTYPES (read-internal grouping by phase block)</text>

    <line x1="0" y1="22" x2="940" y2="22" stroke="#1e3a8a" stroke-width="2"/>
    <g font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#ffffff">
      <rect x="60"  y="12" width="20" height="20" rx="2" fill="#1e3a8a"/><text x="70"  y="28" text-anchor="middle">A</text>
      <rect x="240" y="12" width="20" height="20" rx="2" fill="#1e3a8a"/><text x="250" y="28" text-anchor="middle">C</text>
      <rect x="430" y="12" width="20" height="20" rx="2" fill="#1e3a8a"/><text x="440" y="28" text-anchor="middle">T</text>
      <rect x="620" y="12" width="20" height="20" rx="2" fill="#1e3a8a"/><text x="630" y="28" text-anchor="middle">G</text>
      <rect x="800" y="12" width="20" height="20" rx="2" fill="#1e3a8a"/><text x="810" y="28" text-anchor="middle">A</text>
    </g>

    <line x1="0" y1="60" x2="940" y2="60" stroke="#b45309" stroke-width="2"/>
    <g font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#ffffff">
      <rect x="60"  y="50" width="20" height="20" rx="2" fill="#b45309"/><text x="70"  y="66" text-anchor="middle">G</text>
      <rect x="240" y="50" width="20" height="20" rx="2" fill="#b45309"/><text x="251" y="66" text-anchor="middle">T</text>
      <rect x="430" y="50" width="20" height="20" rx="2" fill="#b45309"/><text x="441" y="66" text-anchor="middle">C</text>
      <rect x="620" y="50" width="20" height="20" rx="2" fill="#b45309"/><text x="631" y="66" text-anchor="middle">A</text>
      <rect x="800" y="50" width="20" height="20" rx="2" fill="#b45309"/><text x="811" y="66" text-anchor="middle">T</text>
    </g>
  </g>

  <!-- Side note: separation key -->
  <g transform="translate(870, 240)">
    <rect x="0" y="0" width="170" height="170" rx="3" fill="#ffffff" stroke="#1e3a8a" stroke-width="1.0"/>
    <text x="12" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">KEY</text>
    <g font-family="Inter, sans-serif" font-size="9" fill="#0a0a0a">
      <text x="12" y="40">supervised: each read</text>
      <text x="12" y="54">already labels its source</text>
      <text x="12" y="72">unsupervised: short reads</text>
      <text x="12" y="86">use LD priors across</text>
      <text x="12" y="100">a population panel</text>
      <text x="12" y="120" fill="#dc2626">red = basecall error</text>
      <text x="12" y="134" fill="#dc2626">(outvoted within block)</text>
    </g>
  </g>
</svg>
