<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" role="img" aria-labelledby="t4 d4">
  <title id="t4">Recall gain of pangenome alignment over a single linear reference, by variant class and ancestry</title>
  <desc id="d4">A grouped horizontal bar chart. Three variant classes are listed top to bottom: small variants (SNVs and short indels), mid-size structural variants between fifty base pairs and ten kilobases, and large structural variants over ten kilobases. For each class, four ancestry groups are shown — European, East Asian, South Asian, and African — with each group represented by two bars: a baseline bar showing recall on the linear GRCh38 reference and a longer bar showing recall on the HPRC v1 pangenome graph. The recall gain is largest for African ancestry on structural variants, with an absolute gain on the order of fifteen percentage points for mid-size SVs and ten percentage points for large SVs. Recall on small variants is already high under the linear reference and the pangenome gain is correspondingly smaller, on the order of one to three points.</desc>

  <rect x="0" y="0" width="1100" height="600" fill="#fafaf9"/>

  <!-- Title strip -->
  <g>
    <text x="60" y="36" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">PANGENOME RECALL GAIN OVER LINEAR GRCh38</text>
    <text x="60" y="54" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">HPRC v1 (47 haplotypes) vg-giraffe alignment. Gains concentrate on SVs and on populations far from the GRCh38 donor.</text>
  </g>

  <!-- Layout: 3 panel rows; within each row, 4 ancestry groups, each with two bars. -->
  <!-- Plot area x: 220 (bar start) to 880 (right). -->
  <!-- 100% width = 660 px. -->
  <!-- Bar height 12, group gap 6, group height = 2*12 + 6 = 30. -->
  <!-- 4 groups per panel: 4*30 + 3*8 = 144 panel height. -->
  <!-- Panel spacing 30. -->

  <!-- Background subtle stripes per panel -->
  <g>
    <rect x="220" y="100" width="660" height="144" fill="#f4f3ee" opacity="0.55"/>
    <rect x="220" y="284" width="660" height="144" fill="#f4f3ee" opacity="0.55"/>
    <rect x="220" y="468" width="660" height="100" fill="#f4f3ee" opacity="0.55"/>
  </g>

  <!-- X-axis scale at top, ticks every 10% -->
  <g font-family="Inter, sans-serif" font-size="9" fill="#525252">
    <!-- 0% at x=220, 100% at x=880; step 66 -->
    <line x1="220" y1="86" x2="880" y2="86" stroke="#0a0a0a" stroke-width="1"/>
    <line x1="220" y1="82" x2="220" y2="90" stroke="#0a0a0a" stroke-width="1"/>
    <text x="220" y="78" text-anchor="middle">0%</text>
    <line x1="352" y1="82" x2="352" y2="90" stroke="#0a0a0a" stroke-width="1"/>
    <text x="352" y="78" text-anchor="middle">20%</text>
    <line x1="484" y1="82" x2="484" y2="90" stroke="#0a0a0a" stroke-width="1"/>
    <text x="484" y="78" text-anchor="middle">40%</text>
    <line x1="616" y1="82" x2="616" y2="90" stroke="#0a0a0a" stroke-width="1"/>
    <text x="616" y="78" text-anchor="middle">60%</text>
    <line x1="748" y1="82" x2="748" y2="90" stroke="#0a0a0a" stroke-width="1"/>
    <text x="748" y="78" text-anchor="middle">80%</text>
    <line x1="880" y1="82" x2="880" y2="90" stroke="#0a0a0a" stroke-width="1"/>
    <text x="880" y="78" text-anchor="middle">100%</text>
  </g>

  <!-- Panel labels and bars -->

  <!-- ========= PANEL 1: Small variants (SNVs + short indels) ========= -->
  <g>
    <text x="60" y="120" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">SMALL VARIANTS</text>
    <text x="60" y="134" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252">SNVs &amp; ≤50 bp indels</text>

    <!-- Each group: row y, ancestry label x=60, baseline bar gray, gain bar cobalt -->
    <!-- Bar value = recall% mapped to x = 220 + recall*6.6 -->

    <!-- European: linear 98.5, pangenome 99.0 -->
    <g transform="translate(0, 116)">
      <text x="200" y="9" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a" text-anchor="end">European</text>
      <rect x="220" y="0" width="650.1" height="6" fill="#8a8a85"/>
      <rect x="220" y="8" width="653.4" height="6" fill="#1e3a8a"/>
      <text x="876" y="5" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">98.5%</text>
      <text x="876" y="14" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a" font-weight="700">99.0%</text>
    </g>

    <!-- East Asian: 97.8, 98.6 -->
    <g transform="translate(0, 146)">
      <text x="200" y="9" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a" text-anchor="end">East Asian</text>
      <rect x="220" y="0" width="645.5" height="6" fill="#8a8a85"/>
      <rect x="220" y="8" width="650.8" height="6" fill="#1e3a8a"/>
      <text x="876" y="5" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">97.8%</text>
      <text x="876" y="14" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a" font-weight="700">98.6%</text>
    </g>

    <!-- South Asian: 97.5, 98.5 -->
    <g transform="translate(0, 176)">
      <text x="200" y="9" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a" text-anchor="end">South Asian</text>
      <rect x="220" y="0" width="643.5" height="6" fill="#8a8a85"/>
      <rect x="220" y="8" width="650.1" height="6" fill="#1e3a8a"/>
      <text x="876" y="5" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">97.5%</text>
      <text x="876" y="14" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a" font-weight="700">98.5%</text>
    </g>

    <!-- African: 96.4, 98.6 -->
    <g transform="translate(0, 206)">
      <text x="200" y="9" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a" text-anchor="end">African</text>
      <rect x="220" y="0" width="636.2" height="6" fill="#8a8a85"/>
      <rect x="220" y="8" width="650.8" height="6" fill="#1e3a8a"/>
      <text x="876" y="5" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">96.4%</text>
      <text x="876" y="14" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a" font-weight="700">98.6%</text>
    </g>
  </g>

  <!-- ========= PANEL 2: Mid-size SVs ========= -->
  <g>
    <text x="60" y="304" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">MID-SIZE SVs</text>
    <text x="60" y="318" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252">50 bp – 10 kb</text>

    <!-- European: 72, 82 -->
    <g transform="translate(0, 300)">
      <text x="200" y="9" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a" text-anchor="end">European</text>
      <rect x="220" y="0" width="475.2" height="6" fill="#8a8a85"/>
      <rect x="220" y="8" width="541.2" height="6" fill="#1e3a8a"/>
      <text x="876" y="5" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">72%</text>
      <text x="876" y="14" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a" font-weight="700">82%</text>
    </g>

    <!-- East Asian: 67, 80 -->
    <g transform="translate(0, 330)">
      <text x="200" y="9" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a" text-anchor="end">East Asian</text>
      <rect x="220" y="0" width="442.2" height="6" fill="#8a8a85"/>
      <rect x="220" y="8" width="528" height="6" fill="#1e3a8a"/>
      <text x="876" y="5" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">67%</text>
      <text x="876" y="14" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a" font-weight="700">80%</text>
    </g>

    <!-- South Asian: 65, 79 -->
    <g transform="translate(0, 360)">
      <text x="200" y="9" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a" text-anchor="end">South Asian</text>
      <rect x="220" y="0" width="429" height="6" fill="#8a8a85"/>
      <rect x="220" y="8" width="521.4" height="6" fill="#1e3a8a"/>
      <text x="876" y="5" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">65%</text>
      <text x="876" y="14" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a" font-weight="700">79%</text>
    </g>

    <!-- African: 58, 75 — largest gain -->
    <g transform="translate(0, 390)">
      <text x="200" y="9" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a" text-anchor="end">African</text>
      <rect x="220" y="0" width="382.8" height="6" fill="#8a8a85"/>
      <rect x="220" y="8" width="495" height="6" fill="#b45309"/>
      <text x="876" y="5" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">58%</text>
      <text x="876" y="14" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309" font-weight="700">75%  ·  +17 pp</text>
    </g>
  </g>

  <!-- ========= PANEL 3: Large SVs ========= -->
  <g>
    <text x="60" y="488" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">LARGE SVs</text>
    <text x="60" y="502" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252">≥10 kb</text>

    <!-- European: 52, 64 -->
    <g transform="translate(0, 484)">
      <text x="200" y="9" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a" text-anchor="end">European</text>
      <rect x="220" y="0" width="343.2" height="6" fill="#8a8a85"/>
      <rect x="220" y="8" width="422.4" height="6" fill="#1e3a8a"/>
      <text x="876" y="5" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">52%</text>
      <text x="876" y="14" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a" font-weight="700">64%</text>
    </g>

    <!-- East Asian: 48, 62 -->
    <g transform="translate(0, 514)">
      <text x="200" y="9" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a" text-anchor="end">East Asian</text>
      <rect x="220" y="0" width="316.8" height="6" fill="#8a8a85"/>
      <rect x="220" y="8" width="409.2" height="6" fill="#1e3a8a"/>
      <text x="876" y="5" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">48%</text>
      <text x="876" y="14" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a" font-weight="700">62%</text>
    </g>

    <!-- African: 41, 59 — largest gain -->
    <g transform="translate(0, 544)">
      <text x="200" y="9" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a" text-anchor="end">African</text>
      <rect x="220" y="0" width="270.6" height="6" fill="#8a8a85"/>
      <rect x="220" y="8" width="389.4" height="6" fill="#b45309"/>
      <text x="876" y="5" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">41%</text>
      <text x="876" y="14" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309" font-weight="700">59%  ·  +18 pp</text>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 580)">
    <rect x="0" y="-10" width="14" height="6" fill="#8a8a85"/>
    <text x="20" y="-2" font-family="Inter, sans-serif" font-size="10" fill="#525252">linear (GRCh38)</text>
    <rect x="148" y="-10" width="14" height="6" fill="#1e3a8a"/>
    <text x="168" y="-2" font-family="Inter, sans-serif" font-size="10" fill="#525252">pangenome (HPRC v1)</text>
    <rect x="328" y="-10" width="14" height="6" fill="#b45309"/>
    <text x="348" y="-2" font-family="Inter, sans-serif" font-size="10" fill="#525252">largest gain — under-represented ancestry</text>
    <text x="720" y="-2" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">Schematic; numbers approximate HPRC v1 / Liao 2023 published gains.</text>
  </g>
</svg>
