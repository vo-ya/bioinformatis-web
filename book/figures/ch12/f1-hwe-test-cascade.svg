<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="t d">
  <title id="t">Hardy-Weinberg goodness-of-fit test cascade</title>
  <desc id="d">A worked Hardy-Weinberg chi-squared test on an observed cohort. Panel A: the observed genotype counts. Panel B: the expected counts under HWE using the sample allele frequency. Panel C: per-cell chi-squared contributions and the total. Panel D: a calibration strip showing what kinds of deviation push the test into rejection and what they mean biologically.</desc>

  <rect x="0" y="0" width="1200" height="620" fill="#fafaf9"/>

  <defs>
    <marker id="arr-cobalt" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
    <marker id="arr-grey" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>

  <!-- Header -->
  <g>
    <text x="60" y="40" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">A HARDY-WEINBERG GOODNESS-OF-FIT TEST, FROM COUNTS TO p-VALUE</text>
    <text x="60" y="58" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">N = 200 diploid individuals · biallelic SNP · alleles A and a</text>
  </g>

  <!-- ============ PANEL A: observed ============ -->
  <g transform="translate(60, 90)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(A)  OBSERVED  COUNTS</text>
    <rect x="0" y="14" width="500" height="220" rx="4" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>

    <!-- bars for observed -->
    <g font-family="JetBrains Mono, monospace" font-size="12">
      <text x="20" y="48" fill="#525252">AA</text>
      <rect x="60" y="34" width="240" height="22" fill="#1e3a8a"/>
      <text x="312" y="50" fill="#0a0a0a">82</text>

      <text x="20" y="98" fill="#525252">Aa</text>
      <rect x="60" y="84" width="240" height="22" fill="#2563eb"/>
      <text x="312" y="100" fill="#0a0a0a">76</text>

      <text x="20" y="148" fill="#525252">aa</text>
      <rect x="60" y="134" width="126" height="22" fill="#7c3aed"/>
      <text x="312" y="150" fill="#0a0a0a">42</text>
    </g>

    <!-- allele-frequency derivation -->
    <line x1="20" y1="170" x2="480" y2="170" stroke="#c4c1b6" stroke-width="0.6"/>
    <text x="20" y="190" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">Allele counts from genotypes:</text>
    <text x="20" y="210" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">#A = 2·82 + 76 = 240    #a = 2·42 + 76 = 160</text>
    <text x="20" y="226" font-family="JetBrains Mono, monospace" font-size="11" fill="#1e3a8a" font-weight="700">p = 240 / 400 = 0.60      q = 1 − p = 0.40</text>
  </g>

  <!-- ============ PANEL B: expected ============ -->
  <g transform="translate(620, 90)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(B)  EXPECTED  UNDER  HWE</text>
    <rect x="0" y="14" width="520" height="220" rx="4" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>

    <rect x="16" y="32" width="488" height="40" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
    <text x="28" y="48" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">HWE PREDICTION</text>
    <text x="28" y="64" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">E[AA] = N·p²       E[Aa] = N·2pq       E[aa] = N·q²</text>

    <g font-family="JetBrains Mono, monospace" font-size="12">
      <text x="20" y="106" fill="#525252">E[AA]</text>
      <text x="120" y="106" fill="#0a0a0a">= 200 · 0.36</text>
      <text x="340" y="106" font-weight="700" fill="#1e3a8a" text-anchor="end">= 72</text>

      <text x="20" y="138" fill="#525252">E[Aa]</text>
      <text x="120" y="138" fill="#0a0a0a">= 200 · 0.48</text>
      <text x="340" y="138" font-weight="700" fill="#1e3a8a" text-anchor="end">= 96</text>

      <text x="20" y="170" fill="#525252">E[aa]</text>
      <text x="120" y="170" fill="#0a0a0a">= 200 · 0.16</text>
      <text x="340" y="170" font-weight="700" fill="#1e3a8a" text-anchor="end">= 32</text>
    </g>

    <text x="20" y="208" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">Observed het count 76 is lower than expected 96 — possible excess homozygosity.</text>
  </g>

  <!-- ============ PANEL C: chi-square ============ -->
  <g transform="translate(60, 360)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(C)  CHI-SQUARED  STATISTIC</text>
    <rect x="0" y="14" width="500" height="200" rx="4" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>

    <rect x="16" y="32" width="468" height="36" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
    <text x="28" y="48" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">FORMULA</text>
    <text x="28" y="62" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">χ² = Σ (O − E)² / E ,    df = 1</text>

    <g font-family="JetBrains Mono, monospace" font-size="11">
      <text x="20" y="96" fill="#525252">AA:</text>
      <text x="60" y="96" fill="#0a0a0a">(82 − 72)² / 72  = 100/72</text>
      <text x="340" y="96" font-weight="700" fill="#0a0a0a" text-anchor="end">≈ 1.39</text>

      <text x="20" y="118" fill="#525252">Aa:</text>
      <text x="60" y="118" fill="#0a0a0a">(76 − 96)² / 96  = 400/96</text>
      <text x="340" y="118" font-weight="700" fill="#0a0a0a" text-anchor="end">≈ 4.17</text>

      <text x="20" y="140" fill="#525252">aa:</text>
      <text x="60" y="140" fill="#0a0a0a">(42 − 32)² / 32  = 100/32</text>
      <text x="340" y="140" font-weight="700" fill="#0a0a0a" text-anchor="end">≈ 3.13</text>

      <line x1="60" y1="148" x2="340" y2="148" stroke="#c4c1b6" stroke-width="0.6"/>
      <text x="60" y="170" font-weight="700" fill="#1e3a8a">χ²  =  8.69</text>
      <text x="220" y="170" fill="#525252">→  p ≈ 0.0032   (1 df)</text>
    </g>

    <text x="20" y="200" font-family="Inter, sans-serif" font-size="10" fill="#b45309" font-style="italic">Reject HWE at α = 0.01.</text>
  </g>

  <!-- ============ PANEL D: calibration strip ============ -->
  <g transform="translate(620, 360)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(D)  WHAT  THE  DEVIATION  MEANS</text>
    <rect x="0" y="14" width="520" height="200" rx="4" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>

    <!-- four diagnostic rows -->
    <g font-family="Inter, sans-serif" font-size="10">
      <!-- excess hom -->
      <rect x="16" y="32" width="10" height="32" fill="#b45309"/>
      <text x="36" y="46" font-weight="700" fill="#0a0a0a">Excess homozygotes</text>
      <text x="36" y="62" fill="#525252">Wahlund effect (mixed sub-populations) or inbreeding.</text>

      <rect x="16" y="74" width="10" height="32" fill="#2d7a3e"/>
      <text x="36" y="88" font-weight="700" fill="#0a0a0a">Excess heterozygotes</text>
      <text x="36" y="104" fill="#525252">Overdominance (sickle/malaria) or negative assortative mating.</text>

      <rect x="16" y="116" width="10" height="32" fill="#1e3a8a"/>
      <text x="36" y="130" font-weight="700" fill="#0a0a0a">Single locus, extreme p</text>
      <text x="36" y="146" fill="#525252">Genotyping error at this site is more likely than real biology.</text>

      <rect x="16" y="158" width="10" height="32" fill="#7c3aed"/>
      <text x="36" y="172" font-weight="700" fill="#0a0a0a">Same direction across many loci</text>
      <text x="36" y="188" fill="#525252">Cohort-level structure or admixture — not site-specific selection.</text>
    </g>
  </g>

  <!-- Bottom note -->
  <g transform="translate(60, 590)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">A single rejected locus is a signal at best, a genotyping bug at worst — read HWE deviations as a screen, not a verdict. Across millions of SNPs, the joint pattern is what matters.</text>
  </g>
</svg>
