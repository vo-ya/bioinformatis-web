<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="t d">
  <title id="t">Wright-Fisher drift variance and fixation probability worked example</title>
  <desc id="d">A two-panel worked example. Panel A: per-generation variance of allele frequency under Wright-Fisher binomial sampling, with numerical values at three population sizes. Panel B: long-run consequences — the probability of fixation equals the current frequency, the expected fixation time scales with population size, and heterozygosity decays at rate one over twice the effective size.</desc>

  <rect x="0" y="0" width="1200" height="640" fill="#fafaf9"/>

  <defs>
    <marker id="arr-d" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <!-- Header -->
  <g>
    <text x="60" y="40" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">DRIFT  AS  BINOMIAL  SAMPLING  NOISE</text>
    <text x="60" y="58" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">Starting frequency p₀ = 0.5 · neutral · three effective population sizes</text>
  </g>

  <!-- ============ PANEL A: variance table ============ -->
  <g transform="translate(60, 90)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(A)  PER-GENERATION  VARIANCE</text>
    <rect x="0" y="14" width="500" height="450" rx="4" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>

    <rect x="16" y="32" width="468" height="68" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
    <text x="28" y="48" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">FROM BINOMIAL SAMPLING</text>
    <text x="28" y="68" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">X_{t+1} ~ Binomial(2N, p_t)</text>
    <text x="28" y="86" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">Var(p_{t+1} | p_t) = p_t(1−p_t) / (2N)</text>

    <!-- table header -->
    <g font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#525252" letter-spacing="0.06em">
      <text x="36" y="138">N_e</text>
      <text x="180" y="138">Var(Δp)</text>
      <text x="340" y="138">σ(Δp)</text>
    </g>
    <line x1="20" y1="146" x2="480" y2="146" stroke="#c4c1b6" stroke-width="0.6"/>

    <!-- row 1: small N -->
    <g font-family="JetBrains Mono, monospace" font-size="12">
      <rect x="20" y="158" width="10" height="36" fill="#b45309"/>
      <text x="40" y="178" fill="#0a0a0a">50</text>
      <text x="40" y="194" font-family="Inter, sans-serif" font-size="9" fill="#525252">small</text>
      <text x="180" y="178" fill="#0a0a0a">0.25 / 100</text>
      <text x="180" y="194" fill="#0a0a0a">= 2.5×10⁻³</text>
      <text x="340" y="178" font-weight="700" fill="#b45309">≈ 0.050</text>
      <text x="340" y="194" font-family="Inter, sans-serif" font-size="9" fill="#525252">fast drift</text>
    </g>

    <!-- row 2 -->
    <g font-family="JetBrains Mono, monospace" font-size="12">
      <rect x="20" y="216" width="10" height="36" fill="#1e3a8a"/>
      <text x="40" y="236" fill="#0a0a0a">500</text>
      <text x="40" y="252" font-family="Inter, sans-serif" font-size="9" fill="#525252">moderate</text>
      <text x="180" y="236" fill="#0a0a0a">0.25 / 1000</text>
      <text x="180" y="252" fill="#0a0a0a">= 2.5×10⁻⁴</text>
      <text x="340" y="236" font-weight="700" fill="#1e3a8a">≈ 0.016</text>
      <text x="340" y="252" font-family="Inter, sans-serif" font-size="9" fill="#525252">moderate</text>
    </g>

    <!-- row 3 -->
    <g font-family="JetBrains Mono, monospace" font-size="12">
      <rect x="20" y="274" width="10" height="36" fill="#2d7a3e"/>
      <text x="40" y="294" fill="#0a0a0a">10 000</text>
      <text x="40" y="310" font-family="Inter, sans-serif" font-size="9" fill="#525252">human-like Ne</text>
      <text x="180" y="294" fill="#0a0a0a">0.25 / 20 000</text>
      <text x="180" y="310" fill="#0a0a0a">= 1.25×10⁻⁵</text>
      <text x="340" y="294" font-weight="700" fill="#2d7a3e">≈ 0.0035</text>
      <text x="340" y="310" font-family="Inter, sans-serif" font-size="9" fill="#525252">slow drift</text>
    </g>

    <text x="20" y="350" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">A 200-fold increase in N_e cuts the per-generation step σ(Δp) by ~14×.</text>

    <!-- mini sketch panel: three trajectories -->
    <rect x="20" y="372" width="460" height="64" rx="3" fill="#ffffff" stroke="#e5e3dc" stroke-width="1"/>
    <text x="32" y="388" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-weight="600" letter-spacing="0.06em">TYPICAL TRAJECTORIES (200 GEN)</text>
    <!-- N=50 wild trajectory -->
    <polyline points="32,418 60,402 88,422 116,398 144,420 172,402 200,416 228,392 256,408 284,396 312,420 340,398 368,420 396,398 424,418 452,400 472,422" fill="none" stroke="#b45309" stroke-width="1.4"/>
    <!-- N=500 moderate -->
    <polyline points="32,418 60,414 88,418 116,412 144,416 172,410 200,414 228,410 256,416 284,412 312,414 340,408 368,412 396,408 424,414 452,410 472,416" fill="none" stroke="#1e3a8a" stroke-width="1.4"/>
    <!-- N=10000 nearly flat -->
    <polyline points="32,418 60,418 88,418 116,417 144,418 172,418 200,418 228,417 256,418 284,418 312,418 340,418 368,418 396,418 424,418 452,418 472,418" fill="none" stroke="#2d7a3e" stroke-width="1.4"/>
  </g>

  <!-- ============ PANEL B: long-run consequences ============ -->
  <g transform="translate(620, 90)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(B)  LONG-RUN  CONSEQUENCES</text>
    <rect x="0" y="14" width="520" height="450" rx="4" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>

    <!-- fixation probability -->
    <rect x="16" y="32" width="488" height="68" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
    <text x="28" y="48" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">FIXATION PROBABILITY</text>
    <text x="28" y="68" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">P(fix) = p₀     (neutral allele at frequency p₀)</text>
    <text x="28" y="86" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">A brand-new mutation: P(fix) = 1 / (2N_e)</text>

    <!-- expected fixation time -->
    <rect x="16" y="112" width="488" height="68" rx="4" fill="#ffffff" stroke="#e5e3dc" stroke-width="0.8"/>
    <text x="28" y="128" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#525252" letter-spacing="0.06em">EXPECTED FIXATION TIME (CONDITIONAL ON FIXATION)</text>
    <text x="28" y="148" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">E[T_fix] ≈ 4 N_e     (starting from p₀ = 0.5)</text>
    <text x="28" y="166" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">E[T_fix | new mutation] ≈ 4 N_e generations  (linear in N_e)</text>

    <!-- heterozygosity decay -->
    <rect x="16" y="192" width="488" height="84" rx="4" fill="#ffffff" stroke="#e5e3dc" stroke-width="0.8"/>
    <text x="28" y="208" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#525252" letter-spacing="0.06em">HETEROZYGOSITY DECAY</text>
    <text x="28" y="228" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">H_t = H_0 · (1 − 1/(2N_e))^t   ≈   H_0 · exp(−t / (2N_e))</text>
    <text x="28" y="246" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">Half-life ≈ 2 N_e · ln 2  ≈  1.39 N_e generations</text>
    <text x="28" y="264" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">Small populations lose variation quickly; large populations keep it.</text>

    <!-- numerical anchor box -->
    <rect x="16" y="288" width="488" height="120" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
    <text x="28" y="306" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">NUMERICAL ANCHORS (HUMAN-LIKE N_e ≈ 10 000)</text>
    <g font-family="JetBrains Mono, monospace" font-size="11">
      <text x="28" y="328" fill="#0a0a0a">σ(Δp) per generation</text>
      <text x="490" y="328" text-anchor="end" font-weight="700" fill="#1e3a8a">~ 3.5 × 10⁻³</text>
      <text x="28" y="348" fill="#0a0a0a">P(fix | new mutation)</text>
      <text x="490" y="348" text-anchor="end" font-weight="700" fill="#1e3a8a">5 × 10⁻⁵</text>
      <text x="28" y="368" fill="#0a0a0a">Mean fixation time (if it fixes)</text>
      <text x="490" y="368" text-anchor="end" font-weight="700" fill="#1e3a8a">~ 40 000 gen</text>
      <text x="28" y="388" fill="#0a0a0a">Heterozygosity half-life</text>
      <text x="490" y="388" text-anchor="end" font-weight="700" fill="#1e3a8a">~ 14 000 gen</text>
    </g>

    <text x="28" y="430" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">A generation is ~25 yr for humans → 14 000 gen ≈ 350 kyr — the rough lifetime of standing diversity.</text>
  </g>

  <!-- Bottom note -->
  <g transform="translate(60, 600)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">All three of these quantities — drift step, fixation probability, heterozygosity half-life — scale with N_e. This is why N_e is the single parameter that controls population genetics.</text>
  </g>
</svg>
