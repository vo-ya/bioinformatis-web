<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="t d">
  <title id="t">Linkage disequilibrium decay derivation and worked numerics</title>
  <desc id="d">A two-panel figure. Panel A: the recursion for LD across generations, leading to the exponential decay formula r squared falls as exp minus two c t. Panel B: a worked numerical example translating physical kilobase distance to expected r squared at three different times since founding.</desc>

  <rect x="0" y="0" width="1200" height="640" fill="#fafaf9"/>

  <!-- Header -->
  <g>
    <text x="60" y="40" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">LD  DECAY  AS  ONE  EXPONENTIAL  PER  RECOMBINATION  EVENT</text>
    <text x="60" y="58" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">From the per-generation breakup rate c to the closed-form r² vs distance curve</text>
  </g>

  <!-- ============ PANEL A: derivation ============ -->
  <g transform="translate(60, 90)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(A)  DERIVATION</text>
    <rect x="0" y="14" width="500" height="500" rx="4" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>

    <!-- recursion -->
    <rect x="16" y="32" width="468" height="68" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
    <text x="28" y="48" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">RECURSION ACROSS GENERATIONS</text>
    <text x="28" y="68" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">D_{t+1}  =  (1 − c) · D_t</text>
    <text x="28" y="86" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">Each generation, a fraction c of haplotypes is broken by recombination.</text>

    <!-- iterate -->
    <text x="20" y="130" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#525252" letter-spacing="0.06em">ITERATE</text>
    <text x="20" y="152" font-family="JetBrains Mono, monospace" font-size="12" fill="#0a0a0a">D_t  =  D_0 · (1 − c)^t   ≈   D_0 · exp(−c t)</text>

    <text x="20" y="190" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#525252" letter-spacing="0.06em">SQUARED CORRELATION</text>
    <text x="20" y="212" font-family="JetBrains Mono, monospace" font-size="12" fill="#0a0a0a">r²(t)  ≈  r²(0) · exp(−2 c t)</text>

    <!-- drift-equilibrium form -->
    <rect x="16" y="240" width="468" height="100" rx="4" fill="#ffffff" stroke="#e5e3dc" stroke-width="0.8"/>
    <text x="28" y="256" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#525252" letter-spacing="0.06em">STATIONARY (DRIFT-RECOMBINATION) FORM</text>
    <text x="28" y="278" font-family="JetBrains Mono, monospace" font-size="12" fill="#0a0a0a">E[r²]  ≈  1 / (1 + 4 N_e c)</text>
    <text x="28" y="298" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">Drift creates LD; recombination dissolves it. Balance gives the standing pattern.</text>
    <text x="28" y="318" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">→  steep decay when 4 N_e c &gt;&gt; 1   ·   slow decay when 4 N_e c &lt;&lt; 1</text>

    <!-- recombination units -->
    <rect x="16" y="356" width="468" height="124" rx="4" fill="#ffffff" stroke="#e5e3dc" stroke-width="0.8"/>
    <text x="28" y="372" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#525252" letter-spacing="0.06em">UNITS YOU WILL ENCOUNTER</text>
    <g font-family="JetBrains Mono, monospace" font-size="11">
      <text x="28" y="394" fill="#0a0a0a">c        Per-generation recombination rate between the two loci.</text>
      <text x="28" y="412" fill="#0a0a0a">1 cM     ≈ 1% recombination per generation.</text>
      <text x="28" y="430" fill="#0a0a0a">Human   ≈ 1 cM per 1 Mb on average (sex-averaged).</text>
      <text x="28" y="448" fill="#0a0a0a">Hotspots  10× the local rate; deserts 10× lower.</text>
      <text x="28" y="466" fill="#0a0a0a">N_e     The drift parameter — human ≈ 10⁴.</text>
    </g>
  </g>

  <!-- ============ PANEL B: numerical example + curve ============ -->
  <g transform="translate(620, 90)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(B)  WORKED  EXAMPLE</text>
    <rect x="0" y="14" width="520" height="500" rx="4" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>

    <text x="20" y="42" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">A founder mutation arises on one chromosome. r²(0) = 1. Two loci 100 kb apart in a human-rate region.</text>
    <text x="20" y="60" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">c = 100 kb · 10⁻⁸ per bp per gen = 10⁻³ per gen</text>

    <!-- table -->
    <g font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#525252" letter-spacing="0.06em">
      <text x="20" y="100">t (generations)</text>
      <text x="220" y="100">2 c t</text>
      <text x="340" y="100">r²(t) (closed form)</text>
    </g>
    <line x1="20" y1="108" x2="500" y2="108" stroke="#c4c1b6" stroke-width="0.6"/>
    <g font-family="JetBrains Mono, monospace" font-size="11">
      <text x="20" y="130" fill="#0a0a0a">100</text>
      <text x="220" y="130" fill="#0a0a0a">0.2</text>
      <text x="340" y="130" fill="#0a0a0a">≈ 0.82</text>
      <text x="20" y="152" fill="#0a0a0a">500</text>
      <text x="220" y="152" fill="#0a0a0a">1.0</text>
      <text x="340" y="152" fill="#0a0a0a">≈ 0.37</text>
      <text x="20" y="174" fill="#0a0a0a">2 000</text>
      <text x="220" y="174" fill="#0a0a0a">4.0</text>
      <text x="340" y="174" fill="#0a0a0a">≈ 0.018</text>
      <text x="20" y="196" fill="#0a0a0a">10 000</text>
      <text x="220" y="196" fill="#0a0a0a">20</text>
      <text x="340" y="196" fill="#0a0a0a">≈ 2 × 10⁻⁹</text>
    </g>

    <!-- decay curve plot -->
    <rect x="20" y="222" width="480" height="240" rx="3" fill="#ffffff" stroke="#e5e3dc" stroke-width="0.8"/>
    <text x="32" y="240" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#525252" letter-spacing="0.06em">r²  vs  log-distance (kb), c · t curves</text>

    <!-- axes -->
    <line x1="60" y1="430" x2="480" y2="430" stroke="#0a0a0a" stroke-width="1"/>
    <line x1="60" y1="430" x2="60" y2="260" stroke="#0a0a0a" stroke-width="1"/>

    <!-- y ticks -->
    <g font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">
      <text x="56" y="434" text-anchor="end">0</text>
      <line x1="58" y1="430" x2="62" y2="430" stroke="#8a8a85"/>
      <text x="56" y="392" text-anchor="end">0.25</text>
      <line x1="58" y1="389" x2="62" y2="389" stroke="#8a8a85"/>
      <text x="56" y="350" text-anchor="end">0.50</text>
      <line x1="58" y1="347" x2="62" y2="347" stroke="#8a8a85"/>
      <text x="56" y="307" text-anchor="end">0.75</text>
      <line x1="58" y1="305" x2="62" y2="305" stroke="#8a8a85"/>
      <text x="56" y="265" text-anchor="end">1.00</text>
      <line x1="58" y1="263" x2="62" y2="263" stroke="#8a8a85"/>
    </g>
    <!-- x ticks: log distance, 1 kb -> 10 Mb -->
    <g font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">
      <line x1="60" y1="430" x2="60" y2="434" stroke="#8a8a85"/>
      <text x="60" y="450" text-anchor="middle">1 kb</text>
      <line x1="165" y1="430" x2="165" y2="434" stroke="#8a8a85"/>
      <text x="165" y="450" text-anchor="middle">10 kb</text>
      <line x1="270" y1="430" x2="270" y2="434" stroke="#8a8a85"/>
      <text x="270" y="450" text-anchor="middle">100 kb</text>
      <line x1="375" y1="430" x2="375" y2="434" stroke="#8a8a85"/>
      <text x="375" y="450" text-anchor="middle">1 Mb</text>
      <line x1="480" y1="430" x2="480" y2="434" stroke="#8a8a85"/>
      <text x="480" y="450" text-anchor="middle">10 Mb</text>
    </g>

    <!-- curves: r²(d) = 1/(1+4 Ne c) for Ne=10000 at three times -->
    <!-- t=100: r²(d) = e^{-2 c t} where c = d (Mb) * 1e-6 -> with d in axis coords -->
    <!-- We render qualitatively three exponentials -->
    <!-- t = 100 gen (high LD persists far) -->
    <path d="M 60 263 Q 200 268 300 285 T 480 380" fill="none" stroke="#1e3a8a" stroke-width="2"/>
    <!-- t = 1000 gen -->
    <path d="M 60 263 Q 150 280 230 330 T 480 420" fill="none" stroke="#7c3aed" stroke-width="2"/>
    <!-- t = 10000 gen (sharp decay, human-like) -->
    <path d="M 60 263 Q 90 305 165 380 T 480 428" fill="none" stroke="#b45309" stroke-width="2"/>

    <!-- legend -->
    <g font-family="Inter, sans-serif" font-size="10">
      <line x1="340" y1="270" x2="360" y2="270" stroke="#1e3a8a" stroke-width="2"/>
      <text x="366" y="274" fill="#0a0a0a">t = 100 gen</text>
      <line x1="340" y1="288" x2="360" y2="288" stroke="#7c3aed" stroke-width="2"/>
      <text x="366" y="292" fill="#0a0a0a">t = 1 000 gen</text>
      <line x1="340" y1="306" x2="360" y2="306" stroke="#b45309" stroke-width="2"/>
      <text x="366" y="310" fill="#0a0a0a">t = 10 000 gen (modern human)</text>
    </g>

    <text x="60" y="478" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">Founder events leave high LD over long distances; older populations decay LD to local scales only.</text>
  </g>

  <!-- Bottom note -->
  <g transform="translate(60, 600)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">The half-LD distance in a modern human cohort is ~30 kb — close to the empirical observation behind tag-SNP panels and the ~500 k-SNP arrays of the early GWAS era.</text>
  </g>
</svg>
