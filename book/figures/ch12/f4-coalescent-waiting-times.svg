<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="t d">
  <title id="t">Coalescent waiting times and TMRCA derivation</title>
  <desc id="d">A three-panel figure. Panel A: per-interval coalescent waiting times in units of two times effective size for a sample of ten lineages. Panel B: the cumulative sum giving expected time to most recent common ancestor, with the last interval dominating. Panel C: TMRCA versus sample size showing the four times effective size plateau.</desc>

  <rect x="0" y="0" width="1200" height="640" fill="#fafaf9"/>

  <!-- Header -->
  <g>
    <text x="60" y="40" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">COALESCENT  WAITING  TIMES:  WHY  TMRCA  PLATEAUS  AT  4 N_e</text>
    <text x="60" y="58" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">n = 10 lineages · standard Kingman coalescent · times in units of 2N_e generations</text>
  </g>

  <!-- ============ PANEL A: per-interval table ============ -->
  <g transform="translate(60, 90)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(A)  PER-INTERVAL  E[T_k]  =  1 / C(k,2)</text>
    <rect x="0" y="14" width="500" height="420" rx="4" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>

    <!-- header -->
    <g font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#525252" letter-spacing="0.06em">
      <text x="20" y="46">k → k−1</text>
      <text x="180" y="46">C(k,2)</text>
      <text x="280" y="46">E[T_k]</text>
      <text x="400" y="46">share</text>
    </g>
    <line x1="20" y1="54" x2="480" y2="54" stroke="#c4c1b6" stroke-width="0.6"/>

    <!-- rows: 10 -> 2  (T_10 ... T_2) -->
    <!-- Using normalized units where T_k = 1 / binom(k,2).  Total = sum = 2*(1 - 1/n) ≈ 1.8 for n=10 in units of 2N_e -->
    <!-- We'll show the value in units of 2N_e generations -->
    <g font-family="JetBrains Mono, monospace" font-size="11">
      <text x="20" y="78" fill="#0a0a0a">10 → 9</text>
      <text x="180" y="78" fill="#0a0a0a">45</text>
      <text x="280" y="78" fill="#0a0a0a">0.022</text>
      <rect x="400" y="68" width="6" height="14" fill="#525252"/>
      <text x="412" y="78" font-family="Inter, sans-serif" font-size="9" fill="#525252">1%</text>

      <text x="20" y="100" fill="#0a0a0a">9 → 8</text>
      <text x="180" y="100" fill="#0a0a0a">36</text>
      <text x="280" y="100" fill="#0a0a0a">0.028</text>
      <rect x="400" y="90" width="8" height="14" fill="#525252"/>
      <text x="414" y="100" font-family="Inter, sans-serif" font-size="9" fill="#525252">2%</text>

      <text x="20" y="122" fill="#0a0a0a">8 → 7</text>
      <text x="180" y="122" fill="#0a0a0a">28</text>
      <text x="280" y="122" fill="#0a0a0a">0.036</text>
      <rect x="400" y="112" width="10" height="14" fill="#525252"/>
      <text x="416" y="122" font-family="Inter, sans-serif" font-size="9" fill="#525252">2%</text>

      <text x="20" y="144" fill="#0a0a0a">7 → 6</text>
      <text x="180" y="144" fill="#0a0a0a">21</text>
      <text x="280" y="144" fill="#0a0a0a">0.048</text>
      <rect x="400" y="134" width="14" height="14" fill="#525252"/>
      <text x="420" y="144" font-family="Inter, sans-serif" font-size="9" fill="#525252">3%</text>

      <text x="20" y="166" fill="#0a0a0a">6 → 5</text>
      <text x="180" y="166" fill="#0a0a0a">15</text>
      <text x="280" y="166" fill="#0a0a0a">0.067</text>
      <rect x="400" y="156" width="20" height="14" fill="#525252"/>
      <text x="426" y="166" font-family="Inter, sans-serif" font-size="9" fill="#525252">4%</text>

      <text x="20" y="188" fill="#0a0a0a">5 → 4</text>
      <text x="180" y="188" fill="#0a0a0a">10</text>
      <text x="280" y="188" fill="#0a0a0a">0.100</text>
      <rect x="400" y="178" width="30" height="14" fill="#1e3a8a"/>
      <text x="436" y="188" font-family="Inter, sans-serif" font-size="9" fill="#525252">6%</text>

      <text x="20" y="210" fill="#0a0a0a">4 → 3</text>
      <text x="180" y="210" fill="#0a0a0a">6</text>
      <text x="280" y="210" fill="#0a0a0a">0.167</text>
      <rect x="400" y="200" width="50" height="14" fill="#1e3a8a"/>
      <text x="456" y="210" font-family="Inter, sans-serif" font-size="9" fill="#525252">9%</text>

      <text x="20" y="232" fill="#0a0a0a">3 → 2</text>
      <text x="180" y="232" fill="#0a0a0a">3</text>
      <text x="280" y="232" fill="#0a0a0a">0.333</text>
      <rect x="400" y="222" width="80" height="14" fill="#1e3a8a"/>
      <text x="468" y="232" font-family="Inter, sans-serif" font-size="9" fill="#ffffff" font-weight="700">19%</text>

      <text x="20" y="254" fill="#b45309" font-weight="700">2 → 1</text>
      <text x="180" y="254" fill="#b45309" font-weight="700">1</text>
      <text x="280" y="254" fill="#b45309" font-weight="700">1.000</text>
      <rect x="400" y="244" width="80" height="14" fill="#b45309"/>
      <text x="468" y="254" font-family="Inter, sans-serif" font-size="9" fill="#ffffff" font-weight="700">55%</text>
    </g>

    <line x1="20" y1="270" x2="480" y2="270" stroke="#c4c1b6" stroke-width="0.6"/>

    <text x="20" y="294" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">Σ T_k  =  2 · (1 − 1/n)  =  1.80   (units of 2N_e)</text>
    <text x="20" y="316" font-family="JetBrains Mono, monospace" font-size="12" fill="#1e3a8a" font-weight="700">E[T_MRCA]  =  3.6 · N_e   (≈ 4 N_e for large n)</text>

    <text x="20" y="356" font-family="Inter, sans-serif" font-size="10" fill="#b45309" font-style="italic" font-weight="600">Notice: the last interval (2 → 1) accounts for over half the total height.</text>
    <text x="20" y="376" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">When few lineages remain, the coalescence rate is small — most of TMRCA</text>
    <text x="20" y="394" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">is spent waiting for the last pair to merge.</text>
  </g>

  <!-- ============ PANEL B: tree visualization ============ -->
  <g transform="translate(620, 90)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">(B)  TREE  WITH  INTERVAL  HEIGHTS  TO  SCALE</text>
    <rect x="0" y="14" width="520" height="420" rx="4" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>

    <!-- present at bottom, past at top.  10 tips at y=400.  Each merge at a height proportional to E[T_k]. -->
    <!-- Cumulative heights (going up):
         T_10 = 0.022 -> y = 400 - 6
         + T_9  0.028 -> y = 400 - 14
         + T_8  0.036 -> y = 400 - 24
         + T_7  0.048 -> y = 400 - 38
         + T_6  0.067 -> y = 400 - 57
         + T_5  0.100 -> y = 400 - 86
         + T_4  0.167 -> y = 400 - 134
         + T_3  0.333 -> y = 400 - 230
         + T_2  1.000 -> y = 400 - 318
       Scale: ~290 px / 1.8 units = 161 px per unit.  Let's use 145 to fit, so y range 90..400 = 310 px / 1.8 = 172.  Use 165.
    -->
    <!-- We will hand-draw a stylised tree with vertical sticks at 10 tip positions, then horizontal merges going up. -->

    <g stroke="#525252" stroke-width="1.4" fill="none">
      <!-- tips at x = 50, 90, 130, 170, 210, 250, 290, 330, 370, 410 (in local coords add transform offset) -->
      <!-- Going up: pair (1,2), then ((1,2),3), then ((1,2,3),4), ((..),5), ((..),6), ((..),7), ((..),8), ((..),9), then last with 10? Not exactly Kingman shape, but illustrative. -->
      <!-- Approach: progressively merge from left -->
      <!-- T_10 merge x=50 & x=90 at y = 395 -->
      <line x1="50" y1="400" x2="50" y2="395"/>
      <line x1="90" y1="400" x2="90" y2="395"/>
      <line x1="50" y1="395" x2="90" y2="395"/>
      <!-- mid x = 70 -->
      <!-- T_9 merge that with x=130 at y = 390 -->
      <line x1="70" y1="395" x2="70" y2="388"/>
      <line x1="130" y1="400" x2="130" y2="388"/>
      <line x1="70" y1="388" x2="130" y2="388"/>
      <!-- mid x = 100 -->
      <!-- T_8 merge with x=170 at y=380 -->
      <line x1="100" y1="388" x2="100" y2="378"/>
      <line x1="170" y1="400" x2="170" y2="378"/>
      <line x1="100" y1="378" x2="170" y2="378"/>
      <!-- mid x=135 -->
      <!-- T_7 merge with x=210 at y=365 -->
      <line x1="135" y1="378" x2="135" y2="363"/>
      <line x1="210" y1="400" x2="210" y2="363"/>
      <line x1="135" y1="363" x2="210" y2="363"/>
      <!-- mid x=172 -->
      <!-- T_6 merge with x=250 at y=345 -->
      <line x1="172" y1="363" x2="172" y2="343"/>
      <line x1="250" y1="400" x2="250" y2="343"/>
      <line x1="172" y1="343" x2="250" y2="343"/>
      <!-- mid x=211 -->
      <!-- T_5 merge with x=290 at y=315 -->
      <line x1="211" y1="343" x2="211" y2="313"/>
      <line x1="290" y1="400" x2="290" y2="313"/>
      <line x1="211" y1="313" x2="290" y2="313"/>
      <!-- mid x=251 -->
      <!-- T_4 merge with x=330 at y=265 -->
      <line x1="251" y1="313" x2="251" y2="263"/>
      <line x1="330" y1="400" x2="330" y2="263"/>
      <line x1="251" y1="263" x2="330" y2="263"/>
      <!-- mid x=290 -->
      <!-- T_3 merge with x=370 at y=165 -->
      <line x1="290" y1="263" x2="290" y2="163"/>
      <line x1="370" y1="400" x2="370" y2="163"/>
      <line x1="290" y1="163" x2="370" y2="163"/>
      <!-- mid x=330 -->
      <!-- T_2 merge with x=410 at y=100 -->
      <!-- Highlight the last interval in red -->
    </g>

    <!-- last interval highlighted in amber -->
    <g stroke="#b45309" stroke-width="2.2" fill="none">
      <line x1="330" y1="163" x2="330" y2="98"/>
      <line x1="410" y1="400" x2="410" y2="98"/>
      <line x1="330" y1="98" x2="410" y2="98"/>
    </g>

    <!-- MRCA dot -->
    <circle cx="370" cy="98" r="3.5" fill="#1e3a8a"/>
    <text x="380" y="102" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a">MRCA</text>

    <!-- tip labels -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">
      <text x="50"  y="414" text-anchor="middle">1</text>
      <text x="90"  y="414" text-anchor="middle">2</text>
      <text x="130" y="414" text-anchor="middle">3</text>
      <text x="170" y="414" text-anchor="middle">4</text>
      <text x="210" y="414" text-anchor="middle">5</text>
      <text x="250" y="414" text-anchor="middle">6</text>
      <text x="290" y="414" text-anchor="middle">7</text>
      <text x="330" y="414" text-anchor="middle">8</text>
      <text x="370" y="414" text-anchor="middle">9</text>
      <text x="410" y="414" text-anchor="middle">10</text>
    </g>

    <!-- y axis indicator -->
    <line x1="460" y1="400" x2="460" y2="100" stroke="#0a0a0a" stroke-width="1"/>
    <line x1="458" y1="400" x2="462" y2="400" stroke="#0a0a0a"/>
    <line x1="458" y1="100" x2="462" y2="100" stroke="#0a0a0a"/>
    <text x="470" y="404" font-family="Inter, sans-serif" font-size="9" fill="#525252">present</text>
    <text x="470" y="104" font-family="Inter, sans-serif" font-size="9" fill="#525252">past</text>
    <text x="470" y="252" font-family="Inter, sans-serif" font-size="9" fill="#525252">time</text>

    <text x="20" y="55" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">Interval heights are scaled to E[T_k]; the last interval (amber) dominates total depth.</text>
  </g>

  <!-- ============ PANEL C: TMRCA vs n plateau ============ -->
  <g transform="translate(60, 530)">
    <rect x="0" y="0" width="1080" height="80" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
    <text x="20" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(C)  E[T_MRCA] vs sample size n  (units of N_e generations)</text>
    <!-- mini plot -->
    <g transform="translate(20, 30)">
      <line x1="0" y1="40" x2="1040" y2="40" stroke="#0a0a0a" stroke-width="1"/>
      <line x1="0" y1="0"  x2="0"   y2="40" stroke="#0a0a0a" stroke-width="1"/>
      <!-- curve approaches 4 -->
      <!-- E[TMRCA] = 4(1 - 1/n) , so 0, 2, 8/3, 3, 16/5, 10/3 ..., 4 -->
      <polyline points="0,40 60,20 120,12 180,8 240,6 300,5 360,4.5 420,4.2 480,4 540,3.8 600,3.7 700,3.6 800,3.5 900,3.4 1000,3.3 1040,3.3"
                fill="none" stroke="#1e3a8a" stroke-width="2"/>
      <line x1="0" y1="2" x2="1040" y2="2" stroke="#b45309" stroke-width="1" stroke-dasharray="4 3"/>
      <text x="1000" y="0" font-family="JetBrains Mono, monospace" font-size="10" fill="#b45309" text-anchor="end">asymptote 4 N_e</text>
      <text x="60" y="50" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">n=5</text>
      <text x="240" y="50" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">n=20</text>
      <text x="540" y="50" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">n=50</text>
      <text x="900" y="50" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">n=200</text>
    </g>
  </g>
</svg>
