<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" role="img" aria-labelledby="t d">
  <title id="t">Bonferroni arithmetic for the 5e-8 GWAS significance threshold</title>
  <desc id="d">A three-panel derivation. Panel A shows the raw SNP counts emerging from a modern imputation panel of ten million variants, collapsed to roughly one million LD-independent blocks. Panel B writes the Bonferroni formula and substitutes the LD-independent count to recover the 5e-8 threshold. Panel C plots the effective test count against population, showing European ancestry around one million, East Asian around 1.1 million, and African ancestry around 1.5 million owing to shorter LD blocks.</desc>

  <rect width="1200" height="580" fill="#fafaf9"/>

  <defs>
    <marker id="ar-cobalt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
    <marker id="ar-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>

  <!-- Title -->
  <g font-family="Inter, sans-serif" fill="#0a0a0a">
    <text x="60" y="36" font-size="18" font-weight="600">Where 5 &#215; 10&#8315;&#8312; comes from</text>
    <text x="60" y="56" font-size="11" fill="#525252">Bonferroni on the effective number of LD-independent tests, not on the raw SNP count.</text>
  </g>

  <!-- ============ PANEL A: collapsing SNPs to LD blocks ============ -->
  <g transform="translate(60, 96)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em" font-family="Inter, sans-serif">(A)  COLLAPSING  10M  SNPS  TO  1M  LD-INDEPENDENT  BLOCKS</text>

    <!-- Genomic axis -->
    <line x1="20" y1="180" x2="500" y2="180" stroke="#374151" stroke-width="1.5"/>
    <text x="260" y="208" font-size="10" fill="#525252" text-anchor="middle" font-family="Inter, sans-serif">chromosomal coordinate · 1 Mb window</text>

    <!-- Dense SNPs (raw count) -->
    <g stroke="#525252" stroke-width="0.6">
      <g transform="translate(0, 0)">
        <text x="0" y="64" font-size="10" font-weight="600" fill="#525252" font-family="Inter, sans-serif">RAW SNPs</text>
        <text x="0" y="80" font-size="10" font-style="italic" fill="#8a8a85" font-family="Inter, sans-serif">~10&#8311; total</text>
      </g>
      <line x1="40" y1="50" x2="40" y2="100"/>
      <line x1="46" y1="50" x2="46" y2="100"/>
      <line x1="52" y1="50" x2="52" y2="100"/>
      <line x1="58" y1="50" x2="58" y2="100"/>
      <line x1="65" y1="50" x2="65" y2="100"/>
      <line x1="71" y1="50" x2="71" y2="100"/>
      <line x1="78" y1="50" x2="78" y2="100"/>
      <line x1="85" y1="50" x2="85" y2="100"/>
      <line x1="92" y1="50" x2="92" y2="100"/>
      <line x1="99" y1="50" x2="99" y2="100"/>
      <line x1="107" y1="50" x2="107" y2="100"/>
      <line x1="115" y1="50" x2="115" y2="100"/>
      <line x1="124" y1="50" x2="124" y2="100"/>
      <line x1="130" y1="50" x2="130" y2="100"/>
      <line x1="136" y1="50" x2="136" y2="100"/>
      <line x1="143" y1="50" x2="143" y2="100"/>
      <line x1="150" y1="50" x2="150" y2="100"/>
      <line x1="158" y1="50" x2="158" y2="100"/>
      <line x1="165" y1="50" x2="165" y2="100"/>
      <line x1="173" y1="50" x2="173" y2="100"/>
      <line x1="180" y1="50" x2="180" y2="100"/>
      <line x1="188" y1="50" x2="188" y2="100"/>
      <line x1="195" y1="50" x2="195" y2="100"/>
      <line x1="203" y1="50" x2="203" y2="100"/>
      <line x1="211" y1="50" x2="211" y2="100"/>
      <line x1="219" y1="50" x2="219" y2="100"/>
      <line x1="227" y1="50" x2="227" y2="100"/>
      <line x1="234" y1="50" x2="234" y2="100"/>
      <line x1="241" y1="50" x2="241" y2="100"/>
      <line x1="249" y1="50" x2="249" y2="100"/>
      <line x1="257" y1="50" x2="257" y2="100"/>
      <line x1="265" y1="50" x2="265" y2="100"/>
      <line x1="273" y1="50" x2="273" y2="100"/>
      <line x1="281" y1="50" x2="281" y2="100"/>
      <line x1="289" y1="50" x2="289" y2="100"/>
      <line x1="297" y1="50" x2="297" y2="100"/>
      <line x1="305" y1="50" x2="305" y2="100"/>
      <line x1="313" y1="50" x2="313" y2="100"/>
      <line x1="321" y1="50" x2="321" y2="100"/>
      <line x1="329" y1="50" x2="329" y2="100"/>
      <line x1="337" y1="50" x2="337" y2="100"/>
      <line x1="345" y1="50" x2="345" y2="100"/>
      <line x1="354" y1="50" x2="354" y2="100"/>
      <line x1="362" y1="50" x2="362" y2="100"/>
      <line x1="370" y1="50" x2="370" y2="100"/>
      <line x1="378" y1="50" x2="378" y2="100"/>
      <line x1="386" y1="50" x2="386" y2="100"/>
      <line x1="394" y1="50" x2="394" y2="100"/>
      <line x1="402" y1="50" x2="402" y2="100"/>
      <line x1="410" y1="50" x2="410" y2="100"/>
      <line x1="418" y1="50" x2="418" y2="100"/>
      <line x1="425" y1="50" x2="425" y2="100"/>
      <line x1="432" y1="50" x2="432" y2="100"/>
      <line x1="439" y1="50" x2="439" y2="100"/>
      <line x1="446" y1="50" x2="446" y2="100"/>
      <line x1="453" y1="50" x2="453" y2="100"/>
      <line x1="460" y1="50" x2="460" y2="100"/>
      <line x1="467" y1="50" x2="467" y2="100"/>
      <line x1="474" y1="50" x2="474" y2="100"/>
      <line x1="481" y1="50" x2="481" y2="100"/>
      <line x1="488" y1="50" x2="488" y2="100"/>
      <line x1="495" y1="50" x2="495" y2="100"/>
    </g>

    <!-- LD-blocks (after pruning) -->
    <g>
      <text x="0" y="134" font-size="10" font-weight="600" fill="#1e3a8a" font-family="Inter, sans-serif">LD-INDEPENDENT</text>
      <text x="0" y="150" font-size="10" font-style="italic" fill="#525252" font-family="Inter, sans-serif">~10&#8310; total</text>
    </g>
    <g fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8">
      <rect x="40" y="125" width="60" height="32" rx="2"/>
      <rect x="105" y="125" width="48" height="32" rx="2"/>
      <rect x="158" y="125" width="72" height="32" rx="2"/>
      <rect x="235" y="125" width="40" height="32" rx="2"/>
      <rect x="280" y="125" width="56" height="32" rx="2"/>
      <rect x="341" y="125" width="68" height="32" rx="2"/>
      <rect x="414" y="125" width="36" height="32" rx="2"/>
      <rect x="455" y="125" width="45" height="32" rx="2"/>
    </g>

    <!-- Block centers (the "effective" tests) -->
    <g fill="#1e3a8a">
      <circle cx="70" cy="141" r="2.5"/>
      <circle cx="129" cy="141" r="2.5"/>
      <circle cx="194" cy="141" r="2.5"/>
      <circle cx="255" cy="141" r="2.5"/>
      <circle cx="308" cy="141" r="2.5"/>
      <circle cx="375" cy="141" r="2.5"/>
      <circle cx="432" cy="141" r="2.5"/>
      <circle cx="477" cy="141" r="2.5"/>
    </g>

    <!-- arrow from raw to blocks -->
    <line x1="260" y1="108" x2="260" y2="120" stroke="#525252" stroke-width="1" marker-end="url(#ar-muted)"/>
    <text x="270" y="118" font-size="9" fill="#525252" font-style="italic" font-family="Inter, sans-serif">prune at r&#178; &lt; 0.2</text>
  </g>

  <!-- ============ PANEL B: the arithmetic ============ -->
  <g transform="translate(620, 96)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em" font-family="Inter, sans-serif">(B)  THE  ARITHMETIC</text>

    <rect x="0" y="20" width="520" height="190" rx="4" fill="#f4f3ee" stroke="#e5e3dc"/>

    <g font-family="Source Serif 4, serif" fill="#0a0a0a">
      <text x="30" y="58" font-size="14" font-style="italic">Bonferroni for family-wise error rate &#945; over M tests:</text>
      <text x="30" y="98" font-size="22" font-weight="600">&#945;</text>
      <text x="50" y="98" font-size="14">adj</text>
      <text x="80" y="98" font-size="22" font-weight="600">=</text>
      <text x="106" y="98" font-size="22">&#945;</text>
      <text x="126" y="98" font-size="22" font-weight="600">/</text>
      <text x="142" y="98" font-size="22"><tspan font-style="italic">M</tspan></text>
      <text x="162" y="98" font-size="14">eff</text>

      <line x1="200" y1="92" x2="240" y2="92" stroke="#525252" stroke-width="1"/>

      <text x="260" y="98" font-size="22" font-weight="600">=</text>
      <text x="290" y="98" font-size="22">0.05</text>
      <text x="354" y="98" font-size="22" font-weight="600">/</text>
      <text x="368" y="98" font-size="22">10&#8310;</text>

      <text x="30" y="150" font-size="14" font-style="italic">Effective LD-independent test count gives:</text>
    </g>

    <g transform="translate(140, 175)">
      <rect x="0" y="0" width="240" height="36" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
      <text x="120" y="24" font-family="Source Serif 4, serif" font-size="20" font-weight="600" fill="#1e3a8a" text-anchor="middle">&#945; = 5 &#215; 10&#8315;&#8312;</text>
    </g>
  </g>

  <!-- ============ PANEL C: across populations ============ -->
  <g transform="translate(60, 340)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em" font-family="Inter, sans-serif">(C)  EFFECTIVE  TEST  COUNT  ACROSS  POPULATIONS</text>

    <!-- Axes -->
    <line x1="60" y1="180" x2="700" y2="180" stroke="#374151" stroke-width="1.2"/>
    <line x1="60" y1="40" x2="60" y2="180" stroke="#374151" stroke-width="1.2"/>

    <!-- y axis ticks -->
    <g font-family="Inter, sans-serif" font-size="9" fill="#525252">
      <line x1="56" y1="180" x2="60" y2="180" stroke="#374151"/>
      <text x="50" y="184" text-anchor="end">0</text>
      <line x1="56" y1="148" x2="60" y2="148" stroke="#374151"/>
      <text x="50" y="152" text-anchor="end">0.5M</text>
      <line x1="56" y1="116" x2="60" y2="116" stroke="#374151"/>
      <text x="50" y="120" text-anchor="end">1.0M</text>
      <line x1="56" y1="84" x2="60" y2="84" stroke="#374151"/>
      <text x="50" y="88" text-anchor="end">1.5M</text>
      <line x1="56" y1="52" x2="60" y2="52" stroke="#374151"/>
      <text x="50" y="56" text-anchor="end">2.0M</text>
    </g>
    <text x="14" y="110" font-size="10" fill="#525252" font-family="Inter, sans-serif" transform="rotate(-90 14 110)">M&#8331;&#8336;&#8336;  (effective tests)</text>

    <!-- Bars: EUR ~1.0M, EAS ~1.1M, SAS ~1.2M, AFR ~1.5M, AMR ~1.3M -->
    <!-- positions: EUR x=120, EAS x=240, SAS x=360, AMR x=480, AFR x=600  bar width 80 -->
    <g>
      <!-- EUR -->
      <rect x="100" y="116" width="60" height="64" fill="#1e3a8a" opacity="0.85"/>
      <text x="130" y="106" font-size="10" font-weight="600" fill="#1e3a8a" text-anchor="middle" font-family="Inter, sans-serif">1.0M</text>
      <text x="130" y="200" font-size="10" fill="#525252" text-anchor="middle" font-family="Inter, sans-serif">EUR</text>
      <text x="130" y="214" font-size="9" font-style="italic" fill="#8a8a85" text-anchor="middle" font-family="Inter, sans-serif">European</text>

      <!-- EAS -->
      <rect x="200" y="113" width="60" height="67" fill="#1e3a8a" opacity="0.85"/>
      <text x="230" y="103" font-size="10" font-weight="600" fill="#1e3a8a" text-anchor="middle" font-family="Inter, sans-serif">1.1M</text>
      <text x="230" y="200" font-size="10" fill="#525252" text-anchor="middle" font-family="Inter, sans-serif">EAS</text>
      <text x="230" y="214" font-size="9" font-style="italic" fill="#8a8a85" text-anchor="middle" font-family="Inter, sans-serif">East Asian</text>

      <!-- SAS -->
      <rect x="300" y="103" width="60" height="77" fill="#1e3a8a" opacity="0.85"/>
      <text x="330" y="93" font-size="10" font-weight="600" fill="#1e3a8a" text-anchor="middle" font-family="Inter, sans-serif">1.2M</text>
      <text x="330" y="200" font-size="10" fill="#525252" text-anchor="middle" font-family="Inter, sans-serif">SAS</text>
      <text x="330" y="214" font-size="9" font-style="italic" fill="#8a8a85" text-anchor="middle" font-family="Inter, sans-serif">South Asian</text>

      <!-- AMR -->
      <rect x="400" y="100" width="60" height="80" fill="#1e3a8a" opacity="0.85"/>
      <text x="430" y="90" font-size="10" font-weight="600" fill="#1e3a8a" text-anchor="middle" font-family="Inter, sans-serif">1.3M</text>
      <text x="430" y="200" font-size="10" fill="#525252" text-anchor="middle" font-family="Inter, sans-serif">AMR</text>
      <text x="430" y="214" font-size="9" font-style="italic" fill="#8a8a85" text-anchor="middle" font-family="Inter, sans-serif">admixed Americas</text>

      <!-- AFR -->
      <rect x="500" y="84" width="60" height="96" fill="#b45309" opacity="0.85"/>
      <text x="530" y="74" font-size="10" font-weight="600" fill="#b45309" text-anchor="middle" font-family="Inter, sans-serif">1.5M</text>
      <text x="530" y="200" font-size="10" fill="#525252" text-anchor="middle" font-family="Inter, sans-serif">AFR</text>
      <text x="530" y="214" font-size="9" font-style="italic" fill="#8a8a85" text-anchor="middle" font-family="Inter, sans-serif">African</text>
    </g>

    <!-- 5e-8 reference line -->
    <line x1="60" y1="116" x2="600" y2="116" stroke="#1e3a8a" stroke-width="0.8" stroke-dasharray="4 3"/>
    <text x="612" y="119" font-size="10" fill="#1e3a8a" font-style="italic" font-family="Inter, sans-serif">M = 10&#8310;</text>

    <!-- Annotation -->
    <g transform="translate(640, 70)">
      <rect x="0" y="0" width="120" height="120" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
      <text x="10" y="22" font-size="10" font-weight="600" fill="#1e3a8a" font-family="Inter, sans-serif">Why AFR &gt; EUR?</text>
      <text x="10" y="40" font-size="9" fill="#0a0a0a" font-family="Inter, sans-serif">Shorter LD blocks in</text>
      <text x="10" y="54" font-size="9" fill="#0a0a0a" font-family="Inter, sans-serif">African populations =</text>
      <text x="10" y="68" font-size="9" fill="#0a0a0a" font-family="Inter, sans-serif">more independent</text>
      <text x="10" y="82" font-size="9" fill="#0a0a0a" font-family="Inter, sans-serif">SNPs per Mb. The</text>
      <text x="10" y="96" font-size="9" fill="#0a0a0a" font-family="Inter, sans-serif">5&#215;10&#8315;&#8312; threshold is</text>
      <text x="10" y="110" font-size="9" fill="#0a0a0a" font-family="Inter, sans-serif">slightly anti-conservative.</text>
    </g>
  </g>
</svg>
