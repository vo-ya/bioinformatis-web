<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="t d">
  <title id="t">Sample size required to detect a per-SNP effect at genome-wide significance</title>
  <desc id="d">A log-log plot of required cohort size N on the y-axis against minor allele frequency p on the x-axis, for three target effect sizes beta equals 0.05, 0.02, and 0.01 in trait standard deviations. The required sample size scales as one over p times one minus p, blowing up for rare variants. A horizontal band marks the achievable biobank range from one hundred thousand to ten million participants. Annotations call out the impossibility of detecting beta equals 0.01 effects at MAF below 0.005, and the approximate location of cohorts: WTCCC at N equals seventeen thousand, UK Biobank at five hundred thousand, and the next-generation meta-analyses at several million.</desc>

  <rect width="1200" height="620" fill="#fafaf9"/>

  <!-- Title -->
  <g font-family="Inter, sans-serif">
    <text x="60" y="36" font-size="18" font-weight="600" fill="#0a0a0a">Cohort size required at &#945; = 5 &#215; 10&#8315;&#8312; and 80% power</text>
    <text x="60" y="56" font-size="11" fill="#525252">Across minor-allele frequency · three target effect sizes · biobank scale shaded</text>
  </g>

  <!-- Plot area: x = 100..1080 (log axis 0.0005 to 0.5), y = 100..520 (log axis 1e3 to 1e9) -->
  <g transform="translate(0,0)">
    <!-- background grid -->
    <g stroke="#e5e3dc" stroke-width="0.5">
      <!-- x grid at 10^-3.5, 10^-3, 10^-2.5, 10^-2, 10^-1.5, 10^-1, 10^-0.5 -->
      <line x1="100" y1="100" x2="100" y2="520"/>
      <line x1="240" y1="100" x2="240" y2="520"/>
      <line x1="380" y1="100" x2="380" y2="520"/>
      <line x1="520" y1="100" x2="520" y2="520"/>
      <line x1="660" y1="100" x2="660" y2="520"/>
      <line x1="800" y1="100" x2="800" y2="520"/>
      <line x1="940" y1="100" x2="940" y2="520"/>
      <line x1="1080" y1="100" x2="1080" y2="520"/>
      <!-- y grid at 10^3, 10^4, 10^5, 10^6, 10^7, 10^8, 10^9 -->
      <line x1="100" y1="100" x2="1080" y2="100"/>
      <line x1="100" y1="170" x2="1080" y2="170"/>
      <line x1="100" y1="240" x2="1080" y2="240"/>
      <line x1="100" y1="310" x2="1080" y2="310"/>
      <line x1="100" y1="380" x2="1080" y2="380"/>
      <line x1="100" y1="450" x2="1080" y2="450"/>
      <line x1="100" y1="520" x2="1080" y2="520"/>
    </g>

    <!-- biobank-achievable band: N from 1e5 to 1e7 -->
    <rect x="100" y="170" width="980" height="170" fill="#eef2ff" opacity="0.45"/>
    <text x="110" y="190" font-size="10" font-weight="600" fill="#1e3a8a" font-family="Inter, sans-serif" letter-spacing="0.06em">BIOBANK-ACHIEVABLE  REGION  (N = 10&#8309; to 10&#8311;)</text>

    <!-- Axes -->
    <line x1="100" y1="520" x2="1080" y2="520" stroke="#0a0a0a" stroke-width="1.5"/>
    <line x1="100" y1="100" x2="100" y2="520" stroke="#0a0a0a" stroke-width="1.5"/>

    <!-- x axis ticks and labels -->
    <g font-family="Inter, sans-serif" font-size="10" fill="#525252">
      <text x="100" y="540" text-anchor="middle">10&#8315;&#179;&#183;&#8309;</text>
      <text x="240" y="540" text-anchor="middle">10&#8315;&#179;</text>
      <text x="380" y="540" text-anchor="middle">10&#8315;&#178;&#183;&#8309;</text>
      <text x="520" y="540" text-anchor="middle">10&#8315;&#178;</text>
      <text x="660" y="540" text-anchor="middle">10&#8315;&#185;&#183;&#8309;</text>
      <text x="800" y="540" text-anchor="middle">10&#8315;&#185;</text>
      <text x="940" y="540" text-anchor="middle">10&#8315;&#8304;&#183;&#8309;</text>
      <text x="1080" y="540" text-anchor="middle">10&#8315;&#8304;&#183;&#179;</text>
    </g>
    <text x="590" y="568" text-anchor="middle" font-size="12" fill="#0a0a0a" font-family="Inter, sans-serif">minor allele frequency  <tspan font-style="italic">p</tspan></text>

    <!-- y axis ticks -->
    <g font-family="Inter, sans-serif" font-size="10" fill="#525252">
      <text x="92" y="104" text-anchor="end">10&#185;&#8304;</text>
      <text x="92" y="174" text-anchor="end">10&#8313;</text>
      <text x="92" y="244" text-anchor="end">10&#8312;</text>
      <text x="92" y="314" text-anchor="end">10&#8311;</text>
      <text x="92" y="384" text-anchor="end">10&#8310;</text>
      <text x="92" y="454" text-anchor="end">10&#8309;</text>
      <text x="92" y="524" text-anchor="end">10&#8308;</text>
    </g>
    <text x="40" y="310" text-anchor="middle" font-size="12" fill="#0a0a0a" font-family="Inter, sans-serif" transform="rotate(-90 40 310)">required <tspan font-style="italic">N</tspan></text>

    <!-- Curves -->
    <!-- N(p, beta) ~ K / (p(1-p) beta^2)
         At p = 0.5, beta = 0.05  -> N approx 30,000
         scale K = 30000 * (0.5*0.5) * 0.0025  = 18.75
         So N(p, beta) = 18.75 / (p (1-p) beta^2) -->

    <!-- beta = 0.05 curve (lowest, blue accent) -->
    <!-- compute points logarithmically: x_log from -3.5 to -0.3 (mapping to 100..1080)
         x_pixel = 100 + ((logp - (-3.5)) / (3.2)) * 980
         N = 18.75 / (p (1-p) 0.0025)
         y_pixel = 520 - (log10(N) - 3) * 70  (mapping log10 3..10 to 520..100) -->
    <!-- Use polyline; compute several points manually:
       p=10^-3.5  -> 0.000316; N = 18.75 / (0.000316 * 1 * 0.0025) = 18.75 / 7.9e-7 = 2.37e7  log10 ~7.37 -> y = 520 - 4.37*70 = 520 - 305.9 = 214.1
       p=10^-3    -> 0.001;  N = 18.75 / (0.001 * 0.0025) = 7.5e6  log10 ~6.875 -> y = 520 - 3.875*70 = 248.75
       p=10^-2.5  -> 0.00316;  N = 18.75 / (0.00316 * 0.0025) = 2.37e6  log10 6.37 -> y = 285.9
       p=10^-2    -> 0.01;  N=750000  log10 5.875 -> y = 318.75
       p=10^-1.5  -> 0.0316; N = 18.75 / (0.0316 * 0.0025) = 2.37e5 log10 5.37 -> y = 354.05
       p=10^-1    -> 0.1; N = 18.75 / (0.09*0.0025) = 83333 log10 4.92 -> y = 385.4
       p=10^-0.5  -> 0.316; N=18.75 / (0.316*0.684*0.0025) = 18.75 / 0.000540 = 34,722 log10 4.54 -> y = 412
       p=10^-0.3  -> 0.5; N=18.75 / (0.5*0.5*0.0025) = 30,000 log10 4.48 -> y = 416
       (above uses N(p, beta) = 18.75 / (p(1-p) beta^2)) -->
    <polyline points="100,214 240,249 380,286 520,319 660,354 800,385 940,412 1080,416"
              fill="none" stroke="#1e3a8a" stroke-width="2.2"/>

    <!-- beta = 0.02 curve (middle, amber) — same shape shifted up by (0.05/0.02)^2 = 6.25 = 0.796 log -->
    <polyline points="100,159 240,194 380,231 520,264 660,299 800,330 940,357 1080,361"
              fill="none" stroke="#b45309" stroke-width="2.2"/>

    <!-- beta = 0.01 curve (top, red) — shifted by another 4x = 0.6 log over beta=0.02 -->
    <polyline points="100,117 240,152 380,189 520,222 660,257 800,288 940,315 1080,319"
              fill="none" stroke="#b91c1c" stroke-width="2.2"/>

    <!-- curve labels -->
    <text x="1090" y="320" font-size="11" font-weight="600" fill="#b91c1c" font-family="Inter, sans-serif">&#946; = 0.01</text>
    <text x="1090" y="364" font-size="11" font-weight="600" fill="#b45309" font-family="Inter, sans-serif">&#946; = 0.02</text>
    <text x="1090" y="418" font-size="11" font-weight="600" fill="#1e3a8a" font-family="Inter, sans-serif">&#946; = 0.05</text>

    <!-- cohort annotations -->
    <!-- WTCCC: N = 17000 at common variant p ~ 0.2 -> log p = -0.7 -> x = 100 + (2.8/3.2)*980 = 957; N=1.7e4 log10=4.23 -> y = 520 - 1.23*70 = 433.9 -->
    <g>
      <circle cx="957" cy="434" r="4" fill="#0a0a0a"/>
      <text x="957" y="424" text-anchor="middle" font-size="9" fill="#0a0a0a" font-family="Inter, sans-serif">WTCCC 2007</text>
      <text x="957" y="448" text-anchor="middle" font-size="9" font-style="italic" fill="#525252" font-family="Inter, sans-serif">N = 17,000</text>
    </g>
    <!-- UK Biobank: N=500,000 log10=5.7 -> y = 520 - 2.7*70 = 331 ; at p=0.2 x ~ 957 -->
    <g>
      <circle cx="900" cy="332" r="4" fill="#0a0a0a"/>
      <text x="900" y="322" text-anchor="middle" font-size="9" fill="#0a0a0a" font-family="Inter, sans-serif">UK Biobank</text>
      <text x="900" y="346" text-anchor="middle" font-size="9" font-style="italic" fill="#525252" font-family="Inter, sans-serif">N = 500,000</text>
    </g>
    <!-- Height meta-analysis: N=5,000,000 log10=6.7 -> y = 520 - 3.7*70 = 261 ; x at common -->
    <g>
      <circle cx="840" cy="262" r="4" fill="#0a0a0a"/>
      <text x="840" y="252" text-anchor="middle" font-size="9" fill="#0a0a0a" font-family="Inter, sans-serif">Yengo 2022</text>
      <text x="840" y="276" text-anchor="middle" font-size="9" font-style="italic" fill="#525252" font-family="Inter, sans-serif">N = 5M</text>
    </g>

    <!-- vertical line at MAF=0.01 to highlight rare/common boundary -->
    <line x1="520" y1="100" x2="520" y2="520" stroke="#525252" stroke-width="0.6" stroke-dasharray="3 3"/>
    <text x="510" y="98" text-anchor="end" font-size="10" fill="#525252" font-style="italic" font-family="Inter, sans-serif">rare &#8592;</text>
    <text x="530" y="98" font-size="10" fill="#525252" font-style="italic" font-family="Inter, sans-serif">&#8594; common</text>
  </g>

  <!-- footnote -->
  <text x="60" y="600" font-size="10" font-style="italic" fill="#525252" font-family="Inter, sans-serif">N &#8776; 18.75 / (p (1 &#8722; p) &#946;&#178;) under the chi-squared non-centrality approximation at &#945; = 5 &#215; 10&#8315;&#8312; and 80% power, with &#946; in trait-SD units.</text>
</svg>
