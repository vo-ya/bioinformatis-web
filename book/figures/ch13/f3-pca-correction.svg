<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-labelledby="t d">
  <title id="t">Population stratification and its correction by PCA covariates</title>
  <desc id="d">Two-row figure. Top row shows the uncorrected GWAS: a Manhattan-style panel with hits scattered uniformly across the genome, indicating ancestry-driven inflation, plus a QQ panel where the entire point cloud lifts off the diagonal at low p-values with lambda equals 1.25. Bottom row shows the same analysis with the top ten genotype principal components added as covariates: the Manhattan panel is now flat with a single true locus rising above threshold, and the QQ panel hugs the diagonal until the upper-right tail with lambda equals 1.02.</desc>

  <rect width="1200" height="660" fill="#fafaf9"/>

  <!-- Title -->
  <g font-family="Inter, sans-serif">
    <text x="60" y="34" font-size="18" font-weight="600" fill="#0a0a0a">PCA correction as noise whitening</text>
    <text x="60" y="54" font-size="11" fill="#525252">Same cohort, two analyses. Without correction, ancestry-driven inflation makes thousands of SNPs look significant. With top 10 PCs, the spurious lift disappears.</text>
  </g>

  <!-- =========================================================== -->
  <!-- TOP ROW: uncorrected -->
  <!-- =========================================================== -->
  <g transform="translate(0, 90)">
    <text x="60" y="0" font-size="11" font-weight="600" fill="#b91c1c" letter-spacing="0.08em" font-family="Inter, sans-serif">(A)  WITHOUT  PCA  COVARIATES  &#8212;  &#955; = 1.25</text>

    <!-- Manhattan panel: x=60..720, y=20..220 -->
    <g>
      <line x1="60" y1="220" x2="720" y2="220" stroke="#0a0a0a" stroke-width="1.2"/>
      <line x1="60" y1="20" x2="60" y2="220" stroke="#0a0a0a" stroke-width="1.2"/>
      <!-- y ticks -->
      <g font-family="Inter, sans-serif" font-size="9" fill="#525252">
        <text x="54" y="224" text-anchor="end">0</text>
        <text x="54" y="174" text-anchor="end">5</text>
        <text x="54" y="124" text-anchor="end">10</text>
        <text x="54" y="74" text-anchor="end">15</text>
        <text x="54" y="24" text-anchor="end">20</text>
      </g>
      <text x="20" y="120" font-size="10" fill="#525252" font-family="Inter, sans-serif" transform="rotate(-90 20 120)">&#8722;log&#8321;&#8320;(<tspan font-style="italic">p</tspan>)</text>

      <!-- chromosome bands -->
      <g opacity="0.18">
        <rect x="60" y="20" width="55" height="200" fill="#1e3a8a"/>
        <rect x="115" y="20" width="50" height="200" fill="none"/>
        <rect x="165" y="20" width="50" height="200" fill="#1e3a8a"/>
        <rect x="215" y="20" width="46" height="200" fill="none"/>
        <rect x="261" y="20" width="44" height="200" fill="#1e3a8a"/>
        <rect x="305" y="20" width="40" height="200" fill="none"/>
        <rect x="345" y="20" width="38" height="200" fill="#1e3a8a"/>
        <rect x="383" y="20" width="36" height="200" fill="none"/>
        <rect x="419" y="20" width="34" height="200" fill="#1e3a8a"/>
        <rect x="453" y="20" width="32" height="200" fill="none"/>
        <rect x="485" y="20" width="30" height="200" fill="#1e3a8a"/>
        <rect x="515" y="20" width="28" height="200" fill="none"/>
        <rect x="543" y="20" width="27" height="200" fill="#1e3a8a"/>
        <rect x="570" y="20" width="25" height="200" fill="none"/>
        <rect x="595" y="20" width="24" height="200" fill="#1e3a8a"/>
        <rect x="619" y="20" width="23" height="200" fill="none"/>
        <rect x="642" y="20" width="22" height="200" fill="#1e3a8a"/>
        <rect x="664" y="20" width="21" height="200" fill="none"/>
        <rect x="685" y="20" width="35" height="200" fill="#1e3a8a"/>
      </g>

      <!-- threshold line -->
      <line x1="60" y1="146" x2="720" y2="146" stroke="#b91c1c" stroke-width="1" stroke-dasharray="4 3"/>
      <text x="724" y="149" font-size="10" fill="#b91c1c" font-family="Inter, sans-serif">5 &#215; 10&#8315;&#8312;</text>

      <!-- inflated SNPs: scatter many points above threshold across the genome -->
      <g fill="#525252">
        <!-- generate dense low-level cloud first -->
        <circle cx="70" cy="200" r="1"/><circle cx="78" cy="195" r="1"/><circle cx="86" cy="210" r="1"/><circle cx="94" cy="205" r="1"/><circle cx="102" cy="190" r="1"/><circle cx="110" cy="198" r="1"/>
        <circle cx="120" cy="192" r="1"/><circle cx="128" cy="188" r="1"/><circle cx="136" cy="200" r="1"/><circle cx="144" cy="208" r="1"/><circle cx="152" cy="195" r="1"/><circle cx="160" cy="202" r="1"/>
        <circle cx="170" cy="186" r="1"/><circle cx="178" cy="194" r="1"/><circle cx="186" cy="205" r="1"/><circle cx="194" cy="190" r="1"/><circle cx="202" cy="197" r="1"/><circle cx="210" cy="184" r="1"/>
        <circle cx="220" cy="201" r="1"/><circle cx="228" cy="192" r="1"/><circle cx="236" cy="199" r="1"/><circle cx="244" cy="206" r="1"/><circle cx="252" cy="188" r="1"/><circle cx="260" cy="195" r="1"/>
        <circle cx="270" cy="183" r="1"/><circle cx="278" cy="196" r="1"/><circle cx="286" cy="209" r="1"/><circle cx="294" cy="194" r="1"/><circle cx="302" cy="201" r="1"/>
        <circle cx="312" cy="187" r="1"/><circle cx="320" cy="195" r="1"/><circle cx="328" cy="204" r="1"/><circle cx="336" cy="191" r="1"/><circle cx="344" cy="198" r="1"/>
        <circle cx="354" cy="186" r="1"/><circle cx="362" cy="200" r="1"/><circle cx="370" cy="193" r="1"/><circle cx="378" cy="205" r="1"/>
        <circle cx="388" cy="189" r="1"/><circle cx="396" cy="197" r="1"/><circle cx="404" cy="184" r="1"/><circle cx="412" cy="202" r="1"/>
        <circle cx="422" cy="190" r="1"/><circle cx="430" cy="198" r="1"/><circle cx="438" cy="207" r="1"/><circle cx="446" cy="194" r="1"/>
        <circle cx="456" cy="200" r="1"/><circle cx="464" cy="186" r="1"/><circle cx="472" cy="193" r="1"/><circle cx="480" cy="205" r="1"/>
        <circle cx="490" cy="189" r="1"/><circle cx="498" cy="201" r="1"/><circle cx="506" cy="188" r="1"/><circle cx="514" cy="196" r="1"/>
        <circle cx="524" cy="204" r="1"/><circle cx="532" cy="192" r="1"/><circle cx="540" cy="199" r="1"/><circle cx="548" cy="187" r="1"/>
        <circle cx="558" cy="200" r="1"/><circle cx="566" cy="195" r="1"/><circle cx="574" cy="207" r="1"/><circle cx="582" cy="191" r="1"/>
        <circle cx="592" cy="198" r="1"/><circle cx="600" cy="206" r="1"/><circle cx="608" cy="193" r="1"/><circle cx="616" cy="200" r="1"/>
        <circle cx="626" cy="187" r="1"/><circle cx="634" cy="195" r="1"/><circle cx="642" cy="204" r="1"/><circle cx="650" cy="190" r="1"/>
        <circle cx="660" cy="197" r="1"/><circle cx="668" cy="186" r="1"/><circle cx="676" cy="199" r="1"/><circle cx="684" cy="205" r="1"/>
        <circle cx="694" cy="192" r="1"/><circle cx="702" cy="199" r="1"/><circle cx="710" cy="188" r="1"/>
      </g>

      <!-- many SNPs above threshold (inflation): peppered  -->
      <g fill="#b91c1c">
        <circle cx="82" cy="138" r="1.6"/><circle cx="125" cy="120" r="1.6"/><circle cx="155" cy="132" r="1.6"/>
        <circle cx="195" cy="115" r="1.6"/><circle cx="240" cy="128" r="1.6"/><circle cx="282" cy="105" r="1.6"/>
        <circle cx="318" cy="140" r="1.6"/><circle cx="360" cy="118" r="1.6"/><circle cx="395" cy="125" r="1.6"/>
        <circle cx="435" cy="108" r="1.6"/><circle cx="470" cy="135" r="1.6"/><circle cx="510" cy="122" r="1.6"/>
        <circle cx="546" cy="98" r="1.6"/><circle cx="580" cy="130" r="1.6"/><circle cx="612" cy="115" r="1.6"/>
        <circle cx="640" cy="135" r="1.6"/><circle cx="670" cy="110" r="1.6"/><circle cx="700" cy="128" r="1.6"/>
        <circle cx="105" cy="115" r="1.6"/><circle cx="175" cy="100" r="1.6"/><circle cx="220" cy="142" r="1.6"/>
        <circle cx="300" cy="120" r="1.6"/><circle cx="380" cy="105" r="1.6"/><circle cx="455" cy="142" r="1.6"/>
        <circle cx="495" cy="100" r="1.6"/><circle cx="560" cy="130" r="1.6"/><circle cx="595" cy="105" r="1.6"/>
      </g>

      <!-- x label -->
      <text x="390" y="248" text-anchor="middle" font-size="10" fill="#525252" font-family="Inter, sans-serif">chromosomal position (chr 1 &#8211; 22)</text>
    </g>

    <!-- QQ panel: x=820..1140, y=20..220 -->
    <g>
      <line x1="820" y1="220" x2="1140" y2="220" stroke="#0a0a0a" stroke-width="1.2"/>
      <line x1="820" y1="20" x2="820" y2="220" stroke="#0a0a0a" stroke-width="1.2"/>
      <!-- diagonal -->
      <line x1="820" y1="220" x2="1140" y2="20" stroke="#0a0a0a" stroke-width="0.8" stroke-dasharray="2 2"/>

      <!-- y ticks -->
      <g font-family="Inter, sans-serif" font-size="9" fill="#525252">
        <text x="816" y="224" text-anchor="end">0</text>
        <text x="816" y="170" text-anchor="end">5</text>
        <text x="816" y="120" text-anchor="end">10</text>
        <text x="816" y="70" text-anchor="end">15</text>
        <text x="816" y="24" text-anchor="end">20</text>
      </g>
      <text x="780" y="120" font-size="10" fill="#525252" font-family="Inter, sans-serif" transform="rotate(-90 780 120)">observed</text>

      <!-- inflated cloud lifting early -->
      <g fill="#b91c1c">
        <circle cx="828" cy="212" r="1.4"/><circle cx="836" cy="208" r="1.4"/><circle cx="846" cy="201" r="1.4"/>
        <circle cx="858" cy="195" r="1.4"/><circle cx="870" cy="188" r="1.4"/><circle cx="884" cy="181" r="1.4"/>
        <circle cx="900" cy="174" r="1.4"/><circle cx="918" cy="166" r="1.4"/><circle cx="938" cy="158" r="1.4"/>
        <circle cx="958" cy="148" r="1.4"/><circle cx="978" cy="138" r="1.4"/><circle cx="998" cy="126" r="1.4"/>
        <circle cx="1018" cy="113" r="1.4"/><circle cx="1038" cy="98" r="1.4"/><circle cx="1058" cy="82" r="1.4"/>
        <circle cx="1078" cy="64" r="1.4"/><circle cx="1095" cy="48" r="1.4"/><circle cx="1110" cy="36" r="1.4"/>
        <circle cx="1124" cy="30" r="1.4"/><circle cx="1135" cy="22" r="1.4"/>
      </g>

      <!-- x label -->
      <text x="980" y="248" text-anchor="middle" font-size="10" fill="#525252" font-family="Inter, sans-serif">expected &#8722;log&#8321;&#8320;(<tspan font-style="italic">p</tspan>)</text>

      <!-- lambda annotation -->
      <text x="836" y="46" font-size="11" font-weight="600" fill="#b91c1c" font-family="Inter, sans-serif">&#955;GC = 1.25</text>
      <text x="836" y="60" font-size="9" font-style="italic" fill="#525252" font-family="Inter, sans-serif">early departure</text>
    </g>
  </g>

  <!-- =========================================================== -->
  <!-- BOTTOM ROW: corrected -->
  <!-- =========================================================== -->
  <g transform="translate(0, 400)">
    <text x="60" y="0" font-size="11" font-weight="600" fill="#065f46" letter-spacing="0.08em" font-family="Inter, sans-serif">(B)  WITH  10  PCs  AS  COVARIATES  &#8212;  &#955; = 1.02</text>

    <!-- Manhattan panel -->
    <g>
      <line x1="60" y1="220" x2="720" y2="220" stroke="#0a0a0a" stroke-width="1.2"/>
      <line x1="60" y1="20" x2="60" y2="220" stroke="#0a0a0a" stroke-width="1.2"/>
      <g font-family="Inter, sans-serif" font-size="9" fill="#525252">
        <text x="54" y="224" text-anchor="end">0</text>
        <text x="54" y="174" text-anchor="end">5</text>
        <text x="54" y="124" text-anchor="end">10</text>
        <text x="54" y="74" text-anchor="end">15</text>
        <text x="54" y="24" text-anchor="end">20</text>
      </g>
      <text x="20" y="120" font-size="10" fill="#525252" font-family="Inter, sans-serif" transform="rotate(-90 20 120)">&#8722;log&#8321;&#8320;(<tspan font-style="italic">p</tspan>)</text>

      <g opacity="0.18">
        <rect x="60" y="20" width="55" height="200" fill="#1e3a8a"/>
        <rect x="165" y="20" width="50" height="200" fill="#1e3a8a"/>
        <rect x="261" y="20" width="44" height="200" fill="#1e3a8a"/>
        <rect x="345" y="20" width="38" height="200" fill="#1e3a8a"/>
        <rect x="419" y="20" width="34" height="200" fill="#1e3a8a"/>
        <rect x="485" y="20" width="30" height="200" fill="#1e3a8a"/>
        <rect x="543" y="20" width="27" height="200" fill="#1e3a8a"/>
        <rect x="595" y="20" width="24" height="200" fill="#1e3a8a"/>
        <rect x="642" y="20" width="22" height="200" fill="#1e3a8a"/>
        <rect x="685" y="20" width="35" height="200" fill="#1e3a8a"/>
      </g>

      <line x1="60" y1="146" x2="720" y2="146" stroke="#b91c1c" stroke-width="1" stroke-dasharray="4 3"/>
      <text x="724" y="149" font-size="10" fill="#b91c1c" font-family="Inter, sans-serif">5 &#215; 10&#8315;&#8312;</text>

      <!-- nice flat cloud near baseline -->
      <g fill="#525252">
        <circle cx="70" cy="208" r="1"/><circle cx="80" cy="212" r="1"/><circle cx="90" cy="205" r="1"/><circle cx="100" cy="215" r="1"/><circle cx="110" cy="210" r="1"/>
        <circle cx="120" cy="206" r="1"/><circle cx="130" cy="213" r="1"/><circle cx="140" cy="208" r="1"/><circle cx="150" cy="212" r="1"/><circle cx="160" cy="205" r="1"/>
        <circle cx="170" cy="211" r="1"/><circle cx="180" cy="206" r="1"/><circle cx="190" cy="213" r="1"/><circle cx="200" cy="208" r="1"/><circle cx="210" cy="212" r="1"/>
        <circle cx="220" cy="205" r="1"/><circle cx="230" cy="211" r="1"/><circle cx="240" cy="208" r="1"/><circle cx="250" cy="214" r="1"/><circle cx="260" cy="207" r="1"/>
        <circle cx="270" cy="212" r="1"/><circle cx="280" cy="208" r="1"/><circle cx="290" cy="214" r="1"/><circle cx="300" cy="205" r="1"/><circle cx="310" cy="210" r="1"/>
        <circle cx="320" cy="212" r="1"/><circle cx="330" cy="208" r="1"/><circle cx="340" cy="213" r="1"/><circle cx="350" cy="207" r="1"/><circle cx="360" cy="210" r="1"/>
        <circle cx="370" cy="206" r="1"/><circle cx="380" cy="213" r="1"/><circle cx="390" cy="209" r="1"/><circle cx="400" cy="212" r="1"/><circle cx="410" cy="207" r="1"/>
        <circle cx="420" cy="210" r="1"/><circle cx="430" cy="206" r="1"/><circle cx="440" cy="213" r="1"/><circle cx="450" cy="208" r="1"/><circle cx="460" cy="211" r="1"/>
        <circle cx="470" cy="206" r="1"/><circle cx="480" cy="212" r="1"/><circle cx="490" cy="207" r="1"/><circle cx="500" cy="213" r="1"/><circle cx="510" cy="208" r="1"/>
        <circle cx="520" cy="210" r="1"/><circle cx="530" cy="205" r="1"/><circle cx="540" cy="212" r="1"/><circle cx="550" cy="207" r="1"/><circle cx="560" cy="211" r="1"/>
        <circle cx="570" cy="206" r="1"/><circle cx="580" cy="213" r="1"/><circle cx="590" cy="209" r="1"/><circle cx="600" cy="212" r="1"/><circle cx="610" cy="207" r="1"/>
        <circle cx="620" cy="210" r="1"/><circle cx="630" cy="206" r="1"/><circle cx="640" cy="212" r="1"/><circle cx="650" cy="207" r="1"/><circle cx="660" cy="211" r="1"/>
        <circle cx="670" cy="206" r="1"/><circle cx="680" cy="212" r="1"/><circle cx="690" cy="207" r="1"/><circle cx="700" cy="213" r="1"/><circle cx="710" cy="208" r="1"/>
      </g>

      <!-- a single genuine peak around chr 12 area -->
      <g fill="#1e3a8a">
        <circle cx="496" cy="80" r="2.2"/>
        <circle cx="491" cy="105" r="1.6"/>
        <circle cx="501" cy="108" r="1.6"/>
        <circle cx="487" cy="125" r="1.4"/>
        <circle cx="505" cy="128" r="1.4"/>
        <circle cx="494" cy="142" r="1.3"/>
        <circle cx="498" cy="138" r="1.3"/>
      </g>

      <text x="496" y="68" text-anchor="middle" font-size="10" font-weight="600" fill="#1e3a8a" font-family="Inter, sans-serif">genuine locus</text>
      <text x="390" y="248" text-anchor="middle" font-size="10" fill="#525252" font-family="Inter, sans-serif">chromosomal position (chr 1 &#8211; 22)</text>
    </g>

    <!-- QQ panel -->
    <g>
      <line x1="820" y1="220" x2="1140" y2="220" stroke="#0a0a0a" stroke-width="1.2"/>
      <line x1="820" y1="20" x2="820" y2="220" stroke="#0a0a0a" stroke-width="1.2"/>
      <line x1="820" y1="220" x2="1140" y2="20" stroke="#0a0a0a" stroke-width="0.8" stroke-dasharray="2 2"/>

      <g font-family="Inter, sans-serif" font-size="9" fill="#525252">
        <text x="816" y="224" text-anchor="end">0</text>
        <text x="816" y="170" text-anchor="end">5</text>
        <text x="816" y="120" text-anchor="end">10</text>
        <text x="816" y="70" text-anchor="end">15</text>
        <text x="816" y="24" text-anchor="end">20</text>
      </g>
      <text x="780" y="120" font-size="10" fill="#525252" font-family="Inter, sans-serif" transform="rotate(-90 780 120)">observed</text>

      <!-- clean QQ following diagonal until top right -->
      <g fill="#065f46">
        <circle cx="828" cy="218" r="1.4"/><circle cx="836" cy="214" r="1.4"/><circle cx="846" cy="208" r="1.4"/>
        <circle cx="858" cy="201" r="1.4"/><circle cx="870" cy="194" r="1.4"/><circle cx="884" cy="186" r="1.4"/>
        <circle cx="900" cy="178" r="1.4"/><circle cx="918" cy="168" r="1.4"/><circle cx="938" cy="158" r="1.4"/>
        <circle cx="958" cy="148" r="1.4"/><circle cx="978" cy="136" r="1.4"/><circle cx="998" cy="123" r="1.4"/>
        <circle cx="1018" cy="108" r="1.4"/><circle cx="1038" cy="92" r="1.4"/><circle cx="1058" cy="74" r="1.4"/>
        <circle cx="1078" cy="55" r="1.4"/><circle cx="1095" cy="40" r="1.4"/><circle cx="1110" cy="30" r="1.4"/>
        <circle cx="1124" cy="24" r="1.4"/><circle cx="1135" cy="22" r="1.4"/>
      </g>

      <text x="980" y="248" text-anchor="middle" font-size="10" fill="#525252" font-family="Inter, sans-serif">expected &#8722;log&#8321;&#8320;(<tspan font-style="italic">p</tspan>)</text>
      <text x="836" y="46" font-size="11" font-weight="600" fill="#065f46" font-family="Inter, sans-serif">&#955;GC = 1.02</text>
      <text x="836" y="60" font-size="9" font-style="italic" fill="#525252" font-family="Inter, sans-serif">late departure only</text>
    </g>
  </g>
</svg>
