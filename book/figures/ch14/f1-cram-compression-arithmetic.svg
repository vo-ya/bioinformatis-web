<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="t d">
  <title id="t">CRAM compression arithmetic for one 30x human whole-genome sample</title>
  <desc id="d">A worked-example figure. Top: a horizontal bar chart compares on-disk sizes for one 30x WGS sample across five formats. FASTQ raw text 270 GB, FASTQ.gz 45 GB, BAM 80 GB, CRAM lossless 25 GB, CRAM with quality binning 14 GB. Bottom: a column breakdown for the BAM-to-CRAM-lossless transition showing the source of savings, with metadata 8 GB shrinking to 5 GB, sequence 24 GB shrinking to 2 GB (reference-based diff), and quality 48 GB shrinking to 18 GB (codec). A right-side stack of three iso-ratio reference lines marks 1x, 2x, 5x, and 20x.</desc>

  <rect x="0" y="0" width="1200" height="620" fill="#fafaf9"/>

  <!-- Header -->
  <g>
    <text x="60" y="40" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">WHERE THE BYTES GO &#8212; CRAM ARITHMETIC FOR ONE 30x WGS SAMPLE</text>
    <text x="60" y="58" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">Each row is the same biological data; the savings come from knowing what the bytes mean.</text>
  </g>

  <!-- ============================================================ -->
  <!-- PANEL A: format sizes                                          -->
  <!-- ============================================================ -->
  <g transform="translate(60, 96)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(A)  ON-DISK SIZE FOR ONE 30x WGS SAMPLE</text>

    <!-- horizontal axis scale: 0..280 GB across 800 px -->
    <!-- ticks -->
    <g font-family="Inter, sans-serif" font-size="10" fill="#8a8a85">
      <line x1="180" y1="34" x2="180" y2="294" stroke="#e5e3dc" stroke-width="1"/>
      <line x1="354" y1="34" x2="354" y2="294" stroke="#e5e3dc" stroke-width="1"/>
      <line x1="528" y1="34" x2="528" y2="294" stroke="#e5e3dc" stroke-width="1"/>
      <line x1="702" y1="34" x2="702" y2="294" stroke="#e5e3dc" stroke-width="1"/>
      <line x1="876" y1="34" x2="876" y2="294" stroke="#e5e3dc" stroke-width="1"/>
      <text x="180" y="306" text-anchor="middle">50 GB</text>
      <text x="354" y="306" text-anchor="middle">100 GB</text>
      <text x="528" y="306" text-anchor="middle">150 GB</text>
      <text x="702" y="306" text-anchor="middle">200 GB</text>
      <text x="876" y="306" text-anchor="middle">250 GB</text>
    </g>

    <!-- bars: scale = 3.48 px per GB -->
    <!-- FASTQ raw text 270 GB -->
    <g transform="translate(0, 44)">
      <text x="170" y="14" text-anchor="end" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">FASTQ raw</text>
      <rect x="180" y="0" width="940" height="24" fill="#c4342c" opacity="0.85"/>
      <text x="1130" y="16" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#0a0a0a">270 GB</text>
    </g>

    <!-- FASTQ.gz 45 GB -->
    <g transform="translate(0, 88)">
      <text x="170" y="14" text-anchor="end" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">FASTQ.gz</text>
      <rect x="180" y="0" width="157" height="24" fill="#b45309" opacity="0.85"/>
      <text x="345" y="16" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#0a0a0a">45 GB</text>
    </g>

    <!-- BAM 80 GB -->
    <g transform="translate(0, 132)">
      <text x="170" y="14" text-anchor="end" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">BAM</text>
      <rect x="180" y="0" width="278" height="24" fill="#525252" opacity="0.85"/>
      <text x="468" y="16" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#0a0a0a">80 GB</text>
      <text x="478" y="16" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#8a8a85">+ index</text>
    </g>

    <!-- CRAM lossless 25 GB -->
    <g transform="translate(0, 176)">
      <text x="170" y="14" text-anchor="end" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">CRAM (lossless)</text>
      <rect x="180" y="0" width="87" height="24" fill="#1e3a8a" opacity="0.85"/>
      <text x="275" y="16" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#0a0a0a">25 GB</text>
      <text x="320" y="16" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#8a8a85">3.2x smaller than BAM</text>
    </g>

    <!-- CRAM quality-binned 14 GB -->
    <g transform="translate(0, 220)">
      <text x="170" y="14" text-anchor="end" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">CRAM (Q-binned)</text>
      <rect x="180" y="0" width="49" height="24" fill="#065f46" opacity="0.85"/>
      <text x="237" y="16" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#0a0a0a">14 GB</text>
      <text x="285" y="16" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#8a8a85">5.7x smaller than BAM &#8212; lossy on quality only</text>
    </g>

    <!-- baseline -->
    <line x1="180" y1="34" x2="180" y2="294" stroke="#0a0a0a" stroke-width="1.5"/>
  </g>

  <!-- ============================================================ -->
  <!-- PANEL B: column breakdown                                      -->
  <!-- ============================================================ -->
  <g transform="translate(60, 440)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(B)  WHERE THE BAM-TO-CRAM SAVINGS COME FROM</text>

    <!-- BAM column -->
    <g transform="translate(110, 22)">
      <text x="60" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">BAM &#8212; 80 GB</text>
      <!-- metadata 8 GB = 16 px -->
      <rect x="0" y="14" width="120" height="16" fill="#525252" stroke="#0a0a0a" stroke-width="1"/>
      <text x="-10" y="26" text-anchor="end" font-family="Inter, sans-serif" font-size="10" fill="#525252">metadata 8 GB</text>
      <!-- sequence 24 GB = 48 px -->
      <rect x="0" y="30" width="120" height="48" fill="#b45309" opacity="0.7" stroke="#0a0a0a" stroke-width="1"/>
      <text x="60" y="58" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">sequence 24 GB</text>
      <!-- quality 48 GB = 96 px -->
      <rect x="0" y="78" width="120" height="96" fill="#c4342c" opacity="0.7" stroke="#0a0a0a" stroke-width="1"/>
      <text x="60" y="130" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">quality 48 GB</text>
    </g>

    <!-- arrow -->
    <g transform="translate(280, 110)">
      <line x1="0" y1="0" x2="80" y2="0" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arrow-ch14)"/>
      <text x="40" y="-8" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">content-aware</text>
      <text x="40" y="18" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252">re-encode</text>
    </g>

    <!-- CRAM column -->
    <g transform="translate(390, 22)">
      <text x="60" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">CRAM &#8212; 25 GB</text>
      <!-- metadata 5 GB = 10 px -->
      <rect x="0" y="14" width="120" height="10" fill="#525252" stroke="#0a0a0a" stroke-width="1"/>
      <text x="130" y="22" font-family="Inter, sans-serif" font-size="10" fill="#525252">metadata 5 GB &#8212; columnar</text>
      <!-- sequence 2 GB = 4 px -->
      <rect x="0" y="24" width="120" height="4" fill="#b45309" opacity="0.7" stroke="#0a0a0a" stroke-width="1"/>
      <text x="130" y="29" font-family="Inter, sans-serif" font-size="10" fill="#525252">sequence 2 GB &#8212; diff-from-reference</text>
      <!-- quality 18 GB = 36 px -->
      <rect x="0" y="28" width="120" height="36" fill="#c4342c" opacity="0.7" stroke="#0a0a0a" stroke-width="1"/>
      <text x="130" y="50" font-family="Inter, sans-serif" font-size="10" fill="#525252">quality 18 GB &#8212; specialised codec</text>
      <text x="130" y="64" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#8a8a85">(further to 7 GB with Q-binning)</text>
    </g>

    <!-- key takeaway -->
    <g transform="translate(820, 22)">
      <rect x="0" y="0" width="320" height="148" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1" rx="4"/>
      <text x="14" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">WHERE THE COMPRESSION COMES FROM</text>
      <text x="14" y="44" font-family="Inter, sans-serif" font-size="10.5" fill="#0a0a0a">Sequence: 12x &#8212; reference is the codebook;</text>
      <text x="14" y="60" font-family="Inter, sans-serif" font-size="10.5" fill="#0a0a0a">read = position + diffs.</text>
      <text x="14" y="80" font-family="Inter, sans-serif" font-size="10.5" fill="#0a0a0a">Quality: 2.7x &#8212; codec exploits run-length</text>
      <text x="14" y="96" font-family="Inter, sans-serif" font-size="10.5" fill="#0a0a0a">structure in Phred strings.</text>
      <text x="14" y="116" font-family="Inter, sans-serif" font-size="10.5" fill="#0a0a0a">Metadata: 1.6x &#8212; columnar separation</text>
      <text x="14" y="132" font-family="Inter, sans-serif" font-size="10.5" fill="#0a0a0a">compresses better than per-record interleave.</text>
    </g>
  </g>

  <!-- arrow markers -->
  <defs>
    <marker id="arrow-ch14" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>
</svg>
