<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" role="img" aria-labelledby="t d">
  <title id="t">Public-data accession grammar across SRA, ENA, GEO, and dbGaP</title>
  <desc id="d">Two-panel reference figure. Top: a grammar table giving the prefix, the entity, and the canonical URL pattern for each repository. SRA prefixes SRP project, SRR run, SRS sample, SRX experiment, PRJNA BioProject. ENA prefixes ERP, ERR, ERS, ERX, PRJEB. GEO prefixes GSE series, GSM sample, GPL platform. dbGaP prefixes phs study, pht trait, phv variable. Bottom: a hierarchy diagram showing BioProject containing Studies, Studies containing Samples, Samples containing Experiments, Experiments containing Runs. A worked example resolves SRR12345678 back through SRX, SRS, SRP, PRJNA.</desc>

  <rect x="0" y="0" width="1200" height="540" fill="#fafaf9"/>

  <!-- Header -->
  <g>
    <text x="60" y="40" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">ACCESSION GRAMMAR &#8212; HOW PUBLIC DATA IS NAMED</text>
    <text x="60" y="58" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">Once you know the prefix patterns, every public dataset has a stable, citable URI.</text>
  </g>

  <!-- ============================================================ -->
  <!-- PANEL A: prefix table                                          -->
  <!-- ============================================================ -->
  <g transform="translate(60, 96)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(A)  PREFIX TABLE</text>

    <!-- table card -->
    <rect x="0" y="14" width="1080" height="200" rx="4" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1.5"/>

    <!-- column headers -->
    <g font-family="Inter, sans-serif" font-size="10.5" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">
      <text x="120" y="36" text-anchor="middle">REPOSITORY</text>
      <text x="280" y="36" text-anchor="middle">PROJECT / STUDY</text>
      <text x="430" y="36" text-anchor="middle">SAMPLE</text>
      <text x="580" y="36" text-anchor="middle">EXPERIMENT</text>
      <text x="720" y="36" text-anchor="middle">RUN</text>
      <text x="900" y="36" text-anchor="middle">CANONICAL URL</text>
    </g>
    <line x1="14" y1="46" x2="1066" y2="46" stroke="#1e3a8a" stroke-width="1"/>

    <!-- rows -->
    <g font-family="Inter, sans-serif" font-size="11" fill="#0a0a0a">
      <!-- SRA -->
      <text x="20" y="70" font-weight="600">SRA  (NCBI)</text>
      <text x="280" y="70" text-anchor="middle" font-family="JetBrains Mono, monospace">SRP / PRJNA</text>
      <text x="430" y="70" text-anchor="middle" font-family="JetBrains Mono, monospace">SRS</text>
      <text x="580" y="70" text-anchor="middle" font-family="JetBrains Mono, monospace">SRX</text>
      <text x="720" y="70" text-anchor="middle" font-family="JetBrains Mono, monospace">SRR</text>
      <text x="900" y="70" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">trace.ncbi.nlm.nih.gov/Traces?run=&#8230;</text>
      <line x1="14" y1="82" x2="1066" y2="82" stroke="#e5e3dc" stroke-width="1"/>

      <!-- ENA -->
      <text x="20" y="106" font-weight="600">ENA  (EBI)</text>
      <text x="280" y="106" text-anchor="middle" font-family="JetBrains Mono, monospace">ERP / PRJEB</text>
      <text x="430" y="106" text-anchor="middle" font-family="JetBrains Mono, monospace">ERS</text>
      <text x="580" y="106" text-anchor="middle" font-family="JetBrains Mono, monospace">ERX</text>
      <text x="720" y="106" text-anchor="middle" font-family="JetBrains Mono, monospace">ERR</text>
      <text x="900" y="106" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">ebi.ac.uk/ena/browser/view/&#8230;</text>
      <line x1="14" y1="118" x2="1066" y2="118" stroke="#e5e3dc" stroke-width="1"/>

      <!-- GEO -->
      <text x="20" y="142" font-weight="600">GEO  (NCBI)</text>
      <text x="280" y="142" text-anchor="middle" font-family="JetBrains Mono, monospace">GSE</text>
      <text x="430" y="142" text-anchor="middle" font-family="JetBrains Mono, monospace">GSM</text>
      <text x="580" y="142" text-anchor="middle" font-style="italic" fill="#8a8a85">&#8212;</text>
      <text x="720" y="142" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#8a8a85">(via SRA)</text>
      <text x="900" y="142" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">ncbi.nlm.nih.gov/geo/query/&#8230;</text>
      <line x1="14" y1="154" x2="1066" y2="154" stroke="#e5e3dc" stroke-width="1"/>

      <!-- dbGaP -->
      <text x="20" y="178" font-weight="600">dbGaP  (NIH)</text>
      <text x="280" y="178" text-anchor="middle" font-family="JetBrains Mono, monospace">phs</text>
      <text x="430" y="178" text-anchor="middle" font-style="italic" fill="#8a8a85">&#8212;</text>
      <text x="580" y="178" text-anchor="middle" font-family="JetBrains Mono, monospace">pht</text>
      <text x="720" y="178" text-anchor="middle" font-family="JetBrains Mono, monospace">phv</text>
      <text x="900" y="178" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">ncbi.nlm.nih.gov/gap/&#8230;  (gated)</text>
    </g>

    <!-- legend -->
    <text x="0" y="232" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#8a8a85">All four follow the INSDC interchange model &#8212; SRA, ENA, and DDBJ mirror each other daily; the prefix differs but the entity is one and the same record.</text>
  </g>

  <!-- ============================================================ -->
  <!-- PANEL B: containment hierarchy with worked example             -->
  <!-- ============================================================ -->
  <g transform="translate(60, 372)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(B)  CONTAINMENT HIERARCHY &#8212; WORKED EXAMPLE</text>

    <!-- BioProject -->
    <g transform="translate(0, 28)">
      <rect x="0" y="0" width="160" height="46" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
      <text x="80" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">BIOPROJECT</text>
      <text x="80" y="36" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11">PRJNA489243</text>
    </g>

    <!-- arrow -->
    <line x1="160" y1="51" x2="200" y2="51" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arrow-ch14-b)"/>

    <!-- Study -->
    <g transform="translate(200, 28)">
      <rect x="0" y="0" width="160" height="46" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
      <text x="80" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">STUDY</text>
      <text x="80" y="36" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11">SRP123456</text>
    </g>

    <line x1="360" y1="51" x2="400" y2="51" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arrow-ch14-b)"/>

    <!-- Sample -->
    <g transform="translate(400, 28)">
      <rect x="0" y="0" width="160" height="46" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
      <text x="80" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">SAMPLE</text>
      <text x="80" y="36" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11">SRS789012</text>
    </g>

    <line x1="560" y1="51" x2="600" y2="51" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arrow-ch14-b)"/>

    <!-- Experiment -->
    <g transform="translate(600, 28)">
      <rect x="0" y="0" width="160" height="46" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
      <text x="80" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">EXPERIMENT</text>
      <text x="80" y="36" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11">SRX456789</text>
    </g>

    <line x1="760" y1="51" x2="800" y2="51" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arrow-ch14-b)"/>

    <!-- Run -->
    <g transform="translate(800, 28)">
      <rect x="0" y="0" width="160" height="46" rx="4" fill="#1e3a8a"/>
      <text x="80" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#ffffff">RUN  (data record)</text>
      <text x="80" y="36" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#ffffff">SRR12345678</text>
    </g>

    <!-- annotation -->
    <text x="80" y="98" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252">one project</text>
    <text x="280" y="98" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252">several studies</text>
    <text x="480" y="98" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252">many samples</text>
    <text x="680" y="98" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252">one library prep</text>
    <text x="880" y="98" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252">one FASTQ pair</text>
  </g>

  <defs>
    <marker id="arrow-ch14-b" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>
</svg>
