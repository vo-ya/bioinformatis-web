<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="t d">
  <title id="t">MSA depth versus contact-prediction accuracy for DCA and AlphaFold2</title>
  <desc id="d">A plot showing top-L contact prediction accuracy on the y axis as a function of effective MSA depth on the x axis (log scale from 10 to 100000 sequences). Two curves: classical DCA (Marks/Morcos 2011) climbs slowly from below 0.1 at 50 sequences to about 0.75 at 5000 sequences, plateauing at 0.85 by 50000. AlphaFold2 (Jumper 2021) starts higher even on shallow MSAs (about 0.45 at 50 sequences), climbs faster, and saturates near 0.95 by 1000 sequences. Three banded regions across the x axis are marked &quot;orphan&quot; (under 50 sequences), &quot;typical eukaryotic&quot; (500–5000), and &quot;metagenomic-enriched&quot; (over 10000). A vertical rule at the 1000-sequence mark is annotated &quot;deep enough for classical DCA&quot;.</desc>

  <rect x="0" y="0" width="1200" height="620" fill="#fafaf9"/>

  <!-- Header -->
  <g>
    <text x="60" y="40" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">DEPTH OF THE MSA SETS THE CEILING ON CONTACT PREDICTION</text>
    <text x="60" y="58" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">Top-L precision on a CAMEO-style contact benchmark, by method, as a function of effective MSA sequences.</text>
  </g>

  <!-- Plot area: x from 100 to 1140, y from 110 to 510 -->
  <!-- Log x from 10 to 100000 (4 decades). y from 0 to 1.0 -->
  <g transform="translate(0,0)">

    <!-- Y axis -->
    <line x1="160" y1="110" x2="160" y2="510" stroke="#374151" stroke-width="1"/>
    <!-- X axis -->
    <line x1="160" y1="510" x2="1100" y2="510" stroke="#374151" stroke-width="1"/>

    <!-- Y gridlines and tick labels -->
    <g font-family="Inter, sans-serif" font-size="10" fill="#8a8a85">
      <line x1="160" y1="110" x2="1100" y2="110" stroke="#e5e3dc" stroke-width="0.5"/>
      <text x="150" y="114" text-anchor="end">1.0</text>
      <line x1="160" y1="190" x2="1100" y2="190" stroke="#e5e3dc" stroke-width="0.5"/>
      <text x="150" y="194" text-anchor="end">0.8</text>
      <line x1="160" y1="270" x2="1100" y2="270" stroke="#e5e3dc" stroke-width="0.5"/>
      <text x="150" y="274" text-anchor="end">0.6</text>
      <line x1="160" y1="350" x2="1100" y2="350" stroke="#e5e3dc" stroke-width="0.5"/>
      <text x="150" y="354" text-anchor="end">0.4</text>
      <line x1="160" y1="430" x2="1100" y2="430" stroke="#e5e3dc" stroke-width="0.5"/>
      <text x="150" y="434" text-anchor="end">0.2</text>
      <text x="150" y="514" text-anchor="end">0.0</text>
    </g>

    <!-- Y axis label -->
    <text x="60" y="310" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151" transform="rotate(-90 60 310)">top-L contact precision</text>

    <!-- X axis tick labels: log scale, decade 10/100/1k/10k/100k mapped to 160..1100 -->
    <!-- decade width = (1100-160)/4 = 235 px -->
    <g font-family="JetBrains Mono, monospace" font-size="10" fill="#8a8a85">
      <line x1="160" y1="510" x2="160" y2="516" stroke="#374151" stroke-width="1"/>
      <text x="160" y="530" text-anchor="middle">10</text>
      <line x1="395" y1="510" x2="395" y2="516" stroke="#374151" stroke-width="1"/>
      <text x="395" y="530" text-anchor="middle">100</text>
      <line x1="630" y1="510" x2="630" y2="516" stroke="#374151" stroke-width="1"/>
      <text x="630" y="530" text-anchor="middle">1k</text>
      <line x1="865" y1="510" x2="865" y2="516" stroke="#374151" stroke-width="1"/>
      <text x="865" y="530" text-anchor="middle">10k</text>
      <line x1="1100" y1="510" x2="1100" y2="516" stroke="#374151" stroke-width="1"/>
      <text x="1100" y="530" text-anchor="middle">100k</text>
    </g>
    <text x="630" y="555" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151" text-anchor="middle">effective MSA sequences (log scale)</text>

    <!-- Regime bands -->
    <g opacity="0.18">
      <rect x="160" y="110" width="120" height="400" fill="#dc2626"/>
      <rect x="395" y="110" width="350" height="400" fill="#b45309"/>
      <rect x="745" y="110" width="355" height="400" fill="#065f46"/>
    </g>
    <g font-family="Inter, sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em" fill="#374151">
      <text x="220" y="100" text-anchor="middle" fill="#dc2626">ORPHAN</text>
      <text x="570" y="100" text-anchor="middle" fill="#b45309">TYPICAL EUKARYOTIC</text>
      <text x="920" y="100" text-anchor="middle" fill="#065f46">METAGENOMIC-ENRICHED</text>
    </g>

    <!-- DCA curve (slow climb, plateaus at 0.85). Points along the log scale -->
    <!-- (x_log, y_acc): (10,0.05),(50,0.08),(100,0.18),(300,0.40),(1000,0.62),(3000,0.75),(10000,0.82),(30000,0.84),(100000,0.85) -->
    <!-- Mapping: x_px = 160 + 235*log10(x), y_px = 510 - 400*y_acc -->
    <path d="M 160 490 L 324 478 L 395 438 L 507 350 L 630 262 L 742 210 L 865 182 L 977 174 L 1100 170"
          fill="none" stroke="#b45309" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- DCA data points -->
    <g fill="#b45309">
      <circle cx="324" cy="478" r="3.5"/>
      <circle cx="395" cy="438" r="3.5"/>
      <circle cx="507" cy="350" r="3.5"/>
      <circle cx="630" cy="262" r="3.5"/>
      <circle cx="742" cy="210" r="3.5"/>
      <circle cx="865" cy="182" r="3.5"/>
      <circle cx="977" cy="174" r="3.5"/>
    </g>

    <!-- AlphaFold2 curve (starts higher, saturates faster) -->
    <!-- (50,0.42),(100,0.58),(300,0.78),(1000,0.90),(3000,0.94),(10000,0.95),(30000,0.95),(100000,0.95) -->
    <path d="M 160 382 L 324 342 L 395 278 L 507 198 L 630 150 L 742 134 L 865 130 L 977 130 L 1100 130"
          fill="none" stroke="#1e3a8a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#1e3a8a">
      <circle cx="160" cy="382" r="3.5"/>
      <circle cx="324" cy="342" r="3.5"/>
      <circle cx="395" cy="278" r="3.5"/>
      <circle cx="507" cy="198" r="3.5"/>
      <circle cx="630" cy="150" r="3.5"/>
      <circle cx="742" cy="134" r="3.5"/>
      <circle cx="865" cy="130" r="3.5"/>
      <circle cx="977" cy="130" r="3.5"/>
    </g>

    <!-- Threshold line at MSA=1000 -->
    <line x1="630" y1="110" x2="630" y2="510" stroke="#374151" stroke-width="0.8" stroke-dasharray="4 3"/>
    <text x="640" y="125" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#374151">deep enough for classical DCA</text>

    <!-- Curve labels -->
    <g font-family="Inter, sans-serif" font-size="11" font-weight="600">
      <text x="1115" y="130" fill="#1e3a8a">AlphaFold2</text>
      <text x="1115" y="174" fill="#b45309">classical DCA</text>
    </g>
  </g>

  <!-- Footer annotation -->
  <g font-family="Inter, sans-serif" font-size="10" fill="#525252">
    <text x="60" y="595">Indicative trend; actual numbers vary by protein family and benchmark. AlphaFold's advantage on shallow MSAs comes from learned priors</text>
    <text x="60" y="608">that compensate for thin evolutionary signal — orphan proteins remain hard, but not hopeless.</text>
  </g>

</svg>
