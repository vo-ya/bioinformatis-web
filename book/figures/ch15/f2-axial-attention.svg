<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="t d">
  <title id="t">Axial attention versus full 2-D attention for the Evoformer MSA representation</title>
  <desc id="d">A two-panel figure. Left panel: full 2-D attention over an MSA grid with s sequences along the vertical axis and r residues along the horizontal axis. Every cell attends to every other cell; arrows fan out from one highlighted cell to all (s*r - 1) others, illustrating the O((s*r)^2) cost. Right panel: axial attention. Top half shows row-wise attention — within each row (one MSA sequence), every cell attends to every other cell in the same row, cost O(s * r^2). Bottom half shows column-wise attention — within each column (one residue position), every cell attends to every other cell in the same column, cost O(r * s^2). Together the two passes recover most of the expressive power of full attention at a fraction of the cost. A bottom strip compares the three complexities for a representative MSA of s=512 sequences and r=512 residues.</desc>

  <rect x="0" y="0" width="1200" height="640" fill="#fafaf9"/>

  <!-- Header -->
  <g>
    <text x="60" y="40" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">AXIAL ATTENTION REPLACES FULL 2-D ATTENTION ON THE MSA</text>
    <text x="60" y="58" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">Row attention sweeps within sequences; column attention sweeps within positions; the combination is O(s*r^2 + r*s^2) instead of O(s^2*r^2).</text>
  </g>

  <!-- ============ LEFT PANEL — full 2-D attention ============ -->
  <g transform="translate(40, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#dc2626" letter-spacing="0.06em">(A)  FULL 2-D ATTENTION</text>
    <text x="0" y="18" font-family="Inter, sans-serif" font-size="10" fill="#525252">Every cell attends to every other.</text>

    <!-- 6x6 MSA grid, cell=36px -->
    <g transform="translate(60, 50)">
      <g fill="none" stroke="#374151" stroke-width="1">
        <!-- rows -->
        <line x1="0" y1="0" x2="288" y2="0"/>
        <line x1="0" y1="48" x2="288" y2="48"/>
        <line x1="0" y1="96" x2="288" y2="96"/>
        <line x1="0" y1="144" x2="288" y2="144"/>
        <line x1="0" y1="192" x2="288" y2="192"/>
        <line x1="0" y1="240" x2="288" y2="240"/>
        <line x1="0" y1="288" x2="288" y2="288"/>
        <!-- cols -->
        <line x1="0" y1="0" x2="0" y2="288"/>
        <line x1="48" y1="0" x2="48" y2="288"/>
        <line x1="96" y1="0" x2="96" y2="288"/>
        <line x1="144" y1="0" x2="144" y2="288"/>
        <line x1="192" y1="0" x2="192" y2="288"/>
        <line x1="240" y1="0" x2="240" y2="288"/>
        <line x1="288" y1="0" x2="288" y2="288"/>
      </g>

      <!-- highlighted query cell (row 3, col 3) -->
      <rect x="144" y="144" width="48" height="48" fill="#1e3a8a" opacity="0.85"/>
      <text x="168" y="173" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" text-anchor="middle" fill="#fafaf9">q</text>

      <!-- fanned-out arrows to many cells -->
      <g stroke="#dc2626" stroke-width="0.8" opacity="0.55" fill="none">
        <line x1="168" y1="168" x2="24"  y2="24"/>
        <line x1="168" y1="168" x2="72"  y2="24"/>
        <line x1="168" y1="168" x2="120" y2="24"/>
        <line x1="168" y1="168" x2="216" y2="24"/>
        <line x1="168" y1="168" x2="264" y2="24"/>
        <line x1="168" y1="168" x2="24"  y2="72"/>
        <line x1="168" y1="168" x2="120" y2="72"/>
        <line x1="168" y1="168" x2="216" y2="72"/>
        <line x1="168" y1="168" x2="264" y2="72"/>
        <line x1="168" y1="168" x2="24"  y2="120"/>
        <line x1="168" y1="168" x2="72"  y2="120"/>
        <line x1="168" y1="168" x2="120" y2="120"/>
        <line x1="168" y1="168" x2="216" y2="120"/>
        <line x1="168" y1="168" x2="264" y2="120"/>
        <line x1="168" y1="168" x2="24"  y2="216"/>
        <line x1="168" y1="168" x2="72"  y2="216"/>
        <line x1="168" y1="168" x2="120" y2="216"/>
        <line x1="168" y1="168" x2="216" y2="216"/>
        <line x1="168" y1="168" x2="264" y2="216"/>
        <line x1="168" y1="168" x2="24"  y2="264"/>
        <line x1="168" y1="168" x2="72"  y2="264"/>
        <line x1="168" y1="168" x2="120" y2="264"/>
        <line x1="168" y1="168" x2="216" y2="264"/>
        <line x1="168" y1="168" x2="264" y2="264"/>
      </g>

      <!-- axis labels -->
      <text x="-20" y="148" font-family="Inter, sans-serif" font-size="10" fill="#374151" text-anchor="end">s sequences</text>
      <text x="144" y="312" font-family="Inter, sans-serif" font-size="10" fill="#374151" text-anchor="middle">r residues</text>
    </g>

    <!-- complexity tag -->
    <g transform="translate(60, 370)">
      <rect x="0" y="0" width="288" height="44" fill="#fafaf9" stroke="#dc2626" stroke-width="1.5"/>
      <text x="144" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151" text-anchor="middle">cost per layer</text>
      <text x="144" y="36" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#dc2626" text-anchor="middle">O( (s * r)^2 )</text>
    </g>
  </g>

  <!-- ============ RIGHT PANEL — axial attention ============ -->
  <g transform="translate(620, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#065f46" letter-spacing="0.06em">(B)  AXIAL ATTENTION (TWO PASSES)</text>
    <text x="0" y="18" font-family="Inter, sans-serif" font-size="10" fill="#525252">Row sweep, then column sweep, alternating.</text>

    <!-- Top: row attention grid (within row 3, attending across columns) -->
    <g transform="translate(20, 50)">
      <text x="0" y="-4" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#065f46" letter-spacing="0.06em">ROW SWEEP — across residues</text>
      <g fill="none" stroke="#374151" stroke-width="1">
        <line x1="0" y1="0" x2="288" y2="0"/>
        <line x1="0" y1="24" x2="288" y2="24"/>
        <line x1="0" y1="48" x2="288" y2="48"/>
        <line x1="0" y1="72" x2="288" y2="72"/>
        <line x1="0" y1="96" x2="288" y2="96"/>
        <line x1="0" y1="120" x2="288" y2="120"/>
        <line x1="0" y1="144" x2="288" y2="144"/>
        <line x1="0" y1="0" x2="0" y2="144"/>
        <line x1="48" y1="0" x2="48" y2="144"/>
        <line x1="96" y1="0" x2="96" y2="144"/>
        <line x1="144" y1="0" x2="144" y2="144"/>
        <line x1="192" y1="0" x2="192" y2="144"/>
        <line x1="240" y1="0" x2="240" y2="144"/>
        <line x1="288" y1="0" x2="288" y2="144"/>
      </g>
      <!-- highlight row 3 (y=48..72) -->
      <rect x="0" y="72" width="288" height="24" fill="#065f46" opacity="0.18"/>
      <rect x="120" y="72" width="24" height="24" fill="#1e3a8a" opacity="0.85"/>
      <text x="132" y="89" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" text-anchor="middle" fill="#fafaf9">q</text>
      <!-- arrows along the row -->
      <g stroke="#065f46" stroke-width="0.9" opacity="0.85" fill="none">
        <line x1="132" y1="84" x2="12"  y2="84"/>
        <line x1="132" y1="84" x2="60"  y2="84"/>
        <line x1="132" y1="84" x2="108" y2="84"/>
        <line x1="132" y1="84" x2="156" y2="84"/>
        <line x1="132" y1="84" x2="204" y2="84"/>
        <line x1="132" y1="84" x2="252" y2="84"/>
      </g>
      <text x="-12" y="86" font-family="Inter, sans-serif" font-size="9" fill="#374151" text-anchor="end">seq i</text>
    </g>

    <!-- Bottom: column attention grid (within col 3, attending across rows) -->
    <g transform="translate(20, 240)">
      <text x="0" y="-4" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#065f46" letter-spacing="0.06em">COLUMN SWEEP — across species</text>
      <g fill="none" stroke="#374151" stroke-width="1">
        <line x1="0" y1="0" x2="288" y2="0"/>
        <line x1="0" y1="24" x2="288" y2="24"/>
        <line x1="0" y1="48" x2="288" y2="48"/>
        <line x1="0" y1="72" x2="288" y2="72"/>
        <line x1="0" y1="96" x2="288" y2="96"/>
        <line x1="0" y1="120" x2="288" y2="120"/>
        <line x1="0" y1="144" x2="288" y2="144"/>
        <line x1="0" y1="0" x2="0" y2="144"/>
        <line x1="48" y1="0" x2="48" y2="144"/>
        <line x1="96" y1="0" x2="96" y2="144"/>
        <line x1="144" y1="0" x2="144" y2="144"/>
        <line x1="192" y1="0" x2="192" y2="144"/>
        <line x1="240" y1="0" x2="240" y2="144"/>
        <line x1="288" y1="0" x2="288" y2="144"/>
      </g>
      <!-- highlight column 3 (x=120..144) -->
      <rect x="120" y="0" width="24" height="144" fill="#065f46" opacity="0.18"/>
      <rect x="120" y="72" width="24" height="24" fill="#1e3a8a" opacity="0.85"/>
      <text x="132" y="89" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" text-anchor="middle" fill="#fafaf9">q</text>
      <!-- arrows along the column -->
      <g stroke="#065f46" stroke-width="0.9" opacity="0.85" fill="none">
        <line x1="132" y1="84" x2="132" y2="12"/>
        <line x1="132" y1="84" x2="132" y2="36"/>
        <line x1="132" y1="84" x2="132" y2="60"/>
        <line x1="132" y1="84" x2="132" y2="108"/>
        <line x1="132" y1="84" x2="132" y2="132"/>
      </g>
      <text x="132" y="160" font-family="Inter, sans-serif" font-size="9" fill="#374151" text-anchor="middle">residue j</text>
    </g>

    <!-- complexity tag -->
    <g transform="translate(20, 410)">
      <rect x="0" y="0" width="288" height="44" fill="#fafaf9" stroke="#065f46" stroke-width="1.5"/>
      <text x="144" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151" text-anchor="middle">cost per layer</text>
      <text x="144" y="36" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#065f46" text-anchor="middle">O( s * r^2 ) + O( r * s^2 )</text>
    </g>
  </g>

  <!-- =============== Bottom comparison strip =================== -->
  <g transform="translate(60, 575)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">CONCRETE FOR s = r = 512</text>
    <g font-family="JetBrains Mono, monospace" font-size="11" fill="#374151">
      <text x="220" y="0">full 2-D:  6.9 * 10^10 ops</text>
      <text x="540" y="0">axial:  2.7 * 10^8 ops</text>
      <text x="800" y="0" fill="#065f46" font-weight="600">~250x cheaper</text>
    </g>
  </g>

</svg>
