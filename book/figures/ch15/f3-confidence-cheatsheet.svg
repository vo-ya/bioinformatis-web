<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-labelledby="t d">
  <title id="t">A reading guide for AlphaFold confidence metrics — pLDDT bands, PAE patterns, and what to do</title>
  <desc id="d">A reference card laid out in three rows. Row 1: pLDDT band chart showing four colour-coded bands from 90+ (very high, dark blue) down to under 50 (very low, red), each with a one-line interpretation and a recommended action. Row 2: four miniature PAE matrices showing canonical patterns: single well-resolved domain (one dark block); two confidently folded domains with uncertain inter-domain orientation (two dark blocks plus bright off-diagonal); flexible linker between confident chunks (dark blocks plus a bright stripe); intrinsically disordered region (bright cloud, no structure). Row 3: a flowchart-style decision tree starting from &quot;you have an AF prediction&quot; and routing through pLDDT and PAE checks to four recommendations.</desc>

  <rect x="0" y="0" width="1200" height="660" fill="#fafaf9"/>

  <!-- Header -->
  <g>
    <text x="60" y="36" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">READING AN ALPHAFOLD PREDICTION — pLDDT AND PAE TOGETHER, NEVER ALONE</text>
    <text x="60" y="54" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">pLDDT answers "is this residue placed correctly locally?"  PAE answers "do I know where this residue is relative to that one?"</text>
  </g>

  <!-- ===== Row 1: pLDDT bands ===== -->
  <g transform="translate(60, 90)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(A)  pLDDT BANDS — PER-RESIDUE LOCAL CONFIDENCE</text>

    <!-- four band rows, 1080 wide total -->
    <g transform="translate(0, 16)">
      <!-- 90+ -->
      <rect x="0" y="0" width="270" height="58" fill="#1e3a8a"/>
      <text x="135" y="24" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#fafaf9" text-anchor="middle">pLDDT &gt; 90</text>
      <text x="135" y="44" font-family="Inter, sans-serif" font-size="10" fill="#fafaf9" text-anchor="middle">very high — backbone accurate to ~1 A</text>

      <!-- 70-90 -->
      <rect x="270" y="0" width="270" height="58" fill="#7c3aed"/>
      <text x="405" y="24" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#fafaf9" text-anchor="middle">70-90</text>
      <text x="405" y="44" font-family="Inter, sans-serif" font-size="10" fill="#fafaf9" text-anchor="middle">confident — backbone correct, sidechains usable</text>

      <!-- 50-70 -->
      <rect x="540" y="0" width="270" height="58" fill="#b45309"/>
      <text x="675" y="24" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#fafaf9" text-anchor="middle">50-70</text>
      <text x="675" y="44" font-family="Inter, sans-serif" font-size="10" fill="#fafaf9" text-anchor="middle">low — fold class right, details unreliable</text>

      <!-- &lt; 50 -->
      <rect x="810" y="0" width="270" height="58" fill="#dc2626"/>
      <text x="945" y="24" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#fafaf9" text-anchor="middle">&lt; 50</text>
      <text x="945" y="44" font-family="Inter, sans-serif" font-size="10" fill="#fafaf9" text-anchor="middle">very low — likely disordered or wrong</text>
    </g>

    <!-- recommended action row -->
    <g transform="translate(0, 86)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
      <text x="135" y="0" text-anchor="middle">trust for atom-level work</text>
      <text x="405" y="0" text-anchor="middle">trust for domain analysis</text>
      <text x="675" y="0" text-anchor="middle">use shape only; verify experimentally</text>
      <text x="945" y="0" text-anchor="middle">do not interpret as structure</text>
    </g>
  </g>

  <!-- ===== Row 2: PAE pattern gallery ===== -->
  <g transform="translate(60, 250)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(B)  PAE PATTERNS — INTER-RESIDUE RELATIVE CONFIDENCE</text>

    <!-- four 240x180 cells -->
    <g transform="translate(0, 20)">

      <!-- (1) single well-resolved domain -->
      <g>
        <rect x="0" y="0" width="240" height="180" fill="#fafaf9" stroke="#374151" stroke-width="1"/>
        <!-- single dark square taking most of the matrix -->
        <rect x="30" y="30" width="180" height="180" fill="none"/>
        <rect x="40" y="40" width="160" height="120" fill="#1e3a8a" opacity="0.85"/>
        <text x="120" y="195" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">SINGLE COHERENT DOMAIN</text>
        <text x="120" y="208" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">low PAE everywhere</text>
      </g>

      <!-- (2) two domains with uncertain orientation -->
      <g transform="translate(280, 0)">
        <rect x="0" y="0" width="240" height="180" fill="#fafaf9" stroke="#374151" stroke-width="1"/>
        <!-- background bright -->
        <rect x="10" y="10" width="220" height="160" fill="#dc2626" opacity="0.35"/>
        <!-- domain 1 -->
        <rect x="10" y="10" width="100" height="74" fill="#1e3a8a" opacity="0.85"/>
        <!-- domain 2 -->
        <rect x="115" y="92" width="115" height="78" fill="#1e3a8a" opacity="0.85"/>
        <text x="120" y="195" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">TWO DOMAINS, FLOPPY HINGE</text>
        <text x="120" y="208" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">trust each domain, not their angle</text>
      </g>

      <!-- (3) flexible linker between confident chunks -->
      <g transform="translate(560, 0)">
        <rect x="0" y="0" width="240" height="180" fill="#fafaf9" stroke="#374151" stroke-width="1"/>
        <rect x="10" y="10" width="220" height="160" fill="#1e3a8a" opacity="0.40"/>
        <!-- bright stripe horizontal/vertical at residues ~95..105 -->
        <rect x="10" y="80" width="220" height="20" fill="#dc2626" opacity="0.65"/>
        <rect x="110" y="10" width="20" height="160" fill="#dc2626" opacity="0.65"/>
        <text x="120" y="195" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">FLEXIBLE LINKER STRIPE</text>
        <text x="120" y="208" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">a few residues "don't know"</text>
      </g>

      <!-- (4) intrinsic disorder -->
      <g transform="translate(840, 0)">
        <rect x="0" y="0" width="240" height="180" fill="#fafaf9" stroke="#374151" stroke-width="1"/>
        <rect x="10" y="10" width="220" height="160" fill="#dc2626" opacity="0.55"/>
        <!-- a tiny central confident island -->
        <rect x="100" y="80" width="36" height="28" fill="#1e3a8a" opacity="0.80"/>
        <text x="120" y="195" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">INTRINSIC DISORDER</text>
        <text x="120" y="208" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">no usable 3-D placement at all</text>
      </g>
    </g>
  </g>

  <!-- ===== Row 3: decision tree ===== -->
  <g transform="translate(60, 520)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(C)  WHAT TO DO — DECISION TREE</text>

    <g transform="translate(0, 16)">
      <!-- root -->
      <rect x="0" y="20" width="180" height="36" fill="#fafaf9" stroke="#374151" stroke-width="1.5"/>
      <text x="90" y="34" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">AF prediction in hand</text>
      <text x="90" y="48" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">colour by pLDDT, open PAE</text>

      <!-- arrow to decision -->
      <line x1="180" y1="38" x2="220" y2="38" stroke="#374151" stroke-width="1"/>

      <!-- decision -->
      <polygon points="220,38 250,18 280,38 250,58" fill="#fafaf9" stroke="#374151" stroke-width="1.5"/>
      <text x="250" y="42" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#374151" text-anchor="middle">mean pLDDT?</text>

      <!-- four outcome boxes from the decision -->
      <line x1="280" y1="38" x2="320" y2="38" stroke="#374151" stroke-width="1"/>

      <!-- high pLDDT -->
      <rect x="320" y="0" width="200" height="32" fill="#1e3a8a" opacity="0.92"/>
      <text x="420" y="20" font-family="Inter, sans-serif" font-size="10" fill="#fafaf9" text-anchor="middle">&gt; 80 AND PAE clean</text>
      <line x1="280" y1="38" x2="320" y2="16" stroke="#374151" stroke-width="1"/>

      <!-- multi-domain -->
      <rect x="320" y="40" width="200" height="32" fill="#7c3aed" opacity="0.92"/>
      <text x="420" y="60" font-family="Inter, sans-serif" font-size="10" fill="#fafaf9" text-anchor="middle">domains good, hinge bright</text>
      <line x1="280" y1="38" x2="320" y2="56" stroke="#374151" stroke-width="1"/>

      <!-- mixed -->
      <rect x="320" y="80" width="200" height="32" fill="#b45309" opacity="0.92"/>
      <text x="420" y="100" font-family="Inter, sans-serif" font-size="10" fill="#fafaf9" text-anchor="middle">patchy 50-70</text>

      <!-- bad -->
      <rect x="320" y="120" width="200" height="32" fill="#dc2626" opacity="0.92"/>
      <text x="420" y="140" font-family="Inter, sans-serif" font-size="10" fill="#fafaf9" text-anchor="middle">mostly &lt; 50</text>

      <!-- second decision (PAE) -->
      <line x1="520" y1="16"  x2="560" y2="16" stroke="#374151" stroke-width="1"/>
      <line x1="520" y1="56"  x2="560" y2="56" stroke="#374151" stroke-width="1"/>
      <line x1="520" y1="96"  x2="560" y2="96" stroke="#374151" stroke-width="1"/>
      <line x1="520" y1="136" x2="560" y2="136" stroke="#374151" stroke-width="1"/>

      <!-- action boxes -->
      <g font-family="Inter, sans-serif" font-size="10" fill="#374151">
        <rect x="560" y="0" width="560" height="32" fill="#fafaf9" stroke="#1e3a8a" stroke-width="1"/>
        <text x="572" y="20">use as structural input — docking, mutagenesis, contact analysis</text>

        <rect x="560" y="40" width="560" height="32" fill="#fafaf9" stroke="#7c3aed" stroke-width="1"/>
        <text x="572" y="60">analyse each domain separately; do not infer multi-domain geometry</text>

        <rect x="560" y="80" width="560" height="32" fill="#fafaf9" stroke="#b45309" stroke-width="1"/>
        <text x="572" y="100">treat as fold-class hypothesis; resequence with deeper MSA / templates</text>

        <rect x="560" y="120" width="560" height="32" fill="#fafaf9" stroke="#dc2626" stroke-width="1"/>
        <text x="572" y="140">probably disordered — switch to IDR-aware tools (AlphaFlow, ESMFold ensembles)</text>
      </g>
    </g>
  </g>

</svg>
