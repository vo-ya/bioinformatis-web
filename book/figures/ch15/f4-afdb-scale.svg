<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="t d">
  <title id="t">The AlphaFold Database in context — scale, confidence distribution, and what it changes</title>
  <desc id="d">A three-panel summary of the AlphaFold Protein Structure Database. Panel A is a log-scale bar chart comparing the number of structures in the Protein Data Bank circa 2021 (about 180,000 experimental), the original AlphaFold DB release in 2021 (about 1 million), and the v3 release in 2024 (about 214 million predicted structures spanning nearly all of UniProt). Panel B is a stacked donut chart showing what fraction of AlphaFold DB structures fall in each pLDDT confidence band: about 35 percent above 90, 30 percent between 70 and 90, 20 percent between 50 and 70, and 15 percent below 50. Panel C is a four-row before/after comparison: for druggable target structure, dark-proteome annotation, evolutionary structure comparison, and de-novo design starting point — the pre-AF era is on the left with red bars, the post-AF era is on the right with green bars.</desc>

  <rect x="0" y="0" width="1200" height="620" fill="#fafaf9"/>

  <!-- Header -->
  <g>
    <text x="60" y="40" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">THE ALPHAFOLD DATABASE FLIPPED THE STRUCTURAL UNIVERSE</text>
    <text x="60" y="58" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#525252">~1,000x more predicted structures than experimental ones; about two-thirds at confident-or-better pLDDT.</text>
  </g>

  <!-- ===== Panel A: log-scale bar chart ===== -->
  <g transform="translate(60, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(A)  STRUCTURES AVAILABLE (LOG SCALE)</text>

    <!-- Y-axis: bars stack vertically, mapped to log scale 10^5..10^9 over height 320 -->
    <!-- We'll lay it out horizontally instead: bars side by side, height encodes log -->

    <!-- Three bars at x=20, 200, 380, each width=120 -->
    <!-- Heights: log10(180000)=5.26, log10(1e6)=6.0, log10(2.14e8)=8.33 -->
    <!-- Bar baseline y=380, max height=320 — scale = 320/(8.5-5)=91.4 -->

    <g transform="translate(0, 30)">

      <!-- Gridlines / log ticks -->
      <g font-family="JetBrains Mono, monospace" font-size="10" fill="#8a8a85">
        <line x1="0" y1="350" x2="500" y2="350" stroke="#374151" stroke-width="1"/>
        <line x1="0" y1="280" x2="500" y2="280" stroke="#e5e3dc" stroke-width="0.5" stroke-dasharray="2 2"/>
        <line x1="0" y1="210" x2="500" y2="210" stroke="#e5e3dc" stroke-width="0.5" stroke-dasharray="2 2"/>
        <line x1="0" y1="140" x2="500" y2="140" stroke="#e5e3dc" stroke-width="0.5" stroke-dasharray="2 2"/>
        <line x1="0" y1="70" x2="500" y2="70" stroke="#e5e3dc" stroke-width="0.5" stroke-dasharray="2 2"/>
        <line x1="0" y1="0" x2="500" y2="0" stroke="#e5e3dc" stroke-width="0.5" stroke-dasharray="2 2"/>
        <text x="-8" y="354" text-anchor="end">10^5</text>
        <text x="-8" y="284" text-anchor="end">10^6</text>
        <text x="-8" y="214" text-anchor="end">10^7</text>
        <text x="-8" y="144" text-anchor="end">10^8</text>
        <text x="-8" y="74" text-anchor="end">10^9</text>
      </g>

      <!-- Bar 1: PDB experimental, ~180k -->
      <!-- height = (log10(180000)-5) * 70 = 0.255 * 70 = 18 px -->
      <rect x="40" y="332" width="120" height="18" fill="#374151" opacity="0.85"/>
      <text x="100" y="324" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#374151" text-anchor="middle">~180k</text>
      <text x="100" y="376" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">PDB</text>
      <text x="100" y="390" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">experimental, 2021</text>

      <!-- Bar 2: AFDB v1, ~1M -->
      <!-- height = (log10(1e6)-5) * 70 = 70 px -->
      <rect x="190" y="280" width="120" height="70" fill="#7c3aed" opacity="0.85"/>
      <text x="250" y="272" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#7c3aed" text-anchor="middle">~1M</text>
      <text x="250" y="376" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">AlphaFold DB v1</text>
      <text x="250" y="390" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">predicted, 2021</text>

      <!-- Bar 3: AFDB v3, ~214M -->
      <!-- height = (log10(2.14e8)-5) * 70 = 3.33 * 70 = 233 px -->
      <rect x="340" y="117" width="120" height="233" fill="#1e3a8a" opacity="0.92"/>
      <text x="400" y="109" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#1e3a8a" text-anchor="middle">~214M</text>
      <text x="400" y="376" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">AlphaFold DB v3</text>
      <text x="400" y="390" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">predicted, 2024</text>

      <!-- annotation arrow showing ratio -->
      <g stroke="#1e3a8a" stroke-width="1" fill="none">
        <line x1="100" y1="332" x2="100" y2="100"/>
        <line x1="100" y1="100" x2="395" y2="100"/>
        <polygon points="395,100 388,96 388,104" fill="#1e3a8a" stroke="none"/>
      </g>
      <text x="248" y="90" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" text-anchor="middle">~1,200x more structures</text>
    </g>
  </g>

  <!-- ===== Panel B: pLDDT distribution donut ===== -->
  <g transform="translate(640, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(B)  pLDDT DISTRIBUTION ACROSS THE DATABASE</text>

    <!-- Donut centred at (140, 220), R=130, r=80 -->
    <!-- Stacked arcs starting at top -->
    <!-- 35% very high (blue): 0..0.35*360 = 126 deg -->
    <!-- 30% confident (violet): 126..234 -->
    <!-- 20% low (amber): 234..306 -->
    <!-- 15% very low (red): 306..360 -->

    <!-- We'll approximate with polygons / paths. Compute arc paths. -->
    <!-- Helper math computed manually below. cx=140 cy=220 R=130 r=80 -->
    <!-- Arc 1: 0 to 126 deg (sweep starts from top, going clockwise) -->
    <!-- start point top: (140, 90); after 126 deg clockwise: angle from top = 126deg => x=140+R*sin(126)=140+130*0.809=245.2; y=220-R*cos(126)=220-130*(-0.588)=220+76.4=296.4 -->

    <!-- Outer points -->
    <!-- a0 = (140,90), a1 = (245,296), a2 = (140+130*sin(234), 220-130*cos(234)) = (140-105,220+76)=(35,296), wait check -->
    <!-- sin(234)=-0.809, cos(234)=-0.588 -->
    <!-- a2 = (140-105, 220+76) = (35, 296) -->
    <!-- a3 = (140+130*sin(306), 220-130*cos(306)) = (140+130*-0.809, 220-130*0.588)=(35, 143.6) -->
    <!-- Wait sin(306)=-0.809, cos(306)=0.588 — yes a3=(35,143.6) -->
    <!-- a4 back to (140,90) -->

    <!-- Inner radius r=80 -->
    <!-- b0 = (140,140), b1=(140+80*sin(126), 220-80*cos(126))=(140+64.7,220+47)=(204.7,267) -->
    <!-- b2=(140+80*sin(234),220-80*cos(234))=(75.3, 267) -->
    <!-- b3=(140+80*sin(306),220-80*cos(306))=(75.3, 173) -->

    <!-- Arc 1: 0->126 (35%) blue. large-arc=0 (126<180) -->
    <path d="M 140 90 A 130 130 0 0 1 245.2 296.4 L 204.7 267 A 80 80 0 0 0 140 140 Z"
          fill="#1e3a8a"/>
    <!-- Arc 2: 126->234 (30%) violet. arc=108 deg, large-arc=0 -->
    <path d="M 245.2 296.4 A 130 130 0 0 1 35 296 L 75.3 267 A 80 80 0 0 0 204.7 267 Z"
          fill="#7c3aed"/>
    <!-- Arc 3: 234->306 (20%) amber. arc=72 deg, large-arc=0 -->
    <path d="M 35 296 A 130 130 0 0 1 35 143.6 L 75.3 173 A 80 80 0 0 0 75.3 267 Z"
          fill="#b45309"/>
    <!-- Arc 4: 306->360 (15%) red. arc=54 deg, large-arc=0 -->
    <path d="M 35 143.6 A 130 130 0 0 1 140 90 L 140 140 A 80 80 0 0 0 75.3 173 Z"
          fill="#dc2626"/>

    <!-- Centre label -->
    <text x="140" y="215" font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" fill="#374151" text-anchor="middle">214M</text>
    <text x="140" y="232" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">predictions</text>

    <!-- Legend, right of donut -->
    <g transform="translate(320, 130)" font-family="Inter, sans-serif" font-size="11" fill="#374151">
      <rect x="0" y="0" width="14" height="14" fill="#1e3a8a"/>
      <text x="22" y="11" font-weight="600">very high (&gt; 90)</text>
      <text x="22" y="25" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">~35%   atom-level usable</text>

      <rect x="0" y="48" width="14" height="14" fill="#7c3aed"/>
      <text x="22" y="59" font-weight="600">confident (70-90)</text>
      <text x="22" y="73" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">~30%   backbone usable</text>

      <rect x="0" y="96" width="14" height="14" fill="#b45309"/>
      <text x="22" y="107" font-weight="600">low (50-70)</text>
      <text x="22" y="121" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">~20%   fold-class only</text>

      <rect x="0" y="144" width="14" height="14" fill="#dc2626"/>
      <text x="22" y="155" font-weight="600">very low (&lt; 50)</text>
      <text x="22" y="169" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">~15%   disorder/orphan</text>
    </g>
  </g>

  <!-- ===== Panel C: before/after rows ===== -->
  <g transform="translate(60, 510)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(C)  WHAT FLIPPED — FOUR WORKFLOWS, 2020 VS 2024</text>

    <g transform="translate(0, 18)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
      <!-- Headers -->
      <text x="240" y="0" font-weight="600" text-anchor="middle" fill="#525252">pre-AF (2020)</text>
      <text x="720" y="0" font-weight="600" text-anchor="middle" fill="#525252">post-AF (2024)</text>

      <!-- Row 1: druggable target -->
      <text x="0" y="20" font-weight="600">druggable target has a structure</text>
      <rect x="160" y="11" width="60" height="12" fill="#dc2626" opacity="0.85"/>
      <text x="225" y="20" font-family="JetBrains Mono, monospace" fill="#525252">~30%</text>
      <rect x="600" y="11" width="240" height="12" fill="#065f46" opacity="0.85"/>
      <text x="845" y="20" font-family="JetBrains Mono, monospace" fill="#525252">&gt; 99%</text>

      <!-- Row 2: dark proteome annotated -->
      <text x="0" y="44" font-weight="600">dark-proteome annotation possible</text>
      <rect x="160" y="35" width="6" height="12" fill="#dc2626" opacity="0.85"/>
      <text x="172" y="44" font-family="JetBrains Mono, monospace" fill="#525252">trace</text>
      <rect x="600" y="35" width="190" height="12" fill="#065f46" opacity="0.85"/>
      <text x="795" y="44" font-family="JetBrains Mono, monospace" fill="#525252">most</text>

      <!-- Row 3: structural homology cross-species -->
      <text x="0" y="68" font-weight="600">cross-species structural comparison</text>
      <rect x="160" y="59" width="30" height="12" fill="#dc2626" opacity="0.85"/>
      <text x="196" y="68" font-family="JetBrains Mono, monospace" fill="#525252">curated only</text>
      <rect x="600" y="59" width="210" height="12" fill="#065f46" opacity="0.85"/>
      <text x="815" y="68" font-family="JetBrains Mono, monospace" fill="#525252">routine</text>

      <!-- Row 4: design starting point -->
      <text x="0" y="92" font-weight="600">de-novo design has a critic</text>
      <rect x="160" y="83" width="3" height="12" fill="#dc2626" opacity="0.85"/>
      <text x="169" y="92" font-family="JetBrains Mono, monospace" fill="#525252">no critic</text>
      <rect x="600" y="83" width="220" height="12" fill="#065f46" opacity="0.85"/>
      <text x="825" y="92" font-family="JetBrains Mono, monospace" fill="#525252">AF2 critic</text>
    </g>
  </g>

</svg>
