<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="t d">
  <title id="t">Three DNA tokenisation schemes and what each window covers</title>
  <desc id="d">A 24-base DNA sequence is tokenised three ways. Per-nucleotide tokenisation produces 24 tokens with a vocabulary of size 4 and a 512-token window covers 512 bases. Overlapping 6-mer tokenisation produces 19 tokens with a vocabulary of about 4096 and a 512-token window covers about 517 bases. BPE-style learned tokenisation produces about 10 variable-length tokens with a vocabulary of about 4096 and a 512-token window covers a sequence of variable length, typically around 1500 to 3000 bases. The figure shows the resulting tokens as colored boxes above the same DNA sequence with a table of vocabulary size, tokens per sequence, and effective receptive field at 512 tokens.</desc>

  <rect x="0" y="0" width="1200" height="600" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="40" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">DNA TOKENISATION — THREE CHOICES, THREE EFFECTIVE WINDOWS</text>
  <text x="60" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Same 24-base input; the tokeniser sets how much sequence a fixed 512-token attention window covers.</text>

  <!-- ─────────── PANEL A: Per-nucleotide ─────────── -->
  <g transform="translate(60, 100)">
    <text x="0" y="0" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(A)  PER-NUCLEOTIDE</text>
    <text x="0" y="16" font-family="Inter, Helvetica Neue, sans-serif" font-size="10" fill="#525252">one base per token; 24 tokens; vocab = 4</text>

    <!-- Sequence boxes -->
    <g font-family="JetBrains Mono, Menlo, monospace" font-size="13" font-weight="600">
      <!-- A C G T A T C G A G C T A T G G C T A C G A C T -->
      <!-- 24 boxes, 36 wide each, total width 864 -->
      <g transform="translate(0, 30)">
        <!-- box, char inside, repeated -->
        <rect x="0"   y="0" width="34" height="34" fill="#fafaf9" stroke="#374151" stroke-width="1"/><text x="17"  y="22" text-anchor="middle" fill="#1e3a8a">A</text>
        <rect x="36"  y="0" width="34" height="34" fill="#fafaf9" stroke="#374151" stroke-width="1"/><text x="53"  y="22" text-anchor="middle" fill="#065f46">C</text>
        <rect x="72"  y="0" width="34" height="34" fill="#fafaf9" stroke="#374151" stroke-width="1"/><text x="89"  y="22" text-anchor="middle" fill="#b45309">G</text>
        <rect x="108" y="0" width="34" height="34" fill="#fafaf9" stroke="#374151" stroke-width="1"/><text x="125" y="22" text-anchor="middle" fill="#0d7377">T</text>
        <rect x="144" y="0" width="34" height="34" fill="#fafaf9" stroke="#374151" stroke-width="1"/><text x="161" y="22" text-anchor="middle" fill="#1e3a8a">A</text>
        <rect x="180" y="0" width="34" height="34" fill="#fafaf9" stroke="#374151" stroke-width="1"/><text x="197" y="22" text-anchor="middle" fill="#0d7377">T</text>
        <rect x="216" y="0" width="34" height="34" fill="#fafaf9" stroke="#374151" stroke-width="1"/><text x="233" y="22" text-anchor="middle" fill="#065f46">C</text>
        <rect x="252" y="0" width="34" height="34" fill="#fafaf9" stroke="#374151" stroke-width="1"/><text x="269" y="22" text-anchor="middle" fill="#b45309">G</text>
        <rect x="288" y="0" width="34" height="34" fill="#fafaf9" stroke="#374151" stroke-width="1"/><text x="305" y="22" text-anchor="middle" fill="#1e3a8a">A</text>
        <rect x="324" y="0" width="34" height="34" fill="#fafaf9" stroke="#374151" stroke-width="1"/><text x="341" y="22" text-anchor="middle" fill="#b45309">G</text>
        <rect x="360" y="0" width="34" height="34" fill="#fafaf9" stroke="#374151" stroke-width="1"/><text x="377" y="22" text-anchor="middle" fill="#065f46">C</text>
        <rect x="396" y="0" width="34" height="34" fill="#fafaf9" stroke="#374151" stroke-width="1"/><text x="413" y="22" text-anchor="middle" fill="#0d7377">T</text>
        <rect x="432" y="0" width="34" height="34" fill="#fafaf9" stroke="#374151" stroke-width="1"/><text x="449" y="22" text-anchor="middle" fill="#1e3a8a">A</text>
        <rect x="468" y="0" width="34" height="34" fill="#fafaf9" stroke="#374151" stroke-width="1"/><text x="485" y="22" text-anchor="middle" fill="#0d7377">T</text>
        <rect x="504" y="0" width="34" height="34" fill="#fafaf9" stroke="#374151" stroke-width="1"/><text x="521" y="22" text-anchor="middle" fill="#b45309">G</text>
        <rect x="540" y="0" width="34" height="34" fill="#fafaf9" stroke="#374151" stroke-width="1"/><text x="557" y="22" text-anchor="middle" fill="#b45309">G</text>
        <rect x="576" y="0" width="34" height="34" fill="#fafaf9" stroke="#374151" stroke-width="1"/><text x="593" y="22" text-anchor="middle" fill="#065f46">C</text>
        <rect x="612" y="0" width="34" height="34" fill="#fafaf9" stroke="#374151" stroke-width="1"/><text x="629" y="22" text-anchor="middle" fill="#0d7377">T</text>
        <rect x="648" y="0" width="34" height="34" fill="#fafaf9" stroke="#374151" stroke-width="1"/><text x="665" y="22" text-anchor="middle" fill="#1e3a8a">A</text>
        <rect x="684" y="0" width="34" height="34" fill="#fafaf9" stroke="#374151" stroke-width="1"/><text x="701" y="22" text-anchor="middle" fill="#065f46">C</text>
        <rect x="720" y="0" width="34" height="34" fill="#fafaf9" stroke="#374151" stroke-width="1"/><text x="737" y="22" text-anchor="middle" fill="#b45309">G</text>
        <rect x="756" y="0" width="34" height="34" fill="#fafaf9" stroke="#374151" stroke-width="1"/><text x="773" y="22" text-anchor="middle" fill="#1e3a8a">A</text>
        <rect x="792" y="0" width="34" height="34" fill="#fafaf9" stroke="#374151" stroke-width="1"/><text x="809" y="22" text-anchor="middle" fill="#065f46">C</text>
        <rect x="828" y="0" width="34" height="34" fill="#fafaf9" stroke="#374151" stroke-width="1"/><text x="845" y="22" text-anchor="middle" fill="#0d7377">T</text>
      </g>

      <!-- Token index labels -->
      <g transform="translate(0, 78)" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" font-weight="400">
        <text x="17"  text-anchor="middle">1</text>
        <text x="161" text-anchor="middle">5</text>
        <text x="341" text-anchor="middle">10</text>
        <text x="521" text-anchor="middle">15</text>
        <text x="701" text-anchor="middle">20</text>
        <text x="845" text-anchor="middle">24</text>
      </g>
    </g>

    <!-- Right-side stat block -->
    <g transform="translate(900, 26)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
      <rect x="0" y="0" width="240" height="60" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.5"/>
      <text x="12" y="18" font-weight="600">tokens / 24 bp</text><text x="228" y="18" text-anchor="end" font-family="JetBrains Mono, monospace">24</text>
      <text x="12" y="34" font-weight="600">vocabulary</text><text x="228" y="34" text-anchor="end" font-family="JetBrains Mono, monospace">4</text>
      <text x="12" y="50" font-weight="600">512-token window</text><text x="228" y="50" text-anchor="end" font-family="JetBrains Mono, monospace" fill="#1e3a8a">512 bp</text>
    </g>
  </g>

  <!-- ─────────── PANEL B: 6-mer ─────────── -->
  <g transform="translate(60, 260)">
    <text x="0" y="0" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(B)  OVERLAPPING 6-MER</text>
    <text x="0" y="16" font-family="Inter, Helvetica Neue, sans-serif" font-size="10" fill="#525252">slide a 6-base window one step at a time; 19 tokens for 24 bases; vocab = 4⁶ = 4096</text>

    <g transform="translate(0, 30)">
      <!-- 19 tokens, each 6 wide of base step, total drawing same 864 wide but boxes overlap visually
           draw 19 boxes 38 wide stacked diagonally in 3 rows for clarity -->
      <!-- We'll do a representative 6 tokens spread across full width with offsets indicating overlap -->
      <g font-family="JetBrains Mono, monospace" font-size="11" font-weight="500">
        <!-- token 1: ACGTAT positions 1-6 -->
        <rect x="0"   y="0"  width="216" height="22" fill="#fafaf9" stroke="#7c3aed" stroke-width="1.4"/>
        <text x="108" y="16" text-anchor="middle" fill="#7c3aed">ACGTAT</text>
        <text x="-8" y="16" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">tok 1</text>

        <!-- token 2: CGTATC pos 2-7 -->
        <rect x="36"  y="26" width="216" height="22" fill="#fafaf9" stroke="#7c3aed" stroke-width="1.4"/>
        <text x="144" y="42" text-anchor="middle" fill="#7c3aed">CGTATC</text>
        <text x="28" y="42" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">tok 2</text>

        <!-- token 5: ATCGAG pos 5-10 -->
        <rect x="144" y="52" width="216" height="22" fill="#fafaf9" stroke="#7c3aed" stroke-width="1.4"/>
        <text x="252" y="68" text-anchor="middle" fill="#7c3aed">ATCGAG</text>
        <text x="136" y="68" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">tok 5</text>

        <!-- token 10: CTATGG pos 10-15 -->
        <rect x="324" y="78" width="216" height="22" fill="#fafaf9" stroke="#7c3aed" stroke-width="1.4"/>
        <text x="432" y="94" text-anchor="middle" fill="#7c3aed">CTATGG</text>
        <text x="316" y="94" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">tok 10</text>

        <!-- token 15: GGCTAC pos 15-20 -->
        <rect x="504" y="104" width="216" height="22" fill="#fafaf9" stroke="#7c3aed" stroke-width="1.4"/>
        <text x="612" y="120" text-anchor="middle" fill="#7c3aed">GGCTAC</text>
        <text x="496" y="120" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">tok 15</text>

        <!-- token 19: last 6 chars are positions 19-24 -->
        <rect x="648" y="130" width="216" height="22" fill="#fafaf9" stroke="#7c3aed" stroke-width="1.4"/>
        <text x="756" y="146" text-anchor="middle" fill="#7c3aed">ACGACT</text>
        <text x="640" y="146" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">tok 19</text>
      </g>
    </g>

    <g transform="translate(900, 26)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
      <rect x="0" y="0" width="240" height="60" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.5"/>
      <text x="12" y="18" font-weight="600">tokens / 24 bp</text><text x="228" y="18" text-anchor="end" font-family="JetBrains Mono, monospace">19</text>
      <text x="12" y="34" font-weight="600">vocabulary</text><text x="228" y="34" text-anchor="end" font-family="JetBrains Mono, monospace">4096</text>
      <text x="12" y="50" font-weight="600">512-token window</text><text x="228" y="50" text-anchor="end" font-family="JetBrains Mono, monospace" fill="#1e3a8a">~517 bp</text>
    </g>
  </g>

  <!-- ─────────── PANEL C: BPE-style ─────────── -->
  <g transform="translate(60, 460)">
    <text x="0" y="0" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(C)  BPE-STYLE LEARNED</text>
    <text x="0" y="16" font-family="Inter, Helvetica Neue, sans-serif" font-size="10" fill="#525252">variable-length tokens learned from frequency; ~10 tokens for 24 bases; vocab ≈ 4096</text>

    <g transform="translate(0, 30)" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600">
      <!-- token widths roughly proportional to nucleotide count -->
      <rect x="0"   y="0" width="72"  height="34" fill="#fafaf9" stroke="#b45309" stroke-width="1.4"/>
      <text x="36"  y="22" text-anchor="middle" fill="#b45309">ACG</text>
      <rect x="74"  y="0" width="48"  height="34" fill="#fafaf9" stroke="#b45309" stroke-width="1.4"/>
      <text x="98"  y="22" text-anchor="middle" fill="#b45309">TA</text>
      <rect x="124" y="0" width="48"  height="34" fill="#fafaf9" stroke="#b45309" stroke-width="1.4"/>
      <text x="148" y="22" text-anchor="middle" fill="#b45309">TC</text>
      <rect x="174" y="0" width="48"  height="34" fill="#fafaf9" stroke="#b45309" stroke-width="1.4"/>
      <text x="198" y="22" text-anchor="middle" fill="#b45309">GA</text>
      <rect x="224" y="0" width="48"  height="34" fill="#fafaf9" stroke="#b45309" stroke-width="1.4"/>
      <text x="248" y="22" text-anchor="middle" fill="#b45309">GC</text>
      <rect x="274" y="0" width="48"  height="34" fill="#fafaf9" stroke="#b45309" stroke-width="1.4"/>
      <text x="298" y="22" text-anchor="middle" fill="#b45309">TA</text>
      <rect x="324" y="0" width="72"  height="34" fill="#fafaf9" stroke="#b45309" stroke-width="1.4"/>
      <text x="360" y="22" text-anchor="middle" fill="#b45309">TGG</text>
      <rect x="398" y="0" width="48"  height="34" fill="#fafaf9" stroke="#b45309" stroke-width="1.4"/>
      <text x="422" y="22" text-anchor="middle" fill="#b45309">CT</text>
      <rect x="448" y="0" width="48"  height="34" fill="#fafaf9" stroke="#b45309" stroke-width="1.4"/>
      <text x="472" y="22" text-anchor="middle" fill="#b45309">AC</text>
      <rect x="498" y="0" width="72"  height="34" fill="#fafaf9" stroke="#b45309" stroke-width="1.4"/>
      <text x="534" y="22" text-anchor="middle" fill="#b45309">GAC</text>
      <rect x="572" y="0" width="48"  height="34" fill="#fafaf9" stroke="#b45309" stroke-width="1.4"/>
      <text x="596" y="22" text-anchor="middle" fill="#b45309">T</text>
    </g>

    <g transform="translate(900, 26)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
      <rect x="0" y="0" width="240" height="60" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.5"/>
      <text x="12" y="18" font-weight="600">tokens / 24 bp</text><text x="228" y="18" text-anchor="end" font-family="JetBrains Mono, monospace">~11</text>
      <text x="12" y="34" font-weight="600">vocabulary</text><text x="228" y="34" text-anchor="end" font-family="JetBrains Mono, monospace">~4096</text>
      <text x="12" y="50" font-weight="600">512-token window</text><text x="228" y="50" text-anchor="end" font-family="JetBrains Mono, monospace" fill="#1e3a8a">~1.2 kb</text>
    </g>
  </g>

  <!-- Footnote -->
  <text x="60" y="582" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">Effective window scales as (tokens per base)⁻¹; tokenisation choice trades resolution against context.</text>
</svg>
