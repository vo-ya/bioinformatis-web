<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="t d">
  <title id="t">Leave-one-cell-out versus leave-one-study-out evaluation gap for cell foundation models</title>
  <desc id="d">A two-panel figure. The left panel shows two schematic splits over a dataset of three studies. LOCO randomly splits cells across all three studies into train and test; LOSO holds out one whole study for test and trains on the other two. The right panel shows a bar chart for four cell foundation models (Geneformer, scGPT, scFoundation, UCE) comparing their reported zero-shot cell-type-classification accuracy under LOCO (around 0.85) against the same accuracy under LOSO (around 0.55–0.70). The gap is annotated as the evaluation-protocol gap that the marketing often obscures.</desc>

  <rect x="0" y="0" width="1200" height="600" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="40" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">LOCO VERSUS LOSO — THE EVALUATION-PROTOCOL GAP</text>
  <text x="60" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">The same cell foundation model reports very different zero-shot accuracy depending on how the held-out cells are chosen.</text>

  <!-- ─────────── LEFT PANEL — schematic splits ─────────── -->
  <g transform="translate(60, 100)">
    <text x="0" y="0" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(A)  TWO PROTOCOLS</text>

    <!-- LOCO -->
    <g transform="translate(0, 24)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">Leave-one-cell-out (LOCO)</text>
      <text x="0" y="16" font-family="Inter, sans-serif" font-size="9.5" fill="#525252">random hold-out across all studies — train and test share batch effects</text>

      <!-- three studies as labelled rows of dots -->
      <g transform="translate(0, 28)">
        <!-- Study A label and row -->
        <text x="-6" y="14" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#525252">study A</text>
        <g>
