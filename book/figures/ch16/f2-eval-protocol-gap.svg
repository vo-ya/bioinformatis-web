          <circle cx="188" cy="10" r="3.5" fill="#1e3a8a"/>
          <circle cx="202" cy="10" r="3.5" fill="#1e3a8a"/>
          <circle cx="216" cy="10" r="3.5" fill="#1e3a8a"/>
          <circle cx="230" cy="10" r="3.5" fill="#dc2626"/>
          <circle cx="244" cy="10" r="3.5" fill="#1e3a8a"/>
          <circle cx="258" cy="10" r="3.5" fill="#1e3a8a"/>
          <circle cx="272" cy="10" r="3.5" fill="#1e3a8a"/>
          <circle cx="286" cy="10" r="3.5" fill="#dc2626"/>
          <circle cx="300" cy="10" r="3.5" fill="#1e3a8a"/>
          <circle cx="314" cy="10" r="3.5" fill="#1e3a8a"/>
          <circle cx="328" cy="10" r="3.5" fill="#dc2626"/>
          <circle cx="342" cy="10" r="3.5" fill="#1e3a8a"/>
          <circle cx="356" cy="10" r="3.5" fill="#1e3a8a"/>
