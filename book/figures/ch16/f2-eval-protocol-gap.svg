          <circle cx="272" cy="50" r="3.5" fill="#1e3a8a"/>
          <circle cx="286" cy="50" r="3.5" fill="#dc2626"/>
          <circle cx="300" cy="50" r="3.5" fill="#1e3a8a"/>
          <circle cx="314" cy="50" r="3.5" fill="#1e3a8a"/>
          <circle cx="328" cy="50" r="3.5" fill="#1e3a8a"/>
          <circle cx="342" cy="50" r="3.5" fill="#dc2626"/>
          <circle cx="356" cy="50" r="3.5" fill="#1e3a8a"/>
          <circle cx="370" cy="50" r="3.5" fill="#1e3a8a"/>
          <circle cx="384" cy="50" r="3.5" fill="#dc2626"/>
          <circle cx="398" cy="50" r="3.5" fill="#1e3a8a"/>
          <circle cx="412" cy="50" r="3.5" fill="#1e3a8a"/>
        </g>
      </g>
    </g>

    <!-- LOSO -->
    <g transform="translate(0, 160)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">Leave-one-study-out (LOSO)</text>
      <text x="0" y="16" font-family="Inter, sans-serif" font-size="9.5" fill="#525252">hold out whole study C — train on A and B, test on C; no shared batch effect</text>

      <g transform="translate(0, 28)">
        <text x="-6" y="14" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#525252">study A</text>
        <g>
          <!-- all train -->
          <g fill="#1e3a8a">
            <circle cx="6"   cy="10" r="3.5"/><circle cx="20"  cy="10" r="3.5"/><circle cx="34"  cy="10" r="3.5"/><circle cx="48"  cy="10" r="3.5"/><circle cx="62"  cy="10" r="3.5"/><circle cx="76"  cy="10" r="3.5"/><circle cx="90"  cy="10" r="3.5"/><circle cx="104" cy="10" r="3.5"/><circle cx="118" cy="10" r="3.5"/><circle cx="132" cy="10" r="3.5"/>
            <circle cx="146" cy="10" r="3.5"/><circle cx="160" cy="10" r="3.5"/><circle cx="174" cy="10" r="3.5"/><circle cx="188" cy="10" r="3.5"/><circle cx="202" cy="10" r="3.5"/><circle cx="216" cy="10" r="3.5"/><circle cx="230" cy="10" r="3.5"/><circle cx="244" cy="10" r="3.5"/><circle cx="258" cy="10" r="3.5"/><circle cx="272" cy="10" r="3.5"/>
            <circle cx="286" cy="10" r="3.5"/><circle cx="300" cy="10" r="3.5"/><circle cx="314" cy="10" r="3.5"/><circle cx="328" cy="10" r="3.5"/><circle cx="342" cy="10" r="3.5"/><circle cx="356" cy="10" r="3.5"/><circle cx="370" cy="10" r="3.5"/><circle cx="384" cy="10" r="3.5"/><circle cx="398" cy="10" r="3.5"/><circle cx="412" cy="10" r="3.5"/>
          </g>
        </g>
        <text x="-6" y="34" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#525252">study B</text>
        <g fill="#1e3a8a">
          <circle cx="6"   cy="30" r="3.5"/><circle cx="20"  cy="30" r="3.5"/><circle cx="34"  cy="30" r="3.5"/><circle cx="48"  cy="30" r="3.5"/><circle cx="62"  cy="30" r="3.5"/><circle cx="76"  cy="30" r="3.5"/><circle cx="90"  cy="30" r="3.5"/><circle cx="104" cy="30" r="3.5"/><circle cx="118" cy="30" r="3.5"/><circle cx="132" cy="30" r="3.5"/>
          <circle cx="146" cy="30" r="3.5"/><circle cx="160" cy="30" r="3.5"/><circle cx="174" cy="30" r="3.5"/><circle cx="188" cy="30" r="3.5"/><circle cx="202" cy="30" r="3.5"/><circle cx="216" cy="30" r="3.5"/><circle cx="230" cy="30" r="3.5"/><circle cx="244" cy="30" r="3.5"/><circle cx="258" cy="30" r="3.5"/><circle cx="272" cy="30" r="3.5"/>
          <circle cx="286" cy="30" r="3.5"/><circle cx="300" cy="30" r="3.5"/><circle cx="314" cy="30" r="3.5"/><circle cx="328" cy="30" r="3.5"/><circle cx="342" cy="30" r="3.5"/><circle cx="356" cy="30" r="3.5"/><circle cx="370" cy="30" r="3.5"/><circle cx="384" cy="30" r="3.5"/><circle cx="398" cy="30" r="3.5"/><circle cx="412" cy="30" r="3.5"/>
        </g>
        <text x="-6" y="54" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#525252">study C</text>
        <g fill="#dc2626">
          <circle cx="6"   cy="50" r="3.5"/><circle cx="20"  cy="50" r="3.5"/><circle cx="34"  cy="50" r="3.5"/><circle cx="48"  cy="50" r="3.5"/><circle cx="62"  cy="50" r="3.5"/><circle cx="76"  cy="50" r="3.5"/><circle cx="90"  cy="50" r="3.5"/><circle cx="104" cy="50" r="3.5"/><circle cx="118" cy="50" r="3.5"/><circle cx="132" cy="50" r="3.5"/>
          <circle cx="146" cy="50" r="3.5"/><circle cx="160" cy="50" r="3.5"/><circle cx="174" cy="50" r="3.5"/><circle cx="188" cy="50" r="3.5"/><circle cx="202" cy="50" r="3.5"/><circle cx="216" cy="50" r="3.5"/><circle cx="230" cy="50" r="3.5"/><circle cx="244" cy="50" r="3.5"/><circle cx="258" cy="50" r="3.5"/><circle cx="272" cy="50" r="3.5"/>
