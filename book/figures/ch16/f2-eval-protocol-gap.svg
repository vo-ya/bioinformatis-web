  <!-- ─────────── RIGHT PANEL — bar chart ─────────── -->
  <g transform="translate(620, 100)">
    <text x="0" y="0" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(B)  ZERO-SHOT ACCURACY UNDER EACH PROTOCOL</text>
    <text x="0" y="16" font-family="Inter, sans-serif" font-size="9.5" fill="#525252">cell-type classification on a held-out atlas; bars are illustrative ranges from current literature</text>

    <!-- chart area -->
    <g transform="translate(40, 50)">
      <!-- Y axis -->
      <line x1="0" y1="0" x2="0" y2="280" stroke="#525252" stroke-width="1"/>
      <!-- Y ticks at 0, 0.25, 0.5, 0.75, 1.0 -->
      <g font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">
        <line x1="-4" y1="280" x2="0" y2="280" stroke="#525252" stroke-width="1"/>
