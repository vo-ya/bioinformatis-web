      <!-- Y axis title rotated -->
      <text x="-32" y="140" font-family="Inter, sans-serif" font-size="10" fill="#525252" transform="rotate(-90 -32 140)" text-anchor="middle">cell-type accuracy</text>

      <!-- Four model groups, 100 px wide each -->
      <!-- For each: LOCO (cobalt, taller) and LOSO (amber, shorter), each 28 wide, side by side -->
      <!-- bars: 1.0 == y=0; 0 == y=280; pixel = 280-280*value -->

      <!-- Group 1: Geneformer  LOCO 0.85 LOSO 0.62 -->
      <g transform="translate(20, 0)">
        <rect x="0"  y="42"  width="28" height="238" fill="#1e3a8a"/>
        <rect x="32" y="106" width="28" height="174" fill="#b45309"/>
        <text x="14" y="36" font-family="JetBrains Mono, monospace" font-size="9" font-weight="600" fill="#1e3a8a" text-anchor="middle">.85</text>
        <text x="46" y="100" font-family="JetBrains Mono, monospace" font-size="9" font-weight="600" fill="#b45309" text-anchor="middle">.62</text>
        <text x="30" y="298" font-family="Inter, sans-serif" font-size="10" fill="#374151" text-anchor="middle">Geneformer</text>
      </g>
      <!-- Group 2: scGPT 0.82 0.65 -->
      <g transform="translate(140, 0)">
        <rect x="0"  y="50"  width="28" height="230" fill="#1e3a8a"/>
        <rect x="32" y="98"  width="28" height="182" fill="#b45309"/>
        <text x="14" y="44" font-family="JetBrains Mono, monospace" font-size="9" font-weight="600" fill="#1e3a8a" text-anchor="middle">.82</text>
        <text x="46" y="92" font-family="JetBrains Mono, monospace" font-size="9" font-weight="600" fill="#b45309" text-anchor="middle">.67</text>
        <text x="30" y="298" font-family="Inter, sans-serif" font-size="10" fill="#374151" text-anchor="middle">scGPT</text>
      </g>
      <!-- Group 3: scFoundation 0.81 0.58 -->
      <g transform="translate(260, 0)">
        <rect x="0"  y="53"  width="28" height="227" fill="#1e3a8a"/>
        <rect x="32" y="119" width="28" height="161" fill="#b45309"/>
        <text x="14" y="47" font-family="JetBrains Mono, monospace" font-size="9" font-weight="600" fill="#1e3a8a" text-anchor="middle">.81</text>
        <text x="46" y="113" font-family="JetBrains Mono, monospace" font-size="9" font-weight="600" fill="#b45309" text-anchor="middle">.57</text>
        <text x="30" y="298" font-family="Inter, sans-serif" font-size="10" fill="#374151" text-anchor="middle">scFoundation</text>
      </g>
      <!-- Group 4: UCE 0.79 0.69 -->
      <g transform="translate(380, 0)">
        <rect x="0"  y="59"  width="28" height="221" fill="#1e3a8a"/>
        <rect x="32" y="87"  width="28" height="193" fill="#b45309"/>
        <text x="14" y="53" font-family="JetBrains Mono, monospace" font-size="9" font-weight="600" fill="#1e3a8a" text-anchor="middle">.79</text>
        <text x="46" y="81" font-family="JetBrains Mono, monospace" font-size="9" font-weight="600" fill="#b45309" text-anchor="middle">.69</text>
        <text x="30" y="298" font-family="Inter, sans-serif" font-size="10" fill="#374151" text-anchor="middle">UCE</text>
      </g>

      <!-- Gap annotation -->
      <g transform="translate(20, 0)">
        <path d="M 65 60 Q 80 80, 65 110" fill="none" stroke="#7c3aed" stroke-width="1.2"/>
        <text x="95" y="86" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#7c3aed">gap = protocol artefact</text>
      </g>
    </g>

    <!-- Legend -->
    <g transform="translate(40, 410)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
      <rect x="0"   y="0" width="16" height="10" fill="#1e3a8a"/><text x="22" y="9">LOCO (leave-one-cell-out)</text>
      <rect x="200" y="0" width="16" height="10" fill="#b45309"/><text x="222" y="9">LOSO (leave-one-study-out)</text>
    </g>
  </g>

  <!-- Footnote -->
  <text x="60" y="582" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">Numbers are illustrative ranges drawn from the Luecken-style integration benchmark and individual foundation-model papers; exact values vary across atlases and tasks.</text>
</svg>
