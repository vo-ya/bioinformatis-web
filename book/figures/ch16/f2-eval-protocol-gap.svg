          <circle cx="398" cy="30" r="3.5" fill="#dc2626"/>
          <circle cx="412" cy="30" r="3.5" fill="#1e3a8a"/>
        </g>
        <!-- Study C -->
        <text x="-6" y="54" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#525252">study C</text>
        <g>
          <circle cx="6"   cy="50" r="3.5" fill="#1e3a8a"/>
          <circle cx="20"  cy="50" r="3.5" fill="#dc2626"/>
          <circle cx="34"  cy="50" r="3.5" fill="#1e3a8a"/>
