          <circle cx="412" cy="10" r="3.5" fill="#1e3a8a"/>
        </g>
        <!-- Study B -->
        <text x="-6" y="34" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#525252">study B</text>
        <g>
          <circle cx="6"   cy="30" r="3.5" fill="#dc2626"/>
          <circle cx="20"  cy="30" r="3.5" fill="#1e3a8a"/>
          <circle cx="34"  cy="30" r="3.5" fill="#1e3a8a"/>
          <circle cx="48"  cy="30" r="3.5" fill="#1e3a8a"/>
          <circle cx="62"  cy="30" r="3.5" fill="#dc2626"/>
          <circle cx="76"  cy="30" r="3.5" fill="#1e3a8a"/>
