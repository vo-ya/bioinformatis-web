          <circle cx="132" cy="50" r="3.5" fill="#dc2626"/>
          <circle cx="146" cy="50" r="3.5" fill="#1e3a8a"/>
          <circle cx="160" cy="50" r="3.5" fill="#1e3a8a"/>
