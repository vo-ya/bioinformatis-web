<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="t d">
  <title id="t">Self-supervised pretraining data efficiency on a downstream genomics task</title>
  <desc id="d">A semi-log plot showing two learning curves. X-axis is the number of labelled fine-tuning examples from 100 to 1 million, on a log scale. Y-axis is validation accuracy from 0.5 to 1.0. The scratch-trained curve starts near random at 100 labels and climbs slowly, reaching about 0.95 only near 1 million labels. The pretrained-then-fine-tuned curve starts already near 0.8 with 100 labels and converges to 0.95 by about 10000 labels. The horizontal gap between the curves at any target accuracy ranges from 10x to 100x — the data efficiency advantage of pretraining. Three annotated regimes are marked: low-label, where pretraining is decisive; mid-label, where pretraining is comfortable; high-label, where the two curves converge.</desc>

  <rect x="0" y="0" width="1200" height="600" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="40" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">SSL DATA EFFICIENCY — PRETRAINED VS SCRATCH-TRAINED</text>
  <text x="60" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Pretrained models reach a target accuracy with 10 — 100 × fewer labelled examples than scratch-trained ones.</text>

  <!-- Chart area: 880 wide x 420 tall, origin at (160, 100) -->
  <g transform="translate(160, 100)">

    <!-- Gridlines, x: log10 from 2 (100) to 6 (1M) -->
    <!-- 5 decades, 200 px each -->
    <!-- y: 0.5..1.0 mapped to 420..0 -->

    <g stroke="#e5e3dc" stroke-width="0.5">
      <line x1="0"   y1="0"   x2="900" y2="0"/>
      <line x1="0"   y1="84"  x2="900" y2="84"/>
      <line x1="0"   y1="168" x2="900" y2="168"/>
      <line x1="0"   y1="252" x2="900" y2="252"/>
      <line x1="0"   y1="336" x2="900" y2="336"/>
      <line x1="0"   y1="420" x2="900" y2="420"/>
      <line x1="0"   y1="0"   x2="0"   y2="420"/>
      <line x1="180" y1="0"   x2="180" y2="420"/>
      <line x1="360" y1="0"   x2="360" y2="420"/>
      <line x1="540" y1="0"   x2="540" y2="420"/>
      <line x1="720" y1="0"   x2="720" y2="420"/>
      <line x1="900" y1="0"   x2="900" y2="420"/>
    </g>

    <!-- Axes -->
    <line x1="0" y1="420" x2="900" y2="420" stroke="#525252" stroke-width="1"/>
    <line x1="0" y1="0"   x2="0"   y2="420" stroke="#525252" stroke-width="1"/>

    <!-- X tick labels at log decades -->
    <g font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#525252">
      <text x="0"   y="438" text-anchor="middle">10²</text>
      <text x="180" y="438" text-anchor="middle">10³</text>
      <text x="360" y="438" text-anchor="middle">10⁴</text>
      <text x="540" y="438" text-anchor="middle">10⁵</text>
      <text x="720" y="438" text-anchor="middle">10⁶</text>
      <text x="900" y="438" text-anchor="middle">10⁷</text>
    </g>

    <!-- Y tick labels -->
    <g font-family="JetBrains Mono, Menlo, monospace" font-size="10" fill="#525252">
      <text x="-8" y="424" text-anchor="end">0.50</text>
      <text x="-8" y="340" text-anchor="end">0.60</text>
      <text x="-8" y="256" text-anchor="end">0.70</text>
      <text x="-8" y="172" text-anchor="end">0.80</text>
      <text x="-8" y="88"  text-anchor="end">0.90</text>
      <text x="-8" y="4"   text-anchor="end">1.00</text>
    </g>

    <!-- Axis titles -->
    <text x="450" y="468" font-family="Inter, sans-serif" font-size="11" fill="#374151" text-anchor="middle">labelled fine-tuning examples</text>
    <text x="-60" y="210" font-family="Inter, sans-serif" font-size="11" fill="#374151" text-anchor="middle" transform="rotate(-90 -60 210)">validation accuracy</text>

    <!-- Scratch curve (amber): starts (0, 0.52) climbs to (900, 0.95) -->
    <!-- using control points; in y coords: 0.52->403.2, 0.55->378, 0.6->336, 0.7->252, 0.78->185, 0.86->117.6, 0.92->67.2, 0.95->42 -->
    <path d="M 0 403 C 60 396, 120 378, 180 350 S 300 252, 360 200 S 540 110, 720 70 L 900 42"
          fill="none" stroke="#b45309" stroke-width="2.2" stroke-linecap="round"/>

    <!-- Pretrained curve (cobalt): starts (0, 0.80) climbs to (450, 0.94) then plateaus -->
    <path d="M 0 168 C 50 140, 120 105, 180 88 S 270 65, 360 55 S 540 45, 720 42 L 900 40"
          fill="none" stroke="#1e3a8a" stroke-width="2.2" stroke-linecap="round"/>

    <!-- Endpoint dots and labels -->
    <circle cx="900" cy="40" r="4" fill="#1e3a8a"/>
    <text x="908" y="44" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" font-weight="600">pretrained + fine-tuned</text>
    <circle cx="900" cy="42" r="4" fill="#b45309"/>
    <text x="908" y="62" font-family="Inter, sans-serif" font-size="10" fill="#b45309" font-weight="600">scratch-trained</text>

    <!-- 100x gap annotation at y=0.85 (=126) -->
    <!-- pretrained crosses 0.85 around x=110 (10^2.6); scratch around x=560 (10^5.1) -->
    <g>
      <line x1="110" y1="126" x2="560" y2="126" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4 3"/>
      <circle cx="110" cy="126" r="3" fill="#7c3aed"/>
      <circle cx="560" cy="126" r="3" fill="#7c3aed"/>
      <text x="335" y="116" font-family="Inter, sans-serif" font-size="10" fill="#7c3aed" font-weight="600" text-anchor="middle" font-style="italic">~100 × fewer labels at the same accuracy</text>
    </g>

    <!-- Regime annotations -->
    <g font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#1e3a8a" letter-spacing="0.06em">
      <rect x="0"   y="445" width="180" height="20" fill="#1e3a8a" opacity="0.10"/>
      <text x="90"  y="459" text-anchor="middle">LOW LABEL</text>
      <rect x="180" y="445" width="360" height="20" fill="#1e3a8a" opacity="0.06"/>
      <text x="360" y="459" text-anchor="middle">MID LABEL</text>
      <rect x="540" y="445" width="360" height="20" fill="#1e3a8a" opacity="0.03"/>
      <text x="720" y="459" text-anchor="middle">HIGH LABEL — CURVES CONVERGE</text>
    </g>
  </g>

  <!-- Footnote -->
  <text x="60" y="582" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">Schematic curve shapes; exact ratios depend on the task and the pretraining corpus, but the order-of-magnitude advantage is robust across genomics tasks.</text>
</svg>
