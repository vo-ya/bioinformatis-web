<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-labelledby="t d">
  <title id="t">ACMG/AMP evidence codes as Bayesian likelihood ratios under the Tavtigian (2018) reformulation</title>
  <desc id="d">A two-panel figure. The left panel lists the four pathogenic and three benign strength tiers with their typical likelihood ratios. The right panel shows a log-scale posterior axis from 0.0001 to 1, with the five-class partition at thresholds 0.001, 0.1, 0.9, and 0.99, and a worked example of how a PS3 plus a PM2 plus a PP3 multiply the prior pathogenic odds into the likely-pathogenic region.</desc>

  <rect x="0" y="0" width="1200" height="660" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="40" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">ACMG/AMP RULE TABLE AS A BAYESIAN CLASSIFIER (TAVTIGIAN 2018)</text>
  <text x="60" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Each evidence code is a likelihood ratio; combinations multiply; thresholds partition the posterior into the five classes.</text>

  <line x1="60" y1="80" x2="1140" y2="80" stroke="#374151" stroke-width="1"/>

  <!-- ─────────── LEFT PANEL — strength tiers ─────────── -->
  <g transform="translate(60, 110)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(A)  LIKELIHOOD RATIOS BY STRENGTH TIER</text>

    <!-- Table headers -->
    <g transform="translate(0, 24)" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">
      <text x="0" y="12">Tier</text>
      <text x="120" y="12">Examples</text>
      <text x="320" y="12" text-anchor="end">LR&#8314;</text>
      <text x="380" y="12" text-anchor="end">log&#8322; LR&#8314;</text>
    </g>
    <line x1="0" y1="46" x2="420" y2="46" stroke="#525252" stroke-width="0.5"/>

    <!-- Pathogenic tiers -->
    <g transform="translate(0, 58)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
      <!-- PVS -->
      <rect x="-4" y="-12" width="424" height="20" fill="#dc2626" opacity="0.10"/>
      <text x="0" y="2" font-weight="600" fill="#dc2626">Very Strong</text>
      <text x="120" y="2" fill="#525252">PVS1 (LoF in LoF gene)</text>
      <text x="320" y="2" text-anchor="end" font-family="JetBrains Mono, monospace" font-weight="600" fill="#dc2626">350</text>
      <text x="380" y="2" text-anchor="end" font-family="JetBrains Mono, monospace" fill="#525252">8.45</text>
    </g>
    <g transform="translate(0, 82)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
      <rect x="-4" y="-12" width="424" height="20" fill="#dc2626" opacity="0.07"/>
      <text x="0" y="2" font-weight="600" fill="#dc2626">Strong</text>
      <text x="120" y="2" fill="#525252">PS1, PS2, PS3, PS4</text>
      <text x="320" y="2" text-anchor="end" font-family="JetBrains Mono, monospace" font-weight="600" fill="#dc2626">18.7</text>
      <text x="380" y="2" text-anchor="end" font-family="JetBrains Mono, monospace" fill="#525252">4.22</text>
    </g>
    <g transform="translate(0, 106)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
      <rect x="-4" y="-12" width="424" height="20" fill="#dc2626" opacity="0.04"/>
      <text x="0" y="2" font-weight="600" fill="#dc2626">Moderate</text>
      <text x="120" y="2" fill="#525252">PM1, PM2, PM3, PM4, PM5, PM6</text>
      <text x="320" y="2" text-anchor="end" font-family="JetBrains Mono, monospace" font-weight="600" fill="#dc2626">4.33</text>
      <text x="380" y="2" text-anchor="end" font-family="JetBrains Mono, monospace" fill="#525252">2.11</text>
    </g>
    <g transform="translate(0, 130)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
      <rect x="-4" y="-12" width="424" height="20" fill="#dc2626" opacity="0.02"/>
      <text x="0" y="2" font-weight="600" fill="#dc2626">Supporting</text>
      <text x="120" y="2" fill="#525252">PP1, PP2, PP3, PP4</text>
      <text x="320" y="2" text-anchor="end" font-family="JetBrains Mono, monospace" font-weight="600" fill="#dc2626">2.08</text>
      <text x="380" y="2" text-anchor="end" font-family="JetBrains Mono, monospace" fill="#525252">1.06</text>
    </g>

    <line x1="0" y1="156" x2="420" y2="156" stroke="#525252" stroke-width="0.5"/>

    <!-- Benign tiers -->
    <g transform="translate(0, 174)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
      <rect x="-4" y="-12" width="424" height="20" fill="#1e3a8a" opacity="0.10"/>
      <text x="0" y="2" font-weight="600" fill="#1e3a8a">Stand-alone</text>
      <text x="120" y="2" fill="#525252">BA1 (AF &#8805; 5%)</text>
      <text x="320" y="2" text-anchor="end" font-family="JetBrains Mono, monospace" font-weight="600" fill="#1e3a8a">1/350</text>
      <text x="380" y="2" text-anchor="end" font-family="JetBrains Mono, monospace" fill="#525252">&#8722;8.45</text>
    </g>
    <g transform="translate(0, 198)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
      <rect x="-4" y="-12" width="424" height="20" fill="#1e3a8a" opacity="0.07"/>
      <text x="0" y="2" font-weight="600" fill="#1e3a8a">Strong</text>
      <text x="120" y="2" fill="#525252">BS1, BS2, BS3, BS4</text>
      <text x="320" y="2" text-anchor="end" font-family="JetBrains Mono, monospace" font-weight="600" fill="#1e3a8a">1/18.7</text>
      <text x="380" y="2" text-anchor="end" font-family="JetBrains Mono, monospace" fill="#525252">&#8722;4.22</text>
    </g>
    <g transform="translate(0, 222)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
      <rect x="-4" y="-12" width="424" height="20" fill="#1e3a8a" opacity="0.04"/>
      <text x="0" y="2" font-weight="600" fill="#1e3a8a">Supporting</text>
      <text x="120" y="2" fill="#525252">BP1, BP2, BP3, BP4, BP5, BP7</text>
      <text x="320" y="2" text-anchor="end" font-family="JetBrains Mono, monospace" font-weight="600" fill="#1e3a8a">1/2.08</text>
      <text x="380" y="2" text-anchor="end" font-family="JetBrains Mono, monospace" fill="#525252">&#8722;1.06</text>
    </g>

    <!-- Prior -->
    <g transform="translate(0, 268)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#374151">Prior pathogenic probability</text>
      <text x="0" y="18" font-family="Inter, sans-serif" font-size="10" fill="#525252">For a random rare variant: P(path) &#8776; 1.5 &#215; 10&#8315;&#8308;; odds &#8776; 1.5 &#215; 10&#8315;&#8308;.</text>
      <text x="0" y="34" font-family="Inter, sans-serif" font-size="10" fill="#525252">Codes update the odds multiplicatively: odds&#8242; = odds &#215; &#8719; LR&#8314;.</text>
    </g>
  </g>

  <!-- Divider -->
  <line x1="540" y1="100" x2="540" y2="620" stroke="#e5e3dc" stroke-width="0.5"/>

  <!-- ─────────── RIGHT PANEL — posterior axis ─────────── -->
  <g transform="translate(580, 110)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(B)  POSTERIOR-PROBABILITY PARTITION INTO FIVE CLASSES</text>

    <!-- Axis at y=300, from x=0 to x=520, log scale 10^-4 to 10^0 -->
    <g transform="translate(0, 60)">
      <!-- background bands for the five classes -->
      <!-- log10 scale: x = (log10(p) + 4) * 130 -->
      <!-- B: p <= 0.001 -> x in [0, 390]; LB: (0.001, 0.1] -> x [390, 520-... wait, 0.99=520*(log(0.99)+4)/4 -->
      <!-- Use a 0..520 axis where 0 = 10^-4 and 520 = 10^0; that is x = (log10(p)+4) * 130 -->
      <!-- Thresholds: -->
      <!-- 0.001 -> x = ( -3 + 4 ) * 130 = 130 -->
      <!-- 0.1   -> x = ( -1 + 4 ) * 130 = 390 -->
      <!-- 0.9   -> x = ( log10(0.9) + 4 ) * 130 = 3.9542 * 130 = 514.05 -->
      <!-- 0.99  -> x = ( -0.00436 + 4 ) * 130 = 518.43 -->
      <!-- Make thresholds: 0.001=130, 0.1=390, 0.9=514, 0.99=518; visible separation only between B/LB/VUS bands; LP and P would be cramped so we replot in linear posterior for the right region. -->
      <!-- Instead: split into two visual segments. Left: 0..380 covers 10^-4..0.1 (log). Right: 380..520 covers 0.1..1 (linear). -->

      <!-- Left segment, log scale -->
      <!-- 10^-4 to 0.1 across x=[0,380]; x = (log10(p)+4) * 380/3 = (log10(p)+4) * 126.67 -->
      <!-- threshold 0.001 -> x = 1 * 126.67 = 126.67 -->
      <!-- threshold 0.1   -> x = 3 * 126.67 = 380 -->
      <rect x="0"   y="20" width="126.67" height="32" fill="#1e3a8a" opacity="0.18"/>
      <rect x="126.67" y="20" width="253.33" height="32" fill="#2563eb" opacity="0.10"/>
      <!-- Right segment, linear scale -->
      <!-- p in [0.1, 1] across x=[380, 520]; x = 380 + (p-0.1)/0.9 * 140 -->
      <!-- threshold 0.9 -> x = 380 + 0.8/0.9 * 140 = 380 + 124.44 = 504.44 -->
      <!-- threshold 0.99 -> x = 380 + 0.89/0.9 * 140 = 380 + 138.44 = 518.44 -->
      <rect x="380" y="20" width="124.44" height="32" fill="#f4f3ee"/>
      <rect x="504.44" y="20" width="14" height="32" fill="#dc2626" opacity="0.18"/>
      <rect x="518.44" y="20" width="6" height="32" fill="#dc2626" opacity="0.40"/>

      <!-- axis line -->
      <line x1="0" y1="52" x2="524" y2="52" stroke="#374151" stroke-width="1.2"/>
      <!-- separator between log and linear scales -->
      <line x1="380" y1="14" x2="380" y2="58" stroke="#8a8a85" stroke-width="0.5" stroke-dasharray="2 2"/>

      <!-- ticks and labels -->
      <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">
        <line x1="0" y1="52" x2="0" y2="58" stroke="#374151" stroke-width="1"/>
        <text x="0" y="72" text-anchor="middle">0.0001</text>
        <line x1="126.67" y1="52" x2="126.67" y2="58" stroke="#dc2626" stroke-width="1"/>
        <text x="126.67" y="72" text-anchor="middle" fill="#dc2626" font-weight="600">0.001</text>
        <line x1="253.33" y1="52" x2="253.33" y2="58" stroke="#374151" stroke-width="0.5"/>
        <text x="253.33" y="72" text-anchor="middle">0.01</text>
        <line x1="380" y1="52" x2="380" y2="58" stroke="#dc2626" stroke-width="1"/>
        <text x="380" y="72" text-anchor="middle" fill="#dc2626" font-weight="600">0.1</text>
        <line x1="504.44" y1="52" x2="504.44" y2="58" stroke="#dc2626" stroke-width="1"/>
        <text x="504.44" y="72" text-anchor="middle" fill="#dc2626" font-weight="600">0.9</text>
        <line x1="518.44" y1="52" x2="518.44" y2="58" stroke="#dc2626" stroke-width="1"/>
        <text x="524" y="72" text-anchor="end" fill="#dc2626" font-weight="600">0.99</text>
      </g>
      <text x="262" y="92" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle" font-style="italic">posterior P(pathogenic | evidence)</text>

      <!-- class labels above bands -->
      <g font-family="Inter, sans-serif" font-size="11" font-weight="600">
        <text x="63" y="12" text-anchor="middle" fill="#1e3a8a">B</text>
        <text x="253" y="12" text-anchor="middle" fill="#2563eb">LB</text>
        <text x="442" y="12" text-anchor="middle" fill="#525252">VUS</text>
        <text x="511" y="12" text-anchor="middle" fill="#dc2626">LP</text>
        <text x="528" y="12" text-anchor="start" fill="#dc2626">P</text>
      </g>
    </g>

    <!-- Worked example block -->
    <g transform="translate(0, 200)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#374151">Worked example</text>
      <text x="0" y="18" font-family="Inter, sans-serif" font-size="10" fill="#525252">A missense variant with PS3 (functional study damaging) + PM2 (absent gnomAD) + PP3 (predictors agree pathogenic).</text>

      <!-- multiplication chain -->
      <g transform="translate(0, 40)" font-family="JetBrains Mono, monospace" font-size="11" fill="#374151">
        <text x="0" y="0">prior odds  =  1.5 &#215; 10&#8315;&#8308;</text>
        <text x="0" y="22">       &#215; PS3 (LR&#8314; = 18.7)   =  2.81 &#215; 10&#8315;&#179;</text>
        <text x="0" y="44">       &#215; PM2 (LR&#8314; = 4.33)   =  1.22 &#215; 10&#8315;&#178;</text>
        <text x="0" y="66">       &#215; PP3 (LR&#8314; = 2.08)   =  2.53 &#215; 10&#8315;&#178;</text>
        <text x="0" y="92" fill="#dc2626" font-weight="600">posterior P(path) = odds / (1+odds) &#8776; 0.025  &#8594;  classified  VUS</text>
      </g>
    </g>

    <!-- Second example showing crossover into LP -->
    <g transform="translate(0, 340)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#374151">Second example — adding PS4</text>
      <text x="0" y="18" font-family="Inter, sans-serif" font-size="10" fill="#525252">Same variant + PS4 (case-control enriched) flips the call.</text>
      <g transform="translate(0, 40)" font-family="JetBrains Mono, monospace" font-size="11" fill="#374151">
        <text x="0" y="0">previous odds = 2.53 &#215; 10&#8315;&#178;</text>
        <text x="0" y="22">       &#215; PS4 (LR&#8314; = 18.7)   =  0.473</text>
        <text x="0" y="48" fill="#dc2626" font-weight="600">posterior &#8776; 0.32 &#215; (4.33/0.473)  &#8230;  with one more PM &#8594; crosses 0.9 (LP)</text>
      </g>
    </g>
  </g>

  <!-- Footer -->
  <line x1="60" y1="630" x2="1140" y2="630" stroke="#374151" stroke-width="0.5"/>
  <text x="60" y="650" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">Likelihood ratios from Tavtigian et al. (2018); the prior is the standard 1.5 &#215; 10&#8315;&#8308; for a randomly chosen rare variant in a Mendelian-disease gene.</text>
</svg>
