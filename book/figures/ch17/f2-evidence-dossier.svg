<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="t d">
  <title id="t">Worked variant evidence dossier for a candidate BRCA1 missense variant</title>
  <desc id="d">A table-format dossier for a hypothetical BRCA1 missense variant. Five rows enumerate the five standard resources — gnomAD population frequency, ClinVar prior classifications, REVEL/AlphaMissense/SpliceAI predictors, literature mining, and phenotype databases — each with the queried data and the ACMG/AMP evidence codes that fire. A summary block at the bottom applies the rule table to the accumulated codes and arrives at a likely-pathogenic classification.</desc>

  <rect x="0" y="0" width="1200" height="720" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="40" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">VARIANT EVIDENCE DOSSIER &#8212; WORKED EXAMPLE</text>
  <text x="60" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">A candidate BRCA1 missense variant; five resources queried; six evidence codes fire; rule table applied.</text>

  <!-- Variant header band -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="1080" height="44" fill="#1e3a8a" opacity="0.08" stroke="#1e3a8a" stroke-width="0.5" rx="2"/>
    <text x="16" y="20" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#374151">VARIANT</text>
    <text x="16" y="36" font-family="JetBrains Mono, monospace" font-size="11" fill="#374151">BRCA1  NM_007294.4:c.5074G&gt;A  p.(Asp1692Asn)  &#183;  chr17:g.43067647C&gt;T  (GRCh38)</text>
    <text x="560" y="20" font-family="Inter, sans-serif" font-size="10" fill="#525252">Indication: hereditary breast/ovarian cancer panel</text>
    <text x="560" y="36" font-family="Inter, sans-serif" font-size="10" fill="#525252">Patient ancestry: NFE  &#183;  Family history: positive</text>
  </g>

  <!-- Column headers -->
  <g transform="translate(60, 144)" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">
    <text x="0" y="0">RESOURCE</text>
    <text x="170" y="0">QUERY RESULT</text>
    <text x="700" y="0">EVIDENCE CODES</text>
    <text x="940" y="0">STRENGTH</text>
  </g>
  <line x1="60" y1="152" x2="1140" y2="152" stroke="#374151" stroke-width="1"/>

  <!-- Row 1: gnomAD -->
  <g transform="translate(60, 174)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">gnomAD v4</text>
    <text x="0" y="16" font-family="Inter, sans-serif" font-size="9" fill="#525252">population frequency</text>

    <text x="170" y="0" font-family="JetBrains Mono, monospace" font-size="10" fill="#374151">global popmax  =  0  (0 / 1.6M alleles)</text>
    <text x="170" y="16" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">absent across all 8 ancestry groups; PASS filter</text>

    <text x="700" y="0" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#dc2626">PM2_Supporting</text>
    <text x="700" y="16" font-family="Inter, sans-serif" font-size="9" fill="#525252">absent from population reference</text>

    <rect x="940" y="-12" width="92" height="22" fill="#dc2626" opacity="0.06" rx="2"/>
    <text x="986" y="3" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#dc2626" text-anchor="middle">supporting</text>
  </g>
  <line x1="80" y1="208" x2="1120" y2="208" stroke="#e5e3dc" stroke-width="0.5"/>

  <!-- Row 2: ClinVar -->
  <g transform="translate(60, 230)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">ClinVar</text>
    <text x="0" y="16" font-family="Inter, sans-serif" font-size="9" fill="#525252">prior classifications</text>

    <text x="170" y="0" font-family="JetBrains Mono, monospace" font-size="10" fill="#374151">3 submissions: 2 LP, 1 VUS; 2-star review</text>
    <text x="170" y="16" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">no expert-panel ENIGMA classification yet</text>

    <text x="700" y="0" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#525252">(prior context only)</text>
    <text x="700" y="16" font-family="Inter, sans-serif" font-size="9" fill="#525252">prior P/LP classifications support but do not fire an evidence code</text>

    <rect x="940" y="-12" width="92" height="22" fill="#525252" opacity="0.06" rx="2"/>
    <text x="986" y="3" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#525252" text-anchor="middle">context</text>
  </g>
  <line x1="80" y1="264" x2="1120" y2="264" stroke="#e5e3dc" stroke-width="0.5"/>

  <!-- Row 3: Predictors -->
  <g transform="translate(60, 286)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">REVEL / AM / SpliceAI</text>
    <text x="0" y="16" font-family="Inter, sans-serif" font-size="9" fill="#525252">in-silico functional</text>

    <text x="170" y="0" font-family="JetBrains Mono, monospace" font-size="10" fill="#374151">REVEL = 0.83  &#8226;  AlphaMissense = pathogenic (0.91)</text>
    <text x="170" y="16" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">SpliceAI delta &#8804; 0.05  &#8594;  no splice effect</text>

    <text x="700" y="0" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#dc2626">PP3</text>
    <text x="700" y="16" font-family="Inter, sans-serif" font-size="9" fill="#525252">2 of 2 missense predictors damaging; SpliceAI consistent</text>

    <rect x="940" y="-12" width="92" height="22" fill="#dc2626" opacity="0.06" rx="2"/>
    <text x="986" y="3" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#dc2626" text-anchor="middle">supporting</text>
  </g>
  <line x1="80" y1="320" x2="1120" y2="320" stroke="#e5e3dc" stroke-width="0.5"/>

  <!-- Row 4: Domain/hotspot -->
  <g transform="translate(60, 342)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">Domain + hotspot</text>
    <text x="0" y="16" font-family="Inter, sans-serif" font-size="9" fill="#525252">protein domain / region</text>

    <text x="170" y="0" font-family="JetBrains Mono, monospace" font-size="10" fill="#374151">Position 1692 within BRCT2 domain (1646&#8211;1859)</text>
    <text x="170" y="16" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">ClinGen-defined critical region for BRCA1 function</text>

    <text x="700" y="0" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#dc2626">PM1</text>
    <text x="700" y="16" font-family="Inter, sans-serif" font-size="9" fill="#525252">mutational hotspot / functional domain</text>

    <rect x="940" y="-12" width="92" height="22" fill="#dc2626" opacity="0.12" rx="2"/>
    <text x="986" y="3" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#dc2626" text-anchor="middle">moderate</text>
  </g>
  <line x1="80" y1="376" x2="1120" y2="376" stroke="#e5e3dc" stroke-width="0.5"/>

  <!-- Row 5: Functional studies -->
  <g transform="translate(60, 398)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">Functional studies</text>
    <text x="0" y="16" font-family="Inter, sans-serif" font-size="9" fill="#525252">PS3 evidence via literature</text>

    <text x="170" y="0" font-family="JetBrains Mono, monospace" font-size="10" fill="#374151">Findlay et al. 2018 saturation-edit BRCA1: SGE function score = &#8722;1.42</text>
    <text x="170" y="16" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">classified as &#8220;loss of function&#8221; in published assay</text>

    <text x="700" y="0" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#dc2626">PS3_Moderate</text>
    <text x="700" y="16" font-family="Inter, sans-serif" font-size="9" fill="#525252">SGE assay validated by ClinGen for BRCA1; moderate strength per VCEP</text>

    <rect x="940" y="-12" width="92" height="22" fill="#dc2626" opacity="0.12" rx="2"/>
    <text x="986" y="3" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#dc2626" text-anchor="middle">moderate</text>
  </g>
  <line x1="80" y1="432" x2="1120" y2="432" stroke="#e5e3dc" stroke-width="0.5"/>

  <!-- Row 6: Co-segregation -->
  <g transform="translate(60, 454)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">Family segregation</text>
    <text x="0" y="16" font-family="Inter, sans-serif" font-size="9" fill="#525252">literature + LIMS history</text>

    <text x="170" y="0" font-family="JetBrains Mono, monospace" font-size="10" fill="#374151">3 affected relatives carry variant, 0 unaffected carriers (this lab + 1 prior report)</text>
    <text x="170" y="16" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">LOD &#8776; 1.2; partial co-segregation</text>

    <text x="700" y="0" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#dc2626">PP1</text>
    <text x="700" y="16" font-family="Inter, sans-serif" font-size="9" fill="#525252">supporting segregation; would upgrade to PP1_Moderate at LOD &#8805; 3</text>

    <rect x="940" y="-12" width="92" height="22" fill="#dc2626" opacity="0.06" rx="2"/>
    <text x="986" y="3" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#dc2626" text-anchor="middle">supporting</text>
  </g>

  <!-- Summary block -->
  <g transform="translate(60, 510)">
    <rect x="0" y="0" width="1080" height="180" fill="#fafaf9" stroke="#1e3a8a" stroke-width="0.8" rx="3"/>

    <text x="20" y="26" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">RULE TABLE APPLICATION</text>

    <g transform="translate(20, 50)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">Accumulated codes:</text>
      <text x="0" y="20" font-family="JetBrains Mono, monospace" font-size="11" fill="#374151">PS3_M  &#43;  PM1  &#43;  PM2_P  &#43;  PP1  &#43;  PP3</text>

      <text x="0" y="48" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">ACMG/AMP rule match (LP):</text>
      <text x="0" y="68" font-family="JetBrains Mono, monospace" font-size="11" fill="#374151">&#8805; 1 PS  &#43;  1&#8211;2 PM  &#43;  &#8805; 2 PP  &#8594;  Likely Pathogenic</text>

      <text x="0" y="96" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">Bayesian posterior:</text>
      <text x="0" y="116" font-family="JetBrains Mono, monospace" font-size="11" fill="#374151">odds = 1.5&#215;10&#8315;&#8308;  &#215;  18.7&#8319;&#695;&#8305;  &#215;  4.33  &#215;  4.33&#8319;&#695;&#8305;  &#215;  2.08  &#215;  2.08  &#8776;  0.16</text>
      <text x="0" y="134" font-family="JetBrains Mono, monospace" font-size="11" fill="#374151">P(path | evidence) &#8776; 0.14  &#8226;  within LP band (0.10 &#8211; 0.99)</text>
    </g>

    <!-- Final call badge -->
    <g transform="translate(810, 50)">
      <rect x="0" y="0" width="240" height="100" fill="#dc2626" opacity="0.08" stroke="#dc2626" stroke-width="0.8" rx="3"/>
      <text x="120" y="32" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#dc2626" text-anchor="middle" letter-spacing="0.08em">FINAL CLASSIFICATION</text>
      <text x="120" y="64" font-family="Source Serif 4, Charter, Georgia, serif" font-size="22" font-weight="600" fill="#dc2626" text-anchor="middle">Likely Pathogenic</text>
      <text x="120" y="84" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252" text-anchor="middle">(LP)  &#8226;  ENIGMA review pending</text>
    </g>
  </g>

  <!-- Footer -->
  <line x1="60" y1="700" x2="1140" y2="700" stroke="#374151" stroke-width="0.5"/>
  <text x="60" y="715" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">Synthetic example for illustration. Strength modifiers (_Supporting / _Moderate) follow the ClinGen BRCA1/2 VCEP recommendations.</text>
</svg>
