<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="t d">
  <title id="t">Pharmacogenomic decision flow as a discrete-state lookup pipeline</title>
  <desc id="d">A horizontal pipeline of five stages, left to right. Stage 1 raw genotype calls from a sequencing assay. Stage 2 star-allele assignment using a PharmVar haplotype table. Stage 3 activity-score lookup per star allele. Stage 4 metaboliser phenotype classification by summed activity score. Stage 5 CPIC dosing recommendation. Each arrow is annotated as a table lookup. Below the pipeline three worked example rows show how a CYP2D6 *1/*1, a CYP2D6 *1/*4, and a CYP2D6 *4/*4 patient flow through to different dosing actions for codeine.</desc>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr-cobalt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
    <marker id="arr-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="640" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="40" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">PHARMACOGENOMIC DECISION FLOW &#8212; FIVE LOOKUPS, ONE ACTION</text>
  <text x="60" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">A discrete-state pipeline. Each arrow is a table lookup; CPIC is the compiled answer.</text>

  <!-- Pipeline stages: y center = 160; boxes 150x80 -->
  <g transform="translate(0, 100)">
    <!-- Stage 1: Genotype -->
    <g transform="translate(60, 0)">
      <rect x="0" y="0" width="160" height="84" fill="#fafaf9" stroke="#1e3a8a" stroke-width="1.4" rx="3"/>
      <text x="80" y="20" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a" letter-spacing="0.08em" text-anchor="middle" font-weight="700">STAGE 1</text>
      <text x="80" y="42" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#374151" text-anchor="middle">Raw genotype</text>
      <text x="80" y="60" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">SNVs + CNVs at</text>
      <text x="80" y="74" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">PGx loci</text>
    </g>

    <!-- Arrow + label -->
    <line x1="222" y1="42" x2="246" y2="42" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-cobalt)"/>
    <text x="234" y="32" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">PharmVar</text>

    <!-- Stage 2: Star allele -->
    <g transform="translate(250, 0)">
      <rect x="0" y="0" width="160" height="84" fill="#fafaf9" stroke="#1e3a8a" stroke-width="1.4" rx="3"/>
      <text x="80" y="20" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a" letter-spacing="0.08em" text-anchor="middle" font-weight="700">STAGE 2</text>
      <text x="80" y="42" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#374151" text-anchor="middle">Star alleles</text>
      <text x="80" y="60" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252" text-anchor="middle">*1, *2, *4, *10, &#8230;</text>
      <text x="80" y="74" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">phased diplotype</text>
    </g>

    <line x1="412" y1="42" x2="436" y2="42" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-cobalt)"/>
    <text x="424" y="32" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">activity score</text>

    <!-- Stage 3: Activity score -->
    <g transform="translate(440, 0)">
      <rect x="0" y="0" width="160" height="84" fill="#fafaf9" stroke="#1e3a8a" stroke-width="1.4" rx="3"/>
      <text x="80" y="20" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a" letter-spacing="0.08em" text-anchor="middle" font-weight="700">STAGE 3</text>
      <text x="80" y="42" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#374151" text-anchor="middle">Activity score</text>
      <text x="80" y="60" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252" text-anchor="middle">a&#8321; + a&#8322;  &#8712;  [0, 3+]</text>
      <text x="80" y="74" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">sum per allele</text>
    </g>

    <line x1="602" y1="42" x2="626" y2="42" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-cobalt)"/>
    <text x="614" y="32" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">phenotype band</text>

    <!-- Stage 4: Metabolizer phenotype -->
    <g transform="translate(630, 0)">
      <rect x="0" y="0" width="180" height="84" fill="#fafaf9" stroke="#1e3a8a" stroke-width="1.4" rx="3"/>
      <text x="90" y="20" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a" letter-spacing="0.08em" text-anchor="middle" font-weight="700">STAGE 4</text>
      <text x="90" y="42" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#374151" text-anchor="middle">Metaboliser status</text>
      <text x="90" y="60" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">PM &#183; IM &#183; NM &#183; RM &#183; UM</text>
      <text x="90" y="74" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">five-class phenotype</text>
    </g>

    <line x1="812" y1="42" x2="836" y2="42" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-cobalt)"/>
    <text x="824" y="32" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">CPIC guideline</text>

    <!-- Stage 5: Action -->
    <g transform="translate(840, 0)">
      <rect x="0" y="0" width="220" height="84" fill="#1e3a8a" opacity="0.08" stroke="#1e3a8a" stroke-width="1.4" rx="3"/>
      <text x="110" y="20" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a" letter-spacing="0.08em" text-anchor="middle" font-weight="700">STAGE 5  &#8212;  ACTION</text>
      <text x="110" y="42" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#374151" text-anchor="middle">Clinical recommendation</text>
      <text x="110" y="60" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">standard / reduced /</text>
      <text x="110" y="74" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">avoid / alternative drug</text>
    </g>
  </g>

  <!-- ─────────── Worked examples ─────────── -->
  <g transform="translate(60, 240)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">WORKED EXAMPLES &#8212; CYP2D6 + CODEINE</text>
  </g>

  <!-- Table headers -->
  <g transform="translate(60, 270)" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">
    <text x="0" y="0">Patient</text>
    <text x="170" y="0">Genotype</text>
    <text x="340" y="0">Diplotype</text>
    <text x="510" y="0">Activity score</text>
    <text x="680" y="0">Phenotype</text>
    <text x="840" y="0">CPIC action for codeine</text>
  </g>
  <line x1="60" y1="278" x2="1140" y2="278" stroke="#374151" stroke-width="0.5"/>

  <!-- Row 1: Normal -->
  <g transform="translate(60, 300)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" fill="#374151">Patient A</text>
    <text x="170" y="0" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">reference / reference</text>
    <text x="340" y="0" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#374151">*1 / *1</text>
    <text x="510" y="0" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#374151">1 + 1 = 2</text>
    <text x="680" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#065f46">Normal (NM)</text>
    <text x="840" y="0" font-family="Inter, sans-serif" font-size="10" fill="#065f46">Standard dose</text>
    <text x="840" y="14" font-family="Inter, sans-serif" font-size="9" fill="#525252">codeine acceptable; no PGx adjustment</text>
  </g>
  <line x1="80" y1="324" x2="1120" y2="324" stroke="#e5e3dc" stroke-width="0.5"/>

  <!-- Row 2: Intermediate -->
  <g transform="translate(60, 344)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" fill="#374151">Patient B</text>
    <text x="170" y="0" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">reference / 1846G&gt;A splice variant</text>
    <text x="340" y="0" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#374151">*1 / *4</text>
    <text x="510" y="0" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#374151">1 + 0 = 1</text>
    <text x="680" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#b45309">Intermediate (IM)</text>
    <text x="840" y="0" font-family="Inter, sans-serif" font-size="10" fill="#b45309">Reduced response</text>
    <text x="840" y="14" font-family="Inter, sans-serif" font-size="9" fill="#525252">monitor pain; consider alternative if inadequate</text>
  </g>
  <line x1="80" y1="368" x2="1120" y2="368" stroke="#e5e3dc" stroke-width="0.5"/>

  <!-- Row 3: Poor -->
  <g transform="translate(60, 388)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" fill="#374151">Patient C</text>
    <text x="170" y="0" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">two splice-disrupting alleles</text>
    <text x="340" y="0" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#374151">*4 / *4</text>
    <text x="510" y="0" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#374151">0 + 0 = 0</text>
    <text x="680" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#dc2626">Poor (PM)</text>
    <text x="840" y="0" font-family="Inter, sans-serif" font-size="10" fill="#dc2626">Avoid codeine</text>
    <text x="840" y="14" font-family="Inter, sans-serif" font-size="9" fill="#525252">no analgesia from codeine; prescribe non-CYP2D6 opioid</text>
  </g>
  <line x1="80" y1="412" x2="1120" y2="412" stroke="#e5e3dc" stroke-width="0.5"/>

  <!-- Row 4: Ultra-rapid -->
  <g transform="translate(60, 432)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" fill="#374151">Patient D</text>
    <text x="170" y="0" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">reference / duplication of *2</text>
    <text x="340" y="0" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#374151">*1 / *2&#215;3</text>
    <text x="510" y="0" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#374151">1 + 3 = 4</text>
    <text x="680" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#dc2626">Ultra-rapid (UM)</text>
    <text x="840" y="0" font-family="Inter, sans-serif" font-size="10" fill="#dc2626">Avoid codeine</text>
    <text x="840" y="14" font-family="Inter, sans-serif" font-size="9" fill="#525252">respiratory-depression risk; alternative opioid</text>
  </g>

  <!-- ─────────── EE-framing callout box ─────────── -->
  <g transform="translate(60, 500)">
    <rect x="0" y="0" width="1080" height="92" fill="#1e3a8a" opacity="0.06" stroke="#1e3a8a" stroke-width="0.6" rx="3"/>
    <text x="20" y="22" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" font-weight="700" letter-spacing="0.08em">EE READING</text>
    <text x="20" y="42" font-family="Inter, sans-serif" font-size="10.5" fill="#374151">A mode-based controller. Five discrete states (PM / IM / NM / RM / UM); table-driven transitions; no learning at runtime.</text>
    <text x="20" y="58" font-family="Inter, sans-serif" font-size="10.5" fill="#374151">The science is in building the tables &#8212; clinical trials, mechanistic studies, expert review &#8212; not in solving an optimisation each prescription.</text>
    <text x="20" y="78" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">The same architecture covers warfarin (VKORC1 + CYP2C9), abacavir (HLA-B*57:01), thiopurines (TPMT, NUDT15), and the &gt; 50 other CPIC Level A/B pairs.</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="610" x2="1140" y2="610" stroke="#374151" stroke-width="0.5"/>
  <text x="60" y="625" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">Activity-score scheme and CYP2D6 *4 splice-disruption mechanism follow PharmVar and CPIC published guidelines.</text>
</svg>
