<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="t d">
  <title id="t">Secondary-findings three-gate decision diagram</title>
  <desc id="d">A three-gate logical AND diagram. A candidate incidental finding must pass three gates in sequence before reporting: gene on the ACMG SF v3.2 list, variant classified as pathogenic or likely pathogenic, and patient consented to secondary findings. Each gate has a pass arrow continuing to the next stage and a fail arrow exiting to a documented no-report disposition. Four worked example paths are tabulated below the diagram, illustrating one report, one block on classification, one block on consent, and one block on gene-list membership.</desc>

  <!-- Markers -->
  <defs>
    <marker id="arrow-cobalt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#065f46"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="600" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="40" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">SECONDARY-FINDINGS RETURN &#8212; THREE-GATE DECISION</text>
  <text x="60" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Every reported incidental finding must pass all three gates; every failure routes to a documented no-report disposition.</text>

  <!-- Input -->
  <g transform="translate(60, 110)">
    <rect x="0" y="0" width="140" height="64" fill="#f4f3ee" stroke="#374151" stroke-width="1.2" rx="3"/>
    <text x="70" y="22" font-family="Inter, sans-serif" font-size="9" fill="#525252" letter-spacing="0.08em" text-anchor="middle" font-weight="600">INPUT</text>
    <text x="70" y="42" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151" text-anchor="middle">Candidate variant</text>
    <text x="70" y="56" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">from exome / WGS</text>
  </g>

  <!-- Arrow from input to Gate 1 -->
  <line x1="200" y1="142" x2="248" y2="142" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arrow-cobalt)"/>

  <!-- Gate 1: Gene -->
  <g transform="translate(250, 100)">
    <rect x="0" y="0" width="180" height="84" fill="#fafaf9" stroke="#1e3a8a" stroke-width="1.4" rx="3"/>
    <text x="90" y="20" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a" letter-spacing="0.08em" text-anchor="middle" font-weight="700">GATE 1</text>
    <text x="90" y="42" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#374151" text-anchor="middle">Gene on SF list?</text>
    <text x="90" y="60" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">ACMG SF v3.2</text>
    <text x="90" y="74" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252" text-anchor="middle">(~81 genes)</text>
  </g>

  <!-- Pass arrow Gate 1 -> Gate 2 -->
  <line x1="430" y1="142" x2="478" y2="142" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arrow-cobalt)"/>
  <text x="454" y="132" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" text-anchor="middle" font-weight="600">YES</text>

  <!-- Fail arrow Gate 1 -> No report -->
  <line x1="340" y1="184" x2="340" y2="288" stroke="#dc2626" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <text x="352" y="240" font-family="Inter, sans-serif" font-size="10" fill="#dc2626" text-anchor="start" font-weight="600">NO</text>

  <!-- Gate 2: Classification -->
  <g transform="translate(480, 100)">
    <rect x="0" y="0" width="180" height="84" fill="#fafaf9" stroke="#1e3a8a" stroke-width="1.4" rx="3"/>
    <text x="90" y="20" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a" letter-spacing="0.08em" text-anchor="middle" font-weight="700">GATE 2</text>
    <text x="90" y="42" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#374151" text-anchor="middle">P or LP under</text>
    <text x="90" y="60" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#374151" text-anchor="middle">ACMG/AMP?</text>
    <text x="90" y="74" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">VUS does not pass</text>
  </g>

  <!-- Pass Gate 2 -> Gate 3 -->
  <line x1="660" y1="142" x2="708" y2="142" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arrow-cobalt)"/>
  <text x="684" y="132" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" text-anchor="middle" font-weight="600">YES</text>

  <!-- Fail Gate 2 -> No report -->
  <line x1="570" y1="184" x2="570" y2="288" stroke="#dc2626" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <text x="582" y="240" font-family="Inter, sans-serif" font-size="10" fill="#dc2626" text-anchor="start" font-weight="600">NO</text>

  <!-- Gate 3: Consent -->
  <g transform="translate(710, 100)">
    <rect x="0" y="0" width="180" height="84" fill="#fafaf9" stroke="#1e3a8a" stroke-width="1.4" rx="3"/>
    <text x="90" y="20" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a" letter-spacing="0.08em" text-anchor="middle" font-weight="700">GATE 3</text>
    <text x="90" y="42" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#374151" text-anchor="middle">Patient consented</text>
    <text x="90" y="60" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#374151" text-anchor="middle">to SF return?</text>
    <text x="90" y="74" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">opt-in default</text>
  </g>

  <!-- Pass Gate 3 -> Report -->
  <line x1="890" y1="142" x2="940" y2="142" stroke="#065f46" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <text x="915" y="132" font-family="Inter, sans-serif" font-size="10" fill="#065f46" text-anchor="middle" font-weight="600">YES</text>

  <!-- Fail Gate 3 -> No report -->
  <line x1="800" y1="184" x2="800" y2="288" stroke="#dc2626" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <text x="812" y="240" font-family="Inter, sans-serif" font-size="10" fill="#dc2626" text-anchor="start" font-weight="600">NO</text>

  <!-- Report endpoint -->
  <g transform="translate(940, 100)">
    <rect x="0" y="0" width="200" height="84" fill="#065f46" opacity="0.10" stroke="#065f46" stroke-width="1.4" rx="3"/>
    <text x="100" y="20" font-family="Inter, sans-serif" font-size="9" fill="#065f46" letter-spacing="0.08em" text-anchor="middle" font-weight="700">REPORTABLE</text>
    <text x="100" y="42" font-family="Source Serif 4, Georgia, serif" font-size="14" font-weight="600" fill="#065f46" text-anchor="middle">Return finding</text>
    <text x="100" y="60" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">re-confirm chemistry,</text>
    <text x="100" y="74" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">route via genetic counsellor</text>
  </g>

  <!-- No-report endpoint -->
  <g transform="translate(340, 290)">
    <rect x="0" y="0" width="460" height="64" fill="#dc2626" opacity="0.08" stroke="#dc2626" stroke-width="1.2" rx="3"/>
    <text x="230" y="20" font-family="Inter, sans-serif" font-size="9" fill="#dc2626" letter-spacing="0.08em" text-anchor="middle" font-weight="700">DOCUMENTED NO-REPORT DISPOSITION</text>
    <text x="230" y="42" font-family="Inter, sans-serif" font-size="11" fill="#374151" text-anchor="middle">Record gate that failed, reason, and reviewing scientist in LIMS;</text>
    <text x="230" y="56" font-family="Inter, sans-serif" font-size="11" fill="#374151" text-anchor="middle">no patient-facing return; audit-traceable.</text>
  </g>

  <!-- ─────────── Worked example paths ─────────── -->
  <g transform="translate(60, 396)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">EXAMPLE PATHS</text>
  </g>

  <g transform="translate(60, 416)" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">
    <text x="0" y="0">Case</text>
    <text x="180" y="0">Gate 1 (gene)</text>
    <text x="380" y="0">Gate 2 (classification)</text>
    <text x="620" y="0">Gate 3 (consent)</text>
    <text x="820" y="0">Outcome</text>
  </g>
  <line x1="60" y1="424" x2="1140" y2="424" stroke="#374151" stroke-width="0.5"/>

  <!-- Row 1 -->
  <g transform="translate(60, 444)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
    <text x="0" y="0">BRCA1 p.(Arg1443Ter) in cardiomyopathy case</text>
    <text x="180" y="0" fill="#065f46" font-weight="600">&#10003; on SF v3.2</text>
    <text x="380" y="0" fill="#065f46" font-weight="600">&#10003; P (PVS1 + PS3)</text>
    <text x="620" y="0" fill="#065f46" font-weight="600">&#10003; SF opt-in on record</text>
    <text x="820" y="0" fill="#065f46" font-weight="600">REPORT</text>
  </g>
  <line x1="80" y1="464" x2="1120" y2="464" stroke="#e5e3dc" stroke-width="0.5"/>

  <!-- Row 2 -->
  <g transform="translate(60, 482)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
    <text x="0" y="0">MLH1 missense VUS in neurodegeneration case</text>
    <text x="180" y="0" fill="#065f46" font-weight="600">&#10003; on SF v3.2</text>
    <text x="380" y="0" fill="#dc2626" font-weight="600">&#10007; VUS</text>
    <text x="620" y="0" fill="#525252">not evaluated</text>
    <text x="820" y="0" fill="#dc2626" font-weight="600">NO REPORT (Gate 2)</text>
  </g>
  <line x1="80" y1="502" x2="1120" y2="502" stroke="#e5e3dc" stroke-width="0.5"/>

  <!-- Row 3 -->
  <g transform="translate(60, 520)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
    <text x="0" y="0">RYR1 P variant in malignant-hyperthermia panel</text>
    <text x="180" y="0" fill="#065f46" font-weight="600">&#10003; on SF v3.2</text>
    <text x="380" y="0" fill="#065f46" font-weight="600">&#10003; LP</text>
    <text x="620" y="0" fill="#dc2626" font-weight="600">&#10007; SF opt-out at consent</text>
    <text x="820" y="0" fill="#dc2626" font-weight="600">NO REPORT (Gate 3)</text>
  </g>
  <line x1="80" y1="540" x2="1120" y2="540" stroke="#e5e3dc" stroke-width="0.5"/>

  <!-- Row 4 -->
  <g transform="translate(60, 558)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
    <text x="0" y="0">DMD truncating variant in cardiomyopathy case</text>
    <text x="180" y="0" fill="#dc2626" font-weight="600">&#10007; DMD not on SF v3.2</text>
    <text x="380" y="0" fill="#525252">not evaluated</text>
    <text x="620" y="0" fill="#525252">not evaluated</text>
    <text x="820" y="0" fill="#dc2626" font-weight="600">NO REPORT (Gate 1)</text>
  </g>

  <!-- Footer -->
  <text x="60" y="590" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">Three gates form a logical AND; the workflow exists because each failure mode &#8212; missed P/LP, VUS-as-actionable, consent violation &#8212; has happened in practice.</text>
</svg>
