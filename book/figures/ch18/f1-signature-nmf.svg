<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-labelledby="t d">
  <title id="t">Mutational signature decomposition as non-negative matrix factorisation</title>
  <desc id="d">Three panels arranged left to right. Left: a 96-bin observed tumour mutation spectrum shown as a bar chart with six substitution-type groups. Middle: a basis matrix W of signatures shown as three stacked 96-bin spectra (clock-like CpG, ultraviolet, tobacco). Right: the resulting non-negative exposure vector h shown as a horizontal bar chart. Arrows connect the observed spectrum to W times h.</desc>

  <rect x="0" y="0" width="1200" height="480" fill="#fafaf9"/>

  <!-- header -->
  <text x="60" y="36" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">MUTATIONAL SIGNATURES AS NMF</text>
  <text x="60" y="56" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">V (observed) approximates W (signatures) times h (per-tumour exposures), with W and h non-negative.</text>

  <!-- =================== PANEL A: observed spectrum V =================== -->
  <g transform="translate(60, 90)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">OBSERVED  V</text>
    <text x="0" y="16" font-family="Inter, sans-serif" font-size="10" fill="#525252">96-bin tumour spectrum</text>

    <!-- frame -->
    <rect x="0" y="28" width="320" height="180" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>
    <line x1="20" y1="180" x2="300" y2="180" stroke="#374151" stroke-width="1"/>

    <!-- 6 substitution-type groups, 16 bars each -->
    <!-- Group widths: 280/6 ≈ 46.7. Bar width 2.5, gap 0.3 -->
    <!-- Group colours -->
    <g>
      <!-- C>A teal -->
      <g transform="translate(22, 0)" fill="#0d7377">
        <!-- 16 bars varying heights, mostly low -->
        <rect x="0"  y="170" width="2.5" height="10"/>
        <rect x="3"  y="172" width="2.5" height="8"/>
        <rect x="6"  y="168" width="2.5" height="12"/>
        <rect x="9"  y="170" width="2.5" height="10"/>
        <rect x="12" y="174" width="2.5" height="6"/>
        <rect x="15" y="173" width="2.5" height="7"/>
        <rect x="18" y="167" width="2.5" height="13"/>
        <rect x="21" y="171" width="2.5" height="9"/>
        <rect x="24" y="174" width="2.5" height="6"/>
        <rect x="27" y="170" width="2.5" height="10"/>
        <rect x="30" y="172" width="2.5" height="8"/>
        <rect x="33" y="168" width="2.5" height="12"/>
        <rect x="36" y="174" width="2.5" height="6"/>
        <rect x="39" y="173" width="2.5" height="7"/>
        <rect x="42" y="171" width="2.5" height="9"/>
        <rect x="45" y="170" width="2.5" height="10"/>
      </g>
      <!-- C>G grey -->
      <g transform="translate(70, 0)" fill="#6b7280">
        <rect x="0"  y="172" width="2.5" height="8"/>
        <rect x="3"  y="174" width="2.5" height="6"/>
        <rect x="6"  y="173" width="2.5" height="7"/>
        <rect x="9"  y="175" width="2.5" height="5"/>
        <rect x="12" y="174" width="2.5" height="6"/>
        <rect x="15" y="173" width="2.5" height="7"/>
        <rect x="18" y="175" width="2.5" height="5"/>
        <rect x="21" y="174" width="2.5" height="6"/>
        <rect x="24" y="172" width="2.5" height="8"/>
        <rect x="27" y="173" width="2.5" height="7"/>
        <rect x="30" y="175" width="2.5" height="5"/>
        <rect x="33" y="174" width="2.5" height="6"/>
        <rect x="36" y="173" width="2.5" height="7"/>
        <rect x="39" y="175" width="2.5" height="5"/>
        <rect x="42" y="174" width="2.5" height="6"/>
        <rect x="45" y="173" width="2.5" height="7"/>
      </g>
      <!-- C>T amber: strong at CpG and TCN -->
      <g transform="translate(118, 0)" fill="#b45309">
        <rect x="0"  y="160" width="2.5" height="20"/>
        <rect x="3"  y="155" width="2.5" height="25"/>
        <rect x="6"  y="100" width="2.5" height="80"/>
        <rect x="9"  y="118" width="2.5" height="62"/>
        <rect x="12" y="148" width="2.5" height="32"/>
        <rect x="15" y="140" width="2.5" height="40"/>
        <rect x="18" y="85"  width="2.5" height="95"/>
        <rect x="21" y="110" width="2.5" height="70"/>
        <rect x="24" y="158" width="2.5" height="22"/>
        <rect x="27" y="152" width="2.5" height="28"/>
        <rect x="30" y="105" width="2.5" height="75"/>
        <rect x="33" y="120" width="2.5" height="60"/>
        <rect x="36" y="150" width="2.5" height="30"/>
        <rect x="39" y="145" width="2.5" height="35"/>
        <rect x="42" y="92"  width="2.5" height="88"/>
        <rect x="45" y="115" width="2.5" height="65"/>
      </g>
      <!-- T>A muted-red -->
      <g transform="translate(166, 0)" fill="#c4342c">
        <rect x="0"  y="174" width="2.5" height="6"/>
        <rect x="3"  y="173" width="2.5" height="7"/>
        <rect x="6"  y="175" width="2.5" height="5"/>
        <rect x="9"  y="174" width="2.5" height="6"/>
        <rect x="12" y="172" width="2.5" height="8"/>
        <rect x="15" y="173" width="2.5" height="7"/>
        <rect x="18" y="174" width="2.5" height="6"/>
        <rect x="21" y="175" width="2.5" height="5"/>
        <rect x="24" y="173" width="2.5" height="7"/>
        <rect x="27" y="174" width="2.5" height="6"/>
        <rect x="30" y="172" width="2.5" height="8"/>
        <rect x="33" y="173" width="2.5" height="7"/>
        <rect x="36" y="175" width="2.5" height="5"/>
        <rect x="39" y="174" width="2.5" height="6"/>
        <rect x="42" y="173" width="2.5" height="7"/>
        <rect x="45" y="172" width="2.5" height="8"/>
      </g>
      <!-- T>C forest -->
      <g transform="translate(214, 0)" fill="#2d7a3e">
        <rect x="0"  y="170" width="2.5" height="10"/>
        <rect x="3"  y="171" width="2.5" height="9"/>
        <rect x="6"  y="168" width="2.5" height="12"/>
        <rect x="9"  y="169" width="2.5" height="11"/>
        <rect x="12" y="172" width="2.5" height="8"/>
        <rect x="15" y="170" width="2.5" height="10"/>
        <rect x="18" y="167" width="2.5" height="13"/>
        <rect x="21" y="171" width="2.5" height="9"/>
        <rect x="24" y="173" width="2.5" height="7"/>
        <rect x="27" y="170" width="2.5" height="10"/>
        <rect x="30" y="168" width="2.5" height="12"/>
        <rect x="33" y="169" width="2.5" height="11"/>
        <rect x="36" y="172" width="2.5" height="8"/>
        <rect x="39" y="171" width="2.5" height="9"/>
        <rect x="42" y="170" width="2.5" height="10"/>
        <rect x="45" y="167" width="2.5" height="13"/>
      </g>
      <!-- T>G violet -->
      <g transform="translate(262, 0)" fill="#7c3aed">
        <rect x="0"  y="175" width="2.5" height="5"/>
        <rect x="3"  y="174" width="2.5" height="6"/>
        <rect x="6"  y="173" width="2.5" height="7"/>
        <rect x="9"  y="175" width="2.5" height="5"/>
        <rect x="12" y="174" width="2.5" height="6"/>
        <rect x="15" y="173" width="2.5" height="7"/>
        <rect x="18" y="175" width="2.5" height="5"/>
        <rect x="21" y="174" width="2.5" height="6"/>
        <rect x="24" y="173" width="2.5" height="7"/>
        <rect x="27" y="175" width="2.5" height="5"/>
        <rect x="30" y="174" width="2.5" height="6"/>
        <rect x="33" y="173" width="2.5" height="7"/>
        <rect x="36" y="175" width="2.5" height="5"/>
        <rect x="39" y="174" width="2.5" height="6"/>
        <rect x="42" y="173" width="2.5" height="7"/>
        <rect x="45" y="175" width="2.5" height="5"/>
      </g>
    </g>

    <!-- substitution-type labels -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#374151">
      <text x="44"  y="200" text-anchor="middle">C&gt;A</text>
      <text x="92"  y="200" text-anchor="middle">C&gt;G</text>
      <text x="140" y="200" text-anchor="middle">C&gt;T</text>
      <text x="188" y="200" text-anchor="middle">T&gt;A</text>
      <text x="236" y="200" text-anchor="middle">T&gt;C</text>
      <text x="284" y="200" text-anchor="middle">T&gt;G</text>
    </g>
    <text x="160" y="222" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle" font-style="italic">96 trinucleotide bins</text>

    <!-- dimension label -->
    <text x="160" y="248" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#1e3a8a" text-anchor="middle">V ∈ ℝ&#8313;&#8310;</text>
  </g>

  <!-- approx sign -->
  <text x="420" y="200" font-family="JetBrains Mono, monospace" font-size="36" font-weight="500" fill="#374151" text-anchor="middle">≈</text>

  <!-- =================== PANEL B: signatures W =================== -->
  <g transform="translate(460, 90)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">SIGNATURES  W</text>
    <text x="0" y="16" font-family="Inter, sans-serif" font-size="10" fill="#525252">basis vectors (COSMIC catalogue)</text>

    <!-- frame -->
    <rect x="0" y="28" width="320" height="240" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>

    <!-- SBS1 row -->
    <g transform="translate(20, 40)">
      <text x="0" y="-2" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">SBS1 — clock CpG</text>
      <!-- compact 6-block mini spectrum, emphasising C>T spike -->
      <rect x="0"   y="20" width="40" height="2" fill="#0d7377"/>
      <rect x="44"  y="20" width="40" height="2" fill="#6b7280"/>
      <rect x="88"  y="6"  width="40" height="16" fill="#b45309"/>
      <rect x="132" y="20" width="40" height="2" fill="#c4342c"/>
      <rect x="176" y="19" width="40" height="3" fill="#2d7a3e"/>
      <rect x="220" y="20" width="40" height="2" fill="#7c3aed"/>
    </g>

    <!-- SBS7a row (UV) -->
    <g transform="translate(20, 110)">
      <text x="0" y="-2" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">SBS7a — UV</text>
      <rect x="0"   y="30" width="40" height="2" fill="#0d7377"/>
      <rect x="44"  y="29" width="40" height="3" fill="#6b7280"/>
      <rect x="88"  y="4"  width="40" height="28" fill="#b45309"/>
      <rect x="132" y="30" width="40" height="2" fill="#c4342c"/>
      <rect x="176" y="22" width="40" height="10" fill="#2d7a3e"/>
      <rect x="220" y="30" width="40" height="2" fill="#7c3aed"/>
    </g>

    <!-- SBS4 row (tobacco) -->
    <g transform="translate(20, 180)">
      <text x="0" y="-2" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">SBS4 — tobacco</text>
      <rect x="0"   y="2"  width="40" height="30" fill="#0d7377"/>
      <rect x="44"  y="28" width="40" height="4" fill="#6b7280"/>
      <rect x="88"  y="22" width="40" height="10" fill="#b45309"/>
      <rect x="132" y="29" width="40" height="3" fill="#c4342c"/>
      <rect x="176" y="26" width="40" height="6" fill="#2d7a3e"/>
      <rect x="220" y="30" width="40" height="2" fill="#7c3aed"/>
    </g>

    <!-- dimension label -->
    <text x="160" y="290" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#1e3a8a" text-anchor="middle">W ∈ ℝ&#8313;&#8310; ˣ &#7531;</text>
  </g>

  <!-- multiply sign -->
  <text x="820" y="200" font-family="JetBrains Mono, monospace" font-size="32" font-weight="500" fill="#374151" text-anchor="middle">·</text>

  <!-- =================== PANEL C: exposures h =================== -->
  <g transform="translate(860, 90)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">EXPOSURES  h</text>
    <text x="0" y="16" font-family="Inter, sans-serif" font-size="10" fill="#525252">non-negative weights per signature</text>

    <!-- frame -->
    <rect x="0" y="28" width="260" height="240" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>

    <!-- horizontal bars -->
    <g transform="translate(110, 50)">
      <text x="-90" y="14" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="start">SBS1</text>
      <rect x="0" y="4" width="45" height="14" fill="#1e3a8a"/>
      <text x="55" y="14" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">220</text>

      <text x="-90" y="50" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="start">SBS7a</text>
      <rect x="0" y="40" width="125" height="14" fill="#1e3a8a"/>
      <text x="135" y="50" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">610</text>

      <text x="-90" y="86" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="start">SBS4</text>
      <rect x="0" y="76" width="20" height="14" fill="#1e3a8a"/>
      <text x="30" y="86" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">90</text>

      <!-- inactive signatures -->
      <text x="-90" y="122" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85" text-anchor="start">SBS3</text>
      <rect x="0" y="112" width="2" height="14" fill="#8a8a85"/>
      <text x="30" y="122" font-family="JetBrains Mono, monospace" font-size="10" fill="#8a8a85">≈0</text>

      <text x="-90" y="158" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85" text-anchor="start">SBS6</text>
      <rect x="0" y="148" width="2" height="14" fill="#8a8a85"/>
      <text x="30" y="158" font-family="JetBrains Mono, monospace" font-size="10" fill="#8a8a85">≈0</text>
    </g>

    <!-- interpretation -->
    <g transform="translate(20, 224)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#7c3aed">interpretation:</text>
      <text x="0" y="14" font-family="Inter, sans-serif" font-size="10" fill="#525252">UV-dominant melanoma,</text>
      <text x="0" y="26" font-family="Inter, sans-serif" font-size="10" fill="#525252">age background; no smoker.</text>
    </g>
  </g>

  <!-- bottom annotation -->
  <line x1="60" y1="430" x2="1140" y2="430" stroke="#e5e3dc" stroke-width="0.5"/>
  <text x="60" y="452" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">Same linear-algebra move solves speech source separation and document-topic modelling; the cancer-genomics rediscovery is Alexandrov et al. (2013).</text>
</svg>
