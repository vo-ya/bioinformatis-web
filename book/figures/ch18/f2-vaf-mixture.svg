<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" role="img" aria-labelledby="t d">
  <title id="t">Why VAF is a mixture observation under varying purity and copy number</title>
  <desc id="d">A 2-by-3 grid of small VAF histograms. Rows correspond to two copy-number states (diploid CN equals 2, gain CN equals 3); columns correspond to three tumour purities (20 percent, 50 percent, 80 percent). Each panel shows the position of a clonal mode and a subclonal mode on a 0 to 1 VAF axis. A legend at the bottom maps the CCF identity of the modes; an annotation highlights how the same biological subclone slides along the VAF axis as purity changes.</desc>

  <rect x="0" y="0" width="1200" height="540" fill="#fafaf9"/>

  <!-- header -->
  <text x="60" y="36" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">VAF IS A MIXTURE OBSERVATION</text>
  <text x="60" y="56" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Same biological subclone, six different purity-and-copy-number contexts. Without purity and CN, VAF is ambiguous.</text>

  <!-- column headers (purity) -->
  <g font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">
    <text x="280" y="100" text-anchor="middle">PURITY 20%</text>
    <text x="600" y="100" text-anchor="middle">PURITY 50%</text>
    <text x="920" y="100" text-anchor="middle">PURITY 80%</text>
  </g>

  <!-- row labels (CN) -->
  <g font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em" transform="rotate(-90)">
    <text x="-220" y="80" text-anchor="middle">CN = 2 (DIPLOID)</text>
    <text x="-420" y="80" text-anchor="middle">CN = 3 (GAIN)</text>
  </g>

  <!-- Each panel: 240 wide, 130 tall histogram. x-axis 0..1 VAF, ticks at 0.25, 0.5. -->
  <!-- A clonal CCF=1 mode and a subclonal CCF=0.4 mode shown. -->
  <!-- Diploid: expected clonal VAF = purity/2; subclonal CCF=0.4 → 0.4*purity/2 -->
  <!-- CN=3 (one gain, mutation pre-gain so 2 copies of variant): clonal VAF = purity*(2/CN_eff) where eff is purity*CN+(1-purity)*2 -->
  <!-- For demonstration use approx values; the figure is conceptual -->

  <!-- helper: draw axis -->
  <!-- ====================== Diploid CN=2, purity 20% ====================== -->
  <g transform="translate(160, 130)">
    <rect x="0" y="0" width="240" height="130" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>
    <!-- x-axis -->
    <line x1="20" y1="110" x2="220" y2="110" stroke="#374151" stroke-width="1"/>
    <!-- ticks -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#374151">
      <line x1="20" y1="110" x2="20" y2="114" stroke="#374151"/>
      <text x="20" y="126" text-anchor="middle">0</text>
      <line x1="70" y1="110" x2="70" y2="114" stroke="#374151"/>
      <text x="70" y="126" text-anchor="middle">.25</text>
      <line x1="120" y1="110" x2="120" y2="114" stroke="#374151"/>
      <text x="120" y="126" text-anchor="middle">.50</text>
      <line x1="170" y1="110" x2="170" y2="114" stroke="#374151"/>
      <text x="170" y="126" text-anchor="middle">.75</text>
      <line x1="220" y1="110" x2="220" y2="114" stroke="#374151"/>
      <text x="220" y="126" text-anchor="middle">1</text>
    </g>
    <!-- subclonal CCF=0.4: VAF ~ 0.04 → x=28 -->
    <g>
      <rect x="22" y="80"  width="4" height="30" fill="#525252"/>
      <rect x="26" y="60"  width="4" height="50" fill="#525252"/>
      <rect x="30" y="74"  width="4" height="36" fill="#525252"/>
      <rect x="34" y="88"  width="4" height="22" fill="#525252"/>
    </g>
    <!-- clonal CCF=1: VAF=0.10 → x=40 -->
    <g>
      <rect x="36" y="68" width="4" height="42" fill="#1e3a8a"/>
      <rect x="40" y="40" width="4" height="70" fill="#1e3a8a"/>
      <rect x="44" y="46" width="4" height="64" fill="#1e3a8a"/>
      <rect x="48" y="64" width="4" height="46" fill="#1e3a8a"/>
      <rect x="52" y="80" width="4" height="30" fill="#1e3a8a"/>
    </g>
    <!-- annotation -->
    <line x1="42" y1="38" x2="42" y2="20" stroke="#1e3a8a" stroke-width="0.75"/>
    <text x="42" y="14" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a" text-anchor="middle">clonal</text>
    <line x1="28" y1="60" x2="14" y2="40" stroke="#525252" stroke-width="0.75"/>
    <text x="14" y="34" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">subclone</text>
  </g>

  <!-- ====================== Diploid CN=2, purity 50% ====================== -->
  <g transform="translate(480, 130)">
    <rect x="0" y="0" width="240" height="130" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>
    <line x1="20" y1="110" x2="220" y2="110" stroke="#374151" stroke-width="1"/>
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#374151">
      <line x1="20" y1="110" x2="20" y2="114" stroke="#374151"/>
      <text x="20" y="126" text-anchor="middle">0</text>
      <line x1="70" y1="110" x2="70" y2="114" stroke="#374151"/>
      <text x="70" y="126" text-anchor="middle">.25</text>
      <line x1="120" y1="110" x2="120" y2="114" stroke="#374151"/>
      <text x="120" y="126" text-anchor="middle">.50</text>
      <line x1="170" y1="110" x2="170" y2="114" stroke="#374151"/>
      <text x="170" y="126" text-anchor="middle">.75</text>
      <line x1="220" y1="110" x2="220" y2="114" stroke="#374151"/>
      <text x="220" y="126" text-anchor="middle">1</text>
    </g>
    <!-- subclonal CCF=0.4: VAF=0.10 → x=40 -->
    <g>
      <rect x="36" y="80" width="4" height="30" fill="#525252"/>
      <rect x="40" y="56" width="4" height="54" fill="#525252"/>
      <rect x="44" y="62" width="4" height="48" fill="#525252"/>
      <rect x="48" y="76" width="4" height="34" fill="#525252"/>
    </g>
    <!-- clonal CCF=1: VAF=0.25 → x=70 -->
    <g>
      <rect x="62" y="74" width="4" height="36" fill="#1e3a8a"/>
      <rect x="66" y="48" width="4" height="62" fill="#1e3a8a"/>
      <rect x="70" y="28" width="4" height="82" fill="#1e3a8a"/>
      <rect x="74" y="46" width="4" height="64" fill="#1e3a8a"/>
      <rect x="78" y="70" width="4" height="40" fill="#1e3a8a"/>
    </g>
    <line x1="72" y1="26" x2="72" y2="14" stroke="#1e3a8a" stroke-width="0.75"/>
    <text x="72" y="10" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a" text-anchor="middle">clonal</text>
  </g>

  <!-- ====================== Diploid CN=2, purity 80% ====================== -->
  <g transform="translate(800, 130)">
    <rect x="0" y="0" width="240" height="130" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>
    <line x1="20" y1="110" x2="220" y2="110" stroke="#374151" stroke-width="1"/>
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#374151">
      <line x1="20" y1="110" x2="20" y2="114" stroke="#374151"/>
      <text x="20" y="126" text-anchor="middle">0</text>
      <line x1="70" y1="110" x2="70" y2="114" stroke="#374151"/>
      <text x="70" y="126" text-anchor="middle">.25</text>
      <line x1="120" y1="110" x2="120" y2="114" stroke="#374151"/>
      <text x="120" y="126" text-anchor="middle">.50</text>
      <line x1="170" y1="110" x2="170" y2="114" stroke="#374151"/>
      <text x="170" y="126" text-anchor="middle">.75</text>
      <line x1="220" y1="110" x2="220" y2="114" stroke="#374151"/>
      <text x="220" y="126" text-anchor="middle">1</text>
    </g>
    <!-- subclonal CCF=0.4: VAF=0.16 → x=52 -->
    <g>
      <rect x="48" y="76" width="4" height="34" fill="#525252"/>
      <rect x="52" y="54" width="4" height="56" fill="#525252"/>
      <rect x="56" y="62" width="4" height="48" fill="#525252"/>
      <rect x="60" y="78" width="4" height="32" fill="#525252"/>
    </g>
    <!-- clonal CCF=1: VAF=0.40 → x=100 -->
    <g>
      <rect x="92"  y="68" width="4" height="42" fill="#1e3a8a"/>
      <rect x="96"  y="40" width="4" height="70" fill="#1e3a8a"/>
      <rect x="100" y="20" width="4" height="90" fill="#1e3a8a"/>
      <rect x="104" y="38" width="4" height="72" fill="#1e3a8a"/>
      <rect x="108" y="66" width="4" height="44" fill="#1e3a8a"/>
    </g>
    <line x1="102" y1="18" x2="102" y2="6" stroke="#1e3a8a" stroke-width="0.75"/>
    <text x="102" y="2" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a" text-anchor="middle">clonal</text>
  </g>

  <!-- ====================== CN=3 row, purity 20% ====================== -->
  <g transform="translate(160, 320)">
    <rect x="0" y="0" width="240" height="130" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>
    <line x1="20" y1="110" x2="220" y2="110" stroke="#374151" stroke-width="1"/>
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#374151">
      <line x1="20" y1="110" x2="20" y2="114" stroke="#374151"/>
      <text x="20" y="126" text-anchor="middle">0</text>
      <line x1="70" y1="110" x2="70" y2="114" stroke="#374151"/>
      <text x="70" y="126" text-anchor="middle">.25</text>
      <line x1="120" y1="110" x2="120" y2="114" stroke="#374151"/>
      <text x="120" y="126" text-anchor="middle">.50</text>
      <line x1="170" y1="110" x2="170" y2="114" stroke="#374151"/>
      <text x="170" y="126" text-anchor="middle">.75</text>
      <line x1="220" y1="110" x2="220" y2="114" stroke="#374151"/>
      <text x="220" y="126" text-anchor="middle">1</text>
    </g>
    <!-- with CN=3 and mutation on 2 of 3 copies, clonal VAF shifts. purity 0.2: vaf ~ 0.08 -->
    <g>
      <rect x="20" y="80" width="4" height="30" fill="#525252"/>
      <rect x="24" y="62" width="4" height="48" fill="#525252"/>
      <rect x="28" y="74" width="4" height="36" fill="#525252"/>
    </g>
    <g>
      <rect x="30" y="66" width="4" height="44" fill="#1e3a8a"/>
      <rect x="34" y="44" width="4" height="66" fill="#1e3a8a"/>
      <rect x="38" y="50" width="4" height="60" fill="#1e3a8a"/>
      <rect x="42" y="70" width="4" height="40" fill="#1e3a8a"/>
    </g>
    <text x="36" y="30" font-family="Inter, sans-serif" font-size="9" fill="#374151" text-anchor="middle">2 copies / 3</text>
  </g>

  <!-- CN=3 purity 50% -->
  <g transform="translate(480, 320)">
    <rect x="0" y="0" width="240" height="130" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>
    <line x1="20" y1="110" x2="220" y2="110" stroke="#374151" stroke-width="1"/>
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#374151">
      <line x1="20" y1="110" x2="20" y2="114" stroke="#374151"/>
      <text x="20" y="126" text-anchor="middle">0</text>
      <line x1="70" y1="110" x2="70" y2="114" stroke="#374151"/>
      <text x="70" y="126" text-anchor="middle">.25</text>
      <line x1="120" y1="110" x2="120" y2="114" stroke="#374151"/>
      <text x="120" y="126" text-anchor="middle">.50</text>
      <line x1="170" y1="110" x2="170" y2="114" stroke="#374151"/>
      <text x="170" y="126" text-anchor="middle">.75</text>
      <line x1="220" y1="110" x2="220" y2="114" stroke="#374151"/>
      <text x="220" y="126" text-anchor="middle">1</text>
    </g>
    <!-- vaf approx purity*2/(purity*3+(1-purity)*2) for 2 mutant copies on 3. p=.5: 1/(1.5+1)=0.4 → x=100 -->
    <g>
      <rect x="36" y="80" width="4" height="30" fill="#525252"/>
      <rect x="40" y="58" width="4" height="52" fill="#525252"/>
      <rect x="44" y="74" width="4" height="36" fill="#525252"/>
    </g>
    <g>
      <rect x="92"  y="74" width="4" height="36" fill="#1e3a8a"/>
      <rect x="96"  y="48" width="4" height="62" fill="#1e3a8a"/>
      <rect x="100" y="30" width="4" height="80" fill="#1e3a8a"/>
      <rect x="104" y="50" width="4" height="60" fill="#1e3a8a"/>
      <rect x="108" y="74" width="4" height="36" fill="#1e3a8a"/>
    </g>
    <text x="100" y="22" font-family="Inter, sans-serif" font-size="9" fill="#374151" text-anchor="middle">2 copies / 3</text>
  </g>

  <!-- CN=3 purity 80% -->
  <g transform="translate(800, 320)">
    <rect x="0" y="0" width="240" height="130" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>
    <line x1="20" y1="110" x2="220" y2="110" stroke="#374151" stroke-width="1"/>
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#374151">
      <line x1="20" y1="110" x2="20" y2="114" stroke="#374151"/>
      <text x="20" y="126" text-anchor="middle">0</text>
      <line x1="70" y1="110" x2="70" y2="114" stroke="#374151"/>
      <text x="70" y="126" text-anchor="middle">.25</text>
      <line x1="120" y1="110" x2="120" y2="114" stroke="#374151"/>
      <text x="120" y="126" text-anchor="middle">.50</text>
      <line x1="170" y1="110" x2="170" y2="114" stroke="#374151"/>
      <text x="170" y="126" text-anchor="middle">.75</text>
      <line x1="220" y1="110" x2="220" y2="114" stroke="#374151"/>
      <text x="220" y="126" text-anchor="middle">1</text>
    </g>
    <!-- vaf  p=.8: 1.6/(2.4+0.4)=0.57 → x=134 -->
    <g>
      <rect x="48" y="78" width="4" height="32" fill="#525252"/>
      <rect x="52" y="54" width="4" height="56" fill="#525252"/>
      <rect x="56" y="74" width="4" height="36" fill="#525252"/>
    </g>
    <g>
      <rect x="124" y="70" width="4" height="40" fill="#1e3a8a"/>
      <rect x="128" y="42" width="4" height="68" fill="#1e3a8a"/>
      <rect x="132" y="22" width="4" height="88" fill="#1e3a8a"/>
      <rect x="136" y="46" width="4" height="64" fill="#1e3a8a"/>
      <rect x="140" y="74" width="4" height="36" fill="#1e3a8a"/>
    </g>
    <text x="134" y="14" font-family="Inter, sans-serif" font-size="9" fill="#374151" text-anchor="middle">2 copies / 3</text>
  </g>

  <!-- axis annotation for all panels -->
  <text x="600" y="475" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic" text-anchor="middle">x-axis: variant allele fraction (VAF)</text>

  <!-- legend -->
  <g transform="translate(60, 495)">
    <rect x="0" y="0" width="14" height="10" fill="#1e3a8a"/>
    <text x="20" y="9" font-family="Inter, sans-serif" font-size="10" fill="#374151">clonal variants (CCF = 1)</text>
    <rect x="220" y="0" width="14" height="10" fill="#525252"/>
    <text x="240" y="9" font-family="Inter, sans-serif" font-size="10" fill="#374151">subclonal variants (CCF = 0.4)</text>
  </g>

  <!-- callout -->
  <g transform="translate(580, 495)">
    <text x="0" y="9" font-family="Inter, sans-serif" font-size="10" fill="#7c3aed" font-style="italic">Same subclone, six different VAF observations — purity and CN must be solved for first.</text>
  </g>
</svg>
