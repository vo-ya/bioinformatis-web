<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" role="img" aria-labelledby="t d">
  <title id="t">From sequencer to tumour board: the precision-oncology integration flow</title>
  <desc id="d">A left-to-right flow diagram with five stages. Stage 1: a biopsy plus blood draw. Stage 2: an FFPE tumour-normal sequencing library and a ctDNA library producing FASTQ files. Stage 3: the bioinformatics pipeline producing a somatic VCF, fusion calls, copy-number tracks, and TMB/MSI/HRD biomarkers. Stage 4: a variant scientist applies AMP/ASCO/CAP and produces a tiered clinical report. Stage 5: a molecular tumour board with oncologist, pathologist, variant scientist, researcher, and clinical-trial-unit representative deciding therapy. Arrows show the directed flow; a feedback loop returns longitudinal ctDNA from therapy back to monitoring.</desc>

  <defs>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
    <marker id="arrow-violet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="540" fill="#fafaf9"/>

  <!-- header -->
  <text x="60" y="36" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">FROM SEQUENCER TO TUMOUR BOARD</text>
  <text x="60" y="56" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Five stages, one therapy decision. The pipeline feeds one input into a multi-disciplinary venue.</text>

  <!-- ===================== STAGE 1: Biopsy ===================== -->
  <g transform="translate(60, 110)">
    <rect x="0" y="0" width="180" height="220" rx="6" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="1"/>
    <text x="90" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em" text-anchor="middle">1 · SAMPLE</text>

    <!-- tumour block icon -->
    <g transform="translate(30, 44)">
      <rect x="0" y="0" width="50" height="40" rx="3" fill="#fafaf9" stroke="#b45309" stroke-width="1.5"/>
      <circle cx="14" cy="14" r="3" fill="#b45309"/>
      <circle cx="28" cy="20" r="4" fill="#b45309"/>
      <circle cx="20" cy="30" r="3" fill="#b45309"/>
      <circle cx="36" cy="32" r="3" fill="#b45309"/>
      <text x="25" y="58" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">FFPE block</text>
      <text x="25" y="71" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">(tumour)</text>
    </g>

    <!-- blood draw icon -->
    <g transform="translate(110, 44)">
      <rect x="6" y="0" width="14" height="40" rx="2" fill="#fafaf9" stroke="#c4342c" stroke-width="1.5"/>
      <rect x="6" y="22" width="14" height="18" fill="#c4342c" opacity="0.7"/>
      <text x="13" y="58" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">plasma</text>
      <text x="13" y="71" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">(ctDNA + normal)</text>
    </g>

    <line x1="20" y1="148" x2="160" y2="148" stroke="#e5e3dc" stroke-width="0.5"/>
    <text x="90" y="166" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#525252" text-anchor="middle">inputs</text>
    <text x="20" y="184" font-family="Inter, sans-serif" font-size="9" fill="#525252">• needle / surgical biopsy</text>
    <text x="20" y="198" font-family="Inter, sans-serif" font-size="9" fill="#525252">• matched peripheral blood</text>
    <text x="20" y="212" font-family="Inter, sans-serif" font-size="9" fill="#525252">• pathology QC, % tumour</text>
  </g>

  <!-- arrow -->
  <line x1="244" y1="220" x2="276" y2="220" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arrow-accent)"/>

  <!-- ===================== STAGE 2: Library + Sequencer ===================== -->
  <g transform="translate(280, 110)">
    <rect x="0" y="0" width="180" height="220" rx="6" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="1"/>
    <text x="90" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em" text-anchor="middle">2 · SEQUENCING</text>

    <!-- panel/library icon -->
    <g transform="translate(20, 44)">
      <rect x="0"  y="0"  width="140" height="8" fill="#1e3a8a"/>
      <rect x="0"  y="14" width="140" height="8" fill="#2563eb"/>
      <rect x="0"  y="28" width="140" height="8" fill="#1e3a8a"/>
      <text x="70" y="54" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">tumour-normal panel</text>
      <text x="70" y="68" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">~500× · 324 genes</text>
    </g>

    <line x1="20" y1="148" x2="160" y2="148" stroke="#e5e3dc" stroke-width="0.5"/>
    <text x="90" y="166" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#525252" text-anchor="middle">outputs</text>
    <text x="20" y="184" font-family="JetBrains Mono, monospace" font-size="9" fill="#374151">tumour.R1.fastq.gz</text>
    <text x="20" y="198" font-family="JetBrains Mono, monospace" font-size="9" fill="#374151">tumour.R2.fastq.gz</text>
    <text x="20" y="212" font-family="JetBrains Mono, monospace" font-size="9" fill="#374151">normal.{R1,R2}.fastq.gz</text>
  </g>

  <line x1="464" y1="220" x2="496" y2="220" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arrow-accent)"/>

  <!-- ===================== STAGE 3: Pipeline ===================== -->
  <g transform="translate(500, 110)">
    <rect x="0" y="0" width="200" height="220" rx="6" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="1"/>
    <text x="100" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em" text-anchor="middle">3 · PIPELINE</text>

    <!-- pipeline steps -->
    <g transform="translate(20, 44)">
      <!-- step boxes -->
      <rect x="0" y="0" width="160" height="18" rx="3" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.75"/>
      <text x="8" y="13" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a">BWA-MEM align</text>
      <rect x="0" y="22" width="160" height="18" rx="3" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.75"/>
      <text x="8" y="35" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a">Mutect2 · Strelka2</text>
      <rect x="0" y="44" width="160" height="18" rx="3" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.75"/>
      <text x="8" y="57" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a">Manta / GRIDSS · Arriba</text>
      <rect x="0" y="66" width="160" height="18" rx="3" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.75"/>
      <text x="8" y="79" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a">CNVkit · Sequenza</text>
      <rect x="0" y="88" width="160" height="18" rx="3" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.75"/>
      <text x="8" y="101" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a">SigProfiler · TMB · MSI</text>
    </g>

    <line x1="20" y1="170" x2="180" y2="170" stroke="#e5e3dc" stroke-width="0.5"/>
    <text x="100" y="186" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#525252" text-anchor="middle">outputs</text>
    <text x="20" y="202" font-family="JetBrains Mono, monospace" font-size="9" fill="#374151">somatic.vcf · fusions.tsv</text>
    <text x="20" y="214" font-family="JetBrains Mono, monospace" font-size="9" fill="#374151">cnv.bed · TMB/MSI/HRD</text>
  </g>

  <line x1="704" y1="220" x2="736" y2="220" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arrow-accent)"/>

  <!-- ===================== STAGE 4: Variant scientist + report ===================== -->
  <g transform="translate(740, 110)">
    <rect x="0" y="0" width="180" height="220" rx="6" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="1"/>
    <text x="90" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em" text-anchor="middle">4 · INTERPRETATION</text>

    <!-- AMP/ASCO/CAP -->
    <g transform="translate(20, 44)">
      <rect x="0" y="0"  width="140" height="14" rx="2" fill="#065f46"/>
      <text x="70" y="11" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#fafaf9" text-anchor="middle">TIER I — FDA drug</text>
      <rect x="0" y="18" width="140" height="14" rx="2" fill="#b45309"/>
      <text x="70" y="29" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#fafaf9" text-anchor="middle">TIER II — trial / off-label</text>
      <rect x="0" y="36" width="140" height="14" rx="2" fill="#525252"/>
      <text x="70" y="47" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#fafaf9" text-anchor="middle">TIER III — unknown</text>
      <rect x="0" y="54" width="140" height="14" rx="2" fill="#8a8a85"/>
      <text x="70" y="65" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#fafaf9" text-anchor="middle">TIER IV — benign</text>

      <text x="70" y="86" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252" text-anchor="middle">AMP / ASCO / CAP (2017)</text>
    </g>

    <line x1="20" y1="148" x2="160" y2="148" stroke="#e5e3dc" stroke-width="0.5"/>
    <text x="90" y="166" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#525252" text-anchor="middle">clinical report</text>
    <text x="20" y="184" font-family="Inter, sans-serif" font-size="9" fill="#374151">+ OncoKB / CIViC</text>
    <text x="20" y="198" font-family="Inter, sans-serif" font-size="9" fill="#374151">+ NCCN guideline cite</text>
    <text x="20" y="212" font-family="Inter, sans-serif" font-size="9" fill="#374151">+ trial-match list</text>
  </g>

  <line x1="924" y1="220" x2="956" y2="220" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arrow-accent)"/>

  <!-- ===================== STAGE 5: Tumour board ===================== -->
  <g transform="translate(960, 110)">
    <rect x="0" y="0" width="180" height="220" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="90" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em" text-anchor="middle">5 · TUMOUR BOARD</text>

    <!-- people icons -->
    <g transform="translate(18, 44)">
      <!-- 5 small heads in a circle -->
      <circle cx="20" cy="20" r="10" fill="#1e3a8a"/>
      <text x="20" y="46" font-family="Inter, sans-serif" font-size="8" fill="#374151" text-anchor="middle">oncologist</text>

      <circle cx="60" cy="20" r="10" fill="#7c3aed"/>
      <text x="60" y="46" font-family="Inter, sans-serif" font-size="8" fill="#374151" text-anchor="middle">pathologist</text>

      <circle cx="100" cy="20" r="10" fill="#065f46"/>
      <text x="100" y="46" font-family="Inter, sans-serif" font-size="8" fill="#374151" text-anchor="middle">variant sci.</text>

      <circle cx="120" cy="58" r="10" fill="#b45309"/>
      <text x="120" y="84" font-family="Inter, sans-serif" font-size="8" fill="#374151" text-anchor="middle">researcher</text>

      <circle cx="40" cy="58" r="10" fill="#c4342c"/>
      <text x="40" y="84" font-family="Inter, sans-serif" font-size="8" fill="#374151" text-anchor="middle">trials unit</text>
    </g>

    <line x1="20" y1="148" x2="160" y2="148" stroke="#1e3a8a" stroke-width="0.5"/>
    <text x="90" y="166" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#1e3a8a" text-anchor="middle">DECISION</text>
    <text x="20" y="184" font-family="Inter, sans-serif" font-size="9" fill="#374151">→ targeted therapy</text>
    <text x="20" y="198" font-family="Inter, sans-serif" font-size="9" fill="#374151">→ immunotherapy</text>
    <text x="20" y="212" font-family="Inter, sans-serif" font-size="9" fill="#374151">→ trial enrolment / chemo</text>
  </g>

  <!-- ===================== Feedback loop ===================== -->
  <g>
    <!-- arrow from stage 5 bottom curving back to stage 2 (or 3) -->
    <path d="M 1050 340 Q 1050 430 800 430 Q 380 430 380 340" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-violet)"/>
    <text x="715" y="424" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#7c3aed" text-anchor="middle">longitudinal ctDNA monitoring → resistance subclone detection → switch therapy</text>
  </g>

  <!-- footer cross-refs -->
  <line x1="60" y1="478" x2="1140" y2="478" stroke="#e5e3dc" stroke-width="0.5"/>
  <text x="60" y="498" font-family="Inter, sans-serif" font-size="10" fill="#525252">Chapter references:</text>
  <text x="60" y="514" font-family="Inter, sans-serif" font-size="10" fill="#525252">Stage 2 → Ch 1; Stage 3 → Ch 2, 4, 5, 11; Stage 4 → Ch 14, 17; Stage 5 → §1.7 of this chapter.</text>
</svg>
