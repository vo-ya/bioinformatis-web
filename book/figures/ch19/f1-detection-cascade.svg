<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="t d">
  <title id="t">BLAST as a Neyman-Pearson two-stage detector cascade</title>
  <desc id="d">A schematic of BLAST viewed as a detection-theoretic cascade. The query and database stream into a coarse matched filter implemented as k-mer hashing. Seed hits that survive feed into a fine matched filter implemented as ungapped X-drop extension under the substitution matrix. HSPs that survive feed into the bit-score thresholding stage, which is a likelihood ratio decision. The final E-value applies a Bonferroni-style multiple-testing correction over the database size N. Each stage is annotated with the operation count and the survivor count for a representative query against a database of 10 to the 11 residues.</desc>

  <rect x="0" y="0" width="1200" height="600" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="40" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">BLAST AS A NEYMAN-PEARSON DETECTOR CASCADE</text>
  <text x="60" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Two matched filters in series, plus a likelihood-ratio threshold, plus a multiple-testing correction over the database.</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrow-accent-d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <!-- Input on left: Query + Database -->
  <g transform="translate(60, 110)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.06em">INPUT</text>
    <rect x="0" y="14" width="160" height="60" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5" rx="3"/>
    <text x="80" y="34" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" text-anchor="middle">Query sequence</text>
    <text x="80" y="50" font-family="JetBrains Mono, monospace" font-size="9" fill="#374151" text-anchor="middle">m = 300 residues</text>
    <text x="80" y="64" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252" text-anchor="middle">one observation</text>

    <rect x="0" y="100" width="160" height="60" fill="#f4f3ee" stroke="#374151" stroke-width="1.5" rx="3"/>
    <text x="80" y="120" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151" text-anchor="middle">Database</text>
    <text x="80" y="136" font-family="JetBrains Mono, monospace" font-size="9" fill="#374151" text-anchor="middle">N = 10^11 residues</text>
    <text x="80" y="150" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252" text-anchor="middle">noise + hidden signal</text>
  </g>

  <!-- Arrow to Stage 1 -->
  <line x1="220" y1="200" x2="280" y2="200" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arrow-accent-d)"/>

  <!-- Stage 1: coarse matched filter (k-mer hash) -->
  <g transform="translate(290, 110)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.06em">STAGE 1 — COARSE FILTER</text>
    <rect x="0" y="14" width="200" height="140" fill="#ffffff" stroke="#1e3a8a" stroke-width="2" rx="4"/>
    <text x="100" y="38" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a" text-anchor="middle">k-mer hash scan</text>
    <text x="100" y="56" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">+ neighbourhood at T</text>

    <line x1="20" y1="68" x2="180" y2="68" stroke="#e5e3dc"/>
    <text x="100" y="86" font-family="Inter, sans-serif" font-size="10" fill="#374151" text-anchor="middle">cheap O(1) lookups</text>
    <text x="100" y="100" font-family="Inter, sans-serif" font-size="10" fill="#374151" text-anchor="middle">per query k-mer</text>

    <line x1="20" y1="112" x2="180" y2="112" stroke="#e5e3dc"/>
    <text x="100" y="132" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309" text-anchor="middle">~10^5 seed hits</text>
    <text x="100" y="146" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252" text-anchor="middle">high false-positive rate</text>
  </g>

  <!-- Arrow Stage 1 to Stage 2 -->
  <line x1="500" y1="200" x2="560" y2="200" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arrow-accent-d)"/>
  <text x="530" y="190" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">two-hit</text>
  <text x="530" y="218" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">gate (A)</text>

  <!-- Stage 2: fine matched filter (X-drop) -->
  <g transform="translate(570, 110)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.06em">STAGE 2 — FINE FILTER</text>
    <rect x="0" y="14" width="200" height="140" fill="#ffffff" stroke="#1e3a8a" stroke-width="2" rx="4"/>
    <text x="100" y="38" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a" text-anchor="middle">X-drop extension</text>
    <text x="100" y="56" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">under substitution matrix</text>

    <line x1="20" y1="68" x2="180" y2="68" stroke="#e5e3dc"/>
    <text x="100" y="86" font-family="Inter, sans-serif" font-size="10" fill="#374151" text-anchor="middle">substitution-aware</text>
    <text x="100" y="100" font-family="Inter, sans-serif" font-size="10" fill="#374151" text-anchor="middle">linear in HSP length</text>

    <line x1="20" y1="112" x2="180" y2="112" stroke="#e5e3dc"/>
    <text x="100" y="132" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309" text-anchor="middle">~10^2 HSPs</text>
    <text x="100" y="146" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252" text-anchor="middle">most spurious removed</text>
  </g>

  <!-- Arrow Stage 2 to Stage 3 -->
  <line x1="780" y1="200" x2="840" y2="200" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arrow-accent-d)"/>
  <text x="810" y="190" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">banded</text>
  <text x="810" y="218" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">Smith-Waterman</text>

  <!-- Stage 3: likelihood-ratio threshold + E-value -->
  <g transform="translate(850, 110)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#065f46" letter-spacing="0.06em">STAGE 3 — DECISION</text>
    <rect x="0" y="14" width="290" height="140" fill="#ffffff" stroke="#065f46" stroke-width="2" rx="4"/>
    <text x="145" y="38" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#065f46" text-anchor="middle">Bit score &amp; E-value</text>
    <text x="145" y="56" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">likelihood ratio + Bonferroni</text>

    <line x1="20" y1="68" x2="270" y2="68" stroke="#e5e3dc"/>
    <text x="145" y="86" font-family="JetBrains Mono, monospace" font-size="11" fill="#374151" text-anchor="middle">S' = (lambda S - log K) / log 2</text>
    <text x="145" y="104" font-family="JetBrains Mono, monospace" font-size="11" fill="#374151" text-anchor="middle">E = m n 2^(-S')</text>

    <line x1="20" y1="112" x2="270" y2="112" stroke="#e5e3dc"/>
    <text x="145" y="132" font-family="JetBrains Mono, monospace" font-size="9" fill="#065f46" text-anchor="middle">~10 significant hits</text>
    <text x="145" y="146" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252" text-anchor="middle">calibrated false-discovery rate</text>
  </g>

  <!-- Lower band: EE-side translation -->
  <line x1="60" y1="320" x2="1140" y2="320" stroke="#374151" stroke-width="0.5"/>
  <text x="60" y="346" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">DETECTION-THEORETIC TRANSLATION</text>

  <g transform="translate(60, 366)">
    <!-- column 1 -->
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">Stage 1 = coarse matched filter</text>
    <text x="0" y="16" font-family="Inter, sans-serif" font-size="9" fill="#525252">k-mer hash scoring against</text>
    <text x="0" y="28" font-family="Inter, sans-serif" font-size="9" fill="#525252">every database k-mer.</text>
    <text x="0" y="44" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#374151">High sensitivity, low</text>
    <text x="0" y="56" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#374151">specificity — by design.</text>

    <!-- column 2 -->
    <text x="280" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">Stage 2 = fine matched filter</text>
    <text x="280" y="16" font-family="Inter, sans-serif" font-size="9" fill="#525252">Full substitution-matrix score</text>
    <text x="280" y="28" font-family="Inter, sans-serif" font-size="9" fill="#525252">with X-drop stopping rule.</text>
    <text x="280" y="44" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#374151">Higher specificity at a</text>
    <text x="280" y="56" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#374151">manageable extension cost.</text>

    <!-- column 3 -->
    <text x="560" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#065f46">Stage 3 = LRT + Bonferroni</text>
    <text x="560" y="16" font-family="Inter, sans-serif" font-size="9" fill="#525252">Bit score is the log-LR test</text>
    <text x="560" y="28" font-family="Inter, sans-serif" font-size="9" fill="#525252">statistic; E-value corrects</text>
    <text x="560" y="44" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#374151">for N independent looks</text>
    <text x="560" y="56" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#374151">at the random null.</text>

    <!-- column 4 -->
    <text x="840" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b45309">Trade-off</text>
    <text x="840" y="16" font-family="Inter, sans-serif" font-size="9" fill="#525252">Each filter tightens specificity</text>
    <text x="840" y="28" font-family="Inter, sans-serif" font-size="9" fill="#525252">at higher cost; cheap stages</text>
    <text x="840" y="44" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#374151">run on everything, expensive</text>
    <text x="840" y="56" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#374151">stages run on survivors only.</text>
  </g>

  <!-- Bottom: null distribution & threshold sketch -->
  <g transform="translate(60, 470)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">THE NULL AND THE THRESHOLD</text>

    <g transform="translate(0, 20)">
      <!-- axis -->
      <line x1="0" y1="60" x2="500" y2="60" stroke="#374151" stroke-width="1"/>
      <line x1="0" y1="60" x2="0" y2="0" stroke="#374151" stroke-width="1"/>
      <text x="250" y="80" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">bit score S'</text>
      <text x="-8" y="58" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="end">P(S')</text>

      <!-- Gumbel-shape -->
      <path d="M 0 60 L 40 56 L 80 30 L 120 14 L 160 24 L 200 40 L 240 50 L 280 55 L 320 58 L 360 59 L 400 59.5 L 440 59.8 L 500 60"
            fill="none" stroke="#525252" stroke-width="1.5"/>
      <!-- tail shading -->
      <path d="M 280 60 L 280 55 L 320 58 L 360 59 L 400 59.5 L 440 59.8 L 500 60 Z"
            fill="#dc2626" opacity="0.18"/>

      <!-- Threshold -->
      <line x1="280" y1="0" x2="280" y2="60" stroke="#1e3a8a" stroke-width="1.5" stroke-dasharray="4 3"/>
      <text x="280" y="-4" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#1e3a8a" text-anchor="middle">S'_threshold</text>
    </g>

    <!-- legend / notes on right -->
    <g transform="translate(560, 20)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">Gumbel (extreme-value) tail</text>
      <text x="0" y="16" font-family="Inter, sans-serif" font-size="9" fill="#525252">Random-database max-HSP scores follow</text>
      <text x="0" y="28" font-family="Inter, sans-serif" font-size="9" fill="#525252">an extreme-value distribution with tail ~ exp(-lambda S).</text>

      <text x="0" y="54" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#dc2626">Shaded area = false-positive mass</text>
      <text x="0" y="70" font-family="Inter, sans-serif" font-size="9" fill="#525252">P-value of a single random-database HSP at S' or above.</text>

      <text x="0" y="96" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">E-value = N x P-value</text>
      <text x="0" y="112" font-family="Inter, sans-serif" font-size="9" fill="#525252">Multiplying by N applies the Bonferroni-flavoured</text>
      <text x="0" y="124" font-family="Inter, sans-serif" font-size="9" fill="#525252">correction for many independent looks at the null.</text>
    </g>
  </g>
</svg>
