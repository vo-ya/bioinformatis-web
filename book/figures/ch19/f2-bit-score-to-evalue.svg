<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-labelledby="t d">
  <title id="t">Bit score to E-value reference card at three database sizes</title>
  <desc id="d">A reference card mapping bit score to E-value at three canonical database sizes: SwissProt at two times ten to the eight residues, UniRef90 at one times ten to the eleven residues, and NCBI nr at three times ten to the eleven residues. The query length is fixed at one hundred residues. Bit scores from twenty to ninety in steps of ten are shown with their corresponding E-values. A side legend explains the formula E equals m times n times two to the minus S prime, the significance thresholds at ten to the minus three, ten to the minus ten, and ten to the minus fifty, and how to read the table.</desc>

  <rect x="0" y="0" width="1200" height="660" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="40" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">BIT SCORE TO E-VALUE — REFERENCE CARD</text>
  <text x="60" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Query length m = 100 aa.  E = m n 2^(-S').  Database size N varies; same alignment, three statistical interpretations.</text>

  <!-- Table outline -->
  <g transform="translate(60, 100)">
    <!-- Column headers -->
    <rect x="0" y="0" width="700" height="40" fill="#1e3a8a"/>
    <text x="80" y="26" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#fafaf9" text-anchor="middle">Bit score S'</text>
    <text x="240" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#fafaf9" text-anchor="middle">SwissProt</text>
    <text x="240" y="34" font-family="JetBrains Mono, monospace" font-size="9" fill="#dbeafe" text-anchor="middle">N = 2x10^8</text>
    <text x="400" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#fafaf9" text-anchor="middle">UniRef90</text>
    <text x="400" y="34" font-family="JetBrains Mono, monospace" font-size="9" fill="#dbeafe" text-anchor="middle">N = 1x10^11</text>
    <text x="560" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#fafaf9" text-anchor="middle">NCBI nr</text>
    <text x="560" y="34" font-family="JetBrains Mono, monospace" font-size="9" fill="#dbeafe" text-anchor="middle">N = 3x10^11</text>
    <text x="650" y="26" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#fafaf9" text-anchor="middle">verdict</text>

    <!-- row template helper: y starting at 60 step 50 -->

    <!-- Row 20 -->
    <rect x="0" y="40" width="700" height="50" fill="#fafaf9" stroke="#e5e3dc" stroke-width="0.5"/>
    <text x="80" y="70" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#374151" text-anchor="middle">20</text>
    <text x="240" y="70" font-family="JetBrains Mono, monospace" font-size="11" fill="#525252" text-anchor="middle">2x10^4</text>
    <text x="400" y="70" font-family="JetBrains Mono, monospace" font-size="11" fill="#525252" text-anchor="middle">1x10^7</text>
    <text x="560" y="70" font-family="JetBrains Mono, monospace" font-size="11" fill="#525252" text-anchor="middle">3x10^7</text>
    <text x="650" y="72" font-family="Inter, sans-serif" font-size="10" fill="#dc2626" text-anchor="middle">noise</text>

    <!-- Row 30 -->
    <rect x="0" y="90" width="700" height="50" fill="#ffffff" stroke="#e5e3dc" stroke-width="0.5"/>
    <text x="80" y="120" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#374151" text-anchor="middle">30</text>
    <text x="240" y="120" font-family="JetBrains Mono, monospace" font-size="11" fill="#525252" text-anchor="middle">20</text>
    <text x="400" y="120" font-family="JetBrains Mono, monospace" font-size="11" fill="#525252" text-anchor="middle">1x10^4</text>
    <text x="560" y="120" font-family="JetBrains Mono, monospace" font-size="11" fill="#525252" text-anchor="middle">3x10^4</text>
    <text x="650" y="122" font-family="Inter, sans-serif" font-size="10" fill="#dc2626" text-anchor="middle">noise</text>

    <!-- Row 40 -->
    <rect x="0" y="140" width="700" height="50" fill="#fafaf9" stroke="#e5e3dc" stroke-width="0.5"/>
    <text x="80" y="170" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#374151" text-anchor="middle">40</text>
    <text x="240" y="170" font-family="JetBrains Mono, monospace" font-size="11" fill="#525252" text-anchor="middle">2x10^-2</text>
    <text x="400" y="170" font-family="JetBrains Mono, monospace" font-size="11" fill="#525252" text-anchor="middle">9</text>
    <text x="560" y="170" font-family="JetBrains Mono, monospace" font-size="11" fill="#525252" text-anchor="middle">30</text>
    <text x="650" y="172" font-family="Inter, sans-serif" font-size="10" fill="#b45309" text-anchor="middle">borderline</text>

    <!-- Row 50 -->
    <rect x="0" y="190" width="700" height="50" fill="#ffffff" stroke="#e5e3dc" stroke-width="0.5"/>
    <text x="80" y="220" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#374151" text-anchor="middle">50</text>
    <text x="240" y="220" font-family="JetBrains Mono, monospace" font-size="11" fill="#525252" text-anchor="middle">2x10^-5</text>
    <text x="400" y="220" font-family="JetBrains Mono, monospace" font-size="11" fill="#525252" text-anchor="middle">9x10^-3</text>
    <text x="560" y="220" font-family="JetBrains Mono, monospace" font-size="11" fill="#525252" text-anchor="middle">3x10^-2</text>
    <text x="650" y="222" font-family="Inter, sans-serif" font-size="10" fill="#b45309" text-anchor="middle">borderline</text>

    <!-- Row 60 -->
    <rect x="0" y="240" width="700" height="50" fill="#fafaf9" stroke="#e5e3dc" stroke-width="0.5"/>
    <text x="80" y="270" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#374151" text-anchor="middle">60</text>
    <text x="240" y="270" font-family="JetBrains Mono, monospace" font-size="11" fill="#065f46" text-anchor="middle">2x10^-8</text>
    <text x="400" y="270" font-family="JetBrains Mono, monospace" font-size="11" fill="#065f46" text-anchor="middle">9x10^-6</text>
    <text x="560" y="270" font-family="JetBrains Mono, monospace" font-size="11" fill="#065f46" text-anchor="middle">3x10^-5</text>
    <text x="650" y="272" font-family="Inter, sans-serif" font-size="10" fill="#065f46" text-anchor="middle">significant</text>

    <!-- Row 70 -->
    <rect x="0" y="290" width="700" height="50" fill="#ffffff" stroke="#e5e3dc" stroke-width="0.5"/>
    <text x="80" y="320" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#374151" text-anchor="middle">70</text>
    <text x="240" y="320" font-family="JetBrains Mono, monospace" font-size="11" fill="#065f46" text-anchor="middle">2x10^-11</text>
    <text x="400" y="320" font-family="JetBrains Mono, monospace" font-size="11" fill="#065f46" text-anchor="middle">9x10^-9</text>
    <text x="560" y="320" font-family="JetBrains Mono, monospace" font-size="11" fill="#065f46" text-anchor="middle">3x10^-8</text>
    <text x="650" y="322" font-family="Inter, sans-serif" font-size="10" fill="#065f46" text-anchor="middle">strong</text>

    <!-- Row 80 -->
    <rect x="0" y="340" width="700" height="50" fill="#fafaf9" stroke="#e5e3dc" stroke-width="0.5"/>
    <text x="80" y="370" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#374151" text-anchor="middle">80</text>
    <text x="240" y="370" font-family="JetBrains Mono, monospace" font-size="11" fill="#065f46" text-anchor="middle">2x10^-14</text>
    <text x="400" y="370" font-family="JetBrains Mono, monospace" font-size="11" fill="#065f46" text-anchor="middle">9x10^-12</text>
    <text x="560" y="370" font-family="JetBrains Mono, monospace" font-size="11" fill="#065f46" text-anchor="middle">3x10^-11</text>
    <text x="650" y="372" font-family="Inter, sans-serif" font-size="10" fill="#065f46" text-anchor="middle">strong</text>

    <!-- Row 90 -->
    <rect x="0" y="390" width="700" height="50" fill="#ffffff" stroke="#e5e3dc" stroke-width="0.5"/>
    <text x="80" y="420" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#374151" text-anchor="middle">90</text>
    <text x="240" y="420" font-family="JetBrains Mono, monospace" font-size="11" fill="#065f46" text-anchor="middle">2x10^-17</text>
    <text x="400" y="420" font-family="JetBrains Mono, monospace" font-size="11" fill="#065f46" text-anchor="middle">9x10^-15</text>
    <text x="560" y="420" font-family="JetBrains Mono, monospace" font-size="11" fill="#065f46" text-anchor="middle">3x10^-14</text>
    <text x="650" y="422" font-family="Inter, sans-serif" font-size="10" fill="#065f46" text-anchor="middle">strong</text>

    <!-- divider lines for columns -->
    <line x1="160" y1="40" x2="160" y2="440" stroke="#e5e3dc"/>
    <line x1="320" y1="40" x2="320" y2="440" stroke="#e5e3dc"/>
    <line x1="480" y1="40" x2="480" y2="440" stroke="#e5e3dc"/>
    <line x1="600" y1="40" x2="600" y2="440" stroke="#e5e3dc"/>
  </g>

  <!-- Right side: notes -->
  <g transform="translate(800, 100)">
    <rect x="0" y="0" width="340" height="440" fill="#ffffff" stroke="#e5e3dc" stroke-width="1" rx="3"/>

    <text x="20" y="28" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">HOW TO READ THE TABLE</text>
    <line x1="20" y1="36" x2="320" y2="36" stroke="#1e3a8a" stroke-width="0.5"/>

    <text x="20" y="56" font-family="Inter, sans-serif" font-size="10" fill="#525252">Look up your bit score in column 1.</text>
    <text x="20" y="72" font-family="Inter, sans-serif" font-size="10" fill="#525252">Pick the database column you searched.</text>
    <text x="20" y="88" font-family="Inter, sans-serif" font-size="10" fill="#525252">Read the E-value at the intersection.</text>

    <text x="20" y="120" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">FORMULA</text>
    <line x1="20" y1="128" x2="320" y2="128" stroke="#1e3a8a" stroke-width="0.5"/>
    <rect x="20" y="138" width="300" height="40" fill="#f4f3ee" stroke="#e5e3dc" rx="2"/>
    <text x="170" y="164" font-family="JetBrains Mono, monospace" font-size="13" fill="#374151" text-anchor="middle">E = m n 2^(-S')</text>

    <text x="20" y="200" font-family="Inter, sans-serif" font-size="10" fill="#525252">Linear in query length m and database</text>
    <text x="20" y="214" font-family="Inter, sans-serif" font-size="10" fill="#525252">size n; exponential in bit score S'.</text>

    <text x="20" y="246" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">SIGNIFICANCE THRESHOLDS</text>
    <line x1="20" y1="254" x2="320" y2="254" stroke="#1e3a8a" stroke-width="0.5"/>

    <g transform="translate(20, 268)">
      <rect x="0" y="0" width="14" height="14" fill="#b45309" opacity="0.3"/>
      <text x="22" y="11" font-family="JetBrains Mono, monospace" font-size="10" fill="#374151">E &lt; 10^-3</text>
      <text x="120" y="11" font-family="Inter, sans-serif" font-size="10" fill="#525252">probably significant</text>
    </g>
    <g transform="translate(20, 292)">
      <rect x="0" y="0" width="14" height="14" fill="#065f46" opacity="0.4"/>
      <text x="22" y="11" font-family="JetBrains Mono, monospace" font-size="10" fill="#374151">E &lt; 10^-10</text>
      <text x="120" y="11" font-family="Inter, sans-serif" font-size="10" fill="#525252">almost certainly homologous</text>
    </g>
    <g transform="translate(20, 316)">
      <rect x="0" y="0" width="14" height="14" fill="#065f46" opacity="0.8"/>
      <text x="22" y="11" font-family="JetBrains Mono, monospace" font-size="10" fill="#374151">E &lt; 10^-50</text>
      <text x="120" y="11" font-family="Inter, sans-serif" font-size="10" fill="#525252">bulletproof; transfer safe</text>
    </g>

    <text x="20" y="358" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#b45309" letter-spacing="0.06em">DATABASE-SIZE EFFECT</text>
    <line x1="20" y1="366" x2="320" y2="366" stroke="#b45309" stroke-width="0.5"/>

    <text x="20" y="386" font-family="Inter, sans-serif" font-size="10" fill="#525252">Same alignment, different statistical</text>
    <text x="20" y="400" font-family="Inter, sans-serif" font-size="10" fill="#525252">interpretation. A bit score of 50</text>
    <text x="20" y="414" font-family="Inter, sans-serif" font-size="10" fill="#525252">is strong against SwissProt and</text>
    <text x="20" y="428" font-family="Inter, sans-serif" font-size="10" fill="#525252">borderline against nr.</text>
  </g>

  <!-- Footer note -->
  <line x1="60" y1="580" x2="1140" y2="580" stroke="#374151" stroke-width="0.5"/>
  <text x="60" y="606" font-family="Inter, sans-serif" font-size="10" fill="#525252">Values rounded to one significant figure.  Database sizes are typical 2024 magnitudes; current sizes can be read off the BLAST output's "Database" line.</text>
  <text x="60" y="624" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">Each additional ten bits drops E-value by a factor of ~1000.  Doubling the database doubles E at any fixed S'.</text>
</svg>
