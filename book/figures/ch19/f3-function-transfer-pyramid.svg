<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="t d">
  <title id="t">Function-transfer confidence tiers by sequence identity</title>
  <desc id="d">A tiered diagram showing how confident protein function transfer is as a function of pairwise sequence identity between query and best BLAST hit. Above eighty percent identity, transfer of specific function, substrate specificity, and partners is essentially safe. Between fifty and eighty percent identity, biochemical function is reliably preserved but quantitative specificity may differ. Between thirty and fifty percent identity, fold and broad enzyme class are preserved but specific substrate may differ. Between twenty and thirty percent identity, only fold is reliable; transfer requires structural or experimental corroboration. Below twenty percent identity, sequence similarity alone is not sufficient. Each tier is annotated with the typical evidence type, recommended workflow, and failure modes.</desc>

  <rect x="0" y="0" width="1200" height="620" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="40" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">FUNCTION TRANSFER — CONFIDENCE TIERS BY PAIRWISE IDENTITY</text>
  <text x="60" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">What you can claim from a single BLAST hit depends on identity, coverage, and which property you are transferring.</text>

  <!-- LEFT: tier pyramid -->
  <g transform="translate(60, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.06em">CONFIDENCE PYRAMID</text>

    <!-- Tier 1: > 80% — green dark -->
    <g transform="translate(0, 24)">
      <rect x="100" y="0" width="320" height="50" fill="#065f46" opacity="0.85"/>
      <text x="260" y="22" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#fafaf9" text-anchor="middle">&gt; 80% identity</text>
      <text x="260" y="38" font-family="Inter, sans-serif" font-size="10" fill="#dcfce7" text-anchor="middle">close ortholog / paralog</text>
      <text x="80" y="30" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="end">Tier 1</text>
    </g>

    <!-- Tier 2: 50-80% — green med -->
    <g transform="translate(0, 84)">
      <rect x="60" y="0" width="400" height="50" fill="#065f46" opacity="0.55"/>
      <text x="260" y="22" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#064e3b" text-anchor="middle">50 — 80% identity</text>
      <text x="260" y="38" font-family="Inter, sans-serif" font-size="10" fill="#064e3b" text-anchor="middle">moderate homolog</text>
      <text x="40" y="30" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="end">Tier 2</text>
    </g>

    <!-- Tier 3: 30-50% — amber -->
    <g transform="translate(0, 144)">
      <rect x="30" y="0" width="460" height="50" fill="#b45309" opacity="0.45"/>
      <text x="260" y="22" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#78350f" text-anchor="middle">30 — 50% identity</text>
      <text x="260" y="38" font-family="Inter, sans-serif" font-size="10" fill="#78350f" text-anchor="middle">distant homolog</text>
      <text x="10" y="30" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="end">Tier 3</text>
    </g>

    <!-- Tier 4: 20-30% — amber/red -->
    <g transform="translate(0, 204)">
      <rect x="0" y="0" width="520" height="50" fill="#b45309" opacity="0.7"/>
      <text x="260" y="22" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#78350f" text-anchor="middle">20 — 30% identity (twilight zone)</text>
      <text x="260" y="38" font-family="Inter, sans-serif" font-size="10" fill="#78350f" text-anchor="middle">structural similarity likely</text>
    </g>

    <!-- Tier 5: < 20% — red -->
    <g transform="translate(0, 264)">
      <rect x="-30" y="0" width="580" height="50" fill="#dc2626" opacity="0.65"/>
      <text x="260" y="22" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#7f1d1d" text-anchor="middle">&lt; 20% identity</text>
      <text x="260" y="38" font-family="Inter, sans-serif" font-size="10" fill="#7f1d1d" text-anchor="middle">sequence alone not sufficient</text>
    </g>

    <!-- Identity scale axis -->
    <g transform="translate(0, 340)">
      <line x1="0" y1="0" x2="520" y2="0" stroke="#374151" stroke-width="1"/>
      <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">
        <text x="0"   y="14" text-anchor="middle">0%</text>
        <text x="104" y="14" text-anchor="middle">20%</text>
        <text x="208" y="14" text-anchor="middle">40%</text>
        <text x="312" y="14" text-anchor="middle">60%</text>
        <text x="416" y="14" text-anchor="middle">80%</text>
        <text x="520" y="14" text-anchor="middle">100%</text>
      </g>
      <text x="260" y="32" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">% identity over aligned region</text>
    </g>
  </g>

  <!-- RIGHT: details table -->
  <g transform="translate(620, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.06em">WHAT YOU CAN TRANSFER</text>

    <!-- Row 1 -->
    <g transform="translate(0, 24)">
      <circle cx="14" cy="14" r="8" fill="#065f46"/>
      <text x="32" y="14" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#374151">Specific function + substrate + partners</text>
      <text x="32" y="30" font-family="Inter, sans-serif" font-size="9" fill="#525252">EC number, GO molecular function, binding partners</text>
      <text x="32" y="44" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#065f46">~90% reliable.  Safe baseline annotation.</text>
    </g>

    <line x1="0" y1="84" x2="500" y2="84" stroke="#e5e3dc" stroke-width="0.5"/>

    <!-- Row 2 -->
    <g transform="translate(0, 92)">
      <circle cx="14" cy="14" r="8" fill="#065f46" opacity="0.6"/>
      <text x="32" y="14" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#374151">Biochemical function (broad class)</text>
      <text x="32" y="30" font-family="Inter, sans-serif" font-size="9" fill="#525252">enzyme class, transporter family, signalling role</text>
      <text x="32" y="44" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#374151">Substrate specificity may shift; flag in annotation.</text>
    </g>

    <line x1="0" y1="152" x2="500" y2="152" stroke="#e5e3dc" stroke-width="0.5"/>

    <!-- Row 3 -->
    <g transform="translate(0, 160)">
      <circle cx="14" cy="14" r="8" fill="#b45309"/>
      <text x="32" y="14" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#374151">Fold + active-site architecture</text>
      <text x="32" y="30" font-family="Inter, sans-serif" font-size="9" fill="#525252">Pfam domain, SCOP fold, broad family</text>
      <text x="32" y="44" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#b45309">Specific function may differ. Corroborate.</text>
    </g>

    <line x1="0" y1="220" x2="500" y2="220" stroke="#e5e3dc" stroke-width="0.5"/>

    <!-- Row 4 -->
    <g transform="translate(0, 228)">
      <circle cx="14" cy="14" r="8" fill="#b45309" opacity="0.7"/>
      <text x="32" y="14" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#374151">Fold only (structural homology)</text>
      <text x="32" y="30" font-family="Inter, sans-serif" font-size="9" fill="#525252">superfamily membership; PSI-BLAST or HMMER needed</text>
      <text x="32" y="44" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#b45309">Verify with structure prediction (AlphaFold) or experiment.</text>
    </g>

    <line x1="0" y1="288" x2="500" y2="288" stroke="#e5e3dc" stroke-width="0.5"/>

    <!-- Row 5 -->
    <g transform="translate(0, 296)">
      <circle cx="14" cy="14" r="8" fill="#dc2626"/>
      <text x="32" y="14" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#374151">Nothing reliably from BLAST alone</text>
      <text x="32" y="30" font-family="Inter, sans-serif" font-size="9" fill="#525252">use profile HMMs, structure alignment, deep models</text>
      <text x="32" y="44" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#dc2626">Sequence similarity by chance is the dominant signal here.</text>
    </g>
  </g>

  <!-- Bottom panel: caveats / coverage / chain of inference -->
  <line x1="60" y1="480" x2="1140" y2="480" stroke="#374151" stroke-width="0.5"/>

  <g transform="translate(60, 500)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">SECONDARY CHECKS BEYOND IDENTITY</text>

    <g transform="translate(0, 20)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">Coverage</text>
      <text x="0" y="16" font-family="Inter, sans-serif" font-size="9" fill="#525252">High identity over a short fragment is much weaker</text>
      <text x="0" y="28" font-family="Inter, sans-serif" font-size="9" fill="#525252">evidence than moderate identity across the full protein.</text>
      <text x="0" y="44" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#374151">Require coverage &gt;= 70% before transferring specific function.</text>
    </g>

    <g transform="translate(370, 20)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">Evidence chain</text>
      <text x="0" y="16" font-family="Inter, sans-serif" font-size="9" fill="#525252">Your hit may itself have an inferred-by-similarity</text>
      <text x="0" y="28" font-family="Inter, sans-serif" font-size="9" fill="#525252">label that was transferred from an upstream hit.</text>
      <text x="0" y="44" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#374151">Check UniProt evidence codes (EXP vs ISS).</text>
    </g>

    <g transform="translate(740, 20)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">Domain composition</text>
      <text x="0" y="16" font-family="Inter, sans-serif" font-size="9" fill="#525252">A multi-domain protein may match the hit on one</text>
      <text x="0" y="28" font-family="Inter, sans-serif" font-size="9" fill="#525252">domain only; transfer only domain-level claims.</text>
      <text x="0" y="44" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#374151">Cross-check with Pfam / InterPro.</text>
    </g>
  </g>
</svg>
