<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="t d">
  <title id="t">Four tree-inference paradigms compared</title>
  <desc id="d">A four-column comparison table of UPGMA, neighbour-joining, maximum parsimony, maximum likelihood, and Bayesian inference. Each method gets a row of properties: input, assumption, complexity, statistical consistency, software, and a tiny diagrammatic icon of the tree it tends to produce on a four-taxon problem with two long branches.</desc>

  <rect x="0" y="0" width="1200" height="620" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="40" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">FIVE TREE-INFERENCE PARADIGMS — WHAT EACH ONE COSTS YOU</text>
  <text x="60" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Read the table left-to-right; pick the paradigm whose tradeoffs match the data scale and the inference goal.</text>

  <!-- Column headers -->
  <g transform="translate(60, 90)">
    <line x1="0" y1="0" x2="1080" y2="0" stroke="#374151" stroke-width="1"/>
    <g font-family="Inter, sans-serif" font-size="11" font-weight="700" letter-spacing="0.06em">
      <text x="0" y="22" fill="#1e3a8a">PROPERTY</text>
      <text x="240" y="22" fill="#525252">UPGMA</text>
      <text x="380" y="22" fill="#525252">NEIGHBOUR-JOINING</text>
      <text x="600" y="22" fill="#525252">PARSIMONY</text>
      <text x="780" y="22" fill="#525252">MAX. LIKELIHOOD</text>
      <text x="970" y="22" fill="#525252">BAYESIAN</text>
    </g>
    <line x1="0" y1="32" x2="1080" y2="32" stroke="#374151" stroke-width="0.5"/>
  </g>

  <!-- Row 1: input -->
  <g transform="translate(60, 130)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
    <text x="0" y="0" font-weight="600">input</text>
    <text x="240" y="0">distance matrix</text>
    <text x="380" y="0">distance matrix</text>
    <text x="600" y="0">MSA, character states</text>
    <text x="780" y="0">MSA + sub. model</text>
    <text x="970" y="0">MSA + priors</text>
  </g>
  <line x1="60" y1="146" x2="1140" y2="146" stroke="#e5e3dc" stroke-width="0.5"/>

  <!-- Row 2: hidden assumption -->
  <g transform="translate(60, 168)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
    <text x="0" y="0" font-weight="600">hidden assumption</text>
    <text x="240" y="0" fill="#dc2626">strict molecular clock</text>
    <text x="380" y="0">additive distances</text>
    <text x="600" y="0" fill="#dc2626">minimum-change ≈ truth</text>
    <text x="780" y="0">substitution model true</text>
    <text x="970" y="0">priors well-chosen</text>
  </g>
  <line x1="60" y1="184" x2="1140" y2="184" stroke="#e5e3dc" stroke-width="0.5"/>

  <!-- Row 3: complexity -->
  <g transform="translate(60, 206)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
    <text x="0" y="0" font-weight="600">complexity</text>
    <text x="240" y="0" font-family="JetBrains Mono, monospace">O(N²)</text>
    <text x="380" y="0" font-family="JetBrains Mono, monospace">O(N³)</text>
    <text x="600" y="0" font-family="JetBrains Mono, monospace">NP-hard search</text>
    <text x="780" y="0" font-family="JetBrains Mono, monospace">NP-hard search</text>
    <text x="970" y="0" font-family="JetBrains Mono, monospace">MCMC, slow</text>
  </g>
  <line x1="60" y1="222" x2="1140" y2="222" stroke="#e5e3dc" stroke-width="0.5"/>

  <!-- Row 4: statistical consistency -->
  <g transform="translate(60, 244)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
    <text x="0" y="0" font-weight="600">statistical consistency</text>
    <text x="240" y="0" fill="#dc2626">no (if clock fails)</text>
    <text x="380" y="0" fill="#065f46">yes (under additivity)</text>
    <text x="600" y="0" fill="#dc2626">no — LBA-prone</text>
    <text x="780" y="0" fill="#065f46">yes (under model)</text>
    <text x="970" y="0" fill="#065f46">yes (under model + priors)</text>
  </g>
  <line x1="60" y1="260" x2="1140" y2="260" stroke="#e5e3dc" stroke-width="0.5"/>

  <!-- Row 5: software -->
  <g transform="translate(60, 282)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
    <text x="0" y="0" font-weight="600">software</text>
    <text x="240" y="0" font-family="JetBrains Mono, monospace" font-size="9.5">PHYLIP, MEGA</text>
    <text x="380" y="0" font-family="JetBrains Mono, monospace" font-size="9.5">QuickTree, MEGA</text>
    <text x="600" y="0" font-family="JetBrains Mono, monospace" font-size="9.5">TNT, PAUP*</text>
    <text x="780" y="0" font-family="JetBrains Mono, monospace" font-size="9.5">RAxML, IQ-TREE, FastTree</text>
    <text x="970" y="0" font-family="JetBrains Mono, monospace" font-size="9.5">MrBayes, BEAST</text>
  </g>
  <line x1="60" y1="298" x2="1140" y2="298" stroke="#e5e3dc" stroke-width="0.5"/>

  <!-- Row 6: typical scale -->
  <g transform="translate(60, 320)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
    <text x="0" y="0" font-weight="600">typical scale</text>
    <text x="240" y="0">small (≤ 50)</text>
    <text x="380" y="0">moderate (≤ 1000)</text>
    <text x="600" y="0">moderate (≤ 200)</text>
    <text x="780" y="0">large (10⁴ taxa)</text>
    <text x="970" y="0">small (≤ 200)</text>
  </g>
  <line x1="60" y1="336" x2="1140" y2="336" stroke="#e5e3dc" stroke-width="0.5"/>

  <!-- Row 7: when to use -->
  <g transform="translate(60, 358)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
    <text x="0" y="0" font-weight="600">when to use</text>
    <text x="240" y="0" font-size="9.5">quick scaffold</text>
    <text x="380" y="0" font-size="9.5">first-pass tree</text>
    <text x="600" y="0" font-size="9.5">morphology, sanity check</text>
    <text x="780" y="0" font-size="9.5">modern default</text>
    <text x="970" y="0" font-size="9.5">dating, posterior support</text>
  </g>
  <line x1="60" y1="374" x2="1140" y2="374" stroke="#e5e3dc" stroke-width="0.5"/>

  <!-- Tree icon row -->
  <g transform="translate(60, 410)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">tree shape on a long-branch dataset</text>
    <text x="0" y="14" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">true topology: (A,B),(C,D) with A and C long</text>

    <!-- UPGMA icon -->
    <g transform="translate(220, 30)">
      <!-- ultrametric tree -->
      <line x1="0" y1="20" x2="0" y2="80" stroke="#374151" stroke-width="1.5"/>
      <line x1="0" y1="20" x2="60" y2="20" stroke="#374151" stroke-width="1.5"/>
      <line x1="60" y1="20" x2="60" y2="40" stroke="#374151" stroke-width="1.5"/>
      <line x1="60" y1="40" x2="80" y2="40" stroke="#374151" stroke-width="1.5"/>
      <line x1="80" y1="40" x2="80" y2="60" stroke="#374151" stroke-width="1.5"/>
      <line x1="80" y1="60" x2="100" y2="60" stroke="#374151" stroke-width="1.5"/>
      <line x1="0" y1="80" x2="100" y2="80" stroke="#374151" stroke-width="1.5"/>
      <text x="105" y="22" font-family="Inter, sans-serif" font-size="9" fill="#dc2626">A</text>
      <text x="105" y="42" font-family="Inter, sans-serif" font-size="9" fill="#374151">B</text>
      <text x="105" y="62" font-family="Inter, sans-serif" font-size="9" fill="#dc2626">C</text>
      <text x="105" y="82" font-family="Inter, sans-serif" font-size="9" fill="#374151">D</text>
      <text x="0" y="105" font-family="Inter, sans-serif" font-size="9" fill="#dc2626" font-weight="600">ultrametric ≠ truth</text>
    </g>

    <!-- NJ icon -->
    <g transform="translate(380, 30)">
      <!-- additive: long branches to A and C, short to B and D -->
      <line x1="0" y1="30" x2="40" y2="30" stroke="#374151" stroke-width="1.5"/>
      <line x1="40" y1="30" x2="40" y2="60" stroke="#374151" stroke-width="1.5"/>
      <line x1="40" y1="60" x2="0" y2="60" stroke="#374151" stroke-width="1.5"/>
      <line x1="0" y1="30" x2="60" y2="20" stroke="#374151" stroke-width="1.5"/>
      <line x1="40" y1="30" x2="55" y2="40" stroke="#374151" stroke-width="1.5"/>
      <line x1="40" y1="60" x2="55" y2="50" stroke="#374151" stroke-width="1.5"/>
      <line x1="0" y1="60" x2="60" y2="70" stroke="#374151" stroke-width="1.5"/>
      <text x="65" y="22" font-family="Inter, sans-serif" font-size="9" fill="#374151">A</text>
      <text x="60" y="42" font-family="Inter, sans-serif" font-size="9" fill="#374151">B</text>
      <text x="60" y="52" font-family="Inter, sans-serif" font-size="9" fill="#374151">C</text>
      <text x="65" y="72" font-family="Inter, sans-serif" font-size="9" fill="#374151">D</text>
      <text x="0" y="105" font-family="Inter, sans-serif" font-size="9" fill="#065f46" font-weight="600">correct on additive data</text>
    </g>

    <!-- Parsimony icon -->
    <g transform="translate(600, 30)">
      <!-- LBA: groups long branches A and C together -->
      <line x1="0" y1="30" x2="40" y2="30" stroke="#dc2626" stroke-width="1.5"/>
      <line x1="40" y1="30" x2="40" y2="60" stroke="#dc2626" stroke-width="1.5"/>
      <line x1="40" y1="60" x2="0" y2="60" stroke="#dc2626" stroke-width="1.5"/>
      <line x1="0" y1="30" x2="60" y2="20" stroke="#dc2626" stroke-width="1.5"/>
      <line x1="40" y1="30" x2="55" y2="40" stroke="#dc2626" stroke-width="1.5"/>
      <line x1="40" y1="60" x2="55" y2="50" stroke="#dc2626" stroke-width="1.5"/>
      <line x1="0" y1="60" x2="60" y2="70" stroke="#dc2626" stroke-width="1.5"/>
      <text x="65" y="22" font-family="Inter, sans-serif" font-size="9" fill="#dc2626" font-weight="700">A</text>
      <text x="60" y="42" font-family="Inter, sans-serif" font-size="9" fill="#374151">B</text>
      <text x="60" y="52" font-family="Inter, sans-serif" font-size="9" fill="#dc2626" font-weight="700">C</text>
      <text x="65" y="72" font-family="Inter, sans-serif" font-size="9" fill="#374151">D</text>
      <text x="0" y="105" font-family="Inter, sans-serif" font-size="9" fill="#dc2626" font-weight="600">groups A with C — LBA</text>
    </g>

    <!-- ML icon -->
    <g transform="translate(780, 30)">
      <line x1="0" y1="30" x2="40" y2="30" stroke="#065f46" stroke-width="1.5"/>
      <line x1="40" y1="30" x2="40" y2="60" stroke="#065f46" stroke-width="1.5"/>
      <line x1="40" y1="60" x2="0" y2="60" stroke="#065f46" stroke-width="1.5"/>
      <line x1="0" y1="30" x2="60" y2="20" stroke="#065f46" stroke-width="1.5"/>
      <line x1="40" y1="30" x2="55" y2="40" stroke="#065f46" stroke-width="1.5"/>
      <line x1="40" y1="60" x2="55" y2="50" stroke="#065f46" stroke-width="1.5"/>
      <line x1="0" y1="60" x2="60" y2="70" stroke="#065f46" stroke-width="1.5"/>
      <text x="65" y="22" font-family="Inter, sans-serif" font-size="9" fill="#374151">A</text>
      <text x="60" y="42" font-family="Inter, sans-serif" font-size="9" fill="#374151">B</text>
      <text x="60" y="52" font-family="Inter, sans-serif" font-size="9" fill="#374151">C</text>
      <text x="65" y="72" font-family="Inter, sans-serif" font-size="9" fill="#374151">D</text>
      <text x="0" y="105" font-family="Inter, sans-serif" font-size="9" fill="#065f46" font-weight="600">correct under proper model</text>
    </g>

    <!-- Bayesian icon -->
    <g transform="translate(950, 30)">
      <line x1="0" y1="30" x2="40" y2="30" stroke="#1e3a8a" stroke-width="1.5"/>
      <line x1="40" y1="30" x2="40" y2="60" stroke="#1e3a8a" stroke-width="1.5"/>
      <line x1="40" y1="60" x2="0" y2="60" stroke="#1e3a8a" stroke-width="1.5"/>
      <line x1="0" y1="30" x2="60" y2="20" stroke="#1e3a8a" stroke-width="1.5"/>
      <line x1="40" y1="30" x2="55" y2="40" stroke="#1e3a8a" stroke-width="1.5"/>
      <line x1="40" y1="60" x2="55" y2="50" stroke="#1e3a8a" stroke-width="1.5"/>
      <line x1="0" y1="60" x2="60" y2="70" stroke="#1e3a8a" stroke-width="1.5"/>
      <text x="65" y="22" font-family="Inter, sans-serif" font-size="9" fill="#374151">A</text>
      <text x="60" y="42" font-family="Inter, sans-serif" font-size="9" fill="#374151">B</text>
      <text x="60" y="52" font-family="Inter, sans-serif" font-size="9" fill="#374151">C</text>
      <text x="65" y="72" font-family="Inter, sans-serif" font-size="9" fill="#374151">D</text>
      <!-- posterior labels on branches -->
      <text x="30" y="42" font-family="JetBrains Mono, monospace" font-size="8" fill="#1e3a8a">0.99</text>
      <text x="0" y="105" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a" font-weight="600">+ posterior support</text>
    </g>
  </g>

  <!-- Bottom narrative panel -->
  <g transform="translate(60, 560)">
    <rect x="0" y="0" width="1080" height="48" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.5"/>
    <text x="14" y="18" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">PRACTICAL CHOICE</text>
    <text x="14" y="36" font-family="Inter, sans-serif" font-size="10" fill="#374151">Quick scaffold → NJ. Publishable tree → IQ-TREE with ModelFinder + ultrafast bootstrap. Dating / posterior support → BEAST or MrBayes. UPGMA only as a visualisation; parsimony only for morphology or as a sanity check.</text>
  </g>
</svg>
