<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" role="img" aria-labelledby="t d">
  <title id="t">Underflow in native floating-point vs log-space Viterbi</title>
  <desc id="d">A two-panel comparison. The left panel plots Viterbi cell values on a linear y-axis from 10^-310 to 1, on a log-scale, against sequence position from 0 to 200. The native floating-point curve falls below the smallest representable double-precision number around position 120, after which it is identically zero, shown by a flat baseline. The right panel plots the same DP in the log domain on a linear y-axis from 0 to -500 versus position; the log-likelihood decays approximately linearly with position and remains representable. An annotation arrow points to the underflow event in the left panel; another annotation in the right panel notes the log-sum-exp identity used for the forward sum.</desc>

  <rect x="0" y="0" width="1200" height="580" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="40" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">VITERBI IN NATIVE FLOATING POINT VS LOG SPACE</text>
  <text x="60" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Probabilities multiply over T positions; native floating point underflows by T≈120 on a typical HMM. The log-domain version never does.</text>

  <!-- Left panel: native floating point -->
  <g transform="translate(80, 110)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#dc2626" letter-spacing="0.06em">NATIVE FLOATING POINT  —  underflows</text>

    <!-- Axes box -->
    <rect x="0" y="20" width="480" height="320" fill="#fafaf9" stroke="#c4c1b6" stroke-width="0.5"/>

    <!-- gridlines y (log decades, every 32 units) -->
    <g stroke="#e5e3dc" stroke-width="0.5">
      <line x1="0" y1="52"  x2="480" y2="52"/>
      <line x1="0" y1="84"  x2="480" y2="84"/>
      <line x1="0" y1="116" x2="480" y2="116"/>
      <line x1="0" y1="148" x2="480" y2="148"/>
      <line x1="0" y1="180" x2="480" y2="180"/>
      <line x1="0" y1="212" x2="480" y2="212"/>
      <line x1="0" y1="244" x2="480" y2="244"/>
      <line x1="0" y1="276" x2="480" y2="276"/>
      <line x1="0" y1="308" x2="480" y2="308"/>
    </g>

    <!-- Y labels (log scale) -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="end">
      <text x="-6" y="24">10⁰</text>
      <text x="-6" y="88">10⁻⁴⁰</text>
      <text x="-6" y="152">10⁻¹⁶⁰</text>
      <text x="-6" y="216">10⁻²⁴⁰</text>
      <text x="-6" y="280">10⁻³⁰⁸</text>
      <text x="-6" y="332">0</text>
    </g>

    <!-- X labels -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">
      <text x="0"   y="356">0</text>
      <text x="96"  y="356">40</text>
      <text x="192" y="356">80</text>
      <text x="288" y="356">120</text>
      <text x="384" y="356">160</text>
      <text x="480" y="356">200</text>
    </g>
    <text x="240" y="376" font-family="Inter, sans-serif" font-size="10" fill="#374151" text-anchor="middle">sequence position t</text>
    <text x="-50" y="180" font-family="Inter, sans-serif" font-size="10" fill="#374151" text-anchor="middle" transform="rotate(-90 -50 180)">max-path probability  δ_t  (log scale)</text>

    <!-- Native curve: linear decay in log y, then suddenly clipped at position ~120 to baseline -->
    <path d="M 0 20 L 288 285 L 290 332 L 480 332" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linejoin="miter"/>

    <!-- Underflow event annotation -->
    <circle cx="290" cy="332" r="4" fill="#dc2626"/>
    <line x1="290" y1="332" x2="370" y2="240" stroke="#dc2626" stroke-width="1" stroke-dasharray="3 2"/>
    <rect x="360" y="200" width="120" height="48" fill="#dc2626" opacity="0.10" rx="2"/>
    <text x="420" y="220" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#dc2626" text-anchor="middle">UNDERFLOW</text>
    <text x="420" y="235" font-family="Inter, sans-serif" font-size="9" fill="#dc2626" text-anchor="middle">δ ≈ 0 ; argmax undefined</text>
  </g>

  <!-- Right panel: log space -->
  <g transform="translate(680, 110)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#065f46" letter-spacing="0.06em">LOG-SPACE VITERBI  —  representable everywhere</text>

    <rect x="0" y="20" width="440" height="320" fill="#fafaf9" stroke="#c4c1b6" stroke-width="0.5"/>

    <!-- y gridlines linear -->
    <g stroke="#e5e3dc" stroke-width="0.5">
      <line x1="0" y1="84"  x2="440" y2="84"/>
      <line x1="0" y1="148" x2="440" y2="148"/>
      <line x1="0" y1="212" x2="440" y2="212"/>
      <line x1="0" y1="276" x2="440" y2="276"/>
    </g>

    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="end">
      <text x="-6" y="24">0</text>
      <text x="-6" y="88">-125</text>
      <text x="-6" y="152">-250</text>
      <text x="-6" y="216">-375</text>
      <text x="-6" y="280">-500</text>
      <text x="-6" y="344">-625</text>
    </g>

    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">
      <text x="0"   y="356">0</text>
      <text x="88"  y="356">40</text>
      <text x="176" y="356">80</text>
      <text x="264" y="356">120</text>
      <text x="352" y="356">160</text>
      <text x="440" y="356">200</text>
    </g>
    <text x="220" y="376" font-family="Inter, sans-serif" font-size="10" fill="#374151" text-anchor="middle">sequence position t</text>
    <text x="-50" y="180" font-family="Inter, sans-serif" font-size="10" fill="#374151" text-anchor="middle" transform="rotate(-90 -50 180)">log δ_t  (linear scale, nats)</text>

    <!-- Log curve: linear decay 0 to -500 over 200 positions -->
    <path d="M 0 20 L 440 280" fill="none" stroke="#065f46" stroke-width="2.5" stroke-linecap="round"/>

    <!-- LSE box -->
    <rect x="20" y="230" width="290" height="92" fill="#fafaf9" stroke="#c4c1b6" stroke-width="0.5" rx="2"/>
    <text x="32" y="252" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#065f46" letter-spacing="0.06em">LOG-SUM-EXP FOR FORWARD SUMS</text>
    <text x="32" y="272" font-family="JetBrains Mono, monospace" font-size="11" fill="#374151">log Σᵢ e^Lᵢ = L* + log Σᵢ e^(Lᵢ-L*)</text>
    <text x="32" y="294" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252">where L* = maxᵢ Lᵢ.</text>
    <text x="32" y="310" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252">Subtract the max before exp — no underflow.</text>
  </g>

  <!-- Footnote -->
  <text x="60" y="558" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">Schematic. Exact crossover depends on the model: typical HMMs with K ≈ 5 states and emission probabilities ~0.25 underflow native double-precision arithmetic between T ≈ 100 and T ≈ 200.</text>
</svg>
