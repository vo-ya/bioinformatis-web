<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" role="img" aria-labelledby="t d">
  <title id="t">Model selection for HMM state count with BIC and AIC</title>
  <desc id="d">A three-panel plot showing how to pick the HMM state count K. The top panel plots log-likelihood versus K from 2 to 12: the curve rises monotonically with diminishing returns past K equals 5. The middle panel plots BIC versus K: the curve forms a U-shape with the minimum at K equals 5, which is the true state count of the simulated data. The bottom panel plots AIC versus K: the U-shape is shallower and the minimum lies at K equals 7, over-selecting state count. A vertical dashed line at K equals 5 marks the true value.</desc>

  <rect x="0" y="0" width="1200" height="580" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="40" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">CHOOSING THE STATE COUNT — BIC IS THE SAFER DEFAULT</text>
  <text x="60" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Synthetic data from a 5-state HMM. Log-likelihood always rises with K; penalised criteria pick K, and BIC penalises more aggressively than AIC.</text>

  <!-- True K line annotation key -->
  <g transform="translate(800, 80)">
    <rect x="0" y="0" width="280" height="36" fill="#7c3aed" opacity="0.08" rx="2"/>
    <line x1="14" y1="18" x2="34" y2="18" stroke="#7c3aed" stroke-width="2" stroke-dasharray="5 3"/>
    <text x="40" y="22" font-family="Inter, sans-serif" font-size="11" fill="#7c3aed" font-weight="600">true K = 5  (data-generating process)</text>
  </g>

  <!-- Common X axis values: K from 2..12, mapped 0..900 with 90 px per step. -->
  <!-- Panel layout: 3 panels each 140 tall stacked. -->

  <!-- Panel 1: Log-likelihood -->
  <g transform="translate(120, 140)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#374151" letter-spacing="0.06em">LOG-LIKELIHOOD  log P(X | θ̂_K)</text>
    <rect x="0" y="10" width="900" height="100" fill="#fafaf9" stroke="#c4c1b6" stroke-width="0.5"/>

    <!-- gridlines -->
    <g stroke="#e5e3dc" stroke-width="0.5">
      <line x1="0" y1="35" x2="900" y2="35"/>
      <line x1="0" y1="60" x2="900" y2="60"/>
      <line x1="0" y1="85" x2="900" y2="85"/>
    </g>

    <!-- Y labels (negative log-likelihood: -7200 top, -8200 bottom; higher is better) -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="end">
      <text x="-6" y="14">-7200</text>
      <text x="-6" y="39">-7450</text>
      <text x="-6" y="64">-7700</text>
      <text x="-6" y="89">-7950</text>
      <text x="-6" y="114">-8200</text>
    </g>

    <!-- True K dashed -->
    <line x1="270" y1="10" x2="270" y2="110" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5 3"/>

    <!-- log-likelihood curve: rises with K, plateau after 5 -->
    <!-- Points at K=2..12, y values mapped -->
    <path d="M 0 90 L 90 60 L 180 36 L 270 22 L 360 18 L 450 16 L 540 14 L 630 13 L 720 12 L 810 11 L 900 10"
          fill="none" stroke="#1e3a8a" stroke-width="2.2" stroke-linecap="round"/>
    <g fill="#1e3a8a">
      <circle cx="0"   cy="90" r="3"/>
      <circle cx="90"  cy="60" r="3"/>
      <circle cx="180" cy="36" r="3"/>
      <circle cx="270" cy="22" r="3"/>
      <circle cx="360" cy="18" r="3"/>
      <circle cx="450" cy="16" r="3"/>
      <circle cx="540" cy="14" r="3"/>
      <circle cx="630" cy="13" r="3"/>
      <circle cx="720" cy="12" r="3"/>
      <circle cx="810" cy="11" r="3"/>
      <circle cx="900" cy="10" r="3"/>
    </g>

    <text x="730" y="60" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252">monotonically rising</text>
  </g>

  <!-- Panel 2: BIC -->
  <g transform="translate(120, 290)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#065f46" letter-spacing="0.06em">BIC  =  -2 log L + p log N    (minimum picks K)</text>
    <rect x="0" y="10" width="900" height="100" fill="#fafaf9" stroke="#c4c1b6" stroke-width="0.5"/>
    <g stroke="#e5e3dc" stroke-width="0.5">
      <line x1="0" y1="35" x2="900" y2="35"/>
      <line x1="0" y1="60" x2="900" y2="60"/>
      <line x1="0" y1="85" x2="900" y2="85"/>
    </g>
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="end">
      <text x="-6" y="14">15600</text>
      <text x="-6" y="39">15500</text>
      <text x="-6" y="64">15400</text>
      <text x="-6" y="89">15300</text>
      <text x="-6" y="114">15200</text>
    </g>
    <line x1="270" y1="10" x2="270" y2="110" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5 3"/>

    <!-- BIC curve: U-shape, minimum at K=5 (x=270) -->
    <path d="M 0 20 L 90 50 L 180 75 L 270 95 L 360 88 L 450 78 L 540 65 L 630 50 L 720 35 L 810 22 L 900 14"
          fill="none" stroke="#065f46" stroke-width="2.5" stroke-linecap="round"/>
    <g fill="#065f46">
      <circle cx="0"   cy="20" r="3"/>
      <circle cx="90"  cy="50" r="3"/>
      <circle cx="180" cy="75" r="3"/>
      <circle cx="270" cy="95" r="4" stroke="#065f46" stroke-width="2" fill="#fafaf9"/>
      <circle cx="360" cy="88" r="3"/>
      <circle cx="450" cy="78" r="3"/>
      <circle cx="540" cy="65" r="3"/>
      <circle cx="630" cy="50" r="3"/>
      <circle cx="720" cy="35" r="3"/>
      <circle cx="810" cy="22" r="3"/>
      <circle cx="900" cy="14" r="3"/>
    </g>

    <text x="270" y="115" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#065f46" text-anchor="middle">argmin = 5 ✓</text>
  </g>

  <!-- Panel 3: AIC -->
  <g transform="translate(120, 440)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#b45309" letter-spacing="0.06em">AIC  =  -2 log L + 2 p    (over-selects state count)</text>
    <rect x="0" y="10" width="900" height="100" fill="#fafaf9" stroke="#c4c1b6" stroke-width="0.5"/>
    <g stroke="#e5e3dc" stroke-width="0.5">
      <line x1="0" y1="35" x2="900" y2="35"/>
      <line x1="0" y1="60" x2="900" y2="60"/>
      <line x1="0" y1="85" x2="900" y2="85"/>
    </g>
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="end">
      <text x="-6" y="14">15050</text>
      <text x="-6" y="39">15000</text>
      <text x="-6" y="64">14950</text>
      <text x="-6" y="89">14900</text>
      <text x="-6" y="114">14850</text>
    </g>
    <line x1="270" y1="10" x2="270" y2="110" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5 3"/>

    <!-- AIC curve: shallower U-shape, minimum at K=7 (x=450) -->
    <path d="M 0 18 L 90 48 L 180 75 L 270 88 L 360 92 L 450 95 L 540 92 L 630 86 L 720 76 L 810 58 L 900 38"
          fill="none" stroke="#b45309" stroke-width="2.5" stroke-linecap="round"/>
    <g fill="#b45309">
      <circle cx="0"   cy="18" r="3"/>
      <circle cx="90"  cy="48" r="3"/>
      <circle cx="180" cy="75" r="3"/>
      <circle cx="270" cy="88" r="3"/>
      <circle cx="360" cy="92" r="3"/>
      <circle cx="450" cy="95" r="4" stroke="#b45309" stroke-width="2" fill="#fafaf9"/>
      <circle cx="540" cy="92" r="3"/>
      <circle cx="630" cy="86" r="3"/>
      <circle cx="720" cy="76" r="3"/>
      <circle cx="810" cy="58" r="3"/>
      <circle cx="900" cy="38" r="3"/>
    </g>

    <text x="450" y="115" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#b45309" text-anchor="middle">argmin = 7  (over-selects)</text>

    <!-- X tick labels -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">
      <text x="0"   y="135">K=2</text>
      <text x="90"  y="135">3</text>
      <text x="180" y="135">4</text>
      <text x="270" y="135">5</text>
      <text x="360" y="135">6</text>
      <text x="450" y="135">7</text>
      <text x="540" y="135">8</text>
      <text x="630" y="135">9</text>
      <text x="720" y="135">10</text>
      <text x="810" y="135">11</text>
      <text x="900" y="135">12</text>
    </g>
  </g>
</svg>
