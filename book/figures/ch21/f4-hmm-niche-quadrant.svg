<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-labelledby="t d">
  <title id="t">Design quadrant: HMM vs deep learning by labelled data and interpretability requirement</title>
  <desc id="d">A two-axis design diagram. The horizontal axis goes from small labelled data on the left to large labelled data on the right. The vertical axis goes from low interpretability requirement at the bottom to high interpretability requirement at the top. Four quadrants are labelled: top-left is HMM territory (small data, high interpretability), top-right is hybrid HMM-plus-deep (large data, high interpretability), bottom-left is shallow-model territory (small data, low interpretability), bottom-right is deep-learning territory (large data, low interpretability). Concrete genomics applications are placed inside each quadrant: Pfam scan, BRAKER gene finding, ChromHMM segmentation in the upper-left and upper-right; DeepBind motif discovery, Enformer regulatory prediction, SpliceAI in the bottom-right.</desc>

  <rect x="0" y="0" width="1200" height="660" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="40" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">HMM VS DEEP LEARNING — A DESIGN QUADRANT</text>
  <text x="60" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Two axes decide the tool: how much labelled data you have, and how much the downstream consumer needs interpretable annotations.</text>

  <!-- Chart area -->
  <g transform="translate(160, 110)">

    <!-- Axes box -->
    <rect x="0" y="0" width="880" height="460" fill="#fafaf9" stroke="#c4c1b6" stroke-width="0.5"/>

    <!-- Mid-axis splits -->
    <line x1="440" y1="0"   x2="440" y2="460" stroke="#374151" stroke-width="0.8" stroke-dasharray="4 3"/>
    <line x1="0"   y1="230" x2="880" y2="230" stroke="#374151" stroke-width="0.8" stroke-dasharray="4 3"/>

    <!-- Quadrant backgrounds -->
    <rect x="0"   y="0"   width="440" height="230" fill="#1e3a8a" opacity="0.05"/>
    <rect x="440" y="0"   width="440" height="230" fill="#7c3aed" opacity="0.05"/>
    <rect x="0"   y="230" width="440" height="230" fill="#8a8a85" opacity="0.05"/>
    <rect x="440" y="230" width="440" height="230" fill="#b45309" opacity="0.06"/>

    <!-- Quadrant labels -->
    <text x="220" y="30" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1e3a8a" text-anchor="middle" letter-spacing="0.06em">HMM TERRITORY</text>
    <text x="220" y="46" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#1e3a8a" text-anchor="middle">strong priors, sample-efficient, auditable</text>

    <text x="660" y="30" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#7c3aed" text-anchor="middle" letter-spacing="0.06em">HYBRID — HMM BACKBONE + DEEP FEATURES</text>
    <text x="660" y="46" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#7c3aed" text-anchor="middle">deep emissions inside HMM topology</text>

    <text x="220" y="260" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#525252" text-anchor="middle" letter-spacing="0.06em">SHALLOW MODELS</text>
    <text x="220" y="276" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252" text-anchor="middle">PWMs, linear classifiers, regularised regression</text>

    <text x="660" y="260" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#b45309" text-anchor="middle" letter-spacing="0.06em">DEEP LEARNING TERRITORY</text>
    <text x="660" y="276" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#b45309" text-anchor="middle">long-range, abundant labels, soft probabilities</text>

    <!-- Application markers, upper-left (HMM) -->
    <g font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a">
      <circle cx="80"  cy="100" r="5" fill="#1e3a8a"/>
      <text x="92" y="104" font-weight="600">Pfam scan (HMMER)</text>

      <circle cx="110" cy="140" r="5" fill="#1e3a8a"/>
      <text x="122" y="144" font-weight="600">ChromHMM segmentation</text>

      <circle cx="70" cy="180" r="5" fill="#1e3a8a"/>
      <text x="82" y="184" font-weight="600">Prodigal (prokaryotic gene finder)</text>

      <circle cx="180" cy="210" r="5" fill="#1e3a8a"/>
      <text x="192" y="214" font-weight="600">CpG-island detection</text>
    </g>

    <!-- Application markers, upper-right (Hybrid) -->
    <g font-family="Inter, sans-serif" font-size="10" fill="#7c3aed">
      <circle cx="540" cy="100" r="5" fill="#7c3aed"/>
      <text x="552" y="104" font-weight="600">BRAKER + AUGUSTUS + RNA-seq hints</text>

      <circle cx="640" cy="150" r="5" fill="#7c3aed"/>
      <text x="652" y="154" font-weight="600">HaplotypeCaller (pair-HMM + DL re-rank)</text>

      <circle cx="600" cy="195" r="5" fill="#7c3aed"/>
      <text x="612" y="199" font-weight="600">HMMRATAC (HMM + deep features)</text>
    </g>

    <!-- Application markers, bottom-left (shallow) -->
    <g font-family="Inter, sans-serif" font-size="10" fill="#525252">
      <circle cx="90"  cy="330" r="5" fill="#525252"/>
      <text x="102" y="334" font-weight="600">PWM splice-site scoring</text>

      <circle cx="160" cy="380" r="5" fill="#525252"/>
      <text x="172" y="384" font-weight="600">JASPAR motif scan</text>

      <circle cx="60"  cy="420" r="5" fill="#525252"/>
      <text x="72" y="424" font-weight="600">Linear regression for GWAS</text>
    </g>

    <!-- Application markers, bottom-right (deep) -->
    <g font-family="Inter, sans-serif" font-size="10" fill="#b45309">
      <circle cx="540" cy="320" r="5" fill="#b45309"/>
      <text x="552" y="324" font-weight="600">SpliceAI  (10 kb context CNN)</text>

      <circle cx="620" cy="360" r="5" fill="#b45309"/>
      <text x="632" y="364" font-weight="600">DeepBind / DeepSEA  (TF binding)</text>

      <circle cx="700" cy="395" r="5" fill="#b45309"/>
      <text x="712" y="399" font-weight="600">Enformer / Borzoi  (long-range regulation)</text>

      <circle cx="560" cy="430" r="5" fill="#b45309"/>
      <text x="572" y="434" font-weight="600">DeepVariant CNN  (pileup classification)</text>
    </g>

    <!-- Axes labels and ticks -->
    <!-- X axis labels: log scale, training data -->
    <g font-family="JetBrains Mono, monospace" font-size="10" fill="#525252" text-anchor="middle">
      <text x="0"   y="478">10²</text>
      <text x="220" y="478">10³</text>
      <text x="440" y="478">10⁴</text>
      <text x="660" y="478">10⁵</text>
      <text x="880" y="478">10⁶+</text>
    </g>
    <text x="440" y="500" font-family="Inter, sans-serif" font-size="11" fill="#374151" text-anchor="middle">labelled training examples</text>

    <!-- Y axis labels: interpretability -->
    <g font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="end">
      <text x="-12" y="14">strict (clinical audit)</text>
      <text x="-12" y="234">moderate</text>
      <text x="-12" y="454">low (downstream ML only)</text>
    </g>
    <text x="-110" y="230" font-family="Inter, sans-serif" font-size="11" fill="#374151" text-anchor="middle" transform="rotate(-90 -110 230)">interpretability requirement</text>

    <!-- Crossover annotation -->
    <g>
      <path d="M 350 400 C 380 370, 420 240, 460 100" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5 3"/>
      <text x="350" y="412" font-family="Inter, sans-serif" font-size="10" fill="#dc2626" font-weight="600" font-style="italic">crossover band — design judgement zone</text>
    </g>

  </g>

  <!-- Footnote box -->
  <g transform="translate(60, 600)">
    <rect x="0" y="0" width="1080" height="44" fill="#1e3a8a" opacity="0.06" rx="2"/>
    <text x="20" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">DESIGN RULE</text>
    <text x="20" y="36" font-family="Inter, sans-serif" font-size="10" fill="#374151">Choose the architecture whose inductive bias matches the data structure. Small data + sparse states + auditable annotation → HMM. Long-range + abundant labels + soft outputs → deep model. In between, build the hybrid.</text>
  </g>
</svg>
