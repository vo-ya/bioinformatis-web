<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-labelledby="t d">
  <title id="t">The graph Laplacian and its eigenvectors as frequencies on a network</title>
  <desc id="d">A three-panel illustration of graph signal processing. The left panel shows a 12-node toy network with two visually-distinct dense communities connected by one weak edge. The middle panel shows the adjacency matrix A and the graph Laplacian L equals D minus A as filled cells in a small heatmap. The right panel shows three eigenvectors of L plotted as bar charts on the node index axis: the smallest non-zero eigenvector v2 split the nodes into the two communities, an intermediate eigenvector vk varied at a moderate rate, and a high-eigenvalue eigenvector vN oscillated rapidly between every pair of neighbours. A footer panel maps the analogy explicitly to the Fourier transform: low-frequency eigenvectors are smooth across edges, high-frequency eigenvectors are rough.</desc>

  <rect x="0" y="0" width="1200" height="660" fill="#fafaf9"/>

  <!-- Title -->
  <text x="60" y="40" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">THE GRAPH LAPLACIAN AS A SPECTRAL OPERATOR</text>
  <text x="60" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">The eigenvectors of L are the Fourier basis of the network. Low eigenvalues correspond to smooth signals; high eigenvalues to rough ones.</text>

  <!-- Panel A: a small graph with two communities -->
  <g transform="translate(40, 100)">
    <text x="160" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.06em">A. NETWORK G = (V, E)</text>

    <!-- left cluster -->
    <g stroke="#525252" stroke-width="1.5" fill="none">
      <line x1="60"  y1="80"  x2="120" y2="60"/>
      <line x1="60"  y1="80"  x2="100" y2="130"/>
      <line x1="120" y1="60"  x2="160" y2="120"/>
      <line x1="100" y1="130" x2="160" y2="120"/>
      <line x1="60"  y1="80"  x2="160" y2="120"/>
      <line x1="120" y1="60"  x2="100" y2="130"/>
    </g>

    <!-- bridge edge: weak -->
    <line x1="160" y1="120" x2="200" y2="200" stroke="#b45309" stroke-width="1.5" stroke-dasharray="4 3"/>

    <!-- right cluster -->
    <g stroke="#525252" stroke-width="1.5" fill="none">
      <line x1="200" y1="200" x2="260" y2="180"/>
      <line x1="200" y1="200" x2="240" y2="250"/>
      <line x1="260" y1="180" x2="290" y2="240"/>
      <line x1="240" y1="250" x2="290" y2="240"/>
      <line x1="200" y1="200" x2="290" y2="240"/>
      <line x1="260" y1="180" x2="240" y2="250"/>
    </g>

    <!-- nodes left -->
    <g>
      <circle cx="60"  cy="80"  r="11" fill="#1e3a8a"/>
      <circle cx="120" cy="60"  r="11" fill="#1e3a8a"/>
      <circle cx="100" cy="130" r="11" fill="#1e3a8a"/>
      <circle cx="160" cy="120" r="11" fill="#1e3a8a"/>
    </g>
    <!-- node labels left -->
    <g font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#fafaf9" text-anchor="middle">
      <text x="60"  y="84">1</text>
      <text x="120" y="64">2</text>
      <text x="100" y="134">3</text>
      <text x="160" y="124">4</text>
    </g>

    <!-- nodes right -->
    <g>
      <circle cx="200" cy="200" r="11" fill="#065f46"/>
      <circle cx="260" cy="180" r="11" fill="#065f46"/>
      <circle cx="240" cy="250" r="11" fill="#065f46"/>
      <circle cx="290" cy="240" r="11" fill="#065f46"/>
    </g>
    <g font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#fafaf9" text-anchor="middle">
      <text x="200" y="204">5</text>
      <text x="260" y="184">6</text>
      <text x="240" y="254">7</text>
      <text x="290" y="244">8</text>
    </g>

    <!-- bridge annotation -->
    <text x="200" y="170" font-family="Inter, sans-serif" font-size="10" fill="#b45309" font-style="italic">weak bridge</text>

    <!-- side note -->
    <text x="0"   y="300" font-family="Inter, sans-serif" font-size="10" fill="#525252">n = 8 nodes, |E| = 13 edges. Two dense</text>
    <text x="0"   y="316" font-family="Inter, sans-serif" font-size="10" fill="#525252">communities joined by one weak edge.</text>
  </g>

  <!-- Panel B: A and L as schematic matrices -->
  <g transform="translate(380, 100)">
    <text x="170" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.06em">B. ADJACENCY A AND LAPLACIAN L = D − A</text>

    <!-- A matrix grid 8x8 -->
    <g transform="translate(0, 30)">
      <text x="60" y="-4" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#374151">A</text>
      <!-- 8x8 schematic: nonzeros as filled blue cells -->
      <g font-family="JetBrains Mono, monospace" font-size="8" fill="#374151">
        <!-- block-diagonal pattern, 12px cells, origin at 12,12 -->
        <!-- cell coords -->
        <!-- left block 1..4 -->
        <rect x="12" y="0"  width="96" height="96" fill="none" stroke="#c4c1b6" stroke-width="0.5"/>
        <!-- fill cells where edge exists (i,j) -->
        <!-- A_ij = 1 for i,j in {(1,2),(1,3),(1,4),(2,3),(2,4),(3,4),(4,5),(5,6),(5,7),(5,8),(6,7),(6,8),(7,8)} symmetric -->
        <!-- pixel pos: i row, j col. cell width 12, origin x=12,y=0 -->
        <g fill="#1e3a8a">
          <!-- row1 -->
          <rect x="24" y="0"  width="12" height="12"/>
          <rect x="36" y="0"  width="12" height="12"/>
          <rect x="48" y="0"  width="12" height="12"/>
          <!-- row2 -->
          <rect x="12" y="12" width="12" height="12"/>
          <rect x="36" y="12" width="12" height="12"/>
          <rect x="48" y="12" width="12" height="12"/>
          <!-- row3 -->
          <rect x="12" y="24" width="12" height="12"/>
          <rect x="24" y="24" width="12" height="12"/>
          <rect x="48" y="24" width="12" height="12"/>
          <!-- row4 -->
          <rect x="12" y="36" width="12" height="12"/>
          <rect x="24" y="36" width="12" height="12"/>
          <rect x="36" y="36" width="12" height="12"/>
          <!-- bridge (4,5) and (5,4) -->
          <rect x="60" y="36" width="12" height="12" fill="#b45309"/>
          <rect x="36" y="48" width="12" height="12" fill="#b45309"/>
          <!-- row5 -->
          <rect x="72" y="48" width="12" height="12"/>
          <rect x="84" y="48" width="12" height="12"/>
          <rect x="96" y="48" width="12" height="12"/>
          <!-- row6 -->
          <rect x="60" y="60" width="12" height="12"/>
          <rect x="84" y="60" width="12" height="12"/>
          <rect x="96" y="60" width="12" height="12"/>
          <!-- row7 -->
          <rect x="60" y="72" width="12" height="12"/>
          <rect x="72" y="72" width="12" height="12"/>
          <rect x="96" y="72" width="12" height="12"/>
          <!-- row8 -->
          <rect x="60" y="84" width="12" height="12"/>
          <rect x="72" y="84" width="12" height="12"/>
          <rect x="84" y="84" width="12" height="12"/>
        </g>
        <!-- row/col labels -->
        <g font-size="8" fill="#8a8a85">
          <text x="6"  y="9">1</text>
          <text x="6"  y="21">2</text>
          <text x="6"  y="33">3</text>
          <text x="6"  y="45">4</text>
          <text x="6"  y="57">5</text>
          <text x="6"  y="69">6</text>
          <text x="6"  y="81">7</text>
          <text x="6"  y="93">8</text>
        </g>
      </g>
    </g>

    <!-- L matrix grid 8x8 -->
    <g transform="translate(180, 30)">
      <text x="60" y="-4" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#374151">L = D − A</text>
      <rect x="12" y="0"  width="96" height="96" fill="none" stroke="#c4c1b6" stroke-width="0.5"/>
      <!-- Diagonal: positive (D); off-diagonal: -A_ij (red if was edge) -->
      <g>
        <!-- diagonal cells (cobalt) -->
        <g fill="#1e3a8a">
          <rect x="12" y="0"  width="12" height="12"/>
          <rect x="24" y="12" width="12" height="12"/>
          <rect x="36" y="24" width="12" height="12"/>
          <rect x="48" y="36" width="12" height="12"/>
          <rect x="60" y="48" width="12" height="12"/>
          <rect x="72" y="60" width="12" height="12"/>
          <rect x="84" y="72" width="12" height="12"/>
          <rect x="96" y="84" width="12" height="12"/>
        </g>
        <!-- off-diagonal: light red (negatives) -->
        <g fill="#dc2626" fill-opacity="0.6">
          <rect x="24" y="0"  width="12" height="12"/>
          <rect x="36" y="0"  width="12" height="12"/>
          <rect x="48" y="0"  width="12" height="12"/>
          <rect x="12" y="12" width="12" height="12"/>
          <rect x="36" y="12" width="12" height="12"/>
          <rect x="48" y="12" width="12" height="12"/>
          <rect x="12" y="24" width="12" height="12"/>
          <rect x="24" y="24" width="12" height="12"/>
          <rect x="48" y="24" width="12" height="12"/>
          <rect x="12" y="36" width="12" height="12"/>
          <rect x="24" y="36" width="12" height="12"/>
          <rect x="36" y="36" width="12" height="12"/>
          <rect x="60" y="36" width="12" height="12"/>
          <rect x="36" y="48" width="12" height="12"/>
          <rect x="72" y="48" width="12" height="12"/>
          <rect x="84" y="48" width="12" height="12"/>
          <rect x="96" y="48" width="12" height="12"/>
          <rect x="60" y="60" width="12" height="12"/>
          <rect x="84" y="60" width="12" height="12"/>
          <rect x="96" y="60" width="12" height="12"/>
          <rect x="60" y="72" width="12" height="12"/>
          <rect x="72" y="72" width="12" height="12"/>
          <rect x="96" y="72" width="12" height="12"/>
          <rect x="60" y="84" width="12" height="12"/>
          <rect x="72" y="84" width="12" height="12"/>
          <rect x="84" y="84" width="12" height="12"/>
        </g>
      </g>
    </g>

    <!-- legend -->
    <g transform="translate(0, 200)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
      <rect x="0" y="0"   width="10" height="10" fill="#1e3a8a"/>
      <text x="16" y="9">A_ij = 1 (edge present)  ·  L_ii = deg(i)</text>
      <rect x="0" y="16"  width="10" height="10" fill="#dc2626" fill-opacity="0.6"/>
      <text x="16" y="25">L_ij = −1 (off-diagonal where edge exists)</text>
      <rect x="0" y="32"  width="10" height="10" fill="#b45309"/>
      <text x="16" y="41">Bridge edge (4,5): the cut-edge between communities</text>
    </g>
  </g>

  <!-- Panel C: three eigenvectors as bar charts -->
  <g transform="translate(800, 100)">
    <text x="175" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.06em">C. EIGENVECTORS = GRAPH FREQUENCIES</text>

    <!-- v_2 bars: split halves +/- -->
    <g transform="translate(0, 30)">
      <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="10" fill="#374151">v₂ — λ₂ small (smooth / community split)</text>
      <line x1="0" y1="40" x2="320" y2="40" stroke="#8a8a85" stroke-width="0.5"/>
      <!-- 8 bars: 4 positive, 4 negative -->
      <g fill="#065f46">
        <rect x="10"  y="14" width="30" height="26"/>
        <rect x="50"  y="14" width="30" height="26"/>
        <rect x="90"  y="14" width="30" height="26"/>
        <rect x="130" y="14" width="30" height="26"/>
      </g>
      <g fill="#c4342c">
        <rect x="170" y="40" width="30" height="26"/>
        <rect x="210" y="40" width="30" height="26"/>
        <rect x="250" y="40" width="30" height="26"/>
        <rect x="290" y="40" width="30" height="26"/>
      </g>
      <g font-family="JetBrains Mono, monospace" font-size="8" fill="#8a8a85" text-anchor="middle">
        <text x="25"  y="78">1</text>
        <text x="65"  y="78">2</text>
        <text x="105" y="78">3</text>
        <text x="145" y="78">4</text>
        <text x="185" y="78">5</text>
        <text x="225" y="78">6</text>
        <text x="265" y="78">7</text>
        <text x="305" y="78">8</text>
      </g>
    </g>

    <!-- v_4 bars: intermediate -->
    <g transform="translate(0, 130)">
      <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="10" fill="#374151">v₄ — moderate eigenvalue</text>
      <line x1="0" y1="40" x2="320" y2="40" stroke="#8a8a85" stroke-width="0.5"/>
      <g fill="#065f46">
        <rect x="10"  y="20" width="30" height="20"/>
        <rect x="90"  y="14" width="30" height="26"/>
        <rect x="170" y="22" width="30" height="18"/>
        <rect x="250" y="28" width="30" height="12"/>
      </g>
      <g fill="#c4342c">
        <rect x="50"  y="40" width="30" height="20"/>
        <rect x="130" y="40" width="30" height="14"/>
        <rect x="210" y="40" width="30" height="22"/>
        <rect x="290" y="40" width="30" height="16"/>
      </g>
      <g font-family="JetBrains Mono, monospace" font-size="8" fill="#8a8a85" text-anchor="middle">
        <text x="25"  y="74">1</text>
        <text x="65"  y="74">2</text>
        <text x="105" y="74">3</text>
        <text x="145" y="74">4</text>
        <text x="185" y="74">5</text>
        <text x="225" y="74">6</text>
        <text x="265" y="74">7</text>
        <text x="305" y="74">8</text>
      </g>
    </g>

    <!-- v_N bars: rapidly alternating -->
    <g transform="translate(0, 230)">
      <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="10" fill="#374151">v₈ — λ₈ large (rough / high frequency)</text>
      <line x1="0" y1="40" x2="320" y2="40" stroke="#8a8a85" stroke-width="0.5"/>
      <g fill="#065f46">
        <rect x="10"  y="14" width="30" height="26"/>
        <rect x="90"  y="14" width="30" height="26"/>
        <rect x="170" y="14" width="30" height="26"/>
        <rect x="250" y="14" width="30" height="26"/>
      </g>
      <g fill="#c4342c">
        <rect x="50"  y="40" width="30" height="26"/>
        <rect x="130" y="40" width="30" height="26"/>
        <rect x="210" y="40" width="30" height="26"/>
        <rect x="290" y="40" width="30" height="26"/>
      </g>
      <g font-family="JetBrains Mono, monospace" font-size="8" fill="#8a8a85" text-anchor="middle">
        <text x="25"  y="78">1</text>
        <text x="65"  y="78">2</text>
        <text x="105" y="78">3</text>
        <text x="145" y="78">4</text>
        <text x="185" y="78">5</text>
        <text x="225" y="78">6</text>
        <text x="265" y="78">7</text>
        <text x="305" y="78">8</text>
      </g>
    </g>
  </g>

  <!-- Footer: Fourier analogy -->
  <g transform="translate(60, 580)">
    <rect x="0" y="0" width="1080" height="56" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.5" rx="2"/>
    <text x="16" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">EE READING</text>
    <text x="16" y="40" font-family="Inter, sans-serif" font-size="11" fill="#374151">Eigenvectors of L play the role of the discrete Fourier basis on a regular grid. Diffusion by t multiplies coefficients by exp(−λᵢ t):</text>
    <text x="16" y="54" font-family="Inter, sans-serif" font-size="11" fill="#374151">it is a low-pass filter on the graph spectrum. Smooth signals — pathway activity, expression cascades — sit in the small-λ end of the spectrum.</text>
  </g>
</svg>
