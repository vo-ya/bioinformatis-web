<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="t d">
  <title id="t">A worked over-representation example with a 2-by-2 contingency table</title>
  <desc id="d">A two-panel figure walking through a concrete ORA computation. The left panel shows the urn analogy: a universe of 20000 genes, 200 of which are in the candidate gene set, and 500 of which are differentially expressed. Of the 500 DEGs, 20 overlap with the gene set; the expectation under the null hypothesis is 5. The right panel shows the 2-by-2 contingency table, the hypergeometric formula, and the computed p-value. A footer lists the four ways the same calculation can be misused: the wrong universe, the unused background, double-counting via overlapping sets, and small expected counts that need a Fisher continuity correction.</desc>

  <rect x="0" y="0" width="1200" height="620" fill="#fafaf9"/>

  <!-- Title -->
  <text x="60" y="40" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">ORA — A WORKED EXAMPLE</text>
  <text x="60" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">200 DEGs from an RNA-seq run; ask whether a 500-gene KEGG pathway is enriched. Expected 5; observed 20; hypergeometric p &lt; 10⁻⁹.</text>

  <!-- Left panel: urn analogy -->
  <g transform="translate(60, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.06em">A. THE URN PICTURE</text>

    <!-- Universe outer rectangle -->
    <rect x="0" y="20" width="460" height="280" fill="#ffffff" stroke="#525252" stroke-width="1.5" rx="3"/>
    <text x="230" y="42" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252">Universe U — 20,000 tested genes (background)</text>

    <!-- Gene set G: 200 of universe (pathway) - left circle -->
    <circle cx="160" cy="180" r="80" fill="#1e3a8a" fill-opacity="0.15" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="100" y="120" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">Gene set G</text>
    <text x="100" y="134" font-family="JetBrains Mono, monospace" font-size="10" fill="#1e3a8a">|G| = 500</text>

    <!-- DE list L: 200 of universe - right circle -->
    <circle cx="300" cy="180" r="80" fill="#b45309" fill-opacity="0.18" stroke="#b45309" stroke-width="1.5"/>
    <text x="332" y="120" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#b45309">DE list L</text>
    <text x="332" y="134" font-family="JetBrains Mono, monospace" font-size="10" fill="#b45309">|L| = 200</text>

    <!-- Intersection -->
    <text x="230" y="184" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" fill="#1e3a8a">a = 20</text>
    <text x="230" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252">observed overlap</text>

    <!-- expected -->
    <text x="230" y="222" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">E[a] = |L|·|G|/|U| = 200·500/20000 = 5</text>

    <!-- numbers -->
    <text x="100" y="200" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#1e3a8a">480</text>
    <text x="360" y="200" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#b45309">180</text>
    <text x="430" y="280" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">19,320 elsewhere</text>
  </g>

  <!-- Right panel: 2x2 + formula + p-value -->
  <g transform="translate(620, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.06em">B. CONTINGENCY TABLE AND TEST</text>

    <!-- 2x2 table -->
    <g transform="translate(0, 30)">
      <!-- header row -->
      <line x1="0" y1="0" x2="500" y2="0" stroke="#374151" stroke-width="1"/>
      <line x1="160" y1="0" x2="160" y2="160" stroke="#374151" stroke-width="0.5"/>
      <line x1="280" y1="0" x2="280" y2="160" stroke="#374151" stroke-width="0.5"/>
      <line x1="400" y1="0" x2="400" y2="160" stroke="#374151" stroke-width="0.5"/>
      <line x1="0" y1="40" x2="500" y2="40" stroke="#374151" stroke-width="0.5"/>
      <line x1="0" y1="80" x2="500" y2="80" stroke="#374151" stroke-width="0.5"/>
      <line x1="0" y1="120" x2="500" y2="120" stroke="#374151" stroke-width="1"/>

      <g font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252">
        <text x="220" y="26" text-anchor="middle">In G</text>
        <text x="340" y="26" text-anchor="middle">Not in G</text>
        <text x="450" y="26" text-anchor="middle">Total</text>
      </g>

      <g font-family="JetBrains Mono, monospace" font-size="11" fill="#374151">
        <text x="12" y="64" font-weight="600" fill="#b45309">In L (DEG)</text>
        <text x="220" y="64" text-anchor="middle" font-weight="700" fill="#1e3a8a">a = 20</text>
        <text x="340" y="64" text-anchor="middle">b = 180</text>
        <text x="450" y="64" text-anchor="middle">200</text>

        <text x="12" y="104" font-weight="600" fill="#374151">Not in L</text>
        <text x="220" y="104" text-anchor="middle">c = 480</text>
        <text x="340" y="104" text-anchor="middle">d = 19,320</text>
        <text x="450" y="104" text-anchor="middle">19,800</text>

        <text x="12" y="144" font-weight="600" fill="#525252">Total</text>
        <text x="220" y="144" text-anchor="middle">500</text>
        <text x="340" y="144" text-anchor="middle">19,500</text>
        <text x="450" y="144" text-anchor="middle" font-weight="700">N = 20,000</text>
      </g>
    </g>

    <!-- Hypergeometric formula -->
    <g transform="translate(0, 210)">
      <rect x="0" y="0" width="500" height="80" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.5" rx="2"/>
      <text x="12" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">HYPERGEOMETRIC P-VALUE</text>
      <text x="12" y="44" font-family="JetBrains Mono, monospace" font-size="12" fill="#374151">P(X ≥ a) = Σ  C(|G|,k) · C(|U|−|G|, |L|−k) / C(|U|, |L|)</text>
      <text x="12" y="64" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252">k = a … min(|L|, |G|). Equivalent to a one-sided Fisher exact test on the 2×2 table.</text>
    </g>

    <!-- p-value callout -->
    <g transform="translate(0, 310)">
      <rect x="0" y="0" width="240" height="46" fill="#15803d" fill-opacity="0.08" stroke="#15803d" stroke-width="0.5" rx="2"/>
      <text x="12" y="18" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#15803d">RESULT</text>
      <text x="12" y="36" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#15803d">p ≈ 4 × 10⁻¹⁰</text>

      <rect x="260" y="0" width="240" height="46" fill="#b45309" fill-opacity="0.08" stroke="#b45309" stroke-width="0.5" rx="2"/>
      <text x="272" y="18" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#b45309">ENRICHMENT</text>
      <text x="272" y="36" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#b45309">20 / 5 = 4 × expected</text>
    </g>
  </g>

  <!-- Footer: four ways to misuse the same calculation -->
  <g transform="translate(60, 510)">
    <rect x="0" y="0" width="1080" height="96" fill="#fafaf9" stroke="#b45309" stroke-width="0.5" rx="2"/>
    <text x="14" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#b45309" letter-spacing="0.06em">FOUR WAYS TO MIS-APPLY ORA</text>

    <g font-family="Inter, sans-serif" font-size="10" fill="#374151">
      <text x="14"  y="44" font-weight="600" fill="#b45309">1.</text>
      <text x="30"  y="44">Wrong universe.</text>
      <text x="30"  y="58" fill="#525252">|U| should be the set of <tspan font-style="italic">tested</tspan> genes, not "all human genes". Inflating U inflates the p-value.</text>

      <text x="290" y="44" font-weight="600" fill="#b45309">2.</text>
      <text x="306" y="44">Unused background.</text>
      <text x="306" y="58" fill="#525252">Custom panel? Restrict U to panel genes; otherwise every panel pathway looks enriched.</text>

      <text x="570" y="44" font-weight="600" fill="#b45309">3.</text>
      <text x="586" y="44">Overlapping sets.</text>
      <text x="586" y="58" fill="#525252">GO parent and child are correlated. Apply BH to the family; treat hierarchies as one finding.</text>

      <text x="840" y="44" font-weight="600" fill="#b45309">4.</text>
      <text x="856" y="44">Small expected counts.</text>
      <text x="856" y="58" fill="#525252">When E[a] &lt; 3, asymptotic χ² breaks down. Use the exact hypergeometric, not the χ² approximation.</text>
    </g>
  </g>
</svg>
