<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-labelledby="t d">
  <title id="t">Random-walk-with-restart convergence and the restart-probability knob</title>
  <desc id="d">A two-panel figure. The left panel shows RWR scores at four snapshots — iterations 0, 5, 20, and the stationary distribution — as bar charts over 12 nodes of a small PPI subgraph with one seed. The bars start as a single tall spike at the seed and progressively redistribute mass to graph neighbours. The right panel sweeps the restart probability r across 0.1, 0.3, 0.5, 0.7, and 0.9, showing how the stationary score concentrates near the seed at high r and spreads broadly at low r. A footer compares the closed-form solution to iterative power-method computation.</desc>

  <rect x="0" y="0" width="1200" height="660" fill="#fafaf9"/>

  <!-- Title -->
  <text x="60" y="40" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">RWR — CONVERGENCE AND THE RESTART KNOB</text>
  <text x="60" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">p^(t+1) = (1 − r) W p^(t) + r p^(0)  —  closed form: p^∞ = r (I − (1 − r) W)⁻¹ p^(0).</text>

  <!-- LEFT PANEL: four time snapshots over 12 nodes -->
  <g transform="translate(60, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.06em">A. ITERATION TRAJECTORY (r = 0.5)</text>

    <!-- Common axis box height 110, width 520 -->
    <!-- t=0 -->
    <g transform="translate(0, 30)">
      <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#374151">t = 0  —  impulse at seed</text>
      <line x1="0" y1="80" x2="520" y2="80" stroke="#8a8a85" stroke-width="0.5"/>
      <!-- 12 bars, 36px each spacing -->
      <!-- seed is node 1 (index 0): full height -->
      <g>
        <rect x="6"   y="14" width="28" height="66" fill="#dc2626"/>
        <rect x="46"  y="76" width="28" height="4"  fill="#525252"/>
        <rect x="86"  y="76" width="28" height="4"  fill="#525252"/>
        <rect x="126" y="76" width="28" height="4"  fill="#525252"/>
        <rect x="166" y="76" width="28" height="4"  fill="#525252"/>
        <rect x="206" y="76" width="28" height="4"  fill="#525252"/>
        <rect x="246" y="76" width="28" height="4"  fill="#525252"/>
        <rect x="286" y="76" width="28" height="4"  fill="#525252"/>
        <rect x="326" y="76" width="28" height="4"  fill="#525252"/>
        <rect x="366" y="76" width="28" height="4"  fill="#525252"/>
        <rect x="406" y="76" width="28" height="4"  fill="#525252"/>
        <rect x="446" y="76" width="28" height="4"  fill="#525252"/>
        <rect x="486" y="76" width="28" height="4"  fill="#525252"/>
      </g>
    </g>

    <!-- t=5 -->
    <g transform="translate(0, 160)">
      <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#374151">t = 5  —  mass reaches direct neighbours</text>
      <line x1="0" y1="80" x2="520" y2="80" stroke="#8a8a85" stroke-width="0.5"/>
      <g>
        <rect x="6"   y="34" width="28" height="46" fill="#dc2626"/>
        <rect x="46"  y="56" width="28" height="24" fill="#b45309"/>
        <rect x="86"  y="60" width="28" height="20" fill="#b45309"/>
        <rect x="126" y="62" width="28" height="18" fill="#b45309"/>
        <rect x="166" y="70" width="28" height="10" fill="#374151"/>
        <rect x="206" y="72" width="28" height="8"  fill="#374151"/>
        <rect x="246" y="74" width="28" height="6"  fill="#374151"/>
        <rect x="286" y="74" width="28" height="6"  fill="#374151"/>
        <rect x="326" y="76" width="28" height="4"  fill="#525252"/>
        <rect x="366" y="76" width="28" height="4"  fill="#525252"/>
        <rect x="406" y="76" width="28" height="4"  fill="#525252"/>
        <rect x="446" y="78" width="28" height="2"  fill="#525252"/>
        <rect x="486" y="78" width="28" height="2"  fill="#525252"/>
      </g>
    </g>

    <!-- t=20 -->
    <g transform="translate(0, 290)">
      <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#374151">t = 20  —  most nodes carry detectable mass</text>
      <line x1="0" y1="80" x2="520" y2="80" stroke="#8a8a85" stroke-width="0.5"/>
      <g>
        <rect x="6"   y="40" width="28" height="40" fill="#dc2626"/>
        <rect x="46"  y="52" width="28" height="28" fill="#b45309"/>
        <rect x="86"  y="54" width="28" height="26" fill="#b45309"/>
        <rect x="126" y="56" width="28" height="24" fill="#b45309"/>
        <rect x="166" y="62" width="28" height="18" fill="#374151"/>
        <rect x="206" y="64" width="28" height="16" fill="#374151"/>
        <rect x="246" y="64" width="28" height="16" fill="#374151"/>
        <rect x="286" y="66" width="28" height="14" fill="#374151"/>
        <rect x="326" y="68" width="28" height="12" fill="#374151"/>
        <rect x="366" y="70" width="28" height="10" fill="#525252"/>
        <rect x="406" y="72" width="28" height="8"  fill="#525252"/>
        <rect x="446" y="72" width="28" height="8"  fill="#525252"/>
        <rect x="486" y="74" width="28" height="6"  fill="#525252"/>
      </g>
    </g>

    <!-- t=inf -->
    <g transform="translate(0, 420)">
      <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#374151">t = ∞  —  stationary distribution (convergence within ~50 iterations)</text>
      <line x1="0" y1="80" x2="520" y2="80" stroke="#8a8a85" stroke-width="0.5"/>
      <g>
        <rect x="6"   y="40" width="28" height="40" fill="#dc2626"/>
        <rect x="46"  y="52" width="28" height="28" fill="#b45309"/>
        <rect x="86"  y="54" width="28" height="26" fill="#b45309"/>
        <rect x="126" y="56" width="28" height="24" fill="#b45309"/>
        <rect x="166" y="62" width="28" height="18" fill="#374151"/>
        <rect x="206" y="64" width="28" height="16" fill="#374151"/>
        <rect x="246" y="64" width="28" height="16" fill="#374151"/>
        <rect x="286" y="66" width="28" height="14" fill="#374151"/>
        <rect x="326" y="68" width="28" height="12" fill="#374151"/>
        <rect x="366" y="70" width="28" height="10" fill="#525252"/>
        <rect x="406" y="72" width="28" height="8"  fill="#525252"/>
        <rect x="446" y="72" width="28" height="8"  fill="#525252"/>
        <rect x="486" y="74" width="28" height="6"  fill="#525252"/>
      </g>
      <!-- bar labels -->
      <g font-family="JetBrains Mono, monospace" font-size="8" fill="#8a8a85" text-anchor="middle">
        <text x="20"  y="94">s</text>
        <text x="60"  y="94">2</text>
        <text x="100" y="94">3</text>
        <text x="140" y="94">4</text>
        <text x="180" y="94">5</text>
        <text x="220" y="94">6</text>
        <text x="260" y="94">7</text>
        <text x="300" y="94">8</text>
        <text x="340" y="94">9</text>
        <text x="380" y="94">10</text>
        <text x="420" y="94">11</text>
        <text x="460" y="94">12</text>
        <text x="500" y="94">13</text>
      </g>
    </g>
  </g>

  <!-- RIGHT PANEL: r sweep -->
  <g transform="translate(660, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.06em">B. RESTART PROBABILITY r CONTROLS SPREAD</text>

    <!-- Each row: bars showing the stationary distribution for a given r -->
    <!-- Helper layout: 5 rows, 80 high each -->

    <!-- r = 0.1 (spreads broadly) -->
    <g transform="translate(0, 30)">
      <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#374151">r = 0.1  ·  spreads broadly across many hops</text>
      <line x1="0" y1="40" x2="460" y2="40" stroke="#8a8a85" stroke-width="0.5"/>
      <g>
        <rect x="6"   y="20" width="28" height="20" fill="#dc2626"/>
        <rect x="46"  y="22" width="28" height="18" fill="#b45309"/>
        <rect x="86"  y="22" width="28" height="18" fill="#b45309"/>
        <rect x="126" y="24" width="28" height="16" fill="#374151"/>
        <rect x="166" y="26" width="28" height="14" fill="#374151"/>
        <rect x="206" y="26" width="28" height="14" fill="#374151"/>
        <rect x="246" y="28" width="28" height="12" fill="#525252"/>
        <rect x="286" y="28" width="28" height="12" fill="#525252"/>
        <rect x="326" y="30" width="28" height="10" fill="#525252"/>
        <rect x="366" y="30" width="28" height="10" fill="#525252"/>
        <rect x="406" y="32" width="28" height="8"  fill="#525252"/>
      </g>
    </g>

    <!-- r = 0.3 -->
    <g transform="translate(0, 130)">
      <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#374151">r = 0.3</text>
      <line x1="0" y1="40" x2="460" y2="40" stroke="#8a8a85" stroke-width="0.5"/>
      <g>
        <rect x="6"   y="10" width="28" height="30" fill="#dc2626"/>
        <rect x="46"  y="18" width="28" height="22" fill="#b45309"/>
        <rect x="86"  y="20" width="28" height="20" fill="#b45309"/>
        <rect x="126" y="22" width="28" height="18" fill="#374151"/>
        <rect x="166" y="26" width="28" height="14" fill="#374151"/>
        <rect x="206" y="28" width="28" height="12" fill="#525252"/>
        <rect x="246" y="30" width="28" height="10" fill="#525252"/>
        <rect x="286" y="32" width="28" height="8"  fill="#525252"/>
        <rect x="326" y="32" width="28" height="8"  fill="#525252"/>
        <rect x="366" y="34" width="28" height="6"  fill="#525252"/>
        <rect x="406" y="36" width="28" height="4"  fill="#525252"/>
      </g>
    </g>

    <!-- r = 0.5 (default) -->
    <g transform="translate(0, 230)">
      <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#1e3a8a">r = 0.5  ·  default (typical literature value)</text>
      <line x1="0" y1="40" x2="460" y2="40" stroke="#8a8a85" stroke-width="0.5"/>
      <g>
        <rect x="6"   y="0"  width="28" height="40" fill="#dc2626"/>
        <rect x="46"  y="14" width="28" height="26" fill="#b45309"/>
        <rect x="86"  y="16" width="28" height="24" fill="#b45309"/>
        <rect x="126" y="20" width="28" height="20" fill="#374151"/>
        <rect x="166" y="26" width="28" height="14" fill="#374151"/>
        <rect x="206" y="30" width="28" height="10" fill="#525252"/>
        <rect x="246" y="32" width="28" height="8"  fill="#525252"/>
        <rect x="286" y="34" width="28" height="6"  fill="#525252"/>
        <rect x="326" y="36" width="28" height="4"  fill="#525252"/>
        <rect x="366" y="36" width="28" height="4"  fill="#525252"/>
        <rect x="406" y="38" width="28" height="2"  fill="#525252"/>
      </g>
    </g>

    <!-- r = 0.7 -->
    <g transform="translate(0, 330)">
      <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#374151">r = 0.7</text>
      <line x1="0" y1="40" x2="460" y2="40" stroke="#8a8a85" stroke-width="0.5"/>
      <g>
        <rect x="6"   y="-8" width="28" height="48" fill="#dc2626"/>
        <rect x="46"  y="22" width="28" height="18" fill="#b45309"/>
        <rect x="86"  y="24" width="28" height="16" fill="#b45309"/>
        <rect x="126" y="28" width="28" height="12" fill="#374151"/>
        <rect x="166" y="32" width="28" height="8"  fill="#374151"/>
        <rect x="206" y="34" width="28" height="6"  fill="#525252"/>
        <rect x="246" y="36" width="28" height="4"  fill="#525252"/>
        <rect x="286" y="38" width="28" height="2"  fill="#525252"/>
        <rect x="326" y="38" width="28" height="2"  fill="#525252"/>
        <rect x="366" y="38" width="28" height="2"  fill="#525252"/>
        <rect x="406" y="39" width="28" height="1"  fill="#525252"/>
      </g>
    </g>

    <!-- r = 0.9 -->
    <g transform="translate(0, 430)">
      <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#374151">r = 0.9  ·  stays near the seed</text>
      <line x1="0" y1="40" x2="460" y2="40" stroke="#8a8a85" stroke-width="0.5"/>
      <g>
        <rect x="6"   y="-16" width="28" height="56" fill="#dc2626"/>
        <rect x="46"  y="30"  width="28" height="10" fill="#b45309"/>
        <rect x="86"  y="32"  width="28" height="8"  fill="#b45309"/>
        <rect x="126" y="34"  width="28" height="6"  fill="#374151"/>
        <rect x="166" y="36"  width="28" height="4"  fill="#374151"/>
        <rect x="206" y="38"  width="28" height="2"  fill="#525252"/>
        <rect x="246" y="38"  width="28" height="2"  fill="#525252"/>
        <rect x="286" y="39"  width="28" height="1"  fill="#525252"/>
        <rect x="326" y="39"  width="28" height="1"  fill="#525252"/>
        <rect x="366" y="39"  width="28" height="1"  fill="#525252"/>
        <rect x="406" y="39"  width="28" height="1"  fill="#525252"/>
      </g>
      <g font-family="JetBrains Mono, monospace" font-size="8" fill="#8a8a85" text-anchor="middle">
        <text x="20"  y="54">s</text>
        <text x="60"  y="54">2</text>
        <text x="100" y="54">3</text>
        <text x="140" y="54">4</text>
        <text x="180" y="54">5</text>
        <text x="220" y="54">6</text>
        <text x="260" y="54">7</text>
        <text x="300" y="54">8</text>
        <text x="340" y="54">9</text>
        <text x="380" y="54">10</text>
        <text x="420" y="54">11</text>
      </g>
    </g>
  </g>

  <!-- Footer with closed form -->
  <g transform="translate(60, 590)">
    <rect x="0" y="0" width="1080" height="56" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.5" rx="2"/>
    <text x="14" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">PAGERANK IS THE SAME CALCULATION</text>
    <text x="14" y="40" font-family="Inter, sans-serif" font-size="11" fill="#374151">RWR with a uniform restart vector recovers Brin and Page's PageRank exactly (1998). The "personalised" PageRank used by web</text>
    <text x="14" y="54" font-family="Inter, sans-serif" font-size="11" fill="#374151">search puts non-zero probability only on the user's history; biological RWR puts it only on seed genes. Same algebra, different seed.</text>
  </g>
</svg>
