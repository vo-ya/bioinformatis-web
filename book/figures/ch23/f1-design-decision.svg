<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="t d">
  <title id="t">A four-question decision tree for choosing between 16S amplicon and shotgun metagenomics</title>
  <desc id="d">A flowchart that walks the four constraints a microbiome study has to honour: budget per sample, biomass available, kingdom coverage required, and whether functional content is needed. Each constraint branches to a recommendation. The chart converges on either 16S amplicon sequencing at about thirty US dollars per sample with genus-level resolution restricted to bacteria, or shotgun metagenomics at roughly three hundred US dollars per sample with species and strain resolution across bacteria, archaea, fungi, viruses, and host. A long-read option sits between the two as a third branch for full-length 16S on PacBio HiFi.</desc>

  <rect x="0" y="0" width="1200" height="640" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="40" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">PICK THE ASSAY — FOUR CONSTRAINTS, THREE OUTCOMES</text>
  <text x="60" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">No universally-best assay; the study's question and budget pick the platform.</text>

  <!-- Markers -->
  <defs>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>

  <!-- Q1 -->
  <g transform="translate(60, 110)">
    <rect x="0" y="0" width="220" height="64" fill="#fafaf9" stroke="#374151" stroke-width="1.5" rx="3"/>
    <text x="110" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">Q1 — BUDGET</text>
    <text x="110" y="42" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#374151">Tight (&lt; $50 / sample)</text>
    <text x="110" y="56" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#374151">or generous?</text>
  </g>

  <!-- Q2 -->
  <g transform="translate(60, 220)">
    <rect x="0" y="0" width="220" height="64" fill="#fafaf9" stroke="#374151" stroke-width="1.5" rx="3"/>
    <text x="110" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">Q2 — BIOMASS</text>
    <text x="110" y="42" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#374151">High (gut, soil) or</text>
    <text x="110" y="56" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#374151">low (skin, BAL)?</text>
  </g>

  <!-- Q3 -->
  <g transform="translate(60, 330)">
    <rect x="0" y="0" width="220" height="64" fill="#fafaf9" stroke="#374151" stroke-width="1.5" rx="3"/>
    <text x="110" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">Q3 — KINGDOM</text>
    <text x="110" y="42" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#374151">Bacteria only or</text>
    <text x="110" y="56" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#374151">archaea / fungi / virus?</text>
  </g>

  <!-- Q4 -->
  <g transform="translate(60, 440)">
    <rect x="0" y="0" width="220" height="64" fill="#fafaf9" stroke="#374151" stroke-width="1.5" rx="3"/>
    <text x="110" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">Q4 — FUNCTION</text>
    <text x="110" y="42" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#374151">Counts only or</text>
    <text x="110" y="56" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#374151">pathways / ARGs / MAGs?</text>
  </g>

  <!-- Connecting arrows down the constraint stack -->
  <line x1="170" y1="174" x2="170" y2="216" stroke="#525252" stroke-width="1.5" marker-end="url(#arrow-muted)"/>
  <line x1="170" y1="284" x2="170" y2="326" stroke="#525252" stroke-width="1.5" marker-end="url(#arrow-muted)"/>
  <line x1="170" y1="394" x2="170" y2="436" stroke="#525252" stroke-width="1.5" marker-end="url(#arrow-muted)"/>

  <!-- Decision routing block on the right side: three outcomes -->
  <!-- 16S box -->
  <g transform="translate(380, 110)">
    <rect x="0" y="0" width="340" height="170" fill="#fafaf9" stroke="#b45309" stroke-width="2" rx="4"/>
    <rect x="0" y="0" width="340" height="22" fill="#b45309"/>
    <text x="14" y="16" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#fafaf9" letter-spacing="0.06em">16S AMPLICON (V3 — V4)</text>
    <text x="14" y="42" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">cost</text>
    <text x="326" y="42" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">~$30 / sample</text>
    <text x="14" y="60" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">resolution</text>
    <text x="326" y="60" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">genus typical</text>
    <text x="14" y="78" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">taxa</text>
    <text x="326" y="78" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">bacteria only</text>
    <text x="14" y="96" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">function</text>
    <text x="326" y="96" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">no</text>
    <text x="14" y="114" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">depth / sample</text>
    <text x="326" y="114" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">~10 k reads</text>
    <text x="14" y="132" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">stack</text>
    <text x="326" y="132" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">DADA2 + QIIME2</text>
    <text x="14" y="156" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252">choose when budget tight, biomass low, only bacteria matter</text>
  </g>

  <!-- Long-read 16S box -->
  <g transform="translate(380, 300)">
    <rect x="0" y="0" width="340" height="130" fill="#fafaf9" stroke="#7c3aed" stroke-width="2" rx="4"/>
    <rect x="0" y="0" width="340" height="22" fill="#7c3aed"/>
    <text x="14" y="16" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#fafaf9" letter-spacing="0.06em">FULL-LENGTH 16S (PACBIO HIFI)</text>
    <text x="14" y="42" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">cost</text>
    <text x="326" y="42" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">~$80 / sample</text>
    <text x="14" y="60" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">resolution</text>
    <text x="326" y="60" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">species, sometimes strain</text>
    <text x="14" y="78" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">taxa</text>
    <text x="326" y="78" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">bacteria only</text>
    <text x="14" y="96" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">function</text>
    <text x="326" y="96" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">no</text>
    <text x="14" y="118" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252">choose when species-level resolution needed but budget still constrained</text>
  </g>

  <!-- Shotgun box -->
  <g transform="translate(380, 450)">
    <rect x="0" y="0" width="340" height="160" fill="#fafaf9" stroke="#1e3a8a" stroke-width="2" rx="4"/>
    <rect x="0" y="0" width="340" height="22" fill="#1e3a8a"/>
    <text x="14" y="16" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#fafaf9" letter-spacing="0.06em">SHOTGUN METAGENOMICS</text>
    <text x="14" y="42" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">cost</text>
    <text x="326" y="42" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">~$300 / sample</text>
    <text x="14" y="60" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">resolution</text>
    <text x="326" y="60" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">species, often strain</text>
    <text x="14" y="78" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">taxa</text>
    <text x="326" y="78" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">all kingdoms + host</text>
    <text x="14" y="96" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">function</text>
    <text x="326" y="96" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">yes: pathways, ARGs, MAGs</text>
    <text x="14" y="114" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">depth / sample</text>
    <text x="326" y="114" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">~5 Gb</text>
    <text x="14" y="132" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">stack</text>
    <text x="326" y="132" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">bioBakery, Kraken2 + HUMAnN</text>
  </g>

  <!-- Arrows from constraints to outcomes -->
  <path d="M 280 140 Q 340 140 380 160" fill="none" stroke="#b45309" stroke-width="1.5" marker-end="url(#arrow-accent)"/>
  <path d="M 280 360 Q 340 360 380 360" fill="none" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-accent)"/>
  <path d="M 280 470 Q 340 480 380 500" fill="none" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arrow-accent)"/>

  <!-- Right panel: pitfalls quick-list -->
  <g transform="translate(800, 110)">
    <rect x="0" y="0" width="340" height="500" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.5" rx="3"/>
    <text x="16" y="24" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">DESIGN PITFALLS</text>

    <text x="16" y="50" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">Primer choice (16S)</text>
    <text x="16" y="64" font-family="Inter, sans-serif" font-size="9" fill="#525252">V3 — V4 is the default; V1 — V2 misses Bifidobacterium;</text>
    <text x="16" y="76" font-family="Inter, sans-serif" font-size="9" fill="#525252">V4 alone catches more species but at lower depth.</text>

    <text x="16" y="100" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">Host contamination (shotgun)</text>
    <text x="16" y="114" font-family="Inter, sans-serif" font-size="9" fill="#525252">Skin can be 80 — 99 % human DNA; vaginal 30 — 70 %;</text>
    <text x="16" y="126" font-family="Inter, sans-serif" font-size="9" fill="#525252">stool typically &lt; 1 %. Cost scales with usable depth.</text>

    <text x="16" y="150" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">Storage temperature</text>
    <text x="16" y="164" font-family="Inter, sans-serif" font-size="9" fill="#525252">— 80 °C ideal; OMNIgene/RNAlater acceptable;</text>
    <text x="16" y="176" font-family="Inter, sans-serif" font-size="9" fill="#525252">room-temperature ships change composition within 24 h.</text>

    <text x="16" y="200" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">Sample size</text>
    <text x="16" y="214" font-family="Inter, sans-serif" font-size="9" fill="#525252">≥ 30 per arm for typical microbiome effect sizes;</text>
    <text x="16" y="226" font-family="Inter, sans-serif" font-size="9" fill="#525252">power calculations should use real effect-size priors,</text>
    <text x="16" y="238" font-family="Inter, sans-serif" font-size="9" fill="#525252">not naive Cohen's d on relative abundances.</text>

    <text x="16" y="262" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">Reference DB pinning</text>
    <text x="16" y="276" font-family="Inter, sans-serif" font-size="9" fill="#525252">SILVA, GTDB, RefSeq, UniRef90 all version-stamp;</text>
    <text x="16" y="288" font-family="Inter, sans-serif" font-size="9" fill="#525252">pin the version in the methods section. Releases shift</text>
    <text x="16" y="300" font-family="Inter, sans-serif" font-size="9" fill="#525252">taxonomy boundaries and rename clades.</text>

    <text x="16" y="324" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">Negative controls</text>
    <text x="16" y="338" font-family="Inter, sans-serif" font-size="9" fill="#525252">Extraction blanks and PCR no-template controls are</text>
    <text x="16" y="350" font-family="Inter, sans-serif" font-size="9" fill="#525252">mandatory; reagent-kit contaminants (the "kitome")</text>
    <text x="16" y="362" font-family="Inter, sans-serif" font-size="9" fill="#525252">are real and reproducible (Salter et al., 2014).</text>

    <text x="16" y="386" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">Hybrid designs</text>
    <text x="16" y="400" font-family="Inter, sans-serif" font-size="9" fill="#525252">16S on every sample for cohort screening;</text>
    <text x="16" y="412" font-family="Inter, sans-serif" font-size="9" fill="#525252">shotgun on a stratified subset (~10 — 20 %) for</text>
    <text x="16" y="424" font-family="Inter, sans-serif" font-size="9" fill="#525252">functional content. Saves money, keeps power.</text>

    <text x="16" y="448" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">Batch blocking</text>
    <text x="16" y="462" font-family="Inter, sans-serif" font-size="9" fill="#525252">Randomise samples across extraction batches and</text>
    <text x="16" y="474" font-family="Inter, sans-serif" font-size="9" fill="#525252">flow-cell lanes. Confound a batch with a case label</text>
    <text x="16" y="486" font-family="Inter, sans-serif" font-size="9" fill="#525252">and you have measured batch, not biology.</text>
  </g>

  <!-- Footer -->
  <text x="60" y="624" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">Costs are 2024 list prices for academic core facilities; commercial pricing varies by region and volume.</text>
</svg>
