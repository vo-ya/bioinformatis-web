<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-labelledby="t d">
  <title id="t">Alpha and beta diversity worked numerically on two example communities</title>
  <desc id="d">A two-panel figure that takes two small communities and computes alpha-diversity richness, Shannon entropy, and Simpson&apos;s index for each, then computes the Bray-Curtis dissimilarity and the unweighted UniFrac distance between them. The first community has ten taxa at near-uniform relative abundance and the second has two taxa at eighty and twenty per cent. Numerical results are tabulated beside each formula so the reader can verify by hand. The third panel shows how the same Bray-Curtis distance can yield different UniFrac distances depending on how the shared taxa sit in the phylogenetic tree.</desc>

  <rect x="0" y="0" width="1200" height="640" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="40" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">DIVERSITY METRICS, WORKED BY HAND</text>
  <text x="60" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Two example communities; alpha computed within; beta computed between; phylogeny adds UniFrac.</text>

  <!-- Panel A: Two communities side by side -->
  <g transform="translate(60, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(A)  COMMUNITY A — EVEN</text>
    <!-- 10 bars equal -->
    <g transform="translate(0, 14)">
      <rect x="0"   y="0" width="44" height="60" fill="#1e3a8a" opacity="0.7"/>
      <rect x="46"  y="0" width="44" height="60" fill="#1e3a8a" opacity="0.7"/>
      <rect x="92"  y="6" width="44" height="54" fill="#1e3a8a" opacity="0.7"/>
      <rect x="138" y="0" width="44" height="60" fill="#1e3a8a" opacity="0.7"/>
      <rect x="184" y="6" width="44" height="54" fill="#1e3a8a" opacity="0.7"/>
      <rect x="230" y="0" width="44" height="60" fill="#1e3a8a" opacity="0.7"/>
      <rect x="276" y="6" width="44" height="54" fill="#1e3a8a" opacity="0.7"/>
      <rect x="322" y="0" width="44" height="60" fill="#1e3a8a" opacity="0.7"/>
      <rect x="368" y="6" width="44" height="54" fill="#1e3a8a" opacity="0.7"/>
      <rect x="414" y="0" width="44" height="60" fill="#1e3a8a" opacity="0.7"/>
      <g font-family="JetBrains Mono, monospace" font-size="9" fill="#fafaf9" text-anchor="middle">
        <text x="22"  y="38">t1</text><text x="68"  y="38">t2</text><text x="114" y="38">t3</text>
        <text x="160" y="38">t4</text><text x="206" y="38">t5</text><text x="252" y="38">t6</text>
        <text x="298" y="38">t7</text><text x="344" y="38">t8</text><text x="390" y="38">t9</text>
        <text x="436" y="38">t10</text>
      </g>
    </g>
    <text x="0" y="92" font-family="Inter, sans-serif" font-size="9" fill="#525252">10 taxa, p ≈ 0.10 each</text>

    <text x="510" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(B)  COMMUNITY B — UNEVEN</text>
    <g transform="translate(510, 14)">
      <rect x="0"  y="0"  width="180" height="60" fill="#b45309" opacity="0.7"/>
      <rect x="184" y="42" width="44"  height="18" fill="#b45309" opacity="0.7"/>
      <g font-family="JetBrains Mono, monospace" font-size="9" fill="#fafaf9" text-anchor="middle">
        <text x="90"  y="36">t1  (0.80)</text>
        <text x="206" y="54">t2</text>
      </g>
    </g>
    <text x="510" y="92" font-family="Inter, sans-serif" font-size="9" fill="#525252">2 taxa, p = (0.80, 0.20)</text>
  </g>

  <!-- Panel B: Alpha diversity formulas + values -->
  <g transform="translate(60, 230)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">ALPHA DIVERSITY  (WITHIN-SAMPLE)</text>

    <!-- Header -->
    <g transform="translate(0, 18)">
      <rect x="0" y="0" width="1080" height="22" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.5"/>
      <text x="14" y="15" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#374151">metric</text>
      <text x="320" y="15" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#374151">formula</text>
      <text x="680" y="15" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#374151">community A</text>
      <text x="880" y="15" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#374151">community B</text>
    </g>

    <g transform="translate(0, 46)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
      <text x="14" y="0" font-weight="600">richness  S</text>
      <text x="14" y="14" font-size="9" fill="#525252">count of observed taxa</text>
      <text x="320" y="0" font-family="JetBrains Mono, monospace" fill="#0a0a0a">S = |{i : n_i &gt; 0}|</text>
      <text x="680" y="0" font-family="JetBrains Mono, monospace" font-weight="600" fill="#1e3a8a">10</text>
      <text x="880" y="0" font-family="JetBrains Mono, monospace" font-weight="600" fill="#b45309">2</text>
    </g>

    <line x1="0" y1="76" x2="1080" y2="76" stroke="#e5e3dc" stroke-width="0.5"/>

    <g transform="translate(0, 90)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
      <text x="14" y="0" font-weight="600">Shannon  H&apos;</text>
      <text x="14" y="14" font-size="9" fill="#525252">information-theoretic richness + evenness</text>
      <text x="320" y="0" font-family="JetBrains Mono, monospace" fill="#0a0a0a">H&apos; = − Σ p_i · log p_i</text>
      <text x="680" y="0" font-family="JetBrains Mono, monospace" font-weight="600" fill="#1e3a8a">log 10 ≈ 2.303 nats</text>
      <text x="880" y="0" font-family="JetBrains Mono, monospace" font-weight="600" fill="#b45309">0.500 nats</text>
    </g>

    <line x1="0" y1="120" x2="1080" y2="120" stroke="#e5e3dc" stroke-width="0.5"/>

    <g transform="translate(0, 134)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
      <text x="14" y="0" font-weight="600">Simpson  D</text>
      <text x="14" y="14" font-size="9" fill="#525252">prob. two random reads differ</text>
      <text x="320" y="0" font-family="JetBrains Mono, monospace" fill="#0a0a0a">D = 1 − Σ p_i²</text>
      <text x="680" y="0" font-family="JetBrains Mono, monospace" font-weight="600" fill="#1e3a8a">0.900</text>
      <text x="880" y="0" font-family="JetBrains Mono, monospace" font-weight="600" fill="#b45309">0.320</text>
    </g>

    <line x1="0" y1="164" x2="1080" y2="164" stroke="#e5e3dc" stroke-width="0.5"/>

    <g transform="translate(0, 178)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
      <text x="14" y="0" font-weight="600">Faith&apos;s PD</text>
      <text x="14" y="14" font-size="9" fill="#525252">sum of branch lengths spanned</text>
      <text x="320" y="0" font-family="JetBrains Mono, monospace" fill="#0a0a0a">PD = Σ_{b ∈ tree(S)} ℓ_b</text>
      <text x="680" y="0" font-family="JetBrains Mono, monospace" font-style="italic" fill="#525252">tree-dependent</text>
      <text x="880" y="0" font-family="JetBrains Mono, monospace" font-style="italic" fill="#525252">tree-dependent</text>
    </g>
  </g>

  <!-- Panel C: Beta diversity -->
  <g transform="translate(60, 440)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">BETA DIVERSITY  (BETWEEN-SAMPLE)</text>

    <g transform="translate(0, 18)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
      <rect x="0" y="0" width="1080" height="22" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.5"/>
      <text x="14"  y="15" font-weight="700">metric</text>
      <text x="320" y="15" font-weight="700">formula</text>
      <text x="680" y="15" font-weight="700">A vs B</text>
      <text x="880" y="15" font-weight="700">interpretation</text>
    </g>

    <g transform="translate(0, 46)">
      <text x="14"  y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">Bray-Curtis</text>
      <text x="14"  y="14" font-family="Inter, sans-serif" font-size="9" fill="#525252">compositional difference</text>
      <text x="320" y="0" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">d_BC = Σ |a_i − b_i| / Σ (a_i + b_i)</text>
      <text x="680" y="0" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#1e3a8a">0.90</text>
      <text x="880" y="0" font-family="Inter, sans-serif" font-size="10" fill="#525252">A and B share nearly nothing</text>
    </g>

    <line x1="0" y1="76" x2="1080" y2="76" stroke="#e5e3dc" stroke-width="0.5"/>

    <g transform="translate(0, 90)">
      <text x="14"  y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">Jaccard</text>
      <text x="14"  y="14" font-family="Inter, sans-serif" font-size="9" fill="#525252">presence / absence</text>
      <text x="320" y="0" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">d_J = 1 − |A ∩ B| / |A ∪ B|</text>
      <text x="680" y="0" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#1e3a8a">0.80</text>
      <text x="880" y="0" font-family="Inter, sans-serif" font-size="10" fill="#525252">B&apos;s 2 taxa overlap A&apos;s 10</text>
    </g>

    <line x1="0" y1="120" x2="1080" y2="120" stroke="#e5e3dc" stroke-width="0.5"/>

    <g transform="translate(0, 134)">
      <text x="14"  y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">UniFrac (unweighted)</text>
      <text x="14"  y="14" font-family="Inter, sans-serif" font-size="9" fill="#525252">phylogenetic — branch fraction not shared</text>
      <text x="320" y="0" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">d_U = Σ_unique ℓ_b / Σ_all ℓ_b</text>
      <text x="680" y="0" font-family="JetBrains Mono, monospace" font-size="10" font-style="italic" fill="#525252">0.30 — 0.85</text>
      <text x="880" y="0" font-family="Inter, sans-serif" font-size="10" fill="#525252">depends on tree placement</text>
    </g>

    <line x1="0" y1="164" x2="1080" y2="164" stroke="#e5e3dc" stroke-width="0.5"/>

    <g transform="translate(0, 178)" font-family="Inter, sans-serif" font-size="9" fill="#525252">
      <text x="14" y="0" font-style="italic">When shared taxa are phylogenetically close, UniFrac is small even if Bray-Curtis is large — the two metrics disagree on cousins versus strangers.</text>
    </g>
  </g>
</svg>
