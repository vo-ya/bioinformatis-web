<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-labelledby="t d">
  <title id="t">Three biological scenarios that produce identical relative-abundance shifts</title>
  <desc id="d">A numerical worked example demonstrating compositional bias. Three scenarios are constructed with completely different absolute abundance changes: in the first species A doubles while species B is unchanged; in the second species A is unchanged while species B halves; in the third both species are unchanged in absolute count but the sequencing library is deeper in the case sample than in the control. All three produce the same relative-abundance vector after normalisation to a constant library size, and a naive t-test reports the same significance in all three. A centred log-ratio transform separates the first two from the third by reference to a third unchanged taxon. The figure is the chapter&apos;s warning about why ANCOM-BC, ALDEx2, and songbird exist.</desc>

  <rect x="0" y="0" width="1200" height="660" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="40" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">COMPOSITIONAL TRAP — THREE BIOLOGIES, ONE OBSERVATION</text>
  <text x="60" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Three absolute-abundance scenarios produce identical relative-abundance vectors. A naive t-test calls them all significant.</text>

  <!-- Common reference panel for absolute counts -->
  <g transform="translate(60, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">CONTROL SAMPLE  —  absolute counts per gram</text>
    <g transform="translate(0, 14)">
      <rect x="0"   y="0" width="80" height="60" fill="#1e3a8a" opacity="0.6"/>
      <text x="40" y="36" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#fafaf9" font-weight="700">A: 100</text>
      <rect x="84"  y="0" width="80" height="60" fill="#b45309" opacity="0.6"/>
      <text x="124" y="36" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#fafaf9" font-weight="700">B: 100</text>
      <rect x="168" y="0" width="80" height="60" fill="#065f46" opacity="0.6"/>
      <text x="208" y="36" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#fafaf9" font-weight="700">C: 100</text>
    </g>
    <text x="0" y="92" font-family="Inter, sans-serif" font-size="9" fill="#525252">Total = 300; relative = (1/3, 1/3, 1/3)</text>
  </g>

  <!-- Scenario 1: A doubles -->
  <g transform="translate(60, 220)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#7c3aed" letter-spacing="0.06em">SCENARIO 1  —  A DOUBLES,  B AND C UNCHANGED</text>
    <g transform="translate(0, 14)">
      <rect x="0"   y="0" width="80" height="100" fill="#1e3a8a" opacity="0.7"/>
      <text x="40" y="56" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#fafaf9" font-weight="700">A: 200</text>
      <rect x="84"  y="40" width="80" height="60" fill="#b45309" opacity="0.7"/>
      <text x="124" y="76" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#fafaf9" font-weight="700">B: 100</text>
      <rect x="168" y="40" width="80" height="60" fill="#065f46" opacity="0.7"/>
      <text x="208" y="76" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#fafaf9" font-weight="700">C: 100</text>
    </g>
    <text x="0" y="134" font-family="Inter, sans-serif" font-size="9" fill="#525252">Total = 400; relative = (0.50, 0.25, 0.25)</text>
  </g>

  <g transform="translate(440, 220)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#7c3aed" letter-spacing="0.06em">SCENARIO 2  —  B AND C HALVE,  A UNCHANGED</text>
    <g transform="translate(0, 14)">
      <rect x="0"   y="0" width="80" height="100" fill="#1e3a8a" opacity="0.7"/>
      <text x="40" y="56" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#fafaf9" font-weight="700">A: 100</text>
      <rect x="84"  y="50" width="80" height="50" fill="#b45309" opacity="0.7"/>
      <text x="124" y="80" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#fafaf9" font-weight="700">B: 50</text>
      <rect x="168" y="50" width="80" height="50" fill="#065f46" opacity="0.7"/>
      <text x="208" y="80" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#fafaf9" font-weight="700">C: 50</text>
    </g>
    <text x="0" y="134" font-family="Inter, sans-serif" font-size="9" fill="#525252">Total = 200; relative = (0.50, 0.25, 0.25)</text>
  </g>

  <g transform="translate(820, 220)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#7c3aed" letter-spacing="0.06em">SCENARIO 3  —  ALL UNCHANGED,  DEEPER LIBRARY</text>
    <g transform="translate(0, 14)">
      <rect x="0"   y="0" width="80" height="60" fill="#1e3a8a" opacity="0.7"/>
      <text x="40" y="36" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#fafaf9" font-weight="700">A: 100</text>
      <rect x="84"  y="0" width="80" height="60" fill="#b45309" opacity="0.7"/>
      <text x="124" y="36" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#fafaf9" font-weight="700">B: 100</text>
      <rect x="168" y="0" width="80" height="60" fill="#065f46" opacity="0.7"/>
      <text x="208" y="36" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#fafaf9" font-weight="700">C: 100</text>
    </g>
    <text x="0" y="78" font-family="Inter, sans-serif" font-size="9" fill="#525252">Same absolute counts, but the sequencer reads</text>
    <text x="0" y="90" font-family="Inter, sans-serif" font-size="9" fill="#525252">A twice as deeply due to library-prep bias.</text>
    <text x="0" y="108" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252">Observed reads: 2 N_A, N_B, N_C ⇒ relative = (0.50, 0.25, 0.25)</text>
    <text x="0" y="134" font-family="Inter, sans-serif" font-size="9" fill="#525252">A appears enriched; nothing changed biologically.</text>
  </g>

  <!-- Identical relative-abundance bar -->
  <g transform="translate(60, 400)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#dc2626" letter-spacing="0.06em">WHAT THE PIPELINE SEES  —  identical in all three scenarios</text>
    <g transform="translate(0, 14)">
      <rect x="0"   y="0" width="540" height="34" fill="#1e3a8a" opacity="0.7"/>
      <text x="270" y="22" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#fafaf9" font-weight="700">A — 50 %</text>
      <rect x="544" y="0" width="266" height="34" fill="#b45309" opacity="0.7"/>
      <text x="677" y="22" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#fafaf9" font-weight="700">B — 25 %</text>
      <rect x="814" y="0" width="266" height="34" fill="#065f46" opacity="0.7"/>
      <text x="947" y="22" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#fafaf9" font-weight="700">C — 25 %</text>
    </g>
    <text x="0" y="68" font-family="Inter, sans-serif" font-size="10" fill="#525252">Naive t-test on relative abundance ⇒ "A is significantly enriched, B and C are depleted" in all three cases.</text>
  </g>

  <!-- CLR rescue -->
  <g transform="translate(60, 510)">
    <rect x="0" y="0" width="1080" height="130" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.5" rx="3"/>
    <text x="14" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">AITCHISON RESCUE  —  CENTRED LOG-RATIO + REFERENCE FRAME</text>
    <text x="14" y="42" font-family="Inter, sans-serif" font-size="10" fill="#374151">For each sample, compute  <tspan font-family="JetBrains Mono, monospace" fill="#0a0a0a">clr_i = log(x_i)  −  (1 / D) Σ_j log(x_j)</tspan>.  The transform lives in a (D − 1)-dim simplex; differences are scale-invariant.</text>
    <text x="14" y="60" font-family="Inter, sans-serif" font-size="10" fill="#374151">ANCOM-BC adds a per-sample bias term  <tspan font-family="JetBrains Mono, monospace" fill="#0a0a0a">s_i</tspan>  estimated from the data; ALDEx2 averages CLR draws from a Dirichlet-multinomial posterior.</text>
    <text x="14" y="82" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#dc2626">Reference-frame heuristic.</text>
    <text x="160" y="82" font-family="Inter, sans-serif" font-size="10" fill="#374151">If you can name a taxon (or composite) that is biologically invariant — household genes, a known-stable</text>
    <text x="14" y="96" font-family="Inter, sans-serif" font-size="10" fill="#374151">commensal, a spike-in — you can anchor the log-ratio there and recover absolute change. Without one, scenarios 1 and 2 stay confounded.</text>
    <text x="14" y="118" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252">Gloor et al. (2017), Quinn et al. (2018), Lin &amp; Peddada (2020), Morton et al. (2019) on songbird.</text>
  </g>
</svg>
