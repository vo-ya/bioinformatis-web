<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" role="img" aria-labelledby="t d">
  <title id="t">Cas9 ribonucleoprotein at a target DNA site, with PAM recognition and double-strand cleavage</title>
  <desc id="d">A schematic of the Cas9 enzyme loaded with a single guide RNA scanning DNA. The PAM motif NGG is recognised on the protospacer-adjacent strand. The 20-nucleotide spacer base-pairs with the target strand, the HNH and RuvC nuclease domains cut both strands three bases upstream of the PAM, producing a blunt double-strand break that the cell repairs by non-homologous end joining, almost always introducing small indels and a frameshift.</desc>

  <rect width="1200" height="540" fill="#fafaf9"/>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
    <marker id="arr-mut" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
  </defs>

  <!-- Header -->
  <text x="60" y="42" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">CRISPR-CAS9 — PROGRAMMABLE NUCLEASE FOR LOSS-OF-FUNCTION SCREENS</text>
  <text x="60" y="62" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">A 20-nt spacer programs Cas9; a downstream PAM (NGG for SpCas9) licenses cleavage; NHEJ repair drops frame.</text>

  <!-- PANEL A: Cas9 RNP recognising the target -->
  <g transform="translate(60, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(A) RECOGNITION</text>

    <!-- Cas9 lobe shape -->
    <path d="M 0 60 Q -10 30 20 25 L 360 25 Q 400 25 400 65 L 400 130 Q 400 165 360 168 L 240 168 L 220 196 L 200 168 L 20 168 Q -10 165 0 130 Z"
          fill="#eef2ff" stroke="#1e3a8a" stroke-width="2"/>
    <text x="200" y="68" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#1e3a8a" text-anchor="middle">Cas9</text>
    <text x="120" y="120" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">RuvC domain</text>
    <text x="290" y="120" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">HNH domain</text>

    <!-- sgRNA loop hanging out of Cas9 -->
    <path d="M 200 168 Q 200 230 240 230 Q 280 230 280 200" fill="none" stroke="#7c3aed" stroke-width="2"/>
    <text x="305" y="205" font-family="Inter, sans-serif" font-size="10" fill="#7c3aed">scaffold (tracrRNA fusion)</text>

    <!-- DNA target strand (bottom) and non-target strand (top) -->
    <!-- non-target strand (PAM is here NGG) -->
    <g transform="translate(0, 260)">
      <text x="-40" y="-6" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">non-target (PAM-containing) strand</text>
      <line x1="0" y1="0" x2="600" y2="0" stroke="#374151" stroke-width="1"/>
      <g font-family="JetBrains Mono, monospace" font-size="12" font-weight="600">
        <text x="40"  y="-4" fill="#374151" text-anchor="middle">5'</text>
        <text x="80"  y="-4" fill="#374151" text-anchor="middle">G</text>
        <text x="100" y="-4" fill="#374151" text-anchor="middle">T</text>
        <text x="120" y="-4" fill="#374151" text-anchor="middle">C</text>
        <text x="140" y="-4" fill="#374151" text-anchor="middle">A</text>
        <text x="160" y="-4" fill="#374151" text-anchor="middle">G</text>
        <text x="180" y="-4" fill="#374151" text-anchor="middle">A</text>
        <text x="200" y="-4" fill="#374151" text-anchor="middle">C</text>
        <text x="220" y="-4" fill="#374151" text-anchor="middle">G</text>
        <text x="240" y="-4" fill="#374151" text-anchor="middle">A</text>
        <text x="260" y="-4" fill="#374151" text-anchor="middle">A</text>
        <text x="280" y="-4" fill="#374151" text-anchor="middle">G</text>
        <text x="300" y="-4" fill="#374151" text-anchor="middle">C</text>
        <text x="320" y="-4" fill="#374151" text-anchor="middle">T</text>
        <text x="340" y="-4" fill="#374151" text-anchor="middle">T</text>
        <text x="360" y="-4" fill="#374151" text-anchor="middle">C</text>
        <text x="380" y="-4" fill="#374151" text-anchor="middle">A</text>
        <text x="400" y="-4" fill="#374151" text-anchor="middle">A</text>
        <text x="420" y="-4" fill="#374151" text-anchor="middle">G</text>
        <text x="440" y="-4" fill="#374151" text-anchor="middle">T</text>
        <text x="460" y="-4" fill="#374151" text-anchor="middle">C</text>
        <text x="480" y="-4" fill="#374151" text-anchor="middle">A</text>
        <!-- PAM highlighted -->
        <rect x="490" y="-18" width="62" height="20" fill="#fff7ed" stroke="#b45309" stroke-width="1.2"/>
        <text x="500" y="-4" fill="#b45309" font-weight="700">A</text>
        <text x="520" y="-4" fill="#b45309" font-weight="700">G</text>
        <text x="540" y="-4" fill="#b45309" font-weight="700">G</text>
        <text x="580" y="-4" fill="#374151" text-anchor="middle">3'</text>
      </g>
      <text x="521" y="-26" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#b45309" text-anchor="middle">PAM (NGG)</text>
    </g>

    <!-- target strand (bottom) -->
    <g transform="translate(0, 295)">
      <line x1="0" y1="0" x2="600" y2="0" stroke="#374151" stroke-width="1"/>
      <g font-family="JetBrains Mono, monospace" font-size="12" font-weight="600">
        <text x="40"  y="14" fill="#374151" text-anchor="middle">3'</text>
        <text x="80"  y="14" fill="#374151" text-anchor="middle">C</text>
        <text x="100" y="14" fill="#374151" text-anchor="middle">A</text>
        <text x="120" y="14" fill="#374151" text-anchor="middle">G</text>
        <text x="140" y="14" fill="#374151" text-anchor="middle">T</text>
        <text x="160" y="14" fill="#374151" text-anchor="middle">C</text>
        <text x="180" y="14" fill="#374151" text-anchor="middle">T</text>
        <text x="200" y="14" fill="#374151" text-anchor="middle">G</text>
        <text x="220" y="14" fill="#374151" text-anchor="middle">C</text>
        <text x="240" y="14" fill="#374151" text-anchor="middle">T</text>
        <text x="260" y="14" fill="#374151" text-anchor="middle">T</text>
        <text x="280" y="14" fill="#374151" text-anchor="middle">C</text>
        <text x="300" y="14" fill="#374151" text-anchor="middle">G</text>
        <text x="320" y="14" fill="#374151" text-anchor="middle">A</text>
        <text x="340" y="14" fill="#374151" text-anchor="middle">A</text>
        <text x="360" y="14" fill="#374151" text-anchor="middle">G</text>
        <text x="380" y="14" fill="#374151" text-anchor="middle">T</text>
        <text x="400" y="14" fill="#374151" text-anchor="middle">T</text>
        <text x="420" y="14" fill="#374151" text-anchor="middle">C</text>
        <text x="440" y="14" fill="#374151" text-anchor="middle">A</text>
        <text x="460" y="14" fill="#374151" text-anchor="middle">G</text>
        <text x="480" y="14" fill="#374151" text-anchor="middle">T</text>
        <text x="500" y="14" fill="#374151" text-anchor="middle">T</text>
        <text x="520" y="14" fill="#374151" text-anchor="middle">C</text>
        <text x="540" y="14" fill="#374151" text-anchor="middle">C</text>
        <text x="580" y="14" fill="#374151" text-anchor="middle">5'</text>
      </g>
    </g>

    <!-- spacer-target pairing (bracket beneath) -->
    <g transform="translate(70, 330)">
      <line x1="0" y1="0" x2="420" y2="0" stroke="#7c3aed" stroke-width="1.4"/>
      <line x1="0" y1="0" x2="0" y2="-6" stroke="#7c3aed" stroke-width="1.4"/>
      <line x1="420" y1="0" x2="420" y2="-6" stroke="#7c3aed" stroke-width="1.4"/>
      <text x="210" y="18" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#7c3aed" text-anchor="middle">20 nt spacer · base-pairs with target strand</text>
    </g>

    <!-- cleavage scissors at 3 bp upstream of PAM -->
    <line x1="475" y1="240" x2="475" y2="320" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3 3"/>
    <text x="475" y="234" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#dc2626" text-anchor="middle">cut · 3 bp upstream of PAM</text>
  </g>

  <!-- PANEL B: NHEJ repair → indel → frameshift -->
  <g transform="translate(720, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(B) REPAIR + LOSS OF FUNCTION</text>

    <!-- Before cut -->
    <g transform="translate(0, 30)" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-weight="400">wild-type ORF · reading frame</text>
      <text x="0" y="20" fill="#374151">ATG · GCT · ACA · GAA · GCT · TCA · GGA</text>
      <text x="0" y="36" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" font-weight="400">M · A · T · E · A · S · G</text>
    </g>

    <!-- arrow Cas9 cut + NHEJ -->
    <g transform="translate(0, 90)">
      <line x1="20" y1="0" x2="20" y2="40" stroke="#b45309" stroke-width="1.5" marker-end="url(#arr-mut)"/>
      <text x="34" y="14" font-family="Inter, sans-serif" font-size="10" fill="#b45309" font-weight="600">Cas9 cut</text>
      <text x="34" y="30" font-family="Inter, sans-serif" font-size="10" fill="#b45309">NHEJ — short, error-prone</text>
    </g>

    <!-- After repair: indel + frameshift -->
    <g transform="translate(0, 160)" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-weight="400">edited allele · 1-bp insertion</text>
      <text x="0" y="20" fill="#374151">ATG · GCT · ACA · </text>
      <text x="178" y="20" fill="#dc2626">G</text>
      <text x="196" y="20" fill="#374151">GAA · GCT · TCA · GGA</text>
      <text x="0" y="38" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" font-weight="400">M · A · T · </text>
      <text x="88" y="38" font-family="Inter, sans-serif" font-size="9" fill="#dc2626" font-weight="700">[frameshift]</text>
      <text x="160" y="38" font-family="Inter, sans-serif" font-size="9" fill="#dc2626" font-weight="400">→ premature stop · truncated protein</text>
    </g>

    <!-- legend box -->
    <g transform="translate(0, 240)">
      <rect x="0" y="0" width="430" height="62" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.5"/>
      <text x="14" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a">In practice — Cas9 + sgRNA in a cell</text>
      <text x="14" y="36" font-family="Inter, sans-serif" font-size="10" fill="#374151">— ~85–95% of edits are out-of-frame indels (1–10 bp).</text>
      <text x="14" y="52" font-family="Inter, sans-serif" font-size="10" fill="#374151">— Bi-allelic frameshift = effective gene knockout in that cell.</text>
    </g>
  </g>

  <!-- Footnote -->
  <text x="60" y="520" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">SpCas9 numbers; alternative orthologues (SaCas9, AsCas12a) use different PAM motifs and cut geometries.</text>
</svg>
