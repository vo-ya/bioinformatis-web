<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" role="img" aria-labelledby="t d">
  <title id="t">A pooled CRISPR screen as a sparse linear-inverse problem</title>
  <desc id="d">The observed log fold-change vector across roughly eighty thousand sgRNAs equals a sparse design matrix A times a per-gene effect vector x plus Gaussian sequencing noise. The matrix A has four non-zero entries per column corresponding to the four sgRNAs targeting each gene. The figure shows the matrix sparsity pattern, the dimensions, and a side panel of recovery solvers including MAGeCK, DrugZ, BAGEL2 and the constrained l1 / ridge solvers used by CRISPRcleanR and Chronos.</desc>

  <rect width="1200" height="580" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="42" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">POOLED SCREEN AS COMPRESSED SENSING — y = A x + ε</text>
  <text x="60" y="62" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">~80,000 sgRNA measurements, ~20,000 gene effects, four-per-column sparsity. Statistical solvers invert the system gene-by-gene.</text>

  <!-- y vector (sgRNA log fold changes) -->
  <g transform="translate(80, 120)">
    <text x="0" y="-12" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">y  ·  sgRNA LFC</text>
    <rect x="0" y="0" width="60" height="380" fill="#fafaf9" stroke="#374151" stroke-width="1.2"/>
    <!-- bars showing LFC values, mostly near zero, some negative (dropout), some positive -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#374151">
      <!-- centerline at x=30 -->
      <line x1="30" y1="0" x2="30" y2="380" stroke="#8a8a85" stroke-width="0.5" stroke-dasharray="2 3"/>
      <!-- 30 bars top to bottom -->
      <rect x="30" y="8"   width="6"  height="6" fill="#374151"/>
      <rect x="18" y="20"  width="12" height="6" fill="#dc2626"/>
      <rect x="30" y="32"  width="3"  height="6" fill="#374151"/>
      <rect x="30" y="44"  width="9"  height="6" fill="#374151"/>
      <rect x="12" y="56"  width="18" height="6" fill="#dc2626"/>
      <rect x="14" y="68"  width="16" height="6" fill="#dc2626"/>
      <rect x="30" y="80"  width="3"  height="6" fill="#374151"/>
      <rect x="30" y="92"  width="14" height="6" fill="#065f46"/>
      <rect x="20" y="104" width="10" height="6" fill="#dc2626"/>
      <rect x="30" y="116" width="4"  height="6" fill="#374151"/>
      <rect x="30" y="128" width="8"  height="6" fill="#374151"/>
      <rect x="22" y="140" width="8"  height="6" fill="#374151"/>
      <rect x="30" y="152" width="2"  height="6" fill="#374151"/>
      <rect x="8"  y="164" width="22" height="6" fill="#dc2626"/>
      <rect x="30" y="176" width="11" height="6" fill="#065f46"/>
      <rect x="24" y="188" width="6"  height="6" fill="#374151"/>
      <rect x="30" y="200" width="5"  height="6" fill="#374151"/>
      <rect x="16" y="212" width="14" height="6" fill="#dc2626"/>
      <rect x="30" y="224" width="3"  height="6" fill="#374151"/>
      <rect x="30" y="236" width="9"  height="6" fill="#374151"/>
      <rect x="30" y="248" width="14" height="6" fill="#065f46"/>
      <rect x="30" y="260" width="6"  height="6" fill="#374151"/>
      <rect x="28" y="272" width="2"  height="6" fill="#374151"/>
      <rect x="10" y="284" width="20" height="6" fill="#dc2626"/>
      <rect x="30" y="296" width="4"  height="6" fill="#374151"/>
      <rect x="30" y="308" width="11" height="6" fill="#065f46"/>
      <rect x="30" y="320" width="3"  height="6" fill="#374151"/>
      <rect x="20" y="332" width="10" height="6" fill="#dc2626"/>
      <rect x="30" y="344" width="7"  height="6" fill="#374151"/>
      <rect x="14" y="356" width="16" height="6" fill="#dc2626"/>
      <rect x="30" y="368" width="6"  height="6" fill="#374151"/>
    </g>
    <text x="30" y="398" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">~80k rows</text>
    <text x="30" y="-30" font-family="JetBrains Mono, monospace" font-size="11" fill="#dc2626" text-anchor="middle">drop</text>
    <text x="-2" y="412" font-family="Inter, sans-serif" font-size="9" fill="#525252">−</text>
    <text x="62" y="412" font-family="Inter, sans-serif" font-size="9" fill="#525252">+</text>
  </g>

  <!-- = sign -->
  <text x="170" y="320" font-family="Inter, sans-serif" font-size="36" font-weight="600" fill="#374151" text-anchor="middle">=</text>

  <!-- Matrix A (sgRNA × gene mapping) -->
  <g transform="translate(220, 120)">
    <text x="0" y="-12" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">A  ·  sgRNA → gene · sparse · 4 per column</text>
    <rect x="0" y="0" width="380" height="380" fill="#fafaf9" stroke="#374151" stroke-width="1.2"/>
    <!-- sparsity pattern: 4 cells per column lit, otherwise faint -->
    <g>
      <!-- background grid faint -->
      <g stroke="#e5e3dc" stroke-width="0.4">
        <line x1="0" y1="38" x2="380" y2="38"/>
        <line x1="0" y1="76" x2="380" y2="76"/>
        <line x1="0" y1="114" x2="380" y2="114"/>
        <line x1="0" y1="152" x2="380" y2="152"/>
        <line x1="0" y1="190" x2="380" y2="190"/>
        <line x1="0" y1="228" x2="380" y2="228"/>
        <line x1="0" y1="266" x2="380" y2="266"/>
        <line x1="0" y1="304" x2="380" y2="304"/>
        <line x1="0" y1="342" x2="380" y2="342"/>
      </g>
      <!-- 10 gene columns, each ~38px wide. For each column, mark 4 random row blocks -->
      <!-- col 1 (x=0..38) -->
      <rect x="6"  y="16"  width="26" height="10" fill="#1e3a8a"/>
      <rect x="6"  y="118" width="26" height="10" fill="#1e3a8a"/>
      <rect x="6"  y="252" width="26" height="10" fill="#1e3a8a"/>
      <rect x="6"  y="334" width="26" height="10" fill="#1e3a8a"/>
      <!-- col 2 -->
      <rect x="44" y="48"  width="26" height="10" fill="#1e3a8a"/>
      <rect x="44" y="92"  width="26" height="10" fill="#1e3a8a"/>
      <rect x="44" y="196" width="26" height="10" fill="#1e3a8a"/>
      <rect x="44" y="308" width="26" height="10" fill="#1e3a8a"/>
      <!-- col 3 -->
      <rect x="82" y="62"  width="26" height="10" fill="#1e3a8a"/>
      <rect x="82" y="156" width="26" height="10" fill="#1e3a8a"/>
      <rect x="82" y="218" width="26" height="10" fill="#1e3a8a"/>
      <rect x="82" y="346" width="26" height="10" fill="#1e3a8a"/>
      <!-- col 4 -->
      <rect x="120" y="22"  width="26" height="10" fill="#1e3a8a"/>
      <rect x="120" y="136" width="26" height="10" fill="#1e3a8a"/>
      <rect x="120" y="244" width="26" height="10" fill="#1e3a8a"/>
      <rect x="120" y="296" width="26" height="10" fill="#1e3a8a"/>
      <!-- col 5 -->
      <rect x="158" y="80"  width="26" height="10" fill="#1e3a8a"/>
      <rect x="158" y="124" width="26" height="10" fill="#1e3a8a"/>
      <rect x="158" y="214" width="26" height="10" fill="#1e3a8a"/>
      <rect x="158" y="318" width="26" height="10" fill="#1e3a8a"/>
      <!-- col 6 -->
      <rect x="196" y="48"  width="26" height="10" fill="#1e3a8a"/>
      <rect x="196" y="170" width="26" height="10" fill="#1e3a8a"/>
      <rect x="196" y="232" width="26" height="10" fill="#1e3a8a"/>
      <rect x="196" y="356" width="26" height="10" fill="#1e3a8a"/>
      <!-- col 7 -->
      <rect x="234" y="14"  width="26" height="10" fill="#1e3a8a"/>
      <rect x="234" y="108" width="26" height="10" fill="#1e3a8a"/>
      <rect x="234" y="278" width="26" height="10" fill="#1e3a8a"/>
      <rect x="234" y="346" width="26" height="10" fill="#1e3a8a"/>
      <!-- col 8 -->
      <rect x="272" y="60"  width="26" height="10" fill="#1e3a8a"/>
      <rect x="272" y="148" width="26" height="10" fill="#1e3a8a"/>
      <rect x="272" y="248" width="26" height="10" fill="#1e3a8a"/>
      <rect x="272" y="304" width="26" height="10" fill="#1e3a8a"/>
      <!-- col 9 -->
      <rect x="310" y="36"  width="26" height="10" fill="#1e3a8a"/>
      <rect x="310" y="92"  width="26" height="10" fill="#1e3a8a"/>
      <rect x="310" y="216" width="26" height="10" fill="#1e3a8a"/>
      <rect x="310" y="290" width="26" height="10" fill="#1e3a8a"/>
      <!-- col 10 -->
      <rect x="348" y="68"  width="26" height="10" fill="#1e3a8a"/>
      <rect x="348" y="174" width="26" height="10" fill="#1e3a8a"/>
      <rect x="348" y="260" width="26" height="10" fill="#1e3a8a"/>
      <rect x="348" y="332" width="26" height="10" fill="#1e3a8a"/>
    </g>
    <text x="190" y="398" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">~20k columns (genes)</text>
    <text x="-12" y="190" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle" transform="rotate(-90, -12, 190)">~80k rows (sgRNAs)</text>
  </g>

  <!-- × sign -->
  <text x="618" y="320" font-family="Inter, sans-serif" font-size="36" font-weight="600" fill="#374151" text-anchor="middle">×</text>

  <!-- x vector (gene effects) -->
  <g transform="translate(640, 120)">
    <text x="0" y="-12" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">x  ·  gene effect</text>
    <rect x="0" y="0" width="60" height="380" fill="#fafaf9" stroke="#374151" stroke-width="1.2"/>
    <line x1="30" y1="0" x2="30" y2="380" stroke="#8a8a85" stroke-width="0.5" stroke-dasharray="2 3"/>
    <g>
      <rect x="30" y="14"  width="3"  height="14" fill="#374151"/>
      <rect x="30" y="44"  width="6"  height="14" fill="#065f46"/>
      <rect x="14" y="74"  width="16" height="14" fill="#dc2626"/>
      <rect x="30" y="104" width="2"  height="14" fill="#374151"/>
      <rect x="30" y="134" width="4"  height="14" fill="#374151"/>
      <rect x="6"  y="164" width="24" height="14" fill="#dc2626"/>
      <rect x="30" y="194" width="3"  height="14" fill="#374151"/>
      <rect x="30" y="224" width="11" height="14" fill="#065f46"/>
      <rect x="30" y="254" width="2"  height="14" fill="#374151"/>
      <rect x="20" y="284" width="10" height="14" fill="#dc2626"/>
      <rect x="30" y="314" width="5"  height="14" fill="#374151"/>
      <rect x="10" y="344" width="20" height="14" fill="#dc2626"/>
    </g>
    <text x="30" y="398" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">~20k rows</text>
    <text x="78" y="74"  font-family="Inter, sans-serif" font-size="9" fill="#dc2626">essential gene</text>
    <text x="78" y="164" font-family="Inter, sans-serif" font-size="9" fill="#dc2626">essential gene</text>
    <text x="78" y="224" font-family="Inter, sans-serif" font-size="9" fill="#065f46">resistance hit</text>
  </g>

  <!-- + ε -->
  <text x="820" y="320" font-family="Inter, sans-serif" font-size="28" font-weight="500" fill="#374151" text-anchor="middle">+ ε</text>

  <!-- Solver legend box -->
  <g transform="translate(870, 120)">
    <rect x="0" y="0" width="270" height="380" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.5"/>
    <text x="14" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">SOLVERS — invert per gene</text>

    <g font-family="Inter, sans-serif" font-size="10" fill="#374151">
      <text x="14" y="50" font-weight="700">MAGeCK · RRA (Li 2014)</text>
      <text x="14" y="66" fill="#525252">rank-based · Beta(1, k) null · the standard.</text>

      <text x="14" y="102" font-weight="700">DrugZ (Wang 2017)</text>
      <text x="14" y="118" fill="#525252">Z-score · paired-sample drug screens.</text>

      <text x="14" y="154" font-weight="700">BAGEL2 (Kim 2019)</text>
      <text x="14" y="170" fill="#525252">Bayes log-odds vs CEG/non-essential priors.</text>

      <text x="14" y="206" font-weight="700">CRISPRcleanR / CERES</text>
      <text x="14" y="222" fill="#525252">least-squares with copy-number correction.</text>

      <text x="14" y="258" font-weight="700">Chronos (Dempster 2021)</text>
      <text x="14" y="274" fill="#525252">time-resolved per-sgRNA fitness model.</text>

      <text x="14" y="310" font-weight="700" fill="#7c3aed">Statistical kinship</text>
      <text x="14" y="326" fill="#525252">Same family as ℓ₁-penalised LASSO and the</text>
      <text x="14" y="340" fill="#525252">matched filter — pick the prior that matches</text>
      <text x="14" y="354" fill="#525252">your noise model.</text>
    </g>
  </g>

  <!-- Footnote -->
  <text x="60" y="558" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">Sparsity buys identifiability — four measurements per unknown plus replicates is enough to recover ~20k gene effects despite ~80k noisy observations.</text>
</svg>
