<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" role="img" aria-labelledby="t d">
  <title id="t">Robust rank aggregation: the Beta(1, k) null and gene-level p-value</title>
  <desc id="d">Two panels. The left panel shows, for three genes with four sgRNAs each, the per-sgRNA rank percentiles under the null. A pan-essential gene has all four percentiles in the top one percent; a context-essential gene has three of four near the top; a non-functional gene has uniformly distributed percentiles. The right panel shows the Beta(1, 4) probability density and cumulative distribution function, which is the null distribution for the minimum of four independent uniform draws. MAGeCK reports the gene p-value as the Beta(1, k) tail at the observed minimum rank.</desc>

  <rect width="1200" height="540" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="42" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">ROBUST RANK AGGREGATION — MAGECK'S BETA(1, k) NULL</text>
  <text x="60" y="62" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Concordant low percentiles across k sgRNAs ⇒ small minimum order statistic ⇒ small Beta tail probability.</text>

  <!-- LEFT PANEL: three genes with sgRNA percentiles on a [0, 1] axis -->
  <g transform="translate(80, 110)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(A) THREE GENES · sgRNA RANK PERCENTILES</text>

    <!-- gene 1 = essential -->
    <g transform="translate(0, 40)">
      <text x="-6" y="14" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="end">RPL5</text>
      <text x="-6" y="28" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" text-anchor="end">pan-essential</text>
      <line x1="0" y1="16" x2="500" y2="16" stroke="#374151" stroke-width="1"/>
      <line x1="0" y1="12" x2="0" y2="20" stroke="#374151"/>
      <line x1="500" y1="12" x2="500" y2="20" stroke="#374151"/>
      <text x="0" y="40" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" text-anchor="middle">0</text>
      <text x="500" y="40" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" text-anchor="middle">1</text>
      <!-- 4 sgRNAs near 0 -->
      <circle cx="8"  cy="16" r="5" fill="#dc2626" stroke="#0a0a0a" stroke-width="0.6"/>
      <circle cx="20" cy="16" r="5" fill="#dc2626" stroke="#0a0a0a" stroke-width="0.6"/>
      <circle cx="34" cy="16" r="5" fill="#dc2626" stroke="#0a0a0a" stroke-width="0.6"/>
      <circle cx="48" cy="16" r="5" fill="#dc2626" stroke="#0a0a0a" stroke-width="0.6"/>
      <text x="60" y="20" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">→ min = 0.002,  p = 4 · 0.002 = 8·10⁻³</text>
    </g>

    <!-- gene 2 = mostly essential with one missing -->
    <g transform="translate(0, 100)">
      <text x="-6" y="14" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="end">KRAS</text>
      <text x="-6" y="28" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" text-anchor="end">context-essential</text>
      <line x1="0" y1="16" x2="500" y2="16" stroke="#374151" stroke-width="1"/>
      <line x1="0" y1="12" x2="0" y2="20" stroke="#374151"/>
      <line x1="500" y1="12" x2="500" y2="20" stroke="#374151"/>
      <circle cx="14"  cy="16" r="5" fill="#dc2626" stroke="#0a0a0a" stroke-width="0.6"/>
      <circle cx="36"  cy="16" r="5" fill="#dc2626" stroke="#0a0a0a" stroke-width="0.6"/>
      <circle cx="60"  cy="16" r="5" fill="#dc2626" stroke="#0a0a0a" stroke-width="0.6"/>
      <circle cx="320" cy="16" r="5" fill="#8a8a85" stroke="#0a0a0a" stroke-width="0.6"/>
      <text x="80" y="20" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">→ median-rank RRA tolerates one non-functional sgRNA</text>
    </g>

    <!-- gene 3 = non-essential -->
    <g transform="translate(0, 160)">
      <text x="-6" y="14" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="end">non-target</text>
      <text x="-6" y="28" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" text-anchor="end">null</text>
      <line x1="0" y1="16" x2="500" y2="16" stroke="#374151" stroke-width="1"/>
      <line x1="0" y1="12" x2="0" y2="20" stroke="#374151"/>
      <line x1="500" y1="12" x2="500" y2="20" stroke="#374151"/>
      <circle cx="92"  cy="16" r="5" fill="#8a8a85" stroke="#0a0a0a" stroke-width="0.6"/>
      <circle cx="208" cy="16" r="5" fill="#8a8a85" stroke="#0a0a0a" stroke-width="0.6"/>
      <circle cx="318" cy="16" r="5" fill="#8a8a85" stroke="#0a0a0a" stroke-width="0.6"/>
      <circle cx="442" cy="16" r="5" fill="#8a8a85" stroke="#0a0a0a" stroke-width="0.6"/>
      <text x="0" y="48" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">→ percentiles ≈ uniform on [0, 1]; no enrichment of small ranks.</text>
    </g>

    <!-- Math box -->
    <g transform="translate(0, 250)">
      <rect x="0" y="0" width="500" height="92" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.6"/>
      <text x="14" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.04em">RRA SCORE</text>
      <text x="14" y="46" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">r* = min over k sgRNAs of p-value-rank</text>
      <text x="14" y="68" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">P(min &lt; r* | null) = 1 − (1 − r*)^k    ≈ k · r*</text>
      <text x="14" y="86" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252">— modified-RRA uses the median, not the strict minimum, to absorb one outlier sgRNA.</text>
    </g>
  </g>

  <!-- RIGHT PANEL: Beta(1, 4) density and CDF -->
  <g transform="translate(700, 110)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(B) NULL OF THE MINIMUM · Beta(1, k)</text>

    <!-- axes -->
    <g transform="translate(20, 40)">
      <line x1="0" y1="240" x2="420" y2="240" stroke="#374151" stroke-width="1"/>
      <line x1="0" y1="0" x2="0" y2="240" stroke="#374151" stroke-width="1"/>
      <text x="210" y="270" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">r — minimum rank percentile</text>
      <text x="-40" y="120" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle" transform="rotate(-90, -40, 120)">density</text>

      <!-- ticks -->
      <g font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">
        <text x="0" y="252" text-anchor="middle">0</text>
        <text x="105" y="252" text-anchor="middle">0.25</text>
        <text x="210" y="252" text-anchor="middle">0.5</text>
        <text x="315" y="252" text-anchor="middle">0.75</text>
        <text x="420" y="252" text-anchor="middle">1</text>
      </g>

      <!-- Beta(1, 4) density: f(r) = 4 (1−r)^3; max at r=0 is 4 -->
      <!-- scale: density 0..4 maps to y 240..0 -->
      <path d="M 0 0
               L 4.2 8.96
               L 8.4 17.65
               L 12.6 26.08
               L 16.8 34.24
               L 21 42.14
               L 42 78.48
               L 63 110.40
               L 84 138.24
               L 105 162.40
               L 126 183.20
               L 147 200.96
               L 168 215.04
               L 189 226.40
               L 210 234.40
               L 231 239.04
               L 252 240.96
               L 273 240.96
               L 294 240.96
               L 315 240.32
               L 336 240.00
               L 378 240.00
               L 420 240.00"
            fill="none" stroke="#1e3a8a" stroke-width="2"/>

      <!-- shaded p-value tail under r = 0.05 -->
      <path d="M 0 0
               L 4.2 8.96
               L 8.4 17.65
               L 12.6 26.08
               L 16.8 34.24
               L 21 42.14
               L 21 240
               L 0 240 Z"
            fill="#1e3a8a" fill-opacity="0.2"/>

      <!-- annotation -->
      <line x1="21" y1="0" x2="21" y2="240" stroke="#dc2626" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="24" y="14" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#dc2626">r = 0.05</text>
      <text x="24" y="28" font-family="JetBrains Mono, monospace" font-size="10" fill="#dc2626">p = 1 − 0.95⁴ ≈ 0.19</text>

      <text x="180" y="100" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a">Beta(1, 4)</text>
      <text x="180" y="116" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">f(r) = 4 (1 − r)³</text>

      <!-- annotation for k=6 (lighter curve) -->
      <path d="M 0 0
               L 4.2 14.50
               L 8.4 27.30
               L 12.6 38.70
               L 16.8 48.80
               L 21 57.80
               L 42 95.04
               L 63 124.32
               L 84 147.04
               L 105 165.12
               L 126 179.04
               L 147 189.60
               L 168 197.76
               L 189 204.00
               L 210 208.80
               L 252 216.00
               L 294 220.80
               L 336 224.80
               L 378 227.20
               L 420 228.80"
            fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.85"/>
      <text x="180" y="140" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#7c3aed">Beta(1, 6)</text>
      <text x="180" y="155" font-family="JetBrains Mono, monospace" font-size="9" fill="#7c3aed">k = 6 sgRNAs → tighter null</text>
    </g>

    <!-- bottom legend box -->
    <g transform="translate(20, 332)">
      <rect x="0" y="0" width="420" height="60" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.5"/>
      <text x="14" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a">In one line</text>
      <text x="14" y="36" font-family="Inter, sans-serif" font-size="10" fill="#374151">The same family as GSEA's rank-based test; uniformly</text>
      <text x="14" y="50" font-family="Inter, sans-serif" font-size="10" fill="#374151">minimum-variance unbiased for the null of independent ranks.</text>
    </g>
  </g>

  <text x="60" y="520" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">k = number of sgRNAs per gene; for Brunello/TKOv3, k = 4; for legacy GeCKO v2, k = 6.</text>
</svg>
