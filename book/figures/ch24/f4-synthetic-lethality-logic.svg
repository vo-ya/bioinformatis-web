<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" role="img" aria-labelledby="t d">
  <title id="t">Synthetic lethality logic with BRCA-PARP and MTAP-PRMT5 examples</title>
  <desc id="d">The figure presents the synthetic lethality concept as a two-by-two table where neither gene knockout alone is lethal but the double knockout is. Two clinical case studies are shown below: olaparib in BRCA1/2-deficient cancers, where loss of PARP synthetic-lethally kills cells whose homologous recombination is already broken, and MTAP-deleted tumours, where the missing methionine-salvage shunt forces dependence on PRMT5 with one inhibitor in clinical development. The bottom shows the DepMap-style discovery loop.</desc>

  <rect width="1200" height="540" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="42" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">SYNTHETIC LETHALITY — TWO PATHWAYS, ONE LOGIC</text>
  <text x="60" y="62" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Cancer-specific genetic loss creates a context where a second-gene knockout becomes lethal; pharmacology mimics the second knockout.</text>

  <!-- LEFT: 2x2 truth table -->
  <g transform="translate(60, 110)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(A) THE 2 × 2 TABLE</text>

    <!-- column headers -->
    <text x="160" y="40" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151" text-anchor="middle">A wild-type</text>
    <text x="280" y="40" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151" text-anchor="middle">A knockout</text>

    <text x="60" y="70" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151" text-anchor="end">B wild-type</text>
    <rect x="100" y="50" width="120" height="60" fill="#ecfdf5" stroke="#065f46" stroke-width="0.8"/>
    <text x="160" y="78" font-family="Inter, sans-serif" font-size="11" fill="#065f46" text-anchor="middle">viable</text>
    <text x="160" y="96" font-family="JetBrains Mono, monospace" font-size="10" fill="#065f46" text-anchor="middle">(normal cell)</text>

    <rect x="220" y="50" width="120" height="60" fill="#ecfdf5" stroke="#065f46" stroke-width="0.8"/>
    <text x="280" y="78" font-family="Inter, sans-serif" font-size="11" fill="#065f46" text-anchor="middle">viable</text>
    <text x="280" y="96" font-family="JetBrains Mono, monospace" font-size="10" fill="#065f46" text-anchor="middle">(cancer cell)</text>

    <text x="60" y="135" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151" text-anchor="end">B knockout</text>
    <rect x="100" y="115" width="120" height="60" fill="#ecfdf5" stroke="#065f46" stroke-width="0.8"/>
    <text x="160" y="143" font-family="Inter, sans-serif" font-size="11" fill="#065f46" text-anchor="middle">viable</text>
    <text x="160" y="161" font-family="JetBrains Mono, monospace" font-size="10" fill="#065f46" text-anchor="middle">(safe in normal)</text>

    <rect x="220" y="115" width="120" height="60" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2"/>
    <text x="280" y="143" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#dc2626" text-anchor="middle">LETHAL</text>
    <text x="280" y="161" font-family="JetBrains Mono, monospace" font-size="10" fill="#dc2626" text-anchor="middle">cancer-selective kill</text>

    <!-- read-off -->
    <g transform="translate(0, 210)">
      <rect x="0" y="0" width="340" height="86" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.5"/>
      <text x="14" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a">Pharmacology · drug B mimics B-knockout</text>
      <text x="14" y="38" font-family="Inter, sans-serif" font-size="10" fill="#374151">Cancer-selective tox follows if A-loss is</text>
      <text x="14" y="52" font-family="Inter, sans-serif" font-size="10" fill="#374151">tumour-specific and B-inhibition is well-tolerated</text>
      <text x="14" y="66" font-family="Inter, sans-serif" font-size="10" fill="#374151">in cells with intact A.</text>
    </g>
  </g>

  <!-- MIDDLE: BRCA / PARP case study -->
  <g transform="translate(440, 110)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#7c3aed" letter-spacing="0.06em">(B) BRCA1/2 ⊥ PARP — OLAPARIB (FDA 2014)</text>

    <!-- pathway diagram: HR + BER pathways -->
    <g transform="translate(0, 30)" font-family="Inter, sans-serif" font-size="10">
      <!-- HR box -->
      <rect x="0" y="0" width="160" height="50" fill="#fafaf9" stroke="#374151" stroke-width="1"/>
      <text x="80" y="20" font-weight="600" fill="#374151" text-anchor="middle">Homologous</text>
      <text x="80" y="36" font-weight="600" fill="#374151" text-anchor="middle">recombination (HR)</text>

      <!-- BER box -->
      <rect x="200" y="0" width="160" height="50" fill="#fafaf9" stroke="#374151" stroke-width="1"/>
      <text x="280" y="20" font-weight="600" fill="#374151" text-anchor="middle">Base-excision</text>
      <text x="280" y="36" font-weight="600" fill="#374151" text-anchor="middle">repair (PARP / BER)</text>

      <!-- arrows: both feed "DSB resolved" -->
      <line x1="80" y1="50" x2="170" y2="100" stroke="#374151" stroke-width="1.2"/>
      <line x1="280" y1="50" x2="190" y2="100" stroke="#374151" stroke-width="1.2"/>

      <rect x="80" y="100" width="200" height="40" fill="#ecfdf5" stroke="#065f46" stroke-width="1"/>
      <text x="180" y="124" font-weight="600" fill="#065f46" text-anchor="middle">DNA breaks repaired</text>

      <!-- BRCA mutation kills HR -->
      <text x="80" y="-10" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#dc2626" text-anchor="middle">BRCA1/2 mut</text>
      <line x1="40" y1="0" x2="120" y2="50" stroke="#dc2626" stroke-width="2"/>
      <line x1="120" y1="0" x2="40" y2="50" stroke="#dc2626" stroke-width="2"/>

      <!-- Olaparib kills BER -->
      <text x="280" y="-10" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#dc2626" text-anchor="middle">olaparib</text>
      <line x1="240" y1="0" x2="320" y2="50" stroke="#dc2626" stroke-width="2"/>
      <line x1="320" y1="0" x2="240" y2="50" stroke="#dc2626" stroke-width="2"/>

      <!-- result: no repair -->
      <rect x="80" y="160" width="200" height="44" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2"/>
      <text x="180" y="180" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#dc2626" text-anchor="middle">Cancer cell dies</text>
      <text x="180" y="196" font-family="Inter, sans-serif" font-size="10" fill="#dc2626" text-anchor="middle">normal cell with one wt BRCA copy survives</text>

      <line x1="180" y1="140" x2="180" y2="160" stroke="#dc2626" stroke-width="1.4" stroke-dasharray="3 3"/>
    </g>

    <!-- legend below -->
    <g transform="translate(0, 240)">
      <rect x="0" y="0" width="360" height="60" fill="#f3e8ff" stroke="#7c3aed" stroke-width="0.6"/>
      <text x="14" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#7c3aed">Bryant 2005 · Farmer 2005 · pre-CRISPR discovery</text>
      <text x="14" y="36" font-family="Inter, sans-serif" font-size="10" fill="#525252">Now refound by every BRCA-mutant cell line in DepMap.</text>
      <text x="14" y="52" font-family="Inter, sans-serif" font-size="10" fill="#525252">~$2B annual market across 4 FDA-approved PARP inhibitors.</text>
    </g>
  </g>

  <!-- RIGHT: MTAP / PRMT5 case study -->
  <g transform="translate(840, 110)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#7c3aed" letter-spacing="0.06em">(C) MTAP ⊥ PRMT5 — DEPMAP DISCOVERY (2016)</text>

    <g transform="translate(0, 30)" font-family="Inter, sans-serif" font-size="10">
      <!-- MTAP/MTA branch -->
      <rect x="0" y="0" width="160" height="50" fill="#fafaf9" stroke="#374151" stroke-width="1"/>
      <text x="80" y="20" font-weight="600" fill="#374151" text-anchor="middle">MTAP · clears MTA</text>
      <text x="80" y="36" font-weight="600" fill="#374151" text-anchor="middle">(methionine salvage)</text>

      <!-- PRMT5 branch -->
      <rect x="200" y="0" width="160" height="50" fill="#fafaf9" stroke="#374151" stroke-width="1"/>
      <text x="280" y="20" font-weight="600" fill="#374151" text-anchor="middle">PRMT5 · arginine</text>
      <text x="280" y="36" font-weight="600" fill="#374151" text-anchor="middle">methyltransferase</text>

      <!-- MTAP deletion → MTA accumulates → partial PRMT5 inhibition -->
      <text x="80" y="-10" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#dc2626" text-anchor="middle">9p21 del · MTAP loss</text>
      <line x1="40" y1="0" x2="120" y2="50" stroke="#dc2626" stroke-width="2"/>
      <line x1="120" y1="0" x2="40" y2="50" stroke="#dc2626" stroke-width="2"/>

      <line x1="160" y1="25" x2="200" y2="25" stroke="#b45309" stroke-width="1.5" stroke-dasharray="3 3"/>
      <text x="180" y="14" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309" text-anchor="middle">MTA ↑</text>

      <!-- PRMT5 box partial hash -->
      <line x1="220" y1="0" x2="240" y2="50" stroke="#b45309" stroke-width="1.3"/>
      <line x1="240" y1="0" x2="220" y2="50" stroke="#b45309" stroke-width="1.3"/>

      <!-- second hit by drug -->
      <text x="280" y="-10" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#dc2626" text-anchor="middle">PRMT5 inhibitor</text>

      <!-- result -->
      <rect x="80" y="100" width="200" height="44" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2"/>
      <text x="180" y="120" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#dc2626" text-anchor="middle">9p21-deleted tumour</text>
      <text x="180" y="136" font-family="Inter, sans-serif" font-size="10" fill="#dc2626" text-anchor="middle">PRMT5-dependent → selective kill</text>

      <line x1="180" y1="50" x2="180" y2="100" stroke="#dc2626" stroke-width="1.4" stroke-dasharray="3 3"/>
    </g>

    <g transform="translate(0, 240)">
      <rect x="0" y="0" width="320" height="60" fill="#f3e8ff" stroke="#7c3aed" stroke-width="0.6"/>
      <text x="14" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#7c3aed">Marjon 2016 · Mavrakis 2016 · DepMap-anchored</text>
      <text x="14" y="36" font-family="Inter, sans-serif" font-size="10" fill="#525252">MRTX1719, AMG 193, AG-270 — MTA-cooperative</text>
      <text x="14" y="50" font-family="Inter, sans-serif" font-size="10" fill="#525252">PRMT5 inhibitors in Phase I/II for ~15% of cancers.</text>
    </g>
  </g>

  <text x="60" y="520" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">The 2 × 2 logic is Hartwell-Kaelin (1997/2005); the operational discovery loop is DepMap (Tsherniak 2017).</text>
</svg>
