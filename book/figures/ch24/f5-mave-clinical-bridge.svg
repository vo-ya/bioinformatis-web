<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="t d">
  <title id="t">MAVE-to-clinic bridge for BRCA1 variant interpretation</title>
  <desc id="d">A flow figure showing how a saturation genome editing experiment in HAP1 cells produces fitness scores for ~4,000 BRCA1 variants. The scores are categorised functional, intermediate, or non-functional and are then mapped onto ACMG/AMP evidence codes. The right-hand panel shows the reclassification effect: among ClinVar variants of uncertain significance, a substantial fraction shift to Likely Pathogenic or Likely Benign once MAVE evidence is added as PS3 or BS3.</desc>

  <rect width="1200" height="560" fill="#fafaf9"/>

  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <!-- Header -->
  <text x="60" y="42" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">MAVE → CLINICAL VARIANT INTERPRETATION — BRCA1 (FINDLAY 2018)</text>
  <text x="60" y="62" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Saturation genome editing of BRCA1 in HAP1 cells produces ~4,000 functional scores that feed ACMG/AMP PS3 / BS3 evidence.</text>

  <!-- STEP A: Experiment -->
  <g transform="translate(60, 110)">
    <rect x="0" y="0" width="260" height="120" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.2"/>
    <text x="12" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">1 · EXPERIMENT</text>
    <text x="12" y="48" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">Saturation genome editing</text>
    <text x="12" y="66" font-family="Inter, sans-serif" font-size="10" fill="#525252">HAP1 cells (haploid, HR-dependent)</text>
    <text x="12" y="82" font-family="Inter, sans-serif" font-size="10" fill="#525252">~4,000 SNVs in BRCA1 RING + BRCT</text>
    <text x="12" y="98" font-family="Inter, sans-serif" font-size="10" fill="#525252">11-day growth, deep amplicon-seq</text>
    <text x="12" y="114" font-family="JetBrains Mono, monospace" font-size="10" fill="#1e3a8a">→ per-variant function score</text>
  </g>

  <!-- arrow -->
  <line x1="320" y1="170" x2="380" y2="170" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- STEP B: Score classes -->
  <g transform="translate(380, 110)">
    <rect x="0" y="0" width="260" height="120" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.2"/>
    <text x="12" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">2 · BIN BY FITNESS</text>

    <!-- mini histogram bars -->
    <g transform="translate(12, 40)">
      <rect x="0"   y="32"  width="40" height="40" fill="#dc2626"/>
      <rect x="44"  y="46"  width="40" height="26" fill="#b45309"/>
      <rect x="88"  y="40"  width="40" height="32" fill="#8a8a85"/>
      <rect x="132" y="14"  width="40" height="58" fill="#065f46"/>
      <rect x="176" y="2"   width="40" height="70" fill="#065f46"/>
      <line x1="-4" y1="72" x2="222" y2="72" stroke="#374151" stroke-width="1"/>
      <text x="20"  y="84" font-family="JetBrains Mono, monospace" font-size="8" fill="#dc2626" text-anchor="middle">non-func</text>
      <text x="64"  y="84" font-family="JetBrains Mono, monospace" font-size="8" fill="#b45309" text-anchor="middle">intermed</text>
      <text x="108" y="84" font-family="JetBrains Mono, monospace" font-size="8" fill="#8a8a85" text-anchor="middle">unclear</text>
      <text x="152" y="84" font-family="JetBrains Mono, monospace" font-size="8" fill="#065f46" text-anchor="middle">func</text>
      <text x="196" y="84" font-family="JetBrains Mono, monospace" font-size="8" fill="#065f46" text-anchor="middle">strong-func</text>
    </g>
  </g>

  <!-- arrow -->
  <line x1="640" y1="170" x2="700" y2="170" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- STEP C: ACMG/AMP map -->
  <g transform="translate(700, 110)">
    <rect x="0" y="0" width="440" height="120" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.2"/>
    <text x="12" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">3 · MAP TO ACMG/AMP EVIDENCE</text>

    <g font-family="Inter, sans-serif" font-size="10" transform="translate(12, 36)">
      <rect x="0" y="0" width="80" height="20" fill="#fee2e2" stroke="#dc2626" stroke-width="0.8"/>
      <text x="40" y="14" font-weight="700" fill="#dc2626" text-anchor="middle">PS3 strong</text>
      <text x="92" y="14" fill="#525252">non-functional in MAVE</text>

      <rect x="0" y="28" width="80" height="20" fill="#fef3c7" stroke="#b45309" stroke-width="0.8"/>
      <text x="40" y="42" font-weight="700" fill="#b45309" text-anchor="middle">PS3 mod</text>
      <text x="92" y="42" fill="#525252">intermediate score</text>

      <rect x="0" y="56" width="80" height="20" fill="#dcfce7" stroke="#065f46" stroke-width="0.8"/>
      <text x="40" y="70" font-weight="700" fill="#065f46" text-anchor="middle">BS3 strong</text>
      <text x="92" y="70" fill="#525252">indistinguishable from wt</text>
    </g>
  </g>

  <!-- BOTTOM: Reclassification chart -->
  <g transform="translate(60, 280)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">RECLASSIFICATION EFFECT · 100 BRCA1 VUS</text>
    <text x="0" y="18" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">Before MAVE evidence vs after — VUS shrink, definitive calls grow.</text>

    <!-- Two stacked bar charts -->
    <g transform="translate(40, 50)">
      <!-- BEFORE -->
      <text x="0" y="-8" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">BEFORE — clinical evidence only</text>
      <g>
        <rect x="0"   y="0" width="60"  height="36" fill="#dc2626"/>
        <text x="30"  y="22" font-family="JetBrains Mono, monospace" font-size="10" fill="#fff" text-anchor="middle">12 P</text>

        <rect x="60"  y="0" width="30"  height="36" fill="#fda4af"/>
        <text x="75"  y="22" font-family="JetBrains Mono, monospace" font-size="9"  fill="#7f1d1d" text-anchor="middle">6 LP</text>

        <rect x="90"  y="0" width="320" height="36" fill="#cbd5e1"/>
        <text x="250" y="22" font-family="JetBrains Mono, monospace" font-size="10" fill="#0f172a" text-anchor="middle">64 VUS</text>

        <rect x="410" y="0" width="40"  height="36" fill="#86efac"/>
        <text x="430" y="22" font-family="JetBrains Mono, monospace" font-size="9"  fill="#14532d" text-anchor="middle">8 LB</text>

        <rect x="450" y="0" width="50"  height="36" fill="#065f46"/>
        <text x="475" y="22" font-family="JetBrains Mono, monospace" font-size="10" fill="#fff" text-anchor="middle">10 B</text>
      </g>

      <!-- AFTER -->
      <text x="0" y="68" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151">AFTER — clinical + MAVE PS3/BS3</text>
      <g transform="translate(0, 76)">
        <rect x="0"   y="0" width="100" height="36" fill="#dc2626"/>
        <text x="50"  y="22" font-family="JetBrains Mono, monospace" font-size="10" fill="#fff" text-anchor="middle">22 P</text>

        <rect x="100" y="0" width="70"  height="36" fill="#fda4af"/>
        <text x="135" y="22" font-family="JetBrains Mono, monospace" font-size="10" fill="#7f1d1d" text-anchor="middle">14 LP</text>

        <rect x="170" y="0" width="120" height="36" fill="#cbd5e1"/>
        <text x="230" y="22" font-family="JetBrains Mono, monospace" font-size="10" fill="#0f172a" text-anchor="middle">22 VUS</text>

        <rect x="290" y="0" width="100" height="36" fill="#86efac"/>
        <text x="340" y="22" font-family="JetBrains Mono, monospace" font-size="10" fill="#14532d" text-anchor="middle">22 LB</text>

        <rect x="390" y="0" width="110" height="36" fill="#065f46"/>
        <text x="445" y="22" font-family="JetBrains Mono, monospace" font-size="10" fill="#fff" text-anchor="middle">20 B</text>
      </g>

      <!-- arrow between -->
      <text x="-12" y="58" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1e3a8a" text-anchor="middle">↓</text>
    </g>

    <!-- legend -->
    <g transform="translate(560, 50)">
      <rect x="0" y="0" width="220" height="124" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.5"/>
      <text x="12" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a">ACMG/AMP categories</text>
      <g font-family="Inter, sans-serif" font-size="10" fill="#374151" transform="translate(12, 36)">
        <rect x="0" y="0" width="12" height="12" fill="#dc2626"/>
        <text x="20" y="10">P · Pathogenic</text>
        <rect x="0" y="20" width="12" height="12" fill="#fda4af"/>
        <text x="20" y="30">LP · Likely Pathogenic</text>
        <rect x="0" y="40" width="12" height="12" fill="#cbd5e1"/>
        <text x="20" y="50">VUS · Uncertain Significance</text>
        <rect x="0" y="60" width="12" height="12" fill="#86efac"/>
        <text x="20" y="70">LB · Likely Benign</text>
        <rect x="0" y="80" width="12" height="12" fill="#065f46"/>
        <text x="20" y="90">B · Benign</text>
      </g>
    </g>

    <g transform="translate(800, 50)">
      <rect x="0" y="0" width="270" height="124" fill="#f3e8ff" stroke="#7c3aed" stroke-width="0.6"/>
      <text x="12" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#7c3aed">Translation to the clinic</text>
      <text x="12" y="38" font-family="Inter, sans-serif" font-size="10" fill="#374151">— Findlay 2018 reclassified ~96% of</text>
      <text x="12" y="52" font-family="Inter, sans-serif" font-size="10" fill="#374151">  prior BRCA1 VUSes with high confidence.</text>
      <text x="12" y="72" font-family="Inter, sans-serif" font-size="10" fill="#374151">— MAVEdb aggregates ~50 such datasets.</text>
      <text x="12" y="92" font-family="Inter, sans-serif" font-size="10" fill="#374151">— PP3/BP4 (computational) supplements</text>
      <text x="12" y="106" font-family="Inter, sans-serif" font-size="10" fill="#374151">  via EVE and AlphaMissense.</text>
    </g>
  </g>

  <text x="60" y="540" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">Reclassification counts are illustrative — exact ratios depend on the gene, the assay, and the calibration of MAVE-to-evidence-strength mapping.</text>
</svg>
