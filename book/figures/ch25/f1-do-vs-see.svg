<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="t d">
  <title id="t">Seeing versus doing: observational versus interventional distributions</title>
  <desc id="d">Two side-by-side causal-graph panels with their conditional distributions. The left panel shows the observational world: a confounder C influences both X and Y; the conditional distribution P(Y given X equals x) mixes the direct X-to-Y effect with the back-door pathway through C. The right panel shows the interventional world under do of X: the confounder's arrow to X is severed by surgery, X is set externally, and the resulting distribution P of Y under do of X equals x isolates the causal effect. Below each panel a small scatter and regression line illustrate how the observational slope is biased by C while the do-slope is the unbiased causal effect.</desc>

  <rect x="0" y="0" width="1200" height="560" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="42" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">SEEING VERSUS DOING — THE TWO DISTRIBUTIONS A CAUSAL CLAIM CAN MEAN</text>
  <text x="60" y="62" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Observation conditions on X; intervention sets X. The two distributions agree only if no back-door path is open.</text>

  <!-- ============ LEFT PANEL: P(Y | X = x) observational ============ -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="520" height="420" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.6" rx="3"/>

    <text x="20" y="30" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(A)  OBSERVATIONAL</text>
    <text x="20" y="50" font-family="JetBrains Mono, monospace" font-size="14" font-weight="500" fill="#0a0a0a">P( Y | X = x )</text>
    <text x="20" y="70" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252">condition on X — the back door through C is still open</text>

    <!-- Causal graph -->
    <g transform="translate(80, 110)">
      <!-- Nodes -->
      <circle cx="180" cy="0" r="22" fill="#fafaf9" stroke="#1e3a8a" stroke-width="2"/>
      <text x="180" y="5" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#1e3a8a">C</text>
      <text x="180" y="-30" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252">confounder</text>

      <circle cx="40" cy="100" r="22" fill="#fafaf9" stroke="#0a0a0a" stroke-width="2"/>
      <text x="40" y="105" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#0a0a0a">X</text>
      <text x="40" y="140" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252">exposure</text>

      <circle cx="320" cy="100" r="22" fill="#fafaf9" stroke="#0a0a0a" stroke-width="2"/>
      <text x="320" y="105" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#0a0a0a">Y</text>
      <text x="320" y="140" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252">outcome</text>

      <!-- arrows from C and X to Y -->
      <defs>
        <marker id="arr-blk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#0a0a0a"/>
        </marker>
        <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
        </marker>
        <marker id="arr-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
        </marker>
        <marker id="arr-mut" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
        </marker>
      </defs>

      <line x1="62" y1="100" x2="298" y2="100" stroke="#0a0a0a" stroke-width="1.8" marker-end="url(#arr-blk)"/>
      <text x="180" y="92" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">β  (causal)</text>

      <line x1="166" y1="18" x2="58" y2="82" stroke="#1e3a8a" stroke-width="1.8" marker-end="url(#arr-blue)"/>
      <text x="92" y="50" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a">α</text>

      <line x1="194" y1="18" x2="302" y2="82" stroke="#1e3a8a" stroke-width="1.8" marker-end="url(#arr-blue)"/>
      <text x="268" y="50" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a">γ</text>
    </g>

    <!-- Scatter + biased line -->
    <g transform="translate(40, 270)">
      <rect x="0" y="0" width="440" height="130" fill="#fafaf9" stroke="#e5e3dc" stroke-width="0.5"/>
      <!-- Axes -->
      <line x1="40" y1="110" x2="420" y2="110" stroke="#374151" stroke-width="0.8"/>
      <line x1="40" y1="20" x2="40" y2="110" stroke="#374151" stroke-width="0.8"/>
      <text x="230" y="126" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">X</text>
      <text x="22" y="65" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" transform="rotate(-90 22 65)">Y</text>
      <!-- Scatter clusters -->
      <g fill="#1e3a8a" opacity="0.55">
        <!-- low-C cluster low Y, low X -->
        <circle cx="80" cy="92" r="2.8"/><circle cx="92" cy="86" r="2.8"/><circle cx="74" cy="98" r="2.8"/>
        <circle cx="98" cy="80" r="2.8"/><circle cx="86" cy="90" r="2.8"/><circle cx="106" cy="88" r="2.8"/>
        <circle cx="118" cy="78" r="2.8"/><circle cx="126" cy="84" r="2.8"/>
      </g>
      <g fill="#b45309" opacity="0.6">
        <!-- high-C cluster high Y, high X -->
        <circle cx="280" cy="50" r="2.8"/><circle cx="296" cy="42" r="2.8"/><circle cx="306" cy="38" r="2.8"/>
        <circle cx="320" cy="46" r="2.8"/><circle cx="332" cy="34" r="2.8"/><circle cx="346" cy="36" r="2.8"/>
        <circle cx="358" cy="28" r="2.8"/><circle cx="372" cy="32" r="2.8"/>
      </g>
      <!-- Observational slope (steeper than truth) -->
      <line x1="50" y1="100" x2="400" y2="22" stroke="#dc2626" stroke-width="2.2" stroke-dasharray="6 3"/>
      <text x="220" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#dc2626">observed slope = β + bias</text>
    </g>
  </g>

  <!-- ============ RIGHT PANEL: P(Y | do(X = x)) interventional ============ -->
  <g transform="translate(620, 100)">
    <rect x="0" y="0" width="520" height="420" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8" rx="3"/>

    <text x="20" y="30" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(B)  INTERVENTIONAL</text>
    <text x="20" y="50" font-family="JetBrains Mono, monospace" font-size="14" font-weight="500" fill="#0a0a0a">P( Y | do(X = x) )</text>
    <text x="20" y="70" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252">surgery: cut the arrow into X; set X externally — back door closed</text>

    <!-- Causal graph with severed C->X -->
    <g transform="translate(80, 110)">
      <!-- C node -->
      <circle cx="180" cy="0" r="22" fill="#fafaf9" stroke="#1e3a8a" stroke-width="2"/>
      <text x="180" y="5" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#1e3a8a">C</text>
      <text x="180" y="-30" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252">confounder</text>

      <!-- X node (set by intervention, double border) -->
      <circle cx="40" cy="100" r="22" fill="#fafaf9" stroke="#dc2626" stroke-width="2.5"/>
      <circle cx="40" cy="100" r="17" fill="none" stroke="#dc2626" stroke-width="1"/>
      <text x="40" y="105" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#dc2626">X</text>
      <text x="40" y="140" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#dc2626">do(X = x)</text>

      <circle cx="320" cy="100" r="22" fill="#fafaf9" stroke="#0a0a0a" stroke-width="2"/>
      <text x="320" y="105" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#0a0a0a">Y</text>
      <text x="320" y="140" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252">outcome</text>

      <!-- arrow X to Y (only this one matters) -->
      <line x1="62" y1="100" x2="298" y2="100" stroke="#0a0a0a" stroke-width="2.4" marker-end="url(#arr-blk)"/>
      <text x="180" y="92" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#0a0a0a">β  (causal — recovered)</text>

      <!-- severed C->X arrow (struck through) -->
      <line x1="166" y1="18" x2="58" y2="82" stroke="#525252" stroke-width="1.2" stroke-dasharray="2 3" opacity="0.5"/>
      <line x1="80" y1="36" x2="146" y2="68" stroke="#dc2626" stroke-width="2.4"/>
      <text x="60" y="32" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#dc2626" letter-spacing="0.04em">CUT</text>

      <!-- C->Y survives -->
      <line x1="194" y1="18" x2="302" y2="82" stroke="#1e3a8a" stroke-width="1.4" marker-end="url(#arr-blue)" opacity="0.6"/>
      <text x="268" y="50" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" opacity="0.7">γ</text>
    </g>

    <!-- Scatter + unbiased line -->
    <g transform="translate(40, 270)">
      <rect x="0" y="0" width="440" height="130" fill="#fafaf9" stroke="#e5e3dc" stroke-width="0.5"/>
      <line x1="40" y1="110" x2="420" y2="110" stroke="#374151" stroke-width="0.8"/>
      <line x1="40" y1="20" x2="40" y2="110" stroke="#374151" stroke-width="0.8"/>
      <text x="230" y="126" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">X (randomly assigned)</text>
      <text x="22" y="65" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" transform="rotate(-90 22 65)">Y</text>
      <!-- Scatter spread evenly across X regardless of C -->
      <g fill="#374151" opacity="0.65">
        <circle cx="78" cy="80" r="2.8"/><circle cx="96" cy="84" r="2.8"/><circle cx="78" cy="72" r="2.8"/>
        <circle cx="120" cy="78" r="2.8"/><circle cx="150" cy="74" r="2.8"/><circle cx="180" cy="68" r="2.8"/>
        <circle cx="208" cy="64" r="2.8"/><circle cx="240" cy="60" r="2.8"/><circle cx="266" cy="58" r="2.8"/>
        <circle cx="298" cy="54" r="2.8"/><circle cx="324" cy="48" r="2.8"/><circle cx="350" cy="46" r="2.8"/>
        <circle cx="376" cy="42" r="2.8"/><circle cx="148" cy="86" r="2.8"/><circle cx="216" cy="74" r="2.8"/>
        <circle cx="282" cy="66" r="2.8"/><circle cx="338" cy="58" r="2.8"/>
      </g>
      <!-- Unbiased slope (shallower than panel A) -->
      <line x1="50" y1="92" x2="400" y2="40" stroke="#065f46" stroke-width="2.4"/>
      <text x="220" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#065f46">recovered slope = β  (causal)</text>
    </g>
  </g>

  <text x="60" y="546" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">RCTs perform the cut by random assignment.  MR borrows the cut from Mendel: meiosis randomises germline SNPs upstream of every adult-life confounder.</text>
</svg>
