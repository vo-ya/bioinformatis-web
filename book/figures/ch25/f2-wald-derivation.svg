<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" role="img" aria-labelledby="t d">
  <title id="t">The Wald ratio derived: three regressions that share a single slope</title>
  <desc id="d">A three-panel derivation of the Wald instrumental-variable estimator. Panel A shows a scatter of X against the instrument Z with a fitted slope labelled pi, the first-stage regression. Panel B shows a scatter of Y against the same instrument Z with a fitted slope labelled Gamma, the reduced-form regression. Panel C plots Y against X-hat (the projection of X onto Z), recovering the causal slope beta equal to Gamma divided by pi. A box on the right summarises the algebra and the assumption set under which the ratio is unbiased.</desc>

  <rect x="0" y="0" width="1200" height="540" fill="#fafaf9"/>

  <text x="60" y="42" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">THE WALD RATIO — TWO REGRESSIONS, ONE CAUSAL SLOPE</text>
  <text x="60" y="62" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Each panel is one OLS fit; the causal effect falls out of dividing the slope you can see by the slope you can also see.</text>

  <defs>
    <marker id="ar2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <!-- Panel A: First stage X on Z -->
  <g transform="translate(60, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(A)  FIRST STAGE</text>
    <text x="0" y="18" font-family="JetBrains Mono, monospace" font-size="12" fill="#0a0a0a">X = π Z + e</text>
    <text x="0" y="36" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252">slope of X on Z</text>

    <g transform="translate(0, 60)">
      <rect x="0" y="0" width="300" height="240" fill="#fafaf9" stroke="#e5e3dc" stroke-width="0.5"/>
      <line x1="40" y1="210" x2="280" y2="210" stroke="#374151" stroke-width="0.8"/>
      <line x1="40" y1="30" x2="40" y2="210" stroke="#374151" stroke-width="0.8"/>
      <text x="160" y="228" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">Z  (instrument)</text>
      <text x="22" y="120" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" transform="rotate(-90 22 120)">X  (exposure)</text>

      <!-- scatter -->
      <g fill="#1e3a8a" opacity="0.7">
        <circle cx="68" cy="180" r="3"/><circle cx="76" cy="170" r="3"/><circle cx="92" cy="178" r="3"/>
        <circle cx="108" cy="160" r="3"/><circle cx="124" cy="150" r="3"/><circle cx="140" cy="140" r="3"/>
        <circle cx="156" cy="146" r="3"/><circle cx="170" cy="124" r="3"/><circle cx="186" cy="118" r="3"/>
        <circle cx="202" cy="108" r="3"/><circle cx="216" cy="98" r="3"/><circle cx="232" cy="92" r="3"/>
        <circle cx="248" cy="82" r="3"/><circle cx="262" cy="68" r="3"/><circle cx="120" cy="166" r="3"/>
        <circle cx="180" cy="132" r="3"/><circle cx="222" cy="100" r="3"/>
      </g>
      <line x1="50" y1="195" x2="270" y2="58" stroke="#1e3a8a" stroke-width="2.2"/>

      <!-- slope label -->
      <text x="180" y="80" font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" fill="#1e3a8a">slope = π̂</text>
    </g>
  </g>

  <!-- Panel B: Reduced form Y on Z -->
  <g transform="translate(400, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(B)  REDUCED FORM</text>
    <text x="0" y="18" font-family="JetBrains Mono, monospace" font-size="12" fill="#0a0a0a">Y = Γ Z + u    (Γ = β·π)</text>
    <text x="0" y="36" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252">slope of Y on Z (must go via X under exclusion)</text>

    <g transform="translate(0, 60)">
      <rect x="0" y="0" width="300" height="240" fill="#fafaf9" stroke="#e5e3dc" stroke-width="0.5"/>
      <line x1="40" y1="210" x2="280" y2="210" stroke="#374151" stroke-width="0.8"/>
      <line x1="40" y1="30" x2="40" y2="210" stroke="#374151" stroke-width="0.8"/>
      <text x="160" y="228" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">Z  (instrument)</text>
      <text x="22" y="120" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" transform="rotate(-90 22 120)">Y  (outcome)</text>

      <g fill="#b45309" opacity="0.7">
        <circle cx="68" cy="188" r="3"/><circle cx="80" cy="180" r="3"/><circle cx="96" cy="184" r="3"/>
        <circle cx="112" cy="172" r="3"/><circle cx="128" cy="164" r="3"/><circle cx="146" cy="158" r="3"/>
        <circle cx="160" cy="148" r="3"/><circle cx="176" cy="138" r="3"/><circle cx="192" cy="130" r="3"/>
        <circle cx="208" cy="122" r="3"/><circle cx="224" cy="108" r="3"/><circle cx="240" cy="100" r="3"/>
        <circle cx="252" cy="90" r="3"/><circle cx="266" cy="78" r="3"/><circle cx="120" cy="176" r="3"/>
        <circle cx="184" cy="144" r="3"/><circle cx="220" cy="116" r="3"/>
      </g>
      <line x1="50" y1="198" x2="270" y2="72" stroke="#b45309" stroke-width="2.2"/>

      <text x="180" y="92" font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" fill="#b45309">slope = Γ̂</text>
    </g>
  </g>

  <!-- Panel C: ratio result -->
  <g transform="translate(740, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#065f46" letter-spacing="0.06em">(C)  WALD RATIO</text>
    <text x="0" y="18" font-family="JetBrains Mono, monospace" font-size="12" fill="#0a0a0a">β̂  =  Γ̂ / π̂</text>
    <text x="0" y="36" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252">cancels π — what's left is the causal slope of Y on X</text>

    <g transform="translate(0, 60)">
      <rect x="0" y="0" width="380" height="240" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.6" rx="3"/>

      <text x="20" y="36" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">Why the ratio is the causal slope</text>

      <text x="20" y="64" font-family="JetBrains Mono, monospace" font-size="11" fill="#374151">Structural model</text>
      <text x="20" y="84" font-family="JetBrains Mono, monospace" font-size="12" fill="#0a0a0a">X = π Z + e</text>
      <text x="20" y="102" font-family="JetBrains Mono, monospace" font-size="12" fill="#0a0a0a">Y = β X + ε</text>

      <line x1="20" y1="116" x2="360" y2="116" stroke="#c4c1b6" stroke-width="0.5"/>

      <text x="20" y="138" font-family="JetBrains Mono, monospace" font-size="11" fill="#374151">Substitute</text>
      <text x="20" y="158" font-family="JetBrains Mono, monospace" font-size="12" fill="#0a0a0a">Y = β(π Z + e) + ε</text>
      <text x="20" y="176" font-family="JetBrains Mono, monospace" font-size="12" fill="#0a0a0a">  = (β π) Z + (β e + ε)</text>

      <line x1="20" y1="190" x2="360" y2="190" stroke="#c4c1b6" stroke-width="0.5"/>

      <text x="20" y="212" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#065f46">Hence  Γ = β π   →   β = Γ / π</text>
    </g>

    <!-- ratio big -->
    <g transform="translate(0, 320)">
      <rect x="0" y="0" width="380" height="60" fill="#fafaf9" stroke="#065f46" stroke-width="1.2" rx="3"/>
      <text x="190" y="38" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="20" font-weight="600" fill="#065f46">β̂  =  β̂_(Z→Y) / β̂_(Z→X)</text>
    </g>
  </g>

  <!-- Footnote on assumptions -->
  <text x="60" y="524" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#8a8a85">Validity rests on the three IV assumptions:  (1) relevance — π ≠ 0;  (2) independence — Z ⊥ confounders;  (3) exclusion — Z affects Y only through X.</text>
</svg>
