<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="t d">
  <title id="t">Four MR estimators on the same data: IVW, MR-Egger, weighted median, MR-PRESSO</title>
  <desc id="d">A 2x2 panel of scatter plots. Each panel uses the same set of single-nucleotide polymorphisms drawn as points in the SNP-exposure effect versus SNP-outcome effect plane, with the per-SNP standard error shown by point size. Panel one fits inverse-variance-weighted regression through the origin and is sensitive to outliers. Panel two fits MR-Egger with a non-zero intercept that quantifies systematic pleiotropy. Panel three fits a weighted median estimator robust as long as at least half of the weight comes from valid instruments. Panel four runs MR-PRESSO outlier removal, flags three outlier SNPs in red, drops them, and re-fits the inverse-variance-weighted slope on the surviving points. A footer table summarises the four resulting effect estimates side by side.</desc>

  <rect x="0" y="0" width="1200" height="760" fill="#fafaf9"/>

  <text x="60" y="42" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">FOUR ESTIMATORS, ONE SCATTER — THE MR SENSITIVITY QUARTET</text>
  <text x="60" y="62" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Same SNPs (n = 30), four assumptions about pleiotropy and outliers. Convergence across the four is the only honest evidence.</text>

  <!-- Common scatter data shared across panels (positions in normalised x: 0..1) -->
  <!-- We'll inline coordinates per panel; outlier SNPs at top right are flagged red -->

  <!-- ============ Panel 1: IVW (top-left) ============ -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="520" height="280" fill="#fafaf9" stroke="#c4c1b6" stroke-width="0.6" rx="3"/>
    <text x="20" y="28" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(1)  IVW  —  INVERSE-VARIANCE WEIGHTED</text>
    <text x="20" y="44" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252">slope through origin; weights = 1 / SE²; minimum variance under valid IVs</text>

    <g transform="translate(40, 60)">
      <line x1="40" y1="200" x2="460" y2="200" stroke="#374151" stroke-width="0.8"/>
      <line x1="40" y1="20" x2="40" y2="200" stroke="#374151" stroke-width="0.8"/>
      <text x="250" y="218" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">β̂(Z → X)</text>
      <text x="22" y="110" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" transform="rotate(-90 22 110)">β̂(Z → Y)</text>

      <!-- 30 SNP points -->
      <g fill="#1e3a8a" opacity="0.7">
        <circle cx="70" cy="184" r="3"/><circle cx="86" cy="178" r="3.5"/><circle cx="100" cy="176" r="3"/>
        <circle cx="118" cy="170" r="3.5"/><circle cx="132" cy="164" r="4"/><circle cx="148" cy="160" r="3"/>
        <circle cx="166" cy="158" r="3.5"/><circle cx="184" cy="148" r="4"/><circle cx="198" cy="142" r="3"/>
        <circle cx="212" cy="138" r="3"/><circle cx="228" cy="130" r="4"/><circle cx="244" cy="126" r="3.5"/>
        <circle cx="262" cy="120" r="3"/><circle cx="278" cy="110" r="3.5"/><circle cx="296" cy="104" r="3"/>
        <circle cx="312" cy="98" r="3"/><circle cx="330" cy="92" r="4"/><circle cx="346" cy="84" r="3"/>
        <circle cx="362" cy="78" r="3.5"/><circle cx="378" cy="72" r="3"/><circle cx="394" cy="62" r="3"/>
        <circle cx="412" cy="54" r="3.5"/><circle cx="428" cy="48" r="3"/><circle cx="444" cy="40" r="3.5"/>
        <!-- three outlier SNPs offset above the line -->
        <circle cx="240" cy="80" r="3.5" fill="#dc2626"/>
        <circle cx="300" cy="58" r="3.5" fill="#dc2626"/>
        <circle cx="370" cy="40" r="3.5" fill="#dc2626"/>
        <!-- low-x points -->
        <circle cx="60" cy="190" r="3"/><circle cx="78" cy="182" r="3"/><circle cx="200" cy="146" r="3"/>
      </g>
      <!-- IVW slope through origin (biased steep by the outliers) -->
      <line x1="40" y1="200" x2="460" y2="22" stroke="#1e3a8a" stroke-width="2.4"/>
      <text x="350" y="40" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#1e3a8a">β̂_IVW = 0.62</text>
    </g>
  </g>

  <!-- ============ Panel 2: MR-Egger (top-right) ============ -->
  <g transform="translate(620, 100)">
    <rect x="0" y="0" width="520" height="280" fill="#fafaf9" stroke="#c4c1b6" stroke-width="0.6" rx="3"/>
    <text x="20" y="28" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(2)  MR-EGGER  —  FREE INTERCEPT</text>
    <text x="20" y="44" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252">intercept α tests systematic pleiotropy; slope = causal estimate after correction</text>

    <g transform="translate(40, 60)">
      <line x1="40" y1="200" x2="460" y2="200" stroke="#374151" stroke-width="0.8"/>
      <line x1="40" y1="20" x2="40" y2="200" stroke="#374151" stroke-width="0.8"/>
      <text x="250" y="218" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">β̂(Z → X)</text>
      <text x="22" y="110" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" transform="rotate(-90 22 110)">β̂(Z → Y)</text>

      <g fill="#1e3a8a" opacity="0.7">
        <circle cx="70" cy="184" r="3"/><circle cx="86" cy="178" r="3.5"/><circle cx="100" cy="176" r="3"/>
        <circle cx="118" cy="170" r="3.5"/><circle cx="132" cy="164" r="4"/><circle cx="148" cy="160" r="3"/>
        <circle cx="166" cy="158" r="3.5"/><circle cx="184" cy="148" r="4"/><circle cx="198" cy="142" r="3"/>
        <circle cx="212" cy="138" r="3"/><circle cx="228" cy="130" r="4"/><circle cx="244" cy="126" r="3.5"/>
        <circle cx="262" cy="120" r="3"/><circle cx="278" cy="110" r="3.5"/><circle cx="296" cy="104" r="3"/>
        <circle cx="312" cy="98" r="3"/><circle cx="330" cy="92" r="4"/><circle cx="346" cy="84" r="3"/>
        <circle cx="362" cy="78" r="3.5"/><circle cx="378" cy="72" r="3"/><circle cx="394" cy="62" r="3"/>
        <circle cx="412" cy="54" r="3.5"/><circle cx="428" cy="48" r="3"/><circle cx="444" cy="40" r="3.5"/>
        <circle cx="240" cy="80" r="3.5" fill="#dc2626"/>
        <circle cx="300" cy="58" r="3.5" fill="#dc2626"/>
        <circle cx="370" cy="40" r="3.5" fill="#dc2626"/>
        <circle cx="60" cy="190" r="3"/><circle cx="78" cy="182" r="3"/><circle cx="200" cy="146" r="3"/>
      </g>
      <!-- Egger fit with non-zero intercept -->
      <line x1="40" y1="180" x2="460" y2="30" stroke="#b45309" stroke-width="2.4"/>
      <!-- mark intercept -->
      <line x1="40" y1="180" x2="40" y2="200" stroke="#b45309" stroke-width="2" stroke-dasharray="3 2"/>
      <text x="56" y="178" font-family="JetBrains Mono, monospace" font-size="10" fill="#b45309">α̂ = 0.05</text>
      <text x="350" y="56" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#b45309">β̂_Egger = 0.50</text>
    </g>
  </g>

  <!-- ============ Panel 3: Weighted median (bottom-left) ============ -->
  <g transform="translate(60, 400)">
    <rect x="0" y="0" width="520" height="280" fill="#fafaf9" stroke="#c4c1b6" stroke-width="0.6" rx="3"/>
    <text x="20" y="28" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(3)  WEIGHTED MEDIAN</text>
    <text x="20" y="44" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252">consistent if ≥ 50% of instrument weight comes from valid SNPs</text>

    <g transform="translate(40, 60)">
      <line x1="40" y1="200" x2="460" y2="200" stroke="#374151" stroke-width="0.8"/>
      <line x1="40" y1="20" x2="40" y2="200" stroke="#374151" stroke-width="0.8"/>
      <text x="250" y="218" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">β̂(Z → X)</text>
      <text x="22" y="110" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" transform="rotate(-90 22 110)">β̂(Z → Y)</text>

      <g fill="#1e3a8a" opacity="0.7">
        <circle cx="70" cy="184" r="3"/><circle cx="86" cy="178" r="3.5"/><circle cx="100" cy="176" r="3"/>
        <circle cx="118" cy="170" r="3.5"/><circle cx="132" cy="164" r="4"/><circle cx="148" cy="160" r="3"/>
        <circle cx="166" cy="158" r="3.5"/><circle cx="184" cy="148" r="4"/><circle cx="198" cy="142" r="3"/>
        <circle cx="212" cy="138" r="3"/><circle cx="228" cy="130" r="4"/><circle cx="244" cy="126" r="3.5"/>
        <circle cx="262" cy="120" r="3"/><circle cx="278" cy="110" r="3.5"/><circle cx="296" cy="104" r="3"/>
        <circle cx="312" cy="98" r="3"/><circle cx="330" cy="92" r="4"/><circle cx="346" cy="84" r="3"/>
        <circle cx="362" cy="78" r="3.5"/><circle cx="378" cy="72" r="3"/><circle cx="394" cy="62" r="3"/>
        <circle cx="412" cy="54" r="3.5"/><circle cx="428" cy="48" r="3"/><circle cx="444" cy="40" r="3.5"/>
        <circle cx="240" cy="80" r="3.5" fill="#dc2626"/>
        <circle cx="300" cy="58" r="3.5" fill="#dc2626"/>
        <circle cx="370" cy="40" r="3.5" fill="#dc2626"/>
        <circle cx="60" cy="190" r="3"/><circle cx="78" cy="182" r="3"/><circle cx="200" cy="146" r="3"/>
      </g>
      <!-- median slope (close to truth, robust) -->
      <line x1="40" y1="200" x2="460" y2="40" stroke="#065f46" stroke-width="2.4"/>
      <text x="350" y="60" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#065f46">β̂_WM = 0.52</text>
    </g>
  </g>

  <!-- ============ Panel 4: MR-PRESSO (bottom-right) ============ -->
  <g transform="translate(620, 400)">
    <rect x="0" y="0" width="520" height="280" fill="#fafaf9" stroke="#c4c1b6" stroke-width="0.6" rx="3"/>
    <text x="20" y="28" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(4)  MR-PRESSO  —  OUTLIER REMOVAL</text>
    <text x="20" y="44" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252">flag SNPs with significant per-residual chi-squared; drop; re-fit IVW</text>

    <g transform="translate(40, 60)">
      <line x1="40" y1="200" x2="460" y2="200" stroke="#374151" stroke-width="0.8"/>
      <line x1="40" y1="20" x2="40" y2="200" stroke="#374151" stroke-width="0.8"/>
      <text x="250" y="218" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">β̂(Z → X)</text>
      <text x="22" y="110" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" transform="rotate(-90 22 110)">β̂(Z → Y)</text>

      <g fill="#1e3a8a" opacity="0.7">
        <circle cx="70" cy="184" r="3"/><circle cx="86" cy="178" r="3.5"/><circle cx="100" cy="176" r="3"/>
        <circle cx="118" cy="170" r="3.5"/><circle cx="132" cy="164" r="4"/><circle cx="148" cy="160" r="3"/>
        <circle cx="166" cy="158" r="3.5"/><circle cx="184" cy="148" r="4"/><circle cx="198" cy="142" r="3"/>
        <circle cx="212" cy="138" r="3"/><circle cx="228" cy="130" r="4"/><circle cx="244" cy="126" r="3.5"/>
        <circle cx="262" cy="120" r="3"/><circle cx="278" cy="110" r="3.5"/><circle cx="296" cy="104" r="3"/>
        <circle cx="312" cy="98" r="3"/><circle cx="330" cy="92" r="4"/><circle cx="346" cy="84" r="3"/>
        <circle cx="362" cy="78" r="3.5"/><circle cx="378" cy="72" r="3"/><circle cx="394" cy="62" r="3"/>
        <circle cx="412" cy="54" r="3.5"/><circle cx="428" cy="48" r="3"/><circle cx="444" cy="40" r="3.5"/>
        <circle cx="60" cy="190" r="3"/><circle cx="78" cy="182" r="3"/><circle cx="200" cy="146" r="3"/>
      </g>
      <!-- flagged outliers shown as red circles with X -->
      <g>
        <circle cx="240" cy="80" r="6" fill="none" stroke="#dc2626" stroke-width="1.8"/>
        <line x1="234" y1="74" x2="246" y2="86" stroke="#dc2626" stroke-width="1.6"/>
        <line x1="246" y1="74" x2="234" y2="86" stroke="#dc2626" stroke-width="1.6"/>

        <circle cx="300" cy="58" r="6" fill="none" stroke="#dc2626" stroke-width="1.8"/>
        <line x1="294" y1="52" x2="306" y2="64" stroke="#dc2626" stroke-width="1.6"/>
        <line x1="306" y1="52" x2="294" y2="64" stroke="#dc2626" stroke-width="1.6"/>

        <circle cx="370" cy="40" r="6" fill="none" stroke="#dc2626" stroke-width="1.8"/>
        <line x1="364" y1="34" x2="376" y2="46" stroke="#dc2626" stroke-width="1.6"/>
        <line x1="376" y1="34" x2="364" y2="46" stroke="#dc2626" stroke-width="1.6"/>
      </g>
      <!-- Re-fit slope without outliers -->
      <line x1="40" y1="200" x2="460" y2="38" stroke="#1e3a8a" stroke-width="2.4"/>
      <text x="320" y="64" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#1e3a8a">β̂_PRESSO = 0.51</text>
      <text x="320" y="80" font-family="Inter, sans-serif" font-size="9" fill="#dc2626">3 outliers removed (p &lt; 0.01)</text>
    </g>
  </g>

  <!-- Summary footer -->
  <g transform="translate(60, 700)">
    <rect x="0" y="0" width="1080" height="42" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.5"/>
    <text x="20" y="24" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#374151">CONVERGENCE  (true β = 0.50):</text>
    <text x="290" y="24" font-family="JetBrains Mono, monospace" font-size="11" fill="#1e3a8a">IVW 0.62</text>
    <text x="430" y="24" font-family="JetBrains Mono, monospace" font-size="11" fill="#b45309">Egger 0.50</text>
    <text x="590" y="24" font-family="JetBrains Mono, monospace" font-size="11" fill="#065f46">WM 0.52</text>
    <text x="730" y="24" font-family="JetBrains Mono, monospace" font-size="11" fill="#1e3a8a">PRESSO 0.51</text>
    <text x="900" y="24" font-family="Inter, sans-serif" font-size="11" font-weight="600" font-style="italic" fill="#525252">→ three of four agree; flag IVW</text>
  </g>
</svg>
