<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="t d">
  <title id="t">Three IV assumptions and the diagnostic for each</title>
  <desc id="d">A three-row reference card. Each row corresponds to one of the three core instrumental-variable assumptions: relevance, independence, and exclusion restriction. For each, the row gives a one-line statement of the assumption, a small inline causal graph showing what would have to be true, the diagnostic statistic that tests it, the rough rule of thumb, and the typical failure mode in Mendelian-randomisation practice. A footer reminds the reader that exclusion is the hardest to verify and the one MR-Egger, MR-PRESSO, weighted median, and Steiger are designed to probe.</desc>

  <rect x="0" y="0" width="1200" height="620" fill="#fafaf9"/>

  <text x="60" y="42" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">THREE IV ASSUMPTIONS — STATEMENT, DIAGNOSTIC, AND HOW IT BREAKS</text>
  <text x="60" y="62" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Run the diagnostic before reporting a causal estimate. Failure on any row invalidates the IV.</text>

  <!-- Column header bar -->
  <line x1="60" y1="92" x2="1140" y2="92" stroke="#374151" stroke-width="1"/>
  <text x="80" y="110" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">ASSUMPTION</text>
  <text x="380" y="110" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">CAUSAL-GRAPH FORM</text>
  <text x="700" y="110" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">DIAGNOSTIC</text>
  <text x="940" y="110" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#dc2626" letter-spacing="0.06em">HOW IT BREAKS IN PRACTICE</text>
  <line x1="60" y1="118" x2="1140" y2="118" stroke="#374151" stroke-width="0.5"/>

  <defs>
    <marker id="ck-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0a0a0a"/>
    </marker>
    <marker id="ck-arr-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- ============ Row 1: Relevance ============ -->
  <g transform="translate(60, 134)">
    <circle cx="20" cy="60" r="16" fill="#1e3a8a"/>
    <text x="20" y="65" font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" fill="#fafaf9" text-anchor="middle">1</text>

    <text x="48" y="32" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#374151">RELEVANCE</text>
    <text x="48" y="52" font-family="Inter, sans-serif" font-size="10" fill="#525252">Z actually predicts X.</text>
    <text x="48" y="68" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">π = ∂X/∂Z ≠ 0</text>
    <text x="48" y="86" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">The instrument has bite.</text>

    <!-- mini graph: Z → X → Y -->
    <g transform="translate(330, 30)">
      <circle cx="20" cy="40" r="14" fill="#fafaf9" stroke="#0a0a0a" stroke-width="1.4"/>
      <text x="20" y="44" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">Z</text>
      <circle cx="110" cy="40" r="14" fill="#fafaf9" stroke="#0a0a0a" stroke-width="1.4"/>
      <text x="110" y="44" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">X</text>
      <circle cx="200" cy="40" r="14" fill="#fafaf9" stroke="#0a0a0a" stroke-width="1.4"/>
      <text x="200" y="44" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">Y</text>
      <line x1="34" y1="40" x2="96" y2="40" stroke="#0a0a0a" stroke-width="1.6" marker-end="url(#ck-arr)"/>
      <line x1="124" y1="40" x2="186" y2="40" stroke="#0a0a0a" stroke-width="1.6" marker-end="url(#ck-arr)"/>
      <text x="65" y="32" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#0a0a0a">π</text>
      <text x="155" y="32" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#0a0a0a">β</text>
    </g>

    <text x="700" y="50" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">First-stage F statistic</text>
    <text x="700" y="68" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">F = (π̂ / SE(π̂))²</text>
    <text x="700" y="86" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#1e3a8a">rule of thumb:  F &gt; 10</text>

    <g transform="translate(940, 0)">
      <rect x="0" y="20" width="200" height="78" fill="#dc2626" opacity="0.08" rx="2"/>
      <text x="14" y="42" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#dc2626">Weak instrument</text>
      <text x="14" y="60" font-family="Inter, sans-serif" font-size="9.5" fill="#525252">F &lt; 10 ⇒ bias toward the</text>
      <text x="14" y="74" font-family="Inter, sans-serif" font-size="9.5" fill="#525252">OLS estimate (one-sample)</text>
      <text x="14" y="88" font-family="Inter, sans-serif" font-size="9.5" fill="#525252">or toward null (two-sample).</text>
    </g>
  </g>

  <line x1="80" y1="252" x2="1120" y2="252" stroke="#e5e3dc" stroke-width="0.5"/>

  <!-- ============ Row 2: Independence ============ -->
  <g transform="translate(60, 268)">
    <circle cx="20" cy="60" r="16" fill="#1e3a8a"/>
    <text x="20" y="65" font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" fill="#fafaf9" text-anchor="middle">2</text>

    <text x="48" y="32" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#374151">INDEPENDENCE  (exchangeability)</text>
    <text x="48" y="52" font-family="Inter, sans-serif" font-size="10" fill="#525252">Z is independent of confounders C.</text>
    <text x="48" y="68" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">Z ⊥ C</text>
    <text x="48" y="86" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">Randomisation upstream of confounders.</text>

    <g transform="translate(330, 30)">
      <circle cx="20" cy="40" r="14" fill="#fafaf9" stroke="#0a0a0a" stroke-width="1.4"/>
      <text x="20" y="44" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">Z</text>
      <circle cx="110" cy="40" r="14" fill="#fafaf9" stroke="#0a0a0a" stroke-width="1.4"/>
      <text x="110" y="44" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">X</text>
      <circle cx="200" cy="40" r="14" fill="#fafaf9" stroke="#0a0a0a" stroke-width="1.4"/>
      <text x="200" y="44" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">Y</text>
      <circle cx="155" cy="-10" r="14" fill="#fafaf9" stroke="#1e3a8a" stroke-width="1.4"/>
      <text x="155" y="-6" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">C</text>
      <line x1="34" y1="40" x2="96" y2="40" stroke="#0a0a0a" stroke-width="1.6" marker-end="url(#ck-arr)"/>
      <line x1="124" y1="40" x2="186" y2="40" stroke="#0a0a0a" stroke-width="1.6" marker-end="url(#ck-arr)"/>
      <line x1="143" y1="0" x2="116" y2="28" stroke="#1e3a8a" stroke-width="1.4" marker-end="url(#ck-arr)"/>
      <line x1="167" y1="0" x2="194" y2="28" stroke="#1e3a8a" stroke-width="1.4" marker-end="url(#ck-arr)"/>
      <!-- crossed-out C→Z -->
      <line x1="34" y1="30" x2="142" y2="-2" stroke="#525252" stroke-width="1.2" stroke-dasharray="2 3" opacity="0.5"/>
      <line x1="68" y1="22" x2="108" y2="8" stroke="#dc2626" stroke-width="2"/>
    </g>

    <text x="700" y="50" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">Z balance across ancestry PCs</text>
    <text x="700" y="68" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">cor(Z, PC₁…PCₖ) ≈ 0</text>
    <text x="700" y="86" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#1e3a8a">adjust GWAS for top 10 PCs</text>

    <g transform="translate(940, 0)">
      <rect x="0" y="20" width="200" height="78" fill="#dc2626" opacity="0.08" rx="2"/>
      <text x="14" y="42" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#dc2626">Population stratification</text>
      <text x="14" y="60" font-family="Inter, sans-serif" font-size="9.5" fill="#525252">Allele frequencies vary by</text>
      <text x="14" y="74" font-family="Inter, sans-serif" font-size="9.5" fill="#525252">ancestry; assortative mating;</text>
      <text x="14" y="88" font-family="Inter, sans-serif" font-size="9.5" fill="#525252">cryptic relatedness.</text>
    </g>
  </g>

  <line x1="80" y1="386" x2="1120" y2="386" stroke="#e5e3dc" stroke-width="0.5"/>

  <!-- ============ Row 3: Exclusion ============ -->
  <g transform="translate(60, 402)">
    <circle cx="20" cy="60" r="16" fill="#1e3a8a"/>
    <text x="20" y="65" font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" fill="#fafaf9" text-anchor="middle">3</text>

    <text x="48" y="32" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#374151">EXCLUSION RESTRICTION</text>
    <text x="48" y="52" font-family="Inter, sans-serif" font-size="10" fill="#525252">Z affects Y only through X — no direct or pleiotropic path.</text>
    <text x="48" y="68" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">Z ⫫ Y | X, C</text>
    <text x="48" y="86" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">The hardest assumption; untestable from the same data.</text>

    <g transform="translate(330, 30)">
      <circle cx="20" cy="40" r="14" fill="#fafaf9" stroke="#0a0a0a" stroke-width="1.4"/>
      <text x="20" y="44" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">Z</text>
      <circle cx="110" cy="40" r="14" fill="#fafaf9" stroke="#0a0a0a" stroke-width="1.4"/>
      <text x="110" y="44" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">X</text>
      <circle cx="200" cy="40" r="14" fill="#fafaf9" stroke="#0a0a0a" stroke-width="1.4"/>
      <text x="200" y="44" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">Y</text>
      <line x1="34" y1="40" x2="96" y2="40" stroke="#0a0a0a" stroke-width="1.6" marker-end="url(#ck-arr)"/>
      <line x1="124" y1="40" x2="186" y2="40" stroke="#0a0a0a" stroke-width="1.6" marker-end="url(#ck-arr)"/>
      <!-- forbidden direct arrow Z → Y -->
      <path d="M 28 30 Q 110 -10, 192 30" fill="none" stroke="#dc2626" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#ck-arr-r)"/>
      <text x="110" y="2" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#dc2626">forbidden: horizontal pleiotropy</text>
    </g>

    <text x="700" y="44" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">MR-Egger intercept (α)</text>
    <text x="700" y="60" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">MR-PRESSO outlier test</text>
    <text x="700" y="76" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">Weighted median, Steiger</text>
    <text x="700" y="94" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#1e3a8a">need ≥ 3 IVs for a meaningful test</text>

    <g transform="translate(940, 0)">
      <rect x="0" y="20" width="200" height="78" fill="#dc2626" opacity="0.08" rx="2"/>
      <text x="14" y="42" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#dc2626">Horizontal pleiotropy</text>
      <text x="14" y="60" font-family="Inter, sans-serif" font-size="9.5" fill="#525252">SNP affects Y via a non-X</text>
      <text x="14" y="74" font-family="Inter, sans-serif" font-size="9.5" fill="#525252">pathway. Most common cause</text>
      <text x="14" y="88" font-family="Inter, sans-serif" font-size="9.5" fill="#525252">of MR replication failure.</text>
    </g>
  </g>

  <!-- footer -->
  <line x1="60" y1="572" x2="1140" y2="572" stroke="#374151" stroke-width="0.5"/>
  <text x="60" y="592" font-family="Inter, sans-serif" font-size="10" fill="#525252">Sections: 1 → §25.4;   2 → §25.4 and §25.8;   3 → §25.5 — §25.6.</text>
  <text x="60" y="606" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">If you cannot defend a row, you do not have an instrument — you have a correlation with extra steps.</text>
</svg>
