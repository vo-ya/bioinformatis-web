<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="t d">
  <title id="t">PCSK9 cis-Mendelian-randomisation walk-through</title>
  <desc id="d">A three-panel cis-MR walk-through for the PCSK9 drug target. Panel A is a locus zoom centred on the PCSK9 gene on chromosome 1p32, with eQTL signal as a Manhattan-style track and the gene body highlighted; a small number of conditionally independent cis-SNPs within plus or minus 100 kilobases of the transcription start site are selected as instruments. Panel B is a two-sample MR scatter using those cis-SNPs as instruments, with SNP effects on LDL on the x-axis and SNP effects on coronary artery disease on the y-axis; the inverse-variance-weighted slope agrees with the MR-Egger slope, and a near-zero intercept indicates no systematic horizontal pleiotropy. Panel C is a phenome-wide side-effect scan: the same PCSK9 cis-instruments are projected onto sixteen diverse phenotypes; the bar chart confirms the expected LDL and CAD effects, finds a small protective signal on stroke, and shows no major adverse signals for diabetes, cancer, or psychiatric outcomes. A footer summarises the implication for drug-development decisions.</desc>

  <rect x="0" y="0" width="1200" height="720" fill="#fafaf9"/>

  <text x="60" y="42" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">CIS-MR FOR PCSK9 — LOCUS ZOOM, MR SCATTER, AND PHEWAS SAFETY SCAN</text>
  <text x="60" y="62" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">The pre-trial evidence base that supported evolocumab and alirocumab. One target, three views, one drug-development decision.</text>

  <!-- ============ Panel A: Locus zoom ============ -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="1080" height="180" fill="#fafaf9" stroke="#c4c1b6" stroke-width="0.6" rx="3"/>
    <text x="20" y="28" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(A)  LOCUS ZOOM — PCSK9 ON CHR 1p32</text>
    <text x="20" y="44" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252">eQTL signal (−log₁₀ p) across ±200 kb of the transcription start site; cis-SNPs within ±100 kb selected as instruments</text>

    <!-- chromosome ribbon -->
    <g transform="translate(40, 70)">
      <line x1="0" y1="60" x2="1000" y2="60" stroke="#8a8a85" stroke-width="0.8"/>
      <!-- gene body -->
      <rect x="430" y="48" width="100" height="24" fill="#1e3a8a" opacity="0.18" stroke="#1e3a8a" stroke-width="1"/>
      <text x="480" y="64" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#1e3a8a">PCSK9</text>
      <text x="480" y="92" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252">~25 kb, exons 1–12</text>

      <!-- Manhattan-style peaks: tall around gene body -->
      <g>
        <!-- background dots -->
        <g fill="#8a8a85" opacity="0.5">
          <circle cx="60" cy="56" r="1.8"/><circle cx="100" cy="58" r="1.8"/><circle cx="140" cy="54" r="1.8"/>
          <circle cx="180" cy="56" r="1.8"/><circle cx="220" cy="54" r="1.8"/><circle cx="260" cy="50" r="1.8"/>
          <circle cx="300" cy="48" r="1.8"/><circle cx="340" cy="44" r="1.8"/><circle cx="380" cy="40" r="1.8"/>
          <circle cx="620" cy="44" r="1.8"/><circle cx="660" cy="48" r="1.8"/><circle cx="700" cy="50" r="1.8"/>
          <circle cx="740" cy="52" r="1.8"/><circle cx="780" cy="54" r="1.8"/><circle cx="820" cy="56" r="1.8"/>
          <circle cx="860" cy="56" r="1.8"/><circle cx="900" cy="58" r="1.8"/><circle cx="940" cy="58" r="1.8"/>
        </g>
        <!-- big peak in gene body: cis-eQTL SNPs -->
        <g fill="#dc2626">
          <circle cx="430" cy="14" r="3.5"/>
          <circle cx="450" cy="10" r="3.5"/>
          <circle cx="470" cy="6"  r="4"/>
          <circle cx="488" cy="2"  r="4"/>
          <circle cx="510" cy="8"  r="3.5"/>
          <circle cx="528" cy="14" r="3.5"/>
        </g>
        <!-- gene body local SNPs -->
        <g fill="#b45309">
          <circle cx="420" cy="28" r="2.4"/><circle cx="440" cy="20" r="2.4"/>
          <circle cx="500" cy="20" r="2.4"/><circle cx="520" cy="28" r="2.4"/>
        </g>
      </g>

      <!-- y-axis label -->
      <text x="-26" y="30" font-family="Inter, sans-serif" font-size="9" fill="#525252" transform="rotate(-90 -26 30)">−log₁₀ p (eQTL)</text>
      <!-- ticks -->
      <line x1="-4" y1="60" x2="0" y2="60" stroke="#525252" stroke-width="0.6"/>
      <text x="-8" y="64" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">0</text>
      <line x1="-4" y1="6" x2="0" y2="6" stroke="#525252" stroke-width="0.6"/>
      <text x="-8" y="10" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">50</text>

      <!-- x positions -->
      <text x="0" y="84" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">55.3 Mb</text>
      <text x="1000" y="84" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">55.7 Mb</text>
      <text x="480" y="106" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#525252" text-anchor="middle">6 conditionally independent cis-eQTLs retained as instruments</text>
    </g>
  </g>

  <!-- ============ Panel B: MR scatter ============ -->
  <g transform="translate(60, 296)">
    <rect x="0" y="0" width="520" height="320" fill="#fafaf9" stroke="#c4c1b6" stroke-width="0.6" rx="3"/>
    <text x="20" y="28" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(B)  CIS-MR  —  LDL → CAD</text>
    <text x="20" y="44" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252">SNP effect on LDL (GLGC) versus SNP effect on CAD (CARDIoGRAMplusC4D); IVW and Egger fit</text>

    <g transform="translate(60, 80)">
      <line x1="40" y1="200" x2="420" y2="200" stroke="#374151" stroke-width="0.8"/>
      <line x1="40" y1="20" x2="40" y2="200" stroke="#374151" stroke-width="0.8"/>
      <!-- zero line -->
      <line x1="40" y1="110" x2="420" y2="110" stroke="#8a8a85" stroke-width="0.4" stroke-dasharray="2 2"/>
      <text x="230" y="218" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">β̂(SNP → LDL)  (SD per allele)</text>
      <text x="22" y="110" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" transform="rotate(-90 22 110)">β̂(SNP → CAD)  (log OR)</text>

      <!-- 6 SNPs, with confidence whiskers, lying on a clean LDL → CAD positive slope -->
      <g stroke="#1e3a8a" stroke-width="1.2">
        <line x1="100" y1="160" x2="100" y2="178"/>
        <line x1="150" y1="142" x2="150" y2="162"/>
        <line x1="208" y1="120" x2="208" y2="142"/>
        <line x1="262" y1="100" x2="262" y2="122"/>
        <line x1="316" y1="80" x2="316" y2="100"/>
        <line x1="376" y1="60" x2="376" y2="82"/>
      </g>
      <g fill="#1e3a8a">
        <circle cx="100" cy="169" r="4"/>
        <circle cx="150" cy="152" r="4"/>
        <circle cx="208" cy="131" r="4"/>
        <circle cx="262" cy="111" r="4"/>
        <circle cx="316" cy="90" r="4"/>
        <circle cx="376" cy="71" r="4"/>
      </g>
      <!-- IVW slope -->
      <line x1="40" y1="194" x2="420" y2="50" stroke="#1e3a8a" stroke-width="2.4"/>
      <!-- Egger slope (almost identical) -->
      <line x1="40" y1="190" x2="420" y2="46" stroke="#b45309" stroke-width="1.8" stroke-dasharray="6 3"/>

      <text x="280" y="44" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#1e3a8a">β̂_IVW   = 0.55  (0.45, 0.65)</text>
      <text x="280" y="60" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#b45309">β̂_Egger = 0.54  α̂ = 0.003</text>
      <text x="280" y="76" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#065f46">intercept ≈ 0  →  no systematic pleiotropy</text>
    </g>
  </g>

  <!-- ============ Panel C: PheWAS ============ -->
  <g transform="translate(620, 296)">
    <rect x="0" y="0" width="520" height="320" fill="#fafaf9" stroke="#c4c1b6" stroke-width="0.6" rx="3"/>
    <text x="20" y="28" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(C)  PHEWAS SAFETY SCAN</text>
    <text x="20" y="44" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252">cis-MR estimate per phenotype; expected effects on lipids/CAD; off-target signals checked</text>

    <!-- Horizontal bars -->
    <g transform="translate(170, 70)">
      <!-- center axis at x=130 -->
      <line x1="130" y1="0" x2="130" y2="232" stroke="#525252" stroke-width="0.8"/>
      <text x="130" y="246" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">cis-MR β̂  (SD per LDL-lowering allele)</text>
      <text x="60" y="246" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">−0.5</text>
      <text x="200" y="246" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">+0.5</text>

      <!-- Bars: y increments of 14 -->
      <!-- LDL: large negative -->
      <g font-family="Inter, sans-serif" font-size="9.5" fill="#374151">
        <text x="-8" y="10" text-anchor="end">LDL cholesterol</text>
        <rect x="20" y="2" width="110" height="10" fill="#065f46" opacity="0.85"/>
        <text x="-8" y="26" text-anchor="end">total cholesterol</text>
        <rect x="50" y="18" width="80" height="10" fill="#065f46" opacity="0.7"/>
        <text x="-8" y="42" text-anchor="end">CAD</text>
        <rect x="50" y="34" width="80" height="10" fill="#065f46" opacity="0.85"/>
        <text x="-8" y="58" text-anchor="end">myocardial infarction</text>
        <rect x="70" y="50" width="60" height="10" fill="#065f46" opacity="0.7"/>
        <text x="-8" y="74" text-anchor="end">ischemic stroke</text>
        <rect x="100" y="66" width="30" height="10" fill="#065f46" opacity="0.55"/>
        <text x="-8" y="90" text-anchor="end">peripheral artery disease</text>
        <rect x="105" y="82" width="25" height="10" fill="#065f46" opacity="0.55"/>
        <text x="-8" y="106" text-anchor="end">HDL cholesterol</text>
        <rect x="130" y="98" width="6" height="10" fill="#8a8a85" opacity="0.6"/>
        <text x="-8" y="122" text-anchor="end">triglycerides</text>
        <rect x="130" y="114" width="8" height="10" fill="#8a8a85" opacity="0.6"/>
        <text x="-8" y="138" text-anchor="end">type-2 diabetes</text>
        <rect x="130" y="130" width="10" height="10" fill="#8a8a85" opacity="0.5"/>
        <text x="-8" y="154" text-anchor="end">BMI</text>
        <rect x="124" y="146" width="6" height="10" fill="#8a8a85" opacity="0.5"/>
        <text x="-8" y="170" text-anchor="end">cancer (any)</text>
        <rect x="128" y="162" width="4" height="10" fill="#8a8a85" opacity="0.5"/>
        <text x="-8" y="186" text-anchor="end">Alzheimer's</text>
        <rect x="130" y="178" width="6" height="10" fill="#8a8a85" opacity="0.5"/>
        <text x="-8" y="202" text-anchor="end">depression</text>
        <rect x="126" y="194" width="6" height="10" fill="#8a8a85" opacity="0.5"/>
        <text x="-8" y="218" text-anchor="end">eGFR (kidney)</text>
        <rect x="130" y="210" width="6" height="10" fill="#8a8a85" opacity="0.5"/>
        <text x="-8" y="234" text-anchor="end">liver ALT</text>
        <rect x="130" y="226" width="4" height="10" fill="#8a8a85" opacity="0.5"/>
      </g>
    </g>

    <text x="20" y="304" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#065f46">on-target: large LDL/CAD lowering · no off-target hits at FDR 5%</text>
  </g>

  <!-- ============ Footer summary ============ -->
  <g transform="translate(60, 634)">
    <rect x="0" y="0" width="1080" height="64" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8" rx="3"/>
    <text x="20" y="24" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a">DEVELOPMENT DECISION</text>
    <text x="20" y="42" font-family="Inter, sans-serif" font-size="10.5" fill="#374151">cis-MR predicted strong CAD reduction (β̂ ≈ 0.55 per SD LDL drop), Egger intercept indistinguishable from zero, no PheWAS adverse signals.</text>
    <text x="20" y="58" font-family="Inter, sans-serif" font-size="10.5" fill="#374151">Outcome: alirocumab and evolocumab progressed; FOURIER and ODYSSEY trials reproduced the predicted CAD effect within a factor of two.</text>
  </g>
</svg>
