<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-labelledby="t d">
  <title id="t">Drug discovery attrition funnel from library to approved drug</title>
  <desc id="d">A funnel-shaped diagram in seven horizontal bands. The widest band at the top represents a virtual library of around ten million compounds. Successive narrower bands represent screening hits at ten thousand compounds, validated hits at three hundred, leads at fifty, development candidates at five, candidates entering Phase 1 at two, and the final approved drug at one. Each band is annotated with the typical timeline, dominant attrition cause, and cost contribution. A side panel shows the cumulative cost rising from a few million dollars at the screening stage to roughly one to three billion dollars by approval, with most of the spend concentrated in clinical phases.</desc>

  <rect x="0" y="0" width="1200" height="660" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="40" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">DRUG DISCOVERY ATTRITION — TEN MILLION COMPOUNDS TO ONE APPROVED DRUG</text>
  <text x="60" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Most of the time, money, and attrition lives below the IND-filing line. Computation cheapens the top of the funnel; biology still controls the bottom.</text>

  <!-- Funnel bands. Each band: trapezoid + label + count + duration -->
  <!-- Band 1: virtual library -->
  <g>
    <polygon points="60,100 1000,100 940,150 120,150" fill="#1e3a8a" opacity="0.08" stroke="#1e3a8a" stroke-width="1"/>
    <text x="130" y="128" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1e3a8a">Virtual / commercial library</text>
    <text x="130" y="143" font-family="Inter, sans-serif" font-size="10" fill="#525252">ZINC, Enamine REAL — generate or enumerate candidates</text>
    <text x="830" y="128" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#1e3a8a" text-anchor="end">10 000 000</text>
    <text x="830" y="143" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="end">compounds enumerated</text>
  </g>

  <!-- Band 2: virtual screen hits -->
  <g>
    <polygon points="120,160 940,160 880,210 180,210" fill="#1e3a8a" opacity="0.12" stroke="#1e3a8a" stroke-width="1"/>
    <text x="190" y="188" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1e3a8a">Virtual screen hits (Vina, GNN, ADMET filter)</text>
    <text x="190" y="203" font-family="Inter, sans-serif" font-size="10" fill="#525252">~ 6 months · ~$0.5M compute + licensing</text>
    <text x="770" y="188" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#1e3a8a" text-anchor="end">10 000</text>
    <text x="770" y="203" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="end">top by predicted &#x394;G + druglikeness</text>
  </g>

  <!-- Band 3: assay-confirmed hits -->
  <g>
    <polygon points="180,220 880,220 820,275 240,275" fill="#1e3a8a" opacity="0.18" stroke="#1e3a8a" stroke-width="1"/>
    <text x="250" y="248" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1e3a8a">Assay-confirmed hits</text>
    <text x="250" y="263" font-family="Inter, sans-serif" font-size="10" fill="#525252">~ 12 months · ~$3M wet-lab · 5–15% hit rate on the order list</text>
    <text x="710" y="248" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#1e3a8a" text-anchor="end">300</text>
    <text x="710" y="263" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="end">sub-&#x3BC;M activity, structurally diverse</text>
  </g>

  <!-- Band 4: leads -->
  <g>
    <polygon points="240,285 820,285 760,340 300,340" fill="#1e3a8a" opacity="0.26" stroke="#1e3a8a" stroke-width="1"/>
    <text x="310" y="313" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1e3a8a">Leads after hit-to-lead</text>
    <text x="310" y="328" font-family="Inter, sans-serif" font-size="10" fill="#525252">~ 18 months · ~$15M · SAR + selectivity + early ADMET</text>
    <text x="650" y="313" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#1e3a8a" text-anchor="end">50</text>
    <text x="650" y="328" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="end">analogue series with PK signal</text>
  </g>

  <!-- Band 5: development candidates -->
  <g>
    <polygon points="300,350 760,350 700,405 360,405" fill="#1e3a8a" opacity="0.36" stroke="#1e3a8a" stroke-width="1"/>
    <text x="370" y="378" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#fafaf9">Development candidates</text>
    <text x="370" y="393" font-family="Inter, sans-serif" font-size="10" fill="#fafaf9">~ 30 months · ~$60M · lead optimisation + tox</text>
    <text x="590" y="378" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#fafaf9" text-anchor="end">5</text>
    <text x="590" y="393" font-family="Inter, sans-serif" font-size="10" fill="#fafaf9" text-anchor="end">IND-enabling profiles</text>
  </g>

  <!-- Band 6: Phase 1 -->
  <g>
    <polygon points="360,415 700,415 640,470 420,470" fill="#1e3a8a" opacity="0.55" stroke="#1e3a8a" stroke-width="1"/>
    <text x="430" y="443" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#fafaf9">Entered Phase 1 (IND filed)</text>
    <text x="430" y="458" font-family="Inter, sans-serif" font-size="10" fill="#fafaf9">~ 18 months · ~$30M · safety, dose finding, PK in humans</text>
    <text x="530" y="443" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#fafaf9" text-anchor="end">2</text>
  </g>

  <!-- Band 7: Phase 2/3 -->
  <g>
    <polygon points="420,480 640,480 580,535 480,535" fill="#1e3a8a" opacity="0.75" stroke="#1e3a8a" stroke-width="1"/>
    <text x="490" y="508" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#fafaf9">Phase 2 — Phase 3</text>
    <text x="490" y="523" font-family="Inter, sans-serif" font-size="10" fill="#fafaf9">~ 5 years · ~$300M+ · ~90% Phase 2 fail</text>
  </g>

  <!-- Band 8: approval -->
  <g>
    <polygon points="480,545 580,545 555,600 505,600" fill="#1e3a8a" stroke="#1e3a8a" stroke-width="1"/>
    <text x="530" y="572" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#fafaf9" text-anchor="middle">FDA approval</text>
    <text x="530" y="588" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#fafaf9" text-anchor="middle">1</text>
  </g>

  <!-- Cumulative cost gauge on the right -->
  <g transform="translate(1020, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">CUMULATIVE COST</text>
    <text x="0" y="16" font-family="Inter, sans-serif" font-size="9" fill="#525252">to-date, USD, log scale</text>

    <!-- vertical axis -->
    <line x1="20" y1="40" x2="20" y2="500" stroke="#374151" stroke-width="1"/>
    <!-- tick lines -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85">
      <line x1="18" y1="40"  x2="22" y2="40"  stroke="#8a8a85" stroke-width="1"/><text x="28" y="44">$3B</text>
      <line x1="18" y1="140" x2="22" y2="140" stroke="#8a8a85" stroke-width="1"/><text x="28" y="144">$1B</text>
      <line x1="18" y1="240" x2="22" y2="240" stroke="#8a8a85" stroke-width="1"/><text x="28" y="244">$100M</text>
      <line x1="18" y1="340" x2="22" y2="340" stroke="#8a8a85" stroke-width="1"/><text x="28" y="344">$10M</text>
      <line x1="18" y1="440" x2="22" y2="440" stroke="#8a8a85" stroke-width="1"/><text x="28" y="444">$1M</text>
      <line x1="18" y1="500" x2="22" y2="500" stroke="#8a8a85" stroke-width="1"/><text x="28" y="504">$0.1M</text>
    </g>
    <!-- cost path: dots aligned to band y positions -->
    <g>
      <polyline points="20,470 20,420 20,360 20,300 20,220 20,140 20,80 20,60"
                fill="none" stroke="#b45309" stroke-width="2"/>
      <circle cx="20" cy="470" r="3" fill="#b45309"/>
      <circle cx="20" cy="420" r="3" fill="#b45309"/>
      <circle cx="20" cy="360" r="3" fill="#b45309"/>
      <circle cx="20" cy="300" r="3" fill="#b45309"/>
      <circle cx="20" cy="220" r="3" fill="#b45309"/>
      <circle cx="20" cy="140" r="3" fill="#b45309"/>
      <circle cx="20" cy="80"  r="3" fill="#b45309"/>
      <circle cx="20" cy="60"  r="3" fill="#b45309"/>
    </g>
  </g>

  <!-- Annotation: where AI cheapens vs. doesn't -->
  <g>
    <line x1="940" y1="220" x2="970" y2="220" stroke="#065f46" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="975" y="218" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#065f46">AI cheapens this region</text>
    <text x="975" y="232" font-family="Inter, sans-serif" font-size="9" fill="#525252">virtual screen, ADMET filter,</text>
    <text x="975" y="244" font-family="Inter, sans-serif" font-size="9" fill="#525252">de novo generation</text>

    <line x1="640" y1="500" x2="980" y2="500" stroke="#b91c1c" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="985" y="498" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b91c1c">AI has not changed this</text>
    <text x="985" y="512" font-family="Inter, sans-serif" font-size="9" fill="#525252">clinical attrition still ~90%</text>
    <text x="985" y="524" font-family="Inter, sans-serif" font-size="9" fill="#525252">Phase 2 -&gt; Phase 3</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="618" x2="1140" y2="618" stroke="#374151" stroke-width="0.5"/>
  <text x="60" y="638" font-family="Inter, sans-serif" font-size="10" fill="#525252">Counts and timings are order-of-magnitude estimates for an oncology small-molecule program with a structurally enabled target.</text>
  <text x="60" y="652" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">Phase 2 failure (~90%) is biology, not chemistry — most computational gains land above the IND-filing line.</text>
</svg>
