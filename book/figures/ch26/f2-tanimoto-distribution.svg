<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="t d">
  <title id="t">Tanimoto similarity distribution for random pairs versus same-target actives</title>
  <desc id="d">Two overlaid histograms of Morgan-fingerprint Tanimoto similarity. The grey distribution, for random pairs of drug-like compounds, is sharply peaked around 0.15 and drops to near zero by 0.4. The cobalt distribution, for pairs of compounds active against the same protein target, is broader and shifted toward 0.4 to 0.7. The 0.4 and 0.85 thresholds typically used for hit expansion and near-duplicate detection are marked with vertical lines and annotations on the right side of the figure.</desc>

  <rect x="0" y="0" width="1200" height="600" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="40" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">TANIMOTO SIMILARITY — RANDOM PAIRS VERSUS SAME-TARGET ACTIVES</text>
  <text x="60" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">ECFP4 fingerprints. ~10 000 random drug-like pairs (grey) compared with ~3 000 pairs from a single-target activity set (cobalt). The thresholds are chosen by where the two distributions separate.</text>

  <!-- Axes -->
  <g>
    <!-- x axis -->
    <line x1="100" y1="480" x2="1100" y2="480" stroke="#374151" stroke-width="1.5"/>
    <!-- y axis -->
    <line x1="100" y1="120" x2="100" y2="480" stroke="#374151" stroke-width="1.5"/>

    <!-- x ticks -->
    <g font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">
      <line x1="100" y1="480" x2="100" y2="486" stroke="#525252" stroke-width="1"/><text x="100" y="500" text-anchor="middle">0.0</text>
      <line x1="200" y1="480" x2="200" y2="486" stroke="#525252" stroke-width="1"/><text x="200" y="500" text-anchor="middle">0.1</text>
      <line x1="300" y1="480" x2="300" y2="486" stroke="#525252" stroke-width="1"/><text x="300" y="500" text-anchor="middle">0.2</text>
      <line x1="400" y1="480" x2="400" y2="486" stroke="#525252" stroke-width="1"/><text x="400" y="500" text-anchor="middle">0.3</text>
      <line x1="500" y1="480" x2="500" y2="486" stroke="#525252" stroke-width="1"/><text x="500" y="500" text-anchor="middle">0.4</text>
      <line x1="600" y1="480" x2="600" y2="486" stroke="#525252" stroke-width="1"/><text x="600" y="500" text-anchor="middle">0.5</text>
      <line x1="700" y1="480" x2="700" y2="486" stroke="#525252" stroke-width="1"/><text x="700" y="500" text-anchor="middle">0.6</text>
      <line x1="800" y1="480" x2="800" y2="486" stroke="#525252" stroke-width="1"/><text x="800" y="500" text-anchor="middle">0.7</text>
      <line x1="900" y1="480" x2="900" y2="486" stroke="#525252" stroke-width="1"/><text x="900" y="500" text-anchor="middle">0.8</text>
      <line x1="1000" y1="480" x2="1000" y2="486" stroke="#525252" stroke-width="1"/><text x="1000" y="500" text-anchor="middle">0.9</text>
      <line x1="1100" y1="480" x2="1100" y2="486" stroke="#525252" stroke-width="1"/><text x="1100" y="500" text-anchor="middle">1.0</text>
    </g>
    <text x="600" y="525" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151" text-anchor="middle">Tanimoto coefficient</text>
    <text x="40"  y="300" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151" text-anchor="middle" transform="rotate(-90, 40, 300)">density (relative)</text>
  </g>

  <!-- Grey histogram: random pairs, peaked at ~0.15, long tail -->
  <!-- Each bar: 100-px wide bin = 0.1, but we use 50-px subbins for smoother shape -->
  <g fill="#8a8a85" opacity="0.55">
    <rect x="100" y="320" width="48" height="160"/>
    <rect x="150" y="190" width="48" height="290"/>
    <rect x="200" y="140" width="48" height="340"/>
    <rect x="250" y="170" width="48" height="310"/>
    <rect x="300" y="230" width="48" height="250"/>
    <rect x="350" y="310" width="48" height="170"/>
    <rect x="400" y="380" width="48" height="100"/>
    <rect x="450" y="425" width="48" height="55"/>
    <rect x="500" y="450" width="48" height="30"/>
    <rect x="550" y="465" width="48" height="15"/>
    <rect x="600" y="473" width="48" height="7"/>
    <rect x="650" y="476" width="48" height="4"/>
    <rect x="700" y="478" width="48" height="2"/>
    <rect x="750" y="479" width="48" height="1"/>
    <rect x="800" y="479" width="48" height="1"/>
  </g>

  <!-- Cobalt histogram: same-target actives, broader, peak ~0.45 -->
  <g fill="#1e3a8a" opacity="0.45">
    <rect x="100" y="455" width="48" height="25"/>
    <rect x="150" y="430" width="48" height="50"/>
    <rect x="200" y="395" width="48" height="85"/>
    <rect x="250" y="345" width="48" height="135"/>
    <rect x="300" y="290" width="48" height="190"/>
    <rect x="350" y="245" width="48" height="235"/>
    <rect x="400" y="215" width="48" height="265"/>
    <rect x="450" y="200" width="48" height="280"/>
    <rect x="500" y="215" width="48" height="265"/>
    <rect x="550" y="235" width="48" height="245"/>
    <rect x="600" y="270" width="48" height="210"/>
    <rect x="650" y="320" width="48" height="160"/>
    <rect x="700" y="370" width="48" height="110"/>
    <rect x="750" y="410" width="48" height="70"/>
    <rect x="800" y="435" width="48" height="45"/>
    <rect x="850" y="450" width="48" height="30"/>
    <rect x="900" y="460" width="48" height="20"/>
    <rect x="950" y="468" width="48" height="12"/>
    <rect x="1000" y="473" width="48" height="7"/>
    <rect x="1050" y="476" width="48" height="4"/>
  </g>

  <!-- Threshold lines -->
  <g>
    <line x1="500" y1="100" x2="500" y2="480" stroke="#b45309" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="505" y="118" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#b45309">T = 0.4</text>
    <text x="505" y="132" font-family="Inter, sans-serif" font-size="9" fill="#525252">hit-expansion gate</text>

    <line x1="950" y1="100" x2="950" y2="480" stroke="#b91c1c" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="955" y="118" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#b91c1c">T = 0.85</text>
    <text x="955" y="132" font-family="Inter, sans-serif" font-size="9" fill="#525252">near-duplicate gate</text>
  </g>

  <!-- Legend -->
  <g transform="translate(800, 150)">
    <rect x="0" y="0" width="280" height="78" fill="#fafaf9" stroke="#e5e3dc" stroke-width="1"/>
    <rect x="14" y="14" width="22" height="14" fill="#8a8a85" opacity="0.55"/>
    <text x="44" y="26" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">Random drug-like pairs</text>
    <text x="44" y="40" font-family="Inter, sans-serif" font-size="9" fill="#525252">mean &#x2248; 0.16</text>
    <rect x="14" y="50" width="22" height="14" fill="#1e3a8a" opacity="0.45"/>
    <text x="44" y="62" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">Same-target active pairs</text>
    <text x="44" y="74" font-family="Inter, sans-serif" font-size="9" fill="#525252">mean &#x2248; 0.45</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="558" x2="1140" y2="558" stroke="#374151" stroke-width="0.5"/>
  <text x="60" y="578" font-family="Inter, sans-serif" font-size="10" fill="#525252">Distributions are illustrative; in practice they shift with target class, library composition, and fingerprint radius.</text>
  <text x="60" y="592" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">Useful similarity thresholds are not universal constants — they sit at the crossing point of the two distributions for your problem.</text>
</svg>
