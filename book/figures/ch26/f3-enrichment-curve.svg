<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="t d">
  <title id="t">Virtual-screen enrichment and ROC curves at three accuracy levels</title>
  <desc id="d">A side-by-side pair of plots evaluating virtual-screen rankings. The left panel shows fraction of actives recovered on the vertical axis versus fraction of library screened on the horizontal axis, for three rankers: a strong ML rescorer with area under the curve about 0.88, a typical AutoDock Vina run with area about 0.74, and a random baseline along the diagonal. The right panel shows enrichment factor at one percent of the library for the same three approaches, with the strong ML rescorer near 35, the Vina baseline near 8, and random equal to 1. A short caption strip at the bottom translates EF and AUC into the question they answer.</desc>

  <rect x="0" y="0" width="1200" height="600" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="40" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">VIRTUAL SCREEN EVALUATION — ENRICHMENT CURVE AND EF AT 1%</text>
  <text x="60" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Two views of the same ranked output. The curve answers "how many actives do I keep at any screening depth?"; EF1% answers "how much better than random is the top 1%?"</text>

  <!-- ─── LEFT: enrichment / ROC curve ─── -->
  <g transform="translate(80, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(A)  ACTIVES RECOVERED VS LIBRARY SCREENED</text>

    <!-- frame -->
    <line x1="40" y1="370" x2="440" y2="370" stroke="#374151" stroke-width="1.5"/>
    <line x1="40" y1="20"  x2="40"  y2="370" stroke="#374151" stroke-width="1.5"/>

    <!-- x ticks at 0, 25, 50, 75, 100% -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">
      <line x1="40"  y1="370" x2="40"  y2="375" stroke="#525252"/><text x="40"  y="388" text-anchor="middle">0%</text>
      <line x1="140" y1="370" x2="140" y2="375" stroke="#525252"/><text x="140" y="388" text-anchor="middle">25%</text>
      <line x1="240" y1="370" x2="240" y2="375" stroke="#525252"/><text x="240" y="388" text-anchor="middle">50%</text>
      <line x1="340" y1="370" x2="340" y2="375" stroke="#525252"/><text x="340" y="388" text-anchor="middle">75%</text>
      <line x1="440" y1="370" x2="440" y2="375" stroke="#525252"/><text x="440" y="388" text-anchor="middle">100%</text>
    </g>
    <!-- y ticks 0/25/50/75/100% -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">
      <line x1="35" y1="370" x2="40" y2="370" stroke="#525252"/><text x="32" y="373" text-anchor="end">0%</text>
      <line x1="35" y1="282" x2="40" y2="282" stroke="#525252"/><text x="32" y="285" text-anchor="end">25%</text>
      <line x1="35" y1="195" x2="40" y2="195" stroke="#525252"/><text x="32" y="198" text-anchor="end">50%</text>
      <line x1="35" y1="107" x2="40" y2="107" stroke="#525252"/><text x="32" y="110" text-anchor="end">75%</text>
      <line x1="35" y1="20"  x2="40" y2="20"  stroke="#525252"/><text x="32" y="23"  text-anchor="end">100%</text>
    </g>

    <!-- axis labels -->
    <text x="240" y="412" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151" text-anchor="middle">fraction of library screened</text>
    <text x="-25" y="195" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151" text-anchor="middle" transform="rotate(-90, -25, 195)">fraction of actives recovered</text>

    <!-- random diagonal -->
    <line x1="40" y1="370" x2="440" y2="20" stroke="#8a8a85" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="430" y="40" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85" text-anchor="end">random (AUC = 0.50)</text>

    <!-- Vina-like curve: AUC ~0.74 -->
    <path d="M 40 370 Q 80 280 160 200 T 280 90 T 440 20" fill="none" stroke="#b45309" stroke-width="2.2"/>
    <text x="290" y="160" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b45309">AutoDock Vina (AUC = 0.74)</text>

    <!-- Strong ML rescorer: AUC ~0.88 -->
    <path d="M 40 370 Q 60 240 140 130 T 260 50 T 440 20" fill="none" stroke="#1e3a8a" stroke-width="2.5"/>
    <text x="200" y="80" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">ML rescorer / GNN (AUC = 0.88)</text>

    <!-- 1% mark -->
    <line x1="44" y1="20" x2="44" y2="370" stroke="#525252" stroke-width="0.5" stroke-dasharray="1 2"/>
    <text x="50" y="32" font-family="Inter, sans-serif" font-size="9" fill="#525252">1%</text>
  </g>

  <!-- ─── RIGHT: EF1% bars ─── -->
  <g transform="translate(620, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(B)  ENRICHMENT FACTOR AT TOP 1%</text>

    <!-- frame -->
    <line x1="40" y1="370" x2="460" y2="370" stroke="#374151" stroke-width="1.5"/>
    <line x1="40" y1="20"  x2="40"  y2="370" stroke="#374151" stroke-width="1.5"/>

    <!-- y ticks -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">
      <line x1="35" y1="370" x2="40" y2="370" stroke="#525252"/><text x="32" y="373" text-anchor="end">0</text>
      <line x1="35" y1="300" x2="40" y2="300" stroke="#525252"/><text x="32" y="303" text-anchor="end">10</text>
      <line x1="35" y1="230" x2="40" y2="230" stroke="#525252"/><text x="32" y="233" text-anchor="end">20</text>
      <line x1="35" y1="160" x2="40" y2="160" stroke="#525252"/><text x="32" y="163" text-anchor="end">30</text>
      <line x1="35" y1="90"  x2="40" y2="90"  stroke="#525252"/><text x="32" y="93"  text-anchor="end">40</text>
      <line x1="35" y1="20"  x2="40" y2="20"  stroke="#525252"/><text x="32" y="23"  text-anchor="end">50</text>
    </g>

    <text x="240" y="412" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151" text-anchor="middle">approach</text>
    <text x="-25" y="195" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151" text-anchor="middle" transform="rotate(-90, -25, 195)">EF&#x2081;%</text>

    <!-- random -->
    <rect x="80"  y="363" width="60" height="7"   fill="#8a8a85"/>
    <text x="110" y="385" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">random</text>
    <text x="110" y="357" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#525252" text-anchor="middle">EF = 1</text>

    <!-- Vina -->
    <rect x="190" y="314" width="60" height="56"  fill="#b45309"/>
    <text x="220" y="385" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">Vina</text>
    <text x="220" y="307" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#b45309" text-anchor="middle">EF = 8</text>

    <!-- ML rescore -->
    <rect x="300" y="125" width="60" height="245" fill="#1e3a8a"/>
    <text x="330" y="385" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">ML rescorer</text>
    <text x="330" y="118" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#1e3a8a" text-anchor="middle">EF = 35</text>

    <!-- Perfect upper bound -->
    <rect x="410" y="20" width="40" height="350" fill="#065f46" opacity="0.25" stroke="#065f46" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="430" y="385" font-family="Inter, sans-serif" font-size="10" fill="#065f46" text-anchor="middle">perfect</text>
    <text x="430" y="13"  font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#065f46" text-anchor="middle">EF = 50</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="540" x2="1140" y2="540" stroke="#374151" stroke-width="0.5"/>
  <text x="60" y="560" font-family="Inter, sans-serif" font-size="10" fill="#525252">Numbers are typical for a well-prepared kinase or protease target with a balanced active/decoy benchmark (DUD-E style). Real screens vary by an order of magnitude.</text>
  <text x="60" y="574" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">AUC measures global discrimination; EF1% measures the practically relevant question — "what survives my order budget?"</text>
</svg>
