<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="t d">
  <title id="t">Eroom's law and the productivity gap in small-molecule drug discovery</title>
  <desc id="d">A two-axis chart spanning 1950 to 2025. The cobalt line shows the inflation-adjusted cost of bringing a new drug to market, rising roughly exponentially from about 50 million dollars in the 1950s to about 2 to 3 billion dollars in the 2010s, with a slight inflection downward after 2018. The amber dotted line shows new drug approvals per inflation-adjusted billion dollars of R and D spend, falling by roughly two orders of magnitude over the same period. Annotations label the Hansen 1979 study, the DiMasi 2003 update, the term Eroom's law coined by Scannell in 2012, and the 2018 onward AI-discovery inflection driven by AlphaFold and ML-led pipelines such as Insilico's INS018 underscore 055.</desc>

  <rect x="0" y="0" width="1200" height="600" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="40" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">EROOM'S LAW — COST PER APPROVED DRUG, 1950 — 2025</text>
  <text x="60" y="60" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Scannell's 2012 inversion of Moore's law. R&amp;D dollars per approval have risen roughly 100&#xD7; in real terms; whether ML pipelines reverse the trend is an open question.</text>

  <!-- frame -->
  <line x1="100" y1="480" x2="1120" y2="480" stroke="#374151" stroke-width="1.5"/>
  <line x1="100" y1="100" x2="100" y2="480" stroke="#374151" stroke-width="1.5"/>
  <line x1="1120" y1="100" x2="1120" y2="480" stroke="#374151" stroke-width="1.5"/>

  <!-- x ticks: 1950, 1960, 1970, ..., 2020 -->
  <g font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">
    <line x1="100"  y1="480" x2="100"  y2="486" stroke="#525252"/><text x="100"  y="500" text-anchor="middle">1950</text>
    <line x1="245"  y1="480" x2="245"  y2="486" stroke="#525252"/><text x="245"  y="500" text-anchor="middle">1960</text>
    <line x1="390"  y1="480" x2="390"  y2="486" stroke="#525252"/><text x="390"  y="500" text-anchor="middle">1970</text>
    <line x1="535"  y1="480" x2="535"  y2="486" stroke="#525252"/><text x="535"  y="500" text-anchor="middle">1980</text>
    <line x1="680"  y1="480" x2="680"  y2="486" stroke="#525252"/><text x="680"  y="500" text-anchor="middle">1990</text>
    <line x1="825"  y1="480" x2="825"  y2="486" stroke="#525252"/><text x="825"  y="500" text-anchor="middle">2000</text>
    <line x1="970"  y1="480" x2="970"  y2="486" stroke="#525252"/><text x="970"  y="500" text-anchor="middle">2010</text>
    <line x1="1115" y1="480" x2="1115" y2="486" stroke="#525252"/><text x="1115" y="500" text-anchor="middle">2020</text>
  </g>
  <text x="610" y="525" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151" text-anchor="middle">approval year</text>

  <!-- left (cobalt) axis: cost in $B, log -->
  <g font-family="JetBrains Mono, monospace" font-size="10" fill="#1e3a8a">
    <text x="95" y="103" text-anchor="end">$10B</text>
    <text x="95" y="195" text-anchor="end">$3B</text>
    <text x="95" y="287" text-anchor="end">$1B</text>
    <text x="95" y="380" text-anchor="end">$300M</text>
    <text x="95" y="473" text-anchor="end">$100M</text>
  </g>
  <text x="40" y="290" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" text-anchor="middle" transform="rotate(-90, 40, 290)">cost per approval (real USD)</text>

  <!-- right (amber) axis: approvals per $B R&D -->
  <g font-family="JetBrains Mono, monospace" font-size="10" fill="#b45309">
    <text x="1125" y="103">30</text>
    <text x="1125" y="195">10</text>
    <text x="1125" y="287">3</text>
    <text x="1125" y="380">1</text>
    <text x="1125" y="473">0.3</text>
  </g>
  <text x="1180" y="290" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#b45309" text-anchor="middle" transform="rotate(90, 1180, 290)">approvals per $B R&amp;D (log)</text>

  <!-- Cobalt: rising cost per approval -->
  <polyline points="100,460 245,440 390,410 535,360 680,300 825,230 970,180 1050,180 1115,200"
            fill="none" stroke="#1e3a8a" stroke-width="2.5"/>
  <g fill="#1e3a8a">
    <circle cx="100" cy="460" r="3"/>
    <circle cx="245" cy="440" r="3"/>
    <circle cx="390" cy="410" r="3"/>
    <circle cx="535" cy="360" r="3"/>
    <circle cx="680" cy="300" r="3"/>
    <circle cx="825" cy="230" r="3"/>
    <circle cx="970" cy="180" r="3"/>
    <circle cx="1050" cy="180" r="3"/>
    <circle cx="1115" cy="200" r="3"/>
  </g>
  <text x="980" y="160" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">cost per approval</text>

  <!-- Amber: falling productivity -->
  <polyline points="100,140 245,170 390,210 535,260 680,310 825,360 970,400 1050,390 1115,380"
            fill="none" stroke="#b45309" stroke-width="2" stroke-dasharray="5 3"/>
  <g fill="#b45309">
    <circle cx="100" cy="140" r="3"/>
    <circle cx="245" cy="170" r="3"/>
    <circle cx="390" cy="210" r="3"/>
    <circle cx="535" cy="260" r="3"/>
    <circle cx="680" cy="310" r="3"/>
    <circle cx="825" cy="360" r="3"/>
    <circle cx="970" cy="400" r="3"/>
    <circle cx="1050" cy="390" r="3"/>
    <circle cx="1115" cy="380" r="3"/>
  </g>
  <text x="160" y="125" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#b45309">approvals per $B</text>

  <!-- annotations -->
  <g>
    <line x1="500" y1="370" x2="500" y2="420" stroke="#525252" stroke-width="0.8"/>
    <text x="500" y="437" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">Hansen (1979)</text>
    <text x="500" y="448" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">~$54M / drug</text>

    <line x1="820" y1="240" x2="820" y2="290" stroke="#525252" stroke-width="0.8"/>
    <text x="820" y="437" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">DiMasi (2003)</text>
    <text x="820" y="448" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">~$0.8B / drug</text>

    <line x1="985" y1="190" x2="985" y2="250" stroke="#525252" stroke-width="0.8"/>
    <text x="985" y="437" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">Scannell (2012)</text>
    <text x="985" y="448" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">coins "Eroom's law"</text>

    <line x1="1080" y1="190" x2="1080" y2="240" stroke="#525252" stroke-width="0.8"/>
    <text x="1080" y="437" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">2018 — AlphaFold,</text>
    <text x="1080" y="448" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">DL pipelines</text>
  </g>

  <!-- shaded region: AI inflection -->
  <rect x="1020" y="100" width="100" height="380" fill="#065f46" opacity="0.07"/>
  <text x="1070" y="118" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#065f46" text-anchor="middle">AI-led era?</text>

  <!-- Footer -->
  <line x1="60" y1="558" x2="1140" y2="558" stroke="#374151" stroke-width="0.5"/>
  <text x="60" y="578" font-family="Inter, sans-serif" font-size="10" fill="#525252">Estimates synthesised from Scannell et al. (Nat. Rev. Drug Discov., 2012), DiMasi et al. (J. Health Econ., 2003 / 2016), and BCG / Deloitte sector reports.</text>
  <text x="60" y="592" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85">Whether the post-2018 inflection reflects a real ML effect or a survivorship-biased reading of early successes remains debated.</text>
</svg>
