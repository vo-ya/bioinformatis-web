<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-labelledby="t d">
  <title id="t">A century of mass spectrometry — instruments, ionisation, and the software that came with them</title>
  <desc id="d">A horizontal timeline from 1912 to 2024 marks the major events in the development of mass spectrometry as a tool for proteomics. J. J. Thomson built the first parabola spectrograph in 1912. ESI was demonstrated for large biomolecules by Fenn in 1989 and MALDI independently by Karas-Hillenkamp and Tanaka in 1988, both ionisation breakthroughs earning a share of the 2002 Nobel Prize in Chemistry. SEQUEST was published by Eng, McCormack and Yates in 1994; Mascot by Perkins, Pappin, Creasy and Cottrell in 1999; Orbitrap by Makarov in 2000; shotgun proteomics by Yates in 2001; SILAC by Ong and Mann in 2002; iTRAQ by Thompson in 2003; PRIDE archive opened in 2003; MaxQuant by Cox and Mann in 2008; SWATH-MS by Aebersold in 2012; thermal proteome profiling by Savitski in 2014; SIRIUS by Duhrkop in 2015; MSFragger by Kong, Leprevost and colleagues in 2017; DIA-NN by Demichev in 2020. The timeline groups events into instrumentation (above the line) and software and methods (below the line).</desc>

  <rect x="0" y="0" width="1200" height="500" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="36" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">A CENTURY OF MASS SPECTROMETRY — INSTRUMENT, IONISATION, ALGORITHM</text>
  <text x="60" y="56" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Above the timeline: instrumentation and ionisation. Below: the software and methods that made it usable for biology.</text>

  <!-- Timeline -->
  <g transform="translate(60, 260)">
    <!-- The axis line -->
    <line x1="0" y1="0" x2="1080" y2="0" stroke="#0a0a0a" stroke-width="2"/>

    <!-- Decade ticks: 1910, 1930, 1950, 1970, 1990, 2010, 2030 -->
    <g font-family="Inter, sans-serif" font-size="10" fill="#8a8a85">
      <line x1="0"    y1="0" x2="0"    y2="10" stroke="#0a0a0a"/>
      <text x="0"    y="26" text-anchor="middle">1910</text>
      <line x1="180"  y1="0" x2="180"  y2="6" stroke="#525252"/>
      <text x="180"  y="22" text-anchor="middle" font-size="9">1940</text>
      <line x1="360"  y1="0" x2="360"  y2="6" stroke="#525252"/>
      <text x="360"  y="22" text-anchor="middle" font-size="9">1970</text>
      <line x1="540"  y1="0" x2="540"  y2="10" stroke="#0a0a0a"/>
      <text x="540"  y="26" text-anchor="middle">2000</text>
      <line x1="720"  y1="0" x2="720"  y2="6" stroke="#525252"/>
      <text x="720"  y="22" text-anchor="middle" font-size="9">2030</text>
      <line x1="900"  y1="0" x2="900"  y2="6" stroke="#525252"/>
      <text x="900"  y="22" text-anchor="middle" font-size="9">2060</text>
    </g>
    <!-- We will compress the long quiet period (1912-1980s) so the modern era reads clearly -->
  </g>

  <!-- Use a non-linear time mapping: 1910..1990 in left 360px, 1990..2025 in remaining 720px -->
  <!-- That means: f(year) for year <= 1990: (year-1910)/(1990-1910) * 360
                   for year > 1990: 360 + (year-1990)/(2025-1990) * 720 -->
  <!-- Replace the ticks above with a clean compressed-time variant -->

  <g transform="translate(60, 260)">
    <!-- Repaint over previous ticks -->
    <rect x="-20" y="-2" width="1120" height="34" fill="#fafaf9"/>
    <line x1="0" y1="0" x2="1080" y2="0" stroke="#0a0a0a" stroke-width="2"/>

    <!-- Compressed-time ticks -->
    <g font-family="Inter, sans-serif" font-size="10" fill="#8a8a85">
      <!-- 1912 (5) -->
      <line x1="9" y1="0" x2="9" y2="10" stroke="#0a0a0a"/>
      <text x="9" y="26" text-anchor="middle">1912</text>
      <!-- 1950 -->
      <line x1="180" y1="0" x2="180" y2="8" stroke="#525252"/>
      <text x="180" y="24" text-anchor="middle" font-size="9">1950</text>
      <!-- 1990 -->
      <line x1="360" y1="0" x2="360" y2="10" stroke="#0a0a0a"/>
      <text x="360" y="26" text-anchor="middle">1990</text>
      <!-- 2000 -->
      <line x1="566" y1="0" x2="566" y2="8" stroke="#525252"/>
      <text x="566" y="24" text-anchor="middle" font-size="9">2000</text>
      <!-- 2010 -->
      <line x1="771" y1="0" x2="771" y2="8" stroke="#525252"/>
      <text x="771" y="24" text-anchor="middle" font-size="9">2010</text>
      <!-- 2020 -->
      <line x1="977" y1="0" x2="977" y2="10" stroke="#0a0a0a"/>
      <text x="977" y="26" text-anchor="middle">2020</text>
    </g>

    <!-- Compression-marker zig-zag between 1912 and ~1980 -->
    <text x="90" y="50" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#8a8a85" text-anchor="middle">— quiet decades for biology, busy decades for ion physics —</text>

    <!-- Mapping helper:
         1912 → 9
         1950 → 180
         1985 → 340
         1989 → 360  (and slope changes here)
         1994 → 391
         1999 → 422
         2000 → 428
         2001 → 434
         2002 → 440
         2003 → 446
         2005 → 460
         2007 → 472
         2008 → 478
         2012 → 502
         2014 → 514
         2015 → 520
         2017 → 532
         2020 → 550
         2024 → 575
         after 1990: pixel per year ~6.1, so X(year) = 360 + (year-1990)*6.1
    -->

    <!-- ABOVE-LINE events: instrumentation -->
    <!-- 1912 Thomson -->
    <g transform="translate(9, 0)">
      <line x1="0" y1="-2" x2="0" y2="-50" stroke="#1e3a8a" stroke-width="1.4"/>
      <circle cx="0" cy="-50" r="4" fill="#1e3a8a"/>
      <text x="0" y="-60" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" text-anchor="middle">1912</text>
      <text x="0" y="-74" font-family="Inter, sans-serif" font-size="9" fill="#374151" text-anchor="middle">J.J. Thomson</text>
      <text x="0" y="-86" font-family="Inter, sans-serif" font-size="9" fill="#374151" text-anchor="middle">parabola</text>
      <text x="0" y="-98" font-family="Inter, sans-serif" font-size="9" fill="#374151" text-anchor="middle">spectrograph</text>
    </g>

    <!-- 1988 MALDI -->
    <g transform="translate(354, 0)">
      <line x1="0" y1="-2" x2="0" y2="-80" stroke="#1e3a8a" stroke-width="1.4"/>
      <circle cx="0" cy="-80" r="4" fill="#1e3a8a"/>
      <text x="0" y="-90" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" text-anchor="middle">1988</text>
      <text x="0" y="-104" font-family="Inter, sans-serif" font-size="9" fill="#374151" text-anchor="middle">MALDI</text>
      <text x="0" y="-116" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle" font-style="italic">Karas-Hillenkamp,</text>
      <text x="0" y="-128" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle" font-style="italic">Tanaka</text>
    </g>

    <!-- 1989 ESI Fenn -->
    <g transform="translate(366, 0)">
      <line x1="0" y1="-2" x2="0" y2="-40" stroke="#1e3a8a" stroke-width="1.4"/>
      <circle cx="0" cy="-40" r="4" fill="#1e3a8a"/>
      <text x="0" y="-50" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" text-anchor="middle">1989</text>
      <text x="0" y="-64" font-family="Inter, sans-serif" font-size="9" fill="#374151" text-anchor="middle">ESI for proteins</text>
      <text x="0" y="-76" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle" font-style="italic">Fenn (Nobel 2002)</text>
    </g>

    <!-- 2000 Orbitrap -->
    <g transform="translate(428, 0)">
      <line x1="0" y1="-2" x2="0" y2="-110" stroke="#1e3a8a" stroke-width="1.4"/>
      <circle cx="0" cy="-110" r="4" fill="#1e3a8a"/>
      <text x="0" y="-120" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" text-anchor="middle">2000</text>
      <text x="0" y="-134" font-family="Inter, sans-serif" font-size="9" fill="#374151" text-anchor="middle">Orbitrap</text>
      <text x="0" y="-146" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle" font-style="italic">Makarov</text>
    </g>

    <!-- BELOW-LINE events: software and methods -->
    <!-- 1994 SEQUEST -->
    <g transform="translate(385, 0)">
      <line x1="0" y1="2" x2="0" y2="40" stroke="#b45309" stroke-width="1.4"/>
      <circle cx="0" cy="40" r="4" fill="#b45309"/>
      <text x="0" y="56" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b45309" text-anchor="middle">1994</text>
      <text x="0" y="70" font-family="Inter, sans-serif" font-size="9" fill="#374151" text-anchor="middle">SEQUEST</text>
      <text x="0" y="82" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle" font-style="italic">Eng-McCormack-Yates</text>
    </g>

    <!-- 1999 Mascot -->
    <g transform="translate(415, 0)">
      <line x1="0" y1="2" x2="0" y2="100" stroke="#b45309" stroke-width="1.4"/>
      <circle cx="0" cy="100" r="4" fill="#b45309"/>
      <text x="0" y="116" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b45309" text-anchor="middle">1999</text>
      <text x="0" y="130" font-family="Inter, sans-serif" font-size="9" fill="#374151" text-anchor="middle">Mascot</text>
    </g>

    <!-- 2001 shotgun proteomics Yates -->
    <g transform="translate(440, 0)">
      <line x1="0" y1="2" x2="0" y2="160" stroke="#b45309" stroke-width="1.4"/>
      <circle cx="0" cy="160" r="4" fill="#b45309"/>
      <text x="0" y="176" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b45309" text-anchor="middle">2001</text>
      <text x="0" y="190" font-family="Inter, sans-serif" font-size="9" fill="#374151" text-anchor="middle">shotgun proteomics</text>
    </g>

    <!-- 2002 SILAC -->
    <g transform="translate(446, 0)">
      <line x1="0" y1="2" x2="0" y2="220" stroke="#b45309" stroke-width="1.4"/>
      <circle cx="0" cy="220" r="4" fill="#b45309"/>
      <text x="0" y="236" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b45309" text-anchor="middle">2002</text>
      <text x="0" y="250" font-family="Inter, sans-serif" font-size="9" fill="#374151" text-anchor="middle">SILAC · Ong-Mann</text>
    </g>

    <!-- 2007 target-decoy -->
    <g transform="translate(496, 0)">
      <line x1="0" y1="2" x2="0" y2="60" stroke="#b45309" stroke-width="1.4"/>
      <circle cx="0" cy="60" r="4" fill="#b45309"/>
      <text x="0" y="76" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b45309" text-anchor="middle">2007</text>
      <text x="0" y="90" font-family="Inter, sans-serif" font-size="9" fill="#374151" text-anchor="middle">target-decoy FDR</text>
      <text x="0" y="102" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle" font-style="italic">Elias-Gygi</text>
    </g>

    <!-- 2008 MaxQuant -->
    <g transform="translate(508, 0)">
      <line x1="0" y1="2" x2="0" y2="140" stroke="#b45309" stroke-width="1.4"/>
      <circle cx="0" cy="140" r="4" fill="#b45309"/>
      <text x="0" y="156" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b45309" text-anchor="middle">2008</text>
      <text x="0" y="170" font-family="Inter, sans-serif" font-size="9" fill="#374151" text-anchor="middle">MaxQuant · Cox-Mann</text>
    </g>

    <!-- 2012 SWATH-MS -->
    <g transform="translate(532, 0)">
      <line x1="0" y1="2" x2="0" y2="200" stroke="#b45309" stroke-width="1.4"/>
      <circle cx="0" cy="200" r="4" fill="#b45309"/>
      <text x="0" y="216" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b45309" text-anchor="middle">2012</text>
      <text x="0" y="230" font-family="Inter, sans-serif" font-size="9" fill="#374151" text-anchor="middle">SWATH-MS · Aebersold</text>
    </g>

    <!-- 2017 MSFragger -->
    <g transform="translate(573, 0)">
      <line x1="0" y1="2" x2="0" y2="40" stroke="#b45309" stroke-width="1.4"/>
      <circle cx="0" cy="40" r="4" fill="#b45309"/>
      <text x="0" y="56" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b45309" text-anchor="middle">2017</text>
      <text x="0" y="70" font-family="Inter, sans-serif" font-size="9" fill="#374151" text-anchor="middle">MSFragger</text>
      <text x="0" y="82" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle" font-style="italic">Kong-Nesvizhskii</text>
    </g>

    <!-- 2020 DIA-NN -->
    <g transform="translate(593, 0)">
      <line x1="0" y1="2" x2="0" y2="110" stroke="#b45309" stroke-width="1.4"/>
      <circle cx="0" cy="110" r="4" fill="#b45309"/>
      <text x="0" y="126" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b45309" text-anchor="middle">2020</text>
      <text x="0" y="140" font-family="Inter, sans-serif" font-size="9" fill="#374151" text-anchor="middle">DIA-NN · Demichev</text>
    </g>

  </g>

  <!-- Legend -->
  <g transform="translate(840, 70)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
    <rect x="0" y="0" width="280" height="60" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.5"/>
    <text x="14" y="20" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">LEGEND</text>
    <circle cx="20" cy="38" r="4" fill="#1e3a8a"/>
    <text x="32" y="42">instrumentation &amp; ionisation (above line)</text>
    <circle cx="20" cy="52" r="4" fill="#b45309"/>
    <text x="32" y="56">algorithms &amp; methods (below line)</text>
  </g>

</svg>
