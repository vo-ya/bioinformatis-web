<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="t d">
  <title id="t">Backbone fragmentation of the peptide LSDPYHR</title>
  <desc id="d">The seven-residue tryptic peptide LSDPYHR is drawn as a sequence of residue boxes. Six possible backbone cleavage sites are marked between consecutive residues. For each cleavage, the resulting b-ion (N-terminal) and y-ion (C-terminal) are labelled. A bottom panel shows an idealised MS2 stick spectrum with b-ions in cobalt and y-ions in red; the mass differences between consecutive y-ions read off the amino acid sequence from C-terminus to N-terminus.</desc>

  <defs>
    <marker id="arrow-mut" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="600" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="36" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">PEPTIDE FRAGMENTATION — LSDPYHR</text>
  <text x="60" y="56" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Six amide-bond cleavage sites produce six b/y pairs; consecutive y-ion mass differences read off the sequence.</text>

  <!-- Peptide row -->
  <g transform="translate(180, 110)">
    <!-- 7 residues; each box 90 wide, 60 tall -->
    <g font-family="JetBrains Mono, Menlo, monospace" font-size="22" font-weight="600">
      <rect x="0"   y="0" width="90" height="60" fill="#fafaf9" stroke="#374151" stroke-width="1.5"/>
      <text x="45"  y="40" text-anchor="middle" fill="#0a0a0a">L</text>
      <rect x="90"  y="0" width="90" height="60" fill="#fafaf9" stroke="#374151" stroke-width="1.5"/>
      <text x="135" y="40" text-anchor="middle" fill="#0a0a0a">S</text>
      <rect x="180" y="0" width="90" height="60" fill="#fafaf9" stroke="#374151" stroke-width="1.5"/>
      <text x="225" y="40" text-anchor="middle" fill="#0a0a0a">D</text>
      <rect x="270" y="0" width="90" height="60" fill="#fafaf9" stroke="#374151" stroke-width="1.5"/>
      <text x="315" y="40" text-anchor="middle" fill="#0a0a0a">P</text>
      <rect x="360" y="0" width="90" height="60" fill="#fafaf9" stroke="#374151" stroke-width="1.5"/>
      <text x="405" y="40" text-anchor="middle" fill="#0a0a0a">Y</text>
      <rect x="450" y="0" width="90" height="60" fill="#fafaf9" stroke="#374151" stroke-width="1.5"/>
      <text x="495" y="40" text-anchor="middle" fill="#0a0a0a">H</text>
      <rect x="540" y="0" width="90" height="60" fill="#fafaf9" stroke="#374151" stroke-width="1.5"/>
      <text x="585" y="40" text-anchor="middle" fill="#0a0a0a">R</text>
    </g>

    <!-- N-term / C-term labels -->
    <text x="-50" y="38" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#525252">N-</text>
    <text x="650" y="38" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#525252">-C</text>

    <!-- Cleavage points: dashed vertical lines between residues -->
    <g stroke="#7c3aed" stroke-width="1.4" stroke-dasharray="4 3">
      <line x1="90"  y1="-12" x2="90"  y2="72"/>
      <line x1="180" y1="-12" x2="180" y2="72"/>
      <line x1="270" y1="-12" x2="270" y2="72"/>
      <line x1="360" y1="-12" x2="360" y2="72"/>
      <line x1="450" y1="-12" x2="450" y2="72"/>
      <line x1="540" y1="-12" x2="540" y2="72"/>
    </g>

    <!-- b-ion labels above each cleavage -->
    <g font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">
      <text x="90"  y="-18" text-anchor="middle">b₁</text>
      <text x="180" y="-18" text-anchor="middle">b₂</text>
      <text x="270" y="-18" text-anchor="middle">b₃</text>
      <text x="360" y="-18" text-anchor="middle">b₄</text>
      <text x="450" y="-18" text-anchor="middle">b₅</text>
      <text x="540" y="-18" text-anchor="middle">b₆</text>
    </g>

    <!-- y-ion labels below each cleavage -->
    <g font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#c4342c">
      <text x="90"  y="88" text-anchor="middle">y₆</text>
      <text x="180" y="88" text-anchor="middle">y₅</text>
      <text x="270" y="88" text-anchor="middle">y₄</text>
      <text x="360" y="88" text-anchor="middle">y₃</text>
      <text x="450" y="88" text-anchor="middle">y₂</text>
      <text x="540" y="88" text-anchor="middle">y₁</text>
    </g>
  </g>

  <!-- Sub-header for spectrum -->
  <text x="60" y="240" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">IDEALISED MS2 SPECTRUM</text>
  <text x="60" y="258" font-family="Inter, Helvetica Neue, sans-serif" font-size="10" fill="#525252">Stick spectrum — b-ions in cobalt, y-ions in red. Real spectra add noise, neutral losses, and charge-state variants.</text>

  <!-- Stick spectrum -->
  <g transform="translate(80, 290)">
    <!-- Axes: x from 0 to 1000 m/z, y from 0 to 200 height -->
    <line x1="0" y1="200" x2="1040" y2="200" stroke="#0a0a0a" stroke-width="1.5"/>
    <line x1="0" y1="200" x2="0" y2="20" stroke="#0a0a0a" stroke-width="1.5"/>

    <!-- x-axis ticks -->
    <g font-family="Inter, sans-serif" font-size="10" fill="#8a8a85">
      <line x1="0"    y1="200" x2="0"    y2="206" stroke="#0a0a0a" stroke-width="1"/>
      <text x="0"    y="222" text-anchor="middle">0</text>
      <line x1="200" y1="200" x2="200" y2="206" stroke="#0a0a0a" stroke-width="1"/>
      <text x="200" y="222" text-anchor="middle">200</text>
      <line x1="400" y1="200" x2="400" y2="206" stroke="#0a0a0a" stroke-width="1"/>
      <text x="400" y="222" text-anchor="middle">400</text>
      <line x1="600" y1="200" x2="600" y2="206" stroke="#0a0a0a" stroke-width="1"/>
      <text x="600" y="222" text-anchor="middle">600</text>
      <line x1="800" y1="200" x2="800" y2="206" stroke="#0a0a0a" stroke-width="1"/>
      <text x="800" y="222" text-anchor="middle">800</text>
      <line x1="1000" y1="200" x2="1000" y2="206" stroke="#0a0a0a" stroke-width="1"/>
      <text x="1000" y="222" text-anchor="middle">1000</text>
    </g>

    <!-- x-axis label -->
    <text x="520" y="246" font-family="Inter, sans-serif" font-size="11" fill="#525252" text-anchor="middle">m / z</text>

    <!-- y-axis label -->
    <text x="-30" y="110" font-family="Inter, sans-serif" font-size="11" fill="#525252" text-anchor="middle" transform="rotate(-90, -30, 110)">intensity</text>

    <!-- b-ion sticks (cobalt). Approx residue masses summed for b-ions: b1 = L+1 = 114; b2 = +S = 201; b3 = +D = 316; b4 = +P = 413; b5 = +Y = 576; b6 = +H = 713 -->
    <g stroke="#1e3a8a" stroke-width="2">
      <line x1="114"  y1="200" x2="114"  y2="135"/>
      <line x1="201"  y1="200" x2="201"  y2="105"/>
      <line x1="316"  y1="200" x2="316"  y2="80"/>
      <line x1="413"  y1="200" x2="413"  y2="115"/>
      <line x1="576"  y1="200" x2="576"  y2="70"/>
      <line x1="713"  y1="200" x2="713"  y2="125"/>
    </g>

    <!-- b-ion labels above sticks -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a" font-weight="600">
      <text x="114"  y="128" text-anchor="middle">b₁ 114</text>
      <text x="201"  y="98"  text-anchor="middle">b₂ 201</text>
      <text x="316"  y="72"  text-anchor="middle">b₃ 316</text>
      <text x="413"  y="108" text-anchor="middle">b₄ 413</text>
      <text x="576"  y="62"  text-anchor="middle">b₅ 576</text>
      <text x="713"  y="118" text-anchor="middle">b₆ 713</text>
    </g>

    <!-- y-ion sticks (red). y1 = R+H2O+H = 175; y2 = +H = 312; y3 = +Y = 475; y4 = +P = 572; y5 = +D = 687; y6 = +S = 774 -->
    <g stroke="#c4342c" stroke-width="2">
      <line x1="175"  y1="200" x2="175"  y2="60"/>
      <line x1="312"  y1="200" x2="312"  y2="55"/>
      <line x1="475"  y1="200" x2="475"  y2="85"/>
      <line x1="572"  y1="200" x2="572"  y2="100"/>
      <line x1="687"  y1="200" x2="687"  y2="120"/>
      <line x1="774"  y1="200" x2="774"  y2="140"/>
    </g>

    <!-- y-ion labels below sticks (on opposite side of b-ion labels) -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#c4342c" font-weight="600">
      <text x="175"  y="52"  text-anchor="middle">y₁ 175</text>
      <text x="312"  y="48"  text-anchor="middle">y₂ 312</text>
      <text x="475"  y="78"  text-anchor="middle">y₃ 475</text>
      <text x="572"  y="93"  text-anchor="middle">y₄ 572</text>
      <text x="687"  y="113" text-anchor="middle">y₅ 687</text>
      <text x="774"  y="133" text-anchor="middle">y₆ 774</text>
    </g>

    <!-- Reading walk: y-ion differences -->
    <g transform="translate(0, 280)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
      <text x="0" y="0" font-weight="700" letter-spacing="0.06em" fill="#1e3a8a">READING THE Y-SERIES (Δ between consecutive y-ions = residue mass)</text>
      <g transform="translate(0, 20)" font-family="JetBrains Mono, monospace" font-size="11">
        <text x="0" y="0" fill="#c4342c">y₂ − y₁ = 312 − 175 = 137  →  H</text>
        <text x="0" y="20" fill="#c4342c">y₃ − y₂ = 475 − 312 = 163  →  Y</text>
        <text x="0" y="40" fill="#c4342c">y₄ − y₃ = 572 − 475 =  97  →  P</text>
        <text x="430" y="0" fill="#c4342c">y₅ − y₄ = 687 − 572 = 115  →  D</text>
        <text x="430" y="20" fill="#c4342c">y₆ − y₅ = 774 − 687 =  87  →  S</text>
        <text x="430" y="40" fill="#525252" font-style="italic">(y₇ would extend to the L of the N-terminus)</text>
      </g>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(840, 100)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
    <rect x="0" y="0" width="200" height="74" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.5"/>
    <text x="12" y="20" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">LEGEND</text>
    <line x1="12" y1="36" x2="36" y2="36" stroke="#1e3a8a" stroke-width="2"/>
    <text x="44" y="40">b-ion (N-terminal)</text>
    <line x1="12" y1="54" x2="36" y2="54" stroke="#c4342c" stroke-width="2"/>
    <text x="44" y="58">y-ion (C-terminal)</text>
  </g>

</svg>
