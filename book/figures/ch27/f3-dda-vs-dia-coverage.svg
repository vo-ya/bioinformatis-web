<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" role="img" aria-labelledby="t d">
  <title id="t">DDA vs DIA peptide-identification overlap across three replicates</title>
  <desc id="d">Two Venn-diagram-style panels compare peptide identifications across three technical replicates of the same sample. Under DDA (top), each replicate identifies a different stochastic subset of peptides, and only about 70 percent are shared across all three. Under DIA (bottom), the deterministic acquisition produces about 85 percent overlap across all three replicates.</desc>

  <rect x="0" y="0" width="1200" height="580" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="36" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">DDA STOCHASTIC GAPS VS DIA DETERMINISTIC COVERAGE</text>
  <text x="60" y="56" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Peptide identifications across three technical replicates of the same sample. DDA leaves a stochastic ring; DIA closes most of it.</text>

  <!-- ─────────── PANEL A: DDA ─────────── -->
  <g transform="translate(60, 90)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(A)  DDA — TOP-N = 15</text>
    <text x="0" y="18" font-family="Inter, sans-serif" font-size="10" fill="#525252">~25,000 IDs per replicate; ~70% shared across all three</text>

    <!-- Three overlapping circles for replicates -->
    <g transform="translate(250, 40)">
      <!-- Rep 1 (top, blue) -->
      <circle cx="120" cy="60" r="100" fill="#1e3a8a" fill-opacity="0.18" stroke="#1e3a8a" stroke-width="1.5"/>
      <!-- Rep 2 (bottom-left, amber) -->
      <circle cx="60"  cy="160" r="100" fill="#b45309" fill-opacity="0.18" stroke="#b45309" stroke-width="1.5"/>
      <!-- Rep 3 (bottom-right, green) -->
      <circle cx="180" cy="160" r="100" fill="#065f46" fill-opacity="0.18" stroke="#065f46" stroke-width="1.5"/>

      <!-- Replicate labels -->
      <text x="120" y="-26" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" text-anchor="middle">Replicate 1</text>
      <text x="-40" y="160" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#b45309" text-anchor="end">Rep 2</text>
      <text x="280" y="160" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#065f46" text-anchor="start">Rep 3</text>

      <!-- Counts -->
      <g font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">
        <!-- All three -->
        <text x="120" y="120" text-anchor="middle" font-weight="700">17,500</text>
        <text x="120" y="135" text-anchor="middle" font-size="9" fill="#525252">all three</text>

        <!-- Pairwise -->
        <text x="80"  y="86"  text-anchor="middle" font-size="10">2,100</text>
        <text x="160" y="86"  text-anchor="middle" font-size="10">2,200</text>
        <text x="120" y="178" text-anchor="middle" font-size="10">2,300</text>

        <!-- Unique to each -->
        <text x="120" y="30"  text-anchor="middle" font-size="10">3,100</text>
        <text x="0"   y="200" text-anchor="middle" font-size="10">3,000</text>
        <text x="240" y="200" text-anchor="middle" font-size="10">2,900</text>
      </g>
    </g>

    <!-- Side stats -->
    <g transform="translate(680, 50)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
      <rect x="0" y="0" width="380" height="120" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.5"/>
      <text x="14" y="22" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">DDA SUMMARY</text>
      <g font-family="JetBrains Mono, monospace" font-size="10.5">
        <text x="14" y="44">IDs per replicate</text><text x="364" y="44" text-anchor="end">~25,000</text>
        <text x="14" y="62">Shared by all three</text><text x="364" y="62" text-anchor="end" fill="#b45309">17,500 (70%)</text>
        <text x="14" y="80">Replicate CV (LFQ)</text><text x="364" y="80" text-anchor="end">~15%</text>
        <text x="14" y="98">Cause</text><text x="364" y="98" text-anchor="end" fill="#525252" font-style="italic">top-N picks stochastically</text>
      </g>
    </g>
  </g>

  <!-- Divider -->
  <line x1="60" y1="310" x2="1140" y2="310" stroke="#c4c1b6" stroke-width="0.5"/>

  <!-- ─────────── PANEL B: DIA ─────────── -->
  <g transform="translate(60, 330)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#065f46" letter-spacing="0.06em">(B)  DIA — 40 × 20-Da WINDOWS</text>
    <text x="0" y="18" font-family="Inter, sans-serif" font-size="10" fill="#525252">~25,000 IDs per replicate; ~85% shared across all three</text>

    <!-- Three overlapping circles - more overlap -->
    <g transform="translate(250, 40)">
      <!-- Same layout but tighter overlap -->
      <circle cx="120" cy="60" r="100" fill="#1e3a8a" fill-opacity="0.18" stroke="#1e3a8a" stroke-width="1.5"/>
      <circle cx="60"  cy="160" r="100" fill="#b45309" fill-opacity="0.18" stroke="#b45309" stroke-width="1.5"/>
      <circle cx="180" cy="160" r="100" fill="#065f46" fill-opacity="0.18" stroke="#065f46" stroke-width="1.5"/>

      <!-- Replicate labels -->
      <text x="120" y="-26" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" text-anchor="middle">Replicate 1</text>
      <text x="-40" y="160" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#b45309" text-anchor="end">Rep 2</text>
      <text x="280" y="160" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#065f46" text-anchor="start">Rep 3</text>

      <!-- Counts: most in middle -->
      <g font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">
        <!-- All three -->
        <text x="120" y="120" text-anchor="middle" font-weight="700">21,400</text>
        <text x="120" y="135" text-anchor="middle" font-size="9" fill="#525252">all three</text>

        <!-- Pairwise (smaller) -->
        <text x="80"  y="86"  text-anchor="middle" font-size="10">950</text>
        <text x="160" y="86"  text-anchor="middle" font-size="10">980</text>
        <text x="120" y="178" text-anchor="middle" font-size="10">920</text>

        <!-- Unique to each (smaller) -->
        <text x="120" y="30"  text-anchor="middle" font-size="10">650</text>
        <text x="0"   y="200" text-anchor="middle" font-size="10">600</text>
        <text x="240" y="200" text-anchor="middle" font-size="10">620</text>
      </g>
    </g>

    <!-- Side stats -->
    <g transform="translate(680, 50)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
      <rect x="0" y="0" width="380" height="120" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.5"/>
      <text x="14" y="22" font-weight="700" fill="#065f46" letter-spacing="0.06em">DIA SUMMARY</text>
      <g font-family="JetBrains Mono, monospace" font-size="10.5">
        <text x="14" y="44">IDs per replicate</text><text x="364" y="44" text-anchor="end">~25,000</text>
        <text x="14" y="62">Shared by all three</text><text x="364" y="62" text-anchor="end" fill="#065f46">21,400 (85%)</text>
        <text x="14" y="80">Replicate CV (LFQ)</text><text x="364" y="80" text-anchor="end">~5%</text>
        <text x="14" y="98">Cause</text><text x="364" y="98" text-anchor="end" fill="#525252" font-style="italic">every window scanned every cycle</text>
      </g>
    </g>
  </g>

</svg>
