<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" role="img" aria-labelledby="t d">
  <title id="t">Target and decoy score distributions with the FDR-versus-threshold curve</title>
  <desc id="d">Left panel: stacked histograms of target peptide-spectrum-match scores (filled cobalt) and decoy peptide-spectrum-match scores (filled amber). The target distribution has a tall mode at high scores; the decoy distribution sits at low scores with a long tail into the target region. A dashed vertical line marks the score threshold at one percent FDR. Right panel: the empirical false-discovery rate as a function of score threshold. The curve drops sharply around the score where target and decoy distributions cross, then plateaus near zero at higher thresholds. The horizontal line at FDR equal to 0.01 picks the threshold convention.</desc>

  <rect x="0" y="0" width="1200" height="580" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="36" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">TARGET-DECOY FDR — DISTRIBUTIONS AND THRESHOLD</text>
  <text x="60" y="56" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Decoys are false by construction; their distribution mirrors the false-target distribution and lets you read the FDR off the data.</text>

  <!-- ─────────── PANEL A: Score distributions ─────────── -->
  <g transform="translate(60, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(A)  SCORE DISTRIBUTIONS</text>

    <!-- Plot area: 480 wide, 360 tall -->
    <g transform="translate(0, 20)">
      <!-- Axes -->
      <line x1="60" y1="360" x2="540" y2="360" stroke="#0a0a0a" stroke-width="1.5"/>
      <line x1="60" y1="360" x2="60"  y2="40"  stroke="#0a0a0a" stroke-width="1.5"/>

      <!-- x-ticks -->
      <g font-family="Inter, sans-serif" font-size="10" fill="#8a8a85">
        <line x1="60"  y1="360" x2="60"  y2="366" stroke="#0a0a0a"/>
        <text x="60"  y="380" text-anchor="middle">0</text>
        <line x1="180" y1="360" x2="180" y2="366" stroke="#0a0a0a"/>
        <text x="180" y="380" text-anchor="middle">1</text>
        <line x1="300" y1="360" x2="300" y2="366" stroke="#0a0a0a"/>
        <text x="300" y="380" text-anchor="middle">2</text>
        <line x1="420" y1="360" x2="420" y2="366" stroke="#0a0a0a"/>
        <text x="420" y="380" text-anchor="middle">3</text>
        <line x1="540" y1="360" x2="540" y2="366" stroke="#0a0a0a"/>
        <text x="540" y="380" text-anchor="middle">4</text>
      </g>
      <text x="300" y="402" font-family="Inter, sans-serif" font-size="11" fill="#525252" text-anchor="middle">PSM score (Andromeda / SEQUEST-style, arbitrary units)</text>

      <!-- y-axis label -->
      <text x="20" y="200" font-family="Inter, sans-serif" font-size="11" fill="#525252" text-anchor="middle" transform="rotate(-90, 20, 200)">count of PSMs</text>

      <!-- Decoy distribution: amber, peaked at low score ~0.7, narrower -->
      <!-- Approximate as a stack of bars -->
      <g fill="#b45309" fill-opacity="0.55" stroke="#b45309" stroke-width="0.5">
        <!-- Each bar 24 wide -->
        <rect x="60"  y="340" width="24" height="20"/>
        <rect x="84"  y="310" width="24" height="50"/>
        <rect x="108" y="270" width="24" height="90"/>
        <rect x="132" y="220" width="24" height="140"/>
        <rect x="156" y="180" width="24" height="180"/>
        <rect x="180" y="170" width="24" height="190"/>
        <rect x="204" y="200" width="24" height="160"/>
        <rect x="228" y="240" width="24" height="120"/>
        <rect x="252" y="280" width="24" height="80"/>
        <rect x="276" y="310" width="24" height="50"/>
        <rect x="300" y="330" width="24" height="30"/>
        <rect x="324" y="345" width="24" height="15"/>
        <rect x="348" y="352" width="24" height="8"/>
        <rect x="372" y="356" width="24" height="4"/>
        <rect x="396" y="358" width="24" height="2"/>
      </g>

      <!-- Target distribution: cobalt, mode at higher score ~2.4 -->
      <g fill="#1e3a8a" fill-opacity="0.55" stroke="#1e3a8a" stroke-width="0.5">
        <rect x="60"  y="350" width="24" height="10"/>
        <rect x="84"  y="340" width="24" height="20"/>
        <rect x="108" y="320" width="24" height="40"/>
        <rect x="132" y="300" width="24" height="60"/>
        <rect x="156" y="270" width="24" height="90"/>
        <rect x="180" y="240" width="24" height="120"/>
        <rect x="204" y="200" width="24" height="160"/>
        <rect x="228" y="160" width="24" height="200"/>
        <rect x="252" y="120" width="24" height="240"/>
        <rect x="276" y="90"  width="24" height="270"/>
        <rect x="300" y="80"  width="24" height="280"/>
        <rect x="324" y="100" width="24" height="260"/>
        <rect x="348" y="140" width="24" height="220"/>
        <rect x="372" y="200" width="24" height="160"/>
        <rect x="396" y="270" width="24" height="90"/>
        <rect x="420" y="310" width="24" height="50"/>
        <rect x="444" y="335" width="24" height="25"/>
        <rect x="468" y="350" width="24" height="10"/>
      </g>

      <!-- Threshold line at score ~2.2 = x=324 -->
      <line x1="324" y1="40" x2="324" y2="360" stroke="#dc2626" stroke-width="1.6" stroke-dasharray="6 3"/>
      <text x="332" y="56" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#dc2626">1% FDR threshold</text>

      <!-- Legend -->
      <g transform="translate(380, 70)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
        <rect x="0" y="0" width="150" height="58" fill="#fafaf9" stroke="#c4c1b6" stroke-width="0.5"/>
        <rect x="10" y="10" width="14" height="10" fill="#1e3a8a" fill-opacity="0.55" stroke="#1e3a8a" stroke-width="0.5"/>
        <text x="30" y="20">target PSMs</text>
        <rect x="10" y="32" width="14" height="10" fill="#b45309" fill-opacity="0.55" stroke="#b45309" stroke-width="0.5"/>
        <text x="30" y="42">decoy PSMs</text>
      </g>
    </g>
  </g>

  <!-- ─────────── PANEL B: FDR curve ─────────── -->
  <g transform="translate(640, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">(B)  FDR(threshold) = (decoys above t) / (targets above t)</text>

    <g transform="translate(0, 20)">
      <!-- Axes -->
      <line x1="60" y1="360" x2="500" y2="360" stroke="#0a0a0a" stroke-width="1.5"/>
      <line x1="60" y1="360" x2="60"  y2="40"  stroke="#0a0a0a" stroke-width="1.5"/>

      <!-- x-ticks -->
      <g font-family="Inter, sans-serif" font-size="10" fill="#8a8a85">
        <line x1="60"  y1="360" x2="60"  y2="366" stroke="#0a0a0a"/>
        <text x="60"  y="380" text-anchor="middle">0</text>
        <line x1="170" y1="360" x2="170" y2="366" stroke="#0a0a0a"/>
        <text x="170" y="380" text-anchor="middle">1</text>
        <line x1="280" y1="360" x2="280" y2="366" stroke="#0a0a0a"/>
        <text x="280" y="380" text-anchor="middle">2</text>
        <line x1="390" y1="360" x2="390" y2="366" stroke="#0a0a0a"/>
        <text x="390" y="380" text-anchor="middle">3</text>
        <line x1="500" y1="360" x2="500" y2="366" stroke="#0a0a0a"/>
        <text x="500" y="380" text-anchor="middle">4</text>
      </g>
      <text x="280" y="402" font-family="Inter, sans-serif" font-size="11" fill="#525252" text-anchor="middle">score threshold t</text>

      <!-- y-ticks: linear scale 0 to 0.5 -->
      <g font-family="Inter, sans-serif" font-size="10" fill="#8a8a85">
        <line x1="60" y1="360" x2="54" y2="360" stroke="#0a0a0a"/>
        <text x="50" y="364" text-anchor="end">0</text>
        <line x1="60" y1="296" x2="54" y2="296" stroke="#0a0a0a"/>
        <text x="50" y="300" text-anchor="end">0.1</text>
        <line x1="60" y1="232" x2="54" y2="232" stroke="#0a0a0a"/>
        <text x="50" y="236" text-anchor="end">0.2</text>
        <line x1="60" y1="168" x2="54" y2="168" stroke="#0a0a0a"/>
        <text x="50" y="172" text-anchor="end">0.3</text>
        <line x1="60" y1="104" x2="54" y2="104" stroke="#0a0a0a"/>
        <text x="50" y="108" text-anchor="end">0.4</text>
        <line x1="60" y1="40"  x2="54" y2="40"  stroke="#0a0a0a"/>
        <text x="50" y="44"  text-anchor="end">0.5</text>
      </g>
      <text x="20" y="200" font-family="Inter, sans-serif" font-size="11" fill="#525252" text-anchor="middle" transform="rotate(-90, 20, 200)">estimated FDR</text>

      <!-- FDR curve: high at low threshold, drops to ~0.01 at threshold ~2.2, near 0 thereafter -->
      <path d="M 60 50 L 90 60 L 120 75 L 150 95 L 180 130 L 210 175 L 240 220 L 270 260 L 300 295 L 324 320 L 360 340 L 400 352 L 450 357 L 500 359"
            fill="none" stroke="#1e3a8a" stroke-width="2"/>

      <!-- 1% FDR horizontal line -->
      <line x1="60" y1="354" x2="500" y2="354" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="4 3"/>
      <text x="510" y="357" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#dc2626">FDR = 0.01</text>

      <!-- Threshold marker -->
      <line x1="324" y1="40" x2="324" y2="360" stroke="#dc2626" stroke-width="1.4" stroke-dasharray="6 3"/>
      <text x="324" y="32" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#dc2626" text-anchor="middle">t* — 1% FDR cutoff</text>

      <!-- Annotation -->
      <text x="120" y="80" font-family="Inter, sans-serif" font-size="10" fill="#525252">below the crossover,</text>
      <text x="120" y="94" font-family="Inter, sans-serif" font-size="10" fill="#525252">FDR rises rapidly</text>

      <text x="370" y="332" font-family="Inter, sans-serif" font-size="10" fill="#525252">above t*, real IDs are lost</text>
      <text x="370" y="346" font-family="Inter, sans-serif" font-size="10" fill="#525252">faster than decoys are removed</text>
    </g>
  </g>

</svg>
