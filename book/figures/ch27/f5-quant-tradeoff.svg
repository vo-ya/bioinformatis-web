<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" role="img" aria-labelledby="t d">
  <title id="t">Quantification methods on the CV-versus-multiplexing trade-off plane</title>
  <desc id="d">A two-dimensional scatter plot positions four proteomics quantification methods. The x-axis is the number of samples that can be multiplexed in a single LC-MS run (logarithmic); the y-axis is the typical coefficient of variation of the abundance estimates. Targeted PRM sits at low multiplexing with very low CV. SILAC sits at two-sample multiplexing with low CV. TMT-16 sits at sixteen-sample multiplexing with moderate CV that suffers from ratio compression. DDA-LFQ and DIA-LFQ both sit at one-sample multiplexing; DDA at higher CV, DIA at much lower. Side annotations describe each method's constraint.</desc>

  <rect x="0" y="0" width="1200" height="580" fill="#fafaf9"/>

  <!-- Header -->
  <text x="60" y="36" font-family="Inter, Helvetica Neue, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">QUANTIFICATION METHODS — CV VS MULTIPLEXING</text>
  <text x="60" y="56" font-family="Inter, Helvetica Neue, sans-serif" font-size="11" font-style="italic" fill="#525252">Each method occupies a different operating point. Pick by the question — cohort scale, precision required, sample availability.</text>

  <!-- Plot area -->
  <g transform="translate(120, 100)">
    <!-- Axes -->
    <line x1="0" y1="380" x2="700" y2="380" stroke="#0a0a0a" stroke-width="1.5"/>
    <line x1="0" y1="380" x2="0"   y2="20"  stroke="#0a0a0a" stroke-width="1.5"/>

    <!-- x-axis: log-scale 1, 2, 4, 8, 16 multiplexing -->
    <g font-family="Inter, sans-serif" font-size="10" fill="#8a8a85">
      <!-- 1 -->
      <line x1="60"  y1="380" x2="60"  y2="386" stroke="#0a0a0a"/>
      <text x="60"  y="402" text-anchor="middle">1</text>
      <!-- 2 -->
      <line x1="200" y1="380" x2="200" y2="386" stroke="#0a0a0a"/>
      <text x="200" y="402" text-anchor="middle">2</text>
      <!-- 4 -->
      <line x1="340" y1="380" x2="340" y2="386" stroke="#0a0a0a"/>
      <text x="340" y="402" text-anchor="middle">4</text>
      <!-- 8 -->
      <line x1="480" y1="380" x2="480" y2="386" stroke="#0a0a0a"/>
      <text x="480" y="402" text-anchor="middle">8</text>
      <!-- 16 -->
      <line x1="620" y1="380" x2="620" y2="386" stroke="#0a0a0a"/>
      <text x="620" y="402" text-anchor="middle">16</text>
    </g>
    <text x="350" y="422" font-family="Inter, sans-serif" font-size="11" fill="#525252" text-anchor="middle">samples multiplexed per LC-MS run (log scale)</text>

    <!-- y-axis: CV 0 to 20% -->
    <g font-family="Inter, sans-serif" font-size="10" fill="#8a8a85">
      <line x1="0" y1="380" x2="-6" y2="380" stroke="#0a0a0a"/>
      <text x="-12" y="384" text-anchor="end">0%</text>
      <line x1="0" y1="290" x2="-6" y2="290" stroke="#0a0a0a"/>
      <text x="-12" y="294" text-anchor="end">5%</text>
      <line x1="0" y1="200" x2="-6" y2="200" stroke="#0a0a0a"/>
      <text x="-12" y="204" text-anchor="end">10%</text>
      <line x1="0" y1="110" x2="-6" y2="110" stroke="#0a0a0a"/>
      <text x="-12" y="114" text-anchor="end">15%</text>
      <line x1="0" y1="20"  x2="-6" y2="20"  stroke="#0a0a0a"/>
      <text x="-12" y="24"  text-anchor="end">20%</text>
    </g>
    <text x="-65" y="200" font-family="Inter, sans-serif" font-size="11" fill="#525252" text-anchor="middle" transform="rotate(-90, -65, 200)">typical CV of abundance estimates</text>

    <!-- Light gridlines -->
    <g stroke="#e5e3dc" stroke-width="0.5" stroke-dasharray="3 3">
      <line x1="0" y1="290" x2="700" y2="290"/>
      <line x1="0" y1="200" x2="700" y2="200"/>
      <line x1="0" y1="110" x2="700" y2="110"/>
      <line x1="200" y1="20" x2="200" y2="380"/>
      <line x1="340" y1="20" x2="340" y2="380"/>
      <line x1="480" y1="20" x2="480" y2="380"/>
      <line x1="620" y1="20" x2="620" y2="380"/>
    </g>

    <!-- Data points -->
    <!-- PRM: 1 sample, CV ~2% -->
    <g transform="translate(60, 344)">
      <circle r="14" fill="#065f46" fill-opacity="0.8" stroke="#065f46" stroke-width="1.5"/>
      <text x="20" y="6" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#065f46">PRM</text>
      <text x="20" y="20" font-family="Inter, sans-serif" font-size="9" fill="#525252">targeted; absolute</text>
    </g>

    <!-- DIA-LFQ: 1 sample, CV ~5% -->
    <g transform="translate(60, 290)">
      <circle r="14" fill="#1e3a8a" fill-opacity="0.8" stroke="#1e3a8a" stroke-width="1.5"/>
      <text x="20" y="6" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">DIA-LFQ</text>
      <text x="20" y="20" font-family="Inter, sans-serif" font-size="9" fill="#525252">deterministic windows</text>
    </g>

    <!-- DDA-LFQ: 1 sample, CV ~13% -->
    <g transform="translate(60, 146)">
      <circle r="14" fill="#1e3a8a" fill-opacity="0.6" stroke="#1e3a8a" stroke-width="1.5"/>
      <text x="20" y="6" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">DDA-LFQ</text>
      <text x="20" y="20" font-family="Inter, sans-serif" font-size="9" fill="#525252">stochastic coverage</text>
    </g>

    <!-- SILAC: 2 samples, CV ~5% -->
    <g transform="translate(200, 290)">
      <circle r="14" fill="#b45309" fill-opacity="0.8" stroke="#b45309" stroke-width="1.5"/>
      <text x="20" y="6" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#b45309">SILAC</text>
      <text x="20" y="20" font-family="Inter, sans-serif" font-size="9" fill="#525252">cell-culture only</text>
    </g>

    <!-- TMT-6: 6 samples, CV ~8% -->
    <g transform="translate(390, 236)">
      <circle r="14" fill="#7c3aed" fill-opacity="0.65" stroke="#7c3aed" stroke-width="1.5"/>
      <text x="20" y="6" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#7c3aed">TMT-6</text>
    </g>

    <!-- TMT-16: 16 samples, CV ~12% (ratio compression) -->
    <g transform="translate(620, 164)">
      <circle r="14" fill="#7c3aed" fill-opacity="0.8" stroke="#7c3aed" stroke-width="1.5"/>
      <text x="-25" y="6" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#7c3aed" text-anchor="end">TMT-16</text>
      <text x="-25" y="20" font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="end">ratio compression →</text>
    </g>

    <!-- Trade-off arrow connecting TMT-6 to TMT-16 -->
    <path d="M 400 230 Q 510 200 615 165" fill="none" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3 3"/>

    <!-- Title plate at top -->
    <text x="350" y="0" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252" text-anchor="middle">lower-left is better — but each method has structural constraints</text>
  </g>

  <!-- Right-side method table -->
  <g transform="translate(870, 110)" font-family="Inter, sans-serif" font-size="10" fill="#374151">
    <rect x="0" y="0" width="290" height="380" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="0.5"/>
    <text x="14" y="22" font-weight="700" fill="#1e3a8a" letter-spacing="0.06em">METHOD CONSTRAINTS</text>

    <g transform="translate(14, 40)">
      <text y="0"  font-weight="600" fill="#065f46">PRM / MRM</text>
      <text y="14" font-size="9.5">absolute quantification; needs labeled</text>
      <text y="26" font-size="9.5">standards; ~50 peptides per run</text>
    </g>
    <g transform="translate(14, 90)">
      <text y="0"  font-weight="600" fill="#1e3a8a">DIA-LFQ</text>
      <text y="14" font-size="9.5">deterministic; library or library-free;</text>
      <text y="26" font-size="9.5">5% CV; preferred for cohort studies</text>
    </g>
    <g transform="translate(14, 140)">
      <text y="0"  font-weight="600" fill="#1e3a8a">DDA-LFQ</text>
      <text y="14" font-size="9.5">cheap and flexible; stochastic coverage;</text>
      <text y="26" font-size="9.5">missing values are the dominant cost</text>
    </g>
    <g transform="translate(14, 190)">
      <text y="0"  font-weight="600" fill="#b45309">SILAC</text>
      <text y="14" font-size="9.5">heavy K/R isotope labels in cell culture;</text>
      <text y="26" font-size="9.5">5% CV; clinical samples not eligible</text>
    </g>
    <g transform="translate(14, 240)">
      <text y="0"  font-weight="600" fill="#7c3aed">TMT (6/11/16-plex)</text>
      <text y="14" font-size="9.5">isobaric chemical labels; reporter ions</text>
      <text y="26" font-size="9.5">in MS2; ratio compression in DDA;</text>
      <text y="38" font-size="9.5">MS3 / SPS-MS3 recovers precision</text>
    </g>

    <!-- footnote -->
    <text x="14" y="350" font-size="9" fill="#8a8a85" font-style="italic">CV = coefficient of variation</text>
    <text x="14" y="362" font-size="9" fill="#8a8a85" font-style="italic">(SD / mean of repeated measurements)</text>
  </g>

</svg>
