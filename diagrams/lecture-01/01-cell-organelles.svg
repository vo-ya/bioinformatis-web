<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 480" role="img" aria-labelledby="t d">
  <title id="t">Eukaryotic cell — organelles that matter for information flow</title>
  <desc id="d">Schematic of a eukaryotic cell. Labeled organelles: plasma membrane (double line), nucleus with nuclear pores, several mitochondria with cristae, rough endoplasmic reticulum with ribosomes, Golgi apparatus as stacked curves, and free ribosomes in the cytoplasm.</desc>

  <!-- Labels are placed outside the cell in a right-side column with thin
       leader lines into the relevant structure. Leaves the cell interior
       clean — no black labels competing with black organelle outlines. -->

  <!-- Plasma membrane: outer rounded-blob shape, inner offset line -->
  <g>
    <path d="M 64 240
             C 64 130, 180 62, 360 56
             C 540 50, 656 138, 656 246
             C 656 346, 540 424, 360 424
             C 190 424, 64 352, 64 240 Z"
          fill="#f4f3ee" stroke="#0a0a0a" stroke-width="2.5"/>
    <path d="M 72 240
             C 72 136, 186 70, 360 64
             C 536 58, 648 142, 648 246
             C 648 342, 536 416, 360 416
             C 194 416, 72 348, 72 240 Z"
          fill="none" stroke="#525252" stroke-width="1"/>
  </g>

  <!-- Nucleus -->
  <g>
    <ellipse cx="290" cy="220" rx="110" ry="85" fill="#ffffff" stroke="#0a0a0a" stroke-width="2.5"/>
    <ellipse cx="290" cy="220" rx="104" ry="79" fill="none" stroke="#525252" stroke-width="1"/>
    <!-- Nuclear pores: small gaps -->
    <g fill="#fcfcfa" stroke="#0a0a0a" stroke-width="1">
      <rect x="286" y="131" width="8" height="4" rx="1"/>
      <rect x="363" y="156" width="4" height="8" rx="1"/>
      <rect x="395" y="215" width="4" height="8" rx="1"/>
      <rect x="363" y="275" width="4" height="8" rx="1"/>
      <rect x="286" y="302" width="8" height="4" rx="1"/>
      <rect x="216" y="275" width="4" height="8" rx="1"/>
      <rect x="183" y="215" width="4" height="8" rx="1"/>
      <rect x="216" y="156" width="4" height="8" rx="1"/>
    </g>
    <ellipse cx="302" cy="232" rx="24" ry="16" fill="#ebeae3" stroke="#c4c1b6" stroke-width="1"/>
  </g>

  <!-- Mitochondria -->
  <g>
    <g transform="translate(156 118) rotate(-12)">
      <ellipse cx="0" cy="0" rx="34" ry="14" fill="#ffffff" stroke="#0a0a0a" stroke-width="2"/>
      <g stroke="#525252" stroke-width="1" fill="none">
        <path d="M -26 -4 Q -20 4 -14 -4 Q -8 4 -2 -4 Q 4 4 10 -4 Q 16 4 22 -4"/>
        <path d="M -26 4 Q -20 -4 -14 4 Q -8 -4 -2 4 Q 4 -4 10 4 Q 16 -4 22 4"/>
      </g>
    </g>

    <g transform="translate(540 148) rotate(18)">
      <ellipse cx="0" cy="0" rx="40" ry="16" fill="#ffffff" stroke="#0a0a0a" stroke-width="2"/>
      <g stroke="#525252" stroke-width="1" fill="none">
        <path d="M -32 -5 Q -24 5 -16 -5 Q -8 5 0 -5 Q 8 5 16 -5 Q 24 5 32 -5"/>
        <path d="M -32 5 Q -24 -5 -16 5 Q -8 -5 0 5 Q 8 -5 16 5 Q 24 -5 32 5"/>
      </g>
    </g>

    <g transform="translate(170 368) rotate(8)">
      <ellipse cx="0" cy="0" rx="36" ry="14" fill="#ffffff" stroke="#0a0a0a" stroke-width="2"/>
      <g stroke="#525252" stroke-width="1" fill="none">
        <path d="M -28 -4 Q -22 4 -16 -4 Q -10 4 -4 -4 Q 2 4 8 -4 Q 14 4 20 -4"/>
        <path d="M -28 4 Q -22 -4 -16 4 Q -10 -4 -4 4 Q 2 -4 8 4 Q 14 -4 20 4"/>
      </g>
    </g>

    <g transform="translate(562 348) rotate(-10)">
      <ellipse cx="0" cy="0" rx="32" ry="13" fill="#ffffff" stroke="#0a0a0a" stroke-width="2"/>
      <g stroke="#525252" stroke-width="1" fill="none">
        <path d="M -24 -4 Q -18 4 -12 -4 Q -6 4 0 -4 Q 6 4 12 -4 Q 18 4 24 -4"/>
        <path d="M -24 4 Q -18 -4 -12 4 Q -6 -4 0 4 Q 6 -4 12 4 Q 18 -4 24 4"/>
      </g>
    </g>
  </g>

  <!-- Rough ER -->
  <g>
    <path d="M 430 196
             C 470 184, 512 206, 488 232
             C 472 248, 508 272, 544 260
             C 568 252, 576 226, 556 212"
          fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
    <path d="M 430 210
             C 470 200, 506 218, 484 240
             C 468 256, 506 282, 540 272
             C 560 266, 568 246, 552 234"
          fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
    <g fill="#0a0a0a">
      <circle cx="446" cy="194" r="2.5"/>
      <circle cx="470" cy="188" r="2.5"/>
      <circle cx="492" cy="198" r="2.5"/>
      <circle cx="510" cy="222" r="2.5"/>
      <circle cx="480" cy="246" r="2.5"/>
      <circle cx="516" cy="268" r="2.5"/>
      <circle cx="542" cy="260" r="2.5"/>
      <circle cx="556" cy="218" r="2.5"/>
    </g>
  </g>

  <!-- Golgi -->
  <g transform="translate(420 340)">
    <g fill="none" stroke="#0a0a0a" stroke-width="1.5">
      <path d="M -40 -18 C -24 -28, 24 -28, 40 -18"/>
      <path d="M -44 -8  C -26 -18, 26 -18, 44 -8"/>
      <path d="M -46 2   C -26 -8,  26 -8,  46 2"/>
      <path d="M -44 12  C -26 2,   26 2,   44 12"/>
      <path d="M -40 22  C -24 12,  24 12,  40 22"/>
    </g>
  </g>

  <!-- Free ribosomes (small filled dots) -->
  <g fill="#0a0a0a">
    <circle cx="240" cy="100" r="2.5"/>
    <circle cx="116" cy="220" r="2.5"/>
    <circle cx="108" cy="290" r="2.5"/>
    <circle cx="240" cy="400" r="2.5"/>
    <circle cx="340" cy="380" r="2.5"/>
    <circle cx="600" cy="290" r="2.5"/>
    <circle cx="616" cy="226" r="2.5"/>
    <circle cx="360" cy="100" r="2.5"/>
  </g>

  <!-- ═════ Labels (all outside the cell, with thin muted leader lines) ═════ -->

  <!-- Plasma membrane — left side -->
  <g>
    <line x1="58" y1="310" x2="30" y2="338" stroke="#525252" stroke-width="0.75"/>
    <g font-family="Inter, sans-serif" font-size="12" fill="#0a0a0a">
      <text x="14" y="346" font-weight="600">Plasma membrane</text>
      <text x="14" y="360" font-size="10" fill="#525252">outer double line</text>
    </g>
  </g>

  <!-- Mitochondrion (top-left one) — label above-left -->
  <g>
    <line x1="130" y1="110" x2="90" y2="84" stroke="#525252" stroke-width="0.75"/>
    <g font-family="Inter, sans-serif" font-size="12" fill="#0a0a0a">
      <text x="14" y="82" font-weight="600">Mitochondrion</text>
      <text x="14" y="96" font-size="10" fill="#525252">own genome, ~16.5 kb</text>
    </g>
  </g>

  <!-- Free ribosomes — bottom-left label with leader to the ribosome at (116, 220) -->
  <g>
    <line x1="114" y1="222" x2="70" y2="436" stroke="#525252" stroke-width="0.75"/>
    <g font-family="Inter, sans-serif" font-size="12" fill="#0a0a0a">
      <text x="14" y="448" font-weight="600">Ribosomes</text>
      <text x="14" y="462" font-size="10" fill="#525252">CPU: mRNA → protein</text>
    </g>
  </g>

  <!-- Nucleus — right-side label -->
  <g>
    <line x1="398" y1="220" x2="692" y2="106" stroke="#525252" stroke-width="0.75"/>
    <g font-family="Inter, sans-serif" font-size="12" fill="#0a0a0a">
      <text x="696" y="104" font-weight="600">Nucleus</text>
      <text x="696" y="118" font-size="10" fill="#525252">houses the genome</text>
    </g>
  </g>

  <!-- Rough ER -->
  <g>
    <line x1="566" y1="218" x2="700" y2="210" stroke="#525252" stroke-width="0.75"/>
    <g font-family="Inter, sans-serif" font-size="12" fill="#0a0a0a">
      <text x="706" y="208" font-weight="600">Rough ER</text>
      <text x="706" y="222" font-size="10" fill="#525252">ribosome-studded,</text>
      <text x="706" y="234" font-size="10" fill="#525252">folds proteins</text>
    </g>
  </g>

  <!-- Golgi -->
  <g>
    <line x1="466" y1="340" x2="700" y2="338" stroke="#525252" stroke-width="0.75"/>
    <g font-family="Inter, sans-serif" font-size="12" fill="#0a0a0a">
      <text x="706" y="336" font-weight="600">Golgi apparatus</text>
      <text x="706" y="350" font-size="10" fill="#525252">modification,</text>
      <text x="706" y="362" font-size="10" fill="#525252">trafficking</text>
    </g>
  </g>

  <!-- Nuclear pores — secondary label with shorter leader -->
  <g>
    <line x1="290" y1="133" x2="380" y2="48" stroke="#525252" stroke-width="0.75"/>
    <g font-family="Inter, sans-serif" font-size="11" fill="#525252">
      <text x="384" y="46" font-style="italic">nuclear pores</text>
    </g>
  </g>
</svg>
