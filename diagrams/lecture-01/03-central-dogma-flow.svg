<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" role="img" aria-labelledby="t d">
  <title id="t">The central dogma</title>
  <desc id="d">DNA is transcribed into pre-mRNA; introns are spliced out to yield mature mRNA; the ribosome translates mRNA codons into a protein. Reverse transcription and RNA replication are shown as dashed exception arrows.</desc>

  <defs>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
    <marker id="arrow-muted-sm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>

  <!-- Track labels (left column) -->
  <g font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8a8a85" letter-spacing="0.12em">
    <text x="20" y="85">DNA</text>
    <text x="20" y="175">pre-mRNA</text>
    <text x="20" y="245">mRNA</text>
    <text x="20" y="325">PROTEIN</text>
  </g>

  <!-- ──────── DNA track ──────── -->
  <g>
    <!-- horizontal backbone -->
    <line x1="140" y1="80" x2="820" y2="80" stroke="#525252" stroke-width="1.5"/>
    <!-- exons (filled amber) + introns (gaps) -->
    <g fill="#b45309" stroke="#b45309" stroke-width="1">
      <rect x="140" y="70" width="80"  height="20" rx="2"/>
      <rect x="280" y="70" width="120" height="20" rx="2"/>
      <rect x="460" y="70" width="60"  height="20" rx="2"/>
      <rect x="580" y="70" width="140" height="20" rx="2"/>
      <rect x="760" y="70" width="60"  height="20" rx="2"/>
    </g>
    <!-- small caps callouts -->
    <g font-family="Inter, sans-serif" font-size="10" fill="#525252">
      <text x="180" y="108" text-anchor="middle">exon</text>
      <text x="250" y="108" text-anchor="middle" fill="#8a8a85">intron</text>
      <text x="340" y="108" text-anchor="middle">exon</text>
      <text x="430" y="108" text-anchor="middle" fill="#8a8a85">intron</text>
      <text x="490" y="108" text-anchor="middle">exon</text>
      <text x="550" y="108" text-anchor="middle" fill="#8a8a85">intron</text>
      <text x="650" y="108" text-anchor="middle">exon</text>
      <text x="740" y="108" text-anchor="middle" fill="#8a8a85">intron</text>
      <text x="790" y="108" text-anchor="middle">exon</text>
    </g>
  </g>

  <!-- Transcription arrow -->
  <g stroke="#1e3a8a" stroke-width="1.75" fill="none">
    <line x1="480" y1="122" x2="480" y2="150" marker-end="url(#arrow-accent)"/>
  </g>
  <text x="496" y="142" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">Transcription</text>

  <!-- ──────── pre-mRNA track ──────── -->
  <g>
    <line x1="140" y1="170" x2="820" y2="170" stroke="#525252" stroke-width="1.5"/>
    <!-- same exon/intron pattern, in base-u violet (RNA) -->
    <g fill="#7c3aed" stroke="#7c3aed" stroke-width="1">
      <rect x="140" y="160" width="80"  height="20" rx="2"/>
      <rect x="280" y="160" width="120" height="20" rx="2"/>
      <rect x="460" y="160" width="60"  height="20" rx="2"/>
      <rect x="580" y="160" width="140" height="20" rx="2"/>
      <rect x="760" y="160" width="60"  height="20" rx="2"/>
    </g>
  </g>

  <!-- Splicing arrow -->
  <g stroke="#1e3a8a" stroke-width="1.75" fill="none">
    <line x1="480" y1="192" x2="480" y2="220" marker-end="url(#arrow-accent)"/>
  </g>
  <text x="496" y="212" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">Splicing</text>
  <text x="496" y="226" font-family="Inter, sans-serif" font-size="10" fill="#525252">introns removed</text>

  <!-- ──────── mature mRNA track ──────── -->
  <g>
    <line x1="140" y1="240" x2="620" y2="240" stroke="#525252" stroke-width="1.5"/>
    <!-- exons joined -->
    <g fill="#7c3aed" stroke="#7c3aed" stroke-width="1">
      <rect x="140" y="230" width="80"  height="20" rx="2"/>
      <rect x="220" y="230" width="120" height="20" rx="2"/>
      <rect x="340" y="230" width="60"  height="20" rx="2"/>
      <rect x="400" y="230" width="140" height="20" rx="2"/>
      <rect x="540" y="230" width="60"  height="20" rx="2"/>
    </g>
    <!-- codon markers (first few, JetBrains Mono) -->
    <g font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">
      <text x="160" y="222" text-anchor="middle">AUG</text>
      <text x="205" y="222" text-anchor="middle">GCU</text>
      <text x="250" y="222" text-anchor="middle">UUC</text>
      <text x="295" y="222" text-anchor="middle">GUU</text>
      <text x="340" y="222" text-anchor="middle">AAA</text>
    </g>
  </g>

  <!-- Translation arrow -->
  <g stroke="#1e3a8a" stroke-width="1.75" fill="none">
    <line x1="380" y1="262" x2="380" y2="290" marker-end="url(#arrow-accent)"/>
  </g>
  <text x="396" y="282" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">Translation</text>
  <text x="396" y="296" font-family="Inter, sans-serif" font-size="10" fill="#525252">ribosome reads codons</text>

  <!-- ──────── Protein track ──────── -->
  <g>
    <line x1="140" y1="330" x2="560" y2="330" stroke="#525252" stroke-width="1.5"/>
    <g>
      <!-- amino acid circles, each 3-base-wide worth of codon -->
      <circle cx="160" cy="330" r="13" fill="#dbe3f5" stroke="#1e3a8a" stroke-width="1.25"/>
      <text x="160" y="334" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" text-anchor="middle">M</text>
      <circle cx="205" cy="330" r="13" fill="#e8dcc0" stroke="#b45309" stroke-width="1.25"/>
      <text x="205" y="334" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0a0a0a" text-anchor="middle">A</text>
      <circle cx="250" cy="330" r="13" fill="#e8dcc0" stroke="#b45309" stroke-width="1.25"/>
      <text x="250" y="334" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0a0a0a" text-anchor="middle">F</text>
      <circle cx="295" cy="330" r="13" fill="#e8dcc0" stroke="#b45309" stroke-width="1.25"/>
      <text x="295" y="334" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0a0a0a" text-anchor="middle">V</text>
      <circle cx="340" cy="330" r="13" fill="#d1e5d9" stroke="#15803d" stroke-width="1.25"/>
      <text x="340" y="334" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0a0a0a" text-anchor="middle">K</text>
      <circle cx="385" cy="330" r="13" fill="#d1e5d9" stroke="#15803d" stroke-width="1.25"/>
      <text x="385" y="334" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0a0a0a" text-anchor="middle">S</text>
      <circle cx="430" cy="330" r="13" fill="#e8dcc0" stroke="#b45309" stroke-width="1.25"/>
      <text x="430" y="334" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#0a0a0a" text-anchor="middle">L</text>
      <!-- trailing ellipsis -->
      <text x="480" y="335" font-family="Inter, sans-serif" font-size="16" fill="#8a8a85" text-anchor="middle">···</text>
    </g>
  </g>

  <!-- ──────── Exception arrows (dashed, muted) ──────── -->
  <!-- Reverse transcription: right-side arrow going from mRNA back up to DNA -->
  <g stroke="#525252" stroke-width="1" fill="none" stroke-dasharray="4 3">
    <path d="M 850 170 C 870 170, 870 80, 850 80" marker-end="url(#arrow-muted-sm)"/>
  </g>
  <text x="860" y="126" font-family="Inter, sans-serif" font-size="10" fill="#525252">reverse</text>
  <text x="860" y="138" font-family="Inter, sans-serif" font-size="10" fill="#525252">transcription</text>

  <!-- RNA replication: loop on pre-mRNA track -->
  <g stroke="#525252" stroke-width="1" fill="none" stroke-dasharray="4 3">
    <path d="M 120 170 C 100 170, 100 190, 120 190" marker-end="url(#arrow-muted-sm)"/>
  </g>
  <text x="50" y="186" font-family="Inter, sans-serif" font-size="10" fill="#525252">RNA → RNA</text>
  <text x="50" y="198" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">(some viruses)</text>

  <!-- Legend (bottom-right) -->
  <g font-family="Inter, sans-serif" font-size="10" fill="#525252">
    <rect x="640" y="362" width="12" height="12" fill="#b45309"/>
    <text x="658" y="372">exon</text>
    <line x1="700" y1="368" x2="712" y2="368" stroke="#525252" stroke-width="1"/>
    <text x="718" y="372">intron</text>
    <rect x="760" y="362" width="12" height="12" fill="#7c3aed"/>
    <text x="778" y="372">RNA (U)</text>
  </g>
</svg>
