<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="t d">
  <title id="t">Standard genetic code table</title>
  <desc id="d">The 64 codons of the standard genetic code arranged as a 4×4×4 grid: first base by row (U, C, A, G), second base by column, third base as the sub-row within each cell. Cells are tinted by amino-acid chemistry: hydrophobic in amber, polar in teal, acidic in rose, basic in cobalt, glycine in gray, stop codons in dark. The start codon AUG has a cobalt outline.</desc>

  <!-- Axis labels -->
  <g font-family="Inter, sans-serif" font-weight="600" letter-spacing="0.12em">
    <text x="360" y="32" font-size="12" fill="#8a8a85" text-anchor="middle">SECOND BASE →</text>
    <text x="14" y="276" font-size="12" fill="#8a8a85" text-anchor="middle" transform="rotate(-90 14 276)">↓ FIRST BASE</text>
    <text x="700" y="276" font-size="12" fill="#8a8a85" text-anchor="middle" transform="rotate(90 700 276)">THIRD BASE ↓</text>
  </g>

  <!-- Column headers (second base) -->
  <g font-family="JetBrains Mono, monospace" font-size="16" font-weight="600" fill="#0a0a0a" text-anchor="middle">
    <text x="130" y="64">U</text>
    <text x="270" y="64">C</text>
    <text x="410" y="64">A</text>
    <text x="550" y="64">G</text>
  </g>

  <!-- Row headers (first base) -->
  <g font-family="JetBrains Mono, monospace" font-size="16" font-weight="600" fill="#0a0a0a" text-anchor="middle">
    <text x="46" y="126">U</text>
    <text x="46" y="226">C</text>
    <text x="46" y="326">A</text>
    <text x="46" y="426">G</text>
  </g>

  <!-- Outer grid border -->
  <rect x="60" y="76" width="560" height="400" fill="none" stroke="#c4c1b6" stroke-width="1.5"/>

  <!-- Column dividers -->
  <g stroke="#e5e3dc" stroke-width="1">
    <line x1="200" y1="76" x2="200" y2="476"/>
    <line x1="340" y1="76" x2="340" y2="476"/>
    <line x1="480" y1="76" x2="480" y2="476"/>
  </g>
  <!-- Row dividers (bolder) -->
  <g stroke="#c4c1b6" stroke-width="1">
    <line x1="60" y1="176" x2="620" y2="176"/>
    <line x1="60" y1="276" x2="620" y2="276"/>
    <line x1="60" y1="376" x2="620" y2="376"/>
  </g>

  <!-- Third-base labels to the right of each row (4 per first-base row) -->
  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#8a8a85" text-anchor="middle">
    <text x="640" y="96">U</text><text x="640" y="121">C</text><text x="640" y="146">A</text><text x="640" y="171">G</text>
    <text x="640" y="196">U</text><text x="640" y="221">C</text><text x="640" y="246">A</text><text x="640" y="271">G</text>
    <text x="640" y="296">U</text><text x="640" y="321">C</text><text x="640" y="346">A</text><text x="640" y="371">G</text>
    <text x="640" y="396">U</text><text x="640" y="421">C</text><text x="640" y="446">A</text><text x="640" y="471">G</text>
  </g>

  <!-- ═══════════════ 64 codon cells ═══════════════ -->
  <!-- fill tints: hydrophobic #f0e7cb, polar #cfe5e6, acidic #f3d6cf, basic #d5dff0, special #e5dcec (gly), stop #d9d5ca -->

  <!-- Row U (first base U) -->
  <!-- Col U: UUU/UUC Phe, UUA/UUG Leu (both hydrophobic) -->
  <g>
    <rect x="60"  y="76"  width="140" height="25" fill="#f0e7cb"/>
    <rect x="60"  y="101" width="140" height="25" fill="#f0e7cb"/>
    <rect x="60"  y="126" width="140" height="25" fill="#f0e7cb"/>
    <rect x="60"  y="151" width="140" height="25" fill="#f0e7cb"/>
  </g>
  <g>
    <rect x="200" y="76"  width="140" height="100" fill="#cfe5e6"/>
  </g>
  <g>
    <rect x="340" y="76"  width="140" height="25" fill="#cfe5e6"/>
    <rect x="340" y="101" width="140" height="25" fill="#cfe5e6"/>
    <rect x="340" y="126" width="140" height="25" fill="#d9d5ca"/>
    <rect x="340" y="151" width="140" height="25" fill="#d9d5ca"/>
  </g>
  <g>
    <rect x="480" y="76"  width="140" height="25" fill="#cfe5e6"/>
    <rect x="480" y="101" width="140" height="25" fill="#cfe5e6"/>
    <rect x="480" y="126" width="140" height="25" fill="#d9d5ca"/>
    <rect x="480" y="151" width="140" height="25" fill="#f0e7cb"/>
  </g>

  <!-- Row C (first base C) — all single category per column (L, P, H/Q, R) -->
  <rect x="60"  y="176" width="140" height="100" fill="#f0e7cb"/>  <!-- CUx Leu -->
  <rect x="200" y="176" width="140" height="100" fill="#f0e7cb"/>  <!-- CCx Pro (hydrophobic) -->
  <g>
    <rect x="340" y="176" width="140" height="25" fill="#d5dff0"/>  <!-- CAU H -->
    <rect x="340" y="201" width="140" height="25" fill="#d5dff0"/>  <!-- CAC H -->
    <rect x="340" y="226" width="140" height="25" fill="#cfe5e6"/>  <!-- CAA Q -->
    <rect x="340" y="251" width="140" height="25" fill="#cfe5e6"/>  <!-- CAG Q -->
  </g>
  <rect x="480" y="176" width="140" height="100" fill="#d5dff0"/>  <!-- CGx Arg -->

  <!-- Row A (first base A) -->
  <g>
    <rect x="60"  y="276" width="140" height="25" fill="#f0e7cb"/>  <!-- AUU I -->
    <rect x="60"  y="301" width="140" height="25" fill="#f0e7cb"/>  <!-- AUC I -->
    <rect x="60"  y="326" width="140" height="25" fill="#f0e7cb"/>  <!-- AUA I -->
    <rect x="60"  y="351" width="140" height="25" fill="#f0e7cb"/>  <!-- AUG M (start) -->
  </g>
  <rect x="200" y="276" width="140" height="100" fill="#cfe5e6"/>  <!-- ACx Thr -->
  <g>
    <rect x="340" y="276" width="140" height="25" fill="#cfe5e6"/>  <!-- AAU N -->
    <rect x="340" y="301" width="140" height="25" fill="#cfe5e6"/>  <!-- AAC N -->
    <rect x="340" y="326" width="140" height="25" fill="#d5dff0"/>  <!-- AAA K -->
    <rect x="340" y="351" width="140" height="25" fill="#d5dff0"/>  <!-- AAG K -->
  </g>
  <g>
    <rect x="480" y="276" width="140" height="25" fill="#cfe5e6"/>  <!-- AGU S -->
    <rect x="480" y="301" width="140" height="25" fill="#cfe5e6"/>  <!-- AGC S -->
    <rect x="480" y="326" width="140" height="25" fill="#d5dff0"/>  <!-- AGA R -->
    <rect x="480" y="351" width="140" height="25" fill="#d5dff0"/>  <!-- AGG R -->
  </g>

  <!-- Row G (first base G) -->
  <rect x="60"  y="376" width="140" height="100" fill="#f0e7cb"/>  <!-- GUx Val -->
  <rect x="200" y="376" width="140" height="100" fill="#f0e7cb"/>  <!-- GCx Ala -->
  <g>
    <rect x="340" y="376" width="140" height="25" fill="#f3d6cf"/>  <!-- GAU D -->
    <rect x="340" y="401" width="140" height="25" fill="#f3d6cf"/>  <!-- GAC D -->
    <rect x="340" y="426" width="140" height="25" fill="#f3d6cf"/>  <!-- GAA E -->
    <rect x="340" y="451" width="140" height="25" fill="#f3d6cf"/>  <!-- GAG E -->
  </g>
  <rect x="480" y="376" width="140" height="100" fill="#e5dcec"/>  <!-- GGx Gly (special) -->

  <!-- Codon text (JBM + AA letters) -->
  <g>
    <!-- Helper: each entry is at (col_x+8, row_y+18), plus AA letter at col_x+58, 3-letter at col_x+74 -->
    <g font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">
      <!-- Row U (y=94..169 in steps of 25) -->
      <text x="68" y="94">UUU</text>      <text x="68" y="119">UUC</text>      <text x="68" y="144">UUA</text>      <text x="68" y="169">UUG</text>
      <text x="208" y="94">UCU</text>     <text x="208" y="119">UCC</text>     <text x="208" y="144">UCA</text>     <text x="208" y="169">UCG</text>
      <text x="348" y="94">UAU</text>     <text x="348" y="119">UAC</text>     <text x="348" y="144">UAA</text>     <text x="348" y="169">UAG</text>
      <text x="488" y="94">UGU</text>     <text x="488" y="119">UGC</text>     <text x="488" y="144">UGA</text>     <text x="488" y="169">UGG</text>
      <!-- Row C (y=194..269) -->
      <text x="68" y="194">CUU</text>     <text x="68" y="219">CUC</text>     <text x="68" y="244">CUA</text>     <text x="68" y="269">CUG</text>
      <text x="208" y="194">CCU</text>    <text x="208" y="219">CCC</text>    <text x="208" y="244">CCA</text>    <text x="208" y="269">CCG</text>
      <text x="348" y="194">CAU</text>    <text x="348" y="219">CAC</text>    <text x="348" y="244">CAA</text>    <text x="348" y="269">CAG</text>
      <text x="488" y="194">CGU</text>    <text x="488" y="219">CGC</text>    <text x="488" y="244">CGA</text>    <text x="488" y="269">CGG</text>
      <!-- Row A (y=294..369) -->
      <text x="68" y="294">AUU</text>     <text x="68" y="319">AUC</text>     <text x="68" y="344">AUA</text>     <text x="68" y="369">AUG</text>
      <text x="208" y="294">ACU</text>    <text x="208" y="319">ACC</text>    <text x="208" y="344">ACA</text>    <text x="208" y="369">ACG</text>
      <text x="348" y="294">AAU</text>    <text x="348" y="319">AAC</text>    <text x="348" y="344">AAA</text>    <text x="348" y="369">AAG</text>
      <text x="488" y="294">AGU</text>    <text x="488" y="319">AGC</text>    <text x="488" y="344">AGA</text>    <text x="488" y="369">AGG</text>
      <!-- Row G (y=394..469) -->
      <text x="68" y="394">GUU</text>     <text x="68" y="419">GUC</text>     <text x="68" y="444">GUA</text>     <text x="68" y="469">GUG</text>
      <text x="208" y="394">GCU</text>    <text x="208" y="419">GCC</text>    <text x="208" y="444">GCA</text>    <text x="208" y="469">GCG</text>
      <text x="348" y="394">GAU</text>    <text x="348" y="419">GAC</text>    <text x="348" y="444">GAA</text>    <text x="348" y="469">GAG</text>
      <text x="488" y="394">GGU</text>    <text x="488" y="419">GGC</text>    <text x="488" y="444">GGA</text>    <text x="488" y="469">GGG</text>
    </g>

    <!-- AA 1-letter codes -->
    <g font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#0a0a0a">
      <text x="120" y="94">F</text><text x="120" y="119">F</text><text x="120" y="144">L</text><text x="120" y="169">L</text>
      <text x="260" y="94">S</text><text x="260" y="119">S</text><text x="260" y="144">S</text><text x="260" y="169">S</text>
      <text x="400" y="94">Y</text><text x="400" y="119">Y</text><text x="400" y="144" fill="#ffffff">■</text><text x="400" y="169" fill="#ffffff">■</text>
      <text x="540" y="94">C</text><text x="540" y="119">C</text><text x="540" y="144" fill="#ffffff">■</text><text x="540" y="169">W</text>

      <text x="120" y="194">L</text><text x="120" y="219">L</text><text x="120" y="244">L</text><text x="120" y="269">L</text>
      <text x="260" y="194">P</text><text x="260" y="219">P</text><text x="260" y="244">P</text><text x="260" y="269">P</text>
      <text x="400" y="194">H</text><text x="400" y="219">H</text><text x="400" y="244">Q</text><text x="400" y="269">Q</text>
      <text x="540" y="194">R</text><text x="540" y="219">R</text><text x="540" y="244">R</text><text x="540" y="269">R</text>

      <text x="120" y="294">I</text><text x="120" y="319">I</text><text x="120" y="344">I</text><text x="120" y="369" fill="#1e3a8a">M</text>
      <text x="260" y="294">T</text><text x="260" y="319">T</text><text x="260" y="344">T</text><text x="260" y="369">T</text>
      <text x="400" y="294">N</text><text x="400" y="319">N</text><text x="400" y="344">K</text><text x="400" y="369">K</text>
      <text x="540" y="294">S</text><text x="540" y="319">S</text><text x="540" y="344">R</text><text x="540" y="369">R</text>

      <text x="120" y="394">V</text><text x="120" y="419">V</text><text x="120" y="444">V</text><text x="120" y="469">V</text>
      <text x="260" y="394">A</text><text x="260" y="419">A</text><text x="260" y="444">A</text><text x="260" y="469">A</text>
      <text x="400" y="394">D</text><text x="400" y="419">D</text><text x="400" y="444">E</text><text x="400" y="469">E</text>
      <text x="540" y="394">G</text><text x="540" y="419">G</text><text x="540" y="444">G</text><text x="540" y="469">G</text>
    </g>

    <!-- 3-letter abbreviations -->
    <g font-family="Inter, sans-serif" font-size="10" fill="#525252">
      <text x="140" y="94">Phe</text><text x="140" y="119">Phe</text><text x="140" y="144">Leu</text><text x="140" y="169">Leu</text>
      <text x="280" y="94">Ser</text><text x="280" y="119">Ser</text><text x="280" y="144">Ser</text><text x="280" y="169">Ser</text>
      <text x="420" y="94">Tyr</text><text x="420" y="119">Tyr</text><text x="420" y="144" fill="#0a0a0a" font-weight="600">STOP</text><text x="420" y="169" fill="#0a0a0a" font-weight="600">STOP</text>
      <text x="560" y="94">Cys</text><text x="560" y="119">Cys</text><text x="560" y="144" fill="#0a0a0a" font-weight="600">STOP</text><text x="560" y="169">Trp</text>

      <text x="140" y="194">Leu</text><text x="140" y="219">Leu</text><text x="140" y="244">Leu</text><text x="140" y="269">Leu</text>
      <text x="280" y="194">Pro</text><text x="280" y="219">Pro</text><text x="280" y="244">Pro</text><text x="280" y="269">Pro</text>
      <text x="420" y="194">His</text><text x="420" y="219">His</text><text x="420" y="244">Gln</text><text x="420" y="269">Gln</text>
      <text x="560" y="194">Arg</text><text x="560" y="219">Arg</text><text x="560" y="244">Arg</text><text x="560" y="269">Arg</text>

      <text x="140" y="294">Ile</text><text x="140" y="319">Ile</text><text x="140" y="344">Ile</text><text x="140" y="369" fill="#1e3a8a" font-weight="600">Met ★</text>
      <text x="280" y="294">Thr</text><text x="280" y="319">Thr</text><text x="280" y="344">Thr</text><text x="280" y="369">Thr</text>
      <text x="420" y="294">Asn</text><text x="420" y="319">Asn</text><text x="420" y="344">Lys</text><text x="420" y="369">Lys</text>
      <text x="560" y="294">Ser</text><text x="560" y="319">Ser</text><text x="560" y="344">Arg</text><text x="560" y="369">Arg</text>

      <text x="140" y="394">Val</text><text x="140" y="419">Val</text><text x="140" y="444">Val</text><text x="140" y="469">Val</text>
      <text x="280" y="394">Ala</text><text x="280" y="419">Ala</text><text x="280" y="444">Ala</text><text x="280" y="469">Ala</text>
      <text x="420" y="394">Asp</text><text x="420" y="419">Asp</text><text x="420" y="444">Glu</text><text x="420" y="469">Glu</text>
      <text x="560" y="394">Gly</text><text x="560" y="419">Gly</text><text x="560" y="444">Gly</text><text x="560" y="469">Gly</text>
    </g>
  </g>

  <!-- Start codon AUG accent border -->
  <rect x="60" y="351" width="140" height="25" fill="none" stroke="#1e3a8a" stroke-width="2"/>

  <!-- Legend -->
  <g font-family="Inter, sans-serif" font-size="11" fill="#0a0a0a">
    <g transform="translate(60 492)">
      <rect x="0"   y="0" width="16" height="12" fill="#f0e7cb"/>
      <text x="22" y="10">Hydrophobic</text>

      <rect x="122" y="0" width="16" height="12" fill="#cfe5e6"/>
      <text x="144" y="10">Polar</text>

      <rect x="200" y="0" width="16" height="12" fill="#f3d6cf"/>
      <text x="222" y="10">Acidic</text>

      <rect x="280" y="0" width="16" height="12" fill="#d5dff0"/>
      <text x="302" y="10">Basic</text>

      <rect x="350" y="0" width="16" height="12" fill="#e5dcec"/>
      <text x="372" y="10">Gly</text>

      <rect x="410" y="0" width="16" height="12" fill="#d9d5ca"/>
      <text x="432" y="10">Stop</text>

      <rect x="484" y="0" width="16" height="12" fill="#ffffff" stroke="#1e3a8a" stroke-width="2"/>
      <text x="506" y="10" fill="#1e3a8a" font-weight="600">AUG = start (Met)</text>
    </g>
  </g>
</svg>
