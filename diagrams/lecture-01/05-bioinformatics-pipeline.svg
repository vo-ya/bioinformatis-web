<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 280" role="img" aria-labelledby="t d">
  <title id="t">End-to-end bioinformatics pipeline</title>
  <desc id="d">Eight stages from biological sample to biological interpretation: sample, library prep, sequencer, raw reads (FASTQ), QC and trimming, alignment and assembly, variant calling, interpretation. The first four are covered in Lecture 1; the last four in subsequent lectures.</desc>

  <defs>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <!-- Box geometry: 8 boxes at 118 wide, 10 gap, starting at x=20 -->
  <!-- Positions: 20, 148, 276, 404, 532, 660, 788, 916  (width 118, gap 10) -->

  <g font-family="Inter, sans-serif">

    <!-- Bracket: Lecture 1 coverage (first four boxes) -->
    <g stroke="#1e3a8a" stroke-width="1" fill="none">
      <path d="M 30 74 L 30 62 L 512 62 L 512 74"/>
    </g>
    <text x="271" y="52" font-size="11" font-weight="600" fill="#1e3a8a" text-anchor="middle" letter-spacing="0.08em">COVERED IN LECTURE 1</text>

    <!-- Bracket: subsequent lectures (last four boxes) -->
    <g stroke="#525252" stroke-width="1" fill="none" stroke-dasharray="4 3">
      <path d="M 542 206 L 542 218 L 1034 218 L 1034 206"/>
    </g>
    <text x="788" y="240" font-size="11" font-weight="500" fill="#525252" text-anchor="middle" letter-spacing="0.08em">SUBSEQUENT LECTURES</text>

    <!-- Boxes (group: x, labelA, labelB, caption) -->
    <g fill="#f4f3ee" stroke="#c4c1b6" stroke-width="1.5">
      <rect x="20"  y="88" width="118" height="72" rx="6"/>
      <rect x="148" y="88" width="118" height="72" rx="6"/>
      <rect x="276" y="88" width="118" height="72" rx="6"/>
      <rect x="404" y="88" width="118" height="72" rx="6"/>
      <rect x="532" y="88" width="118" height="72" rx="6"/>
      <rect x="660" y="88" width="118" height="72" rx="6"/>
      <rect x="788" y="88" width="118" height="72" rx="6"/>
      <rect x="916" y="88" width="118" height="72" rx="6"/>
    </g>

    <!-- Main labels -->
    <g font-size="13" font-weight="500" fill="#0a0a0a" text-anchor="middle">
      <text x="79"   y="120">Biological</text>
      <text x="79"   y="136">sample</text>
      <text x="207"  y="120">Library</text>
      <text x="207"  y="136">prep</text>
      <text x="335"  y="128">Sequencer</text>
      <text x="463"  y="120">Raw reads</text>
      <text x="463"  y="136" font-family="JetBrains Mono, monospace" fill="#1e3a8a" font-size="12">(FASTQ)</text>
      <text x="591"  y="120">QC &amp;</text>
      <text x="591"  y="136">trimming</text>
      <text x="719"  y="120">Alignment /</text>
      <text x="719"  y="136">assembly</text>
      <text x="847"  y="120">Variant</text>
      <text x="847"  y="136">calling</text>
      <text x="975"  y="128">Interpretation</text>
    </g>

    <!-- Captions under boxes -->
    <g font-size="10" fill="#525252" text-anchor="middle">
      <text x="79"  y="180">cells / blood / tissue</text>
      <text x="207" y="180">fragment, adapters, PCR</text>
      <text x="335" y="180">Illumina / PacBio / ONT</text>
      <text x="463" y="180">per-base Phred</text>
      <text x="591" y="180">FastQC, fastp</text>
      <text x="719" y="180">BWA, minimap2</text>
      <text x="847" y="180">DeepVariant, GATK</text>
      <text x="975" y="180">clinical / research</text>
    </g>

    <!-- Flow arrows between boxes (y = 124, centered in box vertically) -->
    <g stroke="#1e3a8a" stroke-width="1.75" fill="none">
      <line x1="138" y1="124" x2="146" y2="124" marker-end="url(#arrow-accent)"/>
      <line x1="266" y1="124" x2="274" y2="124" marker-end="url(#arrow-accent)"/>
      <line x1="394" y1="124" x2="402" y2="124" marker-end="url(#arrow-accent)"/>
      <line x1="522" y1="124" x2="530" y2="124" marker-end="url(#arrow-accent)"/>
      <line x1="650" y1="124" x2="658" y2="124" marker-end="url(#arrow-accent)"/>
      <line x1="778" y1="124" x2="786" y2="124" marker-end="url(#arrow-accent)"/>
      <line x1="906" y1="124" x2="914" y2="124" marker-end="url(#arrow-accent)"/>
    </g>
  </g>
</svg>
