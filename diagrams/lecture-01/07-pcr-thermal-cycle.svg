<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" role="img" aria-labelledby="t d">
  <title id="t">PCR thermal cycle and exponential amplification</title>
  <desc id="d">Top: the three-step PCR cycle on a circle — denature at ~95 °C, anneal at 55–65 °C, extend at ~72 °C. Bottom left: temperature vs time for three cycles, a sawtooth between denature, anneal, and extend set-points. Bottom right: molecule count doubles each cycle, reaching about 10⁹ copies after ~30 cycles.</desc>

  <defs>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <!-- ═════ Top: cyclical 3-step diagram ═════ -->
  <!-- Compact arc ring (radius 52, stroke-width 12) with step groups
       placed well outside. Ring center (230, 170). Ring outer bound:
       x = 230 ± 58, y = 170 ± 58 → 172..288 horizontally, 112..228 vertically. -->

  <circle cx="230" cy="170" r="52" fill="none" stroke="#e5e3dc" stroke-width="16"/>

  <g fill="none" stroke-width="12">
    <path d="M 185 145 A 52 52 0 0 1 275 145" stroke="#1e3a8a" opacity="0.85"/>
    <path d="M 275 145 A 52 52 0 0 1 230 222" stroke="#2d7a3e" opacity="0.85"/>
    <path d="M 230 222 A 52 52 0 0 1 185 145" stroke="#b45309" opacity="0.85"/>
  </g>

  <!-- Cycle arrows just outside the ring -->
  <g fill="none" stroke="#1e3a8a" stroke-width="1.25">
    <path d="M 280 128 A 64 64 0 0 1 290 140" marker-end="url(#arrow-accent)"/>
    <path d="M 262 214 A 64 64 0 0 1 250 222" marker-end="url(#arrow-accent)"/>
    <path d="M 176 206 A 64 64 0 0 1 168 194" marker-end="url(#arrow-accent)"/>
  </g>

  <!-- Centre "REPEAT ~30×" -->
  <g transform="translate(230 170)">
    <circle cx="0" cy="0" r="22" fill="#fcfcfa" stroke="#1e3a8a" stroke-width="1"/>
    <text x="0" y="-3" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a" text-anchor="middle" font-weight="600" letter-spacing="0.06em">REPEAT</text>
    <text x="0" y="11" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a" text-anchor="middle">~30×</text>
  </g>

  <!-- Step 1: Denature — above the ring. Ring top at y=112, group sits above. -->
  <g transform="translate(230 48)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#1e3a8a" text-anchor="middle">1. Denature</text>
    <text x="0" y="16" font-family="Inter, sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle">~95 °C · strands separate</text>
    <line x1="-22" y1="34" x2="22" y2="34" stroke="#0a0a0a" stroke-width="1.75"/>
    <line x1="-22" y1="44" x2="22" y2="44" stroke="#0a0a0a" stroke-width="1.75"/>
  </g>

  <!-- Step 2: Anneal — right of the ring. Ring right edge x=288, group at x=330. -->
  <g transform="translate(330 162)">
    <text x="0" y="0"  font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#2d7a3e">2. Anneal</text>
    <text x="0" y="16" font-family="Inter, sans-serif" font-size="11" fill="#0a0a0a">55–65 °C</text>
    <text x="0" y="30" font-family="Inter, sans-serif" font-size="11" fill="#0a0a0a">primers bind</text>
    <g transform="translate(36 52)">
      <line x1="-22" y1="-4" x2="22" y2="-4" stroke="#0a0a0a" stroke-width="1.75"/>
      <line x1="-22" y1="4"  x2="22" y2="4"  stroke="#0a0a0a" stroke-width="1.75"/>
      <rect x="-22" y="-8" width="12" height="3" fill="#2d7a3e"/>
      <rect x="10"  y="5"  width="12" height="3" fill="#2d7a3e"/>
    </g>
  </g>

  <!-- Step 3: Extend — left of the ring. Ring left edge x=172, group text-anchor=end at x=130. -->
  <g transform="translate(130 162)">
    <text x="0" y="0"  font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#b45309" text-anchor="end">3. Extend</text>
    <text x="0" y="16" font-family="Inter, sans-serif" font-size="11" fill="#0a0a0a" text-anchor="end">~72 °C</text>
    <text x="0" y="30" font-family="Inter, sans-serif" font-size="11" fill="#0a0a0a" text-anchor="end">polymerase extends</text>
    <g transform="translate(-36 52)">
      <line x1="-22" y1="-4" x2="22" y2="-4" stroke="#0a0a0a" stroke-width="1.75"/>
      <line x1="-22" y1="4"  x2="22" y2="4"  stroke="#0a0a0a" stroke-width="1.75"/>
      <rect x="-22" y="-8" width="44" height="3" fill="#b45309"/>
      <rect x="-22" y="5"  width="44" height="3" fill="#b45309"/>
    </g>
  </g>

  <!-- Divider line between top and bottom -->
  <line x1="460" y1="20" x2="460" y2="320" stroke="#e5e3dc" stroke-width="1"/>

  <!-- ═════ Top-right: Ingredients / ingredients list could go here, but spec focuses on count ═════ -->

  <!-- ═════ Bottom-left: T vs t sawtooth (3 cycles) ═════ -->
  <g transform="translate(40 350)">
    <text x="0" y="-14" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">Temperature vs. time</text>
    <text x="0" y="-2" font-family="Inter, sans-serif" font-size="10" fill="#525252">Three cycles (typical profile)</text>

    <!-- axes -->
    <g stroke="#c4c1b6" stroke-width="1" fill="none">
      <line x1="30" y1="10" x2="30" y2="120"/>  <!-- y-axis -->
      <line x1="30" y1="120" x2="370" y2="120"/> <!-- x-axis -->
    </g>
    <!-- Y-axis labels: 95, 72, 60, 50 -->
    <g font-family="JetBrains Mono, monospace" font-size="10" fill="#8a8a85" text-anchor="end">
      <text x="24" y="14">95</text>
      <text x="24" y="45">72</text>
      <text x="24" y="73">60</text>
      <text x="24" y="122">°C</text>
    </g>
    <!-- horizontal set-point guides -->
    <g stroke="#e5e3dc" stroke-width="1" stroke-dasharray="2 3">
      <line x1="30" y1="10"  x2="370" y2="10"/>
      <line x1="30" y1="40"  x2="370" y2="40"/>
      <line x1="30" y1="70"  x2="370" y2="70"/>
    </g>

    <!-- Sawtooth path: cycle width 110, 3 cycles -->
    <!-- Each cycle: ramp up to 95 at start, plateau, drop to 60 (anneal), rise to 72 (extend), drop -->
    <path d="M 30 110
             L 40 10  L 80 10
             L 100 70 L 130 70
             L 140 40 L 170 40
             L 190 10 L 230 10
             L 250 70 L 280 70
             L 290 40 L 320 40
             L 340 10 L 355 10"
          stroke="#1e3a8a" stroke-width="1.75" fill="none"/>

    <!-- Phase labels under x-axis for cycle 1 -->
    <g font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">
      <text x="60" y="135">denature</text>
      <text x="115" y="135">anneal</text>
      <text x="155" y="135">extend</text>
    </g>
    <text x="200" y="150" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85" text-anchor="middle">→ time (one cycle ≈ 1–3 min)</text>
  </g>

  <!-- ═════ Bottom-right: doubling count ═════ -->
  <g transform="translate(490 350)">
    <text x="0" y="-14" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">Molecule count per cycle</text>
    <text x="0" y="-2" font-family="Inter, sans-serif" font-size="10" fill="#525252">Doubles each cycle → ~10⁹ after 30 cycles</text>

    <!-- Horizontal count bars with labels -->
    <g font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">
      <!-- Cycle, count, bar; log-scale bar visualisation -->
      <text x="0" y="16" fill="#525252">Cycle 0</text>
      <rect x="70" y="6" width="4" height="12" fill="#1e3a8a"/>
      <text x="82" y="16">1</text>

      <text x="0" y="36" fill="#525252">Cycle 1</text>
      <rect x="70" y="26" width="8" height="12" fill="#1e3a8a"/>
      <text x="88" y="36">2</text>

      <text x="0" y="56" fill="#525252">Cycle 5</text>
      <rect x="70" y="46" width="40" height="12" fill="#1e3a8a"/>
      <text x="118" y="56">32</text>

      <text x="0" y="76" fill="#525252">Cycle 10</text>
      <rect x="70" y="66" width="82" height="12" fill="#1e3a8a"/>
      <text x="160" y="76">1,024</text>

      <text x="0" y="96" fill="#525252">Cycle 20</text>
      <rect x="70" y="86" width="164" height="12" fill="#1e3a8a"/>
      <text x="242" y="96">≈ 10⁶</text>

      <text x="0" y="116" fill="#525252">Cycle 30</text>
      <rect x="70" y="106" width="246" height="12" fill="#1e3a8a"/>
      <text x="324" y="116">≈ 10⁹</text>
    </g>

    <text x="0" y="142" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">
      Bar lengths are proportional to log₁₀(copies).
    </text>
  </g>
</svg>
