<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 360" role="img" aria-labelledby="t d">
  <title id="t">Illumina cluster generation via bridge amplification</title>
  <desc id="d">Six panels showing the stages of bridge amplification on a flow cell. Panel 1: the surface carries two kinds of covalently attached oligonucleotides, complementary to the P5 and P7 adapters. Panel 2: a library fragment hybridizes by one end. Panel 3: polymerase extends using the surface oligo as a primer and the original template is washed away. Panel 4: the free end bends over and hybridizes to a nearby oligo of the complementary type, forming a bridge. Panel 5: extension of the bridge produces two covalently attached strands close together. Panel 6: after roughly 35 cycles, each original molecule has become a cluster of about a thousand identical copies on a ~1 micrometre spot.</desc>

  <defs>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <!-- Helpers inherited by each panel: panel_x, step_num, title, ill group -->

  <!-- ══════════ Panel 1 ══════════ -->
  <g transform="translate(15 30)">
    <rect x="0" y="0" width="152" height="290" fill="none" stroke="#e5e3dc" stroke-width="1" rx="4"/>
    <text x="12" y="18" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">STEP 1</text>
    <text x="12" y="38" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#0a0a0a">Surface + oligos</text>

    <!-- Flow-cell surface -->
    <rect x="10" y="200" width="132" height="14" fill="#c4c1b6"/>
    <!-- Alternating oligos: P5 (cobalt) and P7 (muted) -->
    <g>
      <line x1="20"  y1="200" x2="20"  y2="170" stroke="#1e3a8a" stroke-width="2"/>
      <line x1="38"  y1="200" x2="38"  y2="172" stroke="#525252" stroke-width="2"/>
      <line x1="56"  y1="200" x2="56"  y2="168" stroke="#1e3a8a" stroke-width="2"/>
      <line x1="74"  y1="200" x2="74"  y2="174" stroke="#525252" stroke-width="2"/>
      <line x1="92"  y1="200" x2="92"  y2="170" stroke="#1e3a8a" stroke-width="2"/>
      <line x1="110" y1="200" x2="110" y2="172" stroke="#525252" stroke-width="2"/>
      <line x1="128" y1="200" x2="128" y2="168" stroke="#1e3a8a" stroke-width="2"/>
    </g>

    <text x="76" y="234" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">billions of oligos</text>
    <text x="76" y="248" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">per flow cell</text>

    <!-- Legend inside panel -->
    <g font-family="Inter, sans-serif" font-size="10">
      <line x1="22" y1="274" x2="22" y2="262" stroke="#1e3a8a" stroke-width="2"/>
      <text x="30" y="273" fill="#1e3a8a" font-weight="600">P5</text>
      <line x1="78" y1="274" x2="78" y2="262" stroke="#525252" stroke-width="2"/>
      <text x="86" y="273" fill="#525252" font-weight="600">P7</text>
    </g>
  </g>

  <!-- ══════════ Panel 2 ══════════ -->
  <g transform="translate(180 30)">
    <rect x="0" y="0" width="152" height="290" fill="none" stroke="#e5e3dc" stroke-width="1" rx="4"/>
    <text x="12" y="18" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">STEP 2</text>
    <text x="12" y="38" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#0a0a0a">Seeding</text>

    <rect x="10" y="200" width="132" height="14" fill="#c4c1b6"/>
    <g>
      <line x1="20"  y1="200" x2="20"  y2="170" stroke="#1e3a8a" stroke-width="2"/>
      <line x1="38"  y1="200" x2="38"  y2="172" stroke="#525252" stroke-width="2"/>
      <line x1="56"  y1="200" x2="56"  y2="168" stroke="#1e3a8a" stroke-width="2"/>
      <line x1="74"  y1="200" x2="74"  y2="174" stroke="#525252" stroke-width="2"/>
      <line x1="92"  y1="200" x2="92"  y2="170" stroke="#1e3a8a" stroke-width="2"/>
      <line x1="110" y1="200" x2="110" y2="172" stroke="#525252" stroke-width="2"/>
      <line x1="128" y1="200" x2="128" y2="168" stroke="#1e3a8a" stroke-width="2"/>
    </g>

    <!-- Library fragment: cobalt-red strand hybridising to oligo at x=56 -->
    <g>
      <line x1="56" y1="170" x2="56" y2="108" stroke="#c4342c" stroke-width="2"/>
      <!-- kink to show hybridisation to P5 oligo at top -->
      <line x1="56" y1="108" x2="90" y2="108" stroke="#c4342c" stroke-width="2"/>
      <line x1="90" y1="108" x2="90" y2="130" stroke="#c4342c" stroke-width="2"/>
    </g>

    <text x="76" y="258" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">library fragment</text>
    <text x="76" y="272" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">hybridises by its</text>
    <text x="76" y="286" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">P5 end</text>
  </g>

  <!-- ══════════ Panel 3 ══════════ -->
  <g transform="translate(345 30)">
    <rect x="0" y="0" width="152" height="290" fill="none" stroke="#e5e3dc" stroke-width="1" rx="4"/>
    <text x="12" y="18" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">STEP 3</text>
    <text x="12" y="38" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#0a0a0a">First extension</text>

    <rect x="10" y="200" width="132" height="14" fill="#c4c1b6"/>
    <g>
      <line x1="20"  y1="200" x2="20"  y2="170" stroke="#1e3a8a" stroke-width="2"/>
      <line x1="38"  y1="200" x2="38"  y2="172" stroke="#525252" stroke-width="2"/>
      <line x1="56"  y1="200" x2="56"  y2="168" stroke="#1e3a8a" stroke-width="2"/>
      <line x1="74"  y1="200" x2="74"  y2="174" stroke="#525252" stroke-width="2"/>
      <line x1="92"  y1="200" x2="92"  y2="170" stroke="#1e3a8a" stroke-width="2"/>
      <line x1="110" y1="200" x2="110" y2="172" stroke="#525252" stroke-width="2"/>
      <line x1="128" y1="200" x2="128" y2="168" stroke="#1e3a8a" stroke-width="2"/>
    </g>

    <!-- Synthesized copy on P5 oligo (green) standing straight up -->
    <line x1="56" y1="200" x2="56" y2="108" stroke="#2d7a3e" stroke-width="2"/>
    <!-- Free 3' end droops -->
    <path d="M 56 108 Q 70 108 78 118" stroke="#2d7a3e" stroke-width="2" fill="none"/>

    <text x="76" y="258" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">polymerase extends</text>
    <text x="76" y="272" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">using the oligo as primer;</text>
    <text x="76" y="286" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">original template washed</text>
  </g>

  <!-- ══════════ Panel 4 ══════════ -->
  <g transform="translate(510 30)">
    <rect x="0" y="0" width="152" height="290" fill="none" stroke="#e5e3dc" stroke-width="1" rx="4"/>
    <text x="12" y="18" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">STEP 4</text>
    <text x="12" y="38" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#0a0a0a">Bridge</text>

    <rect x="10" y="200" width="132" height="14" fill="#c4c1b6"/>
    <g>
      <line x1="20"  y1="200" x2="20"  y2="170" stroke="#1e3a8a" stroke-width="2"/>
      <line x1="38"  y1="200" x2="38"  y2="172" stroke="#525252" stroke-width="2"/>
      <line x1="56"  y1="200" x2="56"  y2="168" stroke="#1e3a8a" stroke-width="2"/>
      <line x1="74"  y1="200" x2="74"  y2="174" stroke="#525252" stroke-width="2"/>
      <line x1="92"  y1="200" x2="92"  y2="170" stroke="#1e3a8a" stroke-width="2"/>
      <line x1="110" y1="200" x2="110" y2="172" stroke="#525252" stroke-width="2"/>
      <line x1="128" y1="200" x2="128" y2="168" stroke="#1e3a8a" stroke-width="2"/>
    </g>

    <!-- Arc bridging from P5 oligo at x=56 to P7 oligo at x=74 -->
    <path d="M 56 198 Q 65 94 74 198" stroke="#2d7a3e" stroke-width="2" fill="none"/>

    <text x="76" y="258" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">the free end bends over,</text>
    <text x="76" y="272" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">hybridises to a nearby</text>
    <text x="76" y="286" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">P7 oligo — forms a bridge</text>
  </g>

  <!-- ══════════ Panel 5 ══════════ -->
  <g transform="translate(675 30)">
    <rect x="0" y="0" width="152" height="290" fill="none" stroke="#e5e3dc" stroke-width="1" rx="4"/>
    <text x="12" y="18" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">STEP 5</text>
    <text x="12" y="38" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#0a0a0a">Bridge amp.</text>

    <rect x="10" y="200" width="132" height="14" fill="#c4c1b6"/>
    <g>
      <line x1="20"  y1="200" x2="20"  y2="170" stroke="#1e3a8a" stroke-width="2"/>
      <line x1="38"  y1="200" x2="38"  y2="172" stroke="#525252" stroke-width="2"/>
      <line x1="56"  y1="200" x2="56"  y2="168" stroke="#1e3a8a" stroke-width="2"/>
      <line x1="74"  y1="200" x2="74"  y2="174" stroke="#525252" stroke-width="2"/>
      <line x1="92"  y1="200" x2="92"  y2="170" stroke="#1e3a8a" stroke-width="2"/>
      <line x1="110" y1="200" x2="110" y2="172" stroke="#525252" stroke-width="2"/>
      <line x1="128" y1="200" x2="128" y2="168" stroke="#1e3a8a" stroke-width="2"/>
    </g>

    <!-- Two strands, now separated after denaturation / extension: one green (P5 attached), one red (P7 attached) -->
    <line x1="56" y1="200" x2="56" y2="116" stroke="#2d7a3e" stroke-width="2"/>
    <path d="M 56 116 Q 65 108 74 116" stroke="#2d7a3e" stroke-width="2" fill="none" opacity="0.55"/>

    <line x1="74" y1="200" x2="74" y2="116" stroke="#c4342c" stroke-width="2"/>
    <path d="M 74 116 Q 82 108 90 116" stroke="#c4342c" stroke-width="2" fill="none" opacity="0.55"/>

    <text x="76" y="258" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">extension + denature →</text>
    <text x="76" y="272" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">two surface-attached</text>
    <text x="76" y="286" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">copies, side by side</text>
  </g>

  <!-- ══════════ Panel 6 ══════════ -->
  <g transform="translate(840 30)">
    <rect x="0" y="0" width="125" height="290" fill="none" stroke="#e5e3dc" stroke-width="1" rx="4"/>
    <text x="12" y="18" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">STEP 6</text>
    <text x="12" y="38" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#0a0a0a">Cluster</text>

    <rect x="10" y="200" width="105" height="14" fill="#c4c1b6"/>
    <!-- Cluster blob -->
    <ellipse cx="62" cy="145" rx="40" ry="48" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1" opacity="0.9"/>
    <!-- Many tangled strand traces -->
    <g stroke-width="1" fill="none" opacity="0.75">
      <path d="M 42 200 L 42 130" stroke="#2d7a3e"/>
      <path d="M 46 200 L 46 126" stroke="#c4342c"/>
      <path d="M 50 200 L 50 140" stroke="#2d7a3e"/>
      <path d="M 54 200 L 54 118" stroke="#c4342c"/>
      <path d="M 58 200 L 58 132" stroke="#2d7a3e"/>
      <path d="M 62 200 L 62 124" stroke="#c4342c"/>
      <path d="M 66 200 L 66 138" stroke="#2d7a3e"/>
      <path d="M 70 200 L 70 122" stroke="#c4342c"/>
      <path d="M 74 200 L 74 134" stroke="#2d7a3e"/>
      <path d="M 78 200 L 78 128" stroke="#c4342c"/>
      <path d="M 82 200 L 82 142" stroke="#2d7a3e"/>
    </g>

    <text x="62" y="258" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">~35 cycles later</text>
    <text x="62" y="272" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">~1,000 identical copies</text>
    <text x="62" y="286" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">on a ~1 µm spot</text>
  </g>

  <!-- Flow arrows between panels -->
  <g stroke="#1e3a8a" stroke-width="1" fill="none">
    <line x1="168" y1="175" x2="178" y2="175" marker-end="url(#arrow-accent)"/>
    <line x1="333" y1="175" x2="343" y2="175" marker-end="url(#arrow-accent)"/>
    <line x1="498" y1="175" x2="508" y2="175" marker-end="url(#arrow-accent)"/>
    <line x1="663" y1="175" x2="673" y2="175" marker-end="url(#arrow-accent)"/>
    <line x1="828" y1="175" x2="838" y2="175" marker-end="url(#arrow-accent)"/>
  </g>
</svg>
