<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 200" role="img" aria-labelledby="t d">
  <title id="t">Adapter-flanked Illumina library fragment</title>
  <desc id="d">A horizontal pill showing a sequencing-ready library fragment. From 5' to 3': P5 adapter, i5 index, Read 1 primer site, insert (the genomic fragment), Read 2 primer site, i7 index, P7 adapter. Two small arrows indicate where the Read 1 and Read 2 sequencing primers begin extending.</desc>

  <defs>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>

    <clipPath id="pill-clip">
      <rect x="40" y="60" width="900" height="60" rx="30"/>
    </clipPath>
  </defs>

  <!-- 5' / 3' labels -->
  <g font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#525252">
    <text x="26" y="94" text-anchor="end">5'</text>
    <text x="954" y="94">3'</text>
  </g>

  <!-- Segment fills, clipped by the pill -->
  <g clip-path="url(#pill-clip)">
    <rect x="40"  y="60" width="80"  height="60" fill="#dbe3f5"/>
    <rect x="120" y="60" width="70"  height="60" fill="#e8dcc0"/>
    <rect x="190" y="60" width="110" height="60" fill="#d1e5d9"/>
    <rect x="300" y="60" width="340" height="60" fill="#f4f3ee"/>
    <rect x="640" y="60" width="110" height="60" fill="#d1e5d9"/>
    <rect x="750" y="60" width="70"  height="60" fill="#e8dcc0"/>
    <rect x="820" y="60" width="80"  height="60" fill="#dbe3f5"/>
  </g>

  <!-- Segment dividers -->
  <g stroke="#c4c1b6" stroke-width="1" fill="none">
    <line x1="120" y1="60" x2="120" y2="120"/>
    <line x1="190" y1="60" x2="190" y2="120"/>
    <line x1="300" y1="60" x2="300" y2="120"/>
    <line x1="640" y1="60" x2="640" y2="120"/>
    <line x1="750" y1="60" x2="750" y2="120"/>
    <line x1="820" y1="60" x2="820" y2="120"/>
  </g>

  <!-- Pill outline on top -->
  <rect x="40" y="60" width="900" height="60" rx="30" fill="none" stroke="#c4c1b6" stroke-width="1.5"/>

  <!-- INSERT label (inside the insert region) -->
  <text x="470" y="95" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#525252" text-anchor="middle" letter-spacing="0.12em">INSERT</text>
  <text x="470" y="111" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85" text-anchor="middle">the genomic fragment</text>

  <!-- Segment labels below -->
  <g font-family="Inter, sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle">
    <text x="80"  y="144">P5 adapter</text>
    <text x="155" y="144">i5 index</text>
    <text x="245" y="144">Read 1 primer</text>
    <text x="695" y="144">Read 2 primer</text>
    <text x="785" y="144">i7 index</text>
    <text x="860" y="144">P7 adapter</text>
  </g>

  <!-- Sub-captions -->
  <g font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">
    <text x="80"  y="158">binds flow cell</text>
    <text x="155" y="158">sample barcode</text>
    <text x="245" y="158">primes Read 1</text>
    <text x="695" y="158">primes Read 2</text>
    <text x="785" y="158">sample barcode</text>
    <text x="860" y="158">binds flow cell</text>
  </g>

  <!-- Primer-extension arrows into the insert -->
  <g stroke="#1e3a8a" stroke-width="1.5" fill="none">
    <path d="M 300 42 L 365 42" marker-end="url(#arrow-accent)"/>
    <path d="M 640 138 L 575 138" marker-end="url(#arrow-accent)"/>
  </g>
  <g font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">
    <text x="300" y="34">Read 1 extends →</text>
    <text x="640" y="180" text-anchor="end">← Read 2 extends</text>
  </g>
</svg>
