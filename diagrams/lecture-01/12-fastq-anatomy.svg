<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" role="img" aria-labelledby="title desc">
  <title id="title">FASTQ record anatomy</title>
  <desc id="desc">A four-line FASTQ record with each line annotated, showing the header, sequence, separator, and quality string with Phred score decoding.</desc>

  <defs>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>

  <rect x="60" y="60" width="740" height="172" rx="6" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1.5"/>

  <text x="46" y="92"  font-family="Inter, sans-serif" font-size="11" fill="#8a8a85" text-anchor="end">1</text>
  <text x="46" y="128" font-family="Inter, sans-serif" font-size="11" fill="#8a8a85" text-anchor="end">2</text>
  <text x="46" y="164" font-family="Inter, sans-serif" font-size="11" fill="#8a8a85" text-anchor="end">3</text>
  <text x="46" y="200" font-family="Inter, sans-serif" font-size="11" fill="#8a8a85" text-anchor="end">4</text>

  <text x="76" y="92" font-family="JetBrains Mono, monospace" font-size="14" fill="#0a0a0a">
    <tspan font-weight="600" fill="#1e3a8a">@</tspan><tspan>HWI-D00360:5:H814YADXX:1:1101:1230:2106</tspan><tspan fill="#525252"> 1:N:0:ACAGTG</tspan>
  </text>

  <g font-family="JetBrains Mono, monospace" font-size="14" font-weight="500">
    <text x="76" y="128">
      <tspan fill="#b45309">G</tspan><tspan fill="#c4342c">A</tspan><tspan fill="#0d7377">T</tspan><tspan fill="#2d7a3e">C</tspan><tspan fill="#2d7a3e">C</tspan><tspan fill="#0d7377">T</tspan><tspan fill="#c4342c">A</tspan><tspan fill="#2d7a3e">C</tspan><tspan fill="#0d7377">T</tspan><tspan fill="#b45309">G</tspan><tspan fill="#c4342c">A</tspan><tspan fill="#c4342c">A</tspan><tspan fill="#2d7a3e">C</tspan><tspan fill="#b45309">G</tspan><tspan fill="#c4342c">A</tspan><tspan fill="#0d7377">T</tspan><tspan fill="#2d7a3e">C</tspan><tspan fill="#c4342c">A</tspan><tspan fill="#2d7a3e">C</tspan><tspan fill="#b45309">G</tspan><tspan fill="#c4342c">A</tspan><tspan fill="#2d7a3e">C</tspan><tspan fill="#0d7377">T</tspan><tspan fill="#c4342c">A</tspan><tspan fill="#b45309">G</tspan><tspan fill="#2d7a3e">C</tspan><tspan fill="#c4342c">A</tspan>
    </text>
  </g>

  <text x="76" y="164" font-family="JetBrains Mono, monospace" font-size="14" fill="#1e3a8a" font-weight="600">+</text>
  <text x="76" y="200" font-family="JetBrains Mono, monospace" font-size="14" fill="#0a0a0a">BBBFFFFFFFFFFFIIIIIIFFFFFFF</text>

  <line x1="560" y1="92" x2="660" y2="92" stroke="#1e3a8a" stroke-width="1.5" marker-start="url(#arrow-accent)"/>
  <text x="668" y="86" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">Header line</text>
  <text x="668" y="102" font-family="Inter, sans-serif" font-size="11" fill="#525252">Starts with @, read ID + optional description</text>

  <line x1="560" y1="128" x2="660" y2="128" stroke="#1e3a8a" stroke-width="1.5" marker-start="url(#arrow-accent)"/>
  <text x="668" y="122" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">Sequence</text>
  <text x="668" y="138" font-family="Inter, sans-serif" font-size="11" fill="#525252">A / C / G / T / N, length = L</text>

  <line x1="560" y1="164" x2="660" y2="164" stroke="#1e3a8a" stroke-width="1.5" marker-start="url(#arrow-accent)"/>
  <text x="668" y="158" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">Separator</text>
  <text x="668" y="174" font-family="Inter, sans-serif" font-size="11" fill="#525252">Just a + (occasionally repeats the ID)</text>

  <line x1="560" y1="200" x2="660" y2="200" stroke="#1e3a8a" stroke-width="1.5" marker-start="url(#arrow-accent)"/>
  <text x="668" y="194" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">Quality string</text>
  <text x="668" y="210" font-family="Inter, sans-serif" font-size="11" fill="#525252">One ASCII char per base, length = L</text>

  <g stroke="#525252" stroke-width="1" fill="none">
    <path d="M 76 240 L 76 248 L 334 248 L 334 240"/>
  </g>

  <g transform="translate(60, 270)">
    <rect x="0" y="0" width="740" height="130" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
    <text x="16" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">ZOOM — POSITION 14</text>

    <text x="32" y="72" font-family="JetBrains Mono, monospace" font-size="34" font-weight="500" fill="#b45309">G</text>
    <text x="32" y="114" font-family="JetBrains Mono, monospace" font-size="34" font-weight="500" fill="#0a0a0a">I</text>

    <line x1="96" y1="40" x2="96" y2="120" stroke="#c4c1b6" stroke-width="1"/>

    <g font-family="Inter, sans-serif" font-size="12" fill="#0a0a0a">
      <text x="116" y="58" font-weight="600">ASCII char</text>
      <text x="210" y="58" font-family="JetBrains Mono, monospace">'I'</text>

      <text x="116" y="78" font-weight="600">ASCII value</text>
      <text x="210" y="78" font-family="JetBrains Mono, monospace">73</text>

      <text x="116" y="98" font-weight="600">Phred score</text>
      <text x="210" y="98" font-family="JetBrains Mono, monospace">Q = 73 − 33 = 40</text>

      <text x="116" y="118" font-weight="600">P(error)</text>
      <text x="210" y="118" font-family="JetBrains Mono, monospace">10</text>
      <text x="226" y="112" font-family="JetBrains Mono, monospace" font-size="9">−Q/10</text>
      <text x="254" y="118" font-family="JetBrains Mono, monospace">= 10</text>
      <text x="282" y="112" font-family="JetBrains Mono, monospace" font-size="9">−4</text>
      <text x="298" y="118" font-family="JetBrains Mono, monospace" fill="#525252">= 0.0001  (1 in 10,000)</text>
    </g>

    <g transform="translate(500, 26)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">PHRED+33 ENCODING</text>
      <text x="0" y="24" font-family="JetBrains Mono, monospace" font-size="13" fill="#0a0a0a">Q = ord(char) − 33</text>
      <text x="0" y="46" font-family="JetBrains Mono, monospace" font-size="13" fill="#0a0a0a">P = 10</text>
      <text x="44" y="40" font-family="JetBrains Mono, monospace" font-size="10">−Q/10</text>
      <text x="0" y="76" font-family="Inter, sans-serif" font-size="11" fill="#525252" font-style="italic">Q30 ≈ 30 dB of confidence</text>
      <text x="0" y="92" font-family="Inter, sans-serif" font-size="11" fill="#525252" font-style="italic">Q40 ≈ 99.99% accurate</text>
    </g>
  </g>
</svg>
