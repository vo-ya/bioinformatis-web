<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" role="img" aria-labelledby="t d">
  <title id="t">Alignment problem overview</title>
  <desc id="d">A long horizontal reference genome strand with a scatter of short reads placed above it at their aligned positions. One read is annotated as an exact match, one as having a single mismatch, and one as carrying a 2 bp insertion.</desc>

  <defs>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>

  <!-- Top kicker -->
  <text x="40" y="34" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8a8a85" letter-spacing="0.12em">
    REFERENCE · ~3 × 10⁹ bp
  </text>

  <!-- Reference bar -->
  <rect x="40" y="220" width="780" height="28" rx="3" fill="#f4f3ee" stroke="#0a0a0a" stroke-width="2.5"/>

  <!-- Coordinate labels on ref -->
  <g font-family="JetBrains Mono, monospace" font-size="10" fill="#8a8a85">
    <text x="40" y="268">0</text>
    <text x="820" y="268" text-anchor="end">~3 Gb</text>
  </g>

  <!-- Short reads scattered above the reference (at their aligned positions) -->
  <!-- Each read is a short thin accent-coloured bar with a dashed leader down to the reference. -->
  <g>
    <!-- Read 1: exact match, at ref x≈120 -->
    <rect x="92" y="120" width="50" height="10" rx="2" fill="none" stroke="#1e3a8a" stroke-width="1.5"/>
    <line x1="117" y1="130" x2="117" y2="220" stroke="#525252" stroke-width="0.75" stroke-dasharray="3 3"/>
    <text x="117" y="108" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" font-weight="500" text-anchor="middle">exact match</text>

    <!-- Read 2 -->
    <rect x="170" y="150" width="48" height="10" rx="2" fill="none" stroke="#1e3a8a" stroke-width="1.5"/>
    <line x1="194" y1="160" x2="194" y2="220" stroke="#525252" stroke-width="0.5" stroke-dasharray="3 3"/>

    <!-- Read 3: 1 mismatch -->
    <rect x="238" y="110" width="54" height="10" rx="2" fill="none" stroke="#1e3a8a" stroke-width="1.5"/>
    <line x1="265" y1="120" x2="265" y2="220" stroke="#525252" stroke-width="0.75" stroke-dasharray="3 3"/>
    <!-- mismatch tick inside the read -->
    <rect x="258" y="110" width="4" height="10" fill="#b91c1c"/>
    <text x="265" y="98" font-family="Inter, sans-serif" font-size="10" fill="#b91c1c" font-weight="500" text-anchor="middle">1 mismatch</text>

    <!-- Read 4 -->
    <rect x="320" y="150" width="46" height="10" rx="2" fill="none" stroke="#1e3a8a" stroke-width="1.5"/>
    <line x1="343" y1="160" x2="343" y2="220" stroke="#525252" stroke-width="0.5" stroke-dasharray="3 3"/>

    <!-- Read 5: 2bp insertion (shown with a small notch + label) -->
    <g>
      <rect x="380" y="120" width="24" height="10" rx="2" fill="none" stroke="#1e3a8a" stroke-width="1.5"/>
      <rect x="408" y="120" width="24" height="10" rx="2" fill="none" stroke="#1e3a8a" stroke-width="1.5"/>
      <!-- gap notch between the two halves -->
      <path d="M 404 124 L 406 120 L 408 124 L 408 126 L 406 130 L 404 126 Z" fill="#b91c1c" stroke="none"/>
      <line x1="406" y1="130" x2="406" y2="220" stroke="#525252" stroke-width="0.75" stroke-dasharray="3 3"/>
      <text x="406" y="108" font-family="Inter, sans-serif" font-size="10" fill="#b91c1c" font-weight="500" text-anchor="middle">2 bp insertion</text>
    </g>

    <!-- Read 6 -->
    <rect x="470" y="160" width="44" height="10" rx="2" fill="none" stroke="#1e3a8a" stroke-width="1.5"/>
    <line x1="492" y1="170" x2="492" y2="220" stroke="#525252" stroke-width="0.5" stroke-dasharray="3 3"/>

    <!-- Read 7 -->
    <rect x="540" y="140" width="52" height="10" rx="2" fill="none" stroke="#1e3a8a" stroke-width="1.5"/>
    <line x1="566" y1="150" x2="566" y2="220" stroke="#525252" stroke-width="0.5" stroke-dasharray="3 3"/>

    <!-- Read 8 -->
    <rect x="620" y="120" width="48" height="10" rx="2" fill="none" stroke="#1e3a8a" stroke-width="1.5"/>
    <line x1="644" y1="130" x2="644" y2="220" stroke="#525252" stroke-width="0.5" stroke-dasharray="3 3"/>

    <!-- Read 9 -->
    <rect x="690" y="150" width="50" height="10" rx="2" fill="none" stroke="#1e3a8a" stroke-width="1.5"/>
    <line x1="715" y1="160" x2="715" y2="220" stroke="#525252" stroke-width="0.5" stroke-dasharray="3 3"/>

    <!-- Read 10 -->
    <rect x="760" y="130" width="46" height="10" rx="2" fill="none" stroke="#1e3a8a" stroke-width="1.5"/>
    <line x1="783" y1="140" x2="783" y2="220" stroke="#525252" stroke-width="0.5" stroke-dasharray="3 3"/>
  </g>

  <!-- Length bracket on a representative read (~150 bp label) -->
  <g>
    <path d="M 170 178 L 170 186 L 218 186 L 218 178" stroke="#525252" stroke-width="1" fill="none"/>
    <text x="194" y="200" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">~150 bp</text>
  </g>

  <!-- Below reference: SCALE kicker -->
  <text x="430" y="304" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8a8a85" letter-spacing="0.12em" text-anchor="middle">
    SCALE · ~10⁹ READS PER RUN
  </text>
  <text x="430" y="324" font-family="Inter, sans-serif" font-size="11" fill="#525252" text-anchor="middle">
    Each read ~150 bp · roughly 1 error per 100–1000 bases · 1 in 1000 real biological variation
  </text>
</svg>
