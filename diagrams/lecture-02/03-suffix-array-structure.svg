<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" role="img" aria-labelledby="t d">
  <title id="t">Suffix array structure</title>
  <desc id="d">The string BANANA$ with its character indices labeled, beside a table listing the seven suffixes in lexicographic order. The rows whose suffixes start with ANA are highlighted with a soft cobalt band, showing that the search for ANA reduces to a contiguous range in the sorted list.</desc>

  <!-- Panel titles -->
  <g font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8a8a85" letter-spacing="0.12em">
    <text x="40" y="34">INPUT STRING</text>
    <text x="320" y="34">SUFFIX ARRAY — SORTED</text>
  </g>

  <!-- Vertical divider -->
  <line x1="300" y1="40" x2="300" y2="440" stroke="#e5e3dc" stroke-width="1"/>

  <!-- ─── Left panel: BANANA$ with indices ─── -->
  <g transform="translate(40 90)">
    <!-- index row -->
    <g font-family="JetBrains Mono, monospace" font-size="11" fill="#8a8a85" text-anchor="middle">
      <text x="0"   y="0">0</text>
      <text x="24"  y="0">1</text>
      <text x="48"  y="0">2</text>
      <text x="72"  y="0">3</text>
      <text x="96"  y="0">4</text>
      <text x="120" y="0">5</text>
      <text x="144" y="0">6</text>
    </g>
    <!-- characters -->
    <g font-family="JetBrains Mono, monospace" font-size="18" font-weight="500" fill="#0a0a0a" text-anchor="middle">
      <text x="0"   y="30">B</text>
      <text x="24"  y="30">A</text>
      <text x="48"  y="30">N</text>
      <text x="72"  y="30">A</text>
      <text x="96"  y="30">N</text>
      <text x="120" y="30">A</text>
      <text x="144" y="30" fill="#8a8a85">$</text>
    </g>

    <!-- Caption -->
    <text x="0"   y="78" font-family="Inter, sans-serif" font-size="11" fill="#525252">Seven suffixes, one starting at</text>
    <text x="0"   y="94" font-family="Inter, sans-serif" font-size="11" fill="#525252">each position. Sort them and</text>
    <text x="0"   y="110" font-family="Inter, sans-serif" font-size="11" fill="#525252">the common-prefix property</text>
    <text x="0"   y="126" font-family="Inter, sans-serif" font-size="11" fill="#525252">makes binary search work.</text>

    <!-- Arrow to right panel -->
    <g stroke="#1e3a8a" stroke-width="1.25" fill="none">
      <line x1="0" y1="170" x2="120" y2="170" marker-end="url(#arrow-accent)"/>
    </g>
    <text x="0"   y="186" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" font-weight="600" letter-spacing="0.08em">SORT LEXICOGRAPHICALLY</text>
  </g>

  <defs>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <!-- ─── Right panel: suffix array table ─── -->
  <g transform="translate(340 70)">
    <!-- Column headers -->
    <g font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#8a8a85" letter-spacing="0.08em">
      <text x="0"   y="0">I</text>
      <text x="40"  y="0">SA[I]</text>
      <text x="100" y="0">SUFFIX</text>
    </g>
    <!-- Header rule -->
    <line x1="-8" y1="10" x2="348" y2="10" stroke="#c4c1b6" stroke-width="1"/>

    <!-- Highlighted accent band behind rows 2 and 3 (query ANA → range [2,3]) -->
    <rect x="-8" y="88" width="316" height="64" fill="#eef2ff"/>

    <!-- Rows -->
    <g font-family="JetBrains Mono, monospace" font-size="14" fill="#0a0a0a">
      <text x="0"   y="38">0</text>
      <text x="40"  y="38">6</text>
      <text x="100" y="38"><tspan fill="#8a8a85">$</tspan></text>

      <text x="0"   y="68">1</text>
      <text x="40"  y="68">5</text>
      <text x="100" y="68">A<tspan fill="#8a8a85">$</tspan></text>

      <text x="0"   y="108">2</text>
      <text x="40"  y="108">3</text>
      <text x="100" y="108">ANA<tspan fill="#8a8a85">$</tspan></text>

      <text x="0"   y="138">3</text>
      <text x="40"  y="138">1</text>
      <text x="100" y="138">ANANA<tspan fill="#8a8a85">$</tspan></text>

      <text x="0"   y="168">4</text>
      <text x="40"  y="168">0</text>
      <text x="100" y="168">BANANA<tspan fill="#8a8a85">$</tspan></text>

      <text x="0"   y="198">5</text>
      <text x="40"  y="198">4</text>
      <text x="100" y="198">NA<tspan fill="#8a8a85">$</tspan></text>

      <text x="0"   y="228">6</text>
      <text x="40"  y="228">2</text>
      <text x="100" y="228">NANA<tspan fill="#8a8a85">$</tspan></text>
    </g>

    <!-- Horizontal rules -->
    <g stroke="#e5e3dc" stroke-width="1">
      <line x1="-8" y1="50"  x2="348" y2="50"/>
      <line x1="-8" y1="80"  x2="348" y2="80"/>
      <line x1="-8" y1="120" x2="348" y2="120"/>
      <line x1="-8" y1="150" x2="348" y2="150"/>
      <line x1="-8" y1="180" x2="348" y2="180"/>
      <line x1="-8" y1="210" x2="348" y2="210"/>
      <line x1="-8" y1="240" x2="348" y2="240"/>
    </g>

    <!-- Bracket on the right side for the highlighted range -->
    <g stroke="#1e3a8a" stroke-width="2" fill="none">
      <path d="M 286 88 L 300 88 L 300 152 L 286 152"/>
    </g>
    <text x="308" y="112" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">query</text>
    <text x="308" y="128" font-family="JetBrains Mono, monospace" font-size="12" fill="#1e3a8a">ANA</text>
    <text x="308" y="144" font-family="Inter, sans-serif" font-size="10" fill="#525252">→ range [2, 3]</text>
  </g>
</svg>
