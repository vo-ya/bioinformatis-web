<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" role="img" aria-labelledby="t d">
  <title id="t">Hash k-mer index</title>
  <desc id="d">A short reference string ACGTACGTAC with a sliding k=3 window, feeding a hash table with 4 to the k buckets. A few buckets hold short chains of positions where that k-mer occurs in the reference.</desc>

  <defs>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <!-- ─── Left panel: reference with sliding window ─── -->
  <text x="40" y="34" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8a8a85" letter-spacing="0.12em">
    REFERENCE · k = 3
  </text>

  <g transform="translate(40 100)">
    <!-- index row -->
    <g font-family="JetBrains Mono, monospace" font-size="10" fill="#8a8a85" text-anchor="middle">
      <text x="0"   y="0">0</text>
      <text x="20"  y="0">1</text>
      <text x="40"  y="0">2</text>
      <text x="60"  y="0">3</text>
      <text x="80"  y="0">4</text>
      <text x="100" y="0">5</text>
      <text x="120" y="0">6</text>
      <text x="140" y="0">7</text>
      <text x="160" y="0">8</text>
      <text x="180" y="0">9</text>
    </g>
    <!-- characters -->
    <g font-family="JetBrains Mono, monospace" font-size="16" font-weight="500" text-anchor="middle">
      <text x="0"   y="26" fill="#0a0a0a">A</text>
      <text x="20"  y="26" fill="#0a0a0a">C</text>
      <text x="40"  y="26" fill="#0a0a0a">G</text>
      <text x="60"  y="26" fill="#0a0a0a">T</text>
      <text x="80"  y="26" fill="#0a0a0a">A</text>
      <text x="100" y="26" fill="#0a0a0a">C</text>
      <text x="120" y="26" fill="#0a0a0a">G</text>
      <text x="140" y="26" fill="#0a0a0a">T</text>
      <text x="160" y="26" fill="#0a0a0a">A</text>
      <text x="180" y="26" fill="#0a0a0a">C</text>
    </g>

    <!-- Sliding window highlight at position 0 (first 3 chars) -->
    <rect x="-10" y="6" width="60" height="30" fill="none" stroke="#1e3a8a" stroke-width="2" rx="3"/>
    <text x="20" y="58" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" font-weight="600" text-anchor="middle">ACG</text>
    <text x="20" y="72" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">position 0</text>

    <!-- Dashed sliding arrows showing window moves right -->
    <g stroke="#8a8a85" stroke-width="1" fill="none" stroke-dasharray="3 3">
      <path d="M 50 90 L 70 90"/>
    </g>
    <text x="60" y="104" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" text-anchor="middle">slide +1</text>

    <!-- Arrow from reference to hash table -->
    <g stroke="#1e3a8a" stroke-width="1.25" fill="none">
      <line x1="200" y1="20" x2="330" y2="20" marker-end="url(#arrow-accent)"/>
    </g>
    <text x="265" y="14" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" font-weight="600" letter-spacing="0.08em" text-anchor="middle">HASH</text>
  </g>

  <!-- ─── Right panel: hash table ─── -->
  <text x="500" y="34" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8a8a85" letter-spacing="0.12em">
    HASH TABLE · 4ᵏ BUCKETS
  </text>

  <g transform="translate(500 66)">
    <!-- buckets (uniform rectangles with 3-mer labels) -->
    <g font-family="JetBrains Mono, monospace" font-size="12" fill="#0a0a0a">
      <g>
        <rect x="0" y="0" width="60" height="22" fill="none" stroke="#e5e3dc" stroke-width="1"/>
        <text x="30" y="15" text-anchor="middle" fill="#8a8a85">AAA</text>
        <text x="70" y="16" fill="#8a8a85" font-size="11">[]</text>
      </g>
      <g>
        <rect x="0" y="24" width="60" height="22" fill="none" stroke="#e5e3dc" stroke-width="1"/>
        <text x="30" y="39" text-anchor="middle" fill="#8a8a85">AAC</text>
        <text x="70" y="40" fill="#8a8a85" font-size="11">[]</text>
      </g>
      <!-- Ellipsis -->
      <g>
        <rect x="0" y="48" width="60" height="22" fill="none" stroke="#e5e3dc" stroke-width="1"/>
        <text x="30" y="63" text-anchor="middle" fill="#8a8a85">···</text>
      </g>

      <!-- ACG: populated -->
      <g>
        <rect x="0" y="72" width="60" height="22" fill="none" stroke="#1e3a8a" stroke-width="1.5"/>
        <text x="30" y="87" text-anchor="middle" font-weight="600">ACG</text>
        <line x1="60" y1="83" x2="92" y2="83" stroke="#0a0a0a" stroke-width="1.5"/>
        <circle cx="98" cy="83" r="3" fill="#0a0a0a"/>
        <text x="108" y="87">0</text>
        <line x1="124" y1="83" x2="148" y2="83" stroke="#0a0a0a" stroke-width="1.5"/>
        <circle cx="152" cy="83" r="3" fill="#0a0a0a"/>
        <text x="162" y="87">4</text>
      </g>

      <!-- CGT: populated -->
      <g>
        <rect x="0" y="96" width="60" height="22" fill="none" stroke="#1e3a8a" stroke-width="1.5"/>
        <text x="30" y="111" text-anchor="middle" font-weight="600">CGT</text>
        <line x1="60" y1="107" x2="92" y2="107" stroke="#0a0a0a" stroke-width="1.5"/>
        <circle cx="98" cy="107" r="3" fill="#0a0a0a"/>
        <text x="108" y="111">1</text>
        <line x1="124" y1="107" x2="148" y2="107" stroke="#0a0a0a" stroke-width="1.5"/>
        <circle cx="152" cy="107" r="3" fill="#0a0a0a"/>
        <text x="162" y="111">5</text>
      </g>

      <!-- GTA: populated -->
      <g>
        <rect x="0" y="120" width="60" height="22" fill="none" stroke="#1e3a8a" stroke-width="1.5"/>
        <text x="30" y="135" text-anchor="middle" font-weight="600">GTA</text>
        <line x1="60" y1="131" x2="92" y2="131" stroke="#0a0a0a" stroke-width="1.5"/>
        <circle cx="98" cy="131" r="3" fill="#0a0a0a"/>
        <text x="108" y="135">2</text>
        <line x1="124" y1="131" x2="148" y2="131" stroke="#0a0a0a" stroke-width="1.5"/>
        <circle cx="152" cy="131" r="3" fill="#0a0a0a"/>
        <text x="162" y="135">6</text>
      </g>

      <!-- TAC: populated -->
      <g>
        <rect x="0" y="144" width="60" height="22" fill="none" stroke="#1e3a8a" stroke-width="1.5"/>
        <text x="30" y="159" text-anchor="middle" font-weight="600">TAC</text>
        <line x1="60" y1="155" x2="92" y2="155" stroke="#0a0a0a" stroke-width="1.5"/>
        <circle cx="98" cy="155" r="3" fill="#0a0a0a"/>
        <text x="108" y="159">3</text>
        <line x1="124" y1="155" x2="148" y2="155" stroke="#0a0a0a" stroke-width="1.5"/>
        <circle cx="152" cy="155" r="3" fill="#0a0a0a"/>
        <text x="162" y="159">7</text>
      </g>

      <!-- Ellipsis -->
      <g>
        <rect x="0" y="168" width="60" height="22" fill="none" stroke="#e5e3dc" stroke-width="1"/>
        <text x="30" y="183" text-anchor="middle" fill="#8a8a85">···</text>
      </g>

      <!-- TTT: empty -->
      <g>
        <rect x="0" y="192" width="60" height="22" fill="none" stroke="#e5e3dc" stroke-width="1"/>
        <text x="30" y="207" text-anchor="middle" fill="#8a8a85">TTT</text>
        <text x="70" y="208" fill="#8a8a85" font-size="11">[]</text>
      </g>
    </g>

    <!-- Caption under buckets -->
    <text x="0" y="240" font-family="Inter, sans-serif" font-size="10" fill="#525252">|R| total positions across all chains.</text>
    <text x="0" y="256" font-family="Inter, sans-serif" font-size="10" fill="#525252">Most buckets are empty when 4ᵏ &gt;&gt; distinct k-mers actually present.</text>
  </g>
</svg>
