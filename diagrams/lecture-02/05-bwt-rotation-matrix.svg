<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="t d">
  <title id="t">BWT rotation matrix</title>
  <desc id="d">Construction of the Burrows-Wheeler Transform of ACAACG$. Seven unsorted cyclic rotations are sorted lexicographically; the last column (L) of the sorted matrix is the BWT. F and L columns are labeled with accent-coloured kickers.</desc>

  <defs>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <!-- Top kicker -->
  <text x="360" y="30" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8a8a85" letter-spacing="0.12em" text-anchor="middle">
    BWT OF "ACAACG$"
  </text>

  <!-- Unsorted rotations -->
  <text x="140" y="62" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#525252" letter-spacing="0.1em">
    UNSORTED ROTATIONS
  </text>

  <g font-family="JetBrains Mono, monospace" font-size="16" fill="#0a0a0a" letter-spacing="0.08em">
    <text x="140" y="92">ACAACG<tspan fill="#8a8a85">$</tspan></text>
    <text x="140" y="114">CAACG<tspan fill="#8a8a85">$</tspan>A</text>
    <text x="140" y="136">AACG<tspan fill="#8a8a85">$</tspan>AC</text>
    <text x="140" y="158">ACG<tspan fill="#8a8a85">$</tspan>ACA</text>
    <text x="140" y="180">CG<tspan fill="#8a8a85">$</tspan>ACAA</text>
    <text x="140" y="202">G<tspan fill="#8a8a85">$</tspan>ACAAC</text>
    <text x="140" y="224"><tspan fill="#8a8a85">$</tspan>ACAACG</text>
  </g>

  <!-- Arrow: lex sort -->
  <g stroke="#1e3a8a" stroke-width="1.5" fill="none">
    <line x1="360" y1="252" x2="360" y2="280" marker-end="url(#arrow-accent)"/>
  </g>
  <text x="360" y="272" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.1em" text-anchor="middle">LEX. SORT</text>

  <!-- Sorted rotations -->
  <text x="140" y="310" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#525252" letter-spacing="0.1em">
    SORTED ROTATIONS
  </text>

  <!-- F and L column labels -->
  <text x="148" y="326" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.14em">F</text>
  <text x="244" y="326" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.14em">L</text>

  <!-- Vertical light rules to emphasise F and L columns -->
  <rect x="142" y="332" width="16" height="160" fill="#eef2ff"/>
  <rect x="236" y="332" width="18" height="160" fill="#eef2ff"/>

  <g font-family="JetBrains Mono, monospace" font-size="16" fill="#0a0a0a" letter-spacing="0.08em">
    <text x="140" y="352"><tspan fill="#8a8a85">$</tspan>ACAACG</text>
    <text x="140" y="374">AACG<tspan fill="#8a8a85">$</tspan>AC</text>
    <text x="140" y="396">ACAACG<tspan fill="#8a8a85">$</tspan></text>
    <text x="140" y="418">ACG<tspan fill="#8a8a85">$</tspan>ACA</text>
    <text x="140" y="440">CAACG<tspan fill="#8a8a85">$</tspan>A</text>
    <text x="140" y="462">CG<tspan fill="#8a8a85">$</tspan>ACAA</text>
    <text x="140" y="484">G<tspan fill="#8a8a85">$</tspan>ACAAC</text>
  </g>

  <!-- BWT output box -->
  <g transform="translate(380 440)">
    <rect x="0" y="0" width="260" height="56" rx="4" fill="#ebeae3" stroke="#c4c1b6" stroke-width="1"/>
    <text x="16" y="20" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85" letter-spacing="0.1em" font-weight="600">BWT = L COLUMN</text>
    <text x="16" y="44" font-family="JetBrains Mono, monospace" font-size="18" font-weight="500" fill="#0a0a0a" letter-spacing="0.1em">GC<tspan fill="#8a8a85">$</tspan>AAAC</text>
  </g>

  <!-- Arrow from sorted matrix L column to BWT box -->
  <g stroke="#1e3a8a" stroke-width="1" fill="none" stroke-dasharray="4 3">
    <path d="M 268 410 Q 330 410 380 470" marker-end="url(#arrow-accent)"/>
  </g>
</svg>
