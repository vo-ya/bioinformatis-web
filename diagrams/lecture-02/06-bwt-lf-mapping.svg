<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" role="img" aria-labelledby="t d">
  <title id="t">BWT LF-mapping invariant</title>
  <desc id="d">The F and L columns of the sorted rotation matrix of ACAACG$, shown side-by-side. Curved connectors pair the i-th occurrence of each character in L with the i-th occurrence of the same character in F, illustrating the last-first property.</desc>

  <!-- Kicker -->
  <text x="430" y="30" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8a8a85" letter-spacing="0.12em" text-anchor="middle">
    LF INVARIANT · ith c IN L ↔ ith c IN F
  </text>

  <!-- Column headers -->
  <text x="220" y="60" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#1e3a8a" letter-spacing="0.14em" text-anchor="middle">F</text>
  <text x="640" y="60" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#1e3a8a" letter-spacing="0.14em" text-anchor="middle">L</text>

  <!-- Row index labels on the left -->
  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#8a8a85" text-anchor="end">
    <text x="160" y="96">0</text>
    <text x="160" y="126">1</text>
    <text x="160" y="156">2</text>
    <text x="160" y="186">3</text>
    <text x="160" y="216">4</text>
    <text x="160" y="246">5</text>
    <text x="160" y="276">6</text>
  </g>

  <!-- F column characters -->
  <g font-family="JetBrains Mono, monospace" font-size="20" font-weight="500" text-anchor="middle">
    <text x="220" y="96"  fill="#8a8a85">$</text>
    <text x="220" y="126" fill="#0a0a0a">A</text>
    <text x="220" y="156" fill="#0a0a0a">A</text>
    <text x="220" y="186" fill="#0a0a0a">A</text>
    <text x="220" y="216" fill="#0a0a0a">C</text>
    <text x="220" y="246" fill="#0a0a0a">C</text>
    <text x="220" y="276" fill="#0a0a0a">G</text>
  </g>

  <!-- L column characters -->
  <g font-family="JetBrains Mono, monospace" font-size="20" font-weight="500" text-anchor="middle">
    <text x="640" y="96"  fill="#0a0a0a">G</text>
    <text x="640" y="126" fill="#0a0a0a">C</text>
    <text x="640" y="156" fill="#8a8a85">$</text>
    <text x="640" y="186" fill="#0a0a0a">A</text>
    <text x="640" y="216" fill="#0a0a0a">A</text>
    <text x="640" y="246" fill="#0a0a0a">A</text>
    <text x="640" y="276" fill="#0a0a0a">C</text>
  </g>

  <!-- Small occurrence-index labels near each character -->
  <g font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">
    <!-- F side indices -->
    <text x="236" y="100">(1st $)</text>
    <text x="236" y="130">(1st A)</text>
    <text x="236" y="160">(2nd A)</text>
    <text x="236" y="190">(3rd A)</text>
    <text x="236" y="220">(1st C)</text>
    <text x="236" y="250">(2nd C)</text>
    <text x="236" y="280">(1st G)</text>
    <!-- L side indices -->
    <text x="656" y="100">(1st G)</text>
    <text x="656" y="130">(1st C)</text>
    <text x="656" y="160">(1st $)</text>
    <text x="656" y="190">(1st A)</text>
    <text x="656" y="220">(2nd A)</text>
    <text x="656" y="250">(3rd A)</text>
    <text x="656" y="280">(2nd C)</text>
  </g>

  <!-- Curved connectors from L to F.
       Each connector pairs i-th c in L with i-th c in F. -->
  <g fill="none" stroke-width="1.5" opacity="0.8">
    <!-- $ pairs: L row 2 → F row 0 -->
    <path d="M 628 152 C 420 152, 420 92, 232 92" stroke="#525252" stroke-dasharray="3 3"/>
    <!-- A pairs: L rows 3,4,5 → F rows 1,2,3 -->
    <path d="M 628 182 C 420 182, 420 122, 232 122" stroke="#1e3a8a"/>
    <path d="M 628 212 C 420 212, 420 152, 232 152" stroke="#1e3a8a"/>
    <path d="M 628 242 C 420 242, 420 182, 232 182" stroke="#1e3a8a"/>
    <!-- C pairs: L rows 1,6 → F rows 4,5 -->
    <path d="M 628 122 C 420 122, 420 212, 232 212" stroke="#1e3a8a"/>
    <path d="M 628 272 C 420 272, 420 242, 232 242" stroke="#1e3a8a"/>
    <!-- G pair: L row 0 → F row 6 -->
    <path d="M 628  92 C 420  92, 420 272, 232 272" stroke="#1e3a8a"/>
  </g>

  <!-- Caption box below -->
  <g transform="translate(80 320)">
    <rect x="0" y="0" width="700" height="72" rx="4" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>
    <text x="20" y="26" font-family="Inter, sans-serif" font-size="12" fill="#0a0a0a">
      <tspan font-weight="600">Property:</tspan> the <em>i</em>-th occurrence of <em>c</em> in F is the <em>i</em>-th occurrence of <em>c</em> in L.
    </text>
    <text x="20" y="48" font-family="Inter, sans-serif" font-size="11" fill="#525252">
      This invariant is what makes it possible to walk the BWT backwards and reconstruct the original string —
    </text>
    <text x="20" y="62" font-family="Inter, sans-serif" font-size="11" fill="#525252">
      and, more powerfully, to search the reference without ever decoding it (Section 3.3).
    </text>
  </g>
</svg>
