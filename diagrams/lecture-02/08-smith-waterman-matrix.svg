<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" role="img" aria-labelledby="t d">
  <title id="t">Smith-Waterman matrix with traceback</title>
  <desc id="d">A filled 8 by 8 Smith-Waterman dynamic-programming matrix for reference GATTACA and query GCATGCA, with scoring match +2, mismatch -1, gap -2. The global maximum cell (value 5) is outlined in cobalt; the traceback path is drawn as arrows along cell edges back to a zero. Below the matrix, the aligned strings and the resulting CIGAR string are shown in a muted panel.</desc>

  <defs>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <!-- Kicker + scoring -->
  <text x="40" y="30" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8a8a85" letter-spacing="0.12em">
    SMITH–WATERMAN · MATCH +2 · MISMATCH −1 · GAP −2
  </text>

  <!-- Grid parameters:
       Cells 48×38. Matrix top-left at (100, 70). 9 columns (including headers + '' + 7 ref bases),
       9 rows (including headers + '' + 7 query bases). Slight extra column for row labels. -->

  <!-- Column headers: '' G A T T A C A -->
  <g font-family="JetBrains Mono, monospace" font-size="13" text-anchor="middle">
    <text x="148" y="62" fill="#8a8a85">''</text>
    <text x="196" y="62" fill="#0a0a0a">G</text>
    <text x="244" y="62" fill="#0a0a0a">A</text>
    <text x="292" y="62" fill="#0a0a0a">T</text>
    <text x="340" y="62" fill="#0a0a0a">T</text>
    <text x="388" y="62" fill="#0a0a0a">A</text>
    <text x="436" y="62" fill="#0a0a0a">C</text>
    <text x="484" y="62" fill="#0a0a0a">A</text>
  </g>

  <!-- Row labels: '' G C A T G C A -->
  <g font-family="JetBrains Mono, monospace" font-size="13" text-anchor="middle">
    <text x="112" y="94"  fill="#8a8a85">''</text>
    <text x="112" y="132" fill="#0a0a0a">G</text>
    <text x="112" y="170" fill="#0a0a0a">C</text>
    <text x="112" y="208" fill="#0a0a0a">A</text>
    <text x="112" y="246" fill="#0a0a0a">T</text>
    <text x="112" y="284" fill="#0a0a0a">G</text>
    <text x="112" y="322" fill="#0a0a0a">C</text>
    <text x="112" y="360" fill="#0a0a0a">A</text>
  </g>

  <!-- Matrix cells (as a single grid) -->
  <g stroke="#e5e3dc" stroke-width="1" fill="none">
    <!-- Rows horizontal lines (9 lines) -->
    <line x1="124" y1="76"  x2="508" y2="76"/>
    <line x1="124" y1="114" x2="508" y2="114"/>
    <line x1="124" y1="152" x2="508" y2="152"/>
    <line x1="124" y1="190" x2="508" y2="190"/>
    <line x1="124" y1="228" x2="508" y2="228"/>
    <line x1="124" y1="266" x2="508" y2="266"/>
    <line x1="124" y1="304" x2="508" y2="304"/>
    <line x1="124" y1="342" x2="508" y2="342"/>
    <line x1="124" y1="380" x2="508" y2="380"/>
    <!-- Columns vertical lines (9 lines) -->
    <line x1="124" y1="76" x2="124" y2="380"/>
    <line x1="172" y1="76" x2="172" y2="380"/>
    <line x1="220" y1="76" x2="220" y2="380"/>
    <line x1="268" y1="76" x2="268" y2="380"/>
    <line x1="316" y1="76" x2="316" y2="380"/>
    <line x1="364" y1="76" x2="364" y2="380"/>
    <line x1="412" y1="76" x2="412" y2="380"/>
    <line x1="460" y1="76" x2="460" y2="380"/>
    <line x1="508" y1="76" x2="508" y2="380"/>
  </g>

  <!-- Cell values -->
  <g font-family="JetBrains Mono, monospace" font-size="13" text-anchor="middle" fill="#0a0a0a">
    <!-- Row 0 (all zeros) -->
    <text x="148" y="100" fill="#8a8a85">0</text>
    <text x="196" y="100" fill="#8a8a85">0</text>
    <text x="244" y="100" fill="#8a8a85">0</text>
    <text x="292" y="100" fill="#8a8a85">0</text>
    <text x="340" y="100" fill="#8a8a85">0</text>
    <text x="388" y="100" fill="#8a8a85">0</text>
    <text x="436" y="100" fill="#8a8a85">0</text>
    <text x="484" y="100" fill="#8a8a85">0</text>
    <!-- Row 1: 0 2 0 0 0 0 0 0 -->
    <text x="148" y="138" fill="#8a8a85">0</text>
    <text x="196" y="138">2</text>
    <text x="244" y="138" fill="#8a8a85">0</text>
    <text x="292" y="138" fill="#8a8a85">0</text>
    <text x="340" y="138" fill="#8a8a85">0</text>
    <text x="388" y="138" fill="#8a8a85">0</text>
    <text x="436" y="138" fill="#8a8a85">0</text>
    <text x="484" y="138" fill="#8a8a85">0</text>
    <!-- Row 2: 0 0 1 0 0 0 2 0 -->
    <text x="148" y="176" fill="#8a8a85">0</text>
    <text x="196" y="176" fill="#8a8a85">0</text>
    <text x="244" y="176">1</text>
    <text x="292" y="176" fill="#8a8a85">0</text>
    <text x="340" y="176" fill="#8a8a85">0</text>
    <text x="388" y="176" fill="#8a8a85">0</text>
    <text x="436" y="176">2</text>
    <text x="484" y="176" fill="#8a8a85">0</text>
    <!-- Row 3: 0 0 2 0 0 2 0 4 -->
    <text x="148" y="214" fill="#8a8a85">0</text>
    <text x="196" y="214" fill="#8a8a85">0</text>
    <text x="244" y="214">2</text>
    <text x="292" y="214" fill="#8a8a85">0</text>
    <text x="340" y="214" fill="#8a8a85">0</text>
    <text x="388" y="214">2</text>
    <text x="436" y="214" fill="#8a8a85">0</text>
    <text x="484" y="214">4</text>
    <!-- Row 4: 0 0 0 4 2 0 1 2 -->
    <text x="148" y="252" fill="#8a8a85">0</text>
    <text x="196" y="252" fill="#8a8a85">0</text>
    <text x="244" y="252" fill="#8a8a85">0</text>
    <text x="292" y="252">4</text>
    <text x="340" y="252">2</text>
    <text x="388" y="252" fill="#8a8a85">0</text>
    <text x="436" y="252">1</text>
    <text x="484" y="252">2</text>
    <!-- Row 5: 0 2 0 2 3 1 0 0 -->
    <text x="148" y="290" fill="#8a8a85">0</text>
    <text x="196" y="290">2</text>
    <text x="244" y="290" fill="#8a8a85">0</text>
    <text x="292" y="290">2</text>
    <text x="340" y="290">3</text>
    <text x="388" y="290">1</text>
    <text x="436" y="290" fill="#8a8a85">0</text>
    <text x="484" y="290" fill="#8a8a85">0</text>
    <!-- Row 6: 0 0 1 0 1 2 3 1 -->
    <text x="148" y="328" fill="#8a8a85">0</text>
    <text x="196" y="328" fill="#8a8a85">0</text>
    <text x="244" y="328">1</text>
    <text x="292" y="328" fill="#8a8a85">0</text>
    <text x="340" y="328">1</text>
    <text x="388" y="328">2</text>
    <text x="436" y="328">3</text>
    <text x="484" y="328">1</text>
    <!-- Row 7: 0 0 2 0 0 3 1 5 -->
    <text x="148" y="366" fill="#8a8a85">0</text>
    <text x="196" y="366" fill="#8a8a85">0</text>
    <text x="244" y="366">2</text>
    <text x="292" y="366" fill="#8a8a85">0</text>
    <text x="340" y="366" fill="#8a8a85">0</text>
    <text x="388" y="366">3</text>
    <text x="436" y="366">1</text>
    <text x="484" y="366" font-weight="700">5</text>
  </g>

  <!-- Max cell (7,7) outlined in cobalt -->
  <rect x="460" y="342" width="48" height="38" fill="none" stroke="#1e3a8a" stroke-width="2.5"/>

  <!-- Traceback arrows: (7,7) → (6,6) → (5,5) → (4,4) → (3,3)
       Drawn along cell diagonals using the accent arrow marker.
       Cell centre x = 148 + 48*j (j=0..7) wait — let me recompute from grid above.
       Actually cells span x=124-508 with 8 cells, so each 48 wide. Cell j centre x = 148 + 48*j.
       Cells span y=76-380, rows 0..7, each 38 tall. Row i centre y = 100 + 38*i.  -->
  <g stroke="#1e3a8a" stroke-width="1.75" fill="none">
    <!-- (7,7) centre (484, 366)  →  (6,6) centre (436, 328)  (diag) -->
    <line x1="478" y1="360" x2="446" y2="336" marker-end="url(#arrow-accent)"/>
    <!-- (6,6) → (5,5) (436, 328) → (388, 290) -->
    <line x1="430" y1="322" x2="398" y2="298" marker-end="url(#arrow-accent)"/>
    <!-- (5,5) → (4,4) (388, 290) → (340, 252) -->
    <line x1="382" y1="284" x2="350" y2="260" marker-end="url(#arrow-accent)"/>
    <!-- (4,4) → (3,3) (340, 252) → (292, 214) -->
    <line x1="334" y1="246" x2="302" y2="222" marker-end="url(#arrow-accent)"/>
  </g>

  <!-- Alignment block below the matrix -->
  <g transform="translate(100 410)">
    <rect x="0" y="0" width="660" height="96" rx="4" fill="#ebeae3" stroke="#c4c1b6" stroke-width="1"/>
    <text x="20" y="24" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8a8a85" letter-spacing="0.12em">BEST LOCAL ALIGNMENT · SCORE 5</text>

    <!-- Query and reference, aligned -->
    <g font-family="JetBrains Mono, monospace" font-size="16">
      <text x="20" y="54" fill="#525252" font-size="11" font-weight="500">query</text>
      <text x="120" y="54" fill="#0a0a0a" letter-spacing="0.2em">T G C A</text>

      <text x="20" y="78" fill="#525252" font-size="11" font-weight="500">ref</text>
      <text x="120" y="78" fill="#0a0a0a" letter-spacing="0.2em">T A C A</text>
    </g>

    <!-- CIGAR string -->
    <text x="340" y="64" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8a8a85" letter-spacing="0.1em">CIGAR</text>
    <text x="420" y="66" font-family="JetBrains Mono, monospace" font-size="18" fill="#1e3a8a" font-weight="600">1=1X2=</text>
  </g>
</svg>
