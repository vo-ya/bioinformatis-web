<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 280" role="img" aria-labelledby="t d">
  <title id="t">CIGAR as run-length encoding</title>
  <desc id="d">Three horizontal rows aligned vertically. Row 1 is the raw traceback symbol sequence with each symbol in a small box. Row 2 shows the same sequence with brackets grouping identical runs, labeled with their lengths. Row 3 is the final CIGAR string. A side inset frames CIGAR as run-length encoding applied to the edit-operation sequence — the same move as scan-line RLE.</desc>

  <!-- Kicker -->
  <text x="40" y="30" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8a8a85" letter-spacing="0.12em">
    CIGAR · RUN-LENGTH ENCODING OF THE TRACEBACK
  </text>

  <!-- The 16 symbols: = = = = X = = D D = = = I = = = -->
  <!-- Positions: start x=60, step=30. -->

  <!-- Row 1: raw symbols in boxes -->
  <g>
    <text x="40" y="62" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#525252">raw</text>
    <g font-family="JetBrains Mono, monospace" font-size="16" font-weight="600" fill="#0a0a0a" text-anchor="middle">
      <!-- box helper: rect at (x-11, y-14) width=22 height=22 -->
      <!-- sequence: = = = = X = = D D = = = I = = =  (16 symbols) -->
      <g stroke="#e5e3dc" stroke-width="1" fill="none">
        <rect x="79"  y="52" width="22" height="22"/>
        <rect x="109" y="52" width="22" height="22"/>
        <rect x="139" y="52" width="22" height="22"/>
        <rect x="169" y="52" width="22" height="22"/>
        <rect x="199" y="52" width="22" height="22"/>
        <rect x="229" y="52" width="22" height="22"/>
        <rect x="259" y="52" width="22" height="22"/>
        <rect x="289" y="52" width="22" height="22"/>
        <rect x="319" y="52" width="22" height="22"/>
        <rect x="349" y="52" width="22" height="22"/>
        <rect x="379" y="52" width="22" height="22"/>
        <rect x="409" y="52" width="22" height="22"/>
        <rect x="439" y="52" width="22" height="22"/>
        <rect x="469" y="52" width="22" height="22"/>
        <rect x="499" y="52" width="22" height="22"/>
        <rect x="529" y="52" width="22" height="22"/>
      </g>
      <text x="90"  y="68">=</text>
      <text x="120" y="68">=</text>
      <text x="150" y="68">=</text>
      <text x="180" y="68">=</text>
      <text x="210" y="68" fill="#b91c1c">X</text>
      <text x="240" y="68">=</text>
      <text x="270" y="68">=</text>
      <text x="300" y="68" fill="#b45309">D</text>
      <text x="330" y="68" fill="#b45309">D</text>
      <text x="360" y="68">=</text>
      <text x="390" y="68">=</text>
      <text x="420" y="68">=</text>
      <text x="450" y="68" fill="#b45309">I</text>
      <text x="480" y="68">=</text>
      <text x="510" y="68">=</text>
      <text x="540" y="68">=</text>
    </g>
  </g>

  <!-- Row 2: run brackets with run-length labels -->
  <g transform="translate(0 110)">
    <text x="40" y="10" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#525252">runs</text>

    <g stroke="#1e3a8a" stroke-width="1.5" fill="none">
      <!-- 4= covers boxes 1-4 (x=79..191) -->
      <path d="M 79 0 L 79 6 L 191 6 L 191 0"/>
      <!-- 1X covers box 5 (x=199..221) -->
      <path d="M 199 0 L 199 6 L 221 6 L 221 0"/>
      <!-- 2= covers boxes 6-7 (x=229..281) -->
      <path d="M 229 0 L 229 6 L 281 6 L 281 0"/>
      <!-- 2D covers boxes 8-9 (x=289..341) -->
      <path d="M 289 0 L 289 6 L 341 6 L 341 0"/>
      <!-- 3= covers boxes 10-12 (x=349..431) -->
      <path d="M 349 0 L 349 6 L 431 6 L 431 0"/>
      <!-- 1I covers box 13 (x=439..461) -->
      <path d="M 439 0 L 439 6 L 461 6 L 461 0"/>
      <!-- 3= covers boxes 14-16 (x=469..551) -->
      <path d="M 469 0 L 469 6 L 551 6 L 551 0"/>
    </g>
    <g font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" text-anchor="middle">
      <text x="135" y="24">4 =</text>
      <text x="210" y="24">1 X</text>
      <text x="255" y="24">2 =</text>
      <text x="315" y="24">2 D</text>
      <text x="390" y="24">3 =</text>
      <text x="450" y="24">1 I</text>
      <text x="510" y="24">3 =</text>
    </g>
  </g>

  <!-- Row 3: final CIGAR in its own boxed panel -->
  <g transform="translate(60 170)">
    <rect x="0" y="0" width="500" height="48" rx="4" fill="#ebeae3" stroke="#c4c1b6" stroke-width="1.5"/>
    <text x="20" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#8a8a85" letter-spacing="0.1em">CIGAR</text>
    <text x="250" y="34" font-family="JetBrains Mono, monospace" font-size="18" font-weight="600" fill="#0a0a0a" text-anchor="middle" letter-spacing="0.05em">
      4=1X2=2D3=1I3=
    </text>
  </g>

  <!-- EE framing inset on the right -->
  <g transform="translate(600 110)">
    <rect x="0" y="0" width="240" height="110" rx="4" fill="#f4f3ee" stroke="#e5e3dc" stroke-width="1"/>
    <text x="16" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.1em">EE FRAMING</text>
    <text x="16" y="46" font-family="Inter, sans-serif" font-size="12" fill="#0a0a0a">CIGAR : traceback</text>
    <text x="16" y="66" font-family="Inter, sans-serif" font-size="12" fill="#0a0a0a">=  RLE : raster line</text>
    <text x="16" y="92" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">Same compression move.</text>
  </g>
</svg>
