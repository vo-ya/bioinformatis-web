<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" role="img" aria-labelledby="t d">
  <title id="t">Seed-and-extend pipeline</title>
  <desc id="d">Horizontal flow for the seed-and-extend alignment pattern. A 50 bp read enters; an FM index produces three candidate seed positions on the reference track; Smith-Waterman extends each seed within a short window; the winning extension with its CIGAR is reported. Below the diagram, a three-row comparison strip names how BWA-MEM, Bowtie 2, and minimap 2 each instantiate the pattern.</desc>

  <defs>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <!-- Stage labels above each box -->
  <g font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em" text-anchor="middle">
    <text x="110" y="40">READ</text>
    <text x="280" y="40">SEED</text>
    <text x="480" y="40">CANDIDATES · EXTEND</text>
    <text x="740" y="40">ALIGNMENT</text>
  </g>

  <!-- Stage 1: Read -->
  <g transform="translate(40 60)">
    <rect x="0" y="0" width="140" height="60" rx="4" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="1.5"/>
    <text x="12" y="22" font-family="Inter, sans-serif" font-size="10" fill="#525252">50 bp read</text>
    <text x="12" y="42" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">GATTAC…TAGGA</text>
    <text x="12" y="54" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">(1 SNV, 1 indel)</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="182" y1="90" x2="210" y2="90" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arrow-accent)"/>

  <!-- Stage 2: FM index seed lookup -->
  <g transform="translate(212 60)">
    <rect x="0" y="0" width="140" height="60" rx="4" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="1.5"/>
    <text x="70" y="22" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">FM index</text>
    <text x="70" y="40" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a" text-anchor="middle">[sp, ep)</text>
    <text x="70" y="54" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" text-anchor="middle">k-mer → positions</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="354" y1="90" x2="382" y2="90" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arrow-accent)"/>

  <!-- Stage 3: Reference track with seeds + extension windows -->
  <g transform="translate(384 60)">
    <!-- Reference bar -->
    <rect x="0" y="22" width="340" height="18" rx="2" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="1.5"/>
    <text x="0" y="14" font-family="Inter, sans-serif" font-size="10" fill="#525252">Reference (400 bp)</text>

    <!-- Seed 1 position (ambiguous, size 5) -->
    <line x1="70" y1="22" x2="70" y2="40" stroke="#1e3a8a" stroke-width="2"/>
    <rect x="50" y="22" width="40" height="18" fill="#eef2ff" stroke="none"/>
    <!-- Seed 2 (the winner) -->
    <line x1="170" y1="22" x2="170" y2="40" stroke="#1e3a8a" stroke-width="2"/>
    <rect x="150" y="22" width="40" height="18" fill="#eef2ff" stroke="#1e3a8a" stroke-width="2"/>
    <!-- Seed 3 -->
    <line x1="270" y1="22" x2="270" y2="40" stroke="#1e3a8a" stroke-width="2"/>
    <rect x="250" y="22" width="40" height="18" fill="#eef2ff" stroke="none"/>

    <!-- SW mini matrices (3x3 glyphs) inside each shaded window -->
    <g>
      <g transform="translate(56 48)" stroke="#8a8a85" stroke-width="0.75" fill="none">
        <rect x="0" y="0" width="8" height="8"/><rect x="8" y="0" width="8" height="8"/><rect x="16" y="0" width="8" height="8"/>
        <rect x="0" y="8" width="8" height="8"/><rect x="8" y="8" width="8" height="8"/><rect x="16" y="8" width="8" height="8"/>
        <rect x="0" y="16" width="8" height="8"/><rect x="8" y="16" width="8" height="8"/><rect x="16" y="16" width="8" height="8"/>
      </g>
      <text x="70" y="88" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">52</text>

      <!-- Winning seed: bigger matrix with traceback -->
      <g transform="translate(151 48)" stroke="#1e3a8a" stroke-width="1" fill="none">
        <rect x="0" y="0" width="38" height="32" fill="#eef2ff" stroke="#1e3a8a"/>
        <line x1="0"  y1="8" x2="38" y2="8"/>
        <line x1="0"  y1="16" x2="38" y2="16"/>
        <line x1="0"  y1="24" x2="38" y2="24"/>
        <line x1="8"  y1="0" x2="8" y2="32"/>
        <line x1="16" y1="0" x2="16" y2="32"/>
        <line x1="24" y1="0" x2="24" y2="32"/>
        <line x1="32" y1="0" x2="32" y2="32"/>
        <!-- Traceback arrows -->
        <path d="M 34 28 L 28 22 L 18 14 L 10 6" stroke="#1e3a8a" stroke-width="1.5"/>
      </g>
      <text x="170" y="94" font-family="JetBrains Mono, monospace" font-size="10" fill="#1e3a8a" text-anchor="middle" font-weight="600">94 ✓</text>

      <g transform="translate(256 48)" stroke="#8a8a85" stroke-width="0.75" fill="none">
        <rect x="0" y="0" width="8" height="8"/><rect x="8" y="0" width="8" height="8"/><rect x="16" y="0" width="8" height="8"/>
        <rect x="0" y="8" width="8" height="8"/><rect x="8" y="8" width="8" height="8"/><rect x="16" y="8" width="8" height="8"/>
        <rect x="0" y="16" width="8" height="8"/><rect x="8" y="16" width="8" height="8"/><rect x="16" y="16" width="8" height="8"/>
      </g>
      <text x="270" y="88" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">38</text>
    </g>
  </g>

  <!-- Arrow 3: from the winning extension window down-right to the alignment output box.
       Absolute coords: winning window centre is at (554, 108) in the Stage 3 track
       (stage origin 384 + 170 local = 554 x; 60 origin + 48 local = 108 y).
       Output box sits at (660, 150). -->
  <path d="M 554 108 C 610 108, 620 175, 656 175"
        stroke="#1e3a8a" stroke-width="1.5" fill="none" marker-end="url(#arrow-accent)"
        stroke-dasharray="4 3"/>

  <!-- Stage 4: Alignment output -->
  <g transform="translate(660 150)">
    <rect x="0" y="0" width="160" height="56" rx="4" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="1.5"/>
    <text x="12" y="20" font-family="Inter, sans-serif" font-size="10" fill="#525252">pos 217, MAPQ 60</text>
    <text x="12" y="40" font-family="JetBrains Mono, monospace" font-size="11" fill="#1e3a8a" font-weight="600">20=1X12=2D15=</text>
  </g>

  <!-- Comparison strip -->
  <g transform="translate(40 270)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#8a8a85" letter-spacing="0.12em">SAME SKELETON · DIFFERENT KNOBS</text>
    <rect x="0" y="12" width="780" height="94" rx="4" fill="#ebeae3" stroke="#c4c1b6" stroke-width="1"/>

    <g font-family="JetBrains Mono, monospace" font-size="12" fill="#525252">
      <text x="16" y="38"><tspan fill="#0a0a0a" font-weight="600">bwa mem   </tspan> · FM-index variable-length seeds (SMEMs) + banded SW</text>
      <text x="16" y="62"><tspan fill="#0a0a0a" font-weight="600">bowtie2   </tspan> · FM-index fixed-length seeds + SSE-accelerated SW</text>
      <text x="16" y="86"><tspan fill="#0a0a0a" font-weight="600">minimap2  </tspan> · minimizer hash seeds + chaining + banded SW</text>
    </g>
  </g>
</svg>
