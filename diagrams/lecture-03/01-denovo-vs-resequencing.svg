<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" role="img" aria-labelledby="t d">
  <title id="t">De novo assembly vs resequencing</title>
  <desc id="d">Two panels. Left: resequencing — short reads align onto a known reference bar. Right: de novo — the same reads overlap each other and a reconstructed contig emerges beneath them, with no reference.</desc>

  <defs>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>

  <!-- Vertical divider -->
  <line x1="430" y1="40" x2="430" y2="330" stroke="#c4c1b6" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- ===== LEFT PANEL: resequencing ===== -->
  <text x="40" y="40" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">RESEQUENCING · READS → REFERENCE</text>

  <!-- Reads above -->
  <g stroke="#1e3a8a" stroke-width="1.5" fill="none">
    <rect x="60"  y="70"  width="80" height="10" rx="2"/>
    <rect x="120" y="90"  width="80" height="10" rx="2"/>
    <rect x="180" y="70"  width="80" height="10" rx="2"/>
    <rect x="240" y="90"  width="80" height="10" rx="2"/>
    <rect x="300" y="70"  width="80" height="10" rx="2"/>
  </g>
  <!-- Leader lines to reference -->
  <g stroke="#8a8a85" stroke-width="0.8" stroke-dasharray="2 2">
    <line x1="100" y1="82"  x2="100" y2="152"/>
    <line x1="160" y1="102" x2="160" y2="152"/>
    <line x1="220" y1="82"  x2="220" y2="152"/>
    <line x1="280" y1="102" x2="280" y2="152"/>
    <line x1="340" y1="82"  x2="340" y2="152"/>
  </g>

  <!-- Reference bar -->
  <rect x="50" y="150" width="360" height="18" rx="3" fill="#f4f3ee" stroke="#525252" stroke-width="2.5"/>
  <text x="46"  y="163" text-anchor="end" font-family="Inter, sans-serif" font-size="10" fill="#525252">5′</text>
  <text x="416" y="163" font-family="Inter, sans-serif" font-size="10" fill="#525252">3′</text>
  <text x="230" y="190" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#525252" letter-spacing="0.08em">REFERENCE</text>

  <!-- Caption below -->
  <text x="230" y="300" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#525252">Each read asks: <tspan font-weight="600" fill="#0a0a0a">where on the reference do I best fit?</tspan></text>
  <text x="230" y="316" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85">Tools: BWA, Bowtie2, Minimap2</text>

  <!-- ===== RIGHT PANEL: de novo ===== -->
  <text x="450" y="40" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">DE NOVO · READS → CONTIG</text>

  <!-- Overlapping reads -->
  <g stroke="#1e3a8a" stroke-width="1.5" fill="none">
    <rect x="460" y="70"  width="90" height="10" rx="2"/>
    <rect x="510" y="90"  width="90" height="10" rx="2"/>
    <rect x="560" y="70"  width="90" height="10" rx="2"/>
    <rect x="610" y="90"  width="90" height="10" rx="2"/>
    <rect x="660" y="70"  width="90" height="10" rx="2"/>
    <rect x="710" y="90"  width="90" height="10" rx="2"/>
  </g>

  <!-- Overlap highlights -->
  <g fill="#eef2ff" stroke="none">
    <rect x="510" y="72" width="40" height="6"/>
    <rect x="560" y="92" width="40" height="6"/>
    <rect x="610" y="72" width="40" height="6"/>
    <rect x="660" y="92" width="40" height="6"/>
    <rect x="710" y="72" width="40" height="6"/>
  </g>

  <!-- Overlap tick markers -->
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
    <text x="530" y="110">·∼·</text>
    <text x="580" y="66">·∼·</text>
    <text x="630" y="110">·∼·</text>
    <text x="680" y="66">·∼·</text>
    <text x="730" y="110">·∼·</text>
  </g>

  <!-- Reconstructed contig -->
  <line x1="460" y1="160" x2="800" y2="160" stroke="#1e3a8a" stroke-width="2.5" stroke-dasharray="5 3"/>
  <text x="630" y="190" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">RECONSTRUCTED CONTIG</text>

  <!-- Caption -->
  <text x="630" y="300" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#525252">Each read asks: <tspan font-weight="600" fill="#0a0a0a">which other reads do I overlap with?</tspan></text>
  <text x="630" y="316" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85">Tools: SPAdes, Flye, hifiasm, Canu</text>
</svg>
