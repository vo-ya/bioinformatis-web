<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 260" role="img" aria-labelledby="t d">
  <title id="t">The assembly pipeline</title>
  <desc id="d">Seven-stage linear flow: Reads → QC/Trimming → Error correction → Graph construction → Graph cleanup → Contigs → Scaffolding. A dashed feeder from Scaffolding to an optional Polishing box below.</desc>

  <defs>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <!-- Kicker -->
  <text x="550" y="32" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">ASSEMBLY PIPELINE · ~30 MIN FOR A BACTERIAL GENOME</text>

  <!-- Boxes -->
  <g font-family="Inter, sans-serif" font-weight="600" font-size="12" fill="#0a0a0a" text-anchor="middle">
    <!-- 1 Reads -->
    <g>
      <rect x="30"  y="70" width="120" height="58" rx="6" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="1.5"/>
      <text x="90" y="103">Reads</text>
      <text x="90" y="146" font-size="10" font-weight="400" fill="#8a8a85">FASTQ</text>
    </g>
    <!-- 2 QC / Trimming -->
    <g>
      <rect x="180" y="70" width="120" height="58" rx="6" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="1.5"/>
      <text x="240" y="96">QC / Trimming</text>
      <text x="240" y="146" font-size="10" font-weight="400" fill="#8a8a85">fastp · trim-galore</text>
    </g>
    <!-- 3 Error correction -->
    <g>
      <rect x="330" y="70" width="130" height="58" rx="6" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="1.5"/>
      <text x="395" y="96">Error correction</text>
      <text x="395" y="146" font-size="10" font-weight="400" fill="#8a8a85">BayesHammer · k-mer</text>
    </g>
    <!-- 4 Graph construction -->
    <g>
      <rect x="490" y="70" width="140" height="58" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
      <text x="560" y="96">Graph construction</text>
      <text x="560" y="112" font-size="11" font-weight="400" fill="#525252">de Bruijn · overlap</text>
      <text x="560" y="146" font-size="10" font-weight="400" fill="#8a8a85">SPAdes · Flye</text>
    </g>
    <!-- 5 Graph cleanup -->
    <g>
      <rect x="660" y="70" width="130" height="58" rx="6" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="1.5"/>
      <text x="725" y="96">Graph cleanup</text>
      <text x="725" y="112" font-size="11" font-weight="400" fill="#525252">tips · bubbles</text>
      <text x="725" y="146" font-size="10" font-weight="400" fill="#8a8a85">built-in to assembler</text>
    </g>
    <!-- 6 Contigs -->
    <g>
      <rect x="820" y="70" width="140" height="58" rx="6" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="1.5"/>
      <text x="890" y="103">Contigs</text>
      <text x="890" y="146" font-size="10" font-weight="400" fill="#8a8a85">non-branching paths</text>
    </g>
    <!-- 7 Scaffolding -->
    <g>
      <rect x="990" y="70" width="110" height="58" rx="6" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="1.5"/>
      <text x="1045" y="96">Scaffolding</text>
      <text x="1045" y="112" font-size="11" font-weight="400" fill="#525252">paired-end &amp; Hi-C</text>
      <text x="1045" y="146" font-size="10" font-weight="400" fill="#8a8a85">SSPACE / 3D-DNA</text>
    </g>
  </g>

  <!-- Arrows between boxes -->
  <g stroke="#1e3a8a" stroke-width="1.5" fill="none">
    <line x1="150" y1="99" x2="178" y2="99" marker-end="url(#arrow-accent)"/>
    <line x1="300" y1="99" x2="328" y2="99" marker-end="url(#arrow-accent)"/>
    <line x1="460" y1="99" x2="488" y2="99" marker-end="url(#arrow-accent)"/>
    <line x1="630" y1="99" x2="658" y2="99" marker-end="url(#arrow-accent)"/>
    <line x1="790" y1="99" x2="818" y2="99" marker-end="url(#arrow-accent)"/>
    <line x1="960" y1="99" x2="988" y2="99" marker-end="url(#arrow-accent)"/>
  </g>

  <!-- Optional polishing branch -->
  <g stroke="#525252" stroke-width="1" stroke-dasharray="4 3" fill="none">
    <path d="M 1045 128 L 1045 195" marker-end="url(#arrow-accent)"/>
  </g>
  <g font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a" text-anchor="middle">
    <rect x="980" y="195" width="130" height="48" rx="6" fill="#ffffff" stroke="#c4c1b6" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="1045" y="216">Polishing</text>
    <text x="1045" y="233" font-size="10" font-weight="400" fill="#8a8a85">Pilon · Racon · optional</text>
  </g>
</svg>
