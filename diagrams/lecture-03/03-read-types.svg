<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" role="img" aria-labelledby="t d">
  <title id="t">Read types for assembly</title>
  <desc id="d">Four read categories on a common base-pair scale from 0 to 50 kb. Illumina short (150 bp), Illumina paired-end (2×150 bp with 500 bp insert), PacBio HiFi (15 kb), ONT raw (50 kb, dashed outline for noise).</desc>

  <!-- Kicker -->
  <text x="40" y="36" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">READ TYPES · SAME X-SCALE</text>

  <!-- Scale computation: 20 px = 0 bp origin, right edge 820 px = 50,000 bp. 1 bp = 0.016 px.
       150 bp ≈ 2.4 px (too thin, widen for legibility: draw 8 px for 150 bp labeled).
       We'll use log-ish pragmatic widths but label each clearly. -->

  <!-- Row 1: Illumina short -->
  <g transform="translate(0 80)">
    <text x="40" y="5" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a" letter-spacing="0.08em">ILLUMINA SHORT</text>
    <text x="40" y="20" font-family="Inter, sans-serif" font-size="10" fill="#525252">150 bp · single-end</text>
    <rect x="180" y="-4" width="8" height="20" rx="1" fill="none" stroke="#1e3a8a" stroke-width="2"/>
    <text x="195" y="10" font-family="Inter, sans-serif" font-size="10" fill="#525252">150 bp</text>
    <text x="760" y="10" text-anchor="end" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85">error ≤ 0.5%</text>
  </g>

  <!-- Row 2: Illumina paired-end -->
  <g transform="translate(0 140)">
    <text x="40" y="5" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a" letter-spacing="0.08em">ILLUMINA PE</text>
    <text x="40" y="20" font-family="Inter, sans-serif" font-size="10" fill="#525252">2 × 150 bp · 500 bp insert</text>
    <rect x="180" y="-4" width="8" height="20" rx="1" fill="none" stroke="#1e3a8a" stroke-width="2"/>
    <rect x="222" y="-4" width="8" height="20" rx="1" fill="none" stroke="#1e3a8a" stroke-width="2"/>
    <path d="M 188 -4 Q 205 -18 222 -4" stroke="#8a8a85" stroke-width="1" stroke-dasharray="3 2" fill="none"/>
    <text x="205" y="-20" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">insert ≈ 500 bp</text>
    <text x="760" y="10" text-anchor="end" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85">error ≤ 0.5%</text>
  </g>

  <!-- Row 3: PacBio HiFi -->
  <g transform="translate(0 210)">
    <text x="40" y="5" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a" letter-spacing="0.08em">PACBIO HIFI</text>
    <text x="40" y="20" font-family="Inter, sans-serif" font-size="10" fill="#525252">15 kb · single, consensus</text>
    <!-- 15kb at 1 bp = 0.013 px → 195 px -->
    <rect x="180" y="-4" width="240" height="20" rx="1" fill="none" stroke="#1e3a8a" stroke-width="2"/>
    <text x="300" y="10" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">~15 kb</text>
    <text x="760" y="10" text-anchor="end" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85">error ≈ 0.1%</text>
  </g>

  <!-- Row 4: ONT raw -->
  <g transform="translate(0 270)">
    <text x="40" y="5" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a" letter-spacing="0.08em">ONT RAW</text>
    <text x="40" y="20" font-family="Inter, sans-serif" font-size="10" fill="#525252">50 kb · single, noisy</text>
    <rect x="180" y="-4" width="600" height="20" rx="1" fill="none" stroke="#1e3a8a" stroke-width="2" stroke-dasharray="5 2"/>
    <text x="480" y="10" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">up to ~50 kb</text>
    <text x="760" y="38" text-anchor="end" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85">error 5–15%</text>
  </g>

  <!-- Scale bar at bottom -->
  <g transform="translate(0 330)" font-family="JetBrains Mono, monospace" font-size="10" fill="#8a8a85">
    <line x1="180" y1="0" x2="780" y2="0" stroke="#c4c1b6" stroke-width="1"/>
    <!-- ticks: 0, 1kb (≈195), 10kb (≈310), 50kb (780) -->
    <g stroke="#c4c1b6" stroke-width="1">
      <line x1="180" y1="-4" x2="180" y2="4"/>
      <line x1="195" y1="-4" x2="195" y2="4"/>
      <line x1="310" y1="-4" x2="310" y2="4"/>
      <line x1="780" y1="-4" x2="780" y2="4"/>
    </g>
    <text x="180" y="18" text-anchor="middle">0</text>
    <text x="195" y="18" text-anchor="middle">1 kb</text>
    <text x="310" y="18" text-anchor="middle">10 kb</text>
    <text x="780" y="18" text-anchor="middle">50 kb</text>
  </g>
</svg>
