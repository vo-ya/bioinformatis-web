<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" role="img" aria-labelledby="t d">
  <title id="t">Coverage distribution — spatial and statistical</title>
  <desc id="d">Top: reads piled on a reference, with a per-position coverage depth area plot showing oscillation between low and high. Bottom: histogram of per-position coverage overlaid with a Poisson curve, with a spike at depth zero for dropouts.</desc>

  <defs>
    <marker id="arrow-muted-04" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>

  <!-- ===== TOP: spatial ===== -->
  <text x="40" y="30" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">SPATIAL · READS STACK UNEVENLY</text>

  <!-- Reads scattered above the reference -->
  <g stroke="#1e3a8a" stroke-width="1.2" fill="none">
    <rect x="50"  y="50" width="70" height="6"/>
    <rect x="80"  y="62" width="70" height="6"/>
    <rect x="120" y="50" width="70" height="6"/>
    <rect x="180" y="62" width="70" height="6"/>
    <rect x="260" y="50" width="70" height="6"/>
    <rect x="310" y="62" width="70" height="6"/>
    <rect x="340" y="50" width="70" height="6"/>
    <rect x="380" y="62" width="70" height="6"/>
    <rect x="420" y="50" width="70" height="6"/>
    <rect x="460" y="62" width="70" height="6"/>
    <rect x="520" y="50" width="70" height="6"/>
    <rect x="560" y="62" width="70" height="6"/>
    <rect x="620" y="50" width="70" height="6"/>
    <rect x="700" y="62" width="70" height="6"/>
    <rect x="740" y="50" width="70" height="6"/>
  </g>

  <!-- Reference bar -->
  <rect x="40" y="80" width="780" height="10" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/>
  <text x="40" y="104" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85">reference</text>

  <!-- Coverage depth area plot -->
  <g transform="translate(0 110)">
    <!-- Axes -->
    <line x1="40" y1="0" x2="40" y2="90" stroke="#c4c1b6" stroke-width="1"/>
    <line x1="40" y1="90" x2="820" y2="90" stroke="#c4c1b6" stroke-width="1"/>
    <text x="34" y="4" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85">20×</text>
    <text x="34" y="48" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85">10×</text>
    <text x="34" y="94" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85">0</text>

    <!-- Filled oscillating area -->
    <path d="M 40 60 L 80 45 L 120 30 L 160 38 L 200 50 L 240 75 L 280 60 L 320 20 L 360 15 L 400 25 L 440 40 L 480 50 L 520 35 L 560 20 L 600 42 L 640 68 L 680 78 L 720 45 L 760 40 L 820 52 L 820 90 L 40 90 Z"
          fill="#f4f3ee" stroke="#0a0a0a" stroke-width="1.3"/>
    <!-- Mean line at 10× -->
    <line x1="40" y1="48" x2="820" y2="48" stroke="#1e3a8a" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="824" y="51" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a">mean 10×</text>

    <!-- Annotation: low-coverage dip -->
    <line x1="240" y1="75" x2="240" y2="115" stroke="#525252" stroke-width="0.8" stroke-dasharray="2 2"/>
    <text x="240" y="128" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">dropout</text>

    <!-- Annotation: peak -->
    <line x1="680" y1="78" x2="680" y2="115" stroke="#525252" stroke-width="0.8" stroke-dasharray="2 2"/>
    <text x="680" y="128" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">pile-up</text>
  </g>

  <!-- ===== BOTTOM: histogram + Poisson ===== -->
  <text x="40" y="270" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">STATISTICAL · PER-POSITION DEPTH DISTRIBUTION</text>

  <g transform="translate(0 280)">
    <!-- Axes -->
    <line x1="40" y1="0" x2="40" y2="110" stroke="#c4c1b6" stroke-width="1"/>
    <line x1="40" y1="110" x2="520" y2="110" stroke="#c4c1b6" stroke-width="1"/>
    <text x="280" y="132" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">depth (×)</text>
    <text x="20" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" transform="rotate(-90 20 60)">fraction of positions</text>

    <!-- x-axis ticks -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
      <text x="60"  y="124">0</text>
      <text x="160" y="124">5</text>
      <text x="260" y="124">10</text>
      <text x="360" y="124">15</text>
      <text x="460" y="124">20</text>
    </g>

    <!-- Histogram bars (Poisson-ish around mean 10). Bar width 18, spacing 2, start x=50. -->
    <g fill="#eef2ff" stroke="#1e3a8a" stroke-width="1">
      <!-- spike at 0 (dropouts) -->
      <rect x="52"  y="62" width="16" height="48"/>
      <!-- small counts 1-3 -->
      <rect x="72"  y="95" width="16" height="15"/>
      <rect x="92"  y="88" width="16" height="22"/>
      <rect x="112" y="82" width="16" height="28"/>
      <!-- bump around 10 -->
      <rect x="132" y="72" width="16" height="38"/>
      <rect x="152" y="58" width="16" height="52"/>
      <rect x="172" y="42" width="16" height="68"/>
      <rect x="192" y="30" width="16" height="80"/>
      <rect x="212" y="22" width="16" height="88"/>
      <rect x="232" y="18" width="16" height="92"/>
      <rect x="252" y="20" width="16" height="90"/>
      <rect x="272" y="28" width="16" height="82"/>
      <rect x="292" y="40" width="16" height="70"/>
      <rect x="312" y="55" width="16" height="55"/>
      <rect x="332" y="70" width="16" height="40"/>
      <rect x="352" y="82" width="16" height="28"/>
      <rect x="372" y="90" width="16" height="20"/>
      <rect x="392" y="98" width="16" height="12"/>
      <rect x="412" y="102" width="16" height="8"/>
      <rect x="432" y="106" width="16" height="4"/>
    </g>

    <!-- Poisson curve overlay (dashed fg-muted) -->
    <path d="M 60 105 C 100 98, 130 78, 170 40 S 220 14, 240 18 S 300 50, 340 80 S 400 102, 440 108 S 500 109, 520 110"
          stroke="#525252" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
    <text x="320" y="30" font-family="Inter, sans-serif" font-size="10" fill="#525252">Poisson(λ=10)</text>
    <line x1="316" y1="28" x2="280" y2="32" stroke="#525252" stroke-width="0.8" marker-end="url(#arrow-muted-04)"/>

    <!-- Dropout spike annotation -->
    <line x1="60" y1="62" x2="60" y2="30" stroke="#b45309" stroke-width="0.8"/>
    <text x="60" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b45309">dropouts</text>
    <text x="60" y="10" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#b45309">Poisson misses</text>
  </g>

  <!-- Side legend -->
  <g transform="translate(580 320)" font-family="Inter, sans-serif" font-size="10" fill="#525252">
    <rect x="0" y="0" width="14" height="10" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
    <text x="18" y="9">observed</text>
    <line x1="0" y1="24" x2="14" y2="24" stroke="#525252" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="18" y="28">theoretical (Poisson)</text>
  </g>
</svg>
