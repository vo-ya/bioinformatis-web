<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" role="img" aria-labelledby="t d">
  <title id="t">k-mer frequency spectrum</title>
  <desc id="d">Histogram of k-mer frequency on a log-y axis. A tall spike at frequency one (erroneous k-mers), then a bump centered around 30 (true k-mers from 30× coverage). A dashed vertical line at frequency three marks the error threshold — k-mers below are discarded.</desc>

  <defs>
    <marker id="arrow-muted-05" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>

  <!-- Kicker -->
  <text x="40" y="30" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">k-MER SPECTRUM · ERRORS SEPARATE FROM TRUTH</text>

  <!-- Plot area: x=80..760 (frequency 0..60), y=60..300 (log scale 10^5..10^0) -->
  <!-- Axes -->
  <line x1="80" y1="60" x2="80" y2="300" stroke="#c4c1b6" stroke-width="1"/>
  <line x1="80" y1="300" x2="780" y2="300" stroke="#c4c1b6" stroke-width="1"/>

  <!-- Y-axis ticks (log scale) -->
  <g font-family="JetBrains Mono, monospace" font-size="10" fill="#8a8a85" text-anchor="end">
    <line x1="75" y1="60"  x2="80" y2="60"  stroke="#c4c1b6"/>
    <text x="72" y="64">10⁵</text>
    <line x1="75" y1="108" x2="80" y2="108" stroke="#c4c1b6"/>
    <text x="72" y="112">10⁴</text>
    <line x1="75" y1="156" x2="80" y2="156" stroke="#c4c1b6"/>
    <text x="72" y="160">10³</text>
    <line x1="75" y1="204" x2="80" y2="204" stroke="#c4c1b6"/>
    <text x="72" y="208">10²</text>
    <line x1="75" y1="252" x2="80" y2="252" stroke="#c4c1b6"/>
    <text x="72" y="256">10¹</text>
    <line x1="75" y1="300" x2="80" y2="300" stroke="#c4c1b6"/>
    <text x="72" y="304">10⁰</text>
  </g>

  <!-- X-axis ticks -->
  <g font-family="JetBrains Mono, monospace" font-size="10" fill="#8a8a85" text-anchor="middle">
    <line x1="80"  y1="300" x2="80"  y2="306" stroke="#c4c1b6"/>
    <text x="80"  y="320">0</text>
    <line x1="180" y1="300" x2="180" y2="306" stroke="#c4c1b6"/>
    <text x="180" y="320">10</text>
    <line x1="280" y1="300" x2="280" y2="306" stroke="#c4c1b6"/>
    <text x="280" y="320">20</text>
    <line x1="380" y1="300" x2="380" y2="306" stroke="#c4c1b6"/>
    <text x="380" y="320">30</text>
    <line x1="480" y1="300" x2="480" y2="306" stroke="#c4c1b6"/>
    <text x="480" y="320">40</text>
    <line x1="580" y1="300" x2="580" y2="306" stroke="#c4c1b6"/>
    <text x="580" y="320">50</text>
    <line x1="680" y1="300" x2="680" y2="306" stroke="#c4c1b6"/>
    <text x="680" y="320">60</text>
  </g>
  <text x="430" y="342" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#525252">k-mer frequency (how many reads contain the k-mer)</text>
  <text x="30"  y="180" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#525252" transform="rotate(-90 30 180)">distinct k-mers (log)</text>

  <!-- Histogram bars. bar at freq f at x = 80 + f*10, width 8. heights scale log -->
  <g fill="#1e3a8a">
    <!-- freq 1: very tall (10^5) -->
    <rect x="84"  y="60"  width="8" height="240"/>
    <!-- freq 2: 10^4 -->
    <rect x="94"  y="108" width="8" height="192"/>
    <!-- freq 3: 10^3.5 ≈ -->
    <rect x="104" y="132" width="8" height="168"/>
    <!-- freq 4..10: low -->
    <rect x="114" y="228" width="8" height="72"/>
    <rect x="124" y="252" width="8" height="48"/>
    <rect x="134" y="264" width="8" height="36"/>
    <rect x="144" y="276" width="8" height="24"/>
    <rect x="154" y="276" width="8" height="24"/>
    <rect x="164" y="264" width="8" height="36"/>
    <rect x="174" y="252" width="8" height="48"/>
    <!-- bump around 30 (true k-mers). Shape: rising from 20 → peak at 30 → falling to 40 -->
    <rect x="184" y="240" width="8" height="60"/>
    <rect x="194" y="220" width="8" height="80"/>
    <rect x="204" y="196" width="8" height="104"/>
    <rect x="214" y="172" width="8" height="128"/>
    <rect x="224" y="156" width="8" height="144"/>
    <rect x="234" y="140" width="8" height="160"/>
    <rect x="244" y="124" width="8" height="176"/>
    <rect x="254" y="112" width="8" height="188"/>
    <rect x="264" y="100" width="8" height="200"/>
    <rect x="274" y="92"  width="8" height="208"/>
    <rect x="284" y="88"  width="8" height="212"/>
    <rect x="294" y="84"  width="8" height="216"/>
    <rect x="304" y="88"  width="8" height="212"/>
    <rect x="314" y="96"  width="8" height="204"/>
    <rect x="324" y="108" width="8" height="192"/>
    <rect x="334" y="124" width="8" height="176"/>
    <rect x="344" y="144" width="8" height="156"/>
    <rect x="354" y="168" width="8" height="132"/>
    <rect x="364" y="196" width="8" height="104"/>
    <rect x="374" y="224" width="8" height="76"/>
    <rect x="384" y="252" width="8" height="48"/>
    <rect x="394" y="276" width="8" height="24"/>
    <rect x="404" y="288" width="8" height="12"/>
    <rect x="414" y="296" width="8" height="4"/>
  </g>

  <!-- Error threshold dashed vertical line at freq = 3 -->
  <line x1="112" y1="50" x2="112" y2="300" stroke="#b91c1c" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="122" y="55" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b91c1c">error threshold</text>
  <text x="122" y="68" font-family="Inter, sans-serif" font-size="10" fill="#b91c1c">discard &lt; 3</text>

  <!-- Label: erroneous k-mers -->
  <text x="88" y="48" font-family="Inter, sans-serif" font-size="10" fill="#525252">erroneous k-mers</text>
  <line x1="90" y1="53" x2="90" y2="60" stroke="#525252" stroke-width="0.8"/>

  <!-- Label: true k-mers peak -->
  <text x="298" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">true k-mers · peak ≈ coverage</text>
  <text x="298" y="86" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">~30×</text>
</svg>
