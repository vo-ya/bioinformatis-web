<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" role="img" aria-labelledby="t d">
  <title id="t">De Bruijn graph construction</title>
  <desc id="d">Three input reads, their k-mer decomposition with k=4, and the resulting de Bruijn graph. Six nodes (each a 3-mer) connected by directed edges labeled with the 4-mer they came from.</desc>

  <defs>
    <marker id="arrow-accent-06" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
    <marker id="arrow-muted-06" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8a8a85"/>
    </marker>
  </defs>

  <!-- ===== BAND 1: input reads ===== -->
  <text x="40" y="30" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">INPUT READS · k = 4</text>
  <g font-family="JetBrains Mono, monospace" font-size="14" fill="#0a0a0a">
    <text x="60"  y="58">ACGTCC</text>
    <text x="60"  y="78">CGTCCA</text>
    <text x="60"  y="98">GTCCAT</text>
  </g>

  <!-- ===== BAND 2: k-mers → prefix | suffix ===== -->
  <text x="40" y="132" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">k-MER · PREFIX | SUFFIX</text>
  <g font-family="JetBrains Mono, monospace" font-size="13" fill="#0a0a0a">
    <!-- each row: 4-mer  →  3-mer | 3-mer -->
    <text x="60"  y="160">ACGT</text>
    <text x="122" y="160" fill="#8a8a85">→</text>
    <text x="145" y="160">ACG</text>
    <text x="188" y="160" fill="#8a8a85">|</text>
    <text x="200" y="160">CGT</text>

    <text x="260" y="160">CGTC</text>
    <text x="322" y="160" fill="#8a8a85">→</text>
    <text x="345" y="160">CGT</text>
    <text x="388" y="160" fill="#8a8a85">|</text>
    <text x="400" y="160">GTC</text>

    <text x="460" y="160">GTCC</text>
    <text x="522" y="160" fill="#8a8a85">→</text>
    <text x="545" y="160">GTC</text>
    <text x="588" y="160" fill="#8a8a85">|</text>
    <text x="600" y="160">TCC</text>

    <text x="60"  y="184">TCCA</text>
    <text x="122" y="184" fill="#8a8a85">→</text>
    <text x="145" y="184">TCC</text>
    <text x="188" y="184" fill="#8a8a85">|</text>
    <text x="200" y="184">CCA</text>

    <text x="260" y="184">CCAT</text>
    <text x="322" y="184" fill="#8a8a85">→</text>
    <text x="345" y="184">CCA</text>
    <text x="388" y="184" fill="#8a8a85">|</text>
    <text x="400" y="184">CAT</text>
  </g>

  <!-- ===== BAND 3: de Bruijn graph ===== -->
  <text x="40" y="230" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">DE BRUIJN GRAPH · ONE EDGE PER k-MER</text>

  <!-- 6 nodes on a line: ACG → CGT → GTC → TCC → CCA → CAT -->
  <g font-family="JetBrains Mono, monospace" font-size="13" font-weight="500" fill="#0a0a0a" text-anchor="middle">
    <g fill="#f4f3ee" stroke="#0a0a0a" stroke-width="1.5">
      <circle cx="100" cy="310" r="32"/>
      <circle cx="230" cy="310" r="32"/>
      <circle cx="360" cy="310" r="32"/>
      <circle cx="490" cy="310" r="32"/>
      <circle cx="620" cy="310" r="32"/>
      <circle cx="750" cy="310" r="32"/>
    </g>
    <text x="100" y="314" fill="#0a0a0a">ACG</text>
    <text x="230" y="314" fill="#0a0a0a">CGT</text>
    <text x="360" y="314" fill="#0a0a0a">GTC</text>
    <text x="490" y="314" fill="#0a0a0a">TCC</text>
    <text x="620" y="314" fill="#0a0a0a">CCA</text>
    <text x="750" y="314" fill="#0a0a0a">CAT</text>
  </g>

  <!-- Edges with labels -->
  <g stroke="#1e3a8a" stroke-width="1.5" fill="none">
    <line x1="132" y1="310" x2="194" y2="310" marker-end="url(#arrow-accent-06)"/>
    <line x1="262" y1="310" x2="324" y2="310" marker-end="url(#arrow-accent-06)"/>
    <line x1="392" y1="310" x2="454" y2="310" marker-end="url(#arrow-accent-06)"/>
    <line x1="522" y1="310" x2="584" y2="310" marker-end="url(#arrow-accent-06)"/>
    <line x1="652" y1="310" x2="714" y2="310" marker-end="url(#arrow-accent-06)"/>
  </g>
  <g font-family="JetBrains Mono, monospace" font-size="10" fill="#1e3a8a" text-anchor="middle">
    <text x="163" y="300">ACGT</text>
    <text x="293" y="300">CGTC</text>
    <text x="423" y="300">GTCC</text>
    <text x="553" y="300">TCCA</text>
    <text x="683" y="300">CCAT</text>
  </g>

  <!-- Annotation bubble -->
  <g transform="translate(420 370)">
    <rect x="-190" y="0" width="380" height="50" rx="8" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
    <text x="0" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#0a0a0a">One node per distinct <tspan font-family="JetBrains Mono, monospace" font-size="12">(k−1)</tspan>-mer.</text>
    <text x="0" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#0a0a0a">One edge per distinct k-mer.</text>
  </g>
</svg>
