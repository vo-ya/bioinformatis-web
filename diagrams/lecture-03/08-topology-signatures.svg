<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 320" role="img" aria-labelledby="t d">
  <title id="t">Graph topology signatures — tip, bubble, tangle</title>
  <desc id="d">Three panels showing canonical de Bruijn graph artifacts. A tip (short dead-end branch off a linear path), a bubble (two parallel paths of similar length between two junctions), a tangle (dense subgraph with multiple cycles).</desc>

  <defs>
    <marker id="arrow-accent-08" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
    <marker id="arrow-accent-08-back" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
  </defs>

  <!-- Panel dividers -->
  <line x1="287" y1="50" x2="287" y2="290" stroke="#c4c1b6" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="574" y1="50" x2="574" y2="290" stroke="#c4c1b6" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- ==== Panel 1: TIP ==== -->
  <text x="143" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">TIP</text>

  <g fill="#f4f3ee" stroke="#0a0a0a" stroke-width="1.5">
    <circle cx="40"  cy="160" r="10"/>
    <circle cx="90"  cy="160" r="10"/>
    <circle cx="140" cy="160" r="10"/>
    <circle cx="190" cy="160" r="10"/>
    <circle cx="240" cy="160" r="10"/>
    <!-- Dead end branch -->
    <circle cx="170" cy="210" r="10"/>
    <circle cx="200" cy="250" r="10"/>
  </g>
  <g stroke="#1e3a8a" stroke-width="1.5" fill="none">
    <line x1="50"  y1="160" x2="80"  y2="160" marker-end="url(#arrow-accent-08)"/>
    <line x1="100" y1="160" x2="130" y2="160" marker-end="url(#arrow-accent-08)"/>
    <line x1="150" y1="160" x2="180" y2="160" marker-end="url(#arrow-accent-08)"/>
    <line x1="200" y1="160" x2="230" y2="160" marker-end="url(#arrow-accent-08)"/>
    <!-- branch to dead end -->
    <line x1="146" y1="168" x2="166" y2="202" marker-end="url(#arrow-accent-08)"/>
    <line x1="176" y1="218" x2="196" y2="242" marker-end="url(#arrow-accent-08)"/>
  </g>
  <text x="143" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">single-read error</text>
  <text x="143" y="298" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85">remove if shorter than 2k</text>

  <!-- ==== Panel 2: BUBBLE ==== -->
  <text x="430" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">BUBBLE</text>

  <g fill="#f4f3ee" stroke="#0a0a0a" stroke-width="1.5">
    <circle cx="320" cy="160" r="10"/>
    <!-- Upper path -->
    <circle cx="370" cy="130" r="10"/>
    <circle cx="420" cy="125" r="10"/>
    <circle cx="470" cy="130" r="10"/>
    <!-- Lower path -->
    <circle cx="370" cy="190" r="10"/>
    <circle cx="420" cy="195" r="10"/>
    <circle cx="470" cy="190" r="10"/>
    <!-- Merge -->
    <circle cx="520" cy="160" r="10"/>
  </g>
  <g stroke="#1e3a8a" stroke-width="1.5" fill="none">
    <!-- Upper -->
    <line x1="327" y1="155" x2="362" y2="136" marker-end="url(#arrow-accent-08)"/>
    <line x1="380" y1="129" x2="410" y2="127" marker-end="url(#arrow-accent-08)"/>
    <line x1="430" y1="126" x2="460" y2="128" marker-end="url(#arrow-accent-08)"/>
    <line x1="478" y1="136" x2="513" y2="154" marker-end="url(#arrow-accent-08)"/>
    <!-- Lower -->
    <line x1="327" y1="165" x2="362" y2="184" marker-end="url(#arrow-accent-08)"/>
    <line x1="380" y1="191" x2="410" y2="193" marker-end="url(#arrow-accent-08)"/>
    <line x1="430" y1="194" x2="460" y2="192" marker-end="url(#arrow-accent-08)"/>
    <line x1="478" y1="184" x2="513" y2="166" marker-end="url(#arrow-accent-08)"/>
  </g>
  <text x="430" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">SNP or small variant</text>
  <text x="430" y="298" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85">keep higher-coverage path, collapse</text>

  <!-- ==== Panel 3: TANGLE ==== -->
  <text x="717" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">TANGLE</text>

  <g fill="#f4f3ee" stroke="#0a0a0a" stroke-width="1.5">
    <!-- in-edges on the left -->
    <circle cx="610" cy="120" r="9"/>
    <circle cx="610" cy="170" r="9"/>
    <circle cx="610" cy="220" r="9"/>
    <!-- inner cluster -->
    <circle cx="680" cy="130" r="9"/>
    <circle cx="680" cy="180" r="9"/>
    <circle cx="680" cy="220" r="9"/>
    <circle cx="730" cy="150" r="9"/>
    <circle cx="730" cy="200" r="9"/>
    <!-- out-edges on the right -->
    <circle cx="790" cy="130" r="9"/>
    <circle cx="790" cy="180" r="9"/>
    <circle cx="790" cy="220" r="9"/>
  </g>
  <g stroke="#1e3a8a" stroke-width="1.2" fill="none">
    <line x1="619" y1="120" x2="672" y2="130" marker-end="url(#arrow-accent-08)"/>
    <line x1="619" y1="170" x2="672" y2="180" marker-end="url(#arrow-accent-08)"/>
    <line x1="619" y1="220" x2="672" y2="220" marker-end="url(#arrow-accent-08)"/>
    <!-- forward arrows from inner-left (680) to inner-right (730) — y-offset to separate arrowheads -->
    <line x1="689" y1="130" x2="723" y2="145" marker-end="url(#arrow-accent-08)"/>
    <line x1="689" y1="178" x2="723" y2="155" marker-end="url(#arrow-accent-08)"/>
    <line x1="689" y1="184" x2="723" y2="195" marker-end="url(#arrow-accent-08)"/>
    <line x1="689" y1="220" x2="723" y2="205" marker-end="url(#arrow-accent-08)"/>
    <!-- forward arrows from inner-right (730) to right column (790) — y-offset to separate -->
    <line x1="739" y1="145" x2="781" y2="130" marker-end="url(#arrow-accent-08)"/>
    <line x1="739" y1="155" x2="781" y2="178" marker-end="url(#arrow-accent-08)"/>
    <line x1="739" y1="195" x2="781" y2="184" marker-end="url(#arrow-accent-08)"/>
    <line x1="739" y1="205" x2="781" y2="220" marker-end="url(#arrow-accent-08)"/>
  </g>
  <!-- Back-edge (creates the cycle that makes this a tangle): arc OVER the cluster, amber + dashed to distinguish -->
  <g stroke="#b45309" stroke-width="1.3" fill="none" stroke-dasharray="4 3">
    <path d="M 730 141 C 730 100, 680 100, 680 171" marker-end="url(#arrow-accent-08-back)"/>
  </g>
  <text x="705" y="96" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#b45309" font-style="italic">back-edge (cycle)</text>
  <text x="717" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">repeat</text>
  <text x="717" y="298" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85">unresolvable without long reads</text>
</svg>
