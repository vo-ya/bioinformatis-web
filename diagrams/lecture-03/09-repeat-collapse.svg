<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" role="img" aria-labelledby="t d">
  <title id="t">Repeat collapse in a de Bruijn graph</title>
  <desc id="d">Top panel: a genome with two identical repeat blocks R flanked by distinct regions A, B, C. Bottom panel: the de Bruijn graph where the two R copies collapse into a single node with two incoming and two outgoing edges — creating ambiguity.</desc>

  <defs>
    <marker id="arrow-accent-09" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <!-- ===== TOP: genome layout ===== -->
  <text x="40" y="30" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">GENOME · TWO IDENTICAL REPEATS</text>

  <!-- Genome bar segments -->
  <g stroke="#525252" stroke-width="2" fill="#f4f3ee">
    <!-- A -->
    <rect x="60"  y="60" width="140" height="28" rx="2"/>
    <!-- R1 (repeat copy 1) -->
    <rect x="200" y="60" width="120" height="28" rx="2" fill="#eef2ff" stroke="#1e3a8a"/>
    <!-- B -->
    <rect x="320" y="60" width="140" height="28" rx="2"/>
    <!-- R2 (repeat copy 2) -->
    <rect x="460" y="60" width="120" height="28" rx="2" fill="#eef2ff" stroke="#1e3a8a"/>
    <!-- C -->
    <rect x="580" y="60" width="200" height="28" rx="2"/>
  </g>
  <g font-family="JetBrains Mono, monospace" font-size="13" fill="#0a0a0a" text-anchor="middle">
    <text x="130" y="79">A</text>
    <text x="260" y="79" fill="#1e3a8a" font-weight="600">R</text>
    <text x="390" y="79">B</text>
    <text x="520" y="79" fill="#1e3a8a" font-weight="600">R</text>
    <text x="680" y="79">C</text>
  </g>

  <!-- ===== BOTTOM: collapsed de Bruijn graph ===== -->
  <text x="40" y="160" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">DE BRUIJN GRAPH · COLLAPSED R NODE</text>

  <!-- Central R node -->
  <g font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" fill="#0a0a0a" text-anchor="middle">
    <rect x="385" y="240" width="90" height="44" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="2"/>
    <text x="430" y="266" fill="#1e3a8a">R</text>
    <text x="430" y="278" font-size="9" font-weight="400" fill="#525252">one node</text>
  </g>

  <!-- A node (top-left incoming) -->
  <g font-family="JetBrains Mono, monospace" font-size="13" fill="#0a0a0a" text-anchor="middle">
    <circle cx="170" cy="220" r="22" fill="#f4f3ee" stroke="#0a0a0a" stroke-width="1.5"/>
    <text x="170" y="225">A</text>
  </g>
  <!-- B node (between: both an incoming and outgoing) -->
  <g font-family="JetBrains Mono, monospace" font-size="13" fill="#0a0a0a" text-anchor="middle">
    <circle cx="170" cy="300" r="22" fill="#f4f3ee" stroke="#0a0a0a" stroke-width="1.5"/>
    <text x="170" y="305">B</text>
  </g>
  <!-- C node (bottom-right outgoing) -->
  <g font-family="JetBrains Mono, monospace" font-size="13" fill="#0a0a0a" text-anchor="middle">
    <circle cx="700" cy="220" r="22" fill="#f4f3ee" stroke="#0a0a0a" stroke-width="1.5"/>
    <text x="700" y="225">C</text>
  </g>

  <!-- Second outgoing to B (because after first R we re-enter B's prefix? Here B is both post-first-R and pre-second-R) -->

  <!-- Incoming edges into R: A → R, B → R -->
  <g stroke="#1e3a8a" stroke-width="1.5" fill="none">
    <line x1="192" y1="226" x2="385" y2="258" marker-end="url(#arrow-accent-09)"/>
    <line x1="192" y1="295" x2="385" y2="268" marker-end="url(#arrow-accent-09)"/>
    <!-- Outgoing edges: R → B, R → C -->
    <line x1="475" y1="268" x2="680" y2="228" marker-end="url(#arrow-accent-09)"/>
    <line x1="475" y1="278" x2="192" y2="310" marker-end="url(#arrow-accent-09)"/>
  </g>

  <!-- Edge labels with ? markers for ambiguous paths -->
  <g font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b45309">
    <text x="275" y="240">?</text>
    <text x="275" y="285">?</text>
    <text x="580" y="238">?</text>
    <text x="580" y="295">?</text>
  </g>

  <!-- Node role labels -->
  <g font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">
    <text x="170" y="195">in</text>
    <text x="170" y="335">in / out</text>
    <text x="700" y="195">out</text>
  </g>

  <!-- Annotation -->
  <g transform="translate(0 340)">
    <text x="430" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0a0a0a">Two orderings consistent with the graph: <tspan font-family="JetBrains Mono, monospace">A–R–B–R–C</tspan> and <tspan font-family="JetBrains Mono, monospace">A–R–C  +  B–R</tspan>.</text>
  </g>
</svg>
