<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" role="img" aria-labelledby="t d">
  <title id="t">Repeat collapse in a de Bruijn graph</title>
  <desc id="d">Top panel: a genome with two identical repeat blocks R flanked by distinct regions A, B, C. Bottom panel: the de Bruijn graph where the two R copies collapse into a single node with two incoming and two outgoing edges — creating ambiguity.</desc>

  <defs>
    <marker id="arrow-accent-09" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <!-- ===== TOP: genome layout ===== -->
  <text x="40" y="30" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">GENOME · TWO IDENTICAL REPEATS</text>

  <!-- Genome bar segments -->
  <g stroke="#525252" stroke-width="2" fill="#f4f3ee">
    <rect x="60"  y="60" width="140" height="28" rx="2"/>
    <rect x="200" y="60" width="120" height="28" rx="2" fill="#eef2ff" stroke="#1e3a8a"/>
    <rect x="320" y="60" width="140" height="28" rx="2"/>
    <rect x="460" y="60" width="120" height="28" rx="2" fill="#eef2ff" stroke="#1e3a8a"/>
    <rect x="580" y="60" width="200" height="28" rx="2"/>
  </g>
  <g font-family="JetBrains Mono, monospace" font-size="13" fill="#0a0a0a" text-anchor="middle">
    <text x="130" y="79">A</text>
    <text x="260" y="79" fill="#1e3a8a" font-weight="600">R</text>
    <text x="390" y="79">B</text>
    <text x="520" y="79" fill="#1e3a8a" font-weight="600">R</text>
    <text x="680" y="79">C</text>
  </g>

  <!-- ===== BOTTOM: collapsed de Bruijn graph ===== -->
  <text x="40" y="140" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">DE BRUIJN GRAPH · COLLAPSED R NODE</text>

  <!-- Layout: two incoming nodes on left (A top, B bottom), R in center, two outgoing nodes on right (B top, C bottom).
       B appears on BOTH sides — as an out-node from R (upper-right) and an in-node to R (lower-left).
       We draw B twice so both roles are visible. Each is labeled "B" but tinted. -->

  <!-- Left incoming: A (upper-left), B (lower-left) -->
  <g font-family="JetBrains Mono, monospace" font-size="13" fill="#0a0a0a" text-anchor="middle">
    <circle cx="160" cy="210" r="22" fill="#f4f3ee" stroke="#0a0a0a" stroke-width="1.5"/>
    <text x="160" y="215">A</text>
  </g>
  <g font-family="JetBrains Mono, monospace" font-size="13" fill="#0a0a0a" text-anchor="middle">
    <circle cx="160" cy="300" r="22" fill="#f4f3ee" stroke="#0a0a0a" stroke-width="1.5"/>
    <text x="160" y="305">B</text>
  </g>

  <!-- Center: R (collapsed) -->
  <g font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" fill="#0a0a0a" text-anchor="middle">
    <rect x="385" y="230" width="90" height="54" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="2"/>
    <text x="430" y="256" fill="#1e3a8a">R</text>
    <text x="430" y="273" font-size="9" font-weight="400" fill="#525252">one node</text>
  </g>

  <!-- Right outgoing: B' (upper-right), C (lower-right).
       The B' here is the same (k-1)-mer as the left B — drawn again to show the "R → B" edge cleanly. -->
  <g font-family="JetBrains Mono, monospace" font-size="13" fill="#0a0a0a" text-anchor="middle">
    <circle cx="700" cy="210" r="22" fill="#f4f3ee" stroke="#0a0a0a" stroke-width="1.5" stroke-dasharray="3 2"/>
    <text x="700" y="215">B</text>
  </g>
  <g font-family="JetBrains Mono, monospace" font-size="13" fill="#0a0a0a" text-anchor="middle">
    <circle cx="700" cy="300" r="22" fill="#f4f3ee" stroke="#0a0a0a" stroke-width="1.5"/>
    <text x="700" y="305">C</text>
  </g>

  <!-- Node role labels -->
  <g font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">
    <text x="160" y="185">incoming</text>
    <text x="160" y="338">incoming</text>
    <text x="700" y="185">outgoing</text>
    <text x="700" y="338">outgoing</text>
  </g>

  <!-- Edges. Incoming: A → R, B → R. Outgoing: R → B, R → C. Routed to avoid crossings. -->
  <g stroke="#1e3a8a" stroke-width="1.5" fill="none">
    <!-- A → R (top-left into R top-left corner) -->
    <line x1="182" y1="215" x2="385" y2="240" marker-end="url(#arrow-accent-09)"/>
    <!-- B → R (bottom-left into R bottom-left corner) -->
    <line x1="182" y1="295" x2="385" y2="275" marker-end="url(#arrow-accent-09)"/>
    <!-- R → B' (top-right out of R top-right corner) -->
    <line x1="475" y1="240" x2="678" y2="215" marker-end="url(#arrow-accent-09)"/>
    <!-- R → C (bottom-right out of R bottom-right corner) -->
    <line x1="475" y1="275" x2="678" y2="295" marker-end="url(#arrow-accent-09)"/>
  </g>

  <!-- Edge-ambiguity markers: a '?' near each in-edge's tail and each out-edge's head -->
  <g font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#b45309">
    <text x="280" y="218">?</text>
    <text x="280" y="295">?</text>
    <text x="580" y="218">?</text>
    <text x="580" y="295">?</text>
  </g>

  <!-- Dashed "same node" identity arc connecting left-B and right-B' -->
  <path d="M 160 322 Q 430 372 700 322"
        stroke="#8a8a85" stroke-width="1" stroke-dasharray="4 3" fill="none"/>
  <text x="430" y="360" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" font-style="italic">same (k−1)-mer — drawn twice for the two roles</text>

  <!-- Annotation -->
  <text x="430" y="390" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0a0a0a">Two orderings consistent with the graph: <tspan font-family="JetBrains Mono, monospace">A–R–B–R–C</tspan> and <tspan font-family="JetBrains Mono, monospace">A–R–C  +  B–R</tspan>.</text>
</svg>
