<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 320" role="img" aria-labelledby="t d">
  <title id="t">Scaffolding with paired and mate-pair reads</title>
  <desc id="d">Top: three contigs with zig-zag gaps between them. Middle: paired read arcs bridge the gaps (2 kb insert between contigs 1–2, 10 kb insert between contigs 2–3). Bottom: a single scaffold bar with N-region placeholders between ordered contigs.</desc>

  <!-- ===== TOP: contigs with zig-zag gaps ===== -->
  <text x="40" y="30" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">CONTIGS · UNORDERED, UNORIENTED</text>

  <g stroke="#0a0a0a" stroke-width="2.5" fill="#f4f3ee">
    <rect x="40"  y="60" width="240" height="24" rx="3"/>
    <rect x="360" y="60" width="220" height="24" rx="3"/>
    <rect x="660" y="60" width="280" height="24" rx="3"/>
  </g>
  <g font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a" text-anchor="middle" letter-spacing="0.05em">
    <text x="160" y="78">CONTIG 1</text>
    <text x="470" y="78">CONTIG 2</text>
    <text x="800" y="78">CONTIG 3</text>
  </g>

  <!-- Zig-zag gaps -->
  <g stroke="#8a8a85" stroke-width="1.5" fill="none">
    <path d="M 280 72 L 290 64 L 300 80 L 310 64 L 320 80 L 330 64 L 340 80 L 360 72"/>
    <path d="M 580 72 L 592 64 L 604 80 L 616 64 L 628 80 L 640 64 L 652 80 L 660 72"/>
  </g>

  <!-- ===== MIDDLE: mate-pair arcs ===== -->
  <text x="40" y="130" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">PAIRED READS BRIDGE THE GAPS</text>

  <!-- Arc 1: contig 1 → contig 2 (2kb insert) -->
  <g stroke="#1e3a8a" stroke-width="1" stroke-dasharray="3 2" fill="none">
    <path d="M 230 95 Q 320 170 390 95"/>
    <path d="M 250 95 Q 340 180 410 95"/>
  </g>
  <!-- Small read tick marks at arc endpoints -->
  <g fill="#1e3a8a">
    <rect x="226" y="92" width="8" height="6"/>
    <rect x="246" y="92" width="8" height="6"/>
    <rect x="386" y="92" width="8" height="6"/>
    <rect x="406" y="92" width="8" height="6"/>
  </g>
  <text x="320" y="195" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" font-weight="600">insert ≈ 2 kb</text>

  <!-- Arc 2: contig 2 → contig 3 (10kb insert) -->
  <g stroke="#1e3a8a" stroke-width="1" stroke-dasharray="3 2" fill="none">
    <path d="M 500 95 Q 620 195 720 95"/>
    <path d="M 520 95 Q 640 205 740 95"/>
  </g>
  <g fill="#1e3a8a">
    <rect x="496" y="92" width="8" height="6"/>
    <rect x="516" y="92" width="8" height="6"/>
    <rect x="716" y="92" width="8" height="6"/>
    <rect x="736" y="92" width="8" height="6"/>
  </g>
  <text x="620" y="220" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" font-weight="600">insert ≈ 10 kb</text>

  <!-- ===== BOTTOM: scaffold ===== -->
  <text x="40" y="245" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">SCAFFOLD · ORDERED &amp; ORIENTED, GAPS FILLED WITH N×</text>

  <g stroke="#0a0a0a" stroke-width="2.5">
    <rect x="40"  y="265" width="240" height="24" rx="3" fill="#f4f3ee"/>
    <rect x="280" y="265" width="80"  height="24" rx="0" fill="#ebeae3" stroke-dasharray="3 2"/>
    <rect x="360" y="265" width="220" height="24" rx="3" fill="#f4f3ee"/>
    <rect x="580" y="265" width="80"  height="24" rx="0" fill="#ebeae3" stroke-dasharray="3 2"/>
    <rect x="660" y="265" width="280" height="24" rx="3" fill="#f4f3ee"/>
  </g>

  <g font-family="Inter, sans-serif" font-size="11" fill="#0a0a0a" text-anchor="middle" letter-spacing="0.05em">
    <text x="160" y="283" font-weight="600">CONTIG 1</text>
    <text x="470" y="283" font-weight="600">CONTIG 2</text>
    <text x="800" y="283" font-weight="600">CONTIG 3</text>
    <text x="320" y="283" font-family="JetBrains Mono, monospace" font-size="10" fill="#8a8a85">NN×2k</text>
    <text x="620" y="283" font-family="JetBrains Mono, monospace" font-size="10" fill="#8a8a85">NN×10k</text>
  </g>

  <!-- Scaffold label bracket -->
  <g stroke="#525252" stroke-width="1" fill="none">
    <path d="M 40 300 L 40 306 L 940 306 L 940 300"/>
  </g>
  <text x="490" y="318" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#525252">SCAFFOLD · one ordered chain, gap length estimated from insert size</text>
</svg>
