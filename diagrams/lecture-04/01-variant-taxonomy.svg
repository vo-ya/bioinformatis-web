<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-labelledby="t d">
  <title id="t">Variant taxonomy and size spectrum</title>
  <desc id="d">Log-scale size axis from 1 bp to 10 Mb. Four coloured horizontal bins stacked along it: SNVs at 1 bp, INDELs at 1–50 bp, SVs at 50 bp to 10 Mb, CNVs at 1 kb to 10 Mb. Per-genome counts annotated above each bin.</desc>

  <!-- Kicker -->
  <text x="450" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">VARIANT CLASSES · SIZE × PER-GENOME COUNT</text>

  <!-- Log size axis -->
  <!-- log10 positions: 0=1bp, 1=10bp, 2=100bp, 3=1kb, 4=10kb, 5=100kb, 6=1Mb, 7=10Mb -->
  <!-- Map: x = 70 + log10(size) * 95. Range: 70..735 for 0..7. -->
  <g stroke="#c4c1b6" stroke-width="1" fill="none">
    <line x1="70" y1="280" x2="830" y2="280"/>
  </g>
  <g font-family="JetBrains Mono, monospace" font-size="10" fill="#8a8a85" text-anchor="middle">
    <g stroke="#c4c1b6" stroke-width="1">
      <line x1="70"  y1="276" x2="70"  y2="284"/>
      <line x1="165" y1="276" x2="165" y2="284"/>
      <line x1="260" y1="276" x2="260" y2="284"/>
      <line x1="355" y1="276" x2="355" y2="284"/>
      <line x1="450" y1="276" x2="450" y2="284"/>
      <line x1="545" y1="276" x2="545" y2="284"/>
      <line x1="640" y1="276" x2="640" y2="284"/>
      <line x1="735" y1="276" x2="735" y2="284"/>
    </g>
    <text x="70"  y="298">1 bp</text>
    <text x="165" y="298">10 bp</text>
    <text x="260" y="298">100 bp</text>
    <text x="355" y="298">1 kb</text>
    <text x="450" y="298">10 kb</text>
    <text x="545" y="298">100 kb</text>
    <text x="640" y="298">1 Mb</text>
    <text x="735" y="298">10 Mb</text>
  </g>
  <text x="450" y="320" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#525252">size (log scale)</text>

  <!-- Bins, stacked vertically above the axis -->
  <!-- Per-genome count labels above bin -->

  <!-- SNV: point at 1 bp -->
  <g>
    <rect x="66" y="72" width="10" height="22" rx="2" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="71" y="66" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">~3,000,000</text>
    <text x="105" y="86" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">SNVs</text>
    <text x="105" y="100" font-family="Inter, sans-serif" font-size="10" fill="#525252">single-base substitution</text>
    <text x="105" y="112" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">missense · nonsense · silent · splice</text>
  </g>

  <!-- INDEL: 1 bp to 50 bp → x 70..239 -->
  <g>
    <rect x="70" y="132" width="169" height="22" rx="2" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="155" y="126" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">~500,000</text>
    <text x="260" y="146" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">INDELs</text>
    <text x="260" y="160" font-family="Inter, sans-serif" font-size="10" fill="#525252">insertion / deletion (1–50 bp)</text>
    <text x="260" y="172" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">frameshift · in-frame</text>
  </g>

  <!-- SV: 50 bp (log10=1.7, x=231.5) to 10 Mb (x=735) -->
  <g>
    <rect x="231" y="192" width="504" height="22" rx="2" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="483" y="186" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">~25,000 per haplotype (long-read)</text>
    <text x="750" y="206" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">SVs</text>
    <text x="750" y="220" font-family="Inter, sans-serif" font-size="10" fill="#525252">DEL · INS · INV · DUP · TRA</text>
    <text x="750" y="232" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">gene disruption · fusion</text>
  </g>

  <!-- CNV: 1 kb to 10 Mb → x 355..735 -->
  <g>
    <rect x="355" y="244" width="380" height="22" rx="2" fill="#f4f3ee" stroke="#1e3a8a" stroke-width="1.5" stroke-dasharray="4 2"/>
    <text x="545" y="238" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">~100 large events</text>
    <text x="750" y="258" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">CNVs</text>
    <text x="750" y="270" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85">sub-class of SVs (dosage change)</text>
  </g>

  <!-- Footer caption -->
  <text x="450" y="348" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85">SNVs dominate by count; SVs dominate in total affected bases.</text>
</svg>
