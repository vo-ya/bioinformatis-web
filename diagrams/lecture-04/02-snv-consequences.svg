<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" role="img" aria-labelledby="t d">
  <title id="t">SNV consequences in coding regions</title>
  <desc id="d">A short mRNA segment with three adjacent codons at the top; four panels below show the four SNV-consequence classes (silent, missense, nonsense, splice-region) with the resulting codon and amino acid change.</desc>

  <!-- Top: reference codons -->
  <text x="40" y="32" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">REFERENCE · THREE CODONS</text>

  <g font-family="JetBrains Mono, monospace" font-size="20" font-weight="600" text-anchor="middle">
    <!-- TGG-CCT-GAG  (Trp-Pro-Glu) -->
    <text x="140" y="72" fill="#0d7377">T</text>
    <text x="170" y="72" fill="#b45309">G</text>
    <text x="200" y="72" fill="#b45309">G</text>
    <text x="270" y="72" fill="#2d7a3e">C</text>
    <text x="300" y="72" fill="#2d7a3e">C</text>
    <text x="330" y="72" fill="#0d7377">T</text>
    <text x="400" y="72" fill="#b45309">G</text>
    <text x="430" y="72" fill="#c4342c">A</text>
    <text x="460" y="72" fill="#b45309">G</text>
  </g>
  <!-- Codon boundaries -->
  <g stroke="#c4c1b6" stroke-width="1" stroke-dasharray="2 2">
    <line x1="230" y1="50" x2="230" y2="90"/>
    <line x1="360" y1="50" x2="360" y2="90"/>
  </g>
  <!-- Amino acid labels -->
  <g font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#525252" text-anchor="middle">
    <text x="170" y="108">Trp (W)</text>
    <text x="300" y="108">Pro (P)</text>
    <text x="430" y="108">Glu (E)</text>
  </g>

  <!-- Horizontal divider -->
  <line x1="40" y1="130" x2="820" y2="130" stroke="#e5e3dc" stroke-width="1"/>

  <!-- 4 panels below, 2x2 grid, each ~380x130 -->

  <!-- Panel 1: SILENT (TGG stays Trp if TGG→TGG, actually need a silent example. Let's use CCT→CCC, both Pro) -->
  <g>
    <text x="50" y="160" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#15803d" letter-spacing="0.12em">SILENT</text>
    <g font-family="JetBrains Mono, monospace" font-size="16" font-weight="600" text-anchor="middle">
      <text x="100" y="200" fill="#2d7a3e">C</text>
      <text x="125" y="200" fill="#2d7a3e">C</text>
      <rect x="140" y="186" width="22" height="20" rx="3" fill="#eef2ff"/>
      <text x="150" y="200" fill="#0d7377">T</text>
      <text x="195" y="200" font-size="14" fill="#525252">→</text>
      <text x="235" y="200" fill="#2d7a3e">C</text>
      <text x="260" y="200" fill="#2d7a3e">C</text>
      <rect x="275" y="186" width="22" height="20" rx="3" fill="#eef2ff"/>
      <text x="285" y="200" fill="#2d7a3e">C</text>
    </g>
    <g font-family="Inter, sans-serif" font-size="11" fill="#525252" text-anchor="middle">
      <text x="125" y="228">Pro (P)</text>
      <text x="195" y="228">→</text>
      <text x="260" y="228">Pro (P)</text>
    </g>
    <text x="195" y="250" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#15803d" font-weight="500">same amino acid, no protein change</text>
  </g>

  <!-- Panel 2: MISSENSE (GAG Glu → GTG Val) -->
  <g>
    <text x="450" y="160" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#b45309" letter-spacing="0.12em">MISSENSE</text>
    <g font-family="JetBrains Mono, monospace" font-size="16" font-weight="600" text-anchor="middle">
      <text x="500" y="200" fill="#b45309">G</text>
      <rect x="515" y="186" width="22" height="20" rx="3" fill="#eef2ff"/>
      <text x="525" y="200" fill="#c4342c">A</text>
      <text x="550" y="200" fill="#b45309">G</text>
      <text x="595" y="200" font-size="14" fill="#525252">→</text>
      <text x="635" y="200" fill="#b45309">G</text>
      <rect x="650" y="186" width="22" height="20" rx="3" fill="#eef2ff"/>
      <text x="660" y="200" fill="#0d7377">T</text>
      <text x="685" y="200" fill="#b45309">G</text>
    </g>
    <g font-family="Inter, sans-serif" font-size="11" fill="#525252" text-anchor="middle">
      <text x="525" y="228">Glu (E)</text>
      <text x="595" y="228">→</text>
      <text x="660" y="228">Val (V)</text>
    </g>
    <text x="595" y="250" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#b45309" font-weight="500">amino acid changes · impact varies</text>
  </g>

  <!-- Panel 3: NONSENSE (TGG Trp → TGA STOP) -->
  <g>
    <text x="50" y="295" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#b91c1c" letter-spacing="0.12em">NONSENSE</text>
    <g font-family="JetBrains Mono, monospace" font-size="16" font-weight="600" text-anchor="middle">
      <text x="100" y="335" fill="#0d7377">T</text>
      <text x="125" y="335" fill="#b45309">G</text>
      <rect x="140" y="321" width="22" height="20" rx="3" fill="#eef2ff"/>
      <text x="150" y="335" fill="#b45309">G</text>
      <text x="195" y="335" font-size="14" fill="#525252">→</text>
      <text x="235" y="335" fill="#0d7377">T</text>
      <text x="260" y="335" fill="#b45309">G</text>
      <rect x="275" y="321" width="22" height="20" rx="3" fill="#eef2ff"/>
      <text x="285" y="335" fill="#c4342c">A</text>
    </g>
    <g font-family="Inter, sans-serif" font-size="11" fill="#525252" text-anchor="middle">
      <text x="125" y="363">Trp (W)</text>
      <text x="195" y="363">→</text>
      <text x="260" y="363" font-weight="600" fill="#b91c1c">STOP ⊗</text>
    </g>
    <text x="195" y="385" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#b91c1c" font-weight="500">premature stop · truncated protein</text>
  </g>

  <!-- Panel 4: SPLICE-REGION -->
  <g>
    <text x="450" y="295" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#7c3aed" letter-spacing="0.12em">SPLICE-REGION</text>
    <!-- Show: ...exon | GT....AG | exon... with a mark at GT donor disrupted -->
    <g font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" text-anchor="middle">
      <text x="500" y="335" fill="#525252">exon</text>
      <line x1="530" y1="320" x2="530" y2="350" stroke="#c4c1b6" stroke-width="1" stroke-dasharray="3 2"/>
      <rect x="538" y="324" width="20" height="18" rx="3" fill="#eef2ff"/>
      <text x="548" y="336" fill="#b45309">G</text>
      <rect x="558" y="324" width="20" height="18" rx="3" fill="#eef2ff"/>
      <text x="568" y="336" fill="#0d7377">T</text>
      <text x="605" y="336" font-size="10" fill="#525252">intron</text>
      <text x="655" y="336" fill="#c4342c">A</text>
      <text x="670" y="336" fill="#b45309">G</text>
      <line x1="688" y1="320" x2="688" y2="350" stroke="#c4c1b6" stroke-width="1" stroke-dasharray="3 2"/>
      <text x="725" y="335" fill="#525252">exon</text>
    </g>
    <!-- Disruption arrow at GT -->
    <path d="M 548 318 L 548 310" stroke="#b91c1c" stroke-width="1.2"/>
    <text x="548" y="305" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b91c1c">GT → AT</text>
    <text x="610" y="385" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#7c3aed" font-weight="500">donor site disrupted · exon may be skipped</text>
  </g>

  <!-- Vertical divider between left and right panels -->
  <line x1="410" y1="140" x2="410" y2="400" stroke="#e5e3dc" stroke-width="1"/>
  <!-- Horizontal divider between top and bottom panels -->
  <line x1="40" y1="270" x2="820" y2="270" stroke="#e5e3dc" stroke-width="1"/>
</svg>
