<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" role="img" aria-labelledby="t d">
  <title id="t">Frameshift vs in-frame INDEL</title>
  <desc id="d">Three bands. Top: reference mRNA with codon boundaries and amino acid sequence. Middle: 3-bp deletion removing one whole codon, downstream protein intact. Bottom: 1-bp deletion, reading frame shifts, downstream codons scrambled until a premature stop.</desc>

  <!-- Top band: reference -->
  <text x="40" y="32" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">REFERENCE · 8 CODONS</text>

  <g font-family="JetBrains Mono, monospace" font-size="14" font-weight="500" text-anchor="middle">
    <!-- ATG GCA TCG GAA CAT GGC TTA ATG = M-A-S-E-H-G-L-M -->
    <g fill="#0a0a0a">
      <text x="70"  y="72">A</text><text x="90"  y="72">T</text><text x="110" y="72">G</text>
      <text x="140" y="72">G</text><text x="160" y="72">C</text><text x="180" y="72">A</text>
      <text x="210" y="72">T</text><text x="230" y="72">C</text><text x="250" y="72">G</text>
      <text x="280" y="72">G</text><text x="300" y="72">A</text><text x="320" y="72">A</text>
      <text x="350" y="72">C</text><text x="370" y="72">A</text><text x="390" y="72">T</text>
      <text x="420" y="72">G</text><text x="440" y="72">G</text><text x="460" y="72">C</text>
      <text x="490" y="72">T</text><text x="510" y="72">T</text><text x="530" y="72">A</text>
      <text x="560" y="72">A</text><text x="580" y="72">T</text><text x="600" y="72">G</text>
    </g>
  </g>
  <!-- Codon boundary ticks above -->
  <g stroke="#c4c1b6" stroke-width="1">
    <line x1="125" y1="55" x2="125" y2="63"/>
    <line x1="195" y1="55" x2="195" y2="63"/>
    <line x1="265" y1="55" x2="265" y2="63"/>
    <line x1="335" y1="55" x2="335" y2="63"/>
    <line x1="405" y1="55" x2="405" y2="63"/>
    <line x1="475" y1="55" x2="475" y2="63"/>
    <line x1="545" y1="55" x2="545" y2="63"/>
    <line x1="615" y1="55" x2="615" y2="63"/>
  </g>
  <!-- Amino acids -->
  <g font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#525252" text-anchor="middle">
    <text x="90" y="100">M</text>
    <text x="160" y="100">A</text>
    <text x="230" y="100">S</text>
    <text x="300" y="100">E</text>
    <text x="370" y="100">H</text>
    <text x="440" y="100">G</text>
    <text x="510" y="100">L</text>
    <text x="580" y="100">M</text>
  </g>

  <!-- Divider -->
  <line x1="40" y1="130" x2="820" y2="130" stroke="#e5e3dc" stroke-width="1"/>

  <!-- Middle band: in-frame 3-bp deletion (remove codon 4 "GAA") -->
  <text x="40" y="155" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#15803d" letter-spacing="0.12em">IN-FRAME DELETION · 3 BP (REMOVES ONE CODON)</text>

  <g font-family="JetBrains Mono, monospace" font-size="14" font-weight="500" text-anchor="middle">
    <g fill="#0a0a0a">
      <text x="70"  y="195">A</text><text x="90"  y="195">T</text><text x="110" y="195">G</text>
      <text x="140" y="195">G</text><text x="160" y="195">C</text><text x="180" y="195">A</text>
      <text x="210" y="195">T</text><text x="230" y="195">C</text><text x="250" y="195">G</text>
    </g>
    <!-- deletion: GAA struck through -->
    <g fill="#b91c1c" text-decoration="line-through">
      <text x="280" y="195">G</text><text x="300" y="195">A</text><text x="320" y="195">A</text>
    </g>
    <line x1="272" y1="190" x2="330" y2="190" stroke="#b91c1c" stroke-width="2"/>
    <g fill="#0a0a0a">
      <text x="350" y="195">C</text><text x="370" y="195">A</text><text x="390" y="195">T</text>
      <text x="420" y="195">G</text><text x="440" y="195">G</text><text x="460" y="195">C</text>
      <text x="490" y="195">T</text><text x="510" y="195">T</text><text x="530" y="195">A</text>
      <text x="560" y="195">A</text><text x="580" y="195">T</text><text x="600" y="195">G</text>
    </g>
  </g>
  <!-- Amino acids after deletion: M-A-S-(-)-H-G-L-M -->
  <g font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#525252" text-anchor="middle">
    <text x="90" y="220">M</text>
    <text x="160" y="220">A</text>
    <text x="230" y="220">S</text>
    <text x="300" y="220" font-weight="700" fill="#b91c1c">—</text>
    <text x="370" y="220">H</text>
    <text x="440" y="220">G</text>
    <text x="510" y="220">L</text>
    <text x="580" y="220">M</text>
  </g>
  <text x="640" y="195" font-family="Inter, sans-serif" font-size="10" fill="#15803d" font-weight="500">frame preserved · one aa missing</text>

  <!-- Divider -->
  <line x1="40" y1="240" x2="820" y2="240" stroke="#e5e3dc" stroke-width="1"/>

  <!-- Bottom band: 1-bp frameshift deletion (remove first A) -->
  <text x="40" y="265" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#b91c1c" letter-spacing="0.12em">FRAMESHIFT DELETION · 1 BP (READING FRAME SHIFTS)</text>

  <g font-family="JetBrains Mono, monospace" font-size="14" font-weight="500" text-anchor="middle">
    <g fill="#0a0a0a">
      <text x="70"  y="305">A</text><text x="90"  y="305">T</text><text x="110" y="305">G</text>
      <text x="140" y="305">G</text><text x="160" y="305">C</text><text x="180" y="305">A</text>
      <text x="210" y="305">T</text><text x="230" y="305">C</text><text x="250" y="305">G</text>
    </g>
    <!-- remove 1 G at position after TCG; everything downstream shifts -->
    <g fill="#b91c1c" text-decoration="line-through">
      <text x="280" y="305">G</text>
    </g>
    <line x1="272" y1="300" x2="291" y2="300" stroke="#b91c1c" stroke-width="2"/>
    <!-- shifted codons: downstream scrambled, shown with warning tint -->
    <g fill="#0a0a0a">
      <text x="300" y="305">A</text><text x="320" y="305">A</text><text x="340" y="305">C</text>
      <text x="360" y="305">A</text><text x="380" y="305">T</text><text x="400" y="305">G</text>
      <text x="420" y="305">G</text><text x="440" y="305">C</text><text x="460" y="305">T</text>
      <text x="480" y="305">T</text><text x="500" y="305">A</text><text x="520" y="305">A</text>
    </g>
    <!-- warning tint behind shifted region -->
    <rect x="290" y="290" width="245" height="22" fill="#fef3c7" stroke="none" opacity="0.5"/>
  </g>
  <!-- Amino acids: M-A-S-N-M-A-L-STOP -->
  <g font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#525252" text-anchor="middle">
    <text x="90" y="330">M</text>
    <text x="160" y="330">A</text>
    <text x="230" y="330">S</text>
    <text x="320" y="330" fill="#b45309">N</text>
    <text x="390" y="330" fill="#b45309">M</text>
    <text x="460" y="330" fill="#b45309">A</text>
    <text x="530" y="330" font-weight="700" fill="#b91c1c">STOP ⊗</text>
  </g>
  <text x="320" y="355" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#b45309">scrambled downstream</text>
  <text x="530" y="355" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b91c1c">premature stop · truncated protein</text>
</svg>
