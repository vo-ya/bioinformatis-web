<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" role="img" aria-labelledby="t d">
  <title id="t">Anatomy of a samtools pileup</title>
  <desc id="d">A samtools pileup line with six tab-separated columns, each annotated with its meaning: chromosome, position, reference base, depth, read bases, and base qualities. An inset panel lists the special tokens caret-right, dollar, plus-N, minus-N for read start, read end, and INDELs.</desc>

  <!-- Kicker -->
  <text x="460" y="32" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">samtools mpileup · ONE LINE PER GENOME POSITION</text>

  <!-- Pileup line, tab-separated with gaps for visual clarity -->
  <g font-family="JetBrains Mono, monospace" font-size="16" font-weight="500">
    <rect x="40" y="60" width="840" height="50" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="1" rx="4"/>
    <!-- Columns with approximate x positions -->
    <text x="70" y="92" fill="#0a0a0a">chr1</text>
    <text x="155" y="92" fill="#0a0a0a">1000</text>
    <text x="245" y="92" fill="#0a0a0a">A</text>
    <text x="315" y="92" fill="#0a0a0a">12</text>
    <text x="390" y="92" fill="#0a0a0a">,,..,A,..,aA,</text>
    <text x="600" y="92" fill="#0a0a0a">IIIIII!IIIII</text>
  </g>

  <!-- Leader lines -->
  <g stroke="#8a8a85" stroke-width="0.8" stroke-dasharray="2 2">
    <line x1="85"  y1="110" x2="85"  y2="155"/>
    <line x1="170" y1="110" x2="170" y2="155"/>
    <line x1="255" y1="110" x2="255" y2="155"/>
    <line x1="325" y1="110" x2="325" y2="205"/>
    <line x1="450" y1="110" x2="450" y2="155"/>
    <line x1="650" y1="110" x2="650" y2="255"/>
  </g>

  <!-- Callouts -->
  <g font-family="Inter, sans-serif" fill="#525252">
    <!-- 1. Chromosome -->
    <text x="85" y="175" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">1. chromosome</text>
    <text x="85" y="190" text-anchor="middle" font-size="10">reference contig name</text>

    <!-- 2. Position -->
    <text x="170" y="175" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">2. position</text>
    <text x="170" y="190" text-anchor="middle" font-size="10">1-based</text>

    <!-- 3. Reference base -->
    <text x="255" y="175" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">3. reference base</text>
    <text x="255" y="190" text-anchor="middle" font-size="10">at that position</text>

    <!-- 4. Depth -->
    <text x="325" y="225" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">4. depth</text>
    <text x="325" y="240" text-anchor="middle" font-size="10">reads overlapping</text>

    <!-- 5. Read bases -->
    <text x="450" y="175" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">5. read bases</text>
    <text x="450" y="190" text-anchor="middle" font-size="10">one char per read</text>
    <text x="450" y="210" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">. , = match REF (±strand)</text>
    <text x="450" y="224" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#c4342c">A C G T = mismatch</text>

    <!-- 6. Base qualities -->
    <text x="650" y="275" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">6. base qualities</text>
    <text x="650" y="290" text-anchor="middle" font-size="10">Phred ASCII (char − 33)</text>
  </g>

  <!-- Divider -->
  <line x1="40" y1="310" x2="880" y2="310" stroke="#e5e3dc" stroke-width="1"/>

  <!-- Inset: special tokens -->
  <g>
    <rect x="60" y="320" width="800" height="70" rx="6" fill="#ebeae3" stroke="#c4c1b6" stroke-width="1"/>
    <text x="80" y="340" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">SPECIAL TOKENS IN THE READ-BASES COLUMN</text>

    <g font-family="JetBrains Mono, monospace" font-size="12" font-weight="500">
      <text x="90" y="365" fill="#0a0a0a">^]</text>
      <text x="90" y="380" font-family="Inter, sans-serif" font-size="9" fill="#525252">read start (mapq next)</text>

      <text x="260" y="365" fill="#0a0a0a">$</text>
      <text x="260" y="380" font-family="Inter, sans-serif" font-size="9" fill="#525252">read end</text>

      <text x="410" y="365" fill="#0a0a0a">+3AAA</text>
      <text x="410" y="380" font-family="Inter, sans-serif" font-size="9" fill="#525252">insertion of 3 bases after this position</text>

      <text x="680" y="365" fill="#0a0a0a">-2TT</text>
      <text x="680" y="380" font-family="Inter, sans-serif" font-size="9" fill="#525252">deletion of 2 bases after this position</text>
    </g>
  </g>
</svg>
