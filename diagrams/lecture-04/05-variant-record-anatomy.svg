<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" role="img" aria-labelledby="t d">
  <title id="t">Anatomy of a variant call at one position</title>
  <desc id="d">Top: 17 reads stacked vertically at one reference position, 12 carrying A and 5 carrying G. Middle: the derivation of VCF fields from this pileup column. Bottom: the resulting VCF line in tab-separated format.</desc>

  <!-- Kicker -->
  <text x="40" y="30" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">ONE POSITION · FROM PILEUP COLUMN TO VCF RECORD</text>

  <!-- Top: pileup column snapshot -->
  <g>
    <!-- Reference label below -->
    <text x="150" y="64" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#525252" letter-spacing="0.08em">17 READS AT chr1:1000</text>

    <!-- Reads stacked -->
    <g font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" text-anchor="middle">
      <!-- 12 reads carrying A -->
      <g fill="#c4342c">
        <rect x="60" y="72"  width="180" height="14" rx="1" fill="none" stroke="#1e3a8a" stroke-width="1"/>
        <text x="150" y="84">A</text>
        <rect x="60" y="88"  width="180" height="14" rx="1" fill="none" stroke="#1e3a8a" stroke-width="1"/>
        <text x="150" y="100">A</text>
        <rect x="60" y="104" width="180" height="14" rx="1" fill="none" stroke="#1e3a8a" stroke-width="1"/>
        <text x="150" y="116">A</text>
        <rect x="60" y="120" width="180" height="14" rx="1" fill="none" stroke="#1e3a8a" stroke-width="1"/>
        <text x="150" y="132">A</text>
        <rect x="60" y="136" width="180" height="14" rx="1" fill="none" stroke="#1e3a8a" stroke-width="1"/>
        <text x="150" y="148">A</text>
        <rect x="60" y="152" width="180" height="14" rx="1" fill="none" stroke="#1e3a8a" stroke-width="1"/>
        <text x="150" y="164">A</text>
        <rect x="60" y="168" width="180" height="14" rx="1" fill="none" stroke="#1e3a8a" stroke-width="1"/>
        <text x="150" y="180">A</text>
        <rect x="60" y="184" width="180" height="14" rx="1" fill="none" stroke="#1e3a8a" stroke-width="1"/>
        <text x="150" y="196">A</text>
        <rect x="60" y="200" width="180" height="14" rx="1" fill="none" stroke="#1e3a8a" stroke-width="1"/>
        <text x="150" y="212">A</text>
        <rect x="60" y="216" width="180" height="14" rx="1" fill="none" stroke="#1e3a8a" stroke-width="1"/>
        <text x="150" y="228">A</text>
        <rect x="60" y="232" width="180" height="14" rx="1" fill="none" stroke="#1e3a8a" stroke-width="1"/>
        <text x="150" y="244">A</text>
        <rect x="60" y="248" width="180" height="14" rx="1" fill="none" stroke="#1e3a8a" stroke-width="1"/>
        <text x="150" y="260">A</text>
      </g>
      <!-- 5 reads carrying G -->
      <g fill="#b45309">
        <rect x="60" y="264" width="180" height="14" rx="1" fill="none" stroke="#1e3a8a" stroke-width="1"/>
        <text x="150" y="276">G</text>
        <rect x="60" y="280" width="180" height="14" rx="1" fill="none" stroke="#1e3a8a" stroke-width="1"/>
        <text x="150" y="292">G</text>
        <rect x="60" y="296" width="180" height="14" rx="1" fill="none" stroke="#1e3a8a" stroke-width="1"/>
        <text x="150" y="308">G</text>
        <rect x="60" y="312" width="180" height="14" rx="1" fill="none" stroke="#1e3a8a" stroke-width="1"/>
        <text x="150" y="324">G</text>
        <rect x="60" y="328" width="180" height="14" rx="1" fill="none" stroke="#1e3a8a" stroke-width="1"/>
        <text x="150" y="340">G</text>
      </g>
    </g>

    <!-- REF base below the reads -->
    <text x="150" y="360" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700" fill="#0a0a0a" text-anchor="middle">REF = A</text>
  </g>

  <!-- Middle: derivation table -->
  <g transform="translate(300 72)">
    <rect x="0" y="0" width="530" height="240" rx="6" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="1"/>

    <!-- Header row -->
    <text x="15"  y="22" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.1em">FIELD</text>
    <text x="110" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.1em">VALUE</text>
    <text x="230" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.1em">HOW COMPUTED</text>
    <line x1="0" y1="30" x2="530" y2="30" stroke="#c4c1b6" stroke-width="1"/>

    <!-- Rows -->
    <g font-family="JetBrains Mono, monospace" font-size="11">
      <text x="15"  y="52" fill="#1e3a8a" font-weight="600">REF</text>
      <text x="110" y="52" fill="#0a0a0a">A</text>
      <text x="230" y="52" font-family="Inter, sans-serif" font-size="10" fill="#525252">reference base</text>

      <text x="15"  y="72" fill="#1e3a8a" font-weight="600">ALT</text>
      <text x="110" y="72" fill="#0a0a0a">G</text>
      <text x="230" y="72" font-family="Inter, sans-serif" font-size="10" fill="#525252">most common non-REF base</text>

      <text x="15"  y="92" fill="#1e3a8a" font-weight="600">DP</text>
      <text x="110" y="92" fill="#0a0a0a">17</text>
      <text x="230" y="92" font-family="Inter, sans-serif" font-size="10" fill="#525252">total reads at position</text>

      <text x="15"  y="112" fill="#1e3a8a" font-weight="600">AD</text>
      <text x="110" y="112" fill="#0a0a0a">12, 5</text>
      <text x="230" y="112" font-family="Inter, sans-serif" font-size="10" fill="#525252">REF reads, ALT reads</text>

      <text x="15"  y="132" fill="#1e3a8a" font-weight="600">VAF</text>
      <text x="110" y="132" fill="#0a0a0a">0.294</text>
      <text x="230" y="132" font-family="Inter, sans-serif" font-size="10" fill="#525252">AD[1] / DP = 5 / 17</text>

      <text x="15"  y="152" fill="#1e3a8a" font-weight="600">GT</text>
      <text x="110" y="152" fill="#0a0a0a">0/1</text>
      <text x="230" y="152" font-family="Inter, sans-serif" font-size="10" fill="#525252">heterozygous (VAF near 0.5)</text>

      <text x="15"  y="172" fill="#1e3a8a" font-weight="600">GQ</text>
      <text x="110" y="172" fill="#0a0a0a">95</text>
      <text x="230" y="172" font-family="Inter, sans-serif" font-size="10" fill="#525252">Phred-scaled genotype confidence</text>

      <text x="15"  y="192" fill="#1e3a8a" font-weight="600">QUAL</text>
      <text x="110" y="192" fill="#0a0a0a">420</text>
      <text x="230" y="192" font-family="Inter, sans-serif" font-size="10" fill="#525252">Phred-scaled site quality</text>

      <text x="15"  y="212" fill="#1e3a8a" font-weight="600">FILTER</text>
      <text x="110" y="212" fill="#15803d" font-weight="600">PASS</text>
      <text x="230" y="212" font-family="Inter, sans-serif" font-size="10" fill="#525252">all caller filters survived</text>
    </g>
  </g>

  <!-- Bottom: VCF line -->
  <g transform="translate(0 340)">
    <rect x="40" y="40" width="790" height="40" rx="4" fill="#ebeae3" stroke="#c4c1b6" stroke-width="1"/>
    <text x="50" y="35" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.1em">RESULTING VCF LINE</text>
    <text x="50" y="65" font-family="JetBrains Mono, monospace" font-size="12" fill="#0a0a0a">chr1  1000  .  A  G  420  PASS  DP=17;AF=0.294  GT:AD:DP:GQ  0/1:12,5:17:95</text>
  </g>
</svg>
