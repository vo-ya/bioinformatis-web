<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" role="img" aria-labelledby="t d">
  <title id="t">Bayesian genotyping at one position</title>
  <desc id="d">A pileup of 10 reads (6 REF, 4 ALT); likelihoods computed for genotypes 0/0, 0/1, 1/1; a prior bar chart from typical human genotype priors; the resulting posterior bar chart with the MAP genotype highlighted.</desc>

  <defs>
    <marker id="arrow-acc-06" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>

  <!-- Kicker -->
  <text x="40" y="30" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">BAYESIAN GENOTYPING · P(G|D) ∝ P(D|G) · P(G)</text>

  <!-- Top-left: pileup column (10 reads, 6 REF A, 4 ALT G, all Q30) -->
  <g>
    <text x="90" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">10 READS · ALL Q30</text>
    <g font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" text-anchor="middle">
      <g fill="#c4342c">
        <text x="90" y="80">A</text><text x="90" y="98">A</text><text x="90" y="116">A</text>
        <text x="90" y="134">A</text><text x="90" y="152">A</text><text x="90" y="170">A</text>
      </g>
      <g fill="#b45309">
        <text x="90" y="188">G</text><text x="90" y="206">G</text><text x="90" y="224">G</text><text x="90" y="242">G</text>
      </g>
    </g>
    <text x="90" y="266" font-family="JetBrains Mono, monospace" font-size="12" fill="#0a0a0a" text-anchor="middle">REF=A</text>
  </g>

  <!-- Middle: likelihoods for three genotypes -->
  <g transform="translate(180 60)">
    <text x="200" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">LIKELIHOODS · P(D | G)</text>

    <g font-family="JetBrains Mono, monospace" font-size="11">
      <!-- Row 1: 0/0 -->
      <text x="20"  y="30" fill="#1e3a8a" font-weight="600">P(D | 0/0)</text>
      <text x="150" y="30" fill="#0a0a0a">= (1−ε)⁶ · (ε/3)⁴</text>
      <text x="340" y="30" fill="#525252">≈ 10⁻¹⁰·¹</text>

      <!-- Row 2: 0/1 -->
      <text x="20"  y="56" fill="#1e3a8a" font-weight="600">P(D | 0/1)</text>
      <text x="150" y="56" fill="#0a0a0a">= (0.5)¹⁰</text>
      <text x="340" y="56" fill="#15803d" font-weight="700">≈ 10⁻³·⁰ ← MAP</text>

      <!-- Row 3: 1/1 -->
      <text x="20"  y="82" fill="#1e3a8a" font-weight="600">P(D | 1/1)</text>
      <text x="150" y="82" fill="#0a0a0a">= (ε/3)⁶ · (1−ε)⁴</text>
      <text x="340" y="82" fill="#525252">≈ 10⁻¹²·³</text>
    </g>

    <text x="200" y="112" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85">ε = 10⁻³ for Q30 reads</text>
  </g>

  <!-- Prior row -->
  <g transform="translate(180 190)">
    <text x="200" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">PRIOR · P(G) FROM POPULATION DATA</text>

    <!-- Three bars -->
    <g fill="#f4f3ee" stroke="#1e3a8a" stroke-width="1">
      <rect x="50"  y="10" width="60" height="50"/>
      <rect x="170" y="50" width="60" height="10"/>
      <rect x="290" y="56" width="60" height="4"/>
    </g>
    <g font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a" text-anchor="middle">
      <text x="80"  y="75">P(0/0) ≈ 0.999</text>
      <text x="200" y="75">P(0/1) ≈ 7e-4</text>
      <text x="320" y="75">P(1/1) ≈ 2e-4</text>
    </g>
  </g>

  <!-- Arrow from likelihood + prior → posterior -->
  <g>
    <text x="600" y="140" font-family="JetBrains Mono, monospace" font-size="20" fill="#525252">×</text>
    <line x1="600" y1="160" x2="600" y2="310" stroke="#525252" stroke-width="1" marker-end="url(#arrow-acc-06)"/>
    <text x="615" y="240" font-family="Inter, sans-serif" font-size="11" fill="#525252">normalise</text>
  </g>

  <!-- Posterior row -->
  <g transform="translate(180 310)">
    <text x="200" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">POSTERIOR · P(G | D)</text>

    <g>
      <!-- 0/0 bar: very small, even with large prior -->
      <rect x="50"  y="55" width="60" height="5" fill="#f4f3ee" stroke="#1e3a8a" stroke-width="1"/>
      <!-- 0/1 bar: tall, MAP -->
      <rect x="170" y="10" width="60" height="50" fill="#eef2ff" stroke="#1e3a8a" stroke-width="3"/>
      <!-- 1/1 bar: tiny -->
      <rect x="290" y="58" width="60" height="2" fill="#f4f3ee" stroke="#1e3a8a" stroke-width="1"/>
    </g>
    <g font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a" text-anchor="middle">
      <text x="80"  y="75">P(0/0|D) ≈ 5e-12</text>
      <text x="200" y="75" font-weight="700" fill="#1e3a8a">P(0/1|D) ≈ 1.0</text>
      <text x="320" y="75">P(1/1|D) ≈ 3e-15</text>
    </g>
    <text x="200" y="96" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#15803d">MAP → 0/1 (heterozygous) · GQ = 95</text>
  </g>

  <!-- Side annotation -->
  <g transform="translate(600 310)">
    <rect x="0" y="0" width="240" height="80" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
    <text x="12" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">caller output</text>
    <text x="12" y="38" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">picks the MAP genotype</text>
    <text x="12" y="52" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">GQ = Phred-scaled ratio of</text>
    <text x="12" y="66" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">MAP posterior to runner-up</text>
  </g>
</svg>
