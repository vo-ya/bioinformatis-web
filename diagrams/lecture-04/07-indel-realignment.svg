<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" role="img" aria-labelledby="t d">
  <title id="t">INDEL misalignment and local realignment</title>
  <desc id="d">Top: six reads aligned to a reference under naive alignment, where a true 2 bp deletion is expressed as a cluster of 5 false SNVs per read. Bottom: after local realignment, reads show a single clean 2 bp gap at the true deletion position and no false SNVs.</desc>

  <defs>
    <marker id="arrow-acc-07" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <!-- Top band: naive alignment -->
  <text x="40" y="30" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#b91c1c" letter-spacing="0.12em">NAIVE ALIGNMENT · DELETION LOOKS LIKE CLUSTERED SNVs</text>

  <!-- Reference -->
  <g font-family="JetBrains Mono, monospace" font-size="13" font-weight="500">
    <text x="40" y="60" fill="#525252" font-size="10" font-weight="600">REF</text>
    <text x="80" y="60" fill="#0a0a0a">A C G T A C G T A T T G C C A T A G C A T G C A T</text>
  </g>
  <!-- True deletion position marker -->
  <g>
    <line x1="225" y1="45" x2="225" y2="75" stroke="#b45309" stroke-width="1" stroke-dasharray="3 2"/>
    <line x1="245" y1="45" x2="245" y2="75" stroke="#b45309" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="235" y="44" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#b45309">true 2-bp del</text>
  </g>

  <!-- Reads (naive: 2-bp deletion expressed as cluster of mismatches) -->
  <g font-family="JetBrains Mono, monospace" font-size="13" font-weight="500">
    <!-- r1 -->
    <text x="40" y="90" fill="#525252" font-size="10">r1</text>
    <text x="80" y="90" fill="#0a0a0a">A C G T A C G T </text>
    <text x="196" y="90" fill="#b91c1c" font-weight="700">T T A T</text>
    <text x="258" y="90" fill="#0a0a0a">A G C</text>
    <!-- r2 -->
    <text x="40" y="108" fill="#525252" font-size="10">r2</text>
    <text x="80" y="108" fill="#0a0a0a">C G T A C G T </text>
    <text x="184" y="108" fill="#b91c1c" font-weight="700">T A T A</text>
    <text x="246" y="108" fill="#0a0a0a">A G C A</text>
    <!-- r3 -->
    <text x="40" y="126" fill="#525252" font-size="10">r3</text>
    <text x="95" y="126" fill="#0a0a0a">G T A C G T </text>
    <text x="184" y="126" fill="#b91c1c" font-weight="700">T A T A</text>
    <text x="246" y="126" fill="#0a0a0a">A G C A T</text>
    <!-- r4 -->
    <text x="40" y="144" fill="#525252" font-size="10">r4</text>
    <text x="95" y="144" fill="#0a0a0a">G T A C G T </text>
    <text x="184" y="144" fill="#b91c1c" font-weight="700">T A T A</text>
    <text x="246" y="144" fill="#0a0a0a">A G C A T</text>
    <!-- r5 -->
    <text x="40" y="162" fill="#525252" font-size="10">r5</text>
    <text x="112" y="162" fill="#0a0a0a">T A C G T </text>
    <text x="184" y="162" fill="#b91c1c" font-weight="700">T A T A</text>
    <text x="246" y="162" fill="#0a0a0a">A G C A T G</text>
    <!-- r6 -->
    <text x="40" y="180" fill="#525252" font-size="10">r6</text>
    <text x="112" y="180" fill="#0a0a0a">T A C G T </text>
    <text x="184" y="180" fill="#b91c1c" font-weight="700">T A T A</text>
    <text x="246" y="180" fill="#0a0a0a">A G C A T G</text>
  </g>

  <!-- Caller verdict (top) -->
  <g transform="translate(520 85)">
    <rect x="0" y="0" width="300" height="100" rx="6" fill="#fef2f2" stroke="#b91c1c" stroke-width="1"/>
    <text x="12" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#b91c1c">Caller verdict · naive</text>
    <g font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">
      <text x="12" y="42">chr1:?  A → T  (false SNV)</text>
      <text x="12" y="58">chr1:?  C → T  (false SNV)</text>
      <text x="12" y="74">chr1:?  G → A  (false SNV)</text>
    </g>
    <text x="12" y="92" font-family="Inter, sans-serif" font-size="10" fill="#b91c1c" font-weight="600">12+ false SNVs · 0 INDELs</text>
  </g>

  <!-- Arrow down: local realignment -->
  <g transform="translate(380 200)">
    <line x1="0" y1="0" x2="0" y2="35" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arrow-acc-07)"/>
    <rect x="-60" y="-18" width="120" height="16" rx="8" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
    <text x="0" y="-6" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">local realignment</text>
  </g>

  <!-- Divider -->
  <line x1="40" y1="255" x2="820" y2="255" stroke="#e5e3dc" stroke-width="1"/>

  <!-- Bottom band: realigned -->
  <text x="40" y="278" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#15803d" letter-spacing="0.12em">LOCAL REALIGNMENT · CLEAN 2-BP GAP</text>

  <g font-family="JetBrains Mono, monospace" font-size="13" font-weight="500">
    <text x="40" y="305" fill="#525252" font-size="10" font-weight="600">REF</text>
    <text x="80" y="305" fill="#0a0a0a">A C G T A C G T A T T G C C A T A G C A T G C A T</text>
  </g>

  <g font-family="JetBrains Mono, monospace" font-size="13" font-weight="500">
    <!-- r1 with gap at position 9-10 -->
    <text x="40" y="325" fill="#525252" font-size="10">r1</text>
    <text x="80" y="325" fill="#0a0a0a">A C G T A C G T</text>
    <text x="192" y="325" fill="#8a8a85" font-weight="600">- -</text>
    <text x="222" y="325" fill="#0a0a0a">T G C C A</text>
    <text x="40" y="343" fill="#525252" font-size="10">r2</text>
    <text x="80" y="343" fill="#0a0a0a">C G T A C G T</text>
    <text x="180" y="343" fill="#8a8a85" font-weight="600">- -</text>
    <text x="210" y="343" fill="#0a0a0a">T G C C A T</text>
    <text x="40" y="361" fill="#525252" font-size="10">r3</text>
    <text x="95" y="361" fill="#0a0a0a">G T A C G T</text>
    <text x="180" y="361" fill="#8a8a85" font-weight="600">- -</text>
    <text x="210" y="361" fill="#0a0a0a">T G C C A T A</text>
    <text x="40" y="379" fill="#525252" font-size="10">r4</text>
    <text x="95" y="379" fill="#0a0a0a">G T A C G T</text>
    <text x="180" y="379" fill="#8a8a85" font-weight="600">- -</text>
    <text x="210" y="379" fill="#0a0a0a">T G C C A T A</text>
  </g>

  <!-- Caller verdict (bottom) -->
  <g transform="translate(520 300)">
    <rect x="0" y="0" width="300" height="80" rx="6" fill="#ecfdf5" stroke="#15803d" stroke-width="1"/>
    <text x="12" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#15803d">Caller verdict · realigned</text>
    <g font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">
      <text x="12" y="42">chr1:9  DEL 2 bp  (TT)</text>
    </g>
    <text x="12" y="68" font-family="Inter, sans-serif" font-size="10" fill="#15803d" font-weight="600">1 true DEL · 0 false SNVs</text>
  </g>
</svg>
