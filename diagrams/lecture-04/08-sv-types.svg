<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="t d">
  <title id="t">The five canonical SV types</title>
  <desc id="d">Five panels, each showing a reference sequence segment on top and the SV-altered version below: deletion, insertion, inversion, tandem duplication, reciprocal translocation between two chromosomes.</desc>

  <!-- Kicker -->
  <text x="480" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">STRUCTURAL VARIANT TYPES · REFERENCE → ALTERED</text>

  <!-- Panel coordinates: 5 panels, ~180px wide each, starting x=30 with 12px gap -->

  <!-- Panel 1: DELETION -->
  <g transform="translate(30 60)">
    <text x="90" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.1em">DELETION</text>
    <!-- Reference -->
    <g font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" text-anchor="middle">
      <rect x="10"  y="20" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="25" y="37">A</text>
      <rect x="50"  y="20" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="65" y="37">B</text>
      <rect x="90"  y="20" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="105" y="37">C</text>
      <rect x="130" y="20" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="145" y="37">D</text>
    </g>
    <!-- Altered: B and C removed -->
    <g font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" text-anchor="middle">
      <rect x="10"  y="90" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="25" y="107">A</text>
      <rect x="130" y="90" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="145" y="107">D</text>
      <rect x="50"  y="90" width="70" height="24" rx="2" fill="#fef2f2" stroke="#b91c1c" stroke-width="1" stroke-dasharray="3 2"/>
      <text x="85" y="107" fill="#b91c1c" font-size="11">(B,C removed)</text>
    </g>
    <!-- Arrow -->
    <line x1="90" y1="48" x2="90" y2="86" stroke="#1e3a8a" stroke-width="1.2"/>
    <text x="90" y="130" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">Segment removed.</text>
  </g>

  <!-- Panel 2: INSERTION -->
  <g transform="translate(215 60)">
    <text x="85" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.1em">INSERTION</text>
    <g font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" text-anchor="middle">
      <rect x="10"  y="20" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="25" y="37">A</text>
      <rect x="50"  y="20" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="65" y="37">B</text>
      <rect x="90"  y="20" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="105" y="37">C</text>
    </g>
    <g font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" text-anchor="middle">
      <rect x="10"  y="90" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="25" y="107">A</text>
      <rect x="50"  y="90" width="30" height="24" rx="2" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/><text x="65" y="107" fill="#1e3a8a">X</text>
      <rect x="90"  y="90" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="105" y="107">B</text>
      <rect x="130" y="90" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="145" y="107">C</text>
    </g>
    <line x1="85" y1="48" x2="85" y2="86" stroke="#1e3a8a" stroke-width="1.2"/>
    <text x="85" y="130" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">Segment added.</text>
  </g>

  <!-- Panel 3: INVERSION -->
  <g transform="translate(400 60)">
    <text x="85" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.1em">INVERSION</text>
    <g font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" text-anchor="middle">
      <rect x="10"  y="20" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="25" y="37">A</text>
      <rect x="50"  y="20" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="65" y="37">B</text>
      <rect x="90"  y="20" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="105" y="37">C</text>
      <rect x="130" y="20" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="145" y="37">D</text>
    </g>
    <!-- Altered: B,C inverted (shown as boxed with reversed arrow) -->
    <g font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" text-anchor="middle">
      <rect x="10"  y="90" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="25" y="107">A</text>
      <rect x="50"  y="90" width="30" height="24" rx="2" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/><text x="65" y="107" fill="#1e3a8a">C</text>
      <rect x="90"  y="90" width="30" height="24" rx="2" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/><text x="105" y="107" fill="#1e3a8a">B</text>
      <rect x="130" y="90" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="145" y="107">D</text>
    </g>
    <!-- Flip arrow -->
    <path d="M 50 82 C 70 72, 100 72, 120 82" fill="none" stroke="#1e3a8a" stroke-width="1.2"/>
    <text x="85" y="70" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a">flip</text>
    <line x1="85" y1="48" x2="85" y2="68" stroke="#1e3a8a" stroke-width="1.2"/>
    <text x="85" y="130" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">Segment reversed.</text>
  </g>

  <!-- Panel 4: DUPLICATION (tandem) -->
  <g transform="translate(585 60)">
    <text x="85" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.1em">DUPLICATION</text>
    <g font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" text-anchor="middle">
      <rect x="10"  y="20" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="25" y="37">A</text>
      <rect x="50"  y="20" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="65" y="37">B</text>
      <rect x="90"  y="20" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="105" y="37">C</text>
    </g>
    <!-- Altered: B tandem-duplicated -->
    <g font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" text-anchor="middle">
      <rect x="10"  y="90" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="25" y="107">A</text>
      <rect x="50"  y="90" width="30" height="24" rx="2" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/><text x="65" y="107" fill="#1e3a8a">B</text>
      <rect x="90"  y="90" width="30" height="24" rx="2" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/><text x="105" y="107" fill="#1e3a8a">B</text>
      <rect x="130" y="90" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="145" y="107">C</text>
    </g>
    <line x1="85" y1="48" x2="85" y2="86" stroke="#1e3a8a" stroke-width="1.2"/>
    <text x="85" y="130" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">Segment duplicated.</text>
  </g>

  <!-- Divider -->
  <line x1="40" y1="220" x2="920" y2="220" stroke="#e5e3dc" stroke-width="1"/>

  <!-- Panel 5: TRANSLOCATION (full width below) -->
  <g transform="translate(40 240)">
    <text x="440" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.1em">TRANSLOCATION · BETWEEN CHROMOSOMES</text>

    <!-- Before -->
    <text x="60" y="36" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252">Before</text>
    <g font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" text-anchor="middle">
      <text x="20" y="60" fill="#525252" font-size="10">chr 1</text>
      <rect x="60"  y="46" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="75" y="63">A</text>
      <rect x="100" y="46" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="115" y="63">B</text>
      <rect x="140" y="46" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="155" y="63">C</text>

      <text x="20" y="100" fill="#525252" font-size="10">chr 2</text>
      <rect x="60"  y="86" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="75" y="103">X</text>
      <rect x="100" y="86" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="115" y="103">Y</text>
      <rect x="140" y="86" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="155" y="103">Z</text>
    </g>

    <!-- Arrows: B,C ↔ Y,Z swap -->
    <g stroke="#1e3a8a" stroke-width="1.2" fill="none">
      <path d="M 135 65 C 200 75, 200 85, 135 95" marker-end="url(#arr-acc-08)"/>
      <path d="M 135 95 C 70 85, 70 75, 135 65" marker-end="url(#arr-acc-08)" transform="translate(40 0)"/>
    </g>
    <text x="240" y="78" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">reciprocal swap →</text>

    <!-- After -->
    <text x="410" y="36" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252">After</text>
    <g font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" text-anchor="middle">
      <text x="370" y="60" fill="#525252" font-size="10">chr 1</text>
      <rect x="410"  y="46" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="425" y="63">A</text>
      <rect x="450" y="46" width="30" height="24" rx="2" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/><text x="465" y="63" fill="#1e3a8a">Y</text>
      <rect x="490" y="46" width="30" height="24" rx="2" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/><text x="505" y="63" fill="#1e3a8a">Z</text>

      <text x="370" y="100" fill="#525252" font-size="10">chr 2</text>
      <rect x="410"  y="86" width="30" height="24" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1.5"/><text x="425" y="103">X</text>
      <rect x="450" y="86" width="30" height="24" rx="2" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/><text x="465" y="103" fill="#1e3a8a">B</text>
      <rect x="490" y="86" width="30" height="24" rx="2" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/><text x="505" y="103" fill="#1e3a8a">C</text>
    </g>

    <!-- caption -->
    <text x="290" y="145" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">Segments exchanged between chromosomes. VCFs represent this as paired breakend (BND) records.</text>
  </g>

  <defs>
    <marker id="arr-acc-08" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>
</svg>
