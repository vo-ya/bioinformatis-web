<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" role="img" aria-labelledby="t d">
  <title id="t">Anatomy of a VCF file</title>
  <desc id="d">A VCF fragment showing meta-lines, the column header line, and two data rows. Each section is annotated: meta-lines declare the schema, the column header names the fixed and per-sample columns, and each data row carries one variant with its FORMAT-parsed per-sample values.</desc>

  <!-- Kicker -->
  <text x="480" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">VCF FILE · HEADER + COLUMN ROW + DATA ROWS</text>

  <!-- Meta lines (##) -->
  <g>
    <rect x="40" y="50" width="880" height="130" fill="#ebeae3" stroke="#c4c1b6" stroke-width="1" rx="4"/>
    <text x="50" y="68" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">META-LINES · DECLARE THE SCHEMA</text>
    <g font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">
      <text x="50" y="90">##fileformat=VCFv4.3</text>
      <text x="50" y="106">##reference=GRCh38</text>
      <text x="50" y="122">##INFO=&lt;ID=DP,Number=1,Type=Integer,Description="Total depth"&gt;</text>
      <text x="50" y="138">##FORMAT=&lt;ID=GT,Number=1,Type=String,Description="Genotype"&gt;</text>
      <text x="50" y="154">##FORMAT=&lt;ID=AD,Number=R,Type=Integer,Description="Allelic depths"&gt;</text>
      <text x="50" y="170">##FORMAT=&lt;ID=GQ,Number=1,Type=Integer,Description="Genotype quality"&gt;</text>
    </g>
    <text x="720" y="115" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">driver of parsing →</text>
    <text x="720" y="130" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">every tool honours</text>
    <text x="720" y="145" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">these declarations</text>
  </g>

  <!-- Column header -->
  <g>
    <rect x="40" y="195" width="880" height="28" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1" rx="4"/>
    <text x="50" y="213" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#1e3a8a">#CHROM  POS   ID   REF   ALT   QUAL   FILTER   INFO        FORMAT         SAMPLE1</text>
    <text x="50" y="238" font-family="Inter, sans-serif" font-size="9" fill="#525252">8 fixed columns + FORMAT + one per-sample column</text>
  </g>

  <!-- Data rows -->
  <g>
    <rect x="40" y="253" width="880" height="28" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="1" rx="4"/>
    <text x="50" y="271" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">chr1    1000  .    A     G     420    PASS     DP=17       GT:AD:DP:GQ    0/1:12,5:17:95</text>

    <rect x="40" y="285" width="880" height="28" fill="#ffffff" stroke="#c4c1b6" stroke-width="1" rx="4"/>
    <text x="50" y="303" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">chr1    1500  .    C     T     612    LowQual  DP=8        GT:AD:DP:GQ    0/0:7,1:8:22</text>
  </g>

  <!-- Callouts below first data row -->
  <g stroke="#8a8a85" stroke-width="0.8" stroke-dasharray="2 2">
    <line x1="530" y1="281" x2="530" y2="340"/>
    <line x1="630" y1="281" x2="630" y2="340"/>
    <line x1="820" y1="281" x2="820" y2="360"/>
  </g>
  <g font-family="Inter, sans-serif" fill="#525252">
    <text x="530" y="355" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">FORMAT string</text>
    <text x="530" y="370" text-anchor="middle" font-size="10">defines per-sample</text>
    <text x="530" y="383" text-anchor="middle" font-size="10">colon-separated grammar</text>

    <text x="820" y="375" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">per-sample values</text>
    <text x="820" y="390" text-anchor="middle" font-size="10">GT=0/1 · AD=12,5 · DP=17 · GQ=95</text>
  </g>

  <!-- Inset: indexing note -->
  <g>
    <rect x="40" y="410" width="880" height="36" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
    <text x="480" y="434" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#1e3a8a">bgzip file.vcf &amp;&amp; tabix -p vcf file.vcf.gz  →  random access by genomic range</text>
  </g>
</svg>
