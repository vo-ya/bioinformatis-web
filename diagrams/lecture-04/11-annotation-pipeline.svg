<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 360" role="img" aria-labelledby="t d">
  <title id="t">Variant annotation pipeline</title>
  <desc id="d">A single variant flows left-to-right through four annotation stages. Each stage joins the variant to a reference database and appends fields. At the end, a verdict banner summarises the variant as clinically actionable.</desc>

  <defs>
    <marker id="arr-ann" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <!-- Kicker -->
  <text x="510" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">VARIANT ANNOTATION · LEFT-TO-RIGHT JOIN ACROSS DATABASES</text>

  <!-- Input variant (left) -->
  <g>
    <rect x="20" y="70" width="160" height="100" rx="6" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="1.5"/>
    <text x="100" y="88" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">INPUT VCF</text>
    <g font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a" text-anchor="middle">
      <text x="100" y="108">chr7:140753336</text>
      <text x="100" y="122">A &gt; T</text>
      <text x="100" y="140" fill="#525252" font-size="9">QUAL=520  DP=65</text>
      <text x="100" y="154" fill="#525252" font-size="9">GT=0/1</text>
    </g>
  </g>

  <!-- Arrow 1 -->
  <line x1="180" y1="120" x2="212" y2="120" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-ann)"/>

  <!-- Stage 1: VEP / snpEff -->
  <g>
    <rect x="212" y="70" width="180" height="100" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="302" y="88" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">1 · VEP / snpEff</text>
    <g font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">
      <text x="302" y="104">gene + consequence</text>
    </g>
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#0a0a0a">
      <text x="222" y="126">+Gene: BRAF</text>
      <text x="222" y="140">+Consequence:</text>
      <text x="222" y="152">  missense_variant</text>
      <text x="222" y="164">+p.Val600Glu</text>
    </g>
  </g>

  <!-- Arrow 2 -->
  <line x1="392" y1="120" x2="424" y2="120" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-ann)"/>

  <!-- Stage 2: gnomAD -->
  <g>
    <rect x="424" y="70" width="170" height="100" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="509" y="88" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">2 · gnomAD</text>
    <g font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">
      <text x="509" y="104">population frequency</text>
    </g>
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#0a0a0a">
      <text x="434" y="126">+gnomAD_AF:</text>
      <text x="434" y="138">  1.2e-5</text>
      <text x="434" y="154">+gnomAD_AF_popmax:</text>
      <text x="434" y="166">  3e-5</text>
    </g>
  </g>

  <!-- Arrow 3 -->
  <line x1="594" y1="120" x2="626" y2="120" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-ann)"/>

  <!-- Stage 3: ClinVar -->
  <g>
    <rect x="626" y="70" width="180" height="100" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="716" y="88" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">3 · ClinVar</text>
    <g font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">
      <text x="716" y="104">clinical significance</text>
    </g>
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#0a0a0a">
      <text x="636" y="126">+ClinVar_Sig:</text>
      <text x="636" y="138">  Pathogenic</text>
      <text x="636" y="154">+Disease:</text>
      <text x="636" y="166">  melanoma, CRC</text>
    </g>
  </g>

  <!-- Arrow 4 -->
  <line x1="806" y1="120" x2="838" y2="120" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-ann)"/>

  <!-- Stage 4: REVEL/CADD -->
  <g>
    <rect x="838" y="70" width="170" height="100" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="923" y="88" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">4 · REVEL / CADD</text>
    <g font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">
      <text x="923" y="104">functional prediction</text>
    </g>
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#0a0a0a">
      <text x="848" y="126">+REVEL: 0.932</text>
      <text x="848" y="140">+CADD: 26.5</text>
      <text x="848" y="156">+SpliceAI: 0.01</text>
    </g>
  </g>

  <!-- Verdict banner -->
  <g transform="translate(0 220)">
    <rect x="40" y="0" width="940" height="120" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
    <text x="60" y="24" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#b45309" letter-spacing="0.1em">ANNOTATED VERDICT · CLINICALLY ACTIONABLE</text>
    <text x="60" y="54" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#0a0a0a">⚠ BRAF V600E — Pathogenic</text>
    <g font-family="Inter, sans-serif" font-size="12" fill="#525252">
      <text x="60" y="78">· Rare in population (gnomAD AF &lt; 1e-5)</text>
      <text x="60" y="96">· High functional impact (REVEL 0.932, CADD 26.5)</text>
      <text x="60" y="114">· Associated with melanoma, colorectal cancer — targets exist (vemurafenib, dabrafenib)</text>
    </g>
  </g>

  <!-- Connecting line from stage 4 to banner -->
  <path d="M 923 170 L 923 220" stroke="#b45309" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
</svg>
