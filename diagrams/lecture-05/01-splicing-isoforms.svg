<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img" aria-labelledby="t d">
  <title id="t">Transcription and splicing — gene to isoforms</title>
  <desc id="d">A gene's genomic locus with five exons and four introns. Transcription produces a pre-mRNA. Splicing then produces two mature mRNA isoforms — one with all five exons, one with exon 3 skipped.</desc>

  <defs>
    <marker id="arr-01" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>

  <!-- Band 1: Genomic locus -->
  <text x="40" y="32" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">GENOMIC LOCUS · chr7:1..40 kb</text>

  <g>
    <!-- baseline -->
    <line x1="50" y1="75" x2="860" y2="75" stroke="#8a8a85" stroke-width="1"/>
    <!-- Exons as filled blocks; introns as thin lines between them -->
    <g fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5">
      <rect x="50"  y="60" width="90"  height="30" rx="2"/>
      <rect x="220" y="60" width="80"  height="30" rx="2"/>
      <rect x="400" y="60" width="70"  height="30" rx="2"/>
      <rect x="560" y="60" width="100" height="30" rx="2"/>
      <rect x="760" y="60" width="100" height="30" rx="2"/>
    </g>
    <g font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" text-anchor="middle">
      <text x="95"  y="80">E1</text>
      <text x="260" y="80">E2</text>
      <text x="435" y="80">E3</text>
      <text x="610" y="80">E4</text>
      <text x="810" y="80">E5</text>
    </g>
    <!-- Intron labels and GT-AG motifs -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a" text-anchor="middle">
      <text x="180" y="55">GT…AG</text>
      <text x="350" y="55">GT…AG</text>
      <text x="515" y="55">GT…AG</text>
      <text x="710" y="55">GT…AG</text>
    </g>
    <g font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" text-anchor="middle" font-style="italic">
      <text x="180" y="106">intron ~5 kb</text>
      <text x="350" y="106">intron ~3 kb</text>
      <text x="515" y="106">intron ~8 kb</text>
      <text x="710" y="106">intron ~4 kb</text>
    </g>
  </g>

  <!-- Arrow: transcription -->
  <g>
    <line x1="450" y1="120" x2="450" y2="155" stroke="#525252" stroke-width="1.5" marker-end="url(#arr-01)"/>
    <text x="460" y="140" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252">transcription</text>
  </g>

  <!-- Band 2: pre-mRNA (same structure) -->
  <text x="40" y="180" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">PRE-mRNA · EXONS + INTRONS</text>
  <g>
    <line x1="50" y1="210" x2="860" y2="210" stroke="#8a8a85" stroke-width="1"/>
    <g fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5">
      <rect x="50"  y="195" width="90"  height="30" rx="2"/>
      <rect x="220" y="195" width="80"  height="30" rx="2"/>
      <rect x="400" y="195" width="70"  height="30" rx="2"/>
      <rect x="560" y="195" width="100" height="30" rx="2"/>
      <rect x="760" y="195" width="100" height="30" rx="2"/>
    </g>
    <g font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" text-anchor="middle">
      <text x="95"  y="215">E1</text>
      <text x="260" y="215">E2</text>
      <text x="435" y="215">E3</text>
      <text x="610" y="215">E4</text>
      <text x="810" y="215">E5</text>
    </g>
  </g>

  <!-- Arrow: splicing -->
  <g>
    <line x1="450" y1="240" x2="450" y2="275" stroke="#525252" stroke-width="1.5" marker-end="url(#arr-01)"/>
    <text x="460" y="260" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252">splicing</text>
  </g>

  <!-- Band 3: two isoforms side by side, stacked -->
  <text x="40" y="300" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">MATURE mRNA · TWO ISOFORMS</text>

  <!-- Isoform A: all 5 exons -->
  <g>
    <text x="30" y="330" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252">Isoform A</text>
    <g fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5">
      <rect x="120" y="318" width="90"  height="22" rx="2"/>
      <rect x="210" y="318" width="80"  height="22" rx="2"/>
      <rect x="290" y="318" width="70"  height="22" rx="2"/>
      <rect x="360" y="318" width="100" height="22" rx="2"/>
      <rect x="460" y="318" width="100" height="22" rx="2"/>
    </g>
    <g font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" text-anchor="middle">
      <text x="165" y="334">E1</text>
      <text x="250" y="334">E2</text>
      <text x="325" y="334">E3</text>
      <text x="410" y="334">E4</text>
      <text x="510" y="334">E5</text>
    </g>
    <text x="580" y="334" font-family="Inter, sans-serif" font-size="10" fill="#525252">≈ 2.1 kb · all exons</text>
  </g>

  <!-- Isoform B: exon 3 skipped -->
  <g>
    <text x="30" y="380" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252">Isoform B</text>
    <g fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5">
      <rect x="120" y="368" width="90"  height="22" rx="2"/>
      <rect x="210" y="368" width="80"  height="22" rx="2"/>
      <rect x="290" y="368" width="100" height="22" rx="2"/>
      <rect x="390" y="368" width="100" height="22" rx="2"/>
    </g>
    <!-- E3 skip marker: striped placeholder -->
    <rect x="290" y="368" width="0" height="0" fill="none"/>
    <g font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" text-anchor="middle">
      <text x="165" y="384">E1</text>
      <text x="250" y="384">E2</text>
      <text x="340" y="384">E4</text>
      <text x="440" y="384">E5</text>
    </g>
    <text x="510" y="384" font-family="Inter, sans-serif" font-size="10" fill="#b45309">≈ 1.6 kb · exon 3 skipped</text>
    <!-- Small "skipped" callout above where E3 would be -->
    <g font-family="Inter, sans-serif" font-size="9" fill="#b45309" text-anchor="middle">
      <text x="290" y="362">(E3 out)</text>
    </g>
  </g>
</svg>
