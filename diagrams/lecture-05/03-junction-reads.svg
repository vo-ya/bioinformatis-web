<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" role="img" aria-labelledby="t d">
  <title id="t">Reads spanning an exon–intron–exon junction</title>
  <desc id="d">A genomic region with three exons and two introns. Reads are colour-coded by alignment difficulty: easy (fully inside one exon), junction-spanning (span one intron), and multi-junction (span two introns).</desc>

  <text x="40" y="32" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">READS ON A GENE WITH TWO INTRONS</text>

  <!-- Genomic region: 3 exons + 2 introns, ~12 kb span -->
  <g>
    <!-- Exons -->
    <g fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5">
      <rect x="50"  y="58" width="180" height="28" rx="2"/>
      <rect x="390" y="58" width="140" height="28" rx="2"/>
      <rect x="670" y="58" width="180" height="28" rx="2"/>
    </g>
    <g font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" text-anchor="middle">
      <text x="140" y="77">E1</text>
      <text x="460" y="77">E2</text>
      <text x="760" y="77">E3</text>
    </g>
    <!-- Intron lines with small loop marker -->
    <g stroke="#8a8a85" stroke-width="1" stroke-dasharray="2 2" fill="none">
      <path d="M 230 72 Q 310 42 390 72"/>
      <path d="M 530 72 Q 600 42 670 72"/>
    </g>
    <g font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" text-anchor="middle" font-style="italic">
      <text x="310" y="38">intron 1 · ~5 kb</text>
      <text x="600" y="38">intron 2 · ~3 kb</text>
    </g>
  </g>

  <!-- Reads -->
  <!-- r1, r2: inside E1 (easy, green) -->
  <g stroke="#15803d" stroke-width="1.5" fill="none">
    <rect x="70" y="110" width="80" height="10" rx="2"/>
    <rect x="130" y="125" width="80" height="10" rx="2"/>
  </g>
  <g font-family="Inter, sans-serif" font-size="9" fill="#15803d">
    <text x="155" y="118">r1 · easy</text>
    <text x="215" y="133">r2 · easy</text>
  </g>

  <!-- r3: spans E1-E2 junction (amber, shown as two halves + dashed arc) -->
  <g stroke="#b45309" stroke-width="1.5" fill="none">
    <rect x="170" y="155" width="60" height="10" rx="2"/>
    <rect x="390" y="155" width="60" height="10" rx="2"/>
  </g>
  <path d="M 230 160 Q 310 150 390 160" stroke="#b45309" stroke-width="1" stroke-dasharray="3 2" fill="none"/>
  <text x="455" y="163" font-family="Inter, sans-serif" font-size="9" fill="#b45309">r3 · junction</text>

  <!-- r4: spans E1-E2 junction -->
  <g stroke="#b45309" stroke-width="1.5" fill="none">
    <rect x="195" y="180" width="35" height="10" rx="2"/>
    <rect x="390" y="180" width="85" height="10" rx="2"/>
  </g>
  <path d="M 230 185 Q 310 175 390 185" stroke="#b45309" stroke-width="1" stroke-dasharray="3 2" fill="none"/>
  <text x="480" y="188" font-family="Inter, sans-serif" font-size="9" fill="#b45309">r4 · junction</text>

  <!-- r5: spans E2-E3 junction -->
  <g stroke="#b45309" stroke-width="1.5" fill="none">
    <rect x="470" y="205" width="60" height="10" rx="2"/>
    <rect x="670" y="205" width="60" height="10" rx="2"/>
  </g>
  <path d="M 530 210 Q 600 200 670 210" stroke="#b45309" stroke-width="1" stroke-dasharray="3 2" fill="none"/>
  <text x="735" y="213" font-family="Inter, sans-serif" font-size="9" fill="#b45309">r5 · junction</text>

  <!-- r6: spans E1-E2 AND E2-E3 (red, multi-junction) -->
  <g stroke="#b91c1c" stroke-width="1.5" fill="none">
    <rect x="195" y="235" width="35" height="10" rx="2"/>
    <rect x="390" y="235" width="140" height="10" rx="2"/>
    <rect x="670" y="235" width="35" height="10" rx="2"/>
  </g>
  <path d="M 230 240 Q 310 228 390 240" stroke="#b91c1c" stroke-width="1" stroke-dasharray="3 2" fill="none"/>
  <path d="M 530 240 Q 600 228 670 240" stroke="#b91c1c" stroke-width="1" stroke-dasharray="3 2" fill="none"/>
  <text x="710" y="243" font-family="Inter, sans-serif" font-size="9" fill="#b91c1c">r6 · multi-junction</text>

  <!-- Annotation: what the aligner has to sort out -->
  <g>
    <rect x="100" y="290" width="700" height="60" rx="6" fill="#fef3c7" stroke="#b45309" stroke-width="1"/>
    <text x="450" y="312" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#b45309">This is what the aligner has to sort out:</text>
    <text x="450" y="330" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">easy reads align like DNA-seq · junction reads need to "jump" 3–5 kb at canonical GT-AG motifs ·</text>
    <text x="450" y="345" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">multi-junction reads need to jump twice without confusing the jumps for ordinary deletions</text>
  </g>
</svg>
