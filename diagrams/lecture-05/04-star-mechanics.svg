<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" role="img" aria-labelledby="t d">
  <title id="t">STAR seed-cluster-extend with spliced extension</title>
  <desc id="d">STAR's three-phase algorithm visualised: seed search finding three maximal mappable prefixes, clustering the two close ones and discarding the far outlier, and extending the cluster across a canonical GT-AG splice motif at zero cost.</desc>

  <defs>
    <marker id="arr-04" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <text x="40" y="28" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">STAR · SEED-CLUSTER-EXTEND</text>

  <!-- Band 1: Input read -->
  <text x="40" y="60" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">1 · INPUT READ · 150 bp</text>
  <rect x="40" y="72" width="820" height="22" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1"/>
  <text x="450" y="87" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">ACGTACGT...CGTACGTA...TACGTACG (150 bp)</text>

  <!-- Band 2: Seed search (MMPs) -->
  <text x="40" y="130" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">2 · SEED SEARCH · 3 MMPs FOUND</text>

  <!-- Read with MMPs highlighted -->
  <rect x="40" y="140" width="820" height="22" rx="2" fill="#f4f3ee" stroke="#525252" stroke-width="1"/>
  <rect x="50"  y="140" width="130" height="22" rx="2" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
  <rect x="260" y="140" width="110" height="22" rx="2" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
  <rect x="440" y="140" width="160" height="22" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <g font-family="Inter, sans-serif" font-size="9" font-weight="600" text-anchor="middle">
    <text x="115" y="155" fill="#b45309">MMP1 · 30 bp</text>
    <text x="315" y="155" fill="#1e3a8a">MMP2 · 25 bp</text>
    <text x="520" y="155" fill="#2563eb">MMP3 · 40 bp</text>
  </g>

  <!-- Genomic coords for each MMP -->
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
    <text x="115" y="180">→ genome ~10,500</text>
    <text x="315" y="180">→ genome ~15,800</text>
    <text x="520" y="180">→ genome ~16,200</text>
  </g>

  <!-- Band 3: Clustering -->
  <text x="40" y="220" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">3 · CLUSTERING BY GENOMIC PROXIMITY</text>

  <!-- Genome axis -->
  <line x1="60" y1="255" x2="860" y2="255" stroke="#c4c1b6" stroke-width="1"/>
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85">
    <text x="60"  y="275" text-anchor="middle">10,000</text>
    <text x="280" y="275" text-anchor="middle">15,000</text>
    <text x="500" y="275" text-anchor="middle">16,000</text>
    <text x="720" y="275" text-anchor="middle">17,000</text>
    <text x="860" y="275" text-anchor="middle">18,000</text>
  </g>

  <!-- MMP positions on axis -->
  <g>
    <circle cx="120" cy="255" r="5" fill="#b45309"/>
    <text x="120" y="245" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#b45309">MMP1</text>

    <circle cx="500" cy="255" r="5" fill="#1e3a8a"/>
    <text x="500" y="245" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#1e3a8a">MMP2</text>

    <circle cx="540" cy="255" r="5" fill="#2563eb"/>
    <text x="540" y="245" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#2563eb">MMP3</text>
  </g>

  <!-- Cluster circle around MMP2, MMP3 — shrunk vertically so it clears the MMP labels above (y=245) and the axis labels below (y=275) -->
  <ellipse cx="520" cy="255" rx="45" ry="10" fill="none" stroke="#1e3a8a" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="580" y="293" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">cluster {MMP2, MMP3}</text>
  <text x="120" y="295" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b45309">far · discard</text>

  <!-- Band 4: Spliced extension -->
  <text x="40" y="340" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">4 · SPLICED EXTENSION · JUMP AT CANONICAL GT-AG</text>

  <!-- Two exons with a splice gap -->
  <g fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5">
    <rect x="40"  y="360" width="300" height="28" rx="2"/>
    <rect x="560" y="360" width="300" height="28" rx="2"/>
  </g>
  <g font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" text-anchor="middle">
    <text x="190" y="379">exon A</text>
    <text x="710" y="379">exon B</text>
  </g>

  <!-- Splice jump arc -->
  <path d="M 340 370 Q 450 335 560 370" stroke="#15803d" stroke-width="2" stroke-dasharray="5 3" fill="none" marker-end="url(#arr-04)"/>

  <!-- GT-AG motif labels -->
  <text x="345" y="355" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#15803d">GT</text>
  <text x="545" y="355" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#15803d">AG</text>

  <!-- Annotation -->
  <text x="450" y="330" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#15803d">splice jump at canonical motif · zero cost</text>

  <!-- Intron region below the jump -->
  <g font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" text-anchor="middle" font-style="italic">
    <text x="450" y="404">~5 kb intron</text>
  </g>

  <!-- Final alignment legend -->
  <g transform="translate(40 420)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" fill="#525252"><tspan font-weight="600">Alignment:</tspan> two-segment, spliced at canonical GT-AG, score 95, no gap penalty.</text>
  </g>
</svg>
