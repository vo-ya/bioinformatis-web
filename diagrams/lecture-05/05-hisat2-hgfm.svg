<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" role="img" aria-labelledby="t d">
  <title id="t">HISAT2's hierarchical graph FM-index</title>
  <desc id="d">HISAT2's data structure: a global FM-index over the whole reference genome, many small local FM-indexes for fast short extensions, and a graph overlay of annotated splice junctions as alternative edges that FM-index search can traverse.</desc>

  <text x="460" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">HGFM · GLOBAL + LOCAL FM-INDEX + GRAPH EDGES</text>

  <!-- Band 1: Linear reference genome -->
  <text x="40" y="60" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">1 · LINEAR REFERENCE · 3.1 Gb</text>

  <g>
    <line x1="40" y1="80" x2="880" y2="80" stroke="#0a0a0a" stroke-width="1.5"/>
    <g stroke="#c4c1b6" stroke-width="1">
      <line x1="40"  y1="76" x2="40"  y2="84"/>
      <line x1="150" y1="76" x2="150" y2="84"/>
      <line x1="260" y1="76" x2="260" y2="84"/>
      <line x1="370" y1="76" x2="370" y2="84"/>
      <line x1="480" y1="76" x2="480" y2="84"/>
      <line x1="590" y1="76" x2="590" y2="84"/>
      <line x1="700" y1="76" x2="700" y2="84"/>
      <line x1="810" y1="76" x2="810" y2="84"/>
    </g>
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85">
      <text x="40"  y="100" text-anchor="start">chr1:0</text>
      <text x="880" y="100" text-anchor="end">chr22:end</text>
    </g>
  </g>

  <!-- Band 2: Global FM-index -->
  <text x="40" y="130" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">2 · GLOBAL FM-INDEX · ~8 GB</text>

  <rect x="40" y="140" width="840" height="38" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="460" y="164" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">FM-index over the whole reference</text>

  <!-- Band 3: Local indexes -->
  <text x="40" y="200" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">3 · LOCAL INDEXES · ~57 kb REGIONS, ~300 KB EACH</text>

  <g>
    <g fill="#ebeae3" stroke="#c4c1b6" stroke-width="1">
      <rect x="40"  y="210" width="90" height="32" rx="3"/>
      <rect x="145" y="210" width="90" height="32" rx="3"/>
      <rect x="250" y="210" width="90" height="32" rx="3"/>
      <rect x="355" y="210" width="90" height="32" rx="3"/>
      <rect x="460" y="210" width="90" height="32" rx="3"/>
      <rect x="565" y="210" width="90" height="32" rx="3"/>
      <rect x="670" y="210" width="90" height="32" rx="3"/>
      <rect x="775" y="210" width="105" height="32" rx="3"/>
    </g>
    <g font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">
      <text x="85"  y="230">local 1</text>
      <text x="190" y="230">local 2</text>
      <text x="295" y="230">local 3</text>
      <text x="400" y="230">local 4</text>
      <text x="505" y="230">local 5</text>
      <text x="610" y="230">local 6</text>
      <text x="715" y="230">local 7</text>
      <text x="827" y="230">local … (~55k)</text>
    </g>
  </g>

  <!-- Band 4: Graph overlay with splice arcs -->
  <text x="40" y="280" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">4 · GRAPH OVERLAY · ANNOTATED SPLICE JUNCTIONS</text>

  <g>
    <line x1="40" y1="300" x2="880" y2="300" stroke="#0a0a0a" stroke-width="1.5"/>
    <!-- Small rectangles representing exon positions -->
    <g fill="#eef2ff" stroke="#1e3a8a" stroke-width="1">
      <rect x="80"  y="295" width="40" height="10" rx="1"/>
      <rect x="200" y="295" width="30" height="10" rx="1"/>
      <rect x="320" y="295" width="40" height="10" rx="1"/>
      <rect x="450" y="295" width="30" height="10" rx="1"/>
      <rect x="580" y="295" width="40" height="10" rx="1"/>
      <rect x="700" y="295" width="30" height="10" rx="1"/>
      <rect x="810" y="295" width="40" height="10" rx="1"/>
    </g>
  </g>

  <!-- Splice arcs -->
  <g stroke="#1e3a8a" stroke-width="1.3" stroke-dasharray="4 3" fill="none">
    <path d="M 120 300 Q 160 270 200 300"/>
    <path d="M 230 300 Q 275 265 320 300"/>
    <path d="M 360 300 Q 405 270 450 300"/>
    <path d="M 480 300 Q 530 265 580 300"/>
    <path d="M 620 300 Q 660 270 700 300"/>
    <path d="M 730 300 Q 770 270 810 300"/>
  </g>
  <text x="460" y="262" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a" font-style="italic">annotated splice junctions · FM-index can traverse</text>

  <!-- Comparison panel -->
  <g transform="translate(40 345)">
    <rect x="0" y="0" width="840" height="60" rx="6" fill="#ecfdf5" stroke="#15803d" stroke-width="1"/>
    <text x="20" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#15803d">STAR vs HISAT2</text>
    <g font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">
      <text x="20" y="42">· STAR: ~30 GB suffix array over the genome.</text>
      <text x="20" y="55">· HISAT2: ~8 GB hierarchical graph FM-index. ~4× smaller memory, comparable speed.</text>
    </g>
  </g>
</svg>
