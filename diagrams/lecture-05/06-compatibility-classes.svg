<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" role="img" aria-labelledby="t d">
  <title id="t">Compatibility classes — transcripts, reads, k-mers</title>
  <desc id="d">Three transcripts T1, T2, T3 with their k-mer decompositions; each k-mer tagged with the set of transcripts it belongs to. Four example reads whose k-mer intersections produce compatibility classes of different sizes.</desc>

  <text x="40" y="28" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">COMPATIBILITY CLASSES · k-MER INTERSECTION</text>

  <!-- Band 1: three transcripts -->
  <text x="40" y="58" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">1 · THREE TRANSCRIPTS</text>

  <g>
    <rect x="40"  y="68" width="300" height="22" rx="2" fill="#ecfdf5" stroke="#15803d" stroke-width="1.5"/>
    <text x="190" y="83" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#15803d">T1</text>

    <rect x="150" y="98" width="300" height="22" rx="2" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="300" y="113" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#1e3a8a">T2</text>

    <rect x="360" y="128" width="300" height="22" rx="2" fill="#fef2f2" stroke="#b91c1c" stroke-width="1.5"/>
    <text x="510" y="143" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#b91c1c">T3</text>

    <!-- Overlap indicator text -->
    <text x="820" y="85" font-family="Inter, sans-serif" font-size="9" fill="#525252">T1 only: left</text>
    <text x="820" y="115" font-family="Inter, sans-serif" font-size="9" fill="#525252">T1 ∩ T2: middle</text>
    <text x="820" y="145" font-family="Inter, sans-serif" font-size="9" fill="#525252">T2 ∩ T3: right</text>
  </g>

  <!-- Band 2: k-mer tag legend -->
  <text x="40" y="180" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">2 · k-MER TAGS BY TRANSCRIPT SET</text>

  <g transform="translate(40 195)">
    <!-- Colour legend -->
    <rect x="0" y="0" width="16" height="16" fill="#15803d" stroke="#0a0a0a" stroke-width="0.5"/>
    <text x="22" y="13" font-family="Inter, sans-serif" font-size="10">{T1}</text>

    <rect x="70" y="0" width="16" height="16" fill="#1e3a8a" stroke="#0a0a0a" stroke-width="0.5"/>
    <text x="92" y="13" font-family="Inter, sans-serif" font-size="10">{T2}</text>

    <rect x="140" y="0" width="16" height="16" fill="#b91c1c" stroke="#0a0a0a" stroke-width="0.5"/>
    <text x="162" y="13" font-family="Inter, sans-serif" font-size="10">{T3}</text>

    <rect x="210" y="0" width="16" height="16" fill="#8b5cf6" stroke="#0a0a0a" stroke-width="0.5"/>
    <text x="232" y="13" font-family="Inter, sans-serif" font-size="10">{T1, T2}</text>

    <rect x="310" y="0" width="16" height="16" fill="#dc2626" stroke="#0a0a0a" stroke-width="0.5"/>
    <text x="332" y="13" font-family="Inter, sans-serif" font-size="10">{T2, T3}</text>

    <rect x="420" y="0" width="16" height="16" fill="#374151" stroke="#0a0a0a" stroke-width="0.5"/>
    <text x="442" y="13" font-family="Inter, sans-serif" font-size="10">{T1, T2, T3}</text>

    <rect x="540" y="0" width="16" height="16" fill="#ffffff" stroke="#0a0a0a" stroke-width="0.5" stroke-dasharray="2 2"/>
    <text x="562" y="13" font-family="Inter, sans-serif" font-size="10">{} (novel)</text>
  </g>

  <!-- Band 3: four example reads -->
  <text x="40" y="245" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">3 · FOUR READS AND THEIR COMPATIBILITY CLASSES</text>

  <!-- Read A: all T1-only k-mers -->
  <g transform="translate(40 260)">
    <text x="-5" y="12" text-anchor="end" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252">A</text>
    <g>
      <rect x="0"  y="0" width="20" height="16" fill="#15803d" stroke="#0a0a0a" stroke-width="0.5"/>
      <rect x="22" y="0" width="20" height="16" fill="#15803d" stroke="#0a0a0a" stroke-width="0.5"/>
      <rect x="44" y="0" width="20" height="16" fill="#15803d" stroke="#0a0a0a" stroke-width="0.5"/>
      <rect x="66" y="0" width="20" height="16" fill="#15803d" stroke="#0a0a0a" stroke-width="0.5"/>
      <rect x="88" y="0" width="20" height="16" fill="#15803d" stroke="#0a0a0a" stroke-width="0.5"/>
    </g>
    <text x="130" y="12" font-family="Inter, sans-serif" font-size="10" fill="#15803d" font-weight="600">→ class {T1}</text>
  </g>

  <!-- Read B: all {T2,T3} k-mers -->
  <g transform="translate(40 290)">
    <text x="-5" y="12" text-anchor="end" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252">B</text>
    <g>
      <rect x="0"  y="0" width="20" height="16" fill="#dc2626" stroke="#0a0a0a" stroke-width="0.5"/>
      <rect x="22" y="0" width="20" height="16" fill="#dc2626" stroke="#0a0a0a" stroke-width="0.5"/>
      <rect x="44" y="0" width="20" height="16" fill="#dc2626" stroke="#0a0a0a" stroke-width="0.5"/>
      <rect x="66" y="0" width="20" height="16" fill="#dc2626" stroke="#0a0a0a" stroke-width="0.5"/>
      <rect x="88" y="0" width="20" height="16" fill="#dc2626" stroke="#0a0a0a" stroke-width="0.5"/>
    </g>
    <text x="130" y="12" font-family="Inter, sans-serif" font-size="10" fill="#b91c1c" font-weight="600">→ class {T2, T3}</text>
  </g>

  <!-- Read C: mix of {T1,T2}, {T2,T3} — intersect to {T2} -->
  <g transform="translate(40 320)">
    <text x="-5" y="12" text-anchor="end" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252">C</text>
    <g>
      <rect x="0"  y="0" width="20" height="16" fill="#8b5cf6" stroke="#0a0a0a" stroke-width="0.5"/>
      <rect x="22" y="0" width="20" height="16" fill="#8b5cf6" stroke="#0a0a0a" stroke-width="0.5"/>
      <rect x="44" y="0" width="20" height="16" fill="#374151" stroke="#0a0a0a" stroke-width="0.5"/>
      <rect x="66" y="0" width="20" height="16" fill="#dc2626" stroke="#0a0a0a" stroke-width="0.5"/>
      <rect x="88" y="0" width="20" height="16" fill="#dc2626" stroke="#0a0a0a" stroke-width="0.5"/>
    </g>
    <text x="130" y="12" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" font-weight="600">→ class {T2}   (intersection)</text>
  </g>

  <!-- Read D: one novel k-mer -->
  <g transform="translate(40 350)">
    <text x="-5" y="12" text-anchor="end" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252">D</text>
    <g>
      <rect x="0"  y="0" width="20" height="16" fill="#374151" stroke="#0a0a0a" stroke-width="0.5"/>
      <rect x="22" y="0" width="20" height="16" fill="#374151" stroke="#0a0a0a" stroke-width="0.5"/>
      <rect x="44" y="0" width="20" height="16" fill="#ffffff" stroke="#0a0a0a" stroke-width="0.5" stroke-dasharray="2 2"/>
      <rect x="66" y="0" width="20" height="16" fill="#374151" stroke="#0a0a0a" stroke-width="0.5"/>
      <rect x="88" y="0" width="20" height="16" fill="#374151" stroke="#0a0a0a" stroke-width="0.5"/>
    </g>
    <text x="130" y="12" font-family="Inter, sans-serif" font-size="10" fill="#b91c1c" font-weight="600">→ class { }   (novel k-mer; drop read)</text>
  </g>

  <!-- Annotation box -->
  <g transform="translate(40 395)">
    <rect x="0" y="0" width="820" height="35" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
    <text x="410" y="21" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0a0a0a">
      <tspan font-weight="600">Pseudoalignment =</tspan> look up each k-mer's transcript-set tag · intersect · the result is the read's compatibility class.
    </text>
  </g>
</svg>
