<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 440" role="img" aria-labelledby="t d">
  <title id="t">Target de Bruijn graph and pseudoalignment walk</title>
  <desc id="d">Three small transcripts; the Target de Bruijn Graph built from them with k-mer nodes tagged by transcript-set membership; a read's k-mers traced as a walk through the graph, producing a compatibility class via intersection of tags.</desc>

  <defs>
    <marker id="arr-07" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8a8a85"/>
    </marker>
    <marker id="arr-07-acc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <text x="460" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">TARGET DE BRUIJN GRAPH · kALLISTO</text>

  <!-- Band 1: Three small transcripts -->
  <text x="40" y="58" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">1 · THREE TRANSCRIPTS (k = 5)</text>
  <g font-family="JetBrains Mono, monospace" font-size="12" fill="#0a0a0a">
    <text x="40" y="84"  fill="#15803d"><tspan font-weight="600">T1: </tspan>ACGTACGTAC</text>
    <text x="40" y="104" fill="#1e3a8a"><tspan font-weight="600">T2: </tspan>CGTACGTACC</text>
    <text x="40" y="124" fill="#b91c1c"><tspan font-weight="600">T3: </tspan>GTACGTACCT</text>
  </g>

  <!-- Band 2: T-DBG -->
  <text x="40" y="160" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">2 · TARGET DE BRUIJN GRAPH · NODES = 4-MERS · EDGE TAGS = TRANSCRIPT SETS</text>

  <!-- Nodes (4-mers) placed left-to-right -->
  <g font-family="JetBrains Mono, monospace" font-size="10" font-weight="600">
    <!-- ACGT -->
    <g>
      <circle cx="90" cy="230" r="28" fill="#ecfdf5" stroke="#15803d" stroke-width="1.5"/>
      <text x="90" y="234" text-anchor="middle" fill="#0a0a0a">ACGT</text>
    </g>
    <!-- CGTA -->
    <g>
      <circle cx="220" cy="230" r="28" fill="#eef2ff" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="220" y="234" text-anchor="middle" fill="#0a0a0a">CGTA</text>
    </g>
    <!-- GTAC -->
    <g>
      <circle cx="350" cy="230" r="28" fill="#f4f3ee" stroke="#374151" stroke-width="1.5"/>
      <text x="350" y="234" text-anchor="middle" fill="#0a0a0a">GTAC</text>
    </g>
    <!-- TACG -->
    <g>
      <circle cx="480" cy="230" r="28" fill="#f4f3ee" stroke="#374151" stroke-width="1.5"/>
      <text x="480" y="234" text-anchor="middle" fill="#0a0a0a">TACG</text>
    </g>
    <!-- ACGT and back-edge handled by a parallel path? Simplify by showing linear chain of 4-mers -->
    <!-- TACC -->
    <g>
      <circle cx="610" cy="230" r="28" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
      <text x="610" y="234" text-anchor="middle" fill="#0a0a0a">TACC</text>
    </g>
    <!-- ACCT -->
    <g>
      <circle cx="740" cy="230" r="28" fill="#fef2f2" stroke="#b91c1c" stroke-width="1.5"/>
      <text x="740" y="234" text-anchor="middle" fill="#0a0a0a">ACCT</text>
    </g>
  </g>

  <!-- Edges with transcript-set tags -->
  <g>
    <line x1="118" y1="230" x2="192" y2="230" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-07-acc)"/>
    <text x="155" y="222" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a">{T1,T2}</text>

    <line x1="248" y1="230" x2="322" y2="230" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-07-acc)"/>
    <text x="285" y="222" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a">{T1,T2,T3}</text>

    <line x1="378" y1="230" x2="452" y2="230" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-07-acc)"/>
    <text x="415" y="222" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a">{T1,T2,T3}</text>

    <line x1="508" y1="230" x2="582" y2="230" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-07-acc)"/>
    <text x="545" y="222" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#dc2626">{T2,T3}</text>

    <line x1="638" y1="230" x2="712" y2="230" stroke="#b91c1c" stroke-width="1.5" marker-end="url(#arr-07-acc)"/>
    <text x="675" y="222" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#b91c1c">{T3}</text>
  </g>

  <!-- Band 3: Read's walk -->
  <text x="40" y="300" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">3 · READ · walk + intersect</text>

  <g font-family="JetBrains Mono, monospace" font-size="12" fill="#0a0a0a">
    <text x="40" y="328"><tspan font-weight="600">Read: </tspan>ACGTACC (7 bp, 3 k-mers)</text>
  </g>

  <!-- Highlighted walk -->
  <g stroke="#15803d" stroke-width="3" fill="none">
    <line x1="118" y1="335" x2="192" y2="335"/>
    <line x1="248" y1="335" x2="322" y2="335"/>
    <line x1="378" y1="335" x2="452" y2="335"/>
    <line x1="508" y1="335" x2="582" y2="335"/>
  </g>
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#15803d" text-anchor="middle">
    <text x="155" y="352">tag {T1,T2}</text>
    <text x="285" y="352">∩ {T1,T2,T3}</text>
    <text x="415" y="352">∩ {T1,T2,T3}</text>
    <text x="545" y="352">∩ {T2,T3}</text>
  </g>

  <!-- Intersection result -->
  <g transform="translate(40 380)">
    <rect x="0" y="0" width="840" height="46" rx="6" fill="#ecfdf5" stroke="#15803d" stroke-width="1.5"/>
    <text x="420" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#15803d">Intersection of all walked edges = {T2}</text>
    <text x="420" y="36" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">Compatibility class = {T2} · no base-level alignment needed</text>
  </g>
</svg>
