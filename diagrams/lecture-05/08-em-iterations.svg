<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 480" role="img" aria-labelledby="t d">
  <title id="t">EM iterations for read-to-transcript assignment</title>
  <desc id="d">Five iterations of EM shown side-by-side. Each column shows fractional-vote values for four reads across three transcripts and the resulting abundance estimate. The estimate converges as the likelihood climbs.</desc>

  <text x="510" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">EM · READ → TRANSCRIPT · 5 ITERATIONS</text>

  <!-- Header with transcript IDs -->
  <g font-family="JetBrains Mono, monospace" font-size="10" font-weight="600">
    <text x="40" y="62" fill="#525252">Reads</text>
    <text x="40" y="82" fill="#15803d">r1: {T1, T2}</text>
    <text x="40" y="100" fill="#1e3a8a">r2: {T2}</text>
    <text x="40" y="118" fill="#8b5cf6">r3: {T1, T2, T3}</text>
    <text x="40" y="136" fill="#b91c1c">r4: {T3}</text>

    <text x="40" y="170" fill="#525252">Lengths</text>
    <text x="40" y="188" fill="#0a0a0a">ℓ = (500, 1500, 2000)</text>
  </g>

  <!-- 5 iteration columns -->
  <!-- Column layout: x0=230, col_width=155. Iterations 1-5. -->

  <!-- Helper: draw a mini fractional-vote matrix + bar chart -->
  <!-- Iteration 1 (initial uniform) -->
  <g transform="translate(230 50)">
    <text x="77" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">iter 1</text>

    <!-- Matrix header: T1 T2 T3 -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
      <text x="30" y="18">T1</text>
      <text x="75" y="18">T2</text>
      <text x="120" y="18">T3</text>
    </g>

    <!-- Rows r1..r4, cells coloured by vote magnitude -->
    <g>
      <!-- r1: {T1,T2}. Initial with equal theta and lengths 500,1500: z ∝ 1/500 vs 1/1500 → (0.75, 0.25) -->
      <rect x="12"  y="25" width="36" height="14" fill="#1e3a8a" fill-opacity="0.75"/>
      <rect x="57"  y="25" width="36" height="14" fill="#1e3a8a" fill-opacity="0.25"/>
      <rect x="102" y="25" width="36" height="14" fill="#ffffff" stroke="#c4c1b6"/>
      <!-- r2: {T2} -->
      <rect x="12"  y="41" width="36" height="14" fill="#ffffff" stroke="#c4c1b6"/>
      <rect x="57"  y="41" width="36" height="14" fill="#1e3a8a" fill-opacity="1.0"/>
      <rect x="102" y="41" width="36" height="14" fill="#ffffff" stroke="#c4c1b6"/>
      <!-- r3: {T1,T2,T3}. Lengths 500,1500,2000 → (0.60, 0.24, 0.18) approx -->
      <rect x="12"  y="57" width="36" height="14" fill="#1e3a8a" fill-opacity="0.60"/>
      <rect x="57"  y="57" width="36" height="14" fill="#1e3a8a" fill-opacity="0.24"/>
      <rect x="102" y="57" width="36" height="14" fill="#1e3a8a" fill-opacity="0.18"/>
      <!-- r4: {T3} -->
      <rect x="12"  y="73" width="36" height="14" fill="#ffffff" stroke="#c4c1b6"/>
      <rect x="57"  y="73" width="36" height="14" fill="#ffffff" stroke="#c4c1b6"/>
      <rect x="102" y="73" width="36" height="14" fill="#1e3a8a" fill-opacity="1.0"/>
    </g>

    <!-- θ bars -->
    <g transform="translate(0 98)">
      <text x="77" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">θ</text>
      <g fill="#eef2ff" stroke="#1e3a8a" stroke-width="1">
        <rect x="15"  y="10" width="30" height="35"/>
        <rect x="60"  y="10" width="30" height="40"/>
        <rect x="105" y="10" width="30" height="30"/>
      </g>
      <g font-family="JetBrains Mono, monospace" font-size="8" fill="#0a0a0a" text-anchor="middle">
        <text x="30"  y="58">.34</text>
        <text x="75"  y="58">.39</text>
        <text x="120" y="58">.27</text>
      </g>
    </g>
  </g>

  <!-- Iteration 2 -->
  <g transform="translate(385 50)">
    <text x="77" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">iter 2</text>
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
      <text x="30" y="18">T1</text>
      <text x="75" y="18">T2</text>
      <text x="120" y="18">T3</text>
    </g>
    <g>
      <rect x="12"  y="25" width="36" height="14" fill="#1e3a8a" fill-opacity="0.78"/>
      <rect x="57"  y="25" width="36" height="14" fill="#1e3a8a" fill-opacity="0.22"/>
      <rect x="102" y="25" width="36" height="14" fill="#ffffff" stroke="#c4c1b6"/>
      <rect x="12"  y="41" width="36" height="14" fill="#ffffff" stroke="#c4c1b6"/>
      <rect x="57"  y="41" width="36" height="14" fill="#1e3a8a" fill-opacity="1.0"/>
      <rect x="102" y="41" width="36" height="14" fill="#ffffff" stroke="#c4c1b6"/>
      <rect x="12"  y="57" width="36" height="14" fill="#1e3a8a" fill-opacity="0.54"/>
      <rect x="57"  y="57" width="36" height="14" fill="#1e3a8a" fill-opacity="0.27"/>
      <rect x="102" y="57" width="36" height="14" fill="#1e3a8a" fill-opacity="0.19"/>
      <rect x="12"  y="73" width="36" height="14" fill="#ffffff" stroke="#c4c1b6"/>
      <rect x="57"  y="73" width="36" height="14" fill="#ffffff" stroke="#c4c1b6"/>
      <rect x="102" y="73" width="36" height="14" fill="#1e3a8a" fill-opacity="1.0"/>
    </g>
    <g transform="translate(0 98)">
      <text x="77" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">θ</text>
      <g fill="#eef2ff" stroke="#1e3a8a" stroke-width="1">
        <rect x="15"  y="15" width="30" height="30"/>
        <rect x="60"  y="12" width="30" height="38"/>
        <rect x="105" y="16" width="30" height="29"/>
      </g>
      <g font-family="JetBrains Mono, monospace" font-size="8" fill="#0a0a0a" text-anchor="middle">
        <text x="30"  y="58">.32</text>
        <text x="75"  y="58">.41</text>
        <text x="120" y="58">.27</text>
      </g>
    </g>
  </g>

  <!-- Iteration 3 -->
  <g transform="translate(540 50)">
    <text x="77" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">iter 3</text>
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
      <text x="30" y="18">T1</text>
      <text x="75" y="18">T2</text>
      <text x="120" y="18">T3</text>
    </g>
    <g>
      <rect x="12"  y="25" width="36" height="14" fill="#1e3a8a" fill-opacity="0.77"/>
      <rect x="57"  y="25" width="36" height="14" fill="#1e3a8a" fill-opacity="0.23"/>
      <rect x="102" y="25" width="36" height="14" fill="#ffffff" stroke="#c4c1b6"/>
      <rect x="12"  y="41" width="36" height="14" fill="#ffffff" stroke="#c4c1b6"/>
      <rect x="57"  y="41" width="36" height="14" fill="#1e3a8a" fill-opacity="1.0"/>
      <rect x="102" y="41" width="36" height="14" fill="#ffffff" stroke="#c4c1b6"/>
      <rect x="12"  y="57" width="36" height="14" fill="#1e3a8a" fill-opacity="0.51"/>
      <rect x="57"  y="57" width="36" height="14" fill="#1e3a8a" fill-opacity="0.30"/>
      <rect x="102" y="57" width="36" height="14" fill="#1e3a8a" fill-opacity="0.19"/>
      <rect x="12"  y="73" width="36" height="14" fill="#ffffff" stroke="#c4c1b6"/>
      <rect x="57"  y="73" width="36" height="14" fill="#ffffff" stroke="#c4c1b6"/>
      <rect x="102" y="73" width="36" height="14" fill="#1e3a8a" fill-opacity="1.0"/>
    </g>
    <g transform="translate(0 98)">
      <text x="77" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">θ</text>
      <g fill="#eef2ff" stroke="#1e3a8a" stroke-width="1">
        <rect x="15"  y="18" width="30" height="27"/>
        <rect x="60"  y="10" width="30" height="40"/>
        <rect x="105" y="18" width="30" height="27"/>
      </g>
      <g font-family="JetBrains Mono, monospace" font-size="8" fill="#0a0a0a" text-anchor="middle">
        <text x="30"  y="58">.30</text>
        <text x="75"  y="58">.43</text>
        <text x="120" y="58">.27</text>
      </g>
    </g>
  </g>

  <!-- Iteration 4 -->
  <g transform="translate(695 50)">
    <text x="77" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">iter 4</text>
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
      <text x="30" y="18">T1</text>
      <text x="75" y="18">T2</text>
      <text x="120" y="18">T3</text>
    </g>
    <g>
      <rect x="12"  y="25" width="36" height="14" fill="#1e3a8a" fill-opacity="0.76"/>
      <rect x="57"  y="25" width="36" height="14" fill="#1e3a8a" fill-opacity="0.24"/>
      <rect x="102" y="25" width="36" height="14" fill="#ffffff" stroke="#c4c1b6"/>
      <rect x="12"  y="41" width="36" height="14" fill="#ffffff" stroke="#c4c1b6"/>
      <rect x="57"  y="41" width="36" height="14" fill="#1e3a8a" fill-opacity="1.0"/>
      <rect x="102" y="41" width="36" height="14" fill="#ffffff" stroke="#c4c1b6"/>
      <rect x="12"  y="57" width="36" height="14" fill="#1e3a8a" fill-opacity="0.49"/>
      <rect x="57"  y="57" width="36" height="14" fill="#1e3a8a" fill-opacity="0.31"/>
      <rect x="102" y="57" width="36" height="14" fill="#1e3a8a" fill-opacity="0.20"/>
      <rect x="12"  y="73" width="36" height="14" fill="#ffffff" stroke="#c4c1b6"/>
      <rect x="57"  y="73" width="36" height="14" fill="#ffffff" stroke="#c4c1b6"/>
      <rect x="102" y="73" width="36" height="14" fill="#1e3a8a" fill-opacity="1.0"/>
    </g>
    <g transform="translate(0 98)">
      <text x="77" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">θ</text>
      <g fill="#eef2ff" stroke="#1e3a8a" stroke-width="1">
        <rect x="15"  y="20" width="30" height="25"/>
        <rect x="60"  y="8"  width="30" height="42"/>
        <rect x="105" y="18" width="30" height="27"/>
      </g>
      <g font-family="JetBrains Mono, monospace" font-size="8" fill="#0a0a0a" text-anchor="middle">
        <text x="30"  y="58">.29</text>
        <text x="75"  y="58">.44</text>
        <text x="120" y="58">.27</text>
      </g>
    </g>
  </g>

  <!-- Iteration 5 (converged) -->
  <g transform="translate(850 50)">
    <text x="77" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#15803d">iter 5 · converged</text>
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
      <text x="30" y="18">T1</text>
      <text x="75" y="18">T2</text>
      <text x="120" y="18">T3</text>
    </g>
    <g>
      <rect x="12"  y="25" width="36" height="14" fill="#1e3a8a" fill-opacity="0.75"/>
      <rect x="57"  y="25" width="36" height="14" fill="#1e3a8a" fill-opacity="0.25"/>
      <rect x="102" y="25" width="36" height="14" fill="#ffffff" stroke="#c4c1b6"/>
      <rect x="12"  y="41" width="36" height="14" fill="#ffffff" stroke="#c4c1b6"/>
      <rect x="57"  y="41" width="36" height="14" fill="#1e3a8a" fill-opacity="1.0"/>
      <rect x="102" y="41" width="36" height="14" fill="#ffffff" stroke="#c4c1b6"/>
      <rect x="12"  y="57" width="36" height="14" fill="#1e3a8a" fill-opacity="0.48"/>
      <rect x="57"  y="57" width="36" height="14" fill="#1e3a8a" fill-opacity="0.32"/>
      <rect x="102" y="57" width="36" height="14" fill="#1e3a8a" fill-opacity="0.20"/>
      <rect x="12"  y="73" width="36" height="14" fill="#ffffff" stroke="#c4c1b6"/>
      <rect x="57"  y="73" width="36" height="14" fill="#ffffff" stroke="#c4c1b6"/>
      <rect x="102" y="73" width="36" height="14" fill="#1e3a8a" fill-opacity="1.0"/>
    </g>
    <g transform="translate(0 98)">
      <text x="77" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#15803d" font-weight="600">θ · final</text>
      <g fill="#ecfdf5" stroke="#15803d" stroke-width="1.5">
        <rect x="15"  y="22" width="30" height="23"/>
        <rect x="60"  y="6"  width="30" height="44"/>
        <rect x="105" y="20" width="30" height="25"/>
      </g>
      <g font-family="JetBrains Mono, monospace" font-size="8" fill="#0a0a0a" text-anchor="middle" font-weight="700">
        <text x="30"  y="58">.28</text>
        <text x="75"  y="58">.45</text>
        <text x="120" y="58">.27</text>
      </g>
    </g>
  </g>

  <!-- Likelihood climbing annotation -->
  <g transform="translate(230 310)">
    <rect x="0" y="0" width="770" height="60" rx="6" fill="#ecfdf5" stroke="#15803d" stroke-width="1"/>
    <text x="385" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#15803d">log-likelihood climbs monotonically each iteration</text>
    <g font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a" text-anchor="middle">
      <text x="77"  y="45">iter 1: −8.3</text>
      <text x="232" y="45">iter 2: −7.6</text>
      <text x="387" y="45">iter 3: −7.2</text>
      <text x="542" y="45">iter 4: −7.0</text>
      <text x="697" y="45">iter 5: −6.9 ← converged</text>
    </g>
  </g>

  <!-- EE framing callback -->
  <g transform="translate(230 395)">
    <text x="385" y="18" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">Fractional votes are soft bits. Iterating them against a model of transcript abundances is iterative soft-decision decoding.</text>
  </g>
</svg>
