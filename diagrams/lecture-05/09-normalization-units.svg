<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" role="img" aria-labelledby="t d">
  <title id="t">TPM vs FPKM vs CPM for a small example</title>
  <desc id="d">A table showing six genes of varying lengths across four samples with raw counts, CPM, FPKM, and TPM side-by-side. Cells where the gene ranking between units differs are highlighted with an accent border.</desc>

  <text x="450" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">SAME DATA · THREE NORMALISATIONS · DIFFERENT RANKINGS</text>

  <!-- Column headers -->
  <g transform="translate(40 60)">
    <g font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" text-anchor="middle" letter-spacing="0.06em">
      <text x="65" y="0">GENE / LEN</text>
      <text x="170" y="0">RAW</text>
      <text x="310" y="0">CPM</text>
      <text x="490" y="0">FPKM</text>
      <text x="690" y="0">TPM</text>
    </g>
    <g font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" text-anchor="middle">
      <text x="130" y="16">S1</text><text x="170" y="16">S2</text><text x="210" y="16">S3</text>
      <text x="270" y="16">S1</text><text x="310" y="16">S2</text><text x="350" y="16">S3</text>
      <text x="450" y="16">S1</text><text x="490" y="16">S2</text><text x="530" y="16">S3</text>
      <text x="650" y="16">S1</text><text x="690" y="16">S2</text><text x="730" y="16">S3</text>
    </g>
  </g>

  <!-- Separator -->
  <line x1="40" y1="90" x2="860" y2="90" stroke="#c4c1b6" stroke-width="1"/>

  <!-- Rows -->
  <!-- Helper: each row at y, with length-coloured tag -->
  <g font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">
    <!-- Row G1 short 500 -->
    <g transform="translate(0 110)">
      <text x="50" y="0" font-weight="600">G1</text>
      <circle cx="86" cy="-4" r="4" fill="#15803d"/>
      <text x="92" y="0" font-size="9" fill="#8a8a85">500 bp</text>
      <text x="170" y="0" text-anchor="middle">120  150  100</text>
      <g font-weight="700" fill="#1e3a8a"><text x="310" y="0" text-anchor="middle">1200 1500 1000</text></g>
      <text x="490" y="0" text-anchor="middle">2400 3000 2000</text>
      <g font-weight="700" fill="#1e3a8a"><text x="690" y="0" text-anchor="middle">345  367  385</text></g>
    </g>

    <!-- Row G2 medium 2000 -->
    <g transform="translate(0 140)">
      <text x="50" y="0" font-weight="600">G2</text>
      <circle cx="86" cy="-4" r="4" fill="#b45309"/>
      <text x="92" y="0" font-size="9" fill="#8a8a85">2000 bp</text>
      <text x="170" y="0" text-anchor="middle">400  480  350</text>
      <text x="310" y="0" text-anchor="middle">4000 4800 3500</text>
      <g font-weight="700" fill="#1e3a8a"><text x="490" y="0" text-anchor="middle">2000 2400 1750</text></g>
      <text x="690" y="0" text-anchor="middle">287  294  337</text>
    </g>

    <!-- Row G3 long 5000 -->
    <g transform="translate(0 170)">
      <text x="50" y="0" font-weight="600">G3</text>
      <circle cx="86" cy="-4" r="4" fill="#b91c1c"/>
      <text x="92" y="0" font-size="9" fill="#8a8a85">5000 bp</text>
      <text x="170" y="0" text-anchor="middle">200  250  180</text>
      <g font-weight="700" fill="#1e3a8a"><text x="310" y="0" text-anchor="middle">2000 2500 1800</text></g>
      <text x="490" y="0" text-anchor="middle">400  500  360</text>
      <text x="690" y="0" text-anchor="middle">57   61   69</text>
    </g>

    <!-- Row G4 short-med 1200 -->
    <g transform="translate(0 200)">
      <text x="50" y="0" font-weight="600">G4</text>
      <circle cx="86" cy="-4" r="4" fill="#b45309"/>
      <text x="92" y="0" font-size="9" fill="#8a8a85">1200 bp</text>
      <text x="170" y="0" text-anchor="middle">80   95   70</text>
      <text x="310" y="0" text-anchor="middle">800  950  700</text>
      <text x="490" y="0" text-anchor="middle">667  792  583</text>
      <text x="690" y="0" text-anchor="middle">96   97  112</text>
    </g>

    <!-- Row G5 short 800 -->
    <g transform="translate(0 230)">
      <text x="50" y="0" font-weight="600">G5</text>
      <circle cx="86" cy="-4" r="4" fill="#15803d"/>
      <text x="92" y="0" font-size="9" fill="#8a8a85">800 bp</text>
      <text x="170" y="0" text-anchor="middle">60   72   50</text>
      <text x="310" y="0" text-anchor="middle">600  720  500</text>
      <text x="490" y="0" text-anchor="middle">750  900  625</text>
      <text x="690" y="0" text-anchor="middle">108  110  120</text>
    </g>

    <!-- Row G6 very short 300 -->
    <g transform="translate(0 260)">
      <text x="50" y="0" font-weight="600">G6</text>
      <circle cx="86" cy="-4" r="4" fill="#15803d"/>
      <text x="92" y="0" font-size="9" fill="#8a8a85">300 bp</text>
      <text x="170" y="0" text-anchor="middle">40   52   35</text>
      <text x="310" y="0" text-anchor="middle">400  520  350</text>
      <text x="490" y="0" text-anchor="middle">1333 1733 1167</text>
      <g font-weight="700" fill="#1e3a8a"><text x="690" y="0" text-anchor="middle">192  211  224</text></g>
    </g>
  </g>

  <!-- Highlighted cells hint -->
  <line x1="40" y1="280" x2="860" y2="280" stroke="#c4c1b6" stroke-width="1"/>

  <!-- Legend for gene-length tags -->
  <g transform="translate(40 300)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">GENE LENGTH</text>
    <circle cx="4" cy="20" r="4" fill="#15803d"/>
    <text x="14" y="24" font-family="Inter, sans-serif" font-size="10">short (≤800 bp)</text>
    <circle cx="140" cy="20" r="4" fill="#b45309"/>
    <text x="150" y="24" font-family="Inter, sans-serif" font-size="10">medium (1–2 kb)</text>
    <circle cx="280" cy="20" r="4" fill="#b91c1c"/>
    <text x="290" y="24" font-family="Inter, sans-serif" font-size="10">long (≥5 kb)</text>
  </g>

  <!-- Explanation panel -->
  <g transform="translate(40 340)">
    <rect x="0" y="0" width="820" height="80" rx="6" fill="#ebeae3" stroke="#c4c1b6" stroke-width="1"/>
    <text x="20" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">What each unit normalises for</text>
    <g font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">
      <text x="20" y="42">· <tspan font-weight="600">CPM</tspan>: library depth only. Long genes still over-weighted.</text>
      <text x="20" y="58">· <tspan font-weight="600">FPKM</tspan>: depth and gene length. Per-sample sum varies — not a proportion.</text>
      <text x="20" y="74">· <tspan font-weight="600">TPM</tspan>: length first, then depth. Per-sample sum = 10⁶. The right unit for cross-sample reporting.</text>
    </g>
  </g>
</svg>
