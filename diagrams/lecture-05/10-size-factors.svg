<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" role="img" aria-labelledby="t d">
  <title id="t">DESeq2 size factors — median of ratios</title>
  <desc id="d">Four-panel walkthrough of the DESeq2 median-of-ratios size factor estimator. Raw count matrix, geometric means per gene, per-sample ratios, size factor = median per sample, and normalised counts.</desc>

  <text x="450" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">MEDIAN-OF-RATIOS · DESeq2 SIZE FACTOR</text>

  <!-- Panel 1: Raw counts -->
  <text x="40" y="60" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">1 · RAW COUNT MATRIX</text>

  <g font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">
    <g font-weight="600" fill="#8a8a85" text-anchor="middle">
      <text x="120" y="80">S1</text>
      <text x="170" y="80">S2</text>
      <text x="220" y="80">S3</text>
      <text x="270" y="80">S4</text>
    </g>
    <g>
      <text x="50" y="100">G1</text><text x="120" y="100" text-anchor="middle">80</text><text x="170" y="100" text-anchor="middle">100</text><text x="220" y="100" text-anchor="middle">110</text><text x="270" y="100" text-anchor="middle">90</text>
      <text x="50" y="116">G2</text><text x="120" y="116" text-anchor="middle">200</text><text x="170" y="116" text-anchor="middle">250</text><text x="220" y="116" text-anchor="middle">240</text><text x="270" y="116" text-anchor="middle">220</text>
      <text x="50" y="132">G3</text><text x="120" y="132" text-anchor="middle">50</text><text x="170" y="132" text-anchor="middle">60</text><text x="220" y="132" text-anchor="middle">55</text><text x="270" y="132" text-anchor="middle">48</text>
      <text x="50" y="148">G4</text><text x="120" y="148" text-anchor="middle">400</text><text x="170" y="148" text-anchor="middle">480</text><text x="220" y="148" text-anchor="middle">500</text><text x="270" y="148" text-anchor="middle">420</text>
    </g>
    <g font-weight="600" fill="#525252">
      <text x="50" y="172">Σ</text>
      <text x="120" y="172" text-anchor="middle">730</text>
      <text x="170" y="172" text-anchor="middle">890</text>
      <text x="220" y="172" text-anchor="middle">905</text>
      <text x="270" y="172" text-anchor="middle">778</text>
    </g>
  </g>

  <!-- Panel 2: Geometric means -->
  <text x="340" y="60" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">2 · GEOM MEAN PER GENE</text>

  <g font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">
    <text x="345" y="100">G1: ⁴√(80·100·110·90) ≈ 94</text>
    <text x="345" y="118">G2: ⁴√(200·250·240·220) ≈ 227</text>
    <text x="345" y="136">G3: ⁴√(50·60·55·48) ≈ 53</text>
    <text x="345" y="154">G4: ⁴√(400·480·500·420) ≈ 449</text>
  </g>

  <!-- Arrow -->
  <line x1="285" y1="125" x2="340" y2="125" stroke="#1e3a8a" stroke-width="1.5"/>

  <!-- Panel 3: Ratios -->
  <text x="40" y="205" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">3 · RATIOS = COUNT / GEOM-MEAN PER GENE</text>

  <g font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">
    <g font-weight="600" fill="#8a8a85" text-anchor="middle">
      <text x="120" y="225">S1</text>
      <text x="170" y="225">S2</text>
      <text x="220" y="225">S3</text>
      <text x="270" y="225">S4</text>
    </g>
    <g>
      <text x="50" y="245">G1</text>
      <text x="120" y="245" text-anchor="middle">.85</text>
      <text x="170" y="245" text-anchor="middle">1.06</text>
      <text x="220" y="245" text-anchor="middle">1.17</text>
      <text x="270" y="245" text-anchor="middle">.96</text>
      <text x="50" y="261">G2</text>
      <text x="120" y="261" text-anchor="middle">.88</text>
      <text x="170" y="261" text-anchor="middle">1.10</text>
      <text x="220" y="261" text-anchor="middle">1.06</text>
      <text x="270" y="261" text-anchor="middle">.97</text>
      <text x="50" y="277">G3</text>
      <text x="120" y="277" text-anchor="middle">.94</text>
      <text x="170" y="277" text-anchor="middle">1.13</text>
      <text x="220" y="277" text-anchor="middle">1.04</text>
      <text x="270" y="277" text-anchor="middle">.91</text>
      <text x="50" y="293">G4</text>
      <text x="120" y="293" text-anchor="middle">.89</text>
      <text x="170" y="293" text-anchor="middle">1.07</text>
      <text x="220" y="293" text-anchor="middle">1.11</text>
      <text x="270" y="293" text-anchor="middle">.94</text>
    </g>
  </g>

  <!-- Panel 4: Size factors = median -->
  <text x="340" y="205" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">4 · SIZE FACTOR = MEDIAN OF RATIOS PER SAMPLE</text>

  <g transform="translate(340 215)">
    <rect x="0" y="5" width="430" height="100" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <g font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">
      <text x="15" y="35"><tspan font-weight="600" fill="#1e3a8a">S1:</tspan> median(.85, .88, .94, .89) = <tspan font-weight="700">0.89</tspan></text>
      <text x="15" y="55"><tspan font-weight="600" fill="#1e3a8a">S2:</tspan> median(1.06, 1.10, 1.13, 1.07) = <tspan font-weight="700">1.08</tspan></text>
      <text x="15" y="75"><tspan font-weight="600" fill="#1e3a8a">S3:</tspan> median(1.17, 1.06, 1.04, 1.11) = <tspan font-weight="700">1.08</tspan></text>
      <text x="15" y="95"><tspan font-weight="600" fill="#1e3a8a">S4:</tspan> median(.96, .97, .91, .94) = <tspan font-weight="700">0.95</tspan></text>
    </g>
  </g>

  <!-- Panel 5: Normalised counts (bottom) -->
  <text x="40" y="345" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#15803d" letter-spacing="0.08em">5 · NORMALISED COUNTS = RAW / SIZE FACTOR</text>

  <g transform="translate(40 355)" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">
    <g font-weight="600" fill="#8a8a85" text-anchor="middle">
      <text x="80" y="15">S1 (÷.89)</text>
      <text x="190" y="15">S2 (÷1.08)</text>
      <text x="310" y="15">S3 (÷1.08)</text>
      <text x="430" y="15">S4 (÷.95)</text>
    </g>
    <g>
      <text x="10" y="35">G1</text><text x="80" y="35" text-anchor="middle">90</text><text x="190" y="35" text-anchor="middle">93</text><text x="310" y="35" text-anchor="middle">102</text><text x="430" y="35" text-anchor="middle">95</text>
      <text x="10" y="51">G2</text><text x="80" y="51" text-anchor="middle">225</text><text x="190" y="51" text-anchor="middle">231</text><text x="310" y="51" text-anchor="middle">222</text><text x="430" y="51" text-anchor="middle">232</text>
      <text x="10" y="67">G3</text><text x="80" y="67" text-anchor="middle">56</text><text x="190" y="67" text-anchor="middle">56</text><text x="310" y="67" text-anchor="middle">51</text><text x="430" y="67" text-anchor="middle">51</text>
      <text x="10" y="83">G4</text><text x="80" y="83" text-anchor="middle">449</text><text x="190" y="83" text-anchor="middle">444</text><text x="310" y="83" text-anchor="middle">463</text><text x="430" y="83" text-anchor="middle">442</text>
    </g>
  </g>

  <text x="40" y="460" font-family="Inter, sans-serif" font-size="10" fill="#15803d" font-style="italic">Normalised: every gene now has comparable counts across samples · composition bias removed.</text>
</svg>
