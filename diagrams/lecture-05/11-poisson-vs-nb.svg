<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" role="img" aria-labelledby="t d">
  <title id="t">Poisson vs Negative Binomial for RNA-seq counts</title>
  <desc id="d">Top: two discrete probability distributions at the same mean — a tight Poisson and a wider Negative Binomial with visible overdispersion. Bottom: empirical mean-variance scatter from real RNA-seq data overlaid with the Poisson diagonal, showing points sitting above the line.</desc>

  <text x="450" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">POISSON vs NEGATIVE BINOMIAL · THE OVERDISPERSION GAP</text>

  <!-- Top: two histograms side by side -->
  <g>
    <!-- Poisson histogram -->
    <g transform="translate(60 60)">
      <text x="160" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">Poisson(μ = 50) · var = 50</text>

      <!-- Axes -->
      <line x1="0" y1="130" x2="320" y2="130" stroke="#c4c1b6" stroke-width="1"/>
      <line x1="0" y1="20" x2="0" y2="130" stroke="#c4c1b6" stroke-width="1"/>

      <!-- Tight Poisson bars centered at 50 -->
      <g fill="#eef2ff" stroke="#1e3a8a" stroke-width="1">
        <!-- bar positions around mean = 50, total ~25 bars centered -->
        <rect x="100" y="122" width="6" height="8"/>
        <rect x="110" y="115" width="6" height="15"/>
        <rect x="120" y="105" width="6" height="25"/>
        <rect x="130" y="92"  width="6" height="38"/>
        <rect x="140" y="75"  width="6" height="55"/>
        <rect x="150" y="58"  width="6" height="72"/>
        <rect x="160" y="46"  width="6" height="84"/>
        <rect x="170" y="42"  width="6" height="88"/>
        <rect x="180" y="46"  width="6" height="84"/>
        <rect x="190" y="58"  width="6" height="72"/>
        <rect x="200" y="75"  width="6" height="55"/>
        <rect x="210" y="92"  width="6" height="38"/>
        <rect x="220" y="105" width="6" height="25"/>
        <rect x="230" y="115" width="6" height="15"/>
        <rect x="240" y="122" width="6" height="8"/>
      </g>

      <!-- Axis labels -->
      <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
        <text x="100" y="145">35</text>
        <text x="170" y="145">50</text>
        <text x="240" y="145">65</text>
      </g>
      <text x="160" y="162" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">count</text>
    </g>

    <!-- NB histogram -->
    <g transform="translate(500 60)">
      <text x="160" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#b45309">NegBin(μ = 50, α = 0.2) · var = 550</text>

      <!-- Axes -->
      <line x1="0" y1="130" x2="320" y2="130" stroke="#c4c1b6" stroke-width="1"/>
      <line x1="0" y1="20" x2="0" y2="130" stroke="#c4c1b6" stroke-width="1"/>

      <!-- Wide NB bars -->
      <g fill="#fef3c7" stroke="#b45309" stroke-width="1">
        <rect x="10" y="125" width="6" height="5"/>
        <rect x="20" y="120" width="6" height="10"/>
        <rect x="30" y="114" width="6" height="16"/>
        <rect x="40" y="106" width="6" height="24"/>
        <rect x="50" y="98"  width="6" height="32"/>
        <rect x="60" y="92"  width="6" height="38"/>
        <rect x="70" y="86"  width="6" height="44"/>
        <rect x="80" y="82"  width="6" height="48"/>
        <rect x="90" y="80"  width="6" height="50"/>
        <rect x="100" y="78" width="6" height="52"/>
        <rect x="110" y="78" width="6" height="52"/>
        <rect x="120" y="78" width="6" height="52"/>
        <rect x="130" y="80" width="6" height="50"/>
        <rect x="140" y="82" width="6" height="48"/>
        <rect x="150" y="85" width="6" height="45"/>
        <rect x="160" y="88" width="6" height="42"/>
        <rect x="170" y="92" width="6" height="38"/>
        <rect x="180" y="96" width="6" height="34"/>
        <rect x="190" y="100" width="6" height="30"/>
        <rect x="200" y="104" width="6" height="26"/>
        <rect x="210" y="108" width="6" height="22"/>
        <rect x="220" y="112" width="6" height="18"/>
        <rect x="230" y="116" width="6" height="14"/>
        <rect x="240" y="119" width="6" height="11"/>
        <rect x="250" y="122" width="6" height="8"/>
        <rect x="260" y="125" width="6" height="5"/>
        <rect x="270" y="127" width="6" height="3"/>
      </g>

      <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
        <text x="10"  y="145">0</text>
        <text x="115" y="145">50</text>
        <text x="230" y="145">120</text>
        <text x="290" y="145">180</text>
      </g>
      <text x="160" y="162" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">count</text>
    </g>
  </g>

  <!-- Bottom: empirical mean-variance plot -->
  <g transform="translate(100 250)">
    <text x="350" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">empirical RNA-seq · log-log mean vs variance</text>

    <!-- Axes -->
    <line x1="0" y1="140" x2="700" y2="140" stroke="#c4c1b6" stroke-width="1"/>
    <line x1="0" y1="20" x2="0" y2="140" stroke="#c4c1b6" stroke-width="1"/>

    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85">
      <text x="-8" y="144" text-anchor="end">10⁰</text>
      <text x="-8" y="100" text-anchor="end">10²</text>
      <text x="-8" y="56"  text-anchor="end">10⁴</text>
      <text x="-8" y="24"  text-anchor="end">10⁶</text>

      <text x="0"   y="155" text-anchor="middle">10⁰</text>
      <text x="175" y="155" text-anchor="middle">10¹</text>
      <text x="350" y="155" text-anchor="middle">10²</text>
      <text x="525" y="155" text-anchor="middle">10³</text>
      <text x="700" y="155" text-anchor="middle">10⁴</text>
    </g>

    <text x="-30" y="82" font-family="Inter, sans-serif" font-size="10" fill="#525252" transform="rotate(-90 -30 82)">variance</text>
    <text x="350" y="175" font-family="Inter, sans-serif" font-size="10" fill="#525252" text-anchor="middle">mean count per gene</text>

    <!-- Poisson reference line: y = x on log-log, which means slope 1 in log space -->
    <line x1="0" y1="140" x2="700" y2="44" stroke="#1e3a8a" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="620" y="50" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a">var = mean (Poisson)</text>

    <!-- Scatter points sitting above the Poisson line -->
    <g fill="#0a0a0a">
      <!-- Generate a reasonable scatter: many points above the line -->
      <circle cx="40"  cy="128" r="1.5"/>
      <circle cx="50"  cy="126" r="1.5"/>
      <circle cx="65"  cy="122" r="1.5"/>
      <circle cx="75"  cy="120" r="1.5"/>
      <circle cx="90"  cy="115" r="1.5"/>
      <circle cx="100" cy="113" r="1.5"/>
      <circle cx="115" cy="108" r="1.5"/>
      <circle cx="130" cy="104" r="1.5"/>
      <circle cx="150" cy="98"  r="1.5"/>
      <circle cx="170" cy="92"  r="1.5"/>
      <circle cx="190" cy="86"  r="1.5"/>
      <circle cx="210" cy="80"  r="1.5"/>
      <circle cx="230" cy="75"  r="1.5"/>
      <circle cx="250" cy="70"  r="1.5"/>
      <circle cx="270" cy="66"  r="1.5"/>
      <circle cx="290" cy="62"  r="1.5"/>
      <circle cx="310" cy="58"  r="1.5"/>
      <circle cx="330" cy="54"  r="1.5"/>
      <circle cx="350" cy="50"  r="1.5"/>
      <circle cx="370" cy="46"  r="1.5"/>
      <circle cx="390" cy="42"  r="1.5"/>
      <circle cx="410" cy="38"  r="1.5"/>
      <circle cx="430" cy="34"  r="1.5"/>
      <circle cx="450" cy="30"  r="1.5"/>
      <circle cx="470" cy="26"  r="1.5"/>
      <circle cx="490" cy="22"  r="1.5"/>
      <!-- Add noise / spread -->
      <circle cx="45" cy="131" r="1.5"/>
      <circle cx="55" cy="129" r="1.5"/>
      <circle cx="70" cy="124" r="1.5"/>
      <circle cx="95" cy="117" r="1.5"/>
      <circle cx="125" cy="107" r="1.5"/>
      <circle cx="155" cy="96" r="1.5"/>
      <circle cx="185" cy="85" r="1.5"/>
      <circle cx="215" cy="76" r="1.5"/>
      <circle cx="245" cy="68" r="1.5"/>
      <circle cx="275" cy="62" r="1.5"/>
      <circle cx="305" cy="55" r="1.5"/>
      <circle cx="335" cy="49" r="1.5"/>
      <circle cx="365" cy="43" r="1.5"/>
      <circle cx="395" cy="37" r="1.5"/>
      <circle cx="425" cy="31" r="1.5"/>
      <circle cx="455" cy="25" r="1.5"/>
      <circle cx="80"  cy="118" r="1.5"/>
      <circle cx="140" cy="101" r="1.5"/>
      <circle cx="220" cy="78" r="1.5"/>
      <circle cx="300" cy="58" r="1.5"/>
      <circle cx="380" cy="43" r="1.5"/>
      <circle cx="460" cy="28" r="1.5"/>
      <circle cx="520" cy="16" r="1.5"/>
      <!-- Some scatter below the line (low-count genes with slight variance) -->
      <circle cx="30" cy="135" r="1.5"/>
      <circle cx="60" cy="133" r="1.5"/>
      <circle cx="40" cy="130" r="1.5"/>
      <!-- Highlighted point at μ=100 showing the gap -->
      <circle cx="350" cy="50" r="4" fill="#b45309" stroke="#0a0a0a" stroke-width="0.5"/>
    </g>

    <!-- Annotation arrow -->
    <g>
      <line x1="520" y1="85" x2="365" y2="55" stroke="#b45309" stroke-width="1.2"/>
      <text x="528" y="82" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b45309">at μ ≈ 100, var ≈ 500</text>
      <text x="528" y="96" font-family="Inter, sans-serif" font-size="10" fill="#b45309">5× Poisson — overdispersion</text>
    </g>
  </g>
</svg>
