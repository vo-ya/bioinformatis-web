<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" role="img" aria-labelledby="t d">
  <title id="t">Anatomy of a volcano plot</title>
  <desc id="d">A volcano plot with ~2000 gene points; log2 fold change on x-axis, -log10 adjusted p-value on y-axis. Dashed threshold lines at padj = 0.05 and |log2FC| = 1 carve the plane into significance/effect quadrants. Five example genes labeled.</desc>

  <text x="450" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">VOLCANO PLOT · EFFECT × CONFIDENCE</text>

  <!-- Plot area: x = 70..830, y = 60..400. x axis is log2FC -5 to 5. y axis is -log10(padj) 0 to 15. -->
  <!-- Axis setup -->
  <g stroke="#c4c1b6" stroke-width="1">
    <line x1="70" y1="400" x2="830" y2="400"/>
    <line x1="450" y1="60" x2="450" y2="400"/>
  </g>

  <!-- x-axis ticks -->
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
    <line x1="146" y1="400" x2="146" y2="404" stroke="#c4c1b6"/>
    <text x="146" y="418">-4</text>
    <line x1="222" y1="400" x2="222" y2="404" stroke="#c4c1b6"/>
    <text x="222" y="418">-3</text>
    <line x1="298" y1="400" x2="298" y2="404" stroke="#c4c1b6"/>
    <text x="298" y="418">-2</text>
    <line x1="374" y1="400" x2="374" y2="404" stroke="#c4c1b6"/>
    <text x="374" y="418">-1</text>
    <line x1="450" y1="400" x2="450" y2="404" stroke="#c4c1b6"/>
    <text x="450" y="418">0</text>
    <line x1="526" y1="400" x2="526" y2="404" stroke="#c4c1b6"/>
    <text x="526" y="418">1</text>
    <line x1="602" y1="400" x2="602" y2="404" stroke="#c4c1b6"/>
    <text x="602" y="418">2</text>
    <line x1="678" y1="400" x2="678" y2="404" stroke="#c4c1b6"/>
    <text x="678" y="418">3</text>
    <line x1="754" y1="400" x2="754" y2="404" stroke="#c4c1b6"/>
    <text x="754" y="418">4</text>
  </g>
  <text x="450" y="440" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#525252">log<tspan font-size="9">₂</tspan> fold change</text>

  <!-- y-axis ticks -->
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="end">
    <line x1="66" y1="400" x2="70" y2="400" stroke="#c4c1b6"/>
    <text x="62" y="404">0</text>
    <line x1="66" y1="325" x2="70" y2="325" stroke="#c4c1b6"/>
    <text x="62" y="329">3</text>
    <line x1="66" y1="240" x2="70" y2="240" stroke="#c4c1b6"/>
    <text x="62" y="244">6</text>
    <line x1="66" y1="155" x2="70" y2="155" stroke="#c4c1b6"/>
    <text x="62" y="159">9</text>
    <line x1="66" y1="75" x2="70" y2="75" stroke="#c4c1b6"/>
    <text x="62" y="79">12</text>
  </g>
  <text x="28" y="230" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#525252" transform="rotate(-90 28 230)">−log<tspan font-size="9">₁₀</tspan>(padj)</text>

  <!-- Threshold lines: padj = 0.05 → y = 378 (approx -log10 = 1.3, so y = 400 - 1.3*25 = 367.5, rounded); log2FC = ±1 → x = 374, 526 -->
  <line x1="70" y1="367" x2="830" y2="367" stroke="#1e3a8a" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="374" y1="60" x2="374" y2="400" stroke="#1e3a8a" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="526" y1="60" x2="526" y2="400" stroke="#1e3a8a" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Threshold labels -->
  <text x="836" y="370" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a">padj=0.05</text>
  <text x="378" y="56" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a">−1</text>
  <text x="530" y="56" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a">+1</text>

  <!-- Scatter: ~2000 points, mostly near origin, with some in significant quadrants -->
  <g fill="#8a8a85">
    <!-- Null cloud around (0, low) -->
    <circle cx="420" cy="395" r="1.5"/><circle cx="440" cy="396" r="1.5"/><circle cx="455" cy="394" r="1.5"/>
    <circle cx="470" cy="398" r="1.5"/><circle cx="485" cy="395" r="1.5"/><circle cx="430" cy="390" r="1.5"/>
    <circle cx="445" cy="392" r="1.5"/><circle cx="460" cy="388" r="1.5"/><circle cx="475" cy="391" r="1.5"/>
    <circle cx="490" cy="389" r="1.5"/><circle cx="410" cy="385" r="1.5"/><circle cx="425" cy="387" r="1.5"/>
    <circle cx="495" cy="385" r="1.5"/><circle cx="500" cy="390" r="1.5"/><circle cx="415" cy="380" r="1.5"/>
    <circle cx="435" cy="383" r="1.5"/><circle cx="465" cy="380" r="1.5"/><circle cx="480" cy="384" r="1.5"/>
    <circle cx="400" cy="395" r="1.5"/><circle cx="505" cy="395" r="1.5"/><circle cx="395" cy="390" r="1.5"/>
    <circle cx="510" cy="390" r="1.5"/><circle cx="390" cy="385" r="1.5"/><circle cx="515" cy="385" r="1.5"/>
    <circle cx="385" cy="388" r="1.5"/><circle cx="520" cy="388" r="1.5"/><circle cx="380" cy="395" r="1.5"/>
    <circle cx="440" cy="378" r="1.5"/><circle cx="460" cy="378" r="1.5"/>
    <!-- Spread -->
    <circle cx="370" cy="385" r="1.5"/><circle cx="350" cy="388" r="1.5"/><circle cx="530" cy="385" r="1.5"/>
    <circle cx="550" cy="388" r="1.5"/><circle cx="360" cy="382" r="1.5"/><circle cx="540" cy="382" r="1.5"/>
    <circle cx="330" cy="390" r="1.5"/><circle cx="570" cy="390" r="1.5"/><circle cx="310" cy="388" r="1.5"/>
    <circle cx="590" cy="388" r="1.5"/><circle cx="290" cy="392" r="1.5"/><circle cx="610" cy="392" r="1.5"/>
    <circle cx="270" cy="394" r="1.5"/><circle cx="630" cy="394" r="1.5"/><circle cx="250" cy="390" r="1.5"/>
    <circle cx="650" cy="390" r="1.5"/><circle cx="230" cy="392" r="1.5"/><circle cx="670" cy="392" r="1.5"/>
    <circle cx="210" cy="394" r="1.5"/><circle cx="690" cy="394" r="1.5"/><circle cx="180" cy="395" r="1.5"/>
    <circle cx="720" cy="395" r="1.5"/><circle cx="150" cy="396" r="1.5"/><circle cx="750" cy="396" r="1.5"/>
    <!-- Moderate signal -->
    <circle cx="340" cy="370" r="1.5"/><circle cx="560" cy="370" r="1.5"/><circle cx="320" cy="365" r="1.5"/>
    <circle cx="580" cy="365" r="1.5"/><circle cx="300" cy="360" r="1.5"/><circle cx="600" cy="360" r="1.5"/>
    <circle cx="280" cy="355" r="1.5"/><circle cx="620" cy="355" r="1.5"/><circle cx="260" cy="350" r="1.5"/>
    <circle cx="640" cy="350" r="1.5"/><circle cx="355" cy="372" r="1.5"/><circle cx="545" cy="372" r="1.5"/>
    <circle cx="470" cy="375" r="1.5"/><circle cx="430" cy="375" r="1.5"/>
  </g>

  <!-- Significant up-regulated (top right) -->
  <g fill="#1e3a8a">
    <circle cx="540" cy="320" r="1.8"/><circle cx="555" cy="310" r="1.8"/><circle cx="570" cy="295" r="1.8"/>
    <circle cx="585" cy="280" r="1.8"/><circle cx="600" cy="260" r="1.8"/><circle cx="615" cy="275" r="1.8"/>
    <circle cx="630" cy="250" r="1.8"/><circle cx="645" cy="240" r="1.8"/><circle cx="660" cy="220" r="1.8"/>
    <circle cx="675" cy="200" r="1.8"/><circle cx="690" cy="185" r="1.8"/><circle cx="705" cy="170" r="1.8"/>
    <circle cx="560" cy="300" r="1.8"/><circle cx="580" cy="290" r="1.8"/><circle cx="600" cy="275" r="1.8"/>
    <circle cx="620" cy="260" r="1.8"/><circle cx="640" cy="245" r="1.8"/><circle cx="660" cy="230" r="1.8"/>
    <circle cx="680" cy="215" r="1.8"/><circle cx="700" cy="195" r="1.8"/><circle cx="545" cy="340" r="1.8"/>
    <circle cx="565" cy="325" r="1.8"/><circle cx="585" cy="315" r="1.8"/><circle cx="605" cy="300" r="1.8"/>
  </g>

  <!-- Significant down-regulated (top left) -->
  <g fill="#b91c1c">
    <circle cx="360" cy="320" r="1.8"/><circle cx="345" cy="310" r="1.8"/><circle cx="330" cy="295" r="1.8"/>
    <circle cx="315" cy="280" r="1.8"/><circle cx="300" cy="265" r="1.8"/><circle cx="285" cy="250" r="1.8"/>
    <circle cx="270" cy="235" r="1.8"/><circle cx="255" cy="220" r="1.8"/><circle cx="355" cy="330" r="1.8"/>
    <circle cx="340" cy="325" r="1.8"/><circle cx="325" cy="310" r="1.8"/><circle cx="310" cy="295" r="1.8"/>
    <circle cx="295" cy="280" r="1.8"/><circle cx="280" cy="265" r="1.8"/><circle cx="265" cy="250" r="1.8"/>
    <circle cx="365" cy="340" r="1.8"/><circle cx="350" cy="340" r="1.8"/><circle cx="335" cy="340" r="1.8"/>
  </g>

  <!-- Highlighted named genes -->
  <!-- IL6: up-regulated, big effect, highly significant -->
  <g>
    <circle cx="690" cy="150" r="5" fill="#1e3a8a" stroke="#0a0a0a" stroke-width="0.8"/>
    <text x="700" y="145" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#0a0a0a">IL6</text>
    <text x="700" y="157" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">log₂FC 3.2 · padj 1e-9</text>
  </g>

  <!-- MKI67: up-regulated, moderate effect -->
  <g>
    <circle cx="545" cy="230" r="5" fill="#1e3a8a" stroke="#0a0a0a" stroke-width="0.8"/>
    <text x="555" y="228" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#0a0a0a">MKI67</text>
    <text x="555" y="240" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">log₂FC 1.1 · padj 0.003</text>
  </g>

  <!-- FOXO3: down-regulated; sub-label end-anchored to keep it left of the dot -->
  <g>
    <circle cx="290" cy="180" r="5" fill="#b91c1c" stroke="#0a0a0a" stroke-width="0.8"/>
    <text x="270" y="178" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#0a0a0a">FOXO3</text>
    <text x="270" y="190" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">log₂FC −2.2 · padj 3e-7</text>
  </g>

  <!-- BAX: just above threshold; sub-label sits below threshold line at y=367 to avoid being sliced -->
  <g>
    <circle cx="530" cy="360" r="5" fill="#1e3a8a" stroke="#0a0a0a" stroke-width="0.8" opacity="0.7"/>
    <text x="540" y="358" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#0a0a0a">BAX</text>
    <text x="540" y="380" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">borderline · padj 0.04</text>
  </g>

  <!-- GAPDH: centrally located, null. Sub-label removed — its position at y=407 was crossed by the x-axis at y=400 and clashed with tick labels at y=418. Dot position alone conveys "housekeeping = null". -->
  <g>
    <circle cx="450" cy="393" r="4" fill="#525252" stroke="#0a0a0a" stroke-width="0.8"/>
    <text x="370" y="395" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#0a0a0a">GAPDH</text>
  </g>

  <!-- Quadrant labels (corners) -->
  <g font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" font-style="italic">
    <text x="200" y="80">significant down</text>
    <text x="700" y="80">significant up</text>
  </g>
</svg>
