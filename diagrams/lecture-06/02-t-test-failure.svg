<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" role="img" aria-labelledby="t d">
  <title id="t">Why t-tests fail on RNA-seq counts</title>
  <desc id="d">Left panel: histogram of a low-count gene (right-skewed with a zero spike) overlaid with a normal distribution of the same mean and variance — the normal extends below zero, the data has integer bins. Right panel: p-value histogram under the null from a t-test on count data, non-uniform with excess near zero indicating miscalibrated false positives.</desc>

  <text x="450" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">THE T-TEST DOES NOT FIT COUNT DATA</text>

  <!-- LEFT: count histogram vs normal -->
  <g>
    <text x="200" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">a low-count gene vs a normal(μ = 5, σ² = 5)</text>

    <!-- Axes -->
    <line x1="50" y1="340" x2="370" y2="340" stroke="#c4c1b6" stroke-width="1"/>
    <line x1="50" y1="80"  x2="50"  y2="340" stroke="#c4c1b6" stroke-width="1"/>

    <!-- x axis labels: 0 to 20 counts, mapped to x 60..360 (15px per unit) -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
      <text x="60" y="354">0</text>
      <text x="135" y="354">5</text>
      <text x="210" y="354">10</text>
      <text x="285" y="354">15</text>
      <text x="360" y="354">20</text>
    </g>
    <text x="210" y="375" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">count</text>

    <!-- Histogram bars (Poisson-like skewed, zero spike at count=0 then peak at 3-5, tail to 20) -->
    <g fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.2">
      <rect x="55"  y="200" width="14" height="140"/>
      <rect x="70"  y="160" width="14" height="180"/>
      <rect x="85"  y="130" width="14" height="210"/>
      <rect x="100" y="115" width="14" height="225"/>
      <rect x="115" y="105" width="14" height="235"/>
      <rect x="130" y="100" width="14" height="240"/>
      <rect x="145" y="115" width="14" height="225"/>
      <rect x="160" y="130" width="14" height="210"/>
      <rect x="175" y="155" width="14" height="185"/>
      <rect x="190" y="180" width="14" height="160"/>
      <rect x="205" y="210" width="14" height="130"/>
      <rect x="220" y="235" width="14" height="105"/>
      <rect x="235" y="260" width="14" height="80"/>
      <rect x="250" y="280" width="14" height="60"/>
      <rect x="265" y="295" width="14" height="45"/>
      <rect x="280" y="310" width="14" height="30"/>
      <rect x="295" y="322" width="14" height="18"/>
      <rect x="310" y="330" width="14" height="10"/>
      <rect x="325" y="335" width="14" height="5"/>
    </g>

    <!-- Normal overlay: dashed curve centred at x=135 (count=5), sigma ≈ 2.24 -->
    <path d="M 50 340 Q 80 340 95 330 T 120 270 Q 130 230 135 215 Q 145 195 155 220 Q 170 270 185 320 Q 200 340 215 340 L 370 340"
          fill="none" stroke="#b45309" stroke-width="1.8" stroke-dasharray="5 3"/>

    <!-- Below-zero continuation of normal (impossible for counts) -->
    <path d="M 50 340 Q 40 320 35 295 Q 30 270 20 260" stroke="#b91c1c" stroke-width="1.8" stroke-dasharray="5 3" fill="none"/>
    <text x="10" y="250" font-family="Inter, sans-serif" font-size="9" fill="#b91c1c" font-style="italic">normal goes negative</text>

    <!-- Annotation on zero spike -->
    <path d="M 62 220 L 62 190" stroke="#b91c1c" stroke-width="1"/>
    <text x="62" y="185" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#b91c1c">zero spike</text>

    <!-- Legend -->
    <g transform="translate(230 80)">
      <rect x="0" y="0" width="14" height="10" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
      <text x="18" y="9" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">observed counts</text>
      <line x1="0" y1="24" x2="14" y2="24" stroke="#b45309" stroke-width="1.8" stroke-dasharray="5 3"/>
      <text x="18" y="28" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">normal(μ=5, σ²=5)</text>
    </g>
  </g>

  <!-- Divider -->
  <line x1="420" y1="60" x2="420" y2="370" stroke="#e5e3dc" stroke-width="1"/>

  <!-- RIGHT: p-value histogram under null -->
  <g>
    <text x="670" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">p-value histogram under H₀ · t-test on counts</text>

    <line x1="480" y1="340" x2="870" y2="340" stroke="#c4c1b6" stroke-width="1"/>
    <line x1="480" y1="80"  x2="480"  y2="340" stroke="#c4c1b6" stroke-width="1"/>

    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
      <text x="480" y="354">0</text>
      <text x="578" y="354">0.25</text>
      <text x="675" y="354">0.5</text>
      <text x="772" y="354">0.75</text>
      <text x="870" y="354">1</text>
    </g>
    <text x="675" y="375" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">p-value</text>

    <!-- Bars: biased toward 0 (false positives), underrepresented near 1 -->
    <g fill="#fef3c7" stroke="#b45309" stroke-width="1">
      <rect x="485" y="155" width="24" height="185"/>
      <rect x="510" y="195" width="24" height="145"/>
      <rect x="535" y="220" width="24" height="120"/>
      <rect x="560" y="240" width="24" height="100"/>
      <rect x="585" y="250" width="24" height="90"/>
      <rect x="610" y="258" width="24" height="82"/>
      <rect x="635" y="265" width="24" height="75"/>
      <rect x="660" y="272" width="24" height="68"/>
      <rect x="685" y="278" width="24" height="62"/>
      <rect x="710" y="285" width="24" height="55"/>
      <rect x="735" y="292" width="24" height="48"/>
      <rect x="760" y="298" width="24" height="42"/>
      <rect x="785" y="305" width="24" height="35"/>
      <rect x="810" y="315" width="24" height="25"/>
      <rect x="835" y="322" width="24" height="18"/>
    </g>

    <!-- Expected uniform line overlaid -->
    <line x1="485" y1="258" x2="860" y2="258" stroke="#1e3a8a" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="625" y="250" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a" font-style="italic">expected uniform</text>

    <!-- Annotation: excess -->
    <path d="M 500 130 L 500 150" stroke="#b45309" stroke-width="1" marker-end="url(#arr-02)"/>
    <text x="500" y="125" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#b45309">excess near 0</text>
    <text x="500" y="112" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#b45309">= false positives</text>
  </g>

  <defs>
    <marker id="arr-02" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
  </defs>

  <text x="450" y="395" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85" font-style="italic">The t-test assumes normal data with constant variance. Counts are neither — so the p-values come out wrong.</text>
</svg>
