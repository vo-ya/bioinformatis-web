<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img" aria-labelledby="t d">
  <title id="t">Mean–dispersion relationship in RNA-seq</title>
  <desc id="d">Log-log scatter of mean count (x-axis) against per-gene dispersion (y-axis). About 2000 gene points cluster in a downward-sloping cloud: low-mean genes have high dispersion, high-mean genes have low dispersion. A fitted trend curve passes through the cloud.</desc>

  <text x="450" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">MEAN–DISPERSION CLOUD · 20K GENES · THE HOOK FOR EMPIRICAL BAYES</text>

  <!-- Axes -->
  <line x1="80" y1="360" x2="830" y2="360" stroke="#c4c1b6" stroke-width="1"/>
  <line x1="80" y1="60" x2="80" y2="360" stroke="#c4c1b6" stroke-width="1"/>

  <!-- x-axis: mean count (log scale) 10^0 to 10^4, mapped 80..830 (~188 per decade) -->
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
    <line x1="80" y1="360" x2="80" y2="364" stroke="#c4c1b6"/>
    <text x="80" y="378">10⁰</text>
    <line x1="268" y1="360" x2="268" y2="364" stroke="#c4c1b6"/>
    <text x="268" y="378">10¹</text>
    <line x1="455" y1="360" x2="455" y2="364" stroke="#c4c1b6"/>
    <text x="455" y="378">10²</text>
    <line x1="642" y1="360" x2="642" y2="364" stroke="#c4c1b6"/>
    <text x="642" y="378">10³</text>
    <line x1="830" y1="360" x2="830" y2="364" stroke="#c4c1b6"/>
    <text x="830" y="378">10⁴</text>
  </g>
  <text x="455" y="400" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#525252">mean count per gene (log scale)</text>

  <!-- y-axis: dispersion α (log scale) 10^-3 to 10^1, mapped 60..360 (~75 per decade) -->
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="end">
    <line x1="76" y1="360" x2="80" y2="360" stroke="#c4c1b6"/>
    <text x="72" y="364">10⁻³</text>
    <line x1="76" y1="285" x2="80" y2="285" stroke="#c4c1b6"/>
    <text x="72" y="289">10⁻²</text>
    <line x1="76" y1="210" x2="80" y2="210" stroke="#c4c1b6"/>
    <text x="72" y="214">10⁻¹</text>
    <line x1="76" y1="135" x2="80" y2="135" stroke="#c4c1b6"/>
    <text x="72" y="139">10⁰</text>
    <line x1="76" y1="60" x2="80" y2="60" stroke="#c4c1b6"/>
    <text x="72" y="64">10¹</text>
  </g>
  <text x="30" y="210" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#525252" transform="rotate(-90 30 210)">dispersion α</text>

  <!-- Scatter: ~200 points along decreasing trend with noise -->
  <g fill="#0a0a0a">
    <!-- Low-mean region (noisy, high dispersion): x ~80-200, y ~100-180 -->
    <circle cx="85" cy="120" r="1.5"/><circle cx="92" cy="95" r="1.5"/><circle cx="100" cy="110" r="1.5"/>
    <circle cx="110" cy="135" r="1.5"/><circle cx="120" cy="115" r="1.5"/><circle cx="130" cy="145" r="1.5"/>
    <circle cx="140" cy="125" r="1.5"/><circle cx="150" cy="160" r="1.5"/><circle cx="160" cy="135" r="1.5"/>
    <circle cx="170" cy="170" r="1.5"/><circle cx="180" cy="155" r="1.5"/><circle cx="190" cy="180" r="1.5"/>
    <circle cx="200" cy="165" r="1.5"/><circle cx="210" cy="145" r="1.5"/><circle cx="220" cy="175" r="1.5"/>
    <circle cx="95" cy="140" r="1.5"/><circle cx="115" cy="95" r="1.5"/><circle cx="135" cy="100" r="1.5"/>
    <circle cx="155" cy="185" r="1.5"/><circle cx="175" cy="120" r="1.5"/><circle cx="195" cy="140" r="1.5"/>
    <circle cx="215" cy="150" r="1.5"/><circle cx="88" cy="155" r="1.5"/><circle cx="108" cy="175" r="1.5"/>
    <circle cx="128" cy="165" r="1.5"/><circle cx="148" cy="140" r="1.5"/><circle cx="168" cy="195" r="1.5"/>
    <circle cx="188" cy="200" r="1.5"/><circle cx="208" cy="185" r="1.5"/><circle cx="228" cy="170" r="1.5"/>
    <!-- Medium-mean region: x ~250-450, y ~180-260 -->
    <circle cx="240" cy="185" r="1.5"/><circle cx="260" cy="205" r="1.5"/><circle cx="280" cy="195" r="1.5"/>
    <circle cx="300" cy="220" r="1.5"/><circle cx="320" cy="210" r="1.5"/><circle cx="340" cy="235" r="1.5"/>
    <circle cx="360" cy="225" r="1.5"/><circle cx="380" cy="245" r="1.5"/><circle cx="400" cy="235" r="1.5"/>
    <circle cx="420" cy="255" r="1.5"/><circle cx="440" cy="245" r="1.5"/><circle cx="460" cy="265" r="1.5"/>
    <circle cx="250" cy="195" r="1.5"/><circle cx="270" cy="180" r="1.5"/><circle cx="290" cy="215" r="1.5"/>
    <circle cx="310" cy="200" r="1.5"/><circle cx="330" cy="225" r="1.5"/><circle cx="350" cy="215" r="1.5"/>
    <circle cx="370" cy="240" r="1.5"/><circle cx="390" cy="225" r="1.5"/><circle cx="410" cy="250" r="1.5"/>
    <circle cx="430" cy="240" r="1.5"/><circle cx="450" cy="270" r="1.5"/><circle cx="245" cy="220" r="1.5"/>
    <circle cx="265" cy="165" r="1.5"/><circle cx="285" cy="235" r="1.5"/><circle cx="305" cy="175" r="1.5"/>
    <circle cx="325" cy="250" r="1.5"/><circle cx="345" cy="195" r="1.5"/><circle cx="365" cy="260" r="1.5"/>
    <circle cx="385" cy="205" r="1.5"/><circle cx="405" cy="275" r="1.5"/><circle cx="425" cy="215" r="1.5"/>
    <circle cx="445" cy="280" r="1.5"/><circle cx="465" cy="225" r="1.5"/>
    <!-- High-mean region: x ~500-800, y ~250-330 -->
    <circle cx="480" cy="275" r="1.5"/><circle cx="500" cy="265" r="1.5"/><circle cx="520" cy="285" r="1.5"/>
    <circle cx="540" cy="275" r="1.5"/><circle cx="560" cy="295" r="1.5"/><circle cx="580" cy="285" r="1.5"/>
    <circle cx="600" cy="305" r="1.5"/><circle cx="620" cy="295" r="1.5"/><circle cx="640" cy="315" r="1.5"/>
    <circle cx="660" cy="305" r="1.5"/><circle cx="680" cy="325" r="1.5"/><circle cx="700" cy="315" r="1.5"/>
    <circle cx="720" cy="330" r="1.5"/><circle cx="740" cy="320" r="1.5"/><circle cx="760" cy="335" r="1.5"/>
    <circle cx="780" cy="325" r="1.5"/><circle cx="800" cy="340" r="1.5"/><circle cx="820" cy="330" r="1.5"/>
    <circle cx="490" cy="285" r="1.5"/><circle cx="510" cy="255" r="1.5"/><circle cx="530" cy="275" r="1.5"/>
    <circle cx="550" cy="265" r="1.5"/><circle cx="570" cy="285" r="1.5"/><circle cx="590" cy="275" r="1.5"/>
    <circle cx="610" cy="295" r="1.5"/><circle cx="630" cy="285" r="1.5"/><circle cx="650" cy="305" r="1.5"/>
    <circle cx="670" cy="295" r="1.5"/><circle cx="690" cy="315" r="1.5"/><circle cx="710" cy="305" r="1.5"/>
    <circle cx="730" cy="325" r="1.5"/><circle cx="750" cy="310" r="1.5"/><circle cx="770" cy="330" r="1.5"/>
    <circle cx="790" cy="315" r="1.5"/><circle cx="810" cy="335" r="1.5"/>
  </g>

  <!-- Fitted trend curve: downward, from ~(80, 130) to ~(830, 320) -->
  <path d="M 85 130 Q 250 200 450 250 Q 650 300 820 325" fill="none" stroke="#1e3a8a" stroke-width="2.5"/>
  <text x="750" y="300" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">fitted trend</text>

  <!-- Annotations at three example points -->
  <g>
    <circle cx="130" cy="145" r="4" fill="none" stroke="#b45309" stroke-width="2"/>
    <text x="145" y="145" font-family="Inter, sans-serif" font-size="9" fill="#b45309" font-style="italic">low-count, high dispersion</text>
  </g>
  <g>
    <circle cx="400" cy="235" r="4" fill="none" stroke="#b45309" stroke-width="2"/>
    <text x="415" y="235" font-family="Inter, sans-serif" font-size="9" fill="#b45309" font-style="italic">moderate</text>
  </g>
  <g>
    <circle cx="750" cy="320" r="4" fill="none" stroke="#b45309" stroke-width="2"/>
    <text x="760" y="350" font-family="Inter, sans-serif" font-size="9" fill="#b45309" font-style="italic">high-count, tight dispersion</text>
  </g>
</svg>
