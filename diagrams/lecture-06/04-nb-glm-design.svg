<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 440" role="img" aria-labelledby="t d">
  <title id="t">NB GLM — design matrix and log-link</title>
  <desc id="d">A six-sample toy dataset. Sample table with condition (control/treated) and batch (A/B). Design matrix with intercept, condition, batch columns. One gene's counts. The log-link GLM equation. Fitted coefficients with standard errors. Arrows connect design-matrix columns to their role in the prediction.</desc>

  <defs>
    <marker id="arr-04" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <text x="490" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">NB GLM · DESIGN MATRIX · LOG-LINK · FITTED COEFFS</text>

  <!-- LEFT: sample table -->
  <g>
    <text x="40" y="60" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">SAMPLES (6)</text>

    <rect x="40" y="70" width="280" height="130" rx="4" fill="#f4f3ee" stroke="#c4c1b6"/>
    <g font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" text-anchor="middle">
      <text x="70" y="90">Sample</text>
      <text x="140" y="90">Condition</text>
      <text x="220" y="90">Batch</text>
      <text x="285" y="90">Size</text>
    </g>
    <line x1="40" y1="96" x2="320" y2="96" stroke="#c4c1b6"/>
    <g font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a" text-anchor="middle">
      <text x="70" y="112">S1</text><text x="140" y="112">control</text><text x="220" y="112">A</text><text x="285" y="112">1.00</text>
      <text x="70" y="128">S2</text><text x="140" y="128">control</text><text x="220" y="128">B</text><text x="285" y="128">1.05</text>
      <text x="70" y="144">S3</text><text x="140" y="144">control</text><text x="220" y="144">A</text><text x="285" y="144">0.95</text>
      <text x="70" y="160">S4</text><text x="140" y="160" fill="#1e3a8a">treated</text><text x="220" y="160">B</text><text x="285" y="160">1.02</text>
      <text x="70" y="176">S5</text><text x="140" y="176" fill="#1e3a8a">treated</text><text x="220" y="176">A</text><text x="285" y="176">0.98</text>
      <text x="70" y="192">S6</text><text x="140" y="192" fill="#1e3a8a">treated</text><text x="220" y="192">B</text><text x="285" y="192">1.01</text>
    </g>
  </g>

  <!-- Arrow to design matrix -->
  <line x1="324" y1="135" x2="356" y2="135" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-04)"/>

  <!-- CENTER: design matrix -->
  <g>
    <text x="430" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">DESIGN MATRIX X</text>

    <rect x="360" y="70" width="180" height="130" rx="4" fill="#eef2ff" stroke="#1e3a8a"/>
    <g font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#1e3a8a" text-anchor="middle">
      <text x="388" y="90">Intercept</text>
      <text x="450" y="90">Cond</text>
      <text x="510" y="90">Batch</text>
    </g>
    <line x1="360" y1="96" x2="540" y2="96" stroke="#c4c1b6"/>
    <g font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a" text-anchor="middle">
      <text x="388" y="112">1</text><text x="450" y="112">0</text><text x="510" y="112">0</text>
      <text x="388" y="128">1</text><text x="450" y="128">0</text><text x="510" y="128">1</text>
      <text x="388" y="144">1</text><text x="450" y="144">0</text><text x="510" y="144">0</text>
      <text x="388" y="160">1</text><text x="450" y="160">1</text><text x="510" y="160">1</text>
      <text x="388" y="176">1</text><text x="450" y="176">1</text><text x="510" y="176">0</text>
      <text x="388" y="192">1</text><text x="450" y="192">1</text><text x="510" y="192">1</text>
    </g>
  </g>

  <!-- Arrow to counts -->
  <line x1="544" y1="135" x2="576" y2="135" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-04)"/>

  <!-- RIGHT: counts + fit -->
  <g>
    <text x="680" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">GENE COUNTS · ONE GENE</text>

    <rect x="580" y="70" width="200" height="130" rx="4" fill="#f4f3ee" stroke="#c4c1b6"/>
    <g font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a" text-anchor="middle">
      <text x="610" y="90" font-weight="600" fill="#1e3a8a">Sample</text>
      <text x="720" y="90" font-weight="600" fill="#1e3a8a">Count</text>
    </g>
    <line x1="580" y1="96" x2="780" y2="96" stroke="#c4c1b6"/>
    <g font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a" text-anchor="middle">
      <text x="610" y="112">S1</text><text x="720" y="112">12</text>
      <text x="610" y="128">S2</text><text x="720" y="128">15</text>
      <text x="610" y="144">S3</text><text x="720" y="144">11</text>
      <text x="610" y="160">S4</text><text x="720" y="160" fill="#1e3a8a">41</text>
      <text x="610" y="176">S5</text><text x="720" y="176" fill="#1e3a8a">38</text>
      <text x="610" y="192">S6</text><text x="720" y="192" fill="#1e3a8a">44</text>
    </g>
  </g>

  <!-- GLM equation panel -->
  <g>
    <rect x="60" y="240" width="860" height="70" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="490" y="262" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">GLM · LOG-LINK ON THE MEAN</text>
    <text x="490" y="288" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="15" fill="#0a0a0a">log μ<tspan font-size="11">ig</tspan> = log s<tspan font-size="11">i</tspan> + β<tspan font-size="11">0</tspan> + β<tspan font-size="11">1</tspan> · Cond<tspan font-size="11">i</tspan> + β<tspan font-size="11">2</tspan> · Batch<tspan font-size="11">i</tspan></text>
  </g>

  <!-- Fitted coefficients -->
  <g>
    <text x="40" y="350" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">FITTED COEFFICIENTS · NB GLM MLE</text>

    <rect x="40" y="360" width="540" height="68" rx="4" fill="#f4f3ee" stroke="#c4c1b6"/>
    <g font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">
      <text x="60" y="382">β̂₀ (intercept) = 2.49</text>
      <text x="60" y="400">β̂₁ (condition)  = <tspan font-weight="700" fill="#1e3a8a">1.26</tspan></text>
      <text x="60" y="418">β̂₂ (batch)      = -0.07</text>

      <text x="320" y="382">SE 0.18</text>
      <text x="320" y="400">SE <tspan font-weight="700" fill="#1e3a8a">0.21</tspan></text>
      <text x="320" y="418">SE 0.15</text>

      <text x="450" y="382">(log-link; log space)</text>
      <text x="450" y="400" font-weight="700" fill="#1e3a8a">log₂FC = 1.82</text>
      <text x="450" y="418">(i.e. ~3.5× up)</text>
    </g>
  </g>

  <!-- Arrow from the equation to the coefficients -->
  <line x1="500" y1="315" x2="500" y2="345" stroke="#1e3a8a" stroke-width="1.5" stroke-dasharray="4 3"/>

  <text x="710" y="390" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85" font-style="italic">· the β̂₁ coefficient is</text>
  <text x="710" y="406" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85" font-style="italic">  the log fold change</text>
  <text x="710" y="422" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85" font-style="italic">  to test against zero</text>
</svg>
