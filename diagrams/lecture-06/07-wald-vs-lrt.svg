<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" role="img" aria-labelledby="t d">
  <title id="t">Wald vs LRT — when each is right</title>
  <desc id="d">Top panel: Wald test geometry showing a normal density with a z-score point, tails shaded for p-value calculation. Bottom panel: LRT showing full and reduced model log-likelihoods and their 2× difference compared to chi-square. Decision table on the right.</desc>

  <text x="400" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">WALD vs LRT · TWO WAYS TO ASK "IS β₁ ≠ 0?"</text>

  <!-- TOP: Wald test -->
  <g>
    <text x="180" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">WALD TEST</text>
    <text x="400" y="60" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">z = β̂₁ / SE(β̂₁)</text>

    <!-- Normal density -->
    <line x1="50" y1="180" x2="650" y2="180" stroke="#c4c1b6" stroke-width="1"/>

    <!-- Normal curve -->
    <path d="M 50 180 Q 100 178 150 170 Q 200 155 250 125 Q 300 95 350 85 Q 400 95 450 125 Q 500 155 550 170 Q 600 178 650 180"
          fill="#eef2ff" stroke="#1e3a8a" stroke-width="2"/>

    <!-- Axis labels -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
      <text x="50" y="195">-4</text>
      <text x="150" y="195">-2</text>
      <text x="250" y="195">-1</text>
      <text x="350" y="195">0</text>
      <text x="450" y="195">1</text>
      <text x="550" y="195">2</text>
      <text x="650" y="195">4</text>
    </g>

    <!-- Observed z = 2.4: tail shading -->
    <path d="M 544 170 Q 570 175 600 178 Q 625 180 650 180 L 650 180 L 544 180 Z" fill="#fef3c7" stroke="#b45309" stroke-width="1"/>
    <path d="M 156 170 Q 130 175 100 178 Q 75 180 50 180 L 50 180 L 156 180 Z" fill="#fef3c7" stroke="#b45309" stroke-width="1"/>

    <line x1="544" y1="180" x2="544" y2="75" stroke="#b45309" stroke-width="1.5"/>
    <line x1="156" y1="180" x2="156" y2="75" stroke="#b45309" stroke-width="1" stroke-dasharray="3 3"/>

    <text x="544" y="68" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#b45309" font-weight="600">z = 2.4</text>

    <text x="600" y="160" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#b45309">2-tail p = 0.016</text>

    <!-- Caption -->
    <text x="350" y="220" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">asks: is β̂₁ far from 0 relative to its uncertainty?</text>
  </g>

  <!-- Divider -->
  <line x1="50" y1="235" x2="650" y2="235" stroke="#e5e3dc" stroke-width="1"/>

  <!-- BOTTOM: LRT -->
  <g transform="translate(0 245)">
    <text x="180" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">LIKELIHOOD-RATIO TEST</text>
    <text x="450" y="20" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">λ = 2·(ℓ_full − ℓ_red) ~ χ²₁</text>

    <!-- Two overlapping log-L surfaces -->
    <!-- Full model (with β₁): peaks higher -->
    <path d="M 60 170 Q 120 150 180 90 Q 240 50 300 80 Q 330 130 360 170"
          fill="none" stroke="#1e3a8a" stroke-width="2"/>
    <text x="240" y="45" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a" font-weight="600">ℓ_full</text>

    <!-- Reduced model (without β₁): peaks lower -->
    <path d="M 60 170 Q 120 160 180 130 Q 240 100 300 130 Q 330 150 360 170"
          fill="none" stroke="#b45309" stroke-width="2" stroke-dasharray="5 3"/>
    <text x="240" y="92" font-family="Inter, sans-serif" font-size="9" fill="#b45309" font-weight="600">ℓ_reduced</text>

    <!-- Double arrow showing difference at maximum -->
    <line x1="240" y1="56" x2="240" y2="94" stroke="#15803d" stroke-width="1.8"/>
    <polygon points="237,55 240,48 243,55" fill="#15803d"/>
    <polygon points="237,95 240,102 243,95" fill="#15803d"/>
    <text x="250" y="78" font-family="JetBrains Mono, monospace" font-size="10" fill="#15803d" font-weight="600">Δℓ</text>

    <text x="180" y="185" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">parameter space → MLE</text>

    <!-- Chi-square reference on the right -->
    <g transform="translate(400 30)">
      <text x="90" y="-5" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">χ²₁ reference</text>
      <line x1="0" y1="150" x2="180" y2="150" stroke="#c4c1b6" stroke-width="1"/>
      <line x1="0" y1="30" x2="0" y2="150" stroke="#c4c1b6" stroke-width="1"/>

      <!-- Chi-square density curve -->
      <path d="M 0 150 Q 20 50 50 70 Q 90 110 130 140 Q 160 150 180 150" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>

      <!-- Observed λ = 6.0 → shaded tail -->
      <line x1="95" y1="150" x2="95" y2="115" stroke="#b45309" stroke-width="1.5"/>
      <text x="95" y="170" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#b45309" font-weight="600">λ = 6.0</text>
      <path d="M 95 150 Q 110 143 130 140 Q 160 150 180 150 L 180 150 L 95 150 Z" fill="#fef3c7" stroke="#b45309" stroke-width="1"/>
      <text x="140" y="135" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#b45309">p = 0.014</text>
    </g>

    <!-- Caption -->
    <text x="350" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">asks: does removing β₁ hurt the fit significantly?</text>
  </g>

  <!-- Decision table on the right (spanning full height) -->
  <g transform="translate(680 80)">
    <rect x="0" y="0" width="190" height="340" rx="6" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="1"/>
    <text x="95" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">WHICH TO USE?</text>

    <g font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">
      <text x="10" y="50" font-weight="600" fill="#1e3a8a">Wald</text>
      <text x="10" y="68">· 2-condition compare</text>
      <text x="10" y="82">· single coefficient</text>
      <text x="10" y="96">· large sample size</text>
      <text x="10" y="110">· DESeq2 default</text>

      <line x1="10" y1="128" x2="180" y2="128" stroke="#c4c1b6"/>

      <text x="10" y="150" font-weight="600" fill="#1e3a8a">LRT</text>
      <text x="10" y="168">· 3+ level factor</text>
      <text x="10" y="182">· joint test of multiple</text>
      <text x="10" y="196">  coefficients</text>
      <text x="10" y="210">· time-course interactions</text>
      <text x="10" y="224">· complex designs</text>
      <text x="10" y="238">· small n, curved likelihood</text>

      <line x1="10" y1="256" x2="180" y2="256" stroke="#c4c1b6"/>

      <text x="10" y="278" font-weight="600" fill="#525252">Rule</text>
      <text x="10" y="296" fill="#525252">Agree in large n and</text>
      <text x="10" y="310" fill="#525252">simple hypotheses.</text>
      <text x="10" y="324" fill="#525252">LRT is more robust.</text>
    </g>
  </g>
</svg>
