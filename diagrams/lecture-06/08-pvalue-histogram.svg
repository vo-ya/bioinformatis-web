<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" role="img" aria-labelledby="t d">
  <title id="t">The p-value histogram diagnostic</title>
  <desc id="d">Three p-value histograms side by side representing diagnostic patterns. (a) Healthy DE: flat bulk with a spike near zero indicating real effects. (b) No signal: uniform flat distribution, all genes null. (c) Miscalibrated model: U-shape or systematic slope, indicating problems with the testing framework.</desc>

  <text x="450" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">p-VALUE HISTOGRAM · THE UNIVERSAL DE DIAGNOSTIC</text>

  <!-- Three panels, each ~270 wide, starting at x=40, 320, 600 -->

  <!-- Panel (a) Healthy -->
  <g>
    <rect x="40" y="50" width="240" height="330" rx="4" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="160" y="75" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#15803d">(a) HEALTHY</text>
    <text x="160" y="90" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">flat bulk + spike near 0</text>

    <!-- Axes -->
    <line x1="60" y1="340" x2="260" y2="340" stroke="#c4c1b6" stroke-width="1"/>
    <line x1="60" y1="110" x2="60" y2="340" stroke="#c4c1b6" stroke-width="1"/>

    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
      <text x="60" y="354">0</text>
      <text x="160" y="354">0.5</text>
      <text x="260" y="354">1</text>
    </g>
    <text x="160" y="370" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">p-value</text>

    <!-- Healthy bars: tall spike at 0 then flat -->
    <g fill="#eef2ff" stroke="#1e3a8a" stroke-width="1">
      <rect x="62"  y="140" width="18" height="200"/>
      <rect x="82"  y="200" width="18" height="140"/>
      <rect x="102" y="240" width="18" height="100"/>
      <rect x="122" y="260" width="18" height="80"/>
      <rect x="142" y="270" width="18" height="70"/>
      <rect x="162" y="275" width="18" height="65"/>
      <rect x="182" y="278" width="18" height="62"/>
      <rect x="202" y="275" width="18" height="65"/>
      <rect x="222" y="278" width="18" height="62"/>
      <rect x="242" y="282" width="16" height="58"/>
    </g>
  </g>

  <!-- Panel (b) No signal -->
  <g>
    <rect x="320" y="50" width="240" height="330" rx="4" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="440" y="75" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#525252">(b) NO SIGNAL</text>
    <text x="440" y="90" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">uniform flat distribution</text>

    <line x1="340" y1="340" x2="540" y2="340" stroke="#c4c1b6" stroke-width="1"/>
    <line x1="340" y1="110" x2="340" y2="340" stroke="#c4c1b6" stroke-width="1"/>

    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
      <text x="340" y="354">0</text>
      <text x="440" y="354">0.5</text>
      <text x="540" y="354">1</text>
    </g>
    <text x="440" y="370" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">p-value</text>

    <g fill="#f4f3ee" stroke="#525252" stroke-width="1">
      <rect x="342" y="260" width="18" height="80"/>
      <rect x="362" y="258" width="18" height="82"/>
      <rect x="382" y="262" width="18" height="78"/>
      <rect x="402" y="260" width="18" height="80"/>
      <rect x="422" y="256" width="18" height="84"/>
      <rect x="442" y="263" width="18" height="77"/>
      <rect x="462" y="259" width="18" height="81"/>
      <rect x="482" y="261" width="18" height="79"/>
      <rect x="502" y="258" width="18" height="82"/>
      <rect x="522" y="262" width="18" height="78"/>
    </g>
  </g>

  <!-- Panel (c) Miscalibrated -->
  <g>
    <rect x="600" y="50" width="240" height="330" rx="4" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="720" y="75" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#b91c1c">(c) MISCALIBRATED</text>
    <text x="720" y="90" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#b91c1c">U-shape or systematic slope</text>

    <line x1="620" y1="340" x2="820" y2="340" stroke="#c4c1b6" stroke-width="1"/>
    <line x1="620" y1="110" x2="620" y2="340" stroke="#c4c1b6" stroke-width="1"/>

    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
      <text x="620" y="354">0</text>
      <text x="720" y="354">0.5</text>
      <text x="820" y="354">1</text>
    </g>
    <text x="720" y="370" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">p-value</text>

    <!-- U-shaped bars -->
    <g fill="#fef2f2" stroke="#b91c1c" stroke-width="1">
      <rect x="622" y="180" width="18" height="160"/>
      <rect x="642" y="220" width="18" height="120"/>
      <rect x="662" y="250" width="18" height="90"/>
      <rect x="682" y="275" width="18" height="65"/>
      <rect x="702" y="285" width="18" height="55"/>
      <rect x="722" y="285" width="18" height="55"/>
      <rect x="742" y="275" width="18" height="65"/>
      <rect x="762" y="250" width="18" height="90"/>
      <rect x="782" y="220" width="18" height="120"/>
      <rect x="802" y="180" width="18" height="160"/>
    </g>
  </g>

  <!-- Bottom annotation -->
  <g transform="translate(40 395)">
    <rect x="0" y="0" width="800" height="35" rx="6" fill="#eef2ff" stroke="#1e3a8a"/>
    <text x="400" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0a0a0a">
      <tspan font-weight="600">Plot the histogram FIRST, before reporting any DE results.</tspan>
      Anything other than (a) or (b) means the model or design is broken.
    </text>
  </g>
</svg>
