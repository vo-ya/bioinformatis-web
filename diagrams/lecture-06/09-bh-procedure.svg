<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" role="img" aria-labelledby="t d">
  <title id="t">The Benjamini-Hochberg procedure</title>
  <desc id="d">Two panels showing sorted p-values plotted against rank with the BH line p = (k/m)·α overlaid. Left: high-signal scenario with the line crossed at a high rank giving many rejections. Right: low-signal scenario with only a few rejections.</desc>

  <text x="450" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">BENJAMINI–HOCHBERG · FIND LARGEST k WHERE p₍ₖ₎ ≤ (k/m)·α</text>

  <!-- LEFT: high-signal -->
  <g>
    <text x="220" y="55" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">High-signal scenario · α = 0.05</text>

    <!-- Axes -->
    <line x1="70" y1="360" x2="420" y2="360" stroke="#c4c1b6" stroke-width="1"/>
    <line x1="70" y1="80" x2="70" y2="360" stroke="#c4c1b6" stroke-width="1"/>

    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
      <text x="70" y="374">1</text>
      <text x="157" y="374">10²</text>
      <text x="245" y="374">10³</text>
      <text x="332" y="374">10⁴</text>
    </g>
    <text x="245" y="395" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">rank k (log scale)</text>

    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="end">
      <text x="66" y="364">10⁻⁶</text>
      <text x="66" y="290">10⁻⁴</text>
      <text x="66" y="216">10⁻²</text>
      <text x="66" y="142">10⁰</text>
    </g>
    <text x="35" y="220" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" transform="rotate(-90 35 220)">p-value (log)</text>

    <!-- Sorted p-values (many low, gradually increasing): m=20000 total -->
    <g fill="#0a0a0a">
      <circle cx="75" cy="330" r="1.5"/>
      <circle cx="85" cy="320" r="1.5"/>
      <circle cx="95" cy="305" r="1.5"/>
      <circle cx="110" cy="290" r="1.5"/>
      <circle cx="125" cy="280" r="1.5"/>
      <circle cx="140" cy="270" r="1.5"/>
      <circle cx="160" cy="260" r="1.5"/>
      <circle cx="180" cy="252" r="1.5"/>
      <circle cx="200" cy="245" r="1.5"/>
      <circle cx="220" cy="238" r="1.5"/>
      <circle cx="240" cy="232" r="1.5"/>
      <circle cx="260" cy="226" r="1.5"/>
      <circle cx="280" cy="220" r="1.5"/>
      <circle cx="300" cy="210" r="1.5"/>
      <circle cx="320" cy="195" r="1.5"/>
      <circle cx="340" cy="175" r="1.5"/>
      <circle cx="360" cy="155" r="1.5"/>
      <circle cx="380" cy="135" r="1.5"/>
      <circle cx="400" cy="120" r="1.5"/>
      <circle cx="415" cy="105" r="1.5"/>
    </g>

    <!-- BH line: log(k/m · α). Slope = 1 in log-log. -->
    <line x1="70" y1="338" x2="420" y2="120" stroke="#1e3a8a" stroke-width="2"/>
    <text x="355" y="95" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a" font-weight="600">BH line · p = (k/m)·0.05</text>

    <!-- Crossover: largest k where p₍ₖ₎ below line ~ rank ~450 on x axis (logarithmic mapping) -->
    <line x1="335" y1="80" x2="335" y2="360" stroke="#15803d" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="335" y="75" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#15803d" font-weight="700">k* ≈ 450</text>
    <text x="335" y="405" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#15803d" font-weight="600">reject 450 · expected FP ≈ 22</text>
  </g>

  <!-- Divider -->
  <line x1="455" y1="50" x2="455" y2="410" stroke="#e5e3dc" stroke-width="1"/>

  <!-- RIGHT: low-signal -->
  <g>
    <text x="670" y="55" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">Low-signal scenario · α = 0.05</text>

    <line x1="520" y1="360" x2="870" y2="360" stroke="#c4c1b6" stroke-width="1"/>
    <line x1="520" y1="80" x2="520" y2="360" stroke="#c4c1b6" stroke-width="1"/>

    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
      <text x="520" y="374">1</text>
      <text x="607" y="374">10²</text>
      <text x="695" y="374">10³</text>
      <text x="782" y="374">10⁴</text>
    </g>
    <text x="695" y="395" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">rank k (log scale)</text>

    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="end">
      <text x="516" y="364">10⁻⁶</text>
      <text x="516" y="290">10⁻⁴</text>
      <text x="516" y="216">10⁻²</text>
      <text x="516" y="142">10⁰</text>
    </g>

    <!-- Sorted p-values: only a few significant -->
    <g fill="#0a0a0a">
      <circle cx="525" cy="340" r="1.5"/>
      <circle cx="540" cy="320" r="1.5"/>
      <circle cx="560" cy="300" r="1.5"/>
      <circle cx="585" cy="275" r="1.5"/>
      <circle cx="615" cy="250" r="1.5"/>
      <circle cx="645" cy="225" r="1.5"/>
      <circle cx="675" cy="200" r="1.5"/>
      <circle cx="705" cy="180" r="1.5"/>
      <circle cx="735" cy="160" r="1.5"/>
      <circle cx="765" cy="145" r="1.5"/>
      <circle cx="790" cy="130" r="1.5"/>
      <circle cx="815" cy="115" r="1.5"/>
      <circle cx="840" cy="105" r="1.5"/>
      <circle cx="860" cy="100" r="1.5"/>
    </g>

    <!-- BH line -->
    <line x1="520" y1="338" x2="870" y2="120" stroke="#1e3a8a" stroke-width="2"/>

    <!-- Crossover at rank ~12 (very close to left edge) -->
    <line x1="555" y1="80" x2="555" y2="360" stroke="#15803d" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="555" y="75" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#15803d" font-weight="700">k* ≈ 12</text>
    <text x="555" y="405" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#15803d" font-weight="600">reject 12 · very few hits</text>
  </g>

  <!-- Bottom annotation -->
  <text x="450" y="430" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85" font-style="italic">The rank at which p₍ₖ₎ first falls below the BH line depends on the strength of the signal in the data — not on a fixed threshold.</text>
</svg>
