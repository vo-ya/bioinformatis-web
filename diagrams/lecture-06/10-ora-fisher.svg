<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" role="img" aria-labelledby="t d">
  <title id="t">Over-representation analysis — Fisher's exact test</title>
  <desc id="d">Three panels. Left: 2x2 contingency table for gene-set enrichment. Middle: hypergeometric probability mass function with the observed value in the tail shaded. Right: the resulting Fisher's exact p-value and enrichment ratio.</desc>

  <text x="450" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">ORA · FISHER'S EXACT · G2/M CELL-CYCLE GENES</text>

  <!-- LEFT: 2x2 contingency table -->
  <g>
    <text x="160" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">2×2 CONTINGENCY</text>

    <g font-family="JetBrains Mono, monospace" font-size="11">
      <!-- Column headers -->
      <text x="170" y="110" text-anchor="middle" font-weight="600" fill="#1e3a8a">in set G</text>
      <text x="260" y="110" text-anchor="middle" font-weight="600" fill="#1e3a8a">not in G</text>
      <text x="320" y="110" text-anchor="middle" font-weight="600" fill="#525252">total</text>

      <!-- Row header: DE -->
      <text x="60" y="145" font-weight="600" fill="#1e3a8a">DE</text>
      <rect x="135" y="130" width="70" height="22" fill="#fef3c7" stroke="#b45309"/>
      <text x="170" y="145" text-anchor="middle" font-weight="700" fill="#0a0a0a">42</text>
      <text x="260" y="145" text-anchor="middle">458</text>
      <text x="320" y="145" text-anchor="middle" fill="#525252">500</text>

      <!-- Row header: not DE -->
      <text x="60" y="175" font-weight="600" fill="#525252">not DE</text>
      <text x="170" y="175" text-anchor="middle">85</text>
      <text x="260" y="175" text-anchor="middle">19415</text>
      <text x="320" y="175" text-anchor="middle" fill="#525252">19500</text>

      <!-- Totals row -->
      <text x="60" y="205" font-weight="600" fill="#525252">total</text>
      <text x="170" y="205" text-anchor="middle" fill="#525252">127</text>
      <text x="260" y="205" text-anchor="middle" fill="#525252">19873</text>
      <text x="320" y="205" text-anchor="middle" fill="#525252">20000</text>
    </g>

    <!-- Observed/expected -->
    <g transform="translate(40 230)">
      <rect x="0" y="0" width="300" height="80" rx="4" fill="#eef2ff" stroke="#1e3a8a"/>
      <text x="10" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">observed vs expected</text>
      <g font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">
        <text x="10" y="40">observed DE in G: 42</text>
        <text x="10" y="58">expected: 500·127/20000 = 3.18</text>
        <text x="10" y="74" font-weight="700" fill="#1e3a8a">ratio: 13.2× enrichment</text>
      </g>
    </g>
  </g>

  <!-- Divider -->
  <line x1="380" y1="60" x2="380" y2="330" stroke="#e5e3dc" stroke-width="1"/>

  <!-- MIDDLE: hypergeometric PMF -->
  <g>
    <text x="540" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">HYPERGEOMETRIC PMF</text>

    <line x1="420" y1="220" x2="660" y2="220" stroke="#c4c1b6" stroke-width="1"/>
    <line x1="420" y1="80" x2="420" y2="220" stroke="#c4c1b6" stroke-width="1"/>

    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
      <text x="420" y="234">0</text>
      <text x="470" y="234">2</text>
      <text x="520" y="234">5</text>
      <text x="570" y="234">10</text>
      <text x="620" y="234">30</text>
      <text x="660" y="234">50</text>
    </g>
    <text x="540" y="252" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">overlap count</text>

    <!-- Bars: PMF for hypergeometric(20000, 127, 500), peak around 3 -->
    <g fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8">
      <rect x="420" y="210" width="10" height="10"/>
      <rect x="432" y="165" width="10" height="55"/>
      <rect x="444" y="110" width="10" height="110"/>
      <rect x="456" y="100" width="10" height="120"/>
      <rect x="468" y="120" width="10" height="100"/>
      <rect x="480" y="150" width="10" height="70"/>
      <rect x="492" y="180" width="10" height="40"/>
      <rect x="504" y="200" width="10" height="20"/>
      <rect x="516" y="210" width="10" height="10"/>
      <rect x="528" y="214" width="10" height="6"/>
      <rect x="540" y="216" width="10" height="4"/>
    </g>

    <!-- Observed (42) in the far tail, shaded separately -->
    <g fill="#fef3c7" stroke="#b45309" stroke-width="1">
      <rect x="615" y="215" width="10" height="5"/>
    </g>
    <line x1="620" y1="215" x2="620" y2="100" stroke="#b45309" stroke-width="1"/>
    <text x="620" y="90" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b45309">observed = 42</text>
    <text x="620" y="76" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#b45309" font-style="italic">way in the tail</text>

    <!-- Caption -->
    <text x="540" y="280" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">"draw 500 from a bag of</text>
    <text x="540" y="296" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">20,000 with 127 white —</text>
    <text x="540" y="312" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">what's P(≥ 42 white)?"</text>
  </g>

  <!-- Divider -->
  <line x1="680" y1="60" x2="680" y2="330" stroke="#e5e3dc" stroke-width="1"/>

  <!-- RIGHT: result -->
  <g>
    <text x="790" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">RESULT</text>

    <rect x="700" y="80" width="180" height="220" rx="6" fill="#ecfdf5" stroke="#15803d" stroke-width="1.5"/>

    <g font-family="Inter, sans-serif" fill="#0a0a0a">
      <text x="715" y="110" font-size="10" font-weight="600" fill="#15803d">Fisher's exact (one-sided):</text>
      <text x="715" y="135" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700" fill="#15803d">p = 3.2 × 10⁻⁸</text>

      <line x1="715" y1="155" x2="865" y2="155" stroke="#c4c1b6"/>

      <text x="715" y="175" font-size="10" fill="#525252">chi-square p:</text>
      <text x="715" y="190" font-family="JetBrains Mono, monospace" font-size="11">2.0 × 10⁻⁸</text>

      <text x="715" y="215" font-size="10" fill="#525252">odds ratio:</text>
      <text x="715" y="230" font-family="JetBrains Mono, monospace" font-size="11">13.4</text>

      <line x1="715" y1="245" x2="865" y2="245" stroke="#c4c1b6"/>

      <text x="715" y="268" font-size="10" font-style="italic" fill="#0a0a0a">DE genes are 13× enriched</text>
      <text x="715" y="282" font-size="10" font-style="italic" fill="#0a0a0a">for G2/M cell-cycle genes.</text>
    </g>
  </g>

  <text x="450" y="370" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85" font-style="italic">ORA runs this test on thousands of gene sets; BH-adjust across gene sets; report the significant ones.</text>
</svg>
