<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" role="img" aria-labelledby="t d">
  <title id="t">GSEA — the running-sum statistic</title>
  <desc id="d">A horizontal strip at the bottom showing a ranked gene list with gene-set members marked as vertical ticks. Above it, a running-sum curve that climbs when set genes are encountered and falls otherwise. The enrichment score (peak height) is labeled. An inset shows the permutation null distribution with the observed value in the tail.</desc>

  <text x="450" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">GSEA · WALK DOWN THE RANKED LIST · RUNNING SUM</text>

  <!-- TOP: enrichment score annotation with peak labeled -->
  <g>
    <text x="40" y="65" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">ENRICHMENT SCORE</text>

    <rect x="180" y="50" width="500" height="30" rx="4" fill="#ecfdf5" stroke="#15803d" stroke-width="1.5"/>
    <text x="200" y="70" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#15803d">ES = 0.48</text>
    <text x="290" y="70" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">· peak at rank 283 · p = 0.003 (permutation-based)</text>
  </g>

  <!-- MIDDLE: Running sum curve -->
  <g>
    <!-- Axes -->
    <line x1="60" y1="230" x2="780" y2="230" stroke="#c4c1b6" stroke-width="1"/>
    <line x1="60" y1="110" x2="60" y2="260" stroke="#c4c1b6" stroke-width="1"/>

    <!-- y-axis labels -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="end">
      <text x="56" y="114">0.5</text>
      <text x="56" y="174">0.25</text>
      <text x="56" y="234">0</text>
      <text x="56" y="264">-0.1</text>
    </g>
    <text x="24" y="185" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" transform="rotate(-90 24 185)">running sum</text>

    <!-- Running sum curve: rises steeply in first third, peaks, declines -->
    <path d="M 60 230 L 80 227 L 100 223 L 120 217 L 140 210 L 160 200 L 180 189 L 200 175 L 220 160 L 240 148 L 260 135 L 283 125 L 310 135 L 340 150 L 370 165 L 400 180 L 430 192 L 460 202 L 490 210 L 520 217 L 550 222 L 580 226 L 610 230 L 640 233 L 670 236 L 700 238 L 730 240 L 760 241 L 780 242"
          fill="#eef2ff" stroke="#1e3a8a" stroke-width="2"/>

    <!-- Fill area above zero (above y=230) -->
    <path d="M 60 230 L 80 227 L 100 223 L 120 217 L 140 210 L 160 200 L 180 189 L 200 175 L 220 160 L 240 148 L 260 135 L 283 125 L 310 135 L 340 150 L 370 165 L 400 180 L 430 192 L 460 202 L 490 210 L 520 217 L 550 222 L 580 226 L 610 230 L 610 230 L 60 230 Z"
          fill="#eef2ff" opacity="0.6"/>

    <!-- Peak marker -->
    <circle cx="283" cy="125" r="5" fill="#15803d" stroke="#0a0a0a" stroke-width="0.8"/>
    <line x1="283" y1="125" x2="283" y2="290" stroke="#15803d" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="283" y="115" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#15803d">ES = 0.48</text>
  </g>

  <!-- BOTTOM: ranked gene list strip with set-gene ticks -->
  <g>
    <text x="40" y="285" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">RANKED GENE LIST · 2000 GENES</text>

    <rect x="60" y="295" width="720" height="30" rx="2" fill="#f4f3ee" stroke="#c4c1b6"/>

    <!-- Set-gene ticks: concentrated in top 20% (left 30% of strip) -->
    <g stroke="#1e3a8a" stroke-width="1.5">
      <!-- Dense cluster in top third -->
      <line x1="65" y1="297" x2="65" y2="323"/>
      <line x1="72" y1="297" x2="72" y2="323"/>
      <line x1="80" y1="297" x2="80" y2="323"/>
      <line x1="88" y1="297" x2="88" y2="323"/>
      <line x1="95" y1="297" x2="95" y2="323"/>
      <line x1="105" y1="297" x2="105" y2="323"/>
      <line x1="115" y1="297" x2="115" y2="323"/>
      <line x1="128" y1="297" x2="128" y2="323"/>
      <line x1="140" y1="297" x2="140" y2="323"/>
      <line x1="155" y1="297" x2="155" y2="323"/>
      <line x1="170" y1="297" x2="170" y2="323"/>
      <line x1="185" y1="297" x2="185" y2="323"/>
      <line x1="200" y1="297" x2="200" y2="323"/>
      <line x1="215" y1="297" x2="215" y2="323"/>
      <line x1="230" y1="297" x2="230" y2="323"/>
      <line x1="245" y1="297" x2="245" y2="323"/>
      <line x1="260" y1="297" x2="260" y2="323"/>
      <line x1="275" y1="297" x2="275" y2="323"/>
      <!-- Sparse in middle and tail -->
      <line x1="320" y1="297" x2="320" y2="323"/>
      <line x1="350" y1="297" x2="350" y2="323"/>
      <line x1="400" y1="297" x2="400" y2="323"/>
      <line x1="450" y1="297" x2="450" y2="323"/>
      <line x1="510" y1="297" x2="510" y2="323"/>
      <line x1="580" y1="297" x2="580" y2="323"/>
      <line x1="650" y1="297" x2="650" y2="323"/>
      <line x1="730" y1="297" x2="730" y2="323"/>
    </g>

    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
      <text x="60" y="345">rank 1 (most up)</text>
      <text x="780" y="345">rank 2000 (most down)</text>
    </g>

    <text x="180" y="345" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a" font-weight="600">set genes concentrated at top</text>
  </g>

  <!-- Permutation null inset -->
  <g transform="translate(580 350)">
    <rect x="0" y="0" width="280" height="100" rx="6" fill="#f4f3ee" stroke="#c4c1b6"/>
    <text x="10" y="18" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">permutation null · N = 1000 shuffles</text>

    <line x1="20" y1="80" x2="260" y2="80" stroke="#c4c1b6"/>

    <!-- Null histogram -->
    <g fill="#c4c1b6" stroke="#525252" stroke-width="0.5">
      <rect x="30" y="70" width="10" height="10"/>
      <rect x="42" y="58" width="10" height="22"/>
      <rect x="54" y="48" width="10" height="32"/>
      <rect x="66" y="38" width="10" height="42"/>
      <rect x="78" y="30" width="10" height="50"/>
      <rect x="90" y="28" width="10" height="52"/>
      <rect x="102" y="35" width="10" height="45"/>
      <rect x="114" y="45" width="10" height="35"/>
      <rect x="126" y="55" width="10" height="25"/>
      <rect x="138" y="62" width="10" height="18"/>
      <rect x="150" y="68" width="10" height="12"/>
      <rect x="162" y="73" width="10" height="7"/>
      <rect x="174" y="76" width="10" height="4"/>
    </g>

    <!-- Observed ES arrow -->
    <line x1="200" y1="45" x2="200" y2="25" stroke="#15803d" stroke-width="1.5"/>
    <polygon points="197,45 200,48 203,45" fill="#15803d"/>
    <text x="200" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#15803d">observed</text>
    <text x="200" y="13" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#15803d">ES = 0.48</text>

    <text x="140" y="95" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">ES under label shuffling</text>
  </g>
</svg>
