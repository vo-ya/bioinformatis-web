<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" role="img" aria-labelledby="t d">
  <title id="t">10x Genomics droplet chemistry</title>
  <desc id="d">Schematic of the Chromium microfluidic chip with three converging input channels (cells, gel beads, oil) producing a stream of droplets; a single droplet cross-section shown with a cell, gel bead, and oil boundary; the reverse transcription step visualized; a four-step workflow summary at the bottom.</desc>

  <defs>
    <marker id="arr-02" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">CHROMIUM DROPLET CHEMISTRY · 4 STEPS</text>

  <!-- LEFT: Chromium chip schematic -->
  <g>
    <text x="40" y="60" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">MICROFLUIDIC CHIP</text>

    <rect x="40" y="72" width="360" height="180" rx="8" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="1.2"/>

    <!-- Three input channels on the left -->
    <!-- Cells channel (top) -->
    <g>
      <path d="M 60 100 L 180 100 L 200 160 L 180 220 L 60 220" fill="none" stroke="#525252" stroke-width="1.2"/>
      <text x="50" y="104" text-anchor="end" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#c4342c">cells</text>
      <!-- Small cell dots flowing -->
      <g fill="#c4342c">
        <circle cx="100" cy="104" r="4"/>
        <circle cx="130" cy="103" r="4"/>
        <circle cx="165" cy="105" r="4"/>
      </g>
    </g>

    <!-- Gel beads channel (middle) -->
    <g>
      <path d="M 60 160 L 180 160" fill="none" stroke="#525252" stroke-width="1.2"/>
      <text x="50" y="164" text-anchor="end" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">beads</text>
      <!-- Gel bead dots -->
      <g fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8">
        <circle cx="90" cy="160" r="5"/>
        <circle cx="120" cy="160" r="5"/>
        <circle cx="150" cy="160" r="5"/>
      </g>
    </g>

    <!-- Oil channel (bottom) -->
    <g>
      <path d="M 60 220 L 180 220 L 200 160 L 180 100" fill="none" stroke="#525252" stroke-width="1.2"/>
      <text x="50" y="224" text-anchor="end" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b45309">oil</text>
    </g>

    <!-- Droplet output stream -->
    <g>
      <line x1="200" y1="160" x2="380" y2="160" stroke="#525252" stroke-width="1.2"/>
      <!-- Droplets in stream -->
      <g fill="#fef3c7" stroke="#b45309" stroke-width="1">
        <circle cx="220" cy="160" r="12"/>
        <circle cx="255" cy="160" r="12"/>
        <circle cx="290" cy="160" r="12"/>
        <circle cx="325" cy="160" r="12"/>
        <circle cx="360" cy="160" r="12"/>
      </g>
      <!-- Small dots inside droplets (cell+bead) -->
      <g>
        <circle cx="216" cy="156" r="2" fill="#c4342c"/>
        <circle cx="224" cy="164" r="2.5" fill="#1e3a8a"/>
        <circle cx="251" cy="156" r="2" fill="#c4342c"/>
        <circle cx="259" cy="164" r="2.5" fill="#1e3a8a"/>
        <circle cx="286" cy="156" r="2" fill="#c4342c"/>
        <circle cx="294" cy="164" r="2.5" fill="#1e3a8a"/>
        <!-- Some droplets without cells (empty) -->
        <circle cx="325" cy="160" r="2.5" fill="#1e3a8a"/>
        <circle cx="360" cy="160" r="2.5" fill="#1e3a8a"/>
      </g>
    </g>

    <text x="380" y="244" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#525252">droplets (GEMs)</text>
  </g>

  <!-- RIGHT: Single droplet cross-section -->
  <g transform="translate(450 70)">
    <text x="0" y="-10" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">DROPLET CROSS-SECTION · 1 CELL + 1 BEAD</text>

    <!-- Oil outer region -->
    <circle cx="200" cy="100" r="90" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
    <text x="200" y="210" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#b45309" font-style="italic">oil boundary</text>

    <!-- Cell inside -->
    <circle cx="165" cy="90" r="22" fill="#c4342c" opacity="0.4" stroke="#c4342c" stroke-width="1.5"/>
    <text x="165" y="94" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">cell</text>
    <!-- mRNAs inside cell -->
    <g fill="#525252">
      <circle cx="155" cy="82" r="1.5"/>
      <circle cx="172" cy="88" r="1.5"/>
      <circle cx="160" cy="95" r="1.5"/>
      <circle cx="168" cy="100" r="1.5"/>
    </g>

    <!-- Bead inside -->
    <circle cx="232" cy="115" r="20" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="232" y="118" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#1e3a8a">bead</text>

    <!-- Primers extending from bead -->
    <g stroke="#1e3a8a" stroke-width="1">
      <line x1="250" y1="110" x2="262" y2="105"/>
      <line x1="250" y1="115" x2="262" y2="115"/>
      <line x1="250" y1="120" x2="262" y2="125"/>
      <line x1="245" y1="130" x2="255" y2="140"/>
      <line x1="218" y1="131" x2="212" y2="142"/>
    </g>

    <!-- Annotation: primer structure -->
    <g transform="translate(-10 230)">
      <rect x="0" y="0" width="420" height="36" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
      <text x="10" y="14" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">primer structure</text>
      <text x="10" y="30" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">[cell barcode · 16bp] [UMI · 12bp] [poly-T · 30bp]</text>
    </g>
  </g>

  <!-- Bottom band: 4 step summary -->
  <g transform="translate(40 310)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">4-STEP CHEMISTRY</text>

    <!-- Step 1 -->
    <g transform="translate(0 10)">
      <rect x="0" y="0" width="200" height="96" rx="6" fill="#f4f3ee" stroke="#c4c1b6"/>
      <text x="14" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a">1 · Load</text>
      <text x="14" y="42" font-family="Inter, sans-serif" font-size="9" fill="#0a0a0a">Cells + beads + oil into chip.</text>
      <text x="14" y="56" font-family="Inter, sans-serif" font-size="9" fill="#0a0a0a">Co-encapsulate in GEMs.</text>
      <text x="14" y="78" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">1 cell, 1 bead, per droplet.</text>
    </g>

    <!-- Step 2 -->
    <g transform="translate(210 10)">
      <rect x="0" y="0" width="200" height="96" rx="6" fill="#f4f3ee" stroke="#c4c1b6"/>
      <text x="14" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a">2 · Lyse + prime</text>
      <text x="14" y="42" font-family="Inter, sans-serif" font-size="9" fill="#0a0a0a">Cell lyses inside droplet.</text>
      <text x="14" y="56" font-family="Inter, sans-serif" font-size="9" fill="#0a0a0a">mRNAs bind to primers</text>
      <text x="14" y="70" font-family="Inter, sans-serif" font-size="9" fill="#0a0a0a">on the bead (poly-T).</text>
    </g>

    <!-- Step 3 -->
    <g transform="translate(420 10)">
      <rect x="0" y="0" width="200" height="96" rx="6" fill="#f4f3ee" stroke="#c4c1b6"/>
      <text x="14" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a">3 · Reverse transcribe</text>
      <text x="14" y="42" font-family="Inter, sans-serif" font-size="9" fill="#0a0a0a">RT extends each primer</text>
      <text x="14" y="56" font-family="Inter, sans-serif" font-size="9" fill="#0a0a0a">into cDNA. Each cDNA now</text>
      <text x="14" y="70" font-family="Inter, sans-serif" font-size="9" fill="#0a0a0a">carries (barcode + UMI).</text>
    </g>

    <!-- Step 4 -->
    <g transform="translate(630 10)">
      <rect x="0" y="0" width="200" height="96" rx="6" fill="#f4f3ee" stroke="#c4c1b6"/>
      <text x="14" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a">4 · Pool + sequence</text>
      <text x="14" y="42" font-family="Inter, sans-serif" font-size="9" fill="#0a0a0a">Break droplets, pool cDNA,</text>
      <text x="14" y="56" font-family="Inter, sans-serif" font-size="9" fill="#0a0a0a">PCR amplify, Illumina seq.</text>
      <text x="14" y="78" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">Barcode = which cell.</text>
      <text x="14" y="90" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">UMI = which molecule.</text>
    </g>
  </g>

  <!-- Typical run stats -->
  <text x="450" y="440" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85" font-style="italic">Typical run: 10,000 cells · 50,000 reads per cell · ~3,000 genes detected per cell · ~$3,500 + sequencing (2024)</text>
</svg>
