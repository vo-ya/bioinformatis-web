<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" role="img" aria-labelledby="t d">
  <title id="t">Cell barcode + UMI structure and deduplication</title>
  <desc id="d">Top: a gel bead with primers showing cell barcode, UMI, and poly-T regions. Middle: three mRNA molecules inside a droplet bind three primers with the same cell barcode but different UMIs; reverse transcription produces three distinct labelled cDNA molecules. Then PCR amplifies each to many copies. Bottom: after sequencing, 150 reads collapse on (cell barcode, UMI) back to three distinct molecule counts.</desc>

  <defs>
    <marker id="arr-03" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>

  <text x="480" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">UMI = SERIAL NUMBER BEFORE THE AMPLIFIER</text>

  <!-- BAND 1: Primer structure on a bead -->
  <g>
    <text x="40" y="60" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">1 · PRIMER STRUCTURE ON BEAD</text>

    <!-- Bead circle -->
    <circle cx="80" cy="105" r="22" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="80" y="108" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">bead</text>

    <!-- Primers extending from bead: one highlighted, 3 faded -->
    <g>
      <!-- Main primer (highlighted) -->
      <line x1="102" y1="100" x2="135" y2="90" stroke="#0a0a0a" stroke-width="1.5"/>
      <!-- Primer components -->
      <rect x="135" y="82" width="100" height="16" fill="#1e3a8a"/>
      <text x="185" y="94" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#ffffff" font-weight="600">cell barcode</text>
      <rect x="236" y="82" width="70" height="16" fill="#b45309"/>
      <text x="271" y="94" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#ffffff" font-weight="600">UMI</text>
      <rect x="307" y="82" width="110" height="16" fill="#525252"/>
      <text x="362" y="94" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#ffffff" font-weight="600">poly-T (T...T)</text>

      <!-- Size annotations — shortened to fit each within its segment width without colliding -->
      <text x="185" y="112" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#8a8a85">16 bp · shared</text>
      <text x="271" y="112" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#8a8a85">12 bp · unique</text>
      <text x="362" y="112" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#8a8a85">30 bp · poly-T</text>
    </g>

    <!-- More primers (faded) indicating "millions of these" -->
    <g opacity="0.3">
      <line x1="94" y1="116" x2="130" y2="130" stroke="#0a0a0a" stroke-width="1"/>
      <rect x="130" y="122" width="100" height="16" fill="#1e3a8a"/>
      <rect x="231" y="122" width="70" height="16" fill="#b45309"/>
      <rect x="302" y="122" width="110" height="16" fill="#525252"/>

      <line x1="82" y1="128" x2="125" y2="148" stroke="#0a0a0a" stroke-width="1"/>
      <rect x="125" y="140" width="100" height="16" fill="#1e3a8a"/>
      <rect x="226" y="140" width="70" height="16" fill="#b45309"/>
      <rect x="297" y="140" width="110" height="16" fill="#525252"/>
    </g>

    <text x="450" y="92" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">← millions of primers per bead,</text>
    <text x="450" y="106" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">&#160;&#160;all same cell barcode,</text>
    <text x="450" y="120" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">&#160;&#160;each with a different UMI.</text>
  </g>

  <line x1="40" y1="180" x2="920" y2="180" stroke="#e5e3dc" stroke-width="1"/>

  <!-- BAND 2: Inside the droplet - 3 mRNAs bind 3 primers -->
  <g>
    <text x="40" y="210" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">2 · INSIDE DROPLET · 3 mRNAs BIND 3 PRIMERS</text>

    <g font-family="JetBrains Mono, monospace" font-size="10">
      <!-- cDNA 1 (red mRNA) -->
      <rect x="40" y="225" width="80" height="14" fill="#1e3a8a"/>
      <rect x="121" y="225" width="50" height="14" fill="#b45309"/>
      <text x="150" y="236" text-anchor="middle" fill="#ffffff" font-weight="600">UMI_1</text>
      <rect x="172" y="225" width="160" height="14" fill="#c4342c" opacity="0.8"/>
      <text x="252" y="236" text-anchor="middle" fill="#ffffff" font-weight="600">mRNA₁ (cDNA)</text>

      <!-- cDNA 2 (teal mRNA) -->
      <rect x="40" y="245" width="80" height="14" fill="#1e3a8a"/>
      <rect x="121" y="245" width="50" height="14" fill="#b45309"/>
      <text x="150" y="256" text-anchor="middle" fill="#ffffff" font-weight="600">UMI_2</text>
      <rect x="172" y="245" width="160" height="14" fill="#0d7377" opacity="0.8"/>
      <text x="252" y="256" text-anchor="middle" fill="#ffffff" font-weight="600">mRNA₂ (cDNA)</text>

      <!-- cDNA 3 (amber mRNA) -->
      <rect x="40" y="265" width="80" height="14" fill="#1e3a8a"/>
      <rect x="121" y="265" width="50" height="14" fill="#b45309"/>
      <text x="150" y="276" text-anchor="middle" fill="#ffffff" font-weight="600">UMI_3</text>
      <rect x="172" y="265" width="160" height="14" fill="#b45309" opacity="0.7"/>
      <text x="252" y="276" text-anchor="middle" fill="#ffffff" font-weight="600">mRNA₃ (cDNA)</text>
    </g>

    <text x="340" y="252" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">→ 3 distinct cDNAs</text>
    <text x="340" y="266" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">&#160;&#160;same cell barcode</text>
    <text x="340" y="280" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">&#160;&#160;distinct UMIs</text>
  </g>

  <!-- Arrow to PCR -->
  <line x1="500" y1="250" x2="550" y2="250" stroke="#525252" stroke-width="1.5" marker-end="url(#arr-03)"/>
  <text x="525" y="243" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">PCR ×50</text>

  <!-- BAND 3: PCR amplification - 150 reads -->
  <g>
    <text x="580" y="210" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">3 · PCR AMPLIFICATION · 150 READS</text>

    <!-- Grid of 150 dots, colour-coded by original mRNA -->
    <g>
      <!-- 50 red dots -->
      <g fill="#c4342c" opacity="0.8">
        <circle cx="588" cy="225" r="2"/><circle cx="596" cy="225" r="2"/><circle cx="604" cy="225" r="2"/>
        <circle cx="612" cy="225" r="2"/><circle cx="620" cy="225" r="2"/><circle cx="628" cy="225" r="2"/>
        <circle cx="636" cy="225" r="2"/><circle cx="644" cy="225" r="2"/><circle cx="652" cy="225" r="2"/>
        <circle cx="660" cy="225" r="2"/><circle cx="588" cy="233" r="2"/><circle cx="596" cy="233" r="2"/>
        <circle cx="604" cy="233" r="2"/><circle cx="612" cy="233" r="2"/><circle cx="620" cy="233" r="2"/>
        <circle cx="628" cy="233" r="2"/><circle cx="636" cy="233" r="2"/><circle cx="644" cy="233" r="2"/>
        <circle cx="652" cy="233" r="2"/><circle cx="660" cy="233" r="2"/>
        <circle cx="588" cy="241" r="2"/><circle cx="596" cy="241" r="2"/><circle cx="604" cy="241" r="2"/>
        <circle cx="612" cy="241" r="2"/><circle cx="620" cy="241" r="2"/><circle cx="628" cy="241" r="2"/>
        <circle cx="636" cy="241" r="2"/><circle cx="644" cy="241" r="2"/><circle cx="652" cy="241" r="2"/>
        <circle cx="660" cy="241" r="2"/><circle cx="588" cy="249" r="2"/><circle cx="596" cy="249" r="2"/>
        <circle cx="604" cy="249" r="2"/><circle cx="612" cy="249" r="2"/><circle cx="620" cy="249" r="2"/>
        <circle cx="628" cy="249" r="2"/><circle cx="636" cy="249" r="2"/><circle cx="644" cy="249" r="2"/>
        <circle cx="652" cy="249" r="2"/><circle cx="660" cy="249" r="2"/>
        <circle cx="588" cy="257" r="2"/><circle cx="596" cy="257" r="2"/><circle cx="604" cy="257" r="2"/>
        <circle cx="612" cy="257" r="2"/><circle cx="620" cy="257" r="2"/><circle cx="628" cy="257" r="2"/>
        <circle cx="636" cy="257" r="2"/><circle cx="644" cy="257" r="2"/><circle cx="652" cy="257" r="2"/>
        <circle cx="660" cy="257" r="2"/>
      </g>
      <!-- 50 teal dots -->
      <g fill="#0d7377" opacity="0.8">
        <circle cx="680" cy="225" r="2"/><circle cx="688" cy="225" r="2"/><circle cx="696" cy="225" r="2"/>
        <circle cx="704" cy="225" r="2"/><circle cx="712" cy="225" r="2"/><circle cx="720" cy="225" r="2"/>
        <circle cx="728" cy="225" r="2"/><circle cx="736" cy="225" r="2"/><circle cx="744" cy="225" r="2"/>
        <circle cx="752" cy="225" r="2"/><circle cx="680" cy="233" r="2"/><circle cx="688" cy="233" r="2"/>
        <circle cx="696" cy="233" r="2"/><circle cx="704" cy="233" r="2"/><circle cx="712" cy="233" r="2"/>
        <circle cx="720" cy="233" r="2"/><circle cx="728" cy="233" r="2"/><circle cx="736" cy="233" r="2"/>
        <circle cx="744" cy="233" r="2"/><circle cx="752" cy="233" r="2"/>
        <circle cx="680" cy="241" r="2"/><circle cx="688" cy="241" r="2"/><circle cx="696" cy="241" r="2"/>
        <circle cx="704" cy="241" r="2"/><circle cx="712" cy="241" r="2"/><circle cx="720" cy="241" r="2"/>
        <circle cx="728" cy="241" r="2"/><circle cx="736" cy="241" r="2"/><circle cx="744" cy="241" r="2"/>
        <circle cx="752" cy="241" r="2"/><circle cx="680" cy="249" r="2"/><circle cx="688" cy="249" r="2"/>
        <circle cx="696" cy="249" r="2"/><circle cx="704" cy="249" r="2"/><circle cx="712" cy="249" r="2"/>
        <circle cx="720" cy="249" r="2"/><circle cx="728" cy="249" r="2"/><circle cx="736" cy="249" r="2"/>
        <circle cx="744" cy="249" r="2"/><circle cx="752" cy="249" r="2"/>
        <circle cx="680" cy="257" r="2"/><circle cx="688" cy="257" r="2"/><circle cx="696" cy="257" r="2"/>
        <circle cx="704" cy="257" r="2"/><circle cx="712" cy="257" r="2"/><circle cx="720" cy="257" r="2"/>
        <circle cx="728" cy="257" r="2"/><circle cx="736" cy="257" r="2"/><circle cx="744" cy="257" r="2"/>
        <circle cx="752" cy="257" r="2"/>
      </g>
      <!-- 50 amber dots -->
      <g fill="#b45309" opacity="0.8">
        <circle cx="772" cy="225" r="2"/><circle cx="780" cy="225" r="2"/><circle cx="788" cy="225" r="2"/>
        <circle cx="796" cy="225" r="2"/><circle cx="804" cy="225" r="2"/><circle cx="812" cy="225" r="2"/>
        <circle cx="820" cy="225" r="2"/><circle cx="828" cy="225" r="2"/><circle cx="836" cy="225" r="2"/>
        <circle cx="844" cy="225" r="2"/><circle cx="772" cy="233" r="2"/><circle cx="780" cy="233" r="2"/>
        <circle cx="788" cy="233" r="2"/><circle cx="796" cy="233" r="2"/><circle cx="804" cy="233" r="2"/>
        <circle cx="812" cy="233" r="2"/><circle cx="820" cy="233" r="2"/><circle cx="828" cy="233" r="2"/>
        <circle cx="836" cy="233" r="2"/><circle cx="844" cy="233" r="2"/>
        <circle cx="772" cy="241" r="2"/><circle cx="780" cy="241" r="2"/><circle cx="788" cy="241" r="2"/>
        <circle cx="796" cy="241" r="2"/><circle cx="804" cy="241" r="2"/><circle cx="812" cy="241" r="2"/>
        <circle cx="820" cy="241" r="2"/><circle cx="828" cy="241" r="2"/><circle cx="836" cy="241" r="2"/>
        <circle cx="844" cy="241" r="2"/><circle cx="772" cy="249" r="2"/><circle cx="780" cy="249" r="2"/>
        <circle cx="788" cy="249" r="2"/><circle cx="796" cy="249" r="2"/><circle cx="804" cy="249" r="2"/>
        <circle cx="812" cy="249" r="2"/><circle cx="820" cy="249" r="2"/><circle cx="828" cy="249" r="2"/>
        <circle cx="836" cy="249" r="2"/><circle cx="844" cy="249" r="2"/>
        <circle cx="772" cy="257" r="2"/><circle cx="780" cy="257" r="2"/><circle cx="788" cy="257" r="2"/>
        <circle cx="796" cy="257" r="2"/><circle cx="804" cy="257" r="2"/><circle cx="812" cy="257" r="2"/>
        <circle cx="820" cy="257" r="2"/><circle cx="828" cy="257" r="2"/><circle cx="836" cy="257" r="2"/>
        <circle cx="844" cy="257" r="2"/>
      </g>
    </g>

    <g font-family="Inter, sans-serif" font-size="9" fill="#525252" text-anchor="middle">
      <text x="624" y="272">50 reads · UMI_1</text>
      <text x="716" y="272">50 reads · UMI_2</text>
      <text x="808" y="272">50 reads · UMI_3</text>
    </g>
  </g>

  <line x1="40" y1="310" x2="920" y2="310" stroke="#e5e3dc" stroke-width="1"/>

  <!-- BAND 4: Deduplication -->
  <g transform="translate(0 330)">
    <text x="40" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252" letter-spacing="0.08em">4 · DEDUPLICATE ON (CELL BARCODE, UMI) → RECOVER 3 MOLECULES</text>

    <!-- Dedup table -->
    <g transform="translate(40 15)">
      <rect x="0" y="0" width="880" height="100" rx="6" fill="#ecfdf5" stroke="#15803d" stroke-width="1.5"/>

      <g font-family="JetBrains Mono, monospace" font-size="11">
        <text x="20" y="22" font-weight="600" fill="#15803d">Input: 150 reads</text>
        <text x="270" y="22" font-weight="600" fill="#15803d">Output: 3 distinct molecules</text>

        <!-- Dedup arrows -->
        <text x="20" y="45" fill="#0a0a0a">50 × (CB, UMI_1, mRNA₁) reads</text>
        <text x="235" y="45" fill="#525252">→</text>
        <text x="270" y="45" font-weight="600" fill="#1e3a8a">1 molecule count for mRNA₁</text>
        <text x="20" y="63" fill="#0a0a0a">50 × (CB, UMI_2, mRNA₂) reads</text>
        <text x="235" y="63" fill="#525252">→</text>
        <text x="270" y="63" font-weight="600" fill="#1e3a8a">1 molecule count for mRNA₂</text>
        <text x="20" y="81" fill="#0a0a0a">50 × (CB, UMI_3, mRNA₃) reads</text>
        <text x="235" y="81" fill="#525252">→</text>
        <text x="270" y="81" font-weight="600" fill="#1e3a8a">1 molecule count for mRNA₃</text>
      </g>

      <g transform="translate(640 30)">
        <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">Count reads: 150 (wrong, biased by PCR)</text>
        <text x="0" y="14" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#15803d">Count distinct UMIs: 3 (correct)</text>
        <text x="0" y="32" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">The UMI is the serial number that</text>
        <text x="0" y="44" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">survives the amplification channel.</text>
      </g>
    </g>
  </g>
</svg>
