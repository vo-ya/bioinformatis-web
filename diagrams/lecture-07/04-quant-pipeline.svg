<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 340" role="img" aria-labelledby="t d">
  <title id="t">scRNA-seq quantification pipeline</title>
  <desc id="d">A horizontal pipeline diagram showing BCL files from an Illumina flow cell converted to FASTQ by bcl2fastq, then fed into a three-branch quantification step (Cell Ranger, STARsolo, alevin-fry), producing a BAM and an HDF5 count matrix, which feed into an AnnData or Seurat object for downstream analysis.</desc>

  <defs>
    <marker id="arr-04" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <text x="550" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">scRNA-SEQ PIPELINE · BCL → COUNT MATRIX → ANALYSIS</text>

  <!-- Stage 1: BCL -->
  <g>
    <rect x="30" y="90" width="130" height="80" rx="6" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="1.5"/>
    <text x="95" y="120" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600">BCL files</text>
    <text x="95" y="140" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">Illumina</text>
    <text x="95" y="154" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">flow cell</text>
  </g>

  <line x1="160" y1="130" x2="200" y2="130" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-04)"/>
  <!-- Label shrunk from font-size 9 to 7 mono so it fits in the 45px gap between BCL (ends x=160) and FASTQ (starts x=205) without crossing either box border. -->
  <text x="180" y="124" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#1e3a8a">bcl2fastq</text>

  <!-- Stage 2: FASTQ -->
  <g>
    <rect x="205" y="90" width="130" height="80" rx="6" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="1.5"/>
    <text x="270" y="120" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600">FASTQ</text>
    <text x="270" y="140" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">R1: barcode+UMI</text>
    <text x="270" y="154" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">R2: transcript</text>
  </g>

  <line x1="335" y1="130" x2="380" y2="130" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-04)"/>

  <!-- Stage 3: Three-branch quantification -->
  <g>
    <rect x="385" y="60" width="320" height="190" rx="8" fill="#eef2ff" stroke="#1e3a8a" stroke-width="2"/>
    <text x="545" y="82" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="0.08em">QUANTIFICATION</text>
    <text x="545" y="98" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">align/pseudoalign, group by (CB, UMI), count distinct UMIs</text>

    <!-- Cell Ranger -->
    <g>
      <rect x="400" y="112" width="95" height="56" rx="4" fill="#ffffff" stroke="#c4c1b6"/>
      <text x="448" y="130" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700">Cell Ranger</text>
      <text x="448" y="146" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">10x's own</text>
      <text x="448" y="160" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">reference std</text>
    </g>

    <!-- STARsolo -->
    <g>
      <rect x="498" y="112" width="95" height="56" rx="4" fill="#ffffff" stroke="#c4c1b6"/>
      <text x="545" y="130" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700">STARsolo</text>
      <text x="545" y="146" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">STAR + 10x</text>
      <text x="545" y="160" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">fast, flexible</text>
    </g>

    <!-- alevin-fry -->
    <g>
      <rect x="596" y="112" width="95" height="56" rx="4" fill="#ffffff" stroke="#c4c1b6"/>
      <text x="643" y="130" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700">alevin-fry</text>
      <text x="643" y="146" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">Salmon-based</text>
      <text x="643" y="160" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">fastest</text>
    </g>

    <text x="545" y="190" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">all three produce:</text>
    <text x="545" y="204" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="600" fill="#0a0a0a">BAM + filtered_feature_bc_matrix.h5</text>
    <text x="545" y="222" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#8a8a85" font-style="italic">(alevin-fry skips BAM by default — pseudoalignment)</text>
  </g>

  <line x1="710" y1="160" x2="750" y2="160" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-04)"/>

  <!-- Stage 4: Sparse output -->
  <g>
    <rect x="755" y="110" width="140" height="100" rx="6" fill="#f4f3ee" stroke="#c4c1b6" stroke-width="1.5"/>
    <text x="825" y="135" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600">Count matrix</text>
    <text x="825" y="155" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">HDF5 (.h5)</text>
    <text x="825" y="169" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">or .mtx triplet</text>
    <text x="825" y="192" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" font-style="italic">cells × genes</text>
    <text x="825" y="204" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" font-style="italic">~95% zeros</text>
  </g>

  <line x1="895" y1="160" x2="935" y2="160" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-04)"/>

  <!-- Stage 5: AnnData / Seurat -->
  <g>
    <rect x="940" y="110" width="140" height="100" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="1010" y="135" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#1e3a8a">AnnData</text>
    <text x="1010" y="150" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a">or Seurat</text>
    <text x="1010" y="172" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">cells × genes</text>
    <text x="1010" y="185" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">+ metadata</text>
    <text x="1010" y="201" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" font-style="italic">ready for QC</text>
  </g>

  <!-- Bottom annotation -->
  <text x="550" y="300" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85" font-style="italic">Format choice (h5 / AnnData / Seurat) locks you into specific downstream ecosystems (Python-Scanpy vs R-Seurat).</text>
</svg>
