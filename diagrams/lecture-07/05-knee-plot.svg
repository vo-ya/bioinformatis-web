<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" role="img" aria-labelledby="t d">
  <title id="t">The knee plot and EmptyDrops threshold</title>
  <desc id="d">Log-log plot: x-axis is barcode rank (sorted descending by UMI count), y-axis is UMI count per barcode. The canonical knee shape shows a plateau of high-count real-cell barcodes on the left, a steep drop in the middle, and a long tail of low-count empty-droplet barcodes on the right. A dashed threshold marks the cell-vs-background boundary; an inset shows the EmptyDrops ambient-profile test.</desc>

  <text x="450" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">KNEE PLOT · CELLS vs EMPTY DROPLETS</text>

  <!-- Plot area -->
  <line x1="80" y1="360" x2="830" y2="360" stroke="#c4c1b6" stroke-width="1"/>
  <line x1="80" y1="60" x2="80" y2="360" stroke="#c4c1b6" stroke-width="1"/>

  <!-- x-axis: barcode rank, log scale. 1 (x=80) to 10^6 (x=830). -->
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
    <text x="80" y="378">1</text>
    <text x="205" y="378">10²</text>
    <text x="330" y="378">10³</text>
    <text x="455" y="378">10⁴</text>
    <text x="580" y="378">10⁵</text>
    <text x="705" y="378">5×10⁵</text>
    <text x="830" y="378">10⁶</text>
  </g>
  <text x="455" y="400" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#525252">barcode rank (sorted by UMI count, descending)</text>

  <!-- y-axis: UMI count, log scale. 10^0 (y=360) to 10^5 (y=60) -->
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="end">
    <text x="72" y="364">10⁰</text>
    <text x="72" y="304">10¹</text>
    <text x="72" y="244">10²</text>
    <text x="72" y="184">10³</text>
    <text x="72" y="124">10⁴</text>
    <text x="72" y="64">10⁵</text>
  </g>
  <text x="28" y="210" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#525252" transform="rotate(-90 28 210)">UMI count per barcode</text>

  <!-- Knee curve: plateau on left, sharp drop around rank 10^4 (cells ~10000), long tail on right -->
  <path d="M 80 80 L 180 84 L 280 88 L 380 95 L 440 105 L 478 150 L 490 220 L 510 280 L 560 310 L 650 330 L 750 345 L 830 355"
        fill="none" stroke="#1e3a8a" stroke-width="2.5"/>

  <!-- Threshold line at the knee -->
  <line x1="480" y1="50" x2="480" y2="365" stroke="#b45309" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="480" y="45" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#b45309">threshold</text>

  <!-- Region labels -->
  <text x="250" y="95" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#15803d">real cells (~10,000)</text>
  <text x="250" y="108" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#15803d" font-style="italic">1,000 – 30,000 UMIs each</text>

  <text x="480" y="240" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#b45309" font-weight="600">ambiguous zone</text>
  <text x="480" y="252" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#b45309" font-style="italic">EmptyDrops test</text>

  <text x="680" y="330" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#b91c1c">empty droplets</text>
  <text x="680" y="343" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#b91c1c" font-style="italic">ambient RNA only, 10–500 UMIs</text>

  <!-- Inset: EmptyDrops ambient-profile test -->
  <g transform="translate(600 75)">
    <rect x="0" y="0" width="220" height="120" rx="6" fill="#ebeae3" stroke="#c4c1b6" stroke-width="1"/>
    <text x="10" y="18" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">EmptyDrops test</text>

    <!-- Two mini distributions -->
    <g transform="translate(14 28)">
      <!-- ambient profile -->
      <text x="0" y="8" font-family="Inter, sans-serif" font-size="8" fill="#525252">ambient:</text>
      <g fill="#b45309" stroke="none">
        <rect x="42" y="4" width="6" height="6"/>
        <rect x="50" y="2" width="6" height="8"/>
        <rect x="58" y="0" width="6" height="10"/>
        <rect x="66" y="2" width="6" height="8"/>
        <rect x="74" y="4" width="6" height="6"/>
        <rect x="82" y="6" width="6" height="4"/>
        <rect x="90" y="7" width="6" height="3"/>
        <rect x="98" y="8" width="6" height="2"/>
      </g>

      <text x="0" y="34" font-family="Inter, sans-serif" font-size="8" fill="#525252">candidate:</text>
      <g fill="#1e3a8a" stroke="none">
        <rect x="42" y="38" width="6" height="2"/>
        <rect x="50" y="36" width="6" height="4"/>
        <rect x="58" y="30" width="6" height="10"/>
        <rect x="66" y="24" width="6" height="16"/>
        <rect x="74" y="20" width="6" height="20"/>
        <rect x="82" y="26" width="6" height="14"/>
        <rect x="90" y="32" width="6" height="8"/>
        <rect x="98" y="38" width="6" height="2"/>
      </g>

      <!-- Verdict -->
      <text x="0" y="70" font-family="Inter, sans-serif" font-size="9" fill="#15803d" font-weight="600">→ profiles differ</text>
      <text x="0" y="82" font-family="Inter, sans-serif" font-size="9" fill="#15803d">→ keep as real cell</text>
    </g>
  </g>
</svg>
