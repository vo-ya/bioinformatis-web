<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" role="img" aria-labelledby="t d">
  <title id="t">QC metrics dashboard</title>
  <desc id="d">Four-panel quality-control dashboard for scRNA-seq: (a) histogram of total UMIs per cell with knee-style distribution, (b) histogram of genes detected per cell with low-gene cells in warning colour, (c) histogram of mitochondrial fraction with cells above 15% threshold highlighted as bad quality, (d) histogram of post-SoupX ambient-RNA contamination per cell.</desc>

  <text x="480" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">QC DASHBOARD · 4 METRICS THAT EVERY PIPELINE CHECKS</text>

  <!-- Panel (a): Total UMIs per cell -->
  <g transform="translate(30 60)">
    <text x="220" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">(a) total UMIs per cell</text>

    <rect x="0" y="10" width="440" height="160" rx="4" fill="#ffffff" stroke="#c4c1b6"/>

    <!-- Axes -->
    <line x1="30" y1="150" x2="430" y2="150" stroke="#c4c1b6" stroke-width="1"/>
    <line x1="30" y1="30" x2="30" y2="150" stroke="#c4c1b6" stroke-width="1"/>

    <!-- Histogram bars -->
    <g fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8">
      <rect x="35" y="115" width="16" height="35"/>
      <rect x="52" y="105" width="16" height="45"/>
      <rect x="69" y="95" width="16" height="55"/>
      <rect x="86" y="85" width="16" height="65"/>
      <rect x="103" y="75" width="16" height="75"/>
      <rect x="120" y="60" width="16" height="90"/>
      <rect x="137" y="50" width="16" height="100"/>
      <rect x="154" y="45" width="16" height="105"/>
      <rect x="171" y="55" width="16" height="95"/>
      <rect x="188" y="70" width="16" height="80"/>
      <rect x="205" y="85" width="16" height="65"/>
      <rect x="222" y="95" width="16" height="55"/>
      <rect x="239" y="110" width="16" height="40"/>
      <rect x="256" y="120" width="16" height="30"/>
      <rect x="273" y="130" width="16" height="20"/>
      <rect x="290" y="135" width="16" height="15"/>
      <rect x="307" y="140" width="16" height="10"/>
      <rect x="324" y="143" width="16" height="7"/>
      <rect x="341" y="145" width="16" height="5"/>
      <rect x="358" y="147" width="16" height="3"/>
      <rect x="375" y="148" width="16" height="2"/>
      <rect x="392" y="149" width="16" height="1"/>
    </g>

    <!-- Low threshold line -->
    <line x1="70" y1="30" x2="70" y2="150" stroke="#b45309" stroke-width="1.5" stroke-dasharray="4 2"/>
    <text x="70" y="25" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#b45309">min UMI</text>

    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
      <text x="30" y="164">500</text>
      <text x="165" y="164">10K</text>
      <text x="300" y="164">50K</text>
      <text x="430" y="164">100K</text>
    </g>

    <text x="220" y="192" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">typical: 3,000–30,000 per cell</text>
  </g>

  <!-- Panel (b): Genes per cell -->
  <g transform="translate(490 60)">
    <text x="220" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">(b) genes per cell</text>

    <rect x="0" y="10" width="440" height="160" rx="4" fill="#ffffff" stroke="#c4c1b6"/>

    <line x1="30" y1="150" x2="430" y2="150" stroke="#c4c1b6" stroke-width="1"/>
    <line x1="30" y1="30" x2="30" y2="150" stroke="#c4c1b6" stroke-width="1"/>

    <!-- Warning bars on left -->
    <g fill="#fef3c7" stroke="#b45309" stroke-width="0.8">
      <rect x="35" y="135" width="16" height="15"/>
      <rect x="52" y="120" width="16" height="30"/>
    </g>
    <g fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8">
      <rect x="69" y="100" width="16" height="50"/>
      <rect x="86" y="80" width="16" height="70"/>
      <rect x="103" y="60" width="16" height="90"/>
      <rect x="120" y="45" width="16" height="105"/>
      <rect x="137" y="50" width="16" height="100"/>
      <rect x="154" y="65" width="16" height="85"/>
      <rect x="171" y="80" width="16" height="70"/>
      <rect x="188" y="95" width="16" height="55"/>
      <rect x="205" y="110" width="16" height="40"/>
      <rect x="222" y="125" width="16" height="25"/>
      <rect x="239" y="132" width="16" height="18"/>
      <rect x="256" y="138" width="16" height="12"/>
      <rect x="273" y="142" width="16" height="8"/>
      <rect x="290" y="145" width="16" height="5"/>
    </g>

    <!-- Threshold line -->
    <line x1="69" y1="30" x2="69" y2="150" stroke="#b45309" stroke-width="1.5" stroke-dasharray="4 2"/>
    <text x="69" y="25" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#b45309">min 200</text>

    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
      <text x="30" y="164">0</text>
      <text x="140" y="164">2K</text>
      <text x="260" y="164">5K</text>
      <text x="380" y="164">8K</text>
    </g>

    <text x="220" y="192" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">low-gene cells = likely dying / low-quality</text>
  </g>

  <!-- Panel (c): MT fraction -->
  <g transform="translate(30 240)">
    <text x="220" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">(c) mitochondrial fraction %</text>

    <rect x="0" y="10" width="440" height="160" rx="4" fill="#ffffff" stroke="#c4c1b6"/>

    <line x1="30" y1="150" x2="430" y2="150" stroke="#c4c1b6" stroke-width="1"/>
    <line x1="30" y1="30" x2="30" y2="150" stroke="#c4c1b6" stroke-width="1"/>

    <!-- Healthy peak 5–15%, tail of stressed cells >20% -->
    <g fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8">
      <rect x="35" y="95" width="16" height="55"/>
      <rect x="52" y="75" width="16" height="75"/>
      <rect x="69" y="55" width="16" height="95"/>
      <rect x="86" y="45" width="16" height="105"/>
      <rect x="103" y="40" width="16" height="110"/>
      <rect x="120" y="50" width="16" height="100"/>
      <rect x="137" y="65" width="16" height="85"/>
      <rect x="154" y="85" width="16" height="65"/>
      <rect x="171" y="105" width="16" height="45"/>
      <rect x="188" y="120" width="16" height="30"/>
    </g>
    <g fill="#fef2f2" stroke="#b91c1c" stroke-width="0.8">
      <rect x="205" y="125" width="16" height="25"/>
      <rect x="222" y="130" width="16" height="20"/>
      <rect x="239" y="135" width="16" height="15"/>
      <rect x="256" y="138" width="16" height="12"/>
      <rect x="273" y="140" width="16" height="10"/>
      <rect x="290" y="142" width="16" height="8"/>
      <rect x="307" y="144" width="16" height="6"/>
    </g>

    <!-- Threshold line at 15% -->
    <line x1="205" y1="30" x2="205" y2="150" stroke="#b91c1c" stroke-width="1.5" stroke-dasharray="4 2"/>
    <text x="205" y="25" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-weight="600" fill="#b91c1c">max 15%</text>

    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
      <text x="30" y="164">0</text>
      <text x="130" y="164">10</text>
      <text x="230" y="164">20</text>
      <text x="330" y="164">30</text>
      <text x="430" y="164">50+</text>
    </g>

    <text x="220" y="192" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">high MT% = stressed or lysed cells</text>
  </g>

  <!-- Panel (d): Ambient RNA contamination -->
  <g transform="translate(490 240)">
    <text x="220" y="0" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">(d) ambient-RNA contamination %</text>

    <rect x="0" y="10" width="440" height="160" rx="4" fill="#ffffff" stroke="#c4c1b6"/>

    <line x1="30" y1="150" x2="430" y2="150" stroke="#c4c1b6" stroke-width="1"/>
    <line x1="30" y1="30" x2="30" y2="150" stroke="#c4c1b6" stroke-width="1"/>

    <!-- Skewed right, most cells low, some high -->
    <g fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8">
      <rect x="35" y="45" width="16" height="105"/>
      <rect x="52" y="55" width="16" height="95"/>
      <rect x="69" y="75" width="16" height="75"/>
      <rect x="86" y="95" width="16" height="55"/>
      <rect x="103" y="115" width="16" height="35"/>
      <rect x="120" y="125" width="16" height="25"/>
      <rect x="137" y="130" width="16" height="20"/>
      <rect x="154" y="135" width="16" height="15"/>
      <rect x="171" y="138" width="16" height="12"/>
      <rect x="188" y="140" width="16" height="10"/>
      <rect x="205" y="142" width="16" height="8"/>
      <rect x="222" y="143" width="16" height="7"/>
      <rect x="239" y="144" width="16" height="6"/>
      <rect x="256" y="145" width="16" height="5"/>
      <rect x="273" y="146" width="16" height="4"/>
      <rect x="290" y="147" width="16" height="3"/>
    </g>

    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
      <text x="30" y="164">0</text>
      <text x="165" y="164">15</text>
      <text x="300" y="164">30</text>
      <text x="430" y="164">40</text>
    </g>

    <text x="220" y="192" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">SoupX / CellBender output · subtract from counts</text>
  </g>

  <text x="480" y="440" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85" font-style="italic">Thresholds are dataset-specific. Always inspect distributions before cutting — aggressive filtering removes real biology.</text>
</svg>
