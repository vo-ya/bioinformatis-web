<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" role="img" aria-labelledby="t d">
  <title id="t">Sparse count matrix — zeros everywhere</title>
  <desc id="d">A 50-cell by 200-gene slice of a scRNA-seq count matrix rendered as a heatmap. About 95% of entries are blank (zero); the visible structure is sparse block-diagonal patches where cell-type groups express their defining genes.</desc>

  <text x="450" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">50 CELLS × 200 GENES · ~95% ZEROS</text>

  <!-- Column-side cluster colour bar -->
  <g>
    <text x="40" y="60" font-family="Inter, sans-serif" font-size="9" fill="#525252" letter-spacing="0.08em">type</text>

    <!-- Row colour bar: 5 cell-type groups of 10 cells each. Each group is 62px tall
         so 5 × 62 = 310 fills the matrix exactly (matrix y=70..380). Group 5 was
         previously 30px tall, breaking visual symmetry. -->
    <rect x="50" y="70"  width="10" height="62" fill="#c4342c"/>
    <rect x="50" y="132" width="10" height="62" fill="#0d7377"/>
    <rect x="50" y="194" width="10" height="62" fill="#b45309"/>
    <rect x="50" y="256" width="10" height="62" fill="#7c3aed"/>
    <rect x="50" y="318" width="10" height="62" fill="#2d7a3e"/>
  </g>

  <!-- Main matrix: 200 columns x 50 rows. Each cell 4x6px, so grid is 800 wide. Fits 200*3 = 600, but let's use 4.
       Actually adjust: 200 cols x 3.5px = 700px wide. Start at x=64. Rows at 6.2px each. Start y=70. -->

  <!-- Draw the matrix background as full white (zero baseline) -->
  <rect x="64" y="70" width="800" height="310" fill="#ffffff" stroke="#c4c1b6" stroke-width="1"/>

  <!-- Now draw only the non-zero cells as coloured dots. Structure: each cell type's marker genes (cols) expressed by the type's cells (rows), sparse otherwise.
       Group 1 (rows 1-10, y=70-140): markers in cols 0-30 (x=64-184)
       Group 2 (rows 11-20, y=140-210): markers in cols 40-70 (x=224-344)
       Group 3 (rows 21-30, y=210-280): markers in cols 80-110 (x=384-504)
       Group 4 (rows 31-40, y=280-350): markers in cols 120-150 (x=544-664)
       Group 5 (rows 41-50, y=350-380): markers in cols 160-190 (x=704-824)
  -->

