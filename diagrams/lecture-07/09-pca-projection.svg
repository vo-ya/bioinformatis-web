<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" role="img" aria-labelledby="t d">
  <title id="t">PCA on scRNA-seq — scree plot and projection</title>
  <desc id="d">Left: scree plot showing eigenvalues of the first 50 principal components — a steep drop over the first few PCs and a plateau after ~30. Right: cells projected into PC1-PC2 space with three distinct cell-type clouds visible.</desc>

  <text x="450" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">PCA · SCREE PLOT + 2D PROJECTION</text>

  <!-- LEFT: Scree plot -->
  <g>
    <text x="200" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">SCREE PLOT · VARIANCE EXPLAINED PER PC</text>

    <!-- Axes -->
    <line x1="60" y1="340" x2="380" y2="340" stroke="#c4c1b6" stroke-width="1"/>
    <line x1="60" y1="90" x2="60" y2="340" stroke="#c4c1b6" stroke-width="1"/>

    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
      <text x="60" y="354">1</text>
      <text x="138" y="354">10</text>
      <text x="216" y="354">20</text>
      <text x="294" y="354">30</text>
      <text x="380" y="354">50</text>
    </g>
    <text x="220" y="372" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">PC rank</text>

    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="end">
      <text x="55" y="344">0%</text>
      <text x="55" y="274">2%</text>
      <text x="55" y="204">4%</text>
      <text x="55" y="134">6%</text>
      <text x="55" y="94">8%</text>
    </g>
    <text x="25" y="215" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" transform="rotate(-90 25 215)">variance %</text>

    <!-- Bars: steep drop then plateau -->
    <g fill="#1e3a8a">
      <rect x="64" y="85" width="6" height="255"/>
      <rect x="71" y="145" width="6" height="195"/>
      <rect x="78" y="180" width="6" height="160"/>
      <rect x="85" y="205" width="6" height="135"/>
      <rect x="92" y="220" width="6" height="120"/>
      <rect x="99" y="235" width="6" height="105"/>
      <rect x="106" y="250" width="6" height="90"/>
      <rect x="113" y="260" width="6" height="80"/>
      <rect x="120" y="270" width="6" height="70"/>
      <rect x="127" y="280" width="6" height="60"/>
      <rect x="134" y="287" width="6" height="53"/>
      <rect x="141" y="293" width="6" height="47"/>
      <rect x="148" y="298" width="6" height="42"/>
      <rect x="155" y="303" width="6" height="37"/>
      <rect x="162" y="308" width="6" height="32"/>
      <rect x="169" y="312" width="6" height="28"/>
      <rect x="176" y="315" width="6" height="25"/>
      <rect x="183" y="318" width="6" height="22"/>
      <rect x="190" y="320" width="6" height="20"/>
      <rect x="197" y="322" width="6" height="18"/>
      <rect x="204" y="324" width="6" height="16"/>
      <rect x="211" y="325" width="6" height="15"/>
      <rect x="218" y="326" width="6" height="14"/>
      <rect x="225" y="327" width="6" height="13"/>
      <rect x="232" y="328" width="6" height="12"/>
      <rect x="239" y="329" width="6" height="11"/>
      <rect x="246" y="330" width="6" height="10"/>
      <rect x="253" y="331" width="6" height="9"/>
      <rect x="260" y="331" width="6" height="9"/>
      <rect x="267" y="332" width="6" height="8"/>
      <rect x="274" y="333" width="6" height="7"/>
      <rect x="281" y="333" width="6" height="7"/>
      <rect x="288" y="333" width="6" height="7"/>
      <rect x="295" y="334" width="6" height="6"/>
      <rect x="302" y="334" width="6" height="6"/>
      <rect x="309" y="334" width="6" height="6"/>
      <rect x="316" y="335" width="6" height="5"/>
      <rect x="323" y="335" width="6" height="5"/>
      <rect x="330" y="335" width="6" height="5"/>
      <rect x="337" y="335" width="6" height="5"/>
      <rect x="344" y="335" width="6" height="5"/>
      <rect x="351" y="335" width="6" height="5"/>
      <rect x="358" y="336" width="6" height="4"/>
      <rect x="365" y="336" width="6" height="4"/>
      <rect x="372" y="336" width="6" height="4"/>
    </g>

    <!-- "Kept" threshold line at PC30 -->
    <line x1="295" y1="85" x2="295" y2="340" stroke="#b45309" stroke-width="1.5" stroke-dasharray="4 2"/>
    <text x="295" y="80" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#b45309">keep 30 PCs</text>
    <text x="200" y="280" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">top 30 PCs → 65% variance</text>
  </g>

  <!-- Divider -->
  <line x1="430" y1="50" x2="430" y2="380" stroke="#e5e3dc" stroke-width="1"/>

  <!-- RIGHT: PC1 × PC2 scatter -->
  <g>
    <text x="680" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">PC1 × PC2 · 3 CELL TYPES VISIBLE</text>

    <!-- Axes -->
    <line x1="480" y1="340" x2="880" y2="340" stroke="#c4c1b6" stroke-width="1"/>
    <line x1="480" y1="90" x2="480" y2="340" stroke="#c4c1b6" stroke-width="1"/>

    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="middle">
      <text x="480" y="354">-10</text>
      <text x="680" y="354">0</text>
      <text x="880" y="354">10</text>
    </g>
    <text x="680" y="372" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">PC1</text>

    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" text-anchor="end">
      <text x="475" y="94">10</text>
      <text x="475" y="214">0</text>
      <text x="475" y="344">-10</text>
    </g>
    <text x="450" y="215" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" transform="rotate(-90 450 215)">PC2</text>

    <!-- Three cell-type clusters -->
    <!-- Cluster 1 (red) at top-left -->
    <g fill="#c4342c" opacity="0.7">
      <circle cx="540" cy="130" r="3"/><circle cx="545" cy="140" r="3"/><circle cx="550" cy="125" r="3"/>
      <circle cx="555" cy="135" r="3"/><circle cx="560" cy="145" r="3"/><circle cx="565" cy="130" r="3"/>
      <circle cx="570" cy="155" r="3"/><circle cx="575" cy="125" r="3"/><circle cx="580" cy="140" r="3"/>
      <circle cx="585" cy="150" r="3"/><circle cx="590" cy="125" r="3"/><circle cx="595" cy="145" r="3"/>
      <circle cx="535" cy="150" r="3"/><circle cx="545" cy="155" r="3"/><circle cx="555" cy="160" r="3"/>
      <circle cx="565" cy="160" r="3"/><circle cx="575" cy="160" r="3"/><circle cx="585" cy="160" r="3"/>
      <circle cx="600" cy="155" r="3"/><circle cx="605" cy="140" r="3"/><circle cx="610" cy="130" r="3"/>
    </g>

    <!-- Cluster 2 (teal) at bottom-right -->
    <g fill="#0d7377" opacity="0.7">
      <circle cx="780" cy="280" r="3"/><circle cx="785" cy="270" r="3"/><circle cx="790" cy="285" r="3"/>
      <circle cx="795" cy="275" r="3"/><circle cx="800" cy="290" r="3"/><circle cx="805" cy="265" r="3"/>
      <circle cx="810" cy="280" r="3"/><circle cx="815" cy="295" r="3"/><circle cx="820" cy="270" r="3"/>
      <circle cx="825" cy="285" r="3"/><circle cx="830" cy="265" r="3"/><circle cx="835" cy="280" r="3"/>
      <circle cx="775" cy="290" r="3"/><circle cx="785" cy="295" r="3"/><circle cx="795" cy="300" r="3"/>
      <circle cx="805" cy="298" r="3"/><circle cx="815" cy="295" r="3"/><circle cx="825" cy="295" r="3"/>
      <circle cx="840" cy="290" r="3"/><circle cx="850" cy="285" r="3"/><circle cx="855" cy="270" r="3"/>
    </g>

    <!-- Cluster 3 (amber) at bottom-left -->
    <g fill="#b45309" opacity="0.7">
      <circle cx="540" cy="260" r="3"/><circle cx="545" cy="250" r="3"/><circle cx="550" cy="265" r="3"/>
      <circle cx="555" cy="275" r="3"/><circle cx="560" cy="255" r="3"/><circle cx="565" cy="270" r="3"/>
      <circle cx="570" cy="280" r="3"/><circle cx="575" cy="265" r="3"/><circle cx="580" cy="255" r="3"/>
      <circle cx="585" cy="270" r="3"/><circle cx="590" cy="280" r="3"/><circle cx="595" cy="265" r="3"/>
      <circle cx="550" cy="275" r="3"/><circle cx="560" cy="285" r="3"/><circle cx="570" cy="290" r="3"/>
      <circle cx="580" cy="285" r="3"/><circle cx="590" cy="290" r="3"/>
    </g>

    <!-- Legend -->
    <g transform="translate(488 385)">
      <circle cx="5" cy="0" r="3" fill="#c4342c" opacity="0.7"/>
      <text x="12" y="4" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">type 1</text>
      <circle cx="90" cy="0" r="3" fill="#0d7377" opacity="0.7"/>
      <text x="97" y="4" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">type 2</text>
      <circle cx="175" cy="0" r="3" fill="#b45309" opacity="0.7"/>
      <text x="182" y="4" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">type 3</text>
    </g>
  </g>
</svg>
