<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" role="img" aria-labelledby="t d">
  <title id="t">UMAP embedding of a multi-cell-type dataset</title>
  <desc id="d">A 2D UMAP projection showing about 8000 cells organised into 10 visible clusters of different sizes, colour-coded by Leiden cluster assignment. Each cluster is labeled with its dominant cell-type marker.</desc>

  <text x="450" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">UMAP · 10 CLUSTERS · ~8000 CELLS</text>

  <!-- Plot area -->
  <rect x="50" y="60" width="800" height="380" rx="4" fill="#ffffff" stroke="#c4c1b6"/>

  <!-- 10 clusters with distinct colours at different positions, different sizes -->
  <!-- Cluster palette: use distinctive tokens + extras -->

  <!-- CD4 T cells (largest cluster, blue) at upper-left -->
  <g fill="#1e3a8a" opacity="0.7">
    <circle cx="150" cy="130" r="2"/><circle cx="155" cy="135" r="2"/><circle cx="160" cy="125" r="2"/>
    <circle cx="165" cy="130" r="2"/><circle cx="170" cy="140" r="2"/><circle cx="175" cy="130" r="2"/>
    <circle cx="180" cy="145" r="2"/><circle cx="185" cy="135" r="2"/><circle cx="190" cy="128" r="2"/>
    <circle cx="195" cy="142" r="2"/><circle cx="200" cy="130" r="2"/><circle cx="205" cy="148" r="2"/>
    <circle cx="140" cy="145" r="2"/><circle cx="150" cy="152" r="2"/><circle cx="160" cy="158" r="2"/>
    <circle cx="170" cy="155" r="2"/><circle cx="180" cy="160" r="2"/><circle cx="190" cy="158" r="2"/>
    <circle cx="200" cy="160" r="2"/><circle cx="210" cy="155" r="2"/><circle cx="220" cy="150" r="2"/>
    <circle cx="225" cy="140" r="2"/><circle cx="230" cy="135" r="2"/><circle cx="215" cy="135" r="2"/>
    <circle cx="205" cy="125" r="2"/><circle cx="195" cy="125" r="2"/><circle cx="185" cy="125" r="2"/>
    <circle cx="175" cy="125" r="2"/><circle cx="165" cy="155" r="2"/><circle cx="155" cy="160" r="2"/>
    <circle cx="145" cy="155" r="2"/><circle cx="155" cy="125" r="2"/><circle cx="145" cy="135" r="2"/>
    <circle cx="148" cy="142" r="2"/><circle cx="178" cy="132" r="2"/><circle cx="190" cy="150" r="2"/>
    <circle cx="170" cy="148" r="2"/><circle cx="160" cy="142" r="2"/><circle cx="185" cy="155" r="2"/>
  </g>
  <text x="190" y="180" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#ffffff" stroke="#1e3a8a" stroke-width="3" paint-order="stroke" stroke-linejoin="round">CD4 T</text>

  <!-- CD8 T cells (purple) adjacent to CD4 -->
  <g fill="#7c3aed" opacity="0.7">
    <circle cx="280" cy="145" r="2"/><circle cx="285" cy="150" r="2"/><circle cx="290" cy="140" r="2"/>
    <circle cx="295" cy="145" r="2"/><circle cx="300" cy="155" r="2"/><circle cx="305" cy="145" r="2"/>
    <circle cx="310" cy="160" r="2"/><circle cx="315" cy="150" r="2"/><circle cx="320" cy="145" r="2"/>
    <circle cx="325" cy="158" r="2"/><circle cx="280" cy="160" r="2"/><circle cx="290" cy="165" r="2"/>
    <circle cx="300" cy="168" r="2"/><circle cx="310" cy="170" r="2"/><circle cx="320" cy="165" r="2"/>
    <circle cx="330" cy="160" r="2"/><circle cx="285" cy="170" r="2"/><circle cx="295" cy="175" r="2"/>
    <circle cx="305" cy="178" r="2"/><circle cx="315" cy="175" r="2"/><circle cx="325" cy="170" r="2"/>
  </g>
  <text x="302" y="198" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#ffffff" stroke="#7c3aed" stroke-width="3" paint-order="stroke" stroke-linejoin="round">CD8 T</text>

  <!-- NK cells (pink) -->
  <g fill="#ec4899" opacity="0.7">
    <circle cx="400" cy="155" r="2"/><circle cx="405" cy="160" r="2"/><circle cx="410" cy="150" r="2"/>
    <circle cx="415" cy="155" r="2"/><circle cx="420" cy="165" r="2"/><circle cx="425" cy="155" r="2"/>
    <circle cx="430" cy="170" r="2"/><circle cx="435" cy="160" r="2"/><circle cx="395" cy="170" r="2"/>
    <circle cx="405" cy="175" r="2"/><circle cx="415" cy="178" r="2"/><circle cx="425" cy="175" r="2"/>
  </g>
  <text x="415" y="195" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#ffffff" stroke="#ec4899" stroke-width="3" paint-order="stroke" stroke-linejoin="round">NK</text>

  <!-- B cells (red) -->
  <g fill="#c4342c" opacity="0.7">
    <circle cx="550" cy="110" r="2"/><circle cx="555" cy="115" r="2"/><circle cx="560" cy="105" r="2"/>
    <circle cx="565" cy="110" r="2"/><circle cx="570" cy="120" r="2"/><circle cx="575" cy="110" r="2"/>
    <circle cx="580" cy="125" r="2"/><circle cx="585" cy="115" r="2"/><circle cx="590" cy="108" r="2"/>
    <circle cx="595" cy="122" r="2"/><circle cx="545" cy="125" r="2"/><circle cx="555" cy="128" r="2"/>
    <circle cx="565" cy="130" r="2"/><circle cx="575" cy="128" r="2"/><circle cx="585" cy="130" r="2"/>
    <circle cx="595" cy="125" r="2"/><circle cx="555" cy="135" r="2"/><circle cx="565" cy="138" r="2"/>
    <circle cx="575" cy="140" r="2"/><circle cx="585" cy="138" r="2"/>
  </g>
  <text x="572" y="160" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#ffffff" stroke="#c4342c" stroke-width="3" paint-order="stroke" stroke-linejoin="round">B cells</text>

  <!-- Monocytes (amber, large cluster) -->
  <g fill="#b45309" opacity="0.7">
    <circle cx="200" cy="290" r="2"/><circle cx="205" cy="295" r="2"/><circle cx="210" cy="285" r="2"/>
    <circle cx="215" cy="290" r="2"/><circle cx="220" cy="300" r="2"/><circle cx="225" cy="290" r="2"/>
    <circle cx="230" cy="305" r="2"/><circle cx="235" cy="295" r="2"/><circle cx="240" cy="288" r="2"/>
    <circle cx="245" cy="302" r="2"/><circle cx="250" cy="290" r="2"/><circle cx="255" cy="308" r="2"/>
    <circle cx="195" cy="305" r="2"/><circle cx="205" cy="312" r="2"/><circle cx="215" cy="315" r="2"/>
    <circle cx="225" cy="318" r="2"/><circle cx="235" cy="320" r="2"/><circle cx="245" cy="318" r="2"/>
    <circle cx="255" cy="315" r="2"/><circle cx="265" cy="310" r="2"/><circle cx="275" cy="305" r="2"/>
    <circle cx="220" cy="330" r="2"/><circle cx="230" cy="335" r="2"/><circle cx="240" cy="335" r="2"/>
    <circle cx="250" cy="332" r="2"/><circle cx="260" cy="328" r="2"/><circle cx="200" cy="325" r="2"/>
    <circle cx="210" cy="328" r="2"/><circle cx="218" cy="292" r="2"/><circle cx="225" cy="315" r="2"/>
    <circle cx="240" cy="310" r="2"/><circle cx="252" cy="305" r="2"/><circle cx="220" cy="280" r="2"/>
    <circle cx="235" cy="282" r="2"/>
  </g>
  <text x="235" y="358" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#ffffff" stroke="#b45309" stroke-width="3" paint-order="stroke" stroke-linejoin="round">monocytes</text>

  <!-- Dendritic cells (green) -->
  <g fill="#15803d" opacity="0.7">
    <circle cx="370" cy="290" r="2"/><circle cx="375" cy="295" r="2"/><circle cx="380" cy="285" r="2"/>
    <circle cx="385" cy="290" r="2"/><circle cx="390" cy="300" r="2"/><circle cx="395" cy="290" r="2"/>
    <circle cx="400" cy="305" r="2"/><circle cx="365" cy="305" r="2"/><circle cx="375" cy="310" r="2"/>
    <circle cx="385" cy="315" r="2"/><circle cx="395" cy="310" r="2"/>
  </g>
  <text x="382" y="330" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#ffffff" stroke="#15803d" stroke-width="3" paint-order="stroke" stroke-linejoin="round">DC</text>

  <!-- Neutrophils (brown) -->
  <g fill="#7f1d1d" opacity="0.7">
    <circle cx="490" cy="290" r="2"/><circle cx="495" cy="295" r="2"/><circle cx="500" cy="285" r="2"/>
    <circle cx="505" cy="290" r="2"/><circle cx="510" cy="300" r="2"/><circle cx="515" cy="290" r="2"/>
    <circle cx="520" cy="305" r="2"/><circle cx="485" cy="305" r="2"/><circle cx="495" cy="310" r="2"/>
    <circle cx="505" cy="315" r="2"/><circle cx="515" cy="310" r="2"/><circle cx="520" cy="318" r="2"/>
    <circle cx="500" cy="320" r="2"/><circle cx="510" cy="322" r="2"/><circle cx="490" cy="322" r="2"/>
  </g>
  <text x="505" y="340" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#ffffff" stroke="#7f1d1d" stroke-width="3" paint-order="stroke" stroke-linejoin="round">neutrophils</text>

  <!-- Platelets (cyan) -->
  <g fill="#0891b2" opacity="0.7">
    <circle cx="610" cy="310" r="2"/><circle cx="615" cy="315" r="2"/><circle cx="620" cy="305" r="2"/>
    <circle cx="625" cy="310" r="2"/><circle cx="630" cy="320" r="2"/><circle cx="635" cy="310" r="2"/>
    <circle cx="640" cy="325" r="2"/>
  </g>
  <text x="625" y="345" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#ffffff" stroke="#0891b2" stroke-width="3" paint-order="stroke" stroke-linejoin="round">platelets</text>

  <!-- Erythrocytes (dark red) -->
  <g fill="#991b1b" opacity="0.7">
    <circle cx="720" cy="285" r="2"/><circle cx="725" cy="290" r="2"/><circle cx="730" cy="280" r="2"/>
    <circle cx="735" cy="285" r="2"/><circle cx="740" cy="295" r="2"/><circle cx="745" cy="285" r="2"/>
    <circle cx="750" cy="300" r="2"/><circle cx="755" cy="290" r="2"/>
    <circle cx="715" cy="300" r="2"/><circle cx="725" cy="305" r="2"/><circle cx="735" cy="308" r="2"/>
    <circle cx="745" cy="305" r="2"/>
  </g>
  <text x="735" y="330" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#ffffff" stroke="#991b1b" stroke-width="3" paint-order="stroke" stroke-linejoin="round">erythroid</text>

  <!-- Rare cluster (dark) -->
  <g fill="#374151" opacity="0.8">
    <circle cx="430" cy="400" r="2"/><circle cx="435" cy="405" r="2"/><circle cx="440" cy="395" r="2"/>
  </g>
  <text x="435" y="420" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#ffffff" stroke="#374151" stroke-width="3" paint-order="stroke" stroke-linejoin="round">rare</text>

  <!-- Axis labels (minimal) -->
  <text x="60" y="450" font-family="Inter, sans-serif" font-size="10" fill="#525252">UMAP1</text>
  <text x="42" y="78" font-family="Inter, sans-serif" font-size="10" fill="#525252">UMAP2</text>
</svg>
