<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" role="img" aria-labelledby="t d">
  <title id="t">Marker gene heatmap</title>
  <desc id="d">A heatmap with cells grouped by cluster (row side colour bar) and the top five marker genes per cluster (column headers). Block-diagonal structure is visible: each cluster expresses its markers strongly and is near-zero elsewhere.</desc>

  <text x="480" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">MARKER HEATMAP · TOP 5 PER CLUSTER · BLOCK DIAGONAL</text>

  <!-- Row-side colour bar (clusters, 6 groups) -->
  <g>
    <text x="40" y="60" font-family="Inter, sans-serif" font-size="9" fill="#525252" letter-spacing="0.08em">cluster</text>

    <rect x="60" y="70"  width="12" height="55" fill="#1e3a8a"/>  <!-- CD4 T -->
    <text x="52" y="100" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#0a0a0a">CD4 T</text>

    <rect x="60" y="127" width="12" height="55" fill="#7c3aed"/>  <!-- CD8 T -->
    <text x="52" y="158" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#0a0a0a">CD8 T</text>

    <rect x="60" y="184" width="12" height="55" fill="#c4342c"/>  <!-- B cells -->
    <text x="52" y="215" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#0a0a0a">B</text>

    <rect x="60" y="241" width="12" height="55" fill="#b45309"/>  <!-- Monocytes -->
    <text x="52" y="272" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#0a0a0a">Mono</text>

    <rect x="60" y="298" width="12" height="55" fill="#0d7377"/>  <!-- NK (teal — matches course palette; was #ec4899 pink, off-palette) -->
    <text x="52" y="329" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#0a0a0a">NK</text>

    <rect x="60" y="355" width="12" height="55" fill="#15803d"/>  <!-- DC -->
    <text x="52" y="386" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#0a0a0a">DC</text>
  </g>

  <!-- Gene columns (30 total = 5 markers × 6 clusters). Width 25px each. Start at x=80. -->
  <!-- Column headers (rotated 90°) -->
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">
    <!-- CD4 T markers: IL7R, CCR7, CD3D, CD3E, LTB -->
    <text x="96" y="62" transform="rotate(-60 96 62)">IL7R</text>
    <text x="121" y="62" transform="rotate(-60 121 62)">CCR7</text>
    <text x="146" y="62" transform="rotate(-60 146 62)">CD3D</text>
    <text x="171" y="62" transform="rotate(-60 171 62)">CD3E</text>
    <text x="196" y="62" transform="rotate(-60 196 62)">LTB</text>
    <!-- CD8 T markers: CD8A, CD8B, GZMB, PRF1, GZMK -->
    <text x="221" y="62" transform="rotate(-60 221 62)">CD8A</text>
    <text x="246" y="62" transform="rotate(-60 246 62)">CD8B</text>
    <text x="271" y="62" transform="rotate(-60 271 62)">GZMB</text>
    <text x="296" y="62" transform="rotate(-60 296 62)">PRF1</text>
    <text x="321" y="62" transform="rotate(-60 321 62)">GZMK</text>
    <!-- B markers: MS4A1, CD79A, CD19, CD79B, BANK1 -->
    <text x="346" y="62" transform="rotate(-60 346 62)">MS4A1</text>
    <text x="371" y="62" transform="rotate(-60 371 62)">CD79A</text>
    <text x="396" y="62" transform="rotate(-60 396 62)">CD19</text>
    <text x="421" y="62" transform="rotate(-60 421 62)">CD79B</text>
    <text x="446" y="62" transform="rotate(-60 446 62)">BANK1</text>
    <!-- Mono markers: CD14, LYZ, CST3, S100A8, FCN1 -->
    <text x="471" y="62" transform="rotate(-60 471 62)">CD14</text>
    <text x="496" y="62" transform="rotate(-60 496 62)">LYZ</text>
    <text x="521" y="62" transform="rotate(-60 521 62)">CST3</text>
    <text x="546" y="62" transform="rotate(-60 546 62)">S100A8</text>
    <text x="571" y="62" transform="rotate(-60 571 62)">FCN1</text>
    <!-- NK markers: GNLY, NKG7, KLRD1, NCAM1, TRDC -->
    <text x="596" y="62" transform="rotate(-60 596 62)">GNLY</text>
    <text x="621" y="62" transform="rotate(-60 621 62)">NKG7</text>
    <text x="646" y="62" transform="rotate(-60 646 62)">KLRD1</text>
    <text x="671" y="62" transform="rotate(-60 671 62)">NCAM1</text>
    <text x="696" y="62" transform="rotate(-60 696 62)">TRDC</text>
    <!-- DC markers: FCER1A, CLEC10A, CD1C, IRF8, HLA-DQA1 -->
    <text x="721" y="62" transform="rotate(-60 721 62)">FCER1A</text>
    <text x="746" y="62" transform="rotate(-60 746 62)">CLEC10A</text>
    <text x="771" y="62" transform="rotate(-60 771 62)">CD1C</text>
    <text x="796" y="62" transform="rotate(-60 796 62)">IRF8</text>
    <text x="821" y="62" transform="rotate(-60 821 62)">HLA-DQA1</text>
  </g>

  <!-- Heatmap cells: 30 columns × 6 clusters (each cluster 55px tall, roughly) -->
  <!-- Block-diagonal structure: high on cluster's own markers (own 5 columns), low elsewhere -->

  <!-- Helper patterns: cluster's markers at high intensity in cluster's row band; low elsewhere -->

  <g>
    <!-- CD4 T row band: y=70-125. Own markers at columns 0-4 (x=80-205). Rest low. -->
    <g fill="#1e3a8a">
      <rect x="80"  y="70" width="25" height="55" opacity="0.85"/>
      <rect x="105" y="70" width="25" height="55" opacity="0.80"/>
      <rect x="130" y="70" width="25" height="55" opacity="0.75"/>
      <rect x="155" y="70" width="25" height="55" opacity="0.70"/>
      <rect x="180" y="70" width="25" height="55" opacity="0.65"/>
    </g>
    <!-- rest low -->
    <g fill="#eef2ff">
      <rect x="205" y="70" width="125" height="55"/>
      <rect x="330" y="70" width="125" height="55"/>
      <rect x="455" y="70" width="125" height="55"/>
      <rect x="580" y="70" width="125" height="55"/>
      <rect x="705" y="70" width="125" height="55"/>
    </g>

    <!-- CD8 T row band: y=127-182. Own markers at columns 5-9 (x=205-330). -->
    <g fill="#7c3aed">
      <rect x="205" y="127" width="25" height="55" opacity="0.85"/>
      <rect x="230" y="127" width="25" height="55" opacity="0.80"/>
      <rect x="255" y="127" width="25" height="55" opacity="0.75"/>
      <rect x="280" y="127" width="25" height="55" opacity="0.70"/>
      <rect x="305" y="127" width="25" height="55" opacity="0.65"/>
    </g>
    <g fill="#eef2ff">
      <rect x="80"  y="127" width="125" height="55"/>
      <rect x="330" y="127" width="125" height="55"/>
      <rect x="455" y="127" width="125" height="55"/>
      <rect x="580" y="127" width="125" height="55"/>
      <rect x="705" y="127" width="125" height="55"/>
    </g>

    <!-- B cells row band: y=184-239. Own markers at columns 10-14 (x=330-455). -->
    <g fill="#c4342c">
      <rect x="330" y="184" width="25" height="55" opacity="0.85"/>
      <rect x="355" y="184" width="25" height="55" opacity="0.80"/>
      <rect x="380" y="184" width="25" height="55" opacity="0.75"/>
      <rect x="405" y="184" width="25" height="55" opacity="0.70"/>
      <rect x="430" y="184" width="25" height="55" opacity="0.65"/>
    </g>
    <g fill="#eef2ff">
      <rect x="80"  y="184" width="250" height="55"/>
      <rect x="455" y="184" width="125" height="55"/>
      <rect x="580" y="184" width="125" height="55"/>
      <rect x="705" y="184" width="125" height="55"/>
    </g>

    <!-- Mono row band: y=241-296. Own markers at columns 15-19 (x=455-580). -->
    <g fill="#b45309">
      <rect x="455" y="241" width="25" height="55" opacity="0.85"/>
      <rect x="480" y="241" width="25" height="55" opacity="0.80"/>
      <rect x="505" y="241" width="25" height="55" opacity="0.75"/>
      <rect x="530" y="241" width="25" height="55" opacity="0.70"/>
      <rect x="555" y="241" width="25" height="55" opacity="0.65"/>
    </g>
    <g fill="#eef2ff">
      <rect x="80"  y="241" width="375" height="55"/>
      <rect x="580" y="241" width="125" height="55"/>
      <rect x="705" y="241" width="125" height="55"/>
    </g>

    <!-- NK row band: y=298-353. Own markers at columns 20-24 (x=580-705). -->
    <g fill="#0d7377">
      <rect x="580" y="298" width="25" height="55" opacity="0.85"/>
      <rect x="605" y="298" width="25" height="55" opacity="0.80"/>
      <rect x="630" y="298" width="25" height="55" opacity="0.75"/>
      <rect x="655" y="298" width="25" height="55" opacity="0.70"/>
      <rect x="680" y="298" width="25" height="55" opacity="0.65"/>
    </g>
    <g fill="#eef2ff">
      <rect x="80"  y="298" width="500" height="55"/>
      <rect x="705" y="298" width="125" height="55"/>
    </g>

    <!-- DC row band: y=355-410. Own markers at columns 25-29 (x=705-830). -->
    <g fill="#15803d">
      <rect x="705" y="355" width="25" height="55" opacity="0.85"/>
      <rect x="730" y="355" width="25" height="55" opacity="0.80"/>
      <rect x="755" y="355" width="25" height="55" opacity="0.75"/>
      <rect x="780" y="355" width="25" height="55" opacity="0.70"/>
      <rect x="805" y="355" width="25" height="55" opacity="0.65"/>
    </g>
    <g fill="#eef2ff">
      <rect x="80"  y="355" width="625" height="55"/>
    </g>
  </g>

  <!-- Black separator lines between cluster row bands -->
  <g stroke="#0a0a0a" stroke-width="0.8">
    <line x1="80" y1="125" x2="830" y2="125"/>
    <line x1="80" y1="182" x2="830" y2="182"/>
    <line x1="80" y1="239" x2="830" y2="239"/>
    <line x1="80" y1="296" x2="830" y2="296"/>
    <line x1="80" y1="353" x2="830" y2="353"/>
  </g>

  <!-- Gene group dividers (thin vertical) -->
  <g stroke="#525252" stroke-width="0.5">
    <line x1="205" y1="70" x2="205" y2="410"/>
    <line x1="330" y1="70" x2="330" y2="410"/>
    <line x1="455" y1="70" x2="455" y2="410"/>
    <line x1="580" y1="70" x2="580" y2="410"/>
    <line x1="705" y1="70" x2="705" y2="410"/>
  </g>

  <!-- Bottom caption -->
  <text x="480" y="440" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85" font-style="italic">Each cluster expresses its own marker block strongly; near-zero expression elsewhere. Block-diagonal = clusters are well-separated.</text>
</svg>
