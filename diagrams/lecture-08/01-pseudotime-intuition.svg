<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" role="img" aria-labelledby="t d">
  <title id="t">Pseudotime: from snapshot to ordering</title>
  <desc id="d">Two stacked UMAP-like panels. Top: cells uniformly coloured, emphasising that trajectory structure is invisible in raw data. Bottom: same cells recoloured by a 0-to-1 pseudotime gradient with a smooth principal curve overlaid through them, illustrating that a static snapshot contains an implicit continuous ordering.</desc>

  <defs>
    <marker id="arrow-accent" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <text x="480" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">PSEUDOTIME · ONE SNAPSHOT · CONTINUOUS ORDERING</text>

  <!-- Panel A: uniform colouring -->
  <g>
    <rect x="40" y="50" width="430" height="180" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="255" y="70" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">one snapshot · cells uniformly coloured</text>

    <!-- Arc trajectory scatter -->
    <g fill="#525252" opacity="0.8">
      <!-- ~100 points along an arc from (70,200) curving up and right to (440,95) -->
      <circle cx="75" cy="198" r="3"/><circle cx="80" cy="192" r="3"/><circle cx="88" cy="187" r="3"/>
      <circle cx="95" cy="182" r="3"/><circle cx="103" cy="178" r="3"/><circle cx="110" cy="173" r="3"/>
      <circle cx="118" cy="170" r="3"/><circle cx="125" cy="165" r="3"/><circle cx="132" cy="160" r="3"/>
      <circle cx="140" cy="157" r="3"/><circle cx="148" cy="152" r="3"/><circle cx="155" cy="148" r="3"/>
      <circle cx="163" cy="145" r="3"/><circle cx="170" cy="141" r="3"/><circle cx="178" cy="138" r="3"/>
      <circle cx="185" cy="134" r="3"/><circle cx="193" cy="131" r="3"/><circle cx="200" cy="128" r="3"/>
      <circle cx="208" cy="125" r="3"/><circle cx="215" cy="122" r="3"/><circle cx="223" cy="119" r="3"/>
      <circle cx="230" cy="116" r="3"/><circle cx="238" cy="114" r="3"/><circle cx="245" cy="112" r="3"/>
      <circle cx="253" cy="110" r="3"/><circle cx="260" cy="107" r="3"/><circle cx="268" cy="105" r="3"/>
      <circle cx="275" cy="103" r="3"/><circle cx="283" cy="101" r="3"/><circle cx="290" cy="100" r="3"/>
      <circle cx="298" cy="98"  r="3"/><circle cx="305" cy="97"  r="3"/><circle cx="313" cy="95"  r="3"/>
      <circle cx="320" cy="94"  r="3"/><circle cx="328" cy="93"  r="3"/><circle cx="335" cy="92"  r="3"/>
      <circle cx="343" cy="91"  r="3"/><circle cx="350" cy="91"  r="3"/><circle cx="358" cy="90"  r="3"/>
      <circle cx="365" cy="90"  r="3"/><circle cx="373" cy="90"  r="3"/><circle cx="380" cy="90"  r="3"/>
      <circle cx="388" cy="91"  r="3"/><circle cx="395" cy="92"  r="3"/><circle cx="403" cy="93"  r="3"/>
      <circle cx="410" cy="95"  r="3"/><circle cx="418" cy="97"  r="3"/><circle cx="425" cy="100" r="3"/>
      <!-- scatter around arc -->
      <circle cx="100" cy="195" r="2.2"/><circle cx="140" cy="175" r="2.2"/><circle cx="180" cy="152" r="2.2"/>
      <circle cx="220" cy="135" r="2.2"/><circle cx="260" cy="120" r="2.2"/><circle cx="300" cy="108" r="2.2"/>
      <circle cx="340" cy="100" r="2.2"/><circle cx="380" cy="96"  r="2.2"/><circle cx="420" cy="102" r="2.2"/>
      <circle cx="85"  cy="207" r="2.2"/><circle cx="125" cy="185" r="2.2"/><circle cx="165" cy="160" r="2.2"/>
      <circle cx="205" cy="143" r="2.2"/><circle cx="245" cy="125" r="2.2"/><circle cx="285" cy="115" r="2.2"/>
      <circle cx="325" cy="103" r="2.2"/><circle cx="365" cy="95"  r="2.2"/><circle cx="405" cy="103" r="2.2"/>
    </g>

    <!-- Arrow labeling the mystery -->
    <text x="255" y="220" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85" font-style="italic">(trajectory invisible in raw data)</text>
  </g>

  <!-- Panel B: coloured by pseudotime -->
  <g>
    <rect x="490" y="50" width="430" height="180" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="705" y="70" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">continuous ordering · pseudotime t in [0, 1]</text>

    <!-- Principal curve overlaid -->
    <path d="M 525 198 Q 600 165, 680 130 Q 760 105, 870 95" fill="none" stroke="#0a0a0a" stroke-width="2"/>

    <!-- Curve tick marks at 5 positions along the path -->
    <g stroke="#0a0a0a" stroke-width="1.5">
      <line x1="551" y1="179" x2="547" y2="185"/>
      <line x1="628" y1="153" x2="624" y2="160"/>
      <line x1="708" y1="125" x2="704" y2="132"/>
      <line x1="790" y1="104" x2="786" y2="110"/>
      <line x1="855" y1="96" x2="851" y2="103"/>
    </g>

    <!-- Cells coloured by pseudotime: 10 bins from pale to deep accent -->
    <!-- bin 1 (t ≈ 0.05): pale -->
    <g fill="#eef2ff">
      <circle cx="525" cy="198" r="3"/><circle cx="530" cy="192" r="3"/><circle cx="535" cy="207" r="3"/>
      <circle cx="540" cy="196" r="3"/>
    </g>
    <g fill="#dbeafe">
      <circle cx="548" cy="188" r="3"/><circle cx="555" cy="195" r="3"/><circle cx="562" cy="181" r="3"/>
      <circle cx="570" cy="184" r="3"/>
    </g>
    <g fill="#bfdbfe">
      <circle cx="578" cy="175" r="3"/><circle cx="586" cy="183" r="3"/><circle cx="595" cy="167" r="3"/>
      <circle cx="603" cy="172" r="3"/>
    </g>
    <g fill="#93c5fd">
      <circle cx="612" cy="163" r="3"/><circle cx="621" cy="170" r="3"/><circle cx="630" cy="156" r="3"/>
      <circle cx="640" cy="161" r="3"/>
    </g>
    <g fill="#60a5fa">
      <circle cx="650" cy="149" r="3"/><circle cx="659" cy="156" r="3"/><circle cx="668" cy="142" r="3"/>
      <circle cx="678" cy="146" r="3"/>
    </g>
    <g fill="#3b82f6">
      <circle cx="688" cy="135" r="3"/><circle cx="697" cy="142" r="3"/><circle cx="706" cy="128" r="3"/>
      <circle cx="716" cy="131" r="3"/>
    </g>
    <g fill="#2563eb">
      <circle cx="726" cy="122" r="3"/><circle cx="735" cy="127" r="3"/><circle cx="744" cy="115" r="3"/>
      <circle cx="754" cy="117" r="3"/>
    </g>
    <g fill="#1d4ed8">
      <circle cx="764" cy="110" r="3"/><circle cx="773" cy="114" r="3"/><circle cx="782" cy="104" r="3"/>
      <circle cx="792" cy="106" r="3"/>
    </g>
    <g fill="#1e40af">
      <circle cx="802" cy="100" r="3"/><circle cx="811" cy="102" r="3"/><circle cx="820" cy="96" r="3"/>
      <circle cx="830" cy="98" r="3"/>
    </g>
    <g fill="#1e3a8a">
      <circle cx="840" cy="94" r="3"/><circle cx="849" cy="95" r="3"/><circle cx="858" cy="93" r="3"/>
      <circle cx="867" cy="94" r="3"/><circle cx="876" cy="95" r="3"/>
    </g>

    <!-- Gradient bar legend -->
    <g transform="translate(530 215)">
      <defs>
        <linearGradient id="pt-grad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#eef2ff"/>
          <stop offset="100%" stop-color="#1e3a8a"/>
        </linearGradient>
      </defs>
      <rect x="0" y="0" width="350" height="8" fill="url(#pt-grad)" stroke="#8a8a85" stroke-width="0.5"/>
      <text x="0" y="22" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">t = 0</text>
      <text x="350" y="22" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">t = 1</text>
      <text x="175" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" font-style="italic">principal curve overlaid</text>
    </g>
  </g>

  <!-- Caption -->
  <text x="480" y="280" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">same cells, two views — pseudotime is the projection onto the fitted curve</text>

  <!-- Bottom intuition caption -->
  <g transform="translate(80 310)">
    <rect x="0" y="0" width="800" height="120" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
    <text x="20" y="24" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">the escalator analogy</text>
    <text x="20" y="46" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">A photograph of a crowded escalator: you cannot follow any one person, but every step has a person on it —</text>
    <text x="20" y="62" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">you can read the whole progression from the single image. Pseudotime treats an asynchronous cell population</text>
    <text x="20" y="78" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">the same way: dense sampling of an unobserved process, with cells at every stage simultaneously.</text>
    <text x="20" y="104" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">Two load-bearing assumptions: (1) the trajectory is continuous; (2) sampling is dense enough to cover it.</text>
  </g>
</svg>
