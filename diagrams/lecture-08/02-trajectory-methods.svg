<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 440" role="img" aria-labelledby="t d">
  <title id="t">Three trajectory methods side-by-side</title>
  <desc id="d">Three panels showing the same branching 3-lineage dataset. Left: Monocle3 with a principal-graph skeleton overlaid. Middle: Slingshot with smooth principal curves along each lineage. Right: PAGA as a cluster-level abstraction graph. A bottom annotation row states each method's topology assumption.</desc>

  <text x="540" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">TRAJECTORY INFERENCE · THREE METHODS · ONE BRANCHING DATASET</text>

  <!-- ── Panel A: Monocle3 ── -->
  <g>
    <rect x="30" y="50" width="330" height="290" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="195" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">(a) Monocle3 — principal graph</text>

    <!-- Cells faded -->
    <g fill="#525252" opacity="0.35">
      <!-- Trunk -->
      <circle cx="80" cy="260" r="3"/><circle cx="88" cy="255" r="3"/><circle cx="97" cy="250" r="3"/>
      <circle cx="106" cy="246" r="3"/><circle cx="116" cy="241" r="3"/><circle cx="125" cy="237" r="3"/>
      <circle cx="135" cy="233" r="3"/><circle cx="145" cy="229" r="3"/><circle cx="155" cy="226" r="3"/>
      <circle cx="165" cy="222" r="3"/><circle cx="175" cy="220" r="3"/><circle cx="185" cy="218" r="3"/>
      <circle cx="83" cy="270" r="2.5"/><circle cx="93" cy="263" r="2.5"/><circle cx="103" cy="257" r="2.5"/>
      <circle cx="113" cy="250" r="2.5"/><circle cx="123" cy="244" r="2.5"/><circle cx="133" cy="240" r="2.5"/>
      <circle cx="73" cy="252" r="2.5"/><circle cx="85" cy="246" r="2.5"/><circle cx="95" cy="240" r="2.5"/>
      <circle cx="107" cy="235" r="2.5"/><circle cx="118" cy="230" r="2.5"/><circle cx="129" cy="226" r="2.5"/>
      <circle cx="140" cy="222" r="2.5"/><circle cx="152" cy="218" r="2.5"/><circle cx="164" cy="214" r="2.5"/>
      <circle cx="175" cy="210" r="2.5"/>
      <!-- Branch up -->
      <circle cx="200" cy="205" r="3"/><circle cx="215" cy="190" r="3"/><circle cx="230" cy="175" r="3"/>
      <circle cx="245" cy="160" r="3"/><circle cx="260" cy="145" r="3"/><circle cx="275" cy="135" r="3"/>
      <circle cx="290" cy="128" r="3"/><circle cx="305" cy="122" r="3"/><circle cx="320" cy="118" r="3"/>
      <circle cx="210" cy="210" r="2.5"/><circle cx="225" cy="195" r="2.5"/><circle cx="240" cy="180" r="2.5"/>
      <circle cx="255" cy="165" r="2.5"/><circle cx="270" cy="150" r="2.5"/><circle cx="285" cy="140" r="2.5"/>
      <circle cx="300" cy="130" r="2.5"/><circle cx="315" cy="124" r="2.5"/><circle cx="210" cy="196" r="2.5"/>
      <circle cx="225" cy="182" r="2.5"/><circle cx="240" cy="168" r="2.5"/><circle cx="255" cy="155" r="2.5"/>
      <!-- Branch down -->
      <circle cx="200" cy="230" r="3"/><circle cx="215" cy="245" r="3"/><circle cx="230" cy="260" r="3"/>
      <circle cx="245" cy="275" r="3"/><circle cx="260" cy="287" r="3"/><circle cx="275" cy="293" r="3"/>
      <circle cx="290" cy="297" r="3"/><circle cx="305" cy="300" r="3"/><circle cx="320" cy="302" r="3"/>
      <circle cx="210" cy="222" r="2.5"/><circle cx="225" cy="235" r="2.5"/><circle cx="240" cy="250" r="2.5"/>
      <circle cx="255" cy="265" r="2.5"/><circle cx="270" cy="278" r="2.5"/><circle cx="285" cy="287" r="2.5"/>
      <circle cx="300" cy="293" r="2.5"/><circle cx="315" cy="298" r="2.5"/><circle cx="210" cy="240" r="2.5"/>
      <circle cx="225" cy="255" r="2.5"/><circle cx="240" cy="268" r="2.5"/><circle cx="255" cy="282" r="2.5"/>
    </g>

    <!-- Principal-graph skeleton nodes -->
    <g fill="#1e3a8a">
      <circle cx="82" cy="262" r="4"/>
      <circle cx="130" cy="236" r="4"/>
      <circle cx="180" cy="220" r="4"/>
      <circle cx="200" cy="216" r="5"/> <!-- branch point -->
      <circle cx="255" cy="155" r="4"/>
      <circle cx="315" cy="120" r="4"/>
      <circle cx="255" cy="278" r="4"/>
      <circle cx="315" cy="300" r="4"/>
    </g>

    <!-- Graph edges -->
    <g stroke="#1e3a8a" stroke-width="2" fill="none">
      <line x1="82" y1="262" x2="130" y2="236"/>
      <line x1="130" y1="236" x2="180" y2="220"/>
      <line x1="180" y1="220" x2="200" y2="216"/>
      <!-- Branch up -->
      <line x1="200" y1="216" x2="255" y2="155"/>
      <line x1="255" y1="155" x2="315" y2="120"/>
      <!-- Branch down -->
      <line x1="200" y1="216" x2="255" y2="278"/>
      <line x1="255" y1="278" x2="315" y2="300"/>
    </g>

    <!-- Branch point label -->
    <text x="200" y="206" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#b45309" font-weight="600">branch</text>

    <!-- Projection lines (light, selected) -->
    <g stroke="#c4c1b6" stroke-width="0.5">
      <line x1="106" y1="246" x2="115" y2="239"/>
      <line x1="145" y1="229" x2="155" y2="229"/>
      <line x1="260" y1="287" x2="255" y2="278"/>
    </g>

    <text x="195" y="320" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">cells project to nearest skeleton node;</text>
    <text x="195" y="334" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">pseudotime = graph distance from root</text>
  </g>

  <!-- ── Panel B: Slingshot ── -->
  <g>
    <rect x="375" y="50" width="330" height="290" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="540" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">(b) Slingshot — principal curves</text>

    <!-- Cells coloured by cluster (3 clusters: root, branch-A, branch-B) -->
    <g fill="#1e3a8a" opacity="0.7">
      <circle cx="425" cy="260" r="3"/><circle cx="433" cy="255" r="3"/><circle cx="442" cy="250" r="3"/>
      <circle cx="451" cy="246" r="3"/><circle cx="461" cy="241" r="3"/><circle cx="470" cy="237" r="3"/>
      <circle cx="428" cy="270" r="2.5"/><circle cx="438" cy="263" r="2.5"/><circle cx="448" cy="257" r="2.5"/>
      <circle cx="418" cy="252" r="2.5"/><circle cx="430" cy="246" r="2.5"/><circle cx="440" cy="240" r="2.5"/>
      <circle cx="450" cy="225" r="3"/>
    </g>
    <g fill="#c4342c" opacity="0.7">
      <circle cx="545" cy="205" r="3"/><circle cx="560" cy="190" r="3"/><circle cx="575" cy="175" r="3"/>
      <circle cx="590" cy="160" r="3"/><circle cx="605" cy="145" r="3"/><circle cx="620" cy="135" r="3"/>
      <circle cx="635" cy="128" r="3"/><circle cx="650" cy="122" r="3"/><circle cx="665" cy="118" r="3"/>
      <circle cx="555" cy="210" r="2.5"/><circle cx="570" cy="195" r="2.5"/><circle cx="585" cy="180" r="2.5"/>
      <circle cx="600" cy="165" r="2.5"/><circle cx="615" cy="150" r="2.5"/><circle cx="630" cy="140" r="2.5"/>
      <circle cx="645" cy="130" r="2.5"/><circle cx="660" cy="124" r="2.5"/>
    </g>
    <g fill="#b45309" opacity="0.7">
      <circle cx="545" cy="230" r="3"/><circle cx="560" cy="245" r="3"/><circle cx="575" cy="260" r="3"/>
      <circle cx="590" cy="275" r="3"/><circle cx="605" cy="287" r="3"/><circle cx="620" cy="293" r="3"/>
      <circle cx="635" cy="297" r="3"/><circle cx="650" cy="300" r="3"/><circle cx="665" cy="302" r="3"/>
      <circle cx="555" cy="222" r="2.5"/><circle cx="570" cy="235" r="2.5"/><circle cx="585" cy="250" r="2.5"/>
      <circle cx="600" cy="265" r="2.5"/><circle cx="615" cy="278" r="2.5"/><circle cx="630" cy="287" r="2.5"/>
    </g>

    <!-- Cluster centres -->
    <g stroke="#0a0a0a" stroke-width="1.5">
      <circle cx="445" cy="248" r="7" fill="#1e3a8a"/>
      <circle cx="605" cy="145" r="7" fill="#c4342c"/>
      <circle cx="605" cy="287" r="7" fill="#b45309"/>
    </g>

    <!-- Two smooth principal curves -->
    <g fill="none" stroke-width="2.5">
      <path d="M 445 248 Q 500 215, 555 195 Q 615 170, 665 118" stroke="#1e3a8a"/>
      <path d="M 445 248 Q 500 268, 555 280 Q 615 295, 665 302" stroke="#b45309"/>
    </g>

    <!-- Tangent ticks -->
    <g stroke="#0a0a0a" stroke-width="1.5">
      <line x1="510" y1="220" x2="514" y2="226"/>
      <line x1="600" y1="170" x2="604" y2="164"/>
      <line x1="510" y1="270" x2="506" y2="275"/>
      <line x1="600" y1="290" x2="604" y2="296"/>
    </g>

    <text x="540" y="320" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">smooth curve per lineage;</text>
    <text x="540" y="334" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">pseudotime = arc length along curve</text>
  </g>

  <!-- ── Panel C: PAGA ── -->
  <g>
    <rect x="720" y="50" width="330" height="290" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="885" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">(c) PAGA — cluster-level graph</text>

    <!-- Very faded cells -->
    <g fill="#c4c1b6" opacity="0.35">
      <circle cx="795" cy="258" r="2.2"/><circle cx="805" cy="252" r="2.2"/><circle cx="815" cy="246" r="2.2"/>
      <circle cx="825" cy="240" r="2.2"/><circle cx="835" cy="235" r="2.2"/><circle cx="845" cy="230" r="2.2"/>
      <circle cx="790" cy="267" r="2.2"/><circle cx="800" cy="262" r="2.2"/><circle cx="810" cy="256" r="2.2"/>
      <circle cx="920" cy="200" r="2.2"/><circle cx="935" cy="185" r="2.2"/><circle cx="950" cy="170" r="2.2"/>
      <circle cx="965" cy="155" r="2.2"/><circle cx="980" cy="140" r="2.2"/><circle cx="995" cy="130" r="2.2"/>
      <circle cx="925" cy="207" r="2.2"/><circle cx="940" cy="192" r="2.2"/><circle cx="955" cy="177" r="2.2"/>
      <circle cx="920" cy="230" r="2.2"/><circle cx="935" cy="245" r="2.2"/><circle cx="950" cy="260" r="2.2"/>
      <circle cx="965" cy="275" r="2.2"/><circle cx="980" cy="287" r="2.2"/><circle cx="995" cy="295" r="2.2"/>
      <circle cx="925" cy="222" r="2.2"/><circle cx="940" cy="237" r="2.2"/><circle cx="955" cy="253" r="2.2"/>
    </g>

    <!-- Cluster nodes: sized by cluster size -->
    <g stroke="#0a0a0a" stroke-width="1.5">
      <circle cx="815" cy="250" r="20" fill="#1e3a8a"/>
      <circle cx="960" cy="170" r="17" fill="#c4342c"/>
      <circle cx="960" cy="270" r="17" fill="#b45309"/>
    </g>

    <!-- Cluster labels -->
    <text x="815" y="253" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#ffffff" font-weight="600">A</text>
    <text x="960" y="173" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#ffffff" font-weight="600">B</text>
    <text x="960" y="273" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#ffffff" font-weight="600">C</text>

    <!-- PAGA edges (weights by kNN-edge fraction) -->
    <line x1="833" y1="242" x2="944" y2="180" stroke="#525252" stroke-width="4"/>
    <line x1="833" y1="260" x2="944" y2="260" stroke="#525252" stroke-width="3"/>
    <line x1="960" y1="187" x2="960" y2="253" stroke="#525252" stroke-width="1"/>

    <!-- Edge weight labels — shifted off the edge lines so values stay readable.
         A→B edge slopes through y≈205 at the label x range, so the w=0.42 label
         moves up to y=190; A→C is horizontal at y=260, so w=0.38 moves down to y=278. -->
    <text x="878" y="190" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">w=0.42</text>
    <text x="878" y="278" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">w=0.38</text>
    <text x="968" y="225" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">w=0.06</text>

    <text x="885" y="320" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">clusters as nodes, kNN-overlap as edges;</text>
    <text x="885" y="334" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">topology summary, not per-cell pseudotime</text>
  </g>

  <!-- Bottom annotation row -->
  <g transform="translate(30 360)">
    <text x="0" y="14" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252">Topology assumption:</text>
    <text x="165" y="14" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">tree / DAG, no prior</text>
    <text x="510" y="14" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">tree with smooth curves</text>
    <text x="855" y="14" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">cluster-level, topology-agnostic</text>
    <text x="0" y="34" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252">Best when:</text>
    <text x="165" y="34" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">topology unknown; branches</text>
    <text x="510" y="34" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">distinct clusters + smooth flow</text>
    <text x="855" y="34" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">first-pass sanity check</text>
    <text x="0" y="60" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85" font-style="italic">PAGA first — if the topology is disconnected, a tree-based trajectory method is wrong. Monocle3 / Slingshot only make sense on connected, roughly tree-like data.</text>
  </g>
</svg>
