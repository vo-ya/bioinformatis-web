<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" role="img" aria-labelledby="t d">
  <title id="t">Spliced and unspliced reads</title>
  <desc id="d">Top: a gene model with four exons and three introns. Middle: three transcript states — unspliced pre-mRNA with introns, partially spliced intermediate, fully spliced mature mRNA. Bottom: a scRNA-seq read pile-up with most reads aligning fully within exons (spliced) and a minority spanning intron-exon boundaries (unspliced).</desc>

  <text x="480" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">SPLICED vs UNSPLICED READS · THE RATIO ENCODES TRANSCRIPTIONAL DIRECTION</text>

  <!-- ── Band 1: Gene model ── -->
  <g>
    <text x="60" y="66" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">Gene model</text>

    <!-- Exons + introns -->
    <line x1="90" y1="84" x2="870" y2="84" stroke="#c4c1b6" stroke-width="1"/>

    <!-- E1 -->
    <rect x="90" y="78" width="100" height="14" fill="#2d7a3e"/>
    <text x="140" y="88" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#ffffff" font-weight="600">E1</text>
    <!-- I1 -->
    <line x1="190" y1="85" x2="290" y2="85" stroke="#525252" stroke-width="1"/>
    <text x="240" y="100" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">intron 1</text>
    <!-- E2 -->
    <rect x="290" y="78" width="120" height="14" fill="#2d7a3e"/>
    <text x="350" y="88" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#ffffff" font-weight="600">E2</text>
    <!-- I2 -->
    <line x1="410" y1="85" x2="510" y2="85" stroke="#525252" stroke-width="1"/>
    <text x="460" y="100" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">intron 2</text>
    <!-- E3 -->
    <rect x="510" y="78" width="110" height="14" fill="#2d7a3e"/>
    <text x="565" y="88" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#ffffff" font-weight="600">E3</text>
    <!-- I3 -->
    <line x1="620" y1="85" x2="710" y2="85" stroke="#525252" stroke-width="1"/>
    <text x="665" y="100" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">intron 3</text>
    <!-- E4 -->
    <rect x="710" y="78" width="160" height="14" fill="#2d7a3e"/>
    <text x="790" y="88" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#ffffff" font-weight="600">E4</text>
  </g>

  <!-- ── Band 2: Three transcript states ── -->
  <g>
    <text x="60" y="128" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">Transcript states</text>

    <!-- Unspliced -->
    <text x="60" y="158" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309" font-weight="600">unspliced</text>
    <text x="60" y="171" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309">pre-mRNA</text>
    <rect x="170" y="150" width="100" height="12" fill="#2d7a3e"/>
    <line x1="270" y1="156" x2="370" y2="156" stroke="#b45309" stroke-width="2"/>
    <rect x="370" y="150" width="120" height="12" fill="#2d7a3e"/>
    <line x1="490" y1="156" x2="590" y2="156" stroke="#b45309" stroke-width="2"/>
    <rect x="590" y="150" width="110" height="12" fill="#2d7a3e"/>
    <line x1="700" y1="156" x2="790" y2="156" stroke="#b45309" stroke-width="2"/>
    <rect x="790" y="150" width="90" height="12" fill="#2d7a3e"/>
    <text x="880" y="159" font-family="Inter, sans-serif" font-size="9" fill="#b45309" font-style="italic">just transcribed</text>

    <!-- Partially spliced -->
    <text x="60" y="192" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85" font-weight="600">partially</text>
    <text x="60" y="205" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85">spliced</text>
    <rect x="170" y="184" width="100" height="12" fill="#2d7a3e"/>
    <rect x="270" y="184" width="120" height="12" fill="#2d7a3e"/>
    <line x1="390" y1="190" x2="490" y2="190" stroke="#b45309" stroke-width="2"/>
    <rect x="490" y="184" width="110" height="12" fill="#2d7a3e"/>
    <rect x="600" y="184" width="90" height="12" fill="#2d7a3e"/>
    <text x="700" y="193" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" font-style="italic">in progress · intron 2 remains</text>

    <!-- Fully spliced -->
    <text x="60" y="226" font-family="JetBrains Mono, monospace" font-size="9" fill="#2d7a3e" font-weight="600">fully</text>
    <text x="60" y="239" font-family="JetBrains Mono, monospace" font-size="9" fill="#2d7a3e">spliced</text>
    <rect x="170" y="218" width="100" height="12" fill="#2d7a3e"/>
    <rect x="270" y="218" width="120" height="12" fill="#2d7a3e"/>
    <rect x="390" y="218" width="110" height="12" fill="#2d7a3e"/>
    <rect x="500" y="218" width="90" height="12" fill="#2d7a3e"/>
    <text x="600" y="227" font-family="Inter, sans-serif" font-size="9" fill="#2d7a3e" font-style="italic">mature mRNA · ready for translation</text>
  </g>

  <!-- ── Band 3: Read pile-up ── -->
  <g>
    <text x="60" y="272" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">scRNA-seq read pile-up</text>

    <!-- Re-draw gene for alignment reference (lighter) -->
    <rect x="90" y="288" width="100" height="8" fill="#2d7a3e" opacity="0.25"/>
    <line x1="190" y1="292" x2="290" y2="292" stroke="#8a8a85" stroke-width="0.6"/>
    <rect x="290" y="288" width="120" height="8" fill="#2d7a3e" opacity="0.25"/>
    <line x1="410" y1="292" x2="510" y2="292" stroke="#8a8a85" stroke-width="0.6"/>
    <rect x="510" y="288" width="110" height="8" fill="#2d7a3e" opacity="0.25"/>
    <line x1="620" y1="292" x2="710" y2="292" stroke="#8a8a85" stroke-width="0.6"/>
    <rect x="710" y="288" width="160" height="8" fill="#2d7a3e" opacity="0.25"/>

    <!-- Spliced read pile-up (mostly inside exons) -->
    <g fill="#2d7a3e">
      <!-- E1 reads -->
      <rect x="95" y="304" width="28" height="4"/><rect x="125" y="304" width="30" height="4"/>
      <rect x="98" y="311" width="32" height="4"/><rect x="140" y="311" width="32" height="4"/>
      <rect x="110" y="318" width="30" height="4"/><rect x="155" y="318" width="28" height="4"/>
      <!-- E2 reads -->
      <rect x="295" y="304" width="30" height="4"/><rect x="330" y="304" width="30" height="4"/><rect x="365" y="304" width="35" height="4"/>
      <rect x="300" y="311" width="34" height="4"/><rect x="340" y="311" width="30" height="4"/><rect x="375" y="311" width="30" height="4"/>
      <rect x="310" y="318" width="30" height="4"/><rect x="350" y="318" width="30" height="4"/><rect x="385" y="318" width="23" height="4"/>
      <!-- E3 reads -->
      <rect x="515" y="304" width="30" height="4"/><rect x="550" y="304" width="32" height="4"/><rect x="585" y="304" width="30" height="4"/>
      <rect x="518" y="311" width="32" height="4"/><rect x="555" y="311" width="30" height="4"/><rect x="590" y="311" width="28" height="4"/>
      <rect x="525" y="318" width="30" height="4"/><rect x="565" y="318" width="30" height="4"/><rect x="600" y="318" width="18" height="4"/>
      <!-- E4 reads -->
      <rect x="715" y="304" width="30" height="4"/><rect x="750" y="304" width="32" height="4"/><rect x="790" y="304" width="32" height="4"/><rect x="830" y="304" width="35" height="4"/>
      <rect x="720" y="311" width="32" height="4"/><rect x="760" y="311" width="30" height="4"/><rect x="800" y="311" width="32" height="4"/><rect x="840" y="311" width="28" height="4"/>
      <rect x="730" y="318" width="30" height="4"/><rect x="775" y="318" width="30" height="4"/><rect x="815" y="318" width="30" height="4"/><rect x="855" y="318" width="15" height="4"/>
    </g>

    <!-- Unspliced reads (spanning intron-exon boundaries) -->
    <g fill="#b45309">
      <rect x="178" y="325" width="38" height="4"/>
      <rect x="195" y="332" width="35" height="4"/>
      <rect x="400" y="325" width="36" height="4"/>
      <rect x="595" y="332" width="38" height="4"/>
      <rect x="700" y="325" width="35" height="4"/>
    </g>

    <!-- Arrows from transcripts to read classes -->
    <!-- spliced arrow -->
    <path d="M 450 247 L 480 290" fill="none" stroke="#2d7a3e" stroke-width="1.5" marker-end="url(#arrow-splice-green)"/>
    <!-- unspliced arrow -->
    <path d="M 450 170 L 430 320" fill="none" stroke="#b45309" stroke-width="1.5" marker-end="url(#arrow-splice-amber)"/>

    <defs>
      <marker id="arrow-splice-green" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
        <path d="M 0 0 L 8 4 L 0 8 z" fill="#2d7a3e"/>
      </marker>
      <marker id="arrow-splice-amber" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
        <path d="M 0 0 L 8 4 L 0 8 z" fill="#b45309"/>
      </marker>
    </defs>

    <text x="60" y="340" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85">reads</text>
  </g>

  <!-- Legend and intuition -->
  <g transform="translate(60 360)">
    <rect x="0" y="0" width="840" height="60" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
    <rect x="18" y="18" width="20" height="8" fill="#2d7a3e"/>
    <text x="44" y="26" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a"><tspan font-weight="600">spliced</tspan> (exonic): from mature mRNA — older copies</text>
    <rect x="18" y="38" width="20" height="4" fill="#b45309"/>
    <text x="44" y="44" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a"><tspan font-weight="600">unspliced</tspan> (spanning intron–exon boundary): from pre-mRNA — newer copies</text>
    <text x="420" y="34" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" font-style="italic">high unspliced / spliced → gene being induced · low ratio → repressed · steady ratio → steady state</text>
  </g>
</svg>
