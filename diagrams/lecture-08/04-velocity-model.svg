<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 440" role="img" aria-labelledby="t d">
  <title id="t">RNA velocity dynamical model</title>
  <desc id="d">Three panels. Left: two-compartment kinetic diagram with transcription rate alpha feeding unspliced u, splicing rate beta from u to spliced s, and degradation rate gamma removing s; the two ODEs are written below. Middle: a u-versus-s phase diagram with the steady-state line and cells coloured by steady, inducing (above line), or repressing (below line) state. Right: a 2D UMAP with velocity arrows forming a flow field from immature to mature populations.</desc>

  <defs>
    <marker id="arr-accent" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#1e3a8a"/>
    </marker>
    <marker id="arr-fg" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#0a0a0a"/>
    </marker>
  </defs>

  <text x="540" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">RNA VELOCITY · STATE-SPACE ESTIMATOR FROM SPLICED / UNSPLICED RATIOS</text>

  <!-- ── Panel A: Kinetic diagram ── -->
  <g>
    <rect x="30" y="50" width="320" height="360" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="190" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">(a) kinetic model</text>

    <!-- α (source) -->
    <text x="80" y="120" text-anchor="middle" font-family="Source Serif 4, serif" font-size="22" fill="#1e3a8a" font-style="italic">α</text>
    <text x="80" y="137" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">transcription</text>

    <!-- Arrow α → u -->
    <line x1="100" y1="120" x2="145" y2="150" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-accent)"/>

    <!-- u box -->
    <rect x="145" y="140" width="80" height="45" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="185" y="162" text-anchor="middle" font-family="Source Serif 4, serif" font-size="18" font-style="italic" fill="#1e3a8a">u</text>
    <text x="185" y="177" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">unspliced</text>

    <!-- Arrow u → s (labeled β) -->
    <line x1="185" y1="185" x2="185" y2="230" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-accent)"/>
    <text x="200" y="212" font-family="Source Serif 4, serif" font-size="16" font-style="italic" fill="#1e3a8a">β</text>
    <text x="212" y="222" font-family="Inter, sans-serif" font-size="9" fill="#525252">splicing</text>

    <!-- s box -->
    <rect x="145" y="235" width="80" height="45" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="185" y="257" text-anchor="middle" font-family="Source Serif 4, serif" font-size="18" font-style="italic" fill="#1e3a8a">s</text>
    <text x="185" y="272" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">spliced</text>

    <!-- Arrow s → ∅ (labeled γ) -->
    <line x1="185" y1="280" x2="185" y2="320" stroke="#b45309" stroke-width="1.5" marker-end="url(#arr-accent)"/>
    <text x="200" y="304" font-family="Source Serif 4, serif" font-size="16" font-style="italic" fill="#b45309">γ</text>
    <text x="212" y="314" font-family="Inter, sans-serif" font-size="9" fill="#525252">degradation</text>
    <text x="185" y="338" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#b45309">∅</text>

    <!-- ODEs -->
    <g font-family="Source Serif 4, serif" font-size="13" fill="#0a0a0a">
      <text x="50" y="375"><tspan font-style="italic">du/dt</tspan> = <tspan font-style="italic">α</tspan> − <tspan font-style="italic">β u</tspan></text>
      <text x="50" y="395"><tspan font-style="italic">ds/dt</tspan> = <tspan font-style="italic">β u</tspan> − <tspan font-style="italic">γ s</tspan></text>
    </g>
  </g>

  <!-- ── Panel B: u-s phase diagram ── -->
  <g>
    <rect x="370" y="50" width="330" height="360" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="535" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">(b) u–s phase diagram</text>

    <!-- Axes -->
    <line x1="410" y1="350" x2="680" y2="350" stroke="#8a8a85" stroke-width="1"/>
    <line x1="410" y1="100" x2="410" y2="350" stroke="#8a8a85" stroke-width="1"/>

    <text x="545" y="372" text-anchor="middle" font-family="Source Serif 4, serif" font-size="13" fill="#525252" font-style="italic">s (spliced)</text>
    <text x="395" y="225" text-anchor="middle" font-family="Source Serif 4, serif" font-size="13" fill="#525252" font-style="italic" transform="rotate(-90 395 225)">u (unspliced)</text>

    <!-- Steady-state line u = (γ/β) s -->
    <line x1="410" y1="350" x2="680" y2="115" stroke="#0a0a0a" stroke-width="1.2" stroke-dasharray="5 3"/>
    <text x="600" y="150" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">u = (γ/β)·s</text>
    <text x="600" y="165" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">steady-state line</text>

    <!-- Steady-state cells on the line -->
    <g fill="#1e3a8a" opacity="0.85">
      <circle cx="440" cy="323" r="3"/><circle cx="465" cy="302" r="3"/><circle cx="490" cy="280" r="3"/>
      <circle cx="515" cy="258" r="3"/><circle cx="540" cy="238" r="3"/><circle cx="565" cy="216" r="3"/>
      <circle cx="590" cy="195" r="3"/><circle cx="615" cy="172" r="3"/><circle cx="640" cy="151" r="3"/>
      <circle cx="655" cy="138" r="3"/>
    </g>

    <!-- Inducing cells (above the line - higher u/s) -->
    <g fill="#b45309" opacity="0.8">
      <circle cx="450" cy="280" r="3"/><circle cx="475" cy="255" r="3"/><circle cx="500" cy="230" r="3"/>
      <circle cx="525" cy="205" r="3"/><circle cx="550" cy="180" r="3"/><circle cx="465" cy="270" r="3"/>
      <circle cx="490" cy="245" r="3"/><circle cx="515" cy="220" r="3"/><circle cx="540" cy="195" r="3"/>
    </g>

    <!-- Repressing cells (below the line) -->
    <g fill="#7c3aed" opacity="0.8">
      <circle cx="500" cy="330" r="3"/><circle cx="530" cy="320" r="3"/><circle cx="560" cy="305" r="3"/>
      <circle cx="590" cy="285" r="3"/><circle cx="620" cy="265" r="3"/><circle cx="515" cy="340" r="3"/>
      <circle cx="545" cy="328" r="3"/><circle cx="580" cy="312" r="3"/><circle cx="615" cy="290" r="3"/>
    </g>

    <!-- Legend -->
    <g transform="translate(420 100)">
      <circle cx="5" cy="5" r="3.5" fill="#1e3a8a"/>
      <text x="14" y="9" font-family="Inter, sans-serif" font-size="9" fill="#0a0a0a">steady state</text>
      <circle cx="5" cy="21" r="3.5" fill="#b45309"/>
      <text x="14" y="25" font-family="Inter, sans-serif" font-size="9" fill="#0a0a0a">inducing (u above line)</text>
      <circle cx="5" cy="37" r="3.5" fill="#7c3aed"/>
      <text x="14" y="41" font-family="Inter, sans-serif" font-size="9" fill="#0a0a0a">repressing (u below line)</text>
    </g>

    <!-- Velocity formula -->
    <text x="420" y="397" font-family="Source Serif 4, serif" font-size="12" fill="#0a0a0a"><tspan font-style="italic">v_s</tspan> = <tspan font-style="italic">β u</tspan> − <tspan font-style="italic">γ s</tspan><tspan font-family="Inter, sans-serif" font-size="10" fill="#525252">    (residual from steady-state line)</tspan></text>
  </g>

  <!-- ── Panel C: UMAP with velocity arrows ── -->
  <g>
    <rect x="720" y="50" width="330" height="360" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="885" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">(c) velocity on UMAP</text>

    <!-- Cell clouds: immature (top-left) vs mature (bottom-right) -->
    <!-- Immature cluster -->
    <g fill="#b45309" opacity="0.7">
      <circle cx="770" cy="125" r="3"/><circle cx="780" cy="130" r="3"/><circle cx="790" cy="120" r="3"/>
      <circle cx="785" cy="140" r="3"/><circle cx="795" cy="135" r="3"/><circle cx="805" cy="130" r="3"/>
      <circle cx="800" cy="145" r="3"/><circle cx="810" cy="140" r="3"/><circle cx="815" cy="150" r="3"/>
    </g>
    <!-- Transitional cluster (middle) -->
    <g fill="#1e3a8a" opacity="0.7">
      <circle cx="830" cy="175" r="3"/><circle cx="845" cy="185" r="3"/><circle cx="860" cy="195" r="3"/>
      <circle cx="855" cy="205" r="3"/><circle cx="870" cy="215" r="3"/><circle cx="885" cy="205" r="3"/>
      <circle cx="840" cy="195" r="3"/><circle cx="855" cy="175" r="3"/><circle cx="895" cy="220" r="3"/>
    </g>
    <!-- Mature cluster -->
    <g fill="#2d7a3e" opacity="0.7">
      <circle cx="910" cy="240" r="3"/><circle cx="925" cy="250" r="3"/><circle cx="940" cy="260" r="3"/>
      <circle cx="935" cy="270" r="3"/><circle cx="950" cy="275" r="3"/><circle cx="965" cy="270" r="3"/>
      <circle cx="955" cy="285" r="3"/><circle cx="970" cy="290" r="3"/><circle cx="985" cy="295" r="3"/>
      <circle cx="975" cy="310" r="3"/><circle cx="990" cy="310" r="3"/><circle cx="1000" cy="300" r="3"/>
    </g>

    <!-- Velocity arrows: all flow toward lower-right (immature → mature) -->
    <g stroke="#1e3a8a" stroke-width="1.4" fill="none">
      <line x1="775" y1="125" x2="789" y2="139" marker-end="url(#arr-accent)"/>
      <line x1="790" y1="135" x2="804" y2="149" marker-end="url(#arr-accent)"/>
      <line x1="805" y1="145" x2="819" y2="159" marker-end="url(#arr-accent)"/>
      <line x1="820" y1="160" x2="834" y2="174" marker-end="url(#arr-accent)"/>
      <line x1="835" y1="180" x2="849" y2="194" marker-end="url(#arr-accent)"/>
      <line x1="850" y1="195" x2="864" y2="209" marker-end="url(#arr-accent)"/>
      <line x1="865" y1="210" x2="879" y2="224" marker-end="url(#arr-accent)"/>
      <line x1="880" y1="225" x2="894" y2="239" marker-end="url(#arr-accent)"/>
      <line x1="895" y1="240" x2="909" y2="254" marker-end="url(#arr-accent)"/>
      <line x1="912" y1="245" x2="926" y2="259" marker-end="url(#arr-accent)"/>
      <line x1="927" y1="260" x2="941" y2="274" marker-end="url(#arr-accent)"/>
      <line x1="942" y1="275" x2="956" y2="289" marker-end="url(#arr-accent)"/>
    </g>

    <!-- Axis labels (minimal) -->
    <text x="740" y="390" font-family="Inter, sans-serif" font-size="9" fill="#525252">UMAP 1</text>
    <text x="735" y="110" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#525252">UMAP 2</text>

    <!-- Cell type labels -->
    <text x="788" y="112" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309" font-weight="600">immature</text>
    <text x="860" y="240" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a" font-weight="600">transitional</text>
    <text x="960" y="330" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#2d7a3e" font-weight="600">mature</text>

    <text x="885" y="400" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">arrows project per-cell velocity into 2D</text>
  </g>
</svg>
