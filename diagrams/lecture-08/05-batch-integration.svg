<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-labelledby="t d">
  <title id="t">Batch effect before and after integration</title>
  <desc id="d">Two side-by-side UMAPs of the same underlying data. Left panel: cells coloured by batch — two lobes where batch-1 cells form three clusters on one side and batch-2 cells form three parallel clusters on the other; batches dominate over biology. Right panel: same cells after integration, coloured by cell type — three mixed clusters with cells from both batches intermingled within each one. An arrow between the panels labels the integration step.</desc>

  <defs>
    <marker id="arr-cobalt" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <text x="500" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">BATCH INTEGRATION · THE CORE SCRNA-SEQ NUISANCE PROBLEM</text>

  <!-- ── Panel A: Before integration ── -->
  <g>
    <rect x="30" y="50" width="420" height="330" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="240" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">(a) naive concatenation · cells coloured by batch</text>

    <!-- Batch 1 lobe: 3 clusters on the left side -->
    <!-- batch 1: cobalt, shape = circle -->
    <g fill="#1e3a8a" opacity="0.8">
      <!-- cluster 1 (top) -->
      <circle cx="95" cy="130" r="3.5"/><circle cx="105" cy="138" r="3.5"/><circle cx="115" cy="128" r="3.5"/>
      <circle cx="110" cy="145" r="3.5"/><circle cx="125" cy="140" r="3.5"/><circle cx="90" cy="148" r="3.5"/>
      <circle cx="120" cy="152" r="3.5"/><circle cx="100" cy="158" r="3.5"/><circle cx="130" cy="135" r="3.5"/>
      <!-- cluster 2 (middle) -->
      <circle cx="85" cy="215" r="3.5"/><circle cx="95" cy="220" r="3.5"/><circle cx="105" cy="210" r="3.5"/>
      <circle cx="115" cy="218" r="3.5"/><circle cx="100" cy="230" r="3.5"/><circle cx="120" cy="230" r="3.5"/>
      <circle cx="90" cy="238" r="3.5"/><circle cx="110" cy="238" r="3.5"/><circle cx="130" cy="220" r="3.5"/>
      <!-- cluster 3 (bottom) -->
      <circle cx="95" cy="305" r="3.5"/><circle cx="110" cy="300" r="3.5"/><circle cx="120" cy="310" r="3.5"/>
      <circle cx="105" cy="318" r="3.5"/><circle cx="125" cy="320" r="3.5"/><circle cx="90" cy="322" r="3.5"/>
      <circle cx="115" cy="328" r="3.5"/><circle cx="100" cy="335" r="3.5"/><circle cx="130" cy="333" r="3.5"/>
    </g>

    <!-- Batch 2: amber, shape = square -->
    <g fill="#b45309" opacity="0.85">
      <!-- cluster 1 (top right) -->
      <rect x="323" y="128" width="6" height="6"/><rect x="338" y="136" width="6" height="6"/>
      <rect x="353" y="126" width="6" height="6"/><rect x="348" y="143" width="6" height="6"/>
      <rect x="368" y="138" width="6" height="6"/><rect x="333" y="146" width="6" height="6"/>
      <rect x="358" y="150" width="6" height="6"/><rect x="343" y="156" width="6" height="6"/>
      <rect x="373" y="133" width="6" height="6"/>
      <!-- cluster 2 -->
      <rect x="313" y="213" width="6" height="6"/><rect x="328" y="218" width="6" height="6"/>
      <rect x="343" y="208" width="6" height="6"/><rect x="358" y="216" width="6" height="6"/>
      <rect x="333" y="228" width="6" height="6"/><rect x="358" y="228" width="6" height="6"/>
      <rect x="323" y="236" width="6" height="6"/><rect x="348" y="236" width="6" height="6"/>
      <rect x="373" y="218" width="6" height="6"/>
      <!-- cluster 3 -->
      <rect x="323" y="303" width="6" height="6"/><rect x="343" y="298" width="6" height="6"/>
      <rect x="358" y="308" width="6" height="6"/><rect x="338" y="316" width="6" height="6"/>
      <rect x="368" y="318" width="6" height="6"/><rect x="313" y="320" width="6" height="6"/>
      <rect x="353" y="326" width="6" height="6"/><rect x="328" y="333" width="6" height="6"/>
      <rect x="373" y="331" width="6" height="6"/>
    </g>

    <!-- Legend -->
    <g transform="translate(50 100)">
      <circle cx="7" cy="0" r="4" fill="#1e3a8a"/>
      <text x="18" y="4" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">batch 1</text>
      <rect x="77" y="-4" width="8" height="8" fill="#b45309"/>
      <text x="93" y="4" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">batch 2</text>
    </g>

    <!-- Label -->
    <text x="240" y="360" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b91c1c">clusters by batch — fail</text>
    <text x="240" y="374" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">same biology, same cell types, but batches dominate</text>
  </g>

  <!-- Arrow between panels -->
  <g>
    <line x1="465" y1="215" x2="535" y2="215" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arr-cobalt)"/>
    <text x="500" y="205" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">integration</text>
    <text x="500" y="232" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">Harmony · scVI</text>
  </g>

  <!-- ── Panel B: After integration ── -->
  <g>
    <rect x="550" y="50" width="420" height="330" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="760" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">(b) after integration · cells coloured by cell type</text>

    <!-- 3 mixed clusters -->
    <!-- Cluster A (T cell, cobalt) top -->
    <!-- mix of circles (batch 1) and squares (batch 2) -->
    <!-- Cluster A (at center-left-ish) -->
    <g fill="#c4342c">
      <circle cx="635" cy="140" r="3.5" opacity="0.85"/>
      <rect x="645" y="137" width="7" height="7" opacity="0.85"/>
      <circle cx="660" cy="135" r="3.5" opacity="0.85"/>
      <rect x="670" y="145" width="7" height="7" opacity="0.85"/>
      <circle cx="655" cy="150" r="3.5" opacity="0.85"/>
      <rect x="625" y="155" width="7" height="7" opacity="0.85"/>
      <circle cx="640" cy="160" r="3.5" opacity="0.85"/>
      <rect x="660" y="162" width="7" height="7" opacity="0.85"/>
      <circle cx="680" cy="155" r="3.5" opacity="0.85"/>
      <rect x="645" y="170" width="7" height="7" opacity="0.85"/>
      <circle cx="670" cy="172" r="3.5" opacity="0.85"/>
      <rect x="685" y="165" width="7" height="7" opacity="0.85"/>
      <circle cx="655" cy="130" r="3.5" opacity="0.85"/>
      <rect x="670" y="128" width="7" height="7" opacity="0.85"/>
      <circle cx="685" cy="140" r="3.5" opacity="0.85"/>
      <rect x="635" y="128" width="7" height="7" opacity="0.85"/>
      <circle cx="630" cy="148" r="3.5" opacity="0.85"/>
      <rect x="680" y="175" width="7" height="7" opacity="0.85"/>
    </g>
    <text x="720" y="152" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#c4342c">B cells</text>

    <!-- Cluster B (CD4 T, cobalt) middle -->
    <g fill="#1e3a8a">
      <circle cx="810" cy="215" r="3.5" opacity="0.85"/>
      <rect x="820" y="212" width="7" height="7" opacity="0.85"/>
      <circle cx="835" cy="210" r="3.5" opacity="0.85"/>
      <rect x="845" y="220" width="7" height="7" opacity="0.85"/>
      <circle cx="830" cy="225" r="3.5" opacity="0.85"/>
      <rect x="800" y="230" width="7" height="7" opacity="0.85"/>
      <circle cx="815" cy="235" r="3.5" opacity="0.85"/>
      <rect x="835" y="237" width="7" height="7" opacity="0.85"/>
      <circle cx="855" cy="230" r="3.5" opacity="0.85"/>
      <rect x="820" y="245" width="7" height="7" opacity="0.85"/>
      <circle cx="845" cy="247" r="3.5" opacity="0.85"/>
      <rect x="860" y="240" width="7" height="7" opacity="0.85"/>
      <circle cx="830" cy="205" r="3.5" opacity="0.85"/>
      <rect x="845" y="203" width="7" height="7" opacity="0.85"/>
      <circle cx="860" cy="215" r="3.5" opacity="0.85"/>
      <rect x="810" y="203" width="7" height="7" opacity="0.85"/>
      <circle cx="805" cy="223" r="3.5" opacity="0.85"/>
      <rect x="855" y="250" width="7" height="7" opacity="0.85"/>
    </g>
    <text x="895" y="232" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">T cells</text>

    <!-- Cluster C (Mono, amber) bottom -->
    <g fill="#b45309">
      <circle cx="635" cy="295" r="3.5" opacity="0.85"/>
      <rect x="645" y="292" width="7" height="7" opacity="0.85"/>
      <circle cx="660" cy="290" r="3.5" opacity="0.85"/>
      <rect x="670" y="300" width="7" height="7" opacity="0.85"/>
      <circle cx="655" cy="305" r="3.5" opacity="0.85"/>
      <rect x="625" y="310" width="7" height="7" opacity="0.85"/>
      <circle cx="640" cy="315" r="3.5" opacity="0.85"/>
      <rect x="660" y="317" width="7" height="7" opacity="0.85"/>
      <circle cx="680" cy="310" r="3.5" opacity="0.85"/>
      <rect x="645" y="325" width="7" height="7" opacity="0.85"/>
      <circle cx="670" cy="327" r="3.5" opacity="0.85"/>
      <rect x="685" y="320" width="7" height="7" opacity="0.85"/>
      <circle cx="655" cy="285" r="3.5" opacity="0.85"/>
      <rect x="670" y="283" width="7" height="7" opacity="0.85"/>
      <circle cx="685" cy="295" r="3.5" opacity="0.85"/>
      <rect x="635" y="283" width="7" height="7" opacity="0.85"/>
      <circle cx="630" cy="303" r="3.5" opacity="0.85"/>
      <rect x="680" y="330" width="7" height="7" opacity="0.85"/>
    </g>
    <text x="720" y="305" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b45309">monocytes</text>

    <!-- Small batch legend -->
    <g transform="translate(570 100)">
      <circle cx="7" cy="0" r="4" fill="#525252"/>
      <text x="18" y="4" font-family="Inter, sans-serif" font-size="10" fill="#525252">batch 1</text>
      <rect x="77" y="-4" width="8" height="8" fill="#525252"/>
      <text x="93" y="4" font-family="Inter, sans-serif" font-size="10" fill="#525252">batch 2</text>
    </g>

    <!-- Label -->
    <text x="760" y="360" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#15803d">clusters by biology — success</text>
    <text x="760" y="374" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">batch labels sprinkled within each cell-type cluster</text>
  </g>

  <!-- Bottom caption -->
  <text x="500" y="410" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">Integration is supervised source separation: shared biology vs batch-specific nuisance, with batch labels observed.</text>
  <text x="500" y="428" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#8a8a85">The knob: preserve real biological differences while mixing out technical ones. Over-correct and subtle biology disappears.</text>
</svg>
