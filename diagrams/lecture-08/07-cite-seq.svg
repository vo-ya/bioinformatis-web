    <path d="M 60 290 Q 60 282, 75 282 L 885 282 Q 900 282, 900 290" fill="none" stroke="#525252" stroke-width="1.5"/>
    <text x="480" y="276" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252">same cells, two modalities</text>

