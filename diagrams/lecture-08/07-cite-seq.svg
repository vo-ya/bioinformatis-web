<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" role="img" aria-labelledby="t d">
  <title id="t">CITE-seq schematic and joint matrices</title>
  <desc id="d">Top band: a cell cross-section with mRNAs in the cytoplasm and Y-shaped antibodies bound to surface proteins, each antibody tagged with a DNA barcode; an arrow indicates capture into a 10x droplet. Bottom band: two side-by-side matrices over the same cell rows — an RNA matrix (cells by genes, about 20 thousand columns) on the left and a protein matrix (cells by antibodies, about 100 columns) on the right — with a brace labeling them as 'same cells, two modalities'.</desc>

  <defs>
    <marker id="arrow-c" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <text x="480" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">CITE-seq · RNA + SURFACE PROTEIN FROM THE SAME CELL</text>

  <!-- ── Top band: cell + antibody chemistry ── -->
  <g>
    <text x="60" y="56" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">1. Antibody-tag labeling before droplet capture</text>

    <!-- Cell (circle cross-section) -->
    <ellipse cx="230" cy="140" rx="90" ry="70" fill="#f6f4ee" stroke="#525252" stroke-width="2"/>

    <!-- Surface proteins (small dots on membrane) -->
    <g fill="#0d7377">
      <circle cx="163" cy="115" r="3"/><circle cx="150" cy="135" r="3"/>
      <circle cx="155" cy="160" r="3"/><circle cx="175" cy="195" r="3"/>
      <circle cx="215" cy="210" r="3"/><circle cx="260" cy="205" r="3"/>
      <circle cx="295" cy="190" r="3"/><circle cx="310" cy="160" r="3"/>
      <circle cx="310" cy="128" r="3"/><circle cx="295" cy="100" r="3"/>
      <circle cx="260" cy="80" r="3"/><circle cx="215" cy="78" r="3"/>
      <circle cx="180" cy="88" r="3"/>
    </g>

    <!-- Antibodies (Y shapes) with DNA tags -->
    <g stroke="#1e3a8a" stroke-width="1.5" fill="none">
      <!-- antibody 1 (top-left) -->
      <line x1="163" y1="115" x2="163" y2="90"/>
      <line x1="163" y1="90" x2="155" y2="82"/>
      <line x1="163" y1="90" x2="171" y2="82"/>
      <!-- antibody 2 -->
      <line x1="150" y1="135" x2="130" y2="130"/>
      <line x1="130" y1="130" x2="122" y2="122"/>
      <line x1="130" y1="130" x2="122" y2="138"/>
      <!-- antibody 3 -->
      <line x1="215" y1="78" x2="215" y2="50"/>
      <line x1="215" y1="50" x2="207" y2="42"/>
      <line x1="215" y1="50" x2="223" y2="42"/>
      <!-- antibody 4 -->
      <line x1="260" y1="80" x2="260" y2="50"/>
      <line x1="260" y1="50" x2="252" y2="42"/>
      <line x1="260" y1="50" x2="268" y2="42"/>
      <!-- antibody 5 -->
      <line x1="310" y1="128" x2="335" y2="125"/>
      <line x1="335" y1="125" x2="343" y2="117"/>
      <line x1="335" y1="125" x2="343" y2="133"/>
    </g>

    <!-- DNA barcode tags attached to each antibody -->
    <g font-family="JetBrains Mono, monospace" font-size="7" fill="#0a0a0a">
      <rect x="153" y="72" width="20" height="10" fill="#c4342c" stroke="#0a0a0a" stroke-width="0.5"/>
      <text x="163" y="80" text-anchor="middle" fill="#ffffff">T1</text>
      <rect x="112" y="115" width="20" height="10" fill="#b45309" stroke="#0a0a0a" stroke-width="0.5"/>
      <text x="122" y="123" text-anchor="middle" fill="#ffffff">T2</text>
      <rect x="205" y="32" width="20" height="10" fill="#7c3aed" stroke="#0a0a0a" stroke-width="0.5"/>
      <text x="215" y="40" text-anchor="middle" fill="#ffffff">T3</text>
      <rect x="250" y="32" width="20" height="10" fill="#2d7a3e" stroke="#0a0a0a" stroke-width="0.5"/>
      <text x="260" y="40" text-anchor="middle" fill="#ffffff">T4</text>
      <rect x="335" y="110" width="20" height="10" fill="#ec4899" stroke="#0a0a0a" stroke-width="0.5"/>
      <text x="345" y="118" text-anchor="middle" fill="#ffffff">T5</text>
    </g>

    <!-- mRNAs inside cytoplasm (squiggles) -->
    <g stroke="#c4342c" stroke-width="1.5" fill="none">
      <path d="M 190 130 q 5 -4, 10 0 t 10 0 t 10 0"/>
      <path d="M 205 150 q 5 -4, 10 0 t 10 0 t 10 0"/>
      <path d="M 225 170 q 5 -4, 10 0 t 10 0"/>
      <path d="M 180 170 q 5 -4, 10 0 t 10 0"/>
      <path d="M 245 130 q 5 -4, 10 0 t 10 0"/>
      <path d="M 235 155 q 5 -4, 10 0 t 10 0"/>
      <path d="M 265 150 q 5 -4, 10 0"/>
      <path d="M 255 175 q 5 -4, 10 0"/>
    </g>
    <text x="230" y="230" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">mRNAs + tagged antibodies captured together</text>

    <!-- Arrow to droplet capture -->
    <line x1="350" y1="140" x2="430" y2="140" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arrow-c)"/>
    <text x="390" y="130" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">10x droplet</text>
    <text x="390" y="156" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">+ reverse transcription</text>

    <!-- Small droplet illustration -->
    <circle cx="490" cy="140" r="45" fill="#eef2ff" stroke="#1e3a8a" stroke-width="2"/>
    <!-- Inside the droplet: mix of mRNA + tag -->
    <g stroke="#c4342c" stroke-width="1" fill="none">
      <path d="M 472 130 q 3 -2, 6 0 t 6 0"/>
      <path d="M 476 150 q 3 -2, 6 0 t 6 0"/>
      <path d="M 496 125 q 3 -2, 6 0"/>
      <path d="M 500 145 q 3 -2, 6 0"/>
    </g>
    <g font-family="JetBrains Mono, monospace" font-size="6" fill="#ffffff">
      <rect x="470" y="158" width="14" height="7" fill="#c4342c"/>
      <text x="477" y="164" text-anchor="middle">T1</text>
      <rect x="488" y="158" width="14" height="7" fill="#7c3aed"/>
      <text x="495" y="164" text-anchor="middle">T3</text>
      <rect x="506" y="158" width="14" height="7" fill="#2d7a3e"/>
      <text x="513" y="164" text-anchor="middle">T4</text>
    </g>

    <!-- Arrow to "sequencing produces two count streams" -->
    <line x1="540" y1="140" x2="630" y2="140" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arrow-c)"/>
    <text x="585" y="130" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">sequence</text>

    <!-- Two matrices as icons (mini) to preview band 2 -->
    <g transform="translate(640 80)">
      <rect x="0" y="0" width="100" height="60" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
      <text x="50" y="34" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">RNA counts</text>
      <text x="50" y="48" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">cells × 20k</text>
    </g>
    <g transform="translate(640 150)">
      <rect x="0" y="0" width="100" height="60" fill="#f3e8ff" stroke="#7c3aed" stroke-width="0.8"/>
      <text x="50" y="34" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#7c3aed">protein counts</text>
      <text x="50" y="48" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">cells × 100</text>
    </g>

    <!-- Right-side arrow bracket pointing to the matrices -->
    <path d="M 760 110 L 780 110 L 780 180 L 760 180" fill="none" stroke="#8a8a85" stroke-width="1"/>
    <text x="795" y="148" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">same cells</text>
  </g>

  <!-- ── Bottom band: two matrices in detail ── -->
