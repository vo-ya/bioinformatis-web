<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 480" role="img" aria-labelledby="t d">
  <title id="t">Spatial platforms — Visium vs MERFISH vs Xenium</title>
  <desc id="d">Three side-by-side schematics plus a comparison table. Panel (a) Visium: a tissue square with a grid of 55 micron capture spots, each shown as containing multiple cells. Panel (b) MERFISH: individual cells resolved with fluorescent-probe signals imaged at sub-cellular resolution. Panel (c) Xenium: a similar imaging-based platform with a commercial-instrument icon. Below, a table compares resolution, panel size, and throughput across the three.</desc>

  <text x="540" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">SPATIAL TRANSCRIPTOMICS · THREE PLATFORMS · RESOLUTION vs COVERAGE TRADE</text>

  <!-- ── Panel A: Visium ── -->
  <g>
    <rect x="30" y="50" width="330" height="260" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="195" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">(a) Visium · sequencing-based</text>

    <!-- Tissue background -->
    <rect x="60" y="90" width="270" height="160" fill="#f6f4ee" stroke="#c4c1b6" stroke-width="0.8"/>

    <!-- 5×5 spot grid (some partially off-tissue) -->
    <g fill="#1e3a8a" fill-opacity="0.18" stroke="#1e3a8a" stroke-width="0.8">
      <circle cx="100" cy="125" r="16"/><circle cx="150" cy="125" r="16"/>
      <circle cx="200" cy="125" r="16"/><circle cx="250" cy="125" r="16"/>
      <circle cx="300" cy="125" r="16"/>
      <circle cx="100" cy="170" r="16"/><circle cx="150" cy="170" r="16"/>
      <circle cx="200" cy="170" r="16"/><circle cx="250" cy="170" r="16"/>
      <circle cx="300" cy="170" r="16"/>
      <circle cx="100" cy="215" r="16"/><circle cx="150" cy="215" r="16"/>
      <circle cx="200" cy="215" r="16"/><circle cx="250" cy="215" r="16"/>
      <circle cx="300" cy="215" r="16"/>
    </g>

    <!-- Cells beneath spots (several small dots per spot region) -->
    <g fill="#c4342c" opacity="0.7">
      <circle cx="95" cy="120" r="1.5"/><circle cx="105" cy="130" r="1.5"/>
      <circle cx="100" cy="128" r="1.5"/>
    </g>
    <g fill="#1e3a8a" opacity="0.7">
      <circle cx="145" cy="120" r="1.5"/><circle cx="155" cy="130" r="1.5"/>
      <circle cx="150" cy="122" r="1.5"/>
    </g>
    <g fill="#b45309" opacity="0.7">
      <circle cx="195" cy="120" r="1.5"/><circle cx="205" cy="130" r="1.5"/>
      <circle cx="200" cy="125" r="1.5"/>
    </g>
    <!-- A few more dots scattered on other spots -->
    <g fill="#c4342c" opacity="0.7"><circle cx="246" cy="170" r="1.5"/><circle cx="250" cy="175" r="1.5"/></g>
    <g fill="#1e3a8a" opacity="0.7"><circle cx="294" cy="215" r="1.5"/><circle cx="306" cy="213" r="1.5"/></g>
    <g fill="#b45309" opacity="0.7"><circle cx="100" cy="210" r="1.5"/><circle cx="103" cy="220" r="1.5"/></g>

    <!-- Enlarged spot callout -->
    <circle cx="280" cy="290" r="26" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <g fill="#c4342c"><circle cx="270" cy="285" r="2.5"/><circle cx="280" cy="295" r="2.5"/></g>
    <g fill="#1e3a8a"><circle cx="290" cy="288" r="2.5"/><circle cx="275" cy="295" r="2.5"/></g>
    <g fill="#b45309"><circle cx="285" cy="282" r="2.5"/><circle cx="290" cy="298" r="2.5"/></g>
    <text x="230" y="288" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">~5–20 cells</text>
    <text x="230" y="300" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">per 55 µm spot</text>

    <text x="100" y="270" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">55 µm capture spots · 100 µm pitch</text>
  </g>

  <!-- ── Panel B: MERFISH ── -->
  <g>
    <rect x="375" y="50" width="330" height="260" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="540" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">(b) MERFISH · imaging-based</text>

    <rect x="405" y="90" width="270" height="160" fill="#f6f4ee" stroke="#c4c1b6" stroke-width="0.8"/>

    <!-- Individual cells resolved (circles with membranes) -->
    <g stroke="#8a8a85" stroke-width="0.8" fill="#f6f4ee">
      <circle cx="430" cy="110" r="10"/><circle cx="460" cy="110" r="10"/><circle cx="490" cy="110" r="10"/>
      <circle cx="520" cy="110" r="10"/><circle cx="550" cy="110" r="10"/><circle cx="580" cy="110" r="10"/>
      <circle cx="610" cy="110" r="10"/><circle cx="640" cy="110" r="10"/>
      <circle cx="430" cy="140" r="10"/><circle cx="460" cy="140" r="10"/><circle cx="490" cy="140" r="10"/>
      <circle cx="520" cy="140" r="10"/><circle cx="550" cy="140" r="10"/><circle cx="580" cy="140" r="10"/>
      <circle cx="610" cy="140" r="10"/><circle cx="640" cy="140" r="10"/>
      <circle cx="430" cy="170" r="10"/><circle cx="460" cy="170" r="10"/><circle cx="490" cy="170" r="10"/>
      <circle cx="520" cy="170" r="10"/><circle cx="550" cy="170" r="10"/><circle cx="580" cy="170" r="10"/>
      <circle cx="610" cy="170" r="10"/><circle cx="640" cy="170" r="10"/>
      <circle cx="430" cy="200" r="10"/><circle cx="460" cy="200" r="10"/><circle cx="490" cy="200" r="10"/>
      <circle cx="520" cy="200" r="10"/><circle cx="550" cy="200" r="10"/><circle cx="580" cy="200" r="10"/>
      <circle cx="610" cy="200" r="10"/><circle cx="640" cy="200" r="10"/>
      <circle cx="430" cy="230" r="10"/><circle cx="460" cy="230" r="10"/><circle cx="490" cy="230" r="10"/>
      <circle cx="520" cy="230" r="10"/><circle cx="550" cy="230" r="10"/><circle cx="580" cy="230" r="10"/>
      <circle cx="610" cy="230" r="10"/><circle cx="640" cy="230" r="10"/>
    </g>

    <!-- Probe signals (tiny colored dots scattered inside cells) -->
    <g fill="#c4342c"><circle cx="430" cy="108" r="1.5"/><circle cx="428" cy="113" r="1.5"/><circle cx="460" cy="140" r="1.5"/><circle cx="490" cy="168" r="1.5"/><circle cx="550" cy="201" r="1.5"/><circle cx="610" cy="110" r="1.5"/><circle cx="640" cy="170" r="1.5"/></g>
    <g fill="#1e3a8a"><circle cx="460" cy="108" r="1.5"/><circle cx="520" cy="109" r="1.5"/><circle cx="580" cy="141" r="1.5"/><circle cx="520" cy="171" r="1.5"/><circle cx="430" cy="198" r="1.5"/><circle cx="490" cy="231" r="1.5"/></g>
    <g fill="#b45309"><circle cx="490" cy="109" r="1.5"/><circle cx="548" cy="142" r="1.5"/><circle cx="608" cy="141" r="1.5"/><circle cx="580" cy="198" r="1.5"/><circle cx="640" cy="228" r="1.5"/></g>
    <g fill="#2d7a3e"><circle cx="520" cy="141" r="1.5"/><circle cx="430" cy="168" r="1.5"/><circle cx="550" cy="171" r="1.5"/><circle cx="610" cy="200" r="1.5"/><circle cx="460" cy="230" r="1.5"/></g>

    <text x="540" y="273" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">cells resolved · ~300-gene panel · multi-round FISH</text>
    <text x="540" y="290" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" font-style="italic">each coloured dot = a detected mRNA from a specific gene</text>
  </g>

  <!-- ── Panel C: Xenium ── -->
  <g>
    <rect x="720" y="50" width="330" height="260" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="885" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">(c) Xenium · imaging, commercial</text>

    <rect x="750" y="90" width="270" height="160" fill="#f6f4ee" stroke="#c4c1b6" stroke-width="0.8"/>
    <!-- Cells (same as MERFISH but blue-tinted dots to look distinct) -->
    <g stroke="#8a8a85" stroke-width="0.8" fill="#f6f4ee">
      <circle cx="775" cy="110" r="10"/><circle cx="805" cy="110" r="10"/><circle cx="835" cy="110" r="10"/>
      <circle cx="865" cy="110" r="10"/><circle cx="895" cy="110" r="10"/><circle cx="925" cy="110" r="10"/>
      <circle cx="955" cy="110" r="10"/><circle cx="985" cy="110" r="10"/>
      <circle cx="775" cy="140" r="10"/><circle cx="805" cy="140" r="10"/><circle cx="835" cy="140" r="10"/>
      <circle cx="865" cy="140" r="10"/><circle cx="895" cy="140" r="10"/><circle cx="925" cy="140" r="10"/>
      <circle cx="955" cy="140" r="10"/><circle cx="985" cy="140" r="10"/>
      <circle cx="775" cy="170" r="10"/><circle cx="805" cy="170" r="10"/><circle cx="835" cy="170" r="10"/>
      <circle cx="865" cy="170" r="10"/><circle cx="895" cy="170" r="10"/><circle cx="925" cy="170" r="10"/>
      <circle cx="955" cy="170" r="10"/><circle cx="985" cy="170" r="10"/>
      <circle cx="775" cy="200" r="10"/><circle cx="805" cy="200" r="10"/><circle cx="835" cy="200" r="10"/>
      <circle cx="865" cy="200" r="10"/><circle cx="895" cy="200" r="10"/><circle cx="925" cy="200" r="10"/>
      <circle cx="955" cy="200" r="10"/><circle cx="985" cy="200" r="10"/>
      <circle cx="775" cy="230" r="10"/><circle cx="805" cy="230" r="10"/><circle cx="835" cy="230" r="10"/>
      <circle cx="865" cy="230" r="10"/><circle cx="895" cy="230" r="10"/><circle cx="925" cy="230" r="10"/>
      <circle cx="955" cy="230" r="10"/><circle cx="985" cy="230" r="10"/>
    </g>

    <g fill="#c4342c"><circle cx="775" cy="108" r="1.5"/><circle cx="835" cy="140" r="1.5"/><circle cx="895" cy="171" r="1.5"/><circle cx="985" cy="200" r="1.5"/></g>
    <g fill="#1e3a8a"><circle cx="805" cy="112" r="1.5"/><circle cx="865" cy="138" r="1.5"/><circle cx="925" cy="172" r="1.5"/><circle cx="775" cy="230" r="1.5"/></g>
    <g fill="#b45309"><circle cx="835" cy="110" r="1.5"/><circle cx="925" cy="141" r="1.5"/><circle cx="955" cy="172" r="1.5"/><circle cx="865" cy="231" r="1.5"/></g>
    <g fill="#2d7a3e"><circle cx="895" cy="112" r="1.5"/><circle cx="805" cy="170" r="1.5"/><circle cx="985" cy="141" r="1.5"/><circle cx="925" cy="200" r="1.5"/></g>

    <!-- Commercial instrument icon (small box) -->
    <g transform="translate(750 265)">
      <rect x="0" y="0" width="80" height="30" rx="3" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
      <text x="40" y="12" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#1e3a8a">Xenium</text>
      <text x="40" y="24" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#1e3a8a">automated instrument</text>
    </g>
    <text x="840" y="280" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">~400-gene panel · commercial workflow</text>
  </g>

  <!-- Comparison table -->
  <g transform="translate(30 340)">
    <rect x="0" y="0" width="1020" height="130" rx="6" fill="#ffffff" stroke="#c4c1b6"/>

    <!-- Header row -->
    <rect x="0" y="0" width="1020" height="28" fill="#eef2ff"/>
    <g font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">
      <text x="20" y="18">Platform</text>
      <text x="260" y="18">Resolution</text>
      <text x="520" y="18">Panel size</text>
      <text x="780" y="18">Throughput</text>
    </g>

    <!-- Row dividers -->
    <line x1="0" y1="28" x2="1020" y2="28" stroke="#c4c1b6" stroke-width="0.5"/>
    <line x1="0" y1="62" x2="1020" y2="62" stroke="#e5e3dc" stroke-width="0.5"/>
    <line x1="0" y1="96" x2="1020" y2="96" stroke="#e5e3dc" stroke-width="0.5"/>

    <!-- Rows -->
    <g font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">
      <text x="20" y="48" font-weight="600">Visium</text>
      <text x="260" y="48">spot (55 µm, ~5–20 cells per spot)</text>
      <text x="520" y="48">whole transcriptome (~20,000)</text>
      <text x="780" y="48">~5 000 spots / slide</text>

      <text x="20" y="82" font-weight="600">MERFISH</text>
      <text x="260" y="82">sub-cellular</text>
      <text x="520" y="82">100–500 gene panel</text>
      <text x="780" y="82">~500 000 cells / slide</text>

      <text x="20" y="116" font-weight="600">Xenium</text>
      <text x="260" y="116">sub-cellular</text>
      <text x="520" y="116">~400 gene panel</text>
      <text x="780" y="116">comparable to MERFISH, automated</text>
    </g>
  </g>
</svg>
