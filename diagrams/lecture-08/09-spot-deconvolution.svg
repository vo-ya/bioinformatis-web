<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" role="img" aria-labelledby="t d">
  <title id="t">Visium spot deconvolution</title>
  <desc id="d">Left panel: a Visium spot drawn as a dashed circle containing five cells of three types (T cell cobalt, B cell red, macrophage amber); below the spot an observed-count bar represents the aggregate signal. Right panel: a bar chart of inferred cell-type proportions per spot (40 percent T, 40 percent B, 20 percent macrophage, others near zero), with ground-truth ticks overlaid. An equation between panels shows the mixture model with non-negativity and sum-to-one constraints.</desc>

  <text x="480" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">VISIUM SPOT DECONVOLUTION · MIXED-PIXEL UNMIXING</text>

  <!-- ── Left panel: mixed-pixel spot ── -->
  <g>
    <rect x="30" y="50" width="380" height="360" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="220" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">(a) one Visium spot · 5 cells of 3 types</text>

    <!-- Visium spot (dashed circle) -->
    <circle cx="220" cy="180" r="85" fill="#eef2ff" stroke="#1e3a8a" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="220" y="290" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a">55 µm capture spot</text>

    <!-- Cells inside the spot -->
    <!-- 2 T cells (cobalt) -->
    <circle cx="185" cy="155" r="15" fill="#1e3a8a" opacity="0.85"/>
    <text x="185" y="159" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#ffffff" font-weight="600">T</text>
    <circle cx="245" cy="200" r="15" fill="#1e3a8a" opacity="0.85"/>
    <text x="245" y="204" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#ffffff" font-weight="600">T</text>

    <!-- 2 B cells (red) -->
    <circle cx="255" cy="150" r="15" fill="#c4342c" opacity="0.85"/>
    <text x="255" y="154" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#ffffff" font-weight="600">B</text>
    <circle cx="190" cy="210" r="15" fill="#c4342c" opacity="0.85"/>
    <text x="190" y="214" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#ffffff" font-weight="600">B</text>

    <!-- 1 macrophage (amber) -->
    <circle cx="220" cy="180" r="15" fill="#b45309" opacity="0.85"/>
    <text x="220" y="184" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#ffffff" font-weight="600">M</text>

    <!-- True composition note -->
    <g transform="translate(55 310)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">true composition (ground truth):</text>
      <text x="0" y="18" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a">40% T cell · 40% B cell · 20% macrophage</text>
    </g>

    <!-- Observed count vector below spot -->
    <text x="55" y="358" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">observed counts x_i :</text>
    <g>
      <rect x="55" y="370" width="320" height="20" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
      <!-- Sub-segments showing the aggregate signal (internally indistinguishable) -->
      <rect x="55" y="370" width="320" height="20" fill="url(#mix-grad)"/>
      <defs>
        <linearGradient id="mix-grad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#1e3a8a" stop-opacity="0.6"/>
          <stop offset="35%" stop-color="#c4342c" stop-opacity="0.6"/>
          <stop offset="70%" stop-color="#b45309" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0.6"/>
        </linearGradient>
      </defs>
    </g>
    <text x="215" y="404" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">aggregate signal — cell identities lost in the pixel</text>
  </g>

  <!-- ── Middle: equation ── -->
  <g transform="translate(420 170)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252">deconvolve:</text>
    <text x="0" y="30" font-family="Source Serif 4, serif" font-size="18" font-style="italic" fill="#0a0a0a">x_i ≈ Σ_k w_ik · µ_k</text>
    <text x="0" y="55" font-family="Source Serif 4, serif" font-size="13" font-style="italic" fill="#525252">s.t.  w_ik ≥ 0,  Σ_k w_ik = 1</text>
    <text x="0" y="80" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a"><tspan font-weight="600">µ_k</tspan> : cell-type reference profile (from scRNA-seq)</text>
    <text x="0" y="96" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a"><tspan font-weight="600">w_ik</tspan> : proportion of spot <tspan font-style="italic">i</tspan> that is cell type <tspan font-style="italic">k</tspan></text>
    <text x="0" y="122" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" font-style="italic">constrained non-negative least squares</text>
    <text x="0" y="138" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" font-style="italic">≈ multispectral pixel unmixing</text>
  </g>

  <!-- ── Right panel: inferred proportions ── -->
  <g>
    <rect x="580" y="50" width="350" height="360" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="755" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">(b) deconvolved proportions</text>

    <!-- Axes -->
    <line x1="620" y1="340" x2="920" y2="340" stroke="#8a8a85" stroke-width="1"/>
    <line x1="620" y1="100" x2="620" y2="340" stroke="#8a8a85" stroke-width="1"/>

    <!-- Y-axis labels -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="end">
      <text x="615" y="344">0%</text>
      <text x="615" y="280">20%</text>
      <text x="615" y="220">40%</text>
      <text x="615" y="160">60%</text>
      <text x="615" y="104">80%</text>
    </g>
    <text x="600" y="225" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" transform="rotate(-90 600 225)">proportion w_ik</text>

    <!-- Bars -->
    <!-- T cell: 40% -->
    <rect x="650" y="220" width="40" height="120" fill="#1e3a8a" opacity="0.85" stroke="#0a0a0a" stroke-width="0.6"/>
    <!-- ground-truth tick at 40% -->
    <line x1="645" y1="220" x2="695" y2="220" stroke="#0a0a0a" stroke-width="2"/>
    <text x="670" y="356" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a">T cell</text>
    <text x="670" y="214" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#0a0a0a" font-weight="600">42%</text>

    <!-- B cell: 40% (slightly off) -->
    <rect x="720" y="226" width="40" height="114" fill="#c4342c" opacity="0.85" stroke="#0a0a0a" stroke-width="0.6"/>
    <line x1="715" y1="220" x2="765" y2="220" stroke="#0a0a0a" stroke-width="2"/>
    <text x="740" y="356" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#c4342c">B cell</text>
    <text x="740" y="220" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#0a0a0a" font-weight="600">38%</text>

    <!-- Macrophage: 20% -->
    <rect x="790" y="280" width="40" height="60" fill="#b45309" opacity="0.85" stroke="#0a0a0a" stroke-width="0.6"/>
    <line x1="785" y1="280" x2="835" y2="280" stroke="#0a0a0a" stroke-width="2"/>
    <text x="810" y="356" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309">Mφ</text>
    <text x="810" y="274" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#0a0a0a" font-weight="600">18%</text>

    <!-- Others: near 0 -->
    <rect x="860" y="334" width="40" height="6" fill="#8a8a85" opacity="0.6" stroke="#0a0a0a" stroke-width="0.6"/>
    <line x1="855" y1="340" x2="905" y2="340" stroke="#0a0a0a" stroke-width="2"/>
    <text x="880" y="356" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85">other</text>
    <text x="880" y="330" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#0a0a0a" font-weight="600">2%</text>

    <!-- Legend -->
    <g transform="translate(640 88)">
      <line x1="0" y1="0" x2="20" y2="0" stroke="#0a0a0a" stroke-width="2"/>
      <text x="26" y="4" font-family="Inter, sans-serif" font-size="9" fill="#525252">ground-truth tick</text>
    </g>

    <!-- Bottom caption -->
    <text x="755" y="395" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" font-style="italic">MAE across all spots ≈ 0.04 for this reference quality</text>
  </g>
</svg>
