<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-labelledby="t d">
  <title id="t">Ligand-receptor communication network</title>
  <desc id="d">A directed graph of cell-cell communication with six cell-type nodes arranged in a ring (CD4 T, CD8 T, B cell, macrophage, fibroblast, endothelial). Node size is proportional to cell count. Arrows represent ligand-receptor signalling axes: thickness is the aggregate communication score; colour is the ligand family (IFN-gamma, VEGF, CXCL/chemokine, TGF-beta). A side legend maps colours to ligand families. A bar chart below lists the top ten ligand-receptor pairs by score.</desc>

  <defs>
    <marker id="arr-ifng" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
    <marker id="arr-vegf" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
    <marker id="arr-cxcl" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d7a3e"/>
    </marker>
    <marker id="arr-tgfb" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <text x="500" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">CELL-CELL COMMUNICATION · LIGAND → RECEPTOR AXES</text>

  <!-- ── Left: directed graph ── -->
  <g>
    <rect x="30" y="50" width="580" height="340" rx="6" fill="#ffffff" stroke="#c4c1b6"/>

    <!-- Edges (drawn before nodes so they sit behind) -->
    <!-- CD4 T (top) → macrophage (bottom-right), IFNG, thick -->
    <path d="M 200 145 Q 330 200, 440 260" fill="none" stroke="#1e3a8a" stroke-width="4" marker-end="url(#arr-ifng)"/>
    <!-- CD8 T (top-right) → macrophage (bottom-right), IFNG, thick -->
    <path d="M 395 125 Q 430 180, 445 250" fill="none" stroke="#1e3a8a" stroke-width="3.5" marker-end="url(#arr-ifng)"/>
    <!-- Macrophage → endothelial, VEGF, medium -->
    <path d="M 450 290 Q 390 330, 300 325" fill="none" stroke="#b45309" stroke-width="3" marker-end="url(#arr-vegf)"/>
    <!-- Fibroblast (left) → B cell (top-left), CXCL, thin -->
    <path d="M 120 260 Q 80 200, 110 135" fill="none" stroke="#2d7a3e" stroke-width="1.8" marker-end="url(#arr-cxcl)"/>
    <!-- Fibroblast → CD4 T, CXCL, thin -->
    <path d="M 135 250 Q 165 200, 180 150" fill="none" stroke="#2d7a3e" stroke-width="1.6" marker-end="url(#arr-cxcl)"/>
    <!-- Fibroblast → endothelial, TGFB, medium -->
    <path d="M 155 300 Q 220 330, 275 325" fill="none" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arr-tgfb)"/>
    <!-- Macrophage → CD8 T, IFNG (weaker), medium -->
    <path d="M 425 245 Q 420 180, 395 135" fill="none" stroke="#1e3a8a" stroke-width="2" stroke-dasharray="3 2" marker-end="url(#arr-ifng)"/>
    <!-- Endothelial → B cell, VEGF weak -->
    <path d="M 275 305 Q 180 240, 115 140" fill="none" stroke="#b45309" stroke-width="1.5" marker-end="url(#arr-vegf)"/>

    <!-- Nodes (circles arranged roughly in a ring) -->
    <!-- B cell (top-left) -->
    <circle cx="110" cy="130" r="22" fill="#c4342c" stroke="#0a0a0a" stroke-width="1.5"/>
    <text x="110" y="135" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#ffffff">B cell</text>

    <!-- CD4 T (top) -->
    <circle cx="195" cy="130" r="24" fill="#1e3a8a" stroke="#0a0a0a" stroke-width="1.5"/>
    <text x="195" y="128" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#ffffff">CD4 T</text>
    <text x="195" y="140" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#ffffff">n=1200</text>

    <!-- CD8 T (top-right) -->
    <circle cx="390" cy="120" r="20" fill="#1e3a8a" stroke="#0a0a0a" stroke-width="1.5"/>
    <text x="390" y="118" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#ffffff">CD8 T</text>
    <text x="390" y="130" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#ffffff">n=800</text>

    <!-- Macrophage (right-middle) -->
    <circle cx="450" cy="270" r="26" fill="#b45309" stroke="#0a0a0a" stroke-width="1.5"/>
    <text x="450" y="267" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#ffffff">macro-</text>
    <text x="450" y="280" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#ffffff">phage</text>

    <!-- Endothelial (bottom) -->
    <circle cx="280" cy="320" r="22" fill="#2d7a3e" stroke="#0a0a0a" stroke-width="1.5"/>
    <text x="280" y="319" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#ffffff">endo-</text>
    <text x="280" y="331" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#ffffff">thelial</text>

    <!-- Fibroblast (left-middle) -->
    <circle cx="130" cy="280" r="22" fill="#7c3aed" stroke="#0a0a0a" stroke-width="1.5"/>
    <text x="130" y="277" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#ffffff">fibro-</text>
    <text x="130" y="289" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#ffffff">blast</text>

    <!-- Legend -->
    <g transform="translate(50 365)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#525252">Ligand family:</text>
      <line x1="85" y1="-3" x2="105" y2="-3" stroke="#1e3a8a" stroke-width="3"/>
      <text x="110" y="0" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a">IFN-γ</text>
      <line x1="155" y1="-3" x2="175" y2="-3" stroke="#b45309" stroke-width="3"/>
      <text x="180" y="0" font-family="Inter, sans-serif" font-size="9" fill="#b45309">VEGF</text>
      <line x1="225" y1="-3" x2="245" y2="-3" stroke="#2d7a3e" stroke-width="3"/>
      <text x="250" y="0" font-family="Inter, sans-serif" font-size="9" fill="#2d7a3e">CXCL</text>
      <line x1="295" y1="-3" x2="315" y2="-3" stroke="#7c3aed" stroke-width="3"/>
      <text x="320" y="0" font-family="Inter, sans-serif" font-size="9" fill="#7c3aed">TGF-β</text>

      <text x="0" y="16" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" font-style="italic">arrow thickness ∝ aggregate score · node size ∝ cell count</text>
    </g>
  </g>

  <!-- ── Right: top-10 pair table ── -->
  <g>
    <rect x="625" y="50" width="345" height="340" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="797" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">top 10 L–R pairs by score</text>

    <!-- Column headers -->
    <g font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#525252">
      <text x="640" y="100">pair (ligand → receptor)</text>
      <text x="830" y="100">sender → receiver</text>
      <text x="940" y="100" text-anchor="end">score</text>
    </g>
    <line x1="640" y1="104" x2="955" y2="104" stroke="#c4c1b6" stroke-width="0.5"/>

    <!-- Rows (10) -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#0a0a0a">
      <text x="640" y="124">IFNG → IFNGR1</text><text x="830" y="124">CD4 T → Mφ</text><text x="940" y="124" text-anchor="end" fill="#1e3a8a" font-weight="600">0.86</text>
      <text x="640" y="142">VEGFA → KDR</text><text x="830" y="142">Mφ → endo</text><text x="940" y="142" text-anchor="end" fill="#b45309" font-weight="600">0.74</text>
      <text x="640" y="160">IFNG → IFNGR2</text><text x="830" y="160">CD8 T → Mφ</text><text x="940" y="160" text-anchor="end" fill="#1e3a8a" font-weight="600">0.72</text>
      <text x="640" y="178">TGFB1 → TGFBR1</text><text x="830" y="178">fibro → endo</text><text x="940" y="178" text-anchor="end" fill="#7c3aed" font-weight="600">0.65</text>
      <text x="640" y="196">CXCL12 → CXCR4</text><text x="830" y="196">fibro → B cell</text><text x="940" y="196" text-anchor="end" fill="#2d7a3e" font-weight="600">0.58</text>
      <text x="640" y="214">CXCL13 → CXCR5</text><text x="830" y="214">fibro → CD4 T</text><text x="940" y="214" text-anchor="end" fill="#2d7a3e" font-weight="600">0.52</text>
      <text x="640" y="232">TNF → TNFRSF1A</text><text x="830" y="232">Mφ → CD8 T</text><text x="940" y="232" text-anchor="end" fill="#b91c1c" font-weight="600">0.48</text>
      <text x="640" y="250">IL6 → IL6R</text><text x="830" y="250">fibro → Mφ</text><text x="940" y="250" text-anchor="end" fill="#b91c1c" font-weight="600">0.44</text>
      <text x="640" y="268">TGFB2 → TGFBR2</text><text x="830" y="268">fibro → CD4 T</text><text x="940" y="268" text-anchor="end" fill="#7c3aed" font-weight="600">0.41</text>
      <text x="640" y="286">VEGFB → FLT1</text><text x="830" y="286">Mφ → endo</text><text x="940" y="286" text-anchor="end" fill="#b45309" font-weight="600">0.36</text>
    </g>

    <!-- Mini score bars -->
    <g>
      <rect x="640" y="312" width="258" height="8" fill="#eef2ff" stroke="#8a8a85" stroke-width="0.5"/>
      <rect x="640" y="312" width="222" height="8" fill="#1e3a8a" opacity="0.7"/>
      <text x="640" y="334" font-family="Inter, sans-serif" font-size="9" fill="#525252">top pair (IFNG → IFNGR1) : score 0.86 · permutation p &lt; 0.001</text>
    </g>

    <!-- Caveat -->
    <text x="797" y="370" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" font-style="italic">scores = co-expression proxy · not direct evidence of signalling</text>
  </g>

  <!-- Bottom caption -->
  <text x="500" y="430" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">CellChat-style network inferred from per-cell-type ligand and receptor expression across a curated L–R database.</text>
</svg>
