<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 500" role="img" aria-labelledby="t d">
  <title id="t">What ChIP-seq and ATAC-seq measure</title>
  <desc id="d">Two-panel comparison. Left: ChIP-seq — crosslinked chromatin pulled down by an antibody specific to a TF or histone mark; surviving fragments sequenced, producing sharp narrow coverage at bound sites. Right: ATAC-seq — Tn5 transposase inserting adapters into open chromatin; reads pile up at accessible regions. Bottom band: a shared cartoon genomic region with nucleosomes, TF binding sites, and open stretches, aligned to both coverage tracks so the reader can see ChIP spiking at TF positions while ATAC spikes in the open regions and falls within nucleosome-protected DNA.</desc>

  <defs>
    <marker id="arr-cobalt" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <text x="540" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">ChIP-seq vs ATAC-seq · COMPLEMENTARY REGULATORY ASSAYS</text>

  <!-- ── LEFT PANEL: ChIP-seq ── -->
  <g>
    <rect x="30" y="50" width="500" height="180" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="280" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">ChIP-seq · targeted pulldown</text>

    <!-- Step icons in a row -->
    <g transform="translate(50 90)">
      <!-- Step 1: crosslinked chromatin -->
      <rect x="0" y="0" width="75" height="65" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
      <path d="M 10 35 q 10 -10, 20 0 t 20 0 t 20 0" fill="none" stroke="#525252" stroke-width="1.2"/>
      <rect x="25" y="15" width="8" height="8" fill="#c4342c"/>
      <rect x="48" y="20" width="8" height="8" fill="#c4342c"/>
      <text x="37" y="58" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">+ HCHO</text>

      <line x1="80" y1="32" x2="98" y2="32" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-cobalt)"/>

      <!-- Step 2: sonicated -->
      <rect x="105" y="0" width="75" height="65" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
      <line x1="115" y1="20" x2="135" y2="20" stroke="#525252" stroke-width="1.4"/>
      <line x1="140" y1="30" x2="165" y2="30" stroke="#525252" stroke-width="1.4"/>
      <line x1="120" y1="40" x2="150" y2="40" stroke="#525252" stroke-width="1.4"/>
      <rect x="125" y="17" width="6" height="6" fill="#c4342c"/>
      <rect x="148" y="28" width="6" height="6" fill="#c4342c"/>
      <rect x="133" y="38" width="6" height="6" fill="#c4342c"/>
      <text x="142" y="58" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">sonicate</text>

      <line x1="185" y1="32" x2="203" y2="32" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-cobalt)"/>

      <!-- Step 3: IP with antibody -->
      <rect x="210" y="0" width="75" height="65" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
      <g stroke="#b45309" stroke-width="1.5" fill="none">
        <line x1="230" y1="40" x2="230" y2="22"/>
        <line x1="230" y1="22" x2="222" y2="15"/>
        <line x1="230" y1="22" x2="238" y2="15"/>
      </g>
      <rect x="226" y="36" width="8" height="8" fill="#c4342c"/>
      <!-- discarded non-TF fragments -->
      <line x1="255" y1="20" x2="270" y2="20" stroke="#c4c1b6" stroke-width="1" stroke-dasharray="2 2"/>
      <line x1="258" y1="30" x2="272" y2="30" stroke="#c4c1b6" stroke-width="1" stroke-dasharray="2 2"/>
      <text x="247" y="58" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">antibody IP</text>

      <line x1="290" y1="32" x2="308" y2="32" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-cobalt)"/>

      <!-- Step 4: sequence -->
      <rect x="315" y="0" width="75" height="65" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
      <g fill="#1e3a8a">
        <rect x="325" y="20" width="20" height="2"/>
        <rect x="328" y="27" width="22" height="2"/>
        <rect x="322" y="34" width="18" height="2"/>
        <rect x="330" y="41" width="22" height="2"/>
        <rect x="355" y="23" width="20" height="2"/>
        <rect x="352" y="30" width="22" height="2"/>
        <rect x="358" y="37" width="20" height="2"/>
        <rect x="353" y="44" width="22" height="2"/>
      </g>
      <text x="352" y="58" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">sequence</text>

      <line x1="395" y1="32" x2="413" y2="32" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-cobalt)"/>

      <!-- Output pile-up -->
      <rect x="420" y="0" width="60" height="65" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
      <g fill="#1e3a8a">
        <rect x="444" y="40" width="4" height="20"/>
        <rect x="448" y="30" width="4" height="30"/>
        <rect x="452" y="18" width="4" height="42"/>
        <rect x="456" y="28" width="4" height="32"/>
        <rect x="460" y="40" width="4" height="20"/>
      </g>
      <text x="450" y="12" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#1e3a8a">pile-up</text>
    </g>

    <text x="280" y="215" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">"where does this protein bind?" — one target, one antibody</text>
  </g>

  <!-- ── RIGHT PANEL: ATAC-seq ── -->
  <g>
    <rect x="550" y="50" width="500" height="180" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="800" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">ATAC-seq · global accessibility</text>

    <g transform="translate(570 90)">
      <!-- Step 1: native chromatin -->
      <rect x="0" y="0" width="100" height="65" rx="4" fill="#fef3c7" stroke="#b45309" stroke-width="1"/>
      <path d="M 10 35 q 10 -5, 20 0 t 20 0 t 20 0 t 20 0" fill="none" stroke="#525252" stroke-width="1.2"/>
      <ellipse cx="20" cy="35" rx="7" ry="4" fill="#c4c1b6" stroke="#525252" stroke-width="0.8"/>
      <ellipse cx="50" cy="35" rx="7" ry="4" fill="#c4c1b6" stroke="#525252" stroke-width="0.8"/>
      <ellipse cx="80" cy="35" rx="7" ry="4" fill="#c4c1b6" stroke="#525252" stroke-width="0.8"/>
      <text x="50" y="58" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">native nuclei</text>

      <line x1="105" y1="32" x2="123" y2="32" stroke="#b45309" stroke-width="1.5" marker-end="url(#arr-cobalt)"/>

      <!-- Step 2: Tn5 inserting -->
      <rect x="130" y="0" width="110" height="65" rx="4" fill="#fef3c7" stroke="#b45309" stroke-width="1"/>
      <path d="M 140 35 q 8 -5, 16 0 t 16 0 t 16 0 t 16 0 t 16 0" fill="none" stroke="#525252" stroke-width="1.2"/>
      <ellipse cx="148" cy="35" rx="6" ry="3.5" fill="#c4c1b6" stroke="#525252" stroke-width="0.8"/>
      <ellipse cx="215" cy="35" rx="6" ry="3.5" fill="#c4c1b6" stroke="#525252" stroke-width="0.8"/>
      <!-- Tn5 between nucleosomes -->
      <circle cx="163" cy="35" r="3" fill="#0d7377"/>
      <circle cx="183" cy="35" r="3" fill="#0d7377"/>
      <circle cx="200" cy="35" r="3" fill="#0d7377"/>
      <text x="185" y="58" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">Tn5 inserts</text>

      <line x1="245" y1="32" x2="263" y2="32" stroke="#b45309" stroke-width="1.5" marker-end="url(#arr-cobalt)"/>

      <!-- Step 3: tagged fragments -->
      <rect x="270" y="0" width="85" height="65" rx="4" fill="#fef3c7" stroke="#b45309" stroke-width="1"/>
      <g>
        <rect x="280" y="20" width="18" height="3" fill="#525252"/>
        <rect x="277" y="20" width="3" height="3" fill="#0d7377"/>
        <rect x="298" y="20" width="3" height="3" fill="#0d7377"/>
        <rect x="285" y="28" width="22" height="3" fill="#525252"/>
        <rect x="282" y="28" width="3" height="3" fill="#0d7377"/>
        <rect x="307" y="28" width="3" height="3" fill="#0d7377"/>
        <rect x="290" y="36" width="18" height="3" fill="#525252"/>
        <rect x="287" y="36" width="3" height="3" fill="#0d7377"/>
        <rect x="308" y="36" width="3" height="3" fill="#0d7377"/>
        <rect x="285" y="44" width="20" height="3" fill="#525252"/>
        <rect x="282" y="44" width="3" height="3" fill="#0d7377"/>
        <rect x="305" y="44" width="3" height="3" fill="#0d7377"/>
      </g>
      <text x="313" y="58" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">tagged frags</text>

      <line x1="360" y1="32" x2="378" y2="32" stroke="#b45309" stroke-width="1.5" marker-end="url(#arr-cobalt)"/>

      <!-- Step 4: pile-up -->
      <rect x="385" y="0" width="70" height="65" rx="4" fill="#fef3c7" stroke="#b45309" stroke-width="1"/>
      <g fill="#b45309">
        <rect x="400" y="45" width="4" height="15"/>
        <rect x="405" y="35" width="4" height="25"/>
        <rect x="410" y="25" width="4" height="35"/>
        <rect x="415" y="20" width="4" height="40"/>
        <rect x="420" y="30" width="4" height="30"/>
        <rect x="425" y="40" width="4" height="20"/>
        <rect x="432" y="48" width="4" height="12"/>
      </g>
      <text x="420" y="12" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#b45309">pile-up</text>
    </g>

    <text x="800" y="215" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">"where is the genome accessible?" — no antibody needed</text>
  </g>

  <!-- ── BOTTOM BAND: shared genomic cartoon + aligned signal ── -->
  <g transform="translate(30 250)">
    <text x="0" y="14" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">Same region, both assays — aligned</text>

    <!-- Genomic cartoon -->
    <line x1="0" y1="40" x2="1020" y2="40" stroke="#525252" stroke-width="1.5"/>
    <!-- nucleosomes -->
    <ellipse cx="70" cy="40" rx="18" ry="9" fill="#c4c1b6" stroke="#525252" stroke-width="0.8"/>
    <ellipse cx="130" cy="40" rx="18" ry="9" fill="#c4c1b6" stroke="#525252" stroke-width="0.8"/>
    <ellipse cx="190" cy="40" rx="18" ry="9" fill="#c4c1b6" stroke="#525252" stroke-width="0.8"/>
    <!-- open region -->
    <rect x="220" y="35" width="130" height="10" fill="#fef3c7" stroke="#b45309" stroke-width="0.8" stroke-dasharray="3 2"/>
    <text x="285" y="30" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#b45309">open promoter</text>
    <!-- TF bound within open region -->
    <rect x="250" y="32" width="12" height="15" fill="#c4342c"/>
    <text x="256" y="27" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#c4342c">TF</text>
    <rect x="300" y="32" width="12" height="15" fill="#c4342c"/>
    <text x="306" y="27" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#c4342c">TF</text>
    <!-- nucleosomes continue -->
    <ellipse cx="400" cy="40" rx="18" ry="9" fill="#c4c1b6" stroke="#525252" stroke-width="0.8"/>
    <ellipse cx="460" cy="40" rx="18" ry="9" fill="#c4c1b6" stroke="#525252" stroke-width="0.8"/>
    <ellipse cx="520" cy="40" rx="18" ry="9" fill="#c4c1b6" stroke="#525252" stroke-width="0.8"/>
    <!-- another small open region -->
    <rect x="560" y="35" width="70" height="10" fill="#fef3c7" stroke="#b45309" stroke-width="0.8" stroke-dasharray="3 2"/>
    <rect x="580" y="32" width="12" height="15" fill="#c4342c"/>
    <text x="586" y="27" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#c4342c">TF</text>
    <!-- more nucleosomes -->
    <ellipse cx="660" cy="40" rx="18" ry="9" fill="#c4c1b6" stroke="#525252" stroke-width="0.8"/>
    <ellipse cx="720" cy="40" rx="18" ry="9" fill="#c4c1b6" stroke="#525252" stroke-width="0.8"/>
    <ellipse cx="780" cy="40" rx="18" ry="9" fill="#c4c1b6" stroke="#525252" stroke-width="0.8"/>
    <ellipse cx="840" cy="40" rx="18" ry="9" fill="#c4c1b6" stroke="#525252" stroke-width="0.8"/>
    <ellipse cx="900" cy="40" rx="18" ry="9" fill="#c4c1b6" stroke="#525252" stroke-width="0.8"/>
    <ellipse cx="960" cy="40" rx="18" ry="9" fill="#c4c1b6" stroke="#525252" stroke-width="0.8"/>

    <!-- ChIP-seq coverage track -->
    <text x="-5" y="90" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a">ChIP</text>
    <line x1="0" y1="100" x2="1020" y2="100" stroke="#c4c1b6" stroke-width="0.5"/>
    <path d="M 0 98 L 240 98 L 245 95 L 250 70 L 256 62 L 262 70 L 268 96 L 290 97 L 295 95 L 300 70 L 306 62 L 312 70 L 318 96 L 570 98 L 575 95 L 580 72 L 586 64 L 592 72 L 598 96 L 1020 98 L 1020 100 L 0 100 Z" fill="#1e3a8a" opacity="0.7"/>

    <!-- ATAC-seq coverage track -->
    <text x="-5" y="150" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309">ATAC</text>
    <line x1="0" y1="160" x2="1020" y2="160" stroke="#c4c1b6" stroke-width="0.5"/>
    <path d="M 0 158 L 210 158 L 218 150 L 230 130 L 250 120 L 285 115 L 320 120 L 340 130 L 352 150 L 358 158 L 550 158 L 558 150 L 570 135 L 585 128 L 610 130 L 625 145 L 630 158 L 1020 158 L 1020 160 L 0 160 Z" fill="#b45309" opacity="0.7"/>

    <!-- Annotations -->
    <g transform="translate(0 190)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a" font-weight="600">ChIP spikes sharply at TF positions</text>
      <text x="460" y="0" font-family="Inter, sans-serif" font-size="9" fill="#b45309" font-weight="600">ATAC spikes across whole open regions</text>
      <text x="0" y="15" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">— narrow, antibody-gated</text>
      <text x="460" y="15" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">— wider, antibody-free, also reflects nucleosome positioning</text>
    </g>
  </g>
</svg>
