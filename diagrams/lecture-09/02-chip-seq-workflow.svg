<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 360" role="img" aria-labelledby="t d">
  <title id="t">ChIP-seq workflow</title>
  <desc id="d">Four-step ChIP-seq workflow shown as panels connected by arrows. Step 1: cells treated with formaldehyde, a TF covalently crosslinked to the DNA it touches. Step 2: chromatin sonicated into fragments ~300 bp. Step 3: Y-shaped antibody captures fragments carrying the target TF; unbound fragments discarded. Step 4: crosslinks reversed, DNA purified, sequenced on Illumina. Output summary: ~30M reads align, peak calling finds bound sites.</desc>

  <defs>
    <marker id="arr-accent" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <text x="540" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">ChIP-seq WORKFLOW · CROSSLINK → FRAGMENT → IP → SEQUENCE</text>

  <!-- ── Step 1: Crosslink ── -->
  <g>
    <rect x="30" y="60" width="220" height="200" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="140" y="82" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">1. Crosslink</text>

    <!-- Cell outline -->
    <circle cx="140" cy="160" r="55" fill="#ffffff" stroke="#525252" stroke-width="1.5"/>
    <!-- Chromatin curves inside -->
    <path d="M 95 155 q 15 -10, 30 0 t 30 0 t 20 0" fill="none" stroke="#525252" stroke-width="1.2"/>
    <path d="M 95 170 q 12 5, 24 0 t 24 0 t 24 0" fill="none" stroke="#525252" stroke-width="1.2"/>
    <!-- TF proteins bound + crosslinks -->
    <rect x="115" y="150" width="10" height="12" fill="#c4342c"/>
    <line x1="120" y1="150" x2="122" y2="146" stroke="#b45309" stroke-width="1.5"/>
    <line x1="120" y1="162" x2="118" y2="166" stroke="#b45309" stroke-width="1.5"/>
    <rect x="150" y="166" width="10" height="12" fill="#c4342c"/>
    <line x1="155" y1="166" x2="157" y2="162" stroke="#b45309" stroke-width="1.5"/>
    <line x1="155" y1="178" x2="153" y2="182" stroke="#b45309" stroke-width="1.5"/>

    <!-- HCHO reagent icon -->
    <g transform="translate(180 110)">
      <rect x="0" y="0" width="40" height="22" rx="4" fill="#fef3c7" stroke="#b45309" stroke-width="0.8"/>
      <text x="20" y="14" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#b45309" font-weight="600">HCHO</text>
    </g>
    <line x1="195" y1="135" x2="165" y2="155" stroke="#b45309" stroke-width="1" stroke-dasharray="2 2"/>

    <text x="140" y="240" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">formaldehyde locks</text>
    <text x="140" y="252" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">protein–DNA contacts</text>
  </g>

  <!-- Arrow -->
  <line x1="255" y1="160" x2="295" y2="160" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arr-accent)"/>

  <!-- ── Step 2: Sonicate ── -->
  <g>
    <rect x="300" y="60" width="220" height="200" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="410" y="82" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">2. Sonicate</text>

    <!-- Sonication waves -->
    <g stroke="#0d7377" stroke-width="1.5" fill="none">
      <path d="M 330 110 q 5 -5, 10 0 t 10 0 t 10 0 t 10 0 t 10 0 t 10 0 t 10 0"/>
      <path d="M 330 125 q 5 -5, 10 0 t 10 0 t 10 0 t 10 0 t 10 0 t 10 0 t 10 0"/>
    </g>

    <!-- Fragments scattered -->
    <g>
      <rect x="330" y="150" width="40" height="6" fill="#525252"/>
      <rect x="348" y="152" width="6" height="8" fill="#c4342c"/>
      <rect x="380" y="158" width="50" height="6" fill="#525252"/>
      <rect x="395" y="159" width="6" height="7" fill="#c4342c"/>
      <rect x="440" y="150" width="38" height="6" fill="#525252"/>
      <rect x="455" y="152" width="6" height="6" fill="#c4342c"/>
      <rect x="340" y="172" width="45" height="6" fill="#525252"/>
      <rect x="395" y="172" width="42" height="6" fill="#525252"/>
      <rect x="410" y="172" width="6" height="8" fill="#c4342c"/>
      <rect x="450" y="172" width="40" height="6" fill="#525252"/>
      <rect x="335" y="190" width="50" height="6" fill="#525252"/>
      <rect x="355" y="192" width="6" height="7" fill="#c4342c"/>
      <rect x="400" y="190" width="40" height="6" fill="#525252"/>
      <rect x="455" y="190" width="44" height="6" fill="#525252"/>
    </g>

    <text x="410" y="225" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">~300 bp fragments</text>
    <text x="410" y="248" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">random breakage · log-normal distribution</text>
  </g>

  <!-- Arrow -->
  <line x1="525" y1="160" x2="565" y2="160" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arr-accent)"/>

  <!-- ── Step 3: Immunoprecipitate ── -->
  <g>
    <rect x="570" y="60" width="220" height="200" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="680" y="82" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">3. Immunoprecipitate</text>

    <!-- Antibody captures a TF fragment -->
    <g stroke="#b45309" stroke-width="2" fill="none">
      <line x1="650" y1="130" x2="650" y2="148"/>
      <line x1="650" y1="130" x2="640" y2="118"/>
      <line x1="650" y1="130" x2="660" y2="118"/>
    </g>
    <rect x="635" y="148" width="30" height="10" fill="#525252"/>
    <rect x="647" y="150" width="6" height="6" fill="#c4342c"/>
    <text x="650" y="180" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#b45309" font-weight="600">kept</text>

    <!-- Discarded fragments (faded, no TF) -->
    <g opacity="0.35">
      <rect x="695" y="115" width="30" height="6" fill="#525252" stroke-dasharray="2 2"/>
      <rect x="730" y="130" width="36" height="6" fill="#525252"/>
      <rect x="700" y="145" width="28" height="6" fill="#525252"/>
      <rect x="740" y="160" width="32" height="6" fill="#525252"/>
      <rect x="700" y="178" width="30" height="6" fill="#525252"/>
      <rect x="735" y="195" width="34" height="6" fill="#525252"/>
    </g>
    <text x="735" y="220" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#c4c1b6">discarded</text>

    <text x="680" y="248" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">pull down antibody–protein–DNA</text>
  </g>

  <!-- Arrow -->
  <line x1="795" y1="160" x2="835" y2="160" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arr-accent)"/>

  <!-- ── Step 4: Sequence ── -->
  <g>
    <rect x="840" y="60" width="220" height="200" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="950" y="82" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">4. Sequence</text>

    <!-- Reverse-crosslinks + Illumina reads -->
    <g fill="#1e3a8a">
      <rect x="860" y="120" width="30" height="3"/>
      <rect x="895" y="120" width="32" height="3"/>
      <rect x="865" y="128" width="28" height="3"/>
      <rect x="900" y="128" width="34" height="3"/>
      <rect x="930" y="128" width="26" height="3"/>
      <rect x="870" y="136" width="32" height="3"/>
      <rect x="905" y="136" width="28" height="3"/>
      <rect x="940" y="136" width="30" height="3"/>
      <rect x="855" y="144" width="34" height="3"/>
      <rect x="895" y="144" width="30" height="3"/>
      <rect x="935" y="144" width="32" height="3"/>
      <rect x="975" y="144" width="28" height="3"/>
      <rect x="860" y="152" width="28" height="3"/>
      <rect x="900" y="152" width="34" height="3"/>
      <rect x="940" y="152" width="28" height="3"/>
      <rect x="865" y="160" width="30" height="3"/>
      <rect x="905" y="160" width="30" height="3"/>
      <rect x="945" y="160" width="32" height="3"/>
      <rect x="870" y="168" width="28" height="3"/>
      <rect x="910" y="168" width="30" height="3"/>
    </g>

    <text x="950" y="200" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a">Illumina short reads</text>
    <text x="950" y="224" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">~30M reads per sample</text>
    <text x="950" y="248" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">→ align → peak calling</text>
  </g>

  <!-- Bottom caption band -->
  <g transform="translate(30 290)">
    <rect x="0" y="0" width="1020" height="55" rx="6" fill="#f6f4ee" stroke="#c4c1b6"/>
    <text x="510" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">The chemistry freezes the cell state. Quality is set at step 1 — a bad crosslink cannot be fixed downstream.</text>
    <text x="510" y="42" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252">Formaldehyde: 1% · 10 min · room temperature (standard). Too little = lost signal; too much = specificity loss.</text>
  </g>
</svg>
