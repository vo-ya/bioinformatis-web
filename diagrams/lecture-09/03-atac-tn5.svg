<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 420" role="img" aria-labelledby="t d">
  <title id="t">ATAC-seq Tn5 chemistry</title>
  <desc id="d">Top: a chromatin cartoon with six nucleosomes (histone octamers wrapped with ~147 bp DNA) spaced along a horizontal DNA line, with linker regions and one larger nucleosome-free promoter region between them. Middle: Tn5 transposase enzymes (teal blobs) inserting sequencing adapters only in the open linker regions; no insertions through nucleosomes. Bottom: four fragment classes produced — sub-nucleosomal (under 100 bp), mono-nucleosomal (~180 bp), di-nucleosomal (~330 bp), tri-nucleosomal (~500 bp, rare) — each shown with its length annotation.</desc>

  <defs>
    <marker id="arr-amber" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#b45309"/>
    </marker>
  </defs>

  <text x="540" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">Tn5 CHEMISTRY · INSERT ONLY IN OPEN CHROMATIN · LENGTH RECORDS NUCLEOSOMES SPANNED</text>

  <!-- ── Top band: chromatin cartoon with nucleosomes ── -->
  <g>
    <text x="60" y="56" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">Native chromatin in an open-region context</text>

    <!-- DNA backbone -->
    <line x1="80" y1="100" x2="1020" y2="100" stroke="#525252" stroke-width="1.8"/>

    <!-- Nucleosomes with DNA wrapping -->
    <g>
      <!-- Nuc 1 -->
      <ellipse cx="140" cy="100" rx="28" ry="14" fill="#c4c1b6" stroke="#525252" stroke-width="1.2"/>
      <path d="M 115 100 Q 120 87, 140 87 Q 160 87, 165 100" fill="none" stroke="#525252" stroke-width="1"/>
      <!-- Nuc 2 -->
      <ellipse cx="240" cy="100" rx="28" ry="14" fill="#c4c1b6" stroke="#525252" stroke-width="1.2"/>
      <path d="M 215 100 Q 220 87, 240 87 Q 260 87, 265 100" fill="none" stroke="#525252" stroke-width="1"/>
      <!-- Nuc 3 -->
      <ellipse cx="340" cy="100" rx="28" ry="14" fill="#c4c1b6" stroke="#525252" stroke-width="1.2"/>
      <path d="M 315 100 Q 320 87, 340 87 Q 360 87, 365 100" fill="none" stroke="#525252" stroke-width="1"/>

      <!-- Open promoter region (gap between 3 and 4) -->
      <rect x="380" y="92" width="160" height="16" fill="#fef3c7" stroke="#b45309" stroke-width="1" stroke-dasharray="3 2"/>
      <text x="460" y="80" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309" font-weight="600">open chromatin · promoter</text>

      <!-- Nuc 4 -->
      <ellipse cx="580" cy="100" rx="28" ry="14" fill="#c4c1b6" stroke="#525252" stroke-width="1.2"/>
      <path d="M 555 100 Q 560 87, 580 87 Q 600 87, 605 100" fill="none" stroke="#525252" stroke-width="1"/>
      <!-- Nuc 5 -->
      <ellipse cx="680" cy="100" rx="28" ry="14" fill="#c4c1b6" stroke="#525252" stroke-width="1.2"/>
      <path d="M 655 100 Q 660 87, 680 87 Q 700 87, 705 100" fill="none" stroke="#525252" stroke-width="1"/>
      <!-- Nuc 6 -->
      <ellipse cx="780" cy="100" rx="28" ry="14" fill="#c4c1b6" stroke="#525252" stroke-width="1.2"/>
      <path d="M 755 100 Q 760 87, 780 87 Q 800 87, 805 100" fill="none" stroke="#525252" stroke-width="1"/>
      <!-- Nuc 7 -->
      <ellipse cx="880" cy="100" rx="28" ry="14" fill="#c4c1b6" stroke="#525252" stroke-width="1.2"/>
      <path d="M 855 100 Q 860 87, 880 87 Q 900 87, 905 100" fill="none" stroke="#525252" stroke-width="1"/>
      <!-- Nuc 8 -->
      <ellipse cx="980" cy="100" rx="28" ry="14" fill="#c4c1b6" stroke="#525252" stroke-width="1.2"/>
      <path d="M 955 100 Q 960 87, 980 87 Q 1000 87, 1005 100" fill="none" stroke="#525252" stroke-width="1"/>
    </g>

    <!-- Tn5 enzymes approaching (only at open regions) -->
    <g fill="#0d7377">
      <!-- In promoter region -->
      <circle cx="400" cy="100" r="6"/>
      <circle cx="440" cy="100" r="6"/>
      <circle cx="480" cy="100" r="6"/>
      <circle cx="520" cy="100" r="6"/>
      <!-- Small linker openings -->
      <circle cx="190" cy="100" r="4" opacity="0.7"/>
      <circle cx="290" cy="100" r="4" opacity="0.7"/>
      <circle cx="730" cy="100" r="4" opacity="0.7"/>
      <circle cx="830" cy="100" r="4" opacity="0.7"/>
    </g>
    <!-- Adapter bars attached to Tn5 -->
    <g fill="#1e3a8a">
      <rect x="397" y="108" width="6" height="4"/>
      <rect x="397" y="86" width="6" height="4"/>
      <rect x="437" y="108" width="6" height="4"/>
      <rect x="437" y="86" width="6" height="4"/>
      <rect x="477" y="108" width="6" height="4"/>
      <rect x="477" y="86" width="6" height="4"/>
      <rect x="517" y="108" width="6" height="4"/>
      <rect x="517" y="86" width="6" height="4"/>
    </g>

    <!-- Legend -->
    <g transform="translate(80 140)">
      <ellipse cx="8" cy="0" rx="10" ry="5" fill="#c4c1b6" stroke="#525252" stroke-width="0.8"/>
      <text x="22" y="4" font-family="Inter, sans-serif" font-size="10" fill="#525252">nucleosome (protects DNA)</text>
      <circle cx="200" cy="0" r="5" fill="#0d7377"/>
      <text x="212" y="4" font-family="Inter, sans-serif" font-size="10" fill="#525252">Tn5 transposase</text>
      <rect x="322" y="-3" width="6" height="6" fill="#1e3a8a"/>
      <text x="334" y="4" font-family="Inter, sans-serif" font-size="10" fill="#525252">sequencing adapter</text>
    </g>
  </g>

  <!-- Divider -->
  <line x1="80" y1="175" x2="1000" y2="175" stroke="#c4c1b6" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- ── Bottom band: fragment classes ── -->
  <g>
    <text x="60" y="200" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">Fragment classes — length records nucleosomes spanned</text>

    <!-- Sub-nucleosomal -->
    <g transform="translate(80 220)">
      <rect x="0" y="0" width="220" height="85" rx="4" fill="#ffffff" stroke="#c4c1b6"/>
      <text x="110" y="18" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#1e3a8a" font-weight="600">sub-nucleosomal</text>
      <text x="110" y="32" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">&lt; 100 bp</text>
      <!-- Small fragment -->
      <line x1="40" y1="55" x2="75" y2="55" stroke="#525252" stroke-width="1.5"/>
      <rect x="37" y="52" width="3" height="6" fill="#1e3a8a"/>
      <rect x="75" y="52" width="3" height="6" fill="#1e3a8a"/>
      <text x="110" y="75" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">linker only · 0 nucleosomes</text>
    </g>

    <!-- Mono-nucleosomal -->
    <g transform="translate(320 220)">
      <rect x="0" y="0" width="220" height="85" rx="4" fill="#ffffff" stroke="#c4c1b6"/>
      <text x="110" y="18" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#1e3a8a" font-weight="600">mono-nucleosomal</text>
      <text x="110" y="32" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">~150–180 bp</text>
      <line x1="25" y1="55" x2="195" y2="55" stroke="#525252" stroke-width="1.5"/>
      <rect x="22" y="52" width="3" height="6" fill="#1e3a8a"/>
      <rect x="195" y="52" width="3" height="6" fill="#1e3a8a"/>
      <ellipse cx="110" cy="55" rx="22" ry="9" fill="#c4c1b6" stroke="#525252" stroke-width="0.8"/>
      <text x="110" y="75" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">spans 1 nucleosome</text>
    </g>

    <!-- Di-nucleosomal -->
    <g transform="translate(560 220)">
      <rect x="0" y="0" width="220" height="85" rx="4" fill="#ffffff" stroke="#c4c1b6"/>
      <text x="110" y="18" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#1e3a8a" font-weight="600">di-nucleosomal</text>
      <text x="110" y="32" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">~300–330 bp</text>
      <line x1="15" y1="55" x2="205" y2="55" stroke="#525252" stroke-width="1.5"/>
      <rect x="12" y="52" width="3" height="6" fill="#1e3a8a"/>
      <rect x="205" y="52" width="3" height="6" fill="#1e3a8a"/>
      <ellipse cx="75" cy="55" rx="20" ry="8" fill="#c4c1b6" stroke="#525252" stroke-width="0.8"/>
      <ellipse cx="145" cy="55" rx="20" ry="8" fill="#c4c1b6" stroke="#525252" stroke-width="0.8"/>
      <text x="110" y="75" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">spans 2 adjacent nucleosomes</text>
    </g>

    <!-- Tri-nucleosomal -->
    <g transform="translate(800 220)">
      <rect x="0" y="0" width="220" height="85" rx="4" fill="#ffffff" stroke="#c4c1b6"/>
      <text x="110" y="18" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#1e3a8a" font-weight="600">tri-nucleosomal</text>
      <text x="110" y="32" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">~500 bp (rare)</text>
      <line x1="10" y1="55" x2="210" y2="55" stroke="#525252" stroke-width="1.5"/>
      <rect x="7" y="52" width="3" height="6" fill="#1e3a8a"/>
      <rect x="210" y="52" width="3" height="6" fill="#1e3a8a"/>
      <ellipse cx="53" cy="55" rx="17" ry="7" fill="#c4c1b6" stroke="#525252" stroke-width="0.8"/>
      <ellipse cx="110" cy="55" rx="17" ry="7" fill="#c4c1b6" stroke="#525252" stroke-width="0.8"/>
      <ellipse cx="167" cy="55" rx="17" ry="7" fill="#c4c1b6" stroke="#525252" stroke-width="0.8"/>
      <text x="110" y="75" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">spans 3 — fainter tail in the distribution</text>
    </g>
  </g>

  <!-- Bottom caption -->
  <text x="540" y="395" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85" font-style="italic">The fragment-length distribution of an ATAC library encodes nucleosome structure — each peak is a different number of nucleosomes between the two Tn5 cuts.</text>
</svg>
