<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" role="img" aria-labelledby="t d">
  <title id="t">Fragment-length distribution and nucleosome laddering</title>
  <desc id="d">Fragment-size distribution plot. X-axis: fragment length in bp, log-scale from 10 to 1000. Y-axis: read density. ATAC-seq curve in cobalt shows multi-modal shape with peaks at about 50 bp (sub-nucleosomal, tallest), 180 bp (mono-nucleosomal), 330 bp (di-nucleosomal), and 500 bp (tri-nucleosomal, faintest). Overlay: a ChIP-seq sonicated library in dashed amber showing a single smooth mode at ~300 bp with no nucleosomal structure. Annotations label each ATAC peak. Caption notes that laddering is the signature of healthy ATAC.</desc>

  <text x="480" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">FRAGMENT-LENGTH DISTRIBUTION · THE FIRST QC GATE</text>

  <!-- Plot area -->
  <rect x="80" y="60" width="820" height="280" fill="#ffffff" stroke="#c4c1b6"/>

  <!-- X-axis (log-scale from 10 to 1000) -->
  <line x1="80" y1="340" x2="900" y2="340" stroke="#525252" stroke-width="1"/>
  <!-- Tick marks -->
  <g stroke="#525252" stroke-width="0.8">
    <line x1="80" y1="340" x2="80" y2="346"/>
    <line x1="245" y1="340" x2="245" y2="346"/>
    <line x1="410" y1="340" x2="410" y2="346"/>
    <line x1="575" y1="340" x2="575" y2="346"/>
    <line x1="740" y1="340" x2="740" y2="346"/>
    <line x1="900" y1="340" x2="900" y2="346"/>
  </g>
  <!-- Tick labels (log scale: 10, 30, 100, 300, 1000 + a 50, 180, 330, 500 callout set) -->
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">
    <text x="80" y="358">10</text>
    <text x="245" y="358">30</text>
    <text x="410" y="358">100</text>
    <text x="575" y="358">300</text>
    <text x="740" y="358">1000</text>
  </g>
  <text x="490" y="380" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#525252">fragment length (bp, log-scale)</text>

  <!-- Y-axis -->
  <line x1="80" y1="60" x2="80" y2="340" stroke="#525252" stroke-width="1"/>
  <text x="48" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#525252" transform="rotate(-90 48 200)">read density</text>

  <!-- ATAC-seq curve (multi-modal, log-x; peaks at 50, 180, 330, 500 bp) -->
  <!--
    log10(10)=1, log10(1000)=3, range 2 in log → 820 px / 2 = 410 px per log10
    pos(x) = 80 + (log10(x) - 1) * 410
    50 bp:  log10(50) ≈ 1.70 → 80 + 0.70*410 = 367
    100 bp: log10(100) = 2   → 410
    180 bp: log10(180) ≈ 2.26 → 80 + 1.26*410 = 597
    300 bp: log10(300) ≈ 2.48 → 80 + 1.48*410 = 687
    330 bp: log10(330) ≈ 2.52 → 80 + 1.52*410 = 703
    500 bp: log10(500) ≈ 2.70 → 80 + 1.70*410 = 777
  -->

  <!-- ChIP-seq reference curve (dashed amber): single peak around log10(300) = 687 -->
  <path d="M 260 335 Q 500 330, 687 110 Q 830 300, 900 335" fill="none" stroke="#b45309" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.8"/>

  <!-- ATAC-seq curve (solid cobalt): 4 peaks at ~367 (tallest), 597, 703, 777 -->
  <path d="M 80 340
           L 180 335 L 230 300 L 300 160 L 367 80
           L 450 210 L 530 275 L 560 280
           L 597 140 L 650 245
           L 703 180 L 760 285
           L 777 260 L 830 310
           L 900 335 L 900 340 Z"
        fill="#1e3a8a" fill-opacity="0.25" stroke="#1e3a8a" stroke-width="2"/>

  <!-- Peak annotations -->
  <g font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a">
    <!-- 50 bp -->
    <line x1="367" y1="80" x2="367" y2="75" stroke="#1e3a8a" stroke-width="1"/>
    <text x="367" y="68" text-anchor="middle" font-weight="600">sub-nucleosomal</text>
    <text x="367" y="58" text-anchor="middle" fill="#525252">~50 bp · linker only</text>
    <!-- 180 bp -->
    <line x1="597" y1="140" x2="597" y2="128" stroke="#1e3a8a" stroke-width="1"/>
    <text x="597" y="120" text-anchor="middle" font-weight="600">mono-nucleosomal</text>
    <text x="597" y="109" text-anchor="middle" fill="#525252">~180 bp · 1 nuc</text>
    <!-- 330 bp -->
    <line x1="703" y1="180" x2="703" y2="168" stroke="#1e3a8a" stroke-width="1"/>
    <text x="703" y="162" text-anchor="middle" font-weight="600">di-nucleosomal</text>
    <text x="703" y="152" text-anchor="middle" fill="#525252">~330 bp · 2 nuc</text>
    <!-- 500 bp -->
    <line x1="777" y1="260" x2="777" y2="245" stroke="#1e3a8a" stroke-width="1"/>
    <text x="777" y="238" text-anchor="middle" font-weight="600">tri-nuc</text>
    <text x="777" y="228" text-anchor="middle" fill="#525252">~500 bp</text>
  </g>

  <!-- ChIP annotation -->
  <g transform="translate(687 107)">
    <line x1="0" y1="0" x2="-50" y2="40" stroke="#b45309" stroke-width="0.8"/>
    <text x="-55" y="42" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#b45309" font-weight="600">ChIP — sonicated</text>
    <text x="-55" y="54" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#525252">no nucleosome structure</text>
  </g>

  <!-- Legend -->
  <g transform="translate(700 200)">
    <rect x="0" y="0" width="180" height="60" rx="4" fill="#ffffff" stroke="#c4c1b6" stroke-width="0.8"/>
    <line x1="10" y1="18" x2="35" y2="18" stroke="#1e3a8a" stroke-width="2"/>
    <text x="42" y="22" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">ATAC-seq (healthy)</text>
    <line x1="10" y1="42" x2="35" y2="42" stroke="#b45309" stroke-width="1.5" stroke-dasharray="4 2"/>
    <text x="42" y="46" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">ChIP-seq (sonicated)</text>
  </g>

  <!-- Bottom caption -->
  <text x="480" y="410" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85" font-style="italic">Absence of the ladder → failed experiment. Check this plot first, before peak calling.</text>
</svg>
