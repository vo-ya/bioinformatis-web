<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 360" role="img" aria-labelledby="t d">
  <title id="t">Read pile-up at a TF binding site</title>
  <desc id="d">Genome browser view of a 5 kb window. Top: coordinate axis. Middle: per-base coverage track. Baseline coverage of about 3 reads per base across most of the window; a central 200 bp region shows a sharp peak rising to about 25 reads per base; a smaller rise at around 2 kb reaches about 8 reads per base. Callouts mark 'peak summit' with an arrow, 'peak boundaries' as brackets around the ~200 bp region, and 'local background' as a shaded region around the peak. Bottom annotation track shows the main peak falling on a TSS-labelled rectangle for GENE_X.</desc>

  <text x="540" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">READ PILE-UP · THE DETECTION PROBLEM IS TO FIND THIS SHAPE</text>

  <!-- Coordinate axis -->
  <g>
    <line x1="80" y1="65" x2="1040" y2="65" stroke="#525252" stroke-width="1"/>
    <g stroke="#525252" stroke-width="0.8">
      <line x1="80"  y1="65" x2="80"  y2="70"/>
      <line x1="272" y1="65" x2="272" y2="70"/>
      <line x1="464" y1="65" x2="464" y2="70"/>
      <line x1="656" y1="65" x2="656" y2="70"/>
      <line x1="848" y1="65" x2="848" y2="70"/>
      <line x1="1040" y1="65" x2="1040" y2="70"/>
    </g>
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">
      <text x="80"   y="82">0 kb</text>
      <text x="272"  y="82">1</text>
      <text x="464"  y="82">2</text>
      <text x="656"  y="82">3</text>
      <text x="848"  y="82">4</text>
      <text x="1040" y="82">5 kb</text>
    </g>
  </g>

  <!-- Coverage track -->
  <g>
    <!-- Track baseline axis -->
    <line x1="80" y1="240" x2="1040" y2="240" stroke="#525252" stroke-width="0.8"/>
    <line x1="80" y1="100" x2="80" y2="240" stroke="#525252" stroke-width="0.8"/>

    <!-- Y-axis labels -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="end">
      <text x="72" y="244">0</text>
      <text x="72" y="200">10</text>
      <text x="72" y="156">20</text>
      <text x="72" y="112">30</text>
    </g>
    <text x="35" y="175" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" transform="rotate(-90 35 175)">reads/bp</text>

    <!-- Local background shading (around the main peak) -->
    <rect x="400" y="228" width="220" height="12" fill="#1e3a8a" fill-opacity="0.08"/>

    <!-- Coverage path: baseline ~3 reads/bp (y=228), small rise at ~2kb (x~460 to 540, up to 8 reads = y=205), main peak at ~2.7kb (x=595-620, up to 25 = y=130, summit ~y=130) -->
    <path d="M 80 235 L 150 235 L 180 232 L 220 234 L 250 233
             L 280 234 L 320 234 L 360 235 L 400 232 L 420 230
             L 440 225 L 460 215 L 480 205 L 500 212 L 520 220 L 540 230
             L 560 233 L 580 232 L 590 225 L 600 200 L 608 160 L 612 140 L 616 130 L 620 140 L 625 160 L 635 200 L 645 225
             L 660 232 L 680 233 L 720 235 L 760 234 L 800 235
             L 840 233 L 880 235 L 920 234 L 960 235 L 1000 234 L 1040 235 L 1040 240 L 80 240 Z"
          fill="#1e3a8a" fill-opacity="0.8" stroke="#1e3a8a" stroke-width="1"/>

    <!-- Peak summit pointer -->
    <g>
      <line x1="616" y1="108" x2="616" y2="125" stroke="#b45309" stroke-width="1.5"/>
      <polygon points="612,125 620,125 616,132" fill="#b45309"/>
      <text x="616" y="100" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b45309">peak summit</text>
    </g>

    <!-- Peak boundaries brackets -->
    <g stroke="#0a0a0a" stroke-width="1.3">
      <line x1="595" y1="250" x2="595" y2="243"/>
      <line x1="595" y1="243" x2="600" y2="243"/>
      <line x1="645" y1="250" x2="645" y2="243"/>
      <line x1="645" y1="243" x2="640" y2="243"/>
    </g>
    <text x="620" y="262" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#0a0a0a">peak boundaries (~200 bp)</text>

    <!-- Local background label -->
    <text x="420" y="275" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a" font-style="italic">local background region (1 kb window)</text>
  </g>

  <!-- Annotation track: gene + TSS -->
  <g>
    <text x="72" y="302" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">genes</text>
    <line x1="80" y1="305" x2="1040" y2="305" stroke="#c4c1b6" stroke-width="0.5"/>
    <!-- Gene body -->
    <rect x="575" y="298" width="220" height="14" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
    <polygon points="795,298 803,305 795,312" fill="#1e3a8a"/>
    <text x="685" y="309" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a" font-weight="600">TSS of GENE_X</text>
    <!-- TSS arrow indicator -->
    <line x1="580" y1="290" x2="580" y2="299" stroke="#b45309" stroke-width="1.5"/>
    <polygon points="577,291 583,291 580,286" fill="#b45309"/>
    <text x="580" y="285" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#b45309" font-weight="600">TSS</text>
  </g>

  <!-- Bottom caption -->
  <text x="540" y="345" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85" font-style="italic">Real ChIP-seq pile-ups look like this. Peak calling decides which humps are real, thresholding against the local baseline.</text>
</svg>
