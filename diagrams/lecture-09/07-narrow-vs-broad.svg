<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 460" role="img" aria-labelledby="t d">
  <title id="t">Narrow vs broad peaks</title>
  <desc id="d">Three stacked coverage tracks over a shared 50 kb coordinate axis. Track a, CTCF ChIP: five sharp peaks each about 200 bp wide, tall, labelled TFBS, mode tag 'narrow (default)'. Track b, H3K4me3: three broader peaks each about 1 kb wide with gradual shoulders, labelled TSS, mode tag 'narrow (default)'. Track c, H3K27me3: two wide plateaus each spanning 10 to 20 kb, not resolved into individual peaks, labelled 'silenced domain', mode tag 'broad'.</desc>

  <text x="540" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">PEAK SHAPES · MATCH THE CALLER MODE TO THE MARK</text>

  <!-- Shared coordinate axis -->
  <g>
    <line x1="80" y1="60" x2="1040" y2="60" stroke="#525252" stroke-width="1"/>
    <g stroke="#525252" stroke-width="0.8">
      <line x1="80"   y1="60" x2="80"   y2="66"/>
      <line x1="272"  y1="60" x2="272"  y2="66"/>
      <line x1="464"  y1="60" x2="464"  y2="66"/>
      <line x1="656"  y1="60" x2="656"  y2="66"/>
      <line x1="848"  y1="60" x2="848"  y2="66"/>
      <line x1="1040" y1="60" x2="1040" y2="66"/>
    </g>
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">
      <text x="80" y="80">0 kb</text>
      <text x="272" y="80">10</text>
      <text x="464" y="80">20</text>
      <text x="656" y="80">30</text>
      <text x="848" y="80">40</text>
      <text x="1040" y="80">50 kb</text>
    </g>
  </g>

  <!-- ── Track (a): CTCF ChIP — narrow peaks ── -->
  <g>
    <line x1="80" y1="180" x2="1040" y2="180" stroke="#c4c1b6" stroke-width="0.5"/>
    <!-- 5 narrow peaks -->
    <path d="M 80 178 L 155 178 L 162 170 L 170 125 L 178 170 L 185 178
             L 290 178 L 297 170 L 305 120 L 313 170 L 320 178
             L 510 178 L 517 170 L 525 135 L 533 170 L 540 178
             L 700 178 L 707 170 L 715 118 L 723 170 L 730 178
             L 870 178 L 877 170 L 885 132 L 893 170 L 900 178
             L 1040 178 L 1040 180 L 80 180 Z"
          fill="#1e3a8a" fill-opacity="0.75" stroke="#1e3a8a" stroke-width="1"/>

    <!-- Peak labels -->
    <g font-family="JetBrains Mono, monospace" font-size="8" fill="#1e3a8a" text-anchor="middle">
      <text x="170" y="112">TFBS</text>
      <text x="305" y="108">TFBS</text>
      <text x="525" y="122">TFBS</text>
      <text x="715" y="106">TFBS</text>
      <text x="885" y="120">TFBS</text>
    </g>

    <!-- Track label -->
    <text x="72" y="150" text-anchor="end" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">(a) CTCF ChIP</text>
    <text x="72" y="162" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">narrow peaks · ~200 bp</text>

    <!-- Mode tag -->
    <g transform="translate(920 135)">
      <rect x="0" y="0" width="110" height="20" rx="10" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
      <text x="55" y="13" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a" font-weight="600">--narrow (default)</text>
    </g>
  </g>

  <!-- ── Track (b): H3K4me3 — broader peaks ── -->
  <g>
    <line x1="80" y1="280" x2="1040" y2="280" stroke="#c4c1b6" stroke-width="0.5"/>
    <!-- 3 broader peaks (~1 kb each) -->
    <path d="M 80 278 L 200 278 L 220 270 L 235 245 L 255 230 L 275 230 L 295 245 L 310 270 L 330 278
             L 530 278 L 550 270 L 565 240 L 585 225 L 605 225 L 625 240 L 640 270 L 660 278
             L 800 278 L 820 270 L 835 250 L 855 238 L 875 238 L 895 250 L 910 270 L 930 278
             L 1040 278 L 1040 280 L 80 280 Z"
          fill="#0d7377" fill-opacity="0.7" stroke="#0d7377" stroke-width="1"/>

    <!-- Peak labels -->
    <g font-family="JetBrains Mono, monospace" font-size="8" fill="#0d7377" text-anchor="middle">
      <text x="265" y="220">TSS</text>
      <text x="595" y="215">TSS</text>
      <text x="865" y="228">TSS</text>
    </g>

    <!-- Track label -->
    <text x="72" y="250" text-anchor="end" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0d7377">(b) H3K4me3</text>
    <text x="72" y="262" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">~1 kb · active promoter</text>

    <!-- Mode tag -->
    <g transform="translate(920 235)">
      <rect x="0" y="0" width="110" height="20" rx="10" fill="#e0f2f1" stroke="#0d7377" stroke-width="0.8"/>
      <text x="55" y="13" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#0d7377" font-weight="600">--narrow (default)</text>
    </g>
  </g>

  <!-- ── Track (c): H3K27me3 — broad domains ── -->
  <g>
    <line x1="80" y1="400" x2="1040" y2="400" stroke="#c4c1b6" stroke-width="0.5"/>
    <!-- 2 broad plateaus (10-20 kb each) -->
    <path d="M 80 398 L 180 398 L 200 390 L 220 355 L 250 340 L 300 335 L 360 335 L 420 340 L 460 350 L 480 370 L 500 395
             L 620 398 L 650 390 L 680 360 L 720 350 L 780 345 L 840 345 L 880 350 L 910 365 L 940 395
             L 1040 398 L 1040 400 L 80 400 Z"
          fill="#b45309" fill-opacity="0.65" stroke="#b45309" stroke-width="1"/>

    <!-- Domain labels -->
    <g font-family="JetBrains Mono, monospace" font-size="8" fill="#b45309" text-anchor="middle">
      <text x="340" y="325">silenced domain</text>
      <text x="810" y="330">silenced domain</text>
    </g>

    <!-- Track label -->
    <text x="72" y="370" text-anchor="end" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#b45309">(c) H3K27me3</text>
    <text x="72" y="382" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">10–100 kb domains · Polycomb silenced</text>

    <!-- Mode tag -->
    <g transform="translate(920 355)">
      <rect x="0" y="0" width="110" height="20" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="0.8"/>
      <text x="55" y="13" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309" font-weight="600">--broad</text>
    </g>
  </g>

  <!-- Bottom caption -->
  <text x="540" y="440" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">Default narrow on a broad mark fragments real domains. Default broad on a TF merges distinct binding events. Pick the mode that fits the biology.</text>
</svg>
