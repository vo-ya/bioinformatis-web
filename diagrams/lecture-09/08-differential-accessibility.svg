<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" role="img" aria-labelledby="t d">
  <title id="t">Differential accessibility MA plot</title>
  <desc id="d">MA scatter plot for differential accessibility. X-axis: mean log2 count across samples, 0 to 16. Y-axis: log2 fold change between conditions, minus 5 to plus 5, with zero marked. A cloud of grey points sits around zero at moderate x. A cluster of red dots at positive y and a cluster of blue dots at negative y concentrated in the x range 8 to 12. Dashed threshold lines at y equals plus or minus 1. Two peaks are highlighted with callouts: 'ENH1 near GENE_A (up 3.2×)' and 'PROM2 near GENE_B (down 2.1×)'.</desc>

  <text x="450" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">DIFFERENTIAL ACCESSIBILITY · SAME MACHINERY AS LECTURE 6 DE</text>

  <!-- Plot frame -->
  <rect x="80" y="60" width="740" height="300" fill="#ffffff" stroke="#c4c1b6"/>

  <!-- Axes -->
  <line x1="80" y1="60" x2="80" y2="360" stroke="#525252" stroke-width="1"/>
  <line x1="80" y1="210" x2="820" y2="210" stroke="#525252" stroke-width="1"/>

  <!-- Zero line emphasised -->
  <line x1="80" y1="210" x2="820" y2="210" stroke="#525252" stroke-width="0.8" stroke-dasharray="2 2"/>

  <!-- Y-axis ticks + labels -->
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="end">
    <text x="74" y="75">+5</text>
    <text x="74" y="128">+3</text>
    <text x="74" y="158">+1</text>
    <text x="74" y="215">0</text>
    <text x="74" y="265">-1</text>
    <text x="74" y="296">-3</text>
    <text x="74" y="349">-5</text>
  </g>
  <text x="40" y="210" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#525252" transform="rotate(-90 40 210)">log₂ fold change (treated / control)</text>

  <!-- X-axis ticks + labels -->
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">
    <text x="80" y="376">0</text>
    <text x="265" y="376">4</text>
    <text x="450" y="376">8</text>
    <text x="635" y="376">12</text>
    <text x="820" y="376">16</text>
  </g>
  <text x="450" y="395" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#525252">mean log₂ count across samples</text>

  <!-- Threshold lines at ±1 -->
  <line x1="80" y1="158" x2="820" y2="158" stroke="#8a8a85" stroke-width="0.8" stroke-dasharray="4 3"/>
  <line x1="80" y1="265" x2="820" y2="265" stroke="#8a8a85" stroke-width="0.8" stroke-dasharray="4 3"/>

  <!-- Non-significant scatter cloud (grey) -->
  <g fill="#8a8a85" fill-opacity="0.6">
    <circle cx="130" cy="215" r="2"/><circle cx="145" cy="208" r="2"/>
    <circle cx="160" cy="220" r="2"/><circle cx="180" cy="205" r="2"/>
    <circle cx="200" cy="212" r="2"/><circle cx="220" cy="218" r="2"/>
    <circle cx="250" cy="208" r="2.3"/><circle cx="280" cy="220" r="2.3"/>
    <circle cx="310" cy="206" r="2.3"/><circle cx="340" cy="214" r="2.3"/>
    <circle cx="370" cy="210" r="2.3"/><circle cx="400" cy="222" r="2.3"/>
    <circle cx="430" cy="205" r="2.5"/><circle cx="460" cy="216" r="2.5"/>
    <circle cx="480" cy="208" r="2.5"/><circle cx="510" cy="220" r="2.5"/>
    <circle cx="540" cy="212" r="2.5"/><circle cx="570" cy="205" r="2.5"/>
    <circle cx="600" cy="218" r="2.5"/><circle cx="625" cy="210" r="2.5"/>
    <circle cx="655" cy="215" r="2.5"/><circle cx="685" cy="206" r="2.5"/>
    <circle cx="720" cy="218" r="2.5"/><circle cx="755" cy="210" r="2.5"/>
    <circle cx="785" cy="213" r="2.5"/>
    <!-- More scatter in middle x range -->
    <circle cx="350" cy="198" r="2"/><circle cx="380" cy="230" r="2"/>
    <circle cx="410" cy="195" r="2"/><circle cx="440" cy="232" r="2"/>
    <circle cx="470" cy="195" r="2"/><circle cx="500" cy="230" r="2"/>
    <circle cx="530" cy="198" r="2"/><circle cx="560" cy="232" r="2"/>
    <circle cx="590" cy="200" r="2"/><circle cx="620" cy="230" r="2"/>
    <!-- Near-zero vertical scatter -->
    <circle cx="165" cy="202" r="1.8"/><circle cx="195" cy="224" r="1.8"/>
    <circle cx="225" cy="200" r="1.8"/><circle cx="255" cy="226" r="1.8"/>
    <circle cx="285" cy="200" r="1.8"/><circle cx="315" cy="225" r="1.8"/>
    <circle cx="345" cy="203" r="1.8"/><circle cx="375" cy="225" r="1.8"/>
  </g>

  <!-- Up-regulated cluster (red) -->
  <g fill="#c4342c" fill-opacity="0.85">
    <circle cx="430" cy="130" r="3"/><circle cx="455" cy="120" r="3"/>
    <circle cx="475" cy="115" r="3"/><circle cx="495" cy="135" r="3"/>
    <circle cx="515" cy="125" r="3"/><circle cx="540" cy="110" r="3.2"/>
    <circle cx="565" cy="130" r="3"/><circle cx="585" cy="140" r="3"/>
    <circle cx="610" cy="118" r="3"/><circle cx="635" cy="128" r="3"/>
    <circle cx="660" cy="140" r="3"/><circle cx="680" cy="125" r="3"/>
    <circle cx="450" cy="145" r="3"/><circle cx="485" cy="148" r="3"/>
    <circle cx="525" cy="145" r="3"/><circle cx="570" cy="148" r="3"/>
    <circle cx="615" cy="148" r="3"/>
  </g>

  <!-- Down-regulated cluster (blue) -->
  <g fill="#1e3a8a" fill-opacity="0.85">
    <circle cx="440" cy="290" r="3"/><circle cx="465" cy="300" r="3"/>
    <circle cx="490" cy="310" r="3"/><circle cx="510" cy="285" r="3"/>
    <circle cx="530" cy="295" r="3"/><circle cx="555" cy="315" r="3.2"/>
    <circle cx="580" cy="290" r="3"/><circle cx="605" cy="280" r="3"/>
    <circle cx="625" cy="305" r="3"/><circle cx="650" cy="290" r="3"/>
    <circle cx="670" cy="278" r="3"/><circle cx="695" cy="300" r="3"/>
    <circle cx="470" cy="275" r="3"/><circle cx="500" cy="272" r="3"/>
    <circle cx="540" cy="275" r="3"/><circle cx="585" cy="272" r="3"/>
    <circle cx="625" cy="272" r="3"/>
  </g>

  <!-- Highlighted peaks with callouts -->
  <g>
    <circle cx="540" cy="110" r="5" fill="none" stroke="#c4342c" stroke-width="2"/>
    <line x1="540" y1="105" x2="500" y2="85" stroke="#c4342c" stroke-width="0.8"/>
    <text x="495" y="82" text-anchor="end" font-family="Inter, sans-serif" font-size="9" fill="#c4342c" font-weight="600">ENH1 near GENE_A</text>
    <text x="495" y="93" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">(up 3.2×)</text>
  </g>
  <g>
    <circle cx="555" cy="315" r="5" fill="none" stroke="#1e3a8a" stroke-width="2"/>
    <line x1="555" y1="320" x2="595" y2="335" stroke="#1e3a8a" stroke-width="0.8"/>
    <text x="600" y="332" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a" font-weight="600">PROM2 near GENE_B</text>
    <text x="600" y="343" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">(down 2.1×)</text>
  </g>

  <!-- Legend -->
  <g transform="translate(640 70)">
    <rect x="0" y="0" width="170" height="66" rx="4" fill="#ffffff" stroke="#c4c1b6" stroke-width="0.8"/>
    <circle cx="12" cy="14" r="3.5" fill="#c4342c"/>
    <text x="22" y="18" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">up in treated</text>
    <circle cx="12" cy="34" r="3.5" fill="#1e3a8a"/>
    <text x="22" y="38" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">down in treated</text>
    <circle cx="12" cy="54" r="3.5" fill="#8a8a85"/>
    <text x="22" y="58" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">not significant</text>
  </g>

  <!-- Bottom caption -->
  <text x="450" y="420" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85" font-style="italic">Features are peaks, not genes. Estimator is still the negative-binomial GLM from Lecture 6.</text>
</svg>
