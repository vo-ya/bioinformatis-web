<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 420" role="img" aria-labelledby="t d">
  <title id="t">TF motif as PWM and sequence logo</title>
  <desc id="d">Left: a CTCF PWM rendered as a 4-by-19 numerical grid; rows labelled A, C, G, T in base-palette colours, columns numbered 1 to 19, cell contents show log-odds weights coloured by sign. Right: the same motif rendered as a sequence logo with IC-height stacks of A/C/G/T letters; tall core 'CCCTC' pattern in the middle; variable flanks. Arrow between the two panels with the note 'PWM rendered as a logo — same information, two views'.</desc>

  <defs>
    <marker id="arr-c" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <text x="540" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">CTCF MOTIF · PWM NUMERICAL MATRIX vs SEQUENCE LOGO</text>

  <!-- ── LEFT: PWM matrix ── -->
  <g transform="translate(30 60)">
    <rect x="0" y="0" width="480" height="320" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="240" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">Position Weight Matrix · 4 × 19</text>

    <!-- Column headers -->
    <g font-family="JetBrains Mono, monospace" font-size="8" fill="#525252" text-anchor="middle">
      <text x="63" y="56">1</text><text x="85" y="56">2</text><text x="107" y="56">3</text>
      <text x="129" y="56">4</text><text x="151" y="56">5</text><text x="173" y="56">6</text>
      <text x="195" y="56">7</text><text x="217" y="56">8</text><text x="239" y="56">9</text>
      <text x="261" y="56">10</text><text x="283" y="56">11</text><text x="305" y="56">12</text>
      <text x="327" y="56">13</text><text x="349" y="56">14</text><text x="371" y="56">15</text>
      <text x="393" y="56">16</text><text x="415" y="56">17</text><text x="437" y="56">18</text>
      <text x="459" y="56">19</text>
    </g>

    <!-- Row labels (base letters) + matrix cells -->
    <!--
      Approximate CTCF PWM log-odds, pattern: NN(C|T)C(C|T)CCTCCTAGTGGNN
      Weights rough: +2.5 strong, +1 moderate, 0 background, -1.5 disfavoured
    -->
    <g font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">
      <!-- Row A -->
      <text x="48" y="80" fill="#c4342c" font-weight="700">A</text>
      <g>
        <rect x="54" y="68" width="22" height="16" fill="#eef2ff"/><text x="65" y="80">0.1</text>
        <rect x="76" y="68" width="22" height="16" fill="#eef2ff"/><text x="87" y="80">0.0</text>
        <rect x="98" y="68" width="22" height="16" fill="#f6f4ee"/><text x="109" y="80">-0.8</text>
        <rect x="120" y="68" width="22" height="16" fill="#f6f4ee"/><text x="131" y="80">-1.5</text>
        <rect x="142" y="68" width="22" height="16" fill="#f6f4ee"/><text x="153" y="80">-1.2</text>
        <rect x="164" y="68" width="22" height="16" fill="#f6f4ee"/><text x="175" y="80">-0.9</text>
        <rect x="186" y="68" width="22" height="16" fill="#f6f4ee"/><text x="197" y="80">-1.8</text>
        <rect x="208" y="68" width="22" height="16" fill="#f6f4ee"/><text x="219" y="80">-0.5</text>
        <rect x="230" y="68" width="22" height="16" fill="#f6f4ee"/><text x="241" y="80">-1.4</text>
        <rect x="252" y="68" width="22" height="16" fill="#f6f4ee"/><text x="263" y="80">-0.6</text>
        <rect x="274" y="68" width="22" height="16" fill="#f6f4ee"/><text x="285" y="80">-1.2</text>
        <rect x="296" y="68" width="22" height="16" fill="#d9ddf2"/><text x="307" y="80">0.8</text>
        <rect x="318" y="68" width="22" height="16" fill="#bfcbf6"/><text x="329" y="80">1.7</text>
        <rect x="340" y="68" width="22" height="16" fill="#f6f4ee"/><text x="351" y="80">-0.4</text>
        <rect x="362" y="68" width="22" height="16" fill="#f6f4ee"/><text x="373" y="80">-0.3</text>
        <rect x="384" y="68" width="22" height="16" fill="#f6f4ee"/><text x="395" y="80">-0.1</text>
        <rect x="406" y="68" width="22" height="16" fill="#eef2ff"/><text x="417" y="80">0.2</text>
