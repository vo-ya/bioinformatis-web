    <!-- Heatmap legend -->
    <g transform="translate(30 175)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-weight="600">log-odds weight</text>
      <rect x="0" y="8" width="18" height="8" fill="#f6f4ee"/>
      <text x="22" y="16" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">&lt; 0</text>
      <rect x="65" y="8" width="18" height="8" fill="#eef2ff"/>
      <text x="87" y="16" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">≈ 0</text>
      <rect x="130" y="8" width="18" height="8" fill="#d9ddf2"/>
      <text x="152" y="16" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">+1</text>
      <rect x="190" y="8" width="18" height="8" fill="#bfcbf6"/>
      <text x="212" y="16" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">+2</text>
      <rect x="250" y="8" width="18" height="8" fill="#6a84d8"/>
      <text x="272" y="16" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">&gt; +2</text>
    </g>

    <!-- Formula -->
    <g transform="translate(30 220)">
      <text x="0" y="0" font-family="Source Serif 4, serif" font-size="12" font-style="italic" fill="#0a0a0a">w<tspan font-size="10">b,i</tspan> = log₂( freq<tspan font-size="10">b,i</tspan> / bg<tspan font-size="10">b</tspan> )</text>
      <text x="0" y="22" font-family="Inter, sans-serif" font-size="9" fill="#525252">positive → more common than background · negative → depleted</text>
    </g>

    <!-- Score formula -->
    <g transform="translate(30 265)">
      <text x="0" y="0" font-family="Source Serif 4, serif" font-size="13" font-style="italic" fill="#0a0a0a">score(s) = Σᵢ w<tspan font-size="10">sᵢ,i</tspan></text>
      <text x="0" y="22" font-family="Inter, sans-serif" font-size="9" fill="#525252">sum the weights at the base actually present in each position</text>
    </g>

    <!-- Core highlight annotation -->
    <rect x="120" y="66" width="66" height="82" fill="none" stroke="#b45309" stroke-width="1.5" stroke-dasharray="3 2"/>
    <text x="153" y="60" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#b45309" font-weight="600">core</text>
  </g>

  <!-- Arrow between panels -->
  <g transform="translate(525 200)">
    <line x1="0" y1="0" x2="28" y2="0" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arr-c)"/>
    <text x="14" y="-10" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">render as</text>
    <text x="14" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">logo</text>
  </g>

  <!-- ── RIGHT: sequence logo ── -->
  <g transform="translate(570 60)">
