    <!-- Bottom caption -->
    <text x="240" y="295" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">letter height = information content at that position</text>
    <text x="240" y="310" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">max 2 bits (fully conserved) · 0 bits (uniform)</text>
