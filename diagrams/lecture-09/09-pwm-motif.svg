    </g>
    <text x="14" y="145" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" transform="rotate(-90 14 145)">information</text>

    <!-- Columns (19 positions, width 22 each, starting x=40) -->
    <!-- Tall core "CCCTC CTAGTGG" from position 4..15 -->
    <!-- per-position IC (bits): 0.1, 0.1, 0.7, 1.8, 0.9, 1.7, 1.9, 1.2, 1.6, 1.8, 1.5, 1.0, 1.1, 1.3, 1.7, 1.6, 0.7, 0.2, 0.1 -->

    <!-- Column 1: IC 0.1 -->
