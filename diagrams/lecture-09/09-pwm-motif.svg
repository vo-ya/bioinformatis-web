        <rect x="98" y="112" width="22" height="16" fill="#f6f4ee"/><text x="109" y="124">-0.6</text>
        <rect x="120" y="112" width="22" height="16" fill="#f6f4ee"/><text x="131" y="124">-1.0</text>
        <rect x="142" y="112" width="22" height="16" fill="#f6f4ee"/><text x="153" y="124">-0.8</text>
        <rect x="164" y="112" width="22" height="16" fill="#f6f4ee"/><text x="175" y="124">-0.7</text>
        <rect x="186" y="112" width="22" height="16" fill="#f6f4ee"/><text x="197" y="124">-1.5</text>
        <rect x="208" y="112" width="22" height="16" fill="#f6f4ee"/><text x="219" y="124">-0.4</text>
        <rect x="230" y="112" width="22" height="16" fill="#6a84d8"/><text x="241" y="124" fill="#ffffff">2.4</text>
        <rect x="252" y="112" width="22" height="16" fill="#f6f4ee"/><text x="263" y="124">-0.8</text>
        <rect x="274" y="112" width="22" height="16" fill="#f6f4ee"/><text x="285" y="124">-1.2</text>
        <rect x="296" y="112" width="22" height="16" fill="#f6f4ee"/><text x="307" y="124">-0.6</text>
        <rect x="318" y="112" width="22" height="16" fill="#f6f4ee"/><text x="329" y="124">-0.5</text>
        <rect x="340" y="112" width="22" height="16" fill="#bfcbf6"/><text x="351" y="124">1.9</text>
        <rect x="362" y="112" width="22" height="16" fill="#6a84d8"/><text x="373" y="124" fill="#ffffff">2.4</text>
        <rect x="384" y="112" width="22" height="16" fill="#6a84d8"/><text x="395" y="124" fill="#ffffff">2.2</text>
        <rect x="406" y="112" width="22" height="16" fill="#d9ddf2"/><text x="417" y="124">1.4</text>
        <rect x="428" y="112" width="22" height="16" fill="#eef2ff"/><text x="439" y="124">0.3</text>
        <rect x="450" y="112" width="22" height="16" fill="#eef2ff"/><text x="461" y="124">0.0</text>
      </g>
      <!-- Row T -->
      <text x="48" y="146" fill="#2d7a3e" font-weight="700">T</text>
      <g>
        <rect x="54" y="134" width="22" height="16" fill="#eef2ff"/><text x="65" y="146">0.0</text>
        <rect x="76" y="134" width="22" height="16" fill="#eef2ff"/><text x="87" y="146">0.0</text>
        <rect x="98" y="134" width="22" height="16" fill="#eef2ff"/><text x="109" y="146">0.5</text>
        <rect x="120" y="134" width="22" height="16" fill="#f6f4ee"/><text x="131" y="146">-1.2</text>
        <rect x="142" y="134" width="22" height="16" fill="#d9ddf2"/><text x="153" y="146">0.8</text>
        <rect x="164" y="134" width="22" height="16" fill="#f6f4ee"/><text x="175" y="146">-0.9</text>
