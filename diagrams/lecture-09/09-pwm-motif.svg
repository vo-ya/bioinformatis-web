        <rect x="142" y="90" width="22" height="16" fill="#d9ddf2"/><text x="153" y="102">1.0</text>
        <rect x="164" y="90" width="22" height="16" fill="#6a84d8"/><text x="175" y="102" fill="#ffffff">2.4</text>
        <rect x="186" y="90" width="22" height="16" fill="#6a84d8"/><text x="197" y="102" fill="#ffffff">2.6</text>
        <rect x="208" y="90" width="22" height="16" fill="#bfcbf6"/><text x="219" y="102">1.8</text>
        <rect x="230" y="90" width="22" height="16" fill="#f6f4ee"/><text x="241" y="102">-0.6</text>
        <rect x="252" y="90" width="22" height="16" fill="#6a84d8"/><text x="263" y="102" fill="#ffffff">2.5</text>
        <rect x="274" y="90" width="22" height="16" fill="#6a84d8"/><text x="285" y="102" fill="#ffffff">2.3</text>
