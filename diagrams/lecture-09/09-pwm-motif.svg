        <rect x="362" y="90" width="22" height="16" fill="#f6f4ee"/><text x="373" y="102">-0.3</text>
        <rect x="384" y="90" width="22" height="16" fill="#f6f4ee"/><text x="395" y="102">-0.4</text>
        <rect x="406" y="90" width="22" height="16" fill="#eef2ff"/><text x="417" y="102">0.0</text>
        <rect x="428" y="90" width="22" height="16" fill="#eef2ff"/><text x="439" y="102">0.1</text>
        <rect x="450" y="90" width="22" height="16" fill="#eef2ff"/><text x="461" y="102">0.1</text>
      </g>
      <!-- Row G -->
