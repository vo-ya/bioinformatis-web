<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="t d">
  <title id="t">DNA methylation chemistry — 5mC on a CpG</title>
  <desc id="d">Three bands. Top: a schematic DNA double helix with a highlighted CpG dinucleotide; the cytosine carries a methyl group at its 5-carbon. Middle: two adjacent sequence stretches showing the same CpG with methylation annotated as a filled circle versus an open circle, labelled 'same sequence, two epigenetic states'. Bottom: skeletal formulas of cytosine and 5-methylcytosine side by side with the methyl group highlighted, arrows labelled DNMT adds and TET oxidises.</desc>

  <defs>
    <marker id="arr-accent" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#1e3a8a"/>
    </marker>
    <marker id="arr-warning" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#b45309"/>
    </marker>
  </defs>

  <text x="480" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">5-METHYLCYTOSINE · THE METHYL MARK ON A CpG</text>

  <!-- ── Top band: DNA helix detail ── -->
  <g>
    <text x="60" y="54" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">DNA double helix · CpG site highlighted</text>

    <!-- Backbone strands -->
    <line x1="110" y1="78" x2="810" y2="78" stroke="#525252" stroke-width="1.2"/>
    <line x1="110" y1="120" x2="810" y2="120" stroke="#525252" stroke-width="1.2"/>

    <!-- Base-pair connectors -->
    <g stroke="#c4c1b6" stroke-width="0.8">
      <line x1="140" y1="78" x2="140" y2="120"/>
      <line x1="200" y1="78" x2="200" y2="120"/>
      <line x1="260" y1="78" x2="260" y2="120"/>
      <line x1="320" y1="78" x2="320" y2="120"/>
      <line x1="380" y1="78" x2="380" y2="120"/>
      <line x1="440" y1="78" x2="440" y2="120"/>
      <line x1="500" y1="78" x2="500" y2="120"/>
      <line x1="560" y1="78" x2="560" y2="120"/>
      <line x1="620" y1="78" x2="620" y2="120"/>
      <line x1="680" y1="78" x2="680" y2="120"/>
      <line x1="740" y1="78" x2="740" y2="120"/>
      <line x1="800" y1="78" x2="800" y2="120"/>
    </g>

    <!-- Top strand bases -->
    <g font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" text-anchor="middle">
      <text x="140" y="72" fill="#c4342c">A</text>
      <text x="200" y="72" fill="#2d7a3e">T</text>
      <text x="260" y="72" fill="#c4342c">A</text>
      <text x="320" y="72" fill="#1e3a8a">C</text>
      <text x="380" y="72" fill="#b45309">G</text>
      <text x="440" y="72" fill="#2d7a3e">T</text>
      <text x="500" y="72" fill="#c4342c">A</text>
      <text x="560" y="72" fill="#2d7a3e">T</text>
      <text x="620" y="72" fill="#b45309">G</text>
      <text x="680" y="72" fill="#c4342c">A</text>
      <text x="740" y="72" fill="#1e3a8a">C</text>
      <text x="800" y="72" fill="#c4342c">A</text>
    </g>

    <!-- Bottom strand bases -->
    <g font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" text-anchor="middle">
      <text x="140" y="134" fill="#2d7a3e">T</text>
      <text x="200" y="134" fill="#c4342c">A</text>
      <text x="260" y="134" fill="#2d7a3e">T</text>
      <text x="320" y="134" fill="#b45309">G</text>
      <text x="380" y="134" fill="#1e3a8a">C</text>
      <text x="440" y="134" fill="#c4342c">A</text>
      <text x="500" y="134" fill="#2d7a3e">T</text>
      <text x="560" y="134" fill="#c4342c">A</text>
      <text x="620" y="134" fill="#1e3a8a">C</text>
      <text x="680" y="134" fill="#2d7a3e">T</text>
      <text x="740" y="134" fill="#b45309">G</text>
      <text x="800" y="134" fill="#2d7a3e">T</text>
    </g>

    <!-- Highlight box on the CpG pair (columns 4-5: top strand CG, bottom GC) -->
    <rect x="302" y="54" width="100" height="82" fill="none" stroke="#b45309" stroke-width="1.5" stroke-dasharray="4 2"/>
    <text x="352" y="48" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309" font-weight="600">CpG</text>

    <!-- Methyl group attached to the top-strand C -->
    <line x1="320" y1="60" x2="320" y2="46" stroke="#1e3a8a" stroke-width="1.5"/>
    <circle cx="320" cy="40" r="10" fill="#1e3a8a"/>
    <text x="320" y="44" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" font-weight="700" fill="#ffffff">CH₃</text>

    <!-- 5'/3' labels -->
    <text x="98" y="76" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">5′</text>
    <text x="822" y="76" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">3′</text>
    <text x="98" y="124" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">3′</text>
    <text x="822" y="124" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">5′</text>
  </g>

  <!-- ── Middle band: same sequence, two states ── -->
  <g>
    <text x="60" y="180" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">Same sequence, two epigenetic states</text>

    <!-- Left: methylated -->
    <g transform="translate(110 200)">
      <rect x="0" y="0" width="340" height="60" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
      <text x="170" y="18" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#0a0a0a">5′ ...ACG<tspan font-weight="700" fill="#1e3a8a">C</tspan>GTT... 3′</text>
      <circle cx="180" cy="34" r="5" fill="#1e3a8a"/>
      <text x="170" y="52" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" font-weight="600">methylated</text>
    </g>

    <!-- Right: unmethylated -->
    <g transform="translate(510 200)">
      <rect x="0" y="0" width="340" height="60" rx="4" fill="#fef3c7" stroke="#b45309" stroke-width="1"/>
      <text x="170" y="18" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#0a0a0a">5′ ...ACG<tspan font-weight="700" fill="#b45309">C</tspan>GTT... 3′</text>
      <circle cx="180" cy="34" r="5" fill="none" stroke="#b45309" stroke-width="1.5"/>
      <text x="170" y="52" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#b45309" font-weight="600">unmethylated</text>
    </g>
  </g>

  <!-- ── Bottom band: structural formulas ── -->
  <g>
    <text x="60" y="300" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">Molecular view</text>

    <!-- Cytosine ring -->
    <g transform="translate(220 330)">
      <polygon points="0,0 40,0 60,30 40,60 0,60 -20,30" fill="#ffffff" stroke="#525252" stroke-width="1.5"/>
      <text x="20" y="34" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a" font-weight="700">cytosine</text>
      <text x="20" y="80" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">C (unmethylated)</text>
      <!-- 5-position marker -->
      <circle cx="-18" cy="30" r="3" fill="#8a8a85"/>
      <text x="-26" y="33" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">5′ C</text>
    </g>

    <!-- Arrow DNMT → -->
    <line x1="320" y1="360" x2="420" y2="360" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-accent)"/>
    <text x="370" y="352" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a" font-weight="600">DNMT adds</text>

    <!-- Arrow TET ← -->
    <line x1="420" y1="378" x2="320" y2="378" stroke="#b45309" stroke-width="1.5" marker-end="url(#arr-warning)"/>
    <text x="370" y="394" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#b45309" font-weight="600">TET oxidises</text>

    <!-- 5mC ring -->
    <g transform="translate(520 330)">
      <polygon points="0,0 40,0 60,30 40,60 0,60 -20,30" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
      <text x="20" y="28" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a" font-weight="700">5-methyl</text>
      <text x="20" y="40" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a" font-weight="700">cytosine</text>
      <text x="20" y="80" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a">5mC (methylated)</text>
      <!-- Methyl group attached at 5-position -->
      <circle cx="-18" cy="30" r="3" fill="#8a8a85"/>
      <line x1="-18" y1="30" x2="-40" y2="30" stroke="#1e3a8a" stroke-width="1.5"/>
      <circle cx="-48" cy="30" r="9" fill="#1e3a8a"/>
      <text x="-48" y="33" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" font-weight="700" fill="#ffffff">CH₃</text>
    </g>

    <!-- Caption -->
    <text x="720" y="360" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">~2 Å addition</text>
    <text x="720" y="376" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">stable through replication</text>
  </g>
</svg>
