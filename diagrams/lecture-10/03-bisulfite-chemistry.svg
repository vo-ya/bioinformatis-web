<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 420" role="img" aria-labelledby="t d">
  <title id="t">Bisulfite conversion chemistry</title>
  <desc id="d">Four stacked DNA strand views. Top: reference sequence with CpGs highlighted and per-CpG methylation state shown as filled or open circles. Second: after bisulfite treatment, unmethylated Cs converted to U are highlighted in amber, methylated Cs retained as C. Third: after PCR, U becomes T (amber) while methylated C remains C. Bottom: a mapping summary — unmethylated C → T, methylated C → C — with the caption 'every surviving C in the read = a methylated C in the original'.</desc>

  <defs>
    <marker id="arr-cobalt" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <text x="540" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">BISULFITE CONVERSION · A KNOWN SYMBOL-FLIP CHANNEL</text>

  <!-- ── Row 1: Reference ── -->
  <g>
    <text x="60" y="60" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">(1) Reference · methylation state per CpG</text>

    <!-- Sequence base track with per-base cells -->
    <g transform="translate(80 70)">
      <!-- 30 bases at x-width 28: AATCGTCGAAGCGTCGAAGCGTCGAAGCGT -->
      <!-- With CpG positions at indices 3-4, 6-7, 11-12, 14-15, 19-20, 22-23, 27-28 -->
      <g font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" text-anchor="middle">
        <!-- Each base cell: rect + letter -->
        <!-- A -->
        <rect x="0" y="0" width="28" height="26" fill="#f6f4ee"/><text x="14" y="19" fill="#c4342c">A</text>
        <rect x="28" y="0" width="28" height="26" fill="#f6f4ee"/><text x="42" y="19" fill="#c4342c">A</text>
        <rect x="56" y="0" width="28" height="26" fill="#f6f4ee"/><text x="70" y="19" fill="#2d7a3e">T</text>
        <!-- CpG 1 at idx 3-4 -->
        <rect x="84" y="0" width="28" height="26" fill="#eef2ff"/><text x="98" y="19" fill="#1e3a8a">C</text>
        <rect x="112" y="0" width="28" height="26" fill="#f6f4ee"/><text x="126" y="19" fill="#b45309">G</text>
        <rect x="140" y="0" width="28" height="26" fill="#f6f4ee"/><text x="154" y="19" fill="#2d7a3e">T</text>
        <!-- CpG 2 at idx 6-7 -->
        <rect x="168" y="0" width="28" height="26" fill="#eef2ff"/><text x="182" y="19" fill="#1e3a8a">C</text>
        <rect x="196" y="0" width="28" height="26" fill="#f6f4ee"/><text x="210" y="19" fill="#b45309">G</text>
        <rect x="224" y="0" width="28" height="26" fill="#f6f4ee"/><text x="238" y="19" fill="#c4342c">A</text>
        <rect x="252" y="0" width="28" height="26" fill="#f6f4ee"/><text x="266" y="19" fill="#c4342c">A</text>
        <rect x="280" y="0" width="28" height="26" fill="#f6f4ee"/><text x="294" y="19" fill="#b45309">G</text>
        <!-- CpG 3 at idx 11-12 -->
        <rect x="308" y="0" width="28" height="26" fill="#eef2ff"/><text x="322" y="19" fill="#1e3a8a">C</text>
        <rect x="336" y="0" width="28" height="26" fill="#f6f4ee"/><text x="350" y="19" fill="#b45309">G</text>
        <rect x="364" y="0" width="28" height="26" fill="#f6f4ee"/><text x="378" y="19" fill="#2d7a3e">T</text>
        <!-- CpG 4 at idx 14-15 -->
        <rect x="392" y="0" width="28" height="26" fill="#eef2ff"/><text x="406" y="19" fill="#1e3a8a">C</text>
        <rect x="420" y="0" width="28" height="26" fill="#f6f4ee"/><text x="434" y="19" fill="#b45309">G</text>
        <rect x="448" y="0" width="28" height="26" fill="#f6f4ee"/><text x="462" y="19" fill="#c4342c">A</text>
        <rect x="476" y="0" width="28" height="26" fill="#f6f4ee"/><text x="490" y="19" fill="#c4342c">A</text>
        <rect x="504" y="0" width="28" height="26" fill="#f6f4ee"/><text x="518" y="19" fill="#b45309">G</text>
        <!-- CpG 5 at idx 19-20 -->
        <rect x="532" y="0" width="28" height="26" fill="#eef2ff"/><text x="546" y="19" fill="#1e3a8a">C</text>
        <rect x="560" y="0" width="28" height="26" fill="#f6f4ee"/><text x="574" y="19" fill="#b45309">G</text>
        <rect x="588" y="0" width="28" height="26" fill="#f6f4ee"/><text x="602" y="19" fill="#2d7a3e">T</text>
        <!-- CpG 6 at idx 22-23 -->
        <rect x="616" y="0" width="28" height="26" fill="#eef2ff"/><text x="630" y="19" fill="#1e3a8a">C</text>
        <rect x="644" y="0" width="28" height="26" fill="#f6f4ee"/><text x="658" y="19" fill="#b45309">G</text>
        <rect x="672" y="0" width="28" height="26" fill="#f6f4ee"/><text x="686" y="19" fill="#c4342c">A</text>
        <rect x="700" y="0" width="28" height="26" fill="#f6f4ee"/><text x="714" y="19" fill="#c4342c">A</text>
        <rect x="728" y="0" width="28" height="26" fill="#f6f4ee"/><text x="742" y="19" fill="#b45309">G</text>
        <!-- CpG 7 at idx 27-28 -->
        <rect x="756" y="0" width="28" height="26" fill="#eef2ff"/><text x="770" y="19" fill="#1e3a8a">C</text>
        <rect x="784" y="0" width="28" height="26" fill="#f6f4ee"/><text x="798" y="19" fill="#b45309">G</text>
        <rect x="812" y="0" width="28" height="26" fill="#f6f4ee"/><text x="826" y="19" fill="#2d7a3e">T</text>
      </g>

      <!-- Methylation state markers above each CpG C -->
      <!-- Pattern: meth, unmeth, meth, meth, unmeth, meth, meth -->
      <g>
        <circle cx="98" cy="-10" r="4" fill="#0a0a0a"/>
        <circle cx="182" cy="-10" r="4" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
        <circle cx="322" cy="-10" r="4" fill="#0a0a0a"/>
        <circle cx="406" cy="-10" r="4" fill="#0a0a0a"/>
        <circle cx="546" cy="-10" r="4" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
        <circle cx="630" cy="-10" r="4" fill="#0a0a0a"/>
        <circle cx="770" cy="-10" r="4" fill="#0a0a0a"/>
      </g>
    </g>
  </g>

  <!-- Arrow down -->
  <line x1="540" y1="115" x2="540" y2="145" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arr-cobalt)"/>
  <text x="560" y="135" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" font-weight="600">NaHSO₃ (bisulfite)</text>

  <!-- ── Row 2: After bisulfite ── -->
  <g>
    <text x="60" y="175" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">(2) After bisulfite · unmethylated C → U</text>

    <g transform="translate(80 185)">
      <g font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" text-anchor="middle">
        <rect x="0" y="0" width="28" height="26" fill="#f6f4ee"/><text x="14" y="19" fill="#c4342c">A</text>
        <rect x="28" y="0" width="28" height="26" fill="#f6f4ee"/><text x="42" y="19" fill="#c4342c">A</text>
        <rect x="56" y="0" width="28" height="26" fill="#f6f4ee"/><text x="70" y="19" fill="#2d7a3e">T</text>
        <!-- CpG 1: methylated, C stays -->
        <rect x="84" y="0" width="28" height="26" fill="#eef2ff"/><text x="98" y="19" fill="#1e3a8a">C</text>
        <rect x="112" y="0" width="28" height="26" fill="#f6f4ee"/><text x="126" y="19" fill="#b45309">G</text>
        <rect x="140" y="0" width="28" height="26" fill="#f6f4ee"/><text x="154" y="19" fill="#2d7a3e">T</text>
        <!-- CpG 2: unmethylated, C → U -->
        <rect x="168" y="0" width="28" height="26" fill="#fef3c7"/><text x="182" y="19" fill="#b45309">U</text>
        <rect x="196" y="0" width="28" height="26" fill="#f6f4ee"/><text x="210" y="19" fill="#b45309">G</text>
        <rect x="224" y="0" width="28" height="26" fill="#f6f4ee"/><text x="238" y="19" fill="#c4342c">A</text>
        <rect x="252" y="0" width="28" height="26" fill="#f6f4ee"/><text x="266" y="19" fill="#c4342c">A</text>
        <rect x="280" y="0" width="28" height="26" fill="#f6f4ee"/><text x="294" y="19" fill="#b45309">G</text>
        <!-- CpG 3: methylated -->
        <rect x="308" y="0" width="28" height="26" fill="#eef2ff"/><text x="322" y="19" fill="#1e3a8a">C</text>
        <rect x="336" y="0" width="28" height="26" fill="#f6f4ee"/><text x="350" y="19" fill="#b45309">G</text>
        <rect x="364" y="0" width="28" height="26" fill="#f6f4ee"/><text x="378" y="19" fill="#2d7a3e">T</text>
        <!-- CpG 4: methylated -->
        <rect x="392" y="0" width="28" height="26" fill="#eef2ff"/><text x="406" y="19" fill="#1e3a8a">C</text>
        <rect x="420" y="0" width="28" height="26" fill="#f6f4ee"/><text x="434" y="19" fill="#b45309">G</text>
        <rect x="448" y="0" width="28" height="26" fill="#f6f4ee"/><text x="462" y="19" fill="#c4342c">A</text>
        <rect x="476" y="0" width="28" height="26" fill="#f6f4ee"/><text x="490" y="19" fill="#c4342c">A</text>
        <rect x="504" y="0" width="28" height="26" fill="#f6f4ee"/><text x="518" y="19" fill="#b45309">G</text>
        <!-- CpG 5: unmethylated, C → U -->
        <rect x="532" y="0" width="28" height="26" fill="#fef3c7"/><text x="546" y="19" fill="#b45309">U</text>
        <rect x="560" y="0" width="28" height="26" fill="#f6f4ee"/><text x="574" y="19" fill="#b45309">G</text>
        <rect x="588" y="0" width="28" height="26" fill="#f6f4ee"/><text x="602" y="19" fill="#2d7a3e">T</text>
        <!-- CpG 6: methylated -->
        <rect x="616" y="0" width="28" height="26" fill="#eef2ff"/><text x="630" y="19" fill="#1e3a8a">C</text>
        <rect x="644" y="0" width="28" height="26" fill="#f6f4ee"/><text x="658" y="19" fill="#b45309">G</text>
        <rect x="672" y="0" width="28" height="26" fill="#f6f4ee"/><text x="686" y="19" fill="#c4342c">A</text>
        <rect x="700" y="0" width="28" height="26" fill="#f6f4ee"/><text x="714" y="19" fill="#c4342c">A</text>
        <rect x="728" y="0" width="28" height="26" fill="#f6f4ee"/><text x="742" y="19" fill="#b45309">G</text>
        <!-- CpG 7: methylated -->
        <rect x="756" y="0" width="28" height="26" fill="#eef2ff"/><text x="770" y="19" fill="#1e3a8a">C</text>
        <rect x="784" y="0" width="28" height="26" fill="#f6f4ee"/><text x="798" y="19" fill="#b45309">G</text>
        <rect x="812" y="0" width="28" height="26" fill="#f6f4ee"/><text x="826" y="19" fill="#2d7a3e">T</text>
      </g>
    </g>
  </g>

  <!-- Arrow down -->
  <line x1="540" y1="225" x2="540" y2="255" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arr-cobalt)"/>
  <text x="560" y="245" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" font-weight="600">PCR (U → T)</text>

  <!-- ── Row 3: After PCR ── -->
  <g>
    <text x="60" y="285" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">(3) After PCR · U → T</text>

    <g transform="translate(80 295)">
      <g font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" text-anchor="middle">
        <rect x="0" y="0" width="28" height="26" fill="#f6f4ee"/><text x="14" y="19" fill="#c4342c">A</text>
        <rect x="28" y="0" width="28" height="26" fill="#f6f4ee"/><text x="42" y="19" fill="#c4342c">A</text>
        <rect x="56" y="0" width="28" height="26" fill="#f6f4ee"/><text x="70" y="19" fill="#2d7a3e">T</text>
        <rect x="84" y="0" width="28" height="26" fill="#eef2ff"/><text x="98" y="19" fill="#1e3a8a">C</text>
        <rect x="112" y="0" width="28" height="26" fill="#f6f4ee"/><text x="126" y="19" fill="#b45309">G</text>
        <rect x="140" y="0" width="28" height="26" fill="#f6f4ee"/><text x="154" y="19" fill="#2d7a3e">T</text>
        <rect x="168" y="0" width="28" height="26" fill="#fef3c7"/><text x="182" y="19" fill="#b45309">T</text>
        <rect x="196" y="0" width="28" height="26" fill="#f6f4ee"/><text x="210" y="19" fill="#b45309">G</text>
        <rect x="224" y="0" width="28" height="26" fill="#f6f4ee"/><text x="238" y="19" fill="#c4342c">A</text>
        <rect x="252" y="0" width="28" height="26" fill="#f6f4ee"/><text x="266" y="19" fill="#c4342c">A</text>
        <rect x="280" y="0" width="28" height="26" fill="#f6f4ee"/><text x="294" y="19" fill="#b45309">G</text>
        <rect x="308" y="0" width="28" height="26" fill="#eef2ff"/><text x="322" y="19" fill="#1e3a8a">C</text>
        <rect x="336" y="0" width="28" height="26" fill="#f6f4ee"/><text x="350" y="19" fill="#b45309">G</text>
        <rect x="364" y="0" width="28" height="26" fill="#f6f4ee"/><text x="378" y="19" fill="#2d7a3e">T</text>
        <rect x="392" y="0" width="28" height="26" fill="#eef2ff"/><text x="406" y="19" fill="#1e3a8a">C</text>
        <rect x="420" y="0" width="28" height="26" fill="#f6f4ee"/><text x="434" y="19" fill="#b45309">G</text>
        <rect x="448" y="0" width="28" height="26" fill="#f6f4ee"/><text x="462" y="19" fill="#c4342c">A</text>
        <rect x="476" y="0" width="28" height="26" fill="#f6f4ee"/><text x="490" y="19" fill="#c4342c">A</text>
        <rect x="504" y="0" width="28" height="26" fill="#f6f4ee"/><text x="518" y="19" fill="#b45309">G</text>
        <rect x="532" y="0" width="28" height="26" fill="#fef3c7"/><text x="546" y="19" fill="#b45309">T</text>
        <rect x="560" y="0" width="28" height="26" fill="#f6f4ee"/><text x="574" y="19" fill="#b45309">G</text>
        <rect x="588" y="0" width="28" height="26" fill="#f6f4ee"/><text x="602" y="19" fill="#2d7a3e">T</text>
        <rect x="616" y="0" width="28" height="26" fill="#eef2ff"/><text x="630" y="19" fill="#1e3a8a">C</text>
        <rect x="644" y="0" width="28" height="26" fill="#f6f4ee"/><text x="658" y="19" fill="#b45309">G</text>
        <rect x="672" y="0" width="28" height="26" fill="#f6f4ee"/><text x="686" y="19" fill="#c4342c">A</text>
        <rect x="700" y="0" width="28" height="26" fill="#f6f4ee"/><text x="714" y="19" fill="#c4342c">A</text>
        <rect x="728" y="0" width="28" height="26" fill="#f6f4ee"/><text x="742" y="19" fill="#b45309">G</text>
        <rect x="756" y="0" width="28" height="26" fill="#eef2ff"/><text x="770" y="19" fill="#1e3a8a">C</text>
        <rect x="784" y="0" width="28" height="26" fill="#f6f4ee"/><text x="798" y="19" fill="#b45309">G</text>
        <rect x="812" y="0" width="28" height="26" fill="#f6f4ee"/><text x="826" y="19" fill="#2d7a3e">T</text>
      </g>
    </g>
  </g>

  <!-- ── Bottom band: summary mapping ── -->
  <g transform="translate(80 350)">
    <rect x="0" y="0" width="840" height="55" rx="6" fill="#f6f4ee" stroke="#c4c1b6"/>
    <!-- Mapping arrows -->
    <g font-family="JetBrains Mono, monospace" font-size="12" text-anchor="middle">
      <text x="140" y="24" fill="#b45309"><tspan font-weight="700">unmethylated C</tspan> → T</text>
      <text x="440" y="24" fill="#1e3a8a"><tspan font-weight="700">methylated C</tspan> → C</text>
    </g>
    <text x="420" y="44" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-style="italic" fill="#525252">every surviving C in the read = a methylated C in the original</text>
  </g>
</svg>
