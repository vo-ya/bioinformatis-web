<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 460" role="img" aria-labelledby="t d">
  <title id="t">Bismark three-letter alignment</title>
  <desc id="d">Three algorithm stages. Row 1: original reference and bisulfite read showing 3 mismatches; naive aligner fails. Row 2: both converted C→T; alignment succeeds with 0 mismatches in three-letter space. Row 3: back to original coordinates with per-CpG methylation calls — filled circles at positions where the read retained C (methylated), open circles where the read has T (unmethylated).</desc>

  <defs>
    <marker id="arr-cobalt" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <text x="540" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">BISMARK · THREE-LETTER ALIGNMENT · DECODE IN REDUCED ALPHABET</text>

  <!-- ── Row 1: naive alignment ── -->
  <g>
    <rect x="40" y="50" width="1000" height="110" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="60" y="72" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">(1) Naive 4-letter alignment · original reference vs bisulfite read</text>

    <!-- Reference row -->
    <text x="60" y="102" font-family="Inter, sans-serif" font-size="9" fill="#525252">ref</text>
    <g transform="translate(90 82)" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" text-anchor="middle">
      <text x="10" y="20" fill="#c4342c">A</text><text x="30" y="20" fill="#c4342c">A</text><text x="50" y="20" fill="#2d7a3e">T</text>
      <text x="70" y="20" fill="#1e3a8a">C</text><text x="90" y="20" fill="#b45309">G</text>
      <text x="110" y="20" fill="#2d7a3e">T</text>
      <text x="130" y="20" fill="#1e3a8a">C</text><text x="150" y="20" fill="#b45309">G</text>
      <text x="170" y="20" fill="#c4342c">A</text><text x="190" y="20" fill="#c4342c">A</text><text x="210" y="20" fill="#b45309">G</text>
      <text x="230" y="20" fill="#1e3a8a">C</text><text x="250" y="20" fill="#b45309">G</text>
    </g>

    <!-- Read row with mismatches -->
    <text x="60" y="136" font-family="Inter, sans-serif" font-size="9" fill="#525252">read</text>
    <g transform="translate(90 116)" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" text-anchor="middle">
      <text x="10" y="20" fill="#c4342c">A</text><text x="30" y="20" fill="#c4342c">A</text><text x="50" y="20" fill="#2d7a3e">T</text>
      <!-- mismatch at C (4th base): T -->
      <rect x="62" y="4" width="16" height="22" fill="#fef2f2" stroke="#b91c1c" stroke-width="1"/>
      <text x="70" y="20" fill="#b91c1c">T</text>
      <text x="90" y="20" fill="#b45309">G</text>
      <text x="110" y="20" fill="#2d7a3e">T</text>
      <!-- C retained at 7th base (methylated) -->
      <text x="130" y="20" fill="#1e3a8a">C</text>
      <text x="150" y="20" fill="#b45309">G</text>
      <text x="170" y="20" fill="#c4342c">A</text><text x="190" y="20" fill="#c4342c">A</text><text x="210" y="20" fill="#b45309">G</text>
      <!-- mismatch at 12th base C → T -->
      <rect x="222" y="4" width="16" height="22" fill="#fef2f2" stroke="#b91c1c" stroke-width="1"/>
      <text x="230" y="20" fill="#b91c1c">T</text>
      <text x="250" y="20" fill="#b45309">G</text>
    </g>

    <!-- Mismatches callout -->
    <text x="400" y="136" font-family="JetBrains Mono, monospace" font-size="10" fill="#b91c1c" font-weight="600">2 mismatches at C positions</text>
    <text x="400" y="150" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" font-style="italic">(more at longer reads; BWA fails to align)</text>

    <text x="740" y="105" font-family="JetBrains Mono, monospace" font-size="10" fill="#b91c1c" font-weight="700">✗ NAIVE ALIGNMENT FAILS</text>
    <text x="740" y="120" font-family="Inter, sans-serif" font-size="9" fill="#525252">mismatches not random — structured at C</text>
  </g>

  <!-- Arrow -->
  <line x1="540" y1="172" x2="540" y2="198" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arr-cobalt)"/>
  <text x="560" y="188" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" font-weight="600">in silico: C → T on both</text>

  <!-- ── Row 2: three-letter alignment ── -->
  <g>
    <rect x="40" y="210" width="1000" height="110" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
    <text x="60" y="232" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">(2) Three-letter alignment · both converted C → T</text>

    <!-- Converted reference -->
    <text x="60" y="262" font-family="Inter, sans-serif" font-size="9" fill="#525252">ref (C→T)</text>
    <g transform="translate(110 242)" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" text-anchor="middle">
      <text x="10" y="20" fill="#525252">A</text><text x="30" y="20" fill="#525252">A</text><text x="50" y="20" fill="#525252">T</text>
      <text x="70" y="20" fill="#525252">T</text><text x="90" y="20" fill="#525252">G</text>
      <text x="110" y="20" fill="#525252">T</text>
      <text x="130" y="20" fill="#525252">T</text><text x="150" y="20" fill="#525252">G</text>
      <text x="170" y="20" fill="#525252">A</text><text x="190" y="20" fill="#525252">A</text><text x="210" y="20" fill="#525252">G</text>
      <text x="230" y="20" fill="#525252">T</text><text x="250" y="20" fill="#525252">G</text>
    </g>

    <!-- Converted read -->
    <text x="60" y="296" font-family="Inter, sans-serif" font-size="9" fill="#525252">read (C→T)</text>
    <g transform="translate(110 276)" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" text-anchor="middle">
      <text x="10" y="20" fill="#525252">A</text><text x="30" y="20" fill="#525252">A</text><text x="50" y="20" fill="#525252">T</text>
      <text x="70" y="20" fill="#525252">T</text><text x="90" y="20" fill="#525252">G</text>
      <text x="110" y="20" fill="#525252">T</text>
      <text x="130" y="20" fill="#525252">T</text><text x="150" y="20" fill="#525252">G</text>
      <text x="170" y="20" fill="#525252">A</text><text x="190" y="20" fill="#525252">A</text><text x="210" y="20" fill="#525252">G</text>
      <text x="230" y="20" fill="#525252">T</text><text x="250" y="20" fill="#525252">G</text>
    </g>

    <text x="740" y="262" font-family="JetBrains Mono, monospace" font-size="10" fill="#2d7a3e" font-weight="700">✓ THREE-LETTER MATCH</text>
    <text x="740" y="278" font-family="Inter, sans-serif" font-size="9" fill="#525252">0 mismatches in reduced alphabet</text>
    <text x="740" y="292" font-family="Inter, sans-serif" font-size="9" fill="#525252">position located</text>
  </g>

  <!-- Arrow -->
  <line x1="540" y1="332" x2="540" y2="358" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arr-cobalt)"/>
  <text x="560" y="348" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" font-weight="600">decode back in original coordinates at C positions</text>

  <!-- ── Row 3: decoding ── -->
  <g>
    <rect x="40" y="370" width="1000" height="80" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="60" y="392" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">(3) Decode · compare original read to reference at C positions</text>

    <!-- 3 CpG calls with circles -->
    <g transform="translate(150 420)">
      <!-- CpG 1: read has T → unmethylated -->
      <g>
        <text x="0" y="4" font-family="JetBrains Mono, monospace" font-size="11" fill="#525252">CpG 1:</text>
        <text x="58" y="4" font-family="JetBrains Mono, monospace" font-size="11" fill="#b45309">ref C · read T →</text>
        <circle cx="180" cy="0" r="5" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
        <text x="196" y="4" font-family="Inter, sans-serif" font-size="10" fill="#b45309" font-weight="600">unmethylated</text>
      </g>
      <!-- CpG 2: read has C → methylated -->
      <g transform="translate(320 0)">
        <text x="0" y="4" font-family="JetBrains Mono, monospace" font-size="11" fill="#525252">CpG 2:</text>
        <text x="58" y="4" font-family="JetBrains Mono, monospace" font-size="11" fill="#1e3a8a">ref C · read C →</text>
        <circle cx="180" cy="0" r="5" fill="#0a0a0a"/>
        <text x="196" y="4" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" font-weight="600">methylated</text>
      </g>
      <!-- CpG 3: read has T → unmethylated -->
      <g transform="translate(620 0)">
        <text x="0" y="4" font-family="JetBrains Mono, monospace" font-size="11" fill="#525252">CpG 3:</text>
        <text x="58" y="4" font-family="JetBrains Mono, monospace" font-size="11" fill="#b45309">ref C · read T →</text>
        <circle cx="180" cy="0" r="5" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
        <text x="196" y="4" font-family="Inter, sans-serif" font-size="10" fill="#b45309" font-weight="600">unmethylated</text>
      </g>
    </g>
  </g>
</svg>
