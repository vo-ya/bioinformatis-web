<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 440" role="img" aria-labelledby="t d">
  <title id="t">Long-read direct methylation calling</title>
  <desc id="d">Two platforms side by side plus a shared output pipeline below. Left: Oxford Nanopore pore threading DNA with a current trace showing steady state broken by a deeper deflection at a 5mC base. Right: PacBio HiFi polymerase with a nascent strand and an interpulse duration trace showing a longer pause at a 5mC position. Both signals feed into a neural-network basecaller producing per-position base and methylation probability.</desc>

  <defs>
    <marker id="arr-cobalt" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <text x="540" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">LONG-READ DIRECT METHYLATION · NO CHEMISTRY CONVERSION</text>

  <!-- ── Left panel: Nanopore ── -->
  <g>
    <rect x="30" y="50" width="480" height="240" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="270" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">(a) Oxford Nanopore · current deflection</text>

    <!-- Pore schematic -->
    <g transform="translate(90 100)">
      <!-- membrane -->
      <rect x="0" y="40" width="200" height="4" fill="#c4c1b6"/>
      <rect x="0" y="84" width="200" height="4" fill="#c4c1b6"/>
      <!-- pore -->
      <rect x="85" y="40" width="30" height="48" fill="#fef3c7" stroke="#b45309" stroke-width="1"/>
      <text x="100" y="70" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#b45309">pore</text>
      <!-- DNA threading -->
      <line x1="100" y1="10" x2="100" y2="130" stroke="#525252" stroke-width="2"/>
      <!-- bases moving through -->
      <g font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle" font-weight="700">
        <text x="100" y="16" fill="#c4342c">A</text>
        <text x="100" y="30" fill="#1e3a8a">C</text>
        <!-- 5mC (methylated C) -->
        <circle cx="108" cy="60" r="4" fill="#1e3a8a"/>
        <text x="100" y="63" fill="#1e3a8a">C</text>
        <text x="100" y="78" fill="#b45309">G</text>
        <text x="100" y="96" fill="#2d7a3e">T</text>
        <text x="100" y="112" fill="#c4342c">A</text>
        <text x="100" y="126" fill="#c4342c">A</text>
      </g>
      <text x="145" y="64" font-family="JetBrains Mono, monospace" font-size="8" fill="#1e3a8a" font-weight="700">5mC</text>
    </g>

    <!-- Current-vs-time trace -->
    <g transform="translate(310 130)">
      <line x1="0" y1="60" x2="170" y2="60" stroke="#c4c1b6" stroke-width="0.5"/>
      <text x="-8" y="0" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">pA</text>
      <text x="-8" y="60" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">0</text>

      <!-- Current trace with a deflection at 5mC -->
      <path d="M 0 40 L 18 38 L 22 42 L 30 38 L 45 42 L 52 38 L 60 42
               L 70 40 L 80 45 L 85 55 L 95 60 L 100 58 L 105 50 L 112 42
               L 125 40 L 135 42 L 145 38 L 155 42 L 170 40"
            fill="none" stroke="#1e3a8a" stroke-width="1.5"/>

      <!-- Highlighted deflection -->
      <rect x="78" y="38" width="32" height="28" fill="none" stroke="#b45309" stroke-width="1.2" stroke-dasharray="2 2"/>
      <text x="94" y="32" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#b45309" font-weight="600">5mC signature</text>
    </g>

    <text x="270" y="268" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">5mC produces a distinctive current signature</text>
    <text x="270" y="280" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">Dorado / Guppy model calls per-position probability</text>
  </g>

  <!-- ── Right panel: PacBio HiFi ── -->
  <g>
    <rect x="540" y="50" width="510" height="240" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="795" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">(b) PacBio HiFi · polymerase kinetics</text>

    <!-- Polymerase + nascent strand -->
    <g transform="translate(600 100)">
      <!-- Template strand -->
      <line x1="0" y1="30" x2="200" y2="30" stroke="#525252" stroke-width="2"/>
      <g font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle" font-weight="700">
        <text x="20" y="20" fill="#c4342c">A</text>
        <text x="40" y="20" fill="#b45309">G</text>
        <text x="60" y="20" fill="#2d7a3e">T</text>
        <text x="80" y="20" fill="#1e3a8a">C</text>
        <text x="100" y="20" fill="#b45309">G</text>
        <text x="120" y="20" fill="#c4342c">A</text>
        <text x="140" y="20" fill="#c4342c">A</text>
        <text x="160" y="20" fill="#2d7a3e">T</text>
        <text x="180" y="20" fill="#b45309">G</text>
      </g>
      <!-- Nascent (complementary) with 5mC -->
      <line x1="0" y1="55" x2="180" y2="55" stroke="#525252" stroke-width="2" stroke-dasharray="2 2"/>
      <g font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle" font-weight="700">
        <text x="20" y="68" fill="#2d7a3e">T</text>
        <text x="40" y="68" fill="#1e3a8a">C</text>
        <text x="60" y="68" fill="#c4342c">A</text>
        <!-- 5mC at this position -->
        <circle cx="80" cy="74" r="4" fill="#1e3a8a"/>
        <text x="80" y="68" fill="#1e3a8a">C</text>
        <text x="100" y="68" fill="#1e3a8a">C</text>
        <text x="120" y="68" fill="#2d7a3e">T</text>
        <text x="140" y="68" fill="#2d7a3e">T</text>
        <text x="160" y="68" fill="#c4342c">A</text>
      </g>
      <!-- Polymerase blob -->
      <circle cx="175" cy="42" r="14" fill="#0d7377" opacity="0.7"/>
      <text x="175" y="46" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#ffffff">pol</text>
      <text x="80" y="94" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#1e3a8a" font-weight="700">5mC</text>
    </g>

    <!-- IPD trace -->
    <g transform="translate(820 130)">
      <line x1="0" y1="60" x2="200" y2="60" stroke="#c4c1b6" stroke-width="0.5"/>
      <text x="-8" y="0" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">IPD</text>
      <text x="-8" y="60" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">0</text>

      <!-- IPD spikes, longer pause at 5mC -->
      <path d="M 0 55 L 5 42 L 10 55
               L 22 55 L 27 38 L 32 55
               L 45 55 L 50 40 L 55 55
               L 68 55 L 73 14 L 80 14 L 86 55
               L 98 55 L 103 42 L 108 55
               L 120 55 L 125 38 L 130 55
               L 145 55 L 150 42 L 155 55
               L 170 55 L 175 38 L 180 55
               L 195 55 L 200 42"
            fill="none" stroke="#1e3a8a" stroke-width="1.5"/>

      <!-- highlight 5mC slowdown -->
      <rect x="68" y="12" width="22" height="48" fill="none" stroke="#b45309" stroke-width="1.2" stroke-dasharray="2 2"/>
      <text x="79" y="8" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#b45309" font-weight="600">pol slows at 5mC</text>
    </g>

    <text x="795" y="268" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">polymerase interpulse duration lengthens at 5mC</text>
    <text x="795" y="280" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">SMRTLink model infers per-position modification</text>
  </g>

  <!-- ── Pipeline output ── -->
  <g transform="translate(30 310)">
    <rect x="0" y="0" width="1020" height="110" rx="6" fill="#f6f4ee" stroke="#c4c1b6"/>
    <text x="510" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">Neural-network basecaller · both platforms</text>

    <!-- Input signals -->
    <g transform="translate(40 40)">
      <rect x="0" y="0" width="180" height="50" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
      <text x="90" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" font-weight="600">raw signal</text>
      <text x="90" y="38" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">(current / kinetics)</text>
    </g>

    <line x1="225" y1="65" x2="285" y2="65" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arr-cobalt)"/>

    <!-- NN box -->
    <g transform="translate(290 40)">
      <rect x="0" y="0" width="320" height="50" rx="4" fill="#ffffff" stroke="#1e3a8a" stroke-width="1.5"/>
      <text x="160" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" font-weight="600">methylation-aware basecaller</text>
      <text x="160" y="38" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">Dorado · SMRTLink · &gt;95% per-CpG accuracy</text>
    </g>

    <line x1="615" y1="65" x2="675" y2="65" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arr-cobalt)"/>

    <!-- Output -->
    <g transform="translate(680 40)">
      <rect x="0" y="0" width="300" height="50" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
      <text x="150" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" font-weight="600">base + modification probability</text>
      <text x="150" y="38" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">per position · all in one pass</text>
    </g>
  </g>
</svg>
