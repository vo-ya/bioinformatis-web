<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="t d">
  <title id="t">Beta distributions for methylation proportions</title>
  <desc id="d">A single plot of four Beta density curves over p from 0 to 1. Beta(1,1) shown as a flat uniform dashed curve. Beta(2,8) peaked near p=0.2 in cobalt, labelled 'likely unmethylated'. Beta(8,2) peaked near p=0.8 in red, labelled 'likely methylated'. Beta(20,20) peaked near p=0.5 in amber, labelled 'intermediate / mixed'. Legend with coloured swatches, a callout describing the Beta-Binomial posterior update rule, and axis labels.</desc>

  <text x="480" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">BETA DISTRIBUTIONS · THE CONJUGATE PRIOR FOR PROPORTIONS IN [0, 1]</text>

  <!-- Plot frame -->
  <rect x="80" y="60" width="680" height="280" fill="#ffffff" stroke="#c4c1b6"/>

  <!-- Axes -->
  <line x1="80" y1="340" x2="760" y2="340" stroke="#525252" stroke-width="1"/>
  <line x1="80" y1="60" x2="80" y2="340" stroke="#525252" stroke-width="1"/>

  <!-- Grid lines -->
  <g stroke="#e5e3dc" stroke-width="0.5">
    <line x1="216" y1="60" x2="216" y2="340"/>
    <line x1="352" y1="60" x2="352" y2="340"/>
    <line x1="488" y1="60" x2="488" y2="340"/>
    <line x1="624" y1="60" x2="624" y2="340"/>
    <line x1="80" y1="270" x2="760" y2="270"/>
    <line x1="80" y1="200" x2="760" y2="200"/>
    <line x1="80" y1="130" x2="760" y2="130"/>
  </g>

  <!-- X-axis ticks -->
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">
    <text x="80" y="358">0</text>
    <text x="216" y="358">0.2</text>
    <text x="352" y="358">0.4</text>
    <text x="488" y="358">0.6</text>
    <text x="624" y="358">0.8</text>
    <text x="760" y="358">1.0</text>
  </g>
  <text x="420" y="380" text-anchor="middle" font-family="Source Serif 4, serif" font-size="13" font-style="italic" fill="#525252">p (methylation proportion)</text>

  <!-- Y-axis label -->
  <text x="48" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#525252" transform="rotate(-90 48 200)">density</text>

  <!-- Y-axis ticks -->
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="end">
    <text x="74" y="344">0</text>
    <text x="74" y="274">1</text>
    <text x="74" y="204">2</text>
    <text x="74" y="134">3</text>
    <text x="74" y="64">4</text>
  </g>

  <!-- Beta(1,1) = uniform -->
  <line x1="80" y1="270" x2="760" y2="270" stroke="#525252" stroke-width="1.5" stroke-dasharray="5 3"/>

  <!-- Beta(2,8): peaked near p=0.2, mode = 1/8 = 0.125, max density ~3.5 -->
  <!-- Key points: (0, 0), (0.1, 3), (0.2, 3.2), (0.3, 2.2), (0.5, 0.9), (0.7, 0.2), (1, 0) -->
  <path d="M 80 340
           L 120 180 L 160 85 L 216 70 L 270 120 L 352 200 L 420 240 L 488 270 L 560 300 L 624 325 L 720 338 L 760 340 L 760 340 L 80 340 Z"
        fill="#1e3a8a" fill-opacity="0.25" stroke="#1e3a8a" stroke-width="2"/>

  <!-- Beta(8,2): peaked near p=0.8 (mirror of above) -->
  <path d="M 80 340
           L 200 338 L 280 335 L 352 325 L 420 300 L 488 270 L 560 240 L 624 200 L 688 85 L 720 70 L 760 180 L 760 340 L 80 340 Z"
        fill="#c4342c" fill-opacity="0.25" stroke="#c4342c" stroke-width="2"/>

  <!-- Beta(20,20): peaked near p=0.5, narrow and tall -->
  <!-- Peak density ~5, but clip at ~3.5 in our scale; make it peaked sharply at 0.5 -->
  <path d="M 80 340
           L 200 340 L 280 325 L 330 280 L 370 180 L 420 105 L 440 90 L 470 105 L 510 180 L 560 280 L 610 325 L 680 340 L 760 340 L 760 340 L 80 340 Z"
        fill="#b45309" fill-opacity="0.25" stroke="#b45309" stroke-width="2"/>

  <!-- Curve labels -->
  <g font-family="Inter, sans-serif" font-size="10" font-weight="600">
    <text x="180" y="80" fill="#1e3a8a">Beta(2, 8)</text>
    <text x="180" y="93" fill="#525252" font-weight="400" font-style="italic">likely unmethylated</text>

    <text x="700" y="80" fill="#c4342c" text-anchor="end">Beta(8, 2)</text>
    <text x="700" y="93" fill="#525252" font-weight="400" font-style="italic" text-anchor="end">likely methylated</text>

    <text x="440" y="80" fill="#b45309" text-anchor="middle">Beta(20, 20)</text>
    <text x="440" y="93" fill="#525252" font-weight="400" font-style="italic" text-anchor="middle">intermediate / mixed</text>

    <text x="520" y="280" fill="#525252">Beta(1, 1) = uniform prior</text>
  </g>

  <!-- Legend on the right -->
  <g transform="translate(780 70)">
    <rect x="0" y="0" width="168" height="140" rx="4" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="12" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">Beta(α, β)</text>
    <text x="12" y="38" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">mean = α / (α + β)</text>
    <text x="12" y="54" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">var  ∝ 1 / (α + β + 1)</text>

    <line x1="12" y1="70" x2="156" y2="70" stroke="#c4c1b6" stroke-width="0.5"/>

    <text x="12" y="88" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b45309">posterior update:</text>
    <text x="12" y="104" font-family="JetBrains Mono, monospace" font-size="9" fill="#0a0a0a">Beta(α+m, β+n−m)</text>
    <text x="12" y="118" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">given m methylated</text>
    <text x="12" y="130" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">of n total reads</text>
  </g>
</svg>
