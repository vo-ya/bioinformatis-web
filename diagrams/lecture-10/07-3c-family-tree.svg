<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 360" role="img" aria-labelledby="t d">
  <title id="t">3C → Hi-C family tree</title>
  <desc id="d">Five boxes in a left-to-right timeline connected by arrows: 3C (2002, one vs one), 4C (2006, one vs all), 5C (2006, many vs many preselected), Hi-C (2009, all vs all restriction), Micro-C (2015, all vs all nucleosomal). Each box annotated with achievable resolution and year. A dimension axis at the bottom shows 'pairs measured per experiment' growing from 1 to 10^10 across the family.</desc>

  <defs>
    <marker id="arr-accent" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <text x="540" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">PROXIMITY-CAPTURE ASSAY GENEALOGY · ONE-VS-ONE → ALL-VS-ALL</text>

  <!-- Five boxes -->

  <!-- 3C -->
  <g transform="translate(40 70)">
    <rect x="0" y="0" width="180" height="140" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="90" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a">3C</text>
    <text x="90" y="40" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">Dekker 2002</text>

    <!-- Tiny cartoon: two loci, one pair read out -->
    <g transform="translate(60 60)">
      <circle cx="0" cy="0" r="5" fill="#c4342c"/>
      <circle cx="50" cy="0" r="5" fill="#b45309"/>
      <line x1="6" y1="0" x2="44" y2="0" stroke="#525252" stroke-width="1" stroke-dasharray="2 2"/>
    </g>
    <text x="90" y="105" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a" font-weight="600">one vs one</text>
    <text x="90" y="122" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">PCR per pair</text>
  </g>

  <line x1="225" y1="140" x2="245" y2="140" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arr-accent)"/>

  <!-- 4C -->
  <g transform="translate(250 70)">
    <rect x="0" y="0" width="180" height="140" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="90" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a">4C</text>
    <text x="90" y="40" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">Simonis 2006</text>

    <!-- One viewpoint → many -->
    <g transform="translate(90 75)">
      <circle cx="0" cy="0" r="6" fill="#c4342c"/>
      <g stroke="#525252" stroke-width="1" fill="none" stroke-dasharray="2 2">
        <line x1="0" y1="0" x2="-40" y2="-15"/>
        <line x1="0" y1="0" x2="40" y2="-12"/>
        <line x1="0" y1="0" x2="-30" y2="18"/>
        <line x1="0" y1="0" x2="35" y2="18"/>
        <line x1="0" y1="0" x2="0" y2="-22"/>
      </g>
      <circle cx="-40" cy="-15" r="3" fill="#b45309"/>
      <circle cx="40" cy="-12" r="3" fill="#b45309"/>
      <circle cx="-30" cy="18" r="3" fill="#b45309"/>
      <circle cx="35" cy="18" r="3" fill="#b45309"/>
      <circle cx="0" cy="-22" r="3" fill="#b45309"/>
    </g>
    <text x="90" y="118" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a" font-weight="600">one vs all</text>
    <text x="90" y="130" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">inverse PCR</text>
  </g>

  <line x1="435" y1="140" x2="455" y2="140" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arr-accent)"/>

  <!-- 5C -->
  <g transform="translate(460 70)">
    <rect x="0" y="0" width="180" height="140" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="90" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a">5C</text>
    <text x="90" y="40" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">Dostie 2006</text>

    <!-- Grid of selected loci (3×3) -->
    <g transform="translate(60 56)">
      <g fill="#c4342c">
        <circle cx="0" cy="0" r="3"/><circle cx="20" cy="0" r="3"/><circle cx="40" cy="0" r="3"/>
        <circle cx="0" cy="20" r="3"/><circle cx="20" cy="20" r="3"/><circle cx="40" cy="20" r="3"/>
        <circle cx="0" cy="40" r="3"/><circle cx="20" cy="40" r="3"/><circle cx="40" cy="40" r="3"/>
      </g>
    </g>
    <text x="90" y="118" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a" font-weight="600">many vs many</text>
    <text x="90" y="130" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">up to 6 × 10⁵ pairs</text>
  </g>

  <line x1="645" y1="140" x2="665" y2="140" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arr-accent)"/>

  <!-- Hi-C -->
  <g transform="translate(670 70)">
    <rect x="0" y="0" width="180" height="140" rx="6" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
    <text x="90" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#b45309">Hi-C</text>
    <text x="90" y="40" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">Lieberman-Aiden 2009</text>

    <!-- Full matrix icon -->
    <g transform="translate(60 55)">
      <rect x="0" y="0" width="60" height="40" fill="#b45309" opacity="0.25" stroke="#b45309"/>
      <!-- Diagonal -->
      <line x1="0" y1="0" x2="60" y2="40" stroke="#b45309" stroke-width="1.5"/>
      <g fill="#b45309" opacity="0.6">
        <rect x="5" y="5" width="4" height="4"/>
        <rect x="15" y="15" width="4" height="4"/>
        <rect x="25" y="25" width="4" height="4"/>
        <rect x="35" y="35" width="4" height="4"/>
      </g>
    </g>
    <text x="90" y="118" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a" font-weight="600">all vs all</text>
    <text x="90" y="130" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">~10 kb resolution</text>
  </g>

  <line x1="855" y1="140" x2="875" y2="140" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arr-accent)"/>

  <!-- Micro-C -->
  <g transform="translate(880 70)">
    <rect x="0" y="0" width="180" height="140" rx="6" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
    <text x="90" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#b45309">Micro-C</text>
    <text x="90" y="40" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">Hsieh 2015</text>

    <!-- Denser matrix -->
    <g transform="translate(60 55)">
      <rect x="0" y="0" width="60" height="40" fill="#b45309" opacity="0.3" stroke="#b45309"/>
      <line x1="0" y1="0" x2="60" y2="40" stroke="#b45309" stroke-width="1.5"/>
      <g fill="#b45309" opacity="0.7">
        <rect x="3" y="3" width="3" height="3"/>
        <rect x="8" y="8" width="3" height="3"/>
        <rect x="13" y="13" width="3" height="3"/>
        <rect x="18" y="18" width="3" height="3"/>
        <rect x="23" y="23" width="3" height="3"/>
        <rect x="28" y="28" width="3" height="3"/>
        <rect x="33" y="33" width="3" height="3"/>
        <rect x="18" y="3" width="3" height="3"/>
        <rect x="38" y="18" width="3" height="3"/>
      </g>
    </g>
    <text x="90" y="118" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a" font-weight="600">all vs all · MNase</text>
    <text x="90" y="130" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">~200 bp resolution</text>
  </g>

  <!-- Dimension axis at bottom -->
  <g transform="translate(0 250)">
    <text x="60" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252">pairs measured per experiment →</text>
    <line x1="60" y1="40" x2="1020" y2="40" stroke="#525252" stroke-width="1"/>

    <!-- Log ticks -->
    <g stroke="#525252" stroke-width="0.8">
      <line x1="130" y1="40" x2="130" y2="46"/>
      <line x1="340" y1="40" x2="340" y2="46"/>
      <line x1="550" y1="40" x2="550" y2="46"/>
      <line x1="760" y1="40" x2="760" y2="46"/>
      <line x1="970" y1="40" x2="970" y2="46"/>
    </g>
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">
      <text x="130" y="58">10¹</text>
      <text x="340" y="58">10⁴</text>
      <text x="550" y="58">10⁶</text>
      <text x="760" y="58">10⁹</text>
      <text x="970" y="58">10¹⁰</text>
    </g>
  </g>

  <!-- Bottom caption -->
  <text x="540" y="340" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#8a8a85" font-style="italic">Each generation adds a dimension. Hi-C was the jump from preselected pairs to the full contact matrix.</text>
</svg>
