<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 440" role="img" aria-labelledby="t d">
  <title id="t">Hi-C library protocol</title>
  <desc id="d">Six-step protocol schematic. Step 1: crosslink nucleus with formaldehyde, forming covalent bonds between nearby fragments. Step 2: restriction digest. Step 3: fill-in and biotin-label with Klenow polymerase; biotin shown as orange triangles. Step 4: T4 ligase joins adjacent ends preferentially in 3D proximity, producing chimeric fragments. Step 5: shearing then streptavidin pulldown. Step 6: paired-end Illumina sequencing; two reads map to two distinct genomic positions; one entry added to the contact matrix.</desc>

  <defs>
    <marker id="arr-cobalt" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <text x="540" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">HI-C PROTOCOL · SIX STEPS FROM CELLS TO CONTACT MATRIX</text>

  <!-- Panel helper dimensions: 6 panels in a row of width 1020 px → each 170 px wide starting at 30 -->

  <!-- ── Step 1: Crosslink ── -->
  <g transform="translate(30 60)">
    <rect x="0" y="0" width="160" height="170" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.2"/>
    <text x="80" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a">1. Crosslink</text>

    <!-- Nucleus outline -->
    <ellipse cx="80" cy="95" rx="60" ry="50" fill="#ffffff" stroke="#525252" stroke-width="1.2"/>
    <!-- Chromatin loops inside -->
    <path d="M 35 100 Q 45 75, 65 85 Q 85 95, 100 75 Q 115 60, 125 85" fill="none" stroke="#525252" stroke-width="1"/>
    <path d="M 40 115 Q 60 130, 80 115 Q 100 100, 120 115" fill="none" stroke="#525252" stroke-width="1"/>
    <!-- Crosslinks -->
    <g stroke="#b45309" stroke-width="1.5">
      <line x1="65" y1="85" x2="75" y2="90"/>
      <line x1="100" y1="75" x2="95" y2="82"/>
      <line x1="80" y1="115" x2="90" y2="110"/>
    </g>
    <text x="80" y="163" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">+ HCHO</text>
  </g>
  <line x1="195" y1="145" x2="210" y2="145" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arr-cobalt)"/>

  <!-- ── Step 2: Digest ── -->
  <g transform="translate(215 60)">
    <rect x="0" y="0" width="160" height="170" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.2"/>
    <text x="80" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a">2. Digest</text>

    <!-- DNA with scissors -->
    <g transform="translate(20 70)">
      <line x1="0" y1="20" x2="120" y2="20" stroke="#525252" stroke-width="2"/>
      <!-- Cut marks -->
      <line x1="30" y1="10" x2="30" y2="30" stroke="#c4342c" stroke-width="1.5"/>
      <line x1="70" y1="10" x2="70" y2="30" stroke="#c4342c" stroke-width="1.5"/>
      <line x1="105" y1="10" x2="105" y2="30" stroke="#c4342c" stroke-width="1.5"/>
      <!-- Scissors icon at one cut -->
      <g transform="translate(70 -5)" fill="none" stroke="#c4342c" stroke-width="1.2">
        <circle cx="-3" cy="-3" r="4"/>
        <circle cx="3" cy="-3" r="4"/>
        <line x1="-3" y1="1" x2="3" y2="10"/>
        <line x1="3" y1="1" x2="-3" y2="10"/>
      </g>
    </g>
    <text x="80" y="145" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">MboI / DpnII / HindIII</text>
    <text x="80" y="160" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">sticky ends</text>
  </g>
  <line x1="380" y1="145" x2="395" y2="145" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arr-cobalt)"/>

  <!-- ── Step 3: Fill-in + biotin ── -->
  <g transform="translate(400 60)">
    <rect x="0" y="0" width="160" height="170" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.2"/>
    <text x="80" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a">3. Biotin fill-in</text>

    <!-- Fragment with biotin triangles on ends -->
    <g transform="translate(15 60)">
      <!-- Fragment 1 -->
      <line x1="0" y1="20" x2="55" y2="20" stroke="#525252" stroke-width="2"/>
      <polygon points="-5,13 -5,27 5,20" fill="#b45309"/>
      <polygon points="60,13 60,27 50,20" fill="#b45309"/>
      <!-- Fragment 2 -->
      <line x1="75" y1="50" x2="130" y2="50" stroke="#525252" stroke-width="2"/>
      <polygon points="70,43 70,57 80,50" fill="#b45309"/>
      <polygon points="135,43 135,57 125,50" fill="#b45309"/>
    </g>
    <text x="80" y="145" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">Klenow + biotin-dCTP</text>
    <text x="80" y="160" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#b45309" font-weight="600">▶ biotin tag</text>
  </g>
  <line x1="565" y1="145" x2="580" y2="145" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arr-cobalt)"/>

  <!-- ── Step 4: Proximity ligation ── -->
  <g transform="translate(585 60)">
    <rect x="0" y="0" width="160" height="170" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.2"/>
    <text x="80" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a">4. Ligate</text>

    <!-- Chimeric fragment -->
    <g transform="translate(15 85)">
      <!-- Left half (locus i) -->
      <line x1="0" y1="0" x2="55" y2="0" stroke="#c4342c" stroke-width="2.5"/>
      <!-- Junction with biotin -->
      <polygon points="55,-7 55,7 65,0" fill="#b45309"/>
      <polygon points="75,-7 75,7 65,0" fill="#b45309"/>
      <!-- Right half (locus j) -->
      <line x1="75" y1="0" x2="130" y2="0" stroke="#b45309" stroke-width="2.5"/>
      <!-- Junction callout -->
      <text x="65" y="-16" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#b45309" font-weight="600">junction</text>
      <!-- Labels -->
      <text x="27" y="20" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#c4342c">locus i</text>
      <text x="103" y="20" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#b45309">locus j</text>
    </g>
    <text x="80" y="155" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">close in 3D → ligated</text>
  </g>
  <line x1="750" y1="145" x2="765" y2="145" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arr-cobalt)"/>

  <!-- ── Step 5: Shear + pulldown ── -->
  <g transform="translate(770 60)">
    <rect x="0" y="0" width="160" height="170" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.2"/>
    <text x="80" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a">5. Pulldown</text>

    <!-- Streptavidin beads -->
    <g transform="translate(20 60)">
      <circle cx="25" cy="20" r="14" fill="#c4c1b6" stroke="#525252" stroke-width="1"/>
      <circle cx="60" cy="40" r="14" fill="#c4c1b6" stroke="#525252" stroke-width="1"/>
      <circle cx="95" cy="20" r="14" fill="#c4c1b6" stroke="#525252" stroke-width="1"/>
      <!-- Biotin triangles attached -->
      <polygon points="23,8 28,18 19,18" fill="#b45309"/>
      <polygon points="58,28 63,38 54,38" fill="#b45309"/>
      <polygon points="93,8 98,18 89,18" fill="#b45309"/>
      <!-- Fragment attached -->
      <line x1="25" y1="20" x2="45" y2="5" stroke="#525252" stroke-width="1.5"/>
      <line x1="60" y1="40" x2="80" y2="60" stroke="#525252" stroke-width="1.5"/>
      <line x1="95" y1="20" x2="115" y2="10" stroke="#525252" stroke-width="1.5"/>
    </g>
    <text x="80" y="145" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">streptavidin beads</text>
    <text x="80" y="160" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">only biotin-tagged kept</text>
  </g>
  <line x1="935" y1="145" x2="950" y2="145" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arr-cobalt)"/>

  <!-- ── Step 6: Sequence + matrix ── -->
  <g transform="translate(950 60)">
    <rect x="-40" y="0" width="160" height="170" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.2"/>
    <text x="40" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1e3a8a">6. PE seq</text>

    <!-- Paired-end reads -->
    <g transform="translate(-25 65)">
      <rect x="0" y="0" width="30" height="5" fill="#c4342c"/>
      <rect x="0" y="7" width="30" height="5" fill="#c4342c"/>
      <rect x="90" y="0" width="30" height="5" fill="#b45309"/>
      <rect x="90" y="7" width="30" height="5" fill="#b45309"/>
      <!-- Mapping arrows -->
      <line x1="15" y1="20" x2="15" y2="34" stroke="#1e3a8a" stroke-width="1" marker-end="url(#arr-cobalt)"/>
      <line x1="105" y1="20" x2="105" y2="34" stroke="#1e3a8a" stroke-width="1" marker-end="url(#arr-cobalt)"/>
      <!-- Genome positions -->
      <text x="15" y="50" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#1e3a8a">chr1:A</text>
      <text x="105" y="50" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#1e3a8a">chr5:B</text>
    </g>
    <text x="40" y="145" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#0a0a0a" font-weight="600">C[A, B] += 1</text>
    <text x="40" y="160" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">entry added to matrix</text>
  </g>

  <!-- Bottom caption -->
  <g transform="translate(30 270)">
    <rect x="0" y="0" width="1020" height="150" rx="6" fill="#f6f4ee" stroke="#c4c1b6"/>

    <text x="510" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">Reading the output</text>

    <g transform="translate(60 45)" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">
      <text x="0" y="0" font-weight="600">Input:</text>
      <text x="52" y="0">intact cells in a 1.5 mL tube</text>

      <text x="0" y="22" font-weight="600">Output:</text>
      <text x="52" y="22">paired-end reads → ~500M per sample → ~10 kb resolution contact matrix</text>

      <text x="0" y="44" font-weight="600">Key:</text>
      <text x="52" y="44">the biotin pulldown ensures we see only fragments containing a <tspan fill="#b45309" font-weight="600">ligation junction</tspan> between two loci that were in 3D proximity at the moment of crosslinking.</text>

      <text x="0" y="74" font-style="italic" fill="#525252">Each read-pair's two genomic positions become one entry in the N × N contact matrix C[i, j].</text>
    </g>
  </g>
</svg>
