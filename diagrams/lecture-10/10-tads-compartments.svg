<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 480" role="img" aria-labelledby="t d">
  <title id="t">TADs and A/B compartments</title>
  <desc id="d">A large contact-matrix heatmap of a ~10 Mb region showing three feature scales simultaneously. Large-scale: plaid A/B compartment checkerboard across the full matrix. Medium-scale: ~10 triangular TAD blocks along the diagonal, each 300 kb to 1 Mb. Small-scale: four bright focal 'loop' spots near TAD corners. Annotations label each scale with its size range. Below the matrix: a 1D insulation-score track with local minima marked as TAD boundaries via small downward-pointing triangles.</desc>

  <text x="540" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">THREE FEATURE SCALES · COMPARTMENTS · TADs · LOOPS</text>

  <!-- Matrix panel (500×400 cells area) -->
  <g transform="translate(80 50)">
    <rect x="0" y="0" width="600" height="300" fill="#ffffff" stroke="#c4c1b6"/>

    <!-- Background compartment checkerboard -->
    <!-- Matrix is 60 bins × 60 bins, cells 10×5 px -->
    <!-- Compartment stripes: alternating A/B blocks of 8 bins -->

    <!-- A compartment cells (brighter accent) -->
    <g fill="#1e3a8a" opacity="0.2">
      <!-- Block pattern: A at bins 0-7, 16-23, 32-39, 48-55. B at 8-15, 24-31, 40-47, 56-59 -->
      <!-- A-A blocks (both indices in A): brighter -->
      <rect x="0" y="0" width="80" height="40"/>
      <rect x="160" y="0" width="80" height="40"/>
      <rect x="320" y="0" width="80" height="40"/>
      <rect x="480" y="0" width="80" height="40"/>

      <rect x="0" y="80" width="80" height="40"/>
      <rect x="160" y="80" width="80" height="40"/>
      <rect x="320" y="80" width="80" height="40"/>
      <rect x="480" y="80" width="80" height="40"/>

      <rect x="0" y="160" width="80" height="40"/>
      <rect x="160" y="160" width="80" height="40"/>
      <rect x="320" y="160" width="80" height="40"/>
      <rect x="480" y="160" width="80" height="40"/>

      <rect x="0" y="240" width="80" height="40"/>
      <rect x="160" y="240" width="80" height="40"/>
      <rect x="320" y="240" width="80" height="40"/>
      <rect x="480" y="240" width="80" height="40"/>
    </g>

    <!-- B compartment cells (muted) -->
    <g fill="#b45309" opacity="0.15">
      <rect x="80" y="40" width="80" height="40"/>
      <rect x="240" y="40" width="80" height="40"/>
      <rect x="400" y="40" width="80" height="40"/>

      <rect x="80" y="120" width="80" height="40"/>
      <rect x="240" y="120" width="80" height="40"/>
      <rect x="400" y="120" width="80" height="40"/>

      <rect x="80" y="200" width="80" height="40"/>
      <rect x="240" y="200" width="80" height="40"/>
      <rect x="400" y="200" width="80" height="40"/>
    </g>

    <!-- Bright diagonal -->
    <g fill="#1e3a8a" opacity="0.8">
      <rect x="0" y="0" width="10" height="5"/><rect x="10" y="5" width="10" height="5"/>
      <rect x="20" y="10" width="10" height="5"/><rect x="30" y="15" width="10" height="5"/>
      <rect x="40" y="20" width="10" height="5"/><rect x="50" y="25" width="10" height="5"/>
      <rect x="60" y="30" width="10" height="5"/><rect x="70" y="35" width="10" height="5"/>
      <rect x="80" y="40" width="10" height="5"/><rect x="90" y="45" width="10" height="5"/>
      <rect x="100" y="50" width="10" height="5"/><rect x="110" y="55" width="10" height="5"/>
      <rect x="120" y="60" width="10" height="5"/><rect x="130" y="65" width="10" height="5"/>
      <rect x="140" y="70" width="10" height="5"/><rect x="150" y="75" width="10" height="5"/>
      <rect x="160" y="80" width="10" height="5"/><rect x="170" y="85" width="10" height="5"/>
      <rect x="180" y="90" width="10" height="5"/><rect x="190" y="95" width="10" height="5"/>
      <rect x="200" y="100" width="10" height="5"/><rect x="210" y="105" width="10" height="5"/>
      <rect x="220" y="110" width="10" height="5"/><rect x="230" y="115" width="10" height="5"/>
      <rect x="240" y="120" width="10" height="5"/><rect x="250" y="125" width="10" height="5"/>
      <rect x="260" y="130" width="10" height="5"/><rect x="270" y="135" width="10" height="5"/>
      <rect x="280" y="140" width="10" height="5"/><rect x="290" y="145" width="10" height="5"/>
      <rect x="300" y="150" width="10" height="5"/><rect x="310" y="155" width="10" height="5"/>
      <rect x="320" y="160" width="10" height="5"/><rect x="330" y="165" width="10" height="5"/>
      <rect x="340" y="170" width="10" height="5"/><rect x="350" y="175" width="10" height="5"/>
      <rect x="360" y="180" width="10" height="5"/><rect x="370" y="185" width="10" height="5"/>
      <rect x="380" y="190" width="10" height="5"/><rect x="390" y="195" width="10" height="5"/>
      <rect x="400" y="200" width="10" height="5"/><rect x="410" y="205" width="10" height="5"/>
      <rect x="420" y="210" width="10" height="5"/><rect x="430" y="215" width="10" height="5"/>
      <rect x="440" y="220" width="10" height="5"/><rect x="450" y="225" width="10" height="5"/>
      <rect x="460" y="230" width="10" height="5"/><rect x="470" y="235" width="10" height="5"/>
      <rect x="480" y="240" width="10" height="5"/><rect x="490" y="245" width="10" height="5"/>
      <rect x="500" y="250" width="10" height="5"/><rect x="510" y="255" width="10" height="5"/>
      <rect x="520" y="260" width="10" height="5"/><rect x="530" y="265" width="10" height="5"/>
      <rect x="540" y="270" width="10" height="5"/><rect x="550" y="275" width="10" height="5"/>
      <rect x="560" y="280" width="10" height="5"/><rect x="570" y="285" width="10" height="5"/>
      <rect x="580" y="290" width="10" height="5"/><rect x="590" y="295" width="10" height="5"/>
    </g>

    <!-- Triangular TAD blocks along diagonal -->
    <!-- TAD 1: bins 0-9 -->
    <g fill="#1e3a8a" opacity="0.6">
      <rect x="10" y="0" width="10" height="5"/><rect x="20" y="0" width="10" height="5"/><rect x="30" y="0" width="10" height="5"/><rect x="40" y="0" width="10" height="5"/>
      <rect x="20" y="5" width="10" height="5"/><rect x="30" y="5" width="10" height="5"/><rect x="40" y="5" width="10" height="5"/>
      <rect x="30" y="10" width="10" height="5"/><rect x="40" y="10" width="10" height="5"/>
      <rect x="50" y="15" width="10" height="5"/><rect x="60" y="20" width="10" height="5"/>
      <rect x="70" y="25" width="10" height="5"/><rect x="80" y="30" width="10" height="5"/>
      <rect x="80" y="35" width="10" height="5"/>
    </g>
    <!-- TAD 2: bins 10-19 -->
    <g fill="#1e3a8a" opacity="0.55">
      <rect x="110" y="50" width="10" height="5"/><rect x="120" y="50" width="10" height="5"/>
      <rect x="120" y="55" width="10" height="5"/><rect x="130" y="55" width="10" height="5"/>
      <rect x="130" y="60" width="10" height="5"/><rect x="140" y="60" width="10" height="5"/>
      <rect x="140" y="65" width="10" height="5"/><rect x="150" y="65" width="10" height="5"/>
      <rect x="150" y="70" width="10" height="5"/><rect x="160" y="70" width="10" height="5"/>
      <rect x="170" y="75" width="10" height="5"/><rect x="180" y="80" width="10" height="5"/>
    </g>
    <!-- TAD 3: bins 20-30 -->
    <g fill="#1e3a8a" opacity="0.55">
      <rect x="210" y="100" width="10" height="5"/><rect x="220" y="100" width="10" height="5"/>
      <rect x="220" y="105" width="10" height="5"/><rect x="230" y="105" width="10" height="5"/>
      <rect x="240" y="110" width="10" height="5"/><rect x="250" y="110" width="10" height="5"/>
      <rect x="250" y="115" width="10" height="5"/><rect x="260" y="115" width="10" height="5"/>
      <rect x="260" y="120" width="10" height="5"/><rect x="270" y="125" width="10" height="5"/>
      <rect x="280" y="130" width="10" height="5"/>
    </g>
    <!-- TAD 4: bins 30-42 -->
    <g fill="#1e3a8a" opacity="0.55">
      <rect x="310" y="150" width="10" height="5"/><rect x="320" y="150" width="10" height="5"/>
      <rect x="330" y="155" width="10" height="5"/><rect x="340" y="160" width="10" height="5"/>
      <rect x="340" y="165" width="10" height="5"/><rect x="350" y="165" width="10" height="5"/>
      <rect x="360" y="170" width="10" height="5"/><rect x="370" y="175" width="10" height="5"/>
      <rect x="380" y="180" width="10" height="5"/><rect x="390" y="185" width="10" height="5"/>
      <rect x="400" y="190" width="10" height="5"/>
    </g>
    <!-- TAD 5: bins 43-58 -->
    <g fill="#1e3a8a" opacity="0.55">
      <rect x="440" y="215" width="10" height="5"/><rect x="450" y="220" width="10" height="5"/>
      <rect x="460" y="220" width="10" height="5"/><rect x="470" y="225" width="10" height="5"/>
      <rect x="480" y="230" width="10" height="5"/><rect x="490" y="235" width="10" height="5"/>
      <rect x="500" y="240" width="10" height="5"/><rect x="510" y="245" width="10" height="5"/>
      <rect x="520" y="250" width="10" height="5"/><rect x="530" y="255" width="10" height="5"/>
      <rect x="540" y="260" width="10" height="5"/><rect x="550" y="265" width="10" height="5"/>
      <rect x="560" y="270" width="10" height="5"/><rect x="570" y="275" width="10" height="5"/>
    </g>

    <!-- Loop spots (focal) at TAD corners -->
    <g fill="#b91c1c" opacity="0.85">
      <rect x="80" y="0" width="10" height="5"/>
      <rect x="180" y="50" width="10" height="5"/>
      <rect x="310" y="100" width="10" height="5"/>
      <rect x="440" y="150" width="10" height="5"/>
    </g>

    <!-- Scale annotations -->
    <g>
      <!-- Compartments -->
      <line x1="530" y1="25" x2="610" y2="10" stroke="#1e3a8a" stroke-width="0.8"/>
      <text x="615" y="14" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" font-weight="600">A/B compartments</text>
      <text x="615" y="26" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">~Mb scale</text>

      <!-- TADs -->
      <line x1="340" y1="170" x2="615" y2="120" stroke="#1e3a8a" stroke-width="0.8"/>
      <text x="620" y="124" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" font-weight="600">TADs</text>
      <text x="620" y="136" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">~200 kb – 2 Mb</text>

      <!-- Loops -->
      <line x1="85" y1="3" x2="615" y2="200" stroke="#b91c1c" stroke-width="0.8"/>
      <text x="620" y="204" font-family="Inter, sans-serif" font-size="10" fill="#b91c1c" font-weight="600">loops</text>
      <text x="620" y="216" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">kb – 100s kb</text>
    </g>
  </g>

  <!-- Insulation score track below matrix -->
  <g transform="translate(80 370)">
    <text x="-10" y="15" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">insulation</text>

    <rect x="0" y="20" width="600" height="60" fill="#ffffff" stroke="#c4c1b6"/>
    <line x1="0" y1="50" x2="600" y2="50" stroke="#c4c1b6" stroke-width="0.5"/>

    <!-- Insulation score line with minima at TAD boundaries (roughly every 100 px) -->
    <path d="M 0 48 L 40 35 L 80 28 L 85 75 L 90 68 L 120 35 L 170 30 L 180 72 L 185 65 L 210 38 L 270 32 L 300 28 L 305 75 L 310 68 L 340 30 L 400 28 L 410 72 L 415 65 L 440 32 L 500 28 L 560 32 L 600 40"
          fill="none" stroke="#1e3a8a" stroke-width="1.5"/>

    <!-- Boundary markers (local minima) -->
    <g fill="#b45309">
      <polygon points="82,80 90,80 86,88"/>
      <polygon points="177,80 185,80 181,88"/>
      <polygon points="302,80 310,80 306,88"/>
      <polygon points="407,80 415,80 411,88"/>
    </g>
  </g>

  <!-- Axis annotation -->
  <text x="380" y="470" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">genomic bin · ~10 Mb window</text>
</svg>
