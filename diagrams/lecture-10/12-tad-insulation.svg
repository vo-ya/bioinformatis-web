<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 480" role="img" aria-labelledby="t d">
  <title id="t">TAD calling as change-point detection</title>
  <desc id="d">Three stacked panels with shared x-axis of bin indices. (a) Contact matrix window showing 4 triangular TAD blocks clearly visible along the diagonal. (b) 1D insulation score track per bin with several local minima marking TAD boundaries; boundary detection threshold drawn as horizontal dashed line; minima below threshold highlighted. (c) Called TADs as coloured intervals, each a different accent hue. Annotation banner at the bottom: '2D → 1D reduction → change-point detection = TAD boundary detection'.</desc>

  <text x="540" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">TAD CALLING · 2D MATRIX → 1D INSULATION SCORE → CHANGE-POINT DETECTION</text>

  <!-- Layout: shared x-axis 80 to 1000 -->

  <!-- ── (a) Contact matrix ── -->
  <g>
    <text x="72" y="70" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">(a) matrix</text>

    <rect x="80" y="50" width="920" height="140" fill="#ffffff" stroke="#c4c1b6"/>

    <!-- 4 triangular TAD blocks -->
    <!-- TAD boundaries at bins ~80/1000 proportional: 80-270, 270-500, 500-720, 720-1000 -->

    <!-- Bright diagonal throughout -->
    <g fill="#1e3a8a" opacity="0.85">
      <!-- step along diagonal every ~25 px -->
      <rect x="80" y="50" width="25" height="12"/>
      <rect x="105" y="62" width="25" height="12"/>
      <rect x="130" y="74" width="25" height="12"/>
      <rect x="155" y="86" width="25" height="12"/>
      <rect x="180" y="98" width="25" height="12"/>
      <rect x="205" y="110" width="25" height="12"/>
      <rect x="230" y="122" width="25" height="12"/>
      <rect x="255" y="134" width="25" height="12"/>
      <rect x="280" y="146" width="25" height="12"/>
      <rect x="305" y="158" width="25" height="12"/>
      <rect x="330" y="170" width="25" height="12"/>
      <rect x="355" y="182" width="25" height="12"/>

      <!-- Actually, in a proper Hi-C rendering the 1-d along x axis gets mirrored to y, so
           I'll just draw the diagonal as one contiguous thick line -->
    </g>

    <!-- Clear the diagonal rects and use a proper diagonal line -->
    <!-- Use a diagonal "bar" as accent rectangle rotated -->
    <line x1="80" y1="50" x2="1000" y2="190" stroke="#1e3a8a" stroke-width="3" opacity="0.85"/>

    <!-- Four triangular TAD blocks filled above the diagonal -->
    <!-- TAD 1: x 80-290 on axis, symmetric triangle above diagonal -->
    <path d="M 80 50 L 290 50 L 290 82 Z" fill="#1e3a8a" opacity="0.45"/>
    <!-- TAD 2: x 290-520 -->
    <path d="M 290 85 L 520 85 L 520 120 Z" fill="#1e3a8a" opacity="0.45"/>
    <!-- TAD 3: x 520-740 -->
    <path d="M 520 125 L 740 125 L 740 158 Z" fill="#1e3a8a" opacity="0.45"/>
    <!-- TAD 4: x 740-1000 -->
    <path d="M 740 162 L 1000 162 L 1000 190 Z" fill="#1e3a8a" opacity="0.45"/>

    <!-- Boundary separators as vertical lines through the matrix -->
    <g stroke="#b45309" stroke-width="1" stroke-dasharray="3 2">
      <line x1="290" y1="50" x2="290" y2="190"/>
      <line x1="520" y1="50" x2="520" y2="190"/>
      <line x1="740" y1="50" x2="740" y2="190"/>
    </g>
  </g>

  <!-- ── (b) Insulation score track ── -->
  <g>
    <text x="72" y="240" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">(b) insulation</text>

    <rect x="80" y="210" width="920" height="100" fill="#ffffff" stroke="#c4c1b6"/>

    <!-- Threshold line -->
    <line x1="80" y1="280" x2="1000" y2="280" stroke="#8a8a85" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="1010" y="283" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85">threshold</text>

    <!-- Insulation score curve: high in TAD interiors, dips at boundaries -->
    <path d="M 80 228
             L 130 225 L 170 220 L 210 222 L 250 230 L 280 265 L 290 295 L 300 265 L 330 235
             L 380 222 L 420 218 L 460 225 L 490 258 L 520 290 L 550 258 L 580 230
             L 630 220 L 670 215 L 710 220 L 730 255 L 740 290 L 750 255 L 780 228
             L 830 222 L 870 220 L 910 225 L 950 235 L 1000 240"
          fill="none" stroke="#1e3a8a" stroke-width="2"/>

    <!-- Boundary minima markers -->
    <g fill="#b45309">
      <polygon points="286,298 294,298 290,306"/>
      <polygon points="516,293 524,293 520,301"/>
      <polygon points="736,293 744,293 740,301"/>
    </g>

    <!-- Boundary vertical lines match panel a -->
    <g stroke="#b45309" stroke-width="1" stroke-dasharray="3 2">
      <line x1="290" y1="210" x2="290" y2="310"/>
      <line x1="520" y1="210" x2="520" y2="310"/>
      <line x1="740" y1="210" x2="740" y2="310"/>
    </g>
  </g>

  <!-- ── (c) Called TADs ── -->
  <g>
    <text x="72" y="350" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">(c) TAD calls</text>

    <!-- Four coloured TAD intervals -->
    <g>
      <rect x="80" y="330" width="210" height="30" fill="#1e3a8a" opacity="0.7"/>
      <text x="185" y="350" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#ffffff">TAD 1</text>
      <rect x="290" y="330" width="230" height="30" fill="#b45309" opacity="0.7"/>
      <text x="405" y="350" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#ffffff">TAD 2</text>
      <rect x="520" y="330" width="220" height="30" fill="#2d7a3e" opacity="0.7"/>
      <text x="630" y="350" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#ffffff">TAD 3</text>
      <rect x="740" y="330" width="260" height="30" fill="#7c3aed" opacity="0.7"/>
      <text x="870" y="350" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#ffffff">TAD 4</text>
    </g>

    <!-- Boundary vertical lines -->
    <g stroke="#b45309" stroke-width="1" stroke-dasharray="3 2">
      <line x1="290" y1="330" x2="290" y2="360"/>
      <line x1="520" y1="330" x2="520" y2="360"/>
      <line x1="740" y1="330" x2="740" y2="360"/>
    </g>
  </g>

  <!-- Bottom annotation banner -->
  <g transform="translate(80 390)">
    <rect x="0" y="0" width="920" height="70" rx="6" fill="#f6f4ee" stroke="#c4c1b6"/>
    <text x="460" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">2D → 1D reduction → change-point detection = TAD boundary detection</text>
    <text x="460" y="48" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">The insulation score collapses a 2D contact matrix to a 1D signal where boundaries are local minima below threshold.</text>
  </g>
</svg>
