<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 440" role="img" aria-labelledby="t d">
  <title id="t">PacBio HiFi vs Oxford Nanopore in 2024</title>
  <desc id="d">Two-axis plot with x = read length (log scale, 100 bp to 2 Mb) and y = per-base accuracy (Phred Q, Q10 to Q35). Illumina short reads cluster top-left at 150 bp and Q30+. PacBio HiFi 2018 and 2024 shown at Q30, at 15 and 20 kb. ONT walks up the accuracy axis across three chemistry generations (R9.4 2018 at Q12, R10.4 2022 at Q18, R10.4.1 2024 at Q22) while keeping long read lengths. An accent-bg shaded region highlights the reference-grade quadrant (accuracy ≥ Q20 AND length ≥ 10 kb).</desc>

  <text x="540" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">READ LENGTH vs ACCURACY · REFERENCE-GRADE FRONTIER NOW OPEN</text>

  <!-- Plot area -->
  <rect x="80" y="60" width="860" height="320" fill="#ffffff" stroke="#c4c1b6"/>

  <!-- Reference-grade shaded region: accuracy ≥ Q20 (y ≤ 180) AND length ≥ 10 kb (x ≥ 280) -->
  <!-- Axis mapping: x: log from 100 bp to 2 Mb spans 80 to 940; y: Q10→Q35 linear spans 380 to 60 -->
  <!-- 10 kb at log10(10000) = 4, range log10(100)=2 to log10(2e6)≈6.3 → 4.3 log-decades → (4-2)/4.3*860 + 80 = 480 -->
  <!-- Q20 at y = 60 + (35-20)/25 * 320 = 60 + 192 = 252 -->
  <rect x="480" y="60" width="460" height="192" fill="#eef2ff" opacity="0.5"/>
  <text x="710" y="76" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">reference-grade quadrant</text>
  <text x="710" y="88" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">accuracy ≥ Q20 · length ≥ 10 kb</text>

  <!-- Q20 horizontal dashed line -->
  <line x1="80" y1="252" x2="940" y2="252" stroke="#b45309" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="85" y="248" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309">Q20</text>

  <!-- Q30 horizontal dashed line -->
  <line x1="80" y1="188" x2="940" y2="188" stroke="#c4c1b6" stroke-width="0.5" stroke-dasharray="3 2"/>
  <text x="85" y="184" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">Q30</text>

  <!-- 10 kb vertical dashed line -->
  <line x1="480" y1="60" x2="480" y2="380" stroke="#c4c1b6" stroke-width="0.5" stroke-dasharray="3 2"/>

  <!-- X-axis -->
  <line x1="80" y1="380" x2="940" y2="380" stroke="#525252" stroke-width="1"/>

  <!-- X-axis tick positions: 100, 1000, 10000, 100000, 1e6 → x positions -->
  <!-- log10(100)=2 → x=80; log10(1000)=3 → (3-2)/4.3*860+80 = 280; log10(10000)=4 → 480; 1e5 → 680; 1e6 → 880 -->
  <g stroke="#525252" stroke-width="0.8">
    <line x1="80"  y1="380" x2="80"  y2="386"/>
    <line x1="280" y1="380" x2="280" y2="386"/>
    <line x1="480" y1="380" x2="480" y2="386"/>
    <line x1="680" y1="380" x2="680" y2="386"/>
    <line x1="880" y1="380" x2="880" y2="386"/>
  </g>
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">
    <text x="80"  y="398">100 bp</text>
    <text x="280" y="398">1 kb</text>
    <text x="480" y="398">10 kb</text>
    <text x="680" y="398">100 kb</text>
    <text x="880" y="398">1 Mb</text>
  </g>
  <text x="510" y="418" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#525252">read length (log scale)</text>

  <!-- Y-axis -->
  <line x1="80" y1="60" x2="80" y2="380" stroke="#525252" stroke-width="1"/>
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="end">
    <text x="74" y="64">Q35</text>
    <text x="74" y="128">Q25</text>
    <text x="74" y="192">Q15</text>
    <text x="74" y="256">Q10</text>
    <text x="74" y="384">—</text>
  </g>
  <!-- Actually recompute Y ticks: y=60 for Q35, y=380 for Q10, linear interpolation per 5 Q → 64 px per 5 Q -->
  <!-- Q35: 60, Q30: 124, Q25: 188, Q20: 252, Q15: 316, Q10: 380 -->
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="end">
    <text x="74" y="64">Q35</text>
    <text x="74" y="128">Q30</text>
    <text x="74" y="192">Q25</text>
    <text x="74" y="256">Q20</text>
    <text x="74" y="320">Q15</text>
    <text x="74" y="384">Q10</text>
  </g>
  <text x="40" y="220" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#525252" transform="rotate(-90 40 220)">per-base accuracy (Phred Q)</text>

  <!-- Platform data points -->

  <!-- Illumina: 150 bp × Q30+ at x=(log10(150)-2)/4.3*860+80 = (2.18-2)/4.3*860+80 = 116; y=128 (Q30) -->
  <g>
    <circle cx="116" cy="124" r="8" fill="#8a8a85" stroke="#0a0a0a" stroke-width="1.2"/>
    <text x="116" y="112" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#0a0a0a">Illumina</text>
    <text x="116" y="100" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">150 bp · Q30+</text>
  </g>

  <!-- PacBio HiFi 2018: 15 kb × Q30 → x=(log10(15000)-2)/4.3*860+80 = (4.176-2)/4.3*860+80 = 515; y=128 -->
  <g>
    <circle cx="515" cy="128" r="8" fill="#1e3a8a" stroke="#0a0a0a" stroke-width="1.2"/>
    <text x="515" y="116" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a" font-weight="600">HiFi 2018</text>
  </g>

  <!-- PacBio HiFi 2024: 20 kb × Q32 → x=(log10(20000)-2)/4.3*860+80 = 540; y=60+(35-32)/25*320 = 60+38 = 98 -->
  <g>
    <circle cx="540" cy="116" r="8" fill="#1e3a8a" stroke="#0a0a0a" stroke-width="1.2"/>
    <text x="544" y="100" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a">HiFi 2024</text>
    <text x="544" y="88" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">20 kb · Q32 · Revio</text>
  </g>

  <!-- ONT 2018 R9.4: 10 kb × Q12 → x=480; y=60+(35-12)/25*320 = 60+294 = 354 -->
  <g>
    <circle cx="480" cy="344" r="8" fill="#2d7a3e" stroke="#0a0a0a" stroke-width="1.2"/>
    <text x="468" y="348" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#2d7a3e" font-weight="600">ONT 2018 (R9.4)</text>
    <text x="468" y="360" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">~Q12</text>
  </g>

  <!-- ONT 2022 R10.4: 20 kb × Q18 → x=540; y=60+(35-18)/25*320 = 60+218 = 278 -->
  <g>
    <circle cx="540" cy="277" r="8" fill="#2d7a3e" stroke="#0a0a0a" stroke-width="1.2"/>
    <text x="555" y="278" font-family="JetBrains Mono, monospace" font-size="9" fill="#2d7a3e" font-weight="600">ONT 2022 (R10.4)</text>
    <text x="555" y="290" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">~Q18</text>
  </g>

  <!-- ONT 2024 R10.4.1: 20 kb × Q22 → x=540; y=60+(35-22)/25*320 = 60+166 = 226 -->
  <g>
    <circle cx="540" cy="226" r="8" fill="#2d7a3e" stroke="#0a0a0a" stroke-width="1.2"/>
    <text x="555" y="222" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#2d7a3e">ONT 2024 (R10.4.1)</text>
    <text x="555" y="234" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">~Q22 raw · Q25+ polished</text>
  </g>

  <!-- ONT ultra-long: 1 Mb × Q22 → x=880; y=226 -->
  <g>
    <circle cx="880" cy="226" r="7" fill="#2d7a3e" fill-opacity="0.7" stroke="#0a0a0a" stroke-width="1"/>
    <text x="880" y="220" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#2d7a3e">ONT ultra-long</text>
    <text x="880" y="212" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#525252">up to 1 Mb</text>
  </g>

  <!-- Connecting line showing ONT's accuracy trajectory -->
  <path d="M 480 344 L 540 277 L 540 226" fill="none" stroke="#2d7a3e" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>

  <!-- Arrow annotating ONT's improvement -->
  <path d="M 600 335 L 620 300" fill="none" stroke="#2d7a3e" stroke-width="1.2" marker-end="url(#arr-green)"/>
  <defs>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#2d7a3e"/>
    </marker>
  </defs>
  <text x="635" y="320" font-family="Inter, sans-serif" font-size="9" fill="#2d7a3e" font-style="italic">ONT walked up the accuracy axis</text>
  <text x="635" y="332" font-family="Inter, sans-serif" font-size="9" fill="#525252">across R9.4 → R10.4 → R10.4.1</text>

  <!-- Legend -->
  <g transform="translate(800 75)">
    <rect x="0" y="0" width="128" height="72" rx="4" fill="#ffffff" stroke="#c4c1b6"/>
    <circle cx="12" cy="16" r="5" fill="#8a8a85" stroke="#0a0a0a" stroke-width="0.8"/>
    <text x="24" y="20" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">Illumina</text>
    <circle cx="12" cy="36" r="5" fill="#1e3a8a" stroke="#0a0a0a" stroke-width="0.8"/>
    <text x="24" y="40" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">PacBio HiFi</text>
    <circle cx="12" cy="56" r="5" fill="#2d7a3e" stroke="#0a0a0a" stroke-width="0.8"/>
    <text x="24" y="60" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">Oxford Nanopore</text>
  </g>
</svg>
