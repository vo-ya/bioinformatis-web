<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 440" role="img" aria-labelledby="t d">
  <title id="t">SVs short reads can't span</title>
  <desc id="d">Three horizontal bands aligned to a shared genomic coordinate axis. Top: reference with a 5 kb tandem duplication in the middle. Middle: short-read coverage with reads stopping at duplication boundaries and a few split reads showing the event; coverage curve shows subtle depth doubling. Bottom: long-read coverage with several 20 kb reads fully spanning the duplication.</desc>

  <text x="540" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">SVs SHORT READS CAN'T SPAN · LONG READS SEE THE WHOLE EVENT</text>

  <!-- Shared coordinate axis -->
  <g>
    <line x1="60" y1="60" x2="1020" y2="60" stroke="#525252" stroke-width="1"/>
    <g stroke="#525252" stroke-width="0.8">
      <line x1="60"  y1="60" x2="60"  y2="66"/>
      <line x1="252" y1="60" x2="252" y2="66"/>
      <line x1="444" y1="60" x2="444" y2="66"/>
      <line x1="636" y1="60" x2="636" y2="66"/>
      <line x1="828" y1="60" x2="828" y2="66"/>
      <line x1="1020" y1="60" x2="1020" y2="66"/>
    </g>
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">
      <text x="60"   y="80">0 kb</text>
      <text x="252"  y="80">2</text>
      <text x="444"  y="80">4</text>
      <text x="636"  y="80">6</text>
      <text x="828"  y="80">8</text>
      <text x="1020" y="80">10 kb</text>
    </g>
  </g>

  <!-- ── Top band: Reference with SV ── -->
  <g>
    <text x="52" y="112" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">reference</text>

    <!-- Reference line -->
    <line x1="60" y1="115" x2="1020" y2="115" stroke="#525252" stroke-width="2"/>

    <!-- The 5 kb duplicated region: 2.5 to 7.5 kb. First copy 2.5-5, second copy 5-7.5. -->
    <rect x="300" y="108" width="240" height="14" fill="#1e3a8a" fill-opacity="0.3" stroke="#1e3a8a" stroke-width="1"/>
    <text x="420" y="103" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a" font-weight="600">copy 1</text>

    <rect x="540" y="108" width="240" height="14" fill="#1e3a8a" fill-opacity="0.6" stroke="#1e3a8a" stroke-width="1"/>
    <text x="660" y="103" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a" font-weight="600">copy 2 (duplicate)</text>

    <!-- SV brace -->
    <path d="M 300 130 Q 300 138, 310 138 L 770 138 Q 780 138, 780 130" fill="none" stroke="#b45309" stroke-width="1.2"/>
    <text x="540" y="152" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#b45309" font-weight="600">5 kb tandem duplication</text>
  </g>

  <!-- ── Middle band: Short-read coverage ── -->
  <g>
    <text x="52" y="185" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">short reads</text>

    <!-- Coverage track background -->
    <line x1="60" y1="230" x2="1020" y2="230" stroke="#c4c1b6" stroke-width="0.5"/>

    <!-- ~20 short reads (150 bp) rendered as small rectangles -->
    <!-- Duplication spans 300-780 (4 mm mark). Most reads aligning here map ambiguously -->
    <g fill="#8a8a85">
      <rect x="70"  y="182" width="24" height="3"/>
      <rect x="100" y="182" width="24" height="3"/>
      <rect x="140" y="182" width="24" height="3"/>
      <rect x="180" y="182" width="24" height="3"/>
      <rect x="220" y="182" width="24" height="3"/>
      <rect x="260" y="182" width="24" height="3"/>
      <rect x="80"  y="189" width="24" height="3"/>
      <rect x="120" y="189" width="24" height="3"/>
      <rect x="160" y="189" width="24" height="3"/>
      <rect x="200" y="189" width="24" height="3"/>
      <rect x="240" y="189" width="24" height="3"/>
      <rect x="280" y="189" width="24" height="3"/>
      <!-- Inside duplication: reads with higher density -->
      <rect x="310" y="182" width="24" height="3"/><rect x="340" y="182" width="24" height="3"/>
      <rect x="380" y="182" width="24" height="3"/><rect x="420" y="182" width="24" height="3"/>
      <rect x="460" y="182" width="24" height="3"/><rect x="500" y="182" width="24" height="3"/>
      <rect x="320" y="189" width="24" height="3"/><rect x="360" y="189" width="24" height="3"/>
      <rect x="400" y="189" width="24" height="3"/><rect x="440" y="189" width="24" height="3"/>
      <rect x="480" y="189" width="24" height="3"/><rect x="520" y="189" width="24" height="3"/>
      <rect x="560" y="182" width="24" height="3"/><rect x="600" y="182" width="24" height="3"/>
      <rect x="640" y="182" width="24" height="3"/><rect x="680" y="182" width="24" height="3"/>
      <rect x="720" y="182" width="24" height="3"/><rect x="760" y="182" width="24" height="3"/>
      <rect x="570" y="189" width="24" height="3"/><rect x="610" y="189" width="24" height="3"/>
      <rect x="650" y="189" width="24" height="3"/><rect x="690" y="189" width="24" height="3"/>
      <rect x="730" y="189" width="24" height="3"/><rect x="770" y="189" width="24" height="3"/>
      <!-- After duplication -->
      <rect x="800" y="182" width="24" height="3"/><rect x="840" y="182" width="24" height="3"/>
      <rect x="880" y="182" width="24" height="3"/><rect x="920" y="182" width="24" height="3"/>
      <rect x="960" y="182" width="24" height="3"/><rect x="820" y="189" width="24" height="3"/>
      <rect x="860" y="189" width="24" height="3"/><rect x="900" y="189" width="24" height="3"/>
      <rect x="940" y="189" width="24" height="3"/>
    </g>

    <!-- Split reads: two halves with a connecting line across the SV junction -->
    <g fill="#b91c1c">
      <rect x="280" y="198" width="20" height="3"/>
      <rect x="780" y="198" width="20" height="3"/>
    </g>
    <line x1="300" y1="199" x2="780" y2="199" stroke="#b91c1c" stroke-width="0.6" stroke-dasharray="2 2"/>
    <text x="540" y="214" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#b91c1c">split reads (few; fragile inference)</text>

    <!-- Coverage curve showing 2× depth inside the duplication -->
    <path d="M 60 227 L 300 225 L 300 215 L 780 215 L 780 225 L 1020 227 L 1020 230 L 60 230 Z"
          fill="#8a8a85" fill-opacity="0.25" stroke="#525252" stroke-width="0.8"/>
    <text x="1028" y="218" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">2× depth</text>

    <!-- Label -->
    <text x="540" y="250" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">~20 reads ×150 bp — boundaries only, inference needed</text>
  </g>

  <!-- ── Bottom band: Long-read coverage ── -->
  <g>
    <text x="52" y="290" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">long reads</text>

    <!-- Long reads as wider rectangles -->
    <g fill="#1e3a8a" opacity="0.8">
      <rect x="100" y="282" width="560" height="8"/>
      <rect x="200" y="295" width="560" height="8"/>
      <rect x="300" y="308" width="560" height="8"/>
      <rect x="180" y="321" width="520" height="8"/>
      <rect x="280" y="334" width="540" height="8"/>
    </g>

    <!-- Labels -->
    <text x="380" y="290" font-family="JetBrains Mono, monospace" font-size="8" fill="#ffffff" font-weight="600">20 kb · fully spans</text>
    <text x="480" y="303" font-family="JetBrains Mono, monospace" font-size="8" fill="#ffffff" font-weight="600">20 kb · fully spans</text>

    <!-- Label -->
    <text x="540" y="360" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">5 reads ×20 kb — each spans the entire event</text>
  </g>

  <!-- Bottom summary -->
  <g transform="translate(60 380)">
    <rect x="0" y="0" width="960" height="50" rx="6" fill="#f6f4ee" stroke="#c4c1b6"/>
    <text x="480" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">Short reads: infer SV from fragment geometry (split + discordant) — recall ~60%</text>
    <text x="480" y="38" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#2d7a3e">Long reads: directly span the SV — recall &gt; 95%</text>
  </g>
</svg>
