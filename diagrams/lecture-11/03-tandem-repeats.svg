<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 440" role="img" aria-labelledby="t d">
  <title id="t">Tandem repeats resolved by long reads</title>
  <desc id="d">Three bands. Top: HTT gene model with CAG repeat region highlighted at exon 1; zoom-in shows sequence of CAG triplets in JetBrains Mono, with pathogenic threshold of 36 repeats annotated. Middle: short reads (150 bp) cover a CAG expansion of 60 units; each read contains some triplets but cannot determine boundaries; repeat count ambiguous. Bottom: a single 3 kb long read fully spans the repeat and flanking sequence; repeat count of 60 units read directly off the molecule, above the 36-unit threshold.</desc>

  <text x="540" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">TANDEM REPEATS · COUNT UNITS DIRECTLY ON A LONG READ</text>

  <!-- ── Top band: HTT gene model ── -->
  <g>
    <text x="60" y="54" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">HTT gene model · CAG repeat at exon 1</text>

    <!-- Gene model: exons + introns -->
    <g>
      <!-- Intron line -->
      <line x1="100" y1="85" x2="940" y2="85" stroke="#1e3a8a" stroke-width="1.5"/>
      <!-- Exon 1 (left) -->
      <rect x="100" y="75" width="90" height="20" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
      <!-- Other exons -->
      <rect x="300" y="75" width="50" height="20" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
      <rect x="450" y="75" width="60" height="20" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
      <rect x="620" y="75" width="70" height="20" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
      <rect x="820" y="75" width="120" height="20" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1"/>
      <!-- TSS arrow -->
      <line x1="100" y1="75" x2="100" y2="64" stroke="#b45309" stroke-width="1.5"/>
      <polygon points="96,65 104,65 100,58" fill="#b45309"/>
      <text x="100" y="54" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" font-weight="700" fill="#b45309">TSS</text>
      <!-- CAG repeat region highlighted -->
      <rect x="125" y="74" width="30" height="22" fill="#b45309" fill-opacity="0.35" stroke="#b45309" stroke-width="1.2"/>
      <text x="140" y="69" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#b45309" font-weight="600">CAG</text>
    </g>

    <!-- Zoom-in of CAG repeat -->
    <line x1="140" y1="98" x2="300" y2="115" stroke="#525252" stroke-width="0.6" stroke-dasharray="2 2"/>
    <line x1="140" y1="98" x2="780" y2="115" stroke="#525252" stroke-width="0.6" stroke-dasharray="2 2"/>

    <g transform="translate(260 120)">
      <rect x="0" y="0" width="560" height="38" fill="#ffffff" stroke="#c4c1b6"/>
      <text x="280" y="14" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">zoom-in · CAG repeat sequence</text>
      <g font-family="JetBrains Mono, monospace" font-size="10" font-weight="700" text-anchor="middle">
        <!-- 12 triplets: CAG CAG CAG ... -->
        <text x="20" y="32">C</text><text x="30" y="32">A</text><text x="40" y="32">G</text>
        <text x="55" y="32">C</text><text x="65" y="32">A</text><text x="75" y="32">G</text>
        <text x="90" y="32">C</text><text x="100" y="32">A</text><text x="110" y="32">G</text>
        <text x="125" y="32">C</text><text x="135" y="32">A</text><text x="145" y="32">G</text>
        <text x="160" y="32">C</text><text x="170" y="32">A</text><text x="180" y="32">G</text>
        <text x="195" y="32">C</text><text x="205" y="32">A</text><text x="215" y="32">G</text>
        <text x="230" y="32">C</text><text x="240" y="32">A</text><text x="250" y="32">G</text>
        <text x="280" y="32">…</text>
        <text x="310" y="32">C</text><text x="320" y="32">A</text><text x="330" y="32">G</text>
        <text x="345" y="32">C</text><text x="355" y="32">A</text><text x="365" y="32">G</text>
        <text x="380" y="32">C</text><text x="390" y="32">A</text><text x="400" y="32">G</text>
        <text x="415" y="32">C</text><text x="425" y="32">A</text><text x="435" y="32">G</text>
        <text x="450" y="32">C</text><text x="460" y="32">A</text><text x="470" y="32">G</text>
        <text x="485" y="32">C</text><text x="495" y="32">A</text><text x="505" y="32">G</text>
        <text x="525" y="32">× 60 units (180 bp)</text>
      </g>
    </g>
    <text x="540" y="178" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#b45309" font-weight="600">pathogenic threshold: 36 CAG units → Huntington's disease</text>
  </g>

  <!-- ── Middle band: Short reads can't resolve ── -->
  <g>
    <text x="60" y="220" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">Short reads (150 bp): cannot count repeat units</text>

    <!-- Reference line for this band -->
    <line x1="100" y1="250" x2="500" y2="250" stroke="#525252" stroke-width="1.5"/>
    <!-- CAG repeat region on reference -->
    <rect x="180" y="244" width="240" height="12" fill="#b45309" fill-opacity="0.3" stroke="#b45309" stroke-width="0.8"/>
    <text x="300" y="241" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#b45309">60 × CAG = 180 bp</text>

    <!-- Short reads covering the repeat; each ambiguous in phase -->
    <g fill="#8a8a85">
      <rect x="140" y="264" width="80" height="4"/>
      <rect x="220" y="264" width="80" height="4"/>
      <rect x="300" y="264" width="80" height="4"/>
      <rect x="380" y="264" width="80" height="4"/>
      <rect x="160" y="272" width="80" height="4"/>
      <rect x="240" y="272" width="80" height="4"/>
      <rect x="320" y="272" width="80" height="4"/>
      <rect x="400" y="272" width="80" height="4"/>
    </g>

    <!-- Annotation -->
    <text x="540" y="260" font-family="Inter, sans-serif" font-size="10" fill="#525252">6 reads inside the repeat</text>
    <text x="540" y="275" font-family="Inter, sans-serif" font-size="10" fill="#b91c1c">→ repeat count could be 50, 60, 70, … unknown</text>
    <text x="540" y="290" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">alignment is ambiguous across identical CAG motifs</text>
  </g>

  <!-- ── Bottom band: Long read spans everything ── -->
  <g>
    <text x="60" y="320" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">Long read (3 kb): directly spans the entire repeat + flanks</text>

    <!-- Reference line -->
    <line x1="100" y1="350" x2="940" y2="350" stroke="#525252" stroke-width="1.5"/>
    <!-- CAG repeat region on reference -->
    <rect x="400" y="344" width="240" height="12" fill="#b45309" fill-opacity="0.3" stroke="#b45309" stroke-width="0.8"/>

    <!-- Single long read spanning the full 3 kb (100 to 940) -->
    <rect x="120" y="365" width="800" height="12" fill="#1e3a8a" opacity="0.85"/>
    <text x="520" y="375" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#ffffff" font-weight="600">3 kb HiFi read · spans repeat + 1.4 kb flanks</text>

    <!-- Highlight the portion over the repeat -->
    <rect x="400" y="365" width="240" height="12" fill="#b45309" stroke="#ffffff" stroke-width="0.5"/>
    <text x="520" y="375" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#ffffff" font-weight="600">60 CAG counted</text>

    <!-- Direct count annotation -->
    <text x="520" y="398" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#2d7a3e" font-weight="600">✓ 60 repeat units · above 36-unit pathogenic threshold</text>
    <text x="520" y="412" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">clinical call: Huntington's disease allele, penetrance high</text>
  </g>
</svg>
