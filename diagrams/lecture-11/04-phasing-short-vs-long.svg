<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 440" role="img" aria-labelledby="t d">
  <title id="t">Haplotype phasing — short vs long reads</title>
  <desc id="d">Three bands over a 20 kb reference with 5 heterozygous SNPs. Top: reference with all 5 het positions marked; true maternal haplotype {A,C,T,G,A} and paternal {G,T,C,A,T}. Middle: 12 short reads each covering 1-2 het sites; combinations do not uniquely link phase — statistical inference from a reference panel required. Bottom: 2 long reads (20 kb each) each spanning all 5 het sites; maternal and paternal haplotypes read directly off each molecule.</desc>

  <text x="540" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">HAPLOTYPE PHASING · LONG READS GIVE DETERMINISTIC PHASE</text>

  <!-- ── Top band: reference with 5 heterozygous SNPs ── -->
  <g>
    <text x="60" y="56" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">Reference · 5 heterozygous SNPs across 20 kb</text>

    <!-- Reference line -->
    <line x1="100" y1="85" x2="940" y2="85" stroke="#525252" stroke-width="2"/>

    <!-- Genomic coordinate labels -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">
      <text x="100" y="104">0 kb</text>
      <text x="310" y="104">5</text>
      <text x="520" y="104">10</text>
      <text x="730" y="104">15</text>
      <text x="940" y="104">20 kb</text>
    </g>

    <!-- Heterozygous SNP positions at 2, 6, 10, 14, 18 kb -->
    <g>
      <!-- SNP 1 at 2 kb (x=184) -->
      <line x1="184" y1="75" x2="184" y2="95" stroke="#b45309" stroke-width="2"/>
      <text x="184" y="72" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309" font-weight="700">het 1</text>
      <!-- SNP 2 at 6 kb (x=352) -->
      <line x1="352" y1="75" x2="352" y2="95" stroke="#b45309" stroke-width="2"/>
      <text x="352" y="72" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309" font-weight="700">het 2</text>
      <!-- SNP 3 at 10 kb (x=520) -->
      <line x1="520" y1="75" x2="520" y2="95" stroke="#b45309" stroke-width="2"/>
      <text x="520" y="72" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309" font-weight="700">het 3</text>
      <!-- SNP 4 at 14 kb (x=688) -->
      <line x1="688" y1="75" x2="688" y2="95" stroke="#b45309" stroke-width="2"/>
      <text x="688" y="72" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309" font-weight="700">het 4</text>
      <!-- SNP 5 at 18 kb (x=856) -->
      <line x1="856" y1="75" x2="856" y2="95" stroke="#b45309" stroke-width="2"/>
      <text x="856" y="72" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309" font-weight="700">het 5</text>
    </g>

    <!-- True haplotypes beneath -->
    <g transform="translate(0 115)">
      <!-- Maternal -->
      <rect x="50" y="-2" width="60" height="18" rx="3" fill="#c4342c" opacity="0.2"/>
      <text x="80" y="11" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#c4342c">maternal</text>
      <g font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" text-anchor="middle" fill="#c4342c">
        <text x="184" y="11">A</text>
        <text x="352" y="11">C</text>
        <text x="520" y="11">T</text>
        <text x="688" y="11">G</text>
        <text x="856" y="11">A</text>
      </g>
      <!-- Paternal -->
      <rect x="50" y="20" width="60" height="18" rx="3" fill="#1e3a8a" opacity="0.2"/>
      <text x="80" y="33" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a">paternal</text>
      <g font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" text-anchor="middle" fill="#1e3a8a">
        <text x="184" y="33">G</text>
        <text x="352" y="33">T</text>
        <text x="520" y="33">C</text>
        <text x="688" y="33">A</text>
        <text x="856" y="33">T</text>
      </g>
    </g>
  </g>

  <!-- ── Middle band: Short-read phasing ── -->
  <g>
    <text x="60" y="190" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">Short reads · each covers 1–2 het sites</text>

    <!-- Each short read is a little rectangle spanning 2 adjacent hets at most -->
    <g fill="#8a8a85">
      <!-- Reads covering het 1 (some cover 1-2) -->
      <rect x="140" y="210" width="90" height="4"/>
      <rect x="160" y="218" width="90" height="4"/>
      <!-- Reads covering het 1-2 (linking) -->
      <rect x="180" y="226" width="210" height="4"/>
      <!-- Reads covering het 2 -->
      <rect x="300" y="210" width="90" height="4"/>
      <rect x="320" y="218" width="90" height="4"/>
      <!-- Reads covering het 3 -->
      <rect x="480" y="210" width="90" height="4"/>
      <rect x="500" y="218" width="90" height="4"/>
      <rect x="460" y="226" width="90" height="4"/>
      <!-- Reads covering het 4 -->
      <rect x="650" y="210" width="90" height="4"/>
      <rect x="670" y="218" width="90" height="4"/>
      <!-- Reads covering het 4-5 (linking) -->
      <rect x="660" y="226" width="210" height="4"/>
      <!-- Reads covering het 5 -->
      <rect x="810" y="210" width="90" height="4"/>
    </g>

    <!-- Phase-block annotation -->
    <g>
      <line x1="184" y1="240" x2="352" y2="240" stroke="#8a8a85" stroke-width="1"/>
      <text x="268" y="252" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#8a8a85">block 1 (2 hets)</text>

      <line x1="520" y1="240" x2="520" y2="240" stroke="#8a8a85" stroke-width="1"/>
      <text x="520" y="252" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#b91c1c">? isolated</text>

      <line x1="688" y1="240" x2="856" y2="240" stroke="#8a8a85" stroke-width="1"/>
      <text x="772" y="252" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#8a8a85">block 2 (2 hets)</text>
    </g>

    <text x="540" y="274" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#b91c1c" font-weight="600">?</text>
    <text x="540" y="288" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">phase between blocks requires statistical inference from a population LD panel</text>
  </g>

  <!-- ── Bottom band: Long-read phasing ── -->
  <g>
    <text x="60" y="320" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">Long reads · one 20 kb read spans all 5 het sites</text>

    <!-- Long read 1 (maternal haplotype) -->
    <rect x="100" y="338" width="840" height="14" fill="#c4342c" opacity="0.7"/>
    <g font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" text-anchor="middle" fill="#ffffff">
      <text x="184" y="349">A</text>
      <text x="352" y="349">C</text>
      <text x="520" y="349">T</text>
      <text x="688" y="349">G</text>
      <text x="856" y="349">A</text>
    </g>
    <text x="60" y="349" text-anchor="start" font-family="JetBrains Mono, monospace" font-size="9" fill="#c4342c" font-weight="600">mat →</text>

    <!-- Long read 2 (paternal haplotype) -->
    <rect x="100" y="360" width="840" height="14" fill="#1e3a8a" opacity="0.7"/>
    <g font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" text-anchor="middle" fill="#ffffff">
      <text x="184" y="371">G</text>
      <text x="352" y="371">T</text>
      <text x="520" y="371">C</text>
      <text x="688" y="371">A</text>
      <text x="856" y="371">T</text>
    </g>
    <text x="60" y="371" text-anchor="start" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a" font-weight="600">pat →</text>

    <text x="540" y="400" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#2d7a3e" font-weight="600">✓ full phase read directly off two molecules — no statistics needed</text>
    <text x="540" y="414" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">short-read block ~3 kb · long-read block = read length (chromosome-scale at ultra-long)</text>
  </g>
</svg>
