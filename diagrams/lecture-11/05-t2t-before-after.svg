<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 420" role="img" aria-labelledby="t d">
  <title id="t">T2T-CHM13 — before vs after</title>
  <desc id="d">Two chromosome ideograms of chromosome 9. Top: GRCh38 — p-arm truncated before the centromere, centromere shown as a hatched gap, unplaced heterochromatin annotated. Bottom: T2T-CHM13 — same chromosome now complete with alpha-satellite arrays filled in, acrocentric arm resolved, p-arm extending fully to the telomere. Added ~15 percent of chromosome 9 annotated; total +200 Mb genome-wide.</desc>

  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#b45309" stroke-width="1.5"/>
    </pattern>
  </defs>

  <text x="540" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">T2T-CHM13 · THE FIRST COMPLETE HUMAN GENOME · +200 Mb ADDED</text>

  <!-- ── Top: GRCh38 ── -->
  <g>
    <text x="60" y="68" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">GRCh38 (2013)</text>
    <text x="60" y="84" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">chromosome 9 · ~15% gaps</text>

    <!-- Chromosome bar, broken by gaps -->
    <!-- p-arm (left) -->
    <rect x="120" y="100" width="120" height="30" rx="15" fill="#c4c1b6" stroke="#525252" stroke-width="1.5"/>
    <!-- gap 1 (unplaced p-arm material) -->
    <rect x="240" y="100" width="40" height="30" fill="url(#hatch)" stroke="#b45309" stroke-width="1"/>
    <!-- centromere region -->
    <rect x="280" y="100" width="90" height="30" fill="url(#hatch)" stroke="#b45309" stroke-width="1.2"/>
    <!-- another small gap (pericentric heterochromatin) -->
    <rect x="370" y="100" width="30" height="30" fill="url(#hatch)" stroke="#b45309" stroke-width="1"/>
    <!-- q-arm (mostly complete) -->
    <rect x="400" y="100" width="580" height="30" rx="15" fill="#c4c1b6" stroke="#525252" stroke-width="1.5"/>

    <!-- Telomere caps -->
    <circle cx="120" cy="115" r="6" fill="#525252"/>
    <circle cx="980" cy="115" r="6" fill="#525252"/>

    <!-- Labels -->
    <line x1="260" y1="140" x2="260" y2="155" stroke="#b45309" stroke-width="0.8"/>
    <text x="260" y="168" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#b45309" font-weight="600">unplaced p-arm</text>

    <line x1="325" y1="140" x2="325" y2="155" stroke="#b45309" stroke-width="0.8"/>
    <text x="325" y="168" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#b45309" font-weight="600">N-masked centromere</text>

    <line x1="385" y1="140" x2="385" y2="155" stroke="#b45309" stroke-width="0.8"/>
    <text x="385" y="168" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#b45309" font-weight="600">heterochromatin gap</text>

    <text x="180" y="175" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">p-arm (partial)</text>
    <text x="690" y="175" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#525252">q-arm (mostly complete)</text>

    <!-- Gap summary -->
    <g transform="translate(820 140)">
      <rect x="0" y="0" width="160" height="32" rx="4" fill="#fef3c7" stroke="#b45309" stroke-width="0.8"/>
      <text x="80" y="14" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309" font-weight="600">~20 Mb gaps on chr 9</text>
      <text x="80" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">centromere + pericentric</text>
    </g>
  </g>

  <!-- Divider -->
  <line x1="60" y1="210" x2="1020" y2="210" stroke="#c4c1b6" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- ── Bottom: T2T-CHM13 ── -->
  <g>
    <text x="60" y="248" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">T2T-CHM13 (2022)</text>
    <text x="60" y="264" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">chromosome 9 · no gaps · complete telomere-to-telomere</text>

    <!-- Chromosome bar, continuous, with centromere highlighted -->
    <rect x="120" y="280" width="140" height="30" rx="15" fill="#c4c1b6" stroke="#525252" stroke-width="1.5"/>
    <!-- Newly resolved p-arm extension / acrocentric material -->
    <rect x="260" y="280" width="30" height="30" fill="#1e3a8a" fill-opacity="0.5" stroke="#1e3a8a" stroke-width="1"/>
    <!-- Centromere, now fully resolved -->
    <rect x="290" y="280" width="90" height="30" fill="#1e3a8a" fill-opacity="0.7" stroke="#1e3a8a" stroke-width="1.2"/>
    <!-- Newly resolved pericentric -->
    <rect x="380" y="280" width="30" height="30" fill="#1e3a8a" fill-opacity="0.5" stroke="#1e3a8a" stroke-width="1"/>
    <rect x="410" y="280" width="570" height="30" rx="15" fill="#c4c1b6" stroke="#525252" stroke-width="1.5"/>

    <!-- Telomere caps -->
    <circle cx="120" cy="295" r="6" fill="#525252"/>
    <circle cx="980" cy="295" r="6" fill="#525252"/>

    <!-- Newly-added annotations. The middle label "+alpha-satellite HOR"
         is staggered down to a second row (y=362, leader extended to
         y=349) so its 88 px-wide text no longer overlaps the flanking
         "+p-arm extension" and "+pericentric hetero" labels in the
         single shared row at y=348. -->
    <line x1="275" y1="320" x2="275" y2="335" stroke="#1e3a8a" stroke-width="0.8"/>
    <text x="275" y="348" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#1e3a8a" font-weight="600">+p-arm extension</text>

    <line x1="335" y1="320" x2="335" y2="349" stroke="#1e3a8a" stroke-width="0.8"/>
    <text x="335" y="362" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#1e3a8a" font-weight="600">+alpha-satellite HOR</text>

    <line x1="395" y1="320" x2="395" y2="335" stroke="#1e3a8a" stroke-width="0.8"/>
    <text x="395" y="348" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#1e3a8a" font-weight="600">+pericentric hetero</text>

    <!-- Gain annotation -->
    <g transform="translate(820 322)">
      <rect x="0" y="0" width="160" height="32" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
      <text x="80" y="14" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a" font-weight="600">~20 Mb added on chr 9</text>
      <text x="80" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">centromere + acrocentric</text>
    </g>
  </g>

  <!-- Bottom summary -->
  <g transform="translate(60 370)">
    <rect x="0" y="0" width="960" height="40" rx="6" fill="#f6f4ee" stroke="#c4c1b6"/>
    <text x="480" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">
      Genome-wide: +200 Mb of new sequence, mostly in centromeres (~70 Mb) and acrocentric short arms (~40 Mb)
    </text>
  </g>
</svg>
