<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 460" role="img" aria-labelledby="t d">
  <title id="t">Reference bias — a concrete example</title>
  <desc id="d">Three bands. Top: a 2 kb locus with three common variants labelled V1 (common in European populations, present in GRCh38), V2 (common in African populations, absent from GRCh38), V3 (common in East Asian populations, absent). Middle: three sub-panels showing reads from each population aligned to GRCh38. European reads call V1 correctly but miss V2/V3; African reads miss V2 as no-call; East Asian reads miss V3. Bottom: same reads aligned to a pangenome graph — all three variants called correctly in every population.</desc>

  <text x="540" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">REFERENCE BIAS · LINEAR GRCh38 UNDER-CALLS NON-EUROPEAN VARIANTS</text>

  <!-- ── Top band: locus with three variants ── -->
  <g>
    <text x="60" y="56" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">Locus · 2 kb region with 3 common variants</text>

    <line x1="100" y1="90" x2="940" y2="90" stroke="#525252" stroke-width="1.5"/>

    <!-- Variant V1 at 400 kb (x=300) - in GRCh38 -->
    <line x1="300" y1="80" x2="300" y2="100" stroke="#1e3a8a" stroke-width="2"/>
    <text x="300" y="75" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a" font-weight="700">V1</text>
    <text x="300" y="115" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">European · in GRCh38</text>

    <!-- Variant V2 at 900 kb (x=520) - NOT in GRCh38 -->
    <line x1="520" y1="80" x2="520" y2="100" stroke="#c4342c" stroke-width="2"/>
    <text x="520" y="75" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#c4342c" font-weight="700">V2</text>
    <text x="520" y="115" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">African · absent from GRCh38</text>

    <!-- Variant V3 at 1500 kb (x=740) - NOT in GRCh38 -->
    <line x1="740" y1="80" x2="740" y2="100" stroke="#b45309" stroke-width="2"/>
    <text x="740" y="75" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309" font-weight="700">V3</text>
    <text x="740" y="115" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">East Asian · absent from GRCh38</text>
  </g>

  <!-- ── Middle band: linear alignment (GRCh38) ── -->
  <g>
    <text x="60" y="160" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">Aligned to GRCh38 (linear reference)</text>

    <!-- Three populations side by side -->

    <!-- European -->
    <g transform="translate(80 170)">
      <rect x="0" y="0" width="280" height="100" rx="4" fill="#f6f4ee" stroke="#c4c1b6"/>
      <text x="140" y="18" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">European reads</text>
      <!-- V1 call -->
      <circle cx="75" cy="40" r="6" fill="#2d7a3e"/>
      <text x="100" y="44" font-family="JetBrains Mono, monospace" font-size="9" fill="#2d7a3e">V1 called</text>
      <!-- V2 call -->
      <circle cx="75" cy="60" r="6" fill="#8a8a85"/>
      <text x="100" y="64" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85">V2 — (no-call / ref)</text>
      <!-- V3 call -->
      <circle cx="75" cy="80" r="6" fill="#8a8a85"/>
      <text x="100" y="84" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85">V3 — (no-call / ref)</text>
    </g>

    <!-- African -->
    <g transform="translate(400 170)">
      <rect x="0" y="0" width="280" height="100" rx="4" fill="#f6f4ee" stroke="#c4c1b6"/>
      <text x="140" y="18" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#c4342c">African reads</text>
      <!-- V1 call -->
      <circle cx="75" cy="40" r="6" fill="#8a8a85"/>
      <text x="100" y="44" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85">V1 — (ref, not carried)</text>
      <!-- V2 call (MISSED!) -->
      <circle cx="75" cy="60" r="6" fill="#b91c1c" stroke="#0a0a0a" stroke-width="1"/>
      <text x="100" y="64" font-family="JetBrains Mono, monospace" font-size="9" fill="#b91c1c" font-weight="700">V2 MISSED ⚠</text>
      <!-- V3 call -->
      <circle cx="75" cy="80" r="6" fill="#8a8a85"/>
      <text x="100" y="84" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85">V3 — (ref)</text>
    </g>

    <!-- East Asian -->
    <g transform="translate(720 170)">
      <rect x="0" y="0" width="280" height="100" rx="4" fill="#f6f4ee" stroke="#c4c1b6"/>
      <text x="140" y="18" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#b45309">East Asian reads</text>
      <!-- V1 call -->
      <circle cx="75" cy="40" r="6" fill="#8a8a85"/>
      <text x="100" y="44" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85">V1 — (ref, not carried)</text>
      <!-- V2 call -->
      <circle cx="75" cy="60" r="6" fill="#8a8a85"/>
      <text x="100" y="64" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8a85">V2 — (ref)</text>
      <!-- V3 call (MISSED!) -->
      <circle cx="75" cy="80" r="6" fill="#b91c1c" stroke="#0a0a0a" stroke-width="1"/>
      <text x="100" y="84" font-family="JetBrains Mono, monospace" font-size="9" fill="#b91c1c" font-weight="700">V3 MISSED ⚠</text>
    </g>
  </g>

  <!-- ── Bottom band: pangenome-graph alignment ── -->
  <g>
    <text x="60" y="300" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">Aligned to pangenome graph (includes V1, V2, V3)</text>

    <!-- Three populations -->
    <g transform="translate(80 310)">
      <rect x="0" y="0" width="280" height="100" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
      <text x="140" y="18" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">European reads</text>
      <circle cx="75" cy="40" r="6" fill="#2d7a3e"/>
      <text x="100" y="44" font-family="JetBrains Mono, monospace" font-size="9" fill="#2d7a3e">V1 called</text>
      <circle cx="75" cy="60" r="6" fill="#2d7a3e"/>
      <text x="100" y="64" font-family="JetBrains Mono, monospace" font-size="9" fill="#2d7a3e">V2 — (ref, correct)</text>
      <circle cx="75" cy="80" r="6" fill="#2d7a3e"/>
      <text x="100" y="84" font-family="JetBrains Mono, monospace" font-size="9" fill="#2d7a3e">V3 — (ref, correct)</text>
    </g>

    <g transform="translate(400 310)">
      <rect x="0" y="0" width="280" height="100" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
      <text x="140" y="18" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">African reads</text>
      <circle cx="75" cy="40" r="6" fill="#2d7a3e"/>
      <text x="100" y="44" font-family="JetBrains Mono, monospace" font-size="9" fill="#2d7a3e">V1 — (ref, correct)</text>
      <circle cx="75" cy="60" r="6" fill="#2d7a3e"/>
      <text x="100" y="64" font-family="JetBrains Mono, monospace" font-size="9" fill="#2d7a3e">V2 called ✓</text>
      <circle cx="75" cy="80" r="6" fill="#2d7a3e"/>
      <text x="100" y="84" font-family="JetBrains Mono, monospace" font-size="9" fill="#2d7a3e">V3 — (ref, correct)</text>
    </g>

    <g transform="translate(720 310)">
      <rect x="0" y="0" width="280" height="100" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
      <text x="140" y="18" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">East Asian reads</text>
      <circle cx="75" cy="40" r="6" fill="#2d7a3e"/>
      <text x="100" y="44" font-family="JetBrains Mono, monospace" font-size="9" fill="#2d7a3e">V1 — (ref, correct)</text>
      <circle cx="75" cy="60" r="6" fill="#2d7a3e"/>
      <text x="100" y="64" font-family="JetBrains Mono, monospace" font-size="9" fill="#2d7a3e">V2 — (ref, correct)</text>
      <circle cx="75" cy="80" r="6" fill="#2d7a3e"/>
      <text x="100" y="84" font-family="JetBrains Mono, monospace" font-size="9" fill="#2d7a3e">V3 called ✓</text>
    </g>

    <text x="540" y="440" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">pangenome graph includes all three variants as branches — no population left behind</text>
  </g>
</svg>
