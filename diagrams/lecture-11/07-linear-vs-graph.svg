<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 420" role="img" aria-labelledby="t d">
  <title id="t">Linear reference vs graph genome</title>
  <desc id="d">Left panel: a 1 kb linear reference string with three variants (heterozygous SNP at 200, small indel at 500, SV at 800) shown as annotations off to the side. Right panel: the same genomic region rendered as a pangenome graph with branching nodes at each variant position; two haplotypes traced as coloured paths. Mapping lines connect each variant annotation in the linear panel to its corresponding graph branch.</desc>

  <defs>
    <marker id="arr-cobalt" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#1e3a8a"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#b45309"/>
    </marker>
  </defs>

  <text x="540" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">LINEAR REFERENCE vs PANGENOME GRAPH · SAME REGION, TWO REPRESENTATIONS</text>

  <!-- ── LEFT PANEL: linear ── -->
  <g>
    <rect x="30" y="50" width="500" height="320" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <!-- Title raised from y=72 to y=64 so it does not sit underneath
         the V2 variant box at y=70-90 (which previously hid part of
         the title text). -->
    <text x="280" y="64" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">Linear reference · one string</text>

    <!-- Reference string -->
    <line x1="70" y1="180" x2="490" y2="180" stroke="#525252" stroke-width="2"/>

    <!-- Coordinate markers -->
    <g font-family="JetBrains Mono, monospace" font-size="8" fill="#525252" text-anchor="middle">
      <text x="70"  y="200">0</text>
      <text x="175" y="200">250</text>
      <text x="280" y="200">500</text>
      <text x="385" y="200">750</text>
      <text x="490" y="200">1000 bp</text>
    </g>

    <!-- Variant ticks -->
    <line x1="154" y1="172" x2="154" y2="188" stroke="#b45309" stroke-width="2"/>
    <line x1="280" y1="172" x2="280" y2="188" stroke="#b45309" stroke-width="2"/>
    <line x1="406" y1="172" x2="406" y2="188" stroke="#b45309" stroke-width="2"/>

    <!-- Variant annotations off to the side -->
    <g transform="translate(70 120)">
      <line x1="84" y1="40" x2="50" y2="10" stroke="#525252" stroke-width="0.5"/>
      <rect x="0" y="-10" width="90" height="20" rx="3" fill="#fef3c7" stroke="#b45309" stroke-width="0.8"/>
      <text x="45" y="4" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309">V1: A/G SNP</text>

      <line x1="210" y1="40" x2="210" y2="-30" stroke="#525252" stroke-width="0.5"/>
      <rect x="170" y="-50" width="100" height="20" rx="3" fill="#fef3c7" stroke="#b45309" stroke-width="0.8"/>
      <text x="220" y="-36" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309">V2: 20 bp ins</text>

      <line x1="336" y1="40" x2="380" y2="10" stroke="#525252" stroke-width="0.5"/>
      <rect x="340" y="-10" width="100" height="20" rx="3" fill="#fef3c7" stroke="#b45309" stroke-width="0.8"/>
      <text x="390" y="4" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309">V3: 100 bp del</text>
    </g>

    <!-- Caption -->
    <text x="280" y="260" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">variants are annotations alongside one string</text>
    <text x="280" y="280" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">the reference itself is one arbitrary haplotype</text>
    <text x="280" y="330" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#0a0a0a">&gt;GRCh38_chr1:1-1000</text>
    <text x="280" y="346" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#0a0a0a">ACGT...ACGT (one string)</text>
  </g>

  <!-- Double-arrow between panels -->
  <g transform="translate(545 210)">
    <line x1="0" y1="-10" x2="20" y2="-10" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-cobalt)"/>
    <line x1="20" y1="10" x2="0" y2="10" stroke="#1e3a8a" stroke-width="1.5" marker-end="url(#arr-cobalt)"/>
    <text x="10" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#525252" font-style="italic">same data</text>
  </g>

  <!-- ── RIGHT PANEL: graph ── -->
  <g>
    <rect x="590" y="50" width="460" height="320" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <!-- Title raised from y=72 to y=64 to mirror the left-panel title
         change. -->
    <text x="820" y="64" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">Pangenome graph · variation first-class</text>

    <!-- Overlay haplotype paths drawn FIRST so they sit BEHIND the
         node boxes; previously the red hap1 stroke (width 3) clipped
         through the "A" letter at (715, 164) and through the
         "+20 bp ins" label at (865, 160). With the paths underneath,
         node fills cover any path stroke that crosses inside a node,
         and the labels stay legible. -->
    <!-- hap1: N1 → N2(A) → N4 → N5(ins) → N6 -->
    <path d="M 640 178 L 700 155 L 780 175 L 863 155 L 940 178" fill="none" stroke="#c4342c" stroke-width="3" opacity="0.7"/>
    <!-- hap2: N1 → N3(G) → N4 → skip → N6 -->
    <path d="M 640 183 L 700 215 L 780 183 L 890 185 L 940 183" fill="none" stroke="#1e3a8a" stroke-width="3" opacity="0.7"/>

    <!-- Graph nodes and edges -->
    <g>
      <!-- N1: left flanking sequence -->
      <rect x="610" y="170" width="60" height="30" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
      <text x="640" y="189" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#1e3a8a" font-weight="600">N1</text>

      <!-- Branch at V1: N2 (A), N3 (G) -->
      <rect x="695" y="150" width="40" height="20" rx="3" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.2"/>
      <text x="715" y="164" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a">A</text>
      <rect x="695" y="200" width="40" height="20" rx="3" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.2"/>
      <text x="715" y="214" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a">G</text>

      <!-- Edges from N1 -->
      <path d="M 670 180 L 695 160" fill="none" stroke="#8a8a85" stroke-width="1" marker-end="url(#arr-cobalt)"/>
      <path d="M 670 190 L 695 210" fill="none" stroke="#8a8a85" stroke-width="1" marker-end="url(#arr-cobalt)"/>

      <!-- N4: middle flanking -->
      <rect x="760" y="170" width="50" height="30" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
      <text x="785" y="189" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#1e3a8a" font-weight="600">N4</text>

      <!-- Edges merging back -->
      <path d="M 735 160 L 760 175" fill="none" stroke="#8a8a85" stroke-width="1" marker-end="url(#arr-cobalt)"/>
      <path d="M 735 210 L 760 195" fill="none" stroke="#8a8a85" stroke-width="1" marker-end="url(#arr-cobalt)"/>

      <!-- Branch at V2 (indel): with-insertion path vs without -->
      <!-- N5: insertion (above, only on hap1) -->
      <rect x="835" y="145" width="60" height="24" rx="3" fill="#fef3c7" stroke="#b45309" stroke-width="1"/>
      <text x="865" y="160" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#b45309">+20 bp ins</text>
      <!-- Skip edge (below, no insertion) -->
      <path d="M 810 185 L 890 185" fill="none" stroke="#8a8a85" stroke-width="1" marker-end="url(#arr-cobalt)"/>
      <path d="M 810 178 Q 845 140, 895 155" fill="none" stroke="#8a8a85" stroke-width="1" marker-end="url(#arr-cobalt)"/>

      <!-- N6: right flanking -->
      <rect x="915" y="170" width="60" height="30" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
      <text x="945" y="189" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#1e3a8a" font-weight="600">N6</text>

      <!-- Merge edges into N6 -->
      <path d="M 895 160 L 915 178" fill="none" stroke="#8a8a85" stroke-width="1" marker-end="url(#arr-cobalt)"/>
      <path d="M 890 185 L 915 185" fill="none" stroke="#8a8a85" stroke-width="1" marker-end="url(#arr-cobalt)"/>
    </g>

    <!-- Path legend -->
    <g transform="translate(610 255)">
      <line x1="0" y1="0" x2="24" y2="0" stroke="#c4342c" stroke-width="3" opacity="0.7"/>
      <text x="30" y="4" font-family="Inter, sans-serif" font-size="10" fill="#c4342c" font-weight="600">hap1: A, ins</text>
      <line x1="180" y1="0" x2="204" y2="0" stroke="#1e3a8a" stroke-width="3" opacity="0.7"/>
      <text x="210" y="4" font-family="Inter, sans-serif" font-size="10" fill="#1e3a8a" font-weight="600">hap2: G, ref</text>
    </g>

    <!-- Variant-site labels -->
    <g font-family="JetBrains Mono, monospace" font-size="8" fill="#b45309" text-anchor="middle">
      <text x="715" y="135">V1 branch</text>
      <text x="865" y="135">V2 branch</text>
    </g>

    <text x="820" y="305" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">both haplotypes explicitly represented as graph paths</text>
    <text x="820" y="325" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">shared sequence collapses into single nodes</text>
    <text x="820" y="346" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#0a0a0a">&gt;pangenome.gfa</text>
  </g>
</svg>
