<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 440" role="img" aria-labelledby="t d">
  <title id="t">GFA format anatomy</title>
  <desc id="d">Two side-by-side panels. Left: a GFA file of about 10 lines with each line type (H, S, L, P, W) coloured distinctly. Right: the graph rendered from that GFA — two parallel S nodes (1 and 2) at top, one S node (3) downstream, two L edges from nodes 1 and 2 into node 3, path hap1 traced in green from node 1 to node 3, path hap2 traced in violet from node 2 to node 3. Dashed connecting lines tie each GFA line to its graph element.</desc>

  <defs>
    <marker id="arr-cobalt" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#1e3a8a"/>
    </marker>
  </defs>

  <text x="540" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">GFA FORMAT · TEXT ENCODING ↔ GRAPH STRUCTURE</text>

  <!-- ── LEFT: GFA text ── -->
  <g>
    <rect x="30" y="50" width="500" height="360" rx="6" fill="#f6f4ee" stroke="#c4c1b6"/>
    <text x="280" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">example.gfa · text format</text>

    <!-- Line type colour guide -->
    <g transform="translate(50 88)" font-family="JetBrains Mono, monospace" font-size="9">
      <rect x="0"   y="0" width="12" height="12" fill="#8a8a85"/><text x="18" y="10" fill="#525252">H</text>
      <rect x="50"  y="0" width="12" height="12" fill="#1e3a8a"/><text x="68" y="10" fill="#1e3a8a">S</text>
      <rect x="100" y="0" width="12" height="12" fill="#b45309"/><text x="118" y="10" fill="#b45309">L</text>
      <rect x="150" y="0" width="12" height="12" fill="#2d7a3e"/><text x="168" y="10" fill="#2d7a3e">P</text>
      <rect x="200" y="0" width="12" height="12" fill="#7c3aed"/><text x="218" y="10" fill="#7c3aed">W</text>
    </g>

    <!-- The GFA file as coloured lines -->
    <g font-family="JetBrains Mono, monospace" font-size="11">
      <!-- H line -->
      <g transform="translate(50 130)">
        <rect x="-5" y="-4" width="14" height="18" fill="#8a8a85"/>
        <text x="2" y="10" fill="#ffffff" font-weight="700" text-anchor="middle">H</text>
        <text x="15" y="10" fill="#525252">  VN:Z:1.0</text>
      </g>

      <!-- S lines -->
      <g transform="translate(50 160)">
        <rect x="-5" y="-4" width="14" height="18" fill="#1e3a8a"/>
        <text x="2" y="10" fill="#ffffff" font-weight="700" text-anchor="middle">S</text>
        <text x="15" y="10" fill="#1e3a8a">  1  ACGTAAGTTTG</text>
      </g>
      <g transform="translate(50 180)">
        <rect x="-5" y="-4" width="14" height="18" fill="#1e3a8a"/>
        <text x="2" y="10" fill="#ffffff" font-weight="700" text-anchor="middle">S</text>
        <text x="15" y="10" fill="#1e3a8a">  2  ACGCAAGAATG</text>
      </g>
      <g transform="translate(50 200)">
        <rect x="-5" y="-4" width="14" height="18" fill="#1e3a8a"/>
        <text x="2" y="10" fill="#ffffff" font-weight="700" text-anchor="middle">S</text>
        <text x="15" y="10" fill="#1e3a8a">  3  CGATCGATCGA</text>
      </g>

      <!-- L lines -->
      <g transform="translate(50 230)">
        <rect x="-5" y="-4" width="14" height="18" fill="#b45309"/>
        <text x="2" y="10" fill="#ffffff" font-weight="700" text-anchor="middle">L</text>
        <text x="15" y="10" fill="#b45309">  1  +  3  +  0M</text>
      </g>
      <g transform="translate(50 250)">
        <rect x="-5" y="-4" width="14" height="18" fill="#b45309"/>
        <text x="2" y="10" fill="#ffffff" font-weight="700" text-anchor="middle">L</text>
        <text x="15" y="10" fill="#b45309">  2  +  3  +  0M</text>
      </g>

      <!-- P lines -->
      <g transform="translate(50 280)">
        <rect x="-5" y="-4" width="14" height="18" fill="#2d7a3e"/>
        <text x="2" y="10" fill="#ffffff" font-weight="700" text-anchor="middle">P</text>
        <text x="15" y="10" fill="#2d7a3e">  hap1  1+,3+  *</text>
      </g>
      <g transform="translate(50 300)">
        <rect x="-5" y="-4" width="14" height="18" fill="#2d7a3e"/>
        <text x="2" y="10" fill="#ffffff" font-weight="700" text-anchor="middle">P</text>
        <text x="15" y="10" fill="#2d7a3e">  hap2  2+,3+  *</text>
      </g>

      <!-- W line -->
      <g transform="translate(50 330)">
        <rect x="-5" y="-4" width="14" height="18" fill="#7c3aed"/>
        <text x="2" y="10" fill="#ffffff" font-weight="700" text-anchor="middle">W</text>
        <text x="15" y="10" fill="#7c3aed">  sample1  1  chr1  0  22  &gt;1&gt;3</text>
      </g>
    </g>

    <text x="280" y="380" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">each line is tab-separated; first field = line type</text>
  </g>

  <!-- Connecting dashed lines (left to right mapping) -->
  <g stroke="#c4c1b6" stroke-width="0.5" stroke-dasharray="3 2" fill="none">
    <path d="M 230 165 L 650 160"/>
    <path d="M 230 185 L 650 240"/>
    <path d="M 230 205 L 770 200"/>
    <path d="M 230 285 L 750 140"/>
    <path d="M 230 305 L 750 270"/>
  </g>

  <!-- ── RIGHT: graph rendering ── -->
  <g>
    <rect x="560" y="50" width="490" height="360" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="805" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">rendered graph</text>

    <!-- Node 1 (top) -->
    <rect x="620" y="140" width="140" height="40" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="690" y="158" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a">N1</text>
    <text x="690" y="172" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a">ACGTAAGTTTG</text>

    <!-- Node 2 (middle) -->
    <rect x="620" y="220" width="140" height="40" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="690" y="238" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a">N2</text>
    <text x="690" y="252" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a">ACGCAAGAATG</text>

    <!-- Node 3 (right) -->
    <rect x="850" y="180" width="140" height="40" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="920" y="198" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#1e3a8a">N3</text>
    <text x="920" y="212" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a">CGATCGATCGA</text>

    <!-- Edges (links) -->
    <path d="M 760 160 Q 800 170, 850 195" fill="none" stroke="#b45309" stroke-width="2" marker-end="url(#arr-cobalt)"/>
    <path d="M 760 240 Q 800 230, 850 210" fill="none" stroke="#b45309" stroke-width="2" marker-end="url(#arr-cobalt)"/>

    <!-- Path overlay hap1 (N1 → N3) -->
    <path d="M 690 180 Q 690 200, 770 175 Q 800 175, 850 195" fill="none" stroke="#2d7a3e" stroke-width="4" opacity="0.6"/>

    <!-- Path overlay hap2 (N2 → N3) -->
    <path d="M 690 260 Q 690 240, 770 230 Q 800 230, 850 210" fill="none" stroke="#7c3aed" stroke-width="4" opacity="0.6"/>

    <!-- Legend -->
    <g transform="translate(600 300)">
      <line x1="0" y1="0" x2="22" y2="0" stroke="#2d7a3e" stroke-width="4" opacity="0.7"/>
      <text x="28" y="4" font-family="Inter, sans-serif" font-size="10" fill="#2d7a3e" font-weight="600">path hap1: N1 → N3</text>

      <line x1="0" y1="20" x2="22" y2="20" stroke="#7c3aed" stroke-width="4" opacity="0.7"/>
      <text x="28" y="24" font-family="Inter, sans-serif" font-size="10" fill="#7c3aed" font-weight="600">path hap2: N2 → N3</text>

      <line x1="0" y1="40" x2="22" y2="40" stroke="#b45309" stroke-width="2" marker-end="url(#arr-cobalt)"/>
      <text x="28" y="44" font-family="Inter, sans-serif" font-size="10" fill="#b45309" font-weight="600">links (directed edges)</text>
    </g>

    <text x="805" y="380" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">S lines = nodes · L lines = edges · P lines = haplotype paths · W = sample walks</text>
  </g>
</svg>
