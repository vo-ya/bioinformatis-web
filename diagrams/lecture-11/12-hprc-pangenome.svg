<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 440" role="img" aria-labelledby="t d">
  <title id="t">HPRC-v1 pangenome structure</title>
  <desc id="d">Left panel: a two-level tree summarising the 47 HPRC haplotypes by ancestry groups — African (14), European (11), East Asian (7), South Asian (6), Admixed American (6), Oceanian (3). Right panel: a schematic of a sample locus in the HPRC pangenome graph — a GRCh38-like linear backbone with multiple alternate paths branching off at variant sites, each labelled with which haplotype groups carry it.</desc>

  <defs>
    <marker id="arr-acc" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#525252"/>
    </marker>
  </defs>

  <text x="540" y="24" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">HPRC v1 · 47 HAPLOTYPES ACROSS SIX ANCESTRY GROUPS</text>

  <!-- ── LEFT: ancestry tree ── -->
  <g>
    <rect x="30" y="50" width="500" height="360" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="280" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">Ancestry coverage · 47 haplotypes / 24 individuals</text>

    <!-- Root -->
    <circle cx="280" cy="105" r="6" fill="#1e3a8a"/>
    <text x="280" y="98" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a" font-weight="700">HPRC v1</text>

    <!-- Tree edges to 6 leaves -->
    <line x1="280" y1="111" x2="90"  y2="180" stroke="#8a8a85" stroke-width="1.2"/>
    <line x1="280" y1="111" x2="170" y2="180" stroke="#8a8a85" stroke-width="1.2"/>
    <line x1="280" y1="111" x2="250" y2="180" stroke="#8a8a85" stroke-width="1.2"/>
    <line x1="280" y1="111" x2="330" y2="180" stroke="#8a8a85" stroke-width="1.2"/>
    <line x1="280" y1="111" x2="410" y2="180" stroke="#8a8a85" stroke-width="1.2"/>
    <line x1="280" y1="111" x2="490" y2="180" stroke="#8a8a85" stroke-width="1.2"/>

    <!-- Leaves with haplotype counts -->
    <g>
      <!-- African 14 -->
      <g transform="translate(90 190)">
        <circle cx="0" cy="0" r="20" fill="#c4342c" opacity="0.7" stroke="#0a0a0a" stroke-width="1"/>
        <text x="0" y="4" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#ffffff">14</text>
        <text x="0" y="38" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#c4342c" font-weight="600">African</text>
      </g>

      <!-- European 11 -->
      <g transform="translate(170 190)">
        <circle cx="0" cy="0" r="18" fill="#1e3a8a" opacity="0.7" stroke="#0a0a0a" stroke-width="1"/>
        <text x="0" y="4" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#ffffff">11</text>
        <text x="0" y="36" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a8a" font-weight="600">European</text>
      </g>

      <!-- East Asian 7 -->
      <g transform="translate(250 190)">
        <circle cx="0" cy="0" r="14" fill="#b45309" opacity="0.7" stroke="#0a0a0a" stroke-width="1"/>
        <text x="0" y="4" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#ffffff">7</text>
        <text x="0" y="32" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#b45309" font-weight="600">East Asian</text>
      </g>

      <!-- South Asian 6 -->
      <g transform="translate(330 190)">
        <circle cx="0" cy="0" r="13" fill="#2d7a3e" opacity="0.7" stroke="#0a0a0a" stroke-width="1"/>
        <text x="0" y="4" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#ffffff">6</text>
        <text x="0" y="32" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#2d7a3e" font-weight="600">South Asian</text>
      </g>

      <!-- Admixed American 6 -->
      <g transform="translate(410 190)">
        <circle cx="0" cy="0" r="13" fill="#7c3aed" opacity="0.7" stroke="#0a0a0a" stroke-width="1"/>
        <text x="0" y="4" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#ffffff">6</text>
        <text x="0" y="32" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#7c3aed" font-weight="600">Admixed</text>
        <text x="0" y="44" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#7c3aed" font-weight="600">American</text>
      </g>

      <!-- Oceanian 3 -->
      <g transform="translate(490 190)">
        <circle cx="0" cy="0" r="10" fill="#0d7377" opacity="0.7" stroke="#0a0a0a" stroke-width="1"/>
        <text x="0" y="4" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#ffffff">3</text>
        <text x="0" y="28" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#0d7377" font-weight="600">Oceanian</text>
      </g>
    </g>

    <!-- Graph statistics -->
    <g transform="translate(60 280)">
      <rect x="0" y="0" width="440" height="110" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
      <text x="220" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">Graph statistics (pggb-built)</text>

      <g font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">
        <text x="20" y="46">sequence total:</text>
        <text x="260" y="46" fill="#1e3a8a" font-weight="600">~110 Gb</text>

        <text x="20" y="66">nodes:</text>
        <text x="260" y="66" fill="#1e3a8a" font-weight="600">~100M</text>

        <text x="20" y="86">edges:</text>
        <text x="260" y="86" fill="#1e3a8a" font-weight="600">~130M</text>
      </g>

      <text x="220" y="103" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">compressed to ~4 Gb of GFA text</text>
    </g>
  </g>

  <!-- ── RIGHT: sample locus ── -->
  <g>
    <rect x="550" y="50" width="500" height="360" rx="6" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="800" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0a0a0a">Sample locus in the pangenome graph</text>

    <!-- GRCh38 backbone -->
    <line x1="580" y1="200" x2="1020" y2="200" stroke="#525252" stroke-width="2.5"/>

    <!-- Backbone label -->
    <text x="800" y="220" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" font-style="italic">GRCh38 backbone</text>

    <!-- Variant sites with alternate paths -->
    <!-- Site 1: SNP at 620 (branching up into red African-specific) -->
    <line x1="620" y1="200" x2="620" y2="170" stroke="#c4342c" stroke-width="1.2"/>
    <rect x="610" y="155" width="90" height="16" rx="3" fill="#c4342c" opacity="0.4" stroke="#c4342c" stroke-width="1"/>
    <text x="655" y="167" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#c4342c" font-weight="600">SNP · Afr × 11</text>
    <line x1="700" y1="171" x2="700" y2="200" stroke="#c4342c" stroke-width="1.2"/>

    <!-- Site 2: small indel at 730 (branching down into green South Asian) -->
    <line x1="730" y1="200" x2="730" y2="230" stroke="#2d7a3e" stroke-width="1.2"/>
    <rect x="720" y="230" width="80" height="16" rx="3" fill="#2d7a3e" opacity="0.4" stroke="#2d7a3e" stroke-width="1"/>
    <text x="760" y="242" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#2d7a3e" font-weight="600">indel · SAs × 5</text>
    <line x1="800" y1="230" x2="800" y2="200" stroke="#2d7a3e" stroke-width="1.2"/>

    <!-- Site 3: SV at 850 (branching up into blue European) -->
    <line x1="850" y1="200" x2="850" y2="130" stroke="#1e3a8a" stroke-width="1.2"/>
    <rect x="820" y="115" width="130" height="16" rx="3" fill="#1e3a8a" opacity="0.4" stroke="#1e3a8a" stroke-width="1"/>
    <text x="885" y="127" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#1e3a8a" font-weight="600">2 kb SV · Eur × 6</text>
    <line x1="950" y1="131" x2="950" y2="200" stroke="#1e3a8a" stroke-width="1.2"/>

    <!-- Annotation legend -->
    <g transform="translate(580 290)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252">Each alternate path is labelled with</text>
      <text x="0" y="14" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#525252">which haplotype groups carry it:</text>

      <rect x="0" y="28" width="16" height="10" fill="#c4342c" opacity="0.4" stroke="#c4342c"/>
      <text x="22" y="37" font-family="Inter, sans-serif" font-size="9" fill="#c4342c">African</text>
      <rect x="90" y="28" width="16" height="10" fill="#1e3a8a" opacity="0.4" stroke="#1e3a8a"/>
      <text x="112" y="37" font-family="Inter, sans-serif" font-size="9" fill="#1e3a8a">European</text>
      <rect x="190" y="28" width="16" height="10" fill="#2d7a3e" opacity="0.4" stroke="#2d7a3e"/>
      <text x="212" y="37" font-family="Inter, sans-serif" font-size="9" fill="#2d7a3e">South Asian</text>
    </g>

    <!-- Variant summary -->
    <g transform="translate(580 360)">
      <rect x="0" y="0" width="440" height="40" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
      <text x="220" y="16" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">Variants captured (absent from GRCh38)</text>
      <text x="220" y="32" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#0a0a0a">~50,000 SVs · thousands of smaller variants · CNVs at segdups</text>
    </g>
  </g>
</svg>
