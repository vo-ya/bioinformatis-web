<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 400" role="img" aria-labelledby="t d">
  <title id="t">Allele frequencies across a population</title>
  <desc id="d">Cohort of 50 diploid individuals shown as a 10 by 5 grid of two-box icons (blue = A, red = a). 22 AA, 20 Aa, 8 aa. A middle panel tallies allele counts and computes p = 0.64 and q = 0.36. A right panel shows a genotype-frequency bar chart (AA 44%, Aa 40%, aa 16%).</desc>

  <text x="540" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">FROM COHORT TO ALLELE FREQUENCIES · COUNTING DIPLOIDS</text>

  <!-- ── LEFT: Cohort grid (50 individuals, 10 wide × 5 tall) ── -->
  <g transform="translate(40 60)">
    <text x="0" y="-6" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">50 diploid individuals</text>
    <!-- Grid: each individual is 2 stacked 12×12 squares at spacing 26 px apart. Colors: AA = 2 blue, Aa = blue+red, aa = 2 red. -->
    <!-- Distribution: 22 AA, 20 Aa, 8 aa. Rows 1-2 mostly AA, row 3 mixed, rows 4-5 mostly Aa with aa at end. -->
    <g font-family="JetBrains Mono, monospace" font-size="6" fill="#ffffff" font-weight="600" text-anchor="middle">
      <!-- Row 1: 10 AA -->
      <g transform="translate(0 0)">
        <g><rect x="0"  y="0"  width="12" height="12" fill="#1e3a8a"/><rect x="0"  y="13" width="12" height="12" fill="#1e3a8a"/></g>
        <g transform="translate(22 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#1e3a8a"/></g>
        <g transform="translate(44 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#1e3a8a"/></g>
        <g transform="translate(66 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#1e3a8a"/></g>
        <g transform="translate(88 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#1e3a8a"/></g>
        <g transform="translate(110 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#1e3a8a"/></g>
        <g transform="translate(132 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#1e3a8a"/></g>
        <g transform="translate(154 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#1e3a8a"/></g>
        <g transform="translate(176 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#1e3a8a"/></g>
        <g transform="translate(198 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#1e3a8a"/></g>
      </g>
      <!-- Row 2: 10 AA -->
      <g transform="translate(0 32)">
        <g><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#1e3a8a"/></g>
        <g transform="translate(22 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#1e3a8a"/></g>
        <g transform="translate(44 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#1e3a8a"/></g>
        <g transform="translate(66 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#1e3a8a"/></g>
        <g transform="translate(88 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#1e3a8a"/></g>
        <g transform="translate(110 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#1e3a8a"/></g>
        <g transform="translate(132 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#1e3a8a"/></g>
        <g transform="translate(154 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#1e3a8a"/></g>
        <g transform="translate(176 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#1e3a8a"/></g>
        <g transform="translate(198 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#1e3a8a"/></g>
      </g>
      <!-- Row 3: 2 AA + 8 Aa -->
      <g transform="translate(0 64)">
        <g><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#1e3a8a"/></g>
        <g transform="translate(22 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#1e3a8a"/></g>
        <g transform="translate(44 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
        <g transform="translate(66 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
        <g transform="translate(88 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
        <g transform="translate(110 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
        <g transform="translate(132 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
        <g transform="translate(154 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
        <g transform="translate(176 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
        <g transform="translate(198 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
      </g>
      <!-- Row 4: 10 Aa -->
      <g transform="translate(0 96)">
        <g><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
        <g transform="translate(22 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
        <g transform="translate(44 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
        <g transform="translate(66 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
        <g transform="translate(88 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
        <g transform="translate(110 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
        <g transform="translate(132 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
        <g transform="translate(154 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
        <g transform="translate(176 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
        <g transform="translate(198 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
      </g>
      <!-- Row 5: 2 Aa + 8 aa -->
      <g transform="translate(0 128)">
        <g><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
        <g transform="translate(22 0)"><rect width="12" height="12" fill="#1e3a8a"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
        <g transform="translate(44 0)"><rect width="12" height="12" fill="#c4342c"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
        <g transform="translate(66 0)"><rect width="12" height="12" fill="#c4342c"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
        <g transform="translate(88 0)"><rect width="12" height="12" fill="#c4342c"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
        <g transform="translate(110 0)"><rect width="12" height="12" fill="#c4342c"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
        <g transform="translate(132 0)"><rect width="12" height="12" fill="#c4342c"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
        <g transform="translate(154 0)"><rect width="12" height="12" fill="#c4342c"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
        <g transform="translate(176 0)"><rect width="12" height="12" fill="#c4342c"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
        <g transform="translate(198 0)"><rect width="12" height="12" fill="#c4342c"/><rect y="13" width="12" height="12" fill="#c4342c"/></g>
      </g>
    </g>

    <!-- Legend -->
    <g transform="translate(0 210)" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">
      <rect x="0"  y="0" width="10" height="10" fill="#1e3a8a"/>
      <text x="14" y="9">A allele</text>
      <rect x="70" y="0" width="10" height="10" fill="#c4342c"/>
      <text x="84" y="9">a allele</text>
    </g>
  </g>

  <!-- ── MIDDLE: Counting panel ── -->
  <g transform="translate(360 60)">
    <rect x="0" y="0" width="260" height="240" rx="6" fill="#f6f4ee" stroke="#c4c1b6"/>
    <text x="130" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">COUNT · COMPUTE</text>

    <g font-family="JetBrains Mono, monospace" font-size="12" fill="#0a0a0a">
      <text x="16" y="56">N individuals = 50</text>
      <text x="16" y="76">2N chromosomes = 100</text>

      <line x1="16" y1="88" x2="244" y2="88" stroke="#c4c1b6"/>

      <text x="16" y="110">AA count    = 22</text>
      <text x="16" y="128">Aa count    = 20</text>
      <text x="16" y="146">aa count    =  8</text>

      <line x1="16" y1="158" x2="244" y2="158" stroke="#c4c1b6"/>

      <text x="16" y="180" fill="#1e3a8a">#A = 2·22 + 20 = 64</text>
      <text x="16" y="198" fill="#c4342c">#a = 2·8  + 20 = 36</text>
    </g>

    <g font-family="JetBrains Mono, monospace" font-size="13" font-weight="600">
      <text x="16" y="224" fill="#1e3a8a">p = #A/2N = 0.64</text>
    </g>
    <text x="180" y="224" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#c4342c">q = 0.36</text>
  </g>

  <!-- ── RIGHT: Genotype-frequency bar chart ── -->
  <g transform="translate(660 60)">
    <text x="190" y="-2" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">genotype frequencies</text>

    <!-- Axes -->
    <line x1="40" y1="220" x2="380" y2="220" stroke="#525252" stroke-width="1"/>
    <line x1="40" y1="10"  x2="40"  y2="220" stroke="#525252" stroke-width="1"/>

    <!-- Y-ticks: 0, 0.25, 0.5, 0.75, 1.0 mapped to y = 220, 167, 115, 62, 10 -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="end">
      <text x="36" y="14">1.0</text>
      <text x="36" y="66">0.75</text>
      <text x="36" y="119">0.50</text>
      <text x="36" y="171">0.25</text>
      <text x="36" y="224">0</text>
    </g>
    <g stroke="#c4c1b6" stroke-width="0.5" stroke-dasharray="2 2">
      <line x1="40" y1="62"  x2="380" y2="62"/>
      <line x1="40" y1="115" x2="380" y2="115"/>
      <line x1="40" y1="167" x2="380" y2="167"/>
    </g>

    <!-- Bars: AA=0.44 (height 92), Aa=0.40 (84), aa=0.16 (34); bar-width 80, gap -->
    <!-- Heights: freq * 210 px -->
    <g>
      <rect x="70"  y="128" width="80" height="92" fill="#1e3a8a" opacity="0.85"/>
      <text x="110" y="120" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#1e3a8a">0.44</text>
      <text x="110" y="236" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#0a0a0a">AA</text>
      <text x="110" y="248" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">22 obs</text>
    </g>
    <g>
      <rect x="170" y="136" width="80" height="84" fill="#7c3aed" opacity="0.75"/>
      <text x="210" y="128" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#7c3aed">0.40</text>
      <text x="210" y="236" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#0a0a0a">Aa</text>
      <text x="210" y="248" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">20 obs</text>
    </g>
    <g>
      <rect x="270" y="186" width="80" height="34" fill="#c4342c" opacity="0.85"/>
      <text x="310" y="178" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#c4342c">0.16</text>
      <text x="310" y="236" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#0a0a0a">aa</text>
      <text x="310" y="248" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#525252">8 obs</text>
    </g>

    <text x="190" y="276" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">sums to 1.00</text>
  </g>

  <!-- Bottom summary -->
  <g transform="translate(40 350)">
    <rect x="0" y="0" width="1000" height="38" rx="6" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
    <text x="500" y="16" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">Allele frequency is a count-based statistic — sum the alleles, divide by 2N.</text>
    <text x="500" y="30" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">p + q = 1  ·  freq(AA) + freq(Aa) + freq(aa) = 1</text>
  </g>
</svg>
