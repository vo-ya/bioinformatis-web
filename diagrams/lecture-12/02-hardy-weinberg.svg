<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" role="img" aria-labelledby="t d">
  <title id="t">Hardy-Weinberg genotype curves</title>
  <desc id="d">Plot of genotype frequency versus allele frequency p. Three curves: p squared (AA, cobalt parabola rising from 0 to 1), q squared (aa, red parabola falling from 1 to 0), and 2pq (Aa, green symmetric hump peaking at 0.5 when p = 0.5). Fixation annotations at both ends and a side caption that the three frequencies sum to 1 at any p.</desc>

  <text x="480" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">HARDY-WEINBERG · GENOTYPE FREQUENCIES FROM ALLELE FREQUENCIES</text>

  <!-- Plot area: x [0,1] maps to x [80, 740]; y [0,1] maps to y [360, 60] -->
  <rect x="80" y="60" width="660" height="300" fill="#ffffff" stroke="#c4c1b6"/>

  <!-- Grid lines every 0.25 -->
  <g stroke="#c4c1b6" stroke-width="0.5" stroke-dasharray="2 2">
    <!-- Vertical grid at p=0.25, 0.5, 0.75 -->
    <line x1="245" y1="60" x2="245" y2="360"/>
    <line x1="410" y1="60" x2="410" y2="360"/>
    <line x1="575" y1="60" x2="575" y2="360"/>
    <!-- Horizontal grid at 0.25, 0.5, 0.75 -->
    <line x1="80" y1="285" x2="740" y2="285"/>
    <line x1="80" y1="210" x2="740" y2="210"/>
    <line x1="80" y1="135" x2="740" y2="135"/>
  </g>

  <!-- X-axis -->
  <line x1="80" y1="360" x2="740" y2="360" stroke="#525252" stroke-width="1"/>
  <g font-family="JetBrains Mono, monospace" font-size="10" fill="#525252" text-anchor="middle">
    <text x="80"  y="378">0.00</text>
    <text x="245" y="378">0.25</text>
    <text x="410" y="378">0.50</text>
    <text x="575" y="378">0.75</text>
    <text x="740" y="378">1.00</text>
  </g>
  <text x="410" y="398" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0a0a0a" font-style="italic">allele frequency p  (q = 1 − p)</text>

  <!-- Y-axis -->
  <line x1="80" y1="60" x2="80" y2="360" stroke="#525252" stroke-width="1"/>
  <g font-family="JetBrains Mono, monospace" font-size="10" fill="#525252" text-anchor="end">
    <text x="74" y="64">1.00</text>
    <text x="74" y="139">0.75</text>
    <text x="74" y="214">0.50</text>
    <text x="74" y="289">0.25</text>
    <text x="74" y="364">0.00</text>
  </g>
  <text x="36" y="210" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0a0a0a" transform="rotate(-90 36 210)">genotype frequency</text>

  <!-- Curve 1: p^2 (AA) — cobalt. Points sampled every 0.05 in p. x = 80 + 660*p; y = 360 - 300*p^2 -->
  <!-- Fill -->
  <path d="M 80 360
           L 113 359.25 L 146 357 L 179 353.25 L 212 348 L 245 341.25
           L 278 333 L 311 323.25 L 344 312 L 377 299.25 L 410 285
           L 443 269.25 L 476 252 L 509 233.25 L 542 213 L 575 191.25
           L 608 168 L 641 143.25 L 674 117 L 707 89.25 L 740 60
           L 740 360 Z"
        fill="#1e3a8a" opacity="0.2"/>
  <!-- Stroke -->
  <path d="M 80 360 L 113 359.25 L 146 357 L 179 353.25 L 212 348 L 245 341.25 L 278 333 L 311 323.25 L 344 312 L 377 299.25 L 410 285 L 443 269.25 L 476 252 L 509 233.25 L 542 213 L 575 191.25 L 608 168 L 641 143.25 L 674 117 L 707 89.25 L 740 60"
        fill="none" stroke="#1e3a8a" stroke-width="2"/>

  <!-- Curve 2: q^2 (aa) — red. q = 1-p. y = 360 - 300*(1-p)^2. Mirror of p^2. -->
  <path d="M 80 60 L 113 89.25 L 146 117 L 179 143.25 L 212 168 L 245 191.25 L 278 213 L 311 233.25 L 344 252 L 377 269.25 L 410 285 L 443 299.25 L 476 312 L 509 323.25 L 542 333 L 575 341.25 L 608 348 L 641 353.25 L 674 357 L 707 359.25 L 740 360"
        fill="none" stroke="#c4342c" stroke-width="2"/>

  <!-- Curve 3: 2pq (Aa) — green. y = 360 - 300*2*p*(1-p) -->
  <!-- Values: p=0 y=360; p=0.1 2pq=0.18 y=306; p=0.2 2pq=0.32 y=264; p=0.3 2pq=0.42 y=234; p=0.4 2pq=0.48 y=216; p=0.5 2pq=0.5 y=210; p=0.6=0.48; p=0.7=0.42; p=0.8=0.32; p=0.9=0.18; p=1 y=360 -->
  <path d="M 80 360 L 113 343.5 L 146 327.75 L 179 313.5 L 212 300.75 L 245 290.25 L 278 280.5 L 311 273 L 344 267.75 L 377 264 L 410 262.5
           L 443 262.5 L 476 264 L 509 267.75 L 542 273 L 575 280.5 L 608 290.25 L 641 300.75 L 674 313.5 L 707 327.75 L 740 343.5 L 740 360 Z"
        fill="#2d7a3e" opacity="0.15"/>
  <path d="M 80 360 L 113 343.5 L 146 327.75 L 179 313.5 L 212 300.75 L 245 290.25 L 278 280.5 L 311 273 L 344 267.75 L 377 264 L 410 262.5 L 443 262.5 L 476 264 L 509 267.75 L 542 273 L 575 280.5 L 608 290.25 L 641 300.75 L 674 313.5 L 707 327.75 L 740 343.5"
        fill="none" stroke="#2d7a3e" stroke-width="2"/>

  <!-- Peak of 2pq marker at (0.5, 0.5) → (410, 210) -->
  <circle cx="410" cy="210" r="5" fill="#2d7a3e" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="410" y1="210" x2="470" y2="175" stroke="#525252" stroke-width="0.8"/>
  <text x="474" y="170" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#2d7a3e">peak: max heterozygosity</text>
  <text x="474" y="183" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">2pq = 0.5 at p = 0.5</text>

  <!-- Fixation labels -->
  <text x="80"  y="54" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#c4342c">aa fixed</text>
  <text x="740" y="54" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#1e3a8a">AA fixed</text>

  <!-- Curve labels near right edge -->
  <text x="725" y="76" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#1e3a8a">p²  (AA)</text>
  <text x="725" y="338" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#c4342c">q²  (aa)</text>
  <text x="430" y="256" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#2d7a3e">2pq  (Aa)</text>

  <!-- Side caption box (right) -->
  <g transform="translate(770 80)">
    <rect x="0" y="0" width="170" height="130" rx="6" fill="#f6f4ee" stroke="#c4c1b6"/>
    <text x="12" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">AT ANY p</text>
    <text x="12" y="42" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">p² + 2pq + q²</text>
    <text x="12" y="58" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">= (p + q)²  = 1</text>
    <line x1="12" y1="68" x2="158" y2="68" stroke="#c4c1b6"/>
    <text x="12" y="86" font-family="Inter, sans-serif" font-size="9" fill="#525252">Assumes:</text>
    <text x="12" y="100" font-family="Inter, sans-serif" font-size="9" fill="#525252">random mating,</text>
    <text x="12" y="112" font-family="Inter, sans-serif" font-size="9" fill="#525252">no selection / drift,</text>
    <text x="12" y="124" font-family="Inter, sans-serif" font-size="9" fill="#525252">no migration, no mutation.</text>
  </g>

  <!-- Bottom summary -->
  <g transform="translate(80 410)">
    <text x="330" y="12" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">heterozygosity is maximised when the two alleles are equal in frequency</text>
  </g>
</svg>
