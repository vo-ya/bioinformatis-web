<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 440" role="img" aria-labelledby="t d">
  <title id="t">Wright-Fisher model schematic</title>
  <desc id="d">Three generations stacked vertically, each a row of 2N = 10 chromosome cells coloured blue (A) or red (a). Thin arrows connect each child chromosome in generation t+1 to a random parent in generation t. Allele frequencies drift from p = 0.5 to 0.4 to 0.3 across the three generations.</desc>

  <defs>
    <marker id="arr-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8a8a85"/>
    </marker>
  </defs>

  <text x="540" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">WRIGHT-FISHER · EACH CHILD SAMPLES A PARENT UNIFORMLY</text>

  <!-- 10 cells across, spaced at 60 px starting at x = 100; width 40 each. y positions: gen 0 at 80, gen 1 at 200, gen 2 at 320 -->

  <!-- ── GENERATION 0: p = 0.5, 5A 5a ── -->
  <g transform="translate(0 80)">
    <text x="90" y="18" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#525252">gen 0</text>
    <text x="90" y="32" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">p = 0.50</text>
    <!-- Cells: index 0..9. A: 0,1,2,3,4; a: 5,6,7,8,9 -->
    <g font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">
      <rect x="100" y="0"  width="40" height="32" fill="#1e3a8a" stroke="#0a0a0a" stroke-width="0.8"/><text x="120" y="22">A</text>
      <rect x="160" y="0"  width="40" height="32" fill="#1e3a8a" stroke="#0a0a0a" stroke-width="0.8"/><text x="180" y="22">A</text>
      <rect x="220" y="0"  width="40" height="32" fill="#1e3a8a" stroke="#0a0a0a" stroke-width="0.8"/><text x="240" y="22">A</text>
      <rect x="280" y="0"  width="40" height="32" fill="#1e3a8a" stroke="#0a0a0a" stroke-width="0.8"/><text x="300" y="22">A</text>
      <rect x="340" y="0"  width="40" height="32" fill="#1e3a8a" stroke="#0a0a0a" stroke-width="0.8"/><text x="360" y="22">A</text>
      <rect x="400" y="0"  width="40" height="32" fill="#c4342c" stroke="#0a0a0a" stroke-width="0.8"/><text x="420" y="22">a</text>
      <rect x="460" y="0"  width="40" height="32" fill="#c4342c" stroke="#0a0a0a" stroke-width="0.8"/><text x="480" y="22">a</text>
      <rect x="520" y="0"  width="40" height="32" fill="#c4342c" stroke="#0a0a0a" stroke-width="0.8"/><text x="540" y="22">a</text>
      <rect x="580" y="0"  width="40" height="32" fill="#c4342c" stroke="#0a0a0a" stroke-width="0.8"/><text x="600" y="22">a</text>
      <rect x="640" y="0"  width="40" height="32" fill="#c4342c" stroke="#0a0a0a" stroke-width="0.8"/><text x="660" y="22">a</text>
    </g>
  </g>

  <!-- ── GENERATION 1: p = 0.4, 4A 6a. Child pattern: A A A A a a a a a a -->
  <!-- Parent assignments (child idx → parent idx in gen 0): 0→0 (A), 1→2 (A), 2→2 (A), 3→4 (A), 4→6 (a), 5→6 (a), 6→5 (a), 7→7 (a), 8→9 (a), 9→9 (a) -->
  <g transform="translate(0 200)">
    <text x="90" y="18" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#525252">gen 1</text>
    <text x="90" y="32" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">p = 0.40</text>
    <g font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">
      <rect x="100" y="0"  width="40" height="32" fill="#1e3a8a" stroke="#0a0a0a" stroke-width="0.8"/><text x="120" y="22">A</text>
      <rect x="160" y="0"  width="40" height="32" fill="#1e3a8a" stroke="#0a0a0a" stroke-width="0.8"/><text x="180" y="22">A</text>
      <rect x="220" y="0"  width="40" height="32" fill="#1e3a8a" stroke="#0a0a0a" stroke-width="0.8"/><text x="240" y="22">A</text>
      <rect x="280" y="0"  width="40" height="32" fill="#1e3a8a" stroke="#0a0a0a" stroke-width="0.8"/><text x="300" y="22">A</text>
      <rect x="340" y="0"  width="40" height="32" fill="#c4342c" stroke="#0a0a0a" stroke-width="0.8"/><text x="360" y="22">a</text>
      <rect x="400" y="0"  width="40" height="32" fill="#c4342c" stroke="#0a0a0a" stroke-width="0.8"/><text x="420" y="22">a</text>
      <rect x="460" y="0"  width="40" height="32" fill="#c4342c" stroke="#0a0a0a" stroke-width="0.8"/><text x="480" y="22">a</text>
      <rect x="520" y="0"  width="40" height="32" fill="#c4342c" stroke="#0a0a0a" stroke-width="0.8"/><text x="540" y="22">a</text>
      <rect x="580" y="0"  width="40" height="32" fill="#c4342c" stroke="#0a0a0a" stroke-width="0.8"/><text x="600" y="22">a</text>
      <rect x="640" y="0"  width="40" height="32" fill="#c4342c" stroke="#0a0a0a" stroke-width="0.8"/><text x="660" y="22">a</text>
    </g>
  </g>

  <!-- Arrows gen0 → gen1. Parent bottom y=112, child top y=200. Child x_i = 120+60*i, parent x_j = 120+60*j -->
  <g stroke="#8a8a85" stroke-width="0.8" fill="none">
    <line x1="120" y1="112" x2="120" y2="200" marker-end="url(#arr-muted)"/>  <!-- 0→0 -->
    <line x1="240" y1="112" x2="180" y2="200" marker-end="url(#arr-muted)"/>  <!-- 2→1 -->
    <line x1="240" y1="112" x2="240" y2="200" marker-end="url(#arr-muted)"/>  <!-- 2→2 (double child) -->
    <line x1="360" y1="112" x2="300" y2="200" marker-end="url(#arr-muted)"/>  <!-- 4→3 -->
    <line x1="480" y1="112" x2="360" y2="200" marker-end="url(#arr-muted)"/>  <!-- 6→4 -->
    <line x1="480" y1="112" x2="420" y2="200" marker-end="url(#arr-muted)"/>  <!-- 6→5 (double) -->
    <line x1="420" y1="112" x2="480" y2="200" marker-end="url(#arr-muted)"/>  <!-- 5→6 -->
    <line x1="540" y1="112" x2="540" y2="200" marker-end="url(#arr-muted)"/>  <!-- 7→7 -->
    <line x1="660" y1="112" x2="600" y2="200" marker-end="url(#arr-muted)"/>  <!-- 9→8 -->
    <line x1="660" y1="112" x2="660" y2="200" marker-end="url(#arr-muted)"/>  <!-- 9→9 (double) -->
  </g>

  <!-- ── GENERATION 2: p = 0.3, 3A 7a ── Children pattern: A A A a a a a a a a -->
  <!-- Parent assignments (child → parent in gen 1): 0→2 (A), 1→3 (A), 2→3 (A), 3→4 (a), 4→5 (a), 5→5 (a), 6→7 (a), 7→8 (a), 8→9 (a), 9→9 (a) -->
  <g transform="translate(0 320)">
    <text x="90" y="18" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#525252">gen 2</text>
    <text x="90" y="32" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">p = 0.30</text>
    <g font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">
      <rect x="100" y="0"  width="40" height="32" fill="#1e3a8a" stroke="#0a0a0a" stroke-width="0.8"/><text x="120" y="22">A</text>
      <rect x="160" y="0"  width="40" height="32" fill="#1e3a8a" stroke="#0a0a0a" stroke-width="0.8"/><text x="180" y="22">A</text>
      <rect x="220" y="0"  width="40" height="32" fill="#1e3a8a" stroke="#0a0a0a" stroke-width="0.8"/><text x="240" y="22">A</text>
      <rect x="280" y="0"  width="40" height="32" fill="#c4342c" stroke="#0a0a0a" stroke-width="0.8"/><text x="300" y="22">a</text>
      <rect x="340" y="0"  width="40" height="32" fill="#c4342c" stroke="#0a0a0a" stroke-width="0.8"/><text x="360" y="22">a</text>
      <rect x="400" y="0"  width="40" height="32" fill="#c4342c" stroke="#0a0a0a" stroke-width="0.8"/><text x="420" y="22">a</text>
      <rect x="460" y="0"  width="40" height="32" fill="#c4342c" stroke="#0a0a0a" stroke-width="0.8"/><text x="480" y="22">a</text>
      <rect x="520" y="0"  width="40" height="32" fill="#c4342c" stroke="#0a0a0a" stroke-width="0.8"/><text x="540" y="22">a</text>
      <rect x="580" y="0"  width="40" height="32" fill="#c4342c" stroke="#0a0a0a" stroke-width="0.8"/><text x="600" y="22">a</text>
      <rect x="640" y="0"  width="40" height="32" fill="#c4342c" stroke="#0a0a0a" stroke-width="0.8"/><text x="660" y="22">a</text>
    </g>
  </g>

  <!-- Arrows gen1 → gen2 -->
  <g stroke="#8a8a85" stroke-width="0.8" fill="none">
    <line x1="240" y1="232" x2="120" y2="320" marker-end="url(#arr-muted)"/>  <!-- 2→0 -->
    <line x1="300" y1="232" x2="180" y2="320" marker-end="url(#arr-muted)"/>  <!-- 3→1 -->
    <line x1="300" y1="232" x2="240" y2="320" marker-end="url(#arr-muted)"/>  <!-- 3→2 -->
    <line x1="360" y1="232" x2="300" y2="320" marker-end="url(#arr-muted)"/>  <!-- 4→3 -->
    <line x1="420" y1="232" x2="360" y2="320" marker-end="url(#arr-muted)"/>  <!-- 5→4 -->
    <line x1="420" y1="232" x2="420" y2="320" marker-end="url(#arr-muted)"/>  <!-- 5→5 -->
    <line x1="540" y1="232" x2="480" y2="320" marker-end="url(#arr-muted)"/>  <!-- 7→6 -->
    <line x1="600" y1="232" x2="540" y2="320" marker-end="url(#arr-muted)"/>  <!-- 8→7 -->
    <line x1="660" y1="232" x2="600" y2="320" marker-end="url(#arr-muted)"/>  <!-- 9→8 -->
    <line x1="660" y1="232" x2="660" y2="320" marker-end="url(#arr-muted)"/>  <!-- 9→9 -->
  </g>

  <!-- Side annotations (right) -->
  <g transform="translate(720 80)">
    <rect x="0" y="0" width="340" height="270" rx="6" fill="#f6f4ee" stroke="#c4c1b6"/>
    <text x="14" y="22" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">SAMPLING RULE</text>
    <text x="14" y="42" font-family="Inter, sans-serif" font-size="11" fill="#0a0a0a">each child picks a parent with</text>
    <text x="14" y="58" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">prob 1/(2N) per chromosome</text>

    <line x1="14" y1="72" x2="326" y2="72" stroke="#c4c1b6"/>

    <text x="14" y="92" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">STOCHASTIC DRIFT</text>
    <text x="14" y="112" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">p_{t+1} | p_t ~ Binomial(2N, p_t) / 2N</text>
    <text x="14" y="128" font-family="Inter, sans-serif" font-size="10" fill="#525252">expected value: E[p_{t+1}] = p_t</text>
    <text x="14" y="142" font-family="Inter, sans-serif" font-size="10" fill="#525252">variance: p_t (1 − p_t) / (2N)</text>

    <line x1="14" y1="156" x2="326" y2="156" stroke="#c4c1b6"/>

    <text x="14" y="176" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#b45309" letter-spacing="0.08em">OBSERVED HERE</text>
    <text x="14" y="196" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">p drifts 0.5 → 0.4 → 0.3</text>
    <text x="14" y="212" font-family="Inter, sans-serif" font-size="10" fill="#525252">no selection — just sampling noise</text>

    <line x1="14" y1="226" x2="326" y2="226" stroke="#c4c1b6"/>
    <text x="14" y="244" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">some parents leave 0 offspring,</text>
    <text x="14" y="256" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">others leave 2+. that's the whole engine.</text>
  </g>
</svg>
