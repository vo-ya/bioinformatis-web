<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 460" role="img" aria-labelledby="t d">
  <title id="t">Genetic drift trajectories: small vs large N</title>
  <desc id="d">Two side-by-side plots showing allele-frequency trajectories across 500 generations, starting at p_0 = 0.5. Left: N = 50 — eight coloured trajectories, volatile, several hit fixation or loss. Right: N = 5000 — eight trajectories that stay clustered tightly near 0.5. Horizontal dashed lines at p = 0 and p = 1 mark absorbing boundaries.</desc>

  <text x="540" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">GENETIC DRIFT · SMALL N DRIFTS FAST · LARGE N DRIFTS SLOWLY</text>

  <!-- ── LEFT PANEL: N = 50 ── -->
  <!-- Plot area x: 60-500, y: 60-380. x = 60 + gen/500 * 440; y = 60 + (1-p) * 320 -->
  <g>
    <rect x="60" y="60" width="440" height="320" fill="#ffffff" stroke="#8a8a85" stroke-width="1.2"/>
    <text x="280" y="52" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">Small population  ·  N = 50</text>

    <!-- Gridlines -->
    <g stroke="#c4c1b6" stroke-width="0.5" stroke-dasharray="2 2">
      <line x1="60"  y1="140" x2="500" y2="140"/> <!-- p=0.75 -->
      <line x1="60"  y1="220" x2="500" y2="220"/> <!-- p=0.5 -->
      <line x1="60"  y1="300" x2="500" y2="300"/> <!-- p=0.25 -->
    </g>

    <!-- Absorbing boundaries: p=0 at y=380 and p=1 at y=60 -->
    <line x1="60" y1="60"  x2="500" y2="60"  stroke="#b45309" stroke-width="1" stroke-dasharray="4 3"/>
    <line x1="60" y1="380" x2="500" y2="380" stroke="#b45309" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="64" y="72" font-family="JetBrains Mono, monospace" font-size="8" fill="#b45309">p = 1 (A fixed)</text>
    <text x="64" y="376" font-family="JetBrains Mono, monospace" font-size="8" fill="#b45309">p = 0 (A lost)</text>

    <!-- 8 trajectories starting at p=0.5 (y=220). Hand-crafted volatile paths. Sampled at x=60,104,148,...,500 (11 points) -->
    <!-- Traj 1: rises then fixes at ~gen 320 at p=1 -->
    <path d="M 60 220 L 104 210 L 148 198 L 192 178 L 236 162 L 280 140 L 324 110 L 368 82 L 412 64 L 456 60 L 500 60"
          fill="none" stroke="#1e3a8a" stroke-width="1" opacity="0.85"/>
    <!-- Traj 2: falls, nearly lost, recovers, bounces -->
    <path d="M 60 220 L 104 236 L 148 260 L 192 288 L 236 308 L 280 326 L 324 312 L 368 286 L 412 264 L 456 276 L 500 258"
          fill="none" stroke="#c4342c" stroke-width="1" opacity="0.85"/>
    <!-- Traj 3: fixes at p=0 at gen ~280 -->
    <path d="M 60 220 L 104 242 L 148 264 L 192 292 L 236 320 L 280 356 L 324 378 L 368 380 L 412 380 L 456 380 L 500 380"
          fill="none" stroke="#b45309" stroke-width="1" opacity="0.85"/>
    <!-- Traj 4: volatile, ends near 0.6 -->
    <path d="M 60 220 L 104 204 L 148 228 L 192 208 L 236 188 L 280 216 L 324 196 L 368 172 L 412 186 L 456 164 L 500 156"
          fill="none" stroke="#2d7a3e" stroke-width="1" opacity="0.85"/>
    <!-- Traj 5: slowly drops, near 0.2 -->
    <path d="M 60 220 L 104 232 L 148 250 L 192 268 L 236 282 L 280 290 L 324 304 L 368 300 L 412 316 L 456 326 L 500 330"
          fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.85"/>
    <!-- Traj 6: rises, nearly fixes, drops back -->
    <path d="M 60 220 L 104 200 L 148 174 L 192 148 L 236 128 L 280 106 L 324 128 L 368 156 L 412 142 L 456 128 L 500 112"
          fill="none" stroke="#0d7377" stroke-width="1" opacity="0.85"/>
    <!-- Traj 7: zigzag near 0.5 -->
    <path d="M 60 220 L 104 230 L 148 212 L 192 240 L 236 226 L 280 248 L 324 232 L 368 252 L 412 236 L 456 224 L 500 246"
          fill="none" stroke="#525252" stroke-width="1" opacity="0.75"/>
    <!-- Traj 8: fixes at p=1 around gen 200 -->
    <path d="M 60 220 L 104 196 L 148 170 L 192 140 L 236 102 L 280 76 L 324 60 L 368 60 L 412 60 L 456 60 L 500 60"
          fill="none" stroke="#b91c1c" stroke-width="1" opacity="0.85"/>

    <!-- X-axis -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">
      <text x="60"  y="398">0</text>
      <text x="192" y="398">150</text>
      <text x="324" y="398">300</text>
      <text x="456" y="398">450</text>
    </g>
    <text x="280" y="416" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">generations</text>

    <!-- Y-axis -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="end">
      <text x="56" y="64">1.0</text>
      <text x="56" y="144">0.75</text>
      <text x="56" y="224">0.50</text>
      <text x="56" y="304">0.25</text>
      <text x="56" y="384">0.0</text>
    </g>
    <text x="22" y="220" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" transform="rotate(-90 22 220)">allele frequency p</text>

    <!-- Annotation. Moved from upper-left (translate 72 86) to the
         empty band in the lower-left (translate 72 320), where it
         no longer sits underneath the rising trajectories 1, 6, 8
         (which used to cross the box at x=192-252 with y=120-148). -->
    <g transform="translate(72 320)">
      <rect x="0" y="0" width="150" height="44" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.6"/>
      <text x="8" y="16" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">volatile · several fix</text>
      <text x="8" y="30" font-family="JetBrains Mono, monospace" font-size="9" fill="#0a0a0a">~half fix by gen 200</text>
      <text x="8" y="42" font-family="Inter, sans-serif" font-size="9" fill="#525252">fixation ~ 4N = 200 gens</text>
    </g>
  </g>

  <!-- ── RIGHT PANEL: N = 5000 ── -->
  <g transform="translate(540 0)">
    <rect x="60" y="60" width="440" height="320" fill="#ffffff" stroke="#8a8a85" stroke-width="1.2"/>
    <text x="280" y="52" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">Large population  ·  N = 5000</text>

    <g stroke="#c4c1b6" stroke-width="0.5" stroke-dasharray="2 2">
      <line x1="60"  y1="140" x2="500" y2="140"/>
      <line x1="60"  y1="220" x2="500" y2="220"/>
      <line x1="60"  y1="300" x2="500" y2="300"/>
    </g>

    <line x1="60" y1="60"  x2="500" y2="60"  stroke="#b45309" stroke-width="1" stroke-dasharray="4 3"/>
    <line x1="60" y1="380" x2="500" y2="380" stroke="#b45309" stroke-width="1" stroke-dasharray="4 3"/>

    <!-- Tight band around p = 0.5 (y=220). All trajectories within p in (0.42, 0.58), i.e., y in (207, 233) -->
    <!-- Shaded band -->
    <rect x="60" y="207" width="440" height="26" fill="#eef2ff" opacity="0.5"/>

    <path d="M 60 220 L 104 218 L 148 221 L 192 216 L 236 219 L 280 217 L 324 220 L 368 215 L 412 218 L 456 215 L 500 217" fill="none" stroke="#1e3a8a" stroke-width="1" opacity="0.75"/>
    <path d="M 60 220 L 104 222 L 148 219 L 192 223 L 236 220 L 280 224 L 324 221 L 368 225 L 412 220 L 456 223 L 500 221" fill="none" stroke="#c4342c" stroke-width="1" opacity="0.75"/>
    <path d="M 60 220 L 104 219 L 148 222 L 192 219 L 236 225 L 280 220 L 324 226 L 368 222 L 412 226 L 456 222 L 500 225" fill="none" stroke="#b45309" stroke-width="1" opacity="0.75"/>
    <path d="M 60 220 L 104 221 L 148 217 L 192 222 L 236 217 L 280 215 L 324 219 L 368 216 L 412 219 L 456 213 L 500 215" fill="none" stroke="#2d7a3e" stroke-width="1" opacity="0.75"/>
    <path d="M 60 220 L 104 223 L 148 220 L 192 225 L 236 222 L 280 227 L 324 223 L 368 228 L 412 224 L 456 229 L 500 225" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.75"/>
    <path d="M 60 220 L 104 217 L 148 215 L 192 213 L 236 216 L 280 212 L 324 215 L 368 210 L 412 213 L 456 209 L 500 212" fill="none" stroke="#0d7377" stroke-width="1" opacity="0.75"/>
    <path d="M 60 220 L 104 220 L 148 222 L 192 218 L 236 221 L 280 219 L 324 222 L 368 219 L 412 222 L 456 219 L 500 221" fill="none" stroke="#525252" stroke-width="1" opacity="0.75"/>
    <path d="M 60 220 L 104 221 L 148 223 L 192 220 L 236 224 L 280 221 L 324 225 L 368 223 L 412 226 L 456 224 L 500 227" fill="none" stroke="#b91c1c" stroke-width="1" opacity="0.75"/>

    <!-- X-axis -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">
      <text x="60"  y="398">0</text>
      <text x="192" y="398">150</text>
      <text x="324" y="398">300</text>
      <text x="456" y="398">450</text>
    </g>
    <text x="280" y="416" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252">generations</text>

    <!-- Y-axis -->
    <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="end">
      <text x="56" y="64">1.0</text>
      <text x="56" y="144">0.75</text>
      <text x="56" y="224">0.50</text>
      <text x="56" y="304">0.25</text>
      <text x="56" y="384">0.0</text>
    </g>

    <g transform="translate(272 86)">
      <rect x="0" y="0" width="220" height="44" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.6"/>
      <text x="8" y="16" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">tight band · no fixation</text>
      <text x="8" y="30" font-family="JetBrains Mono, monospace" font-size="9" fill="#0a0a0a">all within p ∈ (0.42, 0.58)</text>
      <text x="8" y="42" font-family="Inter, sans-serif" font-size="9" fill="#525252">fixation ~ 4N = 20,000 gens</text>
    </g>
  </g>

  <!-- Bottom summary -->
  <g transform="translate(60 432)">
    <text x="480" y="12" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">drift variance per generation ∝ 1 / (2N)  —  scale matters more than the rule</text>
  </g>
</svg>
