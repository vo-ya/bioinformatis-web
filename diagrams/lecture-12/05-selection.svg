<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 440" role="img" aria-labelledby="t d">
  <title id="t">Selection coefficients and allele trajectories</title>
  <desc id="d">Plot of favoured-allele frequency versus 500 generations for three selection regimes. s = 0 (grey, neutral) zigzags around 0.5. s = 0.01 (blue, weak) trends upward noisily, some fix. s = 0.1 (red, strong) fixes cleanly within roughly 100 generations, close to the deterministic logistic curve (black dashed).</desc>

  <text x="540" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">SELECTION · CRITICAL SCALING IS 2Ns, NOT s OR N ALONE</text>

  <!-- Plot area: x=80..900, y=60..360. x(gen) = 80 + gen/500*820; y(p) = 60 + (1-p)*300 -->
  <rect x="80" y="60" width="820" height="300" fill="#ffffff" stroke="#c4c1b6"/>

  <!-- Gridlines -->
  <g stroke="#c4c1b6" stroke-width="0.5" stroke-dasharray="2 2">
    <line x1="80" y1="135" x2="900" y2="135"/> <!-- 0.75 -->
    <line x1="80" y1="210" x2="900" y2="210"/> <!-- 0.50 -->
    <line x1="80" y1="285" x2="900" y2="285"/> <!-- 0.25 -->
  </g>

  <!-- Axes -->
  <line x1="80" y1="360" x2="900" y2="360" stroke="#525252"/>
  <line x1="80" y1="60"  x2="80"  y2="360" stroke="#525252"/>

  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">
    <text x="80"  y="378">0</text>
    <text x="244" y="378">100</text>
    <text x="408" y="378">200</text>
    <text x="572" y="378">300</text>
    <text x="736" y="378">400</text>
    <text x="900" y="378">500</text>
  </g>
  <text x="490" y="398" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0a0a0a">generations</text>

  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="end">
    <text x="74" y="64">1.0</text>
    <text x="74" y="139">0.75</text>
    <text x="74" y="214">0.50</text>
    <text x="74" y="289">0.25</text>
    <text x="74" y="364">0.0</text>
  </g>
  <text x="40" y="210" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0a0a0a" font-style="italic" transform="rotate(-90 40 210)">favoured allele frequency p</text>

  <!-- ── s = 0 (grey) — 5 neutral zigzag trajectories near 0.5 -->
  <g stroke="#8a8a85" stroke-width="0.9" fill="none" opacity="0.85">
    <path d="M 80 210 L 162 218 L 244 212 L 326 222 L 408 216 L 490 226 L 572 220 L 654 230 L 736 224 L 818 234 L 900 228"/>
    <path d="M 80 210 L 162 202 L 244 208 L 326 200 L 408 210 L 490 204 L 572 212 L 654 206 L 736 214 L 818 208 L 900 216"/>
    <path d="M 80 210 L 162 214 L 244 206 L 326 216 L 408 208 L 490 218 L 572 214 L 654 222 L 736 216 L 818 222 L 900 220"/>
    <path d="M 80 210 L 162 206 L 244 212 L 326 204 L 408 214 L 490 208 L 572 218 L 654 212 L 736 220 L 818 214 L 900 222"/>
    <path d="M 80 210 L 162 220 L 244 214 L 326 224 L 408 218 L 490 228 L 572 222 L 654 228 L 736 216 L 818 224 L 900 214"/>
  </g>

  <!-- ── s = 0.01 (blue) — 5 trajectories, noisy upward trend; some fix by gen 500 -->
  <g stroke="#1e3a8a" stroke-width="1" fill="none" opacity="0.85">
    <path d="M 80 210 L 162 196 L 244 182 L 326 168 L 408 154 L 490 138 L 572 124 L 654 108 L 736 92 L 818 76 L 900 60"/>
    <path d="M 80 210 L 162 204 L 244 198 L 326 186 L 408 178 L 490 172 L 572 158 L 654 150 L 736 140 L 818 128 L 900 118"/>
    <path d="M 80 210 L 162 210 L 244 204 L 326 192 L 408 188 L 490 176 L 572 168 L 654 160 L 736 150 L 818 144 L 900 132"/>
    <path d="M 80 210 L 162 200 L 244 194 L 326 190 L 408 176 L 490 166 L 572 158 L 654 148 L 736 136 L 818 128 L 900 114"/>
    <path d="M 80 210 L 162 206 L 244 202 L 326 196 L 408 186 L 490 178 L 572 170 L 654 156 L 736 148 L 818 134 L 900 120"/>
  </g>

  <!-- ── s = 0.1 (red) — 5 trajectories fixing rapidly, close to deterministic logistic. Fixation around gen 100 (x=244) -->
  <g stroke="#c4342c" stroke-width="1.1" fill="none" opacity="0.85">
    <path d="M 80 210 L 116 170 L 152 128 L 188 90  L 224 68  L 260 62  L 300 60  L 400 60 L 500 60 L 700 60 L 900 60"/>
    <path d="M 80 210 L 116 178 L 152 138 L 188 98  L 224 76  L 260 66  L 300 62  L 400 60 L 500 60 L 700 60 L 900 60"/>
    <path d="M 80 210 L 116 164 L 152 120 L 188 84  L 224 66  L 260 60  L 300 60  L 400 60 L 500 60 L 700 60 L 900 60"/>
    <path d="M 80 210 L 116 174 L 152 132 L 188 92  L 224 72  L 260 64  L 300 60  L 400 60 L 500 60 L 700 60 L 900 60"/>
    <path d="M 80 210 L 116 184 L 152 144 L 188 102 L 224 78  L 260 68  L 300 62  L 400 60 L 500 60 L 700 60 L 900 60"/>
  </g>

  <!-- Deterministic logistic s=0.1: p(t) = 1 / (1 + exp(-s*t)) shifted from p0=0.5. Dashed black. -->
  <path d="M 80 210 L 116 181 L 152 151 L 188 123 L 224 100 L 260 83 L 296 71 L 332 65 L 368 62 L 404 60 L 440 60 L 500 60 L 600 60 L 700 60 L 800 60 L 900 60"
        fill="none" stroke="#0a0a0a" stroke-width="1.5" stroke-dasharray="5 3"/>

  <!-- Absorbing boundaries -->
  <line x1="80" y1="60" x2="900" y2="60" stroke="#b45309" stroke-width="0.6" stroke-dasharray="3 3"/>
  <line x1="80" y1="360" x2="900" y2="360" stroke="#b45309" stroke-width="0.6" stroke-dasharray="3 3"/>

  <!-- Legend box. Moved from translate(690 80) (top-right, where the
       blue s=0.01 trajectories cross the box at y=92-176) down to
       translate(690 240) — the empty band below the grey s=0
       trajectories at y=200-235 and above the X-axis. -->
  <g transform="translate(690 240)">
    <rect x="0" y="0" width="200" height="96" rx="4" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="10" y="18" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a" letter-spacing="0.06em">REGIMES</text>
    <line x1="10" y1="32" x2="36" y2="32" stroke="#8a8a85" stroke-width="1.5"/>
    <text x="42" y="35" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">s = 0       drift only</text>
    <line x1="10" y1="50" x2="36" y2="50" stroke="#1e3a8a" stroke-width="1.5"/>
    <text x="42" y="53" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">s = 0.01    weak + drift</text>
    <line x1="10" y1="68" x2="36" y2="68" stroke="#c4342c" stroke-width="1.5"/>
    <text x="42" y="71" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">s = 0.10    selection</text>
    <line x1="10" y1="86" x2="36" y2="86" stroke="#0a0a0a" stroke-width="1.2" stroke-dasharray="4 2"/>
    <text x="42" y="89" font-family="Inter, sans-serif" font-size="9" fill="#525252">deterministic s=0.1</text>
  </g>

  <!-- 2Ns callout box. Moved from translate(96 80) (where the red
       s=0.1 trajectories crossed the box at x=152-260, y=84-128)
       down to translate(96 240), into the same empty band below
       the grey neutral trajectories. -->
  <g transform="translate(96 240)">
    <rect x="0" y="0" width="220" height="54" rx="4" fill="#eef2ff" stroke="#1e3a8a" stroke-width="0.8"/>
    <text x="10" y="18" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.06em">THE COMPARISON THAT MATTERS</text>
    <text x="10" y="34" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">2Ns &lt;&lt; 1  →  effectively neutral</text>
    <text x="10" y="48" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">2Ns &gt;&gt; 1  →  selection dominates</text>
  </g>

  <!-- Bottom annotation -->
  <g transform="translate(80 400)">
    <text x="410" y="12" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">grey: neutral drift  ·  blue: weak selection with visible noise  ·  red: strong selection overrides drift</text>
    <text x="410" y="28" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">p(t+1) ≈ p + s·p(1−p) − noise,  noise scale 1/√(2N)</text>
  </g>
</svg>
