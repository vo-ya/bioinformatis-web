<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="t d">
  <title id="t">LD decay with genomic distance</title>
  <desc id="d">Exponential decay curve of mean r squared against genomic distance. X-axis log scale from 0.1 kb to 1 Mb, Y-axis r squared 0 to 1. Curve starts at r² = 1 near distance 0 and decays smoothly to about 0.05 at 1 Mb, with half-max at about 30 kb. A shaded band shows the 10th to 90th percentile range across populations. Annotation dots mark half-max, r² = 0.2, and r² = 0.05 points.</desc>

  <text x="480" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">LD DECAY WITH DISTANCE · TYPICAL HUMAN COHORT</text>

  <!-- Plot area: x from log10(0.1)=-1 to log10(1000)=3, width 4 decades -->
  <!-- Plot: x = 80..740 (660 px wide, 165 px/decade); y = 60..320 (r² 1..0) -->
  <rect x="80" y="60" width="660" height="280" fill="#ffffff" stroke="#c4c1b6"/>

  <!-- Gridlines every decade on x, every 0.2 on y -->
  <g stroke="#c4c1b6" stroke-width="0.5" stroke-dasharray="2 2">
    <!-- x grid decades: 1 kb (x=245), 10 kb (x=410), 100 kb (x=575) -->
    <line x1="245" y1="60" x2="245" y2="340"/>
    <line x1="410" y1="60" x2="410" y2="340"/>
    <line x1="575" y1="60" x2="575" y2="340"/>
    <!-- y grid: 0.2,0.4,0.6,0.8 -->
    <line x1="80" y1="116" x2="740" y2="116"/> <!-- 0.8 -->
    <line x1="80" y1="172" x2="740" y2="172"/> <!-- 0.6 -->
    <line x1="80" y1="228" x2="740" y2="228"/> <!-- 0.4 -->
    <line x1="80" y1="284" x2="740" y2="284"/> <!-- 0.2 -->
  </g>

  <!-- Axes -->
  <line x1="80" y1="340" x2="740" y2="340" stroke="#525252"/>
  <line x1="80" y1="60"  x2="80"  y2="340" stroke="#525252"/>

  <!-- X ticks: 0.1, 1, 10, 100, 1000 kb at log positions -->
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">
    <text x="80"  y="358">0.1 kb</text>
    <text x="245" y="358">1 kb</text>
    <text x="410" y="358">10 kb</text>
    <text x="575" y="358">100 kb</text>
    <text x="740" y="358">1 Mb</text>
  </g>
  <text x="410" y="378" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0a0a0a">genomic distance (log scale)</text>

  <!-- Y ticks -->
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="end">
    <text x="74" y="64">1.0</text>
    <text x="74" y="120">0.8</text>
    <text x="74" y="176">0.6</text>
    <text x="74" y="232">0.4</text>
    <text x="74" y="288">0.2</text>
    <text x="74" y="344">0.0</text>
  </g>
  <text x="38" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0a0a0a" font-style="italic" transform="rotate(-90 38 200)">mean r² between SNP pairs</text>

  <!-- Decay curve: r² = exp(-λ d) with λ chosen so r²=0.5 at d=30 kb → λ·30000 = ln 2 → λ ≈ 2.31e-5 per bp -->
  <!-- Sample at log-spaced distances. x position: x = 80 + (log10(d_kb) - (-1)) / 4 * 660 = 80 + (log10(d_kb)+1) * 165 -->
  <!-- y = 60 + (1 - r²) * 280 -->
  <!-- Points:
       d_kb,    r²,         x,     y
       0.1      0.998       80     60.56
       0.5      0.989      195.3   63.08
       1        0.977      245     66.44
       3        0.934      323.7   78.48
       10       0.794      410     117.68
       30       0.500      491.5   200.0
       100      0.099      575     312.28
       300      0.001      656.4   339.72
       1000     ~0.001     740     339.8
  -->

  <!-- Shaded band: 10th–90th percentile (±0.12 around curve, clipped) -->
  <path d="M 80 34 L 195 40 L 245 46 L 324 61 L 410 100 L 491 175 L 575 290 L 656 327 L 740 327
           L 740 340 L 656 340 L 575 334 L 491 224 L 410 135 L 324 96 L 245 86 L 195 83 L 80 74 Z"
        fill="#eef2ff" opacity="0.6"/>

  <!-- Main decay curve -->
  <path d="M 80 60.6 L 195 63 L 245 66 L 324 78 L 410 118 L 491 200 L 575 312 L 656 337 L 740 338"
        fill="none" stroke="#1e3a8a" stroke-width="2.2"/>

  <!-- Annotation points -->
  <!-- Half-max: 30 kb / r²=0.5 -->
  <circle cx="491" cy="200" r="5" fill="#1e3a8a" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="491" y1="200" x2="491" y2="340" stroke="#525252" stroke-width="0.6" stroke-dasharray="3 3"/>
  <line x1="80"  y1="200" x2="491" y2="200" stroke="#525252" stroke-width="0.6" stroke-dasharray="3 3"/>
  <text x="500" y="196" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a">half-max</text>
  <text x="500" y="208" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">30 kb · r²=0.5</text>

  <!-- r²=0.2 at 100 kb -->
  <circle cx="575" cy="284" r="5" fill="#1e3a8a" stroke="#ffffff" stroke-width="1.5"/>
  <text x="585" y="278" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">100 kb · r²=0.2</text>

  <!-- r²=0.05 at 1 Mb -->
  <circle cx="740" cy="326" r="5" fill="#1e3a8a" stroke="#ffffff" stroke-width="1.5"/>
  <text x="730" y="318" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="9" fill="#525252">1 Mb · r²≈0.05</text>

  <!-- Shaded band legend -->
  <g transform="translate(100 78)">
    <rect x="0" y="0" width="14" height="10" fill="#eef2ff" opacity="0.8" stroke="#1e3a8a" stroke-width="0.4"/>
    <text x="20" y="9" font-family="Inter, sans-serif" font-size="10" fill="#525252">10th–90th percentile across populations</text>
  </g>

  <!-- Side annotation box -->
  <g transform="translate(760 80)">
    <rect x="0" y="0" width="190" height="170" rx="6" fill="#f6f4ee" stroke="#c4c1b6"/>
    <text x="10" y="20" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">RULE OF THUMB</text>
    <text x="10" y="42" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">r² ≈ exp(−λ · d)</text>
    <text x="10" y="60" font-family="JetBrains Mono, monospace" font-size="11" fill="#0a0a0a">λ ≈ 1/30 per kb</text>
    <line x1="10" y1="72" x2="180" y2="72" stroke="#c4c1b6"/>
    <text x="10" y="92" font-family="Inter, sans-serif" font-size="10" fill="#525252">1000G European cohorts:</text>
    <text x="10" y="106" font-family="JetBrains Mono, monospace" font-size="9" fill="#0a0a0a">half-max ≈ 20–40 kb</text>
    <text x="10" y="124" font-family="Inter, sans-serif" font-size="10" fill="#525252">African populations:</text>
    <text x="10" y="138" font-family="JetBrains Mono, monospace" font-size="9" fill="#0a0a0a">decay faster (~10 kb)</text>
    <text x="10" y="156" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">deeper effective Ne → faster decay</text>
  </g>

  <!-- Bottom summary -->
  <g transform="translate(80 400)">
    <text x="330" y="12" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">decay is set by recombination rate and effective population size</text>
  </g>
</svg>
