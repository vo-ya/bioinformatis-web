<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 460" role="img" aria-labelledby="t d">
  <title id="t">A coalescent tree, n = 8</title>
  <desc id="d">Binary coalescent tree for a sample of 8 chromosomes. Time flows bottom (present) to top (past). Waiting times T_k are labeled on the left with expected values T_k ~ Exp(k choose 2 / 2N), E[T_k] = 2N/(k choose 2). Visible asymmetry: T_2 (last interval) is longer than T_3 through T_8 combined. Right panel shows a bar visualization of relative waiting-time durations. MRCA at root with TMRCA ≈ 3.5N.</desc>

  <text x="540" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">COALESCENT · WAITING TIMES GROW AS k SHRINKS</text>

  <!-- Plot axes. Time axis on left: present (y=400) to past (y=60). Total time roughly 3.5N.
       Intervals (cumulative from present upward):
       T_8 short (0.036N): y=400 → 388
       T_7 short (0.048N): y=388 → 372
       T_6 medium (0.067N): y=372 → 350
       T_5 (0.1N): y=350 → 318
       T_4 (0.167N): y=318 → 262
       T_3 (0.333N): y=262 → 152
       T_2 (1.0N):  y=152 → 60
       Total ~1.75N shown (scale) — but actually 2N/(k choose 2): sum = 2N(1/28+1/21+1/15+1/10+1/6+1/3+1/1) = 2N * 1.679 = 3.35N. Close.
  -->

  <!-- Time-axis timeline on the left -->
  <g>
    <line x1="160" y1="60" x2="160" y2="400" stroke="#525252" stroke-width="1"/>
    <!-- Tick marks at each coalescent event -->
    <g stroke="#525252" stroke-width="0.8">
      <line x1="156" y1="400" x2="164" y2="400"/>
      <line x1="156" y1="388" x2="164" y2="388"/>
      <line x1="156" y1="372" x2="164" y2="372"/>
      <line x1="156" y1="350" x2="164" y2="350"/>
      <line x1="156" y1="318" x2="164" y2="318"/>
      <line x1="156" y1="262" x2="164" y2="262"/>
      <line x1="156" y1="152" x2="164" y2="152"/>
      <line x1="156" y1="60"  x2="164" y2="60"/>
    </g>
    <!-- Waiting-time labels -->
    <g font-family="JetBrains Mono, monospace" font-size="10" fill="#525252" text-anchor="end">
      <text x="152" y="396">T₈  E = 2N/28</text>
      <text x="152" y="382">T₇  E = 2N/21</text>
      <text x="152" y="364">T₆  E = 2N/15</text>
      <text x="152" y="336">T₅  E = 2N/10</text>
      <text x="152" y="290">T₄  E = 2N/6</text>
      <text x="152" y="207">T₃  E = 2N/3</text>
      <text x="152" y="104">T₂  E = 2N</text>
    </g>
    <text x="100" y="44" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">past</text>
    <text x="100" y="418" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a">present</text>

    <!-- Arrow showing time direction -->
    <path d="M 100 408 L 100 56" fill="none" stroke="#8a8a85" stroke-width="0.8" marker-end="url(#arr-t)"/>
    <defs>
      <marker id="arr-t" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#8a8a85"/>
      </marker>
    </defs>
    <text x="78" y="220" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#8a8a85" transform="rotate(-90 78 220)">time (coalescent units of 2N)</text>
  </g>

  <!-- Tree: 8 samples at the bottom. Sample x positions: 200, 260, 320, 380, 440, 500, 560, 620. y=400. -->
  <!-- Coalescent events (building the tree from present backward):
       T_8 event: S1(200) + S2(260) coalesce → node A at x=230, y=388
       T_7 event: S3(320) + S4(380) coalesce → node B at x=350, y=372
       T_6 event: S5(440) + S6(500) coalesce → node C at x=470, y=350
       T_5 event: A + B coalesce (x=230, x=350) → node D at x=290, y=318
       T_4 event: C + S7(560) coalesce → node E at x=515, y=262
       T_3 event: E + S8(620) coalesce → node F at x=567.5, y=152
       T_2 event: D + F coalesce → MRCA at x=(290+567.5)/2=428.75, y=60
  -->

  <!-- Sample colored circles at y=400 -->
  <g>
    <circle cx="200" cy="400" r="8" fill="#1e3a8a" stroke="#0a0a0a" stroke-width="0.8"/>
    <circle cx="260" cy="400" r="8" fill="#c4342c" stroke="#0a0a0a" stroke-width="0.8"/>
    <circle cx="320" cy="400" r="8" fill="#b45309" stroke="#0a0a0a" stroke-width="0.8"/>
    <circle cx="380" cy="400" r="8" fill="#2d7a3e" stroke="#0a0a0a" stroke-width="0.8"/>
    <circle cx="440" cy="400" r="8" fill="#7c3aed" stroke="#0a0a0a" stroke-width="0.8"/>
    <circle cx="500" cy="400" r="8" fill="#0d7377" stroke="#0a0a0a" stroke-width="0.8"/>
    <circle cx="560" cy="400" r="8" fill="#b91c1c" stroke="#0a0a0a" stroke-width="0.8"/>
    <circle cx="620" cy="400" r="8" fill="#525252" stroke="#0a0a0a" stroke-width="0.8"/>
    <g font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a" text-anchor="middle" font-weight="600">
      <text x="200" y="422">S1</text>
      <text x="260" y="422">S2</text>
      <text x="320" y="422">S3</text>
      <text x="380" y="422">S4</text>
      <text x="440" y="422">S5</text>
      <text x="500" y="422">S6</text>
      <text x="560" y="422">S7</text>
      <text x="620" y="422">S8</text>
    </g>
  </g>

  <!-- Tree branches (2.5 px primary) -->
  <g fill="none" stroke="#0a0a0a" stroke-width="2">
    <!-- T_8: S1 + S2 → A at (230, 388) -->
    <line x1="200" y1="400" x2="200" y2="388"/>
    <line x1="260" y1="400" x2="260" y2="388"/>
    <line x1="200" y1="388" x2="260" y2="388"/>

    <!-- T_7: S3 + S4 → B at (350, 372) -->
    <line x1="320" y1="400" x2="320" y2="372"/>
    <line x1="380" y1="400" x2="380" y2="372"/>
    <line x1="320" y1="372" x2="380" y2="372"/>

    <!-- T_6: S5 + S6 → C at (470, 350) -->
    <line x1="440" y1="400" x2="440" y2="350"/>
    <line x1="500" y1="400" x2="500" y2="350"/>
    <line x1="440" y1="350" x2="500" y2="350"/>

    <!-- T_5: A(230, 388) + B(350, 372) → D at (290, 318) -->
    <line x1="230" y1="388" x2="230" y2="318"/>
    <line x1="350" y1="372" x2="350" y2="318"/>
    <line x1="230" y1="318" x2="350" y2="318"/>

    <!-- T_4: C(470, 350) + S7(560, 400) → E at (515, 262) -->
    <line x1="470" y1="350" x2="470" y2="262"/>
    <line x1="560" y1="400" x2="560" y2="262"/>
    <line x1="470" y1="262" x2="560" y2="262"/>

    <!-- T_3: E(515, 262) + S8(620, 400) → F at (567.5, 152) -->
    <line x1="515" y1="262" x2="515" y2="152"/>
    <line x1="620" y1="400" x2="620" y2="152"/>
    <line x1="515" y1="152" x2="620" y2="152"/>

    <!-- T_2: D(290, 318) + F(567.5, 152) → MRCA at (428.75, 60) -->
    <line x1="290" y1="318" x2="290" y2="60"/>
    <line x1="567.5" y1="152" x2="567.5" y2="60"/>
    <line x1="290" y1="60" x2="567.5" y2="60"/>
  </g>

  <!-- Coalescent event nodes -->
  <g fill="#0a0a0a">
    <circle cx="230"   cy="388" r="3.5"/>
    <circle cx="350"   cy="372" r="3.5"/>
    <circle cx="470"   cy="350" r="3.5"/>
    <circle cx="290"   cy="318" r="3.5"/>
    <circle cx="515"   cy="262" r="3.5"/>
    <circle cx="567.5" cy="152" r="3.5"/>
  </g>

  <!-- MRCA node (larger, highlighted) -->
  <circle cx="428.75" cy="60" r="6" fill="#1e3a8a" stroke="#ffffff" stroke-width="1.5"/>
  <text x="428.75" y="46" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a">MRCA</text>
  <text x="428.75" y="34" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#525252">T_MRCA ≈ 4N(1 − 1/n) ≈ 3.5N</text>

  <!-- ── Right panel: waiting-time bar viz ── -->
  <g transform="translate(720 60)">
    <rect x="0" y="0" width="340" height="340" rx="6" fill="#f6f4ee" stroke="#c4c1b6"/>
    <text x="12" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.08em">WAITING-TIME PROPORTIONS</text>

    <!-- Bar chart of E[T_k] relative values: 1/28, 1/21, 1/15, 1/10, 1/6, 1/3, 1/1 ≈ 0.036, 0.048, 0.067, 0.1, 0.167, 0.333, 1.0
         Total = 1.751. Bar width per unit = 260 / 1.751 = 148.5 px per unit.
         Widths: T8=5.3, T7=7.1, T6=9.9, T5=14.8, T4=24.8, T3=49.5, T2=148.5 -->
    <g transform="translate(12 48)">
      <g font-family="JetBrains Mono, monospace" font-size="10" fill="#0a0a0a">
        <!-- T8 -->
        <text x="0" y="10">T₈</text>
        <rect x="28" y="0" width="5.3" height="14" fill="#8a8a85"/>
        <text x="40" y="10" font-size="9" fill="#525252">1/28</text>

        <!-- T7 -->
        <text x="0" y="30">T₇</text>
        <rect x="28" y="20" width="7.1" height="14" fill="#8a8a85"/>
        <text x="42" y="30" font-size="9" fill="#525252">1/21</text>

        <!-- T6 -->
        <text x="0" y="50">T₆</text>
        <rect x="28" y="40" width="9.9" height="14" fill="#8a8a85"/>
        <text x="44" y="50" font-size="9" fill="#525252">1/15</text>

        <!-- T5 -->
        <text x="0" y="70">T₅</text>
        <rect x="28" y="60" width="14.8" height="14" fill="#8a8a85"/>
        <text x="48" y="70" font-size="9" fill="#525252">1/10</text>

        <!-- T4 -->
        <text x="0" y="90">T₄</text>
        <rect x="28" y="80" width="24.8" height="14" fill="#8a8a85"/>
        <text x="58" y="90" font-size="9" fill="#525252">1/6</text>

        <!-- T3 -->
        <text x="0" y="110">T₃</text>
        <rect x="28" y="100" width="49.5" height="14" fill="#8a8a85"/>
        <text x="82" y="110" font-size="9" fill="#525252">1/3</text>

        <!-- T2 (highlight) -->
        <text x="0" y="130" font-weight="700" fill="#1e3a8a">T₂</text>
        <rect x="28" y="120" width="148.5" height="14" fill="#1e3a8a"/>
        <text x="182" y="130" font-size="10" font-weight="700" fill="#1e3a8a">1</text>

        <!-- Sum bar underneath for T3..T8 to show it's less than T2 -->
        <line x1="28" y1="144" x2="314" y2="144" stroke="#c4c1b6"/>
        <text x="0" y="160" font-size="9" fill="#525252">Σ T₃..T₈</text>
        <rect x="28" y="150" width="63.2" height="12" fill="#8a8a85" opacity="0.6"/>
        <text x="96" y="160" font-size="9" fill="#525252">= 0.751  (&lt; T₂)</text>
      </g>
    </g>

    <line x1="12" y1="224" x2="328" y2="224" stroke="#c4c1b6"/>

    <text x="12" y="244" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1e3a8a" letter-spacing="0.06em">KEY POINT</text>
    <text x="12" y="262" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">T₂ is longer than all other waiting times</text>
    <text x="12" y="276" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">combined. Most coalescent time lives</text>
    <text x="12" y="290" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">in the deep branches near the MRCA.</text>

    <text x="12" y="316" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">T_k ~ Exp(k·(k−1) / 4N)</text>
    <text x="12" y="330" font-family="Inter, sans-serif" font-size="9" fill="#525252" font-style="italic">each pair coalesces at rate 1/(2N) per gen</text>
  </g>

  <!-- Bottom summary -->
  <g transform="translate(0 432)">
    <text x="540" y="12" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#0a0a0a">backward-in-time: k lineages coalesce pairwise at rate (k choose 2)/(2N)</text>
  </g>
</svg>
