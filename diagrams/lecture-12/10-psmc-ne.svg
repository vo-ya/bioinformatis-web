<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 440" role="img" aria-labelledby="t d">
  <title id="t">PSMC Ne(t) for human populations</title>
  <desc id="d">Log-log plot of inferred effective population size Ne against years before present for three human populations. X-axis 10^3 to 10^7 years, Y-axis 10^3 to 10^6 Ne. Step-function trajectories: African (cobalt) stays near 20,000 throughout; European (amber) tracks African then bottlenecks to 2,000 around 50 kya; East Asian (red) follows European with a slightly deeper and later bottleneck. Shaded regions label the out-of-Africa bottleneck and recent expansion.</desc>

  <text x="540" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="0.12em">PSMC · EFFECTIVE POPULATION SIZE THROUGH TIME</text>

  <!-- Plot area: x from log10(1e3)=3 to log10(1e7)=7, width 4 decades.
       Left = 80, Right = 940. x = 80 + (log10(t) - 3) * 215 per decade. Decades at: 80 (1kya), 295 (10kya), 510 (100kya), 725 (1Mya), 940 (10Mya).
       Y from log10(1e3)=3 to log10(1e6)=6, height 3 decades.
       Top = 60, Bottom = 340. y = 340 - (log10(Ne) - 3) * 93.33 per decade.
       Decades: y=340 (1e3), y=246.67 (1e4), y=153.33 (1e5), y=60 (1e6). -->

  <rect x="80" y="60" width="860" height="280" fill="#ffffff" stroke="#c4c1b6"/>

  <!-- Decade gridlines -->
  <g stroke="#c4c1b6" stroke-width="0.5" stroke-dasharray="2 2">
    <line x1="295" y1="60" x2="295" y2="340"/>
    <line x1="510" y1="60" x2="510" y2="340"/>
    <line x1="725" y1="60" x2="725" y2="340"/>
    <line x1="80" y1="246.67" x2="940" y2="246.67"/>
    <line x1="80" y1="153.33" x2="940" y2="153.33"/>
  </g>

  <!-- Shaded event regions -->
  <!-- Out-of-Africa bottleneck: 30–70 kya. x = 80 + (log10(30000)-3)*215 = 80 + 1.477*215 = 397; to x = 80 + (log10(70000)-3)*215 = 80 + 1.845*215 = 476.7 -->
  <rect x="397" y="60" width="80" height="280" fill="#b45309" fill-opacity="0.08"/>
  <text x="437" y="76" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#b45309">out-of-Africa</text>
  <text x="437" y="88" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#b45309">bottleneck</text>
  <text x="437" y="100" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#b45309">~50 kya</text>

  <!-- Recent expansion: 0–10 kya (x=80 to x=295) -->
  <rect x="80" y="60" width="215" height="280" fill="#2d7a3e" fill-opacity="0.06"/>
  <text x="187" y="76" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#2d7a3e">recent</text>
  <text x="187" y="88" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#2d7a3e">expansion</text>
  <text x="187" y="100" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" fill="#2d7a3e">&lt; 10 kya</text>

  <!-- PSMC loses resolution in recent past — shaded left edge -->
  <rect x="80" y="250" width="120" height="90" fill="#8a8a85" fill-opacity="0.08"/>
  <text x="140" y="330" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#525252" font-style="italic">(PSMC low</text>
  <text x="140" y="338" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#525252" font-style="italic">resolution)</text>

  <!-- X-axis -->
  <line x1="80" y1="340" x2="940" y2="340" stroke="#525252"/>
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="middle">
    <text x="80"  y="358">1 kya</text>
    <text x="295" y="358">10 kya</text>
    <text x="510" y="358">100 kya</text>
    <text x="725" y="358">1 Mya</text>
    <text x="940" y="358">10 Mya</text>
  </g>
  <text x="510" y="378" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0a0a0a">years before present (log scale)</text>

  <!-- Y-axis -->
  <line x1="80" y1="60" x2="80" y2="340" stroke="#525252"/>
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#525252" text-anchor="end">
    <text x="74" y="64">10⁶</text>
    <text x="74" y="157">10⁵</text>
    <text x="74" y="250">10⁴</text>
    <text x="74" y="344">10³</text>
  </g>
  <text x="36" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#0a0a0a" font-style="italic" transform="rotate(-90 36 200)">effective population size Ne</text>

  <!-- ── AFRICAN trajectory: stays at Ne ≈ 20000 across most of history, rising slightly in recent past ──
       Ne=20000 → y = 340 - (log10(20000)-3)*93.33 = 340 - 1.301*93.33 = 218.6
       Recent rise: Ne=30000 at 5 kya, y = 340 - (log10(30000)-3)*93.33 = 340 - 1.477*93.33 = 202.2
       Ancient (1 Mya): Ne=15000, y = 340 - 1.176*93.33 = 230.2 -->
  <!-- Step function from 10 Mya (x=940) backward to 1 kya (x=80) -->
  <path d="M 940 240 L 800 240 L 800 230 L 650 230 L 650 222 L 420 222 L 420 215 L 295 215 L 295 205 L 80 205"
        fill="none" stroke="#c4342c" stroke-width="2.2"/>

  <!-- ── EUROPEAN trajectory: tracks African until ~70 kya, bottleneck to ~2000 at ~50 kya, recovery to ~15000 recently -->
  <!-- Key points: ancient = 20000 (y=218.6), near bottleneck start ~70 kya x=476.7 y=218.6, bottleneck bottom ~50 kya Ne=2000 y = 340 - 0.301*93.33 = 311.9, x=50 kya = 80 + (log10(50000)-3)*215 = 80 + 1.699*215 = 445.3,
         recovery to Ne~15000 at 10 kya (y=230, x=295), then to Ne~30000 at 3 kya (y=202, x=180) -->
  <path d="M 940 220 L 800 220 L 800 215 L 650 215 L 650 220 L 510 220 L 510 225 L 445 225 L 445 295 L 420 295 L 420 290 L 350 290 L 350 260 L 295 260 L 295 230 L 200 230 L 200 215 L 80 215"
        fill="none" stroke="#1e3a8a" stroke-width="2.2"/>

  <!-- ── EAST ASIAN trajectory: similar to European, slightly stronger bottleneck -->
  <path d="M 940 224 L 800 224 L 800 220 L 650 220 L 650 226 L 510 226 L 510 232 L 445 232 L 445 305 L 400 305 L 400 302 L 320 302 L 320 270 L 295 270 L 295 240 L 180 240 L 180 222 L 80 222"
        fill="none" stroke="#b45309" stroke-width="2.2"/>

  <!-- Legend -->
  <g transform="translate(780 85)">
    <rect x="0" y="0" width="150" height="76" rx="4" fill="#ffffff" stroke="#c4c1b6"/>
    <text x="10" y="16" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#0a0a0a" letter-spacing="0.06em">POPULATIONS</text>
    <line x1="10" y1="30" x2="34" y2="30" stroke="#c4342c" stroke-width="2.2"/>
    <text x="40" y="34" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">African (YRI)</text>
    <line x1="10" y1="48" x2="34" y2="48" stroke="#1e3a8a" stroke-width="2.2"/>
    <text x="40" y="52" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">European (CEU)</text>
    <line x1="10" y1="66" x2="34" y2="66" stroke="#b45309" stroke-width="2.2"/>
    <text x="40" y="70" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">East Asian (CHB)</text>
  </g>

  <!-- Annotation note -->
  <g transform="translate(540 270)">
    <rect x="0" y="0" width="220" height="54" rx="4" fill="#f6f4ee" stroke="#c4c1b6"/>
    <text x="10" y="16" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#1e3a8a" letter-spacing="0.06em">BOTTLENECK SIGNATURE</text>
    <text x="10" y="30" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">non-African Ne drops ~10×</text>
    <text x="10" y="44" font-family="Inter, sans-serif" font-size="10" fill="#0a0a0a">around 50 kya, then recovers</text>
  </g>

  <!-- Bottom caption -->
  <g transform="translate(0 410)">
    <text x="540" y="12" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#525252" font-style="italic">PSMC infers Ne from the distribution of coalescent times across one diploid genome (het sites)</text>
  </g>
</svg>
