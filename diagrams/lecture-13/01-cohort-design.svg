<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 440" width="1080" height="440" font-family="Inter, sans-serif" font-size="13">
  <defs>
    <style>
      text { font-family: Inter, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
      .label { font-size: 12px; fill: #374151; }
      .title { font-size: 14px; font-weight: 600; fill: #111827; }
      .caption { font-size: 11px; fill: #6b7280; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1080" height="440" fill="#fafaf9" rx="6"/>

  <!-- Divider -->
  <line x1="540" y1="20" x2="540" y2="390" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- ─── LEFT PANEL: Case-Control Design ─── -->
  <text x="270" y="44" text-anchor="middle" class="title">Case-Control Design</text>

  <!-- Cases label. Raised from y=80 to y=66 so it no longer shares
       a glyph row with the column header strip "SNP1 2 3 4 5 6"
       at y=86 (overlap was y=78-81 in x=60-130). -->
  <text x="60" y="66" class="label" font-weight="600" fill="#c4342c">Cases (affected)</text>

  <!-- Case individuals: 10 small figure icons + genotype rows -->
  <!-- Person icon = circle (head) + rect (body) -->
  <!-- Row of 10 cases -->
  <g id="case-row">
    <!-- 10 case individuals at y=85-120 -->
    <g transform="translate(55, 88)">
      <!-- each individual: icon + 6 SNP cells -->
      <!-- Individual 1 -->
      <circle cx="10" cy="8" r="5" fill="#c4342c"/>
      <rect x="4" y="14" width="12" height="14" rx="2" fill="#c4342c"/>
      <!-- SNP cells for case 1: 0=white,1=light cobalt,2=cobalt -->
      <rect x="28" y="6" width="10" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.5"/>
      <rect x="40" y="6" width="10" height="16" rx="1" fill="#2563eb" stroke="#1d4ed8" stroke-width="0.5"/>
      <rect x="52" y="6" width="10" height="16" rx="1" fill="#white" stroke="#d1d5db" stroke-width="0.5"/>
      <rect x="52" y="6" width="10" height="16" rx="1" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
      <rect x="64" y="6" width="10" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.5"/>
      <rect x="76" y="6" width="10" height="16" rx="1" fill="#2563eb" stroke="#1d4ed8" stroke-width="0.5"/>
      <rect x="88" y="6" width="10" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.5"/>
    </g>
    <g transform="translate(55, 112)">
      <circle cx="10" cy="8" r="5" fill="#c4342c"/>
      <rect x="4" y="14" width="12" height="14" rx="2" fill="#c4342c"/>
      <rect x="28" y="6" width="10" height="16" rx="1" fill="#2563eb" stroke="#1d4ed8" stroke-width="0.5"/>
      <rect x="40" y="6" width="10" height="16" rx="1" fill="#2563eb" stroke="#1d4ed8" stroke-width="0.5"/>
      <rect x="52" y="6" width="10" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.5"/>
      <rect x="64" y="6" width="10" height="16" rx="1" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
      <rect x="76" y="6" width="10" height="16" rx="1" fill="#2563eb" stroke="#1d4ed8" stroke-width="0.5"/>
      <rect x="88" y="6" width="10" height="16" rx="1" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
    </g>
    <g transform="translate(55, 136)">
      <circle cx="10" cy="8" r="5" fill="#c4342c"/>
      <rect x="4" y="14" width="12" height="14" rx="2" fill="#c4342c"/>
      <rect x="28" y="6" width="10" height="16" rx="1" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
      <rect x="40" y="6" width="10" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.5"/>
      <rect x="52" y="6" width="10" height="16" rx="1" fill="#2563eb" stroke="#1d4ed8" stroke-width="0.5"/>
      <rect x="64" y="6" width="10" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.5"/>
      <rect x="76" y="6" width="10" height="16" rx="1" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
      <rect x="88" y="6" width="10" height="16" rx="1" fill="#2563eb" stroke="#1d4ed8" stroke-width="0.5"/>
    </g>
    <!-- SNP header labels. The original layout placed "SNP1" at x=57
         (start) — its 22 px-wide glyph spilled over the next number
         "2" at x=69 (and so on down the row). Rewritten as a separate
         "SNP" prefix with each column number centred above its
         corresponding genotype cell (cells are at x=83/95/107/119/
         131/143, width 10, centres at x=88/100/112/124/136/148). -->
    <text x="48" y="86" class="mono" fill="#6b7280" text-anchor="end">SNP</text>
    <text x="88" y="86" class="mono" fill="#6b7280" text-anchor="middle">1</text>
    <text x="100" y="86" class="mono" fill="#6b7280" text-anchor="middle">2</text>
    <text x="112" y="86" class="mono" fill="#6b7280" text-anchor="middle">3</text>
    <text x="124" y="86" class="mono" fill="#6b7280" text-anchor="middle">4</text>
    <text x="136" y="86" class="mono" fill="#6b7280" text-anchor="middle">5</text>
    <text x="148" y="86" class="mono" fill="#6b7280" text-anchor="middle">6</text>
  </g>

  <!-- Controls label -->
  <text x="60" y="200" class="label" font-weight="600" fill="#374151">Controls (unaffected)</text>

  <g transform="translate(55, 208)">
    <circle cx="10" cy="8" r="5" fill="#9ca3af"/>
    <rect x="4" y="14" width="12" height="14" rx="2" fill="#9ca3af"/>
    <rect x="28" y="6" width="10" height="16" rx="1" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
    <rect x="40" y="6" width="10" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.5"/>
    <rect x="52" y="6" width="10" height="16" rx="1" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
    <rect x="64" y="6" width="10" height="16" rx="1" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
    <rect x="76" y="6" width="10" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.5"/>
    <rect x="88" y="6" width="10" height="16" rx="1" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
  </g>
  <g transform="translate(55, 232)">
    <circle cx="10" cy="8" r="5" fill="#9ca3af"/>
    <rect x="4" y="14" width="12" height="14" rx="2" fill="#9ca3af"/>
    <rect x="28" y="6" width="10" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.5"/>
    <rect x="40" y="6" width="10" height="16" rx="1" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
    <rect x="52" y="6" width="10" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.5"/>
    <rect x="64" y="6" width="10" height="16" rx="1" fill="#2563eb" stroke="#1d4ed8" stroke-width="0.5"/>
    <rect x="76" y="6" width="10" height="16" rx="1" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
    <rect x="88" y="6" width="10" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.5"/>
  </g>
  <g transform="translate(55, 256)">
    <circle cx="10" cy="8" r="5" fill="#9ca3af"/>
    <rect x="4" y="14" width="12" height="14" rx="2" fill="#9ca3af"/>
    <rect x="28" y="6" width="10" height="16" rx="1" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
    <rect x="40" y="6" width="10" height="16" rx="1" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
    <rect x="52" y="6" width="10" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.5"/>
    <rect x="64" y="6" width="10" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.5"/>
    <rect x="76" y="6" width="10" height="16" rx="1" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
    <rect x="88" y="6" width="10" height="16" rx="1" fill="#2563eb" stroke="#1d4ed8" stroke-width="0.5"/>
  </g>

  <!-- Ellipsis indicating more -->
  <text x="95" y="304" text-anchor="middle" fill="#9ca3af" font-size="20">⋮</text>
  <text x="95" y="322" class="caption" text-anchor="middle">N cases</text>
  <text x="95" y="338" class="caption" text-anchor="middle">N controls</text>

  <!-- Comparison arrow + test label. Raised by 20 px (arrow y=195→175,
       box y=178→158) so the arrow body at y=175 sits in the empty
       band between the cases rows (last cell ends y=158) and the
       "Controls (unaffected)" label glyph (y=192-201) — the previous
       arrow at y=195 cut through the controls label. -->
  <line x1="160" y1="175" x2="205" y2="175" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#374151"/>
    </marker>
  </defs>
  <rect x="210" y="158" width="150" height="34" rx="4" fill="#fff" stroke="#e5e7eb"/>
  <text x="285" y="172" text-anchor="middle" class="label" font-weight="600">Per-SNP test:</text>
  <text x="285" y="187" text-anchor="middle" class="mono">Δ allele freq, χ²</text>

  <!-- ─── RIGHT PANEL: Quantitative Trait Design ─── -->
  <text x="810" y="44" text-anchor="middle" class="title">Quantitative Trait Design</text>

  <!-- Individuals with phenotype bars. Section header raised from y=80
       to y=66 so it no longer overlaps the column-header row
       "Phenotype ... SNP1 2 3 4 5 6" at y=86 in x=595-665. -->
  <text x="570" y="66" class="label" font-weight="600" fill="#374151">Cohort (any trait)</text>

  <!-- 6 individuals with phenotype bars -->
  <g transform="translate(565, 88)">
    <!-- Individual 1 -->
    <circle cx="10" cy="8" r="5" fill="#374151"/>
    <rect x="4" y="14" width="12" height="14" rx="2" fill="#374151"/>
    <!-- Phenotype bar -->
    <rect x="22" y="10" width="78" height="12" rx="2" fill="#dbeafe"/>
    <rect x="22" y="10" width="52" height="12" rx="2" fill="#93c5fd"/>
    <text x="106" y="20" class="mono" fill="#374151">172cm</text>
    <!-- SNP cells -->
    <rect x="155" y="6" width="10" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.5"/>
    <rect x="167" y="6" width="10" height="16" rx="1" fill="#2563eb" stroke="#1d4ed8" stroke-width="0.5"/>
    <rect x="179" y="6" width="10" height="16" rx="1" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
    <rect x="191" y="6" width="10" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.5"/>
    <rect x="203" y="6" width="10" height="16" rx="1" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
    <rect x="215" y="6" width="10" height="16" rx="1" fill="#2563eb" stroke="#1d4ed8" stroke-width="0.5"/>
  </g>
  <g transform="translate(565, 112)">
    <circle cx="10" cy="8" r="5" fill="#374151"/>
    <rect x="4" y="14" width="12" height="14" rx="2" fill="#374151"/>
    <rect x="22" y="10" width="78" height="12" rx="2" fill="#dbeafe"/>
    <rect x="22" y="10" width="65" height="12" rx="2" fill="#93c5fd"/>
    <text x="106" y="20" class="mono" fill="#374151">181cm</text>
    <rect x="155" y="6" width="10" height="16" rx="1" fill="#2563eb" stroke="#1d4ed8" stroke-width="0.5"/>
    <rect x="167" y="6" width="10" height="16" rx="1" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
    <rect x="179" y="6" width="10" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.5"/>
    <rect x="191" y="6" width="10" height="16" rx="1" fill="#2563eb" stroke="#1d4ed8" stroke-width="0.5"/>
    <rect x="203" y="6" width="10" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.5"/>
    <rect x="215" y="6" width="10" height="16" rx="1" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
  </g>
  <g transform="translate(565, 136)">
    <circle cx="10" cy="8" r="5" fill="#374151"/>
    <rect x="4" y="14" width="12" height="14" rx="2" fill="#374151"/>
    <rect x="22" y="10" width="78" height="12" rx="2" fill="#dbeafe"/>
    <rect x="22" y="10" width="38" height="12" rx="2" fill="#93c5fd"/>
    <text x="106" y="20" class="mono" fill="#374151">161cm</text>
    <rect x="155" y="6" width="10" height="16" rx="1" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
    <rect x="167" y="6" width="10" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.5"/>
    <rect x="179" y="6" width="10" height="16" rx="1" fill="#2563eb" stroke="#1d4ed8" stroke-width="0.5"/>
    <rect x="191" y="6" width="10" height="16" rx="1" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
    <rect x="203" y="6" width="10" height="16" rx="1" fill="#2563eb" stroke="#1d4ed8" stroke-width="0.5"/>
    <rect x="215" y="6" width="10" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.5"/>
  </g>
  <g transform="translate(565, 160)">
    <circle cx="10" cy="8" r="5" fill="#374151"/>
    <rect x="4" y="14" width="12" height="14" rx="2" fill="#374151"/>
    <rect x="22" y="10" width="78" height="12" rx="2" fill="#dbeafe"/>
    <rect x="22" y="10" width="71" height="12" rx="2" fill="#93c5fd"/>
    <text x="106" y="20" class="mono" fill="#374151">185cm</text>
    <rect x="155" y="6" width="10" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.5"/>
    <rect x="167" y="6" width="10" height="16" rx="1" fill="#2563eb" stroke="#1d4ed8" stroke-width="0.5"/>
    <rect x="179" y="6" width="10" height="16" rx="1" fill="#bfdbfe" stroke="#93c5fd" stroke-width="0.5"/>
    <rect x="191" y="6" width="10" height="16" rx="1" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
    <rect x="203" y="6" width="10" height="16" rx="1" fill="#2563eb" stroke="#1d4ed8" stroke-width="0.5"/>
    <rect x="215" y="6" width="10" height="16" rx="1" fill="#f9fafb" stroke="#d1d5db" stroke-width="0.5"/>
  </g>

  <!-- Labels above -->
  <text x="595" y="86" class="mono" fill="#6b7280">Phenotype</text>
  <text x="725" y="86" class="mono" fill="#6b7280">SNP1 2 3 4 5 6</text>

  <text x="720" y="250" text-anchor="middle" fill="#9ca3af" font-size="20">⋮</text>
  <text x="720" y="270" class="caption" text-anchor="middle">N individuals</text>

  <!-- Arrow + test label -->
  <line x1="800" y1="160" x2="845" y2="160" stroke="#374151" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <rect x="850" y="143" width="150" height="34" rx="4" fill="#fff" stroke="#e5e7eb"/>
  <text x="925" y="157" text-anchor="middle" class="label" font-weight="600">Per-SNP test:</text>
  <text x="925" y="172" text-anchor="middle" class="mono">linear regression β</text>

  <!-- Legend: genotype cell colours -->
  <g transform="translate(55, 355)">
    <rect x="0" y="0" width="14" height="14" rx="2" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="18" y="11" class="caption">0 copies</text>
    <rect x="90" y="0" width="14" height="14" rx="2" fill="#bfdbfe" stroke="#93c5fd"/>
    <text x="108" y="11" class="caption">1 copy</text>
    <rect x="180" y="0" width="14" height="14" rx="2" fill="#2563eb" stroke="#1d4ed8"/>
    <text x="198" y="11" class="caption">2 copies</text>
  </g>

  <!-- Bottom caption bar -->
  <rect x="0" y="400" width="1080" height="40" fill="#f3f4f6" rx="0"/>
  <rect x="0" y="400" width="1080" height="3" fill="#2563eb"/>
  <text x="540" y="424" text-anchor="middle" fill="#374151" font-size="12">Both designs: one regression per SNP; M ≈ 10⁶ tests; genome-wide significance at 5×10⁻⁸</text>
</svg>
