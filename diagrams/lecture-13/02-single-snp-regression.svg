<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 420" width="1080" height="420" font-family="Inter, sans-serif">
  <defs>
    <style>
      text { font-family: Inter, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
      .axis-label { font-size: 12px; fill: #374151; }
      .math { font-family: 'Source Serif 4', serif; font-style: italic; font-size: 13px; fill: #111827; }
      .title { font-size: 14px; font-weight: 600; fill: #111827; }
      .caption { font-size: 11px; fill: #6b7280; }
    </style>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#374151"/>
    </marker>
    <marker id="arr-cobalt" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#2563eb"/>
    </marker>
  </defs>

  <rect width="1080" height="420" fill="#fafaf9" rx="6"/>

  <!-- ─── MAIN SCATTER PANEL (left 62%) ─── -->
  <!-- Plot area: x=60..670, y=30..360 -->
  <g id="scatter">
    <text x="365" y="22" text-anchor="middle" class="title">Additive Genetic Regression Model</text>

    <!-- Axes -->
    <line x1="80" y1="360" x2="670" y2="360" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="80" y1="360" x2="80" y2="30" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- X axis ticks & labels -->
    <line x1="210" y1="360" x2="210" y2="367" stroke="#374151" stroke-width="1"/>
    <line x1="370" y1="360" x2="370" y2="367" stroke="#374151" stroke-width="1"/>
    <line x1="530" y1="360" x2="530" y2="367" stroke="#374151" stroke-width="1"/>
    <text x="210" y="382" text-anchor="middle" class="axis-label">0</text>
    <text x="370" y="382" text-anchor="middle" class="axis-label">1</text>
    <text x="530" y="382" text-anchor="middle" class="axis-label">2</text>
    <text x="375" y="405" text-anchor="middle" class="axis-label">Genotype G (effect allele count)</text>

    <!-- Y axis ticks & labels -->
    <line x1="73" y1="320" x2="80" y2="320" stroke="#374151" stroke-width="1"/>
    <line x1="73" y1="250" x2="80" y2="250" stroke="#374151" stroke-width="1"/>
    <line x1="73" y1="180" x2="80" y2="180" stroke="#374151" stroke-width="1"/>
    <line x1="73" y1="110" x2="80" y2="110" stroke="#374151" stroke-width="1"/>
    <text x="68" y="324" text-anchor="end" class="axis-label">80</text>
    <text x="68" y="254" text-anchor="end" class="axis-label">100</text>
    <text x="68" y="184" text-anchor="end" class="axis-label">120</text>
    <text x="68" y="114" text-anchor="end" class="axis-label">140</text>
    <text x="38" y="200" text-anchor="middle" class="axis-label" transform="rotate(-90 38 200)">LDL (mg/dL)</text>

    <!-- Grid lines (subtle) -->
    <line x1="80" y1="320" x2="670" y2="320" stroke="#f3f4f6" stroke-width="1"/>
    <line x1="80" y1="250" x2="670" y2="250" stroke="#f3f4f6" stroke-width="1"/>
    <line x1="80" y1="180" x2="670" y2="180" stroke="#f3f4f6" stroke-width="1"/>
    <line x1="80" y1="110" x2="670" y2="110" stroke="#f3f4f6" stroke-width="1"/>

    <!-- Scatter points: cluster at G=0 (mean y≈280), G=1 (mean y≈215), G=2 (mean y≈150) -->
    <!-- G=0 cluster, mean ~280 -->
    <g fill="#93c5fd" opacity="0.7">
      <circle cx="195" cy="268" r="3.5"/><circle cx="202" cy="290" r="3.5"/>
      <circle cx="213" cy="275" r="3.5"/><circle cx="208" cy="305" r="3.5"/>
      <circle cx="220" cy="260" r="3.5"/><circle cx="198" cy="298" r="3.5"/>
      <circle cx="225" cy="285" r="3.5"/><circle cx="205" cy="315" r="3.5"/>
      <circle cx="215" cy="255" r="3.5"/><circle cx="218" cy="302" r="3.5"/>
      <circle cx="192" cy="278" r="3.5"/><circle cx="225" cy="268" r="3.5"/>
    </g>
    <!-- G=0 mean line -->
    <line x1="185" y1="280" x2="235" y2="280" stroke="#374151" stroke-width="2.5"/>
    <!-- G=0 mean dot -->
    <circle cx="210" cy="280" r="5" fill="#111827"/>

    <!-- G=1 cluster, mean ~215 -->
    <g fill="#93c5fd" opacity="0.7">
      <circle cx="355" cy="207" r="3.5"/><circle cx="362" cy="228" r="3.5"/>
      <circle cx="373" cy="198" r="3.5"/><circle cx="368" cy="242" r="3.5"/>
      <circle cx="380" cy="212" r="3.5"/><circle cx="358" cy="220" r="3.5"/>
      <circle cx="385" cy="205" r="3.5"/><circle cx="365" cy="230" r="3.5"/>
      <circle cx="375" cy="195" r="3.5"/><circle cx="378" cy="235" r="3.5"/>
      <circle cx="352" cy="218" r="3.5"/><circle cx="385" cy="208" r="3.5"/>
    </g>
    <!-- G=1 mean line -->
    <line x1="345" y1="215" x2="395" y2="215" stroke="#374151" stroke-width="2.5"/>
    <circle cx="370" cy="215" r="5" fill="#111827"/>

    <!-- G=2 cluster, mean ~150 -->
    <g fill="#93c5fd" opacity="0.7">
      <circle cx="515" cy="142" r="3.5"/><circle cx="522" cy="163" r="3.5"/>
      <circle cx="533" cy="133" r="3.5"/><circle cx="528" cy="177" r="3.5"/>
      <circle cx="540" cy="147" r="3.5"/><circle cx="518" cy="155" r="3.5"/>
      <circle cx="545" cy="140" r="3.5"/><circle cx="525" cy="165" r="3.5"/>
      <circle cx="535" cy="130" r="3.5"/><circle cx="538" cy="170" r="3.5"/>
      <circle cx="512" cy="152" r="3.5"/><circle cx="545" cy="143" r="3.5"/>
    </g>
    <!-- G=2 mean line -->
    <line x1="505" y1="150" x2="555" y2="150" stroke="#374151" stroke-width="2.5"/>
    <circle cx="530" cy="150" r="5" fill="#111827"/>

    <!-- Regression line: through (210,280), (370,215), (530,150) -->
    <line x1="150" y1="303" x2="600" y2="128" stroke="#2563eb" stroke-width="2.5"/>

    <!-- β annotation: slope arrow -->
    <line x1="210" y1="280" x2="370" y2="280" stroke="#b45309" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="370" y1="280" x2="370" y2="215" stroke="#b45309" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="290" y="298" text-anchor="middle" fill="#b45309" font-size="11">ΔG = 1</text>
    <text x="390" y="250" fill="#b45309" class="math" font-size="12">β = slope</text>

    <!-- β₀ intercept annotation -->
    <circle cx="145" cy="307" r="4" fill="none" stroke="#2563eb" stroke-width="1.5"/>
    <text x="118" y="295" fill="#2563eb" class="math" font-size="11">β₀</text>

    <!-- 95% CI shading -->
    <path d="M 150 314 L 600 139 L 600 117 L 150 292 Z" fill="#2563eb" opacity="0.1"/>

    <!-- Legend -->
    <line x1="92" y1="48" x2="115" y2="48" stroke="#2563eb" stroke-width="2.5"/>
    <text x="120" y="52" font-size="11" fill="#374151">Regression line (95% CI)</text>
    <circle cx="102" cy="62" r="3.5" fill="#93c5fd"/>
    <text x="120" y="66" font-size="11" fill="#374151">Individual data points</text>
    <circle cx="102" cy="76" r="5" fill="#111827"/>
    <text x="120" y="80" font-size="11" fill="#374151">Genotype mean</text>
  </g>

  <!-- ─── HYPOTHESIS INSET PANEL (right 35%) ─── -->
  <g id="hypothesis" transform="translate(700, 50)">
    <rect width="350" height="310" rx="6" fill="#fff" stroke="#e5e7eb"/>
    <text x="175" y="25" text-anchor="middle" class="title" font-size="13">Hypothesis Test for β</text>

    <!-- Gaussian curves for β̂ distribution -->
    <!-- Null (grey) centred at 0 -->
    <!-- Alt (cobalt) centred at β=0.05 -->
    <!-- x-range: -0.15 to 0.15 mapped to px 20..330 -->
    <!-- y-range: 0..35 mapped to 290..40 -->
    <!-- Null gaussian: mean=0, sd=0.03 -->
    <path d="M 20 290
      C 40 289 60 285 80 270
      C 100 255 115 225 130 185
      C 140 160 150 130 175 105
      C 200 80 210 75 220 105
      C 235 140 245 175 260 200
      C 275 225 295 255 310 270
      C 325 283 335 288 350 290 Z"
      fill="#e5e7eb" opacity="0.7" stroke="#9ca3af" stroke-width="1.5"/>

    <!-- Alternative gaussian: mean shifted right -->
    <path d="M 80 290
      C 100 289 120 285 140 270
      C 155 258 170 230 185 195
      C 195 170 205 140 220 115
      C 235 90 248 80 260 90
      C 275 102 285 130 298 165
      C 308 192 318 220 328 250
      C 337 272 342 284 355 290 Z"
      fill="#bfdbfe" opacity="0.7" stroke="#2563eb" stroke-width="1.5"/>

    <!-- P-value tail shading (right tail of null) -->
    <path d="M 240 290 C 255 289 265 285 275 270 C 285 255 295 225 310 200 C 320 182 330 168 350 290 Z"
      fill="#b45309" opacity="0.35"/>

    <!-- Observed β̂ tick mark -->
    <line x1="248" y1="175" x2="248" y2="295" stroke="#374151" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="252" y="168" class="mono" fill="#374151">β̂ = 0.052</text>

    <!-- x-axis -->
    <line x1="20" y1="290" x2="340" y2="290" stroke="#374151" stroke-width="1.5"/>
    <text x="175" y="305" text-anchor="middle" class="math" font-size="11">β̂</text>
    <text x="175" y="320" text-anchor="middle" class="caption">sampling distribution of β̂</text>

    <!-- x-axis ticks -->
    <line x1="95" y1="290" x2="95" y2="297" stroke="#374151"/>
    <line x1="175" y1="290" x2="175" y2="297" stroke="#374151"/>
    <line x1="260" y1="290" x2="260" y2="297" stroke="#374151"/>
    <text x="95" y="308" text-anchor="middle" class="mono" fill="#6b7280">-β</text>
    <text x="175" y="308" text-anchor="middle" class="mono" fill="#6b7280">0</text>
    <text x="260" y="308" text-anchor="middle" class="mono" fill="#6b7280">+β</text>

    <!-- Z-stat annotation -->
    <text x="175" y="345" text-anchor="middle" class="mono" fill="#111827">z = β̂ / SE(β̂) = 6.5</text>
    <text x="175" y="362" text-anchor="middle" class="mono" fill="#c4342c">p = 4.1×10⁻¹¹</text>

    <!-- Legend -->
    <rect x="22" y="38" width="12" height="8" fill="#e5e7eb" stroke="#9ca3af"/>
    <text x="38" y="46" font-size="10" fill="#374151">H₀: β = 0 (null)</text>
    <rect x="22" y="54" width="12" height="8" fill="#bfdbfe" stroke="#2563eb"/>
    <text x="38" y="62" font-size="10" fill="#374151">H₁: β &gt; 0 (alternative)</text>
    <rect x="22" y="70" width="12" height="8" fill="#b45309" opacity="0.5"/>
    <text x="38" y="78" font-size="10" fill="#374151">p-value tail region</text>
  </g>
</svg>
