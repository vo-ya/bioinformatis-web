<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" width="1200" height="440" font-family="Inter, sans-serif">
  <defs>
    <style>
      text { font-family: Inter, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }
      .math { font-family: 'Source Serif 4', serif; font-style: italic; }
    </style>
  </defs>

  <rect width="1200" height="440" fill="#fafaf9" rx="6"/>

  <!-- Title -->
  <text x="600" y="22" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Manhattan Plot — Well-Powered GWAS</text>
  <text x="600" y="38" text-anchor="middle" font-size="11" fill="#6b7280">N = 300,000 participants · M = 10⁶ SNPs tested</text>

  <!-- Plot area: x=70..1160, y=55..370 -->
  <!-- Y axis -->
  <line x1="70" y1="55" x2="70" y2="380" stroke="#374151" stroke-width="1.5"/>
  <!-- X axis -->
  <line x1="70" y1="380" x2="1160" y2="380" stroke="#374151" stroke-width="1.5"/>

  <!-- Y axis label -->
  <text x="20" y="220" text-anchor="middle" font-size="12" fill="#374151" transform="rotate(-90 20 220)" class="math">−log₁₀(p)</text>

  <!-- Y axis ticks -->
  <g font-size="10" fill="#6b7280">
    <line x1="64" y1="370" x2="70" y2="370" stroke="#374151"/>
    <text x="60" y="373" text-anchor="end">0</text>
    <line x1="64" y1="349" x2="70" y2="349" stroke="#374151"/>
    <text x="60" y="352" text-anchor="end">1</text>
    <line x1="64" y1="328" x2="70" y2="328" stroke="#374151"/>
    <text x="60" y="331" text-anchor="end">2</text>
    <line x1="64" y1="307" x2="70" y2="307" stroke="#374151"/>
    <text x="60" y="310" text-anchor="end">3</text>
    <line x1="64" y1="286" x2="70" y2="286" stroke="#374151"/>
    <text x="60" y="289" text-anchor="end">4</text>
    <line x1="64" y1="265" x2="70" y2="265" stroke="#374151"/>
    <text x="60" y="268" text-anchor="end">5</text>
    <line x1="64" y1="244" x2="70" y2="244" stroke="#374151"/>
    <text x="60" y="247" text-anchor="end">6</text>
    <line x1="64" y1="223" x2="70" y2="223" stroke="#374151"/>
    <text x="60" y="226" text-anchor="end">7</text>
    <line x1="64" y1="202" x2="70" y2="202" stroke="#374151"/>
    <text x="60" y="205" text-anchor="end">8</text>
    <line x1="64" y1="150" x2="70" y2="150" stroke="#374151"/>
    <text x="60" y="153" text-anchor="end">15</text>
    <line x1="64" y1="100" x2="70" y2="100" stroke="#374151"/>
    <text x="60" y="103" text-anchor="end">20</text>
    <line x1="64" y1="55" x2="70" y2="55" stroke="#374151"/>
    <text x="60" y="58" text-anchor="end">30</text>
  </g>

  <!-- Genome-wide significance line at y=7.3 → plot y = 370 - 7.3*21 = 370-153 = 217 -->
  <!-- Using scale: 1 unit = (370-55)/30 = 10.5 px -->
  <!-- y = 370 - logP * 10.5 -->
  <!-- 7.3 → 370 - 76.65 = 293.35 -->
  <line x1="70" y1="293" x2="1160" y2="293" stroke="#b45309" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="1165" y="296" font-size="10" fill="#b45309">5×10⁻⁸</text>

  <!-- Suggestive threshold at p=5e-5 → logP=4.3 → y=370-45=325 -->
  <line x1="70" y1="325" x2="1160" y2="325" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,4" opacity="0.5"/>
  <text x="1165" y="328" font-size="9" fill="#9ca3af">Suggestive</text>

  <!-- X axis chromosome labels -->
  <!-- 22 chromosomes; divide x range 70..1160 = 1090px into 22 bands, ~49.5px each -->
  <!-- chr widths proportional to chr size; simplified here as equal -->
  <g font-size="9" fill="#6b7280">
    <!-- chr bands alternating background -->
    <!-- chr1 -->
    <rect x="70" y="55" width="80" height="325" fill="#f9fafb" opacity="0.5"/>
    <text x="110" y="397" text-anchor="middle">1</text>
    <!-- chr2 -->
    <rect x="150" y="55" width="75" height="325" fill="#e5e7eb" opacity="0.3"/>
    <text x="188" y="397" text-anchor="middle">2</text>
    <!-- chr3 -->
    <rect x="225" y="55" width="65" height="325" fill="#f9fafb" opacity="0.5"/>
    <text x="258" y="397" text-anchor="middle">3</text>
    <!-- chr4 -->
    <rect x="290" y="55" width="62" height="325" fill="#e5e7eb" opacity="0.3"/>
    <text x="321" y="397" text-anchor="middle">4</text>
    <!-- chr5 -->
    <rect x="352" y="55" width="59" height="325" fill="#f9fafb" opacity="0.5"/>
    <text x="382" y="397" text-anchor="middle">5</text>
    <!-- chr6 -->
    <rect x="411" y="55" width="56" height="325" fill="#e5e7eb" opacity="0.3"/>
    <text x="439" y="397" text-anchor="middle">6</text>
    <!-- chr7 -->
    <rect x="467" y="55" width="52" height="325" fill="#f9fafb" opacity="0.5"/>
    <text x="493" y="397" text-anchor="middle">7</text>
    <!-- chr8 -->
    <rect x="519" y="55" width="48" height="325" fill="#e5e7eb" opacity="0.3"/>
    <text x="543" y="397" text-anchor="middle">8</text>
    <!-- chr9 -->
    <rect x="567" y="55" width="45" height="325" fill="#f9fafb" opacity="0.5"/>
    <text x="590" y="397" text-anchor="middle">9</text>
    <!-- chr10 -->
    <rect x="612" y="55" width="44" height="325" fill="#e5e7eb" opacity="0.3"/>
    <text x="634" y="397" text-anchor="middle">10</text>
    <!-- chr11 -->
    <rect x="656" y="55" width="43" height="325" fill="#f9fafb" opacity="0.5"/>
    <text x="678" y="397" text-anchor="middle">11</text>
    <!-- chr12 -->
    <rect x="699" y="55" width="42" height="325" fill="#e5e7eb" opacity="0.3"/>
    <text x="720" y="397" text-anchor="middle">12</text>
    <!-- chr13 -->
    <rect x="741" y="55" width="38" height="325" fill="#f9fafb" opacity="0.5"/>
    <text x="760" y="397" text-anchor="middle">13</text>
    <!-- chr14 -->
    <rect x="779" y="55" width="35" height="325" fill="#e5e7eb" opacity="0.3"/>
    <text x="797" y="397" text-anchor="middle">14</text>
    <!-- chr15 -->
    <rect x="814" y="55" width="33" height="325" fill="#f9fafb" opacity="0.5"/>
    <text x="831" y="397" text-anchor="middle">15</text>
    <!-- chr16 -->
    <rect x="847" y="55" width="30" height="325" fill="#e5e7eb" opacity="0.3"/>
    <text x="862" y="397" text-anchor="middle">16</text>
    <!-- chr17 -->
    <rect x="877" y="55" width="28" height="325" fill="#f9fafb" opacity="0.5"/>
    <text x="891" y="397" text-anchor="middle">17</text>
    <!-- chr18 -->
    <rect x="905" y="55" width="27" height="325" fill="#e5e7eb" opacity="0.3"/>
    <text x="919" y="397" text-anchor="middle">18</text>
    <!-- chr19 -->
    <rect x="932" y="55" width="25" height="325" fill="#f9fafb" opacity="0.5"/>
    <text x="945" y="397" text-anchor="middle">19</text>
    <!-- chr20 -->
    <rect x="957" y="55" width="24" height="325" fill="#e5e7eb" opacity="0.3"/>
    <text x="969" y="397" text-anchor="middle">20</text>
    <!-- chr21 -->
    <rect x="981" y="55" width="20" height="325" fill="#f9fafb" opacity="0.5"/>
    <text x="991" y="397" text-anchor="middle">21</text>
    <!-- chr22 -->
    <rect x="1001" y="55" width="18" height="325" fill="#e5e7eb" opacity="0.3"/>
    <text x="1010" y="397" text-anchor="middle">22</text>
  </g>

  <!-- X axis label -->
  <text x="615" y="412" text-anchor="middle" font-size="12" fill="#374151">Genomic position (by chromosome)</text>

  <!-- Background null SNPs — distributed across all chromosomes -->
  <!-- Using predefined x,y coords for a realistic scatter -->
  <g fill="#9ca3af" opacity="0.6">
    <!-- chr1 null SNPs -->
    <circle cx="85" cy="352" r="1.5"/><circle cx="92" cy="358" r="1.5"/><circle cx="99" cy="345" r="1.5"/>
    <circle cx="106" cy="362" r="1.5"/><circle cx="113" cy="348" r="1.5"/><circle cx="120" cy="355" r="1.5"/>
    <circle cx="127" cy="340" r="1.5"/><circle cx="134" cy="365" r="1.5"/><circle cx="141" cy="350" r="1.5"/>
    <!-- chr2 null SNPs -->
    <circle cx="160" cy="343" r="1.5"/><circle cx="168" cy="357" r="1.5"/><circle cx="176" cy="349" r="1.5"/>
    <circle cx="184" cy="363" r="1.5"/><circle cx="192" cy="338" r="1.5"/><circle cx="200" cy="352" r="1.5"/>
    <circle cx="208" cy="360" r="1.5"/><circle cx="216" cy="344" r="1.5"/>
    <!-- chr3 -->
    <circle cx="233" cy="355" r="1.5"/><circle cx="241" cy="347" r="1.5"/><circle cx="249" cy="362" r="1.5"/>
    <circle cx="257" cy="339" r="1.5"/><circle cx="265" cy="356" r="1.5"/><circle cx="273" cy="348" r="1.5"/>
    <!-- chr4 -->
    <circle cx="299" cy="352" r="1.5"/><circle cx="307" cy="342" r="1.5"/><circle cx="315" cy="358" r="1.5"/>
    <circle cx="323" cy="363" r="1.5"/><circle cx="331" cy="347" r="1.5"/><circle cx="339" cy="355" r="1.5"/>
    <!-- chr5 -->
    <circle cx="360" cy="344" r="1.5"/><circle cx="368" cy="356" r="1.5"/><circle cx="376" cy="362" r="1.5"/>
    <circle cx="384" cy="349" r="1.5"/><circle cx="392" cy="340" r="1.5"/>
    <!-- chr6 -->
    <circle cx="418" cy="358" r="1.5"/><circle cx="426" cy="346" r="1.5"/><circle cx="434" cy="363" r="1.5"/>
    <circle cx="442" cy="351" r="1.5"/><circle cx="450" cy="342" r="1.5"/>
    <!-- chr7 -->
    <circle cx="474" cy="353" r="1.5"/><circle cx="482" cy="362" r="1.5"/><circle cx="490" cy="345" r="1.5"/>
    <circle cx="498" cy="358" r="1.5"/>
    <!-- chr8 -->
    <circle cx="526" cy="350" r="1.5"/><circle cx="534" cy="363" r="1.5"/><circle cx="542" cy="343" r="1.5"/>
    <circle cx="550" cy="357" r="1.5"/>
    <!-- chr9 -->
    <circle cx="574" cy="355" r="1.5"/><circle cx="582" cy="347" r="1.5"/><circle cx="590" cy="362" r="1.5"/>
    <circle cx="598" cy="338" r="1.5"/>
    <!-- chr10 -->
    <circle cx="620" cy="348" r="1.5"/><circle cx="628" cy="360" r="1.5"/><circle cx="636" cy="344" r="1.5"/>
    <circle cx="644" cy="356" r="1.5"/>
    <!-- chr11 -->
    <circle cx="663" cy="352" r="1.5"/><circle cx="671" cy="341" r="1.5"/><circle cx="679" cy="365" r="1.5"/>
    <circle cx="687" cy="349" r="1.5"/>
    <!-- chr12 -->
    <circle cx="706" cy="357" r="1.5"/><circle cx="714" cy="346" r="1.5"/><circle cx="722" cy="360" r="1.5"/>
    <circle cx="730" cy="342" r="1.5"/>
    <!-- chr13..22 null -->
    <circle cx="748" cy="355" r="1.5"/><circle cx="756" cy="348" r="1.5"/><circle cx="764" cy="362" r="1.5"/>
    <circle cx="786" cy="351" r="1.5"/><circle cx="794" cy="360" r="1.5"/>
    <circle cx="820" cy="349" r="1.5"/><circle cx="828" cy="357" r="1.5"/>
    <circle cx="854" cy="360" r="1.5"/><circle cx="862" cy="345" r="1.5"/>
    <circle cx="884" cy="352" r="1.5"/><circle cx="892" cy="364" r="1.5"/>
    <circle cx="912" cy="355" r="1.5"/><circle cx="920" cy="344" r="1.5"/>
    <circle cx="938" cy="358" r="1.5"/><circle cx="946" cy="349" r="1.5"/>
    <circle cx="962" cy="360" r="1.5"/><circle cx="970" cy="342" r="1.5"/>
    <circle cx="986" cy="354" r="1.5"/><circle cx="994" cy="363" r="1.5"/>
    <circle cx="1007" cy="349" r="1.5"/><circle cx="1015" cy="357" r="1.5"/>
  </g>

  <!-- Near-significant SNPs (logP 3-7) scattered around genome -->
  <g fill="#6b7280" opacity="0.8">
    <circle cx="88" cy="318" r="2"/><circle cx="115" cy="312" r="2"/>
    <circle cx="172" cy="307" r="2"/><circle cx="204" cy="315" r="2"/>
    <circle cx="246" cy="310" r="2"/><circle cx="278" cy="305" r="2"/>
    <circle cx="304" cy="320" r="2"/><circle cx="336" cy="308" r="2"/>
    <circle cx="398" cy="313" r="2"/><circle cx="440" cy="306" r="2"/>
    <circle cx="480" cy="316" r="2"/><circle cx="536" cy="309" r="2"/>
    <circle cx="578" cy="314" r="2"/><circle cx="630" cy="307" r="2"/>
    <circle cx="672" cy="311" r="2"/><circle cx="710" cy="317" r="2"/>
    <circle cx="760" cy="308" r="2"/><circle cx="822" cy="313" r="2"/>
    <circle cx="858" cy="305" r="2"/><circle cx="916" cy="312" r="2"/>
  </g>

  <!-- ─── PEAK 1: chr2 — FTO (~BMI) — logP=28 → y=370-28*10.5=76 -->
  <!-- Lead at chr2 ~x=180, nearby LD cluster -->
  <g fill="#1d4ed8">
    <circle cx="175" cy="82" r="3.5"/><!-- lead -->
    <circle cx="170" cy="115" r="2.5"/>
    <circle cx="165" cy="145" r="2.5"/>
    <circle cx="180" cy="130" r="2.5"/>
    <circle cx="185" cy="160" r="2"/>
    <circle cx="190" cy="190" r="2"/>
    <circle cx="195" cy="220" r="2"/>
    <circle cx="160" cy="210" r="2"/>
    <circle cx="168" cy="240" r="2"/>
    <circle cx="188" cy="250" r="2"/>
    <circle cx="155" cy="270" r="1.5"/>
    <circle cx="200" cy="265" r="1.5"/>
  </g>
  <text x="175" y="75" text-anchor="middle" font-size="10" fill="#1d4ed8" font-style="italic">FTO</text>

  <!-- ─── PEAK 2: chr10 — TCF7L2 (~T2D) — logP=24 → y=370-24*10.5=118 -->
  <g fill="#1d4ed8">
    <circle cx="638" cy="122" r="3.5"/>
    <circle cx="632" cy="152" r="2.5"/>
    <circle cx="644" cy="168" r="2.5"/>
    <circle cx="628" cy="190" r="2"/>
    <circle cx="650" cy="198" r="2"/>
    <circle cx="624" cy="228" r="2"/>
    <circle cx="656" cy="218" r="2"/>
    <circle cx="620" cy="255" r="1.5"/>
    <circle cx="660" cy="245" r="1.5"/>
    <circle cx="616" cy="270" r="1.5"/>
  </g>
  <text x="638" y="115" text-anchor="middle" font-size="10" fill="#1d4ed8" font-style="italic">TCF7L2</text>

  <!-- ─── PEAK 3: chr16 — LCT (lactase) — logP=18 → y=370-18*10.5=181 -->
  <g fill="#1d4ed8">
    <circle cx="860" cy="182" r="3.5"/>
    <circle cx="854" cy="205" r="2.5"/>
    <circle cx="866" cy="218" r="2.5"/>
    <circle cx="848" cy="238" r="2"/>
    <circle cx="872" cy="245" r="2"/>
    <circle cx="845" cy="260" r="1.5"/>
    <circle cx="876" cy="255" r="1.5"/>
    <circle cx="842" cy="275" r="1.5"/>
  </g>
  <text x="860" y="175" text-anchor="middle" font-size="10" fill="#1d4ed8" font-style="italic">LCT</text>

  <!-- ─── PEAK 4: chr6 — HLA — logP=22 → y=370-22*10.5=139 -->
  <g fill="#1d4ed8">
    <circle cx="440" cy="140" r="3.5"/>
    <circle cx="433" cy="165" r="2.5"/>
    <circle cx="447" cy="178" r="2.5"/>
    <circle cx="427" cy="198" r="2"/>
    <circle cx="453" cy="205" r="2"/>
    <circle cx="422" cy="225" r="2"/>
    <circle cx="459" cy="218" r="2"/>
    <circle cx="418" cy="248" r="1.5"/>
    <circle cx="463" cy="240" r="1.5"/>
  </g>
  <text x="440" y="133" text-anchor="middle" font-size="10" fill="#1d4ed8" font-style="italic">HLA</text>

  <!-- Legend -->
  <circle cx="85" cy="420" r="3.5" fill="#1d4ed8"/>
  <text x="92" y="424" font-size="10" fill="#374151">Genome-wide significant (p &lt; 5×10⁻⁸)</text>
  <circle cx="300" cy="420" r="2" fill="#6b7280"/>
  <text x="307" y="424" font-size="10" fill="#374151">Sub-significant SNP</text>
  <line x1="500" y1="420" x2="525" y2="420" stroke="#b45309" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="530" y="424" font-size="10" fill="#b45309">Genome-wide threshold (−log₁₀p = 7.3)</text>
</svg>
