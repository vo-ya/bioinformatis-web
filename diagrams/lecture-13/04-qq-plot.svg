<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 440" width="1080" height="440" font-family="Inter, sans-serif">
  <defs>
    <style>
      text { font-family: Inter, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
      .math { font-family: 'Source Serif 4', serif; font-style: italic; }
    </style>
  </defs>

  <rect width="1080" height="440" fill="#fafaf9" rx="6"/>

  <!-- Divider -->
  <line x1="540" y1="20" x2="540" y2="395" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ─── LEFT PANEL: Well-controlled GWAS ─── -->
  <text x="270" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">Well-Controlled GWAS</text>
  <text x="270" y="43" text-anchor="middle" font-size="11" fill="#059669">Late departure = real signal</text>

  <!-- Plot area left: x=70..500, y=60..360 -->
  <line x1="80" y1="360" x2="510" y2="360" stroke="#374151" stroke-width="1.5"/>
  <line x1="80" y1="360" x2="80" y2="55" stroke="#374151" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="295" y="383" text-anchor="middle" font-size="11" fill="#374151" class="math">Expected −log₁₀(p)</text>
  <text x="25" y="210" text-anchor="middle" font-size="11" fill="#374151" class="math" transform="rotate(-90 25 210)">Observed −log₁₀(p)</text>

  <!-- Y axis ticks (0..30, scale: 300px/30 = 10px per unit) -->
  <g font-size="9" fill="#6b7280">
    <line x1="74" y1="360" x2="80" y2="360" stroke="#374151"/><text x="70" y="363" text-anchor="end">0</text>
    <line x1="74" y1="310" x2="80" y2="310" stroke="#374151"/><text x="70" y="313" text-anchor="end">5</text>
    <line x1="74" y1="260" x2="80" y2="260" stroke="#374151"/><text x="70" y="263" text-anchor="end">10</text>
    <line x1="74" y1="210" x2="80" y2="210" stroke="#374151"/><text x="70" y="213" text-anchor="end">15</text>
    <line x1="74" y1="160" x2="80" y2="160" stroke="#374151"/><text x="70" y="163" text-anchor="end">20</text>
    <line x1="74" y1="110" x2="80" y2="110" stroke="#374151"/><text x="70" y="113" text-anchor="end">25</text>
    <line x1="74" y1="60" x2="80" y2="60" stroke="#374151"/><text x="70" y="63" text-anchor="end">30</text>
  </g>

  <!-- X axis ticks (0..8, scale: 430px/8 = 53.75px per unit) -->
  <g font-size="9" fill="#6b7280">
    <line x1="80" y1="360" x2="80" y2="366" stroke="#374151"/><text x="80" y="376" text-anchor="middle">0</text>
    <line x1="134" y1="360" x2="134" y2="366" stroke="#374151"/><text x="134" y="376" text-anchor="middle">1</text>
    <line x1="188" y1="360" x2="188" y2="366" stroke="#374151"/><text x="188" y="376" text-anchor="middle">2</text>
    <line x1="242" y1="360" x2="242" y2="366" stroke="#374151"/><text x="242" y="376" text-anchor="middle">3</text>
    <line x1="296" y1="360" x2="296" y2="366" stroke="#374151"/><text x="296" y="376" text-anchor="middle">4</text>
    <line x1="350" y1="360" x2="350" y2="366" stroke="#374151"/><text x="350" y="376" text-anchor="middle">5</text>
    <line x1="404" y1="360" x2="404" y2="366" stroke="#374151"/><text x="404" y="376" text-anchor="middle">6</text>
    <line x1="458" y1="360" x2="458" y2="366" stroke="#374151"/><text x="458" y="376" text-anchor="middle">7</text>
    <line x1="510" y1="360" x2="510" y2="366" stroke="#374151"/><text x="510" y="376" text-anchor="middle">8</text>
  </g>

  <!-- 45° reference line: from (80,360) to (510+, matching y=360-8*10*3.75=360-300=60) -->
  <!-- Scale: x unit = 53.75px, y unit = 10px. At x=8 → y=360-8*37.5=360-300=60 -->
  <!-- But aspect ratio differs so we draw through (80,360)→(510,60) for visual 45° -->
  <line x1="80" y1="360" x2="430" y2="60" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.8"/>

  <!-- Well-controlled dots: mostly follow reference line, lift off at top-right -->
  <!-- Expected logP mapped: exp_x = 80 + expLogP * 53.75; obs_y = 360 - obsLogP * 10 -->
  <!-- Near-null dots (expected 0-5, observed ≈ expected) -->
  <g fill="#2563eb" opacity="0.7">
    <circle cx="84" cy="359" r="1.5"/>
    <circle cx="93" cy="349" r="1.5"/>
    <circle cx="102" cy="340" r="1.5"/>
    <circle cx="111" cy="330" r="1.5"/>
    <circle cx="120" cy="321" r="1.5"/>
    <circle cx="134" cy="310" r="1.5"/>
    <circle cx="148" cy="300" r="1.5"/>
    <circle cx="162" cy="290" r="1.5"/>
    <circle cx="176" cy="280" r="1.5"/>
    <circle cx="190" cy="270" r="1.5"/>
    <circle cx="204" cy="260" r="1.5"/>
    <circle cx="218" cy="250" r="1.5"/>
    <circle cx="232" cy="240" r="1.5"/>
    <circle cx="242" cy="231" r="1.5"/>
    <circle cx="256" cy="221" r="1.5"/>
    <circle cx="270" cy="212" r="1.5"/>
    <circle cx="284" cy="202" r="1.5"/>
    <circle cx="296" cy="193" r="1.5"/>
    <!-- Start lifting off here (top-right real hits) -->
    <circle cx="315" cy="175" r="2"/>
    <circle cx="330" cy="155" r="2"/>
    <circle cx="348" cy="130" r="2.5"/>
    <circle cx="368" cy="100" r="2.5"/>
    <circle cx="392" cy="75" r="3"/>
    <circle cx="420" cy="55" r="3"/>
  </g>

  <!-- Lift-off annotation arrow. Path reversed: arrow now starts near
       the "real hits" label at (450, 65) and points toward the
       lift-off curve at (380, 90), where the dots at (368, 100) and
       (392, 75) sit. The previous direction had the arrow tip
       landing at (450, 65) — empty space past the rightmost dot at
       (420, 55) — so it appeared to point at nothing. -->
  <path d="M 450 65 Q 420 75 380 90" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <defs>
    <marker id="arr-green" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#059669"/>
    </marker>
  </defs>
  <text x="452" y="60" font-size="9" fill="#059669">real hits</text>

  <!-- λ_GC annotation -->
  <rect x="82" y="62" width="130" height="28" rx="3" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="147" y="74" text-anchor="middle" class="mono" fill="#059669">λ_GC = 1.02</text>
  <text x="147" y="86" text-anchor="middle" font-size="9" fill="#059669">well calibrated</text>

  <!-- ─── RIGHT PANEL: Inflated GWAS ─── -->
  <text x="810" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">Inflated GWAS</text>
  <text x="810" y="43" text-anchor="middle" font-size="11" fill="#c4342c">Early departure = confounding</text>

  <!-- Plot area right: x=560..1000, y=60..360 -->
  <line x1="570" y1="360" x2="1000" y2="360" stroke="#374151" stroke-width="1.5"/>
  <line x1="570" y1="360" x2="570" y2="55" stroke="#374151" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="785" y="383" text-anchor="middle" font-size="11" fill="#374151" class="math">Expected −log₁₀(p)</text>
  <text x="520" y="210" text-anchor="middle" font-size="11" fill="#374151" class="math" transform="rotate(-90 520 210)">Observed −log₁₀(p)</text>

  <!-- Y axis ticks -->
  <g font-size="9" fill="#6b7280">
    <line x1="564" y1="360" x2="570" y2="360" stroke="#374151"/><text x="560" y="363" text-anchor="end">0</text>
    <line x1="564" y1="310" x2="570" y2="310" stroke="#374151"/><text x="560" y="313" text-anchor="end">5</text>
    <line x1="564" y1="260" x2="570" y2="260" stroke="#374151"/><text x="560" y="263" text-anchor="end">10</text>
    <line x1="564" y1="210" x2="570" y2="210" stroke="#374151"/><text x="560" y="213" text-anchor="end">15</text>
    <line x1="564" y1="160" x2="570" y2="160" stroke="#374151"/><text x="560" y="163" text-anchor="end">20</text>
    <line x1="564" y1="110" x2="570" y2="110" stroke="#374151"/><text x="560" y="113" text-anchor="end">25</text>
    <line x1="564" y1="60" x2="570" y2="60" stroke="#374151"/><text x="560" y="63" text-anchor="end">30</text>
  </g>

  <!-- X axis ticks -->
  <g font-size="9" fill="#6b7280">
    <line x1="570" y1="360" x2="570" y2="366" stroke="#374151"/><text x="570" y="376" text-anchor="middle">0</text>
    <line x1="624" y1="360" x2="624" y2="366" stroke="#374151"/><text x="624" y="376" text-anchor="middle">1</text>
    <line x1="678" y1="360" x2="678" y2="366" stroke="#374151"/><text x="678" y="376" text-anchor="middle">2</text>
    <line x1="732" y1="360" x2="732" y2="366" stroke="#374151"/><text x="732" y="376" text-anchor="middle">3</text>
    <line x1="786" y1="360" x2="786" y2="366" stroke="#374151"/><text x="786" y="376" text-anchor="middle">4</text>
    <line x1="840" y1="360" x2="840" y2="366" stroke="#374151"/><text x="840" y="376" text-anchor="middle">5</text>
    <line x1="894" y1="360" x2="894" y2="366" stroke="#374151"/><text x="894" y="376" text-anchor="middle">6</text>
    <line x1="948" y1="360" x2="948" y2="366" stroke="#374151"/><text x="948" y="376" text-anchor="middle">7</text>
    <line x1="1000" y1="360" x2="1000" y2="366" stroke="#374151"/><text x="1000" y="376" text-anchor="middle">8</text>
  </g>

  <!-- 45° reference line right panel -->
  <line x1="570" y1="360" x2="920" y2="60" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.8"/>

  <!-- Inflated early-departure dots -->
  <!-- Even small p-values are above the diagonal -->
  <!-- Inflation factor λ≈1.25: observed ≈ expected * 1.25 -->
  <g fill="#2563eb" opacity="0.7">
    <circle cx="574" cy="354" r="1.5"/>
    <circle cx="583" cy="341" r="1.5"/>
    <circle cx="593" cy="328" r="1.5"/>
    <circle cx="603" cy="315" r="1.5"/>
    <circle cx="614" cy="302" r="1.5"/>
    <circle cx="624" cy="290" r="1.5"/>
    <circle cx="638" cy="276" r="1.5"/>
    <circle cx="652" cy="262" r="1.5"/>
    <circle cx="668" cy="247" r="1.5"/>
    <circle cx="684" cy="232" r="1.5"/>
    <circle cx="700" cy="217" r="1.5"/>
    <circle cx="718" cy="202" r="1.5"/>
    <circle cx="735" cy="187" r="2"/>
    <circle cx="752" cy="172" r="2"/>
    <circle cx="770" cy="155" r="2"/>
    <circle cx="790" cy="137" r="2.5"/>
    <circle cx="812" cy="118" r="2.5"/>
    <circle cx="836" cy="97" r="2.5"/>
    <circle cx="864" cy="75" r="3"/>
    <circle cx="896" cy="55" r="3"/>
  </g>

  <!-- Shaded region beneath inflated curve -->
  <path d="M 570 360 L 920 60 L 570 360 Z" fill="none"/>
  <!-- Shading between reference and dots -->
  <path d="M 574 354 C 620 310 680 265 740 202 C 790 152 840 105 896 55 L 920 60 C 860 110 808 157 757 210 C 700 265 640 310 595 348 Z"
    fill="#fee2e2" opacity="0.4"/>

  <!-- Early lift annotation. Path retargeted to actually land on an
       inflated dot. The previous tip at (565, 280) sat to the LEFT
       of the plot left edge (x=570) and ABOVE the inflated curve, so
       the arrow appeared to point at nothing. The new tip at
       (583, 341) sits exactly on the inflated dot at (583, 341). -->
  <path d="M 622 305 Q 605 325 583 341" stroke="#c4342c" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <defs>
    <marker id="arr-red" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#c4342c"/>
    </marker>
  </defs>
  <text x="622" y="294" font-size="9" fill="#c4342c">early lift-off</text>

  <!-- λ_GC annotation -->
  <rect x="572" y="62" width="130" height="28" rx="3" fill="#fef2f2" stroke="#fecaca"/>
  <text x="637" y="74" text-anchor="middle" class="mono" fill="#c4342c">λ_GC = 1.25</text>
  <text x="637" y="86" text-anchor="middle" font-size="9" fill="#c4342c">inflation present</text>

  <!-- Bottom caption bar -->
  <rect x="0" y="398" width="1080" height="42" fill="#f3f4f6" rx="0"/>
  <rect x="0" y="398" width="1080" height="3" fill="#2563eb"/>
  <text x="540" y="418" text-anchor="middle" font-size="11" fill="#374151">λ_GC &gt; 1.05 warrants investigation. Distinguish polygenic signal (LDSC intercept ≈ 1) from true confounding (LDSC intercept &gt; 1).</text>
</svg>
