  <text x="65" y="201" font-size="11" fill="#6b7280">~1 M LD-independent blocks (Pe'er et al. 2008)</text>

  <!-- Chromosome bar with blocks -->
  <rect x="65" y="211" width="880" height="32" rx="4" fill="#f3f4f6" stroke="#e5e7eb"/>

