  <text x="1018" y="231" text-anchor="middle" class="mono" font-size="11" fill="#1d4ed8">M_eff ≈ 10⁶</text>

  <!-- Arrow from M_eff to equation -->
  <path d="M 1018 240 L 1018 268 L 700 268 L 700 292" stroke="#1d4ed8" stroke-width="1.5" fill="none" stroke-dasharray="4,3"
    marker-end="url(#arr-blue)"/>
  <defs>
    <marker id="arr-blue" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#1d4ed8"/>
    </marker>
  </defs>

  <!-- ─── ROW 3: Bonferroni equation ─── -->
  <rect x="65" y="285" width="850" height="95" rx="6" fill="#fff" stroke="#e5e7eb"/>

  <text x="490" y="315" text-anchor="middle" class="mono" font-size="18" fill="#111827">
    α_adjusted = 0.05 / M_eff = 0.05 / 10⁶ = 5 × 10⁻⁸
  </text>

  <!-- Arrow pointing to threshold -->
  <text x="490" y="345" text-anchor="middle" font-size="12" fill="#b45309">&#8592; the genome-wide significance threshold</text>

  <!-- Label: "Bonferroni FWER control" -->
  <text x="490" y="370" text-anchor="middle" font-size="11" fill="#6b7280">Bonferroni family-wise error rate control at α = 0.05</text>

  <!-- Key insight box -->
  <rect x="65" y="395" width="850" height="38" rx="4" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="490" y="410" text-anchor="middle" font-size="11" fill="#92400e" font-weight="500">Using M_raw = 10⁷ would over-correct 10×; LD correlations between SNPs mean each block counts as one test</text>
  <text x="490" y="425" text-anchor="middle" font-size="11" fill="#92400e">African populations: M_eff ≈ 1.5×10⁶ due to shorter LD blocks → slightly stricter threshold</text>
