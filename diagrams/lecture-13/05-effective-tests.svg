  <text x="1018" y="119" text-anchor="middle" class="mono" font-size="11" fill="#92400e">M_raw ≈ 10⁷</text>

  <!-- Arrow between rows 1 and 2 -->
  <text x="540" y="158" text-anchor="middle" font-size="18" fill="#9ca3af">↓</text>
  <text x="605" y="161" font-size="11" fill="#6b7280">LD grouping</text>

