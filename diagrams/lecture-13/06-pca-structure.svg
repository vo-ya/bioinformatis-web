<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 440" width="1080" height="440" font-family="Inter, sans-serif">
  <defs>
    <style>
      text { font-family: Inter, sans-serif; }
      .math { font-family: 'Source Serif 4', serif; font-style: italic; }
    </style>
    <radialGradient id="eurGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.2"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="440" fill="#fafaf9" rx="6"/>

  <!-- Divider -->
  <line x1="540" y1="20" x2="540" y2="400" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ─── LEFT PANEL: Coloured by ancestry ─── -->
  <text x="270" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">Genotype PCA — Coloured by Ancestry</text>

  <!-- Axes -->
  <line x1="70" y1="360" x2="510" y2="360" stroke="#374151" stroke-width="1.5"/>
  <line x1="270" y1="60" x2="270" y2="380" stroke="#374151" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="70" y1="210" x2="510" y2="210" stroke="#374151" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="70" y1="60" x2="70" y2="360" stroke="#374151" stroke-width="1.5"/>

  <text x="290" y="380" text-anchor="middle" font-size="11" fill="#374151" class="math">PC1 (explains 4.2%)</text>
  <text x="22" y="215" text-anchor="middle" font-size="11" fill="#374151" class="math" transform="rotate(-90 22 215)">PC2 (explains 1.8%)</text>

  <!-- ─── European cluster (top-left, large) ─── -->
  <g fill="#2563eb" opacity="0.7">
    <circle cx="155" cy="145" r="4"/><circle cx="162" cy="132" r="4"/>
    <circle cx="148" cy="158" r="4"/><circle cx="168" cy="148" r="4"/>
    <circle cx="140" cy="140" r="4"/><circle cx="175" cy="135" r="4"/>
    <circle cx="153" cy="165" r="4"/><circle cx="160" cy="120" r="4"/>
    <circle cx="145" cy="127" r="4"/><circle cx="170" cy="155" r="4"/>
    <circle cx="135" cy="150" r="4"/><circle cx="178" cy="142" r="4"/>
    <circle cx="163" cy="172" r="4"/><circle cx="155" cy="110" r="4"/>
    <circle cx="143" cy="168" r="4"/><circle cx="182" cy="128" r="4"/>
    <circle cx="158" cy="138" r="4"/><circle cx="148" cy="180" r="4"/>
    <circle cx="172" cy="162" r="4"/><circle cx="138" cy="122" r="4"/>
    <circle cx="165" cy="143" r="4"/><circle cx="152" cy="175" r="4"/>
    <circle cx="177" cy="148" r="4"/><circle cx="142" cy="135" r="4"/>
    <circle cx="160" cy="150" r="4"/>
  </g>
  <text x="153" y="102" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="600">European</text>

  <!-- ─── East Asian cluster (top-right) ─── -->
  <g fill="#c4342c" opacity="0.7">
    <circle cx="378" cy="130" r="4"/><circle cx="388" cy="142" r="4"/>
    <circle cx="368" cy="120" r="4"/><circle cx="395" cy="132" r="4"/>
    <circle cx="372" cy="148" r="4"/><circle cx="382" cy="118" r="4"/>
    <circle cx="392" cy="145" r="4"/><circle cx="365" cy="136" r="4"/>
    <circle cx="400" cy="125" r="4"/><circle cx="376" cy="155" r="4"/>
  </g>
  <text x="383" y="110" text-anchor="middle" font-size="11" fill="#c4342c" font-weight="600">East Asian</text>

  <!-- ─── African cluster (bottom-right) ─── -->
  <g fill="#b45309" opacity="0.7">
    <circle cx="395" cy="285" r="4"/><circle cx="408" cy="298" r="4"/>
    <circle cx="382" cy="275" r="4"/><circle cx="415" cy="288" r="4"/>
    <circle cx="388" cy="305" r="4"/><circle cx="403" cy="272" r="4"/>
    <circle cx="420" cy="295" r="4"/><circle cx="376" cy="290" r="4"/>
    <circle cx="410" cy="310" r="4"/><circle cx="397" cy="265" r="4"/>
    <circle cx="425" cy="278" r="4"/>
  </g>
  <text x="400" y="260" text-anchor="middle" font-size="11" fill="#b45309" font-weight="600">African</text>

  <!-- ─── South Asian cluster (middle-right) ─── -->
  <g fill="#2d7a3e" opacity="0.7">
    <circle cx="340" cy="218" r="4"/><circle cx="352" cy="228" r="4"/>
    <circle cx="328" cy="210" r="4"/><circle cx="358" cy="215" r="4"/>
    <circle cx="335" cy="235" r="4"/><circle cx="348" cy="205" r="4"/>
    <circle cx="362" cy="225" r="4"/><circle cx="322" cy="220" r="4"/>
  </g>
  <text x="342" y="200" text-anchor="middle" font-size="11" fill="#2d7a3e" font-weight="600">South Asian</text>

  <!-- ─── Admixed American cluster (between EUR and AFR) ─── -->
  <g fill="#7c3aed" opacity="0.7">
    <circle cx="250" cy="248" r="4"/><circle cx="262" cy="260" r="4"/>
    <circle cx="238" cy="238" r="4"/><circle cx="270" cy="250" r="4"/>
    <circle cx="245" cy="268" r="4"/><circle cx="258" cy="235" r="4"/>
    <circle cx="278" cy="258" r="4"/><circle cx="232" cy="255" r="4"/>
    <circle cx="265" cy="272" r="4"/>
  </g>
  <text x="255" y="228" text-anchor="middle" font-size="11" fill="#7c3aed" font-weight="600">Admixed</text>

  <!-- ─── RIGHT PANEL: Coloured by phenotype ─── -->
  <text x="810" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">Same PCA — Coloured by Phenotype Value</text>

  <!-- Axes -->
  <line x1="560" y1="360" x2="1000" y2="360" stroke="#374151" stroke-width="1.5"/>
  <line x1="760" y1="60" x2="760" y2="380" stroke="#374151" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="560" y1="210" x2="1000" y2="210" stroke="#374151" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="560" y1="60" x2="560" y2="360" stroke="#374151" stroke-width="1.5"/>

  <text x="780" y="380" text-anchor="middle" font-size="11" fill="#374151" class="math">PC1 (explains 4.2%)</text>
  <text x="514" y="215" text-anchor="middle" font-size="11" fill="#374151" class="math" transform="rotate(-90 514 215)">PC2 (explains 1.8%)</text>

  <!-- Color scale: grey (low) to amber (high) -->
  <!-- European = low phenotype (grey), African = high phenotype (amber) -->
  <!-- European-equivalent positions shifted by +490 -->
  <g opacity="0.8">
    <!-- EUR cluster: low phenotype → light grey -->
    <circle cx="645" cy="145" r="4" fill="#d1d5db"/>
    <circle cx="652" cy="132" r="4" fill="#d1d5db"/>
    <circle cx="638" cy="158" r="4" fill="#e5e7eb"/>
    <circle cx="658" cy="148" r="4" fill="#d1d5db"/>
    <circle cx="630" cy="140" r="4" fill="#e5e7eb"/>
    <circle cx="665" cy="135" r="4" fill="#d1d5db"/>
    <circle cx="643" cy="165" r="4" fill="#d1d5db"/>
    <circle cx="650" cy="120" r="4" fill="#e5e7eb"/>
    <circle cx="635" cy="127" r="4" fill="#d1d5db"/>
    <circle cx="660" cy="155" r="4" fill="#d1d5db"/>
    <circle cx="625" cy="150" r="4" fill="#e5e7eb"/>
    <circle cx="668" cy="142" r="4" fill="#d1d5db"/>
    <circle cx="653" cy="172" r="4" fill="#d1d5db"/>
    <circle cx="645" cy="110" r="4" fill="#e5e7eb"/>
    <circle cx="633" cy="168" r="4" fill="#d1d5db"/>
    <circle cx="672" cy="128" r="4" fill="#d1d5db"/>
    <circle cx="648" cy="138" r="4" fill="#d1d5db"/>
    <circle cx="638" cy="180" r="4" fill="#d1d5db"/>
    <circle cx="662" cy="162" r="4" fill="#d1d5db"/>
    <circle cx="628" cy="122" r="4" fill="#e5e7eb"/>
    <circle cx="655" cy="143" r="4" fill="#d1d5db"/>
    <circle cx="642" cy="175" r="4" fill="#d1d5db"/>
    <circle cx="667" cy="148" r="4" fill="#d1d5db"/>
    <circle cx="632" cy="135" r="4" fill="#e5e7eb"/>
    <circle cx="650" cy="150" r="4" fill="#d1d5db"/>

    <!-- East Asian cluster: medium phenotype → medium amber -->
    <circle cx="868" cy="130" r="4" fill="#fcd34d"/>
    <circle cx="878" cy="142" r="4" fill="#f59e0b"/>
    <circle cx="858" cy="120" r="4" fill="#fcd34d"/>
    <circle cx="885" cy="132" r="4" fill="#fcd34d"/>
    <circle cx="862" cy="148" r="4" fill="#f59e0b"/>
    <circle cx="872" cy="118" r="4" fill="#fcd34d"/>
    <circle cx="882" cy="145" r="4" fill="#fcd34d"/>
    <circle cx="855" cy="136" r="4" fill="#f59e0b"/>
    <circle cx="890" cy="125" r="4" fill="#fcd34d"/>
    <circle cx="866" cy="155" r="4" fill="#fcd34d"/>

    <!-- African cluster: high phenotype → dark amber/orange -->
    <circle cx="885" cy="285" r="4" fill="#d97706"/>
    <circle cx="898" cy="298" r="4" fill="#b45309"/>
    <circle cx="872" cy="275" r="4" fill="#d97706"/>
    <circle cx="905" cy="288" r="4" fill="#b45309"/>
    <circle cx="878" cy="305" r="4" fill="#d97706"/>
    <circle cx="893" cy="272" r="4" fill="#b45309"/>
    <circle cx="910" cy="295" r="4" fill="#d97706"/>
    <circle cx="866" cy="290" r="4" fill="#d97706"/>
    <circle cx="900" cy="310" r="4" fill="#b45309"/>
    <circle cx="887" cy="265" r="4" fill="#d97706"/>
    <circle cx="915" cy="278" r="4" fill="#b45309"/>

    <!-- South Asian: medium phenotype -->
    <circle cx="830" cy="218" r="4" fill="#fbbf24"/>
    <circle cx="842" cy="228" r="4" fill="#f59e0b"/>
    <circle cx="818" cy="210" r="4" fill="#fbbf24"/>
    <circle cx="848" cy="215" r="4" fill="#fbbf24"/>
    <circle cx="825" cy="235" r="4" fill="#fbbf24"/>
    <circle cx="838" cy="205" r="4" fill="#f59e0b"/>
    <circle cx="852" cy="225" r="4" fill="#fbbf24"/>
    <circle cx="812" cy="220" r="4" fill="#fbbf24"/>

    <!-- Admixed: gradient between low and high -->
    <circle cx="740" cy="248" r="4" fill="#fde68a"/>
    <circle cx="752" cy="260" r="4" fill="#fcd34d"/>
    <circle cx="728" cy="238" r="4" fill="#fde68a"/>
    <circle cx="760" cy="250" r="4" fill="#fcd34d"/>
    <circle cx="735" cy="268" r="4" fill="#fbbf24"/>
    <circle cx="748" cy="235" r="4" fill="#fde68a"/>
    <circle cx="768" cy="258" r="4" fill="#fcd34d"/>
    <circle cx="722" cy="255" r="4" fill="#fde68a"/>
    <circle cx="755" cy="272" r="4" fill="#fbbf24"/>
  </g>

  <!-- Gradient annotation arrow -->
  <line x1="638" y1="155" x2="888" y2="280" stroke="#374151" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"
    marker-end="url(#arr-dark)"/>
  <defs>
    <marker id="arr-dark" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#374151"/>
    </marker>
  </defs>
  <text x="788" y="230" text-anchor="middle" font-size="9" fill="#374151">phenotype</text>
  <text x="788" y="242" text-anchor="middle" font-size="9" fill="#374151">tracks ancestry</text>

  <!-- Colour scale legend -->
  <defs>
    <linearGradient id="phenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d1d5db"/>
      <stop offset="50%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>
  <rect x="570" y="395" width="200" height="12" rx="3" fill="url(#phenGrad)"/>
  <text x="570" y="423" font-size="9" fill="#374151">Low fasting glucose</text>
  <text x="770" y="423" text-anchor="end" font-size="9" fill="#374151">High fasting glucose</text>

  <!-- Warning annotation -->
  <rect x="556" y="325" width="440" height="40" rx="4" fill="#fef2f2" stroke="#fecaca"/>
  <text x="776" y="342" text-anchor="middle" font-size="10" fill="#c4342c" font-weight="500">Phenotype tracks ancestry →</text>
  <text x="776" y="357" text-anchor="middle" font-size="10" fill="#c4342c">uncorrected GWAS will call ancestry-differentiated SNPs significant</text>
</svg>
