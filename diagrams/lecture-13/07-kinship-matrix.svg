<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" width="1000" height="520" font-family="Inter, sans-serif">
  <defs>
    <style>
      text { font-family: Inter, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }
    </style>
  </defs>

  <rect width="1000" height="520" fill="#fafaf9" rx="6"/>

  <!-- Title -->
  <text x="430" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Kinship Matrix (Genetic Relationship Matrix) — N=100 Individuals</text>

  <!-- ─── Heatmap area: x=60..560, y=40..440 → 500×400px for 100×100 cells → 5×4px per cell ─── -->
  <!-- Each cell = 5×4px; row i, col j at (60+j*5, 40+i*4) -->
  <!-- Colour: white (k=0), light cobalt (k=0.05), medium cobalt (k=0.25), dark cobalt (k=0.5) -->

  <!-- Background: all cells ≈ 0 (unrelated) → white/very pale cobalt -->
  <rect x="60" y="40" width="500" height="400" fill="#f0f9ff"/>

  <!-- Diagonal: k=0.5 (dark cobalt) — full diagonal from (60+i*5, 40+i*4) -->
  <!-- Simplified: draw diagonal stripe -->
  <line x1="60" y1="40" x2="560" y2="440" stroke="#1d4ed8" stroke-width="5.5"/>

  <!-- Off-diagonal near-zero cells rendered as grid pattern -->
  <!-- Very faint grid to show cell structure -->
  <rect x="60" y="40" width="500" height="400" fill="none" stroke="#dbeafe" stroke-width="0.5"/>

  <!-- First-degree related block 1: rows 18-21, cols 18-21 (sibling trio 3×3) -->
  <!-- Position: (60+18*5, 40+18*4) = (150, 112), size 3*5 x 3*4 = 15x12 -->
  <rect x="150" y="112" width="15" height="12" fill="#2563eb" opacity="0.7"/>
  <!-- Mirror -->
  <rect x="112" y="150" width="12" height="15" fill="#2563eb" opacity="0.7"/>

  <!-- First-degree related block 2: rows 66-68, cols 66-68 (parent-child 2×2) -->
  <!-- Position: (60+66*5, 40+66*4) = (390, 304), size 2*5 x 2*4 = 10x8 -->
  <rect x="390" y="304" width="10" height="8" fill="#2563eb" opacity="0.9"/>
  <!-- Mirror -->
  <rect x="304" y="390" width="8" height="10" fill="#2563eb" opacity="0.9"/>

  <!-- Second-degree relatives (cousins): rows 40-42, cols 10-12 -->
  <rect x="110" y="200" width="10" height="8" fill="#93c5fd" opacity="0.7"/>
  <rect x="200" y="110" width="8" height="10" fill="#93c5fd" opacity="0.7"/>

  <!-- Some background low-level relatedness -->
  <rect x="200" y="160" width="5" height="4" fill="#bfdbfe" opacity="0.5"/>
  <rect x="300" y="80" width="5" height="4" fill="#bfdbfe" opacity="0.5"/>
  <rect x="420" y="240" width="5" height="4" fill="#bfdbfe" opacity="0.5"/>
  <rect x="100" y="320" width="5" height="4" fill="#bfdbfe" opacity="0.5"/>
  <rect x="340" y="180" width="5" height="4" fill="#bfdbfe" opacity="0.5"/>
  <rect x="160" y="280" width="5" height="4" fill="#bfdbfe" opacity="0.5"/>
  <rect x="450" y="120" width="5" height="4" fill="#bfdbfe" opacity="0.5"/>
  <rect x="80" y="380" width="5" height="4" fill="#bfdbfe" opacity="0.5"/>

  <!-- Amber rectangles highlighting the related blocks -->
  <rect x="148" y="110" width="19" height="16" fill="none" stroke="#b45309" stroke-width="1.5"/>
  <rect x="110" y="148" width="16" height="19" fill="none" stroke="#b45309" stroke-width="1.5" opacity="0.5"/>
  <text x="167" y="107" font-size="9" fill="#b45309">sibling trio (k≈0.5)</text>

  <rect x="388" y="302" width="14" height="12" fill="none" stroke="#b45309" stroke-width="1.5"/>
  <rect x="302" y="388" width="12" height="14" fill="none" stroke="#b45309" stroke-width="1.5" opacity="0.5"/>
  <text x="403" y="299" font-size="9" fill="#b45309">parent-child (k≈0.5)</text>

  <!-- Axis labels -->
  <text x="310" y="455" text-anchor="middle" font-size="11" fill="#374151">Individual index (1 … 100)</text>
  <text x="28" y="240" text-anchor="middle" font-size="11" fill="#374151" transform="rotate(-90 28 240)">Individual index (1 … 100)</text>

  <!-- Axis tick labels -->
  <text x="60" y="450" font-size="9" fill="#6b7280" text-anchor="middle">1</text>
  <text x="185" y="450" font-size="9" fill="#6b7280" text-anchor="middle">25</text>
  <text x="310" y="450" font-size="9" fill="#6b7280" text-anchor="middle">50</text>
  <text x="435" y="450" font-size="9" fill="#6b7280" text-anchor="middle">75</text>
  <text x="560" y="450" font-size="9" fill="#6b7280" text-anchor="middle">100</text>

  <text x="56" y="44" font-size="9" fill="#6b7280" text-anchor="end">1</text>
  <text x="56" y="140" font-size="9" fill="#6b7280" text-anchor="end">25</text>
  <text x="56" y="240" font-size="9" fill="#6b7280" text-anchor="end">50</text>
  <text x="56" y="340" font-size="9" fill="#6b7280" text-anchor="end">75</text>
  <text x="56" y="440" font-size="9" fill="#6b7280" text-anchor="end">100</text>

  <!-- ─── Colour scale legend ─── -->
  <text x="620" y="65" font-size="12" font-weight="600" fill="#111827">Kinship coefficient</text>

  <!-- Gradient bar -->
  <defs>
    <linearGradient id="kinGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="10%" stop-color="#dbeafe"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>
  <rect x="620" y="80" width="30" height="200" fill="url(#kinGrad)" stroke="#e5e7eb"/>

  <!-- Scale tick labels -->
  <line x1="650" y1="80" x2="660" y2="80" stroke="#374151"/>
  <text x="665" y="84" font-size="10" fill="#374151">0.5</text>
  <text x="665" y="96" font-size="9" fill="#6b7280">MZ twin / self</text>

  <line x1="650" y1="140" x2="660" y2="140" stroke="#374151"/>
  <text x="665" y="144" font-size="10" fill="#374151">0.25</text>
  <text x="665" y="156" font-size="9" fill="#6b7280">sibling / parent-child</text>

  <line x1="650" y1="200" x2="660" y2="200" stroke="#374151"/>
  <text x="665" y="204" font-size="10" fill="#374151">0.05</text>
  <text x="665" y="216" font-size="9" fill="#6b7280">2nd cousin</text>

  <line x1="650" y1="280" x2="660" y2="280" stroke="#374151"/>
  <text x="665" y="284" font-size="10" fill="#374151">0.0</text>
  <text x="665" y="296" font-size="9" fill="#6b7280">unrelated</text>

  <!-- Note about tools -->
  <rect x="60" y="468" width="580" height="38" rx="4" fill="#f0f9ff" stroke="#bfdbfe"/>
  <text x="350" y="484" text-anchor="middle" font-size="11" fill="#1d4ed8" font-weight="500">BOLT-LMM / SAIGE / REGENIE all consume this matrix as a random-effect covariance component</text>
  <text x="350" y="499" text-anchor="middle" font-size="10" fill="#6b7280">V = σ_g² K + σ_e² I  →  GLS that corrects for relatedness-induced test-statistic inflation</text>

  <!-- Diagonal label -->
  <text x="340" y="200" text-anchor="middle" font-size="10" fill="#fff" font-weight="600" opacity="0.9" transform="rotate(-38 340 200)">diagonal = 0.5 (self)</text>
</svg>
