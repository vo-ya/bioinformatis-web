<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 440" width="1080" height="440" font-family="Inter, sans-serif">
  <defs>
    <style>
      text { font-family: Inter, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
      .math { font-family: 'Source Serif 4', serif; font-style: italic; }
    </style>
    <marker id="arr2" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#374151"/>
    </marker>
  </defs>

  <rect width="1080" height="440" fill="#fafaf9" rx="6"/>

  <!-- Title -->
  <text x="540" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Mixed-Model vs OLS Regression — Same Cohort, Two Methods</text>

  <!-- Divider -->
  <line x1="540" y1="35" x2="540" y2="395" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Arrow between panels -->
  <line x1="470" y1="220" x2="540" y2="220" stroke="#374151" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="540" y1="220" x2="610" y2="220" stroke="#374151" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr2)"/>
  <text x="540" y="213" text-anchor="middle" font-size="9" fill="#374151">noise whitening</text>
  <text x="540" y="226" text-anchor="middle" font-size="9" fill="#374151">via V⁻¹</text>

  <!-- ─── LEFT QQ: OLS (inflated) ─── -->
  <text x="270" y="44" text-anchor="middle" font-size="13" font-weight="600" fill="#c4342c">OLS Regression</text>
  <text x="270" y="58" text-anchor="middle" font-size="11" fill="#6b7280">No kinship adjustment</text>

  <!-- Axes left -->
  <line x1="70" y1="360" x2="500" y2="360" stroke="#374151" stroke-width="1.5"/>
  <line x1="70" y1="360" x2="70" y2="70" stroke="#374151" stroke-width="1.5"/>

  <!-- Y axis ticks left -->
  <g font-size="9" fill="#6b7280">
    <line x1="64" y1="360" x2="70" y2="360" stroke="#374151"/><text x="60" y="363" text-anchor="end">0</text>
    <line x1="64" y1="310" x2="70" y2="310" stroke="#374151"/><text x="60" y="313" text-anchor="end">5</text>
    <line x1="64" y1="260" x2="70" y2="260" stroke="#374151"/><text x="60" y="263" text-anchor="end">10</text>
    <line x1="64" y1="210" x2="70" y2="210" stroke="#374151"/><text x="60" y="213" text-anchor="end">15</text>
    <line x1="64" y1="160" x2="70" y2="160" stroke="#374151"/><text x="60" y="163" text-anchor="end">20</text>
    <line x1="64" y1="110" x2="70" y2="110" stroke="#374151"/><text x="60" y="113" text-anchor="end">25</text>
    <line x1="64" y1="70" x2="70" y2="70" stroke="#374151"/><text x="60" y="73" text-anchor="end">30</text>
  </g>

  <!-- X axis ticks left -->
  <g font-size="9" fill="#6b7280">
    <line x1="70" y1="360" x2="70" y2="366" stroke="#374151"/><text x="70" y="376" text-anchor="middle">0</text>
    <line x1="124" y1="360" x2="124" y2="366" stroke="#374151"/><text x="124" y="376" text-anchor="middle">1</text>
    <line x1="178" y1="360" x2="178" y2="366" stroke="#374151"/><text x="178" y="376" text-anchor="middle">2</text>
    <line x1="232" y1="360" x2="232" y2="366" stroke="#374151"/><text x="232" y="376" text-anchor="middle">3</text>
    <line x1="286" y1="360" x2="286" y2="366" stroke="#374151"/><text x="286" y="376" text-anchor="middle">4</text>
    <line x1="340" y1="360" x2="340" y2="366" stroke="#374151"/><text x="340" y="376" text-anchor="middle">5</text>
    <line x1="394" y1="360" x2="394" y2="366" stroke="#374151"/><text x="394" y="376" text-anchor="middle">6</text>
    <line x1="448" y1="360" x2="448" y2="366" stroke="#374151"/><text x="448" y="376" text-anchor="middle">7</text>
    <line x1="500" y1="360" x2="500" y2="366" stroke="#374151"/><text x="500" y="376" text-anchor="middle">8</text>
  </g>

  <text x="285" y="398" text-anchor="middle" font-size="11" fill="#374151" class="math">Expected −log₁₀(p)</text>
  <text x="22" y="215" text-anchor="middle" font-size="11" fill="#374151" class="math" transform="rotate(-90 22 215)">Observed −log₁₀(p)</text>

  <!-- 45° reference -->
  <line x1="70" y1="360" x2="420" y2="60" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.7"/>

  <!-- OLS inflated dots: early departure, λ_GC=1.15 -->
  <!-- Scale: x unit = 54px, y unit = 10px -->
  <g fill="#2563eb" opacity="0.7">
    <circle cx="73" cy="356" r="1.5"/>
    <circle cx="82" cy="344" r="1.5"/>
    <circle cx="92" cy="330" r="1.5"/>
    <circle cx="103" cy="317" r="1.5"/>
    <circle cx="115" cy="302" r="1.5"/>
    <circle cx="127" cy="288" r="1.5"/>
    <circle cx="141" cy="273" r="1.5"/>
    <circle cx="155" cy="258" r="1.5"/>
    <circle cx="170" cy="242" r="1.5"/>
    <circle cx="186" cy="226" r="1.5"/>
    <circle cx="203" cy="210" r="1.5"/>
    <circle cx="220" cy="193" r="1.5"/>
    <circle cx="238" cy="176" r="2"/>
    <circle cx="256" cy="158" r="2"/>
    <circle cx="276" cy="140" r="2"/>
    <circle cx="298" cy="120" r="2.5"/>
    <circle cx="322" cy="100" r="2.5"/>
    <circle cx="350" cy="78" r="2.5"/>
  </g>

  <!-- Shading below inflation -->
  <path d="M 70 360 C 120 320 190 270 260 215 C 320 168 370 125 420 80 L 420 60 L 70 360 Z"
    fill="#fee2e2" opacity="0.25"/>

  <!-- λ_GC badge -->
  <rect x="74" y="72" width="155" height="36" rx="4" fill="#fef2f2" stroke="#fecaca"/>
  <text x="152" y="88" text-anchor="middle" class="mono" fill="#c4342c">λ_GC = 1.15</text>
  <text x="152" y="102" text-anchor="middle" font-size="9" fill="#c4342c">OLS: GLS with V = I (wrong)</text>

  <!-- ─── RIGHT QQ: LMM (calibrated) ─── -->
  <text x="810" y="44" text-anchor="middle" font-size="13" font-weight="600" fill="#059669">LMM (BOLT-LMM / REGENIE)</text>
  <text x="810" y="58" text-anchor="middle" font-size="11" fill="#6b7280">Kinship-structured covariance</text>

  <!-- Axes right -->
  <line x1="580" y1="360" x2="1010" y2="360" stroke="#374151" stroke-width="1.5"/>
  <line x1="580" y1="360" x2="580" y2="70" stroke="#374151" stroke-width="1.5"/>

  <!-- Y axis ticks right -->
  <g font-size="9" fill="#6b7280">
    <line x1="574" y1="360" x2="580" y2="360" stroke="#374151"/><text x="570" y="363" text-anchor="end">0</text>
    <line x1="574" y1="310" x2="580" y2="310" stroke="#374151"/><text x="570" y="313" text-anchor="end">5</text>
    <line x1="574" y1="260" x2="580" y2="260" stroke="#374151"/><text x="570" y="263" text-anchor="end">10</text>
    <line x1="574" y1="210" x2="580" y2="210" stroke="#374151"/><text x="570" y="213" text-anchor="end">15</text>
    <line x1="574" y1="160" x2="580" y2="160" stroke="#374151"/><text x="570" y="163" text-anchor="end">20</text>
    <line x1="574" y1="110" x2="580" y2="110" stroke="#374151"/><text x="570" y="113" text-anchor="end">25</text>
    <line x1="574" y1="70" x2="580" y2="70" stroke="#374151"/><text x="570" y="73" text-anchor="end">30</text>
  </g>

  <!-- X axis ticks right -->
  <g font-size="9" fill="#6b7280">
    <line x1="580" y1="360" x2="580" y2="366" stroke="#374151"/><text x="580" y="376" text-anchor="middle">0</text>
    <line x1="634" y1="360" x2="634" y2="366" stroke="#374151"/><text x="634" y="376" text-anchor="middle">1</text>
    <line x1="688" y1="360" x2="688" y2="366" stroke="#374151"/><text x="688" y="376" text-anchor="middle">2</text>
    <line x1="742" y1="360" x2="742" y2="366" stroke="#374151"/><text x="742" y="376" text-anchor="middle">3</text>
    <line x1="796" y1="360" x2="796" y2="366" stroke="#374151"/><text x="796" y="376" text-anchor="middle">4</text>
    <line x1="850" y1="360" x2="850" y2="366" stroke="#374151"/><text x="850" y="376" text-anchor="middle">5</text>
    <line x1="904" y1="360" x2="904" y2="366" stroke="#374151"/><text x="904" y="376" text-anchor="middle">6</text>
    <line x1="958" y1="360" x2="958" y2="366" stroke="#374151"/><text x="958" y="376" text-anchor="middle">7</text>
    <line x1="1010" y1="360" x2="1010" y2="366" stroke="#374151"/><text x="1010" y="376" text-anchor="middle">8</text>
  </g>

  <text x="795" y="398" text-anchor="middle" font-size="11" fill="#374151" class="math">Expected −log₁₀(p)</text>

  <!-- 45° reference right -->
  <line x1="580" y1="360" x2="930" y2="60" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.7"/>

  <!-- LMM calibrated dots: follow diagonal until top-right, then slight lift for real hits -->
  <g fill="#2563eb" opacity="0.7">
    <circle cx="583" cy="359" r="1.5"/>
    <circle cx="592" cy="350" r="1.5"/>
    <circle cx="601" cy="341" r="1.5"/>
    <circle cx="610" cy="332" r="1.5"/>
    <circle cx="621" cy="322" r="1.5"/>
    <circle cx="633" cy="312" r="1.5"/>
    <circle cx="646" cy="302" r="1.5"/>
    <circle cx="660" cy="292" r="1.5"/>
    <circle cx="675" cy="281" r="1.5"/>
    <circle cx="691" cy="270" r="1.5"/>
    <circle cx="708" cy="259" r="1.5"/>
    <circle cx="726" cy="248" r="1.5"/>
    <circle cx="745" cy="236" r="2"/>
    <circle cx="765" cy="224" r="2"/>
    <circle cx="786" cy="212" r="2"/>
    <!-- Real hits lift off here -->
    <circle cx="815" cy="192" r="2"/>
    <circle cx="846" cy="168" r="2.5"/>
    <circle cx="882" cy="138" r="2.5"/>
    <circle cx="924" cy="100" r="3"/>
    <circle cx="968" cy="68" r="3"/>
  </g>

  <!-- Lift-off annotation for real hits -->
  <path d="M 930 95 Q 970 75 995 65" stroke="#059669" stroke-width="1.5" fill="none"/>
  <text x="996" y="61" font-size="9" fill="#059669">real hits</text>

  <!-- λ_GC badge -->
  <rect x="584" y="72" width="155" height="36" rx="4" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="662" y="88" text-anchor="middle" class="mono" fill="#059669">λ_GC = 1.02</text>
  <text x="662" y="102" text-anchor="middle" font-size="9" fill="#059669">LMM: GLS with V = σ²K + σ²I</text>

  <!-- Bottom caption -->
  <rect x="0" y="405" width="1080" height="35" fill="#f3f4f6"/>
  <rect x="0" y="405" width="1080" height="3" fill="#2563eb"/>
  <text x="540" y="421" text-anchor="middle" font-size="11" fill="#374151">Same cohort, two methods. OLS: GLS with V = I. LMM: GLS with V = σ_g² K + σ_e² I. Relatedness absorbed into covariance → calibration restored.</text>
</svg>
