<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520" font-family="Inter, sans-serif">
  <defs>
    <style>
      text { font-family: Inter, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }
      .math { font-family: 'Source Serif 4', serif; font-style: italic; }
    </style>
  </defs>

  <rect width="1200" height="520" fill="#fafaf9" rx="6"/>

  <!-- Title -->
  <text x="600" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Fine-Mapping with SuSiE — 300 kb GWAS Locus</text>

  <!-- Shared x-axis: 300kb locus, x=60..980, scale = (980-60)/300 = 3.067px/kb -->
  <!-- X labels at bottom -->
  <text x="520" y="510" text-anchor="middle" font-size="11" fill="#374151">Genomic position (kb)</text>
  <g font-size="9" fill="#6b7280">
    <line x1="60" y1="490" x2="60" y2="496" stroke="#374151"/>
    <text x="60" y="506" text-anchor="middle">0</text>
    <line x1="214" y1="490" x2="214" y2="496" stroke="#374151"/>
    <text x="214" y="506" text-anchor="middle">50</text>
    <line x1="367" y1="490" x2="367" y2="496" stroke="#374151"/>
    <text x="367" y="506" text-anchor="middle">100</text>
    <line x1="520" y1="490" x2="520" y2="496" stroke="#374151"/>
    <text x="520" y="506" text-anchor="middle">150</text>
    <line x1="673" y1="490" x2="673" y2="496" stroke="#374151"/>
    <text x="673" y="506" text-anchor="middle">200</text>
    <line x1="827" y1="490" x2="827" y2="496" stroke="#374151"/>
    <text x="827" y="506" text-anchor="middle">250</text>
    <line x1="980" y1="490" x2="980" y2="496" stroke="#374151"/>
    <text x="980" y="506" text-anchor="middle">300</text>
  </g>

  <!-- Track separators -->
  <line x1="60" y1="175" x2="980" y2="175" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="60" y1="340" x2="980" y2="340" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="60" y1="490" x2="980" y2="490" stroke="#374151" stroke-width="1"/>

  <!-- ─── TRACK 1: GWAS −log10(p) ─── -->
  <text x="50" y="46" text-anchor="end" font-size="11" font-weight="600" fill="#374151">GWAS</text>
  <text x="50" y="60" text-anchor="end" font-size="9" fill="#6b7280" class="math">−log₁₀(p)</text>

  <!-- Y axis track 1: 0..30, height=120px, y=55..175 -->
  <line x1="60" y1="55" x2="60" y2="175" stroke="#374151" stroke-width="1"/>
  <g font-size="8" fill="#6b7280">
    <text x="54" y="173" text-anchor="end">0</text>
    <text x="54" y="133" text-anchor="end">10</text>
    <text x="54" y="93" text-anchor="end">20</text>
    <text x="54" y="59" text-anchor="end">30</text>
    <line x1="60" y1="175" x2="58" y2="175" stroke="#374151"/>
    <line x1="60" y1="135" x2="58" y2="135" stroke="#374151"/>
    <line x1="60" y1="95" x2="58" y2="95" stroke="#374151"/>
    <line x1="60" y1="55" x2="58" y2="55" stroke="#374151"/>
  </g>

  <!-- Null GWAS dots: scattered at logP 0-3 -->
  <g fill="#9ca3af" opacity="0.6">
    <circle cx="80" cy="168" r="1.5"/><circle cx="100" cy="162" r="1.5"/><circle cx="120" cy="170" r="1.5"/>
    <circle cx="140" cy="165" r="1.5"/><circle cx="160" cy="169" r="1.5"/><circle cx="180" cy="163" r="1.5"/>
    <circle cx="200" cy="167" r="1.5"/><circle cx="220" cy="161" r="1.5"/><circle cx="240" cy="170" r="1.5"/>
    <circle cx="260" cy="164" r="1.5"/><circle cx="280" cy="168" r="1.5"/><circle cx="300" cy="162" r="1.5"/>
    <circle cx="320" cy="166" r="1.5"/><circle cx="340" cy="169" r="1.5"/><circle cx="360" cy="160" r="1.5"/>
    <circle cx="380" cy="165" r="1.5"/><circle cx="400" cy="162" r="1.5"/><circle cx="700" cy="168" r="1.5"/>
    <circle cx="720" cy="163" r="1.5"/><circle cx="740" cy="170" r="1.5"/><circle cx="760" cy="165" r="1.5"/>
    <circle cx="780" cy="169" r="1.5"/><circle cx="800" cy="161" r="1.5"/><circle cx="820" cy="167" r="1.5"/>
    <circle cx="840" cy="163" r="1.5"/><circle cx="860" cy="170" r="1.5"/><circle cx="880" cy="165" r="1.5"/>
    <circle cx="900" cy="168" r="1.5"/><circle cx="920" cy="162" r="1.5"/><circle cx="940" cy="166" r="1.5"/>
    <circle cx="960" cy="169" r="1.5"/>
  </g>

  <!-- Peak region: centred at ~kb 150 → x=520 -->
  <!-- logP scale: 1 unit = (175-55)/30 = 4px -->
  <!-- Lead SNP: logP=25 → y=175-25*4=75 -->
  <g fill="#9ca3af" opacity="0.5">
    <circle cx="420" cy="162" r="2"/><circle cx="440" cy="155" r="2"/><circle cx="460" cy="147" r="2"/>
    <circle cx="480" cy="138" r="2.5"/><circle cx="490" cy="128" r="2.5"/>
  </g>
  <!-- LD-coloured peak dots (r² to lead): grey=low, yellow=medium, orange=high, red=very high -->
  <g>
    <circle cx="500" cy="118" r="2.5" fill="#ef4444"/>
    <circle cx="508" cy="108" r="2.5" fill="#ef4444"/>
    <circle cx="515" cy="96" r="3" fill="#dc2626"/>
    <circle cx="520" cy="75" r="4" fill="#1d4ed8"/><!-- lead -->
    <circle cx="525" cy="85" r="3" fill="#dc2626"/>
    <circle cx="532" cy="100" r="2.5" fill="#ef4444"/>
    <circle cx="540" cy="112" r="2.5" fill="#ef4444"/>
    <circle cx="548" cy="122" r="2.5" fill="#f97316"/>
    <circle cx="558" cy="132" r="2" fill="#f97316"/>
    <circle cx="568" cy="142" r="2" fill="#fbbf24"/>
    <circle cx="580" cy="150" r="2" fill="#fbbf24"/>
    <circle cx="594" cy="155" r="2" fill="#9ca3af"/>
    <circle cx="610" cy="160" r="2" fill="#9ca3af"/>
    <circle cx="628" cy="163" r="1.5" fill="#9ca3af"/>
    <circle cx="648" cy="165" r="1.5" fill="#9ca3af"/>
    <circle cx="668" cy="168" r="1.5" fill="#9ca3af"/>
  </g>

  <!-- Genome-wide threshold line at logP=7.3 → y=175-7.3*4=146 -->
  <line x1="60" y1="146" x2="980" y2="146" stroke="#b45309" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- ─── TRACK 2: LD (r²) ─── -->
  <text x="50" y="200" text-anchor="end" font-size="11" font-weight="600" fill="#374151">LD</text>
  <text x="50" y="214" text-anchor="end" font-size="9" fill="#6b7280" class="math">r² to lead</text>

  <!-- Y axis track 2: 0..1, height=145px, y=180..325, top = 180 -->
  <line x1="60" y1="185" x2="60" y2="335" stroke="#374151" stroke-width="1"/>
  <g font-size="8" fill="#6b7280">
    <text x="54" y="333" text-anchor="end">0</text>
    <text x="54" y="261" text-anchor="end">0.5</text>
    <text x="54" y="189" text-anchor="end">1.0</text>
    <line x1="60" y1="335" x2="58" y2="335" stroke="#374151"/>
    <line x1="60" y1="260" x2="58" y2="260" stroke="#374151"/>
    <line x1="60" y1="185" x2="58" y2="185" stroke="#374151"/>
  </g>

  <!-- LD dots: colour by r² (1=deep red, 0.8=orange, 0.5=yellow, 0.2=grey) -->
  <!-- Null region -->
  <g fill="#d1d5db" opacity="0.5">
    <circle cx="80" cy="330" r="2"/><circle cx="100" cy="328" r="2"/><circle cx="120" cy="332" r="2"/>
    <circle cx="140" cy="329" r="2"/><circle cx="160" cy="331" r="2"/><circle cx="180" cy="328" r="2"/>
    <circle cx="200" cy="330" r="2"/><circle cx="220" cy="333" r="2"/><circle cx="240" cy="329" r="2"/>
    <circle cx="260" cy="331" r="2"/><circle cx="280" cy="330" r="2"/><circle cx="300" cy="328" r="2"/>
    <circle cx="320" cy="332" r="2"/><circle cx="340" cy="331" r="2"/><circle cx="360" cy="329" r="2"/>
    <circle cx="380" cy="330" r="2"/><circle cx="400" cy="333" r="2"/>
    <circle cx="700" cy="330" r="2"/><circle cx="720" cy="328" r="2"/><circle cx="740" cy="331" r="2"/>
    <circle cx="760" cy="329" r="2"/><circle cx="780" cy="330" r="2"/><circle cx="800" cy="332" r="2"/>
    <circle cx="820" cy="328" r="2"/><circle cx="840" cy="331" r="2"/><circle cx="860" cy="329" r="2"/>
    <circle cx="880" cy="330" r="2"/><circle cx="900" cy="332" r="2"/><circle cx="920" cy="329" r="2"/>
    <circle cx="940" cy="331" r="2"/><circle cx="960" cy="330" r="2"/>
  </g>

  <!-- Peak LD region: colours by r² -->
  <g>
    <circle cx="420" cy="310" r="2" fill="#fbbf24"/>
    <circle cx="440" cy="292" r="2.5" fill="#f97316"/>
    <circle cx="460" cy="268" r="2.5" fill="#ef4444"/>
    <circle cx="480" cy="235" r="2.5" fill="#dc2626"/>
    <circle cx="490" cy="212" r="3" fill="#b91c1c"/>
    <circle cx="500" cy="197" r="3" fill="#b91c1c"/>
    <circle cx="508" cy="190" r="3" fill="#991b1b"/>
    <circle cx="515" cy="187" r="3" fill="#7f1d1d"/>
    <circle cx="520" cy="185" r="4" fill="#1d4ed8"/><!-- lead = r²=1 but blue for lead -->
    <circle cx="525" cy="186" r="3" fill="#7f1d1d"/>
    <circle cx="532" cy="189" r="3" fill="#991b1b"/>
    <circle cx="540" cy="194" r="3" fill="#b91c1c"/>
    <circle cx="548" cy="202" r="2.5" fill="#dc2626"/>
    <circle cx="558" cy="218" r="2.5" fill="#ef4444"/>
    <circle cx="568" cy="240" r="2.5" fill="#f97316"/>
    <circle cx="580" cy="268" r="2" fill="#fbbf24"/>
    <circle cx="594" cy="295" r="2" fill="#d1d5db"/>
    <circle cx="610" cy="315" r="2" fill="#d1d5db"/>
    <circle cx="628" cy="325" r="1.5" fill="#d1d5db"/>
    <circle cx="648" cy="329" r="1.5" fill="#d1d5db"/>
    <circle cx="668" cy="331" r="1.5" fill="#d1d5db"/>
  </g>

  <!-- ─── TRACK 3: SuSiE PIP ─── -->
  <text x="50" y="358" text-anchor="end" font-size="11" font-weight="600" fill="#374151">PIP</text>
  <text x="50" y="372" text-anchor="end" font-size="9" fill="#6b7280">SuSiE</text>

  <!-- Y axis track 3: 0..1, height=130px, y=350..480 -->
  <line x1="60" y1="350" x2="60" y2="490" stroke="#374151" stroke-width="1"/>
  <g font-size="8" fill="#6b7280">
    <text x="54" y="488" text-anchor="end">0</text>
    <text x="54" y="423" text-anchor="end">0.5</text>
    <text x="54" y="358" text-anchor="end">1.0</text>
    <line x1="60" y1="490" x2="58" y2="490" stroke="#374151"/>
    <line x1="60" y1="420" x2="58" y2="420" stroke="#374151"/>
    <line x1="60" y1="350" x2="58" y2="350" stroke="#374151"/>
  </g>

  <!-- Scale: PIP=1 → y=350, PIP=0 → y=490. 1 unit = 140px -->
  <!-- Near-zero PIP bars for null SNPs -->
  <g fill="#93c5fd" opacity="0.5">
    <rect x="78" y="488" width="4" height="2" rx="1"/>
    <rect x="98" y="487" width="4" height="3" rx="1"/>
    <rect x="118" y="488" width="4" height="2" rx="1"/>
    <rect x="138" y="487" width="4" height="3" rx="1"/>
    <rect x="158" y="488" width="4" height="2" rx="1"/>
    <rect x="178" y="487" width="4" height="3" rx="1"/>
    <rect x="198" y="488" width="4" height="2" rx="1"/>
    <rect x="218" y="488" width="4" height="3" rx="1"/>
    <rect x="238" y="488" width="4" height="2" rx="1"/>
    <rect x="258" y="488" width="4" height="3" rx="1"/>
    <rect x="278" y="488" width="4" height="2" rx="1"/>
    <rect x="298" y="487" width="4" height="3" rx="1"/>
    <rect x="318" y="488" width="4" height="2" rx="1"/>
    <rect x="338" y="487" width="4" height="3" rx="1"/>
    <rect x="358" y="488" width="4" height="2" rx="1"/>
    <rect x="378" y="488" width="4" height="3" rx="1"/>
    <rect x="398" y="488" width="4" height="2" rx="1"/>
    <rect x="698" y="488" width="4" height="2" rx="1"/>
    <rect x="718" y="488" width="4" height="3" rx="1"/>
    <rect x="738" y="488" width="4" height="2" rx="1"/>
    <rect x="758" y="488" width="4" height="3" rx="1"/>
    <rect x="778" y="488" width="4" height="2" rx="1"/>
    <rect x="798" y="487" width="4" height="3" rx="1"/>
    <rect x="818" y="488" width="4" height="2" rx="1"/>
    <rect x="838" y="487" width="4" height="3" rx="1"/>
    <rect x="858" y="488" width="4" height="2" rx="1"/>
    <rect x="878" y="488" width="4" height="3" rx="1"/>
    <rect x="898" y="488" width="4" height="2" rx="1"/>
    <rect x="918" y="488" width="4" height="3" rx="1"/>
    <rect x="938" y="488" width="4" height="2" rx="1"/>
    <rect x="958" y="488" width="4" height="3" rx="1"/>
  </g>

  <!-- Credible set SNPs (amber) — 5 SNPs with PIP 0.10-0.48 -->
  <!-- PIP=0.48 → height=0.48*140=67px → y=490-67=423; bar from 423..490 -->
  <rect x="516" y="423" width="8" height="67" rx="2" fill="#b45309"/><!-- lead, PIP=0.48 -->
  <rect x="508" y="456" width="6" height="34" rx="2" fill="#b45309"/><!-- PIP=0.24 -->
  <rect x="524" y="462" width="6" height="28" rx="2" fill="#b45309"/><!-- PIP=0.20 -->
  <rect x="500" y="476" width="6" height="14" rx="2" fill="#b45309"/><!-- PIP=0.10 -->
  <rect x="532" y="476" width="6" height="14" rx="2" fill="#b45309"/><!-- PIP=0.10 total PIP=1.12 capped at 0.97 -->

  <!-- Some medium PIP non-credible-set SNPs -->
  <rect x="492" y="483" width="4" height="7" rx="1" fill="#93c5fd"/>
  <rect x="540" y="483" width="4" height="7" rx="1" fill="#93c5fd"/>
  <rect x="548" y="485" width="4" height="5" rx="1" fill="#93c5fd"/>
  <rect x="556" y="486" width="4" height="4" rx="1" fill="#93c5fd"/>
  <rect x="418" y="485" width="4" height="5" rx="1" fill="#93c5fd"/>
  <rect x="438" y="484" width="4" height="6" rx="1" fill="#93c5fd"/>
  <rect x="458" y="484" width="4" height="6" rx="1" fill="#93c5fd"/>
  <rect x="478" y="483" width="4" height="7" rx="1" fill="#93c5fd"/>

  <!-- Credible set annotation box -->
  <rect x="990" y="40" width="200" height="100" rx="6" fill="#fff" stroke="#e5e7eb"/>
  <text x="1090" y="60" text-anchor="middle" font-size="11" font-weight="600" fill="#111827">Credible Set</text>
  <text x="1000" y="78" font-size="10" fill="#374151">95% credible set: <tspan fill="#b45309" font-weight="600">5 SNPs</tspan></text>
  <text x="1000" y="93" font-size="10" fill="#374151">Total PIP = <tspan fill="#b45309" font-weight="600">0.97</tspan></text>
  <text x="1000" y="108" font-size="10" fill="#374151">Lead SNP PIP = <tspan fill="#b45309" font-weight="600">0.48</tspan></text>
  <text x="1000" y="123" font-size="9" fill="#6b7280">(narrows 200 → 5 candidates)</text>
  <text x="1000" y="133" font-size="9" fill="#6b7280">causal variant in set w/ 95% prob</text>

  <!-- Legend: LD colours -->
  <text x="990" y="165" font-size="10" font-weight="600" fill="#374151">LD (r² to lead)</text>
  <circle cx="1000" cy="180" r="5" fill="#7f1d1d"/><text x="1012" y="184" font-size="9" fill="#374151">r² &gt; 0.8</text>
  <circle cx="1000" cy="196" r="5" fill="#f97316"/><text x="1012" y="200" font-size="9" fill="#374151">r² 0.5–0.8</text>
  <circle cx="1000" cy="212" r="5" fill="#fbbf24"/><text x="1012" y="216" font-size="9" fill="#374151">r² 0.2–0.5</text>
  <circle cx="1000" cy="228" r="5" fill="#d1d5db"/><text x="1012" y="232" font-size="9" fill="#374151">r² &lt; 0.2</text>
  <circle cx="1000" cy="244" r="5" fill="#1d4ed8"/><text x="1012" y="248" font-size="9" fill="#374151">Lead SNP</text>

  <!-- Legend: PIP -->
  <text x="990" y="270" font-size="10" font-weight="600" fill="#374151">PIP</text>
  <rect x="996" y="277" width="12" height="10" rx="2" fill="#b45309"/>
  <text x="1012" y="286" font-size="9" fill="#374151">95% credible set</text>
  <rect x="996" y="293" width="12" height="10" rx="2" fill="#93c5fd"/>
  <text x="1012" y="302" font-size="9" fill="#374151">Outside credible set</text>
</svg>
