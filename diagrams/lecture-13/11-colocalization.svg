<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" width="1200" height="440" font-family="Inter, sans-serif">
  <defs>
    <style>
      text { font-family: Inter, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }
      .math { font-family: 'Source Serif 4', serif; font-style: italic; }
    </style>
    <marker id="arr3" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#374151"/>
    </marker>
  </defs>

  <rect width="1200" height="440" fill="#fafaf9" rx="6"/>

  <!-- Title -->
  <text x="500" y="24" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Colocalization of GWAS and eQTL Signal — LDL Cholesterol × SORT1 eQTL</text>

  <!-- Shared x-axis: 200kb locus, x=60..840 -->
  <!-- Divider between tracks -->
  <line x1="60" y1="215" x2="840" y2="215" stroke="#e5e7eb" stroke-width="1.5"/>
  <line x1="60" y1="420" x2="840" y2="420" stroke="#374151" stroke-width="1"/>

  <!-- X axis labels -->
  <text x="450" y="437" text-anchor="middle" font-size="11" fill="#374151">Genomic position (kb)</text>
  <g font-size="9" fill="#6b7280">
    <line x1="60" y1="420" x2="60" y2="426" stroke="#374151"/>
    <text x="60" y="435" text-anchor="middle">0</text>
    <line x1="255" y1="420" x2="255" y2="426" stroke="#374151"/>
    <text x="255" y="435" text-anchor="middle">50</text>
    <line x1="450" y1="420" x2="450" y2="426" stroke="#374151"/>
    <text x="450" y="435" text-anchor="middle">100</text>
    <line x1="645" y1="420" x2="645" y2="426" stroke="#374151"/>
    <text x="645" y="435" text-anchor="middle">150</text>
    <line x1="840" y1="420" x2="840" y2="426" stroke="#374151"/>
    <text x="840" y="435" text-anchor="middle">200</text>
  </g>

  <!-- Shared peak position: x=450 (kb=100) -->
  <line x1="450" y1="30" x2="450" y2="420" stroke="#374151" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>

  <!-- ─── TRACK 1: GWAS LDL ─── -->
  <text x="50" y="48" text-anchor="end" font-size="11" font-weight="600" fill="#2563eb">GWAS</text>
  <text x="50" y="62" text-anchor="end" font-size="9" fill="#6b7280">LDL chol.</text>
  <text x="50" y="76" text-anchor="end" font-size="9" fill="#6b7280" class="math">−log₁₀(p)</text>

  <!-- Y axis track 1 -->
  <line x1="60" y1="35" x2="60" y2="215" stroke="#374151" stroke-width="1"/>
  <g font-size="8" fill="#6b7280">
    <text x="54" y="213" text-anchor="end">0</text>
    <text x="54" y="153" text-anchor="end">10</text>
    <text x="54" y="93" text-anchor="end">20</text>
    <text x="54" y="40" text-anchor="end">28</text>
    <line x1="60" y1="215" x2="58" y2="215" stroke="#374151"/>
    <line x1="60" y1="155" x2="58" y2="155" stroke="#374151"/>
    <line x1="60" y1="95" x2="58" y2="95" stroke="#374151"/>
    <line x1="60" y1="35" x2="58" y2="35" stroke="#374151"/>
  </g>

  <!-- Scale: 1 unit = (215-35)/28 = 6.43px -->
  <!-- Genome-wide threshold: 7.3 → y=215-7.3*6.43=168 -->
  <line x1="60" y1="168" x2="840" y2="168" stroke="#b45309" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- GWAS null dots -->
  <g fill="#2563eb" opacity="0.4">
    <circle cx="80" cy="208" r="1.5"/><circle cx="100" cy="204" r="1.5"/><circle cx="120" cy="206" r="1.5"/>
    <circle cx="140" cy="210" r="1.5"/><circle cx="160" cy="205" r="1.5"/><circle cx="180" cy="208" r="1.5"/>
    <circle cx="200" cy="204" r="1.5"/><circle cx="220" cy="207" r="1.5"/><circle cx="240" cy="209" r="1.5"/>
    <circle cx="260" cy="205" r="1.5"/><circle cx="280" cy="208" r="1.5"/><circle cx="300" cy="206" r="1.5"/>
    <circle cx="320" cy="204" r="1.5"/><circle cx="340" cy="207" r="1.5"/><circle cx="360" cy="210" r="1.5"/>
    <circle cx="380" cy="205" r="1.5"/><circle cx="400" cy="203" r="1.5"/>
    <circle cx="500" cy="175" r="2"/><circle cx="520" cy="165" r="2"/><circle cx="540" cy="178" r="2"/>
    <circle cx="560" cy="188" r="1.5"/><circle cx="580" cy="195" r="1.5"/><circle cx="600" cy="200" r="1.5"/>
    <circle cx="620" cy="204" r="1.5"/><circle cx="640" cy="206" r="1.5"/><circle cx="660" cy="208" r="1.5"/>
    <circle cx="680" cy="205" r="1.5"/><circle cx="700" cy="207" r="1.5"/><circle cx="720" cy="209" r="1.5"/>
    <circle cx="740" cy="206" r="1.5"/><circle cx="760" cy="208" r="1.5"/><circle cx="780" cy="205" r="1.5"/>
    <circle cx="800" cy="207" r="1.5"/><circle cx="820" cy="204" r="1.5"/>
  </g>

  <!-- GWAS peak dots approaching kb=100 (x=450) -->
  <g fill="#2563eb">
    <circle cx="415" cy="195" r="2"/><circle cx="425" cy="182" r="2.5"/>
    <circle cx="435" cy="166" r="2.5"/><circle cx="443" cy="148" r="3"/>
    <circle cx="450" cy="100" r="4" opacity="0.9"/><!-- lead GWAS: logP=18 → y=215-18*6.43=99.3 -->
    <circle cx="458" cy="148" r="3"/><circle cx="466" cy="160" r="2.5"/>
    <circle cx="476" cy="173" r="2.5"/><circle cx="488" cy="185" r="2"/>
  </g>

  <!-- Lead SNP annotation -->
  <text x="450" y="92" text-anchor="middle" font-size="9" fill="#1d4ed8" font-style="italic">rs12740374</text>
  <text x="450" y="83" text-anchor="middle" font-size="8" fill="#6b7280" class="mono">−log₁₀(p)=18</text>

  <!-- ─── TRACK 2: eQTL SORT1 ─── -->
  <text x="50" y="248" text-anchor="end" font-size="11" font-weight="600" fill="#b45309">eQTL</text>
  <text x="50" y="262" text-anchor="end" font-size="9" fill="#6b7280" font-style="italic">SORT1</text>
  <text x="50" y="276" text-anchor="end" font-size="9" fill="#6b7280">liver tissue</text>
  <text x="50" y="290" text-anchor="end" font-size="9" fill="#6b7280" class="math">−log₁₀(p)</text>

  <!-- Y axis track 2 -->
  <line x1="60" y1="222" x2="60" y2="420" stroke="#374151" stroke-width="1"/>
  <g font-size="8" fill="#6b7280">
    <text x="54" y="418" text-anchor="end">0</text>
    <text x="54" y="358" text-anchor="end">10</text>
    <text x="54" y="298" text-anchor="end">20</text>
    <text x="54" y="228" text-anchor="end">28</text>
    <line x1="60" y1="420" x2="58" y2="420" stroke="#374151"/>
    <line x1="60" y1="360" x2="58" y2="360" stroke="#374151"/>
    <line x1="60" y1="300" x2="58" y2="300" stroke="#374151"/>
    <line x1="60" y1="222" x2="58" y2="222" stroke="#374151"/>
  </g>

  <!-- Genome-wide threshold: 7.3 → y=420-7.3*6.43=373 -->
  <line x1="60" y1="373" x2="840" y2="373" stroke="#b45309" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- eQTL null dots -->
  <g fill="#b45309" opacity="0.4">
    <circle cx="80" cy="414" r="1.5"/><circle cx="100" cy="410" r="1.5"/><circle cx="120" cy="413" r="1.5"/>
    <circle cx="140" cy="415" r="1.5"/><circle cx="160" cy="411" r="1.5"/><circle cx="180" cy="413" r="1.5"/>
    <circle cx="200" cy="410" r="1.5"/><circle cx="220" cy="414" r="1.5"/><circle cx="240" cy="412" r="1.5"/>
    <circle cx="260" cy="411" r="1.5"/><circle cx="280" cy="413" r="1.5"/><circle cx="300" cy="415" r="1.5"/>
    <circle cx="320" cy="411" r="1.5"/><circle cx="340" cy="413" r="1.5"/><circle cx="360" cy="414" r="1.5"/>
    <circle cx="380" cy="410" r="1.5"/><circle cx="400" cy="412" r="1.5"/>
    <circle cx="500" cy="383" r="2"/><circle cx="520" cy="372" r="2"/><circle cx="540" cy="385" r="2"/>
    <circle cx="560" cy="396" r="1.5"/><circle cx="580" cy="402" r="1.5"/><circle cx="600" cy="407" r="1.5"/>
    <circle cx="620" cy="411" r="1.5"/><circle cx="640" cy="413" r="1.5"/><circle cx="660" cy="414" r="1.5"/>
    <circle cx="680" cy="411" r="1.5"/><circle cx="700" cy="413" r="1.5"/><circle cx="720" cy="415" r="1.5"/>
    <circle cx="740" cy="412" r="1.5"/><circle cx="760" cy="414" r="1.5"/><circle cx="780" cy="411" r="1.5"/>
    <circle cx="800" cy="413" r="1.5"/><circle cx="820" cy="410" r="1.5"/>
  </g>

  <!-- eQTL peak: same position x=450, logP=15 → y=420-15*6.43=324 -->
  <g fill="#b45309">
    <circle cx="415" cy="400" r="2"/><circle cx="425" cy="389" r="2.5"/>
    <circle cx="435" cy="374" r="2.5"/><circle cx="443" cy="356" r="3"/>
    <circle cx="450" cy="324" r="4" opacity="0.9"/><!-- lead eQTL -->
    <circle cx="458" cy="355" r="3"/><circle cx="466" cy="368" r="2.5"/>
    <circle cx="476" cy="381" r="2.5"/><circle cx="488" cy="393" r="2"/>
  </g>

  <!-- Lead SNP annotation -->
  <text x="450" y="316" text-anchor="middle" font-size="9" fill="#b45309" font-style="italic">rs12740374</text>
  <text x="450" y="307" text-anchor="middle" font-size="8" fill="#6b7280" class="mono">−log₁₀(p)=15</text>

  <!-- ─── Annotation box ─── -->
  <rect x="862" y="40" width="325" height="250" rx="6" fill="#fff" stroke="#93c5fd" stroke-width="2"/>
  <text x="1025" y="62" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">coloc output</text>
  <text x="1025" y="78" text-anchor="middle" font-size="10" fill="#6b7280">Bayesian colocalization (Giambartolomei 2014)</text>

  <g class="mono" font-size="11">
    <text x="875" y="102" fill="#374151">P(H₀) = 0.00 — no assoc. either trait</text>
    <text x="875" y="120" fill="#374151">P(H₁) = 0.02 — assoc. GWAS only</text>
    <text x="875" y="138" fill="#374151">P(H₂) = 0.00 — assoc. eQTL only</text>
    <text x="875" y="156" fill="#374151">P(H₃) = 0.05 — both, diff. causal</text>
    <rect x="871" y="165" width="310" height="26" rx="3" fill="#dbeafe"/>
    <text x="875" y="182" fill="#1d4ed8" font-weight="600">P(H₄) = 0.93 — same causal variant ✓</text>
  </g>

  <!-- Conclusion -->
  <rect x="871" y="200" width="310" height="78" rx="4" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="1025" y="220" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">Colocalizes!</text>
  <text x="1025" y="238" text-anchor="middle" font-size="10" fill="#374151">GWAS signal for LDL shares</text>
  <text x="1025" y="253" text-anchor="middle" font-size="10" fill="#374151">its causal variant with the</text>
  <text x="1025" y="268" text-anchor="middle" font-size="10" fill="#374151" font-style="italic">SORT1</text>
  <text x="1040" y="268" font-size="10" fill="#374151">eQTL in liver.</text>

  <!-- Notes -->
  <text x="862" y="310" font-size="10" fill="#374151">Interpretation: SORT1 expression</text>
  <text x="862" y="326" font-size="10" fill="#374151">is a likely mediator of LDL regulation.</text>
  <text x="862" y="342" font-size="10" fill="#374151">Tool: coloc R package (CRAN).</text>
  <text x="862" y="358" font-size="10" fill="#6b7280">Standard: P(H₄) &gt; 0.8 for colocalization.</text>
</svg>
