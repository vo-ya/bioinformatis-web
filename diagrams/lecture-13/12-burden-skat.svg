<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" font-family="Inter, sans-serif">
  <defs>
    <style>
      text { font-family: Inter, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
    </style>
  </defs>

  <rect width="1200" height="480" fill="#fafaf9" rx="6"/>

  <!-- Title -->
  <text x="600" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Burden Test vs SKAT — When Each Test Wins</text>
  <text x="600" y="42" text-anchor="middle" font-size="11" fill="#6b7280">Three genes, three rare-variant directional patterns</text>

  <!-- Dividers between gene panels -->
  <line x1="395" y1="55" x2="395" y2="400" stroke="#e5e7eb" stroke-width="1.5"/>
  <line x1="795" y1="55" x2="795" y2="400" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- ─── GENE 1: All same direction (burden wins) ─── -->
  <text x="197" y="68" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">Case 1: Unidirectional</text>
  <text x="197" y="84" text-anchor="middle" font-size="11" fill="#c4342c">All deleterious variants</text>

  <!-- Gene body -->
  <rect x="30" y="110" width="330" height="40" rx="6" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="195" y="135" text-anchor="middle" font-size="11" fill="#374151" font-style="italic">GENE_A</text>

  <!-- 18 variant tick marks, all red (deleterious) -->
  <g stroke="#c4342c" stroke-width="3">
    <line x1="55" y1="108" x2="55" y2="152"/><line x1="70" y1="108" x2="70" y2="152"/>
    <line x1="85" y1="108" x2="85" y2="152"/><line x1="100" y1="108" x2="100" y2="152"/>
    <line x1="115" y1="108" x2="115" y2="152"/><line x1="130" y1="108" x2="130" y2="152"/>
    <line x1="145" y1="108" x2="145" y2="152"/><line x1="160" y1="108" x2="160" y2="152"/>
    <line x1="175" y1="108" x2="175" y2="152"/><line x1="190" y1="108" x2="190" y2="152"/>
    <line x1="205" y1="108" x2="205" y2="152"/><line x1="220" y1="108" x2="220" y2="152"/>
    <line x1="235" y1="108" x2="235" y2="152"/><line x1="250" y1="108" x2="250" y2="152"/>
    <line x1="265" y1="108" x2="265" y2="152"/><line x1="280" y1="108" x2="280" y2="152"/>
    <line x1="295" y1="108" x2="295" y2="152"/><line x1="310" y1="108" x2="310" y2="152"/>
  </g>

  <!-- Effect arrows: all pointing same direction (down = increase in phenotype) -->
  <g fill="#c4342c" opacity="0.5">
    <polygon points="55,98 51,108 59,108"/><polygon points="85,98 81,108 89,108"/>
    <polygon points="115,98 111,108 119,108"/><polygon points="145,98 141,108 149,108"/>
    <polygon points="175,98 171,108 179,108"/><polygon points="205,98 201,108 209,108"/>
    <polygon points="235,98 231,108 239,108"/><polygon points="265,98 261,108 269,108"/>
    <polygon points="295,98 291,108 299,108"/>
  </g>

  <!-- Burden score calculation diagram -->
  <rect x="30" y="165" width="330" height="55" rx="4" fill="#fff" stroke="#e5e7eb"/>
  <text x="195" y="183" text-anchor="middle" font-size="10" fill="#374151">BurdenScore = Σ w_j G_ij</text>
  <text x="195" y="200" text-anchor="middle" font-size="10" fill="#374151">all w_j same sign → <tspan fill="#059669" font-weight="600">signal amplifies</tspan></text>
  <text x="195" y="214" text-anchor="middle" class="mono" fill="#374151">Burden: p = 1.2×10⁻⁸  ✓</text>

  <!-- Result box -->
  <rect x="30" y="232" width="330" height="40" rx="4" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="195" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">Burden test WINS</text>
  <text x="195" y="264" text-anchor="middle" font-size="10" fill="#374151">SKAT also detects but less powerful</text>

  <!-- Legend: red = deleterious -->
  <circle cx="40" cy="294" r="5" fill="#c4342c"/>
  <text x="52" y="298" font-size="10" fill="#374151">deleterious (β &gt; 0)</text>

  <!-- ─── GENE 2: Mixed directions (SKAT wins) ─── -->
  <text x="595" y="68" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">Case 2: Mixed Directions</text>
  <text x="595" y="84" text-anchor="middle" font-size="11" fill="#374151">Deleterious + protective + neutral</text>

  <!-- Gene body -->
  <rect x="415" y="110" width="360" height="40" rx="6" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="595" y="135" text-anchor="middle" font-size="11" fill="#374151" font-style="italic">GENE_B</text>

  <!-- 20 variant tick marks: mixed colours -->
  <!-- Red = deleterious, Green = protective, Grey = neutral -->
  <g stroke-width="3">
    <line x1="435" y1="108" x2="435" y2="152" stroke="#c4342c"/>
    <line x1="450" y1="108" x2="450" y2="152" stroke="#2d7a3e"/>
    <line x1="465" y1="108" x2="465" y2="152" stroke="#9ca3af"/>
    <line x1="480" y1="108" x2="480" y2="152" stroke="#c4342c"/>
    <line x1="495" y1="108" x2="495" y2="152" stroke="#2d7a3e"/>
    <line x1="510" y1="108" x2="510" y2="152" stroke="#9ca3af"/>
    <line x1="525" y1="108" x2="525" y2="152" stroke="#c4342c"/>
    <line x1="540" y1="108" x2="540" y2="152" stroke="#2d7a3e"/>
    <line x1="555" y1="108" x2="555" y2="152" stroke="#9ca3af"/>
    <line x1="570" y1="108" x2="570" y2="152" stroke="#c4342c"/>
    <line x1="585" y1="108" x2="585" y2="152" stroke="#9ca3af"/>
    <line x1="600" y1="108" x2="600" y2="152" stroke="#2d7a3e"/>
    <line x1="615" y1="108" x2="615" y2="152" stroke="#c4342c"/>
    <line x1="630" y1="108" x2="630" y2="152" stroke="#9ca3af"/>
    <line x1="645" y1="108" x2="645" y2="152" stroke="#2d7a3e"/>
    <line x1="660" y1="108" x2="660" y2="152" stroke="#c4342c"/>
    <line x1="675" y1="108" x2="675" y2="152" stroke="#9ca3af"/>
    <line x1="690" y1="108" x2="690" y2="152" stroke="#c4342c"/>
    <line x1="705" y1="108" x2="705" y2="152" stroke="#2d7a3e"/>
    <line x1="720" y1="108" x2="720" y2="152" stroke="#9ca3af"/>
  </g>

  <!-- Effect arrows: mixed up and down -->
  <g opacity="0.5">
    <polygon points="435,98 431,108 439,108" fill="#c4342c"/>
    <polygon points="450,122 446,112 454,112" fill="#2d7a3e"/><!-- down = protective -->
    <polygon points="480,98 476,108 484,108" fill="#c4342c"/>
    <polygon points="495,122 491,112 499,112" fill="#2d7a3e"/>
    <polygon points="525,98 521,108 529,108" fill="#c4342c"/>
    <polygon points="540,122 536,112 544,112" fill="#2d7a3e"/>
    <polygon points="570,98 566,108 574,108" fill="#c4342c"/>
    <polygon points="600,122 596,112 604,112" fill="#2d7a3e"/>
  </g>

  <!-- Burden cancellation diagram -->
  <rect x="415" y="165" width="360" height="55" rx="4" fill="#fff" stroke="#e5e7eb"/>
  <text x="595" y="183" text-anchor="middle" font-size="10" fill="#374151">BurdenScore ≈ Σ(+β) + Σ(−β) ≈ 0</text>
  <text x="595" y="200" text-anchor="middle" font-size="10" fill="#374151">effects cancel → <tspan fill="#c4342c" font-weight="600">burden blind</tspan></text>
  <text x="595" y="214" text-anchor="middle" class="mono" fill="#374151">Burden: p = 0.43  ✗  |  SKAT: p = 3.1×10⁻⁶  ✓</text>

  <!-- Result box -->
  <rect x="415" y="232" width="360" height="40" rx="4" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="595" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">SKAT WINS</text>
  <text x="595" y="264" text-anchor="middle" font-size="10" fill="#374151">Q = Y^T G W G^T Y detects variance regardless of direction</text>

  <!-- Legend mixed -->
  <circle cx="420" cy="294" r="5" fill="#c4342c"/><text x="432" y="298" font-size="10" fill="#374151">deleterious</text>
  <circle cx="505" cy="294" r="5" fill="#2d7a3e"/><text x="517" y="298" font-size="10" fill="#374151">protective</text>
  <circle cx="590" cy="294" r="5" fill="#9ca3af"/><text x="602" y="298" font-size="10" fill="#374151">neutral</text>

  <!-- ─── GENE 3: Mostly neutral, few large effects (SKAT wins via kernel weighting) ─── -->
  <text x="997" y="68" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">Case 3: Sparse Large Effects</text>
  <text x="997" y="84" text-anchor="middle" font-size="11" fill="#374151">Mostly neutral, 2–3 high-impact LoF</text>

  <!-- Gene body -->
  <rect x="815" y="110" width="365" height="40" rx="6" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="997" y="135" text-anchor="middle" font-size="11" fill="#374151" font-style="italic">GENE_C</text>

  <!-- 20 tick marks: mostly grey, 3 large red -->
  <g stroke-width="3">
    <line x1="835" y1="108" x2="835" y2="152" stroke="#9ca3af"/>
    <line x1="850" y1="108" x2="850" y2="152" stroke="#9ca3af"/>
    <line x1="865" y1="108" x2="865" y2="152" stroke="#9ca3af"/>
    <line x1="880" y1="108" x2="880" y2="152" stroke="#9ca3af"/>
    <line x1="895" y1="108" x2="895" y2="152" stroke="#9ca3af"/>
    <line x1="910" y1="108" x2="910" y2="152" stroke="#9ca3af"/>
    <line x1="925" y1="108" x2="925" y2="152" stroke="#c4342c" stroke-width="5"/><!-- large LoF 1 -->
    <line x1="940" y1="108" x2="940" y2="152" stroke="#9ca3af"/>
    <line x1="955" y1="108" x2="955" y2="152" stroke="#9ca3af"/>
    <line x1="970" y1="108" x2="970" y2="152" stroke="#9ca3af"/>
    <line x1="985" y1="108" x2="985" y2="152" stroke="#9ca3af"/>
    <line x1="1000" y1="108" x2="1000" y2="152" stroke="#9ca3af"/>
    <line x1="1015" y1="108" x2="1015" y2="152" stroke="#c4342c" stroke-width="5"/><!-- large LoF 2 -->
    <line x1="1030" y1="108" x2="1030" y2="152" stroke="#9ca3af"/>
    <line x1="1045" y1="108" x2="1045" y2="152" stroke="#9ca3af"/>
    <line x1="1060" y1="108" x2="1060" y2="152" stroke="#9ca3af"/>
    <line x1="1075" y1="108" x2="1075" y2="152" stroke="#9ca3af"/>
    <line x1="1090" y1="108" x2="1090" y2="152" stroke="#c4342c" stroke-width="5"/><!-- large LoF 3 -->
    <line x1="1105" y1="108" x2="1105" y2="152" stroke="#9ca3af"/>
    <line x1="1120" y1="108" x2="1120" y2="152" stroke="#9ca3af"/>
    <line x1="1135" y1="108" x2="1135" y2="152" stroke="#9ca3af"/>
    <line x1="1150" y1="108" x2="1150" y2="152" stroke="#9ca3af"/>
    <line x1="1165" y1="108" x2="1165" y2="152" stroke="#9ca3af"/>
  </g>

  <!-- Large arrows for 3 LoF -->
  <g fill="#c4342c">
    <polygon points="925,88 919,108 931,108"/>
    <polygon points="1015,88 1009,108 1021,108"/>
    <polygon points="1090,88 1084,108 1096,108"/>
  </g>
  <!-- Weight annotation -->
  <text x="925" y="85" text-anchor="middle" font-size="8" fill="#c4342c">w=5×</text>
  <text x="1015" y="85" text-anchor="middle" font-size="8" fill="#c4342c">w=5×</text>
  <text x="1090" y="85" text-anchor="middle" font-size="8" fill="#c4342c">w=5×</text>

  <!-- Burden result diagram -->
  <rect x="815" y="165" width="365" height="55" rx="4" fill="#fff" stroke="#e5e7eb"/>
  <text x="997" y="183" text-anchor="middle" font-size="10" fill="#374151">SKAT kernel W up-weights LoF (via MAF / annotation)</text>
  <text x="997" y="200" text-anchor="middle" font-size="10" fill="#374151">3 large variants dominate Q → <tspan fill="#059669" font-weight="600">signal detected</tspan></text>
  <text x="997" y="214" text-anchor="middle" class="mono" fill="#374151">Burden: p = 0.12  ✗  |  SKAT: p = 2.4×10⁻⁵  ✓</text>

  <!-- Result box -->
  <rect x="815" y="232" width="365" height="40" rx="4" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="997" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">SKAT WINS (kernel weighting)</text>
  <text x="997" y="264" text-anchor="middle" font-size="10" fill="#374151">Few large LoF carry signal despite many neutral variants</text>

  <!-- ─── Summary table at bottom ─── -->
  <rect x="30" y="320" width="1140" height="150" rx="6" fill="#fff" stroke="#e5e7eb"/>
  <text x="600" y="340" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">Summary: Which Test to Use</text>

  <!-- Table header -->
  <rect x="30" y="348" width="1140" height="24" rx="0" fill="#f3f4f6"/>
  <text x="200" y="364" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">Variant Pattern</text>
  <text x="500" y="364" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">Burden</text>
  <text x="700" y="364" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">SKAT</text>
  <text x="900" y="364" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">SKAT-O</text>
  <text x="1100" y="364" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">Recommended</text>

  <!-- Table rows -->
  <line x1="30" y1="372" x2="1170" y2="372" stroke="#e5e7eb"/>
  <text x="200" y="388" text-anchor="middle" font-size="10" fill="#374151">All same direction (LoF)</text>
  <text x="500" y="388" text-anchor="middle" font-size="10" fill="#059669" font-weight="600">★ Best</text>
  <text x="700" y="388" text-anchor="middle" font-size="10" fill="#374151">Good</text>
  <text x="900" y="388" text-anchor="middle" font-size="10" fill="#059669">Best-of-both</text>
  <text x="1100" y="388" text-anchor="middle" font-size="10" fill="#374151">Burden or SKAT-O</text>

  <line x1="30" y1="395" x2="1170" y2="395"/>
  <text x="200" y="411" text-anchor="middle" font-size="10" fill="#374151">Mixed (LoF + GoF)</text>
  <text x="500" y="411" text-anchor="middle" font-size="10" fill="#c4342c">Fails (cancellation)</text>
  <text x="700" y="411" text-anchor="middle" font-size="10" fill="#059669" font-weight="600">★ Best</text>
  <text x="900" y="411" text-anchor="middle" font-size="10" fill="#059669">Best-of-both</text>
  <text x="1100" y="411" text-anchor="middle" font-size="10" fill="#374151">SKAT or SKAT-O</text>

  <line x1="30" y1="418" x2="1170" y2="418"/>
  <text x="200" y="434" text-anchor="middle" font-size="10" fill="#374151">Sparse large (few LoF)</text>
  <text x="500" y="434" text-anchor="middle" font-size="10" fill="#374151">Weak (diluted)</text>
  <text x="700" y="434" text-anchor="middle" font-size="10" fill="#059669" font-weight="600">★ Best (w/ weights)</text>
  <text x="900" y="434" text-anchor="middle" font-size="10" fill="#059669">Best-of-both</text>
  <text x="1100" y="434" text-anchor="middle" font-size="10" fill="#374151">SKAT-O</text>

  <line x1="30" y1="441" x2="1170" y2="441"/>
  <text x="200" y="460" text-anchor="middle" font-size="10" fill="#374151">Unknown pattern</text>
  <text x="500" y="460" text-anchor="middle" font-size="10" fill="#374151">Risky</text>
  <text x="700" y="460" text-anchor="middle" font-size="10" fill="#374151">Safer</text>
  <text x="900" y="460" text-anchor="middle" font-size="10" fill="#059669" font-weight="600">★ Default choice</text>
  <text x="1100" y="460" text-anchor="middle" font-size="10" fill="#1d4ed8" font-weight="600">SKAT-O</text>

  <!-- Column dividers -->
  <line x1="350" y1="348" x2="350" y2="470" stroke="#e5e7eb"/>
  <line x1="600" y1="348" x2="600" y2="470" stroke="#e5e7eb"/>
  <line x1="800" y1="348" x2="800" y2="470" stroke="#e5e7eb"/>
  <line x1="1000" y1="348" x2="1000" y2="470" stroke="#e5e7eb"/>
</svg>
