<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 440" width="1080" height="440" font-family="Inter, sans-serif">
  <defs>
    <style>
      text { font-family: Inter, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>

  <rect width="1080" height="440" fill="#fafaf9" rx="6"/>

  <!-- Title -->
  <text x="540" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">File-format footprints — one 30× human WGS sample</text>

  <!-- Bars -->
  <!-- Scale: 80 GB max → 600 px width starting at x=260 -->
  <!-- 45 GB → 338 px, 80 GB → 600 px, 25 GB → 188 px, 18 GB → 135 px, 1.5 GB → 11 px, 0.5 GB → 4 px -->

  <g font-size="12">
    <!-- FASTQ.gz -->
    <text x="255" y="70" text-anchor="end" class="mono" fill="#374151">FASTQ.gz</text>
    <rect x="260" y="55" width="338" height="22" fill="#9ca3af" rx="2"/>
    <text x="610" y="70" class="mono" font-size="11" fill="#6b7280">45 GB</text>
    <text x="720" y="70" font-size="11" fill="#c4342c">✗ no random access</text>

    <!-- BAM -->
    <text x="255" y="105" text-anchor="end" class="mono" fill="#374151">BAM</text>
    <rect x="260" y="90" width="600" height="22" fill="#bfdbfe" rx="2"/>
    <text x="872" y="105" class="mono" font-size="11" fill="#6b7280">80 GB</text>
    <text x="975" y="105" font-size="11" fill="#059669" text-anchor="end">✓ .bai index</text>

    <!-- CRAM default -->
    <text x="255" y="140" text-anchor="end" class="mono" fill="#374151">CRAM (default)</text>
    <rect x="260" y="125" width="188" height="22" fill="#2563eb" rx="2"/>
    <text x="460" y="140" class="mono" font-size="11" fill="#1d4ed8">25 GB</text>
    <text x="975" y="140" font-size="11" fill="#059669" text-anchor="end">✓ .crai index</text>

    <!-- CRAM + quality binning -->
    <text x="255" y="175" text-anchor="end" class="mono" fill="#374151">CRAM + q-binning</text>
    <rect x="260" y="160" width="135" height="22" fill="#2563eb" rx="2"/>
    <rect x="260" y="160" width="135" height="22" fill="url(#stripe)" opacity="0.3"/>
    <text x="407" y="175" class="mono" font-size="11" fill="#1d4ed8">18 GB</text>
    <text x="975" y="175" font-size="11" fill="#b45309" text-anchor="end">★ lossy quality</text>

    <!-- VCF.gz -->
    <text x="255" y="210" text-anchor="end" class="mono" fill="#374151">VCF.gz</text>
    <rect x="260" y="195" width="12" height="22" fill="#0d7377" rx="2"/>
    <text x="285" y="210" class="mono" font-size="11" fill="#0d7377">1.5 GB</text>
    <text x="975" y="210" font-size="11" fill="#059669" text-anchor="end">✓ tabix</text>

    <!-- BCF -->
    <text x="255" y="245" text-anchor="end" class="mono" fill="#374151">BCF</text>
    <rect x="260" y="230" width="5" height="22" fill="#064e3b" rx="2"/>
    <text x="278" y="245" class="mono" font-size="11" fill="#064e3b">0.5 GB</text>
    <text x="975" y="245" font-size="11" fill="#059669" text-anchor="end">✓ .csi index</text>
  </g>

  <!-- Axis -->
  <line x1="260" y1="270" x2="880" y2="270" stroke="#374151" stroke-width="1"/>
  <g font-size="9" fill="#6b7280" class="mono">
    <line x1="260" y1="270" x2="260" y2="275" stroke="#374151"/><text x="260" y="287" text-anchor="middle">0</text>
    <line x1="410" y1="270" x2="410" y2="275" stroke="#374151"/><text x="410" y="287" text-anchor="middle">20 GB</text>
    <line x1="560" y1="270" x2="560" y2="275" stroke="#374151"/><text x="560" y="287" text-anchor="middle">40 GB</text>
    <line x1="710" y1="270" x2="710" y2="275" stroke="#374151"/><text x="710" y="287" text-anchor="middle">60 GB</text>
    <line x1="860" y1="270" x2="860" y2="275" stroke="#374151"/><text x="860" y="287" text-anchor="middle">80 GB</text>
  </g>

  <!-- Comparison table -->
  <g font-size="11">
    <rect x="60" y="310" width="960" height="110" fill="#fff" stroke="#e5e7eb" rx="4"/>
    <!-- Header row -->
    <text x="140" y="330" font-weight="600" fill="#6b7280" font-size="10" letter-spacing="0.1em">FORMAT</text>
    <text x="340" y="330" font-weight="600" fill="#6b7280" font-size="10" letter-spacing="0.1em">COMPRESSION VS RAW</text>
    <text x="600" y="330" font-weight="600" fill="#6b7280" font-size="10" letter-spacing="0.1em">RANDOM ACCESS</text>
    <text x="820" y="330" font-weight="600" fill="#6b7280" font-size="10" letter-spacing="0.1em">TOOL ECOSYSTEM</text>
    <line x1="70" y1="338" x2="1010" y2="338" stroke="#e5e7eb"/>

    <g class="mono" fill="#374151">
      <text x="140" y="356">FASTQ.gz</text>
      <text x="140" y="374">BAM</text>
      <text x="140" y="392">CRAM</text>
      <text x="140" y="410">VCF.gz / BCF</text>

      <text x="340" y="356">3×</text>
      <text x="340" y="374">2×</text>
      <text x="340" y="392">5–7×</text>
      <text x="340" y="410">4× / 10×</text>

      <text x="600" y="356" fill="#c4342c">✗</text>
      <text x="600" y="374" fill="#059669">✓ .bai</text>
      <text x="600" y="392" fill="#059669">✓ .crai</text>
      <text x="600" y="410" fill="#059669">✓ tabix / .csi</text>

      <text x="820" y="356">universal</text>
      <text x="820" y="374">mature</text>
      <text x="820" y="392">mature</text>
      <text x="820" y="410">universal / growing</text>
    </g>
  </g>

  <!-- Stripe pattern def -->
  <defs>
    <pattern id="stripe" patternUnits="userSpaceOnUse" width="6" height="6">
      <path d="M 0 6 L 6 0" stroke="#b45309" stroke-width="1" opacity="0.7"/>
    </pattern>
  </defs>
</svg>
