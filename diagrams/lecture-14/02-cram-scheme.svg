<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 480" width="1080" height="480" font-family="Inter, sans-serif">
  <defs>
    <style>
      text { font-family: Inter, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }
    </style>
    <marker id="arr2" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#b45309"/>
    </marker>
  </defs>

  <rect width="1080" height="480" fill="#fafaf9" rx="6"/>

  <text x="540" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">CRAM as content-aware compression — same read, 5× smaller</text>

  <!-- BAM record (top) -->
  <rect x="60" y="55" width="960" height="90" fill="#f3f4f6" stroke="#9ca3af" rx="6"/>
  <text x="75" y="76" font-size="12" font-weight="600" fill="#374151">BAM record</text>
  <text x="75" y="90" font-size="10" fill="#6b7280" class="mono">~300 bytes · generic zlib on the full block</text>

  <!-- BAM byte fields -->
  <g class="mono" font-size="10" fill="#374151">
    <rect x="75" y="100" width="90" height="34" fill="#fff" stroke="#d1d5db"/>
    <text x="120" y="115" text-anchor="middle">read_name</text>
    <text x="120" y="127" text-anchor="middle" fill="#6b7280">32 B</text>

    <rect x="170" y="100" width="55" height="34" fill="#fff" stroke="#d1d5db"/>
    <text x="197" y="115" text-anchor="middle">flags</text>
    <text x="197" y="127" text-anchor="middle" fill="#6b7280">2 B</text>

    <rect x="230" y="100" width="80" height="34" fill="#fff" stroke="#d1d5db"/>
    <text x="270" y="115" text-anchor="middle">pos</text>
    <text x="270" y="127" text-anchor="middle" fill="#6b7280">4 B</text>

    <rect x="315" y="100" width="65" height="34" fill="#fff" stroke="#d1d5db"/>
    <text x="347" y="115" text-anchor="middle">CIGAR</text>
    <text x="347" y="127" text-anchor="middle" fill="#6b7280">8 B</text>

    <rect x="385" y="100" width="300" height="34" fill="#fff" stroke="#9ca3af" stroke-width="1.5"/>
    <text x="535" y="115" text-anchor="middle" fill="#111827" font-weight="600">ACGTACGTACGT…  (150 bases)</text>
    <text x="535" y="127" text-anchor="middle" fill="#6b7280">150 B  ← full sequence</text>

    <rect x="690" y="100" width="325" height="34" fill="#fff" stroke="#9ca3af" stroke-width="1.5"/>
    <text x="852" y="115" text-anchor="middle" fill="#111827" font-weight="600">IIIIIIIII…####  (150 quals)</text>
    <text x="852" y="127" text-anchor="middle" fill="#6b7280">150 B  ← quality string</text>
  </g>

  <!-- Reference strip (middle) -->
  <rect x="60" y="172" width="960" height="56" fill="#fff7ed" stroke="#b45309" stroke-dasharray="4,3" rx="6"/>
  <text x="75" y="193" font-size="12" font-weight="600" fill="#b45309">reference.fa</text>
  <text x="75" y="207" font-size="10" fill="#6b7280">pre-loaded at decode time · aligned region highlighted below</text>
  <!-- ref bar -->
  <rect x="75" y="213" width="930" height="9" fill="#e5e7eb"/>
  <rect x="385" y="213" width="300" height="9" fill="#fed7aa"/>
  <text x="535" y="221" text-anchor="middle" font-size="8" class="mono" fill="#b45309">chr7:12345–12495</text>

  <!-- CRAM record (bottom) -->
  <rect x="60" y="254" width="960" height="180" fill="#eff6ff" stroke="#2563eb" rx="6"/>
  <text x="75" y="275" font-size="12" font-weight="600" fill="#1d4ed8">CRAM record</text>
  <text x="75" y="289" font-size="10" fill="#2563eb" class="mono">~60 bytes · columnar codec per field</text>

  <g class="mono" font-size="10" fill="#1e3a8a">
    <rect x="75" y="300" width="200" height="44" fill="#fff" stroke="#93c5fd"/>
    <text x="85" y="317">pos: chr7:12345</text>
    <text x="85" y="332" fill="#6b7280">delta-coded against prev read</text>

    <rect x="285" y="300" width="340" height="44" fill="#fff" stroke="#93c5fd"/>
    <text x="295" y="317">diffs: [80: T→C, 122: -AGG]</text>
    <text x="295" y="332" fill="#6b7280">sparse, only positions that differ from reference</text>

    <rect x="635" y="300" width="200" height="44" fill="#fff" stroke="#93c5fd"/>
    <text x="645" y="317">quality: [compressed]</text>
    <text x="645" y="332" fill="#6b7280">optional 8-level binning ⇒ 4×</text>

    <rect x="845" y="300" width="170" height="44" fill="#fff" stroke="#93c5fd"/>
    <text x="855" y="317">flags, name</text>
    <text x="855" y="332" fill="#6b7280">columnar codec</text>
  </g>

  <!-- Decode arrow -->
  <path d="M 535 228 Q 535 252, 455 295" stroke="#b45309" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#arr2)"/>
  <text x="595" y="268" font-size="9" fill="#b45309" font-style="italic">decode: fetch ref slice → apply diffs → full read</text>

  <!-- Footer warning -->
  <rect x="60" y="356" width="960" height="62" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="75" y="377" font-size="11" font-weight="600" fill="#991b1b">⚠ Reference dependency</text>
  <text x="75" y="395" font-size="10" fill="#7f1d1d">Lose or mis-pair the reference → CRAM is unrecoverable. Record the reference MD5 in the CRAM header and on every</text>
  <text x="75" y="410" font-size="10" fill="#7f1d1d">pipeline handoff. Sanger lost &gt;50 TB of archival CRAM to reference-management failures in 2018.</text>
</svg>
