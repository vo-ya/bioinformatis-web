<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" font-family="Inter, sans-serif">
  <defs>
    <style>
      text { font-family: Inter, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
    <marker id="arr3" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#0d7377"/>
    </marker>
  </defs>

  <rect width="1200" height="480" fill="#fafaf9" rx="6"/>
  <text x="600" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">VCF record — text schema and BCF binary counterpart</text>

  <!-- Header band -->
  <rect x="40" y="50" width="1120" height="70" fill="#f3f4f6" stroke="#d1d5db" rx="4"/>
  <text x="55" y="70" font-size="11" font-weight="600" fill="#6b7280" letter-spacing="0.08em">## HEADER (metadata)</text>
  <g class="mono" font-size="10" fill="#374151">
    <text x="55" y="87">##fileformat=VCFv4.3</text>
    <text x="55" y="101">##INFO=&lt;ID=AF,Number=1,Type=Float,Description="Allele frequency"&gt;</text>
    <text x="55" y="115">##FORMAT=&lt;ID=GT,Number=1,Type=String,Description="Genotype"&gt;</text>
  </g>

  <!-- Column header -->
  <rect x="40" y="135" width="1120" height="22" fill="#1e40af"/>
  <g class="mono" font-size="10" fill="#fff" font-weight="600">
    <text x="60" y="150">#CHROM</text>
    <text x="135" y="150">POS</text>
    <text x="195" y="150">ID</text>
    <text x="255" y="150">REF</text>
    <text x="300" y="150">ALT</text>
    <text x="345" y="150">QUAL</text>
    <text x="395" y="150">FILTER</text>
    <text x="475" y="150">INFO</text>
    <text x="645" y="150">FORMAT</text>
    <text x="745" y="150">SAMPLE1</text>
    <text x="855" y="150">SAMPLE2</text>
    <text x="965" y="150">…</text>
  </g>

  <!-- Data row -->
  <rect x="40" y="162" width="1120" height="38" fill="#fff" stroke="#93c5fd"/>
  <g class="mono" font-size="11" fill="#1e3a8a">
    <rect x="42" y="164" width="85" height="34" fill="#dbeafe"/>
    <text x="55" y="185">chr7</text>

    <rect x="128" y="164" width="55" height="34" fill="#fff"/>
    <text x="135" y="185">12345</text>

    <rect x="184" y="164" width="55" height="34" fill="#dbeafe"/>
    <text x="192" y="185">rs123</text>

    <rect x="240" y="164" width="45" height="34" fill="#fff"/>
    <text x="255" y="185">A</text>

    <rect x="286" y="164" width="45" height="34" fill="#dbeafe"/>
    <text x="300" y="185">G</text>

    <rect x="332" y="164" width="50" height="34" fill="#fff"/>
    <text x="345" y="185">45</text>

    <rect x="383" y="164" width="80" height="34" fill="#d1fae5"/>
    <text x="395" y="185" fill="#065f46">PASS</text>

    <rect x="464" y="164" width="170" height="34" fill="#fef3c7"/>
    <text x="475" y="185">AF=0.13;AN=1000</text>

    <rect x="635" y="164" width="100" height="34" fill="#dbeafe"/>
    <text x="645" y="185">GT:DP:GQ</text>

    <rect x="736" y="164" width="110" height="34" fill="#fff"/>
    <text x="745" y="185">0/1:28:99</text>

    <rect x="847" y="164" width="110" height="34" fill="#dbeafe"/>
    <text x="855" y="185">1/1:30:99</text>

    <rect x="958" y="164" width="200" height="34" fill="#fff"/>
    <text x="970" y="185" fill="#9ca3af">…</text>
  </g>

  <!-- Field labels (below) -->
  <g font-size="9" fill="#6b7280">
    <text x="75" y="215" text-anchor="middle">chromosome</text>
    <text x="155" y="215" text-anchor="middle">position</text>
    <text x="210" y="215" text-anchor="middle">variant ID</text>
    <text x="262" y="215" text-anchor="middle">REF allele</text>
    <text x="308" y="215" text-anchor="middle">ALT allele</text>
    <text x="357" y="215" text-anchor="middle">phred QUAL</text>
    <text x="423" y="215" text-anchor="middle">filter status</text>
    <text x="548" y="215" text-anchor="middle">INFO key-values</text>
    <text x="685" y="215" text-anchor="middle">FORMAT schema</text>
    <text x="800" y="215" text-anchor="middle">per-sample values</text>
  </g>

  <!-- Divider -->
  <text x="600" y="255" text-anchor="middle" font-size="12" fill="#0d7377" font-style="italic">↓ same row, binary (BCF)</text>
  <path d="M 600 260 L 600 288" stroke="#0d7377" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- BCF binary band -->
  <rect x="40" y="295" width="1120" height="90" fill="#f0fdf4" stroke="#059669" rx="4"/>
  <text x="55" y="315" font-size="11" font-weight="600" fill="#065f46" letter-spacing="0.08em">BCF BINARY RECORD · ~ 1/3 the bytes · ~ 5× faster to parse</text>

  <g class="mono" font-size="10" fill="#065f46">
    <rect x="55" y="325" width="100" height="30" fill="#fff" stroke="#a7f3d0"/>
    <text x="60" y="342">chrom_id: uint8</text>
    <rect x="160" y="325" width="85" height="30" fill="#fff" stroke="#a7f3d0"/>
    <text x="165" y="342">pos: int32</text>
    <rect x="250" y="325" width="110" height="30" fill="#fff" stroke="#a7f3d0"/>
    <text x="255" y="342">n_allele: uint8</text>
    <rect x="365" y="325" width="130" height="30" fill="#fff" stroke="#a7f3d0"/>
    <text x="370" y="342">alleles: packed</text>
    <rect x="500" y="325" width="100" height="30" fill="#fff" stroke="#a7f3d0"/>
    <text x="505" y="342">qual: float</text>
    <rect x="605" y="325" width="130" height="30" fill="#fff" stroke="#a7f3d0"/>
    <text x="610" y="342">filter: typed</text>
    <rect x="740" y="325" width="160" height="30" fill="#fff" stroke="#a7f3d0"/>
    <text x="745" y="342">info: typed kv array</text>
    <rect x="905" y="325" width="245" height="30" fill="#fff" stroke="#a7f3d0"/>
    <text x="910" y="342">genotypes: packed per-sample</text>
  </g>
  <text x="55" y="375" font-size="10" fill="#065f46" font-style="italic">No redundant text, no tab-parsing, typed fields throughout. The VCF text is the schema; BCF is the schema serialised.</text>

  <!-- Sidebar -->
  <rect x="40" y="402" width="1120" height="58" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="55" y="422" font-size="12" font-weight="600" fill="#1d4ed8">bgzipped + tabix</text>
  <text x="55" y="440" font-size="10" fill="#374151">Block-gzipped VCF/BCF + .tbi/.csi index lets tools seek by genomic coordinate in O(1). Essential at cohort scale:</text>
  <text x="55" y="454" font-size="10" fill="#374151">a 500 GB multi-sample UK Biobank VCF would be unusable without it.</text>
</svg>
