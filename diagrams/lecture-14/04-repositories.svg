<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520" font-family="Inter, sans-serif">
  <defs>
    <style>
      text { font-family: Inter, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }
    </style>
    <marker id="arr4" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="1200" height="520" fill="#fafaf9" rx="6"/>

  <text x="600" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Bioinformatics public-data landscape</text>

  <!-- Cloud band (top) -->
  <rect x="40" y="48" width="1120" height="70" fill="#ecfeff" stroke="#0d7377" rx="6"/>
  <text x="55" y="67" font-size="11" font-weight="600" fill="#0d7377" letter-spacing="0.06em">CLOUD-HOSTED MIRRORS</text>
  <g class="mono" font-size="10" fill="#0d7377">
    <rect x="55" y="78" width="240" height="28" fill="#fff" stroke="#99f6e4"/>
    <text x="70" y="96">s3://1000genomes</text>
    <rect x="305" y="78" width="280" height="28" fill="#fff" stroke="#99f6e4"/>
    <text x="320" y="96">gs://gcp-public-data--gnomad</text>
    <rect x="595" y="78" width="180" height="28" fill="#fff" stroke="#99f6e4"/>
    <text x="610" y="96">Terra (AnVIL)</text>
    <rect x="785" y="78" width="180" height="28" fill="#fff" stroke="#99f6e4"/>
    <text x="800" y="96">HPRC on AWS</text>
    <rect x="975" y="78" width="170" height="28" fill="#fff" stroke="#99f6e4"/>
    <text x="990" y="96">UK Biobank RAP</text>
  </g>

  <!-- OPEN ACCESS (left half) -->
  <text x="310" y="150" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8" letter-spacing="0.1em">OPEN ACCESS</text>
  <text x="310" y="166" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">free download, journal-mandated deposition</text>

  <g font-size="11">
    <!-- SRA -->
    <rect x="60" y="180" width="240" height="130" fill="#dbeafe" stroke="#2563eb" rx="6"/>
    <text x="75" y="202" font-size="13" font-weight="600" fill="#1e3a8a">SRA</text>
    <text x="75" y="218" font-size="10" fill="#6b7280">Sequence Read Archive · NIH</text>
    <text x="75" y="236" font-size="10" fill="#374151">Raw sequencing reads.</text>
    <text x="75" y="250" font-size="10" fill="#374151">FASTQ / BAM / CRAM.</text>
    <text x="75" y="275" class="mono" font-size="10" fill="#1d4ed8">SRP… · SRR… · SRS…</text>
    <text x="75" y="292" class="mono" font-size="10" fill="#1d4ed8">PRJNA…</text>

    <!-- ENA -->
    <rect x="320" y="180" width="240" height="130" fill="#dbeafe" stroke="#2563eb" rx="6"/>
    <text x="335" y="202" font-size="13" font-weight="600" fill="#1e3a8a">ENA</text>
    <text x="335" y="218" font-size="10" fill="#6b7280">European Nucleotide Archive · EBI</text>
    <text x="335" y="236" font-size="10" fill="#374151">Mirror of SRA;</text>
    <text x="335" y="250" font-size="10" fill="#374151">INSDC collaboration.</text>
    <text x="335" y="275" class="mono" font-size="10" fill="#1d4ed8">ERP… · ERR… · ERS…</text>
    <text x="335" y="292" class="mono" font-size="10" fill="#1d4ed8">PRJEB…</text>

    <!-- GEO -->
    <rect x="60" y="330" width="240" height="130" fill="#dbeafe" stroke="#2563eb" rx="6"/>
    <text x="75" y="352" font-size="13" font-weight="600" fill="#1e3a8a">GEO</text>
    <text x="75" y="368" font-size="10" fill="#6b7280">Gene Expression Omnibus · NIH</text>
    <text x="75" y="386" font-size="10" fill="#374151">Processed data: count</text>
    <text x="75" y="400" font-size="10" fill="#374151">matrices, microarray.</text>
    <text x="75" y="425" class="mono" font-size="10" fill="#1d4ed8">GSE… (series)</text>
    <text x="75" y="442" class="mono" font-size="10" fill="#1d4ed8">GSM… (sample)</text>

    <!-- ArrayExpress -->
    <rect x="320" y="330" width="240" height="130" fill="#dbeafe" stroke="#2563eb" rx="6"/>
    <text x="335" y="352" font-size="13" font-weight="600" fill="#1e3a8a">ArrayExpress</text>
    <text x="335" y="368" font-size="10" fill="#6b7280">EBI</text>
    <text x="335" y="386" font-size="10" fill="#374151">GEO counterpart;</text>
    <text x="335" y="400" font-size="10" fill="#374151">weaker independent curation.</text>
    <text x="335" y="425" class="mono" font-size="10" fill="#1d4ed8">E-MTAB-… · E-GEOD-…</text>
  </g>

  <!-- Mirroring arrows SRA <-> ENA -->
  <path d="M 300 210 L 320 210" stroke="#374151" stroke-width="1.5" marker-end="url(#arr4)"/>
  <path d="M 320 230 L 300 230" stroke="#374151" stroke-width="1.5" marker-end="url(#arr4)"/>
  <text x="310" y="200" text-anchor="middle" font-size="9" fill="#6b7280" font-style="italic">mirror</text>

  <!-- Divider -->
  <line x1="600" y1="140" x2="600" y2="470" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- CONTROLLED (right half) -->
  <text x="890" y="150" text-anchor="middle" font-size="12" font-weight="600" fill="#b45309" letter-spacing="0.1em">CONTROLLED ACCESS 🔒</text>
  <text x="890" y="166" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">data-use agreement required, individual-level identifiable</text>

  <g font-size="11">
    <!-- dbGaP -->
    <rect x="640" y="180" width="240" height="130" fill="#fef3c7" stroke="#b45309" rx="6"/>
    <text x="655" y="202" font-size="13" font-weight="600" fill="#92400e">dbGaP</text>
    <text x="1060" y="202" font-size="16" fill="#b45309">🔒</text>
    <text x="655" y="218" font-size="10" fill="#6b7280">NIH</text>
    <text x="655" y="236" font-size="10" fill="#374151">US individual-level</text>
    <text x="655" y="250" font-size="10" fill="#374151">genotype + phenotype.</text>
    <text x="655" y="275" class="mono" font-size="10" fill="#92400e">phs…</text>
    <text x="655" y="292" font-size="9" fill="#6b7280" font-style="italic">IRB approval, DUA</text>

    <!-- EGA -->
    <rect x="900" y="180" width="240" height="130" fill="#fef3c7" stroke="#b45309" rx="6"/>
    <text x="915" y="202" font-size="13" font-weight="600" fill="#92400e">EGA</text>
    <text x="1060" y="202" font-size="16" fill="#b45309">🔒</text>
    <text x="915" y="218" font-size="10" fill="#6b7280">EBI / CRG (Europe)</text>
    <text x="915" y="236" font-size="10" fill="#374151">UK Biobank, FinnGen,</text>
    <text x="915" y="250" font-size="10" fill="#374151">clinical cohorts.</text>
    <text x="915" y="275" class="mono" font-size="10" fill="#92400e">EGAS… · EGAD…</text>

    <!-- GDC -->
    <rect x="770" y="330" width="240" height="130" fill="#fef3c7" stroke="#b45309" rx="6"/>
    <text x="785" y="352" font-size="13" font-weight="600" fill="#92400e">GDC</text>
    <text x="990" y="352" font-size="16" fill="#b45309">🔒</text>
    <text x="785" y="368" font-size="10" fill="#6b7280">Genomic Data Commons · NCI</text>
    <text x="785" y="386" font-size="10" fill="#374151">Cancer: TCGA, TARGET,</text>
    <text x="785" y="400" font-size="10" fill="#374151">CPTAC, MMRF.</text>
    <text x="785" y="425" class="mono" font-size="10" fill="#92400e">TCGA-*</text>
  </g>

  <!-- Bottom caption -->
  <rect x="40" y="480" width="1120" height="30" fill="#f3f4f6"/>
  <text x="600" y="499" text-anchor="middle" font-size="11" fill="#374151">Every 2025 paper cites an accession ID from one of these. Know which repository holds your data <em>before</em> writing the data-availability statement.</text>
</svg>
