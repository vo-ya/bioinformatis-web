<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 440" width="1080" height="440" font-family="Inter, sans-serif">
  <defs>
    <style>
      text { font-family: Inter, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }
    </style>
  </defs>
  <rect width="1080" height="440" fill="#fafaf9" rx="6"/>
  <text x="540" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Container vs VM — what gets shared, what gets duplicated</text>

  <!-- VM column (left) -->
  <g>
    <text x="220" y="62" text-anchor="middle" font-size="12" font-weight="600" fill="#6b7280">Virtual Machine</text>
    <text x="220" y="78" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">~1 GB overhead · multi-second boot</text>

    <!-- Stack (bottom-up) -->
    <rect x="80" y="270" width="280" height="40" fill="#d1d5db" stroke="#6b7280"/>
    <text x="220" y="295" text-anchor="middle" font-size="11" fill="#1f2937">Hardware</text>

    <rect x="80" y="230" width="280" height="40" fill="#e5e7eb" stroke="#6b7280"/>
    <text x="220" y="255" text-anchor="middle" font-size="11" fill="#1f2937">Hypervisor (ESXi, KVM)</text>

    <rect x="80" y="190" width="280" height="40" fill="#f3f4f6" stroke="#6b7280"/>
    <text x="220" y="215" text-anchor="middle" font-size="11" fill="#1f2937">Guest OS kernel</text>

    <rect x="80" y="150" width="280" height="40" fill="#fff" stroke="#6b7280"/>
    <text x="220" y="175" text-anchor="middle" font-size="11" fill="#374151">Guest OS userland</text>

    <rect x="80" y="110" width="280" height="40" fill="#fef3c7" stroke="#b45309"/>
    <text x="220" y="135" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Application (BWA)</text>
  </g>

  <!-- Container column (right) -->
  <g>
    <text x="860" y="62" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">Container</text>
    <text x="860" y="78" text-anchor="middle" font-size="10" fill="#1d4ed8" font-style="italic">&lt;10 MB overhead · instant start</text>

    <rect x="720" y="270" width="280" height="40" fill="#d1d5db" stroke="#6b7280"/>
    <text x="860" y="295" text-anchor="middle" font-size="11" fill="#1f2937">Hardware</text>

    <rect x="720" y="230" width="280" height="40" fill="#ccfbf1" stroke="#0d7377" stroke-width="1.5"/>
    <text x="860" y="255" text-anchor="middle" font-size="11" font-weight="600" fill="#0d7377">Host OS kernel (shared)</text>

    <rect x="720" y="190" width="280" height="40" fill="#dbeafe" stroke="#2563eb"/>
    <text x="860" y="215" text-anchor="middle" font-size="11" fill="#1e40af">Container runtime (Docker / Apptainer)</text>

    <rect x="720" y="150" width="280" height="40" fill="#eff6ff" stroke="#2563eb"/>
    <text x="860" y="175" text-anchor="middle" font-size="11" fill="#1e40af">Container userland (image layers)</text>

    <rect x="720" y="110" width="280" height="40" fill="#fef3c7" stroke="#b45309"/>
    <text x="860" y="135" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Application (BWA)</text>
  </g>

  <!-- Divider -->
  <line x1="540" y1="60" x2="540" y2="315" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Annotation: container skips two layers -->
  <text x="540" y="180" text-anchor="middle" font-size="10" fill="#0d7377" font-style="italic">shares the</text>
  <text x="540" y="195" text-anchor="middle" font-size="10" fill="#0d7377" font-style="italic">kernel — no</text>
  <text x="540" y="210" text-anchor="middle" font-size="10" fill="#0d7377" font-style="italic">hypervisor,</text>
  <text x="540" y="225" text-anchor="middle" font-size="10" fill="#0d7377" font-style="italic">no guest OS</text>

  <!-- Bottom strip: use cases -->
  <rect x="40" y="335" width="1000" height="90" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="55" y="354" font-size="11" font-weight="600" fill="#1d4ed8">Typical bioinformatics images</text>

  <g font-size="10">
    <rect x="60" y="365" width="280" height="48" fill="#fff" stroke="#93c5fd"/>
    <text x="75" y="382" class="mono" fill="#1e40af">bwa + samtools + GATK</text>
    <text x="75" y="400" fill="#6b7280">short-read alignment stack</text>
    <text x="325" y="400" text-anchor="end" class="mono" fill="#1d4ed8">~800 MB</text>

    <rect x="360" y="365" width="300" height="48" fill="#fff" stroke="#93c5fd"/>
    <text x="375" y="382" class="mono" fill="#1e40af">alphafold + cuda 12.1</text>
    <text x="375" y="400" fill="#6b7280">protein-structure prediction, GPU</text>
    <text x="645" y="400" text-anchor="end" class="mono" fill="#1d4ed8">~6 GB</text>

    <rect x="680" y="365" width="300" height="48" fill="#fff" stroke="#93c5fd"/>
    <text x="695" y="382" class="mono" fill="#1e40af">scvi + pytorch</text>
    <text x="695" y="400" fill="#6b7280">single-cell VAE model</text>
    <text x="965" y="400" text-anchor="end" class="mono" fill="#1d4ed8">~4 GB</text>
  </g>
</svg>
