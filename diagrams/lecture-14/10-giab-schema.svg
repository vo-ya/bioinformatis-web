<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420" font-family="Inter, sans-serif">
  <defs>
    <style>
      text { font-family: Inter, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }
    </style>
    <pattern id="hatchRed" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#c4342c" stroke-width="1.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="420" fill="#fafaf9" rx="6"/>

  <text x="600" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">GIAB truth-set schema — confident regions + truth variants + excluded regions</text>

  <!-- Reference coordinate track -->
  <text x="60" y="64" font-size="11" font-weight="600" fill="#374151">Reference coordinates (5 Mb region)</text>
  <rect x="60" y="72" width="880" height="34" fill="#e5e7eb" stroke="#9ca3af"/>
  <!-- tick marks for Mb -->
  <g font-size="9" fill="#6b7280" class="mono">
    <line x1="60" y1="106" x2="60" y2="112" stroke="#374151"/><text x="60" y="122" text-anchor="middle">0</text>
    <line x1="236" y1="106" x2="236" y2="112" stroke="#374151"/><text x="236" y="122" text-anchor="middle">1 Mb</text>
    <line x1="412" y1="106" x2="412" y2="112" stroke="#374151"/><text x="412" y="122" text-anchor="middle">2 Mb</text>
    <line x1="588" y1="106" x2="588" y2="112" stroke="#374151"/><text x="588" y="122" text-anchor="middle">3 Mb</text>
    <line x1="764" y1="106" x2="764" y2="112" stroke="#374151"/><text x="764" y="122" text-anchor="middle">4 Mb</text>
    <line x1="940" y1="106" x2="940" y2="112" stroke="#374151"/><text x="940" y="122" text-anchor="middle">5 Mb</text>
  </g>

  <!-- Confident region bands (overlay) -->
  <!-- Cover ~95%: segments [0-0.9Mb, 1.0-2.8Mb, 3.0-3.8Mb, 4.0-4.95Mb] -->
  <g>
    <rect x="60" y="72" width="158" height="34" fill="#dbeafe" fill-opacity="0.8" stroke="#2563eb" stroke-width="0.5"/>
    <rect x="236" y="72" width="317" height="34" fill="#dbeafe" fill-opacity="0.8" stroke="#2563eb" stroke-width="0.5"/>
    <rect x="588" y="72" width="141" height="34" fill="#dbeafe" fill-opacity="0.8" stroke="#2563eb" stroke-width="0.5"/>
    <rect x="764" y="72" width="167" height="34" fill="#dbeafe" fill-opacity="0.8" stroke="#2563eb" stroke-width="0.5"/>
  </g>

  <!-- Excluded regions (hatched) -->
  <g>
    <rect x="218" y="72" width="18" height="34" fill="url(#hatchRed)" stroke="#c4342c" stroke-width="0.8"/>
    <rect x="553" y="72" width="35" height="34" fill="url(#hatchRed)" stroke="#c4342c" stroke-width="0.8"/>
    <rect x="729" y="72" width="35" height="34" fill="url(#hatchRed)" stroke="#c4342c" stroke-width="0.8"/>
    <rect x="931" y="72" width="9" height="34" fill="url(#hatchRed)" stroke="#c4342c" stroke-width="0.8"/>
  </g>

  <!-- Truth VCF track -->
  <text x="60" y="154" font-size="11" font-weight="600" fill="#374151">Truth variants (GIAB HG002 v4.2.1)</text>
  <line x1="60" y1="175" x2="940" y2="175" stroke="#d1d5db" stroke-width="1"/>

  <!-- Variant tick marks — distributed within confident regions -->
  <g stroke-width="1.5">
    <!-- SNVs (cobalt) - lots -->
    <g stroke="#2563eb">
      <line x1="80" y1="164" x2="80" y2="186"/>
      <line x1="110" y1="164" x2="110" y2="186"/>
      <line x1="140" y1="164" x2="140" y2="186"/>
      <line x1="175" y1="164" x2="175" y2="186"/>
      <line x1="200" y1="164" x2="200" y2="186"/>
      <line x1="260" y1="164" x2="260" y2="186"/>
      <line x1="295" y1="164" x2="295" y2="186"/>
      <line x1="325" y1="164" x2="325" y2="186"/>
      <line x1="360" y1="164" x2="360" y2="186"/>
      <line x1="400" y1="164" x2="400" y2="186"/>
      <line x1="440" y1="164" x2="440" y2="186"/>
      <line x1="475" y1="164" x2="475" y2="186"/>
      <line x1="510" y1="164" x2="510" y2="186"/>
      <line x1="540" y1="164" x2="540" y2="186"/>
      <line x1="610" y1="164" x2="610" y2="186"/>
      <line x1="645" y1="164" x2="645" y2="186"/>
      <line x1="680" y1="164" x2="680" y2="186"/>
      <line x1="715" y1="164" x2="715" y2="186"/>
      <line x1="790" y1="164" x2="790" y2="186"/>
      <line x1="820" y1="164" x2="820" y2="186"/>
      <line x1="850" y1="164" x2="850" y2="186"/>
      <line x1="880" y1="164" x2="880" y2="186"/>
      <line x1="910" y1="164" x2="910" y2="186"/>
    </g>
    <!-- small INDELs (amber) - fewer -->
    <g stroke="#b45309">
      <line x1="95" y1="160" x2="95" y2="190" stroke-width="2"/>
      <line x1="155" y1="160" x2="155" y2="190" stroke-width="2"/>
      <line x1="240" y1="160" x2="240" y2="190" stroke-width="2"/>
      <line x1="310" y1="160" x2="310" y2="190" stroke-width="2"/>
      <line x1="420" y1="160" x2="420" y2="190" stroke-width="2"/>
      <line x1="495" y1="160" x2="495" y2="190" stroke-width="2"/>
      <line x1="620" y1="160" x2="620" y2="190" stroke-width="2"/>
      <line x1="700" y1="160" x2="700" y2="190" stroke-width="2"/>
      <line x1="800" y1="160" x2="800" y2="190" stroke-width="2"/>
      <line x1="895" y1="160" x2="895" y2="190" stroke-width="2"/>
    </g>
    <!-- SVs (violet) - sparse -->
    <g stroke="#7c3aed">
      <line x1="125" y1="156" x2="125" y2="194" stroke-width="3"/>
      <line x1="385" y1="156" x2="385" y2="194" stroke-width="3"/>
      <line x1="665" y1="156" x2="665" y2="194" stroke-width="3"/>
    </g>
  </g>

  <!-- Legend -->
  <g font-size="10">
    <line x1="60" y1="216" x2="75" y2="216" stroke="#2563eb" stroke-width="2"/>
    <text x="82" y="220" fill="#1e40af">SNV</text>
    <line x1="125" y1="216" x2="140" y2="216" stroke="#b45309" stroke-width="2"/>
    <text x="147" y="220" fill="#92400e">small INDEL</text>
    <line x1="220" y1="216" x2="235" y2="216" stroke="#7c3aed" stroke-width="3"/>
    <text x="242" y="220" fill="#6b21a8">SV / large INDEL</text>
    <rect x="370" y="211" width="12" height="10" fill="#dbeafe" stroke="#2563eb" stroke-width="0.8"/>
    <text x="388" y="220" fill="#1e40af">confident region</text>
    <rect x="510" y="211" width="12" height="10" fill="url(#hatchRed)" stroke="#c4342c" stroke-width="0.8"/>
    <text x="528" y="220" fill="#991b1b">excluded (repeats, centromere)</text>
  </g>

  <!-- Stats panel (right) -->
  <rect x="970" y="60" width="215" height="230" fill="#eff6ff" stroke="#bfdbfe" rx="4"/>
  <text x="985" y="82" font-size="11" font-weight="600" fill="#1d4ed8">Truth-set stats</text>

  <g font-size="10" fill="#374151">
    <text x="985" y="108">Total variants in region</text>
    <g class="mono" font-size="11" fill="#1e40af">
      <text x="985" y="124">SNV      12,400</text>
      <text x="985" y="140">INDEL     1,250</text>
      <text x="985" y="156">SV           45</text>
    </g>

    <text x="985" y="184">Confident region</text>
    <text x="985" y="200" class="mono" font-size="11" fill="#1e40af">4,758,000 / 5,000,000 bp</text>
    <text x="985" y="216" class="mono" font-size="10" fill="#059669">= 95.2%</text>

    <text x="985" y="244">Excluded</text>
    <text x="985" y="260" class="mono" font-size="11" fill="#991b1b">242,000 bp (4.8%)</text>
    <text x="985" y="276" font-size="9" fill="#6b7280" font-style="italic">mostly repeats, centromere</text>
  </g>

  <!-- Footer annotation -->
  <rect x="40" y="340" width="1120" height="68" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="55" y="361" font-size="11" font-weight="600" fill="#92400e">What GIAB does not guarantee</text>
  <text x="55" y="380" font-size="10" fill="#78350f">A call outside the confident region is <strong>not evaluated</strong> by GIAB — precision/recall is undefined there. Excluded regions are</text>
  <text x="55" y="396" font-size="10" fill="#78350f">where current short-read technology is weakest; performance on them is a separate problem, not captured by an aggregate F1.</text>
</svg>
