<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 520" width="1080" height="520" font-family="Inter, sans-serif">
  <defs>
    <style>
      text { font-family: Inter, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }
    </style>
  </defs>
  <rect width="1080" height="520" fill="#fafaf9" rx="6"/>

  <text x="540" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Precision / recall on GIAB HG002 v4.2.1 — four callers, two variant types</text>

  <!-- Axes: x=recall 0.9-1.0, y=precision 0.9-1.0; plot area 90-790 wide, 60-400 high -->
  <!-- Plot area -->
  <rect x="90" y="60" width="700" height="340" fill="#fff" stroke="#e5e7eb"/>

  <!-- Axis labels -->
  <text x="440" y="436" text-anchor="middle" font-size="11" fill="#374151">Recall</text>
  <text x="40" y="230" text-anchor="middle" font-size="11" fill="#374151" transform="rotate(-90 40 230)">Precision</text>

  <!-- Axis ticks -->
  <g font-size="10" fill="#6b7280" class="mono">
    <!-- x ticks -->
    <line x1="90" y1="400" x2="90" y2="405" stroke="#374151"/>
    <text x="90" y="418" text-anchor="middle">0.90</text>
    <line x1="230" y1="400" x2="230" y2="405" stroke="#374151"/>
    <text x="230" y="418" text-anchor="middle">0.92</text>
    <line x1="370" y1="400" x2="370" y2="405" stroke="#374151"/>
    <text x="370" y="418" text-anchor="middle">0.94</text>
    <line x1="510" y1="400" x2="510" y2="405" stroke="#374151"/>
    <text x="510" y="418" text-anchor="middle">0.96</text>
    <line x1="650" y1="400" x2="650" y2="405" stroke="#374151"/>
    <text x="650" y="418" text-anchor="middle">0.98</text>
    <line x1="790" y1="400" x2="790" y2="405" stroke="#374151"/>
    <text x="790" y="418" text-anchor="middle">1.00</text>
    <!-- y ticks -->
    <line x1="85" y1="400" x2="90" y2="400" stroke="#374151"/>
    <text x="80" y="403" text-anchor="end">0.90</text>
    <line x1="85" y1="332" x2="90" y2="332" stroke="#374151"/>
    <text x="80" y="335" text-anchor="end">0.92</text>
    <line x1="85" y1="264" x2="90" y2="264" stroke="#374151"/>
    <text x="80" y="267" text-anchor="end">0.94</text>
    <line x1="85" y1="196" x2="90" y2="196" stroke="#374151"/>
    <text x="80" y="199" text-anchor="end">0.96</text>
    <line x1="85" y1="128" x2="90" y2="128" stroke="#374151"/>
    <text x="80" y="131" text-anchor="end">0.98</text>
    <line x1="85" y1="60" x2="90" y2="60" stroke="#374151"/>
    <text x="80" y="63" text-anchor="end">1.00</text>
  </g>

  <!-- Iso-F1 contour approximations (hyperbolic: P*R/(P+R)=F1/2 → R = P*F1/(2P-F1)) -->
  <!-- F1=0.95 curve, F1=0.97, F1=0.99, F1=0.999 -->
  <!-- Drawing smoothly — use path approximations -->
  <g fill="none" stroke="#d1d5db" stroke-width="0.8" stroke-dasharray="3,3">
    <!-- F1=0.95 : plot from (r=0.905, p=1.0) to (r=1.0, p=0.905) -->
    <path d="M 125 60 Q 300 250 790 350"/>
    <text x="770" y="345" text-anchor="end" font-size="9" fill="#9ca3af" class="mono">F1=0.95</text>
    <!-- F1=0.97 -->
    <path d="M 230 60 Q 380 180 790 265"/>
    <text x="770" y="260" text-anchor="end" font-size="9" fill="#9ca3af" class="mono">F1=0.97</text>
    <!-- F1=0.99 -->
    <path d="M 510 60 Q 600 110 790 135"/>
    <text x="770" y="130" text-anchor="end" font-size="9" fill="#9ca3af" class="mono">F1=0.99</text>
    <!-- F1=0.999 -->
    <path d="M 750 60 Q 770 70 790 75"/>
    <text x="770" y="55" text-anchor="end" font-size="9" fill="#9ca3af" class="mono">F1=0.999</text>
  </g>

  <!-- Dots -->
  <!-- DeepVariant short-read SNV: P≈0.9996, R≈0.9995 → upper right.
       Label moved from start-anchored at (765, 60), which extended
       to x≈877 — well past the plot rect right edge at x=790 and
       into the legend rect at x=810 — to end-anchored at (745, 56),
       so the 130-px-wide title now sits inside the plot panel. -->
  <g>
    <circle cx="755" cy="67" r="7" fill="#2563eb"/>
    <text x="745" y="56" text-anchor="end" font-size="10" fill="#1e40af" font-weight="600">DeepVariant (SR) SNV</text>
    <text x="745" y="68" text-anchor="end" font-size="9" class="mono" fill="#6b7280">F1 0.9995</text>
  </g>
  <!-- DeepVariant INDEL: P≈0.99, R≈0.98 -->
  <g>
    <circle cx="650" cy="90" r="7" fill="#b45309"/>
    <text x="660" y="85" font-size="10" fill="#92400e" font-weight="600">DeepVariant (SR) INDEL</text>
    <text x="660" y="97" font-size="9" class="mono" fill="#6b7280">F1 0.983</text>
  </g>

  <!-- GATK HC SNV: P≈0.999, R≈0.998 -->
  <g>
    <circle cx="720" cy="98" r="6" fill="#2563eb" opacity="0.6"/>
    <text x="610" y="113" font-size="10" fill="#1e40af">GATK HC SNV</text>
    <text x="610" y="125" font-size="9" class="mono" fill="#6b7280">F1 0.998</text>
  </g>
  <!-- GATK HC INDEL: P≈0.97, R≈0.95 -->
  <g>
    <circle cx="440" cy="185" r="6" fill="#b45309" opacity="0.6"/>
    <text x="280" y="180" font-size="10" fill="#92400e">GATK HC INDEL</text>
    <text x="280" y="192" font-size="9" class="mono" fill="#6b7280">F1 0.960</text>
  </g>

  <!-- DeepVariant PacBio SNV: P≈0.998, R≈0.998 -->
  <g>
    <circle cx="710" cy="82" r="6" fill="#1e3a8a"/>
    <text x="610" y="70" font-size="10" fill="#1e3a8a">DV-PacBio SNV</text>
    <text x="610" y="80" font-size="9" class="mono" fill="#6b7280">F1 0.998</text>
  </g>
  <!-- DeepVariant PacBio INDEL: P≈0.996, R≈0.995 -->
  <g>
    <circle cx="700" cy="87" r="6" fill="#92400e"/>
    <text x="495" y="135" font-size="10" fill="#92400e" font-style="italic">DV-PacBio INDEL</text>
    <text x="495" y="147" font-size="9" class="mono" fill="#6b7280">F1 0.996 — HiFi closes the gap</text>
    <path d="M 587 137 Q 640 110 700 92" stroke="#92400e" stroke-width="0.8" stroke-dasharray="2,2" fill="none"/>
  </g>

  <!-- Sniffles (SVs): P≈0.92, R≈0.88 (bottom-left-ish) -->
  <g>
    <circle cx="210" cy="264" r="7" fill="#7c3aed"/>
    <text x="220" y="260" font-size="10" fill="#6b21a8" font-weight="600">Sniffles (SV)</text>
    <text x="220" y="272" font-size="9" class="mono" fill="#6b7280">F1 0.90 — SVs still hard</text>
  </g>

  <!-- Legend -->
  <rect x="810" y="60" width="240" height="140" fill="#fff" stroke="#e5e7eb"/>
  <text x="822" y="80" font-size="10" font-weight="600" fill="#374151" letter-spacing="0.08em">CALLERS</text>
  <g font-size="10">
    <circle cx="825" cy="100" r="5" fill="#2563eb"/>
    <text x="840" y="104" fill="#374151">DeepVariant (short reads)</text>
    <circle cx="825" cy="120" r="5" fill="#2563eb" opacity="0.6"/>
    <text x="840" y="124" fill="#374151">GATK HaplotypeCaller</text>
    <circle cx="825" cy="140" r="5" fill="#1e3a8a"/>
    <text x="840" y="144" fill="#374151">DeepVariant PacBio HiFi</text>
    <circle cx="825" cy="160" r="5" fill="#7c3aed"/>
    <text x="840" y="164" fill="#374151">Sniffles (SV caller)</text>
    <text x="822" y="184" font-size="9" fill="#6b7280" font-style="italic">variant type: colour depth</text>
  </g>

  <!-- Inset table. Height extended 68→76 so the bottom row's
       descenders at y=509 (baseline y=508) stay inside the panel
       rather than poking past the previous bottom edge at y=508. -->
  <rect x="90" y="440" width="960" height="76" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="105" y="460" font-size="11" font-weight="600" fill="#1d4ed8">hap.py output — top rows</text>
  <g class="mono" font-size="10" fill="#374151">
    <text x="105" y="480">caller              variant_type    precision    recall       F1</text>
    <text x="105" y="494">DeepVariant(SR)     SNV             0.99970     0.99925    0.99948</text>
    <text x="105" y="508">DeepVariant(PacBio) INDEL           0.99650     0.99540    0.99595</text>
  </g>
</svg>
