<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 440" width="1080" height="440" font-family="Inter, sans-serif">
  <defs>
    <style>
      text { font-family: Inter, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }
    </style>
    <marker id="arr7" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="1080" height="440" fill="#fafaf9" rx="6"/>

  <text x="540" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">nf-core pipeline curation — from contributor PR to versioned release</text>

  <!-- 5 stations -->
  <g>
    <!-- Station 1: Contributor PR -->
    <rect x="40" y="80" width="170" height="100" fill="#dbeafe" stroke="#2563eb" rx="8"/>
    <text x="125" y="105" text-anchor="middle" font-size="24">📝</text>
    <text x="125" y="130" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Contributor PR</text>
    <text x="125" y="148" text-anchor="middle" font-size="9" fill="#6b7280">User opens pull</text>
    <text x="125" y="160" text-anchor="middle" font-size="9" fill="#6b7280">request on GitHub</text>
    <text x="125" y="174" text-anchor="middle" class="mono" font-size="9" fill="#1d4ed8">nf-core/rnaseq</text>

    <!-- Station 2: Lint + CI -->
    <rect x="240" y="80" width="170" height="100" fill="#dbeafe" stroke="#2563eb" rx="8"/>
    <text x="325" y="105" text-anchor="middle" font-size="24">🧪</text>
    <text x="325" y="130" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Lint + test CI</text>
    <text x="325" y="148" text-anchor="middle" font-size="9" fill="#6b7280">nf-core lint</text>
    <text x="325" y="160" text-anchor="middle" font-size="9" fill="#6b7280">pipeline runs on</text>
    <text x="325" y="172" text-anchor="middle" font-size="9" fill="#6b7280">test data; checks</text>
    <text x="325" y="184" text-anchor="middle" font-size="9" fill="#6b7280">containers + config</text>

    <!-- Station 3: Community review -->
    <rect x="440" y="80" width="170" height="100" fill="#dbeafe" stroke="#2563eb" rx="8"/>
    <text x="525" y="105" text-anchor="middle" font-size="24">👥</text>
    <text x="525" y="130" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Community review</text>
    <text x="525" y="148" text-anchor="middle" font-size="9" fill="#6b7280">Pipeline-channel</text>
    <text x="525" y="160" text-anchor="middle" font-size="9" fill="#6b7280">reviewers on Slack</text>
    <text x="525" y="172" text-anchor="middle" font-size="9" fill="#6b7280">request changes</text>

    <!-- Station 4: Merge + tag -->
    <rect x="640" y="80" width="170" height="100" fill="#dbeafe" stroke="#2563eb" rx="8"/>
    <text x="725" y="105" text-anchor="middle" font-size="24">🏷️</text>
    <text x="725" y="130" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Merge + tag</text>
    <text x="725" y="148" text-anchor="middle" font-size="9" fill="#6b7280">PR merged</text>
    <text x="725" y="160" text-anchor="middle" font-size="9" fill="#6b7280">semver tag created</text>
    <text x="725" y="174" text-anchor="middle" class="mono" font-size="9" fill="#1d4ed8">v3.14.0</text>

    <!-- Station 5: Release -->
    <rect x="840" y="80" width="200" height="100" fill="#ccfbf1" stroke="#0d7377" rx="8"/>
    <text x="940" y="105" text-anchor="middle" font-size="24">📦</text>
    <text x="940" y="130" text-anchor="middle" font-size="11" font-weight="600" fill="#0d7377">Release artefact</text>
    <text x="940" y="148" text-anchor="middle" font-size="9" fill="#6b7280">Docker/Apptainer</text>
    <text x="940" y="160" text-anchor="middle" font-size="9" fill="#6b7280">image built · Zenodo</text>
    <text x="940" y="172" text-anchor="middle" font-size="9" fill="#6b7280">DOI · Slack announce</text>
  </g>

  <!-- Flow arrows -->
  <g stroke="#2563eb" stroke-width="2" fill="none">
    <line x1="210" y1="130" x2="240" y2="130" marker-end="url(#arr7)"/>
    <line x1="410" y1="130" x2="440" y2="130" marker-end="url(#arr7)"/>
    <line x1="610" y1="130" x2="640" y2="130" marker-end="url(#arr7)"/>
    <line x1="810" y1="130" x2="840" y2="130" marker-end="url(#arr7)"/>
  </g>

  <!-- Infrastructure band -->
  <rect x="40" y="210" width="1000" height="80" fill="#f3f4f6" stroke="#d1d5db" rx="6"/>
  <text x="55" y="230" font-size="11" font-weight="600" fill="#6b7280" letter-spacing="0.08em">INFRASTRUCTURE (community-owned)</text>
  <g font-size="10" class="mono" fill="#374151">
    <rect x="60" y="242" width="180" height="36" fill="#fff" stroke="#d1d5db"/>
    <text x="150" y="257" text-anchor="middle" fill="#1e40af">GitHub Actions</text>
    <text x="150" y="272" text-anchor="middle" font-size="9" fill="#6b7280">CI runner + lint</text>

    <rect x="260" y="242" width="180" height="36" fill="#fff" stroke="#d1d5db"/>
    <text x="350" y="257" text-anchor="middle" fill="#1e40af">BioContainers</text>
    <text x="350" y="272" text-anchor="middle" font-size="9" fill="#6b7280">registry (quay.io)</text>

    <rect x="460" y="242" width="180" height="36" fill="#fff" stroke="#d1d5db"/>
    <text x="550" y="257" text-anchor="middle" fill="#1e40af">Zenodo</text>
    <text x="550" y="272" text-anchor="middle" font-size="9" fill="#6b7280">DOI archival</text>

    <rect x="660" y="242" width="180" height="36" fill="#fff" stroke="#d1d5db"/>
    <text x="750" y="257" text-anchor="middle" fill="#1e40af">Slack workspace</text>
    <text x="750" y="272" text-anchor="middle" font-size="9" fill="#6b7280">pipeline channels</text>

    <rect x="860" y="242" width="170" height="36" fill="#fff" stroke="#d1d5db"/>
    <text x="945" y="257" text-anchor="middle" fill="#1e40af">nf-co.re</text>
    <text x="945" y="272" text-anchor="middle" font-size="9" fill="#6b7280">docs + test data</text>
  </g>

  <!-- Flagship pipelines (right-side summary strip) -->
  <rect x="40" y="310" width="1000" height="90" fill="#eff6ff" stroke="#bfdbfe" rx="6"/>
  <text x="55" y="330" font-size="11" font-weight="600" fill="#1d4ed8">Top-used nf-core pipelines</text>

  <g font-size="10">
    <rect x="60" y="342" width="230" height="48" fill="#fff" stroke="#93c5fd"/>
    <text x="75" y="360" class="mono" fill="#1e40af">nf-core/rnaseq</text>
    <text x="75" y="378" fill="#6b7280">bulk RNA-seq quantification</text>
    <text x="280" y="378" text-anchor="end" class="mono" fill="#1d4ed8">★ 2.4k</text>

    <rect x="300" y="342" width="230" height="48" fill="#fff" stroke="#93c5fd"/>
    <text x="315" y="360" class="mono" fill="#1e40af">nf-core/sarek</text>
    <text x="315" y="378" fill="#6b7280">germline + somatic variants</text>
    <text x="520" y="378" text-anchor="end" class="mono" fill="#1d4ed8">★ 1.3k</text>

    <rect x="540" y="342" width="230" height="48" fill="#fff" stroke="#93c5fd"/>
    <text x="555" y="360" class="mono" fill="#1e40af">nf-core/atacseq</text>
    <text x="555" y="378" fill="#6b7280">chromatin accessibility</text>
    <text x="760" y="378" text-anchor="end" class="mono" fill="#1d4ed8">★ 430</text>

    <rect x="780" y="342" width="250" height="48" fill="#fff" stroke="#93c5fd"/>
    <text x="795" y="360" class="mono" fill="#1e40af">nf-core/scrnaseq</text>
    <text x="795" y="378" fill="#6b7280">single-cell RNA-seq</text>
    <text x="1020" y="378" text-anchor="end" class="mono" fill="#1d4ed8">★ 310</text>
  </g>

  <!-- Annotation -->
  <text x="540" y="425" text-anchor="middle" font-size="11" fill="#374151" font-style="italic">Community-curated ≠ vendor-curated. Pipelines stay alive because dozens of users care, not because of a vendor roadmap.</text>
</svg>
