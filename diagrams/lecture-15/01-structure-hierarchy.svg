<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 480" width="1080" height="480" font-family="Inter, sans-serif">
  <defs>
    <style>
      text { font-family: Inter, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>
  <rect width="1080" height="480" fill="#fafaf9" rx="6"/>
  <text x="540" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">The four levels of protein structure</text>

  <!-- 4-panel horizontal layout -->
  <!-- Panel 1: Primary -->
  <g transform="translate(20,60)">
    <rect width="240" height="380" fill="#fff" stroke="#e5e7eb" rx="6"/>
    <text x="120" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">Primary</text>
    <text x="120" y="38" text-anchor="middle" font-size="10" fill="#6b7280">amino-acid sequence</text>
    <!-- letters in a chain -->
    <g class="mono" font-size="14" fill="#374151">
      <text x="20" y="80">M</text><text x="40" y="80">A</text><text x="60" y="80">G</text><text x="80" y="80">L</text>
      <text x="100" y="80">K</text><text x="120" y="80">V</text><text x="140" y="80">N</text><text x="160" y="80">F</text>
      <text x="180" y="80">Y</text><text x="200" y="80">D</text><text x="220" y="80">E</text>
      <text x="20" y="100">R</text><text x="40" y="100">Q</text><text x="60" y="100">I</text><text x="80" y="100">P</text>
      <text x="100" y="100">S</text><text x="120" y="100">H</text><text x="140" y="100">T</text><text x="160" y="100">V</text>
      <text x="180" y="100">A</text><text x="200" y="100">L</text><text x="220" y="100">G</text>
      <text x="20" y="120">M</text><text x="40" y="120">D</text><text x="60" y="120">F</text><text x="80" y="120">K</text>
      <text x="100" y="120">R</text><text x="120" y="120">E</text><text x="140" y="120">S</text><text x="160" y="120">P</text>
      <text x="180" y="120">N</text><text x="200" y="120">Q</text><text x="220" y="120">Y</text>
    </g>
    <!-- chain bond -->
    <line x1="20" y1="155" x2="220" y2="155" stroke="#9ca3af" stroke-width="1"/>
    <text x="120" y="180" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">N → C terminus</text>
    <text x="120" y="220" text-anchor="middle" font-size="10" fill="#374151">20-letter alphabet</text>
    <text x="120" y="234" text-anchor="middle" font-size="10" fill="#374151">codon → amino acid</text>
    <text x="120" y="248" text-anchor="middle" font-size="10" fill="#374151">(§Lecture 1)</text>
    <text x="120" y="356" text-anchor="middle" font-size="11" fill="#1d4ed8" font-weight="600">a string</text>
  </g>

  <!-- Panel 2: Secondary -->
  <g transform="translate(280,60)">
    <rect width="240" height="380" fill="#fff" stroke="#e5e7eb" rx="6"/>
    <text x="120" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">Secondary</text>
    <text x="120" y="38" text-anchor="middle" font-size="10" fill="#6b7280">local H-bond patterns</text>
    <!-- Helix spiral -->
    <g transform="translate(50,80)">
      <text x="50" y="0" text-anchor="middle" font-size="10" font-weight="600" fill="#c4342c">α-helix</text>
      <!-- spiral as sine -->
      <path d="M 0 14 Q 20 4 40 14 T 80 14 T 100 14" fill="none" stroke="#c4342c" stroke-width="3"/>
      <path d="M 0 22 Q 20 32 40 22 T 80 22 T 100 22" fill="none" stroke="#c4342c" stroke-width="3"/>
      <path d="M 0 30 Q 20 20 40 30 T 80 30 T 100 30" fill="none" stroke="#c4342c" stroke-width="3"/>
      <text x="50" y="55" text-anchor="middle" font-size="9" fill="#6b7280" class="mono">3.6 res / turn</text>
    </g>
    <!-- Strand arrows -->
    <g transform="translate(20,160)">
      <text x="100" y="0" text-anchor="middle" font-size="10" font-weight="600" fill="#b45309">β-strand sheet</text>
      <polygon points="0,16 180,16 180,8 200,20 180,32 180,24 0,24" fill="#b45309" opacity="0.7"/>
      <polygon points="0,46 180,46 180,38 200,50 180,62 180,54 0,54" fill="#b45309" opacity="0.7"/>
      <!-- H-bonds -->
      <line x1="40" y1="24" x2="40" y2="46" stroke="#9ca3af" stroke-dasharray="2,2"/>
      <line x1="80" y1="24" x2="80" y2="46" stroke="#9ca3af" stroke-dasharray="2,2"/>
      <line x1="120" y1="24" x2="120" y2="46" stroke="#9ca3af" stroke-dasharray="2,2"/>
      <line x1="160" y1="24" x2="160" y2="46" stroke="#9ca3af" stroke-dasharray="2,2"/>
      <text x="100" y="80" text-anchor="middle" font-size="9" fill="#6b7280">backbone H-bonds</text>
    </g>
    <text x="120" y="290" text-anchor="middle" font-size="10" fill="#374151">~85% predictable</text>
    <text x="120" y="304" text-anchor="middle" font-size="10" fill="#374151">classically (PSIPRED)</text>
    <text x="120" y="356" text-anchor="middle" font-size="11" fill="#1d4ed8" font-weight="600">local geometry</text>
  </g>

  <!-- Panel 3: Tertiary -->
  <g transform="translate(540,60)">
    <rect width="240" height="380" fill="#fff" stroke="#e5e7eb" rx="6"/>
    <text x="120" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">Tertiary</text>
    <text x="120" y="38" text-anchor="middle" font-size="10" fill="#6b7280">global 3D fold</text>
    <!-- Cartoon globule -->
    <g transform="translate(120,180)">
      <!-- Helices as elongated pills -->
      <rect x="-50" y="-60" width="22" height="56" rx="11" fill="#c4342c" opacity="0.8" transform="rotate(-25)"/>
      <rect x="-10" y="-58" width="22" height="60" rx="11" fill="#c4342c" opacity="0.8" transform="rotate(20)"/>
      <rect x="30" y="-50" width="22" height="55" rx="11" fill="#c4342c" opacity="0.8" transform="rotate(-15)"/>
      <!-- Strands as arrows -->
      <polygon points="-40,30 -42,40 -8,40 -8,46 4,38 -8,30 -8,36 -42,36" fill="#b45309" opacity="0.7"/>
      <polygon points="10,32 8,42 42,42 42,48 54,40 42,32 42,38 8,38" fill="#b45309" opacity="0.7"/>
      <!-- Loops -->
      <path d="M -38 -10 Q -25 5 -8 0" fill="none" stroke="#9ca3af" stroke-width="2"/>
      <path d="M 8 -6 Q 25 -15 40 -10" fill="none" stroke="#9ca3af" stroke-width="2"/>
    </g>
    <text x="120" y="290" text-anchor="middle" font-size="10" fill="#374151">backbone (φ, ψ, ω) +</text>
    <text x="120" y="304" text-anchor="middle" font-size="10" fill="#374151">side-chain torsions →</text>
    <text x="120" y="318" text-anchor="middle" font-size="10" fill="#374151">all atomic coordinates</text>
    <text x="120" y="356" text-anchor="middle" font-size="11" fill="#1d4ed8" font-weight="600">"the structure"</text>
  </g>

  <!-- Panel 4: Quaternary -->
  <g transform="translate(800,60)">
    <rect width="240" height="380" fill="#fff" stroke="#e5e7eb" rx="6"/>
    <text x="120" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">Quaternary</text>
    <text x="120" y="38" text-anchor="middle" font-size="10" fill="#6b7280">multi-chain assembly</text>
    <!-- Four subunits with haem -->
    <g transform="translate(120,170)">
      <!-- 4 subunits arranged -->
      <circle cx="-35" cy="-30" r="36" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
      <circle cx="35" cy="-30" r="36" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
      <circle cx="-35" cy="40" r="36" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
      <circle cx="35" cy="40" r="36" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
      <!-- haem groups -->
      <rect x="-43" y="-38" width="16" height="16" fill="#c4342c" rx="2"/>
      <rect x="27" y="-38" width="16" height="16" fill="#c4342c" rx="2"/>
      <rect x="-43" y="32" width="16" height="16" fill="#c4342c" rx="2"/>
      <rect x="27" y="32" width="16" height="16" fill="#c4342c" rx="2"/>
      <!-- labels -->
      <text x="-35" y="-32" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="600">α₁</text>
      <text x="35" y="-32" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="600">β₁</text>
      <text x="-35" y="42" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="600">β₂</text>
      <text x="35" y="42" text-anchor="middle" font-size="10" fill="#1e40af" font-weight="600">α₂</text>
    </g>
    <text x="120" y="290" text-anchor="middle" font-size="10" fill="#374151">haemoglobin: 4 chains</text>
    <text x="120" y="304" text-anchor="middle" font-size="10" fill="#374151">ribosome: ~80 + RNA</text>
    <text x="120" y="356" text-anchor="middle" font-size="11" fill="#1d4ed8" font-weight="600">assembly</text>
  </g>
</svg>
