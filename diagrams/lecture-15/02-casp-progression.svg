<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 460" width="1080" height="460" font-family="Inter, sans-serif">
  <defs>
    <style>
      text { font-family: Inter, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>
  <rect width="1080" height="460" fill="#fafaf9" rx="6"/>
  <text x="540" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">CASP free-modelling GDT_TS — three decades of incremental progress, then two step changes</text>

  <!-- Plot area -->
  <!-- x: 1994-2024, 16 CASP editions; y: 0-100 GDT_TS -->
  <!-- pad l 80 r 30 t 60 b 60 -->
  <rect x="80" y="60" width="970" height="340" fill="#fff" stroke="#e5e7eb"/>

  <!-- Y axis ticks -->
  <g font-size="10" fill="#6b7280" class="mono">
    <line x1="76" y1="400" x2="80" y2="400" stroke="#374151"/><text x="72" y="403" text-anchor="end">0</text>
    <line x1="76" y1="332" x2="80" y2="332" stroke="#374151"/><text x="72" y="335" text-anchor="end">20</text>
    <line x1="76" y1="264" x2="80" y2="264" stroke="#374151"/><text x="72" y="267" text-anchor="end">40</text>
    <line x1="76" y1="196" x2="80" y2="196" stroke="#374151"/><text x="72" y="199" text-anchor="end">60</text>
    <line x1="76" y1="128" x2="80" y2="128" stroke="#374151"/><text x="72" y="131" text-anchor="end">80</text>
    <line x1="76" y1="60" x2="80" y2="60" stroke="#374151"/><text x="72" y="63" text-anchor="end">100</text>
  </g>
  <text x="32" y="230" text-anchor="middle" font-size="11" fill="#374151" transform="rotate(-90 32 230)">Median best GDT_TS (Free Modelling)</text>

  <!-- X axis: 16 editions from CASP1 (1994) to CASP16 (2024) -->
  <!-- Spacing: 970 / 15 = 64.7 -->
  <g font-size="10" fill="#6b7280" class="mono">
    <line x1="80" y1="400" x2="80" y2="406" stroke="#374151"/><text x="80" y="420" text-anchor="middle">1994</text>
    <line x1="240" y1="400" x2="240" y2="406" stroke="#374151"/><text x="240" y="420" text-anchor="middle">2000</text>
    <line x1="400" y1="400" x2="400" y2="406" stroke="#374151"/><text x="400" y="420" text-anchor="middle">2006</text>
    <line x1="560" y1="400" x2="560" y2="406" stroke="#374151"/><text x="560" y="420" text-anchor="middle">2012</text>
    <line x1="720" y1="400" x2="720" y2="406" stroke="#374151"/><text x="720" y="420" text-anchor="middle">2018</text>
    <line x1="880" y1="400" x2="880" y2="406" stroke="#374151"/><text x="880" y="420" text-anchor="middle">2024</text>
  </g>
  <text x="565" y="445" text-anchor="middle" font-size="11" fill="#374151">CASP edition (year)</text>

  <!-- Reference horizontal lines -->
  <line x1="80" y1="332" x2="1050" y2="332" stroke="#e5e7eb" stroke-dasharray="3,3"/>
  <line x1="80" y1="264" x2="1050" y2="264" stroke="#e5e7eb" stroke-dasharray="3,3"/>
  <line x1="80" y1="196" x2="1050" y2="196" stroke="#e5e7eb" stroke-dasharray="3,3"/>
  <line x1="80" y1="128" x2="1050" y2="128" stroke="#e5e7eb" stroke-dasharray="3,3"/>

  <!-- Data: CASP edition (1-16) → year, GDT_TS -->
  <!-- Approx values: 1=15, 2=18, 3=20, 4=22, 5=25, 6=28, 7=30, 8=32, 9=33, 10=36, 11=38, 12=40, 13=58, 14=87, 15=88, 16=89 -->
  <!-- x = 80 + (i-1) * 970/15; y = 400 - val * 340/100 -->
  <g>
    <!-- Era shading -->
    <rect x="80" y="60" width="640" height="340" fill="#fef3c7" opacity="0.15"/>
    <text x="200" y="80" font-size="11" fill="#92400e" font-style="italic">Rosetta + classical methods</text>
    <rect x="720" y="60" width="65" height="340" fill="#bfdbfe" opacity="0.3"/>
    <text x="752" y="80" font-size="11" fill="#1d4ed8" font-style="italic" text-anchor="middle">AF1</text>
    <rect x="785" y="60" width="265" height="340" fill="#bfdbfe" opacity="0.5"/>
    <text x="900" y="80" font-size="11" fill="#1d4ed8" font-style="italic" text-anchor="middle">AlphaFold2 era</text>
  </g>

  <!-- Line connecting points -->
  <polyline points="80,349 144,339 208,332 272,325 336,315 400,305 464,298 528,291 592,288 656,278 720,271 784,264 848,203 912,104 976,101 1040,99"
    fill="none" stroke="#1d4ed8" stroke-width="2"/>

  <!-- Data points -->
  <g fill="#1e40af">
    <circle cx="80" cy="349" r="4"/>
    <circle cx="144" cy="339" r="4"/>
    <circle cx="208" cy="332" r="4"/>
    <circle cx="272" cy="325" r="4"/>
    <circle cx="336" cy="315" r="4"/>
    <circle cx="400" cy="305" r="4"/>
    <circle cx="464" cy="298" r="4"/>
    <circle cx="528" cy="291" r="4"/>
    <circle cx="592" cy="288" r="4"/>
    <circle cx="656" cy="278" r="4"/>
    <circle cx="720" cy="271" r="4"/>
    <circle cx="784" cy="264" r="4"/>
    <circle cx="848" cy="203" r="6" fill="#7c3aed"/>
    <circle cx="912" cy="104" r="7" fill="#dc2626"/>
    <circle cx="976" cy="101" r="6" fill="#dc2626"/>
    <circle cx="1040" cy="99" r="6" fill="#dc2626"/>
  </g>

  <!-- Annotations -->
  <text x="848" y="190" text-anchor="middle" font-size="10" fill="#6b21a8" font-weight="600">CASP13</text>
  <text x="848" y="178" text-anchor="middle" font-size="9" fill="#6b21a8">AlphaFold1 (~58)</text>
  <text x="912" y="92" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="600">CASP14: AF2 (~90)</text>
  <line x1="912" y1="98" x2="912" y2="86" stroke="#dc2626" stroke-width="1"/>
  <text x="1010" y="91" text-anchor="middle" font-size="9" fill="#dc2626">plateau</text>

  <!-- "experimental quality" reference -->
  <line x1="80" y1="94" x2="1050" y2="94" stroke="#059669" stroke-width="1.2" stroke-dasharray="5,4" opacity="0.6"/>
  <text x="86" y="89" font-size="9" fill="#059669" font-style="italic">experimental quality (90)</text>
</svg>
