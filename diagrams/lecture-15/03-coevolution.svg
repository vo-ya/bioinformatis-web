<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 480" width="1080" height="480" font-family="Inter, sans-serif">
  <defs>
    <style>
      text { font-family: Inter, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
    </style>
  </defs>
  <rect width="1080" height="480" fill="#fafaf9" rx="6"/>
  <text x="540" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Coevolving columns in an MSA correspond to residues in 3D contact</text>

  <!-- Top: MSA -->
  <text x="60" y="60" font-size="11" font-weight="600" fill="#6b7280" letter-spacing="0.06em">MULTIPLE SEQUENCE ALIGNMENT (15 sequences × 40 columns)</text>

  <!-- 15 rows × 40 columns of letters; column 12 highlighted cobalt, column 34 highlighted amber -->
  <g class="mono" font-size="11" fill="#374151">
    <!-- Each row -->
    <text x="60" y="84" font-size="9" fill="#9ca3af">org_1</text>
    <text x="60" y="98" font-size="9" fill="#9ca3af">org_2</text>
    <text x="60" y="112" font-size="9" fill="#9ca3af">org_3</text>
    <text x="60" y="126" font-size="9" fill="#9ca3af">org_4</text>
    <text x="60" y="140" font-size="9" fill="#9ca3af">org_5</text>
    <text x="60" y="154" font-size="9" fill="#9ca3af">org_6</text>
    <text x="60" y="168" font-size="9" fill="#9ca3af">org_7</text>
    <text x="60" y="182" font-size="9" fill="#9ca3af">org_8</text>
    <text x="60" y="196" font-size="9" fill="#9ca3af">org_9</text>
    <text x="60" y="210" font-size="9" fill="#9ca3af">org_10</text>
    <text x="60" y="224" font-size="9" fill="#9ca3af">org_11</text>
    <text x="60" y="238" font-size="9" fill="#9ca3af">org_12</text>
  </g>

  <!-- Sequence content as text -->
  <!-- Col positions: x_col = 100 + col * 18; col 12 (i) at x=316; col 34 (j) at x=712 -->
  <!-- Highlight column 12 (i) -->
  <rect x="313" y="72" width="16" height="180" fill="#dbeafe" opacity="0.6"/>
  <!-- Highlight column 34 (j) -->
  <rect x="709" y="72" width="16" height="180" fill="#fef3c7" opacity="0.7"/>

  <g class="mono" font-size="11" fill="#374151">
    <!-- Row 1: ...L...V at i=12, j=34 -->
    <text x="100" y="84">M G D R K F Y P A E G L T R L Q V N S A G E I D K F R H V Y M P S T L V A E S</text>
    <!-- Row 2 -->
    <text x="100" y="98">M G D R K F Y P A E G L T R L Q V N S A G E I D K F R H V Y M P S T L V A E S</text>
    <text x="100" y="112">M G D R K F Y P A E G I T R L Q V N S A G E I D K F R H V Y M P S T T V A E S</text>
    <text x="100" y="126">M G D R K F Y P A E G I T R L Q V N S A G E I D K F R H V Y M P S T T V A E S</text>
    <text x="100" y="140">M G D R K F Y P A E G L T R L Q V N S A G E I D K F R H V Y M P S T L V A E S</text>
    <text x="100" y="154">M G D R K F Y P A E G V T R L Q V N S A G E I D K F R H V Y M P S T A V A E S</text>
    <text x="100" y="168">M G D R K F Y P A E G V T R L Q V N S A G E I D K F R H V Y M P S T A V A E S</text>
    <text x="100" y="182">M G D R K F Y P A E G L T R L Q V N S A G E I D K F R H V Y M P S T L V A E S</text>
    <text x="100" y="196">M G D R K F Y P A E G I T R L Q V N S A G E I D K F R H V Y M P S T T V A E S</text>
    <text x="100" y="210">M G D R K F Y P A E G V T R L Q V N S A G E I D K F R H V Y M P S T A V A E S</text>
    <text x="100" y="224">M G D R K F Y P A E G L T R L Q V N S A G E I D K F R H V Y M P S T L V A E S</text>
    <text x="100" y="238">M G D R K F Y P A E G I T R L Q V N S A G E I D K F R H V Y M P S T T V A E S</text>
  </g>

  <!-- Column labels -->
  <text x="321" y="266" text-anchor="middle" font-size="10" fill="#1d4ed8" font-weight="600">col i = 12</text>
  <text x="717" y="266" text-anchor="middle" font-size="10" fill="#b45309" font-weight="600">col j = 34</text>

  <!-- Coevolution arrow -->
  <path d="M 321 266 Q 519 290 717 266" stroke="#7c3aed" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <text x="519" y="290" text-anchor="middle" font-size="10" fill="#7c3aed" font-style="italic">co-mutate: L↔V at i ↔ A↔T at j</text>

  <!-- Bottom panel: 3D structure with contact -->
  <text x="60" y="320" font-size="11" font-weight="600" fill="#6b7280" letter-spacing="0.06em">FOLDED STRUCTURE — RESIDUES 12 AND 34 ARE 3D NEIGHBOURS</text>

  <g transform="translate(540,400)">
    <!-- Cartoon backbone path -->
    <path d="M -300 0 Q -240 -40 -180 -10 T -100 -30 T -20 0 T 60 -25 T 140 5 T 220 -10 T 300 0"
      fill="none" stroke="#9ca3af" stroke-width="3"/>
    <!-- residue 12 (cobalt) -->
    <circle cx="-180" cy="-10" r="9" fill="#1d4ed8"/>
    <text x="-180" y="-25" text-anchor="middle" font-size="10" fill="#1d4ed8" font-weight="600">12</text>
    <!-- residue 34 (amber) — placed close in 3D -->
    <circle cx="140" cy="5" r="9" fill="#b45309"/>
    <text x="140" y="-12" text-anchor="middle" font-size="10" fill="#b45309" font-weight="600">34</text>
    <!-- contact dashed line -->
    <line x1="-180" y1="-10" x2="140" y2="5" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="-20" y="9" text-anchor="middle" font-size="10" fill="#7c3aed" font-style="italic">3D contact &lt; 8 Å</text>
  </g>

  <!-- Inference arrow -->
  <text x="540" y="455" text-anchor="middle" font-size="11" fill="#374151" font-style="italic">co-mutation pattern in MSA  ⟹  3D contact in folded structure</text>
</svg>
