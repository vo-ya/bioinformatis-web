<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" width="1200" height="440" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; }</style>
  </defs>
  <rect width="1200" height="440" fill="#fafaf9" rx="6"/>
  <text x="600" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">DCA recovers sparse true contacts by inverting covariance</text>

  <!-- Three side-by-side N×N matrices, N=40 -->
  <!-- Each panel 360 wide, 360 tall, centered at x=200, 600, 1000; y=60 -->

  <!-- Panel 1: MI (noisy) -->
  <g transform="translate(60,70)">
    <text x="180" y="-10" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Mutual Information</text>
    <text x="180" y="372" text-anchor="middle" font-size="10" fill="#6b7280">noisy: many off-diagonal blobs</text>
    <rect x="0" y="0" width="360" height="360" fill="#f3f4f6" stroke="#9ca3af"/>
    <!-- Diagonal -->
    <line x1="0" y1="0" x2="360" y2="360" stroke="#1d4ed8" stroke-width="1" opacity="0.3"/>
    <!-- True contacts (sparse) -->
    <g fill="#7c3aed" opacity="0.6">
      <rect x="80" y="120" width="6" height="6"/><rect x="120" y="80" width="6" height="6"/>
      <rect x="200" y="240" width="6" height="6"/><rect x="240" y="200" width="6" height="6"/>
      <rect x="60" y="280" width="6" height="6"/><rect x="280" y="60" width="6" height="6"/>
      <rect x="160" y="320" width="6" height="6"/><rect x="320" y="160" width="6" height="6"/>
    </g>
    <!-- Indirect noise spread (MI sees these too) -->
    <g fill="#7c3aed" opacity="0.3">
      <circle cx="100" cy="140" r="4"/><circle cx="140" cy="100" r="4"/>
      <circle cx="180" cy="240" r="3"/><circle cx="220" cy="180" r="3"/>
      <circle cx="60" cy="200" r="3"/><circle cx="200" cy="60" r="3"/>
      <circle cx="120" cy="200" r="3"/><circle cx="200" cy="120" r="3"/>
      <circle cx="80" cy="160" r="3"/><circle cx="160" cy="80" r="3"/>
      <circle cx="240" cy="280" r="3"/><circle cx="280" cy="240" r="3"/>
      <circle cx="180" cy="320" r="3"/><circle cx="320" cy="180" r="3"/>
      <circle cx="60" cy="320" r="3"/><circle cx="320" cy="60" r="3"/>
      <circle cx="100" cy="240" r="2"/><circle cx="240" cy="100" r="2"/>
    </g>
  </g>

  <!-- Panel 2: DCA (clean) -->
  <g transform="translate(420,70)">
    <text x="180" y="-10" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">DCA (inverse covariance)</text>
    <text x="180" y="372" text-anchor="middle" font-size="10" fill="#6b7280">clean: indirect noise removed</text>
    <rect x="0" y="0" width="360" height="360" fill="#f3f4f6" stroke="#9ca3af"/>
    <line x1="0" y1="0" x2="360" y2="360" stroke="#1d4ed8" stroke-width="1" opacity="0.3"/>
    <g fill="#1d4ed8">
      <rect x="80" y="120" width="6" height="6"/><rect x="120" y="80" width="6" height="6"/>
      <rect x="200" y="240" width="6" height="6"/><rect x="240" y="200" width="6" height="6"/>
      <rect x="60" y="280" width="6" height="6"/><rect x="280" y="60" width="6" height="6"/>
      <rect x="160" y="320" width="6" height="6"/><rect x="320" y="160" width="6" height="6"/>
    </g>
    <!-- A few faint residuals -->
    <g fill="#1d4ed8" opacity="0.15">
      <rect x="100" y="140" width="4" height="4"/><rect x="140" y="100" width="4" height="4"/>
    </g>
  </g>

  <!-- Panel 3: Native contacts (truth) -->
  <g transform="translate(780,70)">
    <text x="180" y="-10" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Native (PDB) contacts</text>
    <text x="180" y="372" text-anchor="middle" font-size="10" fill="#6b7280">ground truth — binary</text>
    <rect x="0" y="0" width="360" height="360" fill="#f3f4f6" stroke="#9ca3af"/>
    <line x1="0" y1="0" x2="360" y2="360" stroke="#1d4ed8" stroke-width="1" opacity="0.3"/>
    <g fill="#059669">
      <rect x="80" y="120" width="6" height="6"/><rect x="120" y="80" width="6" height="6"/>
      <rect x="200" y="240" width="6" height="6"/><rect x="240" y="200" width="6" height="6"/>
      <rect x="60" y="280" width="6" height="6"/><rect x="280" y="60" width="6" height="6"/>
      <rect x="160" y="320" width="6" height="6"/><rect x="320" y="160" width="6" height="6"/>
    </g>
  </g>

  <!-- Footer note -->
  <text x="600" y="425" text-anchor="middle" font-size="11" fill="#374151"><tspan font-weight="600">EE framing:</tspan> MI = covariance (direct + indirect). DCA = inverse covariance (direct only). Same as graphical lasso for Gaussian variables; plmDCA is the categorical version.</text>
</svg>
