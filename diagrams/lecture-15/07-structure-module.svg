<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 480" width="1080" height="480" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arr3" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#059669"/>
    </marker>
  </defs>
  <rect width="1080" height="480" fill="#fafaf9" rx="6"/>
  <text x="540" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Structure module — 8 IPA iterations fold the protein, $\text{SE}(3)$-equivariantly</text>

  <!-- Three panels: initial, iter 1, iter 8 -->
  <g>
    <text x="180" y="68" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Initial: all frames at origin</text>
    <rect x="40" y="80" width="280" height="180" fill="#fff" stroke="#e5e7eb"/>
    <!-- residue frames stacked at origin -->
    <g transform="translate(180,170)">
      <circle cx="0" cy="0" r="6" fill="#9ca3af"/>
      <circle cx="-3" cy="-2" r="6" fill="#9ca3af"/>
      <circle cx="3" cy="2" r="6" fill="#9ca3af"/>
      <circle cx="-1" cy="3" r="6" fill="#9ca3af"/>
      <circle cx="2" cy="-3" r="6" fill="#9ca3af"/>
      <text x="0" y="-30" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">all residues stacked</text>
    </g>
    <text x="180" y="270" text-anchor="middle" font-size="9" fill="#6b7280">random orientations · zero positions</text>
  </g>

  <g>
    <text x="540" y="68" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">After iteration 1</text>
    <rect x="380" y="80" width="320" height="180" fill="#fff" stroke="#e5e7eb"/>
    <!-- residues spread out roughly -->
    <g transform="translate(540,170)">
      <path d="M -100 -20 Q -50 -50 0 -30 T 100 -10" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
      <circle cx="-100" cy="-20" r="5" fill="#bfdbfe" stroke="#1d4ed8"/>
      <circle cx="-50" cy="-50" r="5" fill="#bfdbfe" stroke="#1d4ed8"/>
      <circle cx="0" cy="-30" r="5" fill="#bfdbfe" stroke="#1d4ed8"/>
      <circle cx="50" cy="-25" r="5" fill="#bfdbfe" stroke="#1d4ed8"/>
      <circle cx="100" cy="-10" r="5" fill="#bfdbfe" stroke="#1d4ed8"/>
      <circle cx="40" cy="20" r="5" fill="#bfdbfe" stroke="#1d4ed8"/>
      <circle cx="-30" cy="20" r="5" fill="#bfdbfe" stroke="#1d4ed8"/>
      <circle cx="-70" cy="40" r="5" fill="#bfdbfe" stroke="#1d4ed8"/>
    </g>
    <text x="540" y="270" text-anchor="middle" font-size="9" fill="#6b7280">approximate positions emerging</text>
  </g>

  <g>
    <text x="900" y="68" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">After iteration 8</text>
    <rect x="760" y="80" width="280" height="180" fill="#fff" stroke="#059669" stroke-width="1.5"/>
    <!-- folded structure -->
    <g transform="translate(900,170)">
      <!-- helix -->
      <rect x="-60" y="-50" width="20" height="50" rx="10" fill="#c4342c" opacity="0.8" transform="rotate(-15)"/>
      <rect x="-20" y="-50" width="20" height="55" rx="10" fill="#c4342c" opacity="0.8" transform="rotate(15)"/>
      <rect x="20" y="-45" width="20" height="50" rx="10" fill="#c4342c" opacity="0.8" transform="rotate(-10)"/>
      <!-- strand -->
      <polygon points="-50,30 50,30 50,22 65,38 50,54 50,46 -50,46" fill="#b45309" opacity="0.7"/>
      <!-- loops -->
      <path d="M -50 0 Q -30 15 -10 8" fill="none" stroke="#9ca3af" stroke-width="2"/>
    </g>
    <text x="900" y="270" text-anchor="middle" font-size="9" fill="#6b7280">fully folded structure</text>
  </g>

  <!-- Iteration arrows -->
  <line x1="320" y1="170" x2="378" y2="170" stroke="#059669" stroke-width="2" marker-end="url(#arr3)"/>
  <text x="349" y="161" text-anchor="middle" font-size="10" fill="#059669" font-style="italic">IPA</text>
  <line x1="700" y1="170" x2="758" y2="170" stroke="#059669" stroke-width="2" marker-end="url(#arr3)"/>
  <text x="729" y="161" text-anchor="middle" font-size="10" fill="#059669" font-style="italic">×7</text>

  <!-- IPA detail -->
  <text x="540" y="306" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Invariant Point Attention — points expressed in each residue's own SE(3) frame</text>

  <g transform="translate(60,330)">
    <rect width="960" height="120" fill="#eff6ff" stroke="#1d4ed8"/>

    <!-- Residue i -->
    <g transform="translate(120,60)">
      <circle cx="0" cy="0" r="20" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
      <text x="0" y="4" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">i</text>
      <line x1="0" y1="0" x2="20" y2="0" stroke="#1d4ed8" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="0" y2="-20" stroke="#1d4ed8" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="-12" y2="-12" stroke="#1d4ed8" stroke-width="1.5" stroke-dasharray="2,2"/>
      <text x="0" y="44" text-anchor="middle" font-size="9" fill="#374151" font-style="italic">i's frame</text>
      <!-- query points -->
      <circle cx="14" cy="-6" r="3" fill="#1e40af"/>
      <circle cx="-8" cy="14" r="3" fill="#1e40af"/>
      <text x="32" y="-6" font-size="9" class="mono" fill="#1e40af">q-points</text>
    </g>

    <!-- Residue j -->
    <g transform="translate(840,60)">
      <circle cx="0" cy="0" r="20" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
      <text x="0" y="4" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">j</text>
      <line x1="0" y1="0" x2="-18" y2="-8" stroke="#b45309" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="14" y2="-14" stroke="#b45309" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="0" y2="20" stroke="#b45309" stroke-width="1.5" stroke-dasharray="2,2"/>
      <text x="0" y="44" text-anchor="middle" font-size="9" fill="#374151" font-style="italic">j's frame</text>
      <!-- key points -->
      <circle cx="-14" cy="-6" r="3" fill="#92400e"/>
      <circle cx="6" cy="14" r="3" fill="#92400e"/>
      <text x="-86" y="-6" font-size="9" class="mono" fill="#92400e">k-points</text>
    </g>

    <!-- Connecting arrow showing distance computation -->
    <line x1="180" y1="60" x2="780" y2="60" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="480" y="50" text-anchor="middle" font-size="10" fill="#7c3aed" font-style="italic">map both points to common reference → distance → attention weight</text>
    <text x="480" y="100" text-anchor="middle" font-size="10" fill="#374151">attention is invariant to global rotation: rotate the input, rotate the output the same way</text>
  </g>

  <!-- Footer -->
  <rect x="60" y="455" width="960" height="20" fill="none"/>
  <text x="540" y="470" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic"><tspan font-weight="600">EE framing:</tspan> SE(3)-equivariant attention — same design as e3nn / NequIP / SE(3)-Transformers</text>
</svg>
