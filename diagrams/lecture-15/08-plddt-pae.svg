<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 440" width="1080" height="440" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
  </defs>
  <rect width="1080" height="440" fill="#fafaf9" rx="6"/>
  <text x="540" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">pLDDT and PAE — local confidence and pairwise relative confidence</text>

  <!-- Panel 1: pLDDT-coloured structure -->
  <g>
    <text x="180" y="60" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">pLDDT — per-residue confidence</text>
    <rect x="40" y="72" width="280" height="280" fill="#fff" stroke="#e5e7eb"/>

    <!-- Two-domain protein cartoon, coloured -->
    <g transform="translate(180,210)">
      <!-- Domain 1 (high pLDDT, blue) -->
      <g>
        <rect x="-100" y="-70" width="22" height="58" rx="11" fill="#1d4ed8" transform="rotate(-15)"/>
        <rect x="-60" y="-65" width="22" height="58" rx="11" fill="#1d4ed8" transform="rotate(20)"/>
        <rect x="-95" y="-10" width="22" height="50" rx="11" fill="#2563eb" transform="rotate(-25)"/>
        <polygon points="-95,30 -50,30 -50,22 -38,38 -50,54 -50,46 -95,46" fill="#1d4ed8" opacity="0.85"/>
      </g>
      <!-- Linker (low pLDDT, orange/red) -->
      <path d="M -25 5 Q 0 -10 25 5" fill="none" stroke="#dc2626" stroke-width="3" stroke-dasharray="4,2"/>
      <!-- Domain 2 (high pLDDT, blue) -->
      <g>
        <rect x="50" y="-70" width="22" height="58" rx="11" fill="#1d4ed8" transform="rotate(15)"/>
        <rect x="80" y="-50" width="22" height="50" rx="11" fill="#2563eb" transform="rotate(-10)"/>
        <polygon points="50,30 95,30 95,22 107,38 95,54 95,46 50,46" fill="#1d4ed8" opacity="0.85"/>
      </g>
    </g>

    <!-- pLDDT colour bar -->
    <g transform="translate(60,310)">
      <text x="0" y="-2" font-size="9" font-weight="600" fill="#6b7280" letter-spacing="0.06em">pLDDT scale</text>
      <rect x="0" y="4" width="50" height="14" fill="#dc2626"/>
      <rect x="50" y="4" width="50" height="14" fill="#f59e0b"/>
      <rect x="100" y="4" width="50" height="14" fill="#facc15"/>
      <rect x="150" y="4" width="50" height="14" fill="#3b82f6"/>
      <rect x="200" y="4" width="40" height="14" fill="#1d4ed8"/>
      <text x="0" y="32" font-size="9" class="mono" fill="#6b7280">0</text>
      <text x="50" y="32" font-size="9" class="mono" fill="#6b7280">50</text>
      <text x="100" y="32" font-size="9" class="mono" fill="#6b7280">70</text>
      <text x="150" y="32" font-size="9" class="mono" fill="#6b7280">90</text>
      <text x="240" y="32" font-size="9" class="mono" fill="#6b7280">100</text>
    </g>
  </g>

  <!-- Panel 2: PAE matrix -->
  <g>
    <text x="540" y="60" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">PAE — pairwise alignment error (Å)</text>
    <rect x="400" y="72" width="280" height="280" fill="#fff" stroke="#e5e7eb"/>

    <!-- 200×200 matrix shown as 240×240 with two clear domain blocks -->
    <g transform="translate(420,92)">
      <rect width="240" height="240" fill="#f59e0b" opacity="0.4"/>
      <!-- Domain 1 block: low PAE -->
      <rect x="0" y="0" width="105" height="105" fill="#1d4ed8" opacity="0.85"/>
      <!-- Domain 2 block: low PAE -->
      <rect x="135" y="135" width="105" height="105" fill="#1d4ed8" opacity="0.85"/>
      <!-- Inter-domain blocks: high PAE -->
      <rect x="0" y="135" width="105" height="105" fill="#fbbf24" opacity="0.7"/>
      <rect x="135" y="0" width="105" height="105" fill="#fbbf24" opacity="0.7"/>
      <!-- Linker thin diagonal band  -->
      <rect x="105" y="105" width="30" height="30" fill="#dc2626" opacity="0.5"/>
      <!-- diagonal -->
      <line x1="0" y1="0" x2="240" y2="240" stroke="#fff" stroke-width="0.5"/>
    </g>
    <!-- Axis labels -->
    <text x="540" y="345" text-anchor="middle" font-size="10" fill="#374151">residue index (aligned)</text>
    <text x="396" y="212" text-anchor="middle" font-size="10" fill="#374151" transform="rotate(-90 396 212)">residue index</text>

    <!-- PAE legend -->
    <g transform="translate(420,310)">
      <text x="0" y="-2" font-size="9" font-weight="600" fill="#6b7280" letter-spacing="0.06em">PAE (Å)</text>
      <rect x="0" y="4" width="40" height="14" fill="#1d4ed8"/>
      <rect x="40" y="4" width="40" height="14" fill="#3b82f6" opacity="0.85"/>
      <rect x="80" y="4" width="40" height="14" fill="#fbbf24" opacity="0.7"/>
      <rect x="120" y="4" width="40" height="14" fill="#f59e0b"/>
      <rect x="160" y="4" width="80" height="14" fill="#dc2626" opacity="0.7"/>
      <text x="0" y="32" font-size="9" class="mono" fill="#6b7280">0</text>
      <text x="120" y="32" font-size="9" class="mono" fill="#6b7280">10</text>
      <text x="240" y="32" font-size="9" class="mono" fill="#6b7280">30+</text>
    </g>
  </g>

  <!-- Panel 3: Interpretation -->
  <g>
    <rect x="720" y="72" width="320" height="280" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="880" y="92" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">How to read this</text>
    <text x="735" y="120" font-size="10" fill="#374151"><tspan font-weight="600" fill="#1e40af">Per-residue (pLDDT):</tspan></text>
    <text x="735" y="138" font-size="10" fill="#374151">Both domains have pLDDT &gt; 90 — the</text>
    <text x="735" y="152" font-size="10" fill="#374151">local geometry of each is high-confidence.</text>
    <text x="735" y="166" font-size="10" fill="#374151">The linker has pLDDT ~ 30 — disordered or</text>
    <text x="735" y="180" font-size="10" fill="#374151">flexible; coordinates not meaningful.</text>

    <text x="735" y="208" font-size="10" fill="#374151"><tspan font-weight="600" fill="#1e40af">Pairwise (PAE):</tspan></text>
    <text x="735" y="226" font-size="10" fill="#374151">Within-domain PAE is low (dark blocks):</text>
    <text x="735" y="240" font-size="10" fill="#374151">each domain is internally well-defined.</text>
    <text x="735" y="254" font-size="10" fill="#374151">Inter-domain PAE is high (bright off-diagonal):</text>
    <text x="735" y="268" font-size="10" fill="#374151">we don't know how the domains sit relative</text>
    <text x="735" y="282" font-size="10" fill="#374151">to each other.</text>

    <text x="735" y="312" font-size="10" fill="#92400e" font-weight="600">Practical rule:</text>
    <text x="735" y="326" font-size="10" fill="#374151">trust intra-domain analyses; don't trust the</text>
    <text x="735" y="340" font-size="10" fill="#374151">inter-domain orientation. Always check both.</text>
  </g>

  <!-- Footer -->
  <rect x="40" y="370" width="1000" height="50" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="55" y="390" font-size="11" font-weight="600" fill="#991b1b">⚠ Common mistake</text>
  <text x="55" y="408" font-size="10" fill="#7f1d1d">A protein with all-blue pLDDT can still be wrong if inter-domain PAE is high. Use both metrics, every time.</text>
</svg>
