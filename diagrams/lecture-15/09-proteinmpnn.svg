<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 440" width="1080" height="440" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arr4" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#1d4ed8"/>
    </marker>
  </defs>
  <rect width="1080" height="440" fill="#fafaf9" rx="6"/>
  <text x="540" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">ProteinMPNN — backbone-only structure → amino-acid sequence</text>

  <!-- Three-panel: backbone → GNN → seq -->

  <!-- Panel 1: Backbone -->
  <g>
    <text x="160" y="60" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Input: backbone-only</text>
    <rect x="40" y="72" width="240" height="280" fill="#fff" stroke="#e5e7eb"/>
    <!-- Backbone trace -->
    <g transform="translate(160,210)">
      <path d="M -100 -50 Q -60 -80 -20 -50 T 60 -30 T 100 -60 Q 100 0 60 20 T -20 40 T -100 50 Q -100 0 -60 -10"
        fill="none" stroke="#6b7280" stroke-width="2"/>
      <!-- Cα atoms only (backbone) -->
      <g fill="#9ca3af">
        <circle cx="-100" cy="-50" r="3"/>
        <circle cx="-60" cy="-80" r="3"/>
        <circle cx="-20" cy="-50" r="3"/>
        <circle cx="20" cy="-40" r="3"/>
        <circle cx="60" cy="-30" r="3"/>
        <circle cx="100" cy="-60" r="3"/>
        <circle cx="100" cy="-10" r="3"/>
        <circle cx="80" cy="20" r="3"/>
        <circle cx="40" cy="35" r="3"/>
        <circle cx="-20" cy="40" r="3"/>
        <circle cx="-60" cy="35" r="3"/>
        <circle cx="-100" cy="50" r="3"/>
        <circle cx="-100" cy="10" r="3"/>
        <circle cx="-60" cy="-10" r="3"/>
      </g>
    </g>
    <text x="160" y="335" text-anchor="middle" font-size="10" class="mono" fill="#6b7280">N, Cα, C, O atoms only</text>
    <text x="160" y="349" text-anchor="middle" font-size="10" class="mono" fill="#6b7280">no side chains, no sequence</text>
  </g>

  <!-- Panel 2: GNN -->
  <g>
    <text x="540" y="60" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">ProteinMPNN GNN — message passing</text>
    <rect x="320" y="72" width="440" height="280" fill="#eff6ff" stroke="#1d4ed8"/>

    <!-- Nodes (residues) and edges (k-NN in 3D) -->
    <g transform="translate(540,210)">
      <!-- Edges -->
      <g stroke="#93c5fd" stroke-width="1" fill="none">
        <line x1="-110" y1="-60" x2="-50" y2="-90"/>
        <line x1="-110" y1="-60" x2="-50" y2="-30"/>
        <line x1="-50" y1="-90" x2="50" y2="-50"/>
        <line x1="-50" y1="-30" x2="50" y2="-50"/>
        <line x1="50" y1="-50" x2="120" y2="-70"/>
        <line x1="50" y1="-50" x2="100" y2="0"/>
        <line x1="100" y1="0" x2="120" y2="-70"/>
        <line x1="100" y1="0" x2="40" y2="50"/>
        <line x1="40" y1="50" x2="-50" y2="-30"/>
        <line x1="40" y1="50" x2="-30" y2="60"/>
        <line x1="-30" y1="60" x2="-110" y2="40"/>
        <line x1="-110" y1="40" x2="-110" y2="-60"/>
        <line x1="-110" y1="40" x2="-50" y2="-30"/>
      </g>
      <!-- Nodes -->
      <g fill="#1d4ed8">
        <circle cx="-110" cy="-60" r="8"/>
        <circle cx="-50" cy="-90" r="8"/>
        <circle cx="50" cy="-50" r="8"/>
        <circle cx="120" cy="-70" r="8"/>
        <circle cx="-50" cy="-30" r="8"/>
        <circle cx="100" cy="0" r="8"/>
        <circle cx="40" cy="50" r="8"/>
        <circle cx="-30" cy="60" r="8"/>
        <circle cx="-110" cy="40" r="8"/>
      </g>
      <!-- Message arrows on a few -->
      <g stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="3,2" fill="none">
        <path d="M -50 -90 Q 0 -100 50 -50" marker-end="url(#arr4)"/>
        <path d="M 100 0 Q 70 30 40 50" marker-end="url(#arr4)"/>
      </g>
    </g>
    <text x="540" y="332" text-anchor="middle" font-size="10" fill="#6b7280">nodes = residues with backbone frames · edges = 3D k-nearest neighbours</text>
    <text x="540" y="346" text-anchor="middle" font-size="10" fill="#6b7280">message passing exchanges geometric information across iterations</text>
  </g>

  <!-- Panel 3: Output sequence + softmax -->
  <g>
    <text x="900" y="60" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Output: per-residue softmax</text>
    <rect x="800" y="72" width="240" height="280" fill="#fff" stroke="#e5e7eb"/>
    <!-- 20-aa softmax bars for ~5 residues -->
    <g transform="translate(820,90)">
      <text x="0" y="0" font-size="9" class="mono" fill="#6b7280">res 1</text>
      <rect x="0" y="6" width="36" height="6" fill="#1d4ed8"/>
      <rect x="36" y="6" width="44" height="6" fill="#bfdbfe"/>
      <rect x="80" y="6" width="20" height="6" fill="#dbeafe"/>
      <text x="106" y="12" font-size="9" class="mono" fill="#1d4ed8">L 0.45</text>

      <text x="0" y="34" font-size="9" class="mono" fill="#6b7280">res 2</text>
      <rect x="0" y="40" width="60" height="6" fill="#1d4ed8"/>
      <rect x="60" y="40" width="22" height="6" fill="#bfdbfe"/>
      <text x="106" y="46" font-size="9" class="mono" fill="#1d4ed8">A 0.62</text>

      <text x="0" y="68" font-size="9" class="mono" fill="#6b7280">res 3</text>
      <rect x="0" y="74" width="40" height="6" fill="#1d4ed8"/>
      <rect x="40" y="74" width="36" height="6" fill="#bfdbfe"/>
      <text x="106" y="80" font-size="9" class="mono" fill="#1d4ed8">V 0.41</text>

      <text x="0" y="102" font-size="9" class="mono" fill="#6b7280">res 4</text>
      <rect x="0" y="108" width="76" height="6" fill="#1d4ed8"/>
      <rect x="76" y="108" width="14" height="6" fill="#bfdbfe"/>
      <text x="106" y="114" font-size="9" class="mono" fill="#1d4ed8">E 0.78</text>

      <text x="0" y="136" font-size="9" class="mono" fill="#6b7280">res 5</text>
      <rect x="0" y="142" width="32" height="6" fill="#1d4ed8"/>
      <rect x="32" y="142" width="50" height="6" fill="#bfdbfe"/>
      <text x="106" y="148" font-size="9" class="mono" fill="#1d4ed8">F 0.36</text>

      <text x="0" y="172" font-size="10" font-weight="600" fill="#1e40af">sampled sequence:</text>
      <text x="0" y="190" font-size="11" class="mono" fill="#374151">L A V E F G I R K N ...</text>
      <text x="0" y="206" font-size="9" fill="#6b7280">(autoregressive decode)</text>
    </g>
  </g>

  <!-- Arrows between panels -->
  <line x1="282" y1="210" x2="318" y2="210" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arr4)"/>
  <line x1="762" y1="210" x2="798" y2="210" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arr4)"/>

  <!-- Footer -->
  <text x="540" y="395" text-anchor="middle" font-size="11" fill="#374151"><tspan font-weight="600">Performance:</tspan> ~50% of sampled sequences fold to the target backbone in wet-lab tests · ~10% for Rosetta · the inverse-folding step that unblocked design.</text>
</svg>
