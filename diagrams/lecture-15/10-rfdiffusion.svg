<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arr5" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7c3aed"/>
    </marker>
  </defs>
  <rect width="1200" height="480" fill="#fafaf9" rx="6"/>
  <text x="600" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">De-novo design loop — RFDiffusion sculptor → ProteinMPNN scriptwriter → AlphaFold critic → wet lab</text>

  <!-- 5 panels horizontal -->
  <!-- Panel 1: Constraints -->
  <g>
    <rect x="40" y="80" width="200" height="240" fill="#fff" stroke="#e5e7eb" rx="6"/>
    <text x="140" y="105" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">1. Constraints</text>
    <text x="140" y="125" text-anchor="middle" font-size="10" fill="#6b7280">specify what you want</text>
    <g class="mono" font-size="10" fill="#374151">
      <rect x="55" y="140" width="170" height="22" fill="#fef3c7" stroke="#fcd34d"/>
      <text x="65" y="156">binds Zn²⁺ at this site</text>
      <rect x="55" y="170" width="170" height="22" fill="#fef3c7" stroke="#fcd34d"/>
      <text x="65" y="186">120-residue backbone</text>
      <rect x="55" y="200" width="170" height="22" fill="#fef3c7" stroke="#fcd34d"/>
      <text x="65" y="216">α/β fold preferred</text>
      <rect x="55" y="230" width="170" height="22" fill="#fef3c7" stroke="#fcd34d"/>
      <text x="65" y="246">soluble in water</text>
    </g>
    <text x="140" y="290" text-anchor="middle" font-size="10" fill="#92400e" font-style="italic">"design a protein that…"</text>
  </g>

  <!-- Panel 2: RFDiffusion sculptor -->
  <g>
    <rect x="270" y="80" width="200" height="240" fill="#fff" stroke="#7c3aed" stroke-width="1.5" rx="6"/>
    <text x="370" y="105" text-anchor="middle" font-size="12" font-weight="600" fill="#7c3aed">2. RFDiffusion (sculptor)</text>
    <text x="370" y="125" text-anchor="middle" font-size="10" fill="#6b7280">novel backbone</text>
    <!-- Backbone cartoon -->
    <g transform="translate(370,210)">
      <rect x="-50" y="-50" width="20" height="50" rx="10" fill="#7c3aed" opacity="0.8" transform="rotate(-15)"/>
      <rect x="-15" y="-55" width="20" height="55" rx="10" fill="#7c3aed" opacity="0.8" transform="rotate(20)"/>
      <rect x="20" y="-45" width="20" height="48" rx="10" fill="#7c3aed" opacity="0.8" transform="rotate(-10)"/>
      <polygon points="-50,30 30,30 30,22 42,38 30,54 30,46 -50,46" fill="#7c3aed" opacity="0.6"/>
      <!-- Zn site marker -->
      <circle cx="0" cy="-10" r="6" fill="#fbbf24" stroke="#92400e"/>
      <text x="0" y="-7" text-anchor="middle" font-size="7" fill="#92400e" font-weight="600">Zn</text>
    </g>
    <text x="370" y="295" text-anchor="middle" font-size="10" fill="#7c3aed">diffusion-generated · no</text>
    <text x="370" y="309" text-anchor="middle" font-size="10" fill="#7c3aed">sequence yet</text>
  </g>

  <!-- Panel 3: ProteinMPNN scriptwriter -->
  <g>
    <rect x="500" y="80" width="200" height="240" fill="#fff" stroke="#1d4ed8" stroke-width="1.5" rx="6"/>
    <text x="600" y="105" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">3. ProteinMPNN (scriptwriter)</text>
    <text x="600" y="125" text-anchor="middle" font-size="10" fill="#6b7280">sequence for the backbone</text>
    <g class="mono" font-size="10" fill="#1e40af" transform="translate(515,150)">
      <text x="0" y="14">M K I L T D V E F G H Q</text>
      <text x="0" y="32">P R Y N C S T V A L M K</text>
      <text x="0" y="50">F G H D N E I T V S R Q</text>
      <text x="0" y="68">P L A K M G I H Y T E S</text>
      <text x="0" y="86">D F V N C R I T A L M K</text>
      <text x="0" y="104">P G H Q F E S V N D L K</text>
      <text x="0" y="122">M I R Y T C V L A G H E</text>
    </g>
    <text x="600" y="298" text-anchor="middle" font-size="9" fill="#1d4ed8" font-style="italic">~ 10 candidate sequences</text>
  </g>

  <!-- Panel 4: AlphaFold critic -->
  <g>
    <rect x="730" y="80" width="200" height="240" fill="#fff" stroke="#059669" stroke-width="1.5" rx="6"/>
    <text x="830" y="105" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">4. AlphaFold (critic)</text>
    <text x="830" y="125" text-anchor="middle" font-size="10" fill="#6b7280">does it fold back?</text>
    <!-- Compare two structures: target (purple ghost) and AF prediction (green) -->
    <g transform="translate(830,210)">
      <!-- target ghost -->
      <g opacity="0.3">
        <rect x="-50" y="-50" width="20" height="50" rx="10" fill="#7c3aed" transform="rotate(-15)"/>
        <rect x="-15" y="-55" width="20" height="55" rx="10" fill="#7c3aed" transform="rotate(20)"/>
        <rect x="20" y="-45" width="20" height="48" rx="10" fill="#7c3aed" transform="rotate(-10)"/>
      </g>
      <!-- AF prediction overlay -->
      <g>
        <rect x="-48" y="-49" width="20" height="50" rx="10" fill="none" stroke="#059669" stroke-width="2" transform="rotate(-15)"/>
        <rect x="-13" y="-54" width="20" height="55" rx="10" fill="none" stroke="#059669" stroke-width="2" transform="rotate(20)"/>
        <rect x="22" y="-44" width="20" height="48" rx="10" fill="none" stroke="#059669" stroke-width="2" transform="rotate(-10)"/>
      </g>
    </g>
    <text x="830" y="295" text-anchor="middle" font-size="10" fill="#059669" font-weight="600">RMSD &lt; 2 Å · pLDDT &gt; 80</text>
    <text x="830" y="309" text-anchor="middle" font-size="9" fill="#6b7280" font-style="italic">self-consistency check</text>
  </g>

  <!-- Panel 5: Wet lab -->
  <g>
    <rect x="960" y="80" width="200" height="240" fill="#fff" stroke="#b45309" stroke-width="1.5" rx="6"/>
    <text x="1060" y="105" text-anchor="middle" font-size="12" font-weight="600" fill="#b45309">5. Wet lab</text>
    <text x="1060" y="125" text-anchor="middle" font-size="10" fill="#6b7280">synthesise · express · test</text>
    <g font-size="10" fill="#374151" transform="translate(975,150)">
      <text x="0" y="14">▸ E. coli expression</text>
      <text x="0" y="34">▸ size-exclusion chromatography</text>
      <text x="0" y="54">▸ circular dichroism (folded?)</text>
      <text x="0" y="74">▸ X-ray / cryo-EM (validate)</text>
      <text x="0" y="94">▸ binding assay (functional?)</text>
    </g>
    <text x="1060" y="298" text-anchor="middle" font-size="11" fill="#b45309" font-weight="600">10–40% success</text>
  </g>

  <!-- Arrows between panels -->
  <g stroke="#7c3aed" stroke-width="2" fill="none">
    <line x1="240" y1="200" x2="268" y2="200" marker-end="url(#arr5)"/>
    <line x1="470" y1="200" x2="498" y2="200" marker-end="url(#arr5)"/>
    <line x1="700" y1="200" x2="728" y2="200" marker-end="url(#arr5)"/>
    <line x1="930" y1="200" x2="958" y2="200" marker-end="url(#arr5)"/>
  </g>

  <!-- Iteration arrow -->
  <path d="M 830 320 Q 830 380 600 380 Q 370 380 370 320" stroke="#dc2626" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr5)"/>
  <text x="600" y="395" text-anchor="middle" font-size="10" fill="#dc2626" font-style="italic">if AF says no — iterate</text>

  <!-- Footer -->
  <rect x="40" y="410" width="1120" height="50" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="55" y="430" font-size="11" font-weight="600" fill="#1d4ed8">Why this works</text>
  <text x="55" y="448" font-size="10" fill="#374151">RFDiffusion hallucinates plausible 3D shapes; ProteinMPNN finds sequences consistent with each shape; AlphaFold checks self-consistency before wet lab. Pre-2021: ≪ 1% of designs worked. With this loop: 10–40%.</text>
</svg>
