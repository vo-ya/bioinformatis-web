<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 460" width="1080" height="460" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }</style>
  </defs>
  <rect width="1080" height="460" fill="#fafaf9" rx="6"/>
  <text x="540" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">The AlphaFold Database — ~1,000× more predicted structures than the entire PDB history</text>

  <!-- Two-bar log-scale comparison -->
  <text x="60" y="72" font-size="11" fill="#6b7280" letter-spacing="0.06em" font-weight="600">STRUCTURE COUNT (log scale)</text>

  <!-- Log axis: 10^4 to 10^9 -->
  <!-- Width 880 -->
  <g transform="translate(80,90)">
    <line x1="0" y1="0" x2="0" y2="200" stroke="#374151"/>

    <!-- Bars -->
    <!-- PDB ~180k = 1.8e5 → log10 = 5.255; max log10 = 8.3 (200M); range 4 to 8.5 → 4.5 decades over 200 px height -->
    <!-- y from top: y = (8.5 - log10(value)) / 4.5 * 200 -->
    <!-- PDB: y_top = (8.5 - 5.255)/4.5 * 200 = 144 -->
    <!-- AF DB: y_top = (8.5 - 8.301)/4.5 * 200 = 8.8 -->

    <rect x="120" y="144" width="120" height="56" fill="#9ca3af"/>
    <text x="180" y="138" text-anchor="middle" font-size="11" fill="#374151">PDB (2021)</text>
    <text x="180" y="170" text-anchor="middle" font-size="11" class="mono" font-weight="600" fill="#fff">~ 180k</text>
    <text x="180" y="220" text-anchor="middle" font-size="9" fill="#6b7280">experimental</text>
    <text x="180" y="232" text-anchor="middle" font-size="9" fill="#6b7280">X-ray / cryo-EM / NMR</text>

    <rect x="350" y="9" width="180" height="191" fill="#1d4ed8"/>
    <text x="440" y="-2" text-anchor="middle" font-size="11" fill="#1d4ed8" font-weight="600">AlphaFold DB (2024)</text>
    <text x="440" y="55" text-anchor="middle" font-size="14" class="mono" font-weight="600" fill="#fff">~ 200 M</text>
    <text x="440" y="75" text-anchor="middle" font-size="10" fill="#fff">predicted structures</text>
    <text x="440" y="220" text-anchor="middle" font-size="9" fill="#6b7280">covers ~all of UniProt</text>

    <!-- log ticks -->
    <g class="mono" font-size="9" fill="#9ca3af">
      <line x1="-4" y1="0" x2="0" y2="0" stroke="#9ca3af"/><text x="-8" y="3" text-anchor="end">10⁸</text>
      <line x1="-4" y1="44" x2="0" y2="44" stroke="#9ca3af"/><text x="-8" y="47" text-anchor="end">10⁷</text>
      <line x1="-4" y1="89" x2="0" y2="89" stroke="#9ca3af"/><text x="-8" y="92" text-anchor="end">10⁶</text>
      <line x1="-4" y1="133" x2="0" y2="133" stroke="#9ca3af"/><text x="-8" y="136" text-anchor="end">10⁵</text>
      <line x1="-4" y1="178" x2="0" y2="178" stroke="#9ca3af"/><text x="-8" y="181" text-anchor="end">10⁴</text>
    </g>

    <!-- Annotations -->
    <text x="700" y="60" font-size="11" font-weight="600" fill="#374151">Ratio: ~ 1,000 ×</text>
    <text x="700" y="78" font-size="10" fill="#6b7280">More predicted structures in three years</text>
    <text x="700" y="92" font-size="10" fill="#6b7280">than 50 years of crystallography produced.</text>

    <text x="700" y="130" font-size="11" font-weight="600" fill="#1d4ed8">Coverage flip</text>
    <text x="700" y="148" font-size="10" fill="#374151">Pre-AF: &lt; 0.1% of proteins had any structure.</text>
    <text x="700" y="162" font-size="10" fill="#374151">Post-AF: &gt; 99% of proteins have a prediction.</text>
  </g>

  <!-- Quality breakdown -->
  <text x="60" y="350" font-size="11" fill="#6b7280" letter-spacing="0.06em" font-weight="600">PLDDT QUALITY DISTRIBUTION (~ 200 M PROTEINS)</text>

  <g transform="translate(60,360)">
    <!-- horizontal stacked bar -->
    <rect x="0" y="0" width="384" height="32" fill="#1d4ed8"/>
    <rect x="384" y="0" width="288" height="32" fill="#3b82f6"/>
    <rect x="672" y="0" width="192" height="32" fill="#facc15"/>
    <rect x="864" y="0" width="96" height="32" fill="#f59e0b"/>

    <text x="192" y="20" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">very high &gt; 90 · 40%</text>
    <text x="528" y="20" text-anchor="middle" font-size="10" fill="#fff">confident 70–90 · 30%</text>
    <text x="768" y="20" text-anchor="middle" font-size="10" fill="#92400e">low 50–70 · 20%</text>
    <text x="912" y="20" text-anchor="middle" font-size="9" fill="#fff">&lt; 50 · 10%</text>
  </g>

  <text x="540" y="426" text-anchor="middle" font-size="11" fill="#374151" font-style="italic">~70% of predictions are confident-or-better — usable for drug discovery, functional inference, evolutionary analysis.</text>
</svg>
