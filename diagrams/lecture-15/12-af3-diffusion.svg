<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 480" width="1080" height="480" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arr6" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#7c3aed"/>
    </marker>
  </defs>
  <rect width="1080" height="480" fill="#fafaf9" rx="6"/>
  <text x="540" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">AlphaFold3 — diffusion-based structure module replaces IPA, handles multi-component inputs</text>

  <!-- Forward process (top): clean → noisy -->
  <text x="60" y="62" font-size="11" font-weight="600" fill="#6b7280" letter-spacing="0.06em">FORWARD PROCESS — ADD GAUSSIAN NOISE OVER T STEPS</text>

  <g transform="translate(60,80)">
    <!-- Five frames going from clean to noisy -->
    <g>
      <rect x="0" y="0" width="160" height="100" fill="#fff" stroke="#e5e7eb"/>
      <g transform="translate(80,50)">
        <rect x="-40" y="-30" width="14" height="40" rx="7" fill="#1d4ed8" transform="rotate(-15)"/>
        <rect x="-12" y="-32" width="14" height="44" rx="7" fill="#1d4ed8" transform="rotate(20)"/>
        <rect x="20" y="-26" width="14" height="38" rx="7" fill="#1d4ed8" transform="rotate(-10)"/>
        <polygon points="-30,18 30,18 30,12 38,24 30,36 30,30 -30,30" fill="#1d4ed8" opacity="0.7"/>
      </g>
      <text x="80" y="116" text-anchor="middle" font-size="9" class="mono" fill="#6b7280">t=0 (clean)</text>
    </g>
    <g transform="translate(180,0)">
      <rect x="0" y="0" width="160" height="100" fill="#fff" stroke="#e5e7eb"/>
      <g transform="translate(80,50)" opacity="0.85">
        <rect x="-40" y="-30" width="14" height="40" rx="7" fill="#1d4ed8" transform="rotate(-15)"/>
        <rect x="-12" y="-32" width="14" height="44" rx="7" fill="#1d4ed8" transform="rotate(20)"/>
        <rect x="20" y="-26" width="14" height="38" rx="7" fill="#1d4ed8" transform="rotate(-10)"/>
      </g>
      <!-- noise dots -->
      <g fill="#9ca3af" opacity="0.5">
        <circle cx="40" cy="30" r="2"/><circle cx="60" cy="60" r="2"/><circle cx="100" cy="40" r="2"/><circle cx="130" cy="70" r="2"/>
        <circle cx="120" cy="20" r="2"/><circle cx="50" cy="20" r="2"/><circle cx="90" cy="80" r="2"/><circle cx="20" cy="80" r="2"/>
      </g>
      <text x="80" y="116" text-anchor="middle" font-size="9" class="mono" fill="#6b7280">t=T/4</text>
    </g>
    <g transform="translate(360,0)">
      <rect x="0" y="0" width="160" height="100" fill="#fff" stroke="#e5e7eb"/>
      <g transform="translate(80,50)" opacity="0.5">
        <rect x="-40" y="-30" width="14" height="40" rx="7" fill="#1d4ed8" transform="rotate(-15)"/>
        <rect x="-12" y="-32" width="14" height="44" rx="7" fill="#1d4ed8" transform="rotate(20)"/>
      </g>
      <g fill="#9ca3af" opacity="0.7">
        <!-- More noise -->
        <circle cx="20" cy="30" r="3"/><circle cx="50" cy="60" r="3"/><circle cx="80" cy="20" r="3"/><circle cx="110" cy="50" r="3"/><circle cx="140" cy="30" r="3"/>
        <circle cx="40" cy="80" r="3"/><circle cx="100" cy="80" r="3"/><circle cx="130" cy="80" r="3"/><circle cx="60" cy="40" r="3"/><circle cx="120" cy="60" r="3"/>
      </g>
      <text x="80" y="116" text-anchor="middle" font-size="9" class="mono" fill="#6b7280">t=T/2</text>
    </g>
    <g transform="translate(540,0)">
      <rect x="0" y="0" width="160" height="100" fill="#fff" stroke="#e5e7eb"/>
      <g fill="#9ca3af" opacity="0.8">
        <circle cx="20" cy="30" r="4"/><circle cx="50" cy="60" r="4"/><circle cx="80" cy="20" r="4"/><circle cx="110" cy="50" r="4"/><circle cx="140" cy="30" r="4"/>
        <circle cx="40" cy="80" r="4"/><circle cx="100" cy="80" r="4"/><circle cx="130" cy="80" r="4"/><circle cx="60" cy="40" r="4"/><circle cx="120" cy="60" r="4"/>
        <circle cx="30" cy="50" r="3"/><circle cx="70" cy="70" r="3"/><circle cx="90" cy="60" r="3"/><circle cx="125" cy="35" r="3"/>
      </g>
      <text x="80" y="116" text-anchor="middle" font-size="9" class="mono" fill="#6b7280">t=3T/4</text>
    </g>
    <g transform="translate(720,0)">
      <rect x="0" y="0" width="160" height="100" fill="#fff" stroke="#9ca3af"/>
      <g fill="#9ca3af" opacity="0.9">
        <circle cx="20" cy="30" r="4"/><circle cx="50" cy="60" r="4"/><circle cx="80" cy="20" r="4"/><circle cx="110" cy="50" r="4"/><circle cx="140" cy="30" r="4"/>
        <circle cx="40" cy="80" r="4"/><circle cx="100" cy="80" r="4"/><circle cx="130" cy="80" r="4"/><circle cx="60" cy="40" r="4"/><circle cx="120" cy="60" r="4"/>
        <circle cx="30" cy="50" r="4"/><circle cx="70" cy="70" r="4"/><circle cx="90" cy="60" r="4"/><circle cx="125" cy="35" r="4"/><circle cx="155" cy="50" r="4"/>
      </g>
      <text x="80" y="116" text-anchor="middle" font-size="9" class="mono" fill="#6b7280">t=T (pure noise)</text>
    </g>
    <!-- forward arrows -->
    <g stroke="#9ca3af" fill="none" stroke-width="1.5">
      <line x1="170" y1="50" x2="178" y2="50" marker-end="url(#arr6)"/>
      <line x1="350" y1="50" x2="358" y2="50" marker-end="url(#arr6)"/>
      <line x1="530" y1="50" x2="538" y2="50" marker-end="url(#arr6)"/>
      <line x1="710" y1="50" x2="718" y2="50" marker-end="url(#arr6)"/>
    </g>
  </g>

  <!-- Reverse process (bottom): noisy → clean, learned -->
  <text x="60" y="240" font-size="11" font-weight="600" fill="#6b7280" letter-spacing="0.06em">LEARNED REVERSE PROCESS — DENOISE CONDITIONED ON THE PAIRFORMER REPRESENTATION</text>

  <g transform="translate(60,256)">
    <g transform="translate(720,0)">
      <rect x="0" y="0" width="160" height="100" fill="#fff" stroke="#e5e7eb"/>
      <g transform="translate(80,50)">
        <rect x="-40" y="-30" width="14" height="40" rx="7" fill="#7c3aed" transform="rotate(-15)"/>
        <rect x="-12" y="-32" width="14" height="44" rx="7" fill="#7c3aed" transform="rotate(20)"/>
        <rect x="20" y="-26" width="14" height="38" rx="7" fill="#7c3aed" transform="rotate(-10)"/>
        <polygon points="-30,18 30,18 30,12 38,24 30,36 30,30 -30,30" fill="#7c3aed" opacity="0.7"/>
      </g>
      <text x="80" y="116" text-anchor="middle" font-size="9" class="mono" fill="#6b7280">t=0 (clean)</text>
    </g>
    <g transform="translate(540,0)">
      <rect x="0" y="0" width="160" height="100" fill="#fff" stroke="#e5e7eb"/>
      <g transform="translate(80,50)" opacity="0.85">
        <rect x="-40" y="-30" width="14" height="40" rx="7" fill="#7c3aed" transform="rotate(-15)"/>
        <rect x="-12" y="-32" width="14" height="44" rx="7" fill="#7c3aed" transform="rotate(20)"/>
      </g>
      <g fill="#9ca3af" opacity="0.4"><circle cx="40" cy="30" r="2"/><circle cx="120" cy="60" r="2"/></g>
      <text x="80" y="116" text-anchor="middle" font-size="9" class="mono" fill="#6b7280">t=T/4</text>
    </g>
    <g transform="translate(360,0)">
      <rect x="0" y="0" width="160" height="100" fill="#fff" stroke="#e5e7eb"/>
      <g transform="translate(80,50)" opacity="0.5">
        <rect x="-40" y="-30" width="14" height="40" rx="7" fill="#7c3aed" transform="rotate(-15)"/>
      </g>
      <g fill="#9ca3af" opacity="0.6"><circle cx="20" cy="30" r="3"/><circle cx="50" cy="60" r="3"/><circle cx="100" cy="50" r="3"/><circle cx="130" cy="30" r="3"/></g>
      <text x="80" y="116" text-anchor="middle" font-size="9" class="mono" fill="#6b7280">t=T/2</text>
    </g>
    <g transform="translate(180,0)">
      <rect x="0" y="0" width="160" height="100" fill="#fff" stroke="#e5e7eb"/>
      <g fill="#9ca3af" opacity="0.7">
        <circle cx="20" cy="30" r="4"/><circle cx="50" cy="60" r="4"/><circle cx="80" cy="20" r="4"/><circle cx="110" cy="50" r="4"/>
        <circle cx="40" cy="80" r="3"/><circle cx="100" cy="80" r="3"/><circle cx="130" cy="80" r="3"/>
      </g>
      <text x="80" y="116" text-anchor="middle" font-size="9" class="mono" fill="#6b7280">t=3T/4</text>
    </g>
    <g>
      <rect x="0" y="0" width="160" height="100" fill="#fff" stroke="#9ca3af"/>
      <g fill="#9ca3af" opacity="0.9">
        <circle cx="20" cy="30" r="4"/><circle cx="50" cy="60" r="4"/><circle cx="80" cy="20" r="4"/><circle cx="110" cy="50" r="4"/><circle cx="140" cy="30" r="4"/>
        <circle cx="40" cy="80" r="4"/><circle cx="100" cy="80" r="4"/><circle cx="130" cy="80" r="4"/><circle cx="60" cy="40" r="4"/><circle cx="120" cy="60" r="4"/>
        <circle cx="30" cy="50" r="4"/><circle cx="70" cy="70" r="4"/><circle cx="90" cy="60" r="4"/><circle cx="125" cy="35" r="4"/><circle cx="155" cy="50" r="4"/>
      </g>
      <text x="80" y="116" text-anchor="middle" font-size="9" class="mono" fill="#6b7280">t=T (start)</text>
    </g>
    <!-- reverse arrows (right to left) -->
    <g stroke="#7c3aed" fill="none" stroke-width="1.5">
      <line x1="170" y1="50" x2="170" y2="50"/>
      <line x1="178" y1="50" x2="170" y2="50" marker-end="url(#arr6)"/>
      <line x1="358" y1="50" x2="350" y2="50" marker-end="url(#arr6)"/>
      <line x1="538" y1="50" x2="530" y2="50" marker-end="url(#arr6)"/>
      <line x1="718" y1="50" x2="710" y2="50" marker-end="url(#arr6)"/>
    </g>
  </g>

  <!-- Multi-component capability inset -->
  <rect x="60" y="392" width="960" height="68" fill="#f0f9ff" stroke="#7c3aed" rx="6"/>
  <text x="75" y="412" font-size="11" font-weight="600" fill="#7c3aed">Multi-component native</text>
  <text x="75" y="430" font-size="10" fill="#374151">AF3 denoises a protein chain + a DNA chain + a small-molecule ligand <em>simultaneously</em>, producing the bound complex.</text>
  <text x="75" y="446" font-size="10" fill="#374151">AF2's IPA assumed protein-only inputs of fixed composition; diffusion handles variable-size, multi-modal output naturally.</text>

  <!-- Multi-component icons on the right -->
  <g transform="translate(900,418)">
    <rect x="0" y="0" width="40" height="14" rx="3" fill="#7c3aed"/>
    <text x="20" y="11" text-anchor="middle" font-size="9" fill="#fff">protein</text>
    <rect x="48" y="0" width="32" height="14" rx="3" fill="#0d7377"/>
    <text x="64" y="11" text-anchor="middle" font-size="9" fill="#fff">DNA</text>
    <circle cx="98" cy="7" r="6" fill="#fbbf24" stroke="#92400e"/>
    <text x="116" y="11" font-size="9" fill="#374151">ligand</text>
  </g>
</svg>
