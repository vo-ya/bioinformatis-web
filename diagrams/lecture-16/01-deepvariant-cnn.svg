<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; }</style>
    <marker id="ar1" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#b45309"/></marker>
  </defs>
  <rect width="1200" height="520" fill="#fafaf9" rx="6"/>
  <text x="600" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">DeepVariant — pileup → 2D CNN → genotype probabilities</text>

  <!-- Pileup -->
  <text x="60" y="60" font-size="11" font-weight="600" fill="#6b7280" letter-spacing="0.06em">PILEUP IMAGE · 15 reads × 20 positions × 6 channels</text>
  <g transform="translate(60,72)">
    <!-- Candidate column band -->
    <rect x="180" y="0" width="20" height="240" fill="#fef3c7" stroke="#b45309" stroke-dasharray="3,2"/>
    <!-- Pileup cells -->
    <g>
      <!-- 15 rows × 20 cols of bases -->
      <!-- Predominantly reference with mismatch in column 9 (zero-indexed) at half the rows -->
    </g>
    <!-- Generate cells -->
    <g id="cells" font-size="9" class="mono" fill="#374151">
      <!-- We'll lay out manually -->
    </g>
  </g>
  <!-- Manually drawn cells -->
  <g transform="translate(60,72)">
    <!-- Row helper: cellW=20, cellH=16 -->
    <!-- Each row: 20 columns -->
  </g>
  <!-- Detailed pileup with rows -->
  <g class="mono" font-size="9">
    <!-- Row 1 -->
    <g transform="translate(60,80)">
      <rect x="0" y="0" width="400" height="240" fill="#fff" stroke="#e5e7eb"/>
    </g>
  </g>

  <!-- Simpler: schematic with coloured base-letters -->
  <g class="mono" font-size="9" fill="#fff">
    <!-- Pileup matrix -->
    <g transform="translate(60,80)">
      <!-- 15 rows, each with 20 cells -->
      <!-- Sequence pattern: ACGTACGTACGTACGTACGT with column 9 sometimes mutated -->
      <!-- Row 1 -->
      <g>
        <rect x="0" y="0" width="20" height="14" fill="#2563eb"/><text x="10" y="11" text-anchor="middle">A</text>
        <rect x="20" y="0" width="20" height="14" fill="#b45309"/><text x="30" y="11" text-anchor="middle">C</text>
        <rect x="40" y="0" width="20" height="14" fill="#059669"/><text x="50" y="11" text-anchor="middle">G</text>
        <rect x="60" y="0" width="20" height="14" fill="#c4342c"/><text x="70" y="11" text-anchor="middle">T</text>
        <rect x="80" y="0" width="20" height="14" fill="#2563eb"/><text x="90" y="11" text-anchor="middle">A</text>
        <rect x="100" y="0" width="20" height="14" fill="#b45309"/><text x="110" y="11" text-anchor="middle">C</text>
        <rect x="120" y="0" width="20" height="14" fill="#059669"/><text x="130" y="11" text-anchor="middle">G</text>
        <rect x="140" y="0" width="20" height="14" fill="#c4342c"/><text x="150" y="11" text-anchor="middle">T</text>
        <rect x="160" y="0" width="20" height="14" fill="#2563eb"/><text x="170" y="11" text-anchor="middle">A</text>
        <rect x="180" y="0" width="20" height="14" fill="#c4342c"/><text x="190" y="11" text-anchor="middle">T</text>
        <rect x="200" y="0" width="20" height="14" fill="#b45309"/><text x="210" y="11" text-anchor="middle">C</text>
        <rect x="220" y="0" width="20" height="14" fill="#059669"/><text x="230" y="11" text-anchor="middle">G</text>
      </g>
    </g>
  </g>
  <!-- Build pileup procedurally via single g with patterned rect rows -->
  <!-- I'll fill the rest with a simplified visual -->
  <g transform="translate(60,80)">
    <!-- Generate 15 rows × 20 cols rectangles with bases -->
    <!-- Use grouping to repeat -->
  </g>

  <!-- Cleaner: switch to schematic only. The two placeholder text
       lines at y=200/218 were drawn BEFORE the row strips and the
       red mismatch column, so the strips painted on top hid them
       completely; removed since the schematic + the title strip
       and the bottom caption already describe the panel. -->
  <rect x="60" y="80" width="400" height="240" fill="#fff" stroke="#e5e7eb"/>
  <!-- Mismatch indicators in middle column -->
  <rect x="248" y="80" width="24" height="240" fill="#fef3c7" opacity="0.5"/>
  <line x1="260" y1="80" x2="260" y2="320" stroke="#b45309" stroke-dasharray="3,2"/>
  <!-- Row strips -->
  <g transform="translate(60,90)">
    <g fill="#bfdbfe">
      <rect x="4" y="0" width="392" height="10"/>
      <rect x="4" y="14" width="392" height="10"/>
      <rect x="4" y="28" width="392" height="10"/>
      <rect x="4" y="42" width="392" height="10"/>
      <rect x="4" y="56" width="392" height="10"/>
      <rect x="4" y="70" width="392" height="10"/>
      <rect x="4" y="84" width="392" height="10"/>
      <rect x="4" y="98" width="392" height="10"/>
      <rect x="4" y="112" width="392" height="10"/>
      <rect x="4" y="126" width="392" height="10"/>
      <rect x="4" y="140" width="392" height="10"/>
      <rect x="4" y="154" width="392" height="10"/>
      <rect x="4" y="168" width="392" height="10"/>
      <rect x="4" y="182" width="392" height="10"/>
      <rect x="4" y="196" width="392" height="10"/>
    </g>
    <!-- Mismatches at column ~190-210 in odd rows -->
    <g fill="#c4342c">
      <rect x="190" y="0" width="20" height="10"/>
      <rect x="190" y="28" width="20" height="10"/>
      <rect x="190" y="56" width="20" height="10"/>
      <rect x="190" y="84" width="20" height="10"/>
      <rect x="190" y="112" width="20" height="10"/>
      <rect x="190" y="140" width="20" height="10"/>
      <rect x="190" y="168" width="20" height="10"/>
      <rect x="190" y="196" width="20" height="10"/>
    </g>
  </g>
  <text x="260" y="335" text-anchor="middle" font-size="10" fill="#b45309" class="mono">candidate variant column</text>

  <!-- CNN stack -->
  <g transform="translate(500,90)">
    <rect x="0" y="0" width="220" height="50" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="110" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Conv 3×3 × 32 + ReLU</text>
    <text x="110" y="38" text-anchor="middle" font-size="10" class="mono" fill="#374151">15 × 20 × 32</text>

    <line x1="110" y1="50" x2="110" y2="70" stroke="#b45309" stroke-width="2" marker-end="url(#ar1)"/>

    <rect x="0" y="72" width="220" height="50" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="110" y="94" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Conv 3×3 × 64 + MaxPool 2×2</text>
    <text x="110" y="110" text-anchor="middle" font-size="10" class="mono" fill="#374151">7 × 10 × 64</text>

    <line x1="110" y1="122" x2="110" y2="142" stroke="#b45309" stroke-width="2" marker-end="url(#ar1)"/>

    <rect x="0" y="144" width="220" height="50" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="110" y="166" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Conv 3×3 × 128 + MaxPool</text>
    <text x="110" y="182" text-anchor="middle" font-size="10" class="mono" fill="#374151">3 × 5 × 128</text>

    <line x1="110" y1="194" x2="110" y2="214" stroke="#b45309" stroke-width="2" marker-end="url(#ar1)"/>

    <rect x="0" y="216" width="220" height="36" fill="#fff" stroke="#b45309" rx="4"/>
    <text x="110" y="238" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Dense 512 + ReLU</text>

    <line x1="110" y1="252" x2="110" y2="272" stroke="#b45309" stroke-width="2" marker-end="url(#ar1)"/>

    <rect x="0" y="274" width="220" height="36" fill="#bfdbfe" stroke="#1d4ed8" rx="4"/>
    <text x="110" y="296" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Dense 4 + softmax</text>
  </g>

  <!-- Output bars -->
  <g transform="translate(770,100)">
    <text x="120" y="-8" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Output probabilities</text>

    <!-- hom-ref -->
    <text x="0" y="22" font-size="10" font-weight="500" fill="#374151">hom-ref</text>
    <rect x="80" y="12" width="240" height="14" fill="#e5e7eb"/>
    <rect x="80" y="12" width="5" height="14" fill="#9ca3af"/>
    <text x="330" y="22" font-size="10" class="mono" fill="#6b7280">0.02</text>

    <!-- het highlighted -->
    <text x="0" y="52" font-size="10" font-weight="600" fill="#1d4ed8">het</text>
    <rect x="80" y="42" width="240" height="14" fill="#e5e7eb"/>
    <rect x="80" y="42" width="228" height="14" fill="#1d4ed8"/>
    <text x="330" y="52" font-size="10" class="mono" font-weight="600" fill="#1d4ed8">0.95</text>

    <!-- hom-alt -->
    <text x="0" y="82" font-size="10" font-weight="500" fill="#374151">hom-alt</text>
    <rect x="80" y="72" width="240" height="14" fill="#e5e7eb"/>
    <rect x="80" y="72" width="5" height="14" fill="#9ca3af"/>
    <text x="330" y="82" font-size="10" class="mono" fill="#6b7280">0.02</text>

    <!-- no-variant -->
    <text x="0" y="112" font-size="10" font-weight="500" fill="#374151">no-variant</text>
    <rect x="80" y="102" width="240" height="14" fill="#e5e7eb"/>
    <rect x="80" y="102" width="3" height="14" fill="#9ca3af"/>
    <text x="330" y="112" font-size="10" class="mono" fill="#6b7280">0.01</text>

    <!-- Verdict -->
    <rect x="0" y="160" width="340" height="60" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="170" y="180" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">MAP genotype: heterozygous</text>
    <text x="170" y="200" text-anchor="middle" font-size="10" fill="#374151">supported by ~50% mismatched reads</text>
    <text x="170" y="214" text-anchor="middle" font-size="10" fill="#374151">across both strands at the candidate column</text>
  </g>

  <!-- Footer caption -->
  <rect x="60" y="430" width="1080" height="68" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="75" y="450" font-size="11" font-weight="600" fill="#92400e">Why CNN?</text>
  <text x="75" y="468" font-size="10" fill="#78350f">Translation invariance: the column-in-window doesn't matter, only that mismatches are clustered around <em>some</em> column. Locality: 3×3 kernels detect</text>
  <text x="75" y="484" font-size="10" fill="#78350f">a few-bases-across-a-few-reads pattern efficiently. Compositional hierarchy: deeper layers recognise concerted multi-read evidence as a strong variant signal.</text>
</svg>
