<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="ar2" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#1d4ed8"/></marker>
  </defs>
  <rect width="1200" height="520" fill="#fafaf9" rx="6"/>
  <text x="600" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Enformer — dilated conv builds the receptive field, transformer routes long-range information</text>

  <!-- Input: 100 kb DNA -->
  <text x="60" y="62" font-size="11" font-weight="600" fill="#6b7280" letter-spacing="0.06em">INPUT · DNA SEQUENCE 100 KB · ONE-HOT</text>
  <rect x="60" y="72" width="1080" height="36" fill="#fff" stroke="#9ca3af"/>
  <!-- Coloured base strip -->
  <g>
    <rect x="60" y="72" width="270" height="9" fill="#2563eb"/>
    <rect x="330" y="72" width="270" height="9" fill="#b45309"/>
    <rect x="600" y="72" width="270" height="9" fill="#059669"/>
    <rect x="870" y="72" width="270" height="9" fill="#c4342c"/>
    <rect x="60" y="81" width="540" height="9" fill="#bfdbfe"/>
    <rect x="600" y="81" width="540" height="9" fill="#fef3c7"/>
    <rect x="60" y="90" width="270" height="9" fill="#a7f3d0"/>
    <rect x="330" y="90" width="270" height="9" fill="#fca5a5"/>
    <rect x="600" y="90" width="270" height="9" fill="#bfdbfe"/>
    <rect x="870" y="90" width="270" height="9" fill="#fde68a"/>
    <rect x="60" y="99" width="1080" height="9" fill="#e0e7ff"/>
  </g>
  <text x="600" y="125" text-anchor="middle" font-size="10" class="mono" fill="#6b7280">100,000 × 4</text>

  <!-- Dilated conv stack -->
  <text x="60" y="155" font-size="11" font-weight="600" fill="#6b7280" letter-spacing="0.06em">DILATED CONV STACK · LOCAL → MID-SCALE FEATURES</text>

  <g transform="translate(60,165)">
    <!-- 7 blocks -->
    <g>
      <rect x="0" y="0" width="140" height="56" fill="#dbeafe" stroke="#1d4ed8" rx="4"/>
      <text x="70" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">dilation 1</text>
      <text x="70" y="36" text-anchor="middle" class="mono" fill="#1d4ed8">RF: 3</text>
      <text x="70" y="50" text-anchor="middle" font-size="9" fill="#6b7280">motif</text>

      <rect x="155" y="0" width="140" height="56" fill="#bfdbfe" stroke="#1d4ed8" rx="4"/>
      <text x="225" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">dilation 2</text>
      <text x="225" y="36" text-anchor="middle" class="mono" fill="#1d4ed8">RF: ~7</text>

      <rect x="310" y="0" width="140" height="56" fill="#93c5fd" stroke="#1d4ed8" rx="4"/>
      <text x="380" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">dilation 4</text>
      <text x="380" y="36" text-anchor="middle" class="mono" fill="#fff">RF: ~15</text>

      <rect x="465" y="0" width="140" height="56" fill="#60a5fa" stroke="#1d4ed8" rx="4"/>
      <text x="535" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">dilation 16</text>
      <text x="535" y="36" text-anchor="middle" class="mono" fill="#fff">RF: ~63</text>

      <rect x="620" y="0" width="140" height="56" fill="#3b82f6" stroke="#1d4ed8" rx="4"/>
      <text x="690" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">dilation 64</text>
      <text x="690" y="36" text-anchor="middle" class="mono" fill="#fff">RF: ~250</text>

      <rect x="775" y="0" width="140" height="56" fill="#1d4ed8" stroke="#1d4ed8" rx="4"/>
      <text x="845" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">dilation 256</text>
      <text x="845" y="36" text-anchor="middle" class="mono" fill="#fff">RF: ~1 kb</text>

      <rect x="930" y="0" width="140" height="56" fill="#1e3a8a" stroke="#1d4ed8" rx="4"/>
      <text x="1000" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">dilation 512</text>
      <text x="1000" y="36" text-anchor="middle" class="mono" fill="#fff">RF: ~2 kb</text>
    </g>
    <!-- Arrows -->
    <g stroke="#1d4ed8" stroke-width="1.5" fill="none">
      <line x1="140" y1="28" x2="155" y2="28" marker-end="url(#ar2)"/>
      <line x1="295" y1="28" x2="310" y2="28" marker-end="url(#ar2)"/>
      <line x1="450" y1="28" x2="465" y2="28" marker-end="url(#ar2)"/>
      <line x1="605" y1="28" x2="620" y2="28" marker-end="url(#ar2)"/>
      <line x1="760" y1="28" x2="775" y2="28" marker-end="url(#ar2)"/>
      <line x1="915" y1="28" x2="930" y2="28" marker-end="url(#ar2)"/>
    </g>
  </g>

  <text x="600" y="244" text-anchor="middle" font-size="10" class="mono" fill="#6b7280">down-sampled to 1,536 positions × 768 channels</text>

  <!-- Transformer block -->
  <text x="60" y="270" font-size="11" font-weight="600" fill="#6b7280" letter-spacing="0.06em">TRANSFORMER STACK · SPARSE LONG-RANGE ROUTING</text>
  <g transform="translate(60,280)">
    <rect x="0" y="0" width="1080" height="80" fill="#1e3a8a" rx="6"/>
    <text x="540" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">11 transformer blocks · multi-head self-attention + FFN</text>
    <text x="540" y="44" text-anchor="middle" font-size="10" fill="#bfdbfe">attention routes information from distal enhancers to gene body</text>
    <text x="540" y="62" text-anchor="middle" class="mono" font-size="10" fill="#bfdbfe">attention complexity O(L²) at L=1,536 ≈ 2.4M ops/head — tractable</text>
  </g>

  <!-- Output heads -->
  <text x="60" y="386" font-size="11" font-weight="600" fill="#6b7280" letter-spacing="0.06em">OUTPUT HEADS · PER CELL TYPE</text>
  <g transform="translate(60,396)">
    <rect x="0" y="0" width="340" height="60" fill="#ccfbf1" stroke="#0d7377" rx="4"/>
    <text x="170" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#0d7377">Chromatin accessibility (DNase / ATAC)</text>
    <text x="170" y="40" text-anchor="middle" class="mono" fill="#0d7377">1,536 × 684 cell types</text>

    <rect x="370" y="0" width="340" height="60" fill="#ccfbf1" stroke="#0d7377" rx="4"/>
    <text x="540" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#0d7377">CAGE — gene expression</text>
    <text x="540" y="40" text-anchor="middle" class="mono" fill="#0d7377">1,536 × 638 cell types</text>

    <rect x="740" y="0" width="340" height="60" fill="#ccfbf1" stroke="#0d7377" rx="4"/>
    <text x="910" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#0d7377">ChIP-seq — TF binding</text>
    <text x="910" y="40" text-anchor="middle" class="mono" fill="#0d7377">1,536 × ~2,000 TF×cell</text>
  </g>

  <!-- Footer caption -->
  <rect x="60" y="476" width="1080" height="32" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="75" y="495" font-size="10" fill="#374151"><tspan font-weight="600" fill="#1d4ed8">Why hybrid?</tspan> Full self-attention at 100 kb resolution would be ~10¹⁰ ops — infeasible. Dilated conv down-samples first; attention then runs on a tractable length.</text>
</svg>
