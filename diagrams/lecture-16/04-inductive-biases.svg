<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Inductive bias / data regime cheat sheet — pick by data property, not by familiarity</text>

  <!-- Header -->
  <g>
    <rect x="40" y="50" width="1120" height="36" fill="#1f2937"/>
    <text x="160" y="73" text-anchor="middle" font-size="11" font-weight="600" fill="#fff" letter-spacing="0.06em">ARCHITECTURE</text>
    <text x="540" y="73" text-anchor="middle" font-size="11" font-weight="600" fill="#fff" letter-spacing="0.06em">KEY INDUCTIVE BIAS</text>
    <text x="940" y="73" text-anchor="middle" font-size="11" font-weight="600" fill="#fff" letter-spacing="0.06em">DATA REGIME WHERE IT WINS</text>
  </g>

  <!-- Rows -->
  <g font-size="11">
    <g transform="translate(40,86)">
      <rect width="1120" height="50" fill="#fff" stroke="#e5e7eb"/>
      <rect width="6" height="50" fill="#9ca3af"/>
      <text x="160" y="22" text-anchor="middle" font-weight="600" fill="#374151">MLP / fully-connected</text>
      <text x="160" y="38" text-anchor="middle" font-size="10" class="mono" fill="#6b7280">no structure baked in</text>
      <text x="540" y="22" text-anchor="middle" fill="#374151">none</text>
      <text x="540" y="38" text-anchor="middle" font-size="10" fill="#6b7280">treats every input dim independently</text>
      <text x="940" y="22" text-anchor="middle" fill="#374151" font-style="italic">very large data, no useful structure</text>
      <text x="940" y="38" text-anchor="middle" font-size="10" fill="#6b7280">rare in practice</text>
    </g>
    <g transform="translate(40,138)">
      <rect width="1120" height="50" fill="#fef3c7"/>
      <rect width="6" height="50" fill="#b45309"/>
      <text x="160" y="22" text-anchor="middle" font-weight="600" fill="#92400e">CNN</text>
      <text x="160" y="38" text-anchor="middle" font-size="10" class="mono" fill="#92400e">2D / 1D conv kernels</text>
      <text x="540" y="22" text-anchor="middle" fill="#374151">translation invariance + locality</text>
      <text x="540" y="38" text-anchor="middle" font-size="10" fill="#6b7280">weights shared across positions</text>
      <text x="940" y="22" text-anchor="middle" fill="#374151" font-style="italic">small-to-medium data, position matters</text>
      <text x="940" y="38" text-anchor="middle" font-size="10" fill="#6b7280">images, pileups, signal</text>
    </g>
    <g transform="translate(40,190)">
      <rect width="1120" height="50" fill="#dbeafe"/>
      <rect width="6" height="50" fill="#1d4ed8"/>
      <text x="160" y="22" text-anchor="middle" font-weight="600" fill="#1e40af">Dilated conv + transformer</text>
      <text x="160" y="38" text-anchor="middle" font-size="10" class="mono" fill="#1e40af">two-stage hybrid</text>
      <text x="540" y="22" text-anchor="middle" fill="#374151">multi-scale + long-range sparse routing</text>
      <text x="540" y="38" text-anchor="middle" font-size="10" fill="#6b7280">expanding receptive field + attention</text>
      <text x="940" y="22" text-anchor="middle" fill="#374151" font-style="italic">structured sequences with hierarchy</text>
      <text x="940" y="38" text-anchor="middle" font-size="10" fill="#6b7280">enhancers → genes ~100 kb</text>
    </g>
    <g transform="translate(40,242)">
      <rect width="1120" height="50" fill="#ede9fe"/>
      <rect width="6" height="50" fill="#7c3aed"/>
      <text x="160" y="22" text-anchor="middle" font-weight="600" fill="#6b21a8">VAE + NB likelihood</text>
      <text x="160" y="38" text-anchor="middle" font-size="10" class="mono" fill="#6b21a8">encoder–latent–decoder</text>
      <text x="540" y="22" text-anchor="middle" fill="#374151">NB likelihood + latent Gaussian prior</text>
      <text x="540" y="38" text-anchor="middle" font-size="10" fill="#6b7280">noise model matched to count data</text>
      <text x="940" y="22" text-anchor="middle" fill="#374151" font-style="italic">over-dispersed count data + batch effects</text>
      <text x="940" y="38" text-anchor="middle" font-size="10" fill="#6b7280">scRNA-seq, scATAC</text>
    </g>
    <g transform="translate(40,294)">
      <rect width="1120" height="50" fill="#ccfbf1"/>
      <rect width="6" height="50" fill="#0d7377"/>
      <text x="160" y="22" text-anchor="middle" font-weight="600" fill="#0d7377">GNN (message-passing)</text>
      <text x="160" y="38" text-anchor="middle" font-size="10" class="mono" fill="#0d7377">node + edge updates</text>
      <text x="540" y="22" text-anchor="middle" fill="#374151">permutation invariance + local aggregation</text>
      <text x="540" y="38" text-anchor="middle" font-size="10" fill="#6b7280">graph topology is the prior</text>
      <text x="940" y="22" text-anchor="middle" fill="#374151" font-style="italic">molecular / interaction graphs</text>
      <text x="940" y="38" text-anchor="middle" font-size="10" fill="#6b7280">small-molecule properties</text>
    </g>
    <g transform="translate(40,346)">
      <rect width="1120" height="50" fill="#fed7aa"/>
      <rect width="6" height="50" fill="#9a3412"/>
      <text x="160" y="22" text-anchor="middle" font-weight="600" fill="#9a3412">Equivariant transformer</text>
      <text x="160" y="38" text-anchor="middle" font-size="10" class="mono" fill="#9a3412">SE(3) ops in 3D</text>
      <text x="540" y="22" text-anchor="middle" fill="#374151">SO(3) / SE(3) equivariance</text>
      <text x="540" y="38" text-anchor="middle" font-size="10" fill="#6b7280">rotate input → rotate output</text>
      <text x="940" y="22" text-anchor="middle" fill="#374151" font-style="italic">3D geometric data</text>
      <text x="940" y="38" text-anchor="middle" font-size="10" fill="#6b7280">protein structure, molecular dynamics</text>
    </g>
    <g transform="translate(40,398)">
      <rect width="1120" height="50" fill="#fff" stroke="#e5e7eb"/>
      <rect width="6" height="50" fill="#9ca3af"/>
      <text x="160" y="22" text-anchor="middle" font-weight="600" fill="#374151">Plain transformer (base)</text>
      <text x="160" y="38" text-anchor="middle" font-size="10" class="mono" fill="#6b7280">attention everywhere</text>
      <text x="540" y="22" text-anchor="middle" fill="#374151">weak locality, attends globally</text>
      <text x="540" y="38" text-anchor="middle" font-size="10" fill="#6b7280">positional embeddings only</text>
      <text x="940" y="22" text-anchor="middle" fill="#374151" font-style="italic">very large data, learns priors itself</text>
      <text x="940" y="38" text-anchor="middle" font-size="10" fill="#6b7280">DNA / protein language models</text>
    </g>
  </g>

  <!-- Footer -->
  <rect x="40" y="466" width="1120" height="120" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="55" y="488" font-size="12" font-weight="600" fill="#991b1b">The genomics ML design rule</text>
  <text x="55" y="510" font-size="11" fill="#7f1d1d">Pick the architecture whose inductive bias matches your data's structural property. Stronger prior → more sample-efficient on matching</text>
  <text x="55" y="528" font-size="11" fill="#7f1d1d">data, worse on mismatched data. The right inductive bias buys 10×–100× data efficiency.</text>
  <text x="55" y="554" font-size="11" font-weight="600" fill="#991b1b">Mismatch is the #1 cause of genomics ML failures.</text>
  <text x="55" y="572" font-size="10" fill="#7f1d1d" font-style="italic">("More parameters" or "more data" never substitutes for the wrong inductive bias on a small dataset.)</text>
</svg>
