<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" width="1080" height="540" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }</style></defs>
  <rect width="1080" height="540" fill="#fafaf9" rx="6"/>
  <text x="540" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">The genomics labelled-data pyramid is inverted</text>

  <!-- Pyramid: 6 trapezoidal layers, narrowest at the bottom -->
  <!-- Use trapezoids: layer i has top width w_i, bottom width w_{i+1} -->
  <!-- Place from x=80, top width 800, decreases per layer -->
  <g transform="translate(80,60)">
    <!-- Layer 1: Unlabelled sequences -->
    <polygon points="0,0 760,0 720,60 40,60" fill="#dbeafe" stroke="#1d4ed8"/>
    <text x="380" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Unlabelled sequences (UniRef, NCBI, SRA)</text>
    <text x="380" y="42" text-anchor="middle" class="mono" fill="#1d4ed8">~10¹⁰ entries</text>
    <text x="380" y="56" text-anchor="middle" font-size="9" fill="#6b7280" font-style="italic">label quality: implicit only</text>

    <!-- Layer 2: Bulk RNA-seq -->
    <polygon points="40,60 720,60 680,120 80,120" fill="#bfdbfe" stroke="#1d4ed8"/>
    <text x="380" y="84" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Bulk RNA-seq (SRA, GEO)</text>
    <text x="380" y="102" text-anchor="middle" class="mono" fill="#1d4ed8">~10⁶ samples</text>
    <text x="380" y="116" text-anchor="middle" font-size="9" fill="#6b7280" font-style="italic">tissue/condition tags, often noisy</text>

    <!-- Layer 3: Single-cell -->
    <polygon points="80,120 680,120 640,180 120,180" fill="#93c5fd" stroke="#1d4ed8"/>
    <text x="380" y="144" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Single-cell transcriptomes (HCA, cellxgene)</text>
    <text x="380" y="162" text-anchor="middle" class="mono" fill="#fff">~10⁸ cells</text>
    <text x="380" y="176" text-anchor="middle" font-size="9" fill="#fff" font-style="italic">cluster labels, imperfect</text>

    <!-- Layer 4: GWAS -->
    <polygon points="120,180 640,180 600,240 160,240" fill="#60a5fa" stroke="#1d4ed8"/>
    <text x="380" y="204" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">GWAS associations</text>
    <text x="380" y="222" text-anchor="middle" class="mono" fill="#fff">~10⁵ SNP × trait pairs</text>
    <text x="380" y="236" text-anchor="middle" font-size="9" fill="#fff" font-style="italic">p-values, effect sizes</text>

    <!-- Layer 5: ClinVar -->
    <polygon points="160,240 600,240 560,300 200,300" fill="#3b82f6" stroke="#1d4ed8"/>
    <text x="380" y="264" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">ClinVar variants</text>
    <text x="380" y="282" text-anchor="middle" class="mono" fill="#fff">~10⁶ pathogenicity calls</text>
    <text x="380" y="296" text-anchor="middle" font-size="9" fill="#fff" font-style="italic">expert-curated, slow to grow</text>

    <!-- Layer 6: Functional / DMS / MPRA — narrowest -->
    <polygon points="200,300 560,300 520,360 240,360" fill="#1e3a8a" stroke="#1d4ed8"/>
    <text x="380" y="324" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">DMS / MPRA / experimental functional data</text>
    <text x="380" y="342" text-anchor="middle" class="mono" fill="#fff">~10⁴ variants per gene · ~10³ genes</text>
    <text x="380" y="356" text-anchor="middle" font-size="9" fill="#fff" font-style="italic">gold-standard, tiny</text>
  </g>

  <!-- Right-side annotation -->
  <rect x="860" y="80" width="200" height="280" fill="#fef3c7" stroke="#fcd34d" rx="6"/>
  <text x="960" y="102" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Why this shape matters</text>
  <text x="875" y="128" font-size="10" fill="#374151">Genomics ML is a self-supervised</text>
  <text x="875" y="142" font-size="10" fill="#374151">pretraining + fine-tuning field</text>
  <text x="875" y="156" font-size="10" fill="#374151">by necessity:</text>
  <text x="875" y="180" font-size="10" font-weight="600" fill="#1e40af">▸ Top is where scale lives</text>
  <text x="875" y="200" font-size="10" font-weight="600" fill="#1d4ed8">▸ Bottom is where labels live</text>
  <text x="875" y="226" font-size="10" fill="#374151">Bridge them with self-supervised</text>
  <text x="875" y="240" font-size="10" fill="#374151">pretraining (predict masked tokens),</text>
  <text x="875" y="254" font-size="10" fill="#374151">then fine-tune on the labelled tail.</text>
  <text x="875" y="284" font-size="10" font-style="italic" fill="#92400e">Compare to text:</text>
  <text x="875" y="300" font-size="9" class="mono" fill="#6b7280">trillions of tokens, clear labels</text>
  <text x="875" y="316" font-size="10" font-style="italic" fill="#92400e">vs genomics:</text>
  <text x="875" y="332" font-size="9" class="mono" fill="#6b7280">low-thousand functional outcomes</text>
  <text x="875" y="350" font-size="9" fill="#dc2626">→ harder regime</text>

  <!-- Bottom caption -->
  <rect x="80" y="450" width="900" height="74" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="95" y="472" font-size="11" font-weight="600" fill="#1d4ed8">Consequence</text>
  <text x="95" y="490" font-size="10" fill="#374151">Most genomics tasks have hundreds-to-thousands of high-quality labels. Pretraining on what's abundant + fine-tuning on what's scarce is</text>
  <text x="95" y="506" font-size="10" fill="#374151">the dominant pattern; benchmarks are noisy at small scale; transfer between related tasks is the only way many problems get solved.</text>
</svg>
