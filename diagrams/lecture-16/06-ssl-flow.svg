<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="ar3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#1d4ed8"/></marker>
  </defs>
  <rect width="1200" height="480" fill="#fafaf9" rx="6"/>
  <text x="600" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Self-supervised pretraining + fine-tuning — the dominant pattern in genomics ML</text>

  <!-- Panel 1: Unlabelled corpus -->
  <g transform="translate(40,72)">
    <rect width="240" height="180" fill="#dbeafe" stroke="#1d4ed8" rx="60"/>
    <text x="120" y="32" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Unlabelled corpus</text>
    <text x="120" y="50" text-anchor="middle" font-size="10" fill="#6b7280">UniProt / NCBI / SRA</text>
    <!-- Sample sequence strips -->
    <g class="mono" font-size="9" fill="#374151">
      <rect x="20" y="62" width="200" height="14" fill="#fff" stroke="#bfdbfe"/>
      <text x="120" y="73" text-anchor="middle">MAGLKVNFYDERQI…</text>
      <rect x="20" y="82" width="200" height="14" fill="#fff" stroke="#bfdbfe"/>
      <text x="120" y="93" text-anchor="middle">MNRTPELIVAGKHV…</text>
      <rect x="20" y="102" width="200" height="14" fill="#fff" stroke="#bfdbfe"/>
      <text x="120" y="113" text-anchor="middle">MSTQAFGRDLNLEW…</text>
      <rect x="20" y="122" width="200" height="14" fill="#fff" stroke="#bfdbfe"/>
      <text x="120" y="133" text-anchor="middle">MKPVLAYGNTRSED…</text>
    </g>
    <text x="120" y="160" text-anchor="middle" class="mono" font-size="11" font-weight="600" fill="#1e40af">~ 650 M sequences</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="290" y1="162" x2="338" y2="162" stroke="#1d4ed8" stroke-width="2.5" marker-end="url(#ar3)"/>

  <!-- Panel 2: MLM Pretraining -->
  <g transform="translate(348,72)">
    <rect width="280" height="180" fill="#fff" stroke="#1d4ed8" stroke-width="2" rx="6"/>
    <text x="140" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">MLM pretraining</text>
    <text x="140" y="40" text-anchor="middle" font-size="10" fill="#6b7280">mask 15% of tokens · predict from context</text>

    <g class="mono" font-size="11" fill="#374151" transform="translate(20,60)">
      <text x="0" y="0">M A G L K </text>
      <rect x="60" y="-12" width="20" height="16" fill="#dc2626"/>
      <text x="64" y="0" fill="#fff" font-weight="600">[?]</text>
      <text x="84" y="0">N F Y</text>
      <rect x="120" y="-12" width="20" height="16" fill="#dc2626"/>
      <text x="124" y="0" fill="#fff" font-weight="600">[?]</text>
      <text x="144" y="0">E R Q I</text>
    </g>

    <text x="140" y="100" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">predict masked → V, D</text>

    <!-- Transformer block icon -->
    <rect x="60" y="116" width="160" height="32" fill="#1e3a8a" rx="4"/>
    <text x="140" y="135" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Transformer · ~12 layers</text>

    <text x="140" y="166" text-anchor="middle" class="mono" font-size="10" fill="#1d4ed8">millions of training steps</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="638" y1="162" x2="688" y2="162" stroke="#1d4ed8" stroke-width="2.5" marker-end="url(#ar3)"/>

  <!-- Panel 3: Pretrained model checkpoint -->
  <g transform="translate(698,72)">
    <rect width="180" height="180" fill="#dcfce7" stroke="#059669" rx="6"/>
    <text x="90" y="32" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">Pretrained model</text>
    <text x="90" y="50" text-anchor="middle" font-size="10" fill="#6b7280">checkpoint</text>
    <!-- Model icon: layered blocks -->
    <g transform="translate(40,68)">
      <rect x="0" y="0" width="100" height="14" fill="#86efac"/>
      <rect x="0" y="18" width="100" height="14" fill="#86efac"/>
      <rect x="0" y="36" width="100" height="14" fill="#86efac"/>
      <rect x="0" y="54" width="100" height="14" fill="#86efac"/>
    </g>
    <text x="90" y="156" text-anchor="middle" font-size="10" fill="#374151">contextual representations</text>
    <text x="90" y="170" text-anchor="middle" class="mono" font-size="9" fill="#059669">save / freeze / fine-tune</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="888" y1="162" x2="938" y2="162" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#ar3)"/>

  <!-- Panel 4: Fine-tune -->
  <g transform="translate(948,72)">
    <rect width="220" height="180" fill="#ede9fe" stroke="#7c3aed" rx="6"/>
    <text x="110" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#6b21a8">Labelled downstream</text>
    <text x="110" y="40" text-anchor="middle" font-size="10" fill="#6b7280">small task · ~50k labels</text>

    <g class="mono" font-size="9" fill="#374151" transform="translate(15,52)">
      <rect x="0" y="0" width="190" height="14" fill="#fff" stroke="#ddd6fe"/>
      <text x="6" y="11">variant X · pathogenic</text>
      <rect x="0" y="18" width="190" height="14" fill="#fff" stroke="#ddd6fe"/>
      <text x="6" y="29">variant Y · benign</text>
      <rect x="0" y="36" width="190" height="14" fill="#fff" stroke="#ddd6fe"/>
      <text x="6" y="47">variant Z · pathogenic</text>
    </g>

    <text x="110" y="124" text-anchor="middle" font-size="10" fill="#374151">fine-tune the pretrained model</text>
    <text x="110" y="138" text-anchor="middle" font-size="10" fill="#374151">on this labelled set</text>
    <text x="110" y="160" text-anchor="middle" font-size="10" font-weight="600" fill="#6b21a8">→ deployable model</text>
  </g>

  <!-- Footer caption -->
  <rect x="40" y="284" width="1120" height="60" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="55" y="306" font-size="11" font-weight="600" fill="#1d4ed8">Why this works</text>
  <text x="55" y="324" font-size="10" fill="#374151">Pretraining uses ~100,000× more data than fine-tuning. The model learns "what kinds of sequences exist, how they behave, what's normal vs surprising"</text>
  <text x="55" y="338" font-size="10" fill="#374151">across billions of examples. Fine-tuning then needs ~10–100× fewer labelled samples than training from scratch would.</text>

  <!-- Quantitative comparison -->
  <rect x="40" y="358" width="1120" height="100" fill="#fff" stroke="#e5e7eb"/>
  <text x="55" y="380" font-size="11" font-weight="600" fill="#374151">Examples in genomics</text>
  <g class="mono" font-size="10" fill="#374151" transform="translate(55,398)">
    <text x="0" y="0">▸ ESM-2 / ESM-3 — pretrained on UniRef ~650M proteins → fine-tune on per-residue or per-protein classification (kcat, stability, binding)</text>
    <text x="0" y="16">▸ DNABERT — pretrained on the human genome ~3 Gb → fine-tune on TF binding, enhancer detection, splice site classification</text>
    <text x="0" y="32">▸ scGPT / Geneformer — pretrained on ~30 M cells → fine-tune for cell-type classification or perturbation response</text>
    <text x="0" y="48">▸ AlphaFold2 — pretrained with self-distillation on UniRef → ~93 M params end-to-end on PDB ~170 k structures</text>
  </g>
</svg>
