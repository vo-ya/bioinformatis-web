<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" width="1200" height="460" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="460" fill="#fafaf9" rx="6"/>
  <text x="600" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Random vs chromosome-aware split — leakage in correlated genomic data</text>

  <!-- Panel 1: Random split (left) — shows interleaved train/test on a chromosome -->
  <g transform="translate(40,60)">
    <rect width="560" height="180" fill="#fef2f2" stroke="#fca5a5" rx="6"/>
    <text x="280" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">Random per-position split — 80/20</text>

    <text x="20" y="56" font-size="10" font-weight="600" fill="#6b7280" letter-spacing="0.06em">CHROMOSOME 1</text>
    <!-- Chromosome bar -->
    <rect x="20" y="64" width="520" height="40" fill="#fff" stroke="#9ca3af"/>
    <!-- Random interleaved colours (10 segments, each colored randomly) -->
    <g>
      <!-- Pattern: train (cobalt) and test (amber) interleaved -->
      <rect x="20" y="64" width="40" height="40" fill="#bfdbfe"/>
      <rect x="60" y="64" width="20" height="40" fill="#fcd34d"/>
      <rect x="80" y="64" width="50" height="40" fill="#bfdbfe"/>
      <rect x="130" y="64" width="30" height="40" fill="#fcd34d"/>
      <rect x="160" y="64" width="60" height="40" fill="#bfdbfe"/>
      <rect x="220" y="64" width="20" height="40" fill="#fcd34d"/>
      <rect x="240" y="64" width="80" height="40" fill="#bfdbfe"/>
      <rect x="320" y="64" width="20" height="40" fill="#fcd34d"/>
      <rect x="340" y="64" width="40" height="40" fill="#bfdbfe"/>
      <rect x="380" y="64" width="30" height="40" fill="#fcd34d"/>
      <rect x="410" y="64" width="60" height="40" fill="#bfdbfe"/>
      <rect x="470" y="64" width="20" height="40" fill="#fcd34d"/>
      <rect x="490" y="64" width="50" height="40" fill="#bfdbfe"/>
    </g>
    <!-- Tick marks indicating SNP positions -->
    <g stroke="#374151" stroke-width="1">
      <line x1="40" y1="64" x2="40" y2="68"/>
      <line x1="80" y1="64" x2="80" y2="68"/>
      <line x1="120" y1="64" x2="120" y2="68"/>
      <line x1="160" y1="64" x2="160" y2="68"/>
      <line x1="200" y1="64" x2="200" y2="68"/>
      <line x1="240" y1="64" x2="240" y2="68"/>
      <line x1="280" y1="64" x2="280" y2="68"/>
      <line x1="320" y1="64" x2="320" y2="68"/>
      <line x1="360" y1="64" x2="360" y2="68"/>
      <line x1="400" y1="64" x2="400" y2="68"/>
      <line x1="440" y1="64" x2="440" y2="68"/>
      <line x1="480" y1="64" x2="480" y2="68"/>
      <line x1="520" y1="64" x2="520" y2="68"/>
    </g>

    <!-- Legend -->
    <rect x="20" y="120" width="14" height="10" fill="#bfdbfe"/>
    <text x="40" y="129" font-size="10" fill="#374151">train</text>
    <rect x="100" y="120" width="14" height="10" fill="#fcd34d"/>
    <text x="120" y="129" font-size="10" fill="#374151">test</text>

    <!-- Annotation. Three lines moved up by 4 (y=154/168/180 →
         y=148/162/176) so the third line's descenders at y=182
         no longer poke past the panel's bottom border at y=180
         (panel rect is 180 tall starting at this group's origin). -->
    <text x="20" y="148" font-size="10" font-weight="600" fill="#991b1b">⚠ Adjacent SNPs are in LD</text>
    <text x="20" y="162" font-size="10" fill="#7f1d1d">Test SNPs are tethered to neighbouring training SNPs;</text>
    <text x="20" y="176" font-size="10" fill="#7f1d1d">memorising the LD pattern looks like learning.</text>
  </g>

  <!-- Panel 2: Chromosome split (right) -->
  <g transform="translate(620,60)">
    <rect width="560" height="180" fill="#f0fdf4" stroke="#86efac" rx="6"/>
    <text x="280" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">Chromosome split — chr 1–21 train, chr 22 test</text>

    <text x="20" y="56" font-size="10" font-weight="600" fill="#6b7280" letter-spacing="0.06em">CHROMOSOMES 1 … 22</text>

    <!-- Chromosome bars -->
    <g transform="translate(20,64)">
      <!-- Long horizontal stack of mini chromosomes -->
      <!-- 21 train chromosomes in cobalt -->
      <g fill="#bfdbfe">
        <rect x="0" y="0" width="22" height="14"/>
        <rect x="24" y="0" width="22" height="14"/>
        <rect x="48" y="0" width="22" height="14"/>
        <rect x="72" y="0" width="22" height="14"/>
        <rect x="96" y="0" width="22" height="14"/>
        <rect x="120" y="0" width="22" height="14"/>
        <rect x="144" y="0" width="22" height="14"/>
        <rect x="0" y="18" width="22" height="14"/>
        <rect x="24" y="18" width="22" height="14"/>
        <rect x="48" y="18" width="22" height="14"/>
        <rect x="72" y="18" width="22" height="14"/>
        <rect x="96" y="18" width="22" height="14"/>
        <rect x="120" y="18" width="22" height="14"/>
        <rect x="144" y="18" width="22" height="14"/>
        <rect x="0" y="36" width="22" height="14"/>
        <rect x="24" y="36" width="22" height="14"/>
        <rect x="48" y="36" width="22" height="14"/>
        <rect x="72" y="36" width="22" height="14"/>
        <rect x="96" y="36" width="22" height="14"/>
        <rect x="120" y="36" width="22" height="14"/>
        <rect x="144" y="36" width="22" height="14"/>
      </g>
      <!-- chr 22 test (amber) -->
      <rect x="180" y="36" width="40" height="14" fill="#fcd34d"/>
      <text x="200" y="46" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">22</text>
      <!-- Numbering on first 4 -->
      <text x="11" y="11" text-anchor="middle" font-size="8" fill="#1e40af">1</text>
      <text x="35" y="11" text-anchor="middle" font-size="8" fill="#1e40af">2</text>
      <text x="59" y="11" text-anchor="middle" font-size="8" fill="#1e40af">3</text>
      <text x="83" y="11" text-anchor="middle" font-size="8" fill="#1e40af">4</text>
      <text x="107" y="11" text-anchor="middle" font-size="8" fill="#1e40af">5</text>
      <text x="131" y="11" text-anchor="middle" font-size="8" fill="#1e40af">6</text>
      <text x="155" y="11" text-anchor="middle" font-size="8" fill="#1e40af">7</text>
      <text x="11" y="29" text-anchor="middle" font-size="8" fill="#1e40af">8</text>
      <text x="35" y="29" text-anchor="middle" font-size="8" fill="#1e40af">9</text>
    </g>

    <!-- Annotation -->
    <text x="280" y="120" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">✓ Spatially separated</text>
    <text x="20" y="146" font-size="10" font-weight="600" fill="#059669">No LD bleed between train and test</text>
    <text x="20" y="162" font-size="10" fill="#374151">Tests true generalisation to unseen regions,</text>
    <text x="20" y="176" font-size="10" fill="#374151">not memorisation of LD structure.</text>
  </g>

  <!-- Bottom: similar pattern for protein homology and biobank relatedness -->
  <rect x="40" y="262" width="1140" height="180" fill="#fff" stroke="#e5e7eb"/>
  <text x="55" y="282" font-size="11" font-weight="600" fill="#6b7280" letter-spacing="0.06em">SAME PATTERN ACROSS GENOMICS DATA TYPES</text>

  <g transform="translate(55,295)">
    <text x="0" y="14" font-size="11" font-weight="600" fill="#374151">Protein sequences (random ID split)</text>
    <text x="0" y="32" font-size="10" fill="#dc2626">⚠ Homologous sequences leak across train/test</text>
    <text x="0" y="48" font-size="10" fill="#059669">✓ Cluster sequences by ≤30% identity (CD-HIT, MMseqs2); split cluster-wise</text>
    <text x="0" y="64" font-size="10" fill="#059669">✓ Time-based split (CAFA): train = sequences known by date T; test = added by T+2y</text>
  </g>

  <g transform="translate(440,295)">
    <text x="0" y="14" font-size="11" font-weight="600" fill="#374151">Biobank cohorts (random individual split)</text>
    <text x="0" y="32" font-size="10" fill="#dc2626">⚠ Cousin pairs leak via shared haplotype segments</text>
    <text x="0" y="48" font-size="10" fill="#059669">✓ Compute kinship matrix; ensure no train-test pair has kinship &gt; 0.05</text>
    <text x="0" y="64" font-size="10" fill="#059669">✓ Family-aware splitting</text>
  </g>

  <g transform="translate(815,295)">
    <text x="0" y="14" font-size="11" font-weight="600" fill="#374151">Single-cell across studies</text>
    <text x="0" y="32" font-size="10" fill="#dc2626">⚠ Random splits put correlated batch artefacts on both sides</text>
    <text x="0" y="48" font-size="10" fill="#059669">✓ Leave-one-study-out</text>
    <text x="0" y="64" font-size="10" fill="#059669">✓ Batch correction first; then split</text>
  </g>

  <text x="600" y="424" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8" font-style="italic">"Random 80/20" is a well-intentioned disaster on correlated genomics data — use blocked cross-validation.</text>
</svg>
