<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 460" width="1080" height="460" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1080" height="460" fill="#fafaf9" rx="6"/>
  <text x="540" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">DNA-LM landscape — context length is the main axis of competition</text>

  <!-- Plot area: x = 2021..2024, y = log context length 100 to 10M bp -->
  <rect x="80" y="60" width="970" height="320" fill="#fff" stroke="#e5e7eb"/>
  <text x="565" y="412" text-anchor="middle" font-size="11" fill="#374151">Year</text>
  <text x="32" y="220" text-anchor="middle" font-size="11" fill="#374151" transform="rotate(-90 32 220)">Context length (bp, log scale)</text>

  <!-- Y axis ticks: 10² 10³ 10⁴ 10⁵ 10⁶ 10⁷ -->
  <g class="mono" fill="#9ca3af">
    <line x1="76" y1="350" x2="80" y2="350" stroke="#9ca3af"/><text x="72" y="353" text-anchor="end">10²</text>
    <line x1="76" y1="290" x2="80" y2="290" stroke="#9ca3af"/><text x="72" y="293" text-anchor="end">10³</text>
    <line x1="76" y1="230" x2="80" y2="230" stroke="#9ca3af"/><text x="72" y="233" text-anchor="end">10⁴</text>
    <line x1="76" y1="170" x2="80" y2="170" stroke="#9ca3af"/><text x="72" y="173" text-anchor="end">10⁵</text>
    <line x1="76" y1="110" x2="80" y2="110" stroke="#9ca3af"/><text x="72" y="113" text-anchor="end">10⁶</text>
    <line x1="76" y1="80" x2="80" y2="80" stroke="#9ca3af"/><text x="72" y="83" text-anchor="end">10⁷</text>
  </g>

  <!-- X axis ticks: 2021, 2022, 2023, 2024 -->
  <g class="mono" fill="#6b7280" font-size="11">
    <line x1="160" y1="380" x2="160" y2="384" stroke="#374151"/><text x="160" y="398" text-anchor="middle">2021</text>
    <line x1="400" y1="380" x2="400" y2="384" stroke="#374151"/><text x="400" y="398" text-anchor="middle">2022</text>
    <line x1="640" y1="380" x2="640" y2="384" stroke="#374151"/><text x="640" y="398" text-anchor="middle">2023</text>
    <line x1="880" y1="380" x2="880" y2="384" stroke="#374151"/><text x="880" y="398" text-anchor="middle">2024</text>
  </g>

  <!-- Grid lines -->
  <g stroke="#f3f4f6">
    <line x1="80" y1="350" x2="1050" y2="350"/>
    <line x1="80" y1="290" x2="1050" y2="290"/>
    <line x1="80" y1="230" x2="1050" y2="230"/>
    <line x1="80" y1="170" x2="1050" y2="170"/>
    <line x1="80" y1="110" x2="1050" y2="110"/>
  </g>

  <!-- Models -->
  <!-- DNABERT 2021, 512 bp, 100M params; log10(512)=2.71; y interp: 350 - (2.71-2)/(7-2)*270 = 350 - 38.3 = 311.7 -->
  <g transform="translate(160,303)">
    <circle cx="0" cy="0" r="10" fill="#1d4ed8"/>
    <text x="0" y="-16" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">DNABERT</text>
    <text x="0" y="22" text-anchor="middle" class="mono" fill="#6b7280">512 bp · 100M</text>
  </g>

  <!-- Nucleotide Transformer 2023, 12 kb, 2.5B; log10(12000)=4.08 → y: 350 - (4.08-2)/5*270 = 350 - 112 = 238 -->
  <g transform="translate(640,238)">
    <circle cx="0" cy="0" r="14" fill="#1d4ed8"/>
    <text x="0" y="-22" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Nucleotide Transformer</text>
    <text x="0" y="-8" text-anchor="middle" font-size="10" fill="#6b7280">InstaDeep</text>
    <text x="0" y="28" text-anchor="middle" class="mono" fill="#6b7280">12 kb · 2.5B</text>
  </g>

  <!-- HyenaDNA 2023 mid, 1Mb, ~1B params; log10(1e6)=6 → y: 350 - (6-2)/5*270 = 350 - 216 = 134; we'll place x at later 2023 ~720 -->
  <g transform="translate(720,134)">
    <circle cx="0" cy="0" r="12" fill="#7c3aed"/>
    <text x="0" y="-18" text-anchor="middle" font-size="11" font-weight="600" fill="#6b21a8">HyenaDNA</text>
    <text x="0" y="-4" text-anchor="middle" font-size="10" fill="#6b7280">Stanford</text>
    <text x="0" y="24" text-anchor="middle" class="mono" fill="#6b7280">1 Mb · 1.6B · linear cost</text>
  </g>

  <!-- Evo 2024, 131 kb, 7B; log10(131000)=5.12 → y: 350 - 3.12/5*270 = 350 - 168 = 182 -->
  <g transform="translate(880,182)">
    <circle cx="0" cy="0" r="14" fill="#059669"/>
    <text x="0" y="-22" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">Evo</text>
    <text x="0" y="-8" text-anchor="middle" font-size="10" fill="#6b7280">Arc Institute</text>
    <text x="0" y="26" text-anchor="middle" class="mono" fill="#6b7280">131 kb · 7B · cross-species</text>
  </g>

  <!-- Annotation -->
  <rect x="80" y="78" width="220" height="84" fill="#fef3c7" stroke="#fcd34d" rx="4"/>
  <text x="190" y="98" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Context-length axis</text>
  <text x="92" y="118" font-size="10" fill="#374151">Determines what scale of regulation</text>
  <text x="92" y="132" font-size="10" fill="#374151">is learnable: motif → enhancer →</text>
  <text x="92" y="146" font-size="10" fill="#374151">long-range, eventually full genome.</text>

  <!-- Footer -->
  <rect x="40" y="420" width="1000" height="32" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="55" y="440" font-size="10" fill="#374151"><tspan font-weight="600" fill="#1d4ed8">Honest assessment 2025:</tspan> moderate gains on regulatory prediction, decisive only for cross-species transfer; specialised models like Enformer still win on their own tasks.</text>
</svg>
