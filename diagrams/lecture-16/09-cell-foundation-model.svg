<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 480" width="1080" height="480" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="ar4" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#7c3aed"/></marker>
  </defs>
  <rect width="1080" height="480" fill="#fafaf9" rx="6"/>
  <text x="540" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Cell foundation model — scGPT / Geneformer style</text>

  <!-- Input: gene-expression vector tokenised -->
  <text x="60" y="62" font-size="11" font-weight="600" fill="#6b7280" letter-spacing="0.06em">INPUT · CELL'S GENE EXPRESSION VECTOR (~ 20K GENES)</text>

  <g transform="translate(60,72)">
    <rect width="600" height="50" fill="#fff" stroke="#e5e7eb"/>
    <g class="mono" font-size="10" fill="#374151" transform="translate(20,28)">
      <text x="0" y="0">[ACTB: 14, GAPDH: 22, MYH9: 8, CD8A: 0, PTPRC: 11, CD19: 2, MS4A1: 0, IL2RA: 5, …]</text>
    </g>
    <text x="300" y="44" text-anchor="middle" font-size="9" fill="#6b7280" font-style="italic">2 × 10⁴ genes · counts or normalised values</text>
  </g>

  <!-- Tokenisation block -->
  <text x="60" y="142" font-size="11" font-weight="600" fill="#6b7280" letter-spacing="0.06em">TOKENISATION CHOICE</text>

  <g transform="translate(60,152)">
    <rect width="200" height="60" fill="#ede9fe" stroke="#7c3aed" rx="4"/>
    <text x="100" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#6b21a8">Geneformer</text>
    <text x="100" y="38" text-anchor="middle" font-size="9" fill="#374151">rank-value — order genes</text>
    <text x="100" y="52" text-anchor="middle" font-size="9" fill="#374151">by expression, use rank</text>

    <rect x="220" y="0" width="200" height="60" fill="#ede9fe" stroke="#7c3aed" rx="4"/>
    <text x="320" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#6b21a8">scGPT</text>
    <text x="320" y="38" text-anchor="middle" font-size="9" fill="#374151">binned value + gene ID</text>
    <text x="320" y="52" text-anchor="middle" font-size="9" fill="#374151">as parallel channels</text>

    <rect x="440" y="0" width="200" height="60" fill="#ede9fe" stroke="#7c3aed" rx="4"/>
    <text x="540" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#6b21a8">scFoundation</text>
    <text x="540" y="38" text-anchor="middle" font-size="9" fill="#374151">per-gene real-valued</text>
    <text x="540" y="52" text-anchor="middle" font-size="9" fill="#374151">expression embedding</text>

    <rect x="660" y="0" width="200" height="60" fill="#ede9fe" stroke="#7c3aed" rx="4"/>
    <text x="760" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#6b21a8">UCE</text>
    <text x="760" y="38" text-anchor="middle" font-size="9" fill="#374151">cross-species shared</text>
    <text x="760" y="52" text-anchor="middle" font-size="9" fill="#374151">gene embedding</text>
  </g>

  <!-- Down arrow -->
  <line x1="450" y1="218" x2="450" y2="240" stroke="#7c3aed" stroke-width="2" marker-end="url(#ar4)"/>

  <!-- Transformer stack -->
  <text x="60" y="262" font-size="11" font-weight="600" fill="#6b7280" letter-spacing="0.06em">TRANSFORMER · 12–24 BLOCKS</text>
  <g transform="translate(60,272)">
    <rect width="780" height="80" fill="#6b21a8" rx="6"/>
    <text x="390" y="32" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">multi-head self-attention + FFN</text>
    <text x="390" y="52" text-anchor="middle" font-size="10" fill="#ddd6fe">cells × genes attended together · 10–50 M parameters typical</text>
    <text x="390" y="68" text-anchor="middle" class="mono" fill="#ddd6fe">pretrained on ~30 M cells</text>
  </g>

  <!-- Down arrow -->
  <line x1="450" y1="358" x2="450" y2="378" stroke="#7c3aed" stroke-width="2" marker-end="url(#ar4)"/>

  <!-- Output: cell-level embedding -->
  <g transform="translate(60,388)">
    <rect width="780" height="50" fill="#dcfce7" stroke="#059669" rx="4"/>
    <text x="390" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">Cell-level embedding</text>
    <text x="390" y="40" text-anchor="middle" font-size="10" fill="#374151">256–1024 dim vector per cell · downstream: cell-type classification, perturbation prediction, cross-species alignment</text>
  </g>

  <!-- Right-side caveat -->
  <rect x="860" y="152" width="200" height="290" fill="#fef2f2" stroke="#fca5a5" rx="6"/>
  <text x="960" y="174" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">⚠ Honest read</text>
  <text x="875" y="200" font-size="10" fill="#374151">Specialised methods still win</text>
  <text x="875" y="214" font-size="10" fill="#374151">on specialised tasks:</text>
  <text x="875" y="234" font-size="10" class="mono" fill="#7c2d12">▸ scVI for integration</text>
  <text x="875" y="248" font-size="10" class="mono" fill="#7c2d12">▸ Harmony for batch correction</text>
  <text x="875" y="262" font-size="10" class="mono" fill="#7c2d12">▸ CellTypist for cell-typing</text>

  <text x="875" y="290" font-size="10" fill="#374151">Many "scGPT beats X"</text>
  <text x="875" y="304" font-size="10" fill="#374151">headlines don't survive a</text>
  <text x="875" y="318" font-size="10" fill="#374151">leave-one-study-out</text>
  <text x="875" y="332" font-size="10" fill="#374151">protocol vs the specialised</text>
  <text x="875" y="346" font-size="10" fill="#374151">tool's own benchmark.</text>

  <text x="875" y="376" font-size="10" font-weight="600" fill="#991b1b">Audit:</text>
  <text x="875" y="392" font-size="10" fill="#374151">→ pretraining corpus?</text>
  <text x="875" y="406" font-size="10" fill="#374151">→ split protocol?</text>
  <text x="875" y="420" font-size="10" fill="#374151">→ baseline tool?</text>
  <text x="875" y="434" font-size="10" fill="#374151">→ how much "fine-tuning"?</text>
</svg>
