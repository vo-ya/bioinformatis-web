<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 460" width="1080" height="460" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }</style></defs>
  <rect width="1080" height="460" fill="#fafaf9" rx="6"/>
  <text x="540" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Leakage case studies — as-reported vs leakage-aware accuracy</text>

  <!-- Plot area -->
  <rect x="100" y="60" width="900" height="320" fill="#fff" stroke="#e5e7eb"/>

  <!-- Y axis -->
  <g font-size="10" fill="#6b7280" class="mono">
    <line x1="96" y1="370" x2="100" y2="370" stroke="#374151"/><text x="92" y="373" text-anchor="end">0%</text>
    <line x1="96" y1="308" x2="100" y2="308" stroke="#374151"/><text x="92" y="311" text-anchor="end">20%</text>
    <line x1="96" y1="246" x2="100" y2="246" stroke="#374151"/><text x="92" y="249" text-anchor="end">40%</text>
    <line x1="96" y1="184" x2="100" y2="184" stroke="#374151"/><text x="92" y="187" text-anchor="end">60%</text>
    <line x1="96" y1="122" x2="100" y2="122" stroke="#374151"/><text x="92" y="125" text-anchor="end">80%</text>
    <line x1="96" y1="60" x2="100" y2="60" stroke="#374151"/><text x="92" y="63" text-anchor="end">100%</text>
  </g>
  <text x="48" y="220" text-anchor="middle" font-size="11" fill="#374151" transform="rotate(-90 48 220)">Reported accuracy</text>

  <!-- Grid -->
  <g stroke="#f3f4f6">
    <line x1="100" y1="308" x2="1000" y2="308"/>
    <line x1="100" y1="246" x2="1000" y2="246"/>
    <line x1="100" y1="184" x2="1000" y2="184"/>
    <line x1="100" y1="122" x2="1000" y2="122"/>
  </g>

  <!-- Three case studies with paired bars -->
  <!-- y_value = 370 - val * (370-60)/100 = 370 - val*3.1 -->

  <!-- Case 1: Protein function 2015 — 95% to 45% -->
  <g transform="translate(180,0)">
    <text x="0" y="404" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Protein function, 2015</text>
    <text x="0" y="420" text-anchor="middle" font-size="10" fill="#6b7280">naive ID split → CAFA time-split</text>
    <rect x="-70" y="76" width="60" height="294" fill="#dc2626"/>
    <text x="-40" y="68" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">95%</text>
    <rect x="10" y="231" width="60" height="139" fill="#059669"/>
    <text x="40" y="223" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">45%</text>
    <text x="-40" y="395" text-anchor="middle" font-size="9" fill="#dc2626">as reported</text>
    <text x="40" y="395" text-anchor="middle" font-size="9" fill="#059669">tightened</text>
  </g>

  <!-- Case 2: Cancer driver 2016 — 99% to 70% -->
  <g transform="translate(540,0)">
    <text x="0" y="404" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Cancer driver pred., 2016</text>
    <text x="0" y="420" text-anchor="middle" font-size="10" fill="#6b7280">overlap with known DBs → independent split</text>
    <rect x="-70" y="63" width="60" height="307" fill="#dc2626"/>
    <text x="-40" y="55" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">99%</text>
    <rect x="10" y="153" width="60" height="217" fill="#059669"/>
    <text x="40" y="145" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">70%</text>
    <text x="-40" y="395" text-anchor="middle" font-size="9" fill="#dc2626">as reported</text>
    <text x="40" y="395" text-anchor="middle" font-size="9" fill="#059669">tightened</text>
  </g>

  <!-- Case 3: Enformer 2021 — Pearson 0.82 to 0.74 -->
  <g transform="translate(900,0)">
    <text x="0" y="404" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Enformer, 2021</text>
    <text x="0" y="420" text-anchor="middle" font-size="10" fill="#6b7280">chr split → tightened chr split (Pearson)</text>
    <rect x="-70" y="116" width="60" height="254" fill="#dc2626"/>
    <text x="-40" y="108" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">0.82</text>
    <rect x="10" y="141" width="60" height="229" fill="#059669"/>
    <text x="40" y="133" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">0.74</text>
    <text x="-40" y="395" text-anchor="middle" font-size="9" fill="#dc2626">as reported</text>
    <text x="40" y="395" text-anchor="middle" font-size="9" fill="#059669">tightened</text>
  </g>

  <!-- Footer -->
  <rect x="40" y="430" width="1000" height="20" fill="none"/>
  <text x="540" y="446" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">Reproducing any genomics-ML paper should start by auditing its split. The corrected number is usually the honest one.</text>
</svg>
