<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="720" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Information theory in genomics — entropy, motifs, the genetic code as ECC</text>

  <!-- Top-left: Sequence entropy + IC -->
  <g transform="translate(40,60)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#525252">SEQUENCE ENTROPY AND INFORMATION CONTENT</text>

    <!-- Sequence logo for a TF motif -->
    <g transform="translate(0,18)">
      <text x="0" y="14" font-size="10" fill="#374151">TF binding motif (sequence logo):</text>
      <g transform="translate(20,30)">
        <!-- 8-position logo, IC values varying -->
        <!-- Position 1: low IC ~0.5, mostly mixed -->
        <g transform="translate(0,0)">
          <text x="20" y="46" text-anchor="middle" font-size="14" font-weight="700" fill="#059669" transform="scaleY(0.4) translate(0,69)">A</text>
          <text x="20" y="58" text-anchor="middle" font-size="9" fill="#525252">~0.5 bits</text>
        </g>
        <!-- Position 2: low IC -->
        <g transform="translate(40,0)">
          <text x="20" y="46" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af" transform="scaleY(0.5) translate(0,46)">C</text>
          <text x="20" y="58" text-anchor="middle" font-size="9" fill="#525252">~0.7 bits</text>
        </g>
        <!-- Position 3: high IC -->
        <g transform="translate(80,0)">
          <text x="20" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#c4342c" transform="scaleY(1.0) translate(0,0)">G</text>
          <text x="20" y="58" text-anchor="middle" font-size="9" fill="#525252">2.0 bits</text>
        </g>
        <!-- Position 4: high IC -->
        <g transform="translate(120,0)">
          <text x="20" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#c4342c" transform="scaleY(1.0) translate(0,0)">G</text>
          <text x="20" y="58" text-anchor="middle" font-size="9" fill="#525252">2.0 bits</text>
        </g>
        <!-- Position 5: medium IC -->
        <g transform="translate(160,0)">
          <text x="20" y="46" text-anchor="middle" font-size="18" font-weight="700" fill="#b45309" transform="scaleY(0.85) translate(0,8)">T</text>
          <text x="20" y="58" text-anchor="middle" font-size="9" fill="#525252">1.5 bits</text>
        </g>
        <!-- Position 6: high IC -->
        <g transform="translate(200,0)">
          <text x="20" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#1e40af" transform="scaleY(1.0) translate(0,0)">C</text>
          <text x="20" y="58" text-anchor="middle" font-size="9" fill="#525252">2.0 bits</text>
        </g>
        <!-- Position 7: medium -->
        <g transform="translate(240,0)">
          <text x="20" y="46" text-anchor="middle" font-size="18" font-weight="700" fill="#059669" transform="scaleY(0.7) translate(0,16)">A</text>
          <text x="20" y="58" text-anchor="middle" font-size="9" fill="#525252">1.0 bit</text>
        </g>
        <!-- Position 8: low IC -->
        <g transform="translate(280,0)">
          <text x="20" y="46" text-anchor="middle" font-size="14" font-weight="700" fill="#525252" transform="scaleY(0.4) translate(0,69)">N</text>
          <text x="20" y="58" text-anchor="middle" font-size="9" fill="#525252">~0.3 bits</text>
        </g>
        <!-- Baseline -->
        <line x1="0" y1="46" x2="320" y2="46" stroke="#a8a29e"/>
      </g>
    </g>

    <text x="180" y="120" text-anchor="middle" font-size="10" fill="#525252">total motif IC ≈ 10 bits → strong matched-filter signal vs random DNA</text>

    <!-- Formula -->
    <g transform="translate(0,142)">
      <rect width="500" height="50" fill="#dbeafe" stroke="#1d4ed8" rx="3"/>
      <text x="14" y="20" font-size="10" font-weight="600" fill="#1e3a8a">Per-position information content</text>
      <text x="14" y="38" font-size="11" class="mono" fill="#525252">IC_i = log₂|Σ| − H_i = 2 − ( −Σ_b p_{i,b} log₂ p_{i,b} )</text>
    </g>
  </g>

  <!-- Top-right: Mutual information -->
  <g transform="translate(580,60)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#525252">MUTUAL INFORMATION FOR COEVOLUTION</text>

    <!-- MSA columns + MI matrix -->
    <g transform="translate(0,18)">
      <text x="0" y="14" font-size="10" fill="#374151">protein MSA columns i, j:</text>
    </g>

    <!-- 5x5 MI heatmap -->
    <g transform="translate(0,40)">
      <text x="-8" y="14" text-anchor="end" font-size="9" fill="#525252">i=1</text>
      <text x="-8" y="34" text-anchor="end" font-size="9" fill="#525252">i=2</text>
      <text x="-8" y="54" text-anchor="end" font-size="9" fill="#525252">i=3</text>
      <text x="-8" y="74" text-anchor="end" font-size="9" fill="#525252">i=4</text>
      <text x="-8" y="94" text-anchor="end" font-size="9" fill="#525252">i=5</text>

      <text x="14" y="-4" text-anchor="middle" font-size="9" fill="#525252">j=1</text>
      <text x="34" y="-4" text-anchor="middle" font-size="9" fill="#525252">j=2</text>
      <text x="54" y="-4" text-anchor="middle" font-size="9" fill="#525252">j=3</text>
      <text x="74" y="-4" text-anchor="middle" font-size="9" fill="#525252">j=4</text>
      <text x="94" y="-4" text-anchor="middle" font-size="9" fill="#525252">j=5</text>

      <!-- diag self -->
      <rect x="0"  y="0"  width="20" height="20" fill="#525252" fill-opacity="0.2"/>
      <rect x="20" y="20" width="20" height="20" fill="#525252" fill-opacity="0.2"/>
      <rect x="40" y="40" width="20" height="20" fill="#525252" fill-opacity="0.2"/>
      <rect x="60" y="60" width="20" height="20" fill="#525252" fill-opacity="0.2"/>
      <rect x="80" y="80" width="20" height="20" fill="#525252" fill-opacity="0.2"/>

      <!-- High MI: 1-5 (coevolving) -->
      <rect x="80" y="0" width="20" height="20" fill="#c4342c" fill-opacity="0.9"/>
      <rect x="0" y="80" width="20" height="20" fill="#c4342c" fill-opacity="0.9"/>

      <!-- Medium MI: 2-4 -->
      <rect x="60" y="20" width="20" height="20" fill="#b45309" fill-opacity="0.6"/>
      <rect x="20" y="60" width="20" height="20" fill="#b45309" fill-opacity="0.6"/>

      <!-- Low MI cells -->
      <rect x="20" y="0" width="20" height="20" fill="#525252" fill-opacity="0.1"/>
      <rect x="40" y="0" width="20" height="20" fill="#525252" fill-opacity="0.1"/>
      <rect x="60" y="0" width="20" height="20" fill="#525252" fill-opacity="0.1"/>
      <rect x="0" y="20" width="20" height="20" fill="#525252" fill-opacity="0.1"/>
      <rect x="40" y="20" width="20" height="20" fill="#525252" fill-opacity="0.1"/>
      <rect x="80" y="20" width="20" height="20" fill="#525252" fill-opacity="0.1"/>
      <rect x="0" y="40" width="20" height="20" fill="#525252" fill-opacity="0.1"/>
      <rect x="20" y="40" width="20" height="20" fill="#525252" fill-opacity="0.1"/>
      <rect x="60" y="40" width="20" height="20" fill="#525252" fill-opacity="0.1"/>
      <rect x="80" y="40" width="20" height="20" fill="#525252" fill-opacity="0.1"/>
      <rect x="0" y="60" width="20" height="20" fill="#525252" fill-opacity="0.1"/>
      <rect x="40" y="60" width="20" height="20" fill="#525252" fill-opacity="0.1"/>
      <rect x="80" y="60" width="20" height="20" fill="#525252" fill-opacity="0.1"/>
      <rect x="20" y="80" width="20" height="20" fill="#525252" fill-opacity="0.1"/>
      <rect x="40" y="80" width="20" height="20" fill="#525252" fill-opacity="0.1"/>
      <rect x="60" y="80" width="20" height="20" fill="#525252" fill-opacity="0.1"/>
    </g>

    <!-- Annotation -->
    <g transform="translate(140,40)" font-size="10" fill="#525252">
      <text x="0" y="14">Pos 1 ↔ pos 5: high MI</text>
      <text x="0" y="28">→ likely 3D contact</text>
      <text x="0" y="42">→ AlphaFold MSA signal</text>
      <text x="0" y="64">Pos 2 ↔ pos 4: moderate MI</text>
      <text x="0" y="78">→ secondary contact</text>
    </g>

    <!-- Formula -->
    <g transform="translate(0,160)">
      <rect width="500" height="34" fill="#dbeafe" stroke="#1d4ed8" rx="3"/>
      <text x="14" y="14" font-size="10" font-weight="600" fill="#1e3a8a">Mutual information</text>
      <text x="14" y="28" font-size="11" class="mono" fill="#525252">I(X;Y) = ΣΣ p(x,y) log₂ [ p(x,y) / (p(x)p(y)) ]</text>
    </g>
  </g>

  <!-- Middle: Genetic code as ECC -->
  <g transform="translate(40,300)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#525252">THE GENETIC CODE AS AN ERROR-CORRECTING CODE</text>

    <!-- Codon table coloured by mutation tolerance -->
    <g transform="translate(20,18)">
      <text x="0" y="14" font-size="10" fill="#374151">Codon table — colour = robustness to single-base mutation:</text>
    </g>

    <!-- Simplified 4×16 table showing wobble structure -->
    <g transform="translate(20,40)">
      <!-- Row labels: first base -->
      <text x="-6" y="22" text-anchor="end" font-size="10" font-weight="600" class="mono" fill="#525252">U</text>
      <text x="-6" y="62" text-anchor="end" font-size="10" font-weight="600" class="mono" fill="#525252">C</text>
      <text x="-6" y="102" text-anchor="end" font-size="10" font-weight="600" class="mono" fill="#525252">A</text>
      <text x="-6" y="142" text-anchor="end" font-size="10" font-weight="600" class="mono" fill="#525252">G</text>

      <!-- Column groups for second base -->
      <text x="40"  y="-4" text-anchor="middle" font-size="10" font-weight="600" class="mono" fill="#525252">U</text>
      <text x="120" y="-4" text-anchor="middle" font-size="10" font-weight="600" class="mono" fill="#525252">C</text>
      <text x="200" y="-4" text-anchor="middle" font-size="10" font-weight="600" class="mono" fill="#525252">A</text>
      <text x="280" y="-4" text-anchor="middle" font-size="10" font-weight="600" class="mono" fill="#525252">G</text>

      <!-- Row 1 (U_): UU{U,C,A,G} CU... -->
      <!-- UU box (U_U_): Phe Phe Leu Leu - 2nd base = U -->
      <g transform="translate(0,0)">
        <rect x="0"   y="0" width="80" height="40" fill="#dcfce7" stroke="#a8a29e"/>
        <text x="20" y="14" font-size="9" class="mono" fill="#374151">UUU Phe</text>
        <text x="60" y="14" font-size="9" class="mono" fill="#374151">UUC Phe</text>
        <text x="20" y="30" font-size="9" class="mono" fill="#374151">UUA Leu</text>
        <text x="60" y="30" font-size="9" class="mono" fill="#374151">UUG Leu</text>
      </g>
      <!-- UC: Ser×4 -->
      <g transform="translate(80,0)">
        <rect x="0"   y="0" width="80" height="40" fill="#86efac" stroke="#a8a29e"/>
        <text x="20" y="14" font-size="9" class="mono" fill="#374151">UCU Ser</text>
        <text x="60" y="14" font-size="9" class="mono" fill="#374151">UCC Ser</text>
        <text x="20" y="30" font-size="9" class="mono" fill="#374151">UCA Ser</text>
        <text x="60" y="30" font-size="9" class="mono" fill="#374151">UCG Ser</text>
      </g>
      <!-- UA: Tyr Tyr Stop Stop -->
      <g transform="translate(160,0)">
        <rect x="0"   y="0" width="80" height="40" fill="#fef3c7" stroke="#a8a29e"/>
        <text x="20" y="14" font-size="9" class="mono" fill="#374151">UAU Tyr</text>
        <text x="60" y="14" font-size="9" class="mono" fill="#374151">UAC Tyr</text>
        <text x="20" y="30" font-size="9" class="mono" fill="#525252">UAA *</text>
        <text x="60" y="30" font-size="9" class="mono" fill="#525252">UAG *</text>
      </g>
      <!-- UG: Cys Cys Stop Trp -->
      <g transform="translate(240,0)">
        <rect x="0"   y="0" width="80" height="40" fill="#fef3c7" stroke="#a8a29e"/>
        <text x="20" y="14" font-size="9" class="mono" fill="#374151">UGU Cys</text>
        <text x="60" y="14" font-size="9" class="mono" fill="#374151">UGC Cys</text>
        <text x="20" y="30" font-size="9" class="mono" fill="#525252">UGA *</text>
        <text x="60" y="30" font-size="9" class="mono" fill="#374151">UGG Trp</text>
      </g>

      <!-- Row 2 (C_): CU CC CA CG -->
      <g transform="translate(0,40)">
        <rect x="0"   y="0" width="80" height="40" fill="#86efac" stroke="#a8a29e"/>
        <text x="20" y="14" font-size="9" class="mono" fill="#374151">CUU Leu</text>
        <text x="60" y="14" font-size="9" class="mono" fill="#374151">CUC Leu</text>
        <text x="20" y="30" font-size="9" class="mono" fill="#374151">CUA Leu</text>
        <text x="60" y="30" font-size="9" class="mono" fill="#374151">CUG Leu</text>
      </g>
      <g transform="translate(80,40)">
        <rect x="0"   y="0" width="80" height="40" fill="#86efac" stroke="#a8a29e"/>
        <text x="20" y="14" font-size="9" class="mono" fill="#374151">CCU Pro</text>
        <text x="60" y="14" font-size="9" class="mono" fill="#374151">CCC Pro</text>
        <text x="20" y="30" font-size="9" class="mono" fill="#374151">CCA Pro</text>
        <text x="60" y="30" font-size="9" class="mono" fill="#374151">CCG Pro</text>
      </g>
      <g transform="translate(160,40)">
        <rect x="0"   y="0" width="80" height="40" fill="#dcfce7" stroke="#a8a29e"/>
        <text x="20" y="14" font-size="9" class="mono" fill="#374151">CAU His</text>
        <text x="60" y="14" font-size="9" class="mono" fill="#374151">CAC His</text>
        <text x="20" y="30" font-size="9" class="mono" fill="#374151">CAA Gln</text>
        <text x="60" y="30" font-size="9" class="mono" fill="#374151">CAG Gln</text>
      </g>
      <g transform="translate(240,40)">
        <rect x="0"   y="0" width="80" height="40" fill="#86efac" stroke="#a8a29e"/>
        <text x="20" y="14" font-size="9" class="mono" fill="#374151">CGU Arg</text>
        <text x="60" y="14" font-size="9" class="mono" fill="#374151">CGC Arg</text>
        <text x="20" y="30" font-size="9" class="mono" fill="#374151">CGA Arg</text>
        <text x="60" y="30" font-size="9" class="mono" fill="#374151">CGG Arg</text>
      </g>

      <!-- Row 3 (A_) -->
      <g transform="translate(0,80)">
        <rect x="0"   y="0" width="80" height="40" fill="#dcfce7" stroke="#a8a29e"/>
        <text x="20" y="14" font-size="9" class="mono" fill="#374151">AUU Ile</text>
        <text x="60" y="14" font-size="9" class="mono" fill="#374151">AUC Ile</text>
        <text x="20" y="30" font-size="9" class="mono" fill="#374151">AUA Ile</text>
        <text x="60" y="30" font-size="9" class="mono" fill="#374151">AUG Met</text>
      </g>
      <g transform="translate(80,80)">
        <rect x="0"   y="0" width="80" height="40" fill="#86efac" stroke="#a8a29e"/>
        <text x="20" y="14" font-size="9" class="mono" fill="#374151">ACU Thr</text>
        <text x="60" y="14" font-size="9" class="mono" fill="#374151">ACC Thr</text>
        <text x="20" y="30" font-size="9" class="mono" fill="#374151">ACA Thr</text>
        <text x="60" y="30" font-size="9" class="mono" fill="#374151">ACG Thr</text>
      </g>
      <g transform="translate(160,80)">
        <rect x="0"   y="0" width="80" height="40" fill="#dcfce7" stroke="#a8a29e"/>
        <text x="20" y="14" font-size="9" class="mono" fill="#374151">AAU Asn</text>
        <text x="60" y="14" font-size="9" class="mono" fill="#374151">AAC Asn</text>
        <text x="20" y="30" font-size="9" class="mono" fill="#374151">AAA Lys</text>
        <text x="60" y="30" font-size="9" class="mono" fill="#374151">AAG Lys</text>
      </g>
      <g transform="translate(240,80)">
        <rect x="0"   y="0" width="80" height="40" fill="#fef3c7" stroke="#a8a29e"/>
        <text x="20" y="14" font-size="9" class="mono" fill="#374151">AGU Ser</text>
        <text x="60" y="14" font-size="9" class="mono" fill="#374151">AGC Ser</text>
        <text x="20" y="30" font-size="9" class="mono" fill="#374151">AGA Arg</text>
        <text x="60" y="30" font-size="9" class="mono" fill="#374151">AGG Arg</text>
      </g>

      <!-- Row 4 (G_) -->
      <g transform="translate(0,120)">
        <rect x="0"   y="0" width="80" height="40" fill="#86efac" stroke="#a8a29e"/>
        <text x="20" y="14" font-size="9" class="mono" fill="#374151">GUU Val</text>
        <text x="60" y="14" font-size="9" class="mono" fill="#374151">GUC Val</text>
        <text x="20" y="30" font-size="9" class="mono" fill="#374151">GUA Val</text>
        <text x="60" y="30" font-size="9" class="mono" fill="#374151">GUG Val</text>
      </g>
      <g transform="translate(80,120)">
        <rect x="0"   y="0" width="80" height="40" fill="#86efac" stroke="#a8a29e"/>
        <text x="20" y="14" font-size="9" class="mono" fill="#374151">GCU Ala</text>
        <text x="60" y="14" font-size="9" class="mono" fill="#374151">GCC Ala</text>
        <text x="20" y="30" font-size="9" class="mono" fill="#374151">GCA Ala</text>
        <text x="60" y="30" font-size="9" class="mono" fill="#374151">GCG Ala</text>
      </g>
      <g transform="translate(160,120)">
        <rect x="0"   y="0" width="80" height="40" fill="#dcfce7" stroke="#a8a29e"/>
        <text x="20" y="14" font-size="9" class="mono" fill="#374151">GAU Asp</text>
        <text x="60" y="14" font-size="9" class="mono" fill="#374151">GAC Asp</text>
        <text x="20" y="30" font-size="9" class="mono" fill="#374151">GAA Glu</text>
        <text x="60" y="30" font-size="9" class="mono" fill="#374151">GAG Glu</text>
      </g>
      <g transform="translate(240,120)">
        <rect x="0"   y="0" width="80" height="40" fill="#86efac" stroke="#a8a29e"/>
        <text x="20" y="14" font-size="9" class="mono" fill="#374151">GGU Gly</text>
        <text x="60" y="14" font-size="9" class="mono" fill="#374151">GGC Gly</text>
        <text x="20" y="30" font-size="9" class="mono" fill="#374151">GGA Gly</text>
        <text x="60" y="30" font-size="9" class="mono" fill="#374151">GGG Gly</text>
      </g>
    </g>

    <!-- Legend -->
    <g transform="translate(380,40)" font-size="10">
      <text x="0" y="0" font-weight="600" fill="#374151">Robustness colouring</text>

      <rect x="0" y="14" width="14" height="14" fill="#86efac"/>
      <text x="20" y="25" fill="#374151">all 4 codons → same AA (perfect 3rd-base wobble)</text>

      <rect x="0" y="34" width="14" height="14" fill="#dcfce7"/>
      <text x="20" y="45" fill="#374151">2+2 split (most synonymous)</text>

      <rect x="0" y="54" width="14" height="14" fill="#fef3c7"/>
      <text x="20" y="65" fill="#374151">irregular (Stop / Trp / Met)</text>

      <text x="0" y="98" font-weight="600" fill="#374151">Why it's an ECC:</text>
      <text x="0" y="114" fill="#525252">— 3rd-base mutations: usually silent (wobble)</text>
      <text x="0" y="130" fill="#525252">— 1st-base: usually similar AA (charge / hydrophob.)</text>
      <text x="0" y="146" fill="#525252">— 2nd-base: most disruptive — biggest AA change</text>

      <text x="0" y="174" font-style="italic" fill="#92400e">Freeland &amp; Hurst 1998: real code is in</text>
      <text x="0" y="188" font-style="italic" fill="#92400e">top 0.02% of random codes for damage</text>
      <text x="0" y="202" font-style="italic" fill="#92400e">minimisation. Natural error correction.</text>
    </g>
  </g>

  <!-- Bottom annotation -->
  <rect x="40" y="660" width="1120" height="48" fill="#fef3c7" stroke="#b45309" rx="4"/>
  <text x="600" y="680" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">EE framing — inductive bias is a generalised channel-coding problem</text>
  <text x="600" y="696" text-anchor="middle" font-size="10" fill="#92400e">Coding theory's rate-distortion trade-off ↔ ML's hypothesis-class-vs-data-efficiency trade-off. Same maths, different domain.</text>
</svg>
