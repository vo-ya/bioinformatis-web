<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#525252"/>
    </marker>
  </defs>
  <rect width="1200" height="540" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Research vs clinical pipeline — same shape, different rules</text>

  <!-- Top band: research -->
  <text x="60" y="80" font-size="11" font-weight="600" fill="#525252">RESEARCH</text>
  <text x="60" y="96" font-size="10" fill="#6b7280">months TAT · publication grade · tool versions float</text>

  <g transform="translate(60,110)">
    <g>
      <rect x="0"   y="0" width="150" height="60" fill="#f5f5f4" stroke="#a8a29e" rx="4"/>
      <text x="75" y="26" text-anchor="middle" font-size="12" fill="#374151">Sample</text>
      <text x="75" y="46" text-anchor="middle" font-size="9" fill="#6b7280">1-off analyses</text>
    </g>
    <g transform="translate(170,0)">
      <rect x="0" y="0" width="150" height="60" fill="#f5f5f4" stroke="#a8a29e" rx="4"/>
      <text x="75" y="26" text-anchor="middle" font-size="12" fill="#374151">Sequence</text>
      <text x="75" y="46" text-anchor="middle" font-size="9" fill="#6b7280">latest chemistry</text>
    </g>
    <g transform="translate(340,0)">
      <rect x="0" y="0" width="150" height="60" fill="#f5f5f4" stroke="#a8a29e" rx="4"/>
      <text x="75" y="26" text-anchor="middle" font-size="12" fill="#374151">Align</text>
      <text x="75" y="46" text-anchor="middle" font-size="9" fill="#6b7280">latest BWA / minimap2</text>
    </g>
    <g transform="translate(510,0)">
      <rect x="0" y="0" width="150" height="60" fill="#f5f5f4" stroke="#a8a29e" rx="4"/>
      <text x="75" y="26" text-anchor="middle" font-size="12" fill="#374151">Variant call</text>
      <text x="75" y="46" text-anchor="middle" font-size="9" fill="#6b7280">DeepVariant / GATK</text>
    </g>
    <g transform="translate(680,0)">
      <rect x="0" y="0" width="150" height="60" fill="#f5f5f4" stroke="#a8a29e" rx="4"/>
      <text x="75" y="26" text-anchor="middle" font-size="12" fill="#374151">Analysis</text>
      <text x="75" y="46" text-anchor="middle" font-size="9" fill="#6b7280">notebook / R / Python</text>
    </g>
    <g transform="translate(850,0)">
      <rect x="0" y="0" width="170" height="60" fill="#f5f5f4" stroke="#a8a29e" rx="4"/>
      <text x="85" y="26" text-anchor="middle" font-size="12" fill="#374151">Manuscript</text>
      <text x="85" y="46" text-anchor="middle" font-size="9" fill="#6b7280">peer review</text>
    </g>
    <g stroke="#525252" stroke-width="1" fill="none" marker-end="url(#arr)">
      <line x1="150" y1="30" x2="170" y2="30"/>
      <line x1="320" y1="30" x2="340" y2="30"/>
      <line x1="490" y1="30" x2="510" y2="30"/>
      <line x1="660" y1="30" x2="680" y2="30"/>
      <line x1="830" y1="30" x2="850" y2="30"/>
    </g>
  </g>

  <!-- Regulatory boundary divider -->
  <line x1="60" y1="220" x2="1140" y2="220" stroke="#b45309" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="600" y="238" text-anchor="middle" font-size="11" font-weight="600" fill="#b45309">Regulatory boundary — everything below is regulated software</text>

  <!-- Bottom band: clinical -->
  <text x="60" y="270" font-size="11" font-weight="600" fill="#1e40af">CLINICAL</text>
  <text x="60" y="286" font-size="10" fill="#6b7280">3–14 day TAT · physician-signed · every version pinned by MD5</text>

  <g transform="translate(60,300)">
    <g>
      <rect x="0" y="0" width="150" height="80" fill="#dbeafe" stroke="#1d4ed8" rx="4"/>
      <rect x="0" y="0" width="6" height="80" fill="#b45309"/>
      <text x="78" y="24" text-anchor="middle" font-size="12" fill="#1e3a8a">Sample</text>
      <text x="78" y="42" text-anchor="middle" font-size="9" fill="#6b7280">chain-of-custody</text>
      <text x="78" y="56" text-anchor="middle" font-size="9" fill="#6b7280">UUID + barcode</text>
      <text x="78" y="70" text-anchor="middle" font-size="9" fill="#b45309">SOP-documented</text>
    </g>
    <g transform="translate(155,0)">
      <rect x="0" y="0" width="135" height="80" fill="#dbeafe" stroke="#1d4ed8" rx="4"/>
      <rect x="0" y="0" width="6" height="80" fill="#b45309"/>
      <text x="70" y="24" text-anchor="middle" font-size="12" fill="#1e3a8a">Sequence</text>
      <text x="70" y="42" text-anchor="middle" font-size="9" fill="#6b7280">pinned reagent lot</text>
      <text x="70" y="56" text-anchor="middle" font-size="9" fill="#6b7280">IVD chemistry</text>
      <text x="70" y="70" text-anchor="middle" font-size="9" fill="#b45309">CLIA-audited</text>
    </g>
    <g transform="translate(295,0)">
      <rect x="0" y="0" width="135" height="80" fill="#dbeafe" stroke="#1d4ed8" rx="4"/>
      <rect x="0" y="0" width="6" height="80" fill="#b45309"/>
      <text x="70" y="24" text-anchor="middle" font-size="12" fill="#1e3a8a">Align</text>
      <text x="70" y="42" text-anchor="middle" font-size="9" fill="#6b7280">pinned reference</text>
      <text x="70" y="56" text-anchor="middle" class="mono" fill="#6b7280">md5: a1b2c3…</text>
      <text x="70" y="70" text-anchor="middle" font-size="9" fill="#b45309">version-locked</text>
    </g>
    <g transform="translate(435,0)">
      <rect x="0" y="0" width="140" height="80" fill="#dbeafe" stroke="#1d4ed8" rx="4"/>
      <rect x="0" y="0" width="6" height="80" fill="#b45309"/>
      <text x="73" y="24" text-anchor="middle" font-size="12" fill="#1e3a8a">Variant call</text>
      <text x="73" y="42" text-anchor="middle" font-size="9" fill="#6b7280">validated SOP</text>
      <text x="73" y="56" text-anchor="middle" font-size="9" fill="#6b7280">on HG002 GIAB</text>
      <text x="73" y="70" text-anchor="middle" font-size="9" fill="#b45309">vali-doc current</text>
    </g>
    <g transform="translate(580,0)">
      <rect x="0" y="0" width="140" height="80" fill="#dbeafe" stroke="#1d4ed8" rx="4"/>
      <rect x="0" y="0" width="6" height="80" fill="#b45309"/>
      <text x="73" y="24" text-anchor="middle" font-size="12" fill="#1e3a8a">Curation</text>
      <text x="73" y="42" text-anchor="middle" font-size="9" fill="#6b7280">named variant</text>
      <text x="73" y="56" text-anchor="middle" font-size="9" fill="#6b7280">scientist (M.Sc/PhD)</text>
      <text x="73" y="70" text-anchor="middle" font-size="9" fill="#b45309">ACMG/AMP rules</text>
    </g>
    <g transform="translate(725,0)">
      <rect x="0" y="0" width="155" height="80" fill="#dbeafe" stroke="#1d4ed8" rx="4"/>
      <rect x="0" y="0" width="6" height="80" fill="#b45309"/>
      <text x="80" y="24" text-anchor="middle" font-size="12" fill="#1e3a8a">Signed report</text>
      <text x="80" y="42" text-anchor="middle" font-size="9" fill="#6b7280">physician signature</text>
      <text x="80" y="56" text-anchor="middle" font-size="9" fill="#6b7280">date + UUID</text>
      <text x="80" y="70" text-anchor="middle" font-size="9" fill="#b45309">CAP-audited</text>
    </g>
    <g transform="translate(885,0)">
      <rect x="0" y="0" width="135" height="80" fill="#dbeafe" stroke="#1d4ed8" rx="4"/>
      <rect x="0" y="0" width="6" height="80" fill="#b45309"/>
      <text x="70" y="24" text-anchor="middle" font-size="12" fill="#1e3a8a">EHR</text>
      <text x="70" y="42" text-anchor="middle" font-size="9" fill="#6b7280">structured deposit</text>
      <text x="70" y="56" text-anchor="middle" font-size="9" fill="#6b7280">FHIR / HL7</text>
      <text x="70" y="70" text-anchor="middle" font-size="9" fill="#b45309">audit trail</text>
    </g>
    <g stroke="#1d4ed8" stroke-width="1" fill="none" marker-end="url(#arr)">
      <line x1="150" y1="40" x2="160" y2="40"/>
      <line x1="290" y1="40" x2="300" y2="40"/>
      <line x1="430" y1="40" x2="440" y2="40"/>
      <line x1="575" y1="40" x2="585" y2="40"/>
      <line x1="720" y1="40" x2="730" y2="40"/>
      <line x1="880" y1="40" x2="890" y2="40"/>
    </g>
  </g>

  <text x="600" y="430" text-anchor="middle" font-size="11" fill="#525252">Same six-stage shape; clinical track adds version pinning, named human curation, audit trails, and a physician's signature on every report.</text>
  <text x="600" y="448" text-anchor="middle" font-size="10" fill="#6b7280">Rerunning a clinical pipeline a year later must produce <tspan font-weight="600">bit-identical</tspan> output — that's what makes the clinical decision legally defensible.</text>
</svg>
