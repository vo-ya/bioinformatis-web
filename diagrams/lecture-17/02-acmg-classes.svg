<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="520" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">ACMG/AMP five-class output — probability, action, distribution</text>

  <!-- Top: 5-class spectrum -->
  <text x="60" y="68" font-size="11" font-weight="600" fill="#525252">CLASSIFICATION SPECTRUM</text>

  <g transform="translate(60,82)">
    <!-- Five segments -->
    <rect x="0"   y="0" width="216" height="56" fill="#1e3a8a"/>
    <rect x="216" y="0" width="216" height="56" fill="#6e88c8"/>
    <rect x="432" y="0" width="216" height="56" fill="#525252"/>
    <rect x="648" y="0" width="216" height="56" fill="#b45309"/>
    <rect x="864" y="0" width="216" height="56" fill="#c4342c"/>

    <text x="108" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">B</text>
    <text x="108" y="42" text-anchor="middle" font-size="9" fill="#dbeafe">Benign</text>

    <text x="324" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">LB</text>
    <text x="324" y="42" text-anchor="middle" font-size="9" fill="#dbeafe">Likely benign</text>

    <text x="540" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">VUS</text>
    <text x="540" y="42" text-anchor="middle" font-size="9" fill="#e5e7eb">Uncertain significance</text>

    <text x="756" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">LP</text>
    <text x="756" y="42" text-anchor="middle" font-size="9" fill="#fef3c7">Likely pathogenic</text>

    <text x="972" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">P</text>
    <text x="972" y="42" text-anchor="middle" font-size="9" fill="#fee2e2">Pathogenic</text>
  </g>

  <!-- Probability + action labels -->
  <g transform="translate(60,150)">
    <text x="108" y="0" text-anchor="middle" font-size="10" fill="#374151">≤ 0.1% pathogenic</text>
    <text x="108" y="16" text-anchor="middle" font-size="10" fill="#6b7280">not reported</text>

    <text x="324" y="0" text-anchor="middle" font-size="10" fill="#374151">0.1–10%</text>
    <text x="324" y="16" text-anchor="middle" font-size="10" fill="#6b7280">not reported</text>

    <text x="540" y="0" text-anchor="middle" font-size="10" fill="#374151">10–90%</text>
    <text x="540" y="16" text-anchor="middle" font-size="10" fill="#6b7280">reported · no action</text>

    <text x="756" y="0" text-anchor="middle" font-size="10" fill="#374151">90–99%</text>
    <text x="756" y="16" text-anchor="middle" font-size="10" fill="#6b7280">reported · actionable</text>

    <text x="972" y="0" text-anchor="middle" font-size="10" fill="#374151">≥ 99%</text>
    <text x="972" y="16" text-anchor="middle" font-size="10" fill="#6b7280">reported · actionable</text>
  </g>

  <!-- Bottom: real-world distribution -->
  <text x="60" y="232" font-size="11" font-weight="600" fill="#525252">CLINICAL EXOME DISTRIBUTION (per gene-of-interest)</text>

  <!-- Histogram base axis -->
  <g transform="translate(60,260)">
    <line x1="0" y1="160" x2="1080" y2="160" stroke="#a8a29e"/>
    <line x1="0" y1="0" x2="0" y2="160" stroke="#a8a29e"/>
    <text x="-10" y="160" text-anchor="end" font-size="9" fill="#6b7280">0%</text>
    <text x="-10" y="80" text-anchor="end" font-size="9" fill="#6b7280">25%</text>
    <text x="-10" y="0" text-anchor="end" font-size="9" fill="#6b7280">50%</text>

    <!-- B (~50%) -->
    <rect x="40"  y="0"   width="136" height="160" fill="#1e3a8a" fill-opacity="0.18" stroke="#1e3a8a"/>
    <text x="108" y="-8" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">~50%</text>
    <!-- LB (~30%) -->
    <rect x="216" y="64"  width="136" height="96"  fill="#6e88c8" fill-opacity="0.22" stroke="#6e88c8"/>
    <text x="284" y="56" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">~30%</text>
    <!-- VUS (~15%) -->
    <rect x="392" y="112" width="136" height="48"  fill="#525252" fill-opacity="0.25" stroke="#525252"/>
    <text x="460" y="104" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">~15%</text>
    <!-- LP (~3%) -->
    <rect x="568" y="144" width="136" height="16"  fill="#b45309" fill-opacity="0.32" stroke="#b45309"/>
    <text x="636" y="136" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">~3%</text>
    <!-- P (~2%) -->
    <rect x="744" y="148" width="136" height="12"  fill="#c4342c" fill-opacity="0.35" stroke="#c4342c"/>
    <text x="812" y="140" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">~2%</text>

    <!-- annotations -->
    <text x="108" y="180" text-anchor="middle" font-size="10" fill="#525252">B</text>
    <text x="284" y="180" text-anchor="middle" font-size="10" fill="#525252">LB</text>
    <text x="460" y="180" text-anchor="middle" font-size="10" fill="#525252">VUS</text>
    <text x="636" y="180" text-anchor="middle" font-size="10" fill="#525252">LP</text>
    <text x="812" y="180" text-anchor="middle" font-size="10" fill="#525252">P</text>
  </g>

  <text x="600" y="488" text-anchor="middle" font-size="11" fill="#525252">VUS reclassification is a continuous field-wide effort — today's VUS is tomorrow's P or LB as ClinVar / functional studies / family data accumulate.</text>
</svg>
