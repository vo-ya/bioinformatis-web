<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" width="1200" height="640" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; }</style></defs>
  <rect width="1200" height="640" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">ACMG/AMP evidence codes — 28 codes, two columns, gradient by strength</text>

  <!-- Column headers -->
  <g transform="translate(40,52)">
    <rect width="560" height="34" fill="#7f1d1d"/>
    <text x="280" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#fff" letter-spacing="0.04em">PATHOGENIC EVIDENCE</text>
  </g>
  <g transform="translate(610,52)">
    <rect width="550" height="34" fill="#1e3a8a"/>
    <text x="275" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#fff" letter-spacing="0.04em">BENIGN EVIDENCE</text>
  </g>

  <!-- Pathogenic column rows -->
  <g transform="translate(40,90)">
    <!-- PVS1 -->
    <g><rect width="560" height="34" fill="#fee2e2"/><rect width="6" height="34" fill="#7f1d1d"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#7f1d1d" class="mono">PVS1</text>
      <text x="80" y="14" font-size="9" font-weight="600" fill="#991b1b" letter-spacing="0.04em">VERY STRONG</text>
      <text x="80" y="28" font-size="11" fill="#374151">LoF in gene where LoF is a known mechanism</text>
    </g>
    <!-- PS1 -->
    <g transform="translate(0,38)"><rect width="560" height="34" fill="#fecaca"/><rect width="6" height="34" fill="#991b1b"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#7f1d1d" class="mono">PS1</text>
      <text x="80" y="14" font-size="9" font-weight="600" fill="#991b1b" letter-spacing="0.04em">STRONG</text>
      <text x="80" y="28" font-size="11" fill="#374151">Same amino-acid change as known pathogenic</text>
    </g>
    <g transform="translate(0,76)"><rect width="560" height="34" fill="#fecaca"/><rect width="6" height="34" fill="#991b1b"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#7f1d1d" class="mono">PS2</text>
      <text x="80" y="14" font-size="9" font-weight="600" fill="#991b1b" letter-spacing="0.04em">STRONG</text>
      <text x="80" y="28" font-size="11" fill="#374151">De novo with confirmed parentage</text>
    </g>
    <g transform="translate(0,114)"><rect width="560" height="34" fill="#fecaca"/><rect width="6" height="34" fill="#991b1b"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#7f1d1d" class="mono">PS3</text>
      <text x="80" y="14" font-size="9" font-weight="600" fill="#991b1b" letter-spacing="0.04em">STRONG</text>
      <text x="80" y="28" font-size="11" fill="#374151">Functional studies show damaging effect</text>
    </g>
    <g transform="translate(0,152)"><rect width="560" height="34" fill="#fecaca"/><rect width="6" height="34" fill="#991b1b"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#7f1d1d" class="mono">PS4</text>
      <text x="80" y="14" font-size="9" font-weight="600" fill="#991b1b" letter-spacing="0.04em">STRONG</text>
      <text x="80" y="28" font-size="11" fill="#374151">Significant enrichment in cases vs controls</text>
    </g>
    <!-- PM1-6 -->
    <g transform="translate(0,190)"><rect width="560" height="28" fill="#fde6c7"/><rect width="6" height="28" fill="#b45309"/>
      <text x="20" y="19" font-size="11" font-weight="700" fill="#92400e" class="mono">PM1</text>
      <text x="74" y="12" font-size="8" font-weight="600" fill="#92400e">MOD</text>
      <text x="74" y="22" font-size="10" fill="#374151">Hotspot or critical functional domain</text>
    </g>
    <g transform="translate(0,222)"><rect width="560" height="28" fill="#fde6c7"/><rect width="6" height="28" fill="#b45309"/>
      <text x="20" y="19" font-size="11" font-weight="700" fill="#92400e" class="mono">PM2</text>
      <text x="74" y="12" font-size="8" font-weight="600" fill="#92400e">MOD</text>
      <text x="74" y="22" font-size="10" fill="#374151">Absent / ultra-rare in gnomAD</text>
    </g>
    <g transform="translate(0,254)"><rect width="560" height="28" fill="#fde6c7"/><rect width="6" height="28" fill="#b45309"/>
      <text x="20" y="19" font-size="11" font-weight="700" fill="#92400e" class="mono">PM3</text>
      <text x="74" y="12" font-size="8" font-weight="600" fill="#92400e">MOD</text>
      <text x="74" y="22" font-size="10" fill="#374151">In trans with pathogenic in recessive disease</text>
    </g>
    <g transform="translate(0,286)"><rect width="560" height="28" fill="#fde6c7"/><rect width="6" height="28" fill="#b45309"/>
      <text x="20" y="19" font-size="11" font-weight="700" fill="#92400e" class="mono">PM4</text>
      <text x="74" y="12" font-size="8" font-weight="600" fill="#92400e">MOD</text>
      <text x="74" y="22" font-size="10" fill="#374151">Protein-length change (in-frame indel / stop-loss)</text>
    </g>
    <g transform="translate(0,318)"><rect width="560" height="28" fill="#fde6c7"/><rect width="6" height="28" fill="#b45309"/>
      <text x="20" y="19" font-size="11" font-weight="700" fill="#92400e" class="mono">PM5</text>
      <text x="74" y="12" font-size="8" font-weight="600" fill="#92400e">MOD</text>
      <text x="74" y="22" font-size="10" fill="#374151">Different missense at same residue is pathogenic</text>
    </g>
    <g transform="translate(0,350)"><rect width="560" height="28" fill="#fde6c7"/><rect width="6" height="28" fill="#b45309"/>
      <text x="20" y="19" font-size="11" font-weight="700" fill="#92400e" class="mono">PM6</text>
      <text x="74" y="12" font-size="8" font-weight="600" fill="#92400e">MOD</text>
      <text x="74" y="22" font-size="10" fill="#374151">Assumed de novo without confirmed parentage</text>
    </g>
    <!-- PP1-5 -->
    <g transform="translate(0,382)"><rect width="560" height="26" fill="#fef3c7"/><rect width="6" height="26" fill="#d97706"/>
      <text x="20" y="18" font-size="11" font-weight="700" fill="#92400e" class="mono">PP1</text>
      <text x="74" y="12" font-size="8" font-weight="600" fill="#a16207">SUPP</text>
      <text x="74" y="22" font-size="10" fill="#374151">Co-segregation with disease in family</text>
    </g>
    <g transform="translate(0,412)"><rect width="560" height="26" fill="#fef3c7"/><rect width="6" height="26" fill="#d97706"/>
      <text x="20" y="18" font-size="11" font-weight="700" fill="#92400e" class="mono">PP2</text>
      <text x="74" y="12" font-size="8" font-weight="600" fill="#a16207">SUPP</text>
      <text x="74" y="22" font-size="10" fill="#374151">Missense in low-benign-missense gene</text>
    </g>
    <g transform="translate(0,442)"><rect width="560" height="26" fill="#fef3c7"/><rect width="6" height="26" fill="#d97706"/>
      <text x="20" y="18" font-size="11" font-weight="700" fill="#92400e" class="mono">PP3</text>
      <text x="74" y="12" font-size="8" font-weight="600" fill="#a16207">SUPP</text>
      <text x="74" y="22" font-size="10" fill="#374151">Multiple in-silico predictors agree damaging</text>
    </g>
    <g transform="translate(0,472)"><rect width="560" height="26" fill="#fef3c7"/><rect width="6" height="26" fill="#d97706"/>
      <text x="20" y="18" font-size="11" font-weight="700" fill="#92400e" class="mono">PP4</text>
      <text x="74" y="12" font-size="8" font-weight="600" fill="#a16207">SUPP</text>
      <text x="74" y="22" font-size="10" fill="#374151">Highly-specific phenotype for the disease</text>
    </g>
    <g transform="translate(0,502)"><rect width="560" height="26" fill="#f5f5f4"/><rect width="6" height="26" fill="#a8a29e"/>
      <text x="20" y="18" font-size="11" font-weight="600" fill="#a8a29e" text-decoration="line-through" class="mono">PP5</text>
      <text x="74" y="12" font-size="8" font-weight="600" fill="#a8a29e">DEPRECATED</text>
      <text x="74" y="22" font-size="10" fill="#a8a29e">Reported pathogenic in reputable source (2018)</text>
    </g>
  </g>

  <!-- Benign column rows -->
  <g transform="translate(610,90)">
    <!-- BA1 -->
    <g><rect width="550" height="34" fill="#fde68a"/><rect width="6" height="34" fill="#b45309"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#92400e" class="mono">BA1</text>
      <text x="80" y="14" font-size="9" font-weight="600" fill="#92400e" letter-spacing="0.04em">STAND-ALONE</text>
      <text x="80" y="28" font-size="11" fill="#374151">Allele frequency ≥ 5% in gnomAD</text>
    </g>
    <!-- BS1-4 -->
    <g transform="translate(0,38)"><rect width="550" height="34" fill="#bfdbfe"/><rect width="6" height="34" fill="#1e40af"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#1e3a8a" class="mono">BS1</text>
      <text x="80" y="14" font-size="9" font-weight="600" fill="#1e40af" letter-spacing="0.04em">STRONG</text>
      <text x="80" y="28" font-size="11" fill="#374151">Frequency inconsistent with disease prevalence</text>
    </g>
    <g transform="translate(0,76)"><rect width="550" height="34" fill="#bfdbfe"/><rect width="6" height="34" fill="#1e40af"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#1e3a8a" class="mono">BS2</text>
      <text x="80" y="14" font-size="9" font-weight="600" fill="#1e40af" letter-spacing="0.04em">STRONG</text>
      <text x="80" y="28" font-size="11" fill="#374151">Observed in healthy adults</text>
    </g>
    <g transform="translate(0,114)"><rect width="550" height="34" fill="#bfdbfe"/><rect width="6" height="34" fill="#1e40af"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#1e3a8a" class="mono">BS3</text>
      <text x="80" y="14" font-size="9" font-weight="600" fill="#1e40af" letter-spacing="0.04em">STRONG</text>
      <text x="80" y="28" font-size="11" fill="#374151">Functional studies show no damage</text>
    </g>
    <g transform="translate(0,152)"><rect width="550" height="34" fill="#bfdbfe"/><rect width="6" height="34" fill="#1e40af"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#1e3a8a" class="mono">BS4</text>
      <text x="80" y="14" font-size="9" font-weight="600" fill="#1e40af" letter-spacing="0.04em">STRONG</text>
      <text x="80" y="28" font-size="11" fill="#374151">Lack of segregation in affected family members</text>
    </g>
    <!-- BP1-7 (1,2,3,4,5,6,7 - 7 rows) -->
    <g transform="translate(0,190)"><rect width="550" height="28" fill="#dbeafe"/><rect width="6" height="28" fill="#3b82f6"/>
      <text x="20" y="19" font-size="11" font-weight="700" fill="#1e40af" class="mono">BP1</text>
      <text x="74" y="12" font-size="8" font-weight="600" fill="#1e40af">SUPP</text>
      <text x="74" y="22" font-size="10" fill="#374151">Missense in gene where LoF is mechanism</text>
    </g>
    <g transform="translate(0,222)"><rect width="550" height="28" fill="#dbeafe"/><rect width="6" height="28" fill="#3b82f6"/>
      <text x="20" y="19" font-size="11" font-weight="700" fill="#1e40af" class="mono">BP2</text>
      <text x="74" y="12" font-size="8" font-weight="600" fill="#1e40af">SUPP</text>
      <text x="74" y="22" font-size="10" fill="#374151">In trans with P in healthy individual</text>
    </g>
    <g transform="translate(0,254)"><rect width="550" height="28" fill="#dbeafe"/><rect width="6" height="28" fill="#3b82f6"/>
      <text x="20" y="19" font-size="11" font-weight="700" fill="#1e40af" class="mono">BP3</text>
      <text x="74" y="12" font-size="8" font-weight="600" fill="#1e40af">SUPP</text>
      <text x="74" y="22" font-size="10" fill="#374151">In-frame indel in repetitive region</text>
    </g>
    <g transform="translate(0,286)"><rect width="550" height="28" fill="#dbeafe"/><rect width="6" height="28" fill="#3b82f6"/>
      <text x="20" y="19" font-size="11" font-weight="700" fill="#1e40af" class="mono">BP4</text>
      <text x="74" y="12" font-size="8" font-weight="600" fill="#1e40af">SUPP</text>
      <text x="74" y="22" font-size="10" fill="#374151">Multiple in-silico predictors agree benign</text>
    </g>
    <g transform="translate(0,318)"><rect width="550" height="28" fill="#dbeafe"/><rect width="6" height="28" fill="#3b82f6"/>
      <text x="20" y="19" font-size="11" font-weight="700" fill="#1e40af" class="mono">BP5</text>
      <text x="74" y="12" font-size="8" font-weight="600" fill="#1e40af">SUPP</text>
      <text x="74" y="22" font-size="10" fill="#374151">Alternative molecular diagnosis present</text>
    </g>
    <g transform="translate(0,350)"><rect width="550" height="28" fill="#f5f5f4"/><rect width="6" height="28" fill="#a8a29e"/>
      <text x="20" y="19" font-size="11" font-weight="600" fill="#a8a29e" text-decoration="line-through" class="mono">BP6</text>
      <text x="74" y="12" font-size="8" font-weight="600" fill="#a8a29e">DEPRECATED</text>
      <text x="74" y="22" font-size="10" fill="#a8a29e">Reported benign in reputable source (2018)</text>
    </g>
    <g transform="translate(0,382)"><rect width="550" height="28" fill="#dbeafe"/><rect width="6" height="28" fill="#3b82f6"/>
      <text x="20" y="19" font-size="11" font-weight="700" fill="#1e40af" class="mono">BP7</text>
      <text x="74" y="12" font-size="8" font-weight="600" fill="#1e40af">SUPP</text>
      <text x="74" y="22" font-size="10" fill="#374151">Silent variant; no predicted splice effect</text>
    </g>
  </g>

  <text x="600" y="616" text-anchor="middle" font-size="10" fill="#6b7280">Strength gradient encodes likelihood-ratio weight (PVS1 ≈ 350, PS ≈ 19, PM ≈ 4.3, PP ≈ 2.1; benign mirrors). PP5 / BP6 deprecated by ClinGen 2018.</text>
</svg>
