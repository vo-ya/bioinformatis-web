<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="560" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">ClinVar at scale — 11 years of growth + the current shape of community truth</text>

  <!-- Top: growth curve -->
  <text x="60" y="62" font-size="11" font-weight="600" fill="#525252">CLINVAR SUBMISSIONS (LOG SCALE) — 2013 → 2024</text>

  <g transform="translate(60,80)">
    <!-- axes -->
    <line x1="60" y1="200" x2="640" y2="200" stroke="#a8a29e"/>
    <line x1="60" y1="0"   x2="60"  y2="200" stroke="#a8a29e"/>
    <!-- y-axis labels (log) -->
    <g font-size="9" fill="#6b7280">
      <text x="52" y="200" text-anchor="end">10⁴</text>
      <text x="52" y="150" text-anchor="end">10⁵</text>
      <text x="52" y="100" text-anchor="end">10⁶</text>
      <text x="52" y="50"  text-anchor="end">10⁷</text>
      <line x1="58" y1="150" x2="60" y2="150" stroke="#a8a29e"/>
      <line x1="58" y1="100" x2="60" y2="100" stroke="#a8a29e"/>
      <line x1="58" y1="50"  x2="60" y2="50"  stroke="#a8a29e"/>
    </g>
    <!-- x-axis labels: years 2013..2024 -->
    <g font-size="9" fill="#6b7280">
      <text x="60"  y="216" text-anchor="middle">2013</text>
      <text x="184" y="216" text-anchor="middle">2016</text>
      <text x="324" y="216" text-anchor="middle">2019</text>
      <text x="488" y="216" text-anchor="middle">2022</text>
      <text x="640" y="216" text-anchor="middle">2024</text>
    </g>

    <!-- growth curve: 50k → 5M, log y position from 200 (10^4) to 0 (10^7) -->
    <!-- 50k = log10(5e4)=4.7 → y ≈ 200 - 70 = 130 (?). Compute: log10(5e4)=4.699; range 4..7 spans 200..0, so per log unit 200/3 ≈ 66.7. y = 200 - (4.699 - 4)*66.7 = 200 - 46.6 = 153 -->
    <!-- 5M = log10(5e6)=6.699 → y = 200 - (6.699 - 4)*66.7 = 200 - 180 = 20 -->
    <!-- intermediate points -->
    <path d="M 60 153 Q 130 138 184 120 Q 240 102 324 78 Q 410 60 488 42 Q 560 28 640 20"
          fill="none" stroke="#1d4ed8" stroke-width="2.5"/>

    <!-- milestone diamonds -->
    <g fill="#b45309">
      <path d="M 200 116 l 6 6 l -6 6 l -6 -6 z"/>
      <path d="M 350 74 l 6 6 l -6 6 l -6 -6 z"/>
      <path d="M 510 38 l 6 6 l -6 6 l -6 -6 z"/>
    </g>
    <g font-size="9" fill="#92400e">
      <text x="200" y="106" text-anchor="middle">expert panels begin</text>
      <text x="350" y="64" text-anchor="middle">ClinGen harmonisation</text>
      <text x="510" y="28" text-anchor="middle">large-submitter policy</text>
    </g>

    <!-- start/end labels -->
    <text x="64" y="148" font-size="10" fill="#1e3a8a" class="mono">~50k</text>
    <text x="640" y="14" text-anchor="end" font-size="10" fill="#1e3a8a" class="mono">~5M submissions</text>
    <text x="640" y="-2" text-anchor="end" font-size="9" fill="#6b7280">~2.5M unique variants</text>
  </g>

  <!-- Bottom: donut classification distribution -->
  <text x="60" y="332" font-size="11" font-weight="600" fill="#525252">UNIQUE-VARIANT CLASSIFICATION DISTRIBUTION (2024)</text>

  <!-- Donut chart at 850, 430. Approximate 5 slices using arcs.
       Slices (clockwise from 12 o'clock): P 8% LP 7% (red+orange combined ~15%), VUS 40% (grey), LB 22% LP-mid? actually B 18% +LB 22% = 40%, conflicting 5%.
       Actually combined: P+LP=15%, VUS=40%, LB+B=40%, conflicting=5%. 100% sum.
       Use individual slices: P=8, LP=7, VUS=40, LB=22, B=18, conflict=5.
       Total = 100. -->
  <g transform="translate(840,420)">
    <!-- Outer/inner radii -->
    <!-- helper: cumulative angles
         P (8%): 0..28.8°
         LP (7%): 28.8..54°
         VUS (40%): 54..198°
         LB (22%): 198..277.2°
         B (18%): 277.2..342°
         Conflict (5%): 342..360°
    -->
    <!-- For each slice draw a path with two arcs (outer cw, inner ccw). r_outer=120, r_inner=68. Center 0,0. -->
    <!-- Slice generator: angle in degrees from 12-o'clock, pos = (r*sin(a), -r*cos(a)) -->

    <!-- P slice: 0->28.8 -->
    <path d="M 0 -120 A 120 120 0 0 1 57.83 -105.1 L 32.77 -59.55 A 68 68 0 0 0 0 -68 Z" fill="#c4342c"/>
    <!-- LP: 28.8 -> 54 -->
    <path d="M 57.83 -105.1 A 120 120 0 0 1 97.08 -70.53 L 55.01 -39.97 A 68 68 0 0 0 32.77 -59.55 Z" fill="#b45309"/>
    <!-- VUS: 54 -> 198 (large arc!) -->
    <path d="M 97.08 -70.53 A 120 120 0 0 1 -37.08 114.13 L -21.01 64.67 A 68 68 0 0 0 55.01 -39.97 Z" fill="#525252"/>
    <!-- LB: 198 -> 277.2 -->
    <path d="M -37.08 114.13 A 120 120 0 0 1 -119.05 15.04 L -67.46 8.52 A 68 68 0 0 0 -21.01 64.67 Z" fill="#6e88c8"/>
    <!-- B: 277.2 -> 342 -->
    <path d="M -119.05 15.04 A 120 120 0 0 1 -37.08 -114.13 L -21.01 -64.67 A 68 68 0 0 0 -67.46 8.52 Z" fill="#1e3a8a"/>
    <!-- Conflict: 342 -> 360 -->
    <path d="M -37.08 -114.13 A 120 120 0 0 1 0 -120 L 0 -68 A 68 68 0 0 0 -21.01 -64.67 Z" fill="#d97706"/>

    <!-- center label -->
    <text x="0" y="-6" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">~2.5 M</text>
    <text x="0" y="10" text-anchor="middle" font-size="9" fill="#6b7280">unique variants</text>
  </g>

  <!-- Legend table -->
  <g transform="translate(140,360)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#374151">Classification distribution</text>

    <g transform="translate(0,18)"><rect width="14" height="14" fill="#c4342c"/><text x="22" y="11" font-size="10" fill="#374151">Pathogenic</text><text x="200" y="11" text-anchor="end" font-size="10" font-weight="600" class="mono" fill="#7f1d1d">~8%</text></g>
    <g transform="translate(0,38)"><rect width="14" height="14" fill="#b45309"/><text x="22" y="11" font-size="10" fill="#374151">Likely pathogenic</text><text x="200" y="11" text-anchor="end" font-size="10" font-weight="600" class="mono" fill="#92400e">~7%</text></g>
    <g transform="translate(0,58)"><rect width="14" height="14" fill="#525252"/><text x="22" y="11" font-size="10" fill="#374151">VUS</text><text x="200" y="11" text-anchor="end" font-size="10" font-weight="600" class="mono" fill="#374151">~40%</text></g>
    <g transform="translate(0,78)"><rect width="14" height="14" fill="#6e88c8"/><text x="22" y="11" font-size="10" fill="#374151">Likely benign</text><text x="200" y="11" text-anchor="end" font-size="10" font-weight="600" class="mono" fill="#1e40af">~22%</text></g>
    <g transform="translate(0,98)"><rect width="14" height="14" fill="#1e3a8a"/><text x="22" y="11" font-size="10" fill="#374151">Benign</text><text x="200" y="11" text-anchor="end" font-size="10" font-weight="600" class="mono" fill="#1e3a8a">~18%</text></g>
    <g transform="translate(0,118)"><rect width="14" height="14" fill="#d97706"/><text x="22" y="11" font-size="10" fill="#374151">Conflicting submissions</text><text x="200" y="11" text-anchor="end" font-size="10" font-weight="600" class="mono" fill="#92400e">~5%</text></g>
  </g>

  <text x="600" y="540" text-anchor="middle" font-size="10" fill="#6b7280">Key observation: VUS is the plurality. Reclassification — moving variants out of VUS as evidence accumulates — is the field's ongoing work.</text>
</svg>
