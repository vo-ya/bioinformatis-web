<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="480" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">gnomAD allele frequency — PM2 vs BA1 threshold map</text>

  <!-- Axis box -->
  <!-- log scale 10^-7 .. 10^0 spans x=80 .. x=1140, total 1060px → 1060/7 = 151.4 px per decade -->
  <!-- helper positions:
       1e-7 →  80
       1e-6 →  231
       1e-5 →  383
       1/200000 = 5e-6 → log10(5e-6)=-5.301 → 80 + (7-5.301)*151.4 = 80 + 257.2 = 337
       1e-4 →  534
       1/20000 = 5e-5 → log10(5e-5)=-4.301 → 80 + 408.6 = 489
       1e-3 →  686
       1e-2 →  837
       0.05 = 5e-2 → log10(5e-2)=-1.301 → 80 + 862 = 942
       1e-1 →  988
       1e0 → 1140 -->

  <!-- Top zone bands -->
  <g transform="translate(0,80)">
    <!-- PM2 dominant: < 1/200k (x < 337). cobalt -->
    <rect x="80" y="0" width="257" height="80" fill="#bfdbfe" fill-opacity="0.55"/>
    <!-- PM2 recessive: 1/200k .. 1/20k (337..489). lighter cobalt -->
    <rect x="337" y="0" width="152" height="80" fill="#dbeafe" fill-opacity="0.6"/>
    <!-- Neither: 1/20k .. 5% (489..942). grey -->
    <rect x="489" y="0" width="453" height="80" fill="#e5e7eb" fill-opacity="0.55"/>
    <!-- BA1: ≥ 5% (942..1140). amber -->
    <rect x="942" y="0" width="198" height="80" fill="#fde68a" fill-opacity="0.7"/>

    <!-- region labels -->
    <text x="208" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">PM2 — dominant</text>
    <text x="208" y="38" text-anchor="middle" font-size="9" fill="#1e3a8a">&lt; 1/200k alleles</text>
    <text x="208" y="58" text-anchor="middle" font-size="9" fill="#374151">moderate evidence pathogenic</text>

    <text x="413" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">PM2 — recessive</text>
    <text x="413" y="38" text-anchor="middle" font-size="9" fill="#1e3a8a">&lt; 1/20k</text>
    <text x="413" y="58" text-anchor="middle" font-size="9" fill="#374151">moderate evidence pathogenic</text>

    <text x="715" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#525252">neither PM2 nor BA1</text>
    <text x="715" y="38" text-anchor="middle" font-size="9" fill="#525252">frequency contributes no evidence on its own</text>

    <text x="1041" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">BA1 — stand-alone benign</text>
    <text x="1041" y="38" text-anchor="middle" font-size="9" fill="#92400e">≥ 5% in gnomAD</text>
    <text x="1041" y="58" text-anchor="middle" font-size="9" fill="#374151">classify as B</text>
  </g>

  <!-- Threshold lines + axis -->
  <g transform="translate(0,180)">
    <line x1="80" y1="0" x2="1140" y2="0" stroke="#374151" stroke-width="1.5"/>
    <!-- decade ticks -->
    <g stroke="#a8a29e" stroke-width="1">
      <line x1="80"   y1="0" x2="80"   y2="6"/>
      <line x1="231"  y1="0" x2="231"  y2="6"/>
      <line x1="383"  y1="0" x2="383"  y2="6"/>
      <line x1="534"  y1="0" x2="534"  y2="6"/>
      <line x1="686"  y1="0" x2="686"  y2="6"/>
      <line x1="837"  y1="0" x2="837"  y2="6"/>
      <line x1="988"  y1="0" x2="988"  y2="6"/>
      <line x1="1140" y1="0" x2="1140" y2="6"/>
    </g>
    <g font-size="9" fill="#6b7280" class="mono">
      <text x="80"   y="20" text-anchor="middle">10⁻⁷</text>
      <text x="231"  y="20" text-anchor="middle">10⁻⁶</text>
      <text x="383"  y="20" text-anchor="middle">10⁻⁵</text>
      <text x="534"  y="20" text-anchor="middle">10⁻⁴</text>
      <text x="686"  y="20" text-anchor="middle">10⁻³</text>
      <text x="837"  y="20" text-anchor="middle">10⁻²</text>
      <text x="988"  y="20" text-anchor="middle">10⁻¹</text>
      <text x="1140" y="20" text-anchor="middle">1</text>
    </g>
    <text x="600" y="42" text-anchor="middle" font-size="10" font-weight="500" fill="#525252">Allele frequency in gnomAD (log scale)</text>

    <!-- threshold dashed verticals at 1/200k, 1/20k, 5% -->
    <g stroke="#1e40af" stroke-width="1" stroke-dasharray="4 3">
      <line x1="337" y1="-100" x2="337" y2="-2"/>
      <line x1="489" y1="-100" x2="489" y2="-2"/>
    </g>
    <g stroke="#b45309" stroke-width="1" stroke-dasharray="4 3">
      <line x1="942" y1="-100" x2="942" y2="-2"/>
    </g>
    <g class="mono" font-size="9">
      <text x="337" y="-104" text-anchor="middle" fill="#1e40af">1/200,000</text>
      <text x="489" y="-104" text-anchor="middle" fill="#1e40af">1/20,000</text>
      <text x="942" y="-104" text-anchor="middle" fill="#92400e">0.05 (5%)</text>
    </g>
  </g>

  <!-- Example variants -->
  <g transform="translate(0,260)">
    <text x="60" y="0" font-size="11" font-weight="600" fill="#525252">EXAMPLE VARIANTS</text>

    <!-- Variant 1: ultra-rare missense at 1/500k = 2e-6 → log10= -5.699 → x = 80 + (7-5.699)*151.4 = 80 + 197 = 277 -->
    <g transform="translate(0,32)">
      <circle cx="277" cy="0" r="7" fill="#7f1d1d"/>
      <line x1="277" y1="-7" x2="277" y2="-44" stroke="#7f1d1d" stroke-width="1"/>
      <rect x="172" y="-100" width="210" height="56" fill="#fee2e2" stroke="#c4342c" rx="4"/>
      <text x="277" y="-82" text-anchor="middle" font-size="11" font-weight="600" fill="#7f1d1d">BRCA1 c.5266dupC (rare missense)</text>
      <text x="277" y="-66" text-anchor="middle" class="mono" font-size="9" fill="#374151">AF = 2 × 10⁻⁶ (1/500k)</text>
      <text x="277" y="-52" text-anchor="middle" font-size="9" fill="#525252">PM2_Supporting applicable</text>
    </g>

    <!-- Variant 2: common SNP at 0.12 → log10(0.12) = -0.921 → x = 80 + (7-0.921)*151.4 = 80 + 920 = 1000 -->
    <g transform="translate(0,32)">
      <circle cx="1000" cy="0" r="7" fill="#92400e"/>
      <line x1="1000" y1="-7" x2="1000" y2="-44" stroke="#92400e" stroke-width="1"/>
      <rect x="900" y="-100" width="210" height="56" fill="#fef3c7" stroke="#b45309" rx="4"/>
      <text x="1005" y="-82" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">CFTR p.Ile1027Thr (common SNP)</text>
      <text x="1005" y="-66" text-anchor="middle" class="mono" font-size="9" fill="#374151">AF = 0.12 (12%)</text>
      <text x="1005" y="-52" text-anchor="middle" font-size="9" fill="#525252">BA1 stand-alone benign</text>
    </g>
  </g>

  <text x="600" y="448" text-anchor="middle" font-size="10" fill="#6b7280">Specific gene-level thresholds tighten or relax these bands (e.g. ClinGen panel rules for BRCA1, MMR genes); the schematic shows generic ACMG/AMP defaults.</text>
</svg>
