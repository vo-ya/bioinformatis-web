<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="560" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Three core in-silico predictors — input, architecture, threshold</text>

  <!-- Three side-by-side panels -->
  <!-- Panel 1: REVEL (left, x=40, w=370) -->
  <g transform="translate(40,60)">
    <rect width="370" height="430" fill="#fff" stroke="#1d4ed8" rx="6"/>
    <rect width="370" height="40" fill="#1d4ed8" rx="6"/>
    <rect y="34" width="370" height="6" fill="#1d4ed8"/>
    <text x="185" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#fff" letter-spacing="0.04em">REVEL</text>

    <!-- Input -->
    <text x="20" y="64" font-size="10" font-weight="600" fill="#525252">INPUT</text>
    <text x="20" y="80" font-size="11" fill="#374151">Missense variants</text>
    <text x="20" y="96" font-size="10" fill="#6b7280">~1.4M missense in training set</text>

    <!-- Architecture sketch: ensemble -->
    <text x="20" y="130" font-size="10" font-weight="600" fill="#525252">ARCHITECTURE</text>

    <g transform="translate(20,142)">
      <rect width="60" height="22" fill="#dbeafe" stroke="#1d4ed8" rx="3"/>
      <text x="30" y="15" text-anchor="middle" font-size="9" class="mono" fill="#1e40af">SIFT</text>
      <rect x="70" width="80" height="22" fill="#dbeafe" stroke="#1d4ed8" rx="3"/>
      <text x="110" y="15" text-anchor="middle" font-size="9" class="mono" fill="#1e40af">PolyPhen-2</text>
      <rect x="160" width="100" height="22" fill="#dbeafe" stroke="#1d4ed8" rx="3"/>
      <text x="210" y="15" text-anchor="middle" font-size="9" class="mono" fill="#1e40af">MutationTaster</text>
      <rect x="270" width="60" height="22" fill="#dbeafe" stroke="#1d4ed8" rx="3"/>
      <text x="300" y="15" text-anchor="middle" font-size="9" class="mono" fill="#1e40af">GERP</text>

      <!-- second row -->
      <rect y="32" width="100" height="22" fill="#dbeafe" stroke="#1d4ed8" rx="3"/>
      <text x="50" y="47" text-anchor="middle" font-size="9" class="mono" fill="#1e40af">phyloP / 9 more</text>
    </g>

    <!-- combiner -->
    <g transform="translate(20,210)" stroke="#1e3a8a" fill="none" stroke-width="1">
      <line x1="50"  y1="-15" x2="165" y2="0"/>
      <line x1="110" y1="-15" x2="165" y2="0"/>
      <line x1="210" y1="-15" x2="165" y2="0"/>
      <line x1="300" y1="-15" x2="165" y2="0"/>
      <line x1="50"  y1="-30" x2="165" y2="0"/>
    </g>
    <g transform="translate(85,206)">
      <rect width="200" height="32" fill="#1e3a8a" rx="4"/>
      <text x="100" y="14" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Random forest</text>
      <text x="100" y="26" text-anchor="middle" font-size="9" fill="#dbeafe">combines 13 inputs</text>
    </g>

    <!-- output -->
    <text x="20" y="262" font-size="10" font-weight="600" fill="#525252">OUTPUT</text>
    <g transform="translate(20,272)">
      <line x1="0" y1="20" x2="330" y2="20" stroke="#a8a29e"/>
      <text x="0" y="38" font-size="9" fill="#6b7280" class="mono">0</text>
      <text x="330" y="38" text-anchor="end" font-size="9" fill="#6b7280" class="mono">1</text>
      <text x="165" y="10" text-anchor="middle" font-size="9" fill="#374151">REVEL score</text>

      <!-- BP4 zone -->
      <rect x="0" y="14" width="49.5" height="12" fill="#bfdbfe"/>
      <text x="24" y="55" text-anchor="middle" font-size="9" font-weight="600" class="mono" fill="#1e40af">BP4 ≤ 0.15</text>
      <!-- PP3 zone -->
      <rect x="231" y="14" width="99" height="12" fill="#fecaca"/>
      <text x="280" y="55" text-anchor="middle" font-size="9" font-weight="600" class="mono" fill="#7f1d1d">PP3 ≥ 0.7</text>
    </g>

    <!-- Use -->
    <text x="20" y="368" font-size="10" font-weight="600" fill="#525252">CLINICAL USE</text>
    <text x="20" y="386" font-size="10" fill="#374151">Widely used; first-line missense predictor.</text>
    <text x="20" y="402" font-size="10" fill="#374151">Combined with population freq + ClinVar.</text>
  </g>

  <!-- Panel 2: AlphaMissense (middle, x=420, w=370) -->
  <g transform="translate(420,60)">
    <rect width="370" height="430" fill="#fff" stroke="#7c3aed" rx="6"/>
    <rect width="370" height="40" fill="#7c3aed" rx="6"/>
    <rect y="34" width="370" height="6" fill="#7c3aed"/>
    <text x="185" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#fff" letter-spacing="0.04em">ALPHAMISSENSE</text>

    <text x="20" y="64" font-size="10" font-weight="600" fill="#525252">INPUT</text>
    <text x="20" y="80" font-size="11" fill="#374151">Missense variants (any AA → AA)</text>
    <text x="20" y="96" font-size="10" fill="#6b7280">71M variants across the whole proteome</text>

    <text x="20" y="130" font-size="10" font-weight="600" fill="#525252">ARCHITECTURE</text>

    <g transform="translate(20,142)">
      <rect width="330" height="34" fill="#ede9fe" stroke="#7c3aed" rx="3"/>
      <text x="165" y="15" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">AlphaFold-derived backbone</text>
      <text x="165" y="28" text-anchor="middle" font-size="9" fill="#6b21a8">structural-context embeddings</text>

      <rect y="44" width="330" height="34" fill="#ede9fe" stroke="#7c3aed" rx="3"/>
      <text x="165" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">Per-variant classifier head</text>
      <text x="165" y="71" text-anchor="middle" font-size="9" fill="#6b21a8">trained on weak labels (population AF + structural)</text>
    </g>

    <g transform="translate(85,260)">
      <rect width="200" height="32" fill="#5b21b6" rx="4"/>
      <text x="100" y="14" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Likely-P / Ambig / Likely-B</text>
      <text x="100" y="26" text-anchor="middle" font-size="9" fill="#ede9fe">3-way + continuous score</text>
    </g>

    <text x="20" y="316" font-size="10" font-weight="600" fill="#525252">OUTPUT</text>
    <g transform="translate(20,326)">
      <line x1="0" y1="20" x2="330" y2="20" stroke="#a8a29e"/>
      <text x="0" y="38" font-size="9" fill="#6b7280" class="mono">0</text>
      <text x="330" y="38" text-anchor="end" font-size="9" fill="#6b7280" class="mono">1</text>
      <text x="165" y="10" text-anchor="middle" font-size="9" fill="#374151">AlphaMissense score</text>

      <!-- BP4 ≤ 0.340 -->
      <rect x="0" y="14" width="112.2" height="12" fill="#bfdbfe"/>
      <text x="56" y="55" text-anchor="middle" font-size="9" font-weight="600" class="mono" fill="#1e40af">BP4 ≤ 0.34</text>
      <!-- PP3 ≥ 0.564 -->
      <rect x="186.1" y="14" width="143.9" height="12" fill="#fecaca"/>
      <text x="258" y="55" text-anchor="middle" font-size="9" font-weight="600" class="mono" fill="#7f1d1d">PP3 ≥ 0.564</text>
    </g>

    <text x="20" y="404" font-size="10" font-weight="600" fill="#525252">CLINICAL USE</text>
    <text x="20" y="422" font-size="10" fill="#374151">State of the art (2024). Often replaces REVEL</text>
  </g>

  <!-- Panel 3: SpliceAI (right, x=800, w=370) -->
  <g transform="translate(800,60)">
    <rect width="370" height="430" fill="#fff" stroke="#0d7377" rx="6"/>
    <rect width="370" height="40" fill="#0d7377" rx="6"/>
    <rect y="34" width="370" height="6" fill="#0d7377"/>
    <text x="185" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#fff" letter-spacing="0.04em">SPLICEAI</text>

    <text x="20" y="64" font-size="10" font-weight="600" fill="#525252">INPUT</text>
    <text x="20" y="80" font-size="11" fill="#374151">Variant ± 10 kb of context</text>
    <text x="20" y="96" font-size="10" fill="#6b7280">one-hot DNA, 4 channels</text>

    <text x="20" y="130" font-size="10" font-weight="600" fill="#525252">ARCHITECTURE</text>

    <g transform="translate(20,142)">
      <rect width="330" height="34" fill="#ccfbf1" stroke="#0d7377" rx="3"/>
      <text x="165" y="15" text-anchor="middle" font-size="10" font-weight="600" fill="#0d7377">Deep dilated CNN</text>
      <text x="165" y="28" text-anchor="middle" font-size="9" fill="#0f766e">32 layers · 10 kb receptive field</text>

      <rect y="44" width="330" height="34" fill="#ccfbf1" stroke="#0d7377" rx="3"/>
      <text x="165" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#0d7377">Per-position 4-way head</text>
      <text x="165" y="71" text-anchor="middle" font-size="9" fill="#0f766e">acceptor / donor × gain / loss</text>
    </g>

    <g transform="translate(85,260)">
      <rect width="200" height="32" fill="#0d7377" rx="4"/>
      <text x="100" y="14" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">4 splice probabilities</text>
      <text x="100" y="26" text-anchor="middle" font-size="9" fill="#ccfbf1">per genomic position</text>
    </g>

    <text x="20" y="316" font-size="10" font-weight="600" fill="#525252">OUTPUT</text>
    <g transform="translate(20,326)">
      <line x1="0" y1="20" x2="330" y2="20" stroke="#a8a29e"/>
      <text x="0" y="38" font-size="9" fill="#6b7280" class="mono">0</text>
      <text x="330" y="38" text-anchor="end" font-size="9" fill="#6b7280" class="mono">1</text>
      <text x="165" y="10" text-anchor="middle" font-size="9" fill="#374151">max splice score</text>

      <!-- ≥0.5 supporting -->
      <rect x="165" y="14" width="99" height="12" fill="#fde68a"/>
      <text x="214" y="55" text-anchor="middle" font-size="9" font-weight="600" class="mono" fill="#92400e">PP3 ≥ 0.5</text>
      <!-- ≥0.8 strong -->
      <rect x="264" y="14" width="66" height="12" fill="#fecaca"/>
      <text x="297" y="55" text-anchor="middle" font-size="9" font-weight="600" class="mono" fill="#7f1d1d">PVS1 ≥ 0.8</text>
    </g>

    <text x="20" y="404" font-size="10" font-weight="600" fill="#525252">CLINICAL USE</text>
    <text x="20" y="422" font-size="10" fill="#374151">Required for any near-splice variant</text>
  </g>

  <!-- Bottom caption -->
  <rect x="40" y="510" width="1120" height="38" fill="#fef3c7" stroke="#b45309" rx="4"/>
  <text x="600" y="528" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">PP3 / BP4 require multiple predictors to agree.</text>
  <text x="600" y="542" text-anchor="middle" font-size="10" fill="#92400e">No single score is actionable alone — predictors are decision supports, not deciders.</text>
</svg>
