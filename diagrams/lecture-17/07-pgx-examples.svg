<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" width="1200" height="640" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="640" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Pharmacogenomics — four canonical drug × gene pairs</text>

  <!-- 2x2 grid. Each panel 560x270. Top row y=56, bottom y=336. Cols x=40, x=620 -->

  <!-- Panel 1: CYP2D6 × codeine (top-left) -->
  <g transform="translate(40,56)">
    <rect width="540" height="270" fill="#fff" stroke="#1d4ed8" rx="6"/>
    <rect width="540" height="34" fill="#1d4ed8" rx="6"/>
    <rect y="28" width="540" height="6" fill="#1d4ed8"/>
    <text x="20" y="22" font-size="13" font-weight="700" fill="#fff">codeine</text>
    <text x="520" y="22" text-anchor="end" font-size="11" fill="#dbeafe" class="mono">CYP2D6</text>

    <!-- Mechanism -->
    <text x="20" y="60" font-size="10" font-weight="600" fill="#525252">MECHANISM</text>
    <text x="20" y="76" font-size="10" fill="#374151">Codeine → morphine via CYP2D6 (prodrug activation)</text>

    <!-- Variant table -->
    <text x="20" y="106" font-size="10" font-weight="600" fill="#525252">REPRESENTATIVE STAR ALLELES</text>
    <g transform="translate(20,118)" class="mono" font-size="10">
      <text x="0"   y="14" fill="#1e3a8a">*1</text>      <text x="60" y="14" fill="#374151">reference</text>           <text x="240" y="14" fill="#374151">activity 1.0</text>
      <text x="0"   y="32" fill="#1e3a8a">*4</text>      <text x="60" y="32" fill="#374151">splice LoF</text>          <text x="240" y="32" fill="#374151">activity 0.0</text>
      <text x="0"   y="50" fill="#1e3a8a">*10</text>     <text x="60" y="50" fill="#374151">reduced (E. Asian)</text>  <text x="240" y="50" fill="#374151">activity 0.5</text>
      <text x="0"   y="68" fill="#1e3a8a">*1×N</text>    <text x="60" y="68" fill="#374151">duplication (UM)</text>    <text x="240" y="68" fill="#374151">activity 2–3+</text>
    </g>

    <!-- Phenotype -->
    <text x="20" y="220" font-size="10" font-weight="600" fill="#525252">PHENOTYPE LADDER</text>
    <g transform="translate(20,228)">
      <rect x="0"   y="0" width="100" height="24" fill="#1e3a8a"/>
      <rect x="100" y="0" width="100" height="24" fill="#3b82f6"/>
      <rect x="200" y="0" width="100" height="24" fill="#94a3b8"/>
      <rect x="300" y="0" width="100" height="24" fill="#b45309"/>
      <rect x="400" y="0" width="100" height="24" fill="#c4342c"/>
      <text x="50"  y="16" text-anchor="middle" font-size="9" fill="#fff">Poor</text>
      <text x="150" y="16" text-anchor="middle" font-size="9" fill="#fff">Intermed</text>
      <text x="250" y="16" text-anchor="middle" font-size="9" fill="#fff">Normal</text>
      <text x="350" y="16" text-anchor="middle" font-size="9" fill="#fff">Rapid</text>
      <text x="450" y="16" text-anchor="middle" font-size="9" fill="#fff">Ultra-rapid</text>
    </g>
    <text x="270" y="266" text-anchor="middle" font-size="10" fill="#7f1d1d" font-weight="600">CPIC: avoid codeine if PM (no analgesia) or UM (respiratory risk)</text>
  </g>

  <!-- Panel 2: Warfarin × VKORC1 + CYP2C9 (top-right) -->
  <g transform="translate(620,56)">
    <rect width="540" height="270" fill="#fff" stroke="#b45309" rx="6"/>
    <rect width="540" height="34" fill="#b45309" rx="6"/>
    <rect y="28" width="540" height="6" fill="#b45309"/>
    <text x="20" y="22" font-size="13" font-weight="700" fill="#fff">warfarin</text>
    <text x="520" y="22" text-anchor="end" font-size="11" fill="#fef3c7" class="mono">VKORC1 + CYP2C9</text>

    <text x="20" y="60" font-size="10" font-weight="600" fill="#525252">MECHANISM</text>
    <text x="20" y="76" font-size="10" fill="#374151">VKORC1 = drug target (sensitivity); CYP2C9 = clearance (rate)</text>

    <text x="20" y="106" font-size="10" font-weight="600" fill="#525252">DOSING NOMOGRAM (target maintenance dose, mg/wk)</text>

    <g transform="translate(20,118)" font-size="10" class="mono">
      <!-- header -->
      <rect x="0" y="0" width="500" height="20" fill="#fde68a"/>
      <text x="80"  y="14" text-anchor="middle" fill="#92400e">VKORC1 GG</text>
      <text x="200" y="14" text-anchor="middle" fill="#92400e">VKORC1 GA</text>
      <text x="320" y="14" text-anchor="middle" fill="#92400e">VKORC1 AA</text>
      <text x="440" y="14" text-anchor="middle" fill="#92400e">CYP2C9</text>

      <!-- row 1 -->
      <rect x="0" y="20" width="500" height="20" fill="#fff7ed"/>
      <text x="80"  y="34" text-anchor="middle" fill="#374151">35</text>
      <text x="200" y="34" text-anchor="middle" fill="#374151">25</text>
      <text x="320" y="34" text-anchor="middle" fill="#374151">15</text>
      <text x="440" y="34" text-anchor="middle" fill="#92400e">*1/*1</text>

      <rect x="0" y="40" width="500" height="20" fill="#fef3c7"/>
      <text x="80"  y="54" text-anchor="middle" fill="#374151">25</text>
      <text x="200" y="54" text-anchor="middle" fill="#374151">18</text>
      <text x="320" y="54" text-anchor="middle" fill="#374151">10</text>
      <text x="440" y="54" text-anchor="middle" fill="#92400e">*1/*2 or *3</text>

      <rect x="0" y="60" width="500" height="20" fill="#fde68a"/>
      <text x="80"  y="74" text-anchor="middle" fill="#374151">15</text>
      <text x="200" y="74" text-anchor="middle" fill="#374151">10</text>
      <text x="320" y="74" text-anchor="middle" fill="#374151">7</text>
      <text x="440" y="74" text-anchor="middle" fill="#92400e">*2/*2 or *3/*3</text>
    </g>

    <text x="270" y="240" text-anchor="middle" font-size="10" fill="#374151">Genotype + age + weight + INR-target</text>
    <text x="270" y="256" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">CPIC: dose by table; reduces time-to-stable INR ~15%</text>
  </g>

  <!-- Panel 3: Abacavir × HLA-B*57:01 (bottom-left) -->
  <g transform="translate(40,336)">
    <rect width="540" height="270" fill="#fff" stroke="#c4342c" rx="6"/>
    <rect width="540" height="34" fill="#c4342c" rx="6"/>
    <rect y="28" width="540" height="6" fill="#c4342c"/>
    <text x="20" y="22" font-size="13" font-weight="700" fill="#fff">abacavir</text>
    <text x="520" y="22" text-anchor="end" font-size="11" fill="#fee2e2" class="mono">HLA-B</text>

    <text x="20" y="60" font-size="10" font-weight="600" fill="#525252">MECHANISM</text>
    <text x="20" y="76" font-size="10" fill="#374151">HLA-B*57:01 carriers → ~50% severe hypersensitivity reaction</text>

    <text x="20" y="106" font-size="10" font-weight="600" fill="#525252">DECISION RULE — binary genotype</text>

    <g transform="translate(20,124)">
      <rect width="240" height="64" fill="#dcfce7" stroke="#059669" rx="4"/>
      <text x="120" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46" class="mono">HLA-B*57:01 negative</text>
      <text x="120" y="40" text-anchor="middle" font-size="10" fill="#374151">~94% of population</text>
      <text x="120" y="56" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">→ standard dose, normal monitoring</text>

      <rect x="260" width="240" height="64" fill="#fee2e2" stroke="#c4342c" rx="4"/>
      <text x="380" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#7f1d1d" class="mono">HLA-B*57:01 positive</text>
      <text x="380" y="40" text-anchor="middle" font-size="10" fill="#374151">~6% of population</text>
      <text x="380" y="56" text-anchor="middle" font-size="10" font-weight="600" fill="#7f1d1d">→ AVOID abacavir; alternative HIV regimen</text>
    </g>

    <text x="270" y="220" text-anchor="middle" font-size="11" fill="#374151">Pre-prescription HLA-B*57:01 genotyping is</text>
    <text x="270" y="234" text-anchor="middle" font-size="11" font-weight="600" fill="#7f1d1d">standard of care globally in every HIV clinic.</text>
    <text x="270" y="252" text-anchor="middle" font-size="10" fill="#525252">Reduced severe-hypersensitivity incidence by &gt; 95%.</text>
  </g>

  <!-- Panel 4: Thiopurines × TPMT/NUDT15 (bottom-right) -->
  <g transform="translate(620,336)">
    <rect width="540" height="270" fill="#fff" stroke="#7c3aed" rx="6"/>
    <rect width="540" height="34" fill="#7c3aed" rx="6"/>
    <rect y="28" width="540" height="6" fill="#7c3aed"/>
    <text x="20" y="22" font-size="13" font-weight="700" fill="#fff">azathioprine, 6-MP</text>
    <text x="520" y="22" text-anchor="end" font-size="11" fill="#ede9fe" class="mono">TPMT + NUDT15</text>

    <text x="20" y="60" font-size="10" font-weight="600" fill="#525252">MECHANISM</text>
    <text x="20" y="76" font-size="10" fill="#374151">TPMT / NUDT15 inactivate thiopurines; LoF → severe myelosuppression</text>

    <text x="20" y="106" font-size="10" font-weight="600" fill="#525252">DOSING DECISION</text>

    <g transform="translate(20,118)">
      <rect width="500" height="100" fill="#fafafa" stroke="#a8a29e" rx="3"/>

      <g transform="translate(8,16)" font-size="10">
        <text x="0"   y="0" font-weight="600" fill="#5b21b6">Phenotype</text>
        <text x="160" y="0" font-weight="600" fill="#5b21b6">Genotype examples</text>
        <text x="370" y="0" font-weight="600" fill="#5b21b6">Action</text>
      </g>

      <g transform="translate(8,38)" font-size="10">
        <text x="0"   y="0" fill="#374151">Normal</text>
        <text x="160" y="0" class="mono" fill="#374151">*1/*1</text>
        <text x="370" y="0" font-weight="600" fill="#065f46">standard dose</text>
      </g>

      <g transform="translate(8,58)" font-size="10">
        <text x="0"   y="0" fill="#374151">Intermediate</text>
        <text x="160" y="0" class="mono" fill="#374151">*1/*3A or *1/*3C</text>
        <text x="370" y="0" font-weight="600" fill="#92400e">reduce 30–50%</text>
      </g>

      <g transform="translate(8,78)" font-size="10">
        <text x="0"   y="0" fill="#374151">Poor</text>
        <text x="160" y="0" class="mono" fill="#374151">*3A/*3A homozygous</text>
        <text x="370" y="0" font-weight="600" fill="#7f1d1d">10× reduction or avoid</text>
      </g>
    </g>

    <text x="270" y="240" text-anchor="middle" font-size="10" fill="#374151">NUDT15 variants more common in East Asians</text>
    <text x="270" y="256" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">CPIC: test before first dose; reduces severe toxicity</text>
  </g>

  <text x="600" y="624" text-anchor="middle" font-size="10" fill="#6b7280">All four examples reduce to: measure genotype → look up CPIC table → adjust prescription. The science was building the table; the runtime is one lookup.</text>
</svg>
