<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="560" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">ACMG Secondary Findings list (v3.x) — composition + top genes</text>

  <!-- Left: donut. Centre 320,300. Total 81 genes. Slices:
       Hereditary cancer 30/81 = 37.04% → 0..133.3°
       Cardio (myo + channel) 25/81 = 30.86% → 133.3..244.4°
       Familial hyperchol 3/81 = 3.70% → 244.4..257.7°
       Malignant hyperthermia 2/81 = 2.47% → 257.7..266.6°
       Metabolic + other 21/81 = 25.93% → 266.6..360°
  -->
  <g transform="translate(310,300)">
    <!-- Hereditary cancer red -->
    <!-- 0° pos = (0,-160) outer (0,-90) inner -->
    <!-- 133.3° pos: outer (160·sin133.3°, -160·cos133.3°)=(160·0.7280, 160·0.6856)=(116.48, 109.69); inner (90·0.7280, 90·0.6856)=(65.52, 61.70) -->
    <path d="M 0 -160 A 160 160 0 0 1 116.48 109.69 L 65.52 61.70 A 90 90 0 0 0 0 -90 Z" fill="#c4342c"/>

    <!-- Cardio cobalt -->
    <!-- start 133.3°, end 244.4° -->
    <!-- 244.4° pos: sin=-0.9026, cos=0.4305 → outer (-144.42, -68.88); inner (-81.24, -38.74) -->
    <path d="M 116.48 109.69 A 160 160 0 0 1 -144.42 -68.88 L -81.24 -38.74 A 90 90 0 0 0 65.52 61.70 Z" fill="#1e3a8a"/>

    <!-- Familial hyperchol amber -->
    <!-- start 244.4°, end 257.7° -->
    <!-- 257.7° pos: sin=-0.9772, cos=0.2125 → outer (-156.36, -34.00); inner (-87.95, -19.13) -->
    <path d="M -144.42 -68.88 A 160 160 0 0 1 -156.36 -34.00 L -87.95 -19.13 A 90 90 0 0 0 -81.24 -38.74 Z" fill="#b45309"/>

    <!-- Malignant hyperthermia teal (2 genes) -->
    <!-- 266.6°: sin=-0.99847, cos=0.05525 → outer (-159.76, -8.84); inner (-89.86, -4.97) -->
    <path d="M -156.36 -34.00 A 160 160 0 0 1 -159.76 -8.84 L -89.86 -4.97 A 90 90 0 0 0 -87.95 -19.13 Z" fill="#0d7377"/>

    <!-- Metabolic + other violet -->
    <!-- start 266.6°, end 360°. 360 → (0,-160) -->
    <path d="M -159.76 -8.84 A 160 160 0 0 1 0 -160 L 0 -90 A 90 90 0 0 0 -89.86 -4.97 Z" fill="#7c3aed"/>

    <!-- center -->
    <text x="0" y="-6" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">81</text>
    <text x="0" y="12" text-anchor="middle" font-size="10" fill="#6b7280">SF v3.2 genes</text>
  </g>

  <!-- Donut legend -->
  <g transform="translate(60,470)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#374151">Categories</text>
    <g transform="translate(0,16)" font-size="10">
      <rect width="12" height="12" fill="#c4342c"/>
      <text x="20" y="10" fill="#374151">Hereditary cancer (30)</text>
      <rect x="180" width="12" height="12" fill="#1e3a8a"/>
      <text x="200" y="10" fill="#374151">Cardiac (25)</text>
      <rect x="340" width="12" height="12" fill="#b45309"/>
      <text x="360" y="10" fill="#374151">Hyperchol (3)</text>
      <rect x="490" width="12" height="12" fill="#0d7377"/>
      <text x="510" y="10" fill="#374151">Malig. hyperthermia (2)</text>
    </g>
    <g transform="translate(0,36)" font-size="10">
      <rect width="12" height="12" fill="#7c3aed"/>
      <text x="20" y="10" fill="#374151">Metabolic + other (21)</text>
    </g>
  </g>

  <!-- Right: top-10 gene table -->
  <g transform="translate(620,68)">
    <text x="0" y="0" font-size="12" font-weight="600" fill="#374151">Top 10 SF genes by clinical impact</text>

    <!-- header -->
    <rect x="0" y="14" width="540" height="26" fill="#374151"/>
    <text x="14"  y="32" font-size="10" font-weight="600" fill="#fff" letter-spacing="0.04em">GENE</text>
    <text x="160" y="32" font-size="10" font-weight="600" fill="#fff" letter-spacing="0.04em">DISEASE</text>
    <text x="430" y="32" font-size="10" font-weight="600" fill="#fff" letter-spacing="0.04em">CATEGORY</text>

    <g transform="translate(0,40)" font-size="10">
      <!-- BRCA1/2 -->
      <rect width="540" height="26" fill="#fee2e2"/>
      <rect width="6" height="26" fill="#c4342c"/>
      <text x="14"  y="18" class="mono" fill="#7f1d1d">BRCA1, BRCA2</text>
      <text x="160" y="18" fill="#374151">Hereditary breast / ovarian cancer</text>
      <text x="430" y="18" fill="#525252">Cancer</text>

      <rect y="28" width="540" height="26" fill="#fef2f2"/>
      <rect y="28" width="6" height="26" fill="#c4342c"/>
      <text x="14"  y="46" class="mono" fill="#7f1d1d">MLH1, MSH2, MSH6, PMS2</text>
      <text x="160" y="46" fill="#374151">Lynch syndrome (colorectal/endo)</text>
      <text x="430" y="46" fill="#525252">Cancer</text>

      <rect y="56" width="540" height="26" fill="#fee2e2"/>
      <rect y="56" width="6" height="26" fill="#c4342c"/>
      <text x="14"  y="74" class="mono" fill="#7f1d1d">TP53</text>
      <text x="160" y="74" fill="#374151">Li-Fraumeni syndrome</text>
      <text x="430" y="74" fill="#525252">Cancer</text>

      <rect y="84" width="540" height="26" fill="#fef2f2"/>
      <rect y="84" width="6" height="26" fill="#c4342c"/>
      <text x="14"  y="102" class="mono" fill="#7f1d1d">APC</text>
      <text x="160" y="102" fill="#374151">Familial adenomatous polyposis</text>
      <text x="430" y="102" fill="#525252">Cancer</text>

      <!-- LDLR -->
      <rect y="112" width="540" height="26" fill="#fef3c7"/>
      <rect y="112" width="6" height="26" fill="#b45309"/>
      <text x="14"  y="130" class="mono" fill="#92400e">LDLR</text>
      <text x="160" y="130" fill="#374151">Familial hypercholesterolemia</text>
      <text x="430" y="130" fill="#525252">Hyperchol</text>

      <!-- MYH7/MYBPC3 -->
      <rect y="140" width="540" height="26" fill="#dbeafe"/>
      <rect y="140" width="6" height="26" fill="#1e3a8a"/>
      <text x="14"  y="158" class="mono" fill="#1e3a8a">MYH7, MYBPC3</text>
      <text x="160" y="158" fill="#374151">Hypertrophic cardiomyopathy</text>
      <text x="430" y="158" fill="#525252">Cardiac</text>

      <!-- KCNQ1 -->
      <rect y="168" width="540" height="26" fill="#dbeafe"/>
      <rect y="168" width="6" height="26" fill="#1e3a8a"/>
      <text x="14"  y="186" class="mono" fill="#1e3a8a">KCNQ1, KCNH2, SCN5A</text>
      <text x="160" y="186" fill="#374151">Long QT / arrhythmia syndromes</text>
      <text x="430" y="186" fill="#525252">Cardiac</text>

      <!-- RYR1 -->
      <rect y="196" width="540" height="26" fill="#ccfbf1"/>
      <rect y="196" width="6" height="26" fill="#0d7377"/>
      <text x="14"  y="214" class="mono" fill="#0d7377">RYR1</text>
      <text x="160" y="214" fill="#374151">Malignant hyperthermia</text>
      <text x="430" y="214" fill="#525252">MH</text>

      <!-- NF1 -->
      <rect y="224" width="540" height="26" fill="#fef2f2"/>
      <rect y="224" width="6" height="26" fill="#c4342c"/>
      <text x="14"  y="242" class="mono" fill="#7f1d1d">NF1</text>
      <text x="160" y="242" fill="#374151">Neurofibromatosis type 1</text>
      <text x="430" y="242" fill="#525252">Cancer</text>

      <!-- VHL -->
      <rect y="252" width="540" height="26" fill="#fee2e2"/>
      <rect y="252" width="6" height="26" fill="#c4342c"/>
      <text x="14"  y="270" class="mono" fill="#7f1d1d">VHL</text>
      <text x="160" y="270" fill="#374151">von Hippel-Lindau syndrome</text>
      <text x="430" y="270" fill="#525252">Cancer</text>
    </g>
  </g>

  <text x="600" y="540" text-anchor="middle" font-size="10" fill="#6b7280">Inclusion criterion = "actionable": clear medical intervention (surveillance, prophylactic surgery, lifestyle change, drug avoidance) that changes outcome.</text>
</svg>
