<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#525252"/>
    </marker>
  </defs>
  <rect width="1200" height="560" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">FDA approval pathways for sequencing assays — three branches, post-2024 LDT shift</text>

  <!-- Starting node -->
  <g transform="translate(60,250)">
    <rect width="180" height="80" fill="#374151" rx="8"/>
    <text x="90" y="36" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Assay concept</text>
    <text x="90" y="56" text-anchor="middle" font-size="10" fill="#d1d5db">(sequencing-based test)</text>
  </g>

  <!-- Three branch arrows from start -->
  <g stroke="#525252" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <!-- Top: RUO -->
    <path d="M 240 270 C 300 270 300 110 360 110"/>
    <!-- Middle: LDT -->
    <path d="M 240 290 L 360 290"/>
    <!-- Bottom: IVD -->
    <path d="M 240 310 C 300 310 300 470 360 470"/>
  </g>

  <!-- Top branch: RUO -->
  <g transform="translate(360,72)">
    <rect width="180" height="76" fill="#e5e7eb" stroke="#a8a29e" rx="6"/>
    <text x="90" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">RUO</text>
    <text x="90" y="46" text-anchor="middle" font-size="10" fill="#525252">Research Use Only</text>
    <text x="90" y="62" text-anchor="middle" font-size="9" fill="#6b7280">non-clinical · explicit label</text>
  </g>
  <g stroke="#a8a29e" stroke-width="1" fill="none" marker-end="url(#arr)">
    <line x1="540" y1="110" x2="640" y2="110"/>
  </g>
  <g transform="translate(640,72)">
    <rect width="240" height="76" fill="#fff" stroke="#a8a29e" stroke-dasharray="4 3" rx="6"/>
    <text x="120" y="26" text-anchor="middle" font-size="11" font-weight="600" fill="#525252">Research applications</text>
    <text x="120" y="44" text-anchor="middle" font-size="10" fill="#6b7280">academic tools · reagents</text>
    <text x="120" y="60" text-anchor="middle" font-size="9" fill="#6b7280" class="mono">e.g. open-source variant callers</text>
  </g>

  <!-- Middle branch: LDT -->
  <g transform="translate(360,250)">
    <rect width="180" height="80" fill="#fde68a" stroke="#b45309" rx="6"/>
    <rect width="6" height="80" fill="#b45309"/>
    <text x="90" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">LDT</text>
    <text x="90" y="46" text-anchor="middle" font-size="10" fill="#92400e">Laboratory-Developed Test</text>
    <text x="90" y="62" text-anchor="middle" font-size="9" fill="#525252">single-lab · validated in-house</text>
  </g>

  <!-- Sub-boxes: post-2024 phased oversight -->
  <g transform="translate(560,236)">
    <rect width="600" height="108" fill="#fef3c7" stroke="#b45309" rx="6"/>
    <text x="300" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">2024 FDA rule — phased over 4 years</text>

    <g transform="translate(20,32)" font-size="10">
      <rect width="130" height="64" fill="#fff" stroke="#d97706" rx="4"/>
      <text x="65" y="20" text-anchor="middle" font-weight="600" fill="#92400e">Yr 1</text>
      <text x="65" y="36" text-anchor="middle" fill="#374151">adverse-event</text>
      <text x="65" y="50" text-anchor="middle" fill="#374151">reporting</text>

      <rect x="140" width="130" height="64" fill="#fff" stroke="#d97706" rx="4"/>
      <text x="205" y="20" text-anchor="middle" font-weight="600" fill="#92400e">Yr 2</text>
      <text x="205" y="36" text-anchor="middle" fill="#374151">quality-system</text>
      <text x="205" y="50" text-anchor="middle" fill="#374151">compliance</text>

      <rect x="280" width="130" height="64" fill="#fff" stroke="#d97706" rx="4"/>
      <text x="345" y="20" text-anchor="middle" font-weight="600" fill="#92400e">Yr 3</text>
      <text x="345" y="36" text-anchor="middle" fill="#374151">registration +</text>
      <text x="345" y="50" text-anchor="middle" fill="#374151">listing</text>

      <rect x="420" width="140" height="64" fill="#fff" stroke="#d97706" rx="4"/>
      <text x="490" y="20" text-anchor="middle" font-weight="600" fill="#92400e">Yr 4</text>
      <text x="490" y="36" text-anchor="middle" fill="#374151">premarket review</text>
      <text x="490" y="50" text-anchor="middle" fill="#374151">(high-risk LDTs)</text>
    </g>
  </g>

  <text x="540" y="362" text-anchor="middle" font-size="10" fill="#92400e" class="mono">e.g. most clinical exome labs pre-2024 · transitioning 2024–2028</text>

  <!-- Bottom branch: IVD -->
  <g transform="translate(360,432)">
    <rect width="180" height="80" fill="#bfdbfe" stroke="#1e3a8a" rx="6"/>
    <rect width="6" height="80" fill="#1e3a8a"/>
    <text x="90" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">IVD</text>
    <text x="90" y="46" text-anchor="middle" font-size="10" fill="#1e40af">FDA-reviewed device</text>
    <text x="90" y="62" text-anchor="middle" font-size="9" fill="#525252">commercial kit</text>
  </g>

  <!-- IVD sub-paths: 510(k) and PMA -->
  <g stroke="#1e3a8a" stroke-width="1" fill="none" marker-end="url(#arr)">
    <line x1="540" y1="450" x2="640" y2="430"/>
    <line x1="540" y1="490" x2="640" y2="510"/>
  </g>

  <g transform="translate(640,408)">
    <rect width="280" height="44" fill="#dbeafe" stroke="#1e40af" rx="4"/>
    <text x="14" y="18" font-size="11" font-weight="700" fill="#1e3a8a">510(k)</text>
    <text x="80" y="18" font-size="10" fill="#374151">— substantially equivalent</text>
    <text x="14" y="34" font-size="9" fill="#525252" class="mono">e.g. Oncomine Dx Target Test</text>
  </g>
  <g stroke="#a8a29e" stroke-width="1" fill="none" marker-end="url(#arr)">
    <line x1="920" y1="430" x2="1010" y2="430"/>
  </g>
  <g transform="translate(1010,408)">
    <rect width="150" height="44" fill="#fff" stroke="#a8a29e" stroke-dasharray="4 3" rx="4"/>
    <text x="75" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">Commercial kit</text>
    <text x="75" y="32" text-anchor="middle" font-size="9" fill="#6b7280">(faster path)</text>
  </g>

  <g transform="translate(640,488)">
    <rect width="280" height="44" fill="#1e3a8a" rx="4"/>
    <text x="14" y="18" font-size="11" font-weight="700" fill="#fde68a">PMA</text>
    <text x="60" y="18" font-size="10" fill="#fff">— Premarket Approval</text>
    <text x="14" y="34" font-size="9" fill="#dbeafe" class="mono">e.g. FoundationOne CDx, MSK-IMPACT</text>
  </g>
  <g stroke="#1e3a8a" stroke-width="1" fill="none" marker-end="url(#arr)">
    <line x1="920" y1="510" x2="1010" y2="510"/>
  </g>
  <g transform="translate(1010,488)">
    <rect width="150" height="44" fill="#1e3a8a" rx="4"/>
    <text x="75" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Commercial CDx kit</text>
    <text x="75" y="32" text-anchor="middle" font-size="9" fill="#dbeafe">(rigorous · Class III)</text>
  </g>

  <!-- Bottom annotation lowered y=540→552 so its glyph top y≈544
       no longer kisses the PMA / "Commercial CDx kit" box bottom
       at y=532. Still inside viewBox (height 560, glyph descends
       to ~y=555). -->
  <text x="600" y="552" text-anchor="middle" font-size="10" fill="#6b7280">Three doors. Picking the wrong door — claiming RUO when intent is clinical, or LDT when scope is commercial — costs years of regulatory delay.</text>
</svg>
