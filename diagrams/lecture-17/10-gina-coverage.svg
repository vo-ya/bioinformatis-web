<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="540" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">GINA — what it covers, what it doesn't, where state law fills the gap</text>

  <!-- Frame -->
  <rect x="40" y="56" width="1120" height="430" fill="#fff" stroke="#a8a29e" rx="6"/>

  <!-- Central covered region -->
  <ellipse cx="600" cy="270" rx="240" ry="150" fill="#bfdbfe" stroke="#1e3a8a" stroke-width="2"/>
  <text x="600" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a" letter-spacing="0.04em">COVERED BY GINA</text>

  <g transform="translate(600,232)" font-size="11" text-anchor="middle">
    <text x="0" y="20" font-weight="600" fill="#1e3a8a">Health insurance</text>
    <text x="0" y="36" font-size="10" fill="#374151">group + individual plans</text>
    <text x="0" y="58" font-weight="600" fill="#1e3a8a">Employment</text>
    <text x="0" y="74" font-size="10" fill="#374151">large employers (≥ 15 staff)</text>
    <text x="0" y="92" font-size="9" fill="#6b7280">— hiring, firing, promotion, terms</text>
  </g>

  <!-- Outer NOT-covered domains as boxes around the ellipse -->

  <!-- Life insurance (top-left) -->
  <g transform="translate(110,90)">
    <rect width="220" height="76" fill="#fee2e2" stroke="#c4342c" stroke-width="1.5" rx="6"/>
    <text x="110" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">NOT covered: Life insurance</text>
    <text x="110" y="40" text-anchor="middle" font-size="10" fill="#374151">Insurer may use BRCA+ results</text>
    <text x="110" y="56" text-anchor="middle" font-size="10" fill="#374151">to deny coverage or raise premiums</text>
    <text x="110" y="72" text-anchor="middle" font-size="9" fill="#6b7280" class="mono">CA, FL: state-law partial fill</text>
  </g>

  <!-- Long-term care (top-centre) -->
  <g transform="translate(490,80)">
    <rect width="220" height="68" fill="#fee2e2" stroke="#c4342c" stroke-width="1.5" rx="6"/>
    <text x="110" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">NOT: Long-term care</text>
    <text x="110" y="40" text-anchor="middle" font-size="10" fill="#374151">Includes APOE for dementia risk,</text>
    <text x="110" y="56" text-anchor="middle" font-size="10" fill="#374151">HTT for Huntington-disease risk</text>
  </g>

  <!-- Disability insurance (top-right) -->
  <g transform="translate(870,90)">
    <rect width="220" height="76" fill="#fee2e2" stroke="#c4342c" stroke-width="1.5" rx="6"/>
    <text x="110" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">NOT: Disability insurance</text>
    <text x="110" y="40" text-anchor="middle" font-size="10" fill="#374151">Insurer may use genetic info</text>
    <text x="110" y="56" text-anchor="middle" font-size="10" fill="#374151">in underwriting decisions</text>
    <text x="110" y="72" text-anchor="middle" font-size="9" fill="#6b7280" class="mono">VT, OR, MA: partial fill</text>
  </g>

  <!-- Small employers (bottom-left) -->
  <g transform="translate(110,376)">
    <rect width="220" height="76" fill="#fee2e2" stroke="#c4342c" stroke-width="1.5" rx="6"/>
    <text x="110" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">NOT: Small employers</text>
    <text x="110" y="40" text-anchor="middle" font-size="10" fill="#374151">&lt; 15 employees</text>
    <text x="110" y="56" text-anchor="middle" font-size="10" fill="#374151">excluded from GINA Title II</text>
    <text x="110" y="72" text-anchor="middle" font-size="9" fill="#6b7280">~5% of US workforce</text>
  </g>

  <!-- US military (bottom-centre) -->
  <g transform="translate(490,392)">
    <rect width="220" height="60" fill="#fee2e2" stroke="#c4342c" stroke-width="1.5" rx="6"/>
    <text x="110" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">NOT: US military</text>
    <text x="110" y="40" text-anchor="middle" font-size="10" fill="#374151">Separate regulatory regime</text>
    <text x="110" y="56" text-anchor="middle" font-size="9" fill="#6b7280" class="mono">DoD genetic policy applies</text>
  </g>

  <!-- State patchwork (bottom-right) -->
  <g transform="translate(870,376)">
    <rect width="220" height="76" fill="#dcfce7" stroke="#059669" stroke-width="1.5" rx="6"/>
    <text x="110" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">State-law patchwork</text>
    <text x="110" y="40" text-anchor="middle" font-size="10" fill="#374151">CA, FL, VT, OR, WA, MA, CT</text>
    <text x="110" y="56" text-anchor="middle" font-size="10" fill="#374151">add partial protection in</text>
    <text x="110" y="72" text-anchor="middle" font-size="10" fill="#374151">life / disability / LTC insurance</text>
  </g>

  <!-- Connecting lines from outer boxes to central ellipse boundary (visually exclude) -->
  <g stroke="#c4342c" stroke-width="1" stroke-dasharray="3 3" fill="none">
    <line x1="220" y1="166" x2="370" y2="220"/>
    <line x1="600" y1="148" x2="600" y2="220"/>
    <line x1="980" y1="166" x2="828" y2="220"/>
    <line x1="220" y1="376" x2="370" y2="320"/>
    <line x1="600" y1="392" x2="600" y2="320"/>
  </g>

  <!-- Bottom caption -->
  <rect x="40" y="500" width="1120" height="34" fill="#fef3c7" stroke="#b45309" rx="4"/>
  <text x="600" y="518" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Carve-outs reflect 2008 legislative compromises with the insurance industry.</text>
  <text x="600" y="530" text-anchor="middle" font-size="9" fill="#92400e">Bills to close the life/disability/long-term care gaps have been introduced periodically and have not passed.</text>
</svg>
