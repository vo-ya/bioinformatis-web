<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#525252"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Immunogenomics — HLA presentation, V(D)J recombination, neoantigen pipeline</text>

  <!-- Top: HLA peptide presentation -->
  <g transform="translate(40,60)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#525252">HLA PEPTIDE PRESENTATION</text>

    <!-- Tumor cell -->
    <g transform="translate(20,16)">
      <ellipse cx="80" cy="80" rx="80" ry="70" fill="#fee2e2" stroke="#7f1d1d" stroke-width="1.5"/>
      <text x="80" y="80" text-anchor="middle" font-size="11" font-weight="600" fill="#7f1d1d">tumour cell</text>
      <text x="80" y="98" text-anchor="middle" font-size="9" fill="#525252">somatic mutation</text>
      <text x="80" y="110" text-anchor="middle" class="mono" fill="#7f1d1d">L → V at codon 142</text>
    </g>

    <!-- Arrow + protein -->
    <g stroke="#525252" stroke-width="1" fill="none" marker-end="url(#arr)">
      <line x1="190" y1="96" x2="220" y2="96"/>
    </g>

    <g transform="translate(225,40)">
      <rect width="180" height="40" fill="#bfdbfe" stroke="#1e3a8a" rx="3"/>
      <text x="90" y="18" text-anchor="middle" font-size="11" fill="#1e3a8a">mutant protein</text>
      <text x="90" y="32" text-anchor="middle" class="mono" fill="#525252">...PVKLM<tspan fill="#c4342c" font-weight="700">V</tspan>NSAR...</text>

      <!-- Proteasome -->
      <g transform="translate(0,80)">
        <text x="90" y="-4" text-anchor="middle" font-size="9" fill="#525252">↓ proteasomal degradation</text>
        <rect width="180" height="34" fill="#dbeafe" stroke="#1e3a8a" rx="3"/>
        <text x="90" y="14" text-anchor="middle" font-size="10" fill="#1e3a8a">peptide pool (~9-mers)</text>
        <text x="90" y="26" text-anchor="middle" class="mono" fill="#525252">VKLM<tspan fill="#c4342c" font-weight="700">V</tspan>NSAR · LM<tspan fill="#c4342c" font-weight="700">V</tspan>NSARQS · ...</text>
      </g>

      <!-- TAP transport -->
      <g transform="translate(0,140)">
        <text x="90" y="-4" text-anchor="middle" font-size="9" fill="#525252">↓ TAP transport into ER</text>
      </g>
    </g>

    <!-- HLA loading -->
    <g transform="translate(450,80)">
      <rect width="160" height="44" fill="#ede9fe" stroke="#7c3aed" rx="3"/>
      <text x="80" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">HLA class I</text>
      <text x="80" y="32" text-anchor="middle" class="mono" fill="#525252">e.g. A*02:01</text>
    </g>

    <g transform="translate(450,134)">
      <rect width="160" height="34" fill="#fef3c7" stroke="#b45309" rx="3"/>
      <text x="80" y="14" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">peptide-MHC complex</text>
      <text x="80" y="26" text-anchor="middle" class="mono" fill="#525252">9-mer in groove</text>
    </g>

    <!-- Arrow to T cell -->
    <g stroke="#525252" stroke-width="1" fill="none" marker-end="url(#arr)">
      <line x1="615" y1="151" x2="660" y2="151"/>
    </g>

    <g transform="translate(665,80)">
      <ellipse cx="60" cy="60" rx="55" ry="50" fill="#dcfce7" stroke="#065f46" stroke-width="1.5"/>
      <text x="60" y="56" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">CD8 T cell</text>
      <text x="60" y="72" text-anchor="middle" font-size="9" fill="#525252">TCR recognition</text>
      <text x="60" y="86" text-anchor="middle" font-size="9" fill="#525252">→ tumour killing</text>
    </g>

    <!-- Annotation -->
    <text x="800" y="120" font-size="10" font-weight="600" fill="#374151">Three computational steps:</text>
    <g transform="translate(800,128)" font-size="9" fill="#525252">
      <text x="0" y="14">1. Predict peptide cleavage (NetChop)</text>
      <text x="0" y="28">2. Predict HLA binding (NetMHCpan, MHCflurry)</text>
      <text x="0" y="42">3. Filter for tumour expression (RNA-seq)</text>
      <text x="0" y="56">→ ranked neoantigen list</text>
    </g>
  </g>

  <!-- Middle: V(D)J recombination -->
  <g transform="translate(40,260)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#525252">V(D)J RECOMBINATION — TCR REPERTOIRE</text>

    <!-- Genome view: V, D, J segments -->
    <g transform="translate(0,16)">
      <text x="0" y="14" font-size="10" fill="#374151">germline TCR β locus:</text>

      <!-- V segments -->
      <g transform="translate(140,4)">
        <rect x="0"   y="0" width="22" height="14" fill="#1e3a8a"/>
        <rect x="24"  y="0" width="22" height="14" fill="#1e3a8a"/>
        <rect x="48"  y="0" width="22" height="14" fill="#1e3a8a"/>
        <rect x="72"  y="0" width="22" height="14" fill="#1e3a8a"/>
        <rect x="96"  y="0" width="22" height="14" fill="#1e3a8a"/>
        <text x="60" y="-4" text-anchor="middle" font-size="9" fill="#1e3a8a">~50 V segments</text>
        <text x="60" y="26" text-anchor="middle" font-size="9" fill="#525252">...</text>
      </g>

      <!-- D segments -->
      <g transform="translate(290,4)">
        <rect x="0"  y="0" width="14" height="14" fill="#b45309"/>
        <rect x="16" y="0" width="14" height="14" fill="#b45309"/>
        <text x="15" y="-4" text-anchor="middle" font-size="9" fill="#b45309">2 D</text>
      </g>

      <!-- J segments -->
      <g transform="translate(340,4)">
        <rect x="0"   y="0" width="18" height="14" fill="#0d7377"/>
        <rect x="20"  y="0" width="18" height="14" fill="#0d7377"/>
        <rect x="40"  y="0" width="18" height="14" fill="#0d7377"/>
        <rect x="60"  y="0" width="18" height="14" fill="#0d7377"/>
        <rect x="80"  y="0" width="18" height="14" fill="#0d7377"/>
        <text x="50" y="-4" text-anchor="middle" font-size="9" fill="#0d7377">~13 J segments</text>
      </g>

      <!-- C constant -->
      <g transform="translate(450,4)">
        <rect x="0" y="0" width="40" height="14" fill="#525252"/>
        <text x="20" y="-4" text-anchor="middle" font-size="9" fill="#525252">C constant</text>
      </g>
    </g>

    <!-- Recombination arrow -->
    <g transform="translate(0,68)">
      <text x="600" y="0" text-anchor="middle" font-size="11" fill="#7f1d1d">↓ somatic V(D)J recombination + N-region addition</text>
    </g>

    <!-- Recombined receptor -->
    <g transform="translate(0,90)">
      <text x="0" y="14" font-size="10" fill="#374151">single T-cell receptor:</text>
      <g transform="translate(140,4)">
        <rect x="0"  y="0" width="60" height="14" fill="#1e3a8a"/>
        <text x="30" y="11" text-anchor="middle" font-size="9" fill="#fff">V (e.g. V12)</text>

        <rect x="62" y="0" width="14" height="14" fill="#fef3c7" stroke="#b45309"/>
        <text x="69" y="-4" text-anchor="middle" font-size="8" fill="#92400e">N</text>

        <rect x="78" y="0" width="14" height="14" fill="#b45309"/>
        <text x="85" y="11" text-anchor="middle" font-size="9" fill="#fff">D</text>

        <rect x="94" y="0" width="14" height="14" fill="#fef3c7" stroke="#b45309"/>
        <text x="101" y="-4" text-anchor="middle" font-size="8" fill="#92400e">N</text>

        <rect x="110" y="0" width="50" height="14" fill="#0d7377"/>
        <text x="135" y="11" text-anchor="middle" font-size="9" fill="#fff">J (e.g. J2-7)</text>

        <rect x="162" y="0" width="40" height="14" fill="#525252"/>
        <text x="182" y="11" text-anchor="middle" font-size="9" fill="#fff">C</text>
      </g>
      <text x="450" y="14" font-size="10" font-weight="600" fill="#92400e">CDR3 = junctional region</text>
      <text x="450" y="28" class="mono" fill="#525252">CASRPGTGELFF</text>
    </g>

    <!-- Diversity stats -->
    <g transform="translate(750,88)" font-size="10" fill="#374151">
      <rect x="0" y="-14" width="320" height="48" fill="#fef3c7" stroke="#b45309" rx="3"/>
      <text x="14" y="6" font-weight="600" fill="#92400e">Theoretical diversity</text>
      <text x="14" y="20" class="mono" fill="#525252">~50 V × 2 D × 13 J × N additions</text>
      <text x="14" y="32" class="mono" fill="#525252">≈ 10¹⁵ possible TCRs</text>
    </g>
  </g>

  <!-- Bottom: Neoantigen pipeline -->
  <g transform="translate(40,440)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#525252">NEOANTIGEN PIPELINE</text>

    <g transform="translate(0,18)">
      <!-- Stage 1 -->
      <rect x="0" y="0" width="180" height="60" fill="#fee2e2" stroke="#c4342c" rx="4"/>
      <text x="90" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#7f1d1d">Tumour vs normal seq</text>
      <text x="90" y="36" text-anchor="middle" class="mono" fill="#525252">Mutect2 / Strelka2</text>
      <text x="90" y="50" text-anchor="middle" font-size="9" fill="#525252">→ ~150 missense</text>

      <line x1="180" y1="30" x2="200" y2="30" stroke="#525252" stroke-width="1" marker-end="url(#arr)"/>

      <!-- Stage 2 -->
      <g transform="translate(200,0)">
        <rect x="0" y="0" width="180" height="60" fill="#bfdbfe" stroke="#1e3a8a" rx="4"/>
        <text x="90" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#1e3a8a">HLA typing (host)</text>
        <text x="90" y="36" text-anchor="middle" class="mono" fill="#525252">OptiType / HLA-LA</text>
        <text x="90" y="50" text-anchor="middle" font-size="9" fill="#525252">→ 6 class-I alleles</text>
      </g>

      <line x1="380" y1="30" x2="400" y2="30" stroke="#525252" stroke-width="1" marker-end="url(#arr)"/>

      <!-- Stage 3 -->
      <g transform="translate(400,0)">
        <rect x="0" y="0" width="180" height="60" fill="#ede9fe" stroke="#7c3aed" rx="4"/>
        <text x="90" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">Translate mutations</text>
        <text x="90" y="36" text-anchor="middle" font-size="9" fill="#525252">9-11mer windows</text>
        <text x="90" y="50" text-anchor="middle" class="mono" fill="#525252">~1500 candidates</text>
      </g>

      <line x1="580" y1="30" x2="600" y2="30" stroke="#525252" stroke-width="1" marker-end="url(#arr)"/>

      <!-- Stage 4 -->
      <g transform="translate(600,0)">
        <rect x="0" y="0" width="180" height="60" fill="#fef3c7" stroke="#b45309" rx="4"/>
        <text x="90" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Predict HLA binding</text>
        <text x="90" y="36" text-anchor="middle" class="mono" fill="#525252">NetMHCpan / MHCflurry</text>
        <text x="90" y="50" text-anchor="middle" font-size="9" fill="#525252">rank ≤ 0.5%</text>
      </g>

      <line x1="780" y1="30" x2="800" y2="30" stroke="#525252" stroke-width="1" marker-end="url(#arr)"/>

      <!-- Stage 5 -->
      <g transform="translate(800,0)">
        <rect x="0" y="0" width="200" height="60" fill="#dcfce7" stroke="#059669" rx="4"/>
        <rect x="0" y="0" width="6" height="60" fill="#065f46"/>
        <text x="100" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">Filter expressed</text>
        <text x="100" y="36" text-anchor="middle" font-size="9" fill="#525252">RNA-seq TPM &gt; 1</text>
        <text x="100" y="50" text-anchor="middle" font-size="9" fill="#525252">→ ~10 high-confidence</text>
      </g>
    </g>

    <!-- Output -->
    <g transform="translate(0,98)">
      <rect width="1080" height="42" fill="#fff" stroke="#a8a29e" rx="3"/>
      <text x="14" y="20" font-size="11" font-weight="600" fill="#374151">Output: ranked neoantigen list →</text>
      <text x="290" y="20" font-size="10" fill="#525252">personal mRNA vaccine (Moderna mRNA-4157, Phase III) ·</text>
      <text x="290" y="34" font-size="10" fill="#525252">TCR-T cell design · pembrolizumab response biomarker</text>
    </g>
  </g>

  <!-- Bottom annotation -->
  <text x="600" y="700" text-anchor="middle" font-size="10" fill="#525252">Three immunogenomics layers — HLA presentation, V(D)J repertoire, neoantigen prediction — power modern immuno-oncology and transplant medicine.</text>
</svg>
