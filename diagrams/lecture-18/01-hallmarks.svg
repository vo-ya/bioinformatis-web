<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 740" width="1200" height="740" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 9px; font-style: italic; }</style></defs>
  <rect width="1200" height="740" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Hallmarks of cancer — Hanahan &amp; Weinberg, 2000 → 2011 → 2022</text>

  <!-- Inset timeline -->
  <g transform="translate(40,52)">
    <text x="0" y="0" font-size="9" font-weight="600" fill="#525252" letter-spacing="0.04em">TIMELINE</text>
    <g transform="translate(0,8)" font-size="9">
      <rect width="14" height="10" fill="#1d4ed8"/>
      <text x="20" y="9" fill="#374151">2000 — original 6 hallmarks</text>
      <rect y="14" width="14" height="10" fill="#b45309"/>
      <text x="20" y="23" fill="#374151">2011 — energy metabolism + immune evasion + others</text>
      <rect y="28" width="14" height="10" fill="#0d7377"/>
      <text x="20" y="37" fill="#374151">2022 — phenotypic plasticity, senescence, microbiome, epigenetic</text>
    </g>
  </g>

  <!-- Central cell glyph -->
  <g transform="translate(600,380)">
    <ellipse cx="0" cy="0" rx="80" ry="68" fill="#fee2e2" stroke="#7f1d1d" stroke-width="2"/>
    <!-- Disorganised chromatin -->
    <g stroke="#7f1d1d" stroke-width="1.5" fill="none">
      <path d="M -50 -30 Q -30 -10 -10 -30 T 30 -30 T 60 -10"/>
      <path d="M -60 0 Q -30 20 0 0 T 50 0"/>
      <path d="M -40 30 Q -10 50 20 30 T 60 30"/>
    </g>
    <circle cx="-10" cy="-12" r="4" fill="#7f1d1d"/>
    <circle cx="20"  cy="8"   r="4" fill="#7f1d1d"/>
    <circle cx="-30" cy="22"  r="3" fill="#7f1d1d"/>
    <text x="0" y="58" text-anchor="middle" font-size="11" font-weight="600" fill="#7f1d1d">cancer cell</text>
  </g>

  <!-- 14 spokes radiating outward. Position spokes at angles 0..360 step ~25.7°.
       Spoke geometry: rect at distance ~290 from center 600,380, dimensions 220x60.
       Place 14 spokes around the circle. -->

  <!-- Helper: For each spoke, anchor point at angle a around center -->
  <!-- I'll position rectangles in fixed positions for clarity -->

  <!-- Spoke 1: top, sustaining prolif (cobalt 2000) -->
  <g transform="translate(490,90)">
    <rect width="220" height="58" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5" rx="6"/>
    <rect width="6" height="58" fill="#1d4ed8"/>
    <text x="14" y="20" font-size="11" font-weight="600" fill="#1e3a8a">Sustaining proliferation</text>
    <text x="14" y="36" class="mono" fill="#525252">RAS / RAF / MEK activating</text>
    <text x="14" y="48" class="mono" fill="#525252">EGFR L858R, BRAF V600E</text>
  </g>

  <!-- Spoke 2: top-right, evading growth suppressors -->
  <g transform="translate(820,140)">
    <rect width="220" height="58" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5" rx="6"/>
    <rect width="6" height="58" fill="#1d4ed8"/>
    <text x="14" y="20" font-size="11" font-weight="600" fill="#1e3a8a">Evading growth suppressors</text>
    <text x="14" y="36" class="mono" fill="#525252">TP53 loss · RB1 loss</text>
    <text x="14" y="48" class="mono" fill="#525252">CDKN2A deletion</text>
  </g>

  <!-- Spoke 3: right, resisting cell death -->
  <g transform="translate(950,250)">
    <rect width="220" height="58" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5" rx="6"/>
    <rect width="6" height="58" fill="#1d4ed8"/>
    <text x="14" y="20" font-size="11" font-weight="600" fill="#1e3a8a">Resisting cell death</text>
    <text x="14" y="36" class="mono" fill="#525252">BCL2 over-expression</text>
    <text x="14" y="48" class="mono" fill="#525252">apoptosis evasion</text>
  </g>

  <!-- Spoke 4: right, replicative immortality -->
  <g transform="translate(950,360)">
    <rect width="220" height="58" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5" rx="6"/>
    <rect width="6" height="58" fill="#1d4ed8"/>
    <text x="14" y="20" font-size="11" font-weight="600" fill="#1e3a8a">Replicative immortality</text>
    <text x="14" y="36" class="mono" fill="#525252">TERT promoter mutations</text>
    <text x="14" y="48" class="mono" fill="#525252">telomerase activation</text>
  </g>

  <!-- Spoke 5: lower-right, angiogenesis -->
  <g transform="translate(950,470)">
    <rect width="220" height="58" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5" rx="6"/>
    <rect width="6" height="58" fill="#1d4ed8"/>
    <text x="14" y="20" font-size="11" font-weight="600" fill="#1e3a8a">Inducing angiogenesis</text>
    <text x="14" y="36" class="mono" fill="#525252">VEGF over-expression</text>
    <text x="14" y="48" class="mono" fill="#525252">HIF-1α stabilisation</text>
  </g>

  <!-- Spoke 6: bottom-right, invasion/metastasis -->
  <g transform="translate(820,580)">
    <rect width="220" height="58" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5" rx="6"/>
    <rect width="6" height="58" fill="#1d4ed8"/>
    <text x="14" y="20" font-size="11" font-weight="600" fill="#1e3a8a">Invasion and metastasis</text>
    <text x="14" y="36" class="mono" fill="#525252">EMT programs</text>
    <text x="14" y="48" class="mono" fill="#525252">CDH1 (E-cadherin) loss</text>
  </g>

  <!-- Spoke 7: bottom, energy metabolism (amber 2011) -->
  <g transform="translate(490,640)">
    <rect width="220" height="58" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="6"/>
    <rect width="6" height="58" fill="#b45309"/>
    <text x="14" y="20" font-size="11" font-weight="600" fill="#92400e">Energy reprogramming</text>
    <text x="14" y="36" class="mono" fill="#525252">Warburg effect (glycolysis)</text>
    <text x="14" y="48" class="mono" fill="#525252">HIF-1α / MYC upregulation</text>
  </g>

  <!-- Spoke 8: bottom-left, immune evasion (amber 2011) -->
  <g transform="translate(160,580)">
    <rect width="220" height="58" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="6"/>
    <rect width="6" height="58" fill="#b45309"/>
    <text x="14" y="20" font-size="11" font-weight="600" fill="#92400e">Evading immune destruction</text>
    <text x="14" y="36" class="mono" fill="#525252">PD-L1 over-expression</text>
    <text x="14" y="48" class="mono" fill="#525252">checkpoint-inhibitor target</text>
  </g>

  <!-- Spoke 9: left-bottom, tumour-promoting inflammation (amber 2011) -->
  <g transform="translate(30,470)">
    <rect width="220" height="58" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="6"/>
    <rect width="6" height="58" fill="#b45309"/>
    <text x="14" y="20" font-size="11" font-weight="600" fill="#92400e">Inflammation</text>
    <text x="14" y="36" class="mono" fill="#525252">NF-κB activation</text>
    <text x="14" y="48" class="mono" fill="#525252">cytokine cascades</text>
  </g>

  <!-- Spoke 10: left-mid, GENOME INSTABILITY (meta — 2011, amber, big) -->
  <g transform="translate(30,360)">
    <rect width="220" height="58" fill="#fde68a" stroke="#b45309" stroke-width="2" rx="6"/>
    <rect width="6" height="58" fill="#92400e"/>
    <text x="14" y="20" font-size="11" font-weight="700" fill="#7f1d1d">Genome instability ★</text>
    <text x="14" y="36" class="mono" fill="#525252">BRCA1/2 loss · MMR loss</text>
    <text x="14" y="48" class="mono" fill="#525252">meta-hallmark</text>
  </g>

  <!-- Spoke 11: left-top, plasticity (teal 2022) -->
  <g transform="translate(30,250)">
    <rect width="220" height="58" fill="#ccfbf1" stroke="#0d7377" stroke-width="1.5" rx="6"/>
    <rect width="6" height="58" fill="#0d7377"/>
    <text x="14" y="20" font-size="11" font-weight="600" fill="#0d7377">Phenotypic plasticity</text>
    <text x="14" y="36" class="mono" fill="#525252">EMT · dedifferentiation</text>
    <text x="14" y="48" class="mono" fill="#525252">2022 addition</text>
  </g>

  <!-- Spoke 12: top-left, senescent cells (teal 2022) -->
  <g transform="translate(160,140)">
    <rect width="220" height="58" fill="#ccfbf1" stroke="#0d7377" stroke-width="1.5" rx="6"/>
    <rect width="6" height="58" fill="#0d7377"/>
    <text x="14" y="20" font-size="11" font-weight="600" fill="#0d7377">Senescent cells</text>
    <text x="14" y="36" class="mono" fill="#525252">SASP signalling</text>
    <text x="14" y="48" class="mono" fill="#525252">2022 addition</text>
  </g>

  <!-- Spoke 13: bottom, non-mutational epigenetic (teal 2022) -->
  <g transform="translate(330,640)">
    <rect width="160" height="58" fill="#ccfbf1" stroke="#0d7377" stroke-width="1.5" rx="6"/>
    <rect width="6" height="58" fill="#0d7377"/>
    <text x="14" y="20" font-size="11" font-weight="600" fill="#0d7377">Epigenetic</text>
    <text x="14" y="36" class="mono" fill="#525252">non-mutational</text>
    <text x="14" y="48" class="mono" fill="#525252">2022 addition</text>
  </g>

  <!-- Spoke 14: bottom-right, polymorphic microbiomes (teal 2022) -->
  <g transform="translate(710,640)">
    <rect width="160" height="58" fill="#ccfbf1" stroke="#0d7377" stroke-width="1.5" rx="6"/>
    <rect width="6" height="58" fill="#0d7377"/>
    <text x="14" y="20" font-size="11" font-weight="600" fill="#0d7377">Microbiomes</text>
    <text x="14" y="36" class="mono" fill="#525252">oral · gut · tumour-resident</text>
    <text x="14" y="48" class="mono" fill="#525252">2022 addition</text>
  </g>

  <!-- Connecting lines from cell to each spoke -->
  <g stroke="#a8a29e" stroke-width="0.6" stroke-dasharray="2 2" fill="none">
    <line x1="600" y1="312" x2="600" y2="148"/>
    <line x1="660" y1="340" x2="820" y2="170"/>
    <line x1="678" y1="380" x2="950" y2="280"/>
    <line x1="678" y1="395" x2="950" y2="390"/>
    <line x1="660" y1="425" x2="950" y2="500"/>
    <line x1="640" y1="445" x2="820" y2="610"/>
    <line x1="600" y1="448" x2="600" y2="640"/>
    <line x1="560" y1="445" x2="380" y2="610"/>
    <line x1="540" y1="425" x2="250" y2="500"/>
    <line x1="522" y1="395" x2="250" y2="390"/>
    <line x1="522" y1="380" x2="250" y2="280"/>
    <line x1="540" y1="340" x2="380" y2="170"/>
    <line x1="580" y1="448" x2="410" y2="640"/>
    <line x1="620" y1="448" x2="790" y2="640"/>
  </g>

  <!-- Caption lowered y=704→724 (canvas extended 720→740) so the
       glyph row no longer kisses the bottom-row spokes ending at
       y=698 — earlier the glyph top y=696 sat 2 px inside their
       rounded rects. -->
  <text x="600" y="724" text-anchor="middle" font-size="10" fill="#525252">14 capabilities cancer cells acquire — each is genomically detectable, several are now therapeutically actionable.</text>
</svg>
