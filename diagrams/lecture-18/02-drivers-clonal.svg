    <!-- Driver ticks (red, thicker) labelled -->
    <g stroke="#c4342c" stroke-width="2.5">
      <line x1="80"  y1="16" x2="80"  y2="58"/>
      <line x1="200" y1="16" x2="200" y2="58"/>
      <line x1="340" y1="16" x2="340" y2="58"/>
