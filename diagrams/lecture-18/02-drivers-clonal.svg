  <!-- Bottom half: clonal evolution tree -->
  <g transform="translate(60,260)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#525252">CLONAL EVOLUTION TREE — same tumour, multiple subclones</text>

    <!-- Tree -->
    <g transform="translate(40,30)">
      <!-- Trunk node (MRCA) -->
      <circle cx="200" cy="30" r="20" fill="#7f1d1d"/>
      <text x="200" y="34" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">MRCA</text>

      <!-- Trunk mutations annotation -->
      <g transform="translate(40,8)">
        <rect width="120" height="48" fill="#fee2e2" stroke="#c4342c" rx="3"/>
        <text x="60" y="14" text-anchor="middle" font-size="9" font-weight="600" fill="#7f1d1d">TRUNK · CCF 100%</text>
        <text x="60" y="28" text-anchor="middle" class="mono" fill="#525252">TP53 R175H</text>
        <text x="60" y="40" text-anchor="middle" class="mono" fill="#525252">CDKN2A loss</text>
      </g>

      <!-- Trunk-to-clone1 line -->
      <line x1="200" y1="50" x2="120" y2="170" stroke="#7f1d1d" stroke-width="2"/>
      <line x1="200" y1="50" x2="280" y2="170" stroke="#7f1d1d" stroke-width="2"/>

      <!-- Clone 1 -->
      <circle cx="120" cy="190" r="18" fill="#b45309"/>
      <text x="120" y="194" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">C1</text>
      <g transform="translate(170,170)">
        <rect width="160" height="48" fill="#fef3c7" stroke="#b45309" rx="3"/>
        <text x="80" y="14" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">DOMINANT · CCF 60%</text>
        <text x="80" y="28" text-anchor="middle" class="mono" fill="#525252">+ KRAS G12V</text>
        <text x="80" y="40" text-anchor="middle" class="mono" fill="#525252">subclonal driver</text>
      </g>

      <!-- Clone 2 -->
      <circle cx="380" cy="190" r="18" fill="#7c3aed"/>
      <text x="380" y="194" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">C2</text>
      <g transform="translate(420,170)">
        <rect width="160" height="48" fill="#ede9fe" stroke="#7c3aed" rx="3"/>
        <text x="80" y="14" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6">RESISTANCE · CCF 25%</text>
        <text x="80" y="28" text-anchor="middle" class="mono" fill="#525252">+ EGFR T790M</text>
        <text x="80" y="40" text-anchor="middle" class="mono" fill="#525252">grows under therapy</text>
      </g>

      <!-- VAF distribution panel -->
      <g transform="translate(640,30)">
        <text x="0" y="0" font-size="10" font-weight="600" fill="#525252">VAF distribution from bulk sequencing</text>
        <rect width="380" height="180" fill="#fff" stroke="#a8a29e" rx="3"/>

        <!-- VAF axis -->
        <line x1="40" y1="160" x2="360" y2="160" stroke="#374151"/>
        <g font-size="9" fill="#6b7280" class="mono">
          <text x="40" y="174" text-anchor="middle">0</text>
          <text x="120" y="174" text-anchor="middle">0.10</text>
          <text x="200" y="174" text-anchor="middle">0.20</text>
          <text x="280" y="174" text-anchor="middle">0.30</text>
          <text x="360" y="174" text-anchor="middle">VAF</text>
        </g>

        <!-- Three peaks: trunk at 0.30 (60% pure tumour), C1 at 0.18, C2 at 0.075 -->
        <g fill="#7f1d1d" fill-opacity="0.6">
          <path d="M 280 160 Q 260 80 240 160 Z"/>
        </g>
        <g fill="#b45309" fill-opacity="0.6">
          <path d="M 175 160 Q 155 100 135 160 Z"/>
        </g>
        <g fill="#7c3aed" fill-opacity="0.6">
          <path d="M 100 160 Q 80 130 60 160 Z"/>
        </g>

        <text x="260" y="78" text-anchor="middle" font-size="9" fill="#7f1d1d" font-weight="600">trunk</text>
        <text x="155" y="98" text-anchor="middle" font-size="9" fill="#92400e" font-weight="600">C1 sub.</text>
        <text x="80"  y="128" text-anchor="middle" font-size="9" fill="#5b21b6" font-weight="600">C2 sub.</text>

        <text x="190" y="60" text-anchor="middle" font-size="9" fill="#525252">three modes → three subclones</text>
      </g>
    </g>

    <!-- Sidebar annotations -->
    <g transform="translate(60,300)">
      <rect width="1080" height="48" fill="#fef3c7" stroke="#b45309" rx="4"/>
      <text x="14" y="20" font-size="11" font-weight="600" fill="#92400e">Trunk drivers (CCF = 100%)</text>
      <text x="14" y="36" font-size="10" fill="#374151">are present in every cell — best targeted-therapy candidates.</text>
      <text x="540" y="20" font-size="11" font-weight="600" fill="#5b21b6">Branch drivers (CCF &lt; 100%)</text>
      <text x="540" y="36" font-size="10" fill="#374151">define subclones; under selection pressure they expand and produce treatment-resistant recurrence.</text>
    </g>
  </g>
