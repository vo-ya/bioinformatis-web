      <line x1="940" y1="16" x2="940" y2="58"/>
      <line x1="1020" y1="16" x2="1020" y2="58"/>
    </g>

    <!-- Driver labels -->
    <g font-size="9" font-weight="600" fill="#7f1d1d" class="mono">
      <text x="80"   y="78" text-anchor="middle">TP53</text>
      <text x="200"  y="78" text-anchor="middle">KRAS</text>
      <text x="340"  y="78" text-anchor="middle">EGFR</text>
      <text x="430"  y="78" text-anchor="middle">PIK3CA</text>
      <text x="540"  y="78" text-anchor="middle">BRAF</text>
      <text x="660"  y="78" text-anchor="middle">RB1</text>
      <text x="760"  y="78" text-anchor="middle">CDKN2A</text>
      <text x="850"  y="78" text-anchor="middle">SMAD4</text>
      <text x="940"  y="78" text-anchor="middle">APC</text>
      <text x="1020" y="78" text-anchor="middle">PTEN</text>
    </g>

    <text x="540" y="100" text-anchor="middle" font-size="11" fill="#525252">~10 drivers (red) drive selection · ~10,000 passengers (grey) are evolutionary byproducts</text>

    <!-- Legend -->
    <g transform="translate(0,114)" font-size="10">
      <rect width="14" height="10" fill="#9ca3af"/>
      <text x="20" y="9" fill="#374151">Passenger mutation (neutral)</text>
      <line x1="200" y1="0" x2="200" y2="10" stroke="#c4342c" stroke-width="2.5"/>
      <text x="208" y="9" fill="#374151">Driver mutation (positively selected; therapeutic target)</text>
    </g>
