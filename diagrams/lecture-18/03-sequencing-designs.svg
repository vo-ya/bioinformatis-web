<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#525252"/>
    </marker>
  </defs>
  <rect width="1200" height="560" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Three cancer-sequencing designs — tumour-normal · FFPE tumour-only · ctDNA</text>

  <!-- Three columns: x = 40, 420, 800. Each col 360 wide. -->

  <!-- Column 1: tumour-normal -->
  <g transform="translate(40,60)">
    <rect width="360" height="464" fill="#fff" stroke="#1d4ed8" rx="6"/>
    <rect width="360" height="36" fill="#1d4ed8" rx="6"/>
    <rect y="30" width="360" height="6" fill="#1d4ed8"/>
    <text x="180" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.04em">TUMOUR-NORMAL PAIRED</text>

    <!-- Pipeline -->
    <g transform="translate(20,52)">
      <rect width="160" height="42" fill="#fee2e2" stroke="#7f1d1d" rx="4"/>
      <rect width="6" height="42" fill="#7f1d1d"/>
      <text x="86" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#7f1d1d">Tumour FASTQ</text>
      <text x="86" y="34" text-anchor="middle" class="mono" fill="#525252">~100× coverage</text>

      <rect x="160" width="160" height="42" fill="#dbeafe" stroke="#1e3a8a" rx="4"/>
      <rect x="160" width="6" height="42" fill="#1e3a8a"/>
      <text x="246" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">Normal FASTQ</text>
      <text x="246" y="34" text-anchor="middle" class="mono" fill="#525252">~30× blood / saliva</text>
    </g>

    <g stroke="#525252" stroke-width="1" fill="none" marker-end="url(#arr3)">
      <line x1="106" y1="98" x2="170" y2="116"/>
      <line x1="266" y1="98" x2="170" y2="116"/>
    </g>

    <g transform="translate(20,116)">
      <rect width="320" height="40" fill="#f5f5f4" stroke="#374151" rx="4"/>
      <text x="160" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">BWA-MEM alignment</text>
      <text x="160" y="32" text-anchor="middle" class="mono" fill="#525252">tumour.bam · normal.bam</text>
    </g>

    <g stroke="#525252" stroke-width="1" fill="none" marker-end="url(#arr3)">
      <line x1="180" y1="158" x2="180" y2="180"/>
    </g>

    <g transform="translate(20,180)">
      <rect width="320" height="64" fill="#f5f5f4" stroke="#374151" rx="4"/>
      <text x="160" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Mutect2 paired-mode</text>
      <text x="160" y="34" text-anchor="middle" class="mono" fill="#525252">tumour.bam − normal.bam → somatic VCF</text>
      <text x="160" y="50" text-anchor="middle" font-size="9" fill="#6b7280">+ PoN filter · contamination · OB</text>
    </g>

    <g stroke="#525252" stroke-width="1" fill="none" marker-end="url(#arr3)">
      <line x1="180" y1="246" x2="180" y2="268"/>
    </g>

    <g transform="translate(20,268)">
      <rect width="320" height="44" fill="#dcfce7" stroke="#059669" rx="4"/>
      <rect width="6" height="44" fill="#059669"/>
      <text x="166" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">Somatic VCF</text>
      <text x="166" y="36" text-anchor="middle" class="mono" fill="#525252">clean germline-vs-somatic split</text>
    </g>

    <text x="180" y="350" text-anchor="middle" font-size="10" font-weight="600" fill="#1e3a8a">+ gold-standard accuracy</text>
    <text x="180" y="368" text-anchor="middle" font-size="10" fill="#525252">+ ancestry-agnostic germline filter</text>
    <text x="180" y="396" text-anchor="middle" font-size="10" font-weight="600" fill="#7f1d1d">− two samples, doubled cost</text>
    <text x="180" y="414" text-anchor="middle" font-size="10" fill="#525252">− blood draw required</text>

    <text x="180" y="448" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Use case: research cohorts (TCGA, PCAWG)</text>
  </g>

  <!-- Column 2: FFPE tumour-only -->
  <g transform="translate(420,60)">
    <rect width="360" height="464" fill="#fff" stroke="#b45309" rx="6"/>
    <rect width="360" height="36" fill="#b45309" rx="6"/>
    <rect y="30" width="360" height="6" fill="#b45309"/>
    <text x="180" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.04em">FFPE TUMOUR-ONLY</text>

    <g transform="translate(20,52)">
      <rect width="320" height="42" fill="#fef3c7" stroke="#b45309" rx="4"/>
      <rect width="6" height="42" fill="#b45309"/>
      <text x="166" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">FFPE block (archived)</text>
      <text x="166" y="34" text-anchor="middle" class="mono" fill="#525252">~150 bp fragments · cross-linked</text>
    </g>

    <g stroke="#525252" stroke-width="1" fill="none" marker-end="url(#arr3)">
      <line x1="180" y1="96" x2="180" y2="116"/>
    </g>

    <g transform="translate(20,116)">
      <rect width="320" height="40" fill="#f5f5f4" stroke="#374151" rx="4"/>
      <text x="160" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Library prep + sequencing</text>
      <text x="160" y="32" text-anchor="middle" class="mono" fill="#525252">≥150× depth (recommended for FFPE)</text>
    </g>

    <g stroke="#525252" stroke-width="1" fill="none" marker-end="url(#arr3)">
      <line x1="180" y1="158" x2="180" y2="180"/>
    </g>

    <g transform="translate(20,180)">
      <rect width="320" height="80" fill="#f5f5f4" stroke="#374151" rx="4"/>
      <text x="160" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Mutect2 tumour-only mode</text>
      <text x="160" y="34" text-anchor="middle" class="mono" fill="#525252">+ orientation-bias filter (FFPE C→T)</text>
      <text x="160" y="50" text-anchor="middle" class="mono" fill="#525252">+ gnomAD population AF filter</text>
      <text x="160" y="66" text-anchor="middle" class="mono" fill="#525252">+ Panel of Normals (PoN)</text>
    </g>

    <g stroke="#525252" stroke-width="1" fill="none" marker-end="url(#arr3)">
      <line x1="180" y1="262" x2="180" y2="284"/>
    </g>

    <g transform="translate(20,284)">
      <rect width="320" height="44" fill="#fef3c7" stroke="#b45309" rx="4"/>
      <rect width="6" height="44" fill="#b45309"/>
      <text x="166" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Filtered somatic VCF</text>
      <text x="166" y="36" text-anchor="middle" class="mono" fill="#525252">germline filtered statistically</text>
    </g>

    <text x="180" y="350" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">+ archived sample (no blood draw)</text>
    <text x="180" y="368" text-anchor="middle" font-size="10" fill="#525252">+ half the cost of paired</text>
    <text x="180" y="396" text-anchor="middle" font-size="10" font-weight="600" fill="#7f1d1d">− 5–10% specificity loss</text>
    <text x="180" y="414" text-anchor="middle" font-size="10" fill="#525252">− C→T artefact risk if filters skipped</text>

    <text x="180" y="448" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Use case: clinical panels (FoundationOne, MSK-IMPACT)</text>
  </g>

  <!-- Column 3: ctDNA / liquid biopsy -->
  <g transform="translate(800,60)">
    <rect width="360" height="464" fill="#fff" stroke="#0d7377" rx="6"/>
    <rect width="360" height="36" fill="#0d7377" rx="6"/>
    <rect y="30" width="360" height="6" fill="#0d7377"/>
    <text x="180" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.04em">ctDNA · LIQUID BIOPSY</text>

    <g transform="translate(20,52)">
      <rect width="320" height="42" fill="#ccfbf1" stroke="#0d7377" rx="4"/>
      <rect width="6" height="42" fill="#0d7377"/>
      <text x="166" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#0d7377">Plasma / cell-free DNA</text>
      <text x="166" y="34" text-anchor="middle" class="mono" fill="#525252">tumour fraction often &lt; 0.1%</text>
    </g>

    <g stroke="#525252" stroke-width="1" fill="none" marker-end="url(#arr3)">
      <line x1="180" y1="96" x2="180" y2="116"/>
    </g>

    <g transform="translate(20,116)">
      <rect width="320" height="40" fill="#f5f5f4" stroke="#374151" rx="4"/>
      <text x="160" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">UMI library prep</text>
      <text x="160" y="32" text-anchor="middle" class="mono" fill="#525252">unique molecular identifiers per molecule</text>
    </g>

    <g stroke="#525252" stroke-width="1" fill="none" marker-end="url(#arr3)">
      <line x1="180" y1="158" x2="180" y2="180"/>
    </g>

    <g transform="translate(20,180)">
      <rect width="320" height="40" fill="#f5f5f4" stroke="#374151" rx="4"/>
      <text x="160" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Deep sequencing</text>
      <text x="160" y="32" text-anchor="middle" class="mono" fill="#525252">30,000× — required for low VAF</text>
    </g>

    <g stroke="#525252" stroke-width="1" fill="none" marker-end="url(#arr3)">
      <line x1="180" y1="222" x2="180" y2="244"/>
    </g>

    <g transform="translate(20,244)">
      <rect width="320" height="56" fill="#f5f5f4" stroke="#374151" rx="4"/>
      <text x="160" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">UMI-collapsed consensus + caller</text>
      <text x="160" y="34" text-anchor="middle" class="mono" fill="#525252">per-molecule consensus calling</text>
      <text x="160" y="50" text-anchor="middle" class="mono" fill="#525252">CHIP filter (clonal hematopoiesis)</text>
    </g>

    <g stroke="#525252" stroke-width="1" fill="none" marker-end="url(#arr3)">
      <line x1="180" y1="302" x2="180" y2="324"/>
    </g>

    <g transform="translate(20,324)">
      <rect width="320" height="44" fill="#ccfbf1" stroke="#0d7377" rx="4"/>
      <rect width="6" height="44" fill="#0d7377"/>
      <text x="166" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#0d7377">MRD flag · response monitoring</text>
      <text x="166" y="36" text-anchor="middle" class="mono" fill="#525252">tumour fingerprint over time</text>
    </g>

    <text x="180" y="396" text-anchor="middle" font-size="10" font-weight="600" fill="#0d7377">+ non-invasive · longitudinal</text>
    <text x="180" y="414" text-anchor="middle" font-size="10" fill="#525252">+ captures tumour heterogeneity</text>

    <text x="180" y="448" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Use case: MRD monitoring (Guardant360, F1L)</text>
  </g>
</svg>
