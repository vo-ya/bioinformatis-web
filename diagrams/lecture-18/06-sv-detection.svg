<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="560" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Cancer SV detection — chromothripsis through short reads vs long reads</text>

  <!-- Three columns 380 wide -->

  <!-- Column 1: Short-read evidence -->
  <g transform="translate(40,60)">
    <rect width="360" height="460" fill="#fff" stroke="#1d4ed8" rx="6"/>
    <rect width="360" height="36" fill="#1d4ed8" rx="6"/>
    <rect y="30" width="360" height="6" fill="#1d4ed8"/>
    <text x="180" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.04em">SHORT-READ EVIDENCE</text>

    <text x="20" y="62" font-size="10" font-weight="600" fill="#525252">CHROMOSOMES (representative)</text>

    <!-- Reference chromosome with breakpoints -->
    <g transform="translate(20,76)">
      <rect width="320" height="14" fill="#dbeafe" stroke="#1e3a8a"/>
      <text x="-2" y="11" text-anchor="end" font-size="9" class="mono" fill="#1e3a8a">ref</text>
      <!-- Breakpoint markers -->
      <line x1="60" y1="-2" x2="60" y2="16" stroke="#c4342c" stroke-width="1.5"/>
      <line x1="120" y1="-2" x2="120" y2="16" stroke="#c4342c" stroke-width="1.5"/>
      <line x1="200" y1="-2" x2="200" y2="16" stroke="#c4342c" stroke-width="1.5"/>
      <line x1="270" y1="-2" x2="270" y2="16" stroke="#c4342c" stroke-width="1.5"/>
    </g>

    <text x="20" y="118" font-size="10" font-weight="600" fill="#525252">DISCORDANT READ PAIRS</text>

    <!-- Discordant pairs (short reads with mate on different chromosome / wrong orientation) -->
    <g transform="translate(20,128)" stroke="#1e3a8a" stroke-width="1.5">
      <!-- Read at position A, mate at position D -->
      <rect x="40"  y="0" width="20" height="6" fill="#bfdbfe"/>
      <line x1="60" y1="3" x2="220" y2="3" stroke-dasharray="3 3"/>
      <rect x="220" y="0" width="20" height="6" fill="#bfdbfe"/>

      <rect x="80"  y="14" width="20" height="6" fill="#bfdbfe"/>
      <line x1="100" y1="17" x2="270" y2="17" stroke-dasharray="3 3"/>
      <rect x="270" y="14" width="20" height="6" fill="#bfdbfe"/>

      <rect x="160" y="28" width="20" height="6" fill="#bfdbfe"/>
      <line x1="180" y1="31" x2="50" y2="31" stroke-dasharray="3 3"/>
      <rect x="50" y="28" width="20" height="6" fill="#bfdbfe"/>

      <rect x="200" y="42" width="20" height="6" fill="#bfdbfe"/>
      <line x1="220" y1="45" x2="100" y2="45" stroke-dasharray="3 3"/>
      <rect x="100" y="42" width="20" height="6" fill="#bfdbfe"/>
    </g>

    <text x="20" y="208" font-size="10" font-weight="600" fill="#525252">SPLIT READS</text>

    <g transform="translate(20,218)">
      <!-- Split reads visible at breakpoints -->
      <rect x="50" y="0" width="20" height="6" fill="#fef3c7" stroke="#b45309"/>
      <text x="78" y="6" font-size="9" fill="#92400e" class="mono">→ chr3</text>
      <rect x="115" y="14" width="20" height="6" fill="#fef3c7" stroke="#b45309"/>
      <text x="143" y="20" font-size="9" fill="#92400e" class="mono">→ chr11</text>
      <rect x="195" y="28" width="20" height="6" fill="#fef3c7" stroke="#b45309"/>
      <text x="223" y="34" font-size="9" fill="#92400e" class="mono">→ chr7</text>
    </g>

    <text x="20" y="278" font-size="10" font-weight="600" fill="#525252">CALLERS</text>
    <g transform="translate(20,290)">
      <rect width="320" height="74" fill="#f5f5f4" stroke="#374151" rx="3"/>
      <g font-size="10" class="mono">
        <text x="14" y="20" font-weight="600" fill="#374151">Manta</text>
        <text x="80" y="20" fill="#525252">Illumina default · DEL/DUP/INS</text>
        <text x="14" y="38" font-weight="600" fill="#374151">GRIDSS</text>
        <text x="80" y="38" fill="#525252">balanced SVs · clinical use</text>
        <text x="14" y="56" font-weight="600" fill="#374151">DELLY</text>
        <text x="80" y="56" fill="#525252">earlier; still maintained</text>
      </g>
    </g>

    <g transform="translate(20,376)">
      <rect width="320" height="64" fill="#fef3c7" stroke="#b45309" rx="3"/>
      <text x="14" y="20" font-size="11" font-weight="600" fill="#92400e">Calls ~60–80% of cancer SVs</text>
      <text x="14" y="38" font-size="10" fill="#525252">Misses: ecDNA · long inversions · repeat-region rearrangements ·</text>
      <text x="14" y="52" font-size="10" fill="#525252">low-VAF subclonal SVs · complex breakpoint topology</text>
    </g>
  </g>

  <!-- Column 2: Long-read evidence -->
  <g transform="translate(420,60)">
    <rect width="360" height="460" fill="#fff" stroke="#0d7377" rx="6"/>
    <rect width="360" height="36" fill="#0d7377" rx="6"/>
    <rect y="30" width="360" height="6" fill="#0d7377"/>
    <text x="180" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.04em">LONG-READ EVIDENCE</text>

    <text x="20" y="62" font-size="10" font-weight="600" fill="#525252">CHROMOSOMES (representative)</text>

    <!-- Reference chromosome -->
    <g transform="translate(20,76)">
      <rect width="320" height="14" fill="#dbeafe" stroke="#1e3a8a"/>
      <text x="-2" y="11" text-anchor="end" font-size="9" class="mono" fill="#1e3a8a">ref</text>
      <line x1="60" y1="-2" x2="60" y2="16" stroke="#c4342c" stroke-width="1.5"/>
      <line x1="120" y1="-2" x2="120" y2="16" stroke="#c4342c" stroke-width="1.5"/>
      <line x1="200" y1="-2" x2="200" y2="16" stroke="#c4342c" stroke-width="1.5"/>
      <line x1="270" y1="-2" x2="270" y2="16" stroke="#c4342c" stroke-width="1.5"/>
    </g>

    <text x="20" y="118" font-size="10" font-weight="600" fill="#525252">LONG READS SPANNING BREAKPOINTS</text>

    <!-- Long reads (~10-15kb in ~3kb scaled chunks) spanning multiple breakpoints -->
    <g transform="translate(20,132)">
      <!-- Long read 1: position 30-260 spanning bp1, bp2, bp3 (each rendered as 3-segment piece coloured by source segment) -->
      <g>
        <rect x="20"  y="0" width="40" height="6" fill="#0d7377"/>
        <rect x="60"  y="0" width="60" height="6" fill="#b45309"/>
        <rect x="120" y="0" width="80" height="6" fill="#7c3aed"/>
        <rect x="200" y="0" width="60" height="6" fill="#c4342c"/>
        <rect x="260" y="0" width="40" height="6" fill="#0d7377"/>
        <text x="305" y="6" font-size="8" class="mono" fill="#374151">15 kb</text>
      </g>
      <g transform="translate(0,14)">
        <rect x="40"  y="0" width="20" height="6" fill="#0d7377"/>
        <rect x="60"  y="0" width="60" height="6" fill="#b45309"/>
        <rect x="120" y="0" width="80" height="6" fill="#7c3aed"/>
        <rect x="200" y="0" width="50" height="6" fill="#c4342c"/>
        <text x="305" y="6" font-size="8" class="mono" fill="#374151">12 kb</text>
      </g>
      <g transform="translate(0,28)">
        <rect x="80"  y="0" width="40" height="6" fill="#b45309"/>
        <rect x="120" y="0" width="80" height="6" fill="#7c3aed"/>
        <rect x="200" y="0" width="70" height="6" fill="#c4342c"/>
        <text x="305" y="6" font-size="8" class="mono" fill="#374151">14 kb</text>
      </g>
      <g transform="translate(0,42)">
        <rect x="0"   y="0" width="60" height="6" fill="#0d7377"/>
        <rect x="60"  y="0" width="60" height="6" fill="#b45309"/>
        <rect x="120" y="0" width="40" height="6" fill="#7c3aed"/>
        <text x="305" y="6" font-size="8" class="mono" fill="#374151">10 kb</text>
      </g>
    </g>

    <text x="20" y="208" font-size="10" font-weight="600" fill="#525252">CALLERS</text>
    <g transform="translate(20,220)">
      <rect width="320" height="74" fill="#f5f5f4" stroke="#374151" rx="3"/>
      <g font-size="10" class="mono">
        <text x="14" y="20" font-weight="600" fill="#374151">Sniffles2</text>
        <text x="92" y="20" fill="#525252">PacBio / ONT standard</text>
        <text x="14" y="38" font-weight="600" fill="#374151">CuteSV</text>
        <text x="92" y="38" fill="#525252">long-read SV alternative</text>
        <text x="14" y="56" font-weight="600" fill="#374151">Severus</text>
        <text x="92" y="56" fill="#525252">cancer-optimised, subclonal</text>
      </g>
    </g>

    <g transform="translate(20,306)">
      <rect width="320" height="64" fill="#dcfce7" stroke="#059669" rx="3"/>
      <text x="14" y="20" font-size="11" font-weight="600" fill="#065f46">Calls ~95%+ of cancer SVs</text>
      <text x="14" y="38" font-size="10" fill="#374151">Captures: ecDNA · long inversions · repeat-region SVs ·</text>
      <text x="14" y="52" font-size="10" fill="#374151">complex chromothripsis · subclonal SVs</text>
    </g>

    <text x="20" y="392" font-size="10" font-weight="600" fill="#525252">FFPE LIMITATION</text>
    <g transform="translate(20,402)">
      <rect width="320" height="42" fill="#fee2e2" stroke="#c4342c" rx="3"/>
      <text x="14" y="18" font-size="10" fill="#7f1d1d">FFPE DNA fragments &lt; 200 bp →</text>
      <text x="14" y="34" font-size="10" fill="#7f1d1d">long-read SV calling needs fresh-frozen tissue.</text>
    </g>
  </g>

  <!-- Column 3: Reconstructed topology -->
  <g transform="translate(800,60)">
    <rect width="360" height="460" fill="#fff" stroke="#7c3aed" rx="6"/>
    <rect width="360" height="36" fill="#7c3aed" rx="6"/>
    <rect y="30" width="360" height="6" fill="#7c3aed"/>
    <text x="180" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.04em">RECONSTRUCTED SV TOPOLOGY</text>

    <text x="20" y="62" font-size="10" font-weight="600" fill="#525252">CHROMOTHRIPSIS event</text>

    <!-- Original chromosome top -->
    <g transform="translate(20,80)">
      <text x="0" y="-2" font-size="9" font-weight="600" fill="#525252">Original chromosome</text>
      <rect x="0"   y="2" width="60" height="14" fill="#0d7377" stroke="#0d7377"/>
      <rect x="60"  y="2" width="60" height="14" fill="#b45309" stroke="#b45309"/>
      <rect x="120" y="2" width="80" height="14" fill="#7c3aed" stroke="#7c3aed"/>
      <rect x="200" y="2" width="60" height="14" fill="#c4342c" stroke="#c4342c"/>
      <rect x="260" y="2" width="60" height="14" fill="#525252" stroke="#525252"/>
      <text x="30" y="13" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">A</text>
      <text x="90" y="13" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">B</text>
      <text x="160" y="13" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">C</text>
      <text x="230" y="13" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">D</text>
      <text x="290" y="13" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">E</text>
    </g>

    <!-- Shattering arrow -->
    <g transform="translate(180,116)" stroke="#7f1d1d" stroke-width="1.5" fill="none">
      <line x1="0" y1="0" x2="0" y2="20"/>
      <path d="M -5 16 L 0 22 L 5 16"/>
    </g>
    <text x="180" y="148" text-anchor="middle" font-size="10" fill="#7f1d1d" font-weight="600">catastrophic shattering + random reassembly</text>

    <!-- Reassembled chromosome — title only; the orphan flipped rect that
         used to live here was a leftover from an earlier draft and rendered
         a redundant violet block over segment C in the actual reassembly. -->
    <g transform="translate(20,166)">
      <text x="0" y="-2" font-size="9" font-weight="600" fill="#525252">Reassembled (chromothripsis result)</text>
    </g>

    <!-- Direct segment ordering in jumbled positions: C, A reversed, E, B reversed, D -->
    <g transform="translate(20,168)">
      <rect x="0"   y="0" width="80" height="14" fill="#7c3aed"/>
      <text x="40" y="11" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">C</text>
      <rect x="80"  y="0" width="60" height="14" fill="#0d7377"/>
      <text x="110" y="11" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">A'</text>
      <rect x="140" y="0" width="60" height="14" fill="#525252"/>
      <text x="170" y="11" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">E</text>
      <rect x="200" y="0" width="60" height="14" fill="#b45309"/>
      <text x="230" y="11" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">B'</text>
      <rect x="260" y="0" width="60" height="14" fill="#c4342c"/>
      <text x="290" y="11" text-anchor="middle" font-size="9" fill="#fff" font-weight="600">D</text>
    </g>

    <!-- Confidence bars -->
    <g transform="translate(20,210)">
      <text x="0" y="0" font-size="10" font-weight="600" fill="#525252">RECONSTRUCTION CONFIDENCE</text>

      <g transform="translate(0,14)">
        <text x="0" y="14" font-size="10" fill="#1e40af" font-weight="600">short-read only</text>
        <rect x="120" y="4" width="120" height="14" fill="#1e40af" fill-opacity="0.55"/>
        <text x="244" y="14" font-size="10" class="mono" fill="#1e40af">~60–80%</text>
      </g>

      <g transform="translate(0,36)">
        <text x="0" y="14" font-size="10" fill="#0d7377" font-weight="600">long-read</text>
        <rect x="120" y="4" width="190" height="14" fill="#0d7377" fill-opacity="0.55"/>
        <text x="314" y="14" font-size="10" class="mono" fill="#0d7377">~95%+</text>
      </g>

      <g transform="translate(0,58)">
        <text x="0" y="14" font-size="10" fill="#5b21b6" font-weight="600">+ RNA-seq fusion</text>
        <rect x="120" y="4" width="200" height="14" fill="#7c3aed" fill-opacity="0.55"/>
        <text x="324" y="14" font-size="10" class="mono" fill="#5b21b6">~98%</text>
      </g>
    </g>

    <g transform="translate(20,322)">
      <rect width="320" height="118" fill="#fef3c7" stroke="#b45309" rx="3"/>
      <text x="14" y="22" font-size="11" font-weight="600" fill="#92400e">Cancer-relevant SV classes</text>
      <g font-size="10" class="mono" transform="translate(14,38)">
        <text x="0" y="0" fill="#525252">chromothripsis</text>
        <text x="160" y="0" fill="#525252">osteosarcoma</text>
        <text x="0" y="14" fill="#525252">chromoplexy</text>
        <text x="160" y="14" fill="#525252">prostate</text>
        <text x="0" y="28" fill="#525252">ecDNA (MYC)</text>
        <text x="160" y="28" fill="#525252">drug resistance</text>
        <text x="0" y="42" fill="#525252">BCR-ABL fusion</text>
        <text x="160" y="42" fill="#525252">CML</text>
        <text x="0" y="56" fill="#525252">EML4-ALK fusion</text>
        <text x="160" y="56" fill="#525252">NSCLC ~5%</text>
      </g>
    </g>
  </g>
</svg>
