<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arr7" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7f1d1d"/>
    </marker>
  </defs>
  <rect width="1200" height="560" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Gene fusion — EML4-ALK as the canonical example</text>

  <!-- Top: parent genes on different chromosomes -->
  <g transform="translate(60,72)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#525252">PARENT GENES (separate chromosomes)</text>

    <!-- EML4 on chr2 -->
    <g transform="translate(0,16)">
      <text x="0" y="14" font-size="10" font-weight="600" fill="#1e3a8a" class="mono">EML4 (chr2 inv)</text>
      <g transform="translate(120,4)">
        <!-- Exons 1-13 colour-coded -->
        <rect x="0"   y="0" width="30" height="20" fill="#1e3a8a"/>
        <rect x="32"  y="0" width="30" height="20" fill="#1e3a8a"/>
        <rect x="64"  y="0" width="30" height="20" fill="#1e3a8a"/>
        <rect x="96"  y="0" width="30" height="20" fill="#1e3a8a"/>
        <rect x="128" y="0" width="30" height="20" fill="#1e3a8a"/>
        <rect x="160" y="0" width="30" height="20" fill="#1e3a8a"/>
        <rect x="192" y="0" width="30" height="20" fill="#1e3a8a"/>
        <rect x="224" y="0" width="30" height="20" fill="#1e3a8a"/>
        <rect x="256" y="0" width="30" height="20" fill="#1e3a8a"/>
        <rect x="288" y="0" width="30" height="20" fill="#1e3a8a"/>
        <rect x="320" y="0" width="30" height="20" fill="#1e3a8a"/>
        <rect x="352" y="0" width="30" height="20" fill="#1e3a8a"/>
        <rect x="384" y="0" width="30" height="20" fill="#1e3a8a"/>
        <!-- Introns -->
        <line x1="30"  y1="10" x2="32"  y2="10" stroke="#525252"/>
        <line x1="62"  y1="10" x2="64"  y2="10" stroke="#525252"/>
        <line x1="94"  y1="10" x2="96"  y2="10" stroke="#525252"/>
        <line x1="126" y1="10" x2="128" y2="10" stroke="#525252"/>
        <line x1="158" y1="10" x2="160" y2="10" stroke="#525252"/>
        <line x1="190" y1="10" x2="192" y2="10" stroke="#525252"/>
        <line x1="222" y1="10" x2="224" y2="10" stroke="#525252"/>
        <line x1="254" y1="10" x2="256" y2="10" stroke="#525252"/>
        <line x1="286" y1="10" x2="288" y2="10" stroke="#525252"/>
        <line x1="318" y1="10" x2="320" y2="10" stroke="#525252"/>
        <line x1="350" y1="10" x2="352" y2="10" stroke="#525252"/>
        <line x1="382" y1="10" x2="384" y2="10" stroke="#525252"/>
      </g>
      <text x="118" y="44" font-size="9" class="mono" fill="#525252">Promoter · TM · 5' UTR</text>
      <text x="380" y="44" text-anchor="middle" font-size="9" class="mono" fill="#525252">EML4 coiled-coil oligo. domain</text>

      <!-- Breakpoint marker at exon 13 -->
      <line x1="540" y1="-2" x2="540" y2="34" stroke="#c4342c" stroke-width="2"/>
      <text x="540" y="56" text-anchor="middle" font-size="10" fill="#7f1d1d" font-weight="600" class="mono">break</text>
    </g>

    <!-- ALK on chr2 (also chr2 actually, but separate locus) -->
    <g transform="translate(0,84)">
      <text x="0" y="14" font-size="10" font-weight="600" fill="#7c3aed" class="mono">ALK (chr2)</text>
      <g transform="translate(120,4)">
        <!-- Exons 20-29 -->
        <rect x="0"   y="0" width="34" height="20" fill="#7c3aed"/>
        <rect x="36"  y="0" width="34" height="20" fill="#7c3aed"/>
        <rect x="72"  y="0" width="34" height="20" fill="#7c3aed"/>
        <rect x="108" y="0" width="34" height="20" fill="#7c3aed"/>
        <rect x="144" y="0" width="34" height="20" fill="#7c3aed"/>
        <rect x="180" y="0" width="34" height="20" fill="#7c3aed"/>
        <rect x="216" y="0" width="34" height="20" fill="#7c3aed"/>
        <rect x="252" y="0" width="34" height="20" fill="#7c3aed"/>
        <rect x="288" y="0" width="34" height="20" fill="#7c3aed"/>
        <rect x="324" y="0" width="34" height="20" fill="#7c3aed"/>
        <line x1="34"  y1="10" x2="36"  y2="10" stroke="#525252"/>
        <line x1="70"  y1="10" x2="72"  y2="10" stroke="#525252"/>
        <line x1="106" y1="10" x2="108" y2="10" stroke="#525252"/>
        <line x1="142" y1="10" x2="144" y2="10" stroke="#525252"/>
        <line x1="178" y1="10" x2="180" y2="10" stroke="#525252"/>
        <line x1="214" y1="10" x2="216" y2="10" stroke="#525252"/>
        <line x1="250" y1="10" x2="252" y2="10" stroke="#525252"/>
        <line x1="286" y1="10" x2="288" y2="10" stroke="#525252"/>
        <line x1="322" y1="10" x2="324" y2="10" stroke="#525252"/>
      </g>
      <text x="280" y="44" font-size="9" class="mono" fill="#525252" text-anchor="middle">ALK kinase domain</text>

      <!-- Breakpoint marker at exon 20 -->
      <line x1="120" y1="-2" x2="120" y2="34" stroke="#c4342c" stroke-width="2"/>
      <text x="120" y="56" text-anchor="middle" font-size="10" fill="#7f1d1d" font-weight="600" class="mono">break</text>
    </g>
  </g>

  <!-- Middle: rearrangement event. Header raised y=-8→-30 so the
       red rearrangement arrows starting at y=-22 (= absolute y=200)
       no longer cut across the "REARRANGEMENT (chr2 inversion)"
       text. Arrow endpoints extended from y=50 (= y=272, empty
       space) down to y=68 (= y=290, the top edge of the fusion
       transcript section) so each arrow now lands on a visible
       element instead of dying in the gap. -->
  <g transform="translate(60,222)">
    <line x1="0" y1="0" x2="1080" y2="0" stroke="#a8a29e" stroke-dasharray="3 3"/>

    <text x="540" y="-30" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">REARRANGEMENT (chr2 inversion)</text>

    <g stroke="#7f1d1d" stroke-width="2" fill="none" marker-end="url(#arr7)">
      <path d="M 540 -22 C 540 25 200 25 200 68"/>
      <path d="M 200 -22 C 200 25 540 25 540 68"/>
    </g>
  </g>

  <!-- Fusion transcript -->
  <g transform="translate(60,290)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#525252">FUSION TRANSCRIPT (mRNA)</text>

    <g transform="translate(120,16)">
      <!-- EML4 portion (exons 1-13 from EML4) -->
      <rect x="0"   y="0" width="30" height="20" fill="#1e3a8a"/>
      <rect x="32"  y="0" width="30" height="20" fill="#1e3a8a"/>
      <rect x="64"  y="0" width="30" height="20" fill="#1e3a8a"/>
      <rect x="96"  y="0" width="30" height="20" fill="#1e3a8a"/>
      <rect x="128" y="0" width="30" height="20" fill="#1e3a8a"/>
      <rect x="160" y="0" width="30" height="20" fill="#1e3a8a"/>
      <rect x="192" y="0" width="30" height="20" fill="#1e3a8a"/>
      <rect x="224" y="0" width="30" height="20" fill="#1e3a8a"/>
      <rect x="256" y="0" width="30" height="20" fill="#1e3a8a"/>
      <rect x="288" y="0" width="30" height="20" fill="#1e3a8a"/>
      <rect x="320" y="0" width="30" height="20" fill="#1e3a8a"/>
      <rect x="352" y="0" width="30" height="20" fill="#1e3a8a"/>
      <rect x="384" y="0" width="30" height="20" fill="#1e3a8a"/>

      <!-- Junction marker -->
      <line x1="416" y1="-4" x2="416" y2="24" stroke="#c4342c" stroke-width="2"/>

      <!-- ALK portion (exons 20-29) -->
      <rect x="420" y="0" width="34" height="20" fill="#7c3aed"/>
      <rect x="456" y="0" width="34" height="20" fill="#7c3aed"/>
      <rect x="492" y="0" width="34" height="20" fill="#7c3aed"/>
      <rect x="528" y="0" width="34" height="20" fill="#7c3aed"/>
      <rect x="564" y="0" width="34" height="20" fill="#7c3aed"/>
      <rect x="600" y="0" width="34" height="20" fill="#7c3aed"/>
      <rect x="636" y="0" width="34" height="20" fill="#7c3aed"/>
      <rect x="672" y="0" width="34" height="20" fill="#7c3aed"/>
      <rect x="708" y="0" width="34" height="20" fill="#7c3aed"/>
      <rect x="744" y="0" width="34" height="20" fill="#7c3aed"/>

      <text x="416" y="38" text-anchor="middle" font-size="10" font-weight="600" fill="#7f1d1d" class="mono">junction</text>
    </g>

    <text x="0" y="20" font-size="10" class="mono" fill="#1e3a8a">EML4 part</text>
    <text x="900" y="20" text-anchor="end" font-size="10" class="mono" fill="#7c3aed">ALK part</text>
  </g>

  <!-- Bottom: fusion protein -->
  <g transform="translate(60,376)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#525252">FUSION PROTEIN (domain architecture)</text>

    <g transform="translate(120,18)">
      <!-- EML4 N-terminal: oligo coiled-coil + WD40 region -->
      <rect x="0"   y="0" width="80" height="32" fill="#1e3a8a"/>
      <text x="40" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">N · TM</text>

      <rect x="84"  y="0" width="160" height="32" fill="#bfdbfe" stroke="#1e3a8a"/>
      <text x="164" y="20" text-anchor="middle" font-size="11" fill="#1e3a8a">EML4 coiled-coil (oligomerisation)</text>

      <rect x="248" y="0" width="60" height="32" fill="#1e3a8a"/>
      <text x="278" y="20" text-anchor="middle" font-size="10" fill="#fff">linker</text>

      <line x1="312" y1="-4" x2="312" y2="36" stroke="#c4342c" stroke-width="2"/>

      <!-- ALK C-terminal: kinase domain + C-term -->
      <rect x="316" y="0" width="280" height="32" fill="#7c3aed"/>
      <text x="456" y="14" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">ALK KINASE DOMAIN</text>
      <text x="456" y="28" text-anchor="middle" font-size="9" fill="#ede9fe">tyrosine kinase · constitutively active when oligomerised</text>

      <rect x="600" y="0" width="60" height="32" fill="#7c3aed"/>
      <text x="630" y="20" text-anchor="middle" font-size="10" fill="#fff">C-term</text>
    </g>

    <text x="120" y="76" font-size="10" class="mono" fill="#1e3a8a">EML4 supplies oligomerisation</text>
    <text x="780" y="76" text-anchor="end" font-size="10" class="mono" fill="#5b21b6">ALK supplies kinase activity</text>
  </g>

  <!-- Annotation -->
  <g transform="translate(60,476)">
    <rect width="1080" height="68" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="14" y="20" font-size="11" font-weight="600" fill="#92400e">Mechanism</text>
    <text x="14" y="36" font-size="10" fill="#374151">EML4 oligomerisation domain forces ALK kinase domains together → constitutive kinase activation → driver for ~5% of lung adenocarcinomas.</text>
    <text x="14" y="56" font-size="10" font-weight="600" fill="#065f46">Therapy: crizotinib (2011), alectinib (2017), lorlatinib (2018) — ALK inhibitors targeting the same kinase domain. Tier I-A in NSCLC.</text>
  </g>
</svg>
