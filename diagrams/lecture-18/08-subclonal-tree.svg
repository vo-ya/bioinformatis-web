<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" width="1200" height="580" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arr8" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#525252"/>
    </marker>
  </defs>
  <rect width="1200" height="580" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Subclonal reconstruction — VAF distribution → CCF clusters → phylogenetic tree</text>

  <!-- Three columns: 380 wide -->

  <!-- Column 1: VAF distribution. Rect height 460→480 to make room
       for the descriptive captions below the plot, which previously
       collided with the "VAF" axis label at y=490 — both texts
       sat at the same baseline. -->
  <g transform="translate(40,60)">
    <rect width="360" height="480" fill="#fff" stroke="#374151" rx="6"/>
    <rect width="360" height="36" fill="#374151" rx="6"/>
    <rect y="30" width="360" height="6" fill="#374151"/>
    <text x="180" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.04em">VAF DISTRIBUTION (bulk seq)</text>

    <!-- Plot -->
    <g transform="translate(50,76)">
      <!-- Axes -->
      <line x1="0" y1="320" x2="280" y2="320" stroke="#a8a29e"/>
      <line x1="0" y1="0" x2="0" y2="320" stroke="#a8a29e"/>

      <g font-size="9" fill="#6b7280" class="mono">
        <text x="0"   y="336" text-anchor="middle">0.00</text>
        <text x="56"  y="336" text-anchor="middle">0.10</text>
        <text x="112" y="336" text-anchor="middle">0.20</text>
        <text x="168" y="336" text-anchor="middle">0.30</text>
        <text x="224" y="336" text-anchor="middle">0.40</text>
        <text x="280" y="336" text-anchor="middle">0.50</text>
        <text x="140" y="354" text-anchor="middle" fill="#525252" font-size="10">VAF</text>
        <text x="-30" y="160" text-anchor="middle" fill="#525252" font-size="10" transform="rotate(-90 -30 160)">count</text>
      </g>

      <!-- Three peaks: trunk at VAF 0.30 (CCF 100% in 60% pure tumour), C1 at 0.18 (CCF 60%), C2 at 0.075 (CCF 25%) -->
      <!-- VAF 0.30 → x=168; VAF 0.18 → x=100.8; VAF 0.075 → x=42 -->

      <!-- Trunk peak — biggest -->
      <g fill="#7f1d1d" fill-opacity="0.55">
        <path d="M 130 320 Q 168 50 206 320 Z"/>
      </g>
      <text x="168" y="40" text-anchor="middle" font-size="10" font-weight="600" fill="#7f1d1d">trunk</text>
      <text x="168" y="54" text-anchor="middle" font-size="9" fill="#525252">~250 vars</text>

      <!-- Subclone C1 -->
      <g fill="#b45309" fill-opacity="0.55">
        <path d="M 70 320 Q 100 130 130 320 Z"/>
      </g>
      <text x="100" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">C1</text>
      <text x="100" y="134" text-anchor="middle" font-size="9" fill="#525252">~120 vars</text>

      <!-- Subclone C2 -->
      <g fill="#7c3aed" fill-opacity="0.55">
        <path d="M 16 320 Q 42 220 70 320 Z"/>
      </g>
      <text x="42" y="210" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">C2</text>
      <text x="42" y="224" text-anchor="middle" font-size="9" fill="#525252">~50 vars</text>
    </g>

    <!-- Captions lowered y=430/446→448/464 so they no longer share
         the y=490 baseline with the "VAF" axis label centred at
         x=230 — the caption "Three modes …" used to render directly
         on top of the axis label. -->
    <text x="20" y="448" font-size="10" fill="#525252">Three modes → three subclones (after purity correction).</text>
    <text x="20" y="464" font-size="10" fill="#525252">Tumour purity = 60%; expected trunk VAF = 0.5 × 0.60 = 0.30.</text>
  </g>

  <!-- Arrow between columns -->
  <g transform="translate(420,290)" stroke="#525252" stroke-width="1.5" fill="none" marker-end="url(#arr8)">
    <line x1="0" y1="0" x2="20" y2="0"/>
  </g>

  <!-- Column 2: CCF clusters -->
  <g transform="translate(440,60)">
    <rect width="320" height="480" fill="#fff" stroke="#374151" rx="6"/>
    <rect width="320" height="36" fill="#374151" rx="6"/>
    <rect y="30" width="320" height="6" fill="#374151"/>
    <text x="160" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.04em">PYCLONE-STYLE CLUSTERS</text>

    <!-- Three cluster cards -->
    <g transform="translate(20,60)">
      <rect width="280" height="92" fill="#fee2e2" stroke="#7f1d1d" stroke-width="1.5" rx="6"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#7f1d1d">Cluster 1 — TRUNK</text>
      <text x="14" y="40" font-size="10" font-weight="600" fill="#374151">CCF 100%</text>
      <text x="200" y="40" text-anchor="end" font-size="10" class="mono" fill="#525252">~250 variants</text>
      <text x="14" y="58" font-size="10" class="mono" fill="#525252">drivers: TP53 R175H · CDKN2A loss</text>
      <text x="14" y="76" font-size="10" fill="#525252">present in every tumour cell</text>
    </g>

    <g transform="translate(20,164)">
      <rect width="280" height="92" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="6"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#92400e">Cluster 2 — DOMINANT subclone</text>
      <text x="14" y="40" font-size="10" font-weight="600" fill="#374151">CCF 60%</text>
      <text x="200" y="40" text-anchor="end" font-size="10" class="mono" fill="#525252">~120 variants</text>
      <text x="14" y="58" font-size="10" class="mono" fill="#525252">drivers: KRAS G12V</text>
      <text x="14" y="76" font-size="10" fill="#525252">present in 60% of cancer cells</text>
    </g>

    <g transform="translate(20,268)">
      <rect width="280" height="92" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" rx="6"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#5b21b6">Cluster 3 — RESISTANCE subclone</text>
      <text x="14" y="40" font-size="10" font-weight="600" fill="#374151">CCF 25%</text>
      <text x="200" y="40" text-anchor="end" font-size="10" class="mono" fill="#525252">~50 variants</text>
      <text x="14" y="58" font-size="10" class="mono" fill="#525252">drivers: EGFR T790M</text>
      <text x="14" y="76" font-size="10" fill="#525252">grows under therapy → relapse driver</text>
    </g>

    <text x="20" y="396" font-size="10" font-weight="600" fill="#525252">Tools</text>
    <text x="20" y="412" font-size="10" class="mono" fill="#374151">PyClone · SciClone · PhyloWGS · CliP</text>
    <text x="20" y="428" font-size="9" fill="#6b7280">Bayesian / variational clustering of CCF</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(780,290)" stroke="#525252" stroke-width="1.5" fill="none" marker-end="url(#arr8)">
    <line x1="0" y1="0" x2="20" y2="0"/>
  </g>

  <!-- Column 3: phylogenetic tree -->
  <g transform="translate(800,60)">
    <rect width="360" height="480" fill="#fff" stroke="#374151" rx="6"/>
    <rect width="360" height="36" fill="#374151" rx="6"/>
    <rect y="30" width="360" height="6" fill="#374151"/>
    <text x="180" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.04em">PHYLOGENETIC TREE</text>

    <!-- Tree -->
    <g transform="translate(40,76)">
      <!-- MRCA / trunk -->
      <circle cx="140" cy="30" r="22" fill="#7f1d1d"/>
      <text x="140" y="34" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">MRCA</text>

      <!-- Trunk mutations to the right -->
      <g transform="translate(180,12)">
        <text x="0" y="14" font-size="10" font-weight="600" fill="#7f1d1d">+ TP53 R175H</text>
        <text x="0" y="30" font-size="10" font-weight="600" fill="#7f1d1d">+ CDKN2A loss</text>
      </g>

      <!-- Lines from MRCA to two clones -->
      <line x1="140" y1="52" x2="80" y2="170" stroke="#525252" stroke-width="2"/>
      <line x1="140" y1="52" x2="200" y2="170" stroke="#525252" stroke-width="2"/>

      <!-- Clone 1 (dominant) -->
      <circle cx="80" cy="190" r="22" fill="#b45309"/>
      <text x="80" y="194" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">C1</text>
      <text x="80" y="232" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">CCF 60%</text>
      <text x="80" y="246" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">+ KRAS G12V</text>
      <text x="80" y="262" text-anchor="middle" font-size="9" fill="#525252">dominant</text>

      <!-- Clone 2 (resistance) -->
      <circle cx="200" cy="190" r="22" fill="#7c3aed"/>
      <text x="200" y="194" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">C2</text>
      <text x="200" y="232" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">CCF 25%</text>
      <text x="200" y="246" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6">+ EGFR T790M</text>
      <text x="200" y="262" text-anchor="middle" font-size="9" fill="#525252">resistance</text>
    </g>

    <g transform="translate(20,376)">
      <rect width="320" height="76" fill="#fef3c7" stroke="#b45309" rx="3"/>
      <text x="14" y="20" font-size="11" font-weight="600" fill="#92400e">Clinical implication</text>
      <text x="14" y="36" font-size="10" fill="#374151">Trunk drivers (TP53, CDKN2A) — present in all cells;</text>
      <text x="14" y="50" font-size="10" fill="#374151">but TP53 isn't directly druggable.</text>
      <text x="14" y="68" font-size="10" font-weight="600" fill="#7f1d1d">EGFR T790M (C2) is the relapse driver to pre-empt with osimertinib.</text>
    </g>
  </g>

  <text x="600" y="564" text-anchor="middle" font-size="10" fill="#525252">Three subclones recovered from a single bulk biopsy — multi-region or longitudinal sampling sharpens the tree.</text>
</svg>
