<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="540" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">AMP/ASCO/CAP four-tier system — somatic variant clinical actionability</text>

  <!-- Header columns -->
  <g transform="translate(60,60)">
    <rect width="1080" height="34" fill="#374151"/>
    <text x="100" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#fff" letter-spacing="0.06em">TIER</text>
    <text x="280" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#fff" letter-spacing="0.06em">DEFINITION</text>
    <text x="560" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#fff" letter-spacing="0.06em">EVIDENCE LEVELS</text>
    <text x="800" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#fff" letter-spacing="0.06em">EXAMPLE</text>
    <text x="990" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#fff" letter-spacing="0.06em">ACTION</text>
  </g>

  <!-- Tier I (green) -->
  <g transform="translate(60,98)">
    <rect width="1080" height="86" fill="#dcfce7" stroke="#059669" stroke-width="1.5"/>
    <rect width="8" height="86" fill="#059669"/>
    <text x="100" y="36" text-anchor="middle" font-size="20" font-weight="800" fill="#065f46">Tier I</text>
    <text x="100" y="58" text-anchor="middle" font-size="10" fill="#065f46">strong clinical significance</text>

    <text x="280" y="34" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">FDA-approved drug for THIS</text>
    <text x="280" y="48" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">variant in THIS cancer type</text>
    <text x="280" y="66" text-anchor="middle" font-size="9" fill="#525252">+ NCCN-guideline-recommended</text>

    <g transform="translate(440,28)" font-size="10" class="mono" fill="#065f46">
      <text x="0" y="0" font-weight="600">I-A</text>
      <text x="40" y="0" fill="#374151">FDA-approved · this variant · this cancer</text>
      <text x="0" y="16" font-weight="600">I-B</text>
      <text x="40" y="16" fill="#374151">Professional-guidelines-recommended</text>
      <text x="0" y="36" font-style="italic" fill="#525252">used for: matched-targeted therapy</text>
    </g>

    <text x="800" y="34" text-anchor="middle" font-size="11" font-weight="600" fill="#374151" class="mono">EGFR L858R · NSCLC</text>
    <text x="800" y="50" text-anchor="middle" font-size="10" fill="#525252">→ erlotinib / osimertinib</text>
    <text x="800" y="66" text-anchor="middle" font-size="9" class="mono" fill="#525252">BRAF V600E · melanoma → vemurafenib</text>

    <g transform="translate(940,30)">
      <rect width="100" height="26" fill="#059669" rx="3"/>
      <text x="50" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">treat now</text>
    </g>
  </g>

  <!-- Tier II (amber-light) -->
  <g transform="translate(60,188)">
    <rect width="1080" height="86" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
    <rect width="8" height="86" fill="#b45309"/>
    <text x="100" y="36" text-anchor="middle" font-size="20" font-weight="800" fill="#92400e">Tier II</text>
    <text x="100" y="58" text-anchor="middle" font-size="10" fill="#92400e">potential clinical significance</text>

    <text x="280" y="34" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">FDA-approved in DIFFERENT</text>
    <text x="280" y="48" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">cancer · or trial-supported</text>
    <text x="280" y="66" text-anchor="middle" font-size="9" fill="#525252">+ strong preclinical evidence</text>

    <g transform="translate(440,28)" font-size="10" class="mono" fill="#92400e">
      <text x="0" y="0" font-weight="600">II-C</text>
      <text x="40" y="0" fill="#374151">FDA-approved · different cancer type</text>
      <text x="0" y="16" font-weight="600">II-D</text>
      <text x="40" y="16" fill="#374151">Clinical trials · case reports</text>
      <text x="0" y="36" font-style="italic" fill="#525252">used for: trial enrolment / off-label</text>
    </g>

    <text x="800" y="34" text-anchor="middle" font-size="11" font-weight="600" fill="#374151" class="mono">BRAF V600E · CRC</text>
    <text x="800" y="50" text-anchor="middle" font-size="10" fill="#525252">→ encorafenib + cetuximab combo</text>
    <text x="800" y="66" text-anchor="middle" font-size="9" class="mono" fill="#525252">FGFR2 fusion · cholangiocarcinoma → trial</text>

    <g transform="translate(940,30)">
      <rect width="100" height="26" fill="#b45309" rx="3"/>
      <text x="50" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">consider</text>
    </g>
  </g>

  <!-- Tier III (grey) -->
  <g transform="translate(60,278)">
    <rect width="1080" height="86" fill="#f5f5f4" stroke="#a8a29e" stroke-width="1.5"/>
    <rect width="8" height="86" fill="#525252"/>
    <text x="100" y="36" text-anchor="middle" font-size="20" font-weight="800" fill="#525252">Tier III</text>
    <text x="100" y="58" text-anchor="middle" font-size="10" fill="#525252">unknown significance</text>

    <text x="280" y="34" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">In a cancer gene but no</text>
    <text x="280" y="48" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">therapeutic implication</text>
    <text x="280" y="66" text-anchor="middle" font-size="9" fill="#525252">novel · uncharacterised effect</text>

    <g transform="translate(440,28)" font-size="10" class="mono" fill="#525252">
      <text x="0" y="0" font-weight="600">none</text>
      <text x="40" y="0" fill="#374151">no specific evidence-level</text>
      <text x="0" y="16" font-style="italic" fill="#525252">used for: report &amp; revisit</text>
      <text x="0" y="36" fill="#525252">may move to higher tier as evidence accumulates</text>
    </g>

    <text x="800" y="34" text-anchor="middle" font-size="11" font-weight="600" fill="#374151" class="mono">PIK3CA p.Tyr1021Cys</text>
    <text x="800" y="50" text-anchor="middle" font-size="10" fill="#525252">rare missense outside hotspots</text>
    <text x="800" y="66" text-anchor="middle" font-size="9" class="mono" fill="#525252">novel TP53 variant in non-DBD</text>

    <g transform="translate(940,30)">
      <rect width="100" height="26" fill="#525252" rx="3"/>
      <text x="50" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">monitor</text>
    </g>
  </g>

  <!-- Tier IV (muted) -->
  <g transform="translate(60,368)">
    <rect width="1080" height="86" fill="#fafaf9" stroke="#d4d4d8" stroke-width="1"/>
    <rect width="8" height="86" fill="#d4d4d8"/>
    <text x="100" y="36" text-anchor="middle" font-size="20" font-weight="800" fill="#a8a29e">Tier IV</text>
    <text x="100" y="58" text-anchor="middle" font-size="10" fill="#a8a29e">benign · likely benign</text>

    <text x="280" y="34" text-anchor="middle" font-size="11" font-weight="600" fill="#525252">Known germline polymorphism</text>
    <text x="280" y="48" text-anchor="middle" font-size="11" font-weight="600" fill="#525252">or known passenger</text>
    <text x="280" y="66" text-anchor="middle" font-size="9" fill="#a8a29e">no clinical relevance</text>

    <g transform="translate(440,28)" font-size="10" class="mono" fill="#a8a29e">
      <text x="0" y="0" font-style="italic">no evidence-level — not reported</text>
      <text x="0" y="16">filtered out before clinical sign-off</text>
    </g>

    <text x="800" y="34" text-anchor="middle" font-size="11" font-weight="600" fill="#525252" class="mono">common SNP at 12% AF</text>
    <text x="800" y="50" text-anchor="middle" font-size="10" fill="#a8a29e">passenger in non-cancer gene</text>

    <g transform="translate(940,30)">
      <rect width="100" height="26" fill="#a8a29e" rx="3"/>
      <text x="50" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">filter out</text>
    </g>
  </g>

  <!-- Bottom annotation -->
  <g transform="translate(60,470)">
    <rect width="1080" height="58" fill="#dbeafe" stroke="#1d4ed8" rx="4"/>
    <text x="14" y="20" font-size="11" font-weight="600" fill="#1e3a8a">Contrast with ACMG/AMP germline (L17)</text>
    <text x="14" y="36" font-size="10" fill="#374151">germline ACMG/AMP classifies by <strong>pathogenicity probability</strong> (P / LP / VUS / LB / B); somatic AMP/ASCO/CAP classifies by</text>
    <text x="14" y="50" font-size="10" fill="#374151"><strong>clinical action</strong> (treat / consider / monitor / filter). Both frameworks coexist; each answers a different question.</text>
  </g>
</svg>
