<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="540" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">TMB · MSI · HRD — three precision-oncology biomarkers beyond single variants</text>

  <!-- Three side-by-side panels: x = 40, 420, 800; w = 360 -->

  <!-- Panel 1: TMB -->
  <g transform="translate(40,60)">
    <rect width="360" height="440" fill="#fff" stroke="#1d4ed8" rx="6"/>
    <rect width="360" height="36" fill="#1d4ed8" rx="6"/>
    <rect y="30" width="360" height="6" fill="#1d4ed8"/>
    <text x="180" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.04em">TMB · Tumour Mutational Burden</text>

    <text x="20" y="62" font-size="11" font-weight="600" fill="#525252">DEFINITION</text>
    <text x="20" y="80" font-size="10" fill="#374151">Mutations per megabase of coding sequence</text>

    <!-- Histogram of TMB across samples -->
    <g transform="translate(40,108)">
      <line x1="0" y1="160" x2="280" y2="160" stroke="#374151"/>
      <g font-size="9" fill="#6b7280" class="mono">
        <text x="0"   y="174" text-anchor="middle">0</text>
        <text x="56"  y="174" text-anchor="middle">5</text>
        <text x="112" y="174" text-anchor="middle">10</text>
        <text x="168" y="174" text-anchor="middle">20</text>
        <text x="224" y="174" text-anchor="middle">50</text>
        <text x="280" y="174" text-anchor="middle">100+</text>
        <text x="140" y="190" text-anchor="middle" font-size="10" fill="#525252">mutations / Mb</text>
      </g>

      <!-- Bars -->
      <g fill="#1e3a8a">
        <rect x="0"   y="80"  width="22" height="80" />
        <rect x="24"  y="40"  width="22" height="120"/>
        <rect x="48"  y="20"  width="22" height="140"/>
        <rect x="72"  y="50"  width="22" height="110"/>
        <rect x="96"  y="80"  width="22" height="80" />
        <rect x="120" y="100" width="22" height="60" />
        <rect x="144" y="120" width="22" height="40" />
        <rect x="168" y="135" width="22" height="25" />
        <rect x="192" y="142" width="22" height="18" />
        <rect x="216" y="148" width="22" height="12" />
        <rect x="240" y="153" width="22" height="7" />
      </g>

      <!-- TMB ≥ 10 cut -->
      <line x1="112" y1="0" x2="112" y2="160" stroke="#c4342c" stroke-width="2" stroke-dasharray="3 3"/>
      <text x="116" y="12" font-size="10" font-weight="600" fill="#7f1d1d" class="mono">≥10 mut/Mb</text>
      <text x="116" y="26" font-size="9" fill="#7f1d1d">FDA threshold</text>
    </g>

    <text x="20" y="324" font-size="11" font-weight="600" fill="#525252">FDA-APPROVED THERAPY</text>
    <text x="20" y="342" font-size="11" font-weight="700" fill="#1e3a8a" class="mono">pembrolizumab</text>
    <text x="20" y="358" font-size="10" fill="#374151">tumour-agnostic · 2020 indication for TMB ≥ 10</text>

    <text x="20" y="392" font-size="10" font-weight="600" fill="#92400e">Caveat — assay-calibrated</text>
    <text x="20" y="408" font-size="9" fill="#525252">FoundationOne TMB ≠ MSK-IMPACT TMB ≠ WES TMB.</text>
    <text x="20" y="424" font-size="9" fill="#525252">Threshold of 10 only valid on the validated assay.</text>
  </g>

  <!-- Panel 2: MSI -->
  <g transform="translate(420,60)">
    <rect width="360" height="440" fill="#fff" stroke="#b45309" rx="6"/>
    <rect width="360" height="36" fill="#b45309" rx="6"/>
    <rect y="30" width="360" height="6" fill="#b45309"/>
    <text x="180" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.04em">MSI · Microsatellite Instability</text>

    <text x="20" y="62" font-size="11" font-weight="600" fill="#525252">DEFINITION</text>
    <text x="20" y="80" font-size="10" fill="#374151">Instability at microsatellite repeats from MMR loss</text>

    <!-- MSI bimodal cluster -->
    <g transform="translate(40,108)">
      <line x1="0" y1="160" x2="280" y2="160" stroke="#374151"/>
      <g font-size="9" fill="#6b7280" class="mono">
        <text x="0"   y="174" text-anchor="middle">0</text>
        <text x="70"  y="174" text-anchor="middle">5</text>
        <text x="140" y="174" text-anchor="middle">15</text>
        <text x="210" y="174" text-anchor="middle">30</text>
        <text x="280" y="174" text-anchor="middle">50%</text>
        <text x="140" y="190" text-anchor="middle" font-size="10" fill="#525252">% unstable markers</text>
      </g>

      <!-- MSS cluster (left, big) -->
      <g fill="#525252">
        <rect x="6"   y="60"  width="14" height="100"/>
        <rect x="22"  y="20"  width="14" height="140"/>
        <rect x="38"  y="40"  width="14" height="120"/>
        <rect x="54"  y="80"  width="14" height="80" />
        <rect x="70"  y="120" width="14" height="40" />
      </g>
      <text x="40" y="14" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">MSS / MSI-low</text>

      <!-- MSI-H cluster (right, small) -->
      <g fill="#b45309">
        <rect x="180" y="120" width="14" height="40"/>
        <rect x="196" y="100" width="14" height="60"/>
        <rect x="212" y="80"  width="14" height="80"/>
        <rect x="228" y="100" width="14" height="60"/>
        <rect x="244" y="130" width="14" height="30"/>
      </g>
      <text x="220" y="74" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">MSI-H</text>

      <line x1="156" y1="0" x2="156" y2="160" stroke="#c4342c" stroke-width="2" stroke-dasharray="3 3"/>
    </g>

    <text x="20" y="324" font-size="11" font-weight="600" fill="#525252">FDA-APPROVED THERAPY</text>
    <text x="20" y="342" font-size="11" font-weight="700" fill="#92400e" class="mono">pembrolizumab</text>
    <text x="20" y="358" font-size="10" fill="#374151">tumour-agnostic · 2017 (first ever)</text>

    <text x="20" y="392" font-size="10" font-weight="600" fill="#92400e">Tests</text>
    <text x="20" y="408" font-size="9" fill="#525252">IHC (MMR proteins) · MSI-PCR · MSIsensor / MSINGS</text>
    <text x="20" y="424" font-size="9" fill="#525252">germline cause: Lynch syndrome (MLH1/MSH2/MSH6/PMS2)</text>
  </g>

  <!-- Panel 3: HRD -->
  <g transform="translate(800,60)">
    <rect width="360" height="440" fill="#fff" stroke="#0d7377" rx="6"/>
    <rect width="360" height="36" fill="#0d7377" rx="6"/>
    <rect y="30" width="360" height="6" fill="#0d7377"/>
    <text x="180" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.04em">HRD · HR Deficiency</text>

    <text x="20" y="62" font-size="11" font-weight="600" fill="#525252">DEFINITION</text>
    <text x="20" y="80" font-size="10" fill="#374151">Loss of homologous-recombination repair</text>
    <text x="20" y="94" font-size="10" fill="#374151">(BRCA1/2 + LOH + TAI + LST)</text>

    <!-- HRD violin -->
    <g transform="translate(40,116)">
      <line x1="0" y1="160" x2="280" y2="160" stroke="#374151"/>
      <g font-size="9" fill="#6b7280" class="mono">
        <text x="0"   y="174" text-anchor="middle">0</text>
        <text x="56"  y="174" text-anchor="middle">15</text>
        <text x="112" y="174" text-anchor="middle">30</text>
        <text x="168" y="174" text-anchor="middle">42</text>
        <text x="224" y="174" text-anchor="middle">60</text>
        <text x="280" y="174" text-anchor="middle">80+</text>
        <text x="140" y="190" text-anchor="middle" font-size="10" fill="#525252">HRD score</text>
      </g>

      <!-- HRD-negative left half (broad) -->
      <g fill="#0d7377" fill-opacity="0.35">
        <path d="M 0 160 L 14 130 L 28 100 L 42 80 L 56 70 L 70 80 L 84 100 L 98 130 L 112 160 Z"/>
      </g>
      <text x="56" y="60" text-anchor="middle" font-size="10" font-weight="600" fill="#0d7377">HRD-negative</text>

      <!-- HRD-positive right half (narrow tall) -->
      <g fill="#0d7377" fill-opacity="0.7">
        <path d="M 168 160 L 182 110 L 196 60 L 210 40 L 224 50 L 238 80 L 252 130 L 266 160 Z"/>
      </g>
      <text x="216" y="30" text-anchor="middle" font-size="10" font-weight="600" fill="#0d7377">HRD+</text>

      <!-- threshold line at HRD ≥ 42 -->
      <line x1="168" y1="0" x2="168" y2="160" stroke="#c4342c" stroke-width="2" stroke-dasharray="3 3"/>
      <text x="172" y="14" font-size="10" font-weight="600" fill="#7f1d1d" class="mono">≥42</text>
    </g>

    <text x="20" y="332" font-size="11" font-weight="600" fill="#525252">FDA-APPROVED THERAPY</text>
    <text x="20" y="350" font-size="11" font-weight="700" fill="#0d7377" class="mono">olaparib · niraparib · rucaparib</text>
    <text x="20" y="366" font-size="10" fill="#374151">PARP inhibitors · ovarian / breast / pancreas / prostate</text>

    <text x="20" y="394" font-size="10" font-weight="600" fill="#92400e">Score components</text>
    <text x="20" y="410" font-size="9" fill="#525252" class="mono">LOH + TAI + LST + signature SBS3 (NMF)</text>
    <text x="20" y="424" font-size="9" fill="#525252">germline cause: BRCA1/2, PALB2, RAD51 LoF</text>
  </g>

  <!-- Bottom unifying band -->
  <g transform="translate(60,510)">
    <text x="540" y="0" text-anchor="middle" font-size="10" fill="#525252">Each is a statistic over somatic mutations + a clinical decision threshold; each links to a specific FDA-approved drug class.</text>
  </g>
</svg>
