<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arr11" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#525252"/>
    </marker>
  </defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Precision-oncology decision tree — from somatic VCF to therapy</text>

  <!-- Start node -->
  <g transform="translate(440,60)">
    <rect width="320" height="58" fill="#374151" rx="6"/>
    <text x="160" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Tumour-board reviews report</text>
    <text x="160" y="44" text-anchor="middle" font-size="10" fill="#d1d5db" class="mono">somatic VCF · CNV · TMB · MSI · HRD · fusions</text>
  </g>

  <g stroke="#525252" stroke-width="1.5" fill="none" marker-end="url(#arr11)">
    <line x1="600" y1="118" x2="600" y2="146"/>
  </g>

  <!-- Q1: Tier I variant? -->
  <g transform="translate(440,148)">
    <rect width="320" height="48" fill="#fff" stroke="#374151" stroke-width="1.5" rx="20"/>
    <text x="160" y="24" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Tier I variant present?</text>
    <text x="160" y="40" text-anchor="middle" font-size="9" fill="#6b7280">FDA-approved drug · this cancer · this variant</text>
  </g>

  <!-- Yes → Tier I targeted therapy -->
  <g stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr11)">
    <path d="M 760 172 C 850 172 920 220 920 270"/>
  </g>
  <text x="800" y="166" font-size="10" font-weight="600" fill="#059669">YES</text>

  <g transform="translate(800,272)">
    <rect width="240" height="68" fill="#dcfce7" stroke="#059669" stroke-width="1.5" rx="6"/>
    <rect width="6" height="68" fill="#059669"/>
    <text x="124" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">Targeted therapy</text>
    <text x="124" y="40" text-anchor="middle" font-size="9" class="mono" fill="#065f46">EGFR L858R → osimertinib</text>
    <text x="124" y="54" text-anchor="middle" font-size="9" class="mono" fill="#065f46">BRCA1/2 → olaparib</text>
    <text x="124" y="64" text-anchor="middle" font-size="9" class="mono" fill="#065f46">EML4-ALK → alectinib</text>
  </g>

  <!-- No → Q2: Tier II? -->
  <g stroke="#525252" stroke-width="1.5" fill="none" marker-end="url(#arr11)">
    <line x1="600" y1="196" x2="600" y2="220"/>
  </g>
  <text x="608" y="212" font-size="10" font-weight="600" fill="#525252">NO</text>

  <g transform="translate(440,222)">
    <rect width="320" height="48" fill="#fff" stroke="#374151" stroke-width="1.5" rx="20"/>
    <text x="160" y="24" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Tier II variant present?</text>
    <text x="160" y="40" text-anchor="middle" font-size="9" fill="#6b7280">FDA-approved · different cancer · or trial</text>
  </g>

  <g stroke="#b45309" stroke-width="1.5" fill="none" marker-end="url(#arr11)">
    <path d="M 760 246 C 850 246 920 320 920 370"/>
  </g>
  <text x="800" y="240" font-size="10" font-weight="600" fill="#b45309">YES</text>

  <g transform="translate(800,372)">
    <rect width="240" height="60" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="6"/>
    <rect width="6" height="60" fill="#b45309"/>
    <text x="124" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Clinical trial / off-label</text>
    <text x="124" y="38" text-anchor="middle" font-size="9" class="mono" fill="#92400e">basket trial · NCI-MATCH</text>
    <text x="124" y="52" text-anchor="middle" font-size="9" class="mono" fill="#92400e">tumour-agnostic protocols</text>
  </g>

  <g stroke="#525252" stroke-width="1.5" fill="none" marker-end="url(#arr11)">
    <line x1="600" y1="270" x2="600" y2="294"/>
  </g>
  <text x="608" y="286" font-size="10" font-weight="600" fill="#525252">NO</text>

  <g transform="translate(440,296)">
    <rect width="320" height="48" fill="#fff" stroke="#374151" stroke-width="1.5" rx="20"/>
    <text x="160" y="24" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">High TMB or MSI-H?</text>
    <text x="160" y="40" text-anchor="middle" font-size="9" fill="#6b7280">TMB ≥ 10 mut/Mb or dMMR / MSI-high</text>
  </g>

  <g stroke="#1e40af" stroke-width="1.5" fill="none" marker-end="url(#arr11)">
    <path d="M 440 320 C 350 320 280 380 280 430"/>
  </g>
  <text x="380" y="314" font-size="10" font-weight="600" fill="#1e40af">YES</text>

  <g transform="translate(140,432)">
    <rect width="240" height="60" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" rx="6"/>
    <rect width="6" height="60" fill="#1e3a8a"/>
    <text x="124" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">Immunotherapy</text>
    <text x="124" y="38" text-anchor="middle" font-size="9" class="mono" fill="#1e3a8a">pembrolizumab · nivolumab</text>
    <text x="124" y="52" text-anchor="middle" font-size="9" class="mono" fill="#1e3a8a">checkpoint inhibitor</text>
  </g>

  <g stroke="#525252" stroke-width="1.5" fill="none" marker-end="url(#arr11)">
    <line x1="600" y1="344" x2="600" y2="368"/>
  </g>
  <text x="608" y="360" font-size="10" font-weight="600" fill="#525252">NO</text>

  <g transform="translate(440,370)">
    <rect width="320" height="48" fill="#fff" stroke="#374151" stroke-width="1.5" rx="20"/>
    <text x="160" y="24" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">HRD positive?</text>
    <text x="160" y="40" text-anchor="middle" font-size="9" fill="#6b7280">BRCA1/2 loss · HRD score ≥ 42 · SBS3</text>
  </g>

  <g stroke="#0d7377" stroke-width="1.5" fill="none" marker-end="url(#arr11)">
    <path d="M 440 394 C 350 394 280 460 280 510"/>
  </g>
  <text x="380" y="388" font-size="10" font-weight="600" fill="#0d7377">YES</text>

  <g transform="translate(140,512)">
    <rect width="240" height="60" fill="#ccfbf1" stroke="#0d7377" stroke-width="1.5" rx="6"/>
    <rect width="6" height="60" fill="#0d7377"/>
    <text x="124" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#0d7377">PARP inhibitor</text>
    <text x="124" y="38" text-anchor="middle" font-size="9" class="mono" fill="#0d7377">olaparib · niraparib · rucaparib</text>
    <text x="124" y="52" text-anchor="middle" font-size="9" class="mono" fill="#0d7377">synthetic lethality</text>
  </g>

  <g stroke="#525252" stroke-width="1.5" fill="none" marker-end="url(#arr11)">
    <line x1="600" y1="418" x2="600" y2="442"/>
  </g>
  <text x="608" y="434" font-size="10" font-weight="600" fill="#525252">NO</text>

  <g transform="translate(440,444)">
    <rect width="320" height="68" fill="#f5f5f4" stroke="#525252" stroke-width="1.5" rx="6"/>
    <text x="160" y="24" text-anchor="middle" font-size="11" font-weight="700" fill="#525252">Standard-of-care chemotherapy</text>
    <text x="160" y="42" text-anchor="middle" font-size="9" fill="#525252">cytotoxic regimen for tumour type</text>
    <text x="160" y="58" text-anchor="middle" font-size="9" fill="#525252">+ ctDNA monitoring for resistance evolution</text>
  </g>

  <g transform="translate(440,538)">
    <rect width="320" height="44" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="160" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Combination + sequential therapy</text>
    <text x="160" y="36" text-anchor="middle" font-size="9" fill="#374151">to pre-empt resistance subclones</text>
  </g>

  <text x="600" y="585" text-anchor="middle" font-size="10" fill="#525252">Decision tree captures the practical flow inside a molecular tumour board; the actual sequencing pipeline feeds the input.</text>
</svg>
