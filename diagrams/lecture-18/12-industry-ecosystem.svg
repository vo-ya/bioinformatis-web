<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" width="1200" height="640" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="640" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Cancer-genomics industry ecosystem — career paths for an EE graduate</text>

  <!-- Four quadrants: 540×260 each. Centred around (600,300). -->

  <!-- Q1: Clinical labs (top-left) -->
  <g transform="translate(40,60)">
    <rect width="540" height="260" fill="#fff" stroke="#1d4ed8" stroke-width="1.5" rx="6"/>
    <rect width="540" height="36" fill="#1d4ed8" rx="6"/>
    <rect y="30" width="540" height="6" fill="#1d4ed8"/>
    <text x="270" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.04em">CLINICAL LABS</text>

    <text x="20" y="62" font-size="11" font-weight="600" fill="#525252">Companies</text>
    <g transform="translate(20,76)" font-size="10" class="mono" fill="#1e3a8a">
      <text x="0"   y="0" font-weight="600">Foundation Medicine</text>
      <text x="170" y="0" font-weight="600">Guardant Health</text>
      <text x="320" y="0" font-weight="600">Tempus AI</text>
      <text x="0"   y="16" font-weight="600">Natera</text>
      <text x="170" y="16" font-weight="600">Caris Life Sciences</text>
      <text x="320" y="16" font-weight="600">Invitae-oncology</text>
    </g>

    <text x="20" y="124" font-size="11" font-weight="600" fill="#525252">Typical roles</text>
    <g transform="translate(20,138)" font-size="10">
      <text x="0" y="0" fill="#374151">· Clinical bioinformatics engineer</text>
      <text x="0" y="16" fill="#374151">· Validation engineer (CLIA / CAP)</text>
      <text x="0" y="32" fill="#374151">· Variant scientist (M.Sc / PhD)</text>
      <text x="0" y="48" fill="#374151">· LIMS / pipeline / SaaS engineer</text>
    </g>

    <text x="20" y="214" font-size="11" font-weight="600" fill="#525252">Skills emphasis</text>
    <text x="20" y="230" font-size="10" fill="#374151">Pipeline reproducibility · regulatory literacy ·</text>
    <text x="20" y="244" font-size="10" fill="#374151">Tier-I/II classification · turnaround discipline</text>
  </g>

  <!-- Q2: Pharma/biotech (top-right) -->
  <g transform="translate(620,60)">
    <rect width="540" height="260" fill="#fff" stroke="#b45309" stroke-width="1.5" rx="6"/>
    <rect width="540" height="36" fill="#b45309" rx="6"/>
    <rect y="30" width="540" height="6" fill="#b45309"/>
    <text x="270" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.04em">PHARMA / BIOTECH</text>

    <text x="20" y="62" font-size="11" font-weight="600" fill="#525252">Companies</text>
    <g transform="translate(20,76)" font-size="10" class="mono" fill="#92400e">
      <text x="0"   y="0" font-weight="600">Roche / Genentech</text>
      <text x="170" y="0" font-weight="600">Novartis</text>
      <text x="320" y="0" font-weight="600">AstraZeneca</text>
      <text x="0"   y="16" font-weight="600">Pfizer</text>
      <text x="170" y="16" font-weight="600">Moderna · BioNTech</text>
      <text x="320" y="16" font-weight="600">Bristol Myers Squibb</text>
    </g>

    <text x="20" y="124" font-size="11" font-weight="600" fill="#525252">Typical roles</text>
    <g transform="translate(20,138)" font-size="10">
      <text x="0" y="0" fill="#374151">· Computational biologist</text>
      <text x="0" y="16" fill="#374151">· Biomarker discovery scientist</text>
      <text x="0" y="32" fill="#374151">· Translational data scientist</text>
      <text x="0" y="48" fill="#374151">· Clinical-trial bioinformatician</text>
    </g>

    <text x="20" y="214" font-size="11" font-weight="600" fill="#525252">Skills emphasis</text>
    <text x="20" y="230" font-size="10" fill="#374151">Biomarker discovery · companion-Dx co-development ·</text>
    <text x="20" y="244" font-size="10" fill="#374151">trial endpoints · drug-genomics integration</text>
  </g>

  <!-- Q3: Sequencing / platform (bottom-left) -->
  <g transform="translate(40,360)">
    <rect width="540" height="260" fill="#fff" stroke="#0d7377" stroke-width="1.5" rx="6"/>
    <rect width="540" height="36" fill="#0d7377" rx="6"/>
    <rect y="30" width="540" height="6" fill="#0d7377"/>
    <text x="270" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.04em">SEQUENCING / PLATFORM</text>

    <text x="20" y="62" font-size="11" font-weight="600" fill="#525252">Companies</text>
    <g transform="translate(20,76)" font-size="10" class="mono" fill="#0d7377">
      <text x="0"   y="0" font-weight="600">Illumina</text>
      <text x="170" y="0" font-weight="600">PacBio</text>
      <text x="320" y="0" font-weight="600">Oxford Nanopore</text>
      <text x="0"   y="16" font-weight="600">10× Genomics</text>
      <text x="170" y="16" font-weight="600">Element Bio</text>
      <text x="320" y="16" font-weight="600">Ultima Genomics</text>
    </g>

    <text x="20" y="124" font-size="11" font-weight="600" fill="#525252">Typical roles</text>
    <g transform="translate(20,138)" font-size="10">
      <text x="0" y="0" fill="#374151">· Algorithm / basecalling engineer</text>
      <text x="0" y="16" fill="#374151">· Field application scientist</text>
      <text x="0" y="32" fill="#374151">· Reference-pipeline maintainer</text>
      <text x="0" y="48" fill="#374151">· Performance / QC engineer</text>
    </g>

    <text x="20" y="214" font-size="11" font-weight="600" fill="#525252">Skills emphasis</text>
    <text x="20" y="230" font-size="10" fill="#374151">Signal processing · ML on raw signals ·</text>
    <text x="20" y="244" font-size="10" fill="#374151">benchmarking · throughput / accuracy tradeoffs</text>
  </g>

  <!-- Q4: Academic cancer centres (bottom-right) -->
  <g transform="translate(620,360)">
    <rect width="540" height="260" fill="#fff" stroke="#7c3aed" stroke-width="1.5" rx="6"/>
    <rect width="540" height="36" fill="#7c3aed" rx="6"/>
    <rect y="30" width="540" height="6" fill="#7c3aed"/>
    <text x="270" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.04em">ACADEMIC CANCER CENTRES</text>

    <text x="20" y="62" font-size="11" font-weight="600" fill="#525252">Institutions</text>
    <g transform="translate(20,76)" font-size="10" class="mono" fill="#5b21b6">
      <text x="0"   y="0" font-weight="600">MSK Cancer Center</text>
      <text x="170" y="0" font-weight="600">Dana-Farber</text>
      <text x="320" y="0" font-weight="600">MD Anderson</text>
      <text x="0"   y="16" font-weight="600">Broad Institute</text>
      <text x="170" y="16" font-weight="600">Sanger Institute</text>
      <text x="320" y="16" font-weight="600">EMBL-EBI · DKFZ</text>
    </g>

    <text x="20" y="124" font-size="11" font-weight="600" fill="#525252">Typical roles</text>
    <g transform="translate(20,138)" font-size="10">
      <text x="0" y="0" fill="#374151">· Translational research scientist</text>
      <text x="0" y="16" fill="#374151">· Computational PI / postdoc</text>
      <text x="0" y="32" fill="#374151">· Core-facility bioinformatician</text>
      <text x="0" y="48" fill="#374151">· ML-for-genomics researcher</text>
    </g>

    <text x="20" y="214" font-size="11" font-weight="600" fill="#525252">Skills emphasis</text>
    <text x="20" y="230" font-size="10" fill="#374151">Method development · novel biomarker discovery ·</text>
    <text x="20" y="244" font-size="10" fill="#374151">grant-writing · publication record</text>
  </g>

  <text x="600" y="640" text-anchor="middle" font-size="10" fill="#525252">Hybrid roles (clinical + research + ML) are increasingly the norm — careers often cycle between quadrants over a working life.</text>
</svg>
