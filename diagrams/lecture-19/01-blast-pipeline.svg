<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#525252"/>
    </marker>
  </defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">BLAST search architecture — five-stage cascade</text>

  <!-- Query block -->
  <g transform="translate(60,60)">
    <rect width="200" height="50" fill="#dbeafe" stroke="#1e3a8a" rx="4"/>
    <rect width="6" height="50" fill="#1e3a8a"/>
    <text x="106" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">Query sequence</text>
    <text x="106" y="38" text-anchor="middle" class="mono" fill="#525252">~300 aa peptide</text>
  </g>
  <g stroke="#525252" stroke-width="1" fill="none" marker-end="url(#arr)">
    <line x1="160" y1="112" x2="160" y2="138"/>
  </g>

  <!-- Stage 1: word list -->
  <g transform="translate(60,140)">
    <rect width="200" height="60" fill="#fff" stroke="#1e40af" rx="4"/>
    <text x="100" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">1 · Word list + neighbourhood</text>
    <text x="100" y="38" text-anchor="middle" font-size="9" fill="#525252">enumerate query 3-mers</text>
    <text x="100" y="52" text-anchor="middle" font-size="9" fill="#525252">expand to score-T neighbours</text>
  </g>
  <text x="290" y="180" font-size="10" fill="#1e40af" class="mono">~15,000 candidate seeds</text>

  <g stroke="#525252" stroke-width="1" fill="none" marker-end="url(#arr)">
    <line x1="160" y1="202" x2="160" y2="226"/>
  </g>

  <!-- Stage 2: database scan -->
  <g transform="translate(60,228)">
    <rect width="200" height="60" fill="#fff" stroke="#1e40af" rx="4"/>
    <text x="100" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">2 · Database hash scan</text>
    <text x="100" y="38" text-anchor="middle" font-size="9" fill="#525252">k-mer table lookup, O(1) per seed</text>
    <text x="100" y="52" text-anchor="middle" font-size="9" fill="#525252">UniProt scale: ~10⁵ raw hits</text>
  </g>
  <text x="290" y="266" font-size="10" fill="#1e40af" class="mono">~10⁵ raw seed hits</text>

  <g stroke="#525252" stroke-width="1" fill="none" marker-end="url(#arr)">
    <line x1="160" y1="290" x2="160" y2="314"/>
  </g>

  <!-- Stage 3: two-hit pairing -->
  <g transform="translate(60,316)">
    <rect width="200" height="60" fill="#fff" stroke="#b45309" rx="4"/>
    <text x="100" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">3 · Two-hit pairing</text>
    <text x="100" y="38" text-anchor="middle" font-size="9" fill="#525252">2 hits within distance A=40</text>
    <text x="100" y="52" text-anchor="middle" font-size="9" fill="#525252">→ trigger extension</text>
  </g>
  <text x="290" y="354" font-size="10" fill="#b45309" class="mono">~10³ extension candidates</text>

  <g stroke="#525252" stroke-width="1" fill="none" marker-end="url(#arr)">
    <line x1="160" y1="378" x2="160" y2="402"/>
  </g>

  <!-- Stage 4: ungapped extension -->
  <g transform="translate(60,404)">
    <rect width="200" height="60" fill="#fff" stroke="#b45309" rx="4"/>
    <text x="100" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">4 · Ungapped extension</text>
    <text x="100" y="38" text-anchor="middle" font-size="9" fill="#525252">X-drop bidirectional</text>
    <text x="100" y="52" text-anchor="middle" font-size="9" fill="#525252">produces HSPs</text>
  </g>
  <text x="290" y="442" font-size="10" fill="#b45309" class="mono">~10² HSPs</text>

  <g stroke="#525252" stroke-width="1" fill="none" marker-end="url(#arr)">
    <line x1="160" y1="466" x2="160" y2="490"/>
  </g>

  <!-- Stage 5: gapped extension + scoring -->
  <g transform="translate(60,492)">
    <rect width="200" height="60" fill="#fff" stroke="#c4342c" rx="4"/>
    <text x="100" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#c4342c">5 · Gapped extension + score</text>
    <text x="100" y="38" text-anchor="middle" font-size="9" fill="#525252">banded Smith-Waterman</text>
    <text x="100" y="52" text-anchor="middle" font-size="9" fill="#525252">bit score + E-value</text>
  </g>

  <!-- Significance filter and report -->
  <g transform="translate(310,492)">
    <rect width="220" height="60" fill="#dcfce7" stroke="#059669" rx="4"/>
    <rect width="6" height="60" fill="#059669"/>
    <text x="116" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">Significant hits report</text>
    <text x="116" y="38" text-anchor="middle" font-size="9" fill="#525252">filter E &lt; threshold (10⁻³)</text>
    <text x="116" y="52" text-anchor="middle" font-size="9" fill="#525252">~10 reported homologs</text>
  </g>

  <g stroke="#525252" stroke-width="1" fill="none" marker-end="url(#arr)">
    <line x1="266" y1="522" x2="304" y2="522"/>
  </g>

  <!-- Right side: callout -->
  <g transform="translate(620,140)">
    <rect width="520" height="320" fill="#fef3c7" stroke="#b45309" rx="6"/>
    <text x="260" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">BLAST trades exactness for tractability</text>

    <text x="20" y="64" font-size="11" font-weight="600" fill="#374151">Naive Smith-Waterman cost</text>
    <text x="20" y="82" class="mono" fill="#525252">O(query × database)</text>
    <text x="20" y="98" class="mono" fill="#525252">≈ O(10⁵ × 10¹¹) = 10¹⁶ ops/query</text>
    <text x="20" y="114" font-size="10" fill="#525252">→ ~4 months per query at 10⁹ ops/s.</text>

    <text x="20" y="148" font-size="11" font-weight="600" fill="#374151">BLAST cost</text>
    <text x="20" y="166" class="mono" fill="#525252">~minutes per query (web service)</text>
    <text x="20" y="182" font-size="10" fill="#525252">~10⁹× speedup by skipping unrelated DB seqs.</text>

    <text x="20" y="216" font-size="11" font-weight="600" fill="#374151">What we keep</text>
    <text x="20" y="234" font-size="10" fill="#525252">• exact alignment of strong hits</text>
    <text x="20" y="250" font-size="10" fill="#525252">• statistical significance (E-value)</text>
    <text x="20" y="266" font-size="10" fill="#525252">• detection of distant homologs (PSI-BLAST)</text>

    <text x="20" y="300" font-size="11" font-style="italic" fill="#92400e">"Heuristic search with statistical guarantees"</text>
  </g>
</svg>
