<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="540" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Seed → extend → score — worked example</text>

  <!-- Panel 1: Query and seed -->
  <g transform="translate(40,60)">
    <rect width="360" height="430" fill="#fff" stroke="#1e40af" rx="6"/>
    <rect width="360" height="32" fill="#1e40af" rx="6"/>
    <rect y="26" width="360" height="6" fill="#1e40af"/>
    <text x="180" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">1 · SEED</text>

    <text x="20" y="58" font-size="10" font-weight="600" fill="#525252">Query peptide</text>
    <g transform="translate(20,68)">
      <rect width="320" height="24" fill="#dbeafe" stroke="#1e3a8a"/>
      <text x="160" y="16" text-anchor="middle" class="mono" font-size="11" fill="#374151">M K V L W A G C E R F P N</text>
      <!-- Highlight KVL at positions 2-4 -->
      <rect x="48" y="0" width="72" height="24" fill="#fde68a" fill-opacity="0.6"/>
      <text x="84" y="16" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#7f1d1d">K V L</text>
    </g>
    <text x="180" y="106" text-anchor="middle" font-size="9" fill="#525252">3-mer at positions 2–4</text>

    <text x="20" y="138" font-size="10" font-weight="600" fill="#525252">Subject database hit</text>
    <g transform="translate(20,148)">
      <rect width="320" height="24" fill="#fef3c7" stroke="#b45309"/>
      <text x="160" y="16" text-anchor="middle" class="mono" font-size="11" fill="#374151">A G C K V L W A Q</text>
      <!-- Highlight KVL at positions 4-6 -->
      <rect x="120" y="0" width="72" height="24" fill="#fde68a" fill-opacity="0.6"/>
      <text x="156" y="16" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#7f1d1d">K V L</text>
    </g>
    <text x="180" y="186" text-anchor="middle" font-size="9" fill="#525252">match at subject position 4</text>

    <text x="20" y="220" font-size="10" font-weight="600" fill="#525252">Neighbourhood (BLOSUM62, T = 11)</text>
    <g transform="translate(20,232)" font-size="11" class="mono">
      <text x="0"   y="14" fill="#525252">KVL → score 16 (self)</text>
      <text x="0"   y="32" fill="#525252">KVI → score 14</text>
      <text x="0"   y="50" fill="#525252">RVL → score 12</text>
      <text x="0"   y="68" fill="#525252">KVM → score 12</text>
      <text x="0"   y="86" fill="#525252">KIL → score 12</text>
      <text x="0"   y="108" fill="#9ca3af">KVA → score 9 (below T)</text>
      <text x="0"   y="124" fill="#9ca3af">QVL → score 8 (below T)</text>
    </g>

    <g transform="translate(20,376)">
      <rect width="320" height="40" fill="#dbeafe" stroke="#1e3a8a" rx="3"/>
      <text x="160" y="16" text-anchor="middle" font-size="10" font-weight="600" fill="#1e3a8a">5 neighbours scan against subject</text>
      <text x="160" y="30" text-anchor="middle" font-size="9" fill="#525252">→ database hit triggers extension</text>
    </g>
  </g>

  <!-- Panel 2: Neighbourhood expansion (radial diagram) -->
  <g transform="translate(420,60)">
    <rect width="360" height="430" fill="#fff" stroke="#7c3aed" rx="6"/>
    <rect width="360" height="32" fill="#7c3aed" rx="6"/>
    <rect y="26" width="360" height="6" fill="#7c3aed"/>
    <text x="180" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">2 · NEIGHBOURHOOD</text>

    <!-- Radial: KVL at center, neighbours around -->
    <g transform="translate(180,230)">
      <circle cx="0" cy="0" r="34" fill="#7c3aed"/>
      <text x="0" y="-2" text-anchor="middle" font-size="13" font-weight="700" fill="#fff" class="mono">KVL</text>
      <text x="0" y="14" text-anchor="middle" font-size="9" fill="#ede9fe">score 16</text>

      <!-- 5 neighbours at angles -->
      <g>
        <line x1="0" y1="0" x2="100" y2="-50" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3 3"/>
        <circle cx="100" cy="-50" r="22" fill="#a78bfa"/>
        <text x="100" y="-48" text-anchor="middle" font-size="11" font-weight="600" fill="#fff" class="mono">KVI</text>
        <text x="100" y="-32" text-anchor="middle" font-size="8" fill="#ede9fe">14</text>

        <line x1="0" y1="0" x2="100" y2="50" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3 3"/>
        <circle cx="100" cy="50" r="22" fill="#a78bfa"/>
        <text x="100" y="52" text-anchor="middle" font-size="11" font-weight="600" fill="#fff" class="mono">RVL</text>
        <text x="100" y="68" text-anchor="middle" font-size="8" fill="#ede9fe">12</text>

        <line x1="0" y1="0" x2="-100" y2="-50" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3 3"/>
        <circle cx="-100" cy="-50" r="22" fill="#a78bfa"/>
        <text x="-100" y="-48" text-anchor="middle" font-size="11" font-weight="600" fill="#fff" class="mono">KVM</text>
        <text x="-100" y="-32" text-anchor="middle" font-size="8" fill="#ede9fe">12</text>

        <line x1="0" y1="0" x2="-100" y2="50" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3 3"/>
        <circle cx="-100" cy="50" r="22" fill="#a78bfa"/>
        <text x="-100" y="52" text-anchor="middle" font-size="11" font-weight="600" fill="#fff" class="mono">KIL</text>
        <text x="-100" y="68" text-anchor="middle" font-size="8" fill="#ede9fe">12</text>

        <line x1="0" y1="0" x2="0" y2="-110" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3 3"/>
        <circle cx="0" cy="-110" r="22" fill="#a78bfa"/>
        <text x="0" y="-108" text-anchor="middle" font-size="11" font-weight="600" fill="#fff" class="mono">RVI</text>
        <text x="0" y="-92" text-anchor="middle" font-size="8" fill="#ede9fe">11</text>
      </g>

      <!-- Outer (excluded) -->
      <circle cx="100" cy="120" r="20" fill="none" stroke="#9ca3af" stroke-dasharray="2 2"/>
      <text x="100" y="124" text-anchor="middle" font-size="11" fill="#9ca3af" class="mono">KVA</text>
      <text x="100" y="138" text-anchor="middle" font-size="8" fill="#9ca3af">9</text>

      <circle cx="-100" cy="120" r="20" fill="none" stroke="#9ca3af" stroke-dasharray="2 2"/>
      <text x="-100" y="124" text-anchor="middle" font-size="11" fill="#9ca3af" class="mono">QVL</text>
      <text x="-100" y="138" text-anchor="middle" font-size="8" fill="#9ca3af">8</text>
    </g>

    <text x="180" y="406" text-anchor="middle" font-size="10" fill="#525252">circle of radius T = 11 in scoring space</text>
    <text x="180" y="420" text-anchor="middle" font-size="9" fill="#9ca3af">below-T neighbours excluded</text>
  </g>

  <!-- Panel 3: Extension -->
  <g transform="translate(800,60)">
    <rect width="360" height="430" fill="#fff" stroke="#c4342c" rx="6"/>
    <rect width="360" height="32" fill="#c4342c" rx="6"/>
    <rect y="26" width="360" height="6" fill="#c4342c"/>
    <text x="180" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">3 · EXTEND + SCORE</text>

    <!-- Extension trajectory -->
    <text x="20" y="58" font-size="10" font-weight="600" fill="#525252">Bidirectional extension from seed</text>

    <g transform="translate(40,80)">
      <!-- Axes -->
      <line x1="0" y1="200" x2="280" y2="200" stroke="#a8a29e"/>
      <line x1="140" y1="0" x2="140" y2="200" stroke="#a8a29e" stroke-dasharray="2 2"/>
      <text x="140" y="216" text-anchor="middle" font-size="9" fill="#525252">seed</text>
      <text x="0" y="216" text-anchor="middle" font-size="9" fill="#525252">−15</text>
      <text x="280" y="216" text-anchor="middle" font-size="9" fill="#525252">+15</text>
      <text x="140" y="234" text-anchor="middle" font-size="10" fill="#525252">offset from seed</text>

      <text x="-8" y="200" text-anchor="end" font-size="9" fill="#525252">0</text>
      <text x="-8" y="100" text-anchor="end" font-size="9" fill="#525252">40</text>
      <text x="-8" y="0" text-anchor="end" font-size="9" fill="#525252">80</text>
      <text x="-30" y="100" text-anchor="middle" font-size="10" fill="#525252" transform="rotate(-90 -30 100)">cumulative score</text>

      <!-- Extension trajectory: peaks then drops -->
      <path d="M 50 180 L 70 160 L 90 130 L 110 95 L 130 70 L 150 60 L 170 70 L 190 90 L 210 120 L 230 155" stroke="#c4342c" stroke-width="2" fill="none"/>
      <!-- Peak markers -->
      <circle cx="150" cy="60" r="4" fill="#c4342c"/>
      <text x="150" y="46" text-anchor="middle" font-size="9" font-weight="600" fill="#7f1d1d">peak 80</text>

      <!-- X-drop line (dashed) -->
      <line x1="0" y1="124" x2="280" y2="124" stroke="#b45309" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="280" y="120" text-anchor="end" font-size="9" fill="#92400e">peak − X = 58</text>

      <!-- Stop boundaries -->
      <line x1="50" y1="0" x2="50" y2="200" stroke="#525252" stroke-width="1" stroke-dasharray="2 2"/>
      <line x1="230" y1="0" x2="230" y2="200" stroke="#525252" stroke-width="1" stroke-dasharray="2 2"/>
      <text x="50" y="-4" text-anchor="middle" font-size="9" fill="#525252">stop</text>
      <text x="230" y="-4" text-anchor="middle" font-size="9" fill="#525252">stop</text>
    </g>

    <g transform="translate(20,344)">
      <rect width="320" height="68" fill="#fee2e2" stroke="#c4342c" rx="3"/>
      <text x="160" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#7f1d1d">Final HSP</text>
      <text x="160" y="38" text-anchor="middle" font-size="10" class="mono" fill="#525252">length 18 aa · raw score 80 · bits 38</text>
      <text x="160" y="56" text-anchor="middle" font-size="10" class="mono" fill="#525252">E = 100 × 10⁹ × 2⁻³⁸ ≈ 4 × 10⁻²</text>
    </g>
  </g>
</svg>
