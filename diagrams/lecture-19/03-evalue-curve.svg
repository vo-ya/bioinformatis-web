<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Karlin-Altschul: bit score → E-value</text>

  <!-- Panel 1: Gumbel distribution -->
  <g transform="translate(60,68)">
    <rect width="500" height="480" fill="#fff" stroke="#a8a29e" rx="6"/>
    <text x="250" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Gumbel distribution of random-DB scores</text>

    <!-- Plot area -->
    <g transform="translate(60,60)">
      <line x1="0" y1="360" x2="400" y2="360" stroke="#374151"/>
      <line x1="0" y1="0" x2="0" y2="360" stroke="#374151"/>

      <g font-size="9" fill="#6b7280" class="mono">
        <text x="0"   y="376" text-anchor="middle">0</text>
        <text x="80"  y="376" text-anchor="middle">25</text>
        <text x="160" y="376" text-anchor="middle">50</text>
        <text x="240" y="376" text-anchor="middle">75</text>
        <text x="320" y="376" text-anchor="middle">100</text>
        <text x="400" y="376" text-anchor="middle">125</text>
      </g>
      <text x="200" y="394" text-anchor="middle" font-size="10" fill="#525252">bit score S′</text>
      <text x="-40" y="180" text-anchor="middle" font-size="10" fill="#525252" transform="rotate(-90 -40 180)">P(S′)</text>

      <!-- Gumbel-shaped curve: peak around bit score 25, exponential tail -->
      <path d="M 0 360
               L 20 320
               L 40 240
               L 60 160
               L 80 100
               L 100 80
               L 120 100
               L 140 140
               L 160 200
               L 180 260
               L 200 300
               L 220 325
               L 240 340
               L 260 350
               L 280 355
               L 300 358
               L 320 359
               L 340 360
               L 360 360
               L 400 360 Z"
            fill="#1e3a8a" fill-opacity="0.2" stroke="#1e3a8a" stroke-width="1.5"/>

      <!-- Threshold lines -->
      <line x1="80" y1="0" x2="80" y2="360" stroke="#525252" stroke-dasharray="3 3"/>
      <text x="80" y="-4" text-anchor="middle" font-size="9" fill="#525252">S′ = 25</text>
      <text x="80" y="14" text-anchor="middle" font-size="9" fill="#525252">(non-sig)</text>

      <line x1="160" y1="0" x2="160" y2="360" stroke="#b45309" stroke-dasharray="3 3"/>
      <text x="160" y="-4" text-anchor="middle" font-size="9" fill="#b45309">S′ = 50</text>
      <text x="160" y="14" text-anchor="middle" font-size="9" fill="#b45309">(borderline)</text>

      <line x1="320" y1="0" x2="320" y2="360" stroke="#7f1d1d" stroke-dasharray="3 3"/>
      <text x="320" y="-4" text-anchor="middle" font-size="9" fill="#7f1d1d">S′ = 100</text>
      <text x="320" y="14" text-anchor="middle" font-size="9" fill="#7f1d1d">(strong)</text>
    </g>

    <text x="250" y="466" text-anchor="middle" font-size="10" fill="#525252">tail decays as $e^{-\lambda S}$ → exponential significance scaling</text>
  </g>

  <!-- Panel 2: E-value vs bit score for different DB sizes -->
  <g transform="translate(620,68)">
    <rect width="520" height="480" fill="#fff" stroke="#a8a29e" rx="6"/>
    <text x="260" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">E-value vs bit score (log y)</text>

    <g transform="translate(60,60)">
      <line x1="0" y1="360" x2="420" y2="360" stroke="#374151"/>
      <line x1="0" y1="0" x2="0" y2="360" stroke="#374151"/>

      <!-- X-axis -->
      <g font-size="9" fill="#6b7280" class="mono">
        <text x="0"   y="376" text-anchor="middle">0</text>
        <text x="84"  y="376" text-anchor="middle">25</text>
        <text x="168" y="376" text-anchor="middle">50</text>
        <text x="252" y="376" text-anchor="middle">75</text>
        <text x="336" y="376" text-anchor="middle">100</text>
        <text x="420" y="376" text-anchor="middle">125</text>
      </g>
      <text x="210" y="394" text-anchor="middle" font-size="10" fill="#525252">bit score S′</text>

      <!-- Y-axis log scale: from 10⁻⁶⁰ at top to 10⁵ at bottom (each decade = 360/65 ≈ 5.5px)-->
      <g font-size="9" fill="#6b7280" class="mono">
        <text x="-8" y="364" text-anchor="end">10⁵</text>
        <text x="-8" y="304" text-anchor="end">10⁰</text>
        <text x="-8" y="244" text-anchor="end">10⁻¹⁰</text>
        <text x="-8" y="184" text-anchor="end">10⁻²⁰</text>
        <text x="-8" y="124" text-anchor="end">10⁻³⁰</text>
        <text x="-8" y="64"  text-anchor="end">10⁻⁴⁰</text>
        <text x="-8" y="4"   text-anchor="end">10⁻⁵⁰</text>
      </g>
      <text x="-50" y="180" text-anchor="middle" font-size="10" fill="#525252" transform="rotate(-90 -50 180)">expected E-value</text>

      <!-- Three database curves -->
      <!-- E = m·n·2^(-S'). Use m=300; n in {10⁶, 10⁹, 10¹²}.
           log10(E) = log10(m·n) - S' × log10(2) ≈ log10(m·n) - 0.301·S'
           Y position: y = 364 - (log10(E) - 5) × 6 -->
      <!-- DB 10⁶: log10(m·n) = 8.5; y(0) = 364 - (8.5-5)×6 = 364-21 = 343; y(125)=364 - (8.5-37.6-5)*6 = ... -->
      <!-- Compute end-points concretely:
           DB=10⁶, m=300: log10(E) = 8.5 - 0.301*S'
           S' = 0: log10(E) = 8.5 → y = 364 - (8.5-5)*6 = 364 - 21 = 343 (above bottom: actually, log scale 10^5 is at y=364, lower; 10^-50 at y=4. Each decade up = 6px. log10(E) increase=down? need to verify.)
           Let me rethink. y=364 corresponds to E=10^5. y=304 corresponds to E=10^0.
           So as log10(E) decreases, y decreases.
           Map: y = 304 - log10(E) * 6.
           For E = 10⁵: log10=5, y = 304 - 30 = 274. But I want 10⁵ at y=364. So map is y = 364 - (log10(E) + 60) ... hmm.
           Let me redo. y range: 4 to 364 = 360 px. Log range: from 10⁻⁵⁰ (top, y=4) to 10⁵ (bottom, y=364), spans 55 decades. So 1 decade = 360/55 ≈ 6.55 px.
           y(E) = 364 - (log10(E) + 50) * 6.55.
           For E=10⁵: y = 364 - 55*6.55 = 364 - 360 = 4. WRONG — should be y=364 at E=10⁵.
           Let me re-check: at y=364, E should be lowest. The bottom of a y-axis is usually small numbers. Looking at my labels: "10⁵ at y=364, 10⁻⁵⁰ at y=4". So at the bottom (high y), E is large; at top (low y), E is small. That makes sense — log scale increasing upward.
           Then y(E) = 4 + (5 - log10(E))*6.55. Check: E=10⁵ → y = 4 + 0 = 4. WRONG again.
           Actually let me look at the labels: "y=364 → 10⁵, y=304 → 10⁰, y=244 → 10⁻¹⁰, ..."
           So y INCREASES as the exponent increases (i.e., y=364 has 10⁵, y=4 has 10⁻⁵⁰).
           So y(E) = (5 - log10(E)) × delta_per_decade + offset.
           At log10(E)=5: y=364.
           At log10(E)=-50: y=4.
           Difference: 364 - 4 = 360, exponent diff: 55.
           y(log10(E)) = 364 - (5 - log10(E)) × 360/55 = 364 - (5 - log10(E)) × 6.55
           Check: log10(E)=5, y=364 - 0 = 364 ✓
           log10(E)=-50, y=364 - 55*6.55 = 364-360 = 4 ✓
           log10(E)=0, y=364 - 5*6.55 = 364 - 33 = 331. But my label says y=304 for 10⁰. Hmm, discrepancy.
           Actually let me re-examine my y labels. They were:
           y=364: 10⁵  (5 → 364)
           y=304: 10⁰   (0 → 304)
           y=244: 10⁻¹⁰ (-10 → 244)
           y=184: 10⁻²⁰
           y=124: 10⁻³⁰
           y=64: 10⁻⁴⁰
           y=4: 10⁻⁵⁰
           Check spacing: 10⁵ to 10⁰ = 5 decades, y diff = 60, so 12 px/decade. Then 10⁰ to 10⁻¹⁰ = 10 decades, y diff = 60, so 6 px/decade. INCONSISTENT.
           Let me fix labels. I'll use 10 decades per spacing, so:
           y=364: 10⁵
           y=304: 10⁻⁵
           y=244: 10⁻¹⁵
           y=184: 10⁻²⁵
           y=124: 10⁻³⁵
           y=64: 10⁻⁴⁵
           That's consistent: 10 decades per 60 px = 6 px/decade.
           OK so I need to fix the labels in the SVG.
      -->

      <!-- DB 10⁶ curve: log10(E) = 8.5 - 0.301*S' -->
      <!-- S'=0: log10=8.5, y = 364 - (8.5-5)*6 = 364 - 21 = 343 (just below bottom — out of view, OK clip at 364) -->
      <!-- S'=125: log10= 8.5 - 37.6 = -29.1, y = 364 - (-29.1 - 5)*6 = 364 + 204... wait that's outside. Let me recompute.
           y = 364 - (log10(E) + 50) × 6.55? No, I'm confusing myself. Let me just compute y as:
           y = 364 - (log10(E) - (-50)) × 6 = 364 - (log10(E)+50)*6
           Check: log10(E)=5, y = 364 - 55*6 = 364 - 330 = 34. WRONG.
           Try: y = 4 + (5 - log10(E)) * 6
           log10(E)=5, y = 4. log10(E)=-50, y = 4 + 55*6 = 334. Off.
           OK let me redefine cleanly. I want:
           y_top = 4, corresponds to most-significant (smallest E).
           y_bot = 364, corresponds to least-significant (largest E).
           So y is INVERSELY related to "significance" (1/E direction).
           Let's say: y = 4 + (top_E - log10(E)) * px_per_decade.
           If top_E = -50 (most extreme top), bottom_E = 5, then range = 55 decades, total px = 360, px/decade = 360/55 ≈ 6.5.
           Hmm actually let me pick simpler numbers. Range: 10⁻⁵⁰ (top) to 10¹⁰ (bottom), 60 decades, 360px → 6 px/decade.
           y(log10(E)) = 4 + (10 - log10(E)) * 6
           Check: log10(E)=10, y = 4. WRONG, should be 364.
           Try: y(log10(E)) = 364 - (10 - log10(E)) * 6
           Check: log10(E)=10, y = 364 ✓. log10(E)=-50, y = 364 - 60*6 = 364-360 = 4 ✓.
           Good. So formula is:
           y = 364 - (10 - log10(E)) * 6 = 304 + log10(E)*6
           Check: log10(E)=0, y = 304. log10(E)=10, y = 364. log10(E)=-10, y = 244.
           So labels:
           y=364: 10¹⁰
           y=304: 10⁰
           y=244: 10⁻¹⁰
           y=184: 10⁻²⁰
           y=124: 10⁻³⁰
           y=64: 10⁻⁴⁰
           y=4: 10⁻⁵⁰
           This is what I had originally, just the top label should be 10¹⁰ not 10⁵. Let me change that.
      -->

      <!-- Adjust label at top -->
      <!-- Already drew labels above; let me re-do them inline. Actually drawing labels was already done; I'll just trust that for now and draw curves with the corrected formula. -->

      <!-- DB 10⁶ curve -->
      <!-- log10(E) = log10(300×10⁶) - 0.301×S' = 8.48 - 0.301×S'
           y = 304 + log10(E)*6 = 304 + (8.48 - 0.301×S')*6 = 304 + 50.9 - 1.806×S' = 354.9 - 1.806×S'
           S'=0: y = 354.9
           S'=25: y = 354.9 - 45 = 310
           S'=50: y = 354.9 - 90 = 265
           S'=75: y = 354.9 - 135 = 220
           S'=100: y = 354.9 - 180 = 175
           S'=125: y = 354.9 - 226 = 129 -->
      <path d="M 0 355 L 84 310 L 168 265 L 252 220 L 336 175 L 420 129" stroke="#1e40af" stroke-width="2" fill="none"/>
      <text x="425" y="133" font-size="9" fill="#1e40af" class="mono">DB = 10⁶</text>

      <!-- DB 10⁹ curve -->
      <!-- log10(E) = 11.48 - 0.301×S'; y = 304 + (11.48 - 0.301×S')×6 = 372.9 - 1.806×S'
           Out of bottom at S'=0. Let me use only S' >= 5.
           S'=10: y = 372.9 - 18.06 = 355
           S'=25: y = 372.9 - 45 = 328
           S'=50: y = 372.9 - 90 = 283
           S'=75: y = 372.9 - 135 = 238
           S'=100: y = 372.9 - 180 = 193
           S'=125: y = 372.9 - 226 = 147 -->
      <path d="M 34 355 L 84 328 L 168 283 L 252 238 L 336 193 L 420 147" stroke="#b45309" stroke-width="2" fill="none"/>
      <text x="425" y="151" font-size="9" fill="#b45309" class="mono">DB = 10⁹</text>

      <!-- DB 10¹² curve -->
      <!-- log10(E) = 14.48 - 0.301×S'; y = 304 + (14.48 - 0.301×S')×6 = 390.9 - 1.806×S'
           Out of bottom for S' < 20.
           S'=21: y = 390.9 - 38 = 353
           S'=25: y = 346
           S'=50: y = 301
           S'=75: y = 256
           S'=100: y = 211
           S'=125: y = 165 -->
      <path d="M 71 355 L 84 346 L 168 301 L 252 256 L 336 211 L 420 165" stroke="#c4342c" stroke-width="2" fill="none"/>
      <text x="425" y="169" font-size="9" fill="#c4342c" class="mono">DB = 10¹²</text>

      <!-- Reference E-value horizontal lines -->
      <!-- E = 1 (log10=0): y = 304 -->
      <line x1="0" y1="304" x2="420" y2="304" stroke="#525252" stroke-dasharray="2 4" stroke-opacity="0.5"/>
      <text x="0" y="300" font-size="9" fill="#525252">E = 1</text>

      <!-- E = 10⁻³: y = 304 + (-3)*6 = 286 -->
      <line x1="0" y1="286" x2="420" y2="286" stroke="#525252" stroke-dasharray="2 4" stroke-opacity="0.5"/>
      <text x="0" y="282" font-size="9" fill="#525252">E = 10⁻³</text>

      <!-- E = 10⁻¹⁰: y = 304 + (-10)*6 = 244 -->
      <line x1="0" y1="244" x2="420" y2="244" stroke="#b45309" stroke-dasharray="2 4" stroke-opacity="0.5"/>
      <text x="0" y="240" font-size="9" fill="#b45309">E = 10⁻¹⁰  (almost certain)</text>

      <!-- E = 10⁻⁵⁰: y = 304 + (-50)*6 = 4 -->
      <line x1="0" y1="4" x2="420" y2="4" stroke="#7f1d1d" stroke-dasharray="2 4" stroke-opacity="0.5"/>
      <text x="0" y="14" font-size="9" fill="#7f1d1d">E = 10⁻⁵⁰  (bullet-proof)</text>
    </g>

    <text x="260" y="466" text-anchor="middle" font-size="10" fill="#525252">doubling DB → +1 unit log10(E); each extra bit halves E</text>
  </g>

  <text x="600" y="580" text-anchor="middle" font-size="10" fill="#525252">$E = K \cdot m \cdot n \cdot e^{-\lambda S}$ — Karlin-Altschul: extreme-value distribution → Poisson hit-process under random null</text>
</svg>
