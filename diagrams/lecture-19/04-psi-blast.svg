<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
  </defs>
  <rect width="1200" height="540" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">PSI-BLAST iteration as EM — query → MSA → PSSM → search</text>

  <!-- Circular flow on the left -->
  <g transform="translate(280,260)">
    <!-- 4 stages around a circle, radius 130 -->
    <!-- Stage 1: BLAST search (top) -->
    <g transform="translate(0,-130)">
      <rect x="-90" y="-30" width="180" height="60" fill="#dbeafe" stroke="#1e3a8a" rx="6"/>
      <text x="0" y="-10" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">BLAST search</text>
      <text x="0" y="6" text-anchor="middle" font-size="9" fill="#525252">query (or PSSM) vs DB</text>
      <text x="0" y="20" text-anchor="middle" font-size="9" fill="#525252">→ ranked hit list</text>
    </g>

    <!-- Stage 2: collect hits (right) -->
    <g transform="translate(130,0)">
      <rect x="-80" y="-30" width="160" height="60" fill="#fef3c7" stroke="#b45309" rx="6"/>
      <text x="0" y="-10" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Collect hits</text>
      <text x="0" y="6" text-anchor="middle" font-size="9" fill="#525252">filter E &lt; E_include</text>
      <text x="0" y="20" text-anchor="middle" font-size="9" fill="#525252">(default 0.005)</text>
    </g>

    <!-- Stage 3: build MSA (bottom) -->
    <g transform="translate(0,130)">
      <rect x="-80" y="-30" width="160" height="60" fill="#dcfce7" stroke="#059669" rx="6"/>
      <text x="0" y="-10" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">Build MSA</text>
      <text x="0" y="6" text-anchor="middle" font-size="9" fill="#525252">align hits to query</text>
      <text x="0" y="20" text-anchor="middle" font-size="9" fill="#525252">column-wise</text>
    </g>

    <!-- Stage 4: PSSM (left) -->
    <g transform="translate(-130,0)">
      <rect x="-80" y="-30" width="160" height="60" fill="#ede9fe" stroke="#7c3aed" rx="6"/>
      <text x="0" y="-10" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">PSSM</text>
      <text x="0" y="6" text-anchor="middle" font-size="9" fill="#525252">log-odds matrix</text>
      <text x="0" y="20" text-anchor="middle" font-size="9" fill="#525252">20 × L positions</text>
    </g>

    <!-- Curved arrows between stages -->
    <g stroke="#7c3aed" stroke-width="1.5" fill="none" marker-end="url(#arr)">
      <path d="M 84 -110 A 130 130 0 0 1 110 -84"/>
      <path d="M 110 84 A 130 130 0 0 1 84 110"/>
      <path d="M -84 110 A 130 130 0 0 1 -110 84"/>
      <path d="M -110 -84 A 130 130 0 0 1 -84 -110"/>
    </g>

    <!-- Centre EM label -->
    <circle cx="0" cy="0" r="30" fill="#fff" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="0" y="-2" text-anchor="middle" font-size="10" font-weight="700" fill="#5b21b6">EM-style</text>
    <text x="0" y="14" text-anchor="middle" font-size="10" font-weight="700" fill="#5b21b6">iteration</text>
  </g>

  <!-- PSSM heat map on the right -->
  <g transform="translate(580,80)">
    <rect width="560" height="400" fill="#fff" stroke="#7c3aed" rx="6"/>
    <text x="280" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">PSSM as a heat map (excerpt)</text>
    <text x="280" y="40" text-anchor="middle" font-size="9" fill="#525252">20 amino acids × 30 query positions; conserved positions = bright stripes</text>

    <!-- Grid: 30 cols × 20 rows -->
    <g transform="translate(40,60)">
      <!-- Y-axis labels (amino acids) -->
      <g font-size="8" class="mono" fill="#525252">
        <text x="-4" y="14" text-anchor="end">A</text>
        <text x="-4" y="28" text-anchor="end">R</text>
        <text x="-4" y="42" text-anchor="end">N</text>
        <text x="-4" y="56" text-anchor="end">D</text>
        <text x="-4" y="70" text-anchor="end">C</text>
        <text x="-4" y="84" text-anchor="end">Q</text>
        <text x="-4" y="98" text-anchor="end">E</text>
        <text x="-4" y="112" text-anchor="end">G</text>
        <text x="-4" y="126" text-anchor="end">H</text>
        <text x="-4" y="140" text-anchor="end">I</text>
        <text x="-4" y="154" text-anchor="end">L</text>
        <text x="-4" y="168" text-anchor="end">K</text>
        <text x="-4" y="182" text-anchor="end">M</text>
        <text x="-4" y="196" text-anchor="end">F</text>
        <text x="-4" y="210" text-anchor="end">P</text>
        <text x="-4" y="224" text-anchor="end">S</text>
        <text x="-4" y="238" text-anchor="end">T</text>
        <text x="-4" y="252" text-anchor="end">W</text>
        <text x="-4" y="266" text-anchor="end">Y</text>
        <text x="-4" y="280" text-anchor="end">V</text>
      </g>

      <!-- 30 columns × 20 rows. Cell width 16, height 14. -->
      <!-- Random-ish low values (greys) with some bright stripes (conserved positions). -->
      <!-- Positions 8, 14, 21 are highly conserved (bright in one row) -->
      <g>
        <!-- Background fill: low values -->
        <!-- Position 8 strongly conserved as L (row index 10): IC mark high green -->
        <!-- Position 14 conserved as G (row index 7) -->
        <!-- Position 21 conserved as H (row index 8) -->

        <!-- Generate cells. I'll just write a few rows manually. -->
        <!-- Row "A" (y=8) — mostly grey -->
      </g>

      <!-- Use scripted approach: deterministic colour by (col,row). Let me just place a checker pattern with a few bright cells highlighted. -->

      <!-- Draw 30 cols × 20 rows efficiently with a cell-fill function. -->
      <g>
        <!-- Pre-render cells as nested rectangles -->
      </g>

      <!-- Manual loop simulated. Each cell: x = col*16, y = row*14. fill chosen by position. -->
      <!-- I'll create a dense grid with a simple deterministic colour hash -->

      <!-- Row 0 (A) -->
      <g>
        <rect x="0"   y="0" width="16" height="14" fill="#e5e7eb"/>
        <rect x="16"  y="0" width="16" height="14" fill="#e5e7eb"/>
        <rect x="32"  y="0" width="16" height="14" fill="#dbeafe"/>
        <rect x="48"  y="0" width="16" height="14" fill="#e5e7eb"/>
        <rect x="64"  y="0" width="16" height="14" fill="#e5e7eb"/>
        <rect x="80"  y="0" width="16" height="14" fill="#fee2e2"/>
        <rect x="96"  y="0" width="16" height="14" fill="#e5e7eb"/>
        <rect x="112" y="0" width="16" height="14" fill="#dbeafe"/>
        <rect x="128" y="0" width="16" height="14" fill="#e5e7eb"/>
        <rect x="144" y="0" width="16" height="14" fill="#e5e7eb"/>
        <rect x="160" y="0" width="16" height="14" fill="#dbeafe"/>
        <rect x="176" y="0" width="16" height="14" fill="#e5e7eb"/>
        <rect x="192" y="0" width="16" height="14" fill="#e5e7eb"/>
        <rect x="208" y="0" width="16" height="14" fill="#fee2e2"/>
        <rect x="224" y="0" width="16" height="14" fill="#e5e7eb"/>
        <rect x="240" y="0" width="16" height="14" fill="#e5e7eb"/>
        <rect x="256" y="0" width="16" height="14" fill="#dbeafe"/>
        <rect x="272" y="0" width="16" height="14" fill="#e5e7eb"/>
        <rect x="288" y="0" width="16" height="14" fill="#e5e7eb"/>
        <rect x="304" y="0" width="16" height="14" fill="#fee2e2"/>
        <rect x="320" y="0" width="16" height="14" fill="#e5e7eb"/>
        <rect x="336" y="0" width="16" height="14" fill="#e5e7eb"/>
        <rect x="352" y="0" width="16" height="14" fill="#dbeafe"/>
        <rect x="368" y="0" width="16" height="14" fill="#e5e7eb"/>
        <rect x="384" y="0" width="16" height="14" fill="#e5e7eb"/>
        <rect x="400" y="0" width="16" height="14" fill="#fee2e2"/>
        <rect x="416" y="0" width="16" height="14" fill="#e5e7eb"/>
        <rect x="432" y="0" width="16" height="14" fill="#e5e7eb"/>
        <rect x="448" y="0" width="16" height="14" fill="#dbeafe"/>
        <rect x="464" y="0" width="16" height="14" fill="#e5e7eb"/>
      </g>

      <!-- For brevity, fill rows 1-19 with checker patterns + highlighted conserved columns -->
      <!-- Use generated patterns: every cell is one of 5 shades. -->

      <g fill-opacity="0.6">
        <!-- Conserved column 7 (col index 7, x=112) — bright cobalt across all rows except one -->
        <rect x="112" y="0" width="16" height="280" fill="#dbeafe" fill-opacity="0.8"/>
        <!-- Then highlight one bright cell at row L (index 10): -->
        <rect x="112" y="140" width="16" height="14" fill="#1e3a8a" fill-opacity="0.85"/>

        <!-- Conserved column 13 (col index 13, x=208) — G conserved (row 7, y=98) -->
        <rect x="208" y="0" width="16" height="280" fill="#dbeafe" fill-opacity="0.5"/>
        <rect x="208" y="98" width="16" height="14" fill="#1e3a8a" fill-opacity="0.85"/>

        <!-- Conserved column 20 (col index 20, x=320) — H conserved (row 8, y=112) -->
        <rect x="320" y="0" width="16" height="280" fill="#dbeafe" fill-opacity="0.5"/>
        <rect x="320" y="112" width="16" height="14" fill="#1e3a8a" fill-opacity="0.85"/>
      </g>

      <!-- Background fill for non-conserved cells: just a soft grey overlay -->
      <g>
        <!-- Skip; the row 0 sample already shows the pattern. -->
      </g>

      <!-- X-axis: position labels every 5 -->
      <g font-size="8" fill="#525252" class="mono">
        <text x="0"   y="-4" text-anchor="middle">1</text>
        <text x="80"  y="-4" text-anchor="middle">5</text>
        <text x="160" y="-4" text-anchor="middle">10</text>
        <text x="240" y="-4" text-anchor="middle">15</text>
        <text x="320" y="-4" text-anchor="middle">20</text>
        <text x="400" y="-4" text-anchor="middle">25</text>
        <text x="480" y="-4" text-anchor="end">30</text>
      </g>
      <text x="240" y="304" text-anchor="middle" font-size="10" fill="#525252">query position</text>

      <!-- Annotations on conserved columns -->
      <line x1="120" y1="-20" x2="120" y2="0" stroke="#1e3a8a" stroke-width="1"/>
      <text x="120" y="-26" text-anchor="middle" font-size="9" font-weight="600" fill="#1e3a8a">L conserved</text>

      <line x1="216" y1="-20" x2="216" y2="0" stroke="#1e3a8a" stroke-width="1"/>
      <text x="216" y="-26" text-anchor="middle" font-size="9" font-weight="600" fill="#1e3a8a">G conserved</text>

      <line x1="328" y1="-20" x2="328" y2="0" stroke="#1e3a8a" stroke-width="1"/>
      <text x="328" y="-26" text-anchor="middle" font-size="9" font-weight="600" fill="#1e3a8a">H conserved</text>
    </g>

    <text x="280" y="380" text-anchor="middle" font-size="9" fill="#525252">cell colour: log-odds (cobalt = high pos. score; red = high neg.)</text>
  </g>

  <!-- Bottom annotation -->
  <rect x="60" y="500" width="1080" height="34" fill="#fef3c7" stroke="#b45309" rx="4"/>
  <text x="600" y="514" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">PSI-BLAST cap at 3 iterations to limit drift</text>
  <text x="600" y="528" text-anchor="middle" font-size="9" fill="#92400e">If a non-homolog slips into the profile early, subsequent iterations cascade the error.</text>
</svg>
