<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="480" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">X-drop extension — three trajectories under varying signal strength</text>

  <!-- Plot area -->
  <g transform="translate(80,80)">
    <line x1="0" y1="320" x2="1040" y2="320" stroke="#374151"/>
    <line x1="0" y1="0" x2="0" y2="320" stroke="#374151"/>

    <!-- Centre line at x=520 (seed) -->
    <line x1="520" y1="0" x2="520" y2="320" stroke="#a8a29e" stroke-dasharray="3 3"/>
    <text x="520" y="-4" text-anchor="middle" font-size="10" font-weight="600" fill="#525252">seed</text>

    <!-- X-axis: position from -50 to +50 -->
    <g font-size="9" fill="#6b7280" class="mono">
      <text x="0"    y="336" text-anchor="middle">−50</text>
      <text x="260"  y="336" text-anchor="middle">−25</text>
      <text x="520"  y="336" text-anchor="middle">0</text>
      <text x="780"  y="336" text-anchor="middle">+25</text>
      <text x="1040" y="336" text-anchor="middle">+50</text>
    </g>
    <text x="520" y="354" text-anchor="middle" font-size="11" fill="#525252">offset from seed</text>

    <!-- Y-axis: cumulative score 0-100 -->
    <g font-size="9" fill="#6b7280" class="mono">
      <text x="-8" y="324" text-anchor="end">0</text>
      <text x="-8" y="240" text-anchor="end">25</text>
      <text x="-8" y="160" text-anchor="end">50</text>
      <text x="-8" y="80"  text-anchor="end">75</text>
      <text x="-8" y="0"   text-anchor="end">100</text>
    </g>
    <text x="-50" y="160" text-anchor="middle" font-size="10" fill="#525252" transform="rotate(-90 -50 160)">cumulative score</text>

    <!-- Trajectory 1: True homology (score climbs to ~90) -->
    <path d="M 0 320
             L 100 280
             L 200 220
             L 300 160
             L 400 100
             L 460 70
             L 520 60
             L 580 70
             L 660 110
             L 760 170
             L 860 230
             L 960 285
             L 1040 320"
          stroke="#059669" stroke-width="2.5" fill="none"/>
    <text x="520" y="50" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">true homology · X never triggered</text>

    <!-- Trajectory 2: mid-strength (peaks at ~60, X-drop triggers) -->
    <path d="M 240 320
             L 280 280
             L 320 240
             L 360 200
             L 400 170
             L 440 150
             L 480 140
             L 520 138
             L 560 142
             L 600 155
             L 640 175
             L 680 200
             L 720 240"
          stroke="#b45309" stroke-width="2.5" fill="none"/>
    <text x="520" y="120" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">mid-strength · X-drop stops at offset +25</text>

    <!-- X-drop reference for trajectory 2 (peak at y=138, X=22, threshold y=160): show threshold dashed -->
    <line x1="240" y1="160" x2="800" y2="160" stroke="#b45309" stroke-width="1" stroke-dasharray="2 3" stroke-opacity="0.5"/>
    <text x="800" y="156" text-anchor="end" font-size="9" fill="#92400e">peak − X = 38</text>
    <!-- Boundary markers -->
    <line x1="240" y1="0" x2="240" y2="320" stroke="#b45309" stroke-dasharray="2 3" stroke-opacity="0.5"/>
    <line x1="760" y1="0" x2="760" y2="320" stroke="#b45309" stroke-dasharray="2 3" stroke-opacity="0.5"/>

    <!-- Trajectory 3: noise (wobbles around 30) -->
    <path d="M 480 320
             L 500 290
             L 520 285
             L 540 290
             L 560 270
             L 580 280
             L 600 290
             L 620 305
             L 640 320"
          stroke="#c4342c" stroke-width="2.5" fill="none"/>
    <text x="600" y="290" font-size="10" font-weight="700" fill="#7f1d1d">noise · X triggers immediately</text>
  </g>

  <!-- Bottom annotation -->
  <g transform="translate(80,420)">
    <rect width="1040" height="50" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="520" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">X-drop = matched-filter "leave the peak" rule</text>
    <text x="520" y="38" text-anchor="middle" font-size="10" fill="#374151">Stop extension when running score drops X below current peak. Default X = 22 for BLASTP gapped extension.</text>
  </g>
</svg>
