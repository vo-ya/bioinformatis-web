<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#525252"/>
    </marker>
  </defs>
  <rect width="1200" height="480" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Reciprocal best hits (RBH) for ortholog identification</text>

  <!-- Two species columns -->
  <g transform="translate(80,80)">
    <text x="100" y="0" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Species 1</text>
    <text x="100" y="14" text-anchor="middle" font-size="9" fill="#525252">e.g., human</text>

    <!-- Genes -->
    <g transform="translate(40,30)">
      <rect x="0" y="0" width="120" height="30" fill="#dbeafe" stroke="#1e3a8a" rx="4"/>
      <text x="60" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a" class="mono">gene A</text>

      <rect x="0" y="40" width="120" height="30" fill="#fff" stroke="#1e3a8a" rx="4"/>
      <text x="60" y="60" text-anchor="middle" font-size="11" fill="#525252" class="mono">gene C</text>

      <rect x="0" y="80" width="120" height="30" fill="#fff" stroke="#1e3a8a" rx="4"/>
      <text x="60" y="100" text-anchor="middle" font-size="11" fill="#525252" class="mono">gene D</text>

      <rect x="0" y="120" width="120" height="30" fill="#fff" stroke="#1e3a8a" rx="4"/>
      <text x="60" y="140" text-anchor="middle" font-size="11" fill="#525252" class="mono">gene E</text>
    </g>
  </g>

  <g transform="translate(800,80)">
    <text x="100" y="0" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">Species 2</text>
    <text x="100" y="14" text-anchor="middle" font-size="9" fill="#525252">e.g., mouse</text>

    <!-- Genes -->
    <g transform="translate(40,30)">
      <rect x="0" y="0" width="120" height="30" fill="#ede9fe" stroke="#7c3aed" rx="4"/>
      <text x="60" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6" class="mono">gene B</text>

      <rect x="0" y="40" width="120" height="30" fill="#fff" stroke="#7c3aed" rx="4"/>
      <text x="60" y="60" text-anchor="middle" font-size="11" fill="#525252" class="mono">gene X</text>

      <rect x="0" y="80" width="120" height="30" fill="#fff" stroke="#7c3aed" rx="4"/>
      <text x="60" y="100" text-anchor="middle" font-size="11" fill="#525252" class="mono">gene Y</text>

      <rect x="0" y="120" width="120" height="30" fill="#fff" stroke="#7c3aed" rx="4"/>
      <text x="60" y="140" text-anchor="middle" font-size="11" fill="#525252" class="mono">gene Z</text>
    </g>
  </g>

  <!-- Forward arrow A → B -->
  <g stroke="#059669" stroke-width="2" fill="none" marker-end="url(#arr)">
    <path d="M 240 125 Q 530 90 838 125"/>
  </g>
  <text x="540" y="80" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">Forward BLAST: A → best hit B (E = 10⁻⁵²)</text>

  <!-- Reverse arrow B → A -->
  <g stroke="#059669" stroke-width="2" fill="none" marker-end="url(#arr)">
    <path d="M 838 145 Q 530 200 240 145"/>
  </g>
  <text x="540" y="216" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">Reverse BLAST: B → best hit A (E = 10⁻⁴⁹)</text>

  <!-- RBH callout -->
  <g transform="translate(380,260)">
    <rect width="440" height="60" fill="#dcfce7" stroke="#059669" stroke-width="1.5" rx="6"/>
    <text x="220" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">A ↔ B are reciprocal best hits</text>
    <text x="220" y="42" text-anchor="middle" font-size="10" fill="#525252">→ predicted orthologs (with caveats around recent paralogs)</text>
  </g>

  <!-- Counter-example -->
  <g transform="translate(80,360)">
    <rect width="1040" height="80" fill="#fee2e2" stroke="#c4342c" rx="6"/>
    <text x="20" y="22" font-size="11" font-weight="700" fill="#7f1d1d">Counter-example — when RBH fails</text>
    <text x="20" y="42" font-size="10" fill="#374151">Suppose gene A's best hit in species 2 is X (not B); reverse BLAST: X's best hit in species 1 is C, not A.</text>
    <text x="20" y="58" font-size="10" fill="#374151">→ A and X are <strong>not</strong> reciprocal best hits. They might still be related, but RBH provides no evidence.</text>
    <text x="20" y="74" font-size="10" font-style="italic" fill="#92400e">Recent paralogs (gene duplications) trip RBH frequently. OrthoFinder / OrthoMCL handle these cases.</text>
  </g>
</svg>
