<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; }</style></defs>
  <rect width="1200" height="720" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Anatomy of a BLAST hit — what each field means</text>

  <!-- Output text block -->
  <g transform="translate(60,80)">
    <rect width="700" height="380" fill="#fafaf9" stroke="#374151" rx="6"/>

    <g transform="translate(20,30)" font-size="13" class="mono" fill="#374151">
      <text x="0" y="0">&gt; tr|A0A024R7T9|A0A024R7T9_HUMAN  Putative kinase</text>
      <text x="0" y="22">Length=247</text>

      <!-- Method line moved to its own row at y=80 — at the previous
           position (x=510, y=58) the 32-char string at fs 13 mono
           extended to x≈780, well past the rect right edge at x=700.
           Subsequent rows shifted +20 to make space. -->
      <text x="0" y="58" font-weight="700" fill="#1e3a8a">Score = 187 bits (475)</text>
      <text x="290" y="58" font-weight="700" fill="#7f1d1d">Expect = 4e-49</text>
      <text x="0" y="80" fill="#374151">Method: Composition-based stats.</text>

      <text x="0" y="104" font-weight="700" fill="#065f46">Identities = 95/120 (79%)</text>
      <text x="290" y="104" font-weight="700" fill="#92400e">Positives = 102/120 (85%)</text>
      <text x="540" y="104" font-weight="700" fill="#525252">Gaps = 0/120 (0%)</text>

      <text x="0" y="150" font-weight="600" fill="#525252">Query  10   MKVLWAGCEKLPNQGHRSDFTYV...   69</text>
      <text x="0" y="168" fill="#374151">            MKV+WAGCE+LPNQ HRSDFTYV...</text>
      <text x="0" y="186" font-weight="600" fill="#525252">Sbjct  47   MKVMWAGCERLPNQAHRSDFTYV...  106</text>

      <text x="0" y="226" font-weight="600" fill="#525252">Query  70   AGRDLEHTSPNILVKQAFRSEDC...  129</text>
      <text x="0" y="244" fill="#374151">            AG+DLEHT PNI+VKQAFRS+DC</text>
      <text x="0" y="262" font-weight="600" fill="#525252">Sbjct  107  AGKDLEHTAPNIIVKQAFRSDDC...  166</text>
    </g>

    <text x="350" y="368" text-anchor="middle" font-size="10" fill="#a8a29e" font-style="italic">(typical NCBI BLAST output line excerpt)</text>
  </g>

  <!-- Annotations on the right, with labelled arrows -->
  <g transform="translate(820,100)" font-size="11">
    <text x="0" y="0" font-size="12" font-weight="700" fill="#374151">Field meanings</text>

    <g transform="translate(0,30)">
      <rect width="320" height="40" fill="#dbeafe" stroke="#1e3a8a" rx="3"/>
      <text x="14" y="16" font-weight="600" fill="#1e3a8a">Score = 187 bits (475)</text>
      <text x="14" y="32" font-size="10" fill="#525252">bit score (matrix-independent) | raw (matrix-dep.)</text>
    </g>

    <g transform="translate(0,80)">
      <rect width="320" height="40" fill="#fee2e2" stroke="#7f1d1d" rx="3"/>
      <text x="14" y="16" font-weight="600" fill="#7f1d1d">Expect = 4e-49</text>
      <text x="14" y="32" font-size="10" fill="#525252">E-value: 4×10⁻⁴⁹ chance hits expected</text>
    </g>

    <g transform="translate(0,130)">
      <rect width="320" height="40" fill="#fef3c7" stroke="#b45309" rx="3"/>
      <text x="14" y="16" font-weight="600" fill="#92400e">Composition-based stats</text>
      <text x="14" y="32" font-size="10" fill="#525252">local-composition correction in use</text>
    </g>

    <g transform="translate(0,180)">
      <rect width="320" height="40" fill="#dcfce7" stroke="#059669" rx="3"/>
      <text x="14" y="16" font-weight="600" fill="#065f46">Identities = 95/120 (79%)</text>
      <text x="14" y="32" font-size="10" fill="#525252">exact-match count and percentage</text>
    </g>

    <g transform="translate(0,230)">
      <rect width="320" height="40" fill="#fef3c7" stroke="#b45309" rx="3"/>
      <text x="14" y="16" font-weight="600" fill="#92400e">Positives = 102/120 (85%)</text>
      <text x="14" y="32" font-size="10" fill="#525252">positive-substitution count (D↔E counts)</text>
    </g>

    <g transform="translate(0,280)">
      <rect width="320" height="40" fill="#f5f5f4" stroke="#525252" rx="3"/>
      <text x="14" y="16" font-weight="600" fill="#374151">Query / Sbjct lines</text>
      <text x="14" y="32" font-size="10" fill="#525252">positions + alignment string (+ = positive sub)</text>
    </g>
  </g>

  <!-- "What to ignore" panel -->
  <g transform="translate(60,500)">
    <rect width="1080" height="180" fill="#fef3c7" stroke="#b45309" rx="6"/>
    <text x="20" y="28" font-size="12" font-weight="700" fill="#92400e">What to ignore — common pitfalls when reading BLAST output</text>

    <g transform="translate(20,52)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="600">High bit score, low identity:</text>
      <text x="0" y="18">often a low-complexity region (signal peptide, glycine-rich tract, polyglutamine) generating spurious score. Composition correction filters these but not perfectly.</text>

      <text x="0" y="50" font-weight="600">Very low E-value, very short alignment:</text>
      <text x="0" y="68">a 20-aa alignment with E = 10⁻¹⁰ may still be a domain-fragment match rather than full-protein homology. Always inspect alignment length.</text>

      <text x="0" y="100" font-weight="600">Identical hits with different E-values across runs:</text>
      <text x="0" y="118">database growth (NR doubles every ~3 years) shifts E-values for the same alignment. Bit scores are stable; E-values drift over time.</text>
    </g>
  </g>
</svg>
