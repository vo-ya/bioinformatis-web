<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; }</style></defs>
  <rect width="1200" height="700" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Progressive MSA on five globin sequences</text>
  <text x="600" y="48" text-anchor="middle" font-size="11" fill="#525252">Conserved heme-binding residues (His F8, His E7, Phe CD1) highlighted in colour at each step</text>

  <!-- Step 1 -->
  <g transform="translate(60,80)">
    <text x="0" y="0" font-size="12" font-weight="700" fill="#1e3a8a">Step 1 — pairwise: sea cucumber × lamprey</text>
    <g class="mono" font-size="11" transform="translate(0,16)">
      <text x="0" y="14" fill="#374151">cucumber  </text>
      <text x="92" y="14" fill="#374151">VLSADE---KAFITGLWNKVDEEVGDQAFGRLHGS</text>
      <text x="0" y="32" fill="#374151">lamprey   </text>
      <text x="92" y="32" fill="#374151">PIVDTGSVAPLSAAEKTKIRSAWAPVYSTYETSGV</text>
    </g>
    <!-- Highlight His positions -->
    <g fill="none" stroke="#b45309" stroke-width="1.5">
      <rect x="316" y="84" width="14" height="20" fill="#fef3c7" fill-opacity="0.4"/>
    </g>
  </g>

  <!-- Step 2 -->
  <g transform="translate(60,160)">
    <text x="0" y="0" font-size="12" font-weight="700" fill="#b45309">Step 2 — profile P₁ × chicken hemoglobin</text>
    <g class="mono" font-size="11" transform="translate(0,16)">
      <text x="0" y="14" fill="#374151">cucumber  </text><text x="92" y="14" fill="#374151">VLSADE---KAFITGLWNKVDEEVGDQAFGRLHGS</text>
      <text x="0" y="32" fill="#374151">lamprey   </text><text x="92" y="32" fill="#374151">PIVDTGSVAPLSAAEKTKIRSAWAPVYSTYETSGV</text>
      <text x="0" y="50" fill="#374151">chicken   </text><text x="92" y="50" fill="#374151">VLSAA-DKNNVKGIFTKIAGHAEEYGAETLERMFT</text>
    </g>
  </g>

  <!-- Step 3 -->
  <g transform="translate(60,260)">
    <text x="0" y="0" font-size="12" font-weight="700" fill="#0d7377">Step 3 — profile P₂ × mouse β-globin</text>
    <g class="mono" font-size="11" transform="translate(0,16)">
      <text x="0" y="14" fill="#374151">cucumber  </text><text x="92" y="14" fill="#374151">VLSADE---KAFITGLWNKVDEEVGDQAFGRLHGS</text>
      <text x="0" y="32" fill="#374151">lamprey   </text><text x="92" y="32" fill="#374151">PIVDTGSVAPLSAAEKTKIRSAWAPVYSTYETSGV</text>
      <text x="0" y="50" fill="#374151">chicken   </text><text x="92" y="50" fill="#374151">VLSAA-DKNNVKGIFTKIAGHAEEYGAETLERMFT</text>
      <text x="0" y="68" fill="#374151">mouse     </text><text x="92" y="68" fill="#374151">VHLTDAEKAAVSCLWGKVNPDEVGGEALGRLLVVY</text>
    </g>
  </g>

  <!-- Step 4: final -->
  <g transform="translate(60,380)">
    <text x="0" y="0" font-size="12" font-weight="700" fill="#7c3aed">Step 4 — profile P₃ × human β-globin (final 5-row alignment)</text>
    <g class="mono" font-size="11" transform="translate(0,16)">
      <text x="0" y="14" fill="#374151">cucumber  </text><text x="92" y="14" fill="#374151">VLSADE---KAFITGLWNKVDEEVGDQAFGRLHGS</text>
      <text x="0" y="32" fill="#374151">lamprey   </text><text x="92" y="32" fill="#374151">PIVDTGSVAPLSAAEKTKIRSAWAPVYSTYETSGV</text>
      <text x="0" y="50" fill="#374151">chicken   </text><text x="92" y="50" fill="#374151">VLSAA-DKNNVKGIFTKIAGHAEEYGAETLERMFT</text>
      <text x="0" y="68" fill="#374151">mouse     </text><text x="92" y="68" fill="#374151">VHLTDAEKAAVSCLWGKVNPDEVGGEALGRLLVVY</text>
      <text x="0" y="86" fill="#374151">human     </text><text x="92" y="86" fill="#374151">VHLTPEEKSAVTALWGKVNVDEVGGEALGRLLVVY</text>
    </g>
    <!-- Conservation block highlights -->
    <g fill="#fef3c7" fill-opacity="0.6" stroke="#b45309" stroke-width="0.8">
      <rect x="118" y="14" width="14" height="92"/>
      <rect x="244" y="14" width="14" height="92"/>
    </g>
    <text x="118" y="120" font-size="9" fill="#92400e" class="mono">conserved L</text>
    <text x="244" y="120" font-size="9" fill="#92400e" class="mono">conserved W</text>
  </g>

  <!-- Bottom banner -->
  <g transform="translate(60,560)">
    <rect width="1080" height="80" fill="#dcfce7" stroke="#065f46" rx="4"/>
    <text x="540" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">Progressive alignment: each step adds one sequence to the growing profile</text>
    <text x="540" y="44" text-anchor="middle" font-size="10" fill="#374151">Conserved positions emerge: critical residues (heme-binding His, the Trp at position 14) align across all five despite ~10⁹ years of divergence.</text>
    <text x="540" y="62" text-anchor="middle" font-size="10" fill="#374151" class="mono">Tools: ClustalW (1994) → Clustal Omega (2011) → MUSCLE / MAFFT (modern defaults).</text>
  </g>
</svg>
