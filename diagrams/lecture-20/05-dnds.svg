<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">dN/dS distributions under three selection regimes</text>

  <!-- Three panels -->
  <!-- Panel 1: Purifying -->
  <g transform="translate(60,80)">
    <text x="180" y="0" text-anchor="middle" font-size="12" font-weight="700" fill="#0d7377">Purifying selection (ω &lt; 1)</text>
    <text x="180" y="18" text-anchor="middle" font-size="10" fill="#525252">most genes — non-syn changes purged</text>
    <!-- Axes -->
    <g transform="translate(20,40)">
      <line x1="0" y1="240" x2="320" y2="240" stroke="#374151"/>
      <line x1="0" y1="0" x2="0" y2="240" stroke="#374151"/>
      <g font-size="10" class="mono" fill="#525252">
        <text x="0" y="258" text-anchor="middle">0</text>
        <text x="80" y="258" text-anchor="middle">0.5</text>
        <text x="160" y="258" text-anchor="middle">1.0</text>
        <text x="240" y="258" text-anchor="middle">1.5</text>
        <text x="320" y="258" text-anchor="middle">2.0</text>
      </g>
      <text x="160" y="280" text-anchor="middle" font-size="11" fill="#525252">ω = dN / dS</text>
      <!-- Density curve: sharp at 0.1, decays fast -->
      <path d="M 0 240 L 8 100 L 16 30 L 24 60 L 40 130 L 60 180 L 80 200 L 120 220 L 160 230 L 200 235 L 240 238 L 320 240"
            stroke="#0d7377" stroke-width="2.5" fill="#0d7377" fill-opacity="0.2"/>
      <!-- ω = 1 line -->
      <line x1="160" y1="0" x2="160" y2="240" stroke="#dc2626" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="164" y="14" font-size="9" fill="#7f1d1d" class="mono">ω = 1 (neutral)</text>
      <!-- mode marker -->
      <text x="20" y="20" font-size="10" fill="#0d7377" class="mono">mode at 0.1</text>
    </g>
  </g>

  <!-- Panel 2: Positive -->
  <g transform="translate(440,80)">
    <text x="180" y="0" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">Positive selection (some sites ω &gt; 1)</text>
    <text x="180" y="18" text-anchor="middle" font-size="10" fill="#525252">bimodal — mostly purifying, some sites adaptive</text>
    <g transform="translate(20,40)">
      <line x1="0" y1="240" x2="320" y2="240" stroke="#374151"/>
      <line x1="0" y1="0" x2="0" y2="240" stroke="#374151"/>
      <g font-size="10" class="mono" fill="#525252">
        <text x="0" y="258" text-anchor="middle">0</text>
        <text x="80" y="258" text-anchor="middle">0.5</text>
        <text x="160" y="258" text-anchor="middle">1.0</text>
        <text x="240" y="258" text-anchor="middle">1.5</text>
        <text x="320" y="258" text-anchor="middle">2.0</text>
      </g>
      <text x="160" y="280" text-anchor="middle" font-size="11" fill="#525252">ω = dN / dS</text>
      <!-- Bimodal density curve -->
      <path d="M 0 240 L 16 60 L 32 100 L 60 170 L 100 220 L 130 230 L 160 224 L 200 200 L 224 160 L 240 130 L 256 130 L 280 180 L 320 230"
            stroke="#b45309" stroke-width="2.5" fill="#b45309" fill-opacity="0.2"/>
      <line x1="160" y1="0" x2="160" y2="240" stroke="#dc2626" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="164" y="14" font-size="9" fill="#7f1d1d" class="mono">ω = 1</text>
      <text x="40" y="50" font-size="10" fill="#b45309" class="mono">main mass &lt; 1</text>
      <text x="240" y="120" font-size="10" fill="#b45309" class="mono">positive tail &gt; 1</text>
    </g>
  </g>

  <!-- Panel 3: Real-world -->
  <g transform="translate(820,80)">
    <text x="180" y="0" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">Real-world examples</text>
    <text x="180" y="18" text-anchor="middle" font-size="10" fill="#525252">three example genes from PAML benchmarks</text>
    <g transform="translate(20,40)">
      <line x1="0" y1="240" x2="320" y2="240" stroke="#374151"/>
      <line x1="0" y1="0" x2="0" y2="240" stroke="#374151"/>
      <g font-size="10" class="mono" fill="#525252">
        <text x="0" y="258" text-anchor="middle">0</text>
        <text x="80" y="258" text-anchor="middle">0.5</text>
        <text x="160" y="258" text-anchor="middle">1.0</text>
        <text x="240" y="258" text-anchor="middle">1.5</text>
        <text x="320" y="258" text-anchor="middle">2.0</text>
      </g>
      <text x="160" y="280" text-anchor="middle" font-size="11" fill="#525252">ω</text>
      <!-- Histones: sharp at 0 -->
      <path d="M 0 240 L 8 60 L 24 200 L 60 235 L 160 240 L 320 240"
            stroke="#0d7377" stroke-width="2" fill="none"/>
      <!-- Housekeeping: medium -->
      <path d="M 0 240 L 16 200 L 32 130 L 50 100 L 80 160 L 120 220 L 160 235 L 320 240"
            stroke="#525252" stroke-width="2" fill="none"/>
      <!-- HA: broad with positive tail -->
      <path d="M 0 240 L 24 180 L 60 140 L 100 130 L 140 140 L 180 145 L 220 150 L 260 165 L 280 195 L 320 230"
            stroke="#dc2626" stroke-width="2" fill="none"/>
      <line x1="160" y1="0" x2="160" y2="240" stroke="#dc2626" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
      <!-- Legend -->
      <g transform="translate(170,30)" font-size="10" class="mono">
        <line x1="0" y1="0" x2="20" y2="0" stroke="#0d7377" stroke-width="2"/>
        <text x="26" y="3" fill="#0d7377">histones (ω ≈ 0)</text>
        <line x1="0" y1="16" x2="20" y2="16" stroke="#525252" stroke-width="2"/>
        <text x="26" y="19" fill="#525252">housekeeping (ω ≈ 0.1)</text>
        <line x1="0" y1="32" x2="20" y2="32" stroke="#dc2626" stroke-width="2"/>
        <text x="26" y="35" fill="#dc2626">influenza HA (ω ≈ 1.5)</text>
      </g>
    </g>
  </g>

  <!-- Bottom banner -->
  <g transform="translate(60,460)">
    <rect width="1080" height="80" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="540" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">ω = dN/dS quantifies selection: &lt;1 purifying, ≈1 neutral, &gt;1 positive</text>
    <text x="540" y="42" text-anchor="middle" font-size="10" fill="#374151">Codeml branch-site test detects positive selection on specific lineages and sites. Influenza HA epitopes show ω &gt; 1 at antigenic positions; histones are evolutionarily frozen.</text>
    <text x="540" y="62" text-anchor="middle" font-size="10" fill="#374151" class="mono">Software: PAML codeml; HyPhy aBSREL/BUSTED/MEME; SLAC.</text>
  </g>
</svg>
