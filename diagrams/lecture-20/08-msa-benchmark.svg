<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">MSA tool accuracy on BAliBASE benchmark sets</text>
  <text x="600" y="48" text-anchor="middle" font-size="11" fill="#525252">average sum-of-pairs score across 218 reference alignments</text>

  <!-- Plot area -->
  <g transform="translate(140,90)">
    <!-- Y axis: 0 - 1.0 SP score -->
    <line x1="0" y1="0" x2="0" y2="380" stroke="#374151" stroke-width="1.5"/>
    <line x1="0" y1="380" x2="900" y2="380" stroke="#374151" stroke-width="1.5"/>
    <g font-size="10" fill="#525252" class="mono">
      <text x="-10" y="384" text-anchor="end">0.0</text>
      <text x="-10" y="308" text-anchor="end">0.2</text>
      <text x="-10" y="232" text-anchor="end">0.4</text>
      <text x="-10" y="156" text-anchor="end">0.6</text>
      <text x="-10" y="80" text-anchor="end">0.8</text>
      <text x="-10" y="4" text-anchor="end">1.0</text>
    </g>
    <text x="-70" y="190" text-anchor="middle" font-size="11" fill="#374151" transform="rotate(-90 -70 190)">SP score (avg over reference sets)</text>

    <!-- Reference levels — labels carry a white background rect because the
         "poor" line at y=270 cuts straight through PROBCONS, and at fs 9 mono
         the right-anchored label sat ~5 px from the bar's right edge, reading
         like contact. The pad gives the text its own breathing room. -->
    <line x1="0" y1="56" x2="900" y2="56" stroke="#10b981" stroke-dasharray="4 3" opacity="0.5"/>
    <rect x="836" y="44" width="66" height="14" fill="#fafaf9"/>
    <text x="900" y="52" text-anchor="end" font-size="9" fill="#10b981" class="mono">"good" 0.85</text>
    <line x1="0" y1="270" x2="900" y2="270" stroke="#dc2626" stroke-dasharray="4 3" opacity="0.5"/>
    <rect x="836" y="258" width="66" height="14" fill="#fafaf9"/>
    <text x="900" y="266" text-anchor="end" font-size="9" fill="#dc2626" class="mono">poor &lt; 0.30</text>

    <!-- Bars: 6 tools -->
    <!-- ClustalW: 0.62 -->
    <g>
      <rect x="40" y="144" width="100" height="236" fill="#9ca3af" stroke="#525252" stroke-width="0.8"/>
      <text x="90" y="396" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">ClustalW</text>
      <text x="90" y="410" text-anchor="middle" font-size="9" fill="#525252" class="mono">1994</text>
      <text x="90" y="138" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">0.62</text>
    </g>
    <!-- Clustal Omega: 0.78 -->
    <g>
      <rect x="180" y="84" width="100" height="296" fill="#fdba74" stroke="#b45309" stroke-width="0.8"/>
      <text x="230" y="396" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Clustal Omega</text>
      <text x="230" y="410" text-anchor="middle" font-size="9" fill="#525252" class="mono">2011</text>
      <text x="230" y="78" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">0.78</text>
    </g>
    <!-- MUSCLE: 0.81 -->
    <g>
      <rect x="320" y="68" width="100" height="312" fill="#fbbf24" stroke="#92400e" stroke-width="0.8"/>
      <text x="370" y="396" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">MUSCLE</text>
      <text x="370" y="410" text-anchor="middle" font-size="9" fill="#525252" class="mono">2004</text>
      <text x="370" y="62" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">0.81</text>
    </g>
    <!-- MAFFT FFT-NS-2: 0.86 -->
    <g>
      <rect x="460" y="48" width="100" height="332" fill="#86efac" stroke="#065f46" stroke-width="0.8"/>
      <text x="510" y="396" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">MAFFT FFT-NS-2</text>
      <text x="510" y="410" text-anchor="middle" font-size="9" fill="#525252" class="mono">2002 (fast)</text>
      <text x="510" y="42" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">0.86</text>
    </g>
    <!-- MAFFT L-INS-i: 0.93 -->
    <g>
      <rect x="600" y="22" width="100" height="358" fill="#34d399" stroke="#065f46" stroke-width="0.8"/>
      <text x="650" y="396" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">MAFFT L-INS-i</text>
      <text x="650" y="410" text-anchor="middle" font-size="9" fill="#525252" class="mono">2007 (best)</text>
      <text x="650" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">0.93</text>
    </g>
    <!-- PROBCONS: 0.92 -->
    <g>
      <rect x="740" y="26" width="100" height="354" fill="#a78bfa" stroke="#7c3aed" stroke-width="0.8"/>
      <text x="790" y="396" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">PROBCONS</text>
      <text x="790" y="410" text-anchor="middle" font-size="9" fill="#525252" class="mono">2005</text>
      <text x="790" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#7c3aed">0.92</text>
    </g>

    <!-- Speed annotation under bars -->
    <g transform="translate(0,440)" font-size="9" class="mono" fill="#525252">
      <text x="90" y="0" text-anchor="middle">~5s / 100 seq</text>
      <text x="230" y="0" text-anchor="middle">~3s</text>
      <text x="370" y="0" text-anchor="middle">~1s</text>
      <text x="510" y="0" text-anchor="middle">~0.4s (fastest)</text>
      <text x="650" y="0" text-anchor="middle">~80s (slow)</text>
      <text x="790" y="0" text-anchor="middle">~120s (slowest)</text>
      <text x="450" y="20" text-anchor="middle" fill="#374151">runtime on 100×300aa input</text>
    </g>
  </g>

  <!-- Banner -->
  <g transform="translate(140,520)">
    <rect width="900" height="60" fill="#dcfce7" stroke="#065f46" rx="4"/>
    <text x="450" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">All modern tools score ≥ 0.85; speed-accuracy gap is small in practice</text>
    <text x="450" y="42" text-anchor="middle" font-size="10" fill="#374151">MAFFT --auto picks the right algorithm for input size. Default to it; reach for L-INS-i when accuracy matters.</text>
  </g>
</svg>
