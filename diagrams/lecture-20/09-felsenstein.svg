<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="up9" viewBox="0 0 10 10" refX="5" refY="0" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 10 L 5 0 L 10 10 z" fill="#0d7377"/>
    </marker>
  </defs>
  <rect width="1200" height="700" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Felsenstein's pruning algorithm — DP for tree likelihood</text>
  <text x="600" y="48" text-anchor="middle" font-size="11" fill="#525252">L(node) = Π over children Σ over states P(child | parent, t) · L(child)</text>

  <!-- Tree -->
  <g transform="translate(140,90)" stroke="#1e3a8a" stroke-width="2" fill="none">
    <!-- Tree skeleton: 5 leaves -->
    <line x1="0" y1="60" x2="200" y2="60"/>
    <line x1="0" y1="120" x2="200" y2="120"/>
    <line x1="200" y1="60" x2="200" y2="120"/>
    <line x1="200" y1="90" x2="320" y2="90"/>

    <line x1="0" y1="240" x2="200" y2="240"/>
    <line x1="0" y1="300" x2="200" y2="300"/>
    <line x1="200" y1="240" x2="200" y2="300"/>
    <line x1="200" y1="270" x2="320" y2="270"/>

    <line x1="320" y1="90" x2="320" y2="270"/>
    <line x1="320" y1="180" x2="440" y2="180"/>

    <line x1="0" y1="380" x2="440" y2="380"/>
    <line x1="440" y1="180" x2="440" y2="380"/>
    <line x1="440" y1="280" x2="540" y2="280"/>
  </g>

  <!-- Leaves: observed residues -->
  <g transform="translate(140,90)" font-family="JetBrains Mono, monospace">
    <g font-size="14" font-weight="700">
      <text x="-12" y="64" text-anchor="end" fill="#1e3a8a">A</text>
      <text x="-12" y="124" text-anchor="end" fill="#1e3a8a">A</text>
      <text x="-12" y="244" text-anchor="end" fill="#b45309">G</text>
      <text x="-12" y="304" text-anchor="end" fill="#b45309">G</text>
      <text x="-12" y="384" text-anchor="end" fill="#0d7377">C</text>
    </g>
  </g>

  <!-- Internal node likelihoods, bottom-up -->
  <g transform="translate(140,90)">
    <circle cx="200" cy="90" r="9" fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
    <text x="200" y="93" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">v1</text>
    <circle cx="200" cy="270" r="9" fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
    <text x="200" y="273" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">v2</text>
    <circle cx="320" cy="180" r="9" fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
    <text x="320" y="183" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">v3</text>
    <circle cx="440" cy="280" r="9" fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
    <text x="440" y="283" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">v4</text>
    <circle cx="540" cy="280" r="11" fill="#fff" stroke="#7c3aed" stroke-width="2.5"/>
    <text x="540" y="283" text-anchor="middle" font-size="9" font-weight="700" fill="#7c3aed">root</text>
  </g>

  <!-- Bottom-up arrows (information flow) -->
  <g transform="translate(140,90)" stroke="#0d7377" stroke-width="1.5" fill="none" stroke-dasharray="2 3">
    <line x1="180" y1="80" x2="208" y2="80" marker-end="url(#up9)"/>
    <line x1="180" y1="260" x2="208" y2="260" marker-end="url(#up9)"/>
    <line x1="300" y1="170" x2="328" y2="170" marker-end="url(#up9)"/>
    <line x1="420" y1="270" x2="448" y2="270" marker-end="url(#up9)"/>
    <line x1="520" y1="270" x2="548" y2="270" marker-end="url(#up9)"/>
  </g>

  <!-- L vector annotations — L(v1) lifted from y=180 to y=168 because the
       horizontal branch from v3 to v4 sits exactly at y=180+90=270 abs and
       the original baseline put glyphs straight on that line. -->
  <g class="mono" font-size="9" fill="#0d7377">
    <text x="350" y="168">L(v1)</text>
    <text x="350" y="350">L(v2)</text>
    <text x="475" y="262">L(v3)</text>
    <text x="595" y="380">L(v4)</text>
  </g>

  <!-- Root summation panel on right -->
  <g transform="translate(720,120)">
    <rect width="420" height="280" fill="#fff" stroke="#7c3aed" stroke-width="1.5" rx="6"/>
    <text x="210" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">Root likelihood (final marginalisation)</text>
    <line x1="20" y1="34" x2="400" y2="34" stroke="#e7e5e4"/>
    <text x="20" y="58" font-size="11" fill="#374151">For each child, the conditional sum:</text>
    <text x="20" y="80" font-size="11" font-family="JetBrains Mono, monospace" fill="#1e3a8a">L_i(s) = Π_c [ Σ_{s'} P(s'|s, t_c) · L_c(s') ]</text>
    <text x="20" y="108" font-size="11" fill="#374151">Final likelihood marginalises over root state:</text>
    <text x="20" y="130" font-size="11" font-family="JetBrains Mono, monospace" fill="#7c3aed">L(tree) = Σ_s π_s · L_root(s)</text>
    <text x="20" y="158" font-size="10" fill="#525252">π_s = stationary distribution (e.g., from JC, K2P, GTR).</text>
    <text x="20" y="180" font-size="10" fill="#525252">P(s'|s, t) = transition probability (matrix exponential of Q).</text>
    <line x1="20" y1="200" x2="400" y2="200" stroke="#e7e5e4"/>
    <text x="20" y="220" font-size="11" font-weight="600" fill="#374151">Complexity</text>
    <text x="20" y="240" font-size="10" class="mono" fill="#374151">O(N · L · k²) per likelihood evaluation</text>
    <text x="20" y="256" font-size="10" fill="#525252">N = leaves · L = sites · k = states (4 DNA / 20 AA)</text>
  </g>

  <!-- Bottom banner -->
  <g transform="translate(140,560)">
    <rect width="1000" height="80" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="500" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">Belief propagation on a tree — the phylogenetic analog of forward-backward in HMMs</text>
    <text x="500" y="44" text-anchor="middle" font-size="10" fill="#374151">Each internal node holds a vector of state-conditional likelihoods. The DP runs once per likelihood evaluation; ML optimisation = repeated likelihood + topology / branch-length search.</text>
    <text x="500" y="62" text-anchor="middle" font-size="10" fill="#374151" class="mono">Software: RAxML-NG, IQ-TREE, FastTree, PhyML — all implement variants of Felsenstein 1981.</text>
  </g>
</svg>
