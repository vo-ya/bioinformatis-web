<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; }</style></defs>
  <rect width="1200" height="700" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Orthologs vs paralogs — a single ancient duplication splits a gene family</text>

  <!-- (Earlier draft tree removed — it duplicated the cleaner geometry below
       and rendered a second, off-position skeleton on top of it.) -->

  <!-- Cleaner tree: ancestor at left, dup node, then speciations -->
  <g transform="translate(120,90)">
    <!-- Ancestor branch -->
    <line x1="0" y1="240" x2="100" y2="240" stroke="#1e3a8a" stroke-width="2.5"/>
    <!-- Duplication node — the two date labels were originally centred at x=100
         where the down branch (100,240)→(100,380) bisected them. Shifted left
         and right-anchored so they sit alongside the line, not on top. -->
    <circle cx="100" cy="240" r="9" fill="#dc2626"/>
    <text x="100" y="244" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">D</text>
    <text x="86" y="260" text-anchor="end" font-size="9" font-weight="700" fill="#dc2626" class="mono">duplication</text>
    <text x="86" y="274" text-anchor="end" font-size="9" fill="#7f1d1d" class="mono">~ 600 Mya</text>

    <!-- Up branch to alpha sub-family -->
    <line x1="100" y1="240" x2="100" y2="100" stroke="#1e3a8a" stroke-width="2"/>
    <line x1="100" y1="100" x2="220" y2="100" stroke="#1e3a8a" stroke-width="2"/>
    <!-- Down branch to beta sub-family -->
    <line x1="100" y1="240" x2="100" y2="380" stroke="#1e3a8a" stroke-width="2"/>
    <line x1="100" y1="380" x2="220" y2="380" stroke="#1e3a8a" stroke-width="2"/>

    <!-- Alpha speciation node -->
    <circle cx="220" cy="100" r="7" fill="#0d7377"/>
    <text x="220" y="104" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">S</text>
    <text x="222" y="86" font-size="9" fill="#0d7377" class="mono">speciation</text>
    <!-- Alpha sub-tree -->
    <line x1="220" y1="100" x2="220" y2="40" stroke="#1e3a8a" stroke-width="1.5"/>
    <line x1="220" y1="100" x2="220" y2="160" stroke="#1e3a8a" stroke-width="1.5"/>
    <line x1="220" y1="40" x2="380" y2="40" stroke="#1e3a8a" stroke-width="1.5"/>
    <!-- Internal speciation in alpha -->
    <circle cx="320" cy="160" r="5" fill="#0d7377"/>
    <line x1="220" y1="160" x2="320" y2="160" stroke="#1e3a8a" stroke-width="1.5"/>
    <line x1="320" y1="160" x2="320" y2="120" stroke="#1e3a8a" stroke-width="1.5"/>
    <line x1="320" y1="160" x2="320" y2="200" stroke="#1e3a8a" stroke-width="1.5"/>
    <line x1="320" y1="120" x2="380" y2="120" stroke="#1e3a8a" stroke-width="1.5"/>
    <line x1="320" y1="200" x2="380" y2="200" stroke="#1e3a8a" stroke-width="1.5"/>

    <!-- Beta speciation -->
    <circle cx="220" cy="380" r="7" fill="#0d7377"/>
    <text x="220" y="384" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">S</text>
    <line x1="220" y1="380" x2="220" y2="320" stroke="#1e3a8a" stroke-width="1.5"/>
    <line x1="220" y1="380" x2="220" y2="440" stroke="#1e3a8a" stroke-width="1.5"/>
    <line x1="220" y1="320" x2="380" y2="320" stroke="#1e3a8a" stroke-width="1.5"/>
    <circle cx="320" cy="440" r="5" fill="#0d7377"/>
    <line x1="220" y1="440" x2="320" y2="440" stroke="#1e3a8a" stroke-width="1.5"/>
    <line x1="320" y1="440" x2="320" y2="400" stroke="#1e3a8a" stroke-width="1.5"/>
    <line x1="320" y1="440" x2="320" y2="480" stroke="#1e3a8a" stroke-width="1.5"/>
    <line x1="320" y1="400" x2="380" y2="400" stroke="#1e3a8a" stroke-width="1.5"/>
    <line x1="320" y1="480" x2="380" y2="480" stroke="#1e3a8a" stroke-width="1.5"/>

    <!-- Tip labels -->
    <g font-size="11" font-weight="700" font-family="Inter, sans-serif">
      <text x="388" y="44" fill="#0d7377">Human-α</text>
      <text x="388" y="124" fill="#0d7377">Mouse-α</text>
      <text x="388" y="204" fill="#0d7377">Dog-α</text>
      <text x="388" y="324" fill="#b45309">Human-β</text>
      <text x="388" y="404" fill="#b45309">Mouse-β</text>
      <text x="388" y="484" fill="#b45309">Dog-β</text>
    </g>
    <text x="488" y="40" font-size="9" fill="#525252" class="mono">α-globin sub-family</text>
    <text x="488" y="320" font-size="9" fill="#525252" class="mono">β-globin sub-family</text>
  </g>

  <!-- Relationship table on right -->
  <g transform="translate(720,90)">
    <rect width="420" height="400" fill="#fff" stroke="#d6d3d1" stroke-width="1" rx="6"/>
    <text x="210" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Pairwise relationships in this tree</text>
    <line x1="20" y1="34" x2="400" y2="34" stroke="#e7e5e4"/>

    <!-- Row 1: ortholog -->
    <g transform="translate(20,52)">
      <circle cx="8" cy="8" r="6" fill="#0d7377"/>
      <text x="22" y="12" font-size="11" font-weight="700" fill="#0d7377">Orthologs (speciation only)</text>
      <text x="22" y="28" font-size="10" class="mono" fill="#374151">Human-α / Mouse-α</text>
      <text x="22" y="42" font-size="10" class="mono" fill="#374151">Human-β / Mouse-β</text>
      <text x="22" y="58" font-size="9" fill="#525252">→ same function in different species</text>
      <text x="22" y="72" font-size="9" fill="#525252">→ "function transfer" valid: high-confidence</text>
    </g>

    <!-- Row 2: paralog (in-paralog) -->
    <g transform="translate(20,140)">
      <circle cx="8" cy="8" r="6" fill="#dc2626"/>
      <text x="22" y="12" font-size="11" font-weight="700" fill="#dc2626">Paralogs (duplication node)</text>
      <text x="22" y="28" font-size="10" class="mono" fill="#374151">Human-α / Human-β</text>
      <text x="22" y="42" font-size="10" class="mono" fill="#374151">Mouse-α / Mouse-β</text>
      <text x="22" y="58" font-size="9" fill="#525252">→ may have specialised functions</text>
      <text x="22" y="72" font-size="9" fill="#525252">→ "function transfer" risky: divergence likely</text>
    </g>

    <!-- Row 3: distant -->
    <g transform="translate(20,228)">
      <circle cx="8" cy="8" r="6" fill="#7c3aed"/>
      <text x="22" y="12" font-size="11" font-weight="700" fill="#7c3aed">Out-paralogs (mixed)</text>
      <text x="22" y="28" font-size="10" class="mono" fill="#374151">Human-α / Mouse-β</text>
      <text x="22" y="42" font-size="10" class="mono" fill="#374151">Dog-α / Human-β</text>
      <text x="22" y="58" font-size="9" fill="#525252">→ duplication first, then speciation</text>
      <text x="22" y="72" font-size="9" fill="#525252">→ never the right reference for function</text>
    </g>

    <!-- Bottom note -->
    <g transform="translate(20,316)">
      <rect width="380" height="70" fill="#fef3c7" stroke="#b45309" rx="3"/>
      <text x="190" y="20" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">Functional inference rule</text>
      <text x="190" y="38" text-anchor="middle" font-size="9" fill="#374151">Use orthologs to transfer function — they share a common ancestor</text>
      <text x="190" y="50" text-anchor="middle" font-size="9" fill="#374151">via speciation, so selection has acted on their lineages with the</text>
      <text x="190" y="62" text-anchor="middle" font-size="9" fill="#374151">same role. Paralogs may have neo- or sub-functionalised.</text>
    </g>
  </g>

  <!-- Bottom banner -->
  <g transform="translate(120,610)">
    <rect width="1020" height="60" fill="#dcfce7" stroke="#065f46" rx="4"/>
    <text x="510" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">Internal node type matters: speciation = orthologs (function transferable); duplication = paralogs (function may diverge)</text>
    <text x="510" y="42" text-anchor="middle" font-size="10" fill="#374151">Reciprocal best hits (RBH) approximates orthology; OrthoFinder, OrthoMCL, eggNOG-mapper use tree reconciliation for higher fidelity.</text>
  </g>
</svg>
