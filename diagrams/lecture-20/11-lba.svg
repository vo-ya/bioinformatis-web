<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Long-branch attraction — when parsimony fails</text>

  <!-- Left: true tree -->
  <g transform="translate(80,80)">
    <text x="220" y="0" text-anchor="middle" font-size="13" font-weight="700" fill="#0d7377">True tree (simulated)</text>
    <text x="220" y="20" text-anchor="middle" font-size="10" fill="#525252" class="mono">two long branches in non-sister positions</text>
    <g stroke="#0d7377" stroke-width="2" fill="none">
      <!-- Root -->
      <line x1="200" y1="40" x2="200" y2="320"/>
      <!-- Top split: A | B sister -->
      <line x1="200" y1="80" x2="320" y2="80"/>
      <line x1="320" y1="60" x2="320" y2="100"/>
      <line x1="320" y1="60" x2="430" y2="60"/>
      <line x1="320" y1="100" x2="430" y2="100"/>
      <!-- Bottom split: C | D sister -->
      <line x1="200" y1="280" x2="320" y2="280"/>
      <line x1="320" y1="260" x2="320" y2="300"/>
      <line x1="320" y1="260" x2="430" y2="260"/>
      <line x1="320" y1="300" x2="430" y2="300"/>
    </g>
    <!-- Long branch on A and C -->
    <line x1="320" y1="60" x2="430" y2="60" stroke="#dc2626" stroke-width="3"/>
    <line x1="320" y1="260" x2="430" y2="260" stroke="#dc2626" stroke-width="3"/>
    <!-- Tip labels -->
    <g font-size="11" font-weight="700">
      <text x="438" y="64" fill="#dc2626">A (fast-evolving)</text>
      <text x="438" y="104" fill="#0d7377">B (slow)</text>
      <text x="438" y="264" fill="#dc2626">C (fast-evolving)</text>
      <text x="438" y="304" fill="#0d7377">D (slow)</text>
    </g>
    <!-- Note about pairs -->
    <g transform="translate(60,360)">
      <rect width="320" height="44" fill="#dcfce7" stroke="#065f46" rx="3"/>
      <text x="160" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">A–B sister, C–D sister</text>
      <text x="160" y="36" text-anchor="middle" font-size="10" fill="#374151">A and C accumulate substitutions independently</text>
    </g>
  </g>

  <!-- Right: parsimony-inferred tree -->
  <g transform="translate(680,80)">
    <text x="220" y="0" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">Parsimony-inferred tree (incorrect)</text>
    <text x="220" y="20" text-anchor="middle" font-size="10" fill="#525252" class="mono">long branches grouped together → topology error</text>
    <g stroke="#7f1d1d" stroke-width="2" fill="none">
      <line x1="200" y1="40" x2="200" y2="320"/>
      <!-- Top: A | C grouped -->
      <line x1="200" y1="80" x2="320" y2="80"/>
      <line x1="320" y1="60" x2="320" y2="100"/>
      <line x1="320" y1="60" x2="430" y2="60"/>
      <line x1="320" y1="100" x2="430" y2="100"/>
      <!-- Bottom: B | D grouped -->
      <line x1="200" y1="280" x2="320" y2="280"/>
      <line x1="320" y1="260" x2="320" y2="300"/>
      <line x1="320" y1="260" x2="430" y2="260"/>
      <line x1="320" y1="300" x2="430" y2="300"/>
    </g>
    <line x1="320" y1="60" x2="430" y2="60" stroke="#dc2626" stroke-width="3"/>
    <line x1="320" y1="100" x2="430" y2="100" stroke="#dc2626" stroke-width="3"/>
    <g font-size="11" font-weight="700">
      <text x="438" y="64" fill="#dc2626">A (fast)</text>
      <text x="438" y="104" fill="#dc2626">C (fast)</text>
      <text x="438" y="264" fill="#0d7377">B (slow)</text>
      <text x="438" y="304" fill="#0d7377">D (slow)</text>
    </g>
    <g transform="translate(60,360)">
      <rect width="320" height="44" fill="#fee2e2" stroke="#7f1d1d" rx="3"/>
      <text x="160" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#7f1d1d">A–C grouped, B–D grouped</text>
      <text x="160" y="36" text-anchor="middle" font-size="10" fill="#374151">Parsimony confused convergent substitutions for shared ancestry</text>
    </g>
  </g>

  <!-- Center caption -->
  <g transform="translate(560,170)">
    <text x="40" y="0" text-anchor="middle" font-size="20" font-weight="700" fill="#7f1d1d">×</text>
    <text x="40" y="22" text-anchor="middle" font-size="9" fill="#525252" class="mono">topology mismatch</text>
  </g>

  <!-- Bottom banner with mechanism explanation -->
  <g transform="translate(80,490)">
    <rect width="1040" height="100" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="520" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">Long-branch attraction (LBA): fast-evolving lineages share substitutions by chance, fooling parsimony</text>
    <text x="520" y="46" text-anchor="middle" font-size="10" fill="#374151">Parsimony minimises substitution count and assumes saturation never happens. Long branches accumulate so many substitutions that the same site changes multiple times — overlap looks like shared ancestry.</text>
    <text x="520" y="62" text-anchor="middle" font-size="10" fill="#374151">Maximum likelihood with a substitution model that allows multiple hits (JC, GTR+Γ) handles this; parsimony does not.</text>
    <text x="520" y="80" text-anchor="middle" font-size="10" fill="#374151" class="mono">Practical: prefer ML or Bayesian inference; remove obvious long-branch lineages or use slower-evolving genes.</text>
  </g>
</svg>
