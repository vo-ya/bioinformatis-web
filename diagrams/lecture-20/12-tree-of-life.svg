<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="700" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">A vertebrate excerpt of the tree of life — calibrated against the fossil record</text>

  <!-- Time axis on bottom -->
  <g transform="translate(120,600)">
    <line x1="0" y1="0" x2="900" y2="0" stroke="#374151" stroke-width="1.5"/>
    <g font-size="10" fill="#525252" class="mono">
      <text x="0" y="20" text-anchor="middle">500</text>
      <text x="180" y="20" text-anchor="middle">400</text>
      <text x="360" y="20" text-anchor="middle">300</text>
      <text x="540" y="20" text-anchor="middle">200</text>
      <text x="720" y="20" text-anchor="middle">100</text>
      <text x="900" y="20" text-anchor="middle">0</text>
    </g>
    <text x="450" y="40" text-anchor="middle" font-size="11" fill="#525252">Mya</text>
    <g stroke="#9ca3af">
      <line x1="0" y1="-4" x2="0" y2="4"/>
      <line x1="180" y1="-4" x2="180" y2="4"/>
      <line x1="360" y1="-4" x2="360" y2="4"/>
      <line x1="540" y1="-4" x2="540" y2="4"/>
      <line x1="720" y1="-4" x2="720" y2="4"/>
      <line x1="900" y1="-4" x2="900" y2="4"/>
    </g>
  </g>

  <!-- Tree -->
  <!-- Backbone goes from x=0 (500 Mya) to x=900 (today) -->
  <!-- Each Mya = 1.8 px -->
  <g transform="translate(120,80)">
    <!-- Main backbone with successive splits -->
    <!-- Split 1: lampreys at 500 Mya (x=0) -->
    <line x1="0" y1="260" x2="900" y2="260" stroke="#1e3a8a" stroke-width="0.5" stroke-dasharray="2 2"/>

    <!-- Lamprey branch -->
    <line x1="0" y1="500" x2="0" y2="260" stroke="#1e3a8a" stroke-width="2"/>
    <line x1="0" y1="500" x2="900" y2="500" stroke="#1e3a8a" stroke-width="2"/>
    <text x="908" y="504" font-size="11" font-weight="600" fill="#374151">Lampreys</text>

    <!-- Cartilaginous fish at 460 Mya x=72 -->
    <circle cx="72" cy="260" r="4" fill="#1e3a8a"/>
    <line x1="72" y1="260" x2="72" y2="460" stroke="#1e3a8a" stroke-width="2"/>
    <line x1="72" y1="460" x2="900" y2="460" stroke="#1e3a8a" stroke-width="2"/>
    <text x="908" y="464" font-size="11" font-weight="600" fill="#374151">Cartilaginous fish</text>

    <!-- Bony fish at 425 Mya x=135 -->
    <circle cx="135" cy="260" r="4" fill="#1e3a8a"/>
    <line x1="135" y1="260" x2="135" y2="420" stroke="#1e3a8a" stroke-width="2"/>
    <line x1="135" y1="420" x2="900" y2="420" stroke="#1e3a8a" stroke-width="2"/>
    <text x="908" y="424" font-size="11" font-weight="600" fill="#374151">Bony fish</text>

    <!-- Amphibia at 360 Mya x=252 -->
    <circle cx="252" cy="260" r="4" fill="#1e3a8a"/>
    <line x1="252" y1="260" x2="252" y2="380" stroke="#1e3a8a" stroke-width="2"/>
    <line x1="252" y1="380" x2="900" y2="380" stroke="#1e3a8a" stroke-width="2"/>
    <text x="908" y="384" font-size="11" font-weight="600" fill="#374151">Amphibia</text>

    <!-- Reptile/bird/mammal split at 320 Mya x=324 -->
    <circle cx="324" cy="260" r="4" fill="#1e3a8a"/>
    <line x1="324" y1="260" x2="324" y2="180" stroke="#1e3a8a" stroke-width="2"/>

    <!-- Reptile + bird at 250 Mya x=450 -->
    <line x1="324" y1="180" x2="450" y2="180" stroke="#1e3a8a" stroke-width="2"/>
    <circle cx="450" cy="180" r="4" fill="#1e3a8a"/>
    <line x1="450" y1="180" x2="450" y2="320" stroke="#1e3a8a" stroke-width="2"/>
    <line x1="450" y1="320" x2="900" y2="320" stroke="#1e3a8a" stroke-width="2"/>
    <line x1="450" y1="180" x2="900" y2="180" stroke="#1e3a8a" stroke-width="2"/>
    <text x="908" y="324" font-size="11" font-weight="600" fill="#374151">Reptilia</text>
    <text x="908" y="184" font-size="11" font-weight="600" fill="#374151">Aves</text>

    <!-- Mammal trunk -->
    <line x1="324" y1="260" x2="324" y2="100" stroke="#1e3a8a" stroke-width="2"/>
    <line x1="324" y1="100" x2="540" y2="100" stroke="#1e3a8a" stroke-width="2"/>
    <!-- Mammal split: monotremes at 200 Mya x=540 -->
    <circle cx="540" cy="100" r="4" fill="#b45309"/>
    <line x1="540" y1="100" x2="540" y2="60" stroke="#b45309" stroke-width="2"/>
    <line x1="540" y1="60" x2="900" y2="60" stroke="#b45309" stroke-width="2"/>
    <text x="908" y="64" font-size="11" font-weight="600" fill="#b45309">Monotremes</text>

    <line x1="540" y1="100" x2="540" y2="140" stroke="#b45309" stroke-width="2"/>
    <line x1="540" y1="140" x2="630" y2="140" stroke="#b45309" stroke-width="2"/>
    <!-- Marsupial split at 150 Mya x=630 -->
    <circle cx="630" cy="140" r="4" fill="#b45309"/>
    <line x1="630" y1="140" x2="630" y2="120" stroke="#b45309" stroke-width="2"/>
    <line x1="630" y1="120" x2="900" y2="120" stroke="#b45309" stroke-width="2"/>
    <text x="908" y="124" font-size="11" font-weight="600" fill="#b45309">Marsupials</text>

    <!-- Placental mammals -->
    <line x1="630" y1="140" x2="630" y2="240" stroke="#b45309" stroke-width="2"/>
    <line x1="630" y1="240" x2="720" y2="240" stroke="#b45309" stroke-width="2"/>
    <circle cx="720" cy="240" r="4" fill="#b45309"/>
    <line x1="720" y1="240" x2="720" y2="200" stroke="#b45309" stroke-width="2"/>
    <line x1="720" y1="240" x2="720" y2="280" stroke="#b45309" stroke-width="2"/>
    <line x1="720" y1="200" x2="900" y2="200" stroke="#b45309" stroke-width="2"/>
    <line x1="720" y1="280" x2="900" y2="280" stroke="#b45309" stroke-width="2"/>
    <text x="908" y="204" font-size="11" font-weight="600" fill="#b45309">Rodents (mouse, rat)</text>
    <text x="908" y="284" font-size="11" font-weight="600" fill="#b45309">Carnivores / ungulates</text>

    <!-- Primate split at 65 Mya x=783 -->
    <line x1="720" y1="240" x2="783" y2="240" stroke="#b45309" stroke-width="2"/>
    <circle cx="783" cy="240" r="4" fill="#b45309"/>
    <line x1="783" y1="240" x2="783" y2="240" stroke="#b45309" stroke-width="2"/>
    <line x1="783" y1="240" x2="900" y2="240" stroke="#b45309" stroke-width="2"/>
    <text x="908" y="244" font-size="11" font-weight="600" fill="#b45309">Primates</text>

    <!-- Calibration point markers (fossils) -->
    <g>
      <text x="252" y="380" font-size="14" fill="#dc2626">★</text>
      <text x="324" y="180" font-size="14" fill="#dc2626">★</text>
      <text x="540" y="100" font-size="14" fill="#dc2626">★</text>
      <text x="450" y="180" font-size="14" fill="#dc2626">★</text>
    </g>
  </g>

  <!-- Title for fossil markers -->
  <g transform="translate(140,60)">
    <text x="0" y="0" font-size="11" fill="#dc2626">★ = fossil-calibrated split</text>
  </g>

  <!-- Bottom banner -->
  <g transform="translate(120,640)">
    <rect width="1000" height="48" fill="#dcfce7" stroke="#065f46" rx="4"/>
    <text x="500" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">Modern tree-of-life work uses 100s of marker genes + relaxed clock + fossil priors (Hug et al. 2016, GTDB)</text>
    <text x="500" y="40" text-anchor="middle" font-size="10" fill="#374151">Major surprise of the last decade: Hug 2016 placed Asgard archaea as sister to eukaryotes — the simplest "tree of life" topology now has only 2 superkingdoms.</text>
  </g>
</svg>
