<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; }</style></defs>
  <rect width="1200" height="700" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">RNA secondary structure — cloverleaf, dot-bracket, and the SCFG covariance model</text>

  <!-- Top-left: tRNA cloverleaf cartoon -->
  <g transform="translate(80,80)">
    <text x="170" y="0" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">tRNA cloverleaf (4-arm)</text>
    <!-- Acceptor stem (cobalt) -->
    <g stroke="#1e3a8a" stroke-width="3" fill="none">
      <line x1="170" y1="20" x2="170" y2="80"/>
      <line x1="186" y1="20" x2="186" y2="80"/>
    </g>
    <text x="200" y="48" font-size="10" fill="#1e3a8a" class="mono">acceptor stem</text>
    <text x="200" y="62" font-size="9" fill="#525252">5'-CCA-3'</text>

    <!-- Central junction -->
    <circle cx="178" cy="100" r="14" fill="#fafaf9" stroke="#374151" stroke-width="1.5"/>
    <text x="178" y="103" text-anchor="middle" font-size="9" font-family="JetBrains Mono, monospace" fill="#525252">junction</text>

    <!-- D-arm (left, green) -->
    <g stroke="#0d7377" stroke-width="3" fill="none">
      <line x1="118" y1="92" x2="60" y2="64"/>
      <line x1="120" y1="106" x2="62" y2="78"/>
      <circle cx="44" cy="64" r="14" fill="none" stroke="#0d7377" stroke-width="2"/>
      <circle cx="32" cy="50" r="8" fill="none" stroke="#0d7377" stroke-width="2"/>
      <circle cx="58" cy="50" r="8" fill="none" stroke="#0d7377" stroke-width="2"/>
    </g>
    <text x="60" y="32" font-size="10" fill="#0d7377" class="mono">D-arm</text>

    <!-- TΨC arm (right, amber) -->
    <g stroke="#b45309" stroke-width="3" fill="none">
      <line x1="240" y1="92" x2="298" y2="64"/>
      <line x1="238" y1="106" x2="296" y2="78"/>
      <circle cx="314" cy="64" r="14" fill="none" stroke="#b45309" stroke-width="2"/>
      <circle cx="326" cy="50" r="8" fill="none" stroke="#b45309" stroke-width="2"/>
      <circle cx="300" cy="50" r="8" fill="none" stroke="#b45309" stroke-width="2"/>
    </g>
    <text x="298" y="32" font-size="10" fill="#b45309" class="mono">TΨC arm</text>

    <!-- Anticodon arm (bottom, red) -->
    <g stroke="#dc2626" stroke-width="3" fill="none">
      <line x1="170" y1="120" x2="170" y2="190"/>
      <line x1="186" y1="120" x2="186" y2="190"/>
      <circle cx="178" cy="206" r="14" fill="none" stroke="#dc2626" stroke-width="2"/>
      <text x="178" y="210" text-anchor="middle" font-size="9" font-family="JetBrains Mono, monospace" fill="#dc2626">CAU</text>
    </g>
    <text x="200" y="160" font-size="10" fill="#dc2626" class="mono">anticodon</text>
    <text x="200" y="172" font-size="9" fill="#525252">arm</text>

    <text x="170" y="250" text-anchor="middle" font-size="10" fill="#525252">76 nt single strand → 4-arm structure</text>
  </g>

  <!-- Top-right: dot-bracket notation -->
  <g transform="translate(560,80)">
    <text x="280" y="0" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Dot-bracket notation (nested base pairs)</text>
    <g class="mono" font-size="11" transform="translate(0,30)">
      <text x="0" y="0" fill="#525252">sequence  </text>
      <tspan>
        <tspan x="100" y="0" fill="#1e3a8a">GCGGAUUUA</tspan>
        <tspan x="200" y="0" fill="#0d7377">GCUCAGUUG</tspan>
        <tspan x="300" y="0" fill="#dc2626">GGAGAGCGCC</tspan>
        <tspan x="400" y="0" fill="#b45309">AGACUGAA</tspan>
        <tspan x="490" y="0" fill="#1e3a8a">GAUCUGGAGGUC</tspan>
      </tspan>
      <text x="0" y="20" fill="#525252">structure </text>
      <tspan>
        <tspan x="100" y="20" fill="#1e3a8a">(((((((..</tspan>
        <tspan x="200" y="20" fill="#0d7377">((((.....</tspan>
        <tspan x="300" y="20" fill="#0d7377">.))))</tspan>
        <tspan x="356" y="20" fill="#dc2626">.((((((</tspan>
        <tspan x="436" y="20" fill="#dc2626">....))))))</tspan>
        <tspan x="552" y="20" fill="#b45309">((((</tspan>
        <tspan x="608" y="20" fill="#b45309">.....))))</tspan>
        <tspan x="700" y="20" fill="#1e3a8a">..)))))))</tspan>
      </tspan>
    </g>
    <g transform="translate(0,80)" font-size="10" fill="#374151">
      <text x="0" y="0">"(" pairs with the matching ")" at the same nesting depth.</text>
      <text x="0" y="14">Dots = unpaired (loop / bulge).</text>
      <text x="0" y="28">Coloured regions correspond to the four arms in the cloverleaf above.</text>
    </g>
    <g transform="translate(0,140)">
      <rect width="560" height="60" fill="#fff" stroke="#d6d3d1" rx="4"/>
      <text x="280" y="20" text-anchor="middle" font-size="11" fill="#374151" font-weight="600">Nested = SCFG-tractable</text>
      <text x="280" y="38" text-anchor="middle" font-size="10" fill="#525252">Pseudoknots (crossing pairs) break this and need extensions: pknotsRG, ProbKnot.</text>
      <text x="280" y="52" text-anchor="middle" font-size="10" fill="#525252">~1% of known structural RNAs include pseudoknots; SCFGs handle the other ~99%.</text>
    </g>
  </g>

  <!-- Bottom: covariance model (CM) state diagram -->
  <g transform="translate(80,400)">
    <text x="540" y="0" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Profile RNA / Covariance Model — like an HMM, with paired-column states</text>

    <!-- Linear chain of states -->
    <g transform="translate(40,40)">
      <!-- Match-pair (paired column) -->
      <g>
        <rect x="0" y="0" width="80" height="44" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" rx="4"/>
        <text x="40" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">MP₁</text>
        <text x="40" y="34" text-anchor="middle" font-size="9" class="mono" fill="#525252">P(x,y)</text>
      </g>
      <!-- Insert -->
      <line x1="80" y1="22" x2="120" y2="22" stroke="#525252" stroke-width="1.5"/>
      <g transform="translate(120,0)">
        <rect x="0" y="0" width="80" height="44" fill="#fef3c7" stroke="#b45309" stroke-width="1.2" rx="4"/>
        <text x="40" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">IL₁</text>
        <text x="40" y="34" text-anchor="middle" font-size="9" class="mono" fill="#525252">insert left</text>
      </g>
      <line x1="200" y1="22" x2="240" y2="22" stroke="#525252" stroke-width="1.5"/>
      <!-- ML (singlet) -->
      <g transform="translate(240,0)">
        <rect x="0" y="0" width="80" height="44" fill="#dcfce7" stroke="#065f46" stroke-width="1.5" rx="4"/>
        <text x="40" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">ML₂</text>
        <text x="40" y="34" text-anchor="middle" font-size="9" class="mono" fill="#525252">P(x)</text>
      </g>
      <line x1="320" y1="22" x2="360" y2="22" stroke="#525252" stroke-width="1.5"/>
      <!-- Match-pair -->
      <g transform="translate(360,0)">
        <rect x="0" y="0" width="80" height="44" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" rx="4"/>
        <text x="40" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">MP₃</text>
        <text x="40" y="34" text-anchor="middle" font-size="9" class="mono" fill="#525252">P(x,y)</text>
      </g>
      <line x1="440" y1="22" x2="480" y2="22" stroke="#525252" stroke-width="1.5"/>
      <!-- Delete -->
      <g transform="translate(480,0)">
        <rect x="0" y="0" width="80" height="44" fill="#fee2e2" stroke="#7f1d1d" stroke-width="1.2" rx="4"/>
        <text x="40" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">D₄</text>
        <text x="40" y="34" text-anchor="middle" font-size="9" class="mono" fill="#525252">delete</text>
      </g>
      <line x1="560" y1="22" x2="600" y2="22" stroke="#525252" stroke-width="1.5"/>
      <!-- Match-pair -->
      <g transform="translate(600,0)">
        <rect x="0" y="0" width="80" height="44" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" rx="4"/>
        <text x="40" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">MP₅</text>
        <text x="40" y="34" text-anchor="middle" font-size="9" class="mono" fill="#525252">P(x,y)</text>
      </g>
      <line x1="680" y1="22" x2="720" y2="22" stroke="#525252" stroke-width="1.5"/>
      <!-- ML -->
      <g transform="translate(720,0)">
        <rect x="0" y="0" width="80" height="44" fill="#dcfce7" stroke="#065f46" stroke-width="1.5" rx="4"/>
        <text x="40" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">ML₆</text>
        <text x="40" y="34" text-anchor="middle" font-size="9" class="mono" fill="#525252">P(x)</text>
      </g>
    </g>

    <!-- Pairing arcs above MP states -->
    <g transform="translate(40,40)" stroke="#1e3a8a" stroke-width="1.2" fill="none" stroke-dasharray="3 2">
      <path d="M 40 0 Q 200 -36 400 0"/>
    </g>
    <g transform="translate(40,40)" font-size="9" fill="#1e3a8a" class="mono">
      <text x="220" y="-26" text-anchor="middle">paired columns enforced together</text>
    </g>

    <!-- Legend underneath -->
    <g transform="translate(40,120)" font-size="10" fill="#374151">
      <text x="0" y="0" font-weight="700">State types</text>
      <g transform="translate(0,12)">
        <rect x="0" y="2" width="14" height="8" fill="#dbeafe" stroke="#1e3a8a"/>
        <text x="20" y="10">MP — match-pair (paired column, emits two bases)</text>
      </g>
      <g transform="translate(0,28)">
        <rect x="0" y="2" width="14" height="8" fill="#dcfce7" stroke="#065f46"/>
        <text x="20" y="10">ML / MR — match-singlet (loop column, emits one base)</text>
      </g>
      <g transform="translate(0,44)">
        <rect x="0" y="2" width="14" height="8" fill="#fef3c7" stroke="#b45309"/>
        <text x="20" y="10">IL / IR — insert states (allows insertions)</text>
      </g>
      <g transform="translate(0,60)">
        <rect x="0" y="2" width="14" height="8" fill="#fee2e2" stroke="#7f1d1d"/>
        <text x="20" y="10">D — delete (allows skipped column)</text>
      </g>
    </g>

    <g transform="translate(540,140)">
      <rect width="320" height="60" fill="#ede9fe" stroke="#7c3aed" rx="4"/>
      <text x="160" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#7c3aed">Inside-outside algorithm</text>
      <text x="160" y="38" text-anchor="middle" font-size="10" fill="#525252">DP scoring on tree structure: O(L³) per CM</text>
      <text x="160" y="54" text-anchor="middle" font-size="9" fill="#525252">Software: Infernal (cmsearch, cmalign); Rfam DB has 4000+ CMs.</text>
    </g>
  </g>

  <!-- Bottom banner -->
  <g transform="translate(80,620)">
    <rect width="1040" height="50" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="520" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">SCFG / CM = HMM with paired-column states — the right model for nested base-pair structure</text>
    <text x="520" y="40" text-anchor="middle" font-size="10" fill="#374151">Sequence-only HMMs miss the structural signal; CMs use covariation between paired columns to find homologs that are unrecognisable at the sequence level alone.</text>
  </g>
</svg>
