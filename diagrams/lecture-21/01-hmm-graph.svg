<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arr1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>
  <rect width="1200" height="540" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">HMM as graph and unrolled-in-time graphical model</text>

  <!-- Top: 4-state HMM graph -->
  <g transform="translate(80,70)">
    <text x="0" y="0" font-size="12" font-weight="700" fill="#1e3a8a">4-state HMM (graph view)</text>
    <!-- States as circles -->
    <g>
      <circle cx="120" cy="80" r="34" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
      <text x="120" y="76" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">S₁</text>
      <text x="120" y="92" text-anchor="middle" font-size="9" fill="#525252" class="mono">π=0.40</text>

      <circle cx="320" cy="80" r="34" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
      <text x="320" y="76" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">S₂</text>
      <text x="320" y="92" text-anchor="middle" font-size="9" fill="#525252" class="mono">π=0.30</text>

      <circle cx="220" cy="220" r="34" fill="#dcfce7" stroke="#065f46" stroke-width="2"/>
      <text x="220" y="216" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">S₃</text>
      <text x="220" y="232" text-anchor="middle" font-size="9" fill="#525252" class="mono">π=0.20</text>

      <circle cx="420" cy="220" r="34" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
      <text x="420" y="216" text-anchor="middle" font-size="14" font-weight="700" fill="#7c3aed">S₄</text>
      <text x="420" y="232" text-anchor="middle" font-size="9" fill="#525252" class="mono">π=0.10</text>
    </g>
    <!-- Transitions -->
    <g stroke="#525252" stroke-width="1.2" fill="none" marker-end="url(#arr1)">
      <path d="M 154 80 Q 220 70 286 80"/>
      <path d="M 286 92 Q 220 110 154 92"/>
      <path d="M 144 110 Q 200 175 196 188"/>
      <path d="M 296 110 Q 380 170 396 192"/>
      <path d="M 254 220 Q 340 235 386 220"/>
      <path d="M 386 220 Q 340 245 254 232"/>
      <!-- self loops -->
      <path d="M 100 50 Q 70 20 130 30 Q 158 56 138 60"/>
      <path d="M 340 50 Q 370 20 308 30 Q 280 56 304 60"/>
      <path d="M 200 250 Q 170 280 230 270 Q 256 256 240 244"/>
      <path d="M 440 250 Q 470 280 408 270 Q 384 256 400 244"/>
    </g>
    <!-- Transition labels -->
    <g class="mono" font-size="9" fill="#374151">
      <text x="220" y="60">a₁₂=0.30</text>
      <text x="220" y="118">a₂₁=0.25</text>
      <text x="160" y="160">a₁₃=0.20</text>
      <text x="362" y="160">a₂₄=0.30</text>
      <text x="320" y="208">a₃₄=0.40</text>
      <text x="320" y="262">a₄₃=0.20</text>
      <text x="80" y="20">a₁₁=0.50</text>
      <text x="320" y="20">a₂₂=0.40</text>
      <text x="180" y="295">a₃₃=0.45</text>
      <text x="380" y="295">a₄₄=0.55</text>
    </g>
    <!-- Emission histograms next to states -->
    <g transform="translate(530,40)" font-size="9" fill="#525252">
      <text x="0" y="0" font-weight="600" fill="#374151">Emissions b_i(x):</text>
      <g transform="translate(0,16)">
        <text x="-4" y="14" text-anchor="end" fill="#1e3a8a">S₁</text>
        <rect x="0" y="2" width="14" height="14" fill="#1e3a8a"/>
        <rect x="16" y="6" width="14" height="10" fill="#1e3a8a" opacity="0.7"/>
        <rect x="32" y="10" width="14" height="6" fill="#1e3a8a" opacity="0.4"/>
        <rect x="48" y="12" width="14" height="4" fill="#1e3a8a" opacity="0.3"/>
        <text x="6" y="32" text-anchor="middle" class="mono">A</text>
        <text x="22" y="32" text-anchor="middle" class="mono">C</text>
        <text x="38" y="32" text-anchor="middle" class="mono">G</text>
        <text x="54" y="32" text-anchor="middle" class="mono">T</text>
      </g>
      <g transform="translate(0,60)">
        <text x="-4" y="14" text-anchor="end" fill="#b45309">S₂</text>
        <rect x="0" y="10" width="14" height="6" fill="#b45309" opacity="0.4"/>
        <rect x="16" y="2" width="14" height="14" fill="#b45309"/>
        <rect x="32" y="4" width="14" height="12" fill="#b45309" opacity="0.85"/>
        <rect x="48" y="10" width="14" height="6" fill="#b45309" opacity="0.4"/>
      </g>
      <g transform="translate(0,90)">
        <text x="-4" y="14" text-anchor="end" fill="#065f46">S₃</text>
        <rect x="0" y="8" width="14" height="8" fill="#065f46" opacity="0.5"/>
        <rect x="16" y="8" width="14" height="8" fill="#065f46" opacity="0.5"/>
        <rect x="32" y="8" width="14" height="8" fill="#065f46" opacity="0.5"/>
        <rect x="48" y="8" width="14" height="8" fill="#065f46" opacity="0.5"/>
        <text x="80" y="14" font-size="8">uniform</text>
      </g>
      <g transform="translate(0,120)">
        <text x="-4" y="14" text-anchor="end" fill="#7c3aed">S₄</text>
        <rect x="0" y="13" width="14" height="3" fill="#7c3aed" opacity="0.3"/>
        <rect x="16" y="13" width="14" height="3" fill="#7c3aed" opacity="0.3"/>
        <rect x="32" y="2" width="14" height="14" fill="#7c3aed"/>
        <rect x="48" y="2" width="14" height="14" fill="#7c3aed"/>
      </g>
    </g>
  </g>

  <!-- Bottom: unrolled chain -->
  <g transform="translate(80,340)">
    <text x="0" y="0" font-size="12" font-weight="700" fill="#0d7377">Unrolled in time (T = 6)</text>
    <!-- States chain -->
    <g>
      <g>
        <circle cx="80" cy="40" r="22" fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
        <text x="80" y="44" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">z₁</text>
      </g>
      <g>
        <circle cx="220" cy="40" r="22" fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
        <text x="220" y="44" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">z₂</text>
      </g>
      <g>
        <circle cx="360" cy="40" r="22" fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
        <text x="360" y="44" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">z₃</text>
      </g>
      <g>
        <circle cx="500" cy="40" r="22" fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
        <text x="500" y="44" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">z₄</text>
      </g>
      <g>
        <circle cx="640" cy="40" r="22" fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
        <text x="640" y="44" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">z₅</text>
      </g>
      <g>
        <circle cx="780" cy="40" r="22" fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
        <text x="780" y="44" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">z₆</text>
      </g>
    </g>
    <!-- Transition arrows -->
    <g stroke="#525252" stroke-width="1.5" fill="none" marker-end="url(#arr1)">
      <line x1="102" y1="40" x2="198" y2="40"/>
      <line x1="242" y1="40" x2="338" y2="40"/>
      <line x1="382" y1="40" x2="478" y2="40"/>
      <line x1="522" y1="40" x2="618" y2="40"/>
      <line x1="662" y1="40" x2="758" y2="40"/>
    </g>
    <g class="mono" font-size="9" fill="#374151">
      <text x="150" y="32" text-anchor="middle">a</text>
      <text x="290" y="32" text-anchor="middle">a</text>
      <text x="430" y="32" text-anchor="middle">a</text>
      <text x="570" y="32" text-anchor="middle">a</text>
      <text x="710" y="32" text-anchor="middle">a</text>
    </g>
    <!-- Observations as squares hanging below -->
    <g>
      <rect x="60" y="100" width="40" height="40" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
      <text x="80" y="125" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">x₁</text>
      <rect x="200" y="100" width="40" height="40" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
      <text x="220" y="125" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">x₂</text>
      <rect x="340" y="100" width="40" height="40" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
      <text x="360" y="125" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">x₃</text>
      <rect x="480" y="100" width="40" height="40" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
      <text x="500" y="125" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">x₄</text>
      <rect x="620" y="100" width="40" height="40" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
      <text x="640" y="125" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">x₅</text>
      <rect x="760" y="100" width="40" height="40" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
      <text x="780" y="125" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">x₆</text>
    </g>
    <!-- Emission edges -->
    <g stroke="#0d7377" stroke-width="1.2" fill="none" stroke-dasharray="3 2" marker-end="url(#arr1)">
      <line x1="80" y1="62" x2="80" y2="98"/>
      <line x1="220" y1="62" x2="220" y2="98"/>
      <line x1="360" y1="62" x2="360" y2="98"/>
      <line x1="500" y1="62" x2="500" y2="98"/>
      <line x1="640" y1="62" x2="640" y2="98"/>
      <line x1="780" y1="62" x2="780" y2="98"/>
    </g>
    <g class="mono" font-size="9" fill="#0d7377">
      <text x="86" y="80">b</text>
    </g>
    <!-- Factorisation annotation -->
    <g transform="translate(870,30)">
      <rect width="240" height="120" fill="#fff" stroke="#d6d3d1" rx="4"/>
      <text x="120" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Joint factorisation</text>
      <line x1="20" y1="32" x2="220" y2="32" stroke="#e7e5e4"/>
      <text x="20" y="56" font-size="11" font-family="JetBrains Mono, monospace" fill="#1e3a8a">P(X, Z) =</text>
      <text x="20" y="76" font-size="11" font-family="JetBrains Mono, monospace" fill="#374151">  π_z₁</text>
      <text x="20" y="92" font-size="11" font-family="JetBrains Mono, monospace" fill="#374151">  · Π a_{z_{t-1}, z_t}</text>
      <text x="20" y="108" font-size="11" font-family="JetBrains Mono, monospace" fill="#374151">  · Π b_z_t(x_t)</text>
    </g>
  </g>
</svg>
