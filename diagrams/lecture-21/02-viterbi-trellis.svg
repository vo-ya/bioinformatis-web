<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Viterbi trellis with backtrace path (4 states × 8 time steps)</text>

  <!-- Trellis -->
  <g transform="translate(120,80)">
    <!-- Time axis -->
    <g class="mono" font-size="10" fill="#525252">
      <text x="0" y="-12" text-anchor="middle">t=1</text>
      <text x="100" y="-12" text-anchor="middle">t=2</text>
      <text x="200" y="-12" text-anchor="middle">t=3</text>
      <text x="300" y="-12" text-anchor="middle">t=4</text>
      <text x="400" y="-12" text-anchor="middle">t=5</text>
      <text x="500" y="-12" text-anchor="middle">t=6</text>
      <text x="600" y="-12" text-anchor="middle">t=7</text>
      <text x="700" y="-12" text-anchor="middle">t=8</text>
    </g>
    <!-- Observations row -->
    <g class="mono" font-size="11" fill="#b45309">
      <text x="0" y="-30" text-anchor="middle" font-weight="700">A</text>
      <text x="100" y="-30" text-anchor="middle" font-weight="700">C</text>
      <text x="200" y="-30" text-anchor="middle" font-weight="700">G</text>
      <text x="300" y="-30" text-anchor="middle" font-weight="700">G</text>
      <text x="400" y="-30" text-anchor="middle" font-weight="700">A</text>
      <text x="500" y="-30" text-anchor="middle" font-weight="700">C</text>
      <text x="600" y="-30" text-anchor="middle" font-weight="700">G</text>
      <text x="700" y="-30" text-anchor="middle" font-weight="700">T</text>
    </g>
    <!-- State labels -->
    <g class="mono" font-size="10" fill="#525252">
      <text x="-30" y="34" text-anchor="end">S₁</text>
      <text x="-30" y="124" text-anchor="end">S₂</text>
      <text x="-30" y="214" text-anchor="end">S₃</text>
      <text x="-30" y="304" text-anchor="end">S₄</text>
    </g>

    <!-- All transition edges (faint) -->
    <g stroke="#9ca3af" stroke-width="0.5" fill="none" opacity="0.4">
      <!-- Sample of edges from t=1 to t=2 (across all 4x4) -->
      <line x1="0" y1="30" x2="100" y2="30"/>
      <line x1="0" y1="30" x2="100" y2="120"/>
      <line x1="0" y1="30" x2="100" y2="210"/>
      <line x1="0" y1="30" x2="100" y2="300"/>
      <line x1="0" y1="120" x2="100" y2="30"/>
      <line x1="0" y1="120" x2="100" y2="120"/>
      <line x1="0" y1="120" x2="100" y2="210"/>
      <line x1="0" y1="120" x2="100" y2="300"/>
      <line x1="0" y1="210" x2="100" y2="30"/>
      <line x1="0" y1="210" x2="100" y2="120"/>
      <line x1="0" y1="210" x2="100" y2="210"/>
      <line x1="0" y1="210" x2="100" y2="300"/>
      <line x1="0" y1="300" x2="100" y2="30"/>
      <line x1="0" y1="300" x2="100" y2="120"/>
      <line x1="0" y1="300" x2="100" y2="210"/>
      <line x1="0" y1="300" x2="100" y2="300"/>
    </g>
    <!-- Replicate this faint mesh across all timesteps -->
    <g stroke="#9ca3af" stroke-width="0.5" fill="none" opacity="0.25">
      <!-- t=2 to t=3 -->
      <line x1="100" y1="30" x2="200" y2="30"/><line x1="100" y1="30" x2="200" y2="120"/>
      <line x1="100" y1="30" x2="200" y2="210"/><line x1="100" y1="30" x2="200" y2="300"/>
      <line x1="100" y1="120" x2="200" y2="30"/><line x1="100" y1="120" x2="200" y2="120"/>
      <line x1="100" y1="120" x2="200" y2="210"/><line x1="100" y1="120" x2="200" y2="300"/>
      <line x1="100" y1="210" x2="200" y2="30"/><line x1="100" y1="210" x2="200" y2="120"/>
      <line x1="100" y1="210" x2="200" y2="210"/><line x1="100" y1="210" x2="200" y2="300"/>
      <line x1="100" y1="300" x2="200" y2="30"/><line x1="100" y1="300" x2="200" y2="120"/>
      <line x1="100" y1="300" x2="200" y2="210"/><line x1="100" y1="300" x2="200" y2="300"/>
      <!-- t=3 to t=4 -->
      <line x1="200" y1="30" x2="300" y2="30"/><line x1="200" y1="30" x2="300" y2="120"/>
      <line x1="200" y1="30" x2="300" y2="210"/><line x1="200" y1="30" x2="300" y2="300"/>
      <line x1="200" y1="120" x2="300" y2="30"/><line x1="200" y1="120" x2="300" y2="120"/>
      <line x1="200" y1="120" x2="300" y2="210"/><line x1="200" y1="120" x2="300" y2="300"/>
      <line x1="200" y1="210" x2="300" y2="30"/><line x1="200" y1="210" x2="300" y2="120"/>
      <line x1="200" y1="210" x2="300" y2="210"/><line x1="200" y1="210" x2="300" y2="300"/>
      <line x1="200" y1="300" x2="300" y2="30"/><line x1="200" y1="300" x2="300" y2="120"/>
      <line x1="200" y1="300" x2="300" y2="210"/><line x1="200" y1="300" x2="300" y2="300"/>
      <!-- t=4 to t=5 -->
      <line x1="300" y1="30" x2="400" y2="30"/><line x1="300" y1="30" x2="400" y2="120"/>
      <line x1="300" y1="30" x2="400" y2="210"/><line x1="300" y1="30" x2="400" y2="300"/>
      <line x1="300" y1="120" x2="400" y2="30"/><line x1="300" y1="120" x2="400" y2="120"/>
      <line x1="300" y1="120" x2="400" y2="210"/><line x1="300" y1="120" x2="400" y2="300"/>
      <line x1="300" y1="210" x2="400" y2="30"/><line x1="300" y1="210" x2="400" y2="120"/>
      <line x1="300" y1="210" x2="400" y2="210"/><line x1="300" y1="210" x2="400" y2="300"/>
      <line x1="300" y1="300" x2="400" y2="30"/><line x1="300" y1="300" x2="400" y2="120"/>
      <line x1="300" y1="300" x2="400" y2="210"/><line x1="300" y1="300" x2="400" y2="300"/>
      <!-- t=5..7 -->
      <line x1="400" y1="30" x2="500" y2="30"/><line x1="400" y1="30" x2="500" y2="120"/>
      <line x1="400" y1="120" x2="500" y2="120"/><line x1="400" y1="120" x2="500" y2="210"/>
      <line x1="400" y1="210" x2="500" y2="30"/><line x1="400" y1="210" x2="500" y2="210"/>
      <line x1="400" y1="300" x2="500" y2="300"/>
      <line x1="500" y1="30" x2="600" y2="30"/><line x1="500" y1="120" x2="600" y2="120"/>
      <line x1="500" y1="120" x2="600" y2="210"/><line x1="500" y1="210" x2="600" y2="30"/>
      <line x1="600" y1="30" x2="700" y2="30"/><line x1="600" y1="30" x2="700" y2="300"/>
      <line x1="600" y1="120" x2="700" y2="120"/><line x1="600" y1="210" x2="700" y2="210"/>
    </g>

    <!-- Cells colored by log-delta intensity (4 rows x 8 cols) -->
    <g>
      <!-- Row 1 / S₁ -->
      <circle cx="0" cy="30" r="14" fill="#1e3a8a" opacity="0.85"/>
      <circle cx="100" cy="30" r="14" fill="#1e3a8a" opacity="0.65"/>
      <circle cx="200" cy="30" r="14" fill="#1e3a8a" opacity="0.4"/>
      <circle cx="300" cy="30" r="14" fill="#1e3a8a" opacity="0.3"/>
      <circle cx="400" cy="30" r="14" fill="#1e3a8a" opacity="0.5"/>
      <circle cx="500" cy="30" r="14" fill="#1e3a8a" opacity="0.45"/>
      <circle cx="600" cy="30" r="14" fill="#1e3a8a" opacity="0.3"/>
      <circle cx="700" cy="30" r="14" fill="#1e3a8a" opacity="0.25"/>
      <!-- Row 2 / S₂ -->
      <circle cx="0" cy="120" r="14" fill="#b45309" opacity="0.5"/>
      <circle cx="100" cy="120" r="14" fill="#b45309" opacity="0.85"/>
      <circle cx="200" cy="120" r="14" fill="#b45309" opacity="0.55"/>
      <circle cx="300" cy="120" r="14" fill="#b45309" opacity="0.45"/>
      <circle cx="400" cy="120" r="14" fill="#b45309" opacity="0.35"/>
      <circle cx="500" cy="120" r="14" fill="#b45309" opacity="0.55"/>
      <circle cx="600" cy="120" r="14" fill="#b45309" opacity="0.4"/>
      <circle cx="700" cy="120" r="14" fill="#b45309" opacity="0.3"/>
      <!-- Row 3 / S₃ -->
      <circle cx="0" cy="210" r="14" fill="#065f46" opacity="0.4"/>
      <circle cx="100" cy="210" r="14" fill="#065f46" opacity="0.55"/>
      <circle cx="200" cy="210" r="14" fill="#065f46" opacity="0.85"/>
      <circle cx="300" cy="210" r="14" fill="#065f46" opacity="0.85"/>
      <circle cx="400" cy="210" r="14" fill="#065f46" opacity="0.55"/>
      <circle cx="500" cy="210" r="14" fill="#065f46" opacity="0.4"/>
      <circle cx="600" cy="210" r="14" fill="#065f46" opacity="0.85"/>
      <circle cx="700" cy="210" r="14" fill="#065f46" opacity="0.5"/>
      <!-- Row 4 / S₄ -->
      <circle cx="0" cy="300" r="14" fill="#7c3aed" opacity="0.3"/>
      <circle cx="100" cy="300" r="14" fill="#7c3aed" opacity="0.4"/>
      <circle cx="200" cy="300" r="14" fill="#7c3aed" opacity="0.5"/>
      <circle cx="300" cy="300" r="14" fill="#7c3aed" opacity="0.45"/>
      <circle cx="400" cy="300" r="14" fill="#7c3aed" opacity="0.35"/>
      <circle cx="500" cy="300" r="14" fill="#7c3aed" opacity="0.55"/>
      <circle cx="600" cy="300" r="14" fill="#7c3aed" opacity="0.4"/>
      <circle cx="700" cy="300" r="14" fill="#7c3aed" opacity="0.85"/>
    </g>

    <!-- Backtrace path (bold red) -->
    <g stroke="#dc2626" stroke-width="3.5" fill="none" stroke-linecap="round">
      <line x1="0" y1="30" x2="100" y2="120"/>
      <line x1="100" y1="120" x2="200" y2="210"/>
      <line x1="200" y1="210" x2="300" y2="210"/>
      <line x1="300" y1="210" x2="400" y2="120"/>
      <line x1="400" y1="120" x2="500" y2="120"/>
      <line x1="500" y1="120" x2="600" y2="210"/>
      <line x1="600" y1="210" x2="700" y2="300"/>
    </g>
    <g fill="#dc2626">
      <circle cx="0" cy="30" r="6"/>
      <circle cx="100" cy="120" r="6"/>
      <circle cx="200" cy="210" r="6"/>
      <circle cx="300" cy="210" r="6"/>
      <circle cx="400" cy="120" r="6"/>
      <circle cx="500" cy="120" r="6"/>
      <circle cx="600" cy="210" r="6"/>
      <circle cx="700" cy="300" r="6"/>
    </g>
    <text x="700" y="320" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="700" class="mono">backtrace path</text>
  </g>

  <!-- Side panel: pseudocode -->
  <g transform="translate(900,100)">
    <rect width="260" height="260" fill="#fff" stroke="#d6d3d1" rx="4"/>
    <text x="130" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Viterbi recurrence</text>
    <line x1="20" y1="32" x2="240" y2="32" stroke="#e7e5e4"/>
    <g class="mono" font-size="10" fill="#374151">
      <text x="20" y="56">init:</text>
      <text x="32" y="74" fill="#1e3a8a">δ₁(i) = π_i · b_i(x₁)</text>
      <text x="20" y="100">recurse for t = 2..T:</text>
      <text x="32" y="118" fill="#1e3a8a">δ_t(j) = b_j(x_t)</text>
      <text x="32" y="134" fill="#1e3a8a">       · max_i [δ_{t-1}(i) · a_ij]</text>
      <text x="32" y="150" fill="#525252">ψ_t(j) = argmax_i [...]</text>
      <text x="20" y="174">terminate:</text>
      <text x="32" y="192" fill="#dc2626">z_T* = argmax_i δ_T(i)</text>
      <text x="20" y="216">backtrack:</text>
      <text x="32" y="234" fill="#dc2626">z_t* = ψ_{t+1}(z_{t+1}*)</text>
    </g>
  </g>

  <!-- Bottom banner -->
  <g transform="translate(120,500)">
    <rect width="780" height="60" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="390" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Viterbi = max-plus DP on the trellis; same machinery as pairwise alignment</text>
    <text x="390" y="42" text-anchor="middle" font-size="10" fill="#374151">Each cell stores the best path ending there. Pointers ψ enable backtrace. Time O(TK²); space O(TK).</text>
  </g>
</svg>
