<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; }</style>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Profile HMM: MSA → 3-state-per-column model (HMMER architecture)</text>

  <!-- Top: MSA -->
  <g transform="translate(160,70)">
    <text x="0" y="0" font-size="12" font-weight="700" fill="#374151">5-row MSA (8 columns)</text>
    <g font-family="JetBrains Mono, monospace" font-size="14" font-weight="600">
      <text x="0" y="22" fill="#525252">cuc:  </text>
      <text x="60" y="22" fill="#1e3a8a">V</text>
      <text x="100" y="22" fill="#1e3a8a">L</text>
      <text x="140" y="22" fill="#1e3a8a">S</text>
      <text x="180" y="22" fill="#1e3a8a">A</text>
      <text x="220" y="22" fill="#1e3a8a">D</text>
      <text x="260" y="22" fill="#1e3a8a">E</text>
      <text x="300" y="22" fill="#9ca3af">-</text>
      <text x="340" y="22" fill="#1e3a8a">K</text>

      <text x="0" y="44" fill="#525252">lam:  </text>
      <text x="60" y="44" fill="#0d7377">P</text>
      <text x="100" y="44" fill="#1e3a8a">L</text>
      <text x="140" y="44" fill="#1e3a8a">S</text>
      <text x="180" y="44" fill="#1e3a8a">A</text>
      <text x="220" y="44" fill="#0d7377">A</text>
      <text x="260" y="44" fill="#1e3a8a">E</text>
      <text x="300" y="44" fill="#7c3aed">K</text>
      <text x="340" y="44" fill="#1e3a8a">T</text>

      <text x="0" y="66" fill="#525252">chk:  </text>
      <text x="60" y="66" fill="#1e3a8a">V</text>
      <text x="100" y="66" fill="#1e3a8a">L</text>
      <text x="140" y="66" fill="#1e3a8a">S</text>
      <text x="180" y="66" fill="#1e3a8a">A</text>
      <text x="220" y="66" fill="#0d7377">A</text>
      <text x="260" y="66" fill="#9ca3af">-</text>
      <text x="300" y="66" fill="#1e3a8a">D</text>
      <text x="340" y="66" fill="#1e3a8a">K</text>

      <text x="0" y="88" fill="#525252">mse:  </text>
      <text x="60" y="88" fill="#1e3a8a">V</text>
      <text x="100" y="88" fill="#0d7377">H</text>
      <text x="140" y="88" fill="#1e3a8a">L</text>
      <text x="180" y="88" fill="#1e3a8a">T</text>
      <text x="220" y="88" fill="#1e3a8a">D</text>
      <text x="260" y="88" fill="#1e3a8a">A</text>
      <text x="300" y="88" fill="#1e3a8a">E</text>
      <text x="340" y="88" fill="#1e3a8a">K</text>

      <text x="0" y="110" fill="#525252">hum:  </text>
      <text x="60" y="110" fill="#1e3a8a">V</text>
      <text x="100" y="110" fill="#0d7377">H</text>
      <text x="140" y="110" fill="#1e3a8a">L</text>
      <text x="180" y="110" fill="#1e3a8a">T</text>
      <text x="220" y="110" fill="#0d7377">P</text>
      <text x="260" y="110" fill="#1e3a8a">E</text>
      <text x="300" y="110" fill="#1e3a8a">E</text>
      <text x="340" y="110" fill="#1e3a8a">K</text>
    </g>
    <!-- Column labels -->
    <g class="mono" font-size="10" fill="#525252">
      <text x="68" y="-10" text-anchor="middle">M₁</text>
      <text x="108" y="-10" text-anchor="middle">M₂</text>
      <text x="148" y="-10" text-anchor="middle">M₃</text>
      <text x="188" y="-10" text-anchor="middle">M₄</text>
      <text x="228" y="-10" text-anchor="middle">M₅</text>
      <text x="268" y="-10" text-anchor="middle">M₆</text>
      <text x="308" y="-10" text-anchor="middle">M₇</text>
      <text x="348" y="-10" text-anchor="middle">M₈</text>
    </g>
  </g>

  <!-- Bottom: profile HMM -->
  <g transform="translate(80,260)">
    <text x="0" y="0" font-size="12" font-weight="700" fill="#1e3a8a">Profile HMM (8 columns)</text>

    <!-- B and E states -->
    <circle cx="40" cy="120" r="18" fill="#fff" stroke="#525252" stroke-width="2"/>
    <text x="40" y="124" text-anchor="middle" font-size="11" font-weight="700" fill="#525252">B</text>

    <circle cx="1080" cy="120" r="18" fill="#fff" stroke="#525252" stroke-width="2"/>
    <text x="1080" y="124" text-anchor="middle" font-size="11" font-weight="700" fill="#525252">E</text>

    <!-- 8 match states with emission histograms -->
    <g>
      <g transform="translate(120,90)">
        <rect x="0" y="0" width="50" height="60" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" rx="3"/>
        <text x="25" y="14" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">M₁</text>
        <rect x="6" y="20" width="6" height="34" fill="#1e3a8a"/>
        <rect x="14" y="48" width="6" height="6" fill="#1e3a8a" opacity="0.5"/>
        <rect x="22" y="48" width="6" height="6" fill="#1e3a8a" opacity="0.5"/>
        <rect x="30" y="48" width="6" height="6" fill="#1e3a8a" opacity="0.5"/>
        <rect x="38" y="48" width="6" height="6" fill="#1e3a8a" opacity="0.5"/>
      </g>
      <g transform="translate(240,90)">
        <rect x="0" y="0" width="50" height="60" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" rx="3"/>
        <text x="25" y="14" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">M₂</text>
        <rect x="6" y="22" width="6" height="32" fill="#1e3a8a"/>
        <rect x="14" y="34" width="6" height="20" fill="#1e3a8a" opacity="0.6"/>
        <rect x="22" y="48" width="6" height="6" fill="#1e3a8a" opacity="0.4"/>
        <rect x="30" y="46" width="6" height="8" fill="#1e3a8a" opacity="0.4"/>
        <rect x="38" y="48" width="6" height="6" fill="#1e3a8a" opacity="0.4"/>
      </g>
      <g transform="translate(360,90)">
        <rect x="0" y="0" width="50" height="60" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" rx="3"/>
        <text x="25" y="14" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">M₃</text>
        <rect x="6" y="22" width="6" height="32" fill="#1e3a8a"/>
        <rect x="14" y="36" width="6" height="18" fill="#1e3a8a" opacity="0.5"/>
        <rect x="22" y="48" width="6" height="6" fill="#1e3a8a" opacity="0.3"/>
        <rect x="30" y="48" width="6" height="6" fill="#1e3a8a" opacity="0.3"/>
        <rect x="38" y="48" width="6" height="6" fill="#1e3a8a" opacity="0.3"/>
      </g>
      <g transform="translate(480,90)">
        <rect x="0" y="0" width="50" height="60" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" rx="3"/>
        <text x="25" y="14" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">M₄</text>
        <rect x="6" y="22" width="6" height="32" fill="#1e3a8a"/>
        <rect x="14" y="32" width="6" height="22" fill="#1e3a8a" opacity="0.6"/>
        <rect x="22" y="48" width="6" height="6" fill="#1e3a8a" opacity="0.4"/>
        <rect x="30" y="48" width="6" height="6" fill="#1e3a8a" opacity="0.4"/>
        <rect x="38" y="48" width="6" height="6" fill="#1e3a8a" opacity="0.3"/>
      </g>
      <g transform="translate(600,90)">
        <rect x="0" y="0" width="50" height="60" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" rx="3"/>
        <text x="25" y="14" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">M₅</text>
        <rect x="6" y="38" width="6" height="16" fill="#1e3a8a" opacity="0.5"/>
        <rect x="14" y="42" width="6" height="12" fill="#1e3a8a" opacity="0.5"/>
        <rect x="22" y="46" width="6" height="8" fill="#1e3a8a" opacity="0.5"/>
        <rect x="30" y="40" width="6" height="14" fill="#1e3a8a" opacity="0.5"/>
        <rect x="38" y="44" width="6" height="10" fill="#1e3a8a" opacity="0.4"/>
        <text x="25" y="78" text-anchor="middle" font-size="8" fill="#525252">variable</text>
      </g>
      <g transform="translate(720,90)">
        <rect x="0" y="0" width="50" height="60" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" rx="3"/>
        <text x="25" y="14" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">M₆</text>
        <rect x="6" y="22" width="6" height="32" fill="#1e3a8a"/>
        <rect x="14" y="44" width="6" height="10" fill="#1e3a8a" opacity="0.4"/>
        <rect x="22" y="48" width="6" height="6" fill="#1e3a8a" opacity="0.3"/>
        <rect x="30" y="48" width="6" height="6" fill="#1e3a8a" opacity="0.3"/>
        <rect x="38" y="48" width="6" height="6" fill="#1e3a8a" opacity="0.3"/>
      </g>
      <g transform="translate(840,90)">
        <rect x="0" y="0" width="50" height="60" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" rx="3"/>
        <text x="25" y="14" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">M₇</text>
        <rect x="6" y="32" width="6" height="22" fill="#1e3a8a" opacity="0.6"/>
        <rect x="14" y="34" width="6" height="20" fill="#1e3a8a" opacity="0.55"/>
        <rect x="22" y="38" width="6" height="16" fill="#1e3a8a" opacity="0.5"/>
        <rect x="30" y="46" width="6" height="8" fill="#1e3a8a" opacity="0.4"/>
        <rect x="38" y="46" width="6" height="8" fill="#1e3a8a" opacity="0.4"/>
      </g>
      <g transform="translate(960,90)">
        <rect x="0" y="0" width="50" height="60" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" rx="3"/>
        <text x="25" y="14" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">M₈</text>
        <rect x="6" y="22" width="6" height="32" fill="#1e3a8a"/>
        <rect x="14" y="36" width="6" height="18" fill="#1e3a8a" opacity="0.55"/>
        <rect x="22" y="48" width="6" height="6" fill="#1e3a8a" opacity="0.3"/>
        <rect x="30" y="48" width="6" height="6" fill="#1e3a8a" opacity="0.3"/>
        <rect x="38" y="48" width="6" height="6" fill="#1e3a8a" opacity="0.3"/>
      </g>
    </g>

    <!-- Match → match transitions -->
    <g stroke="#1e3a8a" stroke-width="1.5" fill="none" marker-end="url(#arr3)">
      <line x1="58" y1="120" x2="118" y2="120"/>
      <line x1="170" y1="120" x2="238" y2="120"/>
      <line x1="290" y1="120" x2="358" y2="120"/>
      <line x1="410" y1="120" x2="478" y2="120"/>
      <line x1="530" y1="120" x2="598" y2="120"/>
      <line x1="650" y1="120" x2="718" y2="120"/>
      <line x1="770" y1="120" x2="838" y2="120"/>
      <line x1="890" y1="120" x2="958" y2="120"/>
      <line x1="1010" y1="120" x2="1062" y2="120"/>
    </g>

    <!-- Insert states above (diamonds) -->
    <g>
      <g transform="translate(205,40)">
        <rect x="-12" y="-12" width="24" height="24" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" transform="rotate(45)"/>
        <text x="0" y="4" text-anchor="middle" font-size="10" font-weight="700" fill="#b45309">I₁</text>
      </g>
      <g transform="translate(325,40)">
        <rect x="-12" y="-12" width="24" height="24" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" transform="rotate(45)"/>
        <text x="0" y="4" text-anchor="middle" font-size="10" font-weight="700" fill="#b45309">I₂</text>
      </g>
      <g transform="translate(565,40)">
        <rect x="-12" y="-12" width="24" height="24" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" transform="rotate(45)"/>
        <text x="0" y="4" text-anchor="middle" font-size="10" font-weight="700" fill="#b45309">I₅</text>
      </g>
      <g transform="translate(805,40)">
        <rect x="-12" y="-12" width="24" height="24" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" transform="rotate(45)"/>
        <text x="0" y="4" text-anchor="middle" font-size="10" font-weight="700" fill="#b45309">I₇</text>
      </g>
    </g>

    <!-- M->I and I->M arrows (light) -->
    <g stroke="#b45309" stroke-width="1" fill="none" stroke-dasharray="3 2">
      <path d="M 165 90 Q 185 60 200 50"/>
      <path d="M 215 50 Q 230 60 245 90"/>
      <path d="M 285 90 Q 305 60 320 50"/>
      <path d="M 335 50 Q 350 60 365 90"/>
      <path d="M 525 90 Q 545 60 560 50"/>
      <path d="M 575 50 Q 590 60 605 90"/>
      <path d="M 765 90 Q 785 60 800 50"/>
      <path d="M 815 50 Q 830 60 845 90"/>
    </g>

    <!-- Delete states below (small circles) -->
    <g>
      <g><circle cx="205" cy="200" r="11" fill="#fee2e2" stroke="#7f1d1d" stroke-width="1.5"/>
         <text x="205" y="204" text-anchor="middle" font-size="10" font-weight="700" fill="#7f1d1d">D₂</text></g>
      <g><circle cx="445" cy="200" r="11" fill="#fee2e2" stroke="#7f1d1d" stroke-width="1.5"/>
         <text x="445" y="204" text-anchor="middle" font-size="10" font-weight="700" fill="#7f1d1d">D₄</text></g>
      <g><circle cx="685" cy="200" r="11" fill="#fee2e2" stroke="#7f1d1d" stroke-width="1.5"/>
         <text x="685" y="204" text-anchor="middle" font-size="10" font-weight="700" fill="#7f1d1d">D₆</text></g>
      <g><circle cx="925" cy="200" r="11" fill="#fee2e2" stroke="#7f1d1d" stroke-width="1.5"/>
         <text x="925" y="204" text-anchor="middle" font-size="10" font-weight="700" fill="#7f1d1d">D₈</text></g>
    </g>

    <!-- M->D and D->M bypass arrows -->
    <g stroke="#7f1d1d" stroke-width="1" fill="none" stroke-dasharray="3 2">
      <path d="M 145 150 Q 175 180 195 195"/>
      <path d="M 215 195 Q 235 180 255 150"/>
      <path d="M 385 150 Q 415 180 435 195"/>
      <path d="M 455 195 Q 475 180 495 150"/>
      <path d="M 625 150 Q 655 180 675 195"/>
      <path d="M 695 195 Q 715 180 735 150"/>
      <path d="M 865 150 Q 895 180 915 195"/>
      <path d="M 935 195 Q 955 180 975 150"/>
    </g>

    <!-- Self-loop on insert -->
    <g stroke="#b45309" stroke-width="1" fill="none">
      <path d="M 195 30 Q 175 20 195 28"/>
      <path d="M 315 30 Q 295 20 315 28"/>
      <path d="M 555 30 Q 535 20 555 28"/>
      <path d="M 795 30 Q 775 20 795 28"/>
    </g>

    <!-- Legend -->
    <g transform="translate(60,310)" font-size="10" fill="#374151">
      <text x="0" y="0" font-weight="700">Legend:</text>
      <rect x="60" y="-10" width="14" height="14" fill="#dbeafe" stroke="#1e3a8a"/>
      <text x="80" y="2">M (match — emit one residue, position-specific composition)</text>
      <rect x="60" y="12" width="14" height="14" fill="#fef3c7" stroke="#b45309"/>
      <text x="80" y="24">I (insert — emit one or more residues; self-loop allowed)</text>
      <circle cx="67" cy="42" r="7" fill="#fee2e2" stroke="#7f1d1d"/>
      <text x="80" y="46">D (delete — skip the column, no emission)</text>
    </g>
  </g>

  <!-- Right-side annotation — y dropped from 300 to 190 so the green box sits
       in the empty band between the MSA (ends abs y=180) and the Profile HMM
       title (abs y=260). Previously the box at abs y=300-360 cut into the
       Match-state row that starts at abs y=350. -->
  <g transform="translate(910,190)">
    <rect width="240" height="60" fill="#dcfce7" stroke="#065f46" rx="4"/>
    <text x="120" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">Match emissions = column composition</text>
    <text x="120" y="40" text-anchor="middle" font-size="10" fill="#374151">Transitions = gap statistics</text>
  </g>
</svg>
