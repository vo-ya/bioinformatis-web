<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="540" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">HMM vs deep learning — accuracy as a function of training set size</text>

  <!-- Plot area -->
  <g transform="translate(140,80)">
    <rect width="800" height="380" fill="#fff" stroke="#d6d3d1"/>
    <!-- Grid -->
    <g stroke="#e7e5e4" stroke-width="0.5">
      <line x1="0" y1="76" x2="800" y2="76"/>
      <line x1="0" y1="152" x2="800" y2="152"/>
      <line x1="0" y1="228" x2="800" y2="228"/>
      <line x1="0" y1="304" x2="800" y2="304"/>
      <line x1="114" y1="0" x2="114" y2="380"/>
      <line x1="228" y1="0" x2="228" y2="380"/>
      <line x1="342" y1="0" x2="342" y2="380"/>
      <line x1="456" y1="0" x2="456" y2="380"/>
      <line x1="570" y1="0" x2="570" y2="380"/>
      <line x1="684" y1="0" x2="684" y2="380"/>
    </g>

    <!-- X-axis labels (training set size, log scale 10²–10⁹) -->
    <g class="mono" font-size="10" fill="#525252">
      <text x="0" y="396" text-anchor="middle">10²</text>
      <text x="114" y="396" text-anchor="middle">10³</text>
      <text x="228" y="396" text-anchor="middle">10⁴</text>
      <text x="342" y="396" text-anchor="middle">10⁵</text>
      <text x="456" y="396" text-anchor="middle">10⁶</text>
      <text x="570" y="396" text-anchor="middle">10⁷</text>
      <text x="684" y="396" text-anchor="middle">10⁸</text>
      <text x="800" y="396" text-anchor="middle">10⁹</text>
    </g>
    <text x="400" y="416" text-anchor="middle" font-size="11" fill="#525252">training-set size (labelled examples, log scale)</text>

    <!-- Y-axis labels -->
    <g class="mono" font-size="10" fill="#525252">
      <text x="-10" y="384" text-anchor="end">0.50</text>
      <text x="-10" y="308" text-anchor="end">0.65</text>
      <text x="-10" y="232" text-anchor="end">0.80</text>
      <text x="-10" y="156" text-anchor="end">0.90</text>
      <text x="-10" y="80" text-anchor="end">0.95</text>
      <text x="-10" y="4" text-anchor="end">1.00</text>
    </g>
    <text x="-70" y="190" text-anchor="middle" font-size="11" fill="#525252" transform="rotate(-90 -70 190)">prediction accuracy</text>

    <!-- HMM curve (cobalt) — rises early, plateaus -->
    <path d="M 0 200 L 50 160 L 114 130 L 200 110 L 300 100 L 400 96 L 500 96 L 600 96 L 700 96 L 800 96"
          stroke="#1e3a8a" stroke-width="3" fill="none"/>
    <text x="800" y="92" text-anchor="end" font-size="11" font-weight="700" fill="#1e3a8a" class="mono">HMM (plateau)</text>

    <!-- DL curve (red) — rises late, exceeds HMM -->
    <path d="M 0 350 L 50 340 L 114 310 L 200 260 L 300 200 L 400 130 L 500 80 L 600 50 L 700 30 L 800 18"
          stroke="#dc2626" stroke-width="3" fill="none"/>
    <text x="800" y="14" text-anchor="end" font-size="11" font-weight="700" fill="#dc2626" class="mono">deep learning</text>

    <!-- Crossover region -->
    <line x1="370" y1="0" x2="370" y2="380" stroke="#525252" stroke-dasharray="3 3" opacity="0.5"/>
    <text x="370" y="-6" text-anchor="middle" font-size="10" font-weight="700" fill="#525252">crossover ≈ 10⁵</text>

    <!-- Annotated example points -->
    <g>
      <circle cx="50" cy="160" r="5" fill="#1e3a8a"/>
      <text x="56" y="156" font-size="9" fill="#1e3a8a" class="mono">Pfam HMM</text>

      <circle cx="200" cy="110" r="5" fill="#1e3a8a"/>
      <text x="206" y="106" font-size="9" fill="#1e3a8a" class="mono">ChromHMM</text>

      <circle cx="500" cy="80" r="5" fill="#dc2626"/>
      <text x="506" y="76" font-size="9" fill="#dc2626" class="mono">SpliceAI</text>

      <circle cx="700" cy="30" r="5" fill="#dc2626"/>
      <text x="700" y="22" text-anchor="end" font-size="9" fill="#dc2626" class="mono">Enformer</text>
    </g>
  </g>

  <!-- Side annotations -->
  <g transform="translate(960,100)">
    <rect width="220" height="160" fill="#fff" stroke="#d6d3d1" rx="4"/>
    <text x="110" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">HMM regime</text>
    <line x1="20" y1="32" x2="200" y2="32" stroke="#e7e5e4"/>
    <g transform="translate(20,46)" font-size="10" fill="#374151">
      <text x="0" y="0">• Limited labelled data</text>
      <text x="0" y="16">• Interpretable annotation</text>
      <text x="0" y="32">• Sparse, well-defined states</text>
      <text x="0" y="48">• Small per-task budget</text>
      <text x="0" y="64">• Examples: Pfam,</text>
      <text x="0" y="78">  ChromHMM, GENSCAN</text>
    </g>
  </g>
  <g transform="translate(960,290)">
    <rect width="220" height="160" fill="#fff" stroke="#d6d3d1" rx="4"/>
    <text x="110" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">Deep learning regime</text>
    <line x1="20" y1="32" x2="200" y2="32" stroke="#e7e5e4"/>
    <g transform="translate(20,46)" font-size="10" fill="#374151">
      <text x="0" y="0">• Abundant labelled data</text>
      <text x="0" y="16">• Long-range deps matter</text>
      <text x="0" y="32">• Continuous outputs</text>
      <text x="0" y="48">• GPU budget available</text>
      <text x="0" y="64">• Examples: SpliceAI,</text>
      <text x="0" y="78">  Enformer, AlphaFold</text>
    </g>
  </g>

  <!-- Bottom banner -->
  <g transform="translate(140,490)">
    <rect width="800" height="40" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="400" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Crossover at ~10⁵ labelled examples; most genomic-classification tasks sit near it. Hybrid (HMM + DL) is the modern default.</text>
  </g>
</svg>
