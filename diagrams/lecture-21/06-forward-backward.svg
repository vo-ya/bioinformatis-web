<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arrFwd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e3a8a"/>
    </marker>
    <marker id="arrBwd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
    <marker id="arrEm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0d7377"/>
    </marker>
  </defs>
  <rect width="1200" height="540" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Forward-backward as belief propagation on a chain</text>

  <!-- Chain of states -->
  <g transform="translate(120,160)">
    <!-- Hidden states -->
    <g>
      <circle cx="0" cy="0" r="26" fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
      <text x="0" y="4" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">z₁</text>
    </g>
    <g>
      <circle cx="180" cy="0" r="26" fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
      <text x="180" y="4" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">z₂</text>
    </g>
    <g>
      <circle cx="360" cy="0" r="26" fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
      <text x="360" y="4" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">z₃</text>
    </g>
    <g>
      <circle cx="540" cy="0" r="26" fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
      <text x="540" y="4" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">z₄</text>
    </g>
    <g>
      <circle cx="720" cy="0" r="26" fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
      <text x="720" y="4" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">z₅</text>
    </g>
    <g>
      <circle cx="900" cy="0" r="26" fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
      <text x="900" y="4" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">z₆</text>
    </g>

    <!-- Forward messages (top) -->
    <g stroke="#1e3a8a" stroke-width="2.5" fill="none" marker-end="url(#arrFwd)">
      <path d="M 26 -8 Q 90 -28 154 -8"/>
      <path d="M 206 -8 Q 270 -28 334 -8"/>
      <path d="M 386 -8 Q 450 -28 514 -8"/>
      <path d="M 566 -8 Q 630 -28 694 -8"/>
      <path d="M 746 -8 Q 810 -28 874 -8"/>
    </g>
    <g class="mono" font-size="10" fill="#1e3a8a" font-weight="700">
      <text x="90" y="-34" text-anchor="middle">α₁→₂</text>
      <text x="270" y="-34" text-anchor="middle">α₂→₃</text>
      <text x="450" y="-34" text-anchor="middle">α₃→₄</text>
      <text x="630" y="-34" text-anchor="middle">α₄→₅</text>
      <text x="810" y="-34" text-anchor="middle">α₅→₆</text>
    </g>
    <text x="450" y="-58" text-anchor="middle" font-size="11" fill="#1e3a8a" font-weight="700">Forward pass — messages from past</text>

    <!-- Backward messages (bottom side, return arrows) -->
    <g stroke="#b45309" stroke-width="2.5" fill="none" marker-end="url(#arrBwd)">
      <path d="M 874 24 Q 810 44 746 24"/>
      <path d="M 694 24 Q 630 44 566 24"/>
      <path d="M 514 24 Q 450 44 386 24"/>
      <path d="M 334 24 Q 270 44 206 24"/>
      <path d="M 154 24 Q 90 44 26 24"/>
    </g>
    <g class="mono" font-size="10" fill="#b45309" font-weight="700">
      <text x="810" y="56" text-anchor="middle">β₆→₅</text>
      <text x="630" y="56" text-anchor="middle">β₅→₄</text>
      <text x="450" y="56" text-anchor="middle">β₄→₃</text>
      <text x="270" y="56" text-anchor="middle">β₃→₂</text>
      <text x="90" y="56" text-anchor="middle">β₂→₁</text>
    </g>
    <text x="450" y="80" text-anchor="middle" font-size="11" fill="#b45309" font-weight="700">Backward pass — messages from future</text>
  </g>

  <!-- Observations row -->
  <g transform="translate(120,260)">
    <g>
      <rect x="-16" y="0" width="32" height="32" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="3"/>
      <text x="0" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">x₁</text>
    </g>
    <g>
      <rect x="164" y="0" width="32" height="32" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="3"/>
      <text x="180" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">x₂</text>
    </g>
    <g>
      <rect x="344" y="0" width="32" height="32" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="3"/>
      <text x="360" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">x₃</text>
    </g>
    <g>
      <rect x="524" y="0" width="32" height="32" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="3"/>
      <text x="540" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">x₄</text>
    </g>
    <g>
      <rect x="704" y="0" width="32" height="32" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="3"/>
      <text x="720" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">x₅</text>
    </g>
    <g>
      <rect x="884" y="0" width="32" height="32" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="3"/>
      <text x="900" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">x₆</text>
    </g>
    <!-- Emission edges -->
    <g stroke="#0d7377" stroke-width="1.2" stroke-dasharray="3 2" fill="none" marker-end="url(#arrEm)">
      <line x1="0" y1="-72" x2="0" y2="-2"/>
      <line x1="180" y1="-72" x2="180" y2="-2"/>
      <line x1="360" y1="-72" x2="360" y2="-2"/>
      <line x1="540" y1="-72" x2="540" y2="-2"/>
      <line x1="720" y1="-72" x2="720" y2="-2"/>
      <line x1="900" y1="-72" x2="900" y2="-2"/>
    </g>
  </g>

  <!-- Per-position posterior γ (combination) -->
  <g transform="translate(120,360)">
    <text x="0" y="0" font-size="12" font-weight="700" fill="#7c3aed">Per-position posterior γ_t = α_t · β_t / P(X)</text>
    <g transform="translate(0,16)">
      <!-- 6 cells showing colour intensity = posterior strength -->
      <rect x="-30" y="0" width="60" height="30" fill="#7c3aed" opacity="0.7"/>
      <rect x="150" y="0" width="60" height="30" fill="#7c3aed" opacity="0.4"/>
      <rect x="330" y="0" width="60" height="30" fill="#7c3aed" opacity="0.85"/>
      <rect x="510" y="0" width="60" height="30" fill="#7c3aed" opacity="0.6"/>
      <rect x="690" y="0" width="60" height="30" fill="#7c3aed" opacity="0.45"/>
      <rect x="870" y="0" width="60" height="30" fill="#7c3aed" opacity="0.75"/>
      <text x="0" y="20" text-anchor="middle" font-size="10" fill="#fff" font-weight="700" class="mono">γ₁</text>
      <text x="180" y="20" text-anchor="middle" font-size="10" fill="#fff" font-weight="700" class="mono">γ₂</text>
      <text x="360" y="20" text-anchor="middle" font-size="10" fill="#fff" font-weight="700" class="mono">γ₃</text>
      <text x="540" y="20" text-anchor="middle" font-size="10" fill="#fff" font-weight="700" class="mono">γ₄</text>
      <text x="720" y="20" text-anchor="middle" font-size="10" fill="#fff" font-weight="700" class="mono">γ₅</text>
      <text x="900" y="20" text-anchor="middle" font-size="10" fill="#fff" font-weight="700" class="mono">γ₆</text>
    </g>
    <text x="0" y="56" font-size="10" fill="#525252" class="mono">colour intensity = posterior probability of "active" state at that position</text>
  </g>

  <!-- Bottom banner -->
  <g transform="translate(120,460)">
    <rect width="960" height="60" fill="#dcfce7" stroke="#065f46" rx="4"/>
    <text x="480" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">Forward-backward IS belief propagation on a chain</text>
    <text x="480" y="42" text-anchor="middle" font-size="10" fill="#374151">Felsenstein's pruning is BP on a tree (Lecture 20). Loopy graphs use loopy BP / variational inference. Same algorithmic family.</text>
  </g>
</svg>
