<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="540" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Baum-Welch convergence — 5 random initialisations on the same data</text>

  <!-- Plot area -->
  <g transform="translate(140,80)">
    <rect width="800" height="380" fill="#fff" stroke="#d6d3d1"/>
    <!-- Grid -->
    <g stroke="#e7e5e4" stroke-width="0.5">
      <line x1="0" y1="76" x2="800" y2="76"/>
      <line x1="0" y1="152" x2="800" y2="152"/>
      <line x1="0" y1="228" x2="800" y2="228"/>
      <line x1="0" y1="304" x2="800" y2="304"/>
      <line x1="160" y1="0" x2="160" y2="380"/>
      <line x1="320" y1="0" x2="320" y2="380"/>
      <line x1="480" y1="0" x2="480" y2="380"/>
      <line x1="640" y1="0" x2="640" y2="380"/>
    </g>

    <!-- X-axis: iterations -->
    <g class="mono" font-size="10" fill="#525252">
      <text x="0" y="396" text-anchor="middle">0</text>
      <text x="160" y="396" text-anchor="middle">10</text>
      <text x="320" y="396" text-anchor="middle">20</text>
      <text x="480" y="396" text-anchor="middle">30</text>
      <text x="640" y="396" text-anchor="middle">40</text>
      <text x="800" y="396" text-anchor="middle">50</text>
    </g>
    <text x="400" y="416" text-anchor="middle" font-size="11" fill="#525252">EM iteration k</text>

    <!-- Y-axis: log-likelihood -->
    <g class="mono" font-size="10" fill="#525252">
      <text x="-10" y="384" text-anchor="end">-1450</text>
      <text x="-10" y="308" text-anchor="end">-1400</text>
      <text x="-10" y="232" text-anchor="end">-1350</text>
      <text x="-10" y="156" text-anchor="end">-1300</text>
      <text x="-10" y="80" text-anchor="end">-1280</text>
      <text x="-10" y="4" text-anchor="end">-1260 (global)</text>
    </g>
    <text x="-70" y="190" text-anchor="middle" font-size="11" fill="#525252" transform="rotate(-90 -70 190)">log P(X | θ)</text>

    <!-- Reference lines -->
    <line x1="0" y1="20" x2="800" y2="20" stroke="#10b981" stroke-dasharray="4 3" opacity="0.6"/>
    <text x="800" y="14" text-anchor="end" font-size="9" fill="#10b981" font-weight="700">global optimum −1260</text>
    <line x1="0" y1="120" x2="800" y2="120" stroke="#dc2626" stroke-dasharray="4 3" opacity="0.4"/>
    <text x="800" y="114" text-anchor="end" font-size="9" fill="#dc2626">local optimum −1320</text>

    <!-- 5 trajectories (monotonically increasing). 3 to global, 2 to local -->
    <!-- Init 1: to global -->
    <path d="M 0 360 L 32 280 L 64 200 L 96 140 L 128 100 L 160 70 L 200 50 L 240 38 L 320 28 L 400 22 L 500 20 L 800 20"
          stroke="#1e3a8a" stroke-width="2.5" fill="none"/>
    <text x="800" y="32" text-anchor="end" font-size="9" fill="#1e3a8a" font-weight="700" class="mono">init 1 → global</text>
    <!-- Init 2: to global -->
    <path d="M 0 380 L 32 340 L 64 260 L 96 180 L 128 120 L 160 80 L 200 56 L 240 38 L 320 26 L 400 22 L 500 20 L 800 20"
          stroke="#0d7377" stroke-width="2.5" fill="none"/>
    <text x="200" y="50" text-anchor="end" font-size="9" fill="#0d7377" font-weight="700" class="mono">init 2 → global</text>
    <!-- Init 3: to global -->
    <path d="M 0 320 L 32 250 L 64 190 L 96 140 L 128 100 L 160 70 L 200 48 L 240 36 L 320 26 L 400 22 L 500 20 L 800 20"
          stroke="#7c3aed" stroke-width="2.5" fill="none"/>
    <text x="240" y="30" text-anchor="end" font-size="9" fill="#7c3aed" font-weight="700" class="mono">init 3 → global</text>
    <!-- Init 4: to local -->
    <path d="M 0 370 L 32 290 L 64 220 L 96 180 L 128 150 L 160 130 L 200 122 L 240 120 L 320 120 L 400 120 L 500 120 L 800 120"
          stroke="#b45309" stroke-width="2.5" fill="none"/>
    <text x="800" y="132" text-anchor="end" font-size="9" fill="#b45309" font-weight="700" class="mono">init 4 → local</text>
    <!-- Init 5: to local -->
    <path d="M 0 365 L 32 280 L 64 210 L 96 170 L 128 145 L 160 130 L 200 124 L 240 122 L 320 120 L 400 120 L 500 120 L 800 120"
          stroke="#dc2626" stroke-width="2.5" fill="none"/>
    <text x="240" y="116" text-anchor="end" font-size="9" fill="#dc2626" font-weight="700" class="mono">init 5 → local</text>
  </g>

  <!-- Side annotation -->
  <g transform="translate(960,100)">
    <rect width="220" height="170" fill="#fff" stroke="#d6d3d1" rx="4"/>
    <text x="110" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">EM guarantees</text>
    <line x1="20" y1="32" x2="200" y2="32" stroke="#e7e5e4"/>
    <g transform="translate(20,46)" font-size="10" fill="#374151">
      <text x="0" y="0">• Each iteration ↑ log P(X|θ)</text>
      <text x="0" y="16">  (monotonic improvement)</text>
      <text x="0" y="36">• Converges, but to a local</text>
      <text x="0" y="52">  optimum — not the global</text>
      <text x="0" y="72">• Multiple random restarts</text>
      <text x="0" y="88">  mitigate this</text>
      <text x="0" y="108">• Pick the highest-likelihood</text>
      <text x="0" y="124">  result across all restarts</text>
    </g>
  </g>

  <g transform="translate(960,290)">
    <rect width="220" height="120" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="110" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Practical recipe</text>
    <line x1="20" y1="32" x2="200" y2="32" stroke="#92400e" opacity="0.4"/>
    <g transform="translate(20,46)" font-size="10" fill="#374151">
      <text x="0" y="0">• 5–10 random inits</text>
      <text x="0" y="16">• 50–200 iterations each</text>
      <text x="0" y="32">• Monitor likelihood;</text>
      <text x="0" y="48">  stop when ΔlnL &lt; ε</text>
      <text x="0" y="64">• Use BIC if choosing K</text>
    </g>
  </g>

  <!-- Bottom banner -->
  <g transform="translate(140,490)">
    <rect width="800" height="40" fill="#dcfce7" stroke="#065f46" rx="4"/>
    <text x="400" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">Multiple restarts + monotonic likelihood = the modern Baum-Welch recipe (Eddy, Krogh, Searls)</text>
  </g>
</svg>
