<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="480" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Splice-site PWM logos — donor (5'-ss) and acceptor (3'-ss)</text>

  <!-- Donor logo -->
  <g transform="translate(60,80)">
    <text x="0" y="0" font-size="12" font-weight="700" fill="#1e3a8a">Donor (5' splice site) — positions −3 to +6</text>
    <!-- Y-axis: information content (bits) -->
    <line x1="0" y1="20" x2="0" y2="240" stroke="#374151"/>
    <line x1="0" y1="240" x2="500" y2="240" stroke="#374151"/>
    <g class="mono" font-size="10" fill="#525252">
      <text x="-8" y="244" text-anchor="end">0</text>
      <text x="-8" y="184" text-anchor="end">0.5</text>
      <text x="-8" y="124" text-anchor="end">1.0</text>
      <text x="-8" y="64" text-anchor="end">1.5</text>
      <text x="-8" y="24" text-anchor="end">2.0</text>
    </g>
    <text x="-50" y="130" text-anchor="middle" font-size="10" fill="#525252" transform="rotate(-90 -50 130)">information (bits)</text>

    <!-- Position labels -->
    <g class="mono" font-size="9" fill="#525252">
      <text x="25" y="258" text-anchor="middle">−3</text>
      <text x="75" y="258" text-anchor="middle">−2</text>
      <text x="125" y="258" text-anchor="middle">−1</text>
      <text x="175" y="258" text-anchor="middle">+1</text>
      <text x="225" y="258" text-anchor="middle">+2</text>
      <text x="275" y="258" text-anchor="middle">+3</text>
      <text x="325" y="258" text-anchor="middle">+4</text>
      <text x="375" y="258" text-anchor="middle">+5</text>
      <text x="425" y="258" text-anchor="middle">+6</text>
    </g>
    <text x="225" y="276" text-anchor="middle" font-size="11" fill="#525252">↑ exon | intron →</text>

    <!-- Letter stacks: each column shows tallest letter on top, with height = info -->
    <!-- (Stylised: drawn as filled rectangles labeled with the letter, height = info bits) -->
    <!-- Position −3: low info, mostly C/A -->
    <g font-family="JetBrains Mono, monospace" font-weight="700">
      <g transform="translate(25,240)">
        <rect x="-12" y="-30" width="24" height="30" fill="#0d7377"/>
        <text x="0" y="-12" text-anchor="middle" font-size="22" fill="#fff">C</text>
        <rect x="-12" y="-50" width="24" height="20" fill="#1e3a8a"/>
        <text x="0" y="-34" text-anchor="middle" font-size="16" fill="#fff">A</text>
      </g>
      <!-- Position −2 -->
      <g transform="translate(75,240)">
        <rect x="-12" y="-50" width="24" height="50" fill="#1e3a8a"/>
        <text x="0" y="-22" text-anchor="middle" font-size="32" fill="#fff">A</text>
      </g>
      <!-- Position −1 -->
      <g transform="translate(125,240)">
        <rect x="-12" y="-100" width="24" height="100" fill="#b45309"/>
        <text x="0" y="-46" text-anchor="middle" font-size="60" fill="#fff">G</text>
      </g>
      <!-- Position +1: G consensus, very tall -->
      <g transform="translate(175,240)">
        <rect x="-12" y="-200" width="24" height="200" fill="#b45309"/>
        <text x="0" y="-90" text-anchor="middle" font-size="100" fill="#fff">G</text>
      </g>
      <!-- Position +2: T consensus, very tall -->
      <g transform="translate(225,240)">
        <rect x="-12" y="-200" width="24" height="200" fill="#dc2626"/>
        <text x="0" y="-90" text-anchor="middle" font-size="100" fill="#fff">T</text>
      </g>
      <!-- Position +3: A bias -->
      <g transform="translate(275,240)">
        <rect x="-12" y="-100" width="24" height="100" fill="#1e3a8a"/>
        <text x="0" y="-46" text-anchor="middle" font-size="60" fill="#fff">A</text>
      </g>
      <!-- Position +4: A bias -->
      <g transform="translate(325,240)">
        <rect x="-12" y="-90" width="24" height="90" fill="#1e3a8a"/>
        <text x="0" y="-40" text-anchor="middle" font-size="54" fill="#fff">A</text>
      </g>
      <!-- Position +5: G/T bias -->
      <g transform="translate(375,240)">
        <rect x="-12" y="-50" width="24" height="50" fill="#b45309"/>
        <text x="0" y="-22" text-anchor="middle" font-size="32" fill="#fff">G</text>
        <rect x="-12" y="-80" width="24" height="30" fill="#dc2626"/>
        <text x="0" y="-58" text-anchor="middle" font-size="20" fill="#fff">T</text>
      </g>
      <!-- Position +6: low info -->
      <g transform="translate(425,240)">
        <rect x="-12" y="-30" width="24" height="30" fill="#dc2626"/>
        <text x="0" y="-12" text-anchor="middle" font-size="22" fill="#fff">T</text>
      </g>
    </g>

    <!-- Box around invariant GT -->
    <rect x="156" y="40" width="86" height="200" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="200" y="32" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626" class="mono">GT (invariant)</text>
  </g>

  <!-- Acceptor logo -->
  <g transform="translate(640,80)">
    <text x="0" y="0" font-size="12" font-weight="700" fill="#1e3a8a">Acceptor (3' splice site) — positions −14 to +3</text>
    <line x1="0" y1="20" x2="0" y2="240" stroke="#374151"/>
    <line x1="0" y1="240" x2="500" y2="240" stroke="#374151"/>
    <g class="mono" font-size="10" fill="#525252">
      <text x="-8" y="244" text-anchor="end">0</text>
      <text x="-8" y="184" text-anchor="end">0.5</text>
      <text x="-8" y="124" text-anchor="end">1.0</text>
      <text x="-8" y="64" text-anchor="end">1.5</text>
      <text x="-8" y="24" text-anchor="end">2.0</text>
    </g>
    <text x="-50" y="130" text-anchor="middle" font-size="10" fill="#525252" transform="rotate(-90 -50 130)">information (bits)</text>

    <!-- Polypyrimidine tract: positions −14 to −5, all C/T -->
    <!-- Then branch / acceptor -->
    <g class="mono" font-size="8" fill="#525252">
      <text x="20" y="258" text-anchor="middle">−14</text>
      <text x="50" y="258" text-anchor="middle">−12</text>
      <text x="80" y="258" text-anchor="middle">−10</text>
      <text x="110" y="258" text-anchor="middle">−8</text>
      <text x="140" y="258" text-anchor="middle">−6</text>
      <text x="170" y="258" text-anchor="middle">−5</text>
      <text x="200" y="258" text-anchor="middle">−4</text>
      <text x="230" y="258" text-anchor="middle">−3</text>
      <text x="260" y="258" text-anchor="middle">−2</text>
      <text x="290" y="258" text-anchor="middle">−1</text>
      <text x="320" y="258" text-anchor="middle">+1</text>
      <text x="350" y="258" text-anchor="middle">+2</text>
      <text x="380" y="258" text-anchor="middle">+3</text>
    </g>
    <text x="225" y="276" text-anchor="middle" font-size="11" fill="#525252">← intron | exon ↑</text>

    <!-- Polypyrimidine tract: low information per position, but consistently C/T -->
    <g font-family="JetBrains Mono, monospace" font-weight="700" font-size="20">
      <g transform="translate(20,240)">
        <rect x="-10" y="-25" width="20" height="13" fill="#dc2626" opacity="0.7"/>
        <text x="0" y="-15" text-anchor="middle" font-size="10" fill="#fff">T</text>
        <rect x="-10" y="-12" width="20" height="12" fill="#0d7377" opacity="0.7"/>
        <text x="0" y="-2" text-anchor="middle" font-size="10" fill="#fff">C</text>
      </g>
      <g transform="translate(50,240)">
        <rect x="-10" y="-30" width="20" height="15" fill="#dc2626" opacity="0.8"/>
        <text x="0" y="-18" text-anchor="middle" font-size="10" fill="#fff">T</text>
        <rect x="-10" y="-15" width="20" height="15" fill="#0d7377" opacity="0.8"/>
        <text x="0" y="-3" text-anchor="middle" font-size="10" fill="#fff">C</text>
      </g>
      <g transform="translate(80,240)">
        <rect x="-10" y="-32" width="20" height="16" fill="#dc2626" opacity="0.85"/>
        <text x="0" y="-20" text-anchor="middle" font-size="10" fill="#fff">T</text>
        <rect x="-10" y="-16" width="20" height="16" fill="#0d7377" opacity="0.85"/>
      </g>
      <g transform="translate(110,240)">
        <rect x="-10" y="-36" width="20" height="18" fill="#dc2626" opacity="0.9"/>
        <text x="0" y="-22" text-anchor="middle" font-size="10" fill="#fff">T</text>
        <rect x="-10" y="-18" width="20" height="18" fill="#0d7377" opacity="0.9"/>
      </g>
      <g transform="translate(140,240)">
        <rect x="-10" y="-40" width="20" height="20" fill="#dc2626" opacity="0.9"/>
        <text x="0" y="-26" text-anchor="middle" font-size="10" fill="#fff">T</text>
        <rect x="-10" y="-20" width="20" height="20" fill="#0d7377" opacity="0.9"/>
      </g>
      <g transform="translate(170,240)">
        <rect x="-10" y="-50" width="20" height="25" fill="#dc2626" opacity="0.95"/>
        <text x="0" y="-32" text-anchor="middle" font-size="11" fill="#fff">T</text>
        <rect x="-10" y="-25" width="20" height="25" fill="#0d7377" opacity="0.95"/>
      </g>
      <g transform="translate(200,240)">
        <rect x="-10" y="-60" width="20" height="30" fill="#dc2626"/>
        <text x="0" y="-40" text-anchor="middle" font-size="14" fill="#fff">T</text>
        <rect x="-10" y="-30" width="20" height="30" fill="#0d7377"/>
      </g>
      <!-- −3: branch info -->
      <g transform="translate(230,240)">
        <rect x="-10" y="-30" width="20" height="30" fill="#0d7377" opacity="0.6"/>
        <text x="0" y="-12" text-anchor="middle" font-size="14" fill="#fff">C</text>
      </g>
      <!-- −2 + −1: AG -->
      <g transform="translate(260,240)">
        <rect x="-10" y="-200" width="20" height="200" fill="#1e3a8a"/>
        <text x="0" y="-90" text-anchor="middle" font-size="100" fill="#fff">A</text>
      </g>
      <g transform="translate(290,240)">
        <rect x="-10" y="-200" width="20" height="200" fill="#b45309"/>
        <text x="0" y="-90" text-anchor="middle" font-size="100" fill="#fff">G</text>
      </g>
      <g transform="translate(320,240)">
        <rect x="-10" y="-50" width="20" height="50" fill="#b45309"/>
        <text x="0" y="-22" text-anchor="middle" font-size="32" fill="#fff">G</text>
      </g>
      <g transform="translate(350,240)">
        <rect x="-10" y="-30" width="20" height="30" fill="#1e3a8a"/>
        <text x="0" y="-12" text-anchor="middle" font-size="20" fill="#fff">A</text>
      </g>
      <g transform="translate(380,240)">
        <rect x="-10" y="-20" width="20" height="20" fill="#1e3a8a" opacity="0.6"/>
      </g>
    </g>

    <!-- Polypyrimidine bracket -->
    <g>
      <line x1="20" y1="246" x2="200" y2="246" stroke="#7c3aed" stroke-width="2"/>
      <text x="110" y="266" text-anchor="middle" font-size="9" font-weight="700" fill="#7c3aed">polypyrimidine tract</text>
    </g>
    <!-- AG box -->
    <rect x="246" y="40" width="60" height="200" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="276" y="32" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626" class="mono">AG (invariant)</text>
  </g>

  <!-- Bottom banner -->
  <g transform="translate(60,400)">
    <rect width="1080" height="60" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="540" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">PWMs are the simplest profile HMM — no inserts, no deletes — just position-specific emissions</text>
    <text x="540" y="42" text-anchor="middle" font-size="10" fill="#374151">SpliceAI replaces these with a deep CNN that captures longer context (~10 kb of flanking sequence). Accuracy ≈ 95% on splice-site detection vs ~70% for PWMs alone.</text>
  </g>
</svg>
