<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="720" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">ChromHMM 15-state model — emission probabilities and genome-wide proportions</text>

  <!-- Heat map -->
  <g transform="translate(220,80)">
    <text x="270" y="-12" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Emission matrix b_i(mark) — P(mark | state)</text>
    <!-- Column headers (histone marks) -->
    <g class="mono" font-size="9" fill="#525252" font-weight="600">
      <text x="30" y="-2" text-anchor="middle">H3K4me3</text>
      <text x="90" y="-2" text-anchor="middle">H3K4me1</text>
      <text x="150" y="-2" text-anchor="middle">H3K27ac</text>
      <text x="210" y="-2" text-anchor="middle">H3K36me3</text>
      <text x="270" y="-2" text-anchor="middle">H3K27me3</text>
      <text x="330" y="-2" text-anchor="middle">H3K9me3</text>
      <text x="390" y="-2" text-anchor="middle">H3K9ac</text>
      <text x="450" y="-2" text-anchor="middle">H4K20me1</text>
      <text x="510" y="-2" text-anchor="middle">CTCF</text>
    </g>

    <!-- 15 rows × 9 columns -->
    <!-- Each cell: 60w × 28h. Colour: red gradient on emission probability -->
    <!-- Row helper: I'll embed all values here -->
    <!-- Active promoter: high K4me3, K27ac, K9ac -->
    <g transform="translate(0,0)">
