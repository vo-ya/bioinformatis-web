    <text x="480" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Each chromatin state is defined by its mark-co-occurrence pattern; ChromHMM finds them by Baum-Welch</text>
    <text x="480" y="40" text-anchor="middle" font-size="10" fill="#374151">Quiescent + heterochromatin together cover ~56% of the genome; functional regulatory states cover &lt; 10%; the rest is transcribed gene bodies.</text>
