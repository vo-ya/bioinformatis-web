<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arrPair" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>
  <rect width="1200" height="540" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Pair-HMM — three states for indel-aware pairwise alignment</text>

  <!-- Three states -->
  <g transform="translate(360,180)">
    <!-- M state -->
    <circle cx="0" cy="0" r="48" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2.5"/>
    <text x="0" y="-4" text-anchor="middle" font-size="20" font-weight="700" fill="#1e3a8a">M</text>
    <text x="0" y="14" text-anchor="middle" font-size="9" class="mono" fill="#525252">match</text>

    <!-- I state -->
    <circle cx="240" cy="-100" r="42" fill="#fef3c7" stroke="#b45309" stroke-width="2.5"/>
    <text x="240" y="-104" text-anchor="middle" font-size="18" font-weight="700" fill="#b45309">I</text>
    <text x="240" y="-86" text-anchor="middle" font-size="9" class="mono" fill="#525252">insert</text>

    <!-- D state -->
    <circle cx="240" cy="100" r="42" fill="#dcfce7" stroke="#065f46" stroke-width="2.5"/>
    <text x="240" y="96" text-anchor="middle" font-size="18" font-weight="700" fill="#065f46">D</text>
    <text x="240" y="114" text-anchor="middle" font-size="9" class="mono" fill="#525252">delete</text>

    <!-- END state -->
    <rect x="440" y="-22" width="80" height="44" fill="#fff" stroke="#525252" stroke-width="2" rx="4"/>
    <text x="480" y="4" text-anchor="middle" font-size="14" font-weight="700" fill="#525252">END</text>

    <!-- M -> M self loop — label x moved -100→-115 so the 7-char "1−2δ−τ"
         keeps ≥20 px gap from M circle's left edge (previously ~10). -->
    <g stroke="#1e3a8a" stroke-width="1.8" fill="none" marker-end="url(#arrPair)">
      <path d="M -32 -32 Q -80 -80 -32 -50 Q -10 -45 -32 -32"/>
    </g>
    <text x="-115" y="-55" font-size="10" font-weight="700" fill="#1e3a8a" class="mono">1−2δ−τ</text>

    <!-- M -> I -->
    <g stroke="#b45309" stroke-width="1.8" fill="none" marker-end="url(#arrPair)">
      <path d="M 38 -28 Q 130 -80 200 -100"/>
    </g>
    <text x="100" y="-90" font-size="10" font-weight="700" fill="#b45309" class="mono">δ</text>

    <!-- M -> D -->
    <g stroke="#065f46" stroke-width="1.8" fill="none" marker-end="url(#arrPair)">
      <path d="M 38 28 Q 130 80 200 100"/>
    </g>
    <text x="100" y="100" font-size="10" font-weight="700" fill="#065f46" class="mono">δ</text>

    <!-- I -> M -->
    <g stroke="#1e3a8a" stroke-width="1.8" fill="none" marker-end="url(#arrPair)">
      <path d="M 200 -86 Q 130 -50 38 -16"/>
    </g>
    <text x="120" y="-50" font-size="10" font-weight="700" fill="#1e3a8a" class="mono">1−ε</text>

    <!-- I -> I self loop -->
    <g stroke="#b45309" stroke-width="1.8" fill="none" marker-end="url(#arrPair)">
      <path d="M 270 -130 Q 320 -150 285 -135 Q 270 -130 270 -130"/>
    </g>
    <text x="305" y="-158" font-size="10" font-weight="700" fill="#b45309" class="mono">ε</text>

    <!-- D -> M -->
    <g stroke="#1e3a8a" stroke-width="1.8" fill="none" marker-end="url(#arrPair)">
      <path d="M 200 86 Q 130 50 38 16"/>
    </g>
    <text x="120" y="60" font-size="10" font-weight="700" fill="#1e3a8a" class="mono">1−ε</text>

    <!-- D -> D self loop -->
    <g stroke="#065f46" stroke-width="1.8" fill="none" marker-end="url(#arrPair)">
      <path d="M 270 130 Q 320 150 285 135 Q 270 130 270 130"/>
    </g>
    <text x="305" y="168" font-size="10" font-weight="700" fill="#065f46" class="mono">ε</text>

    <!-- M -> END -->
    <g stroke="#525252" stroke-width="1.8" fill="none" marker-end="url(#arrPair)">
      <path d="M 48 0 Q 250 0 438 0"/>
    </g>
    <text x="240" y="-8" text-anchor="middle" font-size="10" font-weight="700" fill="#525252" class="mono">τ</text>
  </g>

  <!-- Emissions table -->
  <g transform="translate(120,400)">
    <rect width="960" height="100" fill="#fff" stroke="#d6d3d1" rx="4"/>
    <text x="480" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Emissions: pair-HMM emits aligned columns</text>
    <line x1="20" y1="34" x2="940" y2="34" stroke="#e7e5e4"/>
    <g transform="translate(40,52)" font-size="11" font-family="JetBrains Mono, monospace">
      <text x="0" y="0" fill="#1e3a8a" font-weight="700">M state:</text>
      <text x="80" y="0" fill="#374151">emits a column (a, b) with prob p_match · sub_score(a, b)</text>
      <text x="0" y="22" fill="#b45309" font-weight="700">I state:</text>
      <text x="80" y="22" fill="#374151">emits a column (a, −) — read consumes; reference does not</text>
      <text x="0" y="44" fill="#065f46" font-weight="700">D state:</text>
      <text x="80" y="44" fill="#374151">emits a column (−, b) — reference consumes; read does not</text>
    </g>
  </g>

  <!-- Right-side legend with parameter explanations -->
  <g transform="translate(960,80)">
    <rect width="220" height="280" fill="#fff" stroke="#d6d3d1" rx="4"/>
    <text x="110" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Parameters</text>
    <line x1="20" y1="32" x2="200" y2="32" stroke="#e7e5e4"/>
    <g transform="translate(20,46)" font-size="10" fill="#374151">
      <text x="0" y="0"><tspan font-family="JetBrains Mono, monospace" fill="#b45309" font-weight="700">δ</tspan> — gap-open probability</text>
      <text x="0" y="20"><tspan font-family="JetBrains Mono, monospace" fill="#b45309" font-weight="700">ε</tspan> — gap-extend probability</text>
      <text x="0" y="40"><tspan font-family="JetBrains Mono, monospace" fill="#525252" font-weight="700">τ</tspan> — termination probability</text>
      <text x="0" y="62" font-weight="700">Default values:</text>
      <text x="0" y="78" font-family="JetBrains Mono, monospace">δ = 0.025</text>
      <text x="0" y="94" font-family="JetBrains Mono, monospace">ε = 0.4</text>
      <text x="0" y="110" font-family="JetBrains Mono, monospace">τ = 0.001</text>
      <text x="0" y="134" font-weight="700">Score conversion:</text>
      <text x="0" y="150" font-family="JetBrains Mono, monospace" font-size="9">log(δ/τ) ≈ gap-open</text>
      <text x="0" y="166" font-family="JetBrains Mono, monospace" font-size="9">log(ε/τ) ≈ gap-extend</text>
      <text x="0" y="190" font-weight="700">Software:</text>
      <text x="0" y="206" font-size="9">GATK HaplotypeCaller</text>
      <text x="0" y="220" font-size="9">DeepVariant (CNN on pileup)</text>
      <text x="0" y="234" font-size="9">Strelka, Octopus</text>
    </g>
  </g>
</svg>
