          <rect x="254" y="35" width="6" height="25"/>
          <rect x="262" y="50" width="6" height="10"/>
          <rect x="270" y="22" width="6" height="38"/>
        </g>
        <text x="140" y="78" text-anchor="middle" font-size="9" fill="#525252" class="mono">PIP-binding pocket conserved</text>
      </g>
    </g>
  </g>

  <!-- Banner -->
  <g transform="translate(80,460)">
    <rect width="1040" height="60" fill="#dcfce7" stroke="#065f46" rx="4"/>
    <text x="520" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">Three Pfam hits = three independent profile-HMM matches; the linker regions don't match anything</text>
    <text x="520" y="42" text-anchor="middle" font-size="10" fill="#374151">For any new protein, the first-pass functional annotation is "scan against Pfam"; the result is a domain architecture string (SH2 → Pkinase → PH).</text>
  </g>
</svg>
