<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="540" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">A multi-domain protein with three Pfam hits — kinase + SH2 + PH</text>

  <!-- Protein bar (600 aa) -->
  <g transform="translate(80,80)">
    <text x="0" y="0" font-size="12" font-weight="700" fill="#374151">Hypothetical Tyr-kinase, 600 aa</text>
    <!-- Backbone -->
    <line x1="0" y1="50" x2="1040" y2="50" stroke="#9ca3af" stroke-width="6" stroke-linecap="round"/>
    <!-- Domains: SH2 (50-150), kinase (200-450), PH (480-580) -->
    <g>
      <rect x="86" y="38" width="174" height="24" fill="#1e3a8a" rx="3"/>
      <text x="173" y="54" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">SH2</text>
    </g>
    <g>
      <rect x="346" y="32" width="434" height="36" fill="#b45309" rx="4"/>
      <text x="563" y="54" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Pkinase (catalytic)</text>
    </g>
    <g>
      <rect x="832" y="38" width="174" height="24" fill="#065f46" rx="3"/>
      <text x="919" y="54" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">PH</text>
    </g>

    <!-- Position labels -->
    <g class="mono" font-size="9" fill="#525252">
      <text x="0" y="76" text-anchor="middle">1</text>
      <text x="86" y="76" text-anchor="middle">50</text>
      <text x="260" y="76" text-anchor="middle">150</text>
      <text x="346" y="76" text-anchor="middle">200</text>
      <text x="780" y="76" text-anchor="middle">450</text>
      <text x="832" y="76" text-anchor="middle">480</text>
      <text x="1006" y="76" text-anchor="middle">580</text>
      <text x="1040" y="76" text-anchor="middle">600</text>
    </g>
    <text x="520" y="92" text-anchor="middle" font-size="11" fill="#525252">amino-acid position</text>

    <!-- HMMER hit details below each domain -->
    <g transform="translate(0,120)">
      <text x="173" y="0" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a" class="mono">PF00017 — SH2</text>
      <g class="mono" font-size="10" fill="#374151">
        <text x="173" y="18" text-anchor="middle">E = 4.2 × 10⁻²⁰</text>
        <text x="173" y="34" text-anchor="middle">bit score 88.1</text>
        <text x="173" y="48" text-anchor="middle">aln 50–150 (101 aa)</text>
      </g>
    </g>
    <g transform="translate(0,120)">
      <text x="563" y="0" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309" class="mono">PF00069 — Pkinase</text>
      <g class="mono" font-size="10" fill="#374151">
        <text x="563" y="18" text-anchor="middle">E = 1.4 × 10⁻⁸⁵</text>
        <text x="563" y="34" text-anchor="middle">bit score 290.5</text>
        <text x="563" y="48" text-anchor="middle">aln 200–450 (251 aa)</text>
      </g>
    </g>
    <g transform="translate(0,120)">
      <text x="919" y="0" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46" class="mono">PF00169 — PH</text>
      <g class="mono" font-size="10" fill="#374151">
        <text x="919" y="18" text-anchor="middle">E = 8.7 × 10⁻¹⁵</text>
        <text x="919" y="34" text-anchor="middle">bit score 64.2</text>
        <text x="919" y="48" text-anchor="middle">aln 480–580 (101 aa)</text>
      </g>
    </g>
  </g>

  <!-- Profile-HMM logos for each domain (simplified) -->
  <g transform="translate(80,260)">
    <text x="0" y="0" font-size="12" font-weight="700" fill="#374151">Profile-HMM logos (per-position information content)</text>

    <!-- SH2 logo -->
    <g transform="translate(20,30)">
      <text x="0" y="0" font-size="10" font-weight="700" fill="#1e3a8a">SH2 (PF00017)</text>
      <g transform="translate(0,16)">
        <rect x="0" y="0" width="280" height="60" fill="#fff" stroke="#d6d3d1"/>
        <!-- Bars representing per-position info -->
        <g fill="#1e3a8a">
          <rect x="6"   y="20" width="6" height="40"/>
          <rect x="14"  y="35" width="6" height="25"/>
          <rect x="22"  y="10" width="6" height="50"/>
