          <rect x="94"  y="14" width="6" height="46"/>
          <rect x="102" y="40" width="6" height="20"/>
          <rect x="110" y="2"  width="6" height="58"/>
          <rect x="118" y="0"  width="6" height="60"/>
          <rect x="126" y="35" width="6" height="25"/>
          <rect x="134" y="50" width="6" height="10"/>
          <rect x="142" y="0"  width="6" height="60"/>
          <rect x="150" y="2"  width="6" height="58"/>
          <rect x="158" y="20" width="6" height="40"/>
          <rect x="166" y="6"  width="6" height="54"/>
