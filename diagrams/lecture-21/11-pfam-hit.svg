          <rect x="126" y="14" width="6" height="46"/>
          <rect x="134" y="50" width="6" height="10"/>
          <rect x="142" y="22" width="6" height="38"/>
          <rect x="150" y="35" width="6" height="25"/>
          <rect x="158" y="40" width="6" height="20"/>
          <rect x="166" y="22" width="6" height="38"/>
          <rect x="174" y="6"  width="6" height="54"/>
          <rect x="182" y="50" width="6" height="10"/>
          <rect x="190" y="35" width="6" height="25"/>
          <rect x="198" y="22" width="6" height="38"/>
