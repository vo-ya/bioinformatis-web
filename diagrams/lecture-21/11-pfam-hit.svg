          <rect x="150" y="22" width="6" height="38"/>
          <rect x="158" y="40" width="6" height="20"/>
          <rect x="166" y="6"  width="6" height="54"/>
          <rect x="174" y="35" width="6" height="25"/>
          <rect x="182" y="50" width="6" height="10"/>
          <rect x="190" y="20" width="6" height="40"/>
          <rect x="198" y="14" width="6" height="46"/>
          <rect x="206" y="40" width="6" height="20"/>
          <rect x="214" y="35" width="6" height="25"/>
          <rect x="222" y="50" width="6" height="10"/>
          <rect x="230" y="6"  width="6" height="54"/>
          <rect x="238" y="22" width="6" height="38"/>
          <rect x="246" y="40" width="6" height="20"/>
          <rect x="254" y="50" width="6" height="10"/>
          <rect x="262" y="35" width="6" height="25"/>
          <rect x="270" y="22" width="6" height="38"/>
        </g>
        <text x="140" y="78" text-anchor="middle" font-size="9" fill="#525252" class="mono">positions 1..101 of profile</text>
      </g>
    </g>

    <!-- Kinase logo -->
    <g transform="translate(360,30)">
      <text x="0" y="0" font-size="10" font-weight="700" fill="#b45309">Pkinase (PF00069)</text>
      <g transform="translate(0,16)">
        <rect x="0" y="0" width="280" height="60" fill="#fff" stroke="#d6d3d1"/>
        <g fill="#b45309">
          <rect x="6"   y="6"  width="6" height="54"/>
          <rect x="14"  y="40" width="6" height="20"/>
          <rect x="22"  y="20" width="6" height="40"/>
          <rect x="30"  y="2"  width="6" height="58"/>
          <rect x="38"  y="50" width="6" height="10"/>
          <rect x="46"  y="6"  width="6" height="54"/>
          <rect x="54"  y="35" width="6" height="25"/>
