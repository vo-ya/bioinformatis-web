          <rect x="182" y="40" width="6" height="20"/>
          <rect x="190" y="14" width="6" height="46"/>
          <rect x="198" y="2"  width="6" height="58"/>
          <rect x="206" y="0"  width="6" height="60"/>
          <rect x="214" y="20" width="6" height="40"/>
          <rect x="222" y="50" width="6" height="10"/>
          <rect x="230" y="0"  width="6" height="60"/>
          <rect x="238" y="2"  width="6" height="58"/>
          <rect x="246" y="35" width="6" height="25"/>
          <rect x="254" y="20" width="6" height="40"/>
          <rect x="262" y="6"  width="6" height="54"/>
          <rect x="270" y="0"  width="6" height="60"/>
        </g>
        <text x="140" y="78" text-anchor="middle" font-size="9" fill="#525252" class="mono">DFG, HRD, VAVK motifs visible</text>
      </g>
    </g>

    <!-- PH logo -->
    <g transform="translate(700,30)">
      <text x="0" y="0" font-size="10" font-weight="700" fill="#065f46">PH (PF00169)</text>
      <g transform="translate(0,16)">
        <rect x="0" y="0" width="280" height="60" fill="#fff" stroke="#d6d3d1"/>
        <g fill="#065f46">
          <rect x="6"   y="20" width="6" height="40"/>
          <rect x="14"  y="35" width="6" height="25"/>
          <rect x="22"  y="14" width="6" height="46"/>
