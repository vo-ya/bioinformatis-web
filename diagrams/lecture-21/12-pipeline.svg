<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arrPipe" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">End-to-end annotation pipeline (bacterial genome)</text>

  <!-- 9 stacked boxes -->
  <g transform="translate(280,70)">
    <!-- 1 -->
    <g>
      <rect x="0" y="0" width="320" height="56" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#1e3a8a">1. Raw reads (FASTQ)</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">Illumina paired-end · ~50× coverage</text>
    </g>
    <line x1="160" y1="56" x2="160" y2="76" stroke="#525252" stroke-width="1.5" marker-end="url(#arrPipe)"/>
    <!-- 2 -->
    <g transform="translate(0,76)">
      <rect x="0" y="0" width="320" height="56" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#1e3a8a">2. Assembly</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">SPAdes / Flye · runtime ~30 min · ~5 Mb genome</text>
    </g>
    <line x1="160" y1="132" x2="160" y2="152" stroke="#525252" stroke-width="1.5" marker-end="url(#arrPipe)"/>
    <!-- 3 -->
    <g transform="translate(0,152)">
      <rect x="0" y="0" width="320" height="56" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#b45309">3. Repeat masking</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">RepeatMasker · ~10 min · prokaryotic repeats sparse</text>
    </g>
    <line x1="160" y1="208" x2="160" y2="228" stroke="#525252" stroke-width="1.5" marker-end="url(#arrPipe)"/>
    <!-- 4 -->
    <g transform="translate(0,228)">
      <rect x="0" y="0" width="320" height="56" fill="#dcfce7" stroke="#065f46" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#065f46">4. ORF prediction</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">Prodigal · ~1 min · ~5,000 ORFs predicted</text>
    </g>
    <line x1="160" y1="284" x2="160" y2="304" stroke="#525252" stroke-width="1.5" marker-end="url(#arrPipe)"/>
    <!-- 5 -->
    <g transform="translate(0,304)">
      <rect x="0" y="0" width="320" height="56" fill="#dcfce7" stroke="#065f46" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#065f46">5. Protein translation</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">Built-in Prodigal · &lt; 1 min · 5,000 protein FASTAs</text>
    </g>
    <line x1="160" y1="360" x2="160" y2="380" stroke="#525252" stroke-width="1.5" marker-end="url(#arrPipe)"/>
    <!-- 6 -->
    <g transform="translate(0,380)">
      <rect x="0" y="0" width="320" height="56" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#7c3aed">6. Pfam domain scan</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">HMMER hmmscan · ~5 min · ~80% domain-annotated</text>
    </g>
    <line x1="160" y1="436" x2="160" y2="456" stroke="#525252" stroke-width="1.5" marker-end="url(#arrPipe)"/>
    <!-- 7 -->
    <g transform="translate(0,456)">
      <rect x="0" y="0" width="320" height="56" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#7c3aed">7. UniProt search</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">DIAMOND blastp · ~3 min · function transfer</text>
    </g>
    <line x1="160" y1="512" x2="160" y2="532" stroke="#525252" stroke-width="1.5" marker-end="url(#arrPipe)"/>
    <!-- 8 -->
    <g transform="translate(0,532)">
      <rect x="0" y="0" width="320" height="56" fill="#fee2e2" stroke="#7f1d1d" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#7f1d1d">8. KEGG pathway mapping</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">KofamScan · ~2 min · metabolic context</text>
    </g>
    <line x1="160" y1="588" x2="160" y2="608" stroke="#525252" stroke-width="1.5" marker-end="url(#arrPipe)"/>
    <!-- 9 -->
    <g transform="translate(0,608)">
      <rect x="0" y="0" width="320" height="56" fill="#fff" stroke="#525252" stroke-width="2" rx="6"/>
      <text x="160" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#525252">9. Final annotation table</text>
      <text x="160" y="44" text-anchor="middle" font-size="10" class="mono" fill="#374151">~95% genes with function · TSV / GFF3 output</text>
    </g>
  </g>

  <!-- Side panel: eukaryotic equivalent -->
  <g transform="translate(680,70)">
    <rect width="380" height="600" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="190" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Eukaryotic pipeline (mammalian genome)</text>
    <line x1="20" y1="36" x2="360" y2="36" stroke="#e7e5e4"/>
    <g transform="translate(20,52)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700" fill="#1e3a8a">1. Long-read assembly</text>
      <text x="14" y="16" class="mono" font-size="10" fill="#525252">PacBio HiFi + Hifiasm · ~1 day</text>
      <text x="0" y="40" font-weight="700" fill="#b45309">2. Repeat masking</text>
      <text x="14" y="56" class="mono" font-size="10" fill="#525252">RepeatMasker · ~6 hours · 40% masked</text>
      <text x="0" y="80" font-weight="700" fill="#065f46">3. AUGUSTUS training</text>
      <text x="14" y="96" class="mono" font-size="10" fill="#525252">on related species + RNA-seq · ~12 h</text>
      <text x="0" y="120" font-weight="700" fill="#065f46">4. BRAKER ab-initio + hints</text>
      <text x="14" y="136" class="mono" font-size="10" fill="#525252">RNA-seq + protein evidence · ~12 h</text>
      <text x="0" y="160" font-weight="700" fill="#7c3aed">5. AUGUSTUS prediction</text>
      <text x="14" y="176" class="mono" font-size="10" fill="#525252">~20,000 gene predictions · ~6 h</text>
      <text x="0" y="200" font-weight="700" fill="#7c3aed">6. HMMER + Pfam</text>
      <text x="14" y="216" class="mono" font-size="10" fill="#525252">domain annotation per protein · ~30 min</text>
      <text x="0" y="240" font-weight="700" fill="#7f1d1d">7. InterProScan</text>
      <text x="14" y="256" class="mono" font-size="10" fill="#525252">cross-validate; assign GO terms · ~4 h</text>
      <text x="0" y="280" font-weight="700" fill="#525252">8. OrthoFinder</text>
      <text x="14" y="296" class="mono" font-size="10" fill="#525252">function transfer via orthology · ~8 h</text>
      <text x="0" y="320" font-weight="700" fill="#525252">9. Manual curation</text>
      <text x="14" y="336" class="mono" font-size="10" fill="#525252">low-confidence genes · ~weeks</text>
    </g>
    <g transform="translate(20,420)">
      <rect width="340" height="60" fill="#fef3c7" stroke="#b45309" rx="4"/>
      <text x="170" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Total time: ~4 days on a server</text>
      <text x="170" y="40" text-anchor="middle" font-size="10" fill="#374151">Bacterial: ~1 hour on a laptop</text>
    </g>
    <g transform="translate(20,500)" font-size="10" fill="#374151">
      <text x="0" y="0" font-weight="700">Output integration:</text>
      <text x="0" y="16">• Combined GFF3 with multi-evidence support</text>
      <text x="0" y="32">• Protein-domain architecture per gene</text>
      <text x="0" y="48">• KEGG / GO / Reactome links</text>
      <text x="0" y="64">• Confidence score per gene model</text>
      <text x="0" y="80">• Cross-species ortholog mapping</text>
    </g>
  </g>

  <!-- Left side panel: stage colour key -->
  <g transform="translate(40,70)">
    <rect width="220" height="280" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="110" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Stage colour key</text>
    <line x1="20" y1="36" x2="200" y2="36" stroke="#e7e5e4"/>
    <g transform="translate(20,46)">
      <rect x="0" y="0" width="14" height="14" fill="#dbeafe" stroke="#1e3a8a"/>
      <text x="22" y="11" font-size="10" fill="#374151">Reads / assembly (FASTQ)</text>
      <rect x="0" y="22" width="14" height="14" fill="#fef3c7" stroke="#b45309"/>
      <text x="22" y="33" font-size="10" fill="#374151">Pre-processing (mask, trim)</text>
      <rect x="0" y="44" width="14" height="14" fill="#dcfce7" stroke="#065f46"/>
      <text x="22" y="55" font-size="10" fill="#374151">Gene model prediction</text>
      <rect x="0" y="66" width="14" height="14" fill="#ede9fe" stroke="#7c3aed"/>
      <text x="22" y="77" font-size="10" fill="#374151">Functional annotation (HMMER, BLAST)</text>
      <rect x="0" y="88" width="14" height="14" fill="#fee2e2" stroke="#7f1d1d"/>
      <text x="22" y="99" font-size="10" fill="#374151">Pathway / context mapping</text>
      <rect x="0" y="110" width="14" height="14" fill="#fff" stroke="#525252"/>
      <text x="22" y="121" font-size="10" fill="#374151">Final output</text>
    </g>
    <g transform="translate(20,200)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#374151">Bacterial total:</text>
      <text x="0" y="16" font-size="10" class="mono" fill="#525252">~1 hour, laptop · 4 GB RAM</text>
      <text x="0" y="40" font-size="11" font-weight="700" fill="#374151">Outputs:</text>
      <text x="0" y="56" font-size="10" fill="#525252">• 5,000 ORFs · ~95% annotated</text>
      <text x="0" y="72" font-size="10" fill="#525252">• Pfam domains, KEGG, GO</text>
    </g>
  </g>
</svg>
