<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="720" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Five biological network types — different nodes, different edges, different uses</text>

  <!-- 5 panels in a row, then summary -->
  <!-- Panel 1: PPI -->
  <g transform="translate(40,80)">
    <rect width="220" height="280" fill="#fff" stroke="#1e3a8a" stroke-width="1.5" rx="6"/>
    <text x="110" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">PPI</text>
    <text x="110" y="38" text-anchor="middle" font-size="10" class="mono" fill="#525252">protein-protein interaction</text>
    <!-- Mini network: dense graph -->
    <g stroke="#1e3a8a" stroke-width="1" fill="none">
      <line x1="60" y1="80" x2="100" y2="100"/>
      <line x1="100" y1="100" x2="140" y2="80"/>
      <line x1="100" y1="100" x2="80" y2="140"/>
      <line x1="100" y1="100" x2="160" y2="140"/>
      <line x1="80" y1="140" x2="160" y2="140"/>
      <line x1="60" y1="80" x2="80" y2="140"/>
      <line x1="140" y1="80" x2="160" y2="140"/>
      <line x1="100" y1="100" x2="120" y2="170"/>
      <line x1="80" y1="140" x2="120" y2="170"/>
      <line x1="160" y1="140" x2="120" y2="170"/>
    </g>
    <g fill="#1e3a8a">
      <circle cx="60" cy="80" r="6"/>
      <circle cx="100" cy="100" r="8"/>
      <circle cx="140" cy="80" r="6"/>
      <circle cx="80" cy="140" r="6"/>
      <circle cx="160" cy="140" r="6"/>
      <circle cx="120" cy="170" r="6"/>
    </g>
    <g class="mono" font-size="9" fill="#374151">
      <text x="20" y="220">scale: ~20k nodes</text>
      <text x="20" y="234">~1M edges</text>
      <text x="20" y="248">DBs: STRING, BioGRID</text>
      <text x="20" y="262">use: complexes, GBA</text>
    </g>
  </g>

  <!-- Panel 2: GRN -->
  <g transform="translate(280,80)">
    <rect width="220" height="280" fill="#fff" stroke="#dc2626" stroke-width="1.5" rx="6"/>
    <text x="110" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">GRN</text>
    <text x="110" y="38" text-anchor="middle" font-size="10" class="mono" fill="#525252">gene regulatory</text>
    <!-- Hub TF + targets -->
    <g stroke="#dc2626" stroke-width="1.2" fill="none">
      <line x1="110" y1="100" x2="50" y2="160" marker-end="url(#a1)"/>
      <line x1="110" y1="100" x2="80" y2="170" marker-end="url(#a1)"/>
      <line x1="110" y1="100" x2="110" y2="180" marker-end="url(#a1)"/>
      <line x1="110" y1="100" x2="140" y2="170" marker-end="url(#a1)"/>
      <line x1="110" y1="100" x2="170" y2="160" marker-end="url(#a1)"/>
    </g>
    <defs>
      <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
      </marker>
    </defs>
    <g>
      <rect x="98" y="88" width="24" height="24" fill="#dc2626" rx="3"/>
      <text x="110" y="104" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">TF</text>
    </g>
    <g fill="#fca5a5">
      <circle cx="50" cy="170" r="6"/>
      <circle cx="80" cy="180" r="6"/>
      <circle cx="110" cy="190" r="6"/>
      <circle cx="140" cy="180" r="6"/>
      <circle cx="170" cy="170" r="6"/>
    </g>
    <g class="mono" font-size="9" fill="#374151">
      <text x="20" y="220">~1500 TFs</text>
      <text x="20" y="234">~10⁵ TF-target edges</text>
      <text x="20" y="248">DBs: ENCODE, RegulonDB</text>
      <text x="20" y="262">use: master regulators</text>
    </g>
  </g>

  <!-- Panel 3: Metabolic -->
  <g transform="translate(520,80)">
    <rect width="220" height="280" fill="#fff" stroke="#065f46" stroke-width="1.5" rx="6"/>
    <text x="110" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">Metabolic</text>
    <text x="110" y="38" text-anchor="middle" font-size="10" class="mono" fill="#525252">metabolites + enzymes</text>
    <!-- Linear pathway -->
    <g stroke="#065f46" stroke-width="1.5" fill="none" marker-end="url(#a3)">
      <line x1="50" y1="100" x2="80" y2="100"/>
      <line x1="100" y1="100" x2="130" y2="100"/>
      <line x1="150" y1="100" x2="180" y2="100"/>
      <line x1="90" y1="110" x2="90" y2="160"/>
      <line x1="110" y1="160" x2="160" y2="170"/>
    </g>
    <defs>
      <marker id="a3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#065f46"/>
      </marker>
    </defs>
    <g fill="#dcfce7" stroke="#065f46">
      <circle cx="40" cy="100" r="9"/>
      <circle cx="90" cy="100" r="9"/>
      <circle cx="140" cy="100" r="9"/>
      <circle cx="190" cy="100" r="9"/>
      <circle cx="90" cy="170" r="9"/>
      <circle cx="170" cy="180" r="9"/>
    </g>
    <g class="mono" font-size="9" fill="#374151">
      <text x="20" y="220">~2700 reactions</text>
      <text x="20" y="234">~3000 metabolites</text>
      <text x="20" y="248">DBs: KEGG, Recon3D</text>
      <text x="20" y="262">use: FBA, drug effects</text>
    </g>
  </g>

  <!-- Panel 4: Signalling -->
  <g transform="translate(760,80)">
    <rect width="220" height="280" fill="#fff" stroke="#7c3aed" stroke-width="1.5" rx="6"/>
    <text x="110" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">Signalling</text>
    <text x="110" y="38" text-anchor="middle" font-size="10" class="mono" fill="#525252">kinases + cascades</text>
    <!-- Cascade -->
    <g stroke="#7c3aed" stroke-width="1.5" fill="none" marker-end="url(#a4)">
      <line x1="110" y1="80" x2="110" y2="105"/>
      <line x1="110" y1="120" x2="80" y2="145"/>
      <line x1="110" y1="120" x2="140" y2="145"/>
      <line x1="80" y1="160" x2="60" y2="190"/>
      <line x1="80" y1="160" x2="100" y2="190"/>
      <line x1="140" y1="160" x2="120" y2="190"/>
      <line x1="140" y1="160" x2="160" y2="190"/>
    </g>
    <defs>
      <marker id="a4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
      </marker>
    </defs>
    <g fill="#7c3aed">
      <circle cx="110" cy="70" r="6"/>
      <circle cx="110" cy="115" r="6"/>
      <circle cx="80" cy="155" r="6"/>
      <circle cx="140" cy="155" r="6"/>
      <circle cx="60" cy="200" r="5"/>
      <circle cx="100" cy="200" r="5"/>
      <circle cx="120" cy="200" r="5"/>
      <circle cx="160" cy="200" r="5"/>
    </g>
    <g class="mono" font-size="9" fill="#374151">
      <text x="20" y="220">~600 kinases</text>
      <text x="20" y="234">~10⁵ phospho-sites</text>
      <text x="20" y="248">DBs: PhosphoSitePlus</text>
      <text x="20" y="262">use: drug mechanism</text>
    </g>
  </g>

  <!-- Panel 5: Disease -->
  <g transform="translate(1000,80)">
    <rect width="160" height="280" fill="#fff" stroke="#0d7377" stroke-width="1.5" rx="6"/>
    <text x="80" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#0d7377">Disease</text>
    <text x="80" y="38" text-anchor="middle" font-size="10" class="mono" fill="#525252">disease-disease</text>
    <!-- Triangles connected -->
    <g stroke="#0d7377" stroke-width="1" fill="none">
      <line x1="40" y1="100" x2="80" y2="120"/>
      <line x1="80" y1="120" x2="120" y2="100"/>
      <line x1="40" y1="100" x2="120" y2="100"/>
      <line x1="80" y1="120" x2="80" y2="170"/>
      <line x1="80" y1="170" x2="40" y2="190"/>
      <line x1="80" y1="170" x2="120" y2="190"/>
    </g>
    <g fill="#0d7377">
      <polygon points="40,90 30,110 50,110"/>
      <polygon points="120,90 110,110 130,110"/>
      <polygon points="80,110 70,130 90,130"/>
      <polygon points="80,160 70,180 90,180"/>
      <polygon points="40,180 30,200 50,200"/>
      <polygon points="120,180 110,200 130,200"/>
    </g>
    <g class="mono" font-size="9" fill="#374151">
      <text x="20" y="220">~7000 diseases</text>
      <text x="20" y="234">via shared genes</text>
      <text x="20" y="248">DBs: DisGeNET, OMIM</text>
      <text x="20" y="262">use: repurposing</text>
    </g>
  </g>

  <!-- Cross-network workflows panel -->
  <g transform="translate(80,420)">
    <rect width="1040" height="240" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="520" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Cross-network workflows</text>
    <line x1="20" y1="36" x2="1020" y2="36" stroke="#e7e5e4"/>
    <g transform="translate(40,60)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#1e3a8a">PPI + GRN → "regulome"</text>
      <text x="0" y="18" font-size="10" fill="#525252">Combine TF-target edges with PPI; identify regulatory complexes that act together.</text>
      <text x="0" y="44" font-size="11" font-weight="700" fill="#065f46">PPI + Metabolic → "interactome"</text>
      <text x="0" y="62" font-size="10" fill="#525252">Map metabolic flux changes through the PPI; pathway-level perturbation analysis.</text>
      <text x="0" y="88" font-size="11" font-weight="700" fill="#7c3aed">Signalling + GRN → cascade-to-expression</text>
      <text x="0" y="106" font-size="10" fill="#525252">Trace from receptor activation through phosphorylation cascade to TF activation to gene expression.</text>
      <text x="0" y="132" font-size="11" font-weight="700" fill="#0d7377">Disease + PPI → drug repurposing</text>
      <text x="0" y="150" font-size="10" fill="#525252">Project disease genes onto PPI; find network proximity to drug targets; rank candidates.</text>
    </g>
    <g transform="translate(620,60)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#374151">Topology features (universal)</text>
      <text x="0" y="20" font-size="10" fill="#525252">• Scale-free: P(k) ~ k^(−γ), γ ∈ [2, 3]</text>
      <text x="0" y="38" font-size="10" fill="#525252">• Small-world: avg path ≈ log(N)</text>
      <text x="0" y="56" font-size="10" fill="#525252">• Modular: dense functional clusters</text>
      <text x="0" y="74" font-size="10" fill="#525252">• Hub-dominated: a few high-degree</text>
      <text x="0" y="92" font-size="10" fill="#525252">  nodes (TP53, EGFR, MYC, ...)</text>
      <text x="0" y="120" font-size="11" font-weight="700" fill="#374151">Common across</text>
      <text x="0" y="140" font-size="10" fill="#525252">All five biological types and beyond:</text>
      <text x="0" y="158" font-size="10" fill="#525252">social networks, internet, citation,</text>
      <text x="0" y="176" font-size="10" fill="#525252">power grid — same topology family.</text>
    </g>
  </g>
</svg>
