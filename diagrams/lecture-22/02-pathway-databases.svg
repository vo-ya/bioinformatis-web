<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="720" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Pathway database landscape — different granularities, different answers</text>

  <!-- Main grid -->
  <g transform="translate(60,80)">
    <!-- Header row -->
    <g class="mono" font-size="11" fill="#525252" font-weight="700">
      <text x="220" y="0">Pathways/sets</text>
      <text x="380" y="0">Granularity</text>
      <text x="540" y="0">Hierarchy</text>
      <text x="720" y="0">Use case</text>
      <text x="930" y="0">TP53 hits</text>
    </g>
    <line x1="0" y1="10" x2="1080" y2="10" stroke="#374151" stroke-width="1"/>

    <!-- Row: KEGG -->
    <g transform="translate(0,40)">
      <rect x="0" y="-22" width="200" height="40" fill="#dbeafe" stroke="#1e3a8a" rx="4"/>
      <text x="100" y="0" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">KEGG</text>
      <text x="100" y="14" text-anchor="middle" font-size="9" class="mono" fill="#525252">since 1995</text>
      <text x="220" y="0" font-size="11" class="mono" fill="#374151">~550</text>
      <text x="380" y="0" font-size="11" fill="#374151">medium-coarse</text>
      <text x="540" y="0" font-size="11" fill="#374151">flat (mostly)</text>
      <text x="720" y="0" font-size="11" fill="#374151">metabolism, signalling</text>
      <text x="930" y="0" font-size="11" font-weight="700" fill="#1e3a8a" class="mono">14</text>
    </g>
    <line x1="0" y1="60" x2="1080" y2="60" stroke="#e7e5e4"/>

    <!-- Row: Reactome -->
    <g transform="translate(0,80)">
      <rect x="0" y="-22" width="200" height="40" fill="#dbeafe" stroke="#1e3a8a" rx="4"/>
      <text x="100" y="0" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Reactome</text>
      <text x="100" y="14" text-anchor="middle" font-size="9" class="mono" fill="#525252">since 2003</text>
      <text x="220" y="0" font-size="11" class="mono" fill="#374151">~2,500</text>
      <text x="380" y="0" font-size="11" fill="#374151">fine-grained</text>
      <text x="540" y="0" font-size="11" fill="#374151">multi-level</text>
      <text x="720" y="0" font-size="11" fill="#374151">signalling, immune</text>
      <text x="930" y="0" font-size="11" font-weight="700" fill="#1e3a8a" class="mono">87</text>
    </g>
    <line x1="0" y1="100" x2="1080" y2="100" stroke="#e7e5e4"/>

    <!-- Row: GO BP -->
    <g transform="translate(0,120)">
      <rect x="0" y="-22" width="200" height="40" fill="#dcfce7" stroke="#065f46" rx="4"/>
      <text x="100" y="0" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">GO BP</text>
      <text x="100" y="14" text-anchor="middle" font-size="9" class="mono" fill="#525252">biological process</text>
      <text x="220" y="0" font-size="11" class="mono" fill="#374151">~30,000</text>
      <text x="380" y="0" font-size="11" fill="#374151">very fine</text>
      <text x="540" y="0" font-size="11" fill="#374151">DAG (deep)</text>
      <text x="720" y="0" font-size="11" fill="#374151">general annotation</text>
      <text x="930" y="0" font-size="11" font-weight="700" fill="#065f46" class="mono">198</text>
    </g>
    <line x1="0" y1="140" x2="1080" y2="140" stroke="#e7e5e4"/>

    <!-- Row: GO MF -->
    <g transform="translate(0,160)">
      <rect x="0" y="-22" width="200" height="40" fill="#dcfce7" stroke="#065f46" rx="4"/>
      <text x="100" y="0" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">GO MF</text>
      <text x="100" y="14" text-anchor="middle" font-size="9" class="mono" fill="#525252">molecular function</text>
      <text x="220" y="0" font-size="11" class="mono" fill="#374151">~12,000</text>
      <text x="380" y="0" font-size="11" fill="#374151">activity-level</text>
      <text x="540" y="0" font-size="11" fill="#374151">DAG (medium)</text>
      <text x="720" y="0" font-size="11" fill="#374151">enzyme-class enrichment</text>
      <text x="930" y="0" font-size="11" font-weight="700" fill="#065f46" class="mono">42</text>
    </g>
    <line x1="0" y1="180" x2="1080" y2="180" stroke="#e7e5e4"/>

    <!-- Row: GO CC -->
    <g transform="translate(0,200)">
      <rect x="0" y="-22" width="200" height="40" fill="#dcfce7" stroke="#065f46" rx="4"/>
      <text x="100" y="0" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">GO CC</text>
      <text x="100" y="14" text-anchor="middle" font-size="9" class="mono" fill="#525252">cellular component</text>
      <text x="220" y="0" font-size="11" class="mono" fill="#374151">~4,000</text>
      <text x="380" y="0" font-size="11" fill="#374151">localisation</text>
      <text x="540" y="0" font-size="11" fill="#374151">DAG (shallow)</text>
      <text x="720" y="0" font-size="11" fill="#374151">subcellular targeting</text>
      <text x="930" y="0" font-size="11" font-weight="700" fill="#065f46" class="mono">28</text>
    </g>
    <line x1="0" y1="220" x2="1080" y2="220" stroke="#e7e5e4"/>

    <!-- Row: MSigDB -->
    <g transform="translate(0,240)">
      <rect x="0" y="-22" width="200" height="40" fill="#fef3c7" stroke="#b45309" rx="4"/>
      <text x="100" y="0" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">MSigDB</text>
      <text x="100" y="14" text-anchor="middle" font-size="9" class="mono" fill="#525252">Hallmark + collections</text>
      <text x="220" y="0" font-size="11" class="mono" fill="#374151">~30,000</text>
      <text x="380" y="0" font-size="11" fill="#374151">aggregator</text>
      <text x="540" y="0" font-size="11" fill="#374151">flat (collections)</text>
      <text x="720" y="0" font-size="11" fill="#374151">RNA-seq DE enrichment</text>
      <text x="930" y="0" font-size="11" font-weight="700" fill="#b45309" class="mono">76</text>
    </g>
    <line x1="0" y1="260" x2="1080" y2="260" stroke="#374151" stroke-width="1.2"/>
  </g>

  <!-- Bottom: query example -->
  <g transform="translate(60,400)">
    <rect width="1080" height="270" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="540" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Example query: "What pathway is TP53 in?"</text>
    <line x1="40" y1="36" x2="1040" y2="36" stroke="#e7e5e4"/>

    <g transform="translate(40,60)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#1e3a8a">KEGG (14 hits):</text>
      <text x="0" y="18" font-size="10" class="mono" fill="#374151">hsa04115 (p53 signalling), hsa04110 (cell cycle),</text>
      <text x="0" y="34" font-size="10" class="mono" fill="#374151">hsa04210 (apoptosis), hsa05200 (pathways in cancer), ...</text>
      <text x="0" y="58" font-size="11" font-weight="700" fill="#1e3a8a">Reactome (87 hits):</text>
      <text x="0" y="76" font-size="10" class="mono" fill="#374151">R-HSA-3700989 (Transcriptional Regulation by TP53),</text>
      <text x="0" y="92" font-size="10" class="mono" fill="#374151">R-HSA-69541 (Stabilisation of p53), ...</text>
      <text x="0" y="116" font-size="11" font-weight="700" fill="#065f46">GO BP (198 hits):</text>
      <text x="0" y="134" font-size="10" class="mono" fill="#374151">GO:0006978 (DNA-damage response, TP53 class),</text>
      <text x="0" y="150" font-size="10" class="mono" fill="#374151">GO:0006977 (DNA damage cell cycle arrest), ...</text>
      <text x="0" y="174" font-size="11" font-weight="700" fill="#b45309">MSigDB Hallmark (76 hits):</text>
      <text x="0" y="192" font-size="10" class="mono" fill="#374151">HALLMARK_P53_PATHWAY,</text>
      <text x="0" y="208" font-size="10" class="mono" fill="#374151">HALLMARK_DNA_REPAIR, ...</text>
    </g>

    <g transform="translate(620,60)">
      <rect width="400" height="180" fill="#fef3c7" stroke="#b45309" rx="4"/>
      <text x="200" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Different databases give different answers</text>
      <line x1="20" y1="34" x2="380" y2="34" stroke="#92400e" opacity="0.4"/>
      <g transform="translate(20,52)" font-size="10" fill="#374151">
        <text x="0" y="0">• KEGG: ~14 broad pathway hits</text>
        <text x="0" y="20">• Reactome: ~87 fine-grained hits</text>
        <text x="0" y="40">• GO BP: ~198 because of the deep DAG</text>
        <text x="0" y="60">  (true-path rule: ancestor terms also fire)</text>
        <text x="0" y="84">• MSigDB Hallmark: 76 because TP53</text>
        <text x="0" y="100">  is a hub gene</text>
        <text x="0" y="124" font-weight="700">Recommendation:</text>
        <text x="0" y="140">Modern analyses run multiple in</text>
        <text x="0" y="156">parallel; report the union with</text>
      </g>
    </g>
  </g>
</svg>
