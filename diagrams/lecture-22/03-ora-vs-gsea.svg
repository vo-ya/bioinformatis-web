<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">ORA vs GSEA — discretised count vs ranked-list walk</text>

  <!-- Left panel: ORA -->
  <g transform="translate(60,80)">
    <text x="240" y="0" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">ORA — Over-Representation Analysis</text>
    <text x="240" y="20" text-anchor="middle" font-size="10" fill="#525252">discretise at threshold; count overlap; hypergeometric p-value</text>

    <!-- Diagram: gene list as colored chips -->
    <g transform="translate(40,50)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#374151">Universe U (20,000 genes)</text>
      <rect x="0" y="10" width="380" height="20" fill="#fafaf9" stroke="#9ca3af"/>
      <!-- Some dots representing genes -->
      <g fill="#525252">
        <circle cx="20" cy="20" r="2"/><circle cx="40" cy="20" r="2"/><circle cx="60" cy="20" r="2"/>
        <circle cx="80" cy="20" r="2"/><circle cx="100" cy="20" r="2"/><circle cx="120" cy="20" r="2"/>
        <circle cx="140" cy="20" r="2"/><circle cx="160" cy="20" r="2"/><circle cx="180" cy="20" r="2"/>
        <circle cx="200" cy="20" r="2"/><circle cx="220" cy="20" r="2"/><circle cx="240" cy="20" r="2"/>
        <circle cx="260" cy="20" r="2"/><circle cx="280" cy="20" r="2"/><circle cx="300" cy="20" r="2"/>
        <circle cx="320" cy="20" r="2"/><circle cx="340" cy="20" r="2"/><circle cx="360" cy="20" r="2"/>
      </g>

      <text x="0" y="60" font-size="11" font-weight="700" fill="#374151">Gene list L (200 DEGs at FDR &lt; 0.05)</text>
      <rect x="0" y="70" width="380" height="20" fill="#fef3c7" stroke="#b45309"/>
      <g fill="#b45309">
        <circle cx="40" cy="80" r="2.5"/><circle cx="80" cy="80" r="2.5"/>
        <circle cx="120" cy="80" r="2.5"/><circle cx="180" cy="80" r="2.5"/>
        <circle cx="220" cy="80" r="2.5"/><circle cx="280" cy="80" r="2.5"/>
        <circle cx="320" cy="80" r="2.5"/>
      </g>

      <text x="0" y="120" font-size="11" font-weight="700" fill="#374151">Gene set G (50 genes from KEGG path)</text>
      <rect x="0" y="130" width="380" height="20" fill="#dcfce7" stroke="#065f46"/>
      <g fill="#065f46">
        <circle cx="60" cy="140" r="2.5"/><circle cx="120" cy="140" r="2.5"/>
        <circle cx="180" cy="140" r="2.5"/><circle cx="220" cy="140" r="2.5"/>
        <circle cx="280" cy="140" r="2.5"/>
      </g>
      <text x="0" y="170" font-size="11" font-weight="700" fill="#7c3aed">Overlap a = 12 (highlighted)</text>
    </g>

    <!-- 2x2 contingency table -->
    <g transform="translate(40,260)">
      <text x="200" y="-6" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">2×2 contingency table</text>
      <rect x="0" y="0" width="400" height="100" fill="#fff" stroke="#d6d3d1"/>
      <line x1="200" y1="0" x2="200" y2="100" stroke="#d6d3d1"/>
      <line x1="0" y1="50" x2="400" y2="50" stroke="#d6d3d1"/>
      <text x="100" y="20" text-anchor="middle" font-size="10" font-weight="700" fill="#525252" class="mono">In G</text>
      <text x="300" y="20" text-anchor="middle" font-size="10" font-weight="700" fill="#525252" class="mono">Not in G</text>
      <text x="-12" y="32" text-anchor="end" font-size="10" font-weight="700" fill="#525252" class="mono">In L</text>
      <text x="-12" y="82" text-anchor="end" font-size="10" font-weight="700" fill="#525252" class="mono">Not in L</text>
      <text x="100" y="42" text-anchor="middle" font-size="14" font-weight="700" fill="#7c3aed" class="mono">a = 12</text>
      <text x="300" y="42" text-anchor="middle" font-size="14" font-weight="700" fill="#525252" class="mono">b = 188</text>
      <text x="100" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#525252" class="mono">c = 38</text>
      <text x="300" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#525252" class="mono">d = 19,762</text>
    </g>

    <g transform="translate(40,400)">
      <rect width="400" height="60" fill="#fee2e2" stroke="#7f1d1d" rx="4"/>
      <text x="200" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d" class="mono">p_hyper(X ≥ 12) = 1.4 × 10⁻⁷</text>
      <text x="200" y="42" text-anchor="middle" font-size="10" fill="#525252">fold enrichment 24×, FDR &lt; 0.001</text>
    </g>
  </g>

  <!-- Right panel: GSEA -->
  <g transform="translate(620,80)">
    <text x="240" y="0" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">GSEA — Gene Set Enrichment Analysis</text>
    <text x="240" y="20" text-anchor="middle" font-size="10" fill="#525252">use full ranked list; running ES; permutation null</text>

    <!-- Ranked list axis -->
    <g transform="translate(40,60)">
      <line x1="0" y1="60" x2="380" y2="60" stroke="#374151"/>
      <line x1="0" y1="60" x2="0" y2="120" stroke="#374151"/>
      <text x="0" y="138" text-anchor="middle" font-size="9" class="mono" fill="#525252">rank 1</text>
      <text x="380" y="138" text-anchor="middle" font-size="9" class="mono" fill="#525252">rank N</text>
      <text x="190" y="158" text-anchor="middle" font-size="11" fill="#525252">all genes ranked by |log fold-change|</text>

      <!-- Tick marks for set members -->
      <g stroke="#0d7377" stroke-width="1.6">
        <line x1="20" y1="48" x2="20" y2="72"/>
        <line x1="35" y1="48" x2="35" y2="72"/>
        <line x1="58" y1="48" x2="58" y2="72"/>
        <line x1="80" y1="48" x2="80" y2="72"/>
        <line x1="120" y1="48" x2="120" y2="72"/>
        <line x1="150" y1="48" x2="150" y2="72"/>
        <line x1="200" y1="48" x2="200" y2="72"/>
        <line x1="280" y1="48" x2="280" y2="72"/>
        <line x1="340" y1="48" x2="340" y2="72"/>
      </g>
    </g>

    <!-- Running ES curve -->
    <g transform="translate(40,210)">
      <line x1="0" y1="0" x2="0" y2="140" stroke="#374151"/>
      <line x1="0" y1="70" x2="380" y2="70" stroke="#9ca3af" stroke-dasharray="3 3"/>
      <text x="-8" y="4" text-anchor="end" font-size="9" class="mono" fill="#525252">+0.6</text>
      <text x="-8" y="74" text-anchor="end" font-size="9" class="mono" fill="#525252">0</text>
      <text x="-8" y="138" text-anchor="end" font-size="9" class="mono" fill="#525252">−0.3</text>
      <!-- Running ES -->
      <path d="M 0 70 L 20 50 L 35 30 L 58 14 L 80 8 L 100 18 L 120 10 L 140 22 L 150 12 L 170 28 L 200 22 L 240 50 L 280 60 L 320 70 L 340 76 L 380 96"
            stroke="#dc2626" stroke-width="2.5" fill="none"/>
      <!-- Mark max ES -->
      <circle cx="80" cy="8" r="5" fill="#dc2626"/>
      <text x="86" y="2" font-size="10" font-weight="700" fill="#dc2626" class="mono">max ES = 0.62</text>
      <text x="190" y="160" text-anchor="middle" font-size="11" fill="#525252">running enrichment score</text>
    </g>

    <g transform="translate(40,400)">
      <rect width="400" height="60" fill="#dcfce7" stroke="#065f46" rx="4"/>
      <text x="200" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46" class="mono">ES = 0.62, p_perm &lt; 0.001</text>
      <text x="200" y="42" text-anchor="middle" font-size="10" fill="#525252">leading-edge: top 9 genes carry the signal</text>
    </g>
  </g>

  <!-- Bottom banner -->
  <g transform="translate(60,490)">
    <rect width="1080" height="80" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="540" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">ORA throws away the rank; GSEA uses the full list. GSEA detects coherent shifts ORA misses.</text>
    <text x="540" y="44" text-anchor="middle" font-size="10" fill="#374151">Both can run together — ORA gives you "which pathways have many DEGs"; GSEA gives you "which pathways are coordinately shifted, even if no individual gene crosses the threshold".</text>
    <text x="540" y="62" text-anchor="middle" font-size="10" fill="#374151">Modern best practice: run fgsea (GSEA) + clusterProfiler (ORA) on the same DEG list and compare.</text>
  </g>
</svg>
