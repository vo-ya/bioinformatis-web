<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="720" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Network propagation as low-pass filtering — three time slices of RWR on a small PPI</text>

  <!-- Define the same network 3 times with different intensities -->
  <!-- Use a fixed set of 24 nodes -->
  <!-- Node positions reusable -->
  <!-- Simple 3-cluster + bridging structure -->

  <!-- Panel 1: t=0 -->
  <g transform="translate(40,80)">
    <rect width="320" height="320" fill="#fff" stroke="#d6d3d1" rx="4"/>
    <text x="160" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">t = 0 (impulses at seeds)</text>
    <!-- Edges -->
    <g stroke="#9ca3af" stroke-width="0.8" fill="none">
      <line x1="60" y1="80" x2="120" y2="100"/>
      <line x1="120" y1="100" x2="180" y2="80"/>
      <line x1="120" y1="100" x2="100" y2="160"/>
      <line x1="120" y1="100" x2="180" y2="160"/>
      <line x1="60" y1="80" x2="100" y2="160"/>
      <line x1="180" y1="80" x2="180" y2="160"/>
      <line x1="180" y1="160" x2="240" y2="140"/>
      <line x1="180" y1="160" x2="240" y2="200"/>
      <line x1="240" y1="140" x2="280" y2="180"/>
      <line x1="240" y1="200" x2="280" y2="180"/>
      <line x1="240" y1="200" x2="220" y2="240"/>
      <line x1="220" y1="240" x2="280" y2="180"/>
      <line x1="100" y1="160" x2="80" y2="220"/>
      <line x1="100" y1="160" x2="140" y2="240"/>
      <line x1="80" y1="220" x2="140" y2="240"/>
      <line x1="80" y1="220" x2="60" y2="280"/>
      <line x1="140" y1="240" x2="160" y2="280"/>
      <line x1="60" y1="280" x2="160" y2="280"/>
    </g>
    <!-- Nodes: t=0 — only seeds red -->
    <g>
      <circle cx="60" cy="80" r="6" fill="#dc2626"/>
      <circle cx="120" cy="100" r="6" fill="#fff" stroke="#9ca3af" stroke-width="1"/>
      <circle cx="180" cy="80" r="6" fill="#fff" stroke="#9ca3af" stroke-width="1"/>
      <circle cx="100" cy="160" r="6" fill="#fff" stroke="#9ca3af" stroke-width="1"/>
      <circle cx="180" cy="160" r="6" fill="#fff" stroke="#9ca3af" stroke-width="1"/>
      <circle cx="240" cy="140" r="6" fill="#fff" stroke="#9ca3af" stroke-width="1"/>
      <circle cx="240" cy="200" r="6" fill="#dc2626"/>
      <circle cx="280" cy="180" r="6" fill="#fff" stroke="#9ca3af" stroke-width="1"/>
      <circle cx="220" cy="240" r="6" fill="#fff" stroke="#9ca3af" stroke-width="1"/>
      <circle cx="80" cy="220" r="6" fill="#fff" stroke="#9ca3af" stroke-width="1"/>
      <circle cx="140" cy="240" r="6" fill="#fff" stroke="#9ca3af" stroke-width="1"/>
      <circle cx="60" cy="280" r="6" fill="#dc2626"/>
      <circle cx="160" cy="280" r="6" fill="#fff" stroke="#9ca3af" stroke-width="1"/>
    </g>
    <text x="160" y="306" text-anchor="middle" font-size="9" fill="#525252" class="mono">3 seeds at intensity 1; rest at 0</text>
  </g>

  <!-- Panel 2: t=5 -->
  <g transform="translate(380,80)">
    <rect width="320" height="320" fill="#fff" stroke="#d6d3d1" rx="4"/>
    <text x="160" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">t = 5 (early diffusion)</text>
    <g stroke="#9ca3af" stroke-width="0.8" fill="none">
      <line x1="60" y1="80" x2="120" y2="100"/>
      <line x1="120" y1="100" x2="180" y2="80"/>
      <line x1="120" y1="100" x2="100" y2="160"/>
      <line x1="120" y1="100" x2="180" y2="160"/>
      <line x1="60" y1="80" x2="100" y2="160"/>
      <line x1="180" y1="80" x2="180" y2="160"/>
      <line x1="180" y1="160" x2="240" y2="140"/>
      <line x1="180" y1="160" x2="240" y2="200"/>
      <line x1="240" y1="140" x2="280" y2="180"/>
      <line x1="240" y1="200" x2="280" y2="180"/>
      <line x1="240" y1="200" x2="220" y2="240"/>
      <line x1="220" y1="240" x2="280" y2="180"/>
      <line x1="100" y1="160" x2="80" y2="220"/>
      <line x1="100" y1="160" x2="140" y2="240"/>
      <line x1="80" y1="220" x2="140" y2="240"/>
      <line x1="80" y1="220" x2="60" y2="280"/>
      <line x1="140" y1="240" x2="160" y2="280"/>
      <line x1="60" y1="280" x2="160" y2="280"/>
    </g>
    <g>
      <circle cx="60" cy="80" r="6" fill="#dc2626"/>
      <circle cx="120" cy="100" r="6" fill="#fca5a5"/>
      <circle cx="180" cy="80" r="6" fill="#fca5a5"/>
      <circle cx="100" cy="160" r="6" fill="#fca5a5"/>
      <circle cx="180" cy="160" r="6" fill="#fecaca"/>
      <circle cx="240" cy="140" r="6" fill="#fca5a5"/>
      <circle cx="240" cy="200" r="6" fill="#dc2626"/>
      <circle cx="280" cy="180" r="6" fill="#fca5a5"/>
      <circle cx="220" cy="240" r="6" fill="#fca5a5"/>
      <circle cx="80" cy="220" r="6" fill="#fca5a5"/>
      <circle cx="140" cy="240" r="6" fill="#fecaca"/>
      <circle cx="60" cy="280" r="6" fill="#dc2626"/>
      <circle cx="160" cy="280" r="6" fill="#fecaca"/>
    </g>
    <text x="160" y="306" text-anchor="middle" font-size="9" fill="#525252" class="mono">direct neighbours ≈ 0.4; 2-hop ≈ 0.1</text>
  </g>

  <!-- Panel 3: t=50 -->
  <g transform="translate(720,80)">
    <rect width="320" height="320" fill="#fff" stroke="#d6d3d1" rx="4"/>
    <text x="160" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">t = 50 (steady state)</text>
    <g stroke="#9ca3af" stroke-width="0.8" fill="none">
      <line x1="60" y1="80" x2="120" y2="100"/>
      <line x1="120" y1="100" x2="180" y2="80"/>
      <line x1="120" y1="100" x2="100" y2="160"/>
      <line x1="120" y1="100" x2="180" y2="160"/>
      <line x1="60" y1="80" x2="100" y2="160"/>
      <line x1="180" y1="80" x2="180" y2="160"/>
      <line x1="180" y1="160" x2="240" y2="140"/>
      <line x1="180" y1="160" x2="240" y2="200"/>
      <line x1="240" y1="140" x2="280" y2="180"/>
      <line x1="240" y1="200" x2="280" y2="180"/>
      <line x1="240" y1="200" x2="220" y2="240"/>
      <line x1="220" y1="240" x2="280" y2="180"/>
      <line x1="100" y1="160" x2="80" y2="220"/>
      <line x1="100" y1="160" x2="140" y2="240"/>
      <line x1="80" y1="220" x2="140" y2="240"/>
      <line x1="80" y1="220" x2="60" y2="280"/>
      <line x1="140" y1="240" x2="160" y2="280"/>
      <line x1="60" y1="280" x2="160" y2="280"/>
    </g>
    <g>
      <circle cx="60" cy="80" r="6" fill="#dc2626"/>
      <circle cx="120" cy="100" r="6" fill="#dc2626" fill-opacity="0.7"/>
      <circle cx="180" cy="80" r="6" fill="#dc2626" fill-opacity="0.5"/>
      <circle cx="100" cy="160" r="6" fill="#dc2626" fill-opacity="0.65"/>
      <circle cx="180" cy="160" r="6" fill="#dc2626" fill-opacity="0.5"/>
      <circle cx="240" cy="140" r="6" fill="#dc2626" fill-opacity="0.55"/>
      <circle cx="240" cy="200" r="6" fill="#dc2626"/>
      <circle cx="280" cy="180" r="6" fill="#dc2626" fill-opacity="0.55"/>
      <circle cx="220" cy="240" r="6" fill="#dc2626" fill-opacity="0.5"/>
      <circle cx="80" cy="220" r="6" fill="#dc2626" fill-opacity="0.6"/>
      <circle cx="140" cy="240" r="6" fill="#dc2626" fill-opacity="0.4"/>
      <circle cx="60" cy="280" r="6" fill="#dc2626"/>
      <circle cx="160" cy="280" r="6" fill="#dc2626" fill-opacity="0.45"/>
    </g>
    <text x="160" y="306" text-anchor="middle" font-size="9" fill="#525252" class="mono">exponential decay with graph distance</text>
  </g>

  <!-- Bottom: GSP analogy -->
  <g transform="translate(40,420)">
    <rect width="1100" height="200" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="550" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Graph signal processing analogy: the same operation as Gaussian image smoothing</text>
    <line x1="20" y1="34" x2="1080" y2="34" stroke="#e7e5e4"/>

    <g transform="translate(60,60)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#1e3a8a">Original signal (impulses)</text>
      <rect x="0" y="10" width="200" height="100" fill="#fff" stroke="#9ca3af"/>
      <!-- Three impulse "pixels" -->
      <rect x="40" y="40" width="20" height="20" fill="#dc2626"/>
      <rect x="100" y="60" width="20" height="20" fill="#dc2626"/>
      <rect x="150" y="30" width="20" height="20" fill="#dc2626"/>
      <text x="100" y="128" text-anchor="middle" font-size="10" fill="#525252">three "hot" pixels</text>
    </g>

    <text x="320" y="120" text-anchor="middle" font-size="20" fill="#525252">⟶</text>
    <text x="320" y="138" text-anchor="middle" font-size="9" fill="#525252">low-pass filter</text>

    <g transform="translate(380,60)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#dc2626">After Gaussian smoothing</text>
      <rect x="0" y="10" width="200" height="100" fill="#fff" stroke="#9ca3af"/>
      <!-- Smoothed "pixels" -->
      <radialGradient id="g1" cx="0.5" cy="0.5" r="0.5"><stop offset="0%" stop-color="#dc2626"/><stop offset="100%" stop-color="#fff"/></radialGradient>
      <circle cx="50" cy="50" r="22" fill="url(#g1)" fill-opacity="0.8"/>
      <circle cx="110" cy="70" r="22" fill="url(#g1)" fill-opacity="0.8"/>
      <circle cx="160" cy="40" r="22" fill="url(#g1)" fill-opacity="0.8"/>
      <text x="100" y="128" text-anchor="middle" font-size="10" fill="#525252">spread to neighbouring pixels</text>
    </g>

    <text x="640" y="120" text-anchor="middle" font-size="14" fill="#374151">≡</text>
    <text x="640" y="138" text-anchor="middle" font-size="9" fill="#525252">analogous</text>

    <g transform="translate(700,60)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#7c3aed">RWR on graph</text>
      <rect x="0" y="10" width="320" height="100" fill="#fff" stroke="#9ca3af"/>
      <text x="160" y="44" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#374151">p(t) = e^(−L·t) p(0)</text>
      <text x="160" y="68" text-anchor="middle" font-size="10" fill="#525252">heat kernel = low-pass on graph spectrum</text>
      <text x="160" y="86" text-anchor="middle" font-size="10" fill="#525252">e^(−λᵢt) damps high-frequency components</text>
      <text x="160" y="104" text-anchor="middle" font-size="9" fill="#525252">smooths the input signal across edges</text>
    </g>
  </g>

  <!-- Banner -->
  <g transform="translate(40,650)">
    <rect width="1100" height="40" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="550" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Propagation = low-pass filter in the graph Fourier basis. The same intuition as image smoothing, applied to a graph instead of a grid.</text>
  </g>
</svg>
