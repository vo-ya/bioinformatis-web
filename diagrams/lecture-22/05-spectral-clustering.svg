<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="720" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Spectral clustering — three communities separate in the Laplacian eigenspace</text>

  <!-- Top: 30-node 3-community network -->
  <g transform="translate(80,80)">
    <rect width="500" height="280" fill="#fff" stroke="#d6d3d1" rx="4"/>
    <text x="250" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Input network (30 nodes, 3 communities, sparse inter-cluster edges)</text>

    <!-- Cluster A: cobalt, top-left -->
    <g transform="translate(60,60)">
      <g stroke="#1e3a8a" stroke-width="0.8" fill="none">
        <line x1="0" y1="20" x2="40" y2="0"/>
        <line x1="40" y1="0" x2="80" y2="20"/>
        <line x1="0" y1="20" x2="40" y2="40"/>
        <line x1="40" y1="40" x2="80" y2="20"/>
        <line x1="0" y1="20" x2="80" y2="20"/>
        <line x1="20" y1="60" x2="60" y2="60"/>
        <line x1="40" y1="40" x2="20" y2="60"/>
        <line x1="40" y1="40" x2="60" y2="60"/>
        <line x1="0" y1="20" x2="20" y2="60"/>
        <line x1="80" y1="20" x2="60" y2="60"/>
      </g>
      <g fill="#1e3a8a">
        <circle cx="0" cy="20" r="6"/>
        <circle cx="40" cy="0" r="6"/>
        <circle cx="80" cy="20" r="6"/>
        <circle cx="40" cy="40" r="6"/>
        <circle cx="20" cy="60" r="6"/>
        <circle cx="60" cy="60" r="6"/>
      </g>
    </g>

    <!-- Cluster B: amber, top-right -->
    <g transform="translate(340,80)">
      <g stroke="#b45309" stroke-width="0.8" fill="none">
        <line x1="0" y1="0" x2="40" y2="20"/>
        <line x1="40" y1="20" x2="80" y2="0"/>
        <line x1="0" y1="0" x2="80" y2="0"/>
        <line x1="40" y1="20" x2="60" y2="50"/>
        <line x1="40" y1="20" x2="20" y2="50"/>
        <line x1="20" y1="50" x2="60" y2="50"/>
        <line x1="0" y1="0" x2="20" y2="50"/>
        <line x1="80" y1="0" x2="60" y2="50"/>
        <line x1="20" y1="50" x2="40" y2="80"/>
        <line x1="60" y1="50" x2="40" y2="80"/>
      </g>
      <g fill="#b45309">
        <circle cx="0" cy="0" r="6"/>
        <circle cx="40" cy="20" r="6"/>
        <circle cx="80" cy="0" r="6"/>
        <circle cx="20" cy="50" r="6"/>
        <circle cx="60" cy="50" r="6"/>
        <circle cx="40" cy="80" r="6"/>
      </g>
    </g>

    <!-- Cluster C: green, bottom-center -->
    <g transform="translate(180,180)">
      <g stroke="#065f46" stroke-width="0.8" fill="none">
        <line x1="0" y1="0" x2="40" y2="20"/>
        <line x1="40" y1="20" x2="80" y2="0"/>
        <line x1="0" y1="0" x2="80" y2="0"/>
        <line x1="40" y1="20" x2="0" y2="60"/>
        <line x1="40" y1="20" x2="80" y2="60"/>
        <line x1="0" y1="60" x2="80" y2="60"/>
        <line x1="0" y1="0" x2="0" y2="60"/>
        <line x1="80" y1="0" x2="80" y2="60"/>
      </g>
      <g fill="#065f46">
        <circle cx="0" cy="0" r="6"/>
        <circle cx="40" cy="20" r="6"/>
        <circle cx="80" cy="0" r="6"/>
        <circle cx="0" cy="60" r="6"/>
        <circle cx="80" cy="60" r="6"/>
        <circle cx="40" cy="80" r="6"/>
      </g>
    </g>

    <!-- Sparse inter-cluster edges -->
    <g stroke="#9ca3af" stroke-width="0.8" stroke-dasharray="3 2">
      <line x1="140" y1="120" x2="340" y2="80"/>
      <line x1="180" y1="240" x2="100" y2="120"/>
      <line x1="260" y1="260" x2="380" y2="130"/>
      <line x1="220" y1="200" x2="260" y2="260"/>
    </g>
    <text x="250" y="262" text-anchor="middle" font-size="9" fill="#525252" class="mono">grey dashed = inter-cluster (sparse)</text>
  </g>

  <!-- Eigenspace plot -->
  <g transform="translate(620,80)">
    <rect width="500" height="280" fill="#fff" stroke="#d6d3d1" rx="4"/>
    <text x="250" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Eigenspace projection (v₂ vs v₃ of graph Laplacian)</text>
    <!-- Axes -->
    <g transform="translate(40,40)">
      <line x1="0" y1="220" x2="420" y2="220" stroke="#374151"/>
      <line x1="0" y1="0" x2="0" y2="220" stroke="#374151"/>
      <text x="-10" y="220" text-anchor="end" font-size="10" class="mono" fill="#525252">−0.3</text>
      <text x="-10" y="120" text-anchor="end" font-size="10" class="mono" fill="#525252">0</text>
      <text x="-10" y="20" text-anchor="end" font-size="10" class="mono" fill="#525252">+0.3</text>
      <text x="0" y="240" text-anchor="middle" font-size="10" class="mono" fill="#525252">−0.3</text>
      <text x="210" y="240" text-anchor="middle" font-size="10" class="mono" fill="#525252">0</text>
      <text x="420" y="240" text-anchor="middle" font-size="10" class="mono" fill="#525252">+0.3</text>
      <text x="210" y="258" text-anchor="middle" font-size="11" fill="#525252">v₂</text>
      <text x="-30" y="120" text-anchor="middle" font-size="11" fill="#525252" transform="rotate(-90 -30 120)">v₃</text>

      <!-- Three clusters as scatter -->
      <g fill="#1e3a8a">
        <circle cx="60" cy="50" r="5"/>
        <circle cx="80" cy="60" r="5"/>
        <circle cx="50" cy="70" r="5"/>
        <circle cx="70" cy="40" r="5"/>
        <circle cx="90" cy="50" r="5"/>
        <circle cx="60" cy="60" r="5"/>
      </g>
      <g fill="#b45309">
        <circle cx="350" cy="60" r="5"/>
        <circle cx="370" cy="50" r="5"/>
        <circle cx="360" cy="70" r="5"/>
        <circle cx="380" cy="60" r="5"/>
        <circle cx="340" cy="80" r="5"/>
        <circle cx="370" cy="80" r="5"/>
      </g>
      <g fill="#065f46">
        <circle cx="200" cy="180" r="5"/>
        <circle cx="220" cy="170" r="5"/>
        <circle cx="240" cy="190" r="5"/>
        <circle cx="200" cy="170" r="5"/>
        <circle cx="220" cy="190" r="5"/>
        <circle cx="230" cy="180" r="5"/>
      </g>
      <!-- A few "noise" nodes around cluster boundaries -->
      <g fill="#525252" fill-opacity="0.4">
        <circle cx="160" cy="100" r="4"/>
        <circle cx="280" cy="120" r="4"/>
        <circle cx="120" cy="140" r="4"/>
        <circle cx="300" cy="160" r="4"/>
      </g>

      <!-- k-means partition shown as light-coloured regions -->
      <ellipse cx="70" cy="55" rx="40" ry="30" fill="#1e3a8a" fill-opacity="0.05" stroke="#1e3a8a" stroke-dasharray="4 3" stroke-width="0.8"/>
      <ellipse cx="365" cy="65" rx="35" ry="30" fill="#b45309" fill-opacity="0.05" stroke="#b45309" stroke-dasharray="4 3" stroke-width="0.8"/>
      <ellipse cx="220" cy="180" rx="40" ry="20" fill="#065f46" fill-opacity="0.05" stroke="#065f46" stroke-dasharray="4 3" stroke-width="0.8"/>
    </g>
  </g>

  <!-- Bottom: Laplacian heat map -->
  <g transform="translate(80,400)">
    <rect width="500" height="280" fill="#fff" stroke="#d6d3d1" rx="4"/>
    <text x="250" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Block structure of the graph Laplacian L = D − A</text>
    <!-- Render as 30x30 heatmap-style grid -->
    <g transform="translate(150,40)">
      <!-- 3 dense blocks on the diagonal -->
      <rect x="0" y="0" width="60" height="60" fill="#1e3a8a" fill-opacity="0.85"/>
      <rect x="80" y="80" width="60" height="60" fill="#b45309" fill-opacity="0.85"/>
      <rect x="160" y="160" width="60" height="60" fill="#065f46" fill-opacity="0.85"/>
      <!-- Lighter off-diagonal -->
      <rect x="60" y="80" width="20" height="20" fill="#9ca3af" fill-opacity="0.3"/>
      <rect x="140" y="160" width="20" height="20" fill="#9ca3af" fill-opacity="0.3"/>
      <rect x="0" y="160" width="20" height="20" fill="#9ca3af" fill-opacity="0.2"/>
      <!-- Frame -->
      <rect x="0" y="0" width="220" height="220" fill="none" stroke="#374151"/>
    </g>
    <text x="260" y="270" text-anchor="middle" font-size="10" class="mono" fill="#525252">block-diagonal structure → 3 communities visible from L alone</text>
  </g>

  <!-- Bottom right: comparison panel -->
  <g transform="translate(620,400)">
    <rect width="500" height="280" fill="#fff" stroke="#d6d3d1" rx="4"/>
    <text x="250" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Comparison: spectral vs Louvain on this network</text>
    <line x1="20" y1="34" x2="480" y2="34" stroke="#e7e5e4"/>

    <g transform="translate(40,60)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700" fill="#1e3a8a">Spectral clustering</text>
      <text x="0" y="20" font-size="10" class="mono">3 clusters, NMI = 0.95</text>
      <text x="0" y="36" font-size="10" class="mono">runtime: O(N³) for full eigendecomp</text>
      <text x="0" y="52" font-size="10" class="mono">strength: theoretical guarantees</text>
      <text x="0" y="68" font-size="10" class="mono">weakness: doesn't scale beyond ~10⁴ nodes</text>
    </g>
    <g transform="translate(40,160)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700" fill="#7c3aed">Louvain</text>
      <text x="0" y="20" font-size="10" class="mono">3 clusters, NMI = 0.93 (same partition here)</text>
      <text x="0" y="36" font-size="10" class="mono">runtime: ~O(N log N)</text>
      <text x="0" y="52" font-size="10" class="mono">strength: scales to millions of nodes</text>
      <text x="0" y="68" font-size="10" class="mono">weakness: stochastic; can produce disconnected modules</text>
    </g>
    <g transform="translate(40,260)">
      <rect x="-10" y="-12" width="450" height="20" fill="#fef3c7" stroke="#b45309" rx="3"/>
      <text x="215" y="2" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Both methods recover the same partition. Use Leiden for production at scale.</text>
    </g>
  </g>
</svg>
