<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arrW" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Standard network analysis workflow — from gene list to biological hypothesis</text>

  <!-- Main column -->
  <g transform="translate(280,70)">
    <!-- 1 -->
    <g>
      <rect x="0" y="0" width="320" height="56" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#1e3a8a">1. Gene list</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">DEGs / GWAS hits / cancer drivers / scRNA markers</text>
    </g>
    <line x1="160" y1="56" x2="160" y2="76" stroke="#525252" stroke-width="1.5" marker-end="url(#arrW)"/>
    <!-- 2 -->
    <g transform="translate(0,76)">
      <rect x="0" y="0" width="320" height="56" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#1e3a8a">2. Pick network</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">STRING (broad) · BioGRID (curated) · Reactome (pathway)</text>
    </g>
    <line x1="160" y1="132" x2="160" y2="152" stroke="#525252" stroke-width="1.5" marker-end="url(#arrW)"/>
    <!-- 3 -->
    <g transform="translate(0,152)">
      <rect x="0" y="0" width="320" height="56" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#b45309">3. Filter</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">STRING confidence &gt; 0.7 · drop low-quality edges</text>
    </g>
    <line x1="160" y1="208" x2="160" y2="228" stroke="#525252" stroke-width="1.5" marker-end="url(#arrW)"/>
    <!-- 4 -->
    <g transform="translate(0,228)">
      <rect x="0" y="0" width="320" height="80" fill="#dcfce7" stroke="#065f46" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#065f46">4. Propagate / cluster</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">RWR (PRINCE) — disease-gene prioritisation</text>
      <text x="20" y="58" font-size="10" class="mono" fill="#374151">Louvain / Leiden — community detection</text>
      <text x="20" y="74" font-size="9" fill="#525252">runtime ~minutes for ~10⁴ nodes</text>
    </g>
    <line x1="160" y1="308" x2="160" y2="328" stroke="#525252" stroke-width="1.5" marker-end="url(#arrW)"/>
    <!-- 5 -->
    <g transform="translate(0,328)">
      <rect x="0" y="0" width="320" height="56" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#7c3aed">5. Pathway enrichment</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">ORA / GSEA per module · clusterProfiler / fgsea</text>
    </g>
    <line x1="160" y1="384" x2="160" y2="404" stroke="#525252" stroke-width="1.5" marker-end="url(#arrW)"/>
    <!-- 6 -->
    <g transform="translate(0,404)">
      <rect x="0" y="0" width="320" height="56" fill="#fee2e2" stroke="#7f1d1d" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#7f1d1d">6. Visualise</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">Cytoscape · networkx · iGraph · ggraph</text>
    </g>
    <line x1="160" y1="460" x2="160" y2="480" stroke="#525252" stroke-width="1.5" marker-end="url(#arrW)"/>
    <!-- 7 -->
    <g transform="translate(0,480)">
      <rect x="0" y="0" width="320" height="56" fill="#fff" stroke="#525252" stroke-width="2" rx="6"/>
      <text x="160" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#525252">7. Biological hypothesis</text>
      <text x="160" y="42" text-anchor="middle" font-size="10" class="mono" fill="#374151">"these modules drive the phenotype"</text>
    </g>
  </g>

  <!-- Side panel: GWAS variant -->
  <g transform="translate(680,70)">
    <rect width="380" height="466" fill="#fff" stroke="#d6d3d1" stroke-width="1" rx="6"/>
    <text x="190" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">GWAS-driven variant (NetWAS / DOMINO)</text>
    <line x1="20" y1="36" x2="360" y2="36" stroke="#e7e5e4"/>

    <g transform="translate(20,52)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700" fill="#1e3a8a">1. Genome-wide GWAS p-values</text>
      <text x="14" y="16" font-size="10" class="mono" fill="#525252">~1M SNPs · per-SNP p</text>

      <text x="0" y="40" font-weight="700" fill="#1e3a8a">2. Map SNPs → genes</text>
      <text x="14" y="56" font-size="10" class="mono" fill="#525252">eQTL · proximity · MAGMA</text>

      <text x="0" y="80" font-weight="700" fill="#b45309">3. Score genes</text>
      <text x="14" y="96" font-size="10" class="mono" fill="#525252">aggregate SNP p-values per gene</text>

      <text x="0" y="120" font-weight="700" fill="#065f46">4. Network propagation</text>
      <text x="14" y="136" font-size="10" class="mono" fill="#525252">smooth gene scores via PPI</text>
      <text x="14" y="150" font-size="10" class="mono" fill="#525252">RWR or heat diffusion</text>

      <text x="0" y="174" font-weight="700" fill="#7c3aed">5. Re-rank genes</text>
      <text x="14" y="190" font-size="10" class="mono" fill="#525252">network-aware significance</text>

      <text x="0" y="214" font-weight="700" fill="#7f1d1d">6. Disease-gene candidates</text>
      <text x="14" y="230" font-size="10" class="mono" fill="#525252">top-ranked = causal candidates</text>
    </g>

    <g transform="translate(20,310)">
      <rect width="340" height="60" fill="#fef3c7" stroke="#b45309" rx="4"/>
      <text x="170" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Why network propagation helps</text>
      <text x="170" y="42" text-anchor="middle" font-size="10" fill="#374151">Borrows strength from known disease genes;</text>
      <text x="170" y="56" text-anchor="middle" font-size="10" fill="#374151">single-SNP p-values often underpowered alone.</text>
    </g>

    <g transform="translate(20,390)" font-size="10" fill="#374151">
      <text x="0" y="0" font-weight="700">Tools:</text>
      <text x="14" y="16" class="mono">NetWAS (Greene 2015)</text>
      <text x="14" y="30" class="mono">DOMINO (Levi 2021)</text>
      <text x="14" y="44" class="mono">PASCAL · MAGMA-PRS</text>
    </g>
  </g>

  <!-- Bottom banner — y dropped 580→620 because Step 7's white "Biological
       hypothesis" box ends at abs y=606 and the banner was painting over its
       bottom 26 px. -->
  <g transform="translate(80,620)">
    <rect width="1040" height="80" fill="#dcfce7" stroke="#065f46" rx="4"/>
    <text x="520" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">Modular workflow: each step has its own tool, runtime, and well-defined input/output</text>
    <text x="520" y="44" text-anchor="middle" font-size="10" fill="#374151">Same skeleton works for DEGs, GWAS hits, scRNA markers, mutations. Swap the seeds; reuse the network.</text>
    <text x="520" y="62" text-anchor="middle" font-size="10" fill="#374151" class="mono">Total runtime ~10 min on a laptop for 10⁴-node STRING subnetwork.</text>
  </g>
</svg>
