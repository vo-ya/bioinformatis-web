<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="720" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">RWR in a heterogeneous drug-target-disease network</text>

  <!-- Three time slices -->
  <!-- Common node positions -->
  <!-- Drug nodes (squares) at top, proteins (circles) middle, diseases (triangles) bottom -->

  <!-- Panel 1: t=0 -->
  <g transform="translate(40,80)">
    <rect width="370" height="540" fill="#fff" stroke="#d6d3d1" rx="4"/>
    <text x="185" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">t = 0 — drug seed only</text>

    <!-- Edges (faint) -->
    <g stroke="#9ca3af" stroke-width="0.6" fill="none">
      <!-- Drug-target -->
      <line x1="80" y1="80" x2="60" y2="200"/>
      <line x1="80" y1="80" x2="120" y2="200"/>
      <line x1="200" y1="80" x2="180" y2="200"/>
      <line x1="200" y1="80" x2="240" y2="200"/>
      <line x1="320" y1="80" x2="300" y2="200"/>
      <!-- PPI -->
      <line x1="60" y1="200" x2="120" y2="200"/>
      <line x1="120" y1="200" x2="180" y2="200"/>
      <line x1="180" y1="200" x2="240" y2="200"/>
      <line x1="240" y1="200" x2="300" y2="200"/>
      <line x1="60" y1="200" x2="100" y2="280"/>
      <line x1="120" y1="200" x2="160" y2="280"/>
      <line x1="180" y1="200" x2="220" y2="280"/>
      <line x1="240" y1="200" x2="280" y2="280"/>
      <line x1="100" y1="280" x2="160" y2="280"/>
      <line x1="160" y1="280" x2="220" y2="280"/>
      <line x1="220" y1="280" x2="280" y2="280"/>
      <!-- Gene-disease -->
      <line x1="100" y1="280" x2="80" y2="400"/>
      <line x1="160" y1="280" x2="160" y2="400"/>
      <line x1="220" y1="280" x2="240" y2="400"/>
      <!-- Drug-disease -->
      <line x1="80" y1="80" x2="80" y2="400"/>
      <line x1="320" y1="80" x2="240" y2="400"/>
    </g>

    <!-- Drugs as squares -->
    <g>
      <rect x="68" y="68" width="24" height="24" fill="#dc2626" stroke="#7f1d1d" stroke-width="2"/>
      <text x="80" y="84" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">D₁</text>
      <text x="80" y="106" text-anchor="middle" font-size="9" font-weight="700" fill="#dc2626" class="mono">SEED</text>
      <rect x="188" y="68" width="24" height="24" fill="#fff" stroke="#525252"/>
      <text x="200" y="84" text-anchor="middle" font-size="9" font-weight="700" fill="#525252">D₂</text>
      <rect x="308" y="68" width="24" height="24" fill="#fff" stroke="#525252"/>
      <text x="320" y="84" text-anchor="middle" font-size="9" font-weight="700" fill="#525252">D₃</text>
    </g>
    <!-- Proteins -->
    <g fill="#fff" stroke="#525252" stroke-width="1">
      <circle cx="60" cy="200" r="10"/>
      <circle cx="120" cy="200" r="10"/>
      <circle cx="180" cy="200" r="10"/>
      <circle cx="240" cy="200" r="10"/>
      <circle cx="300" cy="200" r="10"/>
      <circle cx="100" cy="280" r="10"/>
      <circle cx="160" cy="280" r="10"/>
      <circle cx="220" cy="280" r="10"/>
      <circle cx="280" cy="280" r="10"/>
    </g>
    <g class="mono" font-size="9" fill="#525252">
      <text x="60" y="204" text-anchor="middle">P₁</text>
      <text x="120" y="204" text-anchor="middle">P₂</text>
      <text x="180" y="204" text-anchor="middle">P₃</text>
      <text x="240" y="204" text-anchor="middle">P₄</text>
      <text x="300" y="204" text-anchor="middle">P₅</text>
      <text x="100" y="284" text-anchor="middle">P₆</text>
      <text x="160" y="284" text-anchor="middle">P₇</text>
      <text x="220" y="284" text-anchor="middle">P₈</text>
      <text x="280" y="284" text-anchor="middle">P₉</text>
    </g>
    <!-- Diseases as triangles -->
    <g>
      <polygon points="80,388 68,408 92,408" fill="#fff" stroke="#525252"/>
      <text x="80" y="404" text-anchor="middle" font-size="9" font-weight="700" fill="#525252">X</text>
      <polygon points="160,388 148,408 172,408" fill="#fff" stroke="#525252"/>
      <text x="160" y="404" text-anchor="middle" font-size="9" font-weight="700" fill="#525252">Y</text>
      <polygon points="240,388 228,408 252,408" fill="#fff" stroke="#525252"/>
      <text x="240" y="404" text-anchor="middle" font-size="9" font-weight="700" fill="#525252">Z</text>
    </g>
    <text x="185" y="450" text-anchor="middle" font-size="10" fill="#525252" class="mono">only D₁ has intensity 1; rest 0</text>
  </g>

  <!-- Panel 2: t=10 -->
  <g transform="translate(420,80)">
    <rect width="370" height="540" fill="#fff" stroke="#d6d3d1" rx="4"/>
    <text x="185" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">t = 10 — heat reaches direct targets</text>
    <g stroke="#9ca3af" stroke-width="0.6" fill="none">
      <line x1="80" y1="80" x2="60" y2="200"/>
      <line x1="80" y1="80" x2="120" y2="200"/>
      <line x1="200" y1="80" x2="180" y2="200"/>
      <line x1="200" y1="80" x2="240" y2="200"/>
      <line x1="320" y1="80" x2="300" y2="200"/>
      <line x1="60" y1="200" x2="120" y2="200"/>
      <line x1="120" y1="200" x2="180" y2="200"/>
      <line x1="180" y1="200" x2="240" y2="200"/>
      <line x1="240" y1="200" x2="300" y2="200"/>
      <line x1="60" y1="200" x2="100" y2="280"/>
      <line x1="120" y1="200" x2="160" y2="280"/>
      <line x1="180" y1="200" x2="220" y2="280"/>
      <line x1="240" y1="200" x2="280" y2="280"/>
      <line x1="100" y1="280" x2="160" y2="280"/>
      <line x1="160" y1="280" x2="220" y2="280"/>
      <line x1="220" y1="280" x2="280" y2="280"/>
      <line x1="100" y1="280" x2="80" y2="400"/>
      <line x1="160" y1="280" x2="160" y2="400"/>
      <line x1="220" y1="280" x2="240" y2="400"/>
      <line x1="80" y1="80" x2="80" y2="400"/>
      <line x1="320" y1="80" x2="240" y2="400"/>
    </g>
    <g>
      <rect x="68" y="68" width="24" height="24" fill="#dc2626" stroke="#7f1d1d" stroke-width="2"/>
      <text x="80" y="84" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">D₁</text>
      <rect x="188" y="68" width="24" height="24" fill="#fff" stroke="#525252"/>
      <text x="200" y="84" text-anchor="middle" font-size="9" font-weight="700" fill="#525252">D₂</text>
      <rect x="308" y="68" width="24" height="24" fill="#fee2e2" stroke="#dc2626"/>
      <text x="320" y="84" text-anchor="middle" font-size="9" font-weight="700" fill="#525252">D₃</text>
    </g>
    <g stroke="#525252" stroke-width="1">
      <circle cx="60" cy="200" r="10" fill="#dc2626" fill-opacity="0.7"/>
      <circle cx="120" cy="200" r="10" fill="#dc2626" fill-opacity="0.7"/>
      <circle cx="180" cy="200" r="10" fill="#fee2e2"/>
      <circle cx="240" cy="200" r="10" fill="#fff"/>
      <circle cx="300" cy="200" r="10" fill="#fee2e2"/>
      <circle cx="100" cy="280" r="10" fill="#fee2e2"/>
      <circle cx="160" cy="280" r="10" fill="#fff"/>
      <circle cx="220" cy="280" r="10" fill="#fff"/>
      <circle cx="280" cy="280" r="10" fill="#fff"/>
    </g>
    <g class="mono" font-size="9" fill="#525252">
      <text x="60" y="204" text-anchor="middle" fill="#fff" font-weight="700">P₁</text>
      <text x="120" y="204" text-anchor="middle" fill="#fff" font-weight="700">P₂</text>
      <text x="180" y="204" text-anchor="middle">P₃</text>
      <text x="240" y="204" text-anchor="middle">P₄</text>
      <text x="300" y="204" text-anchor="middle">P₅</text>
      <text x="100" y="284" text-anchor="middle">P₆</text>
      <text x="160" y="284" text-anchor="middle">P₇</text>
      <text x="220" y="284" text-anchor="middle">P₈</text>
      <text x="280" y="284" text-anchor="middle">P₉</text>
    </g>
    <g>
      <polygon points="80,388 68,408 92,408" fill="#fee2e2" stroke="#dc2626"/>
      <text x="80" y="404" text-anchor="middle" font-size="9" font-weight="700" fill="#525252">X</text>
      <polygon points="160,388 148,408 172,408" fill="#fff" stroke="#525252"/>
      <polygon points="240,388 228,408 252,408" fill="#fff" stroke="#525252"/>
    </g>
    <text x="185" y="450" text-anchor="middle" font-size="10" fill="#525252" class="mono">P₁/P₂ (direct targets) ≈ 0.7</text>
    <text x="185" y="464" text-anchor="middle" font-size="10" fill="#525252" class="mono">P₃/P₅ (one hop) ≈ 0.2</text>
  </g>

  <!-- Panel 3: t=50 -->
  <g transform="translate(800,80)">
    <rect width="370" height="540" fill="#fff" stroke="#d6d3d1" rx="4"/>
    <text x="185" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">t = 50 — steady state, novel candidates revealed</text>
    <g stroke="#9ca3af" stroke-width="0.6" fill="none">
      <line x1="80" y1="80" x2="60" y2="200"/>
      <line x1="80" y1="80" x2="120" y2="200"/>
      <line x1="200" y1="80" x2="180" y2="200"/>
      <line x1="200" y1="80" x2="240" y2="200"/>
      <line x1="320" y1="80" x2="300" y2="200"/>
      <line x1="60" y1="200" x2="120" y2="200"/>
      <line x1="120" y1="200" x2="180" y2="200"/>
      <line x1="180" y1="200" x2="240" y2="200"/>
      <line x1="240" y1="200" x2="300" y2="200"/>
      <line x1="60" y1="200" x2="100" y2="280"/>
      <line x1="120" y1="200" x2="160" y2="280"/>
      <line x1="180" y1="200" x2="220" y2="280"/>
      <line x1="240" y1="200" x2="280" y2="280"/>
      <line x1="100" y1="280" x2="160" y2="280"/>
      <line x1="160" y1="280" x2="220" y2="280"/>
      <line x1="220" y1="280" x2="280" y2="280"/>
      <line x1="100" y1="280" x2="80" y2="400"/>
      <line x1="160" y1="280" x2="160" y2="400"/>
      <line x1="220" y1="280" x2="240" y2="400"/>
      <line x1="80" y1="80" x2="80" y2="400"/>
      <line x1="320" y1="80" x2="240" y2="400"/>
    </g>
    <g>
      <rect x="68" y="68" width="24" height="24" fill="#dc2626" stroke="#7f1d1d" stroke-width="2"/>
      <text x="80" y="84" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">D₁</text>
      <rect x="188" y="68" width="24" height="24" fill="#fca5a5" stroke="#525252"/>
      <text x="200" y="84" text-anchor="middle" font-size="9" font-weight="700" fill="#525252">D₂</text>
      <rect x="308" y="68" width="24" height="24" fill="#fca5a5" stroke="#525252"/>
      <text x="320" y="84" text-anchor="middle" font-size="9" font-weight="700" fill="#525252">D₃</text>
    </g>
    <g stroke="#525252" stroke-width="1">
      <circle cx="60" cy="200" r="10" fill="#dc2626" fill-opacity="0.85"/>
      <circle cx="120" cy="200" r="10" fill="#dc2626" fill-opacity="0.85"/>
      <circle cx="180" cy="200" r="10" fill="#dc2626" fill-opacity="0.55"/>
      <circle cx="240" cy="200" r="10" fill="#dc2626" fill-opacity="0.4"/>
      <circle cx="300" cy="200" r="10" fill="#dc2626" fill-opacity="0.55"/>
      <circle cx="100" cy="280" r="10" fill="#dc2626" fill-opacity="0.45"/>
      <circle cx="160" cy="280" r="10" fill="#dc2626" fill-opacity="0.30"/>
      <circle cx="220" cy="280" r="10" fill="#dc2626" fill-opacity="0.30"/>
      <circle cx="280" cy="280" r="10" fill="#dc2626" fill-opacity="0.25"/>
    </g>
    <g class="mono" font-size="9" fill="#fff">
      <text x="60" y="204" text-anchor="middle" font-weight="700">P₁</text>
      <text x="120" y="204" text-anchor="middle" font-weight="700">P₂</text>
      <text x="180" y="204" text-anchor="middle" font-weight="700">P₃</text>
      <text x="240" y="204" text-anchor="middle" font-weight="700">P₄</text>
      <text x="300" y="204" text-anchor="middle" font-weight="700">P₅</text>
      <text x="100" y="284" text-anchor="middle" font-weight="700">P₆</text>
      <text x="160" y="284" text-anchor="middle" fill="#525252">P₇</text>
      <text x="220" y="284" text-anchor="middle" fill="#525252">P₈</text>
      <text x="280" y="284" text-anchor="middle" fill="#525252">P₉</text>
    </g>
    <g>
      <polygon points="80,388 68,408 92,408" fill="#fca5a5" stroke="#dc2626"/>
      <polygon points="160,388 148,408 172,408" fill="#fee2e2" stroke="#525252"/>
      <polygon points="240,388 228,408 252,408" fill="#fca5a5" stroke="#dc2626"/>
    </g>
    <g transform="translate(20,440)">
      <rect width="330" height="80" fill="#dcfce7" stroke="#065f46" rx="4"/>
      <text x="165" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">Top-ranked novel targets</text>
      <text x="165" y="42" text-anchor="middle" font-size="10" class="mono" fill="#374151">P₃ (RWR = 0.42), P₅ (0.40), P₄ (0.30)</text>
      <text x="165" y="58" text-anchor="middle" font-size="10" fill="#525252">→ candidates for off-target / repurposing</text>
      <text x="165" y="74" text-anchor="middle" font-size="9" fill="#525252">validate against held-out known interactions</text>
    </g>
  </g>

  <!-- Bottom legend -->
  <g transform="translate(40,640)">
    <rect width="1130" height="64" fill="#fff" stroke="#d6d3d1" rx="4"/>
    <text x="60" y="22" font-size="10" font-weight="700" fill="#525252">Legend:</text>
    <rect x="60" y="36" width="14" height="14" fill="#dc2626"/>
    <text x="80" y="48" font-size="10" fill="#374151">drug</text>
    <circle cx="170" cy="44" r="7" fill="#fff" stroke="#525252"/>
    <text x="184" y="48" font-size="10" fill="#374151">protein</text>
    <polygon points="280,36 270,52 290,52" fill="#fff" stroke="#525252"/>
    <text x="298" y="48" font-size="10" fill="#374151">disease</text>
    <text x="380" y="48" font-size="10" font-weight="700" fill="#dc2626">red intensity</text>
    <text x="476" y="48" font-size="10" fill="#374151">= RWR score (proximity to seed drug)</text>
    <text x="800" y="48" font-size="10" font-style="italic" fill="#525252">Novel drug-target candidates rank high in steady state.</text>
  </g>
</svg>
