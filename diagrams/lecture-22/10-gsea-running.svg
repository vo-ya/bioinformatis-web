<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="540" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">GSEA running enrichment statistic — walk along the ranked list</text>

  <!-- Top: ranked list with tick marks -->
  <g transform="translate(80,80)">
    <line x1="0" y1="0" x2="900" y2="0" stroke="#374151" stroke-width="1.2"/>
    <g class="mono" font-size="10" fill="#525252">
      <text x="0" y="-8">rank 1</text>
      <text x="450" y="-8" text-anchor="middle">rank 2500</text>
      <text x="900" y="-8" text-anchor="end">rank 5000</text>
    </g>
    <text x="450" y="-22" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">5000 genes ranked by signed log fold-change</text>

    <!-- Tick marks for gene set members (concentrated at top of ranking) -->
    <g stroke="#0d7377" stroke-width="2">
      <line x1="6" y1="-12" x2="6" y2="14"/>
      <line x1="14" y1="-12" x2="14" y2="14"/>
      <line x1="22" y1="-12" x2="22" y2="14"/>
      <line x1="32" y1="-12" x2="32" y2="14"/>
      <line x1="42" y1="-12" x2="42" y2="14"/>
      <line x1="56" y1="-12" x2="56" y2="14"/>
      <line x1="68" y1="-12" x2="68" y2="14"/>
      <line x1="80" y1="-12" x2="80" y2="14"/>
      <line x1="100" y1="-12" x2="100" y2="14"/>
      <line x1="120" y1="-12" x2="120" y2="14"/>
      <line x1="140" y1="-12" x2="140" y2="14"/>
      <line x1="158" y1="-12" x2="158" y2="14"/>
      <line x1="180" y1="-12" x2="180" y2="14"/>
      <line x1="200" y1="-12" x2="200" y2="14"/>
      <line x1="218" y1="-12" x2="218" y2="14"/>
      <line x1="240" y1="-12" x2="240" y2="14"/>
      <line x1="270" y1="-12" x2="270" y2="14"/>
      <line x1="298" y1="-12" x2="298" y2="14"/>
      <line x1="330" y1="-12" x2="330" y2="14"/>
      <line x1="360" y1="-12" x2="360" y2="14"/>
      <line x1="400" y1="-12" x2="400" y2="14"/>
      <line x1="440" y1="-12" x2="440" y2="14"/>
      <line x1="490" y1="-12" x2="490" y2="14"/>
      <line x1="540" y1="-12" x2="540" y2="14"/>
      <line x1="600" y1="-12" x2="600" y2="14"/>
      <line x1="660" y1="-12" x2="660" y2="14"/>
      <line x1="720" y1="-12" x2="720" y2="14"/>
      <line x1="800" y1="-12" x2="800" y2="14"/>
      <line x1="850" y1="-12" x2="850" y2="14"/>
      <line x1="890" y1="-12" x2="890" y2="14"/>
    </g>
    <text x="450" y="32" text-anchor="middle" font-size="10" fill="#0d7377" class="mono">tick = gene-set member (30 of 5000)</text>
  </g>

  <!-- Middle: Running ES curve -->
  <g transform="translate(80,160)">
    <line x1="0" y1="0" x2="0" y2="200" stroke="#374151"/>
    <line x1="0" y1="100" x2="900" y2="100" stroke="#9ca3af" stroke-dasharray="3 3"/>
    <line x1="0" y1="200" x2="900" y2="200" stroke="#374151"/>
    <g class="mono" font-size="10" fill="#525252">
      <text x="-8" y="6" text-anchor="end">+0.7</text>
      <text x="-8" y="56" text-anchor="end">+0.4</text>
      <text x="-8" y="104" text-anchor="end">0.0</text>
      <text x="-8" y="154" text-anchor="end">−0.2</text>
      <text x="-8" y="204" text-anchor="end">−0.4</text>
    </g>
    <text x="-46" y="100" text-anchor="middle" font-size="11" fill="#525252" transform="rotate(-90 -46 100)">running ES</text>

    <!-- Running ES curve: rises early then descends -->
    <path d="M 0 100 L 6 90 L 14 78 L 22 66 L 32 52 L 42 40 L 56 28 L 68 20 L 80 14 L 100 12 L 120 16 L 140 22 L 158 30 L 180 36 L 200 42 L 218 48 L 240 56 L 270 66 L 298 76 L 330 88 L 360 96 L 400 104 L 440 112 L 490 122 L 540 132 L 600 144 L 660 156 L 720 168 L 800 178 L 850 184 L 890 188"
          stroke="#dc2626" stroke-width="2.5" fill="none"/>
    <!-- Mark max ES -->
    <circle cx="100" cy="12" r="6" fill="#dc2626"/>
    <line x1="100" y1="12" x2="100" y2="100" stroke="#dc2626" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="106" y="6" font-size="11" font-weight="700" fill="#dc2626" class="mono">max ES = 0.62</text>
    <text x="106" y="20" font-size="9" fill="#525252" class="mono">at rank 555</text>

    <!-- Annotate leading edge -->
    <rect x="0" y="-12" width="100" height="220" fill="#dc2626" fill-opacity="0.08"/>
    <text x="50" y="220" text-anchor="middle" font-size="10" font-weight="700" fill="#7f1d1d" class="mono">leading edge (12 genes)</text>
  </g>

  <!-- Right side: leading edge gene list -->
  <g transform="translate(1010,80)">
    <rect width="160" height="280" fill="#fff" stroke="#d6d3d1" rx="4"/>
    <text x="80" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Leading edge</text>
    <line x1="20" y1="32" x2="140" y2="32" stroke="#e7e5e4"/>
    <text x="80" y="48" text-anchor="middle" font-size="9" fill="#525252">12 genes contributing</text>
    <text x="80" y="60" text-anchor="middle" font-size="9" fill="#525252">to ES at the maximum</text>
    <g class="mono" font-size="10" fill="#dc2626" font-weight="700" transform="translate(20,80)">
      <text x="0" y="0">CDKN1A</text>
      <text x="0" y="16">GADD45A</text>
      <text x="0" y="32">MDM2</text>
      <text x="0" y="48">BAX</text>
      <text x="0" y="64">PUMA</text>
      <text x="0" y="80">FAS</text>
      <text x="0" y="96">PIDD</text>
      <text x="0" y="112">SFN</text>
      <text x="0" y="128">CCNG1</text>
      <text x="0" y="144">SERPINB5</text>
      <text x="0" y="160">PMAIP1</text>
      <text x="0" y="176">RRM2B</text>
    </g>
  </g>

  <!-- Bottom: stats and significance -->
  <g transform="translate(80,400)">
    <rect width="1090" height="120" fill="#fff" stroke="#d6d3d1" rx="4"/>
    <text x="545" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Permutation null and significance</text>
    <line x1="20" y1="34" x2="1070" y2="34" stroke="#e7e5e4"/>

    <g transform="translate(40,52)" font-size="11" fill="#374151">
      <text x="0" y="0">Permutation procedure (1000 reps):</text>
      <text x="0" y="18" font-size="10" class="mono" fill="#525252">1. shuffle gene labels</text>
      <text x="0" y="32" font-size="10" class="mono" fill="#525252">2. recompute running ES</text>
      <text x="0" y="46" font-size="10" class="mono" fill="#525252">3. record max |ES'|</text>
    </g>

    <g transform="translate(380,52)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#dc2626" class="mono">ES = 0.62</text>
      <text x="0" y="18" font-size="11" font-weight="700" fill="#dc2626" class="mono">NES = 1.84</text>
      <text x="0" y="36" font-size="11" font-weight="700" fill="#dc2626" class="mono">p &lt; 0.001 (none of 1000 perm exceed)</text>
      <text x="0" y="54" font-size="11" font-weight="700" fill="#dc2626" class="mono">FDR q = 0.003</text>
    </g>

    <g transform="translate(700,40)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#374151">Interpretation</text>
      <text x="0" y="18" font-size="10" fill="#374151">The gene set is coordinately UP-regulated</text>
      <text x="0" y="32" font-size="10" fill="#374151">in the condition of interest. Despite individual</text>
      <text x="0" y="46" font-size="10" fill="#374151">genes failing strict DE significance, the</text>
      <text x="0" y="60" font-size="10" fill="#374151">collective shift is highly significant.</text>
      <text x="0" y="78" font-size="10" font-style="italic" fill="#525252">e.g., HALLMARK_P53_PATHWAY</text>
    </g>
  </g>
</svg>
