<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="720" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">A disease-gene module on the PPI — known cardiomyopathy genes form a connected cluster</text>

  <!-- Network -->
  <g transform="translate(80,80)">
    <rect width="700" height="540" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="350" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">PPI subgraph (STRING confidence &gt; 0.9)</text>

    <!-- Edges: dense within module, sparse to periphery -->
    <g stroke="#9ca3af" stroke-width="0.8" fill="none">
      <!-- Core module edges -->
      <line x1="200" y1="180" x2="270" y2="160"/>
      <line x1="200" y1="180" x2="280" y2="220"/>
      <line x1="270" y1="160" x2="280" y2="220"/>
      <line x1="200" y1="180" x2="160" y2="240"/>
      <line x1="160" y1="240" x2="280" y2="220"/>
      <line x1="280" y1="220" x2="350" y2="240"/>
      <line x1="270" y1="160" x2="350" y2="160"/>
      <line x1="350" y1="160" x2="350" y2="240"/>
      <line x1="350" y1="240" x2="420" y2="220"/>
      <line x1="280" y1="220" x2="420" y2="220"/>
      <line x1="420" y1="220" x2="450" y2="160"/>
      <line x1="350" y1="160" x2="450" y2="160"/>
      <line x1="350" y1="240" x2="290" y2="320"/>
      <line x1="420" y1="220" x2="370" y2="310"/>
      <line x1="290" y1="320" x2="370" y2="310"/>
      <line x1="290" y1="320" x2="200" y2="340"/>
      <line x1="200" y1="340" x2="160" y2="240"/>
      <line x1="370" y1="310" x2="450" y2="320"/>
      <line x1="450" y1="320" x2="500" y2="240"/>
      <line x1="450" y1="160" x2="500" y2="240"/>
      <line x1="160" y1="240" x2="200" y2="340"/>
      <!-- Periphery -->
      <line x1="200" y1="340" x2="120" y2="400"/>
      <line x1="290" y1="320" x2="280" y2="420"/>
      <line x1="450" y1="320" x2="520" y2="400"/>
      <line x1="500" y1="240" x2="580" y2="200"/>
      <line x1="200" y1="180" x2="120" y2="120"/>
    </g>

    <!-- Module nodes (red, known disease genes) -->
    <g>
      <circle cx="200" cy="180" r="12" fill="#dc2626"/>
      <circle cx="270" cy="160" r="12" fill="#dc2626"/>
      <circle cx="350" cy="160" r="12" fill="#dc2626"/>
      <circle cx="450" cy="160" r="12" fill="#dc2626"/>
      <circle cx="280" cy="220" r="14" fill="#dc2626"/>
      <circle cx="350" cy="240" r="14" fill="#dc2626"/>
      <circle cx="420" cy="220" r="14" fill="#dc2626"/>
      <circle cx="160" cy="240" r="12" fill="#dc2626"/>
      <circle cx="500" cy="240" r="12" fill="#dc2626"/>
      <circle cx="290" cy="320" r="12" fill="#dc2626"/>
      <circle cx="370" cy="310" r="12" fill="#dc2626"/>
      <circle cx="450" cy="320" r="12" fill="#dc2626"/>
      <circle cx="200" cy="340" r="12" fill="#dc2626"/>
    </g>
    <!-- Periphery nodes (cobalt, novel candidates) -->
    <g fill="#fff" stroke="#1e3a8a" stroke-width="2">
      <circle cx="120" cy="400" r="10"/>
      <circle cx="280" cy="420" r="10"/>
      <circle cx="520" cy="400" r="10"/>
      <circle cx="580" cy="200" r="10"/>
      <circle cx="120" cy="120" r="10"/>
    </g>
    <!-- Labels for key genes -->
    <g class="mono" font-size="9" fill="#fff" font-weight="700">
      <text x="200" y="184" text-anchor="middle">MYH7</text>
      <text x="270" y="164" text-anchor="middle">MYBPC3</text>
      <text x="350" y="164" text-anchor="middle">TNNT2</text>
      <text x="450" y="164" text-anchor="middle">TNNI3</text>
      <text x="280" y="225" text-anchor="middle">ACTC1</text>
      <text x="350" y="245" text-anchor="middle">TPM1</text>
      <text x="420" y="225" text-anchor="middle">TTN</text>
      <text x="160" y="244" text-anchor="middle">DES</text>
      <text x="500" y="244" text-anchor="middle">LMNA</text>
      <text x="290" y="324" text-anchor="middle">DSP</text>
      <text x="370" y="314" text-anchor="middle">PKP2</text>
      <text x="450" y="324" text-anchor="middle">DSG2</text>
      <text x="200" y="344" text-anchor="middle">FLNC</text>
    </g>
    <g class="mono" font-size="9" fill="#1e3a8a" font-weight="700">
      <text x="120" y="416" text-anchor="middle">CASQ2</text>
      <text x="280" y="436" text-anchor="middle">JPH2</text>
      <text x="520" y="416" text-anchor="middle">RBM20</text>
      <text x="580" y="216" text-anchor="middle">BAG3</text>
      <text x="120" y="136" text-anchor="middle">RYR2</text>
    </g>

    <!-- Module annotation -->
    <ellipse cx="320" cy="240" rx="220" ry="120" fill="none" stroke="#dc2626" stroke-dasharray="6 4" stroke-width="1.5"/>
    <text x="350" y="380" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d" class="mono">cardiomyopathy disease module</text>

    <!-- Legend -->
    <g transform="translate(40,460)">
      <text x="0" y="0" font-size="10" font-weight="700" fill="#374151">Legend:</text>
      <circle cx="80" cy="-3" r="6" fill="#dc2626"/>
      <text x="92" y="0" font-size="10" fill="#374151">known disease gene (13)</text>
      <circle cx="280" cy="-3" r="5" fill="#fff" stroke="#1e3a8a" stroke-width="1.5"/>
      <text x="292" y="0" font-size="10" fill="#374151">novel candidate (5)</text>
    </g>
    <g transform="translate(40,490)" font-size="10" fill="#525252" class="mono">
      <text x="0" y="0">Most known disease genes cluster in the module core (degree &gt; 4 within module).</text>
      <text x="0" y="14">Novel candidates connect via 1-2 hubs and rank high in network propagation.</text>
    </g>
  </g>

  <!-- Side panel: pathway enrichment of the module -->
  <g transform="translate(820,80)">
    <rect width="320" height="540" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="160" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Module enrichment</text>
    <line x1="20" y1="32" x2="300" y2="32" stroke="#e7e5e4"/>

    <text x="160" y="50" text-anchor="middle" font-size="10" fill="#525252">top 5 enriched pathways</text>
    <text x="160" y="64" text-anchor="middle" font-size="9" class="mono" fill="#525252">(Reactome + KEGG, FDR &lt; 0.001)</text>

    <g transform="translate(40,90)" font-size="11" fill="#374151">
      <g>
        <text x="0" y="0" font-weight="700" fill="#1e3a8a">Sarcomere assembly</text>
        <text x="0" y="14" font-size="9" class="mono" fill="#525252">R-HSA-390522 · 9/13 genes · p = 1e-15</text>
        <rect x="0" y="20" width="200" height="6" fill="#1e3a8a" opacity="0.6"/>
      </g>
      <g transform="translate(0,46)">
        <text x="0" y="0" font-weight="700" fill="#1e3a8a">Muscle contraction</text>
        <text x="0" y="14" font-size="9" class="mono" fill="#525252">R-HSA-397014 · 8/13 · p = 4e-13</text>
        <rect x="0" y="20" width="170" height="6" fill="#1e3a8a" opacity="0.6"/>
      </g>
      <g transform="translate(0,92)">
        <text x="0" y="0" font-weight="700" fill="#1e3a8a">Cardiac muscle contraction</text>
        <text x="0" y="14" font-size="9" class="mono" fill="#525252">hsa04260 · 8/13 · p = 9e-13</text>
        <rect x="0" y="20" width="165" height="6" fill="#1e3a8a" opacity="0.6"/>
      </g>
      <g transform="translate(0,138)">
        <text x="0" y="0" font-weight="700" fill="#0d7377">Calcium signalling</text>
        <text x="0" y="14" font-size="9" class="mono" fill="#525252">hsa04020 · 5/13 · p = 3e-7</text>
        <rect x="0" y="20" width="105" height="6" fill="#0d7377" opacity="0.6"/>
      </g>
      <g transform="translate(0,184)">
        <text x="0" y="0" font-weight="700" fill="#0d7377">Cytoskeletal organisation</text>
        <text x="0" y="14" font-size="9" class="mono" fill="#525252">GO:0007010 · 6/13 · p = 8e-6</text>
        <rect x="0" y="20" width="110" height="6" fill="#0d7377" opacity="0.6"/>
      </g>
    </g>

    <g transform="translate(40,330)">
      <rect width="240" height="100" fill="#dcfce7" stroke="#065f46" rx="4"/>
      <text x="120" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">Novel candidates ranked by RWR</text>
      <line x1="20" y1="34" x2="220" y2="34" stroke="#065f46" opacity="0.4"/>
      <g transform="translate(20,52)" font-size="10" class="mono" fill="#374151">
        <text x="0" y="0">1. RBM20  — 0.42</text>
        <text x="0" y="14">2. BAG3   — 0.38</text>
        <text x="0" y="28">3. JPH2   — 0.31</text>
        <text x="0" y="42">4. CASQ2  — 0.28</text>
      </g>
    </g>

    <g transform="translate(40,450)" font-size="10" fill="#525252">
      <text x="0" y="0" font-weight="700" fill="#374151">Validation:</text>
      <text x="0" y="16">RBM20 is now established as a</text>
      <text x="0" y="30">dilated cardiomyopathy gene</text>
      <text x="0" y="44">(was novel in 2008; now in OMIM).</text>
    </g>
  </g>
</svg>
