<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="540" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Hub-centrality bias — TP53 is significant in every analysis until you correct for it</text>

  <!-- Left panel: degree distribution / hub plot -->
  <g transform="translate(60,80)">
    <text x="240" y="0" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Network degree distribution (PPI, log-log)</text>
    <!-- Axes -->
    <g transform="translate(40,40)">
      <line x1="0" y1="240" x2="420" y2="240" stroke="#374151"/>
      <line x1="0" y1="0" x2="0" y2="240" stroke="#374151"/>
      <g class="mono" font-size="10" fill="#525252">
        <text x="0" y="258" text-anchor="middle">1</text>
        <text x="105" y="258" text-anchor="middle">10</text>
        <text x="210" y="258" text-anchor="middle">100</text>
        <text x="315" y="258" text-anchor="middle">500</text>
        <text x="420" y="258" text-anchor="middle">1000</text>
      </g>
      <text x="210" y="278" text-anchor="middle" font-size="10" fill="#525252">degree k (log scale)</text>
      <g class="mono" font-size="10" fill="#525252">
        <text x="-8" y="244" text-anchor="end">1</text>
        <text x="-8" y="180" text-anchor="end">100</text>
        <text x="-8" y="116" text-anchor="end">1000</text>
        <text x="-8" y="52" text-anchor="end">10000</text>
      </g>
      <text x="-32" y="120" text-anchor="middle" font-size="10" fill="#525252" transform="rotate(-90 -32 120)">N(k) (log scale)</text>

      <!-- Power-law line -->
      <path d="M 5 50 L 50 90 L 100 130 L 150 160 L 200 180 L 250 195 L 300 210 L 350 220 L 400 230"
            stroke="#525252" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>
      <text x="370" y="218" font-size="9" fill="#525252" font-style="italic">P(k) ~ k^(-2.3)</text>

      <!-- Mark hub: TP53 at degree 250 -->
      <circle cx="265" cy="200" r="8" fill="#dc2626"/>
      <line x1="265" y1="200" x2="280" y2="160" stroke="#dc2626" stroke-width="1"/>
      <text x="282" y="158" font-size="10" font-weight="700" fill="#dc2626" class="mono">TP53 (k = 250)</text>

      <!-- Typical protein cluster -->
      <circle cx="50" cy="100" r="4" fill="#1e3a8a" opacity="0.6"/>
      <circle cx="60" cy="105" r="4" fill="#1e3a8a" opacity="0.6"/>
      <circle cx="40" cy="98" r="4" fill="#1e3a8a" opacity="0.6"/>
      <circle cx="70" cy="110" r="4" fill="#1e3a8a" opacity="0.6"/>
      <line x1="50" y1="100" x2="40" y2="60" stroke="#1e3a8a" stroke-width="1"/>
      <text x="42" y="58" font-size="10" font-weight="700" fill="#1e3a8a" class="mono">typical (k = 5)</text>
    </g>
  </g>

  <!-- Right panel: p-value comparison table -->
  <g transform="translate(620,80)">
    <text x="240" y="0" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">P-value: TP53 enriched in this gene list</text>
    <rect x="0" y="20" width="480" height="280" fill="#fff" stroke="#d6d3d1" rx="6"/>

    <!-- Table -->
    <g transform="translate(20,40)">
      <line x1="0" y1="20" x2="440" y2="20" stroke="#e7e5e4"/>
      <line x1="0" y1="80" x2="440" y2="80" stroke="#e7e5e4"/>
      <line x1="0" y1="140" x2="440" y2="140" stroke="#e7e5e4"/>
      <line x1="0" y1="200" x2="440" y2="200" stroke="#e7e5e4"/>

      <!-- Header -->
      <text x="0" y="14" font-size="11" font-weight="700" fill="#525252">Method</text>
      <text x="280" y="14" font-size="11" font-weight="700" fill="#525252">P-value</text>

      <!-- Row 1: Naive ORA -->
      <text x="0" y="48" font-size="11" fill="#374151">Naive ORA (hypergeometric)</text>
      <text x="280" y="48" font-size="14" font-weight="700" fill="#dc2626" class="mono">p &lt; 1e−10</text>
      <text x="280" y="64" font-size="9" fill="#525252">"highly significant"</text>

      <!-- Row 2: Hub-corrected -->
      <text x="0" y="108" font-size="11" fill="#374151">Hub-corrected (degree-permutation)</text>
      <text x="280" y="108" font-size="14" font-weight="700" fill="#b45309" class="mono">p ≈ 0.05</text>
      <text x="280" y="124" font-size="9" fill="#525252">"borderline"</text>

      <!-- Row 3: Network propagation -->
      <text x="0" y="168" font-size="11" fill="#374151">RWR + degree normalisation</text>
      <text x="280" y="168" font-size="14" font-weight="700" fill="#065f46" class="mono">p ≈ 0.30</text>
      <text x="280" y="184" font-size="9" fill="#525252">"not significant"</text>

      <!-- Row 4: GSEA -->
      <text x="0" y="228" font-size="11" fill="#374151">GSEA with TP53 pathway as set</text>
      <text x="280" y="228" font-size="14" font-weight="700" fill="#1e3a8a" class="mono">p = 0.08</text>
      <text x="280" y="244" font-size="9" fill="#525252">"marginal"</text>
    </g>
  </g>

  <!-- Bottom: bias mechanism explanation -->
  <g transform="translate(60,400)">
    <rect width="1080" height="120" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="540" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Why hubs always look "significant"</text>
    <line x1="40" y1="34" x2="1040" y2="34" stroke="#92400e" opacity="0.4"/>

    <g transform="translate(60,52)" font-size="11" fill="#374151">
      <text x="0" y="0">A gene with degree 250 has 250 chances to be in any random gene list.</text>
      <text x="0" y="20">A gene with degree 5 has 5 chances. The ratio is 50×.</text>
      <text x="0" y="40">Naive enrichment tests treat all genes equally — they don't account for this connectivity.</text>
    </g>
    <g transform="translate(620,52)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700">Fix: degree-preserving permutation null</text>
      <text x="0" y="20" font-size="10" class="mono">• Generate random gene lists matched on degree distribution</text>
      <text x="0" y="36" font-size="10" class="mono">• Compute null p-value against this distribution</text>
      <text x="0" y="52" font-size="10" class="mono">• Hubs no longer dominate</text>
    </g>
  </g>
</svg>
