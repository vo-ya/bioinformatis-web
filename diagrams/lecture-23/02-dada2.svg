<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">DADA2 16S workflow — from raw FASTQ to ASV table + taxonomy + tree</text>

  <!-- Main column: 10 stages -->
  <g transform="translate(280,60)">
    <g>
      <rect x="0" y="0" width="320" height="44" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" rx="5"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#1e3a8a">1. Raw paired-end reads</text>
      <text x="20" y="36" font-size="10" class="mono" fill="#525252">FASTQ · ~50k reads / sample</text>
    </g>
    <line x1="160" y1="44" x2="160" y2="60" stroke="#525252" stroke-width="1.4" marker-end="url(#arr2)"/>
    <g transform="translate(0,60)">
      <rect x="0" y="0" width="320" height="44" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="5"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#b45309">2. Quality trim + primer remove</text>
      <text x="20" y="36" font-size="10" class="mono" fill="#525252">cutadapt · trim Q&lt;30 tails</text>
    </g>
    <line x1="160" y1="104" x2="160" y2="120" stroke="#525252" stroke-width="1.4" marker-end="url(#arr2)"/>
    <g transform="translate(0,120)">
      <rect x="0" y="0" width="320" height="44" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="5"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#b45309">3. Learn per-sample error rates</text>
      <text x="20" y="36" font-size="10" class="mono" fill="#525252">Illumina Q-score → P(err) curve</text>
    </g>
    <line x1="160" y1="164" x2="160" y2="180" stroke="#525252" stroke-width="1.4" marker-end="url(#arr2)"/>
    <g transform="translate(0,180)">
      <rect x="0" y="0" width="320" height="44" fill="#dcfce7" stroke="#065f46" stroke-width="1.5" rx="5"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#065f46">4. Denoise → ASVs</text>
      <text x="20" y="36" font-size="10" class="mono" fill="#525252">resolve single-base variants</text>
    </g>
    <line x1="160" y1="224" x2="160" y2="240" stroke="#525252" stroke-width="1.4" marker-end="url(#arr2)"/>
    <g transform="translate(0,240)">
      <rect x="0" y="0" width="320" height="44" fill="#dcfce7" stroke="#065f46" stroke-width="1.5" rx="5"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#065f46">5. Merge paired ends</text>
      <text x="20" y="36" font-size="10" class="mono" fill="#525252">overlap R1 ↔ R2 → ~460 bp consensus</text>
    </g>
    <line x1="160" y1="284" x2="160" y2="300" stroke="#525252" stroke-width="1.4" marker-end="url(#arr2)"/>
    <g transform="translate(0,300)">
      <rect x="0" y="0" width="320" height="44" fill="#fee2e2" stroke="#7f1d1d" stroke-width="1.5" rx="5"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#7f1d1d">6. Remove chimeras</text>
      <text x="20" y="36" font-size="10" class="mono" fill="#525252">removeBimeraDenovo — ~5% of reads</text>
    </g>
    <line x1="160" y1="344" x2="160" y2="360" stroke="#525252" stroke-width="1.4" marker-end="url(#arr2)"/>
    <g transform="translate(0,360)">
      <rect x="0" y="0" width="320" height="44" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" rx="5"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#7c3aed">7. ASV table</text>
      <text x="20" y="36" font-size="10" class="mono" fill="#525252">samples × ASVs · count matrix</text>
    </g>
    <line x1="160" y1="404" x2="160" y2="420" stroke="#525252" stroke-width="1.4" marker-end="url(#arr2)"/>
    <g transform="translate(0,420)">
      <rect x="0" y="0" width="320" height="44" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" rx="5"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#7c3aed">8. Taxonomy assignment</text>
      <text x="20" y="36" font-size="10" class="mono" fill="#525252">naive Bayes vs SILVA / GTDB</text>
    </g>
    <line x1="160" y1="464" x2="160" y2="480" stroke="#525252" stroke-width="1.4" marker-end="url(#arr2)"/>
    <g transform="translate(0,480)">
      <rect x="0" y="0" width="320" height="44" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" rx="5"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#7c3aed">9. Phylogenetic tree</text>
      <text x="20" y="36" font-size="10" class="mono" fill="#525252">FastTree on ASV alignment</text>
    </g>
    <line x1="160" y1="524" x2="160" y2="540" stroke="#525252" stroke-width="1.4" marker-end="url(#arr2)"/>
    <g transform="translate(0,540)">
      <rect x="0" y="0" width="320" height="44" fill="#fff" stroke="#525252" stroke-width="2" rx="5"/>
      <text x="160" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#525252">10. Diversity + downstream</text>
      <text x="160" y="38" text-anchor="middle" font-size="10" class="mono" fill="#374151">α/β diversity · ANCOM-BC · PCoA</text>
    </g>
  </g>

  <!-- Side panel: error model -->
  <g transform="translate(680,80)">
    <rect width="460" height="540" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="230" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">DADA2 error model: how single-base ASVs emerge</text>
    <line x1="20" y1="36" x2="440" y2="36" stroke="#e7e5e4"/>

    <!-- Q-score error curve -->
    <g transform="translate(40,60)">
      <text x="180" y="0" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">Illumina Q-score → P(err) curve</text>
      <line x1="0" y1="20" x2="0" y2="140" stroke="#374151"/>
      <line x1="0" y1="140" x2="360" y2="140" stroke="#374151"/>
      <g class="mono" font-size="9" fill="#525252">
        <text x="-6" y="20" text-anchor="end">10⁻¹</text>
        <text x="-6" y="60" text-anchor="end">10⁻²</text>
        <text x="-6" y="100" text-anchor="end">10⁻³</text>
        <text x="-6" y="140" text-anchor="end">10⁻⁴</text>
        <text x="0" y="156" text-anchor="middle">Q10</text>
        <text x="120" y="156" text-anchor="middle">Q20</text>
        <text x="240" y="156" text-anchor="middle">Q30</text>
        <text x="360" y="156" text-anchor="middle">Q40</text>
      </g>
      <path d="M 0 30 L 120 70 L 240 110 L 360 130" stroke="#1e3a8a" stroke-width="2.5" fill="none"/>
      <text x="180" y="174" text-anchor="middle" font-size="10" fill="#525252">P(err) decays exponentially with Q</text>
    </g>

    <!-- Comparison -->
    <g transform="translate(40,260)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#374151">For each candidate variant, ask:</text>
      <text x="0" y="22" font-size="11" fill="#374151">Is the read count <em>higher</em> than expected</text>
      <text x="0" y="38" font-size="11" fill="#374151">if it were just sequencing error from</text>
      <text x="0" y="54" font-size="11" fill="#374151">a more-abundant parent ASV?</text>

      <text x="0" y="86" font-size="11" font-weight="700" fill="#1e3a8a">Yes</text>
      <text x="40" y="86" font-size="11" fill="#374151">→ keep as new ASV (real biology)</text>
      <text x="0" y="106" font-size="11" font-weight="700" fill="#dc2626">No</text>
      <text x="40" y="106" font-size="11" fill="#374151">→ collapse into parent (sequencer noise)</text>

      <text x="0" y="138" font-size="11" font-style="italic" fill="#525252">Result: exact-sequence resolution</text>
      <text x="0" y="156" font-size="11" font-style="italic" fill="#525252">that 97% OTU clustering loses.</text>
    </g>

    <g transform="translate(40,440)">
      <rect width="380" height="80" fill="#dcfce7" stroke="#065f46" rx="4"/>
      <text x="190" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">ASV vs OTU</text>
      <line x1="20" y1="34" x2="360" y2="34" stroke="#065f46" opacity="0.4"/>
      <text x="190" y="52" text-anchor="middle" font-size="10" fill="#374151">ASV: exact sequence (DADA2)</text>
      <text x="190" y="68" text-anchor="middle" font-size="10" fill="#374151">OTU: 97% clusters (legacy USEARCH/QIIME1)</text>
    </g>
  </g>
</svg>
