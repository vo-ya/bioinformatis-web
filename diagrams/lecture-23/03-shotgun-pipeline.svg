<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Shotgun metagenomics pipeline — three parallel branches from one set of reads</text>

  <!-- Top: shared input -->
  <g transform="translate(440,60)">
    <rect width="320" height="56" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" rx="6"/>
    <text x="20" y="22" font-size="12" font-weight="700" fill="#1e3a8a">1. Raw shotgun reads</text>
    <text x="20" y="40" font-size="10" class="mono" fill="#374151">~5 Gb FASTQ · 30 M paired-end reads</text>
  </g>
  <line x1="600" y1="116" x2="600" y2="132" stroke="#525252" stroke-width="1.4" marker-end="url(#arr3)"/>

  <g transform="translate(440,132)">
    <rect width="320" height="56" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="6"/>
    <text x="20" y="22" font-size="12" font-weight="700" fill="#b45309">2. QC + adapter trimming</text>
    <text x="20" y="40" font-size="10" class="mono" fill="#374151">fastp · ~5 min</text>
  </g>
  <line x1="600" y1="188" x2="600" y2="204" stroke="#525252" stroke-width="1.4" marker-end="url(#arr3)"/>

  <g transform="translate(440,204)">
    <rect width="320" height="56" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="6"/>
    <text x="20" y="22" font-size="12" font-weight="700" fill="#b45309">3. Host-DNA removal</text>
    <text x="20" y="40" font-size="10" class="mono" fill="#374151">KneadData / BBDuk → human-mapping reads</text>
  </g>
  <line x1="600" y1="260" x2="600" y2="276" stroke="#525252" stroke-width="1.4"/>

  <!-- Three-way split -->
  <g stroke="#525252" stroke-width="1.4" fill="none" marker-end="url(#arr3)">
    <path d="M 600 280 L 200 320"/>
    <path d="M 600 280 L 600 320"/>
    <path d="M 600 280 L 1000 320"/>
  </g>

  <!-- Branch 1: taxonomy -->
  <g transform="translate(40,320)">
    <rect width="320" height="280" fill="#fff" stroke="#dc2626" stroke-width="1.5" rx="6"/>
    <text x="160" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">A. Taxonomic classification</text>
    <line x1="20" y1="36" x2="300" y2="36" stroke="#fee2e2"/>

    <g transform="translate(20,52)">
      <rect width="280" height="44" fill="#fee2e2" stroke="#dc2626" rx="4"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#dc2626">Kraken2 + Bracken</text>
      <text x="14" y="36" font-size="9" class="mono" fill="#525252">k-mer LCA · ~2 min · breadth</text>
    </g>
    <text x="160" y="116" text-anchor="middle" font-size="10" font-weight="700" fill="#525252">— or —</text>
    <g transform="translate(20,132)">
      <rect width="280" height="44" fill="#fee2e2" stroke="#dc2626" rx="4"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#dc2626">MetaPhlAn 4</text>
      <text x="14" y="36" font-size="9" class="mono" fill="#525252">marker genes · ~10 min · accuracy</text>
    </g>

    <g transform="translate(20,196)">
      <rect width="280" height="68" fill="#fafaf9" stroke="#d6d3d1" rx="4"/>
      <text x="160" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Output</text>
      <text x="160" y="40" text-anchor="middle" font-size="10" class="mono" fill="#374151">relative abundance per species</text>
      <text x="160" y="56" text-anchor="middle" font-size="10" class="mono" fill="#374151">~500 species per gut sample</text>
    </g>
  </g>

  <!-- Branch 2: function -->
  <g transform="translate(440,320)">
    <rect width="320" height="280" fill="#fff" stroke="#7c3aed" stroke-width="1.5" rx="6"/>
    <text x="160" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">B. Functional profiling</text>
    <line x1="20" y1="36" x2="300" y2="36" stroke="#ede9fe"/>

    <g transform="translate(20,52)">
      <rect width="280" height="44" fill="#ede9fe" stroke="#7c3aed" rx="4"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#7c3aed">HUMAnN 3</text>
      <text x="14" y="36" font-size="9" class="mono" fill="#525252">UniRef90 + ChocoPhlAn · ~40 min</text>
    </g>

    <g transform="translate(20,116)" font-size="10" fill="#374151">
      <text x="0" y="0" font-weight="700">Outputs:</text>
      <text x="0" y="18" class="mono">• gene-family abundance</text>
      <text x="0" y="34" class="mono">• MetaCyc pathway abundance</text>
      <text x="0" y="50" class="mono">• stratified per species</text>
    </g>

    <g transform="translate(20,196)">
      <rect width="280" height="68" fill="#fafaf9" stroke="#d6d3d1" rx="4"/>
      <text x="160" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Output</text>
      <text x="160" y="40" text-anchor="middle" font-size="10" class="mono" fill="#374151">~400 pathways quantified</text>
      <text x="160" y="56" text-anchor="middle" font-size="10" class="mono" fill="#374151">e.g. arginine biosynthesis</text>
    </g>
  </g>

  <!-- Branch 3: assembly + MAGs -->
  <g transform="translate(840,320)">
    <rect width="320" height="280" fill="#fff" stroke="#065f46" stroke-width="1.5" rx="6"/>
    <text x="160" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">C. Assembly + binning</text>
    <line x1="20" y1="36" x2="300" y2="36" stroke="#dcfce7"/>

    <g transform="translate(20,52)">
      <rect width="280" height="44" fill="#dcfce7" stroke="#065f46" rx="4"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#065f46">megahit / SPAdes-meta</text>
      <text x="14" y="36" font-size="9" class="mono" fill="#525252">contigs · ~1 hour</text>
    </g>
    <line x1="160" y1="96" x2="160" y2="112" stroke="#525252" stroke-width="1.2" marker-end="url(#arr3)"/>
    <g transform="translate(20,116)">
      <rect width="280" height="44" fill="#dcfce7" stroke="#065f46" rx="4"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#065f46">MetaBAT2 / CONCOCT</text>
      <text x="14" y="36" font-size="9" class="mono" fill="#525252">composition + coverage binning</text>
    </g>
    <line x1="160" y1="160" x2="160" y2="176" stroke="#525252" stroke-width="1.2" marker-end="url(#arr3)"/>
    <g transform="translate(20,176)">
      <rect width="280" height="44" fill="#dcfce7" stroke="#065f46" rx="4"/>
      <text x="14" y="22" font-size="11" font-weight="700" fill="#065f46">CheckM + GTDB-Tk</text>
      <text x="14" y="36" font-size="9" class="mono" fill="#525252">completeness · contamination · taxa</text>
    </g>
    <g transform="translate(20,232)">
      <text x="160" y="14" text-anchor="middle" font-size="10" font-weight="700" fill="#525252">Output</text>
      <text x="160" y="28" text-anchor="middle" font-size="10" class="mono" fill="#374151">MAGs (~50 high-quality / sample)</text>
    </g>
  </g>

  <!-- Bottom: MAG criteria -->
  <g transform="translate(40,640)">
    <rect width="1120" height="60" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="560" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">MAG quality bar (CheckM): high &gt; 90% complete &amp; &lt; 5% contamination · medium &gt; 70% / &lt; 10% · low otherwise</text>
    <text x="560" y="42" text-anchor="middle" font-size="10" fill="#374151">Total runtime: ~2 hours per sample on 16-core node. nf-core/mag handles all three branches in one Nextflow pipeline.</text>
  </g>
</svg>
