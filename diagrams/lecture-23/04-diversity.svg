<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="750" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Diversity metrics — alpha (within-sample) and beta (between-sample)</text>

  <!-- Top: alpha diversity -->
  <g transform="translate(40,70)">
    <text x="560" y="0" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">α-diversity (within sample)</text>
    <rect x="0" y="20" width="1120" height="280" fill="#fff" stroke="#d6d3d1" rx="4"/>

    <!-- Rich pie -->
    <g transform="translate(180,160)">
      <text x="0" y="-110" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Rich sample</text>
      <text x="0" y="-94" text-anchor="middle" font-size="10" class="mono" fill="#525252">10 species, ~10% each</text>
      <!-- 10-slice pie -->
      <g>
        <path d="M 0 0 L 0 -80 A 80 80 0 0 1 47 -64 Z" fill="#1e3a8a"/>
        <path d="M 0 0 L 47 -64 A 80 80 0 0 1 76 -25 Z" fill="#b45309"/>
        <path d="M 0 0 L 76 -25 A 80 80 0 0 1 76 25 Z" fill="#0d7377"/>
        <path d="M 0 0 L 76 25 A 80 80 0 0 1 47 64 Z" fill="#7c3aed"/>
        <path d="M 0 0 L 47 64 A 80 80 0 0 1 0 80 Z" fill="#dc2626"/>
        <path d="M 0 0 L 0 80 A 80 80 0 0 1 -47 64 Z" fill="#065f46"/>
        <path d="M 0 0 L -47 64 A 80 80 0 0 1 -76 25 Z" fill="#fdba74"/>
        <path d="M 0 0 L -76 25 A 80 80 0 0 1 -76 -25 Z" fill="#86efac"/>
        <path d="M 0 0 L -76 -25 A 80 80 0 0 1 -47 -64 Z" fill="#a78bfa"/>
        <path d="M 0 0 L -47 -64 A 80 80 0 0 1 0 -80 Z" fill="#525252"/>
      </g>
      <g transform="translate(0,110)" font-size="11" font-family="JetBrains Mono, monospace" fill="#374151" text-anchor="middle">
        <text x="0" y="0" font-weight="700" fill="#7c3aed">Shannon H = 2.30</text>
        <text x="0" y="16" fill="#525252">Simpson 1−D = 0.90</text>
        <text x="0" y="32" fill="#525252">Richness = 10</text>
      </g>
    </g>

    <!-- Poor pie -->
    <g transform="translate(540,160)">
      <text x="0" y="-110" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Poor sample</text>
      <text x="0" y="-94" text-anchor="middle" font-size="10" class="mono" fill="#525252">2 species, 80% / 20%</text>
      <g>
        <path d="M 0 0 L 0 -80 A 80 80 0 0 1 64 47 L 0 0 Z" fill="#1e3a8a"/>
        <path d="M 0 0 L 64 47 A 80 80 0 1 1 0 -80 L 0 0 Z" fill="#b45309"/>
      </g>
      <g transform="translate(0,110)" font-size="11" font-family="JetBrains Mono, monospace" fill="#374151" text-anchor="middle">
        <text x="0" y="0" font-weight="700" fill="#7c3aed">Shannon H = 0.50</text>
        <text x="0" y="16" fill="#525252">Simpson 1−D = 0.32</text>
        <text x="0" y="32" fill="#525252">Richness = 2</text>
      </g>
    </g>

    <!-- Formulas -->
    <g transform="translate(770,80)">
      <rect width="320" height="200" fill="#fafaf9" stroke="#d6d3d1" rx="4"/>
      <text x="160" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Formulas</text>
      <line x1="20" y1="32" x2="300" y2="32" stroke="#e7e5e4"/>
      <g transform="translate(20,52)" font-size="11" fill="#374151">
        <text x="0" y="0" font-weight="700" fill="#7c3aed">Richness</text>
        <text x="100" y="0" font-family="JetBrains Mono, monospace">|S| = number of taxa</text>
        <text x="0" y="28" font-weight="700" fill="#7c3aed">Shannon</text>
        <text x="100" y="28" font-family="JetBrains Mono, monospace">H = −∑ pᵢ log pᵢ</text>
        <text x="0" y="56" font-weight="700" fill="#7c3aed">Simpson</text>
        <text x="100" y="56" font-family="JetBrains Mono, monospace">1 − D = 1 − ∑ pᵢ²</text>
        <text x="0" y="84" font-weight="700" fill="#7c3aed">Faith's PD</text>
        <text x="100" y="84" font-family="JetBrains Mono, monospace">∑ branch_lengths</text>
        <text x="0" y="110" font-style="italic" fill="#525252">Shannon combines</text>
        <text x="0" y="126" font-style="italic" fill="#525252">richness + evenness.</text>
      </g>
    </g>
  </g>

  <!-- Bottom: beta diversity — group y dropped 360→390 (canvas extended
       720→750) because the β-diversity header at abs y=360 was at glyph
       y=351-362 and the Poor-pie subtitles "Simpson 1−D = 0.32" at abs
       y=356 (glyph 347-358) overlapped it directly. -->
  <g transform="translate(40,390)">
    <text x="560" y="0" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">β-diversity (between samples)</text>
    <rect x="0" y="20" width="1120" height="320" fill="#fff" stroke="#d6d3d1" rx="4"/>

    <!-- Distance matrix -->
    <g transform="translate(60,60)">
      <text x="180" y="0" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Bray-Curtis distance matrix (5 samples)</text>
      <g class="mono" font-size="10" fill="#525252">
        <text x="40" y="22" text-anchor="middle">A</text>
        <text x="80" y="22" text-anchor="middle">B</text>
        <text x="120" y="22" text-anchor="middle">C</text>
        <text x="160" y="22" text-anchor="middle">D</text>
        <text x="200" y="22" text-anchor="middle">E</text>
        <text x="20" y="50" text-anchor="end">A</text>
        <text x="20" y="80" text-anchor="end">B</text>
        <text x="20" y="110" text-anchor="end">C</text>
        <text x="20" y="140" text-anchor="end">D</text>
        <text x="20" y="170" text-anchor="end">E</text>
      </g>
      <!-- 5x5 cells. Two clusters: A,B (case) vs C,D,E (control) -->
      <g transform="translate(28,30)">
        <rect x="0" y="0" width="24" height="24" fill="#fef3c7"/><text x="12" y="16" text-anchor="middle" font-size="9" class="mono" fill="#525252">0</text>
        <rect x="32" y="0" width="24" height="24" fill="#fde68a"/><text x="44" y="16" text-anchor="middle" font-size="9" class="mono" fill="#525252">.18</text>
        <rect x="64" y="0" width="24" height="24" fill="#fca5a5"/><text x="76" y="16" text-anchor="middle" font-size="9" class="mono" fill="#fff">.62</text>
        <rect x="96" y="0" width="24" height="24" fill="#fca5a5"/><text x="108" y="16" text-anchor="middle" font-size="9" class="mono" fill="#fff">.65</text>
        <rect x="128" y="0" width="24" height="24" fill="#dc2626"/><text x="140" y="16" text-anchor="middle" font-size="9" class="mono" fill="#fff">.70</text>

        <rect x="0" y="32" width="24" height="24" fill="#fde68a"/><text x="12" y="48" text-anchor="middle" font-size="9" class="mono" fill="#525252">.18</text>
        <rect x="32" y="32" width="24" height="24" fill="#fef3c7"/><text x="44" y="48" text-anchor="middle" font-size="9" class="mono" fill="#525252">0</text>
        <rect x="64" y="32" width="24" height="24" fill="#fca5a5"/><text x="76" y="48" text-anchor="middle" font-size="9" class="mono" fill="#fff">.59</text>
        <rect x="96" y="32" width="24" height="24" fill="#fca5a5"/><text x="108" y="48" text-anchor="middle" font-size="9" class="mono" fill="#fff">.61</text>
        <rect x="128" y="32" width="24" height="24" fill="#dc2626"/><text x="140" y="48" text-anchor="middle" font-size="9" class="mono" fill="#fff">.68</text>

        <rect x="0" y="64" width="24" height="24" fill="#fca5a5"/><text x="12" y="80" text-anchor="middle" font-size="9" class="mono" fill="#fff">.62</text>
        <rect x="32" y="64" width="24" height="24" fill="#fca5a5"/><text x="44" y="80" text-anchor="middle" font-size="9" class="mono" fill="#fff">.59</text>
        <rect x="64" y="64" width="24" height="24" fill="#fef3c7"/><text x="76" y="80" text-anchor="middle" font-size="9" class="mono" fill="#525252">0</text>
        <rect x="96" y="64" width="24" height="24" fill="#fde68a"/><text x="108" y="80" text-anchor="middle" font-size="9" class="mono" fill="#525252">.20</text>
        <rect x="128" y="64" width="24" height="24" fill="#fde68a"/><text x="140" y="80" text-anchor="middle" font-size="9" class="mono" fill="#525252">.22</text>

        <rect x="0" y="96" width="24" height="24" fill="#fca5a5"/><text x="12" y="112" text-anchor="middle" font-size="9" class="mono" fill="#fff">.65</text>
        <rect x="32" y="96" width="24" height="24" fill="#fca5a5"/><text x="44" y="112" text-anchor="middle" font-size="9" class="mono" fill="#fff">.61</text>
        <rect x="64" y="96" width="24" height="24" fill="#fde68a"/><text x="76" y="112" text-anchor="middle" font-size="9" class="mono" fill="#525252">.20</text>
        <rect x="96" y="96" width="24" height="24" fill="#fef3c7"/><text x="108" y="112" text-anchor="middle" font-size="9" class="mono" fill="#525252">0</text>
        <rect x="128" y="96" width="24" height="24" fill="#fde68a"/><text x="140" y="112" text-anchor="middle" font-size="9" class="mono" fill="#525252">.18</text>

        <rect x="0" y="128" width="24" height="24" fill="#dc2626"/><text x="12" y="144" text-anchor="middle" font-size="9" class="mono" fill="#fff">.70</text>
        <rect x="32" y="128" width="24" height="24" fill="#dc2626"/><text x="44" y="144" text-anchor="middle" font-size="9" class="mono" fill="#fff">.68</text>
        <rect x="64" y="128" width="24" height="24" fill="#fde68a"/><text x="76" y="144" text-anchor="middle" font-size="9" class="mono" fill="#525252">.22</text>
        <rect x="96" y="128" width="24" height="24" fill="#fde68a"/><text x="108" y="144" text-anchor="middle" font-size="9" class="mono" fill="#525252">.18</text>
        <rect x="128" y="128" width="24" height="24" fill="#fef3c7"/><text x="140" y="144" text-anchor="middle" font-size="9" class="mono" fill="#525252">0</text>
      </g>
      <!-- Cluster brackets -->
      <line x1="28" y1="200" x2="84" y2="200" stroke="#dc2626" stroke-width="2"/>
      <text x="56" y="216" text-anchor="middle" font-size="9" font-weight="700" fill="#dc2626">case (A,B)</text>
      <line x1="92" y1="200" x2="180" y2="200" stroke="#1e3a8a" stroke-width="2"/>
      <text x="136" y="216" text-anchor="middle" font-size="9" font-weight="700" fill="#1e3a8a">control (C,D,E)</text>
    </g>

    <!-- PCoA scatter -->
    <g transform="translate(440,60)">
      <text x="180" y="0" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">PCoA on the BC matrix</text>
      <rect x="0" y="20" width="360" height="220" fill="#fafaf9" stroke="#d6d3d1"/>
      <line x1="180" y1="20" x2="180" y2="240" stroke="#e7e5e4" stroke-dasharray="3 3"/>
      <line x1="0" y1="130" x2="360" y2="130" stroke="#e7e5e4" stroke-dasharray="3 3"/>
      <g>
        <circle cx="80" cy="100" r="10" fill="#dc2626" stroke="#fff" stroke-width="1.5"/><text x="80" y="104" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">A</text>
        <circle cx="100" cy="80" r="10" fill="#dc2626" stroke="#fff" stroke-width="1.5"/><text x="100" y="84" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">B</text>
        <circle cx="270" cy="160" r="10" fill="#1e3a8a" stroke="#fff" stroke-width="1.5"/><text x="270" y="164" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">C</text>
        <circle cx="290" cy="180" r="10" fill="#1e3a8a" stroke="#fff" stroke-width="1.5"/><text x="290" y="184" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">D</text>
        <circle cx="280" cy="200" r="10" fill="#1e3a8a" stroke="#fff" stroke-width="1.5"/><text x="280" y="204" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">E</text>
        <ellipse cx="90" cy="90" rx="40" ry="40" fill="none" stroke="#dc2626" stroke-dasharray="4 3"/>
        <ellipse cx="280" cy="180" rx="50" ry="40" fill="none" stroke="#1e3a8a" stroke-dasharray="4 3"/>
      </g>
      <text x="180" y="260" text-anchor="middle" font-size="10" class="mono" fill="#525252">PCoA axis 1 (40% var)</text>
    </g>

    <!-- PERMANOVA result -->
    <g transform="translate(840,60)">
      <rect width="240" height="220" fill="#fafaf9" stroke="#d6d3d1" rx="4"/>
      <text x="120" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">PERMANOVA test</text>
      <line x1="20" y1="32" x2="220" y2="32" stroke="#e7e5e4"/>
      <g transform="translate(20,52)" font-size="11" fill="#374151">
        <text x="0" y="0" font-weight="700">H₀:</text>
        <text x="36" y="0">groups have equal centroids</text>
        <text x="0" y="22" font-weight="700">H₁:</text>
        <text x="36" y="22">centroids differ</text>
        <text x="0" y="50" font-family="JetBrains Mono, monospace" fill="#1e3a8a" font-weight="700">F = 14.2</text>
        <text x="0" y="70" font-family="JetBrains Mono, monospace" fill="#dc2626" font-weight="700">p &lt; 0.001 (1000 perm)</text>
        <text x="0" y="100" font-style="italic" fill="#525252">Case and control microbiomes</text>
        <text x="0" y="116" font-style="italic" fill="#525252">are statistically distinct.</text>
      </g>
    </g>
  </g>
</svg>
