<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="720" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Gut microbiome predicts immunotherapy response — Routy et al. 2018</text>

  <!-- Panel 1: PCoA -->
  <g transform="translate(60,80)">
    <rect width="360" height="320" fill="#fff" stroke="#d6d3d1" rx="4"/>
    <text x="180" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Panel 1. Pre-treatment PCoA</text>
    <text x="180" y="36" text-anchor="middle" font-size="10" fill="#525252">stool microbiome before anti-PD-1</text>
    <g transform="translate(40,60)">
      <rect width="280" height="220" fill="#fafaf9" stroke="#9ca3af"/>
      <line x1="140" y1="0" x2="140" y2="220" stroke="#e7e5e4" stroke-dasharray="3 3"/>
      <line x1="0" y1="110" x2="280" y2="110" stroke="#e7e5e4" stroke-dasharray="3 3"/>
      <!-- Responders cluster top-left -->
      <g fill="#dc2626" stroke="#fff" stroke-width="1">
        <circle cx="60" cy="60" r="6"/><circle cx="80" cy="50" r="6"/><circle cx="50" cy="80" r="6"/>
        <circle cx="90" cy="70" r="6"/><circle cx="70" cy="40" r="6"/><circle cx="100" cy="80" r="6"/>
        <circle cx="80" cy="90" r="6"/><circle cx="60" cy="100" r="6"/>
      </g>
      <ellipse cx="76" cy="70" rx="40" ry="35" fill="none" stroke="#dc2626" stroke-dasharray="4 3"/>
      <text x="76" y="20" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626" class="mono">responders (n=80)</text>
      <!-- Non-responders cluster bottom-right -->
      <g fill="#525252" stroke="#fff" stroke-width="1">
        <circle cx="200" cy="150" r="6"/><circle cx="220" cy="160" r="6"/><circle cx="190" cy="170" r="6"/>
        <circle cx="230" cy="170" r="6"/><circle cx="210" cy="180" r="6"/><circle cx="240" cy="180" r="6"/>
        <circle cx="200" cy="190" r="6"/><circle cx="220" cy="200" r="6"/><circle cx="180" cy="160" r="6"/>
      </g>
      <ellipse cx="215" cy="180" rx="50" ry="40" fill="none" stroke="#525252" stroke-dasharray="4 3"/>
      <text x="215" y="216" text-anchor="middle" font-size="10" font-weight="700" fill="#525252" class="mono">non-responders (n=68)</text>
    </g>
    <text x="180" y="304" text-anchor="middle" font-size="10" class="mono" fill="#525252">PERMANOVA p &lt; 0.01</text>
  </g>

  <!-- Panel 2: Volcano plot of differential abundance -->
  <g transform="translate(440,80)">
    <rect width="360" height="320" fill="#fff" stroke="#d6d3d1" rx="4"/>
    <text x="180" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Panel 2. Differential abundance</text>
    <text x="180" y="36" text-anchor="middle" font-size="10" fill="#525252">responders vs non-responders</text>
    <g transform="translate(40,60)">
      <rect width="280" height="220" fill="#fafaf9" stroke="#9ca3af"/>
      <line x1="140" y1="0" x2="140" y2="220" stroke="#9ca3af" stroke-dasharray="3 3"/>
      <line x1="0" y1="40" x2="280" y2="40" stroke="#9ca3af" stroke-dasharray="3 3"/>
      <!-- Most genes near origin -->
      <g fill="#9ca3af" fill-opacity="0.6">
        <circle cx="120" cy="120" r="3"/><circle cx="130" cy="130" r="3"/><circle cx="155" cy="125" r="3"/>
        <circle cx="160" cy="140" r="3"/><circle cx="125" cy="100" r="3"/><circle cx="145" cy="110" r="3"/>
        <circle cx="100" cy="115" r="3"/><circle cx="170" cy="120" r="3"/><circle cx="180" cy="135" r="3"/>
        <circle cx="135" cy="155" r="3"/><circle cx="148" cy="135" r="3"/><circle cx="165" cy="105" r="3"/>
        <circle cx="115" cy="140" r="3"/><circle cx="142" cy="160" r="3"/><circle cx="155" cy="170" r="3"/>
      </g>
      <!-- Significant up taxa (right side, low p) -->
      <circle cx="240" cy="20" r="6" fill="#dc2626"/>
      <circle cx="220" cy="50" r="5" fill="#dc2626"/>
      <circle cx="210" cy="60" r="4" fill="#dc2626"/>
      <circle cx="60" cy="50" r="5" fill="#1e3a8a"/>
      <text x="246" y="22" font-size="9" font-style="italic" fill="#dc2626">A. muciniphila</text>
      <text x="226" y="46" font-size="9" font-style="italic" fill="#dc2626">F. prausnitzii</text>
      <text x="56" y="46" text-anchor="end" font-size="9" font-style="italic" fill="#1e3a8a">B. fragilis</text>
      <!-- Axes labels -->
      <g class="mono" font-size="9" fill="#525252">
        <text x="0" y="234" text-anchor="middle">−4</text>
        <text x="140" y="234" text-anchor="middle">0</text>
        <text x="280" y="234" text-anchor="middle">+4</text>
        <text x="-6" y="222" text-anchor="end">0</text>
        <text x="-6" y="44" text-anchor="end">10⁻⁴</text>
      </g>
      <text x="140" y="252" text-anchor="middle" font-size="10" fill="#525252">log₂(fold change)</text>
      <text x="-30" y="110" text-anchor="middle" font-size="10" fill="#525252" transform="rotate(-90 -30 110)">−log₁₀ p-value</text>
    </g>
  </g>

  <!-- Panel 3: Kaplan-Meier -->
  <g transform="translate(820,80)">
    <rect width="320" height="320" fill="#fff" stroke="#d6d3d1" rx="4"/>
    <text x="160" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Panel 3. Survival</text>
    <text x="160" y="36" text-anchor="middle" font-size="10" fill="#525252">stratified by A. muciniphila</text>
    <g transform="translate(40,60)">
      <rect width="240" height="220" fill="#fafaf9" stroke="#9ca3af"/>
      <line x1="0" y1="220" x2="240" y2="220" stroke="#374151"/>
      <line x1="0" y1="0" x2="0" y2="220" stroke="#374151"/>
      <g class="mono" font-size="9" fill="#525252">
        <text x="-6" y="222" text-anchor="end">0</text>
        <text x="-6" y="120" text-anchor="end">0.5</text>
        <text x="-6" y="20" text-anchor="end">1.0</text>
        <text x="0" y="240" text-anchor="middle">0</text>
        <text x="120" y="240" text-anchor="middle">12</text>
        <text x="240" y="240" text-anchor="middle">24 mo</text>
      </g>
      <!-- High Akkermansia: red, slow descent -->
      <path d="M 0 20 L 30 25 L 60 32 L 90 40 L 120 50 L 150 60 L 180 75 L 210 90 L 240 110"
            stroke="#dc2626" stroke-width="2.5" fill="none"/>
      <text x="190" y="84" font-size="10" font-weight="700" fill="#dc2626" class="mono">A. muc high</text>
      <!-- Low Akkermansia: grey, fast descent -->
      <path d="M 0 20 L 30 50 L 60 80 L 90 110 L 120 140 L 150 160 L 180 180 L 210 195 L 240 205"
            stroke="#525252" stroke-width="2.5" fill="none"/>
      <text x="100" y="170" font-size="10" font-weight="700" fill="#525252" class="mono">A. muc low</text>
      <text x="120" y="-6" text-anchor="middle" font-size="10" fill="#374151">Survival probability</text>
    </g>
    <text x="160" y="304" text-anchor="middle" font-size="10" class="mono" fill="#525252">log-rank p &lt; 0.001</text>
  </g>

  <!-- Bottom: study details + EE framing -->
  <g transform="translate(60,440)">
    <rect width="1080" height="240" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="540" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Study design and downstream implications</text>
    <line x1="40" y1="34" x2="1040" y2="34" stroke="#e7e5e4"/>

    <g transform="translate(40,52)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700" fill="#1e3a8a">Routy et al. 2018 — gut microbiome and PD-1 blockade</text>
      <text x="0" y="20" font-size="10" fill="#525252">• Cohort: 249 NSCLC and renal-cell carcinoma patients on anti-PD-1 (nivolumab/pembrolizumab).</text>
      <text x="0" y="36" font-size="10" fill="#525252">• Pre-treatment stool 16S sequencing.</text>
      <text x="0" y="52" font-size="10" fill="#525252">• Outcome: progression-free survival at 6 months.</text>
      <text x="0" y="76" font-weight="700" fill="#dc2626">Key findings</text>
      <text x="0" y="96" font-size="10" fill="#374151">• Responders: enriched in Akkermansia muciniphila and Faecalibacterium prausnitzii.</text>
      <text x="0" y="112" font-size="10" fill="#374151">• Non-responders: enriched in Bacteroides fragilis.</text>
      <text x="0" y="128" font-size="10" fill="#374151">• Antibiotics within 2 months before therapy → reduced response (HR = 1.95).</text>
      <text x="0" y="148" font-size="10" fill="#374151">• Mouse-FMT validation: A. muciniphila-supplemented mice showed restored response.</text>
    </g>

    <g transform="translate(580,52)">
      <rect width="460" height="170" fill="#fef3c7" stroke="#b45309" rx="4"/>
      <text x="230" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Clinical translation</text>
      <line x1="20" y1="32" x2="440" y2="32" stroke="#92400e" opacity="0.4"/>
      <g transform="translate(20,52)" font-size="10" fill="#374151">
        <text x="0" y="0">• Phase I/II trials testing FMT as anti-PD-1 adjuvant.</text>
        <text x="0" y="18">• ~10 published studies; ~30% response in previously refractory.</text>
        <text x="0" y="36">• Engineered live biotherapeutic candidates entering clinical pipelines.</text>
        <text x="0" y="54">• Microbiome-based stratification not yet routine in oncology.</text>
        <text x="0" y="78" font-weight="700" fill="#92400e">Open questions:</text>
        <text x="0" y="94">– Cohort effects (geography, diet) limit generalisability.</text>
        <text x="0" y="110">– Mechanism: A. muc enhances DC priming, but causal chain incomplete.</text>
      </g>
    </g>
  </g>
</svg>
