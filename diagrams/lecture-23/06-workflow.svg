<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arrW" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Microbiome analysis workflow — sample to publication, with reproducibility hazards per band</text>

  <!-- Bands -->
  <g transform="translate(60,70)">
    <!-- Band 1 -->
    <g>
      <rect x="0" y="0" width="1080" height="64" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="4"/>
      <text x="20" y="24" font-size="12" font-weight="700" fill="#92400e">1. Sample collection &amp; storage</text>
      <text x="20" y="42" font-size="10" class="mono" fill="#374151">protocol, buffer, temperature</text>
      <text x="20" y="58" font-size="9" fill="#525252">⚠ -80°C ideal · cross-contamination · subject confounders (diet, antibiotics)</text>
    </g>
    <line x1="540" y1="64" x2="540" y2="80" stroke="#525252" stroke-width="1.4" marker-end="url(#arrW)"/>

    <!-- Band 2 -->
    <g transform="translate(0,80)">
      <rect x="0" y="0" width="1080" height="64" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" rx="4"/>
      <text x="20" y="24" font-size="12" font-weight="700" fill="#1e3a8a">2. Sequencing</text>
      <text x="20" y="42" font-size="10" class="mono" fill="#374151">16S V3–V4 (Illumina 2×250) or shotgun (~5 Gb)</text>
      <text x="20" y="58" font-size="9" fill="#525252">⚠ primer-bias for 16S · low-biomass host contamination · pin sequencer + chemistry</text>
    </g>
    <line x1="540" y1="144" x2="540" y2="160" stroke="#525252" stroke-width="1.4" marker-end="url(#arrW)"/>

    <!-- Band 3 -->
    <g transform="translate(0,160)">
      <rect x="0" y="0" width="1080" height="64" fill="#dcfce7" stroke="#065f46" stroke-width="1.5" rx="4"/>
      <text x="20" y="24" font-size="12" font-weight="700" fill="#065f46">3. Pipeline (DADA2 / shotgun)</text>
      <text x="20" y="42" font-size="10" class="mono" fill="#374151">QIIME2 · bioBakery · nf-core/mag</text>
      <text x="20" y="58" font-size="9" fill="#525252">⚠ pin DB version (SILVA/GTDB) · pin tool versions · ASV not OTU for new analyses</text>
    </g>
    <line x1="540" y1="224" x2="540" y2="240" stroke="#525252" stroke-width="1.4" marker-end="url(#arrW)"/>

    <!-- Band 4 -->
    <g transform="translate(0,240)">
      <rect x="0" y="0" width="1080" height="64" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" rx="4"/>
      <text x="20" y="24" font-size="12" font-weight="700" fill="#7c3aed">4. Diversity + ordination</text>
      <text x="20" y="42" font-size="10" class="mono" fill="#374151">α: Shannon, Faith's PD · β: Bray-Curtis, UniFrac · PCoA / PERMANOVA</text>
      <text x="20" y="58" font-size="9" fill="#525252">⚠ depth normalisation (rarefaction or compositional method) · phylogenetic vs not</text>
    </g>
    <line x1="540" y1="304" x2="540" y2="320" stroke="#525252" stroke-width="1.4" marker-end="url(#arrW)"/>

    <!-- Band 5 -->
    <g transform="translate(0,320)">
      <rect x="0" y="0" width="1080" height="64" fill="#fee2e2" stroke="#7f1d1d" stroke-width="1.5" rx="4"/>
      <text x="20" y="24" font-size="12" font-weight="700" fill="#7f1d1d">5. Differential abundance</text>
      <text x="20" y="42" font-size="10" class="mono" fill="#374151">ANCOM-BC · MaAsLin2 · songbird</text>
      <text x="20" y="58" font-size="9" fill="#525252">⚠ compositional bias inflates naive tests · FDR control across thousands of taxa</text>
    </g>
    <line x1="540" y1="384" x2="540" y2="400" stroke="#525252" stroke-width="1.4" marker-end="url(#arrW)"/>

    <!-- Band 6 -->
    <g transform="translate(0,400)">
      <rect x="0" y="0" width="1080" height="64" fill="#fde68a" stroke="#92400e" stroke-width="1.5" rx="4"/>
      <text x="20" y="24" font-size="12" font-weight="700" fill="#92400e">6. Functional profiling (shotgun only)</text>
      <text x="20" y="42" font-size="10" class="mono" fill="#374151">HUMAnN3 · KEGG / MetaCyc pathway abundance</text>
      <text x="20" y="58" font-size="9" fill="#525252">⚠ reference-genome bias for unculturable taxa · stratified output for interpretation</text>
    </g>
    <line x1="540" y1="464" x2="540" y2="480" stroke="#525252" stroke-width="1.4" marker-end="url(#arrW)"/>

    <!-- Band 7 -->
    <g transform="translate(0,480)">
      <rect x="0" y="0" width="1080" height="64" fill="#fff" stroke="#525252" stroke-width="2" rx="4"/>
      <text x="20" y="24" font-size="12" font-weight="700" fill="#525252">7. Visualisation + interpretation</text>
      <text x="20" y="42" font-size="10" class="mono" fill="#374151">QIIME2 viz · phyloseq · ggplot2 · iTOL · Krona</text>
      <text x="20" y="58" font-size="9" fill="#525252">⚠ replication in independent cohort before claiming generality</text>
    </g>
  </g>

  <!-- Bottom banner -->
  <g transform="translate(60,620)">
    <rect width="1080" height="80" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="540" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">Reproducibility checklist for any microbiome paper</text>
    <text x="540" y="42" text-anchor="middle" font-size="10" fill="#374151">DNA extraction kit · primer sequences · sequencer model · pipeline version + DB version + parameters</text>
    <text x="540" y="58" text-anchor="middle" font-size="10" fill="#374151">Diversity-metric choice + depth-normalisation method + differential-abundance method + FDR cutoff</text>
    <text x="540" y="74" text-anchor="middle" font-size="10" font-style="italic" fill="#525252">~30% of microbiome associations replicate across cohorts; document everything to be in the 30%.</text>
  </g>
</svg>
