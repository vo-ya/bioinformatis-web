<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="480" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Bacterial 16S rRNA gene — alternating conserved (primer-targeted) and variable (taxonomy-resolving) regions</text>

  <!-- Linear gene -->
  <g transform="translate(80,100)">
    <text x="520" y="0" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">~1,500 bp gene structure (V1–V9)</text>
    <!-- Alternating bands -->
    <g>
      <!-- Conserved C0 (5' end) -->
      <rect x="0" y="20" width="50" height="40" fill="#525252" opacity="0.5"/>
      <text x="25" y="46" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">C</text>
      <!-- V1 -->
      <rect x="50" y="20" width="100" height="40" fill="#1e3a8a"/>
      <text x="100" y="46" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">V1</text>
      <!-- C1 -->
      <rect x="150" y="20" width="40" height="40" fill="#525252" opacity="0.5"/>
      <text x="170" y="46" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">C</text>
      <!-- V2 -->
      <rect x="190" y="20" width="100" height="40" fill="#1e3a8a"/>
      <text x="240" y="46" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">V2</text>
      <!-- C2 -->
      <rect x="290" y="20" width="40" height="40" fill="#525252" opacity="0.5"/>
      <text x="310" y="46" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">C</text>
      <!-- V3 -->
      <rect x="330" y="20" width="100" height="40" fill="#1e3a8a"/>
      <text x="380" y="46" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">V3</text>
      <!-- C3 -->
      <rect x="430" y="20" width="40" height="40" fill="#525252" opacity="0.5"/>
      <text x="450" y="46" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">C</text>
      <!-- V4 -->
      <rect x="470" y="20" width="100" height="40" fill="#1e3a8a"/>
      <text x="520" y="46" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">V4</text>
      <!-- C4 -->
      <rect x="570" y="20" width="40" height="40" fill="#525252" opacity="0.5"/>
      <text x="590" y="46" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">C</text>
      <!-- V5 -->
      <rect x="610" y="20" width="100" height="40" fill="#1e3a8a"/>
      <text x="660" y="46" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">V5</text>
      <!-- C5 -->
      <rect x="710" y="20" width="40" height="40" fill="#525252" opacity="0.5"/>
      <text x="730" y="46" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">C</text>
      <!-- V6 -->
      <rect x="750" y="20" width="100" height="40" fill="#1e3a8a"/>
      <text x="800" y="46" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">V6</text>
      <!-- C6 -->
      <rect x="850" y="20" width="40" height="40" fill="#525252" opacity="0.5"/>
      <text x="870" y="46" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">C</text>
      <!-- V7 -->
      <rect x="890" y="20" width="80" height="40" fill="#1e3a8a"/>
      <text x="930" y="46" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">V7</text>
      <!-- C7 -->
      <rect x="970" y="20" width="40" height="40" fill="#525252" opacity="0.5"/>
      <text x="990" y="46" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">C</text>
      <!-- V8 -->
      <rect x="1010" y="20" width="40" height="40" fill="#1e3a8a"/>
      <text x="1030" y="46" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">V8</text>
      <!-- C8 -->
      <rect x="1050" y="20" width="20" height="40" fill="#525252" opacity="0.5"/>
      <!-- V9 -->
      <rect x="1070" y="20" width="20" height="40" fill="#1e3a8a"/>
      <text x="1080" y="46" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">V9</text>
    </g>
    <!-- 5' / 3' labels -->
    <text x="-12" y="46" text-anchor="end" font-size="11" font-weight="700" fill="#374151" class="mono">5'</text>
    <text x="1100" y="46" text-anchor="start" font-size="11" font-weight="700" fill="#374151" class="mono">3'</text>
    <text x="-12" y="14" text-anchor="end" font-size="9" class="mono" fill="#525252">0 bp</text>
    <text x="1100" y="14" text-anchor="start" font-size="9" class="mono" fill="#525252">~1500 bp</text>

    <!-- Primer brackets below -->
    <!-- V3-V4 bracket -->
    <g transform="translate(0,80)">
      <line x1="330" y1="0" x2="570" y2="0" stroke="#dc2626" stroke-width="2.5"/>
      <line x1="330" y1="-4" x2="330" y2="4" stroke="#dc2626" stroke-width="2.5"/>
      <line x1="570" y1="-4" x2="570" y2="4" stroke="#dc2626" stroke-width="2.5"/>
      <text x="450" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626" class="mono">V3–V4 (~460 bp)</text>
      <text x="450" y="34" text-anchor="middle" font-size="9" fill="#525252">most-used; Illumina 2×250 PE</text>
    </g>

    <!-- V4-only bracket -->
    <g transform="translate(0,140)">
      <line x1="470" y1="0" x2="570" y2="0" stroke="#b45309" stroke-width="2.5"/>
      <line x1="470" y1="-4" x2="470" y2="4" stroke="#b45309" stroke-width="2.5"/>
      <line x1="570" y1="-4" x2="570" y2="4" stroke="#b45309" stroke-width="2.5"/>
      <text x="520" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309" class="mono">V4 (~250 bp)</text>
      <text x="520" y="34" text-anchor="middle" font-size="9" fill="#525252">single-read; cheapest</text>
    </g>

    <!-- Full-length bracket -->
    <g transform="translate(0,200)">
      <line x1="0" y1="0" x2="1090" y2="0" stroke="#065f46" stroke-width="2.5"/>
      <line x1="0" y1="-4" x2="0" y2="4" stroke="#065f46" stroke-width="2.5"/>
      <line x1="1090" y1="-4" x2="1090" y2="4" stroke="#065f46" stroke-width="2.5"/>
      <text x="545" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46" class="mono">full-length 1500 bp (PacBio HiFi)</text>
      <text x="545" y="34" text-anchor="middle" font-size="9" fill="#525252">strain-level resolution</text>
    </g>
  </g>

  <!-- Bottom: legend + biology note -->
  <g transform="translate(80,400)">
    <rect width="1040" height="60" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="520" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Primers anneal to conserved regions; the variable region in between is sequenced and resolved to taxonomy</text>
    <text x="520" y="42" text-anchor="middle" font-size="10" fill="#374151">More variable regions covered → better resolution. V3–V4 is the V-region equivalent of "good enough"; full-length 16S is the gold standard.</text>
  </g>
</svg>
