<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">The compositional data problem — different absolute biology, identical relative pattern</text>

  <!-- Scenario 1: True growth -->
  <g transform="translate(60,80)">
    <rect width="540" height="360" fill="#fff" stroke="#dcfce7" stroke-width="2" rx="6"/>
    <text x="270" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Scenario 1: True biological change</text>
    <text x="270" y="40" text-anchor="middle" font-size="10" fill="#525252">Species A doubles in absolute count; B unchanged</text>

    <!-- Sample 1 absolute -->
    <g transform="translate(40,80)">
      <text x="80" y="0" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Sample 1 (absolute counts)</text>
      <rect x="20" y="14" width="60" height="60" fill="#1e3a8a"/>
      <text x="50" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">A=100</text>
      <rect x="80" y="14" width="60" height="60" fill="#b45309"/>
      <text x="110" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">B=100</text>
      <text x="80" y="98" text-anchor="middle" font-size="9" class="mono" fill="#525252">total = 200</text>
    </g>

    <g transform="translate(280,80)">
      <text x="80" y="0" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Sample 2 (absolute counts)</text>
      <rect x="0" y="14" width="120" height="60" fill="#1e3a8a"/>
      <text x="60" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">A=200</text>
      <rect x="120" y="14" width="60" height="60" fill="#b45309"/>
      <text x="150" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">B=100</text>
      <text x="80" y="98" text-anchor="middle" font-size="9" class="mono" fill="#525252">total = 300</text>
    </g>

    <line x1="40" y1="200" x2="500" y2="200" stroke="#e7e5e4"/>
    <text x="270" y="220" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">After sequencing-depth normalisation:</text>

    <!-- Relative -->
    <g transform="translate(40,240)">
      <text x="80" y="0" text-anchor="middle" font-size="10" font-weight="700" fill="#374151">S1 relative</text>
      <rect x="20" y="10" width="60" height="20" fill="#1e3a8a"/>
      <text x="50" y="24" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">A=50%</text>
      <rect x="80" y="10" width="60" height="20" fill="#b45309"/>
      <text x="110" y="24" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">B=50%</text>
    </g>
    <g transform="translate(280,240)">
      <text x="80" y="0" text-anchor="middle" font-size="10" font-weight="700" fill="#374151">S2 relative</text>
      <rect x="0" y="10" width="80" height="20" fill="#1e3a8a"/>
      <text x="40" y="24" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">A=67%</text>
      <rect x="80" y="10" width="40" height="20" fill="#b45309"/>
      <text x="100" y="24" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">B=33%</text>
    </g>
    <g transform="translate(40,300)">
      <rect width="460" height="44" fill="#dcfce7" stroke="#065f46" rx="4"/>
      <text x="230" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">A appears UP, B appears DOWN — but B was unchanged!</text>
      <text x="230" y="36" text-anchor="middle" font-size="9" fill="#374151">Naive t-test claims B is differentially "depleted"; it isn't.</text>
    </g>
  </g>

  <!-- Scenario 2: Technical artefact -->
  <g transform="translate(620,80)">
    <rect width="540" height="360" fill="#fff" stroke="#fee2e2" stroke-width="2" rx="6"/>
    <text x="270" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">Scenario 2: Technical artefact</text>
    <text x="270" y="40" text-anchor="middle" font-size="10" fill="#525252">Both species unchanged; sequencing depth doubles</text>

    <g transform="translate(40,80)">
      <text x="80" y="0" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Sample 1 (sampled at depth N)</text>
      <rect x="20" y="14" width="60" height="60" fill="#1e3a8a"/>
      <text x="50" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">A=100</text>
      <rect x="80" y="14" width="60" height="60" fill="#b45309"/>
      <text x="110" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">B=100</text>
      <text x="80" y="98" text-anchor="middle" font-size="9" class="mono" fill="#525252">depth = 200</text>
    </g>

    <g transform="translate(280,80)">
      <text x="80" y="0" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Sample 2 (sampled at depth 1.5N)</text>
      <rect x="0" y="14" width="120" height="60" fill="#1e3a8a" stroke="#7f1d1d" stroke-dasharray="3 2"/>
      <text x="60" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">A=200</text>
      <rect x="120" y="14" width="60" height="60" fill="#b45309" stroke="#7f1d1d" stroke-dasharray="3 2"/>
      <text x="150" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">B=100</text>
      <text x="80" y="98" text-anchor="middle" font-size="9" class="mono" fill="#525252">depth = 300 (skewed)</text>
    </g>

    <line x1="40" y1="200" x2="500" y2="200" stroke="#e7e5e4"/>
    <text x="270" y="220" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">Same relative pattern → indistinguishable!</text>

    <g transform="translate(40,240)">
      <text x="80" y="0" text-anchor="middle" font-size="10" font-weight="700" fill="#374151">S1 relative</text>
      <rect x="20" y="10" width="60" height="20" fill="#1e3a8a"/>
      <text x="50" y="24" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">A=50%</text>
      <rect x="80" y="10" width="60" height="20" fill="#b45309"/>
      <text x="110" y="24" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">B=50%</text>
    </g>
    <g transform="translate(280,240)">
      <text x="80" y="0" text-anchor="middle" font-size="10" font-weight="700" fill="#374151">S2 relative</text>
      <rect x="0" y="10" width="80" height="20" fill="#1e3a8a"/>
      <text x="40" y="24" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">A=67%</text>
      <rect x="80" y="10" width="40" height="20" fill="#b45309"/>
      <text x="100" y="24" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">B=33%</text>
    </g>
    <g transform="translate(40,300)">
      <rect width="460" height="44" fill="#fee2e2" stroke="#7f1d1d" rx="4"/>
      <text x="230" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">Compositional artefact: identical pattern from very different biology</text>
      <text x="230" y="36" text-anchor="middle" font-size="9" fill="#374151">Naive t-test cannot tell the difference.</text>
    </g>
  </g>

  <!-- Bottom banner -->
  <g transform="translate(60,460)">
    <rect width="1080" height="120" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="540" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">The fix: compositional data analysis (Aitchison transforms + ANCOM-BC)</text>
    <text x="540" y="44" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#374151">CLR (centred log-ratio): clr(x_i) = log(x_i) − (1/N) ∑ log(x_j)</text>
    <text x="540" y="62" text-anchor="middle" font-size="10" fill="#374151">CLR turns compositional data into a Euclidean space where standard tests apply.</text>
    <text x="540" y="80" text-anchor="middle" font-size="10" fill="#374151">ANCOM-BC additionally models a sample-specific bias term that absorbs depth differences.</text>
    <text x="540" y="100" text-anchor="middle" font-size="10" font-style="italic" fill="#525252">Many "differential abundance" findings from 2010–2018 were compositional artefacts; modern tools fix this.</text>
  </g>
</svg>
