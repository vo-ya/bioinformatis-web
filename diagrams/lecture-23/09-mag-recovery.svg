<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">MAG recovery — bin contigs by composition + coverage; assess quality via single-copy markers</text>

  <!-- Left: scatter -->
  <g transform="translate(60,80)">
    <rect width="540" height="440" fill="#fff" stroke="#d6d3d1" rx="4"/>
    <text x="270" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Contigs in composition × coverage space</text>
    <g transform="translate(60,60)">
      <line x1="0" y1="320" x2="440" y2="320" stroke="#374151"/>
      <line x1="0" y1="0" x2="0" y2="320" stroke="#374151"/>
      <g class="mono" font-size="10" fill="#525252">
        <text x="-8" y="324" text-anchor="end">10×</text>
        <text x="-8" y="240" text-anchor="end">25×</text>
        <text x="-8" y="156" text-anchor="end">60×</text>
        <text x="-8" y="72" text-anchor="end">120×</text>
        <text x="0" y="340" text-anchor="middle">−2</text>
        <text x="220" y="340" text-anchor="middle">0</text>
        <text x="440" y="340" text-anchor="middle">+2</text>
      </g>
      <text x="220" y="358" text-anchor="middle" font-size="11" fill="#525252">tetranucleotide PC1</text>
      <text x="-44" y="160" text-anchor="middle" font-size="11" fill="#525252" transform="rotate(-90 -44 160)">read coverage</text>

      <!-- Cluster 1: high coverage, far left (cobalt) -->
      <g fill="#1e3a8a" fill-opacity="0.7">
        <circle cx="60" cy="80" r="4"/><circle cx="80" cy="70" r="4"/><circle cx="100" cy="90" r="4"/>
        <circle cx="70" cy="100" r="4"/><circle cx="90" cy="60" r="4"/><circle cx="50" cy="90" r="4"/>
        <circle cx="110" cy="80" r="4"/><circle cx="75" cy="85" r="4"/><circle cx="85" cy="75" r="4"/>
        <circle cx="95" cy="105" r="4"/><circle cx="65" cy="115" r="4"/><circle cx="105" cy="95" r="4"/>
        <circle cx="115" cy="65" r="4"/><circle cx="55" cy="55" r="4"/><circle cx="125" cy="85" r="4"/>
      </g>
      <ellipse cx="85" cy="85" rx="50" ry="40" fill="none" stroke="#1e3a8a" stroke-dasharray="4 3"/>
      <text x="85" y="40" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">MAG 1</text>

      <!-- Cluster 2: medium coverage, middle (amber) -->
      <g fill="#b45309" fill-opacity="0.7">
        <circle cx="200" cy="180" r="4"/><circle cx="220" cy="170" r="4"/><circle cx="240" cy="190" r="4"/>
        <circle cx="210" cy="200" r="4"/><circle cx="230" cy="160" r="4"/><circle cx="190" cy="190" r="4"/>
        <circle cx="250" cy="180" r="4"/><circle cx="215" cy="185" r="4"/><circle cx="225" cy="175" r="4"/>
        <circle cx="235" cy="205" r="4"/><circle cx="205" cy="215" r="4"/><circle cx="245" cy="195" r="4"/>
      </g>
      <ellipse cx="220" cy="190" rx="45" ry="35" fill="none" stroke="#b45309" stroke-dasharray="4 3"/>
      <text x="220" y="146" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">MAG 2</text>

      <!-- Cluster 3: low coverage, right (red) -->
      <g fill="#dc2626" fill-opacity="0.7">
        <circle cx="340" cy="260" r="4"/><circle cx="360" cy="250" r="4"/><circle cx="380" cy="280" r="4"/>
        <circle cx="350" cy="270" r="4"/><circle cx="370" cy="240" r="4"/><circle cx="330" cy="280" r="4"/>
        <circle cx="390" cy="270" r="4"/><circle cx="355" cy="285" r="4"/>
      </g>
      <ellipse cx="360" cy="270" rx="40" ry="30" fill="none" stroke="#dc2626" stroke-dasharray="4 3"/>
      <text x="360" y="226" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">MAG 3</text>

      <!-- Unbinned scatter -->
      <g fill="#9ca3af" fill-opacity="0.4">
        <circle cx="160" cy="280" r="3"/><circle cx="290" cy="120" r="3"/>
        <circle cx="40" cy="240" r="3"/><circle cx="400" cy="120" r="3"/>
        <circle cx="180" cy="40" r="3"/><circle cx="280" cy="280" r="3"/>
        <circle cx="320" cy="180" r="3"/><circle cx="140" cy="140" r="3"/>
      </g>
      <text x="380" y="120" font-size="9" fill="#9ca3af" font-style="italic">unbinned</text>
    </g>
  </g>

  <!-- Right: per-MAG quality table -->
  <g transform="translate(640,80)">
    <rect width="500" height="440" fill="#fff" stroke="#d6d3d1" rx="4"/>
    <text x="250" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">CheckM quality per MAG</text>
    <line x1="20" y1="34" x2="480" y2="34" stroke="#e7e5e4"/>

    <!-- MAG 1: high quality -->
    <g transform="translate(20,52)">
      <rect width="460" height="100" fill="#dcfce7" stroke="#065f46" rx="4"/>
      <circle cx="20" cy="20" r="10" fill="#1e3a8a"/>
      <text x="44" y="14" font-size="12" font-weight="700" fill="#374151">MAG 1</text>
      <text x="44" y="30" font-size="10" class="mono" fill="#065f46">Bacteroides uniformis (GTDB-Tk)</text>
      <text x="20" y="56" font-size="10" font-weight="700" fill="#374151">Completeness:</text>
      <text x="140" y="56" font-size="14" font-weight="700" fill="#065f46" class="mono">95%</text>
      <text x="220" y="56" font-size="10" font-weight="700" fill="#374151">Contamination:</text>
      <text x="340" y="56" font-size="14" font-weight="700" fill="#065f46" class="mono">1%</text>
      <text x="20" y="76" font-size="10" font-weight="700" fill="#065f46">→ HIGH QUALITY</text>
      <text x="20" y="90" font-size="9" fill="#525252">suitable for downstream analysis: phylogenomics, comparative genomics</text>
    </g>

    <!-- MAG 2: medium -->
    <g transform="translate(20,168)">
      <rect width="460" height="100" fill="#fef3c7" stroke="#b45309" rx="4"/>
      <circle cx="20" cy="20" r="10" fill="#b45309"/>
      <text x="44" y="14" font-size="12" font-weight="700" fill="#374151">MAG 2</text>
      <text x="44" y="30" font-size="10" class="mono" fill="#b45309">Faecalibacterium prausnitzii (GTDB-Tk)</text>
      <text x="20" y="56" font-size="10" font-weight="700" fill="#374151">Completeness:</text>
      <text x="140" y="56" font-size="14" font-weight="700" fill="#b45309" class="mono">75%</text>
      <text x="220" y="56" font-size="10" font-weight="700" fill="#374151">Contamination:</text>
      <text x="340" y="56" font-size="14" font-weight="700" fill="#b45309" class="mono">3%</text>
      <text x="20" y="76" font-size="10" font-weight="700" fill="#b45309">→ MEDIUM QUALITY</text>
      <text x="20" y="90" font-size="9" fill="#525252">use with caution; manual review for missing essential genes</text>
    </g>

    <!-- MAG 3: low -->
    <g transform="translate(20,284)">
      <rect width="460" height="100" fill="#fee2e2" stroke="#7f1d1d" rx="4"/>
      <circle cx="20" cy="20" r="10" fill="#dc2626"/>
      <text x="44" y="14" font-size="12" font-weight="700" fill="#374151">MAG 3</text>
      <text x="44" y="30" font-size="10" class="mono" fill="#7f1d1d">novel species (GTDB-Tk: closest = ~80% ANI)</text>
      <text x="20" y="56" font-size="10" font-weight="700" fill="#374151">Completeness:</text>
      <text x="140" y="56" font-size="14" font-weight="700" fill="#7f1d1d" class="mono">50%</text>
      <text x="220" y="56" font-size="10" font-weight="700" fill="#374151">Contamination:</text>
      <text x="340" y="56" font-size="14" font-weight="700" fill="#7f1d1d" class="mono">8%</text>
      <text x="20" y="76" font-size="10" font-weight="700" fill="#7f1d1d">→ LOW QUALITY</text>
      <text x="20" y="90" font-size="9" fill="#525252">need more sequencing depth or co-assembly with related samples</text>
    </g>

    <g transform="translate(20,400)">
      <text x="0" y="0" font-size="9" fill="#525252" class="mono">CheckM uses ~120 lineage-specific single-copy marker genes; presence = completeness, duplication = contamination.</text>
    </g>
  </g>

  <!-- Bottom: thresholds -->
  <g transform="translate(60,540)">
    <rect width="1080" height="40" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="540" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">MAG quality thresholds (MIMAG standard): high &gt; 90% / &lt; 5% · medium &gt; 70% / &lt; 10% · low otherwise</text>
  </g>
</svg>
