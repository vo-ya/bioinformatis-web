<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="540" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">UniFrac — phylogenetic distance between two communities; branches coloured by which sample has descendants</text>

  <!-- Left: tree -->
  <g transform="translate(60,80)">
    <text x="280" y="0" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Phylogenetic tree of 8 ASVs from samples A and B</text>

    <!-- Tree skeleton -->
    <g stroke-width="2.5" fill="none">
      <!-- Root to first split -->
      <line x1="40" y1="180" x2="120" y2="180" stroke="#0d7377"/>
      <!-- Top half -->
      <line x1="120" y1="100" x2="120" y2="260" stroke="#0d7377"/>
      <line x1="120" y1="100" x2="200" y2="100" stroke="#dc2626"/>
      <line x1="200" y1="60" x2="200" y2="140" stroke="#dc2626"/>
      <line x1="200" y1="60" x2="320" y2="60" stroke="#dc2626"/>
      <line x1="200" y1="140" x2="320" y2="140" stroke="#dc2626"/>
      <!-- Bottom of top -->
      <line x1="200" y1="60" x2="280" y2="60" stroke="#dc2626"/>
      <!-- Subtree 2 -->
      <line x1="120" y1="200" x2="200" y2="200" stroke="#0d7377"/>
      <line x1="200" y1="180" x2="200" y2="220" stroke="#0d7377"/>
      <line x1="200" y1="180" x2="320" y2="180" stroke="#1e3a8a"/>
      <line x1="200" y1="220" x2="320" y2="220" stroke="#0d7377"/>
      <!-- Bottom half -->
      <line x1="120" y1="260" x2="200" y2="260" stroke="#1e3a8a"/>
      <line x1="200" y1="240" x2="200" y2="300" stroke="#1e3a8a"/>
      <line x1="200" y1="240" x2="320" y2="240" stroke="#1e3a8a"/>
      <line x1="200" y1="300" x2="320" y2="300" stroke="#1e3a8a"/>
    </g>

    <!-- Tip labels and which sample(s) -->
    <g class="mono" font-size="11" fill="#374151" font-weight="700">
      <text x="328" y="64">ASV1</text>
      <text x="328" y="144">ASV2</text>
      <text x="328" y="184">ASV3</text>
      <text x="328" y="224">ASV4</text>
      <text x="328" y="244">ASV5</text>
      <text x="328" y="304">ASV6</text>
    </g>
    <!-- Sample membership labels -->
    <g font-size="10" font-weight="700" font-family="JetBrains Mono, monospace">
      <text x="380" y="64" fill="#dc2626">A</text>
      <text x="380" y="144" fill="#dc2626">A</text>
      <text x="380" y="184" fill="#1e3a8a">B</text>
      <text x="380" y="224" fill="#0d7377">A,B</text>
      <text x="380" y="244" fill="#1e3a8a">B</text>
      <text x="380" y="304" fill="#1e3a8a">B</text>
    </g>

    <!-- Legend -->
    <g transform="translate(40,360)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#374151">Branch colour:</text>
      <line x1="120" y1="-3" x2="160" y2="-3" stroke="#dc2626" stroke-width="3"/>
      <text x="166" y="0" font-size="10" fill="#374151">descendants in A only</text>
      <line x1="290" y1="-3" x2="330" y2="-3" stroke="#1e3a8a" stroke-width="3"/>
      <text x="336" y="0" font-size="10" fill="#374151">descendants in B only</text>
      <line x1="450" y1="-3" x2="490" y2="-3" stroke="#0d7377" stroke-width="3"/>
      <text x="496" y="0" font-size="10" fill="#374151">descendants in both</text>
    </g>
  </g>

  <!-- Right: UniFrac formula and example -->
  <g transform="translate(640,80)">
    <rect width="500" height="280" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="250" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">UniFrac formula and example values</text>
    <line x1="20" y1="34" x2="480" y2="34" stroke="#e7e5e4"/>

    <g transform="translate(40,52)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700" fill="#7c3aed">Unweighted UniFrac</text>
      <text x="0" y="20" font-family="JetBrains Mono, monospace">       single-coloured branch length</text>
      <text x="0" y="38" font-family="JetBrains Mono, monospace">U = ────────────────────────────</text>
      <text x="0" y="56" font-family="JetBrains Mono, monospace">         total tree branch length</text>
      <text x="0" y="76" font-size="10" font-style="italic" fill="#525252">presence/absence-based; counts unique branches</text>

      <text x="0" y="110" font-weight="700" fill="#7c3aed">Weighted UniFrac</text>
      <text x="0" y="130" font-family="JetBrains Mono, monospace">W = Σ branch_length · |p_A − p_B|</text>
      <text x="0" y="148" font-size="10" font-style="italic" fill="#525252">weighted by abundance differences per branch</text>

      <text x="0" y="186" font-weight="700" fill="#374151">Example values for the tree on the left:</text>
      <text x="0" y="206" font-family="JetBrains Mono, monospace" fill="#dc2626">red branches: 8 (A-only)</text>
      <text x="0" y="222" font-family="JetBrains Mono, monospace" fill="#1e3a8a">cobalt branches: 7 (B-only)</text>
      <text x="0" y="238" font-family="JetBrains Mono, monospace" fill="#0d7377">teal branches: 5 (shared)</text>
      <text x="0" y="254" font-weight="700" font-family="JetBrains Mono, monospace" fill="#7c3aed">U = (8 + 7) / 20 = 0.75</text>
    </g>
  </g>

  <!-- Right-bottom: BC vs UniFrac comparison -->
  <g transform="translate(640,380)">
    <rect width="500" height="120" fill="#fef3c7" stroke="#b45309" rx="6"/>
    <text x="250" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">When UniFrac differs from Bray-Curtis</text>
    <line x1="20" y1="32" x2="480" y2="32" stroke="#92400e" opacity="0.4"/>
    <g transform="translate(20,48)" font-size="10" fill="#374151">
      <text x="0" y="0">Two pairs of samples can have the same Bray-Curtis (same compositional</text>
      <text x="0" y="14">overlap) but very different UniFrac:</text>
      <text x="20" y="36" font-weight="700" fill="#1e3a8a">• shared taxa phylogenetically close → low UniFrac (similar communities)</text>
      <text x="20" y="52" font-weight="700" fill="#dc2626">• shared taxa phylogenetically distant → high UniFrac (similar by accident)</text>
      <text x="0" y="76" font-style="italic" fill="#525252">Pick UniFrac when phylogenetic relatedness matters; pick BC for compositional dissimilarity alone.</text>
    </g>
  </g>
</svg>
