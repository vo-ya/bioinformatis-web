<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="540" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Short vs long-read 16S — same sample, different inferred composition</text>

  <!-- Left: short read V3-V4 -->
  <g transform="translate(60,80)">
    <rect width="500" height="380" fill="#fff" stroke="#fed7aa" stroke-width="2" rx="6"/>
    <text x="250" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">Short-read 16S (V3-V4, ~460 bp)</text>
    <text x="250" y="40" text-anchor="middle" font-size="10" fill="#525252">Illumina MiSeq · ~$30 / sample</text>

    <!-- Show 3 ASVs collapse into 1 genus call -->
    <g transform="translate(40,80)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#374151">Reads from 3 closely-related species:</text>
      <g transform="translate(0,16)" class="mono" font-size="9" fill="#525252">
        <rect x="0" y="0" width="180" height="16" fill="#dbeafe"/><text x="6" y="12" fill="#1e3a8a">...ACGTGACGTACGTGAC...</text>
        <text x="190" y="12">ASV-1</text>
        <rect x="0" y="20" width="180" height="16" fill="#dbeafe"/><text x="6" y="32" fill="#1e3a8a">...ACGTGACGTACGTGAC...</text>
        <text x="190" y="32">ASV-2 (1 base diff)</text>
        <rect x="0" y="40" width="180" height="16" fill="#dbeafe"/><text x="6" y="52" fill="#1e3a8a">...ACGTGACGTACGTGAC...</text>
        <text x="190" y="52">ASV-3 (1 base diff)</text>
      </g>
      <text x="0" y="92" font-size="11" fill="#525252">3 distinct ASVs by DADA2…</text>
      <text x="0" y="108" font-size="11" fill="#525252">but the V3-V4 region is too short to</text>
      <text x="0" y="124" font-size="11" fill="#525252">reliably tell which species each represents.</text>
    </g>

    <g transform="translate(40,250)">
      <rect width="420" height="80" fill="#fef3c7" stroke="#b45309" rx="4"/>
      <text x="210" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Resolved to: genus level</text>
      <text x="210" y="42" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#374151">Bacteroides sp. (3 ASVs grouped)</text>
      <text x="210" y="62" text-anchor="middle" font-size="10" fill="#525252">cannot distinguish B. uniformis from B. ovatus from B. caccae</text>
    </g>
  </g>

  <!-- Right: long read PacBio HiFi -->
  <g transform="translate(640,80)">
    <rect width="500" height="380" fill="#fff" stroke="#bfdbfe" stroke-width="2" rx="6"/>
    <text x="250" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Long-read 16S (full-length, 1,500 bp)</text>
    <text x="250" y="40" text-anchor="middle" font-size="10" fill="#525252">PacBio HiFi · ~$200 / sample</text>

    <g transform="translate(40,80)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#374151">Reads cover the whole 16S gene:</text>
      <g transform="translate(0,16)" class="mono" font-size="9" fill="#525252">
        <rect x="0" y="0" width="380" height="16" fill="#dbeafe"/><text x="6" y="12" fill="#1e3a8a">V1·V2·V3·V4·V5·V6·V7·V8·V9 (all variable regions)</text>
        <text x="0" y="36" fill="#1e3a8a">→ ASV-1 → species: B. uniformis</text>
        <text x="0" y="52" fill="#1e3a8a">→ ASV-2 → species: B. ovatus</text>
        <text x="0" y="68" fill="#1e3a8a">→ ASV-3 → species: B. caccae</text>
      </g>
      <text x="0" y="116" font-size="11" fill="#525252">Each ASV has enough variable-region</text>
      <text x="0" y="132" font-size="11" fill="#525252">information for unambiguous species ID.</text>
      <text x="0" y="148" font-size="11" fill="#525252">Some assays push to strain level.</text>
    </g>

    <g transform="translate(40,250)">
      <rect width="420" height="80" fill="#dcfce7" stroke="#065f46" rx="4"/>
      <text x="210" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">Resolved to: species (often strain)</text>
      <text x="210" y="42" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#374151">3 distinct species; functional implications differ</text>
      <text x="210" y="62" text-anchor="middle" font-size="10" fill="#525252">B. ovatus = polysaccharide degrader; B. caccae = inflammation-associated</text>
    </g>
  </g>

  <!-- Bottom banner -->
  <g transform="translate(60,480)">
    <rect width="1080" height="44" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="540" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Long reads resolve closely-related species that V3-V4 fragments cannot — pick the resolution your question needs</text>
    <text x="540" y="38" text-anchor="middle" font-size="10" fill="#374151">Other strain-resolution methods: shotgun + StrainPhlAn / inStrain / MIDAS · single-cell metagenomics emerging.</text>
  </g>
</svg>
