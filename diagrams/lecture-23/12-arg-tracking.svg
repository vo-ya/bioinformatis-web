<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Hospital sewage metagenome — antibiotic resistance gene (ARG) abundance over 24 months</text>

  <!-- Plot area -->
  <g transform="translate(80,80)">
    <rect width="900" height="380" fill="#fff" stroke="#d6d3d1"/>
    <!-- Grid -->
    <g stroke="#e7e5e4" stroke-width="0.5">
      <line x1="0" y1="76" x2="900" y2="76"/>
      <line x1="0" y1="152" x2="900" y2="152"/>
      <line x1="0" y1="228" x2="900" y2="228"/>
      <line x1="0" y1="304" x2="900" y2="304"/>
      <line x1="150" y1="0" x2="150" y2="380"/>
      <line x1="300" y1="0" x2="300" y2="380"/>
      <line x1="450" y1="0" x2="450" y2="380"/>
      <line x1="600" y1="0" x2="600" y2="380"/>
      <line x1="750" y1="0" x2="750" y2="380"/>
    </g>
    <!-- Policy change marker at month 8 -->
    <line x1="300" y1="0" x2="300" y2="380" stroke="#7f1d1d" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="306" y="14" font-size="10" font-weight="700" fill="#7f1d1d" class="mono">stewardship policy</text>

    <!-- X-axis -->
    <g class="mono" font-size="10" fill="#525252">
      <text x="0" y="396" text-anchor="middle">0</text>
      <text x="150" y="396" text-anchor="middle">4</text>
      <text x="300" y="396" text-anchor="middle">8</text>
      <text x="450" y="396" text-anchor="middle">12</text>
      <text x="600" y="396" text-anchor="middle">16</text>
      <text x="750" y="396" text-anchor="middle">20</text>
      <text x="900" y="396" text-anchor="middle">24</text>
    </g>
    <text x="450" y="416" text-anchor="middle" font-size="11" fill="#525252">months</text>

    <!-- Y-axis -->
    <g class="mono" font-size="10" fill="#525252">
      <text x="-8" y="384" text-anchor="end">10⁰</text>
      <text x="-8" y="308" text-anchor="end">10¹</text>
      <text x="-8" y="232" text-anchor="end">10²</text>
      <text x="-8" y="156" text-anchor="end">10³</text>
      <text x="-8" y="80" text-anchor="end">10⁴</text>
      <text x="-8" y="4" text-anchor="end">10⁵</text>
    </g>
    <text x="-50" y="190" text-anchor="middle" font-size="11" fill="#525252" transform="rotate(-90 -50 190)">ARG abundance (RPKM, log)</text>

    <!-- 5 ARG class lines -->
    <!-- tetracycline (red): high, gradually rising then dropping after policy -->
    <path d="M 0 100 L 75 95 L 150 90 L 225 85 L 300 82 L 375 95 L 450 110 L 525 130 L 600 145 L 675 155 L 750 162 L 825 168 L 900 172"
          stroke="#dc2626" stroke-width="2.5" fill="none"/>
    <text x="906" y="174" font-size="10" font-weight="700" fill="#dc2626" class="mono">tetracycline</text>

    <!-- beta-lactam (cobalt): moderate, slowly declining -->
    <path d="M 0 140 L 75 138 L 150 142 L 225 145 L 300 148 L 375 152 L 450 158 L 525 165 L 600 172 L 675 180 L 750 186 L 825 192 L 900 200"
          stroke="#1e3a8a" stroke-width="2.5" fill="none"/>
    <text x="906" y="202" font-size="10" font-weight="700" fill="#1e3a8a" class="mono">β-lactam</text>

    <!-- fluoroquinolone (amber): low pre-policy, sharp rise after -->
    <path d="M 0 250 L 75 248 L 150 245 L 225 242 L 300 240 L 375 220 L 450 200 L 525 180 L 600 165 L 675 155 L 750 150 L 825 148 L 900 145"
          stroke="#b45309" stroke-width="2.5" fill="none"/>
    <text x="906" y="147" font-size="10" font-weight="700" fill="#b45309" class="mono">fluoroquinolone</text>

    <!-- vancomycin (green): low and stable -->
    <path d="M 0 290 L 75 290 L 150 285 L 225 285 L 300 282 L 375 280 L 450 280 L 525 282 L 600 285 L 675 285 L 750 288 L 825 290 L 900 290"
          stroke="#065f46" stroke-width="2.5" fill="none"/>
    <text x="906" y="292" font-size="10" font-weight="700" fill="#065f46" class="mono">vancomycin</text>

    <!-- carbapenem (violet): low pre-policy, drops sharp -->
    <path d="M 0 230 L 75 228 L 150 225 L 225 222 L 300 218 L 375 250 L 450 280 L 525 305 L 600 320 L 675 330 L 750 338 L 825 342 L 900 345"
          stroke="#7c3aed" stroke-width="2.5" fill="none"/>
    <text x="906" y="347" font-size="10" font-weight="700" fill="#7c3aed" class="mono">carbapenem</text>
  </g>

  <!-- Annotations panel -->
  <g transform="translate(80,500)">
    <rect width="1040" height="80" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="520" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Tracking horizontal gene transfer in real time across hospital ecosystems</text>
    <text x="520" y="42" text-anchor="middle" font-size="10" fill="#374151">After month-8 antibiotic stewardship policy: carbapenem-resistance ARG abundance drops 20-fold; fluoroquinolone-resistance climbs as compensation.</text>
    <text x="520" y="60" text-anchor="middle" font-size="10" fill="#374151">Tools: CARD-RGI, AMRFinderPlus on shotgun reads. Critical for surveillance + outbreak response.</text>
    <text x="520" y="74" text-anchor="middle" font-size="9" font-style="italic" fill="#525252">Stylised data inspired by Hendriksen et al. 2019 (global sewage surveillance); not real time series.</text>
  </g>
</svg>
