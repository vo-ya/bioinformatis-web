<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 740" width="1200" height="740" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arrPS" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>
  <rect width="1200" height="740" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Pooled CRISPR screen — library to gene-level fitness scores</text>

  <!-- Main column — re-centred from (280,60) to (420,60) and rect width
       widened 320→360 so the long mono subtitles
       (e.g. "MOI ~ 0.3 · ~10⁸ cells per replicate · puro selection") fit
       inside the box. Canvas height 720→740 to keep box 9's bottom inside
       the viewBox (last box ended at abs y=724 before). -->
  <g transform="translate(420,60)">
    <g>
      <rect x="0" y="0" width="360" height="56" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#1e3a8a">1. sgRNA library → lentiviral pool</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">~80,000 sgRNAs · 4 per gene · synthesised + cloned</text>
    </g>
    <line x1="180" y1="56" x2="180" y2="76" stroke="#525252" stroke-width="1.4" marker-end="url(#arrPS)"/>
    <g transform="translate(0,76)">
      <rect x="0" y="0" width="360" height="56" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#1e3a8a">2. Lentivirus + transduction</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">MOI ~ 0.3 · ~10⁸ cells per replicate · puro selection</text>
    </g>
    <line x1="180" y1="132" x2="180" y2="152" stroke="#525252" stroke-width="1.4" marker-end="url(#arrPS)"/>
    <g transform="translate(0,152)">
      <rect x="0" y="0" width="360" height="56" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#b45309">3. Split into T0 + T-final</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">T0 = day 0 · T-final = day 14-21 (or post-selection)</text>
    </g>
    <line x1="180" y1="208" x2="180" y2="228" stroke="#525252" stroke-width="1.4" marker-end="url(#arrPS)"/>
    <g transform="translate(0,228)">
      <rect x="0" y="0" width="360" height="56" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#b45309">4. Genomic DNA extraction</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">~30 µg per sample · QC + spike-in controls</text>
    </g>
    <line x1="180" y1="284" x2="180" y2="304" stroke="#525252" stroke-width="1.4" marker-end="url(#arrPS)"/>
    <g transform="translate(0,304)">
      <rect x="0" y="0" width="360" height="56" fill="#dcfce7" stroke="#065f46" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#065f46">5. PCR amplify sgRNA region</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">stagger primers · barcoded amplicons · ~20 cycles</text>
    </g>
    <line x1="180" y1="360" x2="180" y2="380" stroke="#525252" stroke-width="1.4" marker-end="url(#arrPS)"/>
    <g transform="translate(0,380)">
      <rect x="0" y="0" width="360" height="56" fill="#dcfce7" stroke="#065f46" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#065f46">6. Sequence (Illumina NovaSeq)</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">~500 reads/sgRNA · ~40M reads/sample · ~$2k/sample</text>
    </g>
    <line x1="180" y1="436" x2="180" y2="456" stroke="#525252" stroke-width="1.4" marker-end="url(#arrPS)"/>
    <g transform="translate(0,456)">
      <rect x="0" y="0" width="360" height="56" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#7c3aed">7. Count table (sgRNAs × samples)</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">80k sgRNAs × 6-8 samples · raw count matrix</text>
    </g>
    <line x1="180" y1="512" x2="180" y2="532" stroke="#525252" stroke-width="1.4" marker-end="url(#arrPS)"/>
    <g transform="translate(0,532)">
      <rect x="0" y="0" width="360" height="56" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#7c3aed">8. MAGeCK / DrugZ analysis</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">per-sgRNA NB test · RRA aggregation · BH FDR</text>
    </g>
    <line x1="180" y1="588" x2="180" y2="608" stroke="#525252" stroke-width="1.4" marker-end="url(#arrPS)"/>
    <g transform="translate(0,608)">
      <rect x="0" y="0" width="360" height="56" fill="#fff" stroke="#525252" stroke-width="2" rx="6"/>
      <text x="180" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#525252">9. Gene-level fitness scores</text>
      <text x="180" y="40" text-anchor="middle" font-size="10" class="mono" fill="#374151">~1000 essential genes · ~50 hits per drug screen</text>
    </g>
  </g>

  <!-- Side panel: scale numbers -->
  <g transform="translate(60,60)">
    <rect width="200" height="280" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="100" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Typical scale</text>
    <line x1="20" y1="32" x2="180" y2="32" stroke="#e7e5e4"/>
    <g transform="translate(20,46)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700">Library</text>
      <text x="0" y="16" class="mono" fill="#525252">~80,000 sgRNAs</text>
      <text x="0" y="30" class="mono" fill="#525252">4 sgRNAs / gene</text>
      <text x="0" y="44" class="mono" fill="#525252">~20,000 genes</text>
      <text x="0" y="68" font-weight="700">Cells</text>
      <text x="0" y="84" class="mono" fill="#525252">~10⁸ per replicate</text>
      <text x="0" y="98" class="mono" fill="#525252">2-3 replicates</text>
      <text x="0" y="122" font-weight="700">Sequencing</text>
      <text x="0" y="138" class="mono" fill="#525252">~40M reads / sample</text>
      <text x="0" y="152" class="mono" fill="#525252">~500 reads / sgRNA</text>
      <text x="0" y="176" font-weight="700">Cost</text>
      <text x="0" y="192" class="mono" fill="#525252">~$20k total</text>
      <text x="0" y="216" font-weight="700">Time</text>
      <text x="0" y="232" class="mono" fill="#525252">3-4 weeks</text>
    </g>
  </g>

  <!-- Side panel: pos vs neg selection -->
  <g transform="translate(900,60)">
    <rect width="240" height="280" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="120" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Two screen modes</text>
    <line x1="20" y1="32" x2="220" y2="32" stroke="#e7e5e4"/>
    <g transform="translate(20,46)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700" fill="#dc2626">Positive selection</text>
      <text x="0" y="18" font-size="10" fill="#525252">Apply drug / virus</text>
      <text x="0" y="32" font-size="10" fill="#525252">Surviving cells = resistance</text>
      <text x="0" y="46" font-size="10" class="mono" fill="#dc2626">↑ sgRNAs = resistance genes</text>
      <text x="0" y="74" font-weight="700" fill="#1e3a8a">Negative selection</text>
      <text x="0" y="92" font-size="10" fill="#525252">Just grow over time</text>
      <text x="0" y="106" font-size="10" fill="#525252">Drop-out = essential</text>
      <text x="0" y="120" font-size="10" class="mono" fill="#1e3a8a">↓ sgRNAs = essential genes</text>
      <text x="0" y="148" font-style="italic" fill="#525252">Same workflow,</text>
      <text x="0" y="164" font-style="italic" fill="#525252">different selection step.</text>
    </g>
  </g>
</svg>
