<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">sgRNA library quality — modern libraries are tightly peaked at high activity, low off-target</text>

  <!-- Top: on-target distribution -->
  <g transform="translate(80,70)">
    <text x="400" y="0" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">On-target activity (Doench Rule Set 2)</text>
    <rect x="0" y="20" width="800" height="180" fill="#fff" stroke="#d6d3d1"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#374151"/>

    <!-- X axis -->
    <g class="mono" font-size="10" fill="#525252">
      <text x="0" y="216" text-anchor="middle">0.0</text>
      <text x="200" y="216" text-anchor="middle">0.25</text>
      <text x="400" y="216" text-anchor="middle">0.50</text>
      <text x="600" y="216" text-anchor="middle">0.75</text>
      <text x="800" y="216" text-anchor="middle">1.0</text>
    </g>
    <text x="400" y="234" text-anchor="middle" font-size="11" fill="#525252">on-target activity score (high = better cutting)</text>

    <!-- Brunello: sharp peak around 0.7 -->
    <path d="M 0 200 L 100 195 L 200 180 L 300 140 L 400 80 L 500 50 L 580 30 L 660 70 L 720 130 L 780 180 L 800 200"
          stroke="#1e3a8a" stroke-width="2.5" fill="#1e3a8a" fill-opacity="0.15"/>
    <text x="600" y="40" font-size="11" font-weight="700" fill="#1e3a8a" class="mono">Brunello (peak ≈ 0.72)</text>

    <!-- TKOv3: similar -->
    <path d="M 0 200 L 80 192 L 180 175 L 280 145 L 380 100 L 460 75 L 540 60 L 620 100 L 700 150 L 760 185 L 800 200"
          stroke="#065f46" stroke-width="2.5" fill="none"/>
    <text x="500" y="80" font-size="11" font-weight="700" fill="#065f46" class="mono">TKOv3 (peak ≈ 0.65)</text>

    <!-- GeCKO v2: broader, less peaked -->
    <path d="M 0 200 L 80 175 L 160 155 L 240 135 L 320 120 L 400 110 L 480 115 L 560 125 L 640 140 L 720 160 L 780 180 L 800 195"
          stroke="#dc2626" stroke-width="2.5" fill="none" stroke-dasharray="4 3"/>
    <text x="220" y="120" font-size="11" font-weight="700" fill="#dc2626" class="mono">GeCKO v2 (broad, lower)</text>
  </g>

  <!-- Bottom: off-target distribution -->
  <g transform="translate(80,330)">
    <text x="400" y="0" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Predicted off-target count (CFD score &gt; 0.2)</text>
    <rect x="0" y="20" width="800" height="180" fill="#fff" stroke="#d6d3d1"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#374151"/>
    <g class="mono" font-size="10" fill="#525252">
      <text x="0" y="216" text-anchor="middle">0</text>
      <text x="200" y="216" text-anchor="middle">2</text>
      <text x="400" y="216" text-anchor="middle">5</text>
      <text x="600" y="216" text-anchor="middle">10</text>
      <text x="800" y="216" text-anchor="middle">20+</text>
    </g>
    <text x="400" y="234" text-anchor="middle" font-size="11" fill="#525252">predicted off-target loci (low = more specific)</text>

    <!-- Brunello: peak at 0-1 (most have no off-targets) -->
    <path d="M 0 30 L 80 60 L 160 110 L 240 150 L 320 175 L 400 188 L 480 195 L 560 198 L 640 200 L 720 200 L 800 200"
          stroke="#1e3a8a" stroke-width="2.5" fill="#1e3a8a" fill-opacity="0.15"/>
    <text x="60" y="20" font-size="11" font-weight="700" fill="#1e3a8a" class="mono">Brunello</text>

    <!-- TKOv3 similar -->
    <path d="M 0 35 L 80 70 L 160 120 L 240 155 L 320 180 L 400 190 L 480 196 L 560 198 L 640 200 L 720 200 L 800 200"
          stroke="#065f46" stroke-width="2.5" fill="none"/>

    <!-- GeCKO v2: broader, more off-targets -->
    <path d="M 0 80 L 80 95 L 160 110 L 240 130 L 320 145 L 400 165 L 480 175 L 560 185 L 640 192 L 720 197 L 800 200"
          stroke="#dc2626" stroke-width="2.5" fill="none" stroke-dasharray="4 3"/>
    <text x="500" y="180" font-size="11" font-weight="700" fill="#dc2626" class="mono">GeCKO v2 (longer tail)</text>
  </g>

  <!-- Right side: per-gene sgRNA count -->
  <g transform="translate(960,70)">
    <rect width="180" height="460" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="90" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">sgRNAs/gene</text>
    <line x1="20" y1="32" x2="160" y2="32" stroke="#e7e5e4"/>

    <g transform="translate(20,52)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700" fill="#1e3a8a">Brunello</text>
      <text x="60" y="0" font-family="JetBrains Mono, monospace">4</text>
      <rect x="0" y="6" width="80" height="10" fill="#1e3a8a"/>

      <text x="0" y="34" font-weight="700" fill="#065f46">TKOv3</text>
      <text x="60" y="34" font-family="JetBrains Mono, monospace">5</text>
      <rect x="0" y="40" width="100" height="10" fill="#065f46"/>

      <text x="0" y="68" font-weight="700" fill="#dc2626">GeCKO v2</text>
      <text x="60" y="68" font-family="JetBrains Mono, monospace">6</text>
      <rect x="0" y="74" width="120" height="10" fill="#dc2626" opacity="0.7"/>

      <text x="0" y="102" font-weight="700" fill="#7c3aed">Dolcetto (CRISPRi)</text>
      <text x="0" y="118" font-family="JetBrains Mono, monospace">5 + TSS-targeted</text>
      <rect x="0" y="124" width="100" height="10" fill="#7c3aed" opacity="0.7"/>
    </g>

    <g transform="translate(20,200)" font-size="10" fill="#374151">
      <text x="0" y="0" font-weight="700">Library size</text>
      <text x="0" y="16" font-family="JetBrains Mono, monospace" fill="#1e3a8a">Brunello: 76k</text>
      <text x="0" y="30" font-family="JetBrains Mono, monospace" fill="#065f46">TKOv3: 70k</text>
      <text x="0" y="44" font-family="JetBrains Mono, monospace" fill="#dc2626">GeCKO v2: 120k</text>
      <text x="0" y="58" font-family="JetBrains Mono, monospace" fill="#7c3aed">Dolcetto: 60k</text>
    </g>

    <g transform="translate(20,300)">
      <rect width="140" height="100" fill="#dcfce7" stroke="#065f46" rx="4"/>
      <text x="70" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">2024 default</text>
      <line x1="14" y1="34" x2="126" y2="34" stroke="#065f46" opacity="0.4"/>
      <text x="70" y="56" text-anchor="middle" font-size="10" fill="#374151">Brunello (CRISPRko)</text>
      <text x="70" y="72" text-anchor="middle" font-size="10" fill="#374151">Dolcetto (CRISPRi)</text>
      <text x="70" y="88" text-anchor="middle" font-size="9" font-style="italic" fill="#525252">paired analysis</text>
    </g>
  </g>
</svg>
