<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arrM" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">MAGeCK analysis flow — count tables to gene-level FDR-controlled hits</text>

  <!-- Main column -->
  <g transform="translate(280,60)">
    <g>
      <rect x="0" y="0" width="320" height="56" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#1e3a8a">1. Count tables (T0, T-final)</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">~80k sgRNAs × 6-8 samples</text>
    </g>
    <line x1="160" y1="56" x2="160" y2="76" stroke="#525252" stroke-width="1.4" marker-end="url(#arrM)"/>
    <g transform="translate(0,76)">
      <rect x="0" y="0" width="320" height="56" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#b45309">2. Median normalisation</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">size factor = median ratio · DESeq-style</text>
    </g>
    <line x1="160" y1="132" x2="160" y2="152" stroke="#525252" stroke-width="1.4" marker-end="url(#arrM)"/>
    <g transform="translate(0,152)">
      <rect x="0" y="0" width="320" height="56" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#b45309">3. Negative-binomial test per sgRNA</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">overdispersion-aware test → per-sgRNA p-value</text>
    </g>
    <line x1="160" y1="208" x2="160" y2="228" stroke="#525252" stroke-width="1.4" marker-end="url(#arrM)"/>
    <g transform="translate(0,228)">
      <rect x="0" y="0" width="320" height="56" fill="#dcfce7" stroke="#065f46" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#065f46">4. Per-gene RRA aggregation</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">k=4 sgRNAs → median rank percentile</text>
    </g>
    <line x1="160" y1="284" x2="160" y2="304" stroke="#525252" stroke-width="1.4" marker-end="url(#arrM)"/>
    <g transform="translate(0,304)">
      <rect x="0" y="0" width="320" height="56" fill="#dcfce7" stroke="#065f46" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#065f46">5. Beta(1, k) significance test</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">analytic null distribution → gene p-value</text>
    </g>
    <line x1="160" y1="360" x2="160" y2="380" stroke="#525252" stroke-width="1.4" marker-end="url(#arrM)"/>
    <g transform="translate(0,380)">
      <rect x="0" y="0" width="320" height="56" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#7c3aed">6. BH FDR correction</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">~20k genes tested · q &lt; 0.05 standard</text>
    </g>
    <line x1="160" y1="436" x2="160" y2="456" stroke="#525252" stroke-width="1.4" marker-end="url(#arrM)"/>
    <g transform="translate(0,456)">
      <rect x="0" y="0" width="320" height="56" fill="#fff" stroke="#525252" stroke-width="2" rx="6"/>
      <text x="160" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#525252">7. Gene rankings + significance</text>
      <text x="160" y="40" text-anchor="middle" font-size="10" class="mono" fill="#374151">ranked output · LFC, p-value, FDR per gene</text>
    </g>
  </g>

  <!-- Right side: example output table -->
  <g transform="translate(660,60)">
    <rect width="500" height="380" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="250" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Example: top 10 essential genes (cancer cell line)</text>
    <line x1="20" y1="34" x2="480" y2="34" stroke="#e7e5e4"/>

    <g class="mono" font-size="10" fill="#525252" transform="translate(40,52)">
      <text x="0" y="0" font-weight="700">Rank</text>
      <text x="60" y="0" font-weight="700">Gene</text>
      <text x="180" y="0" font-weight="700">LFC</text>
      <text x="260" y="0" font-weight="700">p-value</text>
      <text x="360" y="0" font-weight="700">FDR</text>
    </g>
    <line x1="40" y1="68" x2="460" y2="68" stroke="#e7e5e4"/>

    <g class="mono" font-size="11" fill="#374151" transform="translate(40,84)">
      <text x="0" y="0">1</text><text x="60" y="0" font-weight="700" fill="#dc2626">RAN</text>
      <text x="180" y="0">−4.82</text><text x="260" y="0">2.1e-18</text><text x="360" y="0">4.2e-15</text>
      <text x="0" y="20">2</text><text x="60" y="20" font-weight="700" fill="#dc2626">POLR2A</text>
      <text x="180" y="20">−4.45</text><text x="260" y="20">8.7e-17</text><text x="360" y="20">1.7e-14</text>
      <text x="0" y="40">3</text><text x="60" y="40" font-weight="700" fill="#dc2626">EIF3D</text>
      <text x="180" y="40">−4.21</text><text x="260" y="40">3.2e-15</text><text x="360" y="40">5.5e-13</text>
      <text x="0" y="60">4</text><text x="60" y="60" font-weight="700" fill="#dc2626">RPL11</text>
      <text x="180" y="60">−4.12</text><text x="260" y="60">9.8e-15</text><text x="360" y="60">1.5e-12</text>
      <text x="0" y="80">5</text><text x="60" y="80" font-weight="700" fill="#dc2626">PSMD1</text>
      <text x="180" y="80">−3.98</text><text x="260" y="80">2.4e-14</text><text x="360" y="80">3.2e-12</text>
      <text x="0" y="100">6</text><text x="60" y="100" font-weight="700" fill="#dc2626">CCT4</text>
      <text x="180" y="100">−3.84</text><text x="260" y="100">5.6e-14</text><text x="360" y="100">7.0e-12</text>
      <text x="0" y="120">7</text><text x="60" y="120" font-weight="700" fill="#dc2626">RPS3</text>
      <text x="180" y="120">−3.72</text><text x="260" y="120">1.1e-13</text><text x="360" y="120">1.4e-11</text>
      <text x="0" y="140">8</text><text x="60" y="140" font-weight="700" fill="#dc2626">EIF4A1</text>
      <text x="180" y="140">−3.58</text><text x="260" y="140">2.4e-13</text><text x="360" y="140">2.6e-11</text>
      <text x="0" y="160">9</text><text x="60" y="160" font-weight="700" fill="#dc2626">SF3B1</text>
      <text x="180" y="160">−3.41</text><text x="260" y="160">5.0e-13</text><text x="360" y="160">5.0e-11</text>
      <text x="0" y="180">10</text><text x="60" y="180" font-weight="700" fill="#dc2626">PCNA</text>
      <text x="180" y="180">−3.28</text><text x="260" y="180">9.7e-13</text><text x="360" y="180">8.7e-11</text>
    </g>

    <g transform="translate(40,300)">
      <rect width="420" height="60" fill="#fee2e2" stroke="#7f1d1d" rx="4"/>
      <text x="210" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">Pan-essential genes</text>
      <text x="210" y="40" text-anchor="middle" font-size="10" fill="#374151">Ribosomal proteins, RNA pol II, proteasome — essential everywhere.</text>
      <text x="210" y="54" text-anchor="middle" font-size="10" fill="#374151">Lineage-selective hits emerge in DepMap cross-cell-line analysis.</text>
    </g>
  </g>

  <!-- Bottom side panel: command line -->
  <g transform="translate(60,460)">
    <rect width="200" height="200" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="100" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Command line</text>
    <line x1="20" y1="32" x2="180" y2="32" stroke="#e7e5e4"/>
    <g transform="translate(20,52)" font-size="9" fill="#374151" class="mono">
      <text x="0" y="0" font-weight="700" fill="#1e3a8a">$ mageck count \</text>
      <text x="0" y="14"> --list-seq lib.csv \</text>
      <text x="0" y="28"> --fastq pre.fq post.fq</text>
      <text x="0" y="56" font-weight="700" fill="#1e3a8a">$ mageck test \</text>
      <text x="0" y="70"> -k counts.txt \</text>
      <text x="0" y="84"> -t post -c pre \</text>
      <text x="0" y="98"> --norm-method median</text>
      <text x="0" y="126" fill="#525252">→ output: gene_summary.txt</text>
      <text x="0" y="140" fill="#525252">    sgrna_summary.txt</text>
    </g>
  </g>

  <!-- Bottom side panel: math -->
  <g transform="translate(660,460)">
    <rect width="500" height="200" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="250" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Math behind RRA aggregation</text>
    <line x1="20" y1="32" x2="480" y2="32" stroke="#e7e5e4"/>
    <g transform="translate(40,52)" font-size="11" fill="#374151">
      <text x="0" y="0">Per gene with k sgRNAs and rank percentiles p₁, ..., p_k:</text>
      <text x="20" y="22" font-family="JetBrains Mono, monospace" fill="#7c3aed">RRA score ρ = min(p_(1), ..., p_(k))</text>
      <text x="0" y="46">Under the null (no effect), each p_i is Uniform[0, 1].</text>
      <text x="20" y="68" font-family="JetBrains Mono, monospace" fill="#1e3a8a">ρ ∼ Beta(1, k)  ⇒  P(ρ ≤ x) = 1 − (1 − x)^k</text>
      <text x="0" y="92">Gene-level p-value comes from this analytic null.</text>
      <text x="0" y="118" font-style="italic" fill="#525252">Modified RRA uses median-rank instead of min</text>
      <text x="0" y="134" font-style="italic" fill="#525252">→ robust to a few non-functional sgRNAs.</text>
    </g>
  </g>
</svg>
