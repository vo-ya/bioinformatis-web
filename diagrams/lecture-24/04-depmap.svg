      <text x="0" y="84" font-size="10" fill="#b45309" font-weight="700">amber</text>
      <text x="40" y="84" font-size="10" fill="#374151">RTK-driven (BR/OV)</text>
    </g>

    <g transform="translate(20,260)">
      <rect width="180" height="260" fill="#fef3c7" stroke="#b45309" rx="4"/>
      <text x="90" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Patterns to spot</text>
      <line x1="14" y1="32" x2="166" y2="32" stroke="#92400e" opacity="0.4"/>
      <g transform="translate(14,52)" font-size="10" fill="#374151">
        <text x="0" y="0" font-weight="700">Pan-essential (cols 1-6)</text>
        <text x="0" y="14" font-style="italic" fill="#525252">RAN, POLR2A, etc.</text>
        <text x="0" y="28" font-style="italic" fill="#525252">→ avoid as drug targets</text>
        <text x="0" y="56" font-weight="700">Lineage-selective</text>
        <text x="0" y="70" font-style="italic" fill="#525252">MCL1 in heme</text>
        <text x="0" y="84" font-style="italic" fill="#525252">PRMT5 in MTAP-del</text>
        <text x="0" y="98" font-style="italic" fill="#525252">EZH2 in lymphoma</text>
        <text x="0" y="112" font-style="italic" fill="#525252">WRN in CRC-MSI</text>
        <text x="0" y="126" font-style="italic" fill="#525252">→ drug-target candidates</text>
        <text x="0" y="160" font-weight="700">Non-essential (cols 21-25)</text>
        <text x="0" y="174" font-style="italic" fill="#525252">olfactory, testis-only</text>
        <text x="0" y="188" font-style="italic" fill="#525252">→ used as null background</text>
