      <text x="40" y="20" font-size="10" fill="#374151">heme (AML / CLL)</text>
      <text x="0" y="36" font-size="10" fill="#1e3a8a" font-weight="700">blue</text>
      <text x="40" y="36" font-size="10" fill="#374151">solid (PDAC / LUAD)</text>
      <text x="0" y="52" font-size="10" fill="#065f46" font-weight="700">green</text>
      <text x="40" y="52" font-size="10" fill="#374151">lymphoma</text>
      <text x="0" y="68" font-size="10" fill="#7c3aed" font-weight="700">violet</text>
