      <!-- PDAC/LUAD (rows 6-10): MCL1 light; PRMT5 dark when MTAP-deleted -->
      <!-- DLBCL/FL (rows 11-13): EZH2 dark -->
      <!-- CRC-MSI (14-15): WRN dark -->
      <!-- Others (16+): mostly white -->
    </g>

    <!-- Programmatic-ish drawing using a script-like generation in SVG: just lay out in groups -->
    <g transform="translate(20,28)">
      <!-- AML-2 -->
      <rect x="0" y="0" width="28" height="16" fill="#1e3a8a"/>
      <rect x="28" y="0" width="28" height="16" fill="#1e3a8a"/>
      <rect x="56" y="0" width="28" height="16" fill="#1e3a8a"/>
