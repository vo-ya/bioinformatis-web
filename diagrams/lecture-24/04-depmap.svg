  <!-- Bottom: explanation -->
  <g transform="translate(60,650)">
    <rect width="1080" height="50" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="540" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">Lineage-selective dependencies = drug targets. Pan-essential = avoid (would kill normal cells too).</text>
    <text x="540" y="40" text-anchor="middle" font-size="10" fill="#374151">DepMap public release: ~21,000 genes × ~1,000 cell lines via Chronos algorithm. Browse at depmap.org.</text>
  </g>
