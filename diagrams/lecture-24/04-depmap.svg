      <rect x="448" y="0" width="28" height="16" fill="#fff" stroke="#d6d3d1"/>
      <rect x="476" y="0" width="28" height="16" fill="#fff" stroke="#d6d3d1"/>
      <rect x="504" y="0" width="28" height="16" fill="#fff" stroke="#d6d3d1"/>
      <rect x="532" y="0" width="28" height="16" fill="#fff" stroke="#d6d3d1"/>
      <rect x="560" y="0" width="28" height="16" fill="#fff" stroke="#d6d3d1"/>
      <rect x="588" y="0" width="28" height="16" fill="#fff" stroke="#d6d3d1"/>
      <rect x="616" y="0" width="28" height="16" fill="#fff" stroke="#d6d3d1"/>
      <rect x="644" y="0" width="28" height="16" fill="#fff" stroke="#d6d3d1"/>
      <rect x="672" y="0" width="28" height="16" fill="#fff" stroke="#d6d3d1"/>

      <!-- Build remaining 23 rows -->
