<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Three CRISPR perturbation modalities — knockout, interference, activation</text>

  <!-- Panel 1: CRISPRko -->
  <g transform="translate(40,80)">
    <rect width="370" height="460" fill="#fff" stroke="#dc2626" stroke-width="2" rx="6"/>
    <text x="185" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">CRISPRko (Cas9)</text>
    <text x="185" y="40" text-anchor="middle" font-size="10" fill="#525252">cuts DNA → frameshift → loss of function</text>
    <line x1="20" y1="52" x2="350" y2="52" stroke="#fee2e2"/>

    <!-- Schematic -->
    <g transform="translate(40,80)">
      <!-- DNA -->
      <line x1="0" y1="20" x2="280" y2="20" stroke="#374151" stroke-width="2.5"/>
      <line x1="0" y1="32" x2="280" y2="32" stroke="#374151" stroke-width="2.5"/>
      <!-- Cas9 + sgRNA at cut site -->
      <ellipse cx="140" cy="-10" rx="36" ry="22" fill="#dc2626"/>
      <text x="140" y="-6" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Cas9</text>
      <text x="140" y="6" text-anchor="middle" font-size="9" fill="#fff">+ sgRNA</text>
      <line x1="140" y1="12" x2="140" y2="40" stroke="#dc2626" stroke-width="2" stroke-dasharray="3 2"/>
      <!-- Scissor visualisation -->
      <text x="140" y="58" text-anchor="middle" font-size="20" fill="#dc2626">✂</text>
      <text x="140" y="80" text-anchor="middle" font-size="9" font-style="italic" fill="#525252">double-strand break</text>
      <!-- Output: indels -->
      <g transform="translate(0,100)">
        <line x1="0" y1="20" x2="120" y2="20" stroke="#374151" stroke-width="2.5"/>
        <line x1="120" y1="20" x2="160" y2="20" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="2 2"/>
        <line x1="160" y1="20" x2="280" y2="20" stroke="#374151" stroke-width="2.5"/>
        <text x="140" y="40" text-anchor="middle" font-size="9" fill="#dc2626">indel → frameshift</text>
      </g>
    </g>

    <g transform="translate(20,260)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700" fill="#dc2626">Use cases</text>
      <text x="0" y="18" font-size="10">• Dropout screens (essential genes)</text>
      <text x="0" y="32" font-size="10">• Resistance screens</text>
      <text x="0" y="46" font-size="10">• Tumour suppressor ID</text>
      <text x="0" y="60" font-size="10">• Pan-cancer DepMap</text>

      <text x="0" y="86" font-weight="700" fill="#dc2626">Pros</text>
      <text x="0" y="104" font-size="10">+ Strong phenotype (full KO)</text>
      <text x="0" y="118" font-size="10">+ Permanent edit</text>
      <text x="0" y="132" font-size="10">+ Standard library (Brunello)</text>

      <text x="0" y="158" font-weight="700" fill="#dc2626">Cons</text>
      <text x="0" y="176" font-size="10">− Fatal for essential genes</text>
      <text x="0" y="190" font-size="10">− CN bias in cancer cells</text>
    </g>
  </g>

  <!-- Panel 2: CRISPRi -->
  <g transform="translate(420,80)">
    <rect width="370" height="460" fill="#fff" stroke="#7c3aed" stroke-width="2" rx="6"/>
    <text x="185" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">CRISPRi (dCas9-KRAB)</text>
    <text x="185" y="40" text-anchor="middle" font-size="10" fill="#525252">represses transcription at TSS</text>
    <line x1="20" y1="52" x2="350" y2="52" stroke="#ede9fe"/>

    <g transform="translate(40,80)">
      <line x1="0" y1="20" x2="280" y2="20" stroke="#374151" stroke-width="2.5"/>
      <line x1="0" y1="32" x2="280" y2="32" stroke="#374151" stroke-width="2.5"/>
      <!-- TSS marker -->
      <line x1="80" y1="14" x2="80" y2="38" stroke="#065f46" stroke-width="2"/>
      <polygon points="80,38 76,30 84,30" fill="#065f46"/>
      <text x="80" y="-4" text-anchor="middle" font-size="9" fill="#065f46" font-weight="700">TSS</text>
      <!-- dCas9-KRAB blocking RNA Pol II -->
      <ellipse cx="100" cy="-10" rx="36" ry="22" fill="#7c3aed"/>
      <text x="100" y="-6" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">dCas9</text>
      <text x="100" y="8" text-anchor="middle" font-size="8" fill="#fff">-KRAB</text>
      <line x1="100" y1="12" x2="100" y2="20" stroke="#7c3aed" stroke-width="2"/>
      <!-- Repression marks -->
      <text x="100" y="60" text-anchor="middle" font-size="20" fill="#7c3aed">⊘</text>
      <text x="100" y="80" text-anchor="middle" font-size="9" font-style="italic" fill="#525252">no transcription</text>
      <!-- Output -->
      <g transform="translate(0,100)">
        <line x1="0" y1="20" x2="280" y2="20" stroke="#374151" stroke-width="2.5"/>
        <text x="140" y="40" text-anchor="middle" font-size="9" fill="#7c3aed">DNA intact, gene OFF</text>
      </g>
    </g>

    <g transform="translate(20,260)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700" fill="#7c3aed">Use cases</text>
      <text x="0" y="18" font-size="10">• Essential-gene screens (no fatality)</text>
      <text x="0" y="32" font-size="10">• Reversible loss-of-function</text>
      <text x="0" y="46" font-size="10">• Drug-target validation</text>
      <text x="0" y="60" font-size="10">• Single-cell Perturb-seq</text>

      <text x="0" y="86" font-weight="700" fill="#7c3aed">Pros</text>
      <text x="0" y="104" font-size="10">+ Reversible (induce / withdraw)</text>
      <text x="0" y="118" font-size="10">+ No DSB → less CN bias</text>
      <text x="0" y="132" font-size="10">+ Captures essentials</text>

      <text x="0" y="158" font-weight="700" fill="#7c3aed">Cons</text>
      <text x="0" y="176" font-size="10">− Variable knockdown depth</text>
      <text x="0" y="190" font-size="10">− Library design TSS-specific</text>
    </g>
  </g>

  <!-- Panel 3: CRISPRa -->
  <g transform="translate(800,80)">
    <rect width="370" height="460" fill="#fff" stroke="#065f46" stroke-width="2" rx="6"/>
    <text x="185" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">CRISPRa (dCas9-VP64)</text>
    <text x="185" y="40" text-anchor="middle" font-size="10" fill="#525252">activates transcription</text>
    <line x1="20" y1="52" x2="350" y2="52" stroke="#dcfce7"/>

    <g transform="translate(40,80)">
      <line x1="0" y1="20" x2="280" y2="20" stroke="#374151" stroke-width="2.5"/>
      <line x1="0" y1="32" x2="280" y2="32" stroke="#374151" stroke-width="2.5"/>
      <line x1="80" y1="14" x2="80" y2="38" stroke="#065f46" stroke-width="2"/>
      <text x="80" y="-4" text-anchor="middle" font-size="9" fill="#065f46" font-weight="700">TSS</text>
      <ellipse cx="100" cy="-10" rx="36" ry="22" fill="#065f46"/>
      <text x="100" y="-6" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">dCas9</text>
      <text x="100" y="8" text-anchor="middle" font-size="8" fill="#fff">-VP64</text>
      <line x1="100" y1="12" x2="100" y2="20" stroke="#065f46" stroke-width="2"/>
      <text x="100" y="60" text-anchor="middle" font-size="20" fill="#065f46">⬆</text>
      <text x="100" y="80" text-anchor="middle" font-size="9" font-style="italic" fill="#525252">enhanced transcription</text>
      <g transform="translate(0,100)">
        <line x1="0" y1="20" x2="280" y2="20" stroke="#374151" stroke-width="2.5"/>
        <text x="140" y="40" text-anchor="middle" font-size="9" fill="#065f46">overexpression of target</text>
      </g>
    </g>

    <g transform="translate(20,260)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700" fill="#065f46">Use cases</text>
      <text x="0" y="18" font-size="10">• Gain-of-function screens</text>
      <text x="0" y="32" font-size="10">• Drug-resistance acquisition</text>
      <text x="0" y="46" font-size="10">• Synthetic-rescue screens</text>
      <text x="0" y="60" font-size="10">• ORF-replacement complement</text>

      <text x="0" y="86" font-weight="700" fill="#065f46">Pros</text>
      <text x="0" y="104" font-size="10">+ Discovers buffering / paralog effects</text>
      <text x="0" y="118" font-size="10">+ Activates silent genes</text>
      <text x="0" y="132" font-size="10">+ Complementary to KO</text>

      <text x="0" y="158" font-weight="700" fill="#065f46">Cons</text>
      <text x="0" y="176" font-size="10">− Lower per-gene effect size</text>
      <text x="0" y="190" font-size="10">− More complex library design</text>
    </g>
  </g>

  <!-- Bottom: when to use which -->
  <g transform="translate(40,560)">
    <rect width="1130" height="40" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="565" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Modern screens often run all three. CRISPRko discovers loss-of-function; CRISPRi handles essentials; CRISPRa finds resistance / overexpression effects.</text>
  </g>
</svg>
