<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="540" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">sgRNA scoring — on-target activity (Doench Rule Set 2) and off-target tolerance (CFD)</text>

  <!-- Top: on-target histogram -->
  <g transform="translate(60,80)">
    <text x="280" y="0" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">On-target activity (Doench Rule Set 2 score, library Brunello)</text>
    <line x1="0" y1="20" x2="0" y2="180" stroke="#374151"/>
    <line x1="0" y1="180" x2="560" y2="180" stroke="#374151"/>
    <g class="mono" font-size="9" fill="#525252">
      <text x="-6" y="184" text-anchor="end">0</text>
      <text x="-6" y="120" text-anchor="end">5%</text>
      <text x="-6" y="60" text-anchor="end">10%</text>
      <text x="0" y="196" text-anchor="middle">0</text>
      <text x="140" y="196" text-anchor="middle">0.25</text>
      <text x="280" y="196" text-anchor="middle">0.5</text>
      <text x="420" y="196" text-anchor="middle">0.75</text>
      <text x="560" y="196" text-anchor="middle">1.0</text>
    </g>
    <text x="280" y="216" text-anchor="middle" font-size="11" fill="#525252">Doench score</text>

    <!-- Histogram bars: peak around 0.65-0.7 -->
    <g fill="#1e3a8a" opacity="0.85">
      <rect x="20" y="170" width="20" height="10"/>
      <rect x="40" y="160" width="20" height="20"/>
      <rect x="60" y="150" width="20" height="30"/>
      <rect x="80" y="140" width="20" height="40"/>
      <rect x="100" y="130" width="20" height="50"/>
      <rect x="120" y="115" width="20" height="65"/>
      <rect x="140" y="105" width="20" height="75"/>
      <rect x="160" y="95" width="20" height="85"/>
      <rect x="180" y="85" width="20" height="95"/>
      <rect x="200" y="75" width="20" height="105"/>
      <rect x="220" y="65" width="20" height="115"/>
      <rect x="240" y="55" width="20" height="125"/>
      <rect x="260" y="45" width="20" height="135"/>
      <rect x="280" y="35" width="20" height="145"/>
      <rect x="300" y="25" width="20" height="155"/>
      <rect x="320" y="20" width="20" height="160"/>
      <rect x="340" y="22" width="20" height="158"/>
      <rect x="360" y="35" width="20" height="145"/>
      <rect x="380" y="55" width="20" height="125"/>
      <rect x="400" y="80" width="20" height="100"/>
      <rect x="420" y="105" width="20" height="75"/>
      <rect x="440" y="130" width="20" height="50"/>
      <rect x="460" y="150" width="20" height="30"/>
      <rect x="480" y="165" width="20" height="15"/>
      <rect x="500" y="173" width="20" height="7"/>
    </g>

    <!-- Peak marker -->
    <line x1="350" y1="20" x2="350" y2="0" stroke="#dc2626" stroke-width="1.5"/>
    <text x="350" y="-4" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626" class="mono">peak ≈ 0.72</text>

    <!-- Threshold -->
    <line x1="280" y1="20" x2="280" y2="180" stroke="#065f46" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="288" y="34" font-size="10" font-weight="700" fill="#065f46" class="mono">accept ≥ 0.5</text>
  </g>

  <!-- Right side: features used -->
  <g transform="translate(680,80)">
    <rect width="460" height="180" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="230" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Doench Rule Set 2 features</text>
    <line x1="20" y1="32" x2="440" y2="32" stroke="#e7e5e4"/>
    <g transform="translate(40,52)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700">Position-specific</text>
      <text x="14" y="16" font-size="10" class="mono">• PAM context: NGG vs NAG</text>
      <text x="14" y="30" font-size="10" class="mono">• 3' guide-end nucleotide identity</text>
      <text x="0" y="50" font-weight="700">Composition</text>
      <text x="14" y="66" font-size="10" class="mono">• GC content (40-60% optimal)</text>
      <text x="14" y="80" font-size="10" class="mono">• repeat sequences (avoid)</text>
      <text x="0" y="100" font-weight="700">Thermodynamic</text>
      <text x="14" y="116" font-size="10" class="mono">• ΔG of guide-target hybridisation</text>
      <text x="0" y="136" font-style="italic" fill="#525252">Linear regression on 30+ features → score in [0, 1].</text>
    </g>
  </g>

  <!-- Bottom: off-target heat map -->
  <g transform="translate(60,300)">
    <text x="280" y="0" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Off-target tolerance — CFD score per mismatch position</text>

    <!-- Position labels -->
    <g class="mono" font-size="9" fill="#525252">
      <text x="0" y="38" text-anchor="middle">1</text>
      <text x="28" y="38" text-anchor="middle">3</text>
      <text x="56" y="38" text-anchor="middle">5</text>
      <text x="84" y="38" text-anchor="middle">7</text>
      <text x="112" y="38" text-anchor="middle">9</text>
      <text x="140" y="38" text-anchor="middle">11</text>
      <text x="168" y="38" text-anchor="middle">13</text>
      <text x="196" y="38" text-anchor="middle">15</text>
      <text x="224" y="38" text-anchor="middle">17</text>
      <text x="252" y="38" text-anchor="middle">19</text>
      <text x="280" y="38" text-anchor="middle">PAM</text>
    </g>
    <text x="140" y="56" text-anchor="middle" font-size="10" class="mono" fill="#525252">guide position (PAM-distal → PAM-proximal)</text>

    <!-- Tolerance bar: position 1-10 (PAM-distal) high tolerance; 11-20 (seed) low tolerance -->
    <!-- Heatmap of CFD score per mismatch position -->
    <g transform="translate(-14,72)">
      <!-- 20 cells -->
      <rect x="0" y="0" width="14" height="40" fill="#dc2626" opacity="0.2"/>
      <rect x="14" y="0" width="14" height="40" fill="#dc2626" opacity="0.25"/>
      <rect x="28" y="0" width="14" height="40" fill="#dc2626" opacity="0.3"/>
      <rect x="42" y="0" width="14" height="40" fill="#dc2626" opacity="0.35"/>
      <rect x="56" y="0" width="14" height="40" fill="#dc2626" opacity="0.42"/>
      <rect x="70" y="0" width="14" height="40" fill="#dc2626" opacity="0.5"/>
      <rect x="84" y="0" width="14" height="40" fill="#dc2626" opacity="0.6"/>
      <rect x="98" y="0" width="14" height="40" fill="#dc2626" opacity="0.7"/>
      <rect x="112" y="0" width="14" height="40" fill="#dc2626" opacity="0.78"/>
      <rect x="126" y="0" width="14" height="40" fill="#dc2626" opacity="0.85"/>
      <rect x="140" y="0" width="14" height="40" fill="#dc2626" opacity="0.9"/>
      <rect x="154" y="0" width="14" height="40" fill="#dc2626" opacity="0.95"/>
      <rect x="168" y="0" width="14" height="40" fill="#dc2626" opacity="1"/>
      <rect x="182" y="0" width="14" height="40" fill="#dc2626" opacity="1"/>
      <rect x="196" y="0" width="14" height="40" fill="#dc2626" opacity="1"/>
      <rect x="210" y="0" width="14" height="40" fill="#dc2626" opacity="1"/>
      <rect x="224" y="0" width="14" height="40" fill="#dc2626" opacity="1"/>
      <rect x="238" y="0" width="14" height="40" fill="#dc2626" opacity="1"/>
      <rect x="252" y="0" width="14" height="40" fill="#dc2626" opacity="1"/>
      <rect x="266" y="0" width="14" height="40" fill="#dc2626" opacity="1"/>
    </g>

    <text x="0" y="56" text-anchor="middle" font-size="9" fill="#525252" class="mono">distal (mismatch tolerated)</text>
    <text x="280" y="56" text-anchor="middle" font-size="9" fill="#525252" class="mono">seed (mismatch not tolerated)</text>

    <!-- Region brackets -->
    <line x1="-14" y1="118" x2="126" y2="118" stroke="#525252" stroke-width="1.5"/>
    <text x="56" y="134" text-anchor="middle" font-size="9" fill="#525252" font-weight="700">distal region (positions 1-10)</text>
    <line x1="140" y1="118" x2="266" y2="118" stroke="#dc2626" stroke-width="1.5"/>
    <text x="203" y="134" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="700">seed region (positions 11-20)</text>
  </g>

  <!-- Bottom right: sgRNA selection -->
  <g transform="translate(680,300)">
    <rect width="460" height="180" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="230" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">sgRNA selection per gene</text>
    <line x1="20" y1="32" x2="440" y2="32" stroke="#e7e5e4"/>
    <g transform="translate(40,52)" font-size="11" fill="#374151">
      <text x="0" y="0">Library design picks the best 4-6 sgRNAs per gene by:</text>
      <text x="0" y="22" font-family="JetBrains Mono, monospace" fill="#1e3a8a">score = α · on_target − β · off_target_count</text>
      <text x="0" y="50" font-style="italic" fill="#525252">Trade-offs:</text>
      <text x="14" y="68" font-size="10">• too few candidates → low coverage</text>
      <text x="14" y="84" font-size="10">• too many low-quality sgRNAs → noise</text>
      <text x="14" y="100" font-size="10">• off-target hits → false essentiality calls</text>
    </g>
  </g>

  <!-- Bottom banner -->
  <g transform="translate(60,500)">
    <rect width="1080" height="36" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="540" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">High-quality sgRNA = high on-target × low off-target. Library design balances both against coverage (4-6 sgRNAs/gene).</text>
  </g>
</svg>
