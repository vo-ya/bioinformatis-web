<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="540" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">MAGeCK RRA — robust rank aggregation across 4 sgRNAs per gene</text>

  <!-- Three panels showing different gene types -->
  <g transform="translate(60,80)">
    <!-- Panel 1: highly essential -->
    <g>
      <rect width="350" height="380" fill="#fff" stroke="#dc2626" stroke-width="2" rx="6"/>
      <text x="175" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Highly essential gene</text>
      <text x="175" y="38" text-anchor="middle" font-size="10" fill="#525252">all 4 sgRNAs concordant (top 1-5%)</text>

      <!-- Rank percentile axis -->
      <g transform="translate(40,80)">
        <line x1="0" y1="200" x2="280" y2="200" stroke="#374151"/>
        <line x1="0" y1="0" x2="0" y2="200" stroke="#374151"/>
        <g class="mono" font-size="9" fill="#525252">
          <text x="0" y="216" text-anchor="middle">0</text>
          <text x="70" y="216" text-anchor="middle">25</text>
          <text x="140" y="216" text-anchor="middle">50</text>
          <text x="210" y="216" text-anchor="middle">75</text>
          <text x="280" y="216" text-anchor="middle">100</text>
        </g>
        <text x="140" y="238" text-anchor="middle" font-size="10" fill="#525252">rank percentile</text>

        <!-- 4 sgRNAs as ticks -->
        <line x1="14" y1="80" x2="14" y2="120" stroke="#dc2626" stroke-width="3"/>
        <line x1="22" y1="80" x2="22" y2="120" stroke="#dc2626" stroke-width="3"/>
        <line x1="35" y1="80" x2="35" y2="120" stroke="#dc2626" stroke-width="3"/>
        <line x1="56" y1="80" x2="56" y2="120" stroke="#dc2626" stroke-width="3"/>
        <text x="14" y="74" font-size="9" fill="#dc2626" class="mono">sg1</text>
        <text x="56" y="74" font-size="9" fill="#dc2626" class="mono">sg4</text>
        <!-- Concentration shaded -->
        <rect x="0" y="80" width="70" height="40" fill="#dc2626" fill-opacity="0.1"/>
      </g>
      <g transform="translate(40,330)" font-size="11" font-family="JetBrains Mono, monospace" fill="#374151">
        <text x="0" y="0" font-weight="700" fill="#dc2626">RRA score = min(p) ≈ 0.005</text>
        <text x="0" y="16" fill="#525252">→ p_gene = 1 − (1 − 0.005)⁴ = 0.020</text>
      </g>
    </g>

    <!-- Panel 2: modestly essential -->
    <g transform="translate(390,0)">
      <rect width="350" height="380" fill="#fff" stroke="#b45309" stroke-width="2" rx="6"/>
      <text x="175" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">Modestly essential</text>
      <text x="175" y="38" text-anchor="middle" font-size="10" fill="#525252">2-3 sgRNAs in top 10%, 1-2 in middle</text>
      <g transform="translate(40,80)">
        <line x1="0" y1="200" x2="280" y2="200" stroke="#374151"/>
        <line x1="0" y1="0" x2="0" y2="200" stroke="#374151"/>
        <g class="mono" font-size="9" fill="#525252">
          <text x="0" y="216" text-anchor="middle">0</text>
          <text x="70" y="216" text-anchor="middle">25</text>
          <text x="140" y="216" text-anchor="middle">50</text>
          <text x="210" y="216" text-anchor="middle">75</text>
          <text x="280" y="216" text-anchor="middle">100</text>
        </g>
        <text x="140" y="238" text-anchor="middle" font-size="10" fill="#525252">rank percentile</text>
        <line x1="22" y1="80" x2="22" y2="120" stroke="#b45309" stroke-width="3"/>
        <line x1="56" y1="80" x2="56" y2="120" stroke="#b45309" stroke-width="3"/>
        <line x1="105" y1="80" x2="105" y2="120" stroke="#b45309" stroke-width="3"/>
        <line x1="160" y1="80" x2="160" y2="120" stroke="#b45309" stroke-width="3"/>
        <rect x="0" y="80" width="120" height="40" fill="#b45309" fill-opacity="0.1"/>
      </g>
      <g transform="translate(40,330)" font-size="11" font-family="JetBrains Mono, monospace" fill="#374151">
        <text x="0" y="0" font-weight="700" fill="#b45309">RRA score = min(p) ≈ 0.08</text>
        <text x="0" y="16" fill="#525252">→ p_gene = 1 − (1 − 0.08)⁴ = 0.28</text>
      </g>
    </g>

    <!-- Panel 3: non-essential -->
    <g transform="translate(780,0)">
      <rect width="350" height="380" fill="#fff" stroke="#525252" stroke-width="2" rx="6"/>
      <text x="175" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#525252">Non-essential</text>
      <text x="175" y="38" text-anchor="middle" font-size="10" fill="#525252">sgRNAs uniformly distributed</text>
      <g transform="translate(40,80)">
        <line x1="0" y1="200" x2="280" y2="200" stroke="#374151"/>
        <line x1="0" y1="0" x2="0" y2="200" stroke="#374151"/>
        <g class="mono" font-size="9" fill="#525252">
          <text x="0" y="216" text-anchor="middle">0</text>
          <text x="70" y="216" text-anchor="middle">25</text>
          <text x="140" y="216" text-anchor="middle">50</text>
          <text x="210" y="216" text-anchor="middle">75</text>
          <text x="280" y="216" text-anchor="middle">100</text>
        </g>
        <text x="140" y="238" text-anchor="middle" font-size="10" fill="#525252">rank percentile</text>
        <line x1="56" y1="80" x2="56" y2="120" stroke="#525252" stroke-width="3"/>
        <line x1="125" y1="80" x2="125" y2="120" stroke="#525252" stroke-width="3"/>
        <line x1="180" y1="80" x2="180" y2="120" stroke="#525252" stroke-width="3"/>
        <line x1="240" y1="80" x2="240" y2="120" stroke="#525252" stroke-width="3"/>
      </g>
      <g transform="translate(40,330)" font-size="11" font-family="JetBrains Mono, monospace" fill="#374151">
        <text x="0" y="0" font-weight="700" fill="#525252">RRA score = min(p) ≈ 0.20</text>
        <text x="0" y="16" fill="#525252">→ p_gene = 1 − (1 − 0.20)⁴ = 0.59</text>
      </g>
    </g>
  </g>

  <!-- Bottom banner -->
  <g transform="translate(60,490)">
    <rect width="1080" height="40" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="540" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">Modified RRA uses median rank, not minimum — robust to one or two non-functional sgRNAs per gene</text>
  </g>
</svg>
