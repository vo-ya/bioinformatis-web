<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Synthetic lethality via DepMap — MTAP deletion + PRMT5 dependency</text>

  <!-- Panel 1: cell line classification -->
  <g transform="translate(60,80)">
    <rect width="500" height="400" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="250" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Panel 1. Cell line MTAP genotype distribution</text>
    <text x="250" y="36" text-anchor="middle" font-size="10" fill="#525252">~1000 cell lines from DepMap; ~15% have MTAP deletion</text>

    <g transform="translate(40,60)">
      <rect width="420" height="280" fill="#fafaf9" stroke="#9ca3af"/>
      <line x1="0" y1="280" x2="420" y2="280" stroke="#374151"/>
      <line x1="0" y1="0" x2="0" y2="280" stroke="#374151"/>

      <!-- MTAP-deleted (red, n=200) -->
      <g fill="#dc2626" fill-opacity="0.6">
        <!-- 30 points scattered in lower-left zone -->
        <circle cx="40" cy="80" r="3"/><circle cx="60" cy="100" r="3"/><circle cx="50" cy="120" r="3"/>
        <circle cx="70" cy="90" r="3"/><circle cx="55" cy="140" r="3"/><circle cx="45" cy="105" r="3"/>
        <circle cx="80" cy="115" r="3"/><circle cx="65" cy="125" r="3"/><circle cx="35" cy="135" r="3"/>
        <circle cx="75" cy="145" r="3"/><circle cx="50" cy="85" r="3"/><circle cx="60" cy="155" r="3"/>
        <circle cx="85" cy="100" r="3"/><circle cx="40" cy="160" r="3"/><circle cx="70" cy="170" r="3"/>
        <circle cx="55" cy="175" r="3"/><circle cx="80" cy="180" r="3"/><circle cx="45" cy="190" r="3"/>
        <circle cx="65" cy="195" r="3"/><circle cx="55" cy="200" r="3"/><circle cx="40" cy="115" r="3"/>
        <circle cx="75" cy="130" r="3"/><circle cx="50" cy="170" r="3"/><circle cx="35" cy="200" r="3"/>
        <circle cx="80" cy="160" r="3"/><circle cx="60" cy="115" r="3"/><circle cx="70" cy="135" r="3"/>
        <circle cx="55" cy="105" r="3"/><circle cx="85" cy="155" r="3"/><circle cx="45" cy="175" r="3"/>
      </g>

      <!-- MTAP-intact (cobalt, n=800) - center -->
      <g fill="#1e3a8a" fill-opacity="0.4">
        <!-- 80 points in upper-right zone -->
        <circle cx="180" cy="40" r="2.5"/><circle cx="200" cy="60" r="2.5"/><circle cx="220" cy="50" r="2.5"/>
        <circle cx="240" cy="30" r="2.5"/><circle cx="260" cy="55" r="2.5"/><circle cx="280" cy="45" r="2.5"/>
        <circle cx="300" cy="70" r="2.5"/><circle cx="320" cy="35" r="2.5"/><circle cx="340" cy="60" r="2.5"/>
        <circle cx="360" cy="50" r="2.5"/><circle cx="380" cy="40" r="2.5"/><circle cx="400" cy="55" r="2.5"/>
        <circle cx="190" cy="80" r="2.5"/><circle cx="210" cy="90" r="2.5"/><circle cx="230" cy="75" r="2.5"/>
        <circle cx="250" cy="100" r="2.5"/><circle cx="270" cy="85" r="2.5"/><circle cx="290" cy="105" r="2.5"/>
        <circle cx="310" cy="80" r="2.5"/><circle cx="330" cy="95" r="2.5"/><circle cx="350" cy="75" r="2.5"/>
        <circle cx="370" cy="100" r="2.5"/><circle cx="390" cy="90" r="2.5"/><circle cx="170" cy="55" r="2.5"/>
        <circle cx="190" cy="120" r="2.5"/><circle cx="210" cy="130" r="2.5"/><circle cx="230" cy="115" r="2.5"/>
        <circle cx="250" cy="140" r="2.5"/><circle cx="270" cy="125" r="2.5"/><circle cx="290" cy="145" r="2.5"/>
        <circle cx="310" cy="120" r="2.5"/><circle cx="330" cy="135" r="2.5"/><circle cx="350" cy="115" r="2.5"/>
        <circle cx="370" cy="140" r="2.5"/><circle cx="390" cy="130" r="2.5"/><circle cx="160" cy="70" r="2.5"/>
        <circle cx="180" cy="160" r="2.5"/><circle cx="200" cy="170" r="2.5"/><circle cx="220" cy="155" r="2.5"/>
        <circle cx="240" cy="180" r="2.5"/><circle cx="260" cy="165" r="2.5"/><circle cx="280" cy="185" r="2.5"/>
        <circle cx="300" cy="160" r="2.5"/><circle cx="320" cy="175" r="2.5"/><circle cx="340" cy="155" r="2.5"/>
        <circle cx="360" cy="180" r="2.5"/><circle cx="380" cy="170" r="2.5"/><circle cx="400" cy="160" r="2.5"/>
      </g>

      <!-- Axes -->
      <g class="mono" font-size="9" fill="#525252">
        <text x="-6" y="284" text-anchor="end">low</text>
        <text x="-6" y="4" text-anchor="end">high</text>
        <text x="0" y="296" text-anchor="middle">−4</text>
        <text x="210" y="296" text-anchor="middle">−2</text>
        <text x="420" y="296" text-anchor="middle">0</text>
      </g>
      <text x="210" y="312" text-anchor="middle" font-size="10" fill="#525252">PRMT5 Chronos score</text>
      <text x="-30" y="140" text-anchor="middle" font-size="10" fill="#525252" transform="rotate(-90 -30 140)">cell line count</text>

      <!-- Legend -->
      <g transform="translate(280,200)">
        <circle cx="6" cy="0" r="4" fill="#dc2626"/>
        <text x="14" y="3" font-size="9" fill="#374151">MTAP-deleted (n ≈ 150)</text>
        <circle cx="6" cy="16" r="4" fill="#1e3a8a"/>
        <text x="14" y="19" font-size="9" fill="#374151">MTAP-intact (n ≈ 850)</text>
      </g>
    </g>
  </g>

  <!-- Panel 2: PRMT5 essentiality -->
  <g transform="translate(580,80)">
    <rect width="500" height="400" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="250" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Panel 2. PRMT5 Chronos score by MTAP genotype</text>
    <text x="250" y="36" text-anchor="middle" font-size="10" fill="#525252">significant difference: t-test p &lt; 1e-30</text>

    <g transform="translate(40,60)">
      <rect width="420" height="280" fill="#fafaf9" stroke="#9ca3af"/>
      <line x1="0" y1="280" x2="420" y2="280" stroke="#374151"/>
      <line x1="0" y1="0" x2="0" y2="280" stroke="#374151"/>

      <!-- Boxplots: MTAP-del (low PRMT5 score = essential), MTAP-intact (~0) -->
      <!-- Left box (MTAP-del): centred at PRMT5 ~ -1.2 -->
      <g>
        <text x="100" y="-6" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">MTAP-deleted</text>
        <line x1="100" y1="80" x2="100" y2="200" stroke="#dc2626" stroke-width="1"/>
        <rect x="80" y="120" width="40" height="60" fill="#dc2626" fill-opacity="0.4" stroke="#dc2626" stroke-width="1.5"/>
        <line x1="80" y1="150" x2="120" y2="150" stroke="#dc2626" stroke-width="2"/>
        <text x="100" y="216" text-anchor="middle" font-size="9" fill="#dc2626" class="mono">median ≈ -1.4</text>
      </g>

      <!-- Right box (MTAP-intact) -->
      <g>
        <text x="320" y="-6" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a">MTAP-intact</text>
        <line x1="320" y1="40" x2="320" y2="100" stroke="#1e3a8a" stroke-width="1"/>
        <rect x="300" y="50" width="40" height="40" fill="#1e3a8a" fill-opacity="0.4" stroke="#1e3a8a" stroke-width="1.5"/>
        <line x1="300" y1="70" x2="340" y2="70" stroke="#1e3a8a" stroke-width="2"/>
        <text x="320" y="116" text-anchor="middle" font-size="9" fill="#1e3a8a" class="mono">median ≈ -0.2</text>
      </g>

      <!-- Y axis: Chronos score -->
      <g class="mono" font-size="9" fill="#525252">
        <text x="-6" y="40" text-anchor="end">+0.5</text>
        <text x="-6" y="100" text-anchor="end">0</text>
        <text x="-6" y="160" text-anchor="end">−1</text>
        <text x="-6" y="220" text-anchor="end">−2</text>
        <text x="-6" y="280" text-anchor="end">−3</text>
      </g>
      <text x="-30" y="140" text-anchor="middle" font-size="10" fill="#525252" transform="rotate(-90 -30 140)">PRMT5 Chronos score</text>
      <line x1="0" y1="100" x2="420" y2="100" stroke="#9ca3af" stroke-dasharray="3 3"/>
      <text x="416" y="98" text-anchor="end" font-size="9" fill="#525252">non-essential = 0</text>
      <line x1="0" y1="160" x2="420" y2="160" stroke="#dc2626" stroke-dasharray="3 3"/>
      <text x="416" y="158" text-anchor="end" font-size="9" fill="#dc2626">essential threshold = −1</text>
    </g>
  </g>

  <!-- Bottom banner -->
  <g transform="translate(60,500)">
    <rect width="1080" height="80" fill="#dcfce7" stroke="#065f46" rx="4"/>
    <text x="540" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">Synthetic-lethal interaction: MTAP-deletion → PRMT5 dependency → drug target</text>
    <text x="540" y="42" text-anchor="middle" font-size="10" fill="#374151">MTAP and PRMT5 share the methyl-cycle metabolite pathway. MTAP loss elevates intracellular MTA, which partially inhibits PRMT5 — making the cell hyper-sensitive to further PRMT5 inhibition.</text>
    <text x="540" y="60" text-anchor="middle" font-size="10" fill="#374151">PRMT5 inhibitors (TANGO, GSK) are in clinical trials for MTAP-deleted cancers — direct DepMap-to-clinic story.</text>
  </g>
</svg>
