<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arrCS" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Pooled CRISPR screen as compressed sensing — recover gene-level effects from sgRNA-level abundance changes</text>

  <!-- y = A x + ε equation -->
  <g transform="translate(60,80)">
    <rect width="1080" height="200" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="540" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">The inverse problem</text>
    <line x1="40" y1="36" x2="1040" y2="36" stroke="#e7e5e4"/>

    <!-- Equation: y = Ax + ε -->
    <g transform="translate(60,80)" font-family="JetBrains Mono, monospace">
      <!-- y vector -->
      <text x="0" y="40" font-size="36" font-weight="700" fill="#dc2626">y</text>
      <text x="0" y="80" font-size="11" fill="#525252">observed sgRNA</text>
      <text x="0" y="94" font-size="11" fill="#525252">abundance change</text>
      <text x="0" y="108" font-size="10" fill="#525252">N ≈ 80,000</text>

      <text x="50" y="40" font-size="36" fill="#374151">=</text>

      <!-- A matrix -->
      <text x="100" y="40" font-size="36" font-weight="700" fill="#1e3a8a">A</text>
      <text x="80" y="80" font-size="11" fill="#525252">sgRNA → gene</text>
      <text x="80" y="94" font-size="11" fill="#525252">mapping matrix</text>
      <text x="80" y="108" font-size="10" fill="#525252">N × M (~80k × ~20k)</text>

      <!-- x vector -->
      <text x="220" y="40" font-size="36" font-weight="700" fill="#7c3aed">x</text>
      <text x="200" y="80" font-size="11" fill="#525252">gene-level fitness</text>
      <text x="200" y="94" font-size="11" fill="#525252">effect (unknown)</text>
      <text x="200" y="108" font-size="10" fill="#525252">M ≈ 20,000</text>

      <text x="280" y="40" font-size="36" fill="#374151">+</text>

      <!-- noise -->
      <text x="320" y="40" font-size="36" font-weight="700" fill="#b45309">ε</text>
      <text x="300" y="80" font-size="11" fill="#525252">sequencing noise</text>
      <text x="300" y="94" font-size="11" fill="#525252">+ technical variance</text>
      <text x="300" y="108" font-size="10" fill="#525252">overdispersed Poisson</text>
    </g>

    <!-- Right side: sparsity property -->
    <g transform="translate(560,60)">
      <rect width="460" height="120" fill="#fafaf9" stroke="#d6d3d1" rx="4"/>
      <text x="230" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">A is sparse and structured</text>
      <line x1="20" y1="32" x2="440" y2="32" stroke="#e7e5e4"/>
      <g transform="translate(20,52)" font-size="10" fill="#374151">
        <text x="0" y="0">Each row of A has exactly 1 non-zero entry (sgRNA → its gene).</text>
        <text x="0" y="16">Each column has 4-6 non-zero entries (sgRNAs per gene).</text>
        <text x="0" y="32">Inversion problem: x ≈ A⁺ y, but y is noisy + few samples.</text>
        <text x="0" y="56" font-style="italic" fill="#525252">Compressed-sensing intuition: most genes are inactive (x sparse); few are essential.</text>
        <text x="0" y="72" font-style="italic" fill="#525252">Sparsity + structured A make recovery tractable.</text>
      </g>
    </g>
  </g>

  <!-- Bottom: solver comparison -->
  <g transform="translate(60,300)">
    <rect width="1080" height="220" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="540" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Statistical solvers for the inverse problem</text>
    <line x1="40" y1="34" x2="1040" y2="34" stroke="#e7e5e4"/>

    <!-- MAGeCK -->
    <g transform="translate(40,60)">
      <rect width="320" height="140" fill="#dbeafe" stroke="#1e3a8a" rx="4"/>
      <text x="160" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">MAGeCK</text>
      <line x1="20" y1="32" x2="300" y2="32" stroke="#1e3a8a" opacity="0.4"/>
      <g transform="translate(20,52)" font-size="11" fill="#374151">
        <text x="0" y="0">Negative-binomial test per sgRNA</text>
        <text x="0" y="18">→ rank percentiles per sgRNA</text>
        <text x="0" y="36">→ modified RRA aggregation per gene</text>
        <text x="0" y="58" font-size="10" font-style="italic" fill="#525252">non-parametric, robust to outliers</text>
        <text x="0" y="74" font-size="10" font-style="italic" fill="#525252">analytic Beta(1,k) significance</text>
      </g>
    </g>

    <!-- DrugZ -->
    <g transform="translate(380,60)">
      <rect width="320" height="140" fill="#fef3c7" stroke="#b45309" rx="4"/>
      <text x="160" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">DrugZ</text>
      <line x1="20" y1="32" x2="300" y2="32" stroke="#b45309" opacity="0.4"/>
      <g transform="translate(20,52)" font-size="11" fill="#374151">
        <text x="0" y="0">Per-sgRNA Z-score</text>
        <text x="0" y="18">→ Stouffer-style aggregation per gene</text>
        <text x="0" y="36">→ FDR-controlled output</text>
        <text x="0" y="58" font-size="10" font-style="italic" fill="#525252">parametric, sensitive to weak signals</text>
        <text x="0" y="74" font-size="10" font-style="italic" fill="#525252">designed for drug-vs-control screens</text>
      </g>
    </g>

    <!-- BAGEL2 -->
    <g transform="translate(720,60)">
      <rect width="320" height="140" fill="#dcfce7" stroke="#065f46" rx="4"/>
      <text x="160" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">BAGEL2</text>
      <line x1="20" y1="32" x2="300" y2="32" stroke="#065f46" opacity="0.4"/>
      <g transform="translate(20,52)" font-size="11" fill="#374151">
        <text x="0" y="0">Bayesian classifier</text>
        <text x="0" y="18">P(essential | LFC, prior)</text>
        <text x="0" y="36">→ posterior log-odds per gene</text>
        <text x="0" y="58" font-size="10" font-style="italic" fill="#525252">probabilistic, integrates prior</text>
        <text x="0" y="74" font-size="10" font-style="italic" fill="#525252">CEG-trained reference distributions</text>
      </g>
    </g>
  </g>

  <!-- Bottom banner -->
  <g transform="translate(60,540)">
    <rect width="1080" height="40" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="540" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Compressed-sensing analogy is exact: noisy linear measurements + sparse signal + structured measurement matrix → solvable inverse problem.</text>
  </g>
</svg>
