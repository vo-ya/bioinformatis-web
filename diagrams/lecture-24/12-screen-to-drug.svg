<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arrSD" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">From CRISPR screen to clinical drug — typical 7-10 year pipeline</text>

  <!-- Main column: 8 stages -->
  <g transform="translate(280,60)">
    <g>
      <rect x="0" y="0" width="320" height="60" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#1e3a8a">1. CRISPR screen identifies dependency</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">~50 hits from genome-scale dropout screen</text>
      <text x="20" y="54" font-size="9" fill="#525252">~3 months · ~$50k</text>
    </g>
    <line x1="160" y1="60" x2="160" y2="76" stroke="#525252" stroke-width="1.4" marker-end="url(#arrSD)"/>
    <g transform="translate(0,76)">
      <rect x="0" y="0" width="320" height="60" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#1e3a8a">2. Hit validation</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">arrayed CRISPR · isogenic-pair · cell-line panel</text>
      <text x="20" y="54" font-size="9" fill="#525252">~6 months · ~$200k</text>
    </g>
    <line x1="160" y1="136" x2="160" y2="152" stroke="#525252" stroke-width="1.4" marker-end="url(#arrSD)"/>
    <g transform="translate(0,152)">
      <rect x="0" y="0" width="320" height="60" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#b45309">3. Druggability assessment</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">structural biology · pocket prediction · surface antigen</text>
      <text x="20" y="54" font-size="9" fill="#525252">~3 months · in silico + crystallography</text>
    </g>
    <line x1="160" y1="212" x2="160" y2="228" stroke="#525252" stroke-width="1.4" marker-end="url(#arrSD)"/>
    <g transform="translate(0,228)">
      <rect x="0" y="0" width="320" height="60" fill="#dcfce7" stroke="#065f46" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#065f46">4. Hit-to-lead chemistry</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">virtual screen · medicinal chemistry · 100s of analogs</text>
      <text x="20" y="54" font-size="9" fill="#525252">~1-2 years · $10-20M</text>
    </g>
    <line x1="160" y1="288" x2="160" y2="304" stroke="#525252" stroke-width="1.4" marker-end="url(#arrSD)"/>
    <g transform="translate(0,304)">
      <rect x="0" y="0" width="320" height="60" fill="#dcfce7" stroke="#065f46" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#065f46">5. Pre-clinical (xenograft, PK/PD)</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">mouse efficacy · safety · ADME · pharmacology</text>
      <text x="20" y="54" font-size="9" fill="#525252">~1 year · $20-50M</text>
    </g>
    <line x1="160" y1="364" x2="160" y2="380" stroke="#525252" stroke-width="1.4" marker-end="url(#arrSD)"/>
    <g transform="translate(0,380)">
      <rect x="0" y="0" width="320" height="60" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#7c3aed">6. Phase I clinical (safety)</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">~30 patients · MTD · PK · early efficacy</text>
      <text x="20" y="54" font-size="9" fill="#525252">~1-2 years · $20M</text>
    </g>
    <line x1="160" y1="440" x2="160" y2="456" stroke="#525252" stroke-width="1.4" marker-end="url(#arrSD)"/>
    <g transform="translate(0,456)">
      <rect x="0" y="0" width="320" height="60" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#7c3aed">7. Phase II clinical (efficacy)</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">~100-300 patients · biomarker selection · response</text>
      <text x="20" y="54" font-size="9" fill="#525252">~2-3 years · $50-100M</text>
    </g>
    <line x1="160" y1="516" x2="160" y2="532" stroke="#525252" stroke-width="1.4" marker-end="url(#arrSD)"/>
    <g transform="translate(0,532)">
      <rect x="0" y="0" width="320" height="60" fill="#fff" stroke="#525252" stroke-width="2" rx="6"/>
      <text x="160" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#525252">8. Phase III + FDA approval</text>
      <text x="160" y="40" text-anchor="middle" font-size="10" class="mono" fill="#374151">~1000+ patients · pivotal trial · BLA / NDA submission</text>
      <text x="160" y="54" text-anchor="middle" font-size="9" fill="#525252">~2-3 years · $100-500M</text>
    </g>
  </g>

  <!-- Right panel: real timeline examples -->
  <g transform="translate(660,60)">
    <rect width="500" height="540" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="250" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Real timelines</text>
    <line x1="20" y1="34" x2="480" y2="34" stroke="#e7e5e4"/>

    <!-- PARP inhibitors -->
    <g transform="translate(40,52)">
      <text x="0" y="0" font-size="12" font-weight="700" fill="#dc2626">PARP inhibitors (olaparib)</text>
      <text x="0" y="18" font-size="10" font-style="italic" fill="#525252">BRCA1/2-deficient cancers (synthetic lethal)</text>
      <g transform="translate(0,30)" font-size="10" font-family="JetBrains Mono, monospace" fill="#374151">
        <text x="0" y="0">2005 — Bryant + Helleday: synthetic lethality</text>
        <text x="0" y="14">      observation in BRCA1/2 cells</text>
        <text x="0" y="32">2009 — olaparib enters Phase I</text>
        <text x="0" y="50">2014 — FDA approval (BRCA-mut ovarian)</text>
        <text x="0" y="68">2018 — broadened to breast / pancreas</text>
        <text x="0" y="86" fill="#dc2626">total: ~9 years observation → FDA</text>
      </g>
    </g>

    <!-- PRMT5 -->
    <g transform="translate(40,200)">
      <text x="0" y="0" font-size="12" font-weight="700" fill="#1e3a8a">PRMT5 inhibitors (pemrametostat)</text>
      <text x="0" y="18" font-size="10" font-style="italic" fill="#525252">MTAP-deleted cancers (synthetic lethal via DepMap)</text>
      <g transform="translate(0,30)" font-size="10" font-family="JetBrains Mono, monospace" fill="#374151">
        <text x="0" y="0">2014 — Marjon + Cantley: DepMap finding</text>
        <text x="0" y="18">2016 — first selective PRMT5 inhibitors</text>
        <text x="0" y="36">2020 — Phase I trials (TANGO, GSK)</text>
        <text x="0" y="54">2023 — Phase II readouts</text>
        <text x="0" y="72">2025+ — FDA approval expected</text>
        <text x="0" y="90" fill="#1e3a8a">total: ~10 years discovery → approval</text>
      </g>
    </g>

    <!-- WRN -->
    <g transform="translate(40,360)">
      <text x="0" y="0" font-size="12" font-weight="700" fill="#7c3aed">WRN inhibitors</text>
      <text x="0" y="18" font-size="10" font-style="italic" fill="#525252">MSI-high cancers (synthetic lethal via DepMap)</text>
      <g transform="translate(0,30)" font-size="10" font-family="JetBrains Mono, monospace" fill="#374151">
        <text x="0" y="0">2019 — Chan + Behan: DepMap finding</text>
        <text x="0" y="18">2021 — first WRN inhibitors</text>
        <text x="0" y="36">2023 — Phase I trials (Vividion)</text>
        <text x="0" y="54">2025+ — Phase II expected</text>
        <text x="0" y="72" fill="#7c3aed">trajectory: ~7 years to clinical proof</text>
      </g>
    </g>

    <!-- Banner -->
    <g transform="translate(40,490)">
      <rect width="420" height="36" fill="#fef3c7" stroke="#b45309" rx="4"/>
      <text x="210" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">DepMap-driven targets are accelerating: ~7-10 years vs ~15 years pre-DepMap</text>
    </g>
  </g>

  <!-- Side: total stats -->
  <g transform="translate(60,60)">
    <rect width="200" height="200" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="100" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Total program</text>
    <line x1="20" y1="32" x2="180" y2="32" stroke="#e7e5e4"/>
    <g transform="translate(20,52)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700">Time</text>
      <text x="0" y="16" font-family="JetBrains Mono, monospace">~7-10 years</text>
      <text x="0" y="40" font-weight="700">Cost</text>
      <text x="0" y="56" font-family="JetBrains Mono, monospace">~$0.5-1B</text>
      <text x="0" y="80" font-weight="700">Success rate</text>
      <text x="0" y="96" font-family="JetBrains Mono, monospace">~10% I → III</text>
      <text x="0" y="120" font-weight="700">Hit funnel</text>
      <text x="0" y="136" font-family="JetBrains Mono, monospace">~50 → ~5 → ~1</text>
      <text x="0" y="156" font-style="italic" fill="#525252" font-size="10">screen → druggable → FDA</text>
    </g>
  </g>
</svg>
