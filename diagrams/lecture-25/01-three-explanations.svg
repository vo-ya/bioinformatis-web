<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arr1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Three explanations for the same observed association — and why data alone can't tell them apart</text>

  <!-- Panel 1: direct causation -->
  <g transform="translate(60,80)">
    <rect width="350" height="380" fill="#fff" stroke="#1e3a8a" stroke-width="2" rx="6"/>
    <text x="175" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">1. Direct causation</text>
    <text x="175" y="40" text-anchor="middle" font-size="10" fill="#525252">X causes Y</text>
    <line x1="20" y1="52" x2="330" y2="52" stroke="#dbeafe"/>

    <g transform="translate(60,120)">
      <circle cx="60" cy="60" r="28" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
      <text x="60" y="64" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">X</text>
      <line x1="92" y1="60" x2="168" y2="60" stroke="#1e3a8a" stroke-width="2.5" marker-end="url(#arr1)"/>
      <circle cx="200" cy="60" r="28" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
      <text x="200" y="64" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Y</text>
    </g>

    <g transform="translate(60,260)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700">Implication:</text>
      <text x="0" y="18">Intervening on X changes Y.</text>
      <text x="0" y="40" font-weight="700">Drug-development relevance:</text>
      <text x="0" y="58">Targeting X is therapeutic.</text>
      <text x="0" y="80" font-weight="700">Example:</text>
      <text x="0" y="98" font-style="italic" fill="#525252">PCSK9 SNPs → LDL → CAD</text>
    </g>
  </g>

  <!-- Panel 2: reverse causation -->
  <g transform="translate(420,80)">
    <rect width="350" height="380" fill="#fff" stroke="#b45309" stroke-width="2" rx="6"/>
    <text x="175" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">2. Reverse causation</text>
    <text x="175" y="40" text-anchor="middle" font-size="10" fill="#525252">Y causes X</text>
    <line x1="20" y1="52" x2="330" y2="52" stroke="#fef3c7"/>

    <g transform="translate(60,120)">
      <circle cx="60" cy="60" r="28" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
      <text x="60" y="64" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">X</text>
      <line x1="168" y1="60" x2="92" y2="60" stroke="#b45309" stroke-width="2.5" marker-end="url(#arr1)"/>
      <circle cx="200" cy="60" r="28" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
      <text x="200" y="64" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">Y</text>
    </g>

    <g transform="translate(60,260)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700">Implication:</text>
      <text x="0" y="18">Y is the cause; X is downstream.</text>
      <text x="0" y="40" font-weight="700">Time-ordering rules this out</text>
      <text x="0" y="58">for germline SNPs (X fixed at birth).</text>
      <text x="0" y="80" font-weight="700">But matters for:</text>
      <text x="0" y="98" font-style="italic" fill="#525252">somatic mutations, expression QTLs.</text>
    </g>
  </g>

  <!-- Panel 3: confounding -->
  <g transform="translate(780,80)">
    <rect width="350" height="380" fill="#fff" stroke="#dc2626" stroke-width="2" rx="6"/>
    <text x="175" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">3. Confounding</text>
    <text x="175" y="40" text-anchor="middle" font-size="10" fill="#525252">third variable C drives both</text>
    <line x1="20" y1="52" x2="330" y2="52" stroke="#fee2e2"/>

    <g transform="translate(60,90)">
      <circle cx="115" cy="40" r="28" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
      <text x="115" y="44" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">C</text>
      <line x1="100" y1="68" x2="60" y2="120" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arr1)"/>
      <line x1="130" y1="68" x2="170" y2="120" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arr1)"/>
      <circle cx="50" cy="140" r="28" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
      <text x="50" y="144" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">X</text>
      <circle cx="180" cy="140" r="28" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
      <text x="180" y="144" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">Y</text>
      <text x="115" y="180" text-anchor="middle" font-size="11" fill="#dc2626" font-style="italic">no direct X–Y arrow</text>
    </g>

    <g transform="translate(60,300)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700">Implication:</text>
      <text x="0" y="18">X and Y move together because of C.</text>
      <text x="0" y="40" font-weight="700">Examples:</text>
      <text x="0" y="58" font-style="italic" fill="#525252">population structure, age,</text>
      <text x="0" y="74" font-style="italic" fill="#525252">SES, lifestyle co-variation.</text>
    </g>
  </g>

  <!-- Bottom banner -->
  <g transform="translate(60,490)">
    <rect width="1080" height="80" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="540" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">All three produce the same observed P(Y | X) shift</text>
    <text x="540" y="44" text-anchor="middle" font-size="10" fill="#374151">Statistical association alone cannot distinguish them. To rule out (2) and (3) we need either intervention (RCT) or instrumental variables (MR).</text>
    <text x="540" y="62" text-anchor="middle" font-size="10" font-style="italic" fill="#525252">For drug development, picking the wrong explanation costs hundreds of millions; this is why MR exists.</text>
  </g>
</svg>
