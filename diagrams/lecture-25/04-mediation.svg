<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arrM" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Mediation analysis — total effect = direct + indirect through mediator M</text>

  <!-- Causal graph -->
  <g transform="translate(60,80)">
    <rect width="600" height="380" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="300" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Causal graph: X → Y, partly through M</text>

    <!-- X node -->
    <circle cx="120" cy="200" r="34" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
    <text x="120" y="206" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">X</text>
    <text x="120" y="252" text-anchor="middle" font-size="10" fill="#525252">exposure</text>

    <!-- M node (mediator) -->
    <circle cx="300" cy="120" r="34" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
    <text x="300" y="126" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">M</text>
    <text x="300" y="172" text-anchor="middle" font-size="10" fill="#525252">mediator</text>

    <!-- Y node -->
    <circle cx="480" cy="200" r="34" fill="#dcfce7" stroke="#065f46" stroke-width="2"/>
    <text x="480" y="206" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Y</text>
    <text x="480" y="252" text-anchor="middle" font-size="10" fill="#525252">outcome</text>

    <!-- Arrows -->
    <!-- Direct: X → Y -->
    <line x1="156" y1="200" x2="444" y2="200" stroke="#1e3a8a" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrM)"/>
    <text x="300" y="194" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a8a" class="mono">NDE = 0.35</text>
    <text x="300" y="210" text-anchor="middle" font-size="9" fill="#525252">direct effect</text>

    <!-- Indirect: X → M -->
    <line x1="146" y1="178" x2="270" y2="138" stroke="#b45309" stroke-width="2.5" marker-end="url(#arrM)"/>
    <text x="200" y="146" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309" class="mono">a = 0.30</text>

    <!-- Indirect: M → Y -->
    <line x1="330" y1="138" x2="454" y2="178" stroke="#b45309" stroke-width="2.5" marker-end="url(#arrM)"/>
    <text x="400" y="146" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309" class="mono">b = 0.50</text>

    <text x="300" y="316" text-anchor="middle" font-size="11" fill="#374151" class="mono">Indirect (NIE) = a × b = 0.30 × 0.50 = 0.15</text>
    <text x="300" y="336" text-anchor="middle" font-size="11" fill="#374151" class="mono">Total = NDE + NIE = 0.35 + 0.15 = 0.50</text>
  </g>

  <!-- Side: decomposition + 2-step MR -->
  <g transform="translate(700,80)">
    <rect width="440" height="380" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="220" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Two-step MR for mediation</text>
    <line x1="20" y1="36" x2="420" y2="36" stroke="#e7e5e4"/>

    <g transform="translate(40,56)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700" fill="#b45309">Step 1: MR for X → M</text>
      <text x="14" y="18" class="mono" fill="#525252">SNPs as IVs for X</text>
      <text x="14" y="34" class="mono" fill="#525252">→ â (causal X → M)</text>
      <text x="14" y="50" font-style="italic" fill="#525252">e.g., 0.30 (BMI → LDL)</text>

      <text x="0" y="80" font-weight="700" fill="#b45309">Step 2: MR for M → Y</text>
      <text x="14" y="98" class="mono" fill="#525252">SNPs as IVs for M (different)</text>
      <text x="14" y="114" class="mono" fill="#525252">→ b̂ (causal M → Y)</text>
      <text x="14" y="130" font-style="italic" fill="#525252">e.g., 0.50 (LDL → CAD)</text>

      <text x="0" y="160" font-weight="700" fill="#7c3aed">Combine</text>
      <text x="14" y="178" class="mono" fill="#525252">indirect effect = â × b̂ = 0.15</text>
      <text x="14" y="194" class="mono" fill="#525252">% mediated = 0.15 / 0.50 = 30%</text>
      <text x="14" y="214" font-style="italic" fill="#525252">Direct (non-LDL) BMI effect = 70%.</text>
    </g>

    <g transform="translate(40,260)">
      <rect width="360" height="100" fill="#fef3c7" stroke="#b45309" rx="4"/>
      <text x="180" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Why two-step MR beats Baron-Kenny</text>
      <line x1="20" y1="32" x2="340" y2="32" stroke="#92400e" opacity="0.4"/>
      <g transform="translate(20,52)" font-size="10" fill="#374151">
        <text x="0" y="0">Baron-Kenny assumes no unmeasured confounders</text>
        <text x="0" y="14">of M-Y. MR uses different SNPs for X and M, so</text>
        <text x="0" y="28">confounding doesn't bias either step independently.</text>
        <text x="0" y="44" font-style="italic" fill="#525252">Robust under realistic violation of assumptions.</text>
      </g>
    </g>
  </g>

  <!-- Bottom banner -->
  <g transform="translate(60,490)">
    <rect width="1080" height="80" fill="#dcfce7" stroke="#065f46" rx="4"/>
    <text x="540" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">Mediation tells you which target to drug</text>
    <text x="540" y="42" text-anchor="middle" font-size="10" fill="#374151">If most of X's effect is via M, target M (e.g., statins reduce LDL → reduce CAD downstream of BMI).</text>
    <text x="540" y="60" text-anchor="middle" font-size="10" fill="#374151">If most is direct, M is a side path; target X directly. The decomposition is the actionable insight.</text>
  </g>
</svg>
