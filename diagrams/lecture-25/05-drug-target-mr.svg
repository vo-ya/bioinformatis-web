<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arrDT" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Drug-target MR — cis-eQTLs as natural drug experiments</text>

  <!-- Main pipeline -->
  <g transform="translate(280,60)">
    <g>
      <rect x="0" y="0" width="320" height="56" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#1e3a8a">1. Pick drug-target gene</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">e.g., PCSK9, IL6R, HMGCR, CETP</text>
    </g>
    <line x1="160" y1="56" x2="160" y2="76" stroke="#525252" stroke-width="1.4" marker-end="url(#arrDT)"/>
    <g transform="translate(0,76)">
      <rect x="0" y="0" width="320" height="56" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#b45309">2. Find cis-eQTL SNPs</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">±100 kb of TSS · GTEx · eQTLGen</text>
    </g>
    <line x1="160" y1="132" x2="160" y2="152" stroke="#525252" stroke-width="1.4" marker-end="url(#arrDT)"/>
    <g transform="translate(0,152)">
      <rect x="0" y="0" width="320" height="56" fill="#fef3c7" stroke="#b45309" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#b45309">3. Use cis-SNPs as IVs</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">"natural drug experiment" via SNP variation</text>
    </g>
    <line x1="160" y1="208" x2="160" y2="228" stroke="#525252" stroke-width="1.4" marker-end="url(#arrDT)"/>
    <g transform="translate(0,228)">
      <rect x="0" y="0" width="320" height="56" fill="#dcfce7" stroke="#065f46" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#065f46">4. Two-sample MR vs disease</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">cis-IVs + outcome GWAS → causal effect estimate</text>
    </g>
    <line x1="160" y1="284" x2="160" y2="304" stroke="#525252" stroke-width="1.4" marker-end="url(#arrDT)"/>
    <g transform="translate(0,304)">
      <rect x="0" y="0" width="320" height="56" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#7c3aed">5. Side-effect PheWAS scan</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">test cis-IVs against ~1000 phenotypes</text>
    </g>
    <line x1="160" y1="360" x2="160" y2="380" stroke="#525252" stroke-width="1.4" marker-end="url(#arrDT)"/>
    <g transform="translate(0,380)">
      <rect x="0" y="0" width="320" height="56" fill="#fee2e2" stroke="#7f1d1d" stroke-width="1.5" rx="6"/>
      <text x="20" y="22" font-size="12" font-weight="700" fill="#7f1d1d">6. Triage decision</text>
      <text x="20" y="40" font-size="10" class="mono" fill="#374151">go / no-go · drug development decision</text>
    </g>
  </g>

  <!-- Side: PCSK9 example -->
  <g transform="translate(660,60)">
    <rect width="500" height="560" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="250" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">PCSK9 worked example</text>
    <line x1="20" y1="34" x2="480" y2="34" stroke="#e7e5e4"/>

    <g transform="translate(40,52)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700" fill="#1e3a8a">Step 1.</text>
      <text x="60" y="0" class="mono" fill="#525252">PCSK9 (proprotein convertase)</text>
      <text x="0" y="22" font-weight="700" fill="#1e3a8a">Step 2.</text>
      <text x="60" y="22" class="mono" fill="#525252">cis-eQTLs in liver · GTEx · 6 SNPs</text>
      <text x="0" y="44" font-weight="700" fill="#1e3a8a">Step 3.</text>
      <text x="60" y="44" class="mono" fill="#525252">use these 6 cis-eQTLs as IVs</text>
      <text x="0" y="66" font-weight="700" fill="#1e3a8a">Step 4.</text>
      <text x="60" y="66" class="mono" fill="#525252">MR PCSK9 → LDL: β = −0.42</text>
      <text x="60" y="80" class="mono" fill="#525252">MR PCSK9 → CAD: β = −0.55</text>
      <text x="60" y="94" class="mono" fill="#525252">(both per SD reduction)</text>
      <text x="0" y="116" font-weight="700" fill="#1e3a8a">Step 5.</text>
      <text x="60" y="116" class="mono" fill="#525252">PheWAS: no major adverse signals</text>
      <text x="60" y="130" class="mono" fill="#525252">(diabetes, CV, neuro tested)</text>
      <text x="0" y="152" font-weight="700" fill="#065f46">Step 6.</text>
      <text x="60" y="152" font-weight="700" fill="#065f46" class="mono">→ GO: develop PCSK9 inhibitor</text>
    </g>

    <g transform="translate(40,250)">
      <rect width="420" height="160" fill="#dcfce7" stroke="#065f46" rx="4"/>
      <text x="210" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">Outcome</text>
      <line x1="20" y1="32" x2="400" y2="32" stroke="#065f46" opacity="0.4"/>
      <g transform="translate(20,52)" font-size="10" fill="#374151">
        <text x="0" y="0">Evolocumab (Repatha, Amgen) FDA-approved 2015</text>
        <text x="0" y="16">Alirocumab (Praluent, Sanofi/Regeneron) FDA-approved 2015</text>
        <text x="0" y="32">Both reduce LDL by ~60% and CAD events by ~15-20%</text>
        <text x="0" y="48">— matching the MR predictions almost exactly.</text>
        <text x="0" y="68" font-weight="700">$$ saved by MR de-risking:</text>
        <text x="0" y="84">~$200M of failed-trial cost avoided.</text>
        <text x="0" y="104" font-style="italic" fill="#525252">The textbook MR-to-drug success story.</text>
      </g>
    </g>

    <g transform="translate(40,440)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#374151">Other validated targets via cis-MR</text>
      <g transform="translate(0,16)" font-size="10" class="mono" fill="#525252">
        <text x="0" y="0">HMGCR → LDL → CAD (statins, post-hoc)</text>
        <text x="0" y="14">CETP → HDL/LDL → CAD (anacetrapib)</text>
        <text x="0" y="28">IL6R → inflammation → CAD (tocilizumab)</text>
        <text x="0" y="42">APOC3 → triglycerides → CAD (volanesorsen)</text>
        <text x="0" y="56">LPA → Lp(a) → CAD (developing pelacarsen)</text>
      </g>
    </g>
  </g>

  <!-- Side: tools panel -->
  <g transform="translate(60,60)">
    <rect width="200" height="280" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="100" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Tools</text>
    <line x1="20" y1="32" x2="180" y2="32" stroke="#e7e5e4"/>
    <g transform="translate(20,52)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700">eQTL DBs</text>
      <text x="0" y="16" class="mono" fill="#525252">GTEx</text>
      <text x="0" y="30" class="mono" fill="#525252">eQTLGen Consortium</text>
      <text x="0" y="44" class="mono" fill="#525252">UK Biobank pQTL</text>
      <text x="0" y="64" font-weight="700">MR + drug</text>
      <text x="0" y="80" class="mono" fill="#525252">Open Targets Platform</text>
      <text x="0" y="94" class="mono" fill="#525252">DrugTargetMR (R)</text>
      <text x="0" y="108" class="mono" fill="#525252">MR-Base</text>
      <text x="0" y="128" font-weight="700">Pharma uptake</text>
      <text x="0" y="144" class="mono" fill="#525252">Genentech, Pfizer</text>
      <text x="0" y="158" class="mono" fill="#525252">GSK, Novartis</text>
      <text x="0" y="172" font-style="italic" fill="#525252">all have internal MR teams</text>
    </g>
  </g>
</svg>
