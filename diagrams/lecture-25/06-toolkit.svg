<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Causal inference toolkit — pick by data structure and assumption strength</text>

  <!-- Axes labels -->
  <g transform="translate(80,80)">
    <line x1="0" y1="220" x2="1040" y2="220" stroke="#374151"/>
    <line x1="0" y1="0" x2="0" y2="440" stroke="#374151"/>

    <!-- X label: assumptions strength -->
    <text x="520" y="476" text-anchor="middle" font-size="11" fill="#525252">→ assumption strength (weak ← → strong) ↦ confidence in causal claim</text>
    <!-- Y label: data type -->
    <text x="-44" y="220" text-anchor="middle" font-size="11" fill="#525252" transform="rotate(-90 -44 220)">data structure (observational → randomised)</text>

    <!-- Quadrant 1: top right — RCT (gold standard) -->
    <g transform="translate(740,30)">
      <rect width="240" height="160" fill="#dcfce7" stroke="#065f46" stroke-width="2" rx="6"/>
      <text x="120" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">RCT</text>
      <text x="120" y="40" text-anchor="middle" font-size="10" font-style="italic" fill="#525252">randomised controlled trial</text>
      <line x1="20" y1="50" x2="220" y2="50" stroke="#065f46" opacity="0.3"/>
      <g transform="translate(20,68)" font-size="10" fill="#374151">
        <text x="0" y="0">Gold standard.</text>
        <text x="0" y="16">Randomisation by design.</text>
        <text x="0" y="32" font-style="italic" fill="#525252">Cost: 100M+; time: years</text>
        <text x="0" y="48" font-style="italic" fill="#525252">Software: trial design + survival</text>
        <text x="0" y="68" font-weight="700" fill="#065f46">use when feasible</text>
      </g>
    </g>

    <!-- Quadrant 2: top left — MR -->
    <g transform="translate(380,30)">
      <rect width="240" height="160" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2" rx="6"/>
      <text x="120" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Mendelian Randomisation</text>
      <text x="120" y="40" text-anchor="middle" font-size="10" font-style="italic" fill="#525252">SNPs as instruments</text>
      <line x1="20" y1="50" x2="220" y2="50" stroke="#1e3a8a" opacity="0.3"/>
      <g transform="translate(20,68)" font-size="10" fill="#374151">
        <text x="0" y="0">Nature's RCT — Mendel.</text>
        <text x="0" y="16">Three IV assumptions.</text>
        <text x="0" y="32" font-style="italic" fill="#525252">Cost: free (public GWAS data)</text>
        <text x="0" y="48" font-style="italic" fill="#525252">Software: TwoSampleMR, MR-Base</text>
        <text x="0" y="68" font-weight="700" fill="#1e3a8a">use for genomic exposures</text>
      </g>
    </g>

    <!-- Quadrant 3: middle left — RD/DiD -->
    <g transform="translate(40,30)">
      <rect width="320" height="160" fill="#fef3c7" stroke="#b45309" stroke-width="2" rx="6"/>
      <text x="160" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">Diff-in-diff &amp; RDD</text>
      <text x="160" y="40" text-anchor="middle" font-size="10" font-style="italic" fill="#525252">natural experiments</text>
      <line x1="20" y1="50" x2="300" y2="50" stroke="#b45309" opacity="0.3"/>
      <g transform="translate(20,68)" font-size="10" fill="#374151">
        <text x="0" y="0">Difference-in-differences: pre/post comparison.</text>
        <text x="0" y="16">Regression discontinuity: threshold-based.</text>
        <text x="0" y="32" font-style="italic" fill="#525252">Cost: free; needs natural variation</text>
        <text x="0" y="48" font-style="italic" fill="#525252">Software: econ tools, Stata</text>
        <text x="0" y="68" font-weight="700" fill="#b45309">use for policy / threshold data</text>
      </g>
    </g>

    <!-- Bottom row -->
    <!-- Quadrant 4: bottom left — TMLE / Causal Forests -->
    <g transform="translate(40,250)">
      <rect width="320" height="160" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" rx="6"/>
      <text x="160" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">TMLE / Causal Forests</text>
      <text x="160" y="40" text-anchor="middle" font-size="10" font-style="italic" fill="#525252">ML-based causal inference</text>
      <line x1="20" y1="50" x2="300" y2="50" stroke="#7c3aed" opacity="0.3"/>
      <g transform="translate(20,68)" font-size="10" fill="#374151">
        <text x="0" y="0">Targeted Maximum Likelihood (van der Laan).</text>
        <text x="0" y="16">Causal forests for heterogeneous effects (Athey).</text>
        <text x="0" y="32" font-style="italic" fill="#525252">Doubly-robust; needs mostly correct model</text>
        <text x="0" y="48" font-style="italic" fill="#525252">Software: tmle (R), grf (R), DoWhy (Py)</text>
        <text x="0" y="68" font-weight="700" fill="#7c3aed">use for big observational data</text>
      </g>
    </g>

    <!-- Quadrant 5: bottom middle — DAG-based / do-calculus -->
    <g transform="translate(380,250)">
      <rect width="240" height="160" fill="#fee2e2" stroke="#7f1d1d" stroke-width="2" rx="6"/>
      <text x="120" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Causal DAGs</text>
      <text x="120" y="40" text-anchor="middle" font-size="10" font-style="italic" fill="#525252">Pearl's do-calculus</text>
      <line x1="20" y1="50" x2="220" y2="50" stroke="#7f1d1d" opacity="0.3"/>
      <g transform="translate(20,68)" font-size="10" fill="#374151">
        <text x="0" y="0">Graph-based identification.</text>
        <text x="0" y="16">Tells you WHICH method works.</text>
        <text x="0" y="32" font-style="italic" fill="#525252">Software: dagitty, DoWhy</text>
        <text x="0" y="52" font-weight="700" fill="#7f1d1d">use for analysis design</text>
      </g>
    </g>

    <!-- Quadrant 6: bottom right — Observational + propensity -->
    <g transform="translate(640,250)">
      <rect width="340" height="160" fill="#f5f5f4" stroke="#525252" stroke-width="2" rx="6"/>
      <text x="170" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#525252">Propensity / matching</text>
      <text x="170" y="40" text-anchor="middle" font-size="10" font-style="italic" fill="#525252">classical observational</text>
      <line x1="20" y1="50" x2="320" y2="50" stroke="#525252" opacity="0.3"/>
      <g transform="translate(20,68)" font-size="10" fill="#374151">
        <text x="0" y="0">Inverse probability weighting / matching.</text>
        <text x="0" y="16">Adjust for measured confounders only.</text>
        <text x="0" y="32" font-style="italic" fill="#525252">Cost: free; assumes no unmeasured confounding</text>
        <text x="0" y="48" font-style="italic" fill="#525252">Software: MatchIt, ipwra (Stata)</text>
        <text x="0" y="68" font-weight="700" fill="#525252">use as last resort</text>
      </g>
    </g>
  </g>

  <!-- Bottom banner -->
  <g transform="translate(80,520)">
    <rect width="1040" height="50" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="520" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Each method has a defensible-when-it-works regime — pick one whose assumptions you can argue for</text>
    <text x="520" y="40" text-anchor="middle" font-size="10" fill="#374151">In genomics: MR + DAG-based design dominate. RCTs for confirmation; ML methods for heterogeneity in big EHR cohorts.</text>
  </g>
</svg>
