<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="540" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Per-SNP Wald ratio — each SNP gives an independent causal-effect estimate</text>

  <!-- Plot -->
  <g transform="translate(120,80)">
    <rect width="700" height="380" fill="#fff" stroke="#d6d3d1"/>
    <line x1="0" y1="190" x2="700" y2="190" stroke="#9ca3af" stroke-dasharray="3 3"/>
    <line x1="350" y1="0" x2="350" y2="380" stroke="#9ca3af" stroke-dasharray="3 3"/>

    <!-- Axes -->
    <g class="mono" font-size="10" fill="#525252">
      <text x="0" y="396" text-anchor="middle">−0.04</text>
      <text x="175" y="396" text-anchor="middle">−0.02</text>
      <text x="350" y="396" text-anchor="middle">0</text>
      <text x="525" y="396" text-anchor="middle">+0.02</text>
      <text x="700" y="396" text-anchor="middle">+0.04</text>
    </g>
    <text x="350" y="416" text-anchor="middle" font-size="11" fill="#525252">β_{Z → X} (effect of SNP on exposure)</text>
    <g class="mono" font-size="10" fill="#525252">
      <text x="-8" y="194" text-anchor="end">0</text>
      <text x="-8" y="100" text-anchor="end">+0.02</text>
      <text x="-8" y="6" text-anchor="end">+0.04</text>
      <text x="-8" y="284" text-anchor="end">−0.02</text>
      <text x="-8" y="378" text-anchor="end">−0.04</text>
    </g>
    <text x="-46" y="190" text-anchor="middle" font-size="11" fill="#525252" transform="rotate(-90 -46 190)">β_{Z → Y} (effect of SNP on outcome)</text>

    <!-- Reference slope (the true causal effect, slope = 0.55) -->
    <line x1="0" y1="380" x2="700" y2="0" stroke="#1e3a8a" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="600" y="50" font-size="11" font-weight="700" fill="#1e3a8a" class="mono">slope ≈ 0.55 = true causal effect</text>

    <!-- SNP points + per-SNP rays -->
    <g>
      <!-- SNP 1: large effect, on the line -->
      <line x1="350" y1="190" x2="525" y2="98" stroke="#dc2626" stroke-width="1" stroke-dasharray="2 2" opacity="0.5"/>
      <circle cx="525" cy="98" r="7" fill="#dc2626"/>
      <text x="535" y="92" font-size="10" fill="#dc2626" font-weight="700" class="mono">SNP 1</text>
      <text x="535" y="105" font-size="9" fill="#525252" class="mono">β_ZX=+0.02, β_ZY=+0.012</text>
      <text x="535" y="118" font-size="9" fill="#525252" class="mono">Wald = 0.60</text>

      <!-- SNP 2 -->
      <line x1="350" y1="190" x2="263" y2="237" stroke="#1e3a8a" stroke-width="1" stroke-dasharray="2 2" opacity="0.5"/>
      <circle cx="263" cy="237" r="7" fill="#1e3a8a"/>
      <text x="180" y="232" font-size="10" fill="#1e3a8a" font-weight="700" class="mono">SNP 2</text>
      <text x="180" y="245" font-size="9" fill="#525252" class="mono">β_ZX=−0.01, β_ZY=−0.005</text>
      <text x="180" y="258" font-size="9" fill="#525252" class="mono">Wald = 0.50</text>

      <!-- SNP 3 (smaller effect) -->
      <line x1="350" y1="190" x2="438" y2="139" stroke="#065f46" stroke-width="1" stroke-dasharray="2 2" opacity="0.5"/>
      <circle cx="438" cy="139" r="7" fill="#065f46"/>
      <text x="448" y="134" font-size="10" fill="#065f46" font-weight="700" class="mono">SNP 3</text>
      <text x="448" y="147" font-size="9" fill="#525252" class="mono">β_ZX=+0.01, β_ZY=+0.006</text>
      <text x="448" y="160" font-size="9" fill="#525252" class="mono">Wald = 0.60</text>

      <!-- A few more SNPs around the consensus line -->
      <circle cx="600" cy="50" r="5" fill="#9ca3af"/>
      <circle cx="200" cy="295" r="5" fill="#9ca3af"/>
      <circle cx="475" cy="115" r="5" fill="#9ca3af"/>
      <circle cx="295" cy="225" r="5" fill="#9ca3af"/>
      <circle cx="395" cy="167" r="5" fill="#9ca3af"/>
      <circle cx="245" cy="245" r="5" fill="#9ca3af"/>
      <circle cx="555" cy="78" r="5" fill="#9ca3af"/>
    </g>
  </g>

  <!-- Side: formula -->
  <g transform="translate(860,80)">
    <rect width="280" height="380" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="140" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Wald ratio — per-SNP causal estimate</text>
    <line x1="20" y1="32" x2="260" y2="32" stroke="#e7e5e4"/>

    <g transform="translate(40,52)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700">For SNP k:</text>
      <text x="0" y="22" font-family="JetBrains Mono, monospace" fill="#1e3a8a">β̂_{X→Y}^{(k)} = β̂_{Z_k→Y} / β̂_{Z_k→X}</text>
      <text x="0" y="50" font-style="italic" fill="#525252">slope from origin to point (β_ZX, β_ZY).</text>

      <text x="0" y="86" font-weight="700">If all SNPs are valid IVs:</text>
      <text x="0" y="104" font-style="italic" fill="#525252">all Wald ratios converge to the same slope.</text>

      <text x="0" y="138" font-weight="700">If pleiotropy or confounding:</text>
      <text x="0" y="156" font-style="italic" fill="#525252">slopes differ; SNPs scatter off the consensus line.</text>

      <text x="0" y="190" font-weight="700">Combine across SNPs:</text>
      <text x="0" y="208" font-family="JetBrains Mono, monospace" fill="#7c3aed">IVW = Σ wₖ · β̂ₖ / Σ wₖ</text>
      <text x="0" y="224" font-family="JetBrains Mono, monospace" fill="#7c3aed">wₖ = 1 / σ²(β̂ₖ)</text>

      <text x="0" y="260" font-style="italic" fill="#525252">Inverse-variance weighting:</text>
      <text x="0" y="276" font-style="italic" fill="#525252">tighter SNPs (smaller SE) get more weight.</text>
    </g>

    <g transform="translate(20,310)">
      <rect width="240" height="60" fill="#dcfce7" stroke="#065f46" rx="4"/>
      <text x="120" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">Convergence = strong evidence</text>
      <text x="120" y="42" text-anchor="middle" font-size="9" fill="#525252">All SNP Wald ratios on the same slope</text>
    </g>
  </g>
</svg>
