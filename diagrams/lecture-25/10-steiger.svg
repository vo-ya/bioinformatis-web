<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" width="1200" height="580" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style></defs>
  <rect width="1200" height="580" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Steiger directionality test — does the SNP explain X better than Y?</text>

  <!-- Plot -->
  <g transform="translate(120,80)">
    <rect width="700" height="380" fill="#fff" stroke="#d6d3d1"/>

    <!-- Diagonal: equal explanatory power -->
    <line x1="0" y1="380" x2="700" y2="0" stroke="#9ca3af" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="350" y="160" text-anchor="middle" font-size="10" fill="#525252" transform="rotate(-30 350 160)">R²(Z, X) = R²(Z, Y) — direction undetermined</text>

    <!-- Axes -->
    <line x1="0" y1="380" x2="700" y2="380" stroke="#374151"/>
    <line x1="0" y1="0" x2="0" y2="380" stroke="#374151"/>

    <g class="mono" font-size="10" fill="#525252">
      <text x="0" y="396" text-anchor="middle">0</text>
      <text x="175" y="396" text-anchor="middle">0.005</text>
      <text x="350" y="396" text-anchor="middle">0.01</text>
      <text x="525" y="396" text-anchor="middle">0.015</text>
      <text x="700" y="396" text-anchor="middle">0.02</text>
      <text x="-8" y="384" text-anchor="end">0</text>
      <text x="-8" y="190" text-anchor="end">0.01</text>
      <text x="-8" y="4" text-anchor="end">0.02</text>
    </g>
    <text x="350" y="416" text-anchor="middle" font-size="11" fill="#525252">R²(Z, X) — instrument explains exposure</text>
    <text x="-44" y="190" text-anchor="middle" font-size="11" fill="#525252" transform="rotate(-90 -44 190)">R²(Z, Y) — instrument explains outcome</text>

    <!-- Scatter -->
    <!-- Below diagonal: X → Y direction supported -->
    <g fill="#1e3a8a" fill-opacity="0.7">
      <circle cx="180" cy="320" r="6"/>
      <circle cx="240" cy="290" r="6"/>
      <circle cx="280" cy="270" r="6"/>
      <circle cx="320" cy="250" r="6"/>
      <circle cx="380" cy="220" r="6"/>
      <circle cx="430" cy="190" r="6"/>
      <circle cx="490" cy="160" r="6"/>
      <circle cx="540" cy="130" r="6"/>
      <circle cx="600" cy="100" r="6"/>
      <circle cx="640" cy="80" r="6"/>
      <circle cx="200" cy="310" r="6"/>
      <circle cx="350" cy="240" r="6"/>
    </g>

    <!-- A few SNPs below diagonal: reverse direction -->
    <g fill="#dc2626" fill-opacity="0.7">
      <circle cx="80" cy="180" r="6" stroke="#7f1d1d" stroke-width="1.5"/>
      <circle cx="120" cy="100" r="6" stroke="#7f1d1d" stroke-width="1.5"/>
      <circle cx="60" cy="60" r="6" stroke="#7f1d1d" stroke-width="1.5"/>
    </g>
    <text x="60" y="50" font-size="10" fill="#dc2626" font-weight="700" class="mono">3 SNPs above diagonal</text>
    <text x="60" y="66" font-size="9" fill="#dc2626" font-style="italic">→ reverse-causation hint</text>

    <!-- Annotation regions -->
    <text x="500" y="350" font-size="11" fill="#1e3a8a" font-weight="700" class="mono">below diagonal: X → Y supported</text>

    <text x="350" y="60" font-size="11" fill="#dc2626" font-weight="700" class="mono">above diagonal: Y → X concern</text>
  </g>

  <!-- Side: interpretation -->
  <g transform="translate(860,80)">
    <rect width="280" height="380" fill="#fff" stroke="#d6d3d1" rx="6"/>
    <text x="140" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Steiger logic</text>
    <line x1="20" y1="32" x2="260" y2="32" stroke="#e7e5e4"/>

    <g transform="translate(40,52)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700">For each SNP Z:</text>
      <text x="0" y="16">Compute R²(Z, X) and R²(Z, Y).</text>
      <text x="0" y="40" font-weight="700">Direction supported when:</text>
      <text x="14" y="56" class="mono" fill="#1e3a8a">R²(Z, X) &gt; R²(Z, Y)</text>
      <text x="14" y="72" font-style="italic" fill="#525252">Z is closer to X than to Y</text>
      <text x="0" y="98" font-weight="700">Voting:</text>
      <text x="14" y="114" class="mono" fill="#525252">% of SNPs supporting X → Y</text>
      <text x="14" y="130" class="mono" fill="#525252">High → confirmed direction</text>
      <text x="14" y="144" class="mono" fill="#525252">Low → reverse causation suspect</text>

      <text x="0" y="178" font-weight="700">In this example:</text>
      <text x="14" y="194" class="mono" fill="#525252">12 / 15 SNPs below diagonal (80%)</text>
      <text x="14" y="210" class="mono" fill="#525252">→ X → Y direction confirmed</text>
    </g>

    <g transform="translate(20,290)">
      <rect width="240" height="80" fill="#dcfce7" stroke="#065f46" rx="4"/>
      <text x="120" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">When to invoke Steiger</text>
      <line x1="14" y1="32" x2="226" y2="32" stroke="#065f46" opacity="0.4"/>
      <text x="120" y="50" text-anchor="middle" font-size="10" fill="#374151">when reverse causation is plausible</text>
      <text x="120" y="66" text-anchor="middle" font-size="9" font-style="italic" fill="#525252">e.g., BMI ↔ depression, glucose ↔ AD</text>
    </g>
  </g>

  <!-- Bottom banner — y dropped 490→530 (canvas 540→580) because the
       x-axis title "R²(Z, X) — instrument explains exposure" lived at
       abs y=496 (glyph y=487-497) and the yellow banner's top edge at
       y=490 was painting over the upper 7 px of that text. -->
  <g transform="translate(60,530)">
    <rect width="1080" height="40" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="540" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Steiger test asks "is the SNP closer to X or to Y?" — if to X, the X → Y direction is supported.</text>
  </g>
</svg>
