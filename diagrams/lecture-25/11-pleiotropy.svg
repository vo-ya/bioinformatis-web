<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="arrP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#525252"/>
    </marker>
  </defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Vertical (allowed) vs horizontal (forbidden) pleiotropy</text>

  <!-- Vertical pleiotropy: OK -->
  <g transform="translate(60,80)">
    <rect width="500" height="380" fill="#fff" stroke="#065f46" stroke-width="2" rx="6"/>
    <text x="250" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Vertical pleiotropy (allowed)</text>
    <text x="250" y="40" text-anchor="middle" font-size="10" fill="#525252">SNP affects multiple traits via X</text>
    <line x1="20" y1="52" x2="480" y2="52" stroke="#dcfce7"/>

    <g transform="translate(60,80)">
      <!-- Z node -->
      <circle cx="40" cy="140" r="28" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
      <text x="40" y="144" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Z</text>
      <text x="40" y="178" text-anchor="middle" font-size="10" fill="#525252">SNP</text>

      <!-- X node -->
      <circle cx="180" cy="140" r="28" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
      <text x="180" y="144" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">X</text>
      <text x="180" y="178" text-anchor="middle" font-size="10" fill="#525252">exposure</text>

      <!-- Y node -->
      <circle cx="320" cy="140" r="28" fill="#dcfce7" stroke="#065f46" stroke-width="2"/>
      <text x="320" y="144" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Y</text>
      <text x="320" y="178" text-anchor="middle" font-size="10" fill="#525252">outcome</text>

      <!-- T (other trait) -->
      <circle cx="320" cy="60" r="20" fill="#fff" stroke="#9ca3af" stroke-width="1.5"/>
      <text x="320" y="64" text-anchor="middle" font-size="11" fill="#525252">T</text>
      <text x="320" y="40" text-anchor="middle" font-size="9" fill="#9ca3af">other trait</text>

      <!-- Arrows -->
      <line x1="68" y1="140" x2="152" y2="140" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arrP)"/>
      <line x1="208" y1="140" x2="292" y2="140" stroke="#b45309" stroke-width="2" marker-end="url(#arrP)"/>
      <line x1="200" y1="120" x2="308" y2="76" stroke="#b45309" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrP)"/>

      <text x="110" y="130" font-size="10" font-weight="700" fill="#1e3a8a" class="mono">a</text>
      <text x="250" y="130" font-size="10" font-weight="700" fill="#b45309" class="mono">b</text>
      <text x="240" y="92" font-size="10" font-weight="700" fill="#b45309" class="mono">c</text>
    </g>

    <g transform="translate(60,290)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700">Path Z → Y:</text>
      <text x="80" y="0" class="mono" fill="#525252">via X (vertical)</text>
      <text x="0" y="20" font-weight="700">Other traits:</text>
      <text x="80" y="20" class="mono" fill="#525252">also downstream of X</text>
      <text x="0" y="40" font-weight="700" fill="#065f46">IV assumption holds.</text>
    </g>
  </g>

  <!-- Horizontal pleiotropy: BAD -->
  <g transform="translate(620,80)">
    <rect width="520" height="380" fill="#fff" stroke="#dc2626" stroke-width="2" rx="6"/>
    <text x="260" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">Horizontal pleiotropy (NOT allowed)</text>
    <text x="260" y="40" text-anchor="middle" font-size="10" fill="#525252">SNP affects Y via independent path</text>
    <line x1="20" y1="52" x2="500" y2="52" stroke="#fee2e2"/>

    <g transform="translate(60,80)">
      <!-- Z -->
      <circle cx="40" cy="140" r="28" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
      <text x="40" y="144" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">Z</text>
      <text x="40" y="178" text-anchor="middle" font-size="10" fill="#525252">SNP</text>

      <!-- X -->
      <circle cx="180" cy="140" r="28" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
      <text x="180" y="144" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">X</text>
      <text x="180" y="178" text-anchor="middle" font-size="10" fill="#525252">exposure</text>

      <!-- T (separate trait on path Z → Y) -->
      <circle cx="180" cy="40" r="28" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
      <text x="180" y="44" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">T</text>
      <text x="180" y="78" text-anchor="middle" font-size="10" fill="#dc2626">separate trait</text>

      <!-- Y -->
      <circle cx="320" cy="90" r="28" fill="#dcfce7" stroke="#065f46" stroke-width="2"/>
      <text x="320" y="94" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Y</text>
      <text x="320" y="128" text-anchor="middle" font-size="10" fill="#525252">outcome</text>

      <!-- Arrows: Z → X, X → Y, but Z → T → Y separate path -->
      <line x1="68" y1="140" x2="152" y2="140" stroke="#1e3a8a" stroke-width="2" marker-end="url(#arrP)"/>
      <line x1="208" y1="130" x2="292" y2="100" stroke="#b45309" stroke-width="2" marker-end="url(#arrP)"/>
      <line x1="60" y1="118" x2="152" y2="56" stroke="#dc2626" stroke-width="2" marker-end="url(#arrP)"/>
      <line x1="208" y1="50" x2="292" y2="80" stroke="#dc2626" stroke-width="2" marker-end="url(#arrP)"/>

      <text x="110" y="130" font-size="10" font-weight="700" fill="#1e3a8a" class="mono">a</text>
      <text x="100" y="80" font-size="10" font-weight="700" fill="#dc2626" class="mono">α (off-target)</text>
      <text x="240" y="68" font-size="10" font-weight="700" fill="#dc2626" class="mono">δ</text>
      <text x="250" y="125" font-size="10" font-weight="700" fill="#b45309" class="mono">b</text>
    </g>

    <g transform="translate(60,290)" font-size="11" fill="#374151">
      <text x="0" y="0" font-weight="700">Path Z → Y:</text>
      <text x="100" y="0" class="mono" fill="#525252">via X AND via T (independent)</text>
      <text x="0" y="20" font-weight="700">Effect on IV:</text>
      <text x="100" y="20" class="mono" fill="#dc2626">α · δ contaminates β̂</text>
      <text x="0" y="40" font-weight="700" fill="#dc2626">IV assumption violated.</text>
    </g>
  </g>

  <!-- Bottom banner -->
  <g transform="translate(60,490)">
    <rect width="1080" height="80" fill="#fef3c7" stroke="#b45309" rx="4"/>
    <text x="540" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Distinguishing the two: detection via MR-Egger intercept (systematic) and MR-PRESSO outliers (per-SNP)</text>
    <text x="540" y="42" text-anchor="middle" font-size="10" fill="#374151">Vertical: every Wald estimate consistent with each other. Horizontal: per-SNP estimates inflated, scattered, possibly biased systematically.</text>
    <text x="540" y="60" text-anchor="middle" font-size="10" font-style="italic" fill="#525252">In practice: vertical is fine; horizontal is the dragon. Sensitivity analyses are how you slay it.</text>
  </g>
</svg>
