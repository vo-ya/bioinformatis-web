<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; }</style></defs>
  <rect width="1200" height="540" fill="#fafaf9" rx="6"/>
  <text x="600" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Drug discovery pipeline — 10–15 years, ~$2.6B per approved drug, &lt;10% Phase I → approval</text>

  <!-- Stages -->
  <g transform="translate(40,80)">
    <!-- Target ID -->
    <g transform="translate(0,0)">
      <rect width="160" height="100" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2" rx="6"/>
      <text x="80" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Target ID</text>
      <text x="80" y="42" text-anchor="middle" font-size="10" fill="#1e3a8a">2–3 yr</text>
      <text x="80" y="60" text-anchor="middle" font-size="9" fill="#1e3a8a">genomics, pheno-</text>
      <text x="80" y="73" text-anchor="middle" font-size="9" fill="#1e3a8a">type screens, MR</text>
      <text x="80" y="92" text-anchor="middle" font-size="9" fill="#525252" class="mono">~10,000 targets</text>
    </g>
    <!-- Hit discovery -->
    <g transform="translate(180,0)">
      <rect width="160" height="100" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2" rx="6"/>
      <text x="80" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Hit Discovery</text>
      <text x="80" y="42" text-anchor="middle" font-size="10" fill="#1e3a8a">1–2 yr</text>
      <text x="80" y="60" text-anchor="middle" font-size="9" fill="#1e3a8a">HTS, virtual</text>
      <text x="80" y="73" text-anchor="middle" font-size="9" fill="#1e3a8a">screen, DEL</text>
      <text x="80" y="92" text-anchor="middle" font-size="9" fill="#525252" class="mono">~10,000 hits</text>
    </g>
    <!-- Lead opt -->
    <g transform="translate(360,0)">
      <rect width="160" height="100" fill="#fef3c7" stroke="#b45309" stroke-width="2" rx="6"/>
      <text x="80" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Lead Optimization</text>
      <text x="80" y="42" text-anchor="middle" font-size="10" fill="#92400e">2–3 yr</text>
      <text x="80" y="60" text-anchor="middle" font-size="9" fill="#92400e">SAR, ADMET,</text>
      <text x="80" y="73" text-anchor="middle" font-size="9" fill="#92400e">DMPK, potency</text>
      <text x="80" y="92" text-anchor="middle" font-size="9" fill="#525252" class="mono">~10 candidates</text>
    </g>
    <!-- Preclinical -->
    <g transform="translate(540,0)">
      <rect width="160" height="100" fill="#fef3c7" stroke="#b45309" stroke-width="2" rx="6"/>
      <text x="80" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Preclinical</text>
      <text x="80" y="42" text-anchor="middle" font-size="10" fill="#92400e">1–2 yr</text>
      <text x="80" y="60" text-anchor="middle" font-size="9" fill="#92400e">in vitro, in vivo</text>
      <text x="80" y="73" text-anchor="middle" font-size="9" fill="#92400e">tox, PK/PD</text>
      <text x="80" y="92" text-anchor="middle" font-size="9" fill="#525252" class="mono">~3 IND filings</text>
    </g>
    <!-- Clinical -->
    <g transform="translate(720,0)">
      <rect width="240" height="100" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="6"/>
      <text x="120" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">Clinical Trials I/II/III</text>
      <text x="120" y="42" text-anchor="middle" font-size="10" fill="#991b1b">6–8 yr · ~$1.5B</text>
      <text x="120" y="60" text-anchor="middle" font-size="9" fill="#991b1b">Phase I safety (n~30)</text>
      <text x="120" y="73" text-anchor="middle" font-size="9" fill="#991b1b">Phase II efficacy (n~100)</text>
      <text x="120" y="86" text-anchor="middle" font-size="9" fill="#991b1b">Phase III pivotal (n~3000)</text>
    </g>
    <!-- Approval -->
    <g transform="translate(980,0)">
      <rect width="140" height="100" fill="#d1fae5" stroke="#065f46" stroke-width="2" rx="6"/>
      <text x="70" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">FDA / EMA</text>
      <text x="70" y="42" text-anchor="middle" font-size="10" fill="#065f46">1–2 yr review</text>
      <text x="70" y="62" text-anchor="middle" font-size="9" fill="#065f46">NDA / BLA</text>
      <text x="70" y="92" text-anchor="middle" font-size="9" fill="#525252" class="mono">1 approval</text>
    </g>

    <!-- Arrows -->
    <g stroke="#374151" stroke-width="1.5" fill="none">
      <line x1="160" y1="50" x2="180" y2="50" marker-end="url(#a26)"/>
      <line x1="340" y1="50" x2="360" y2="50" marker-end="url(#a26)"/>
      <line x1="520" y1="50" x2="540" y2="50" marker-end="url(#a26)"/>
      <line x1="700" y1="50" x2="720" y2="50" marker-end="url(#a26)"/>
      <line x1="960" y1="50" x2="980" y2="50" marker-end="url(#a26)"/>
    </g>
    <defs>
      <marker id="a26" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 z" fill="#374151"/>
      </marker>
    </defs>
  </g>

  <!-- Attrition funnel -->
  <g transform="translate(60,220)">
    <text x="540" y="0" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Attrition (Phase → next)</text>
    <g transform="translate(0,20)">
      <rect x="0" y="0" width="1080" height="60" fill="#fff" stroke="#d4d4d8" rx="4"/>
      <g class="mono" font-size="10" fill="#111827">
        <text x="80" y="24">10,000 cmpd</text><text x="80" y="40" fill="#525252">Hit screen</text>
        <text x="260" y="24">250 hits</text><text x="260" y="40" fill="#525252">2.5%</text>
        <text x="420" y="24">25 leads</text><text x="420" y="40" fill="#525252">10%</text>
        <text x="580" y="24">10 PCC</text><text x="580" y="40" fill="#525252">40%</text>
        <text x="720" y="24">3 IND</text><text x="720" y="40" fill="#525252">30%</text>
        <text x="860" y="24">1 Ph II</text><text x="860" y="40" fill="#525252">33%</text>
        <text x="990" y="24">~10% approve</text>
      </g>
    </g>
  </g>

  <!-- Where computation enters -->
  <g transform="translate(60,330)">
    <rect width="1080" height="160" fill="#eff6ff" stroke="#1e3a8a" rx="6"/>
    <text x="540" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Where computation enters the pipeline</text>
    <g font-size="10" fill="#1e3a8a">
      <text x="20" y="50" font-weight="700">Target ID:</text>
      <text x="20" y="64">GWAS, MR, single-cell, CRISPR screens</text>
      <text x="20" y="78">→ Open Targets, DepMap</text>

      <text x="240" y="50" font-weight="700">Hit Discovery:</text>
      <text x="240" y="64">virtual screening (docking)</text>
      <text x="240" y="78">ML scoring, generative models</text>

      <text x="460" y="50" font-weight="700">Lead Opt:</text>
      <text x="460" y="64">QSAR, FEP, ADMET predictors</text>
      <text x="460" y="78">multi-objective optimization</text>

      <text x="680" y="50" font-weight="700">Preclinical:</text>
      <text x="680" y="64">PBPK modeling, tox prediction</text>
      <text x="680" y="78">organ-on-chip simulators</text>

      <text x="880" y="50" font-weight="700">Clinical:</text>
      <text x="880" y="64">trial design, biomarkers</text>
      <text x="880" y="78">RWE, digital twins</text>

      <text x="20" y="110" fill="#92400e" font-weight="700">Cost reduction:</text>
      <text x="160" y="110">AI/ML claimed 30–50% reduction in lead-opt cycle time; clinical attrition unchanged.</text>
      <text x="20" y="128" fill="#dc2626" font-weight="700">Bottleneck:</text>
      <text x="160" y="128">Phase II/III where biology, not chemistry, decides — and AI cannot easily help yet.</text>
    </g>
  </g>

  <text x="600" y="520" text-anchor="middle" font-size="10" fill="#525252">Costs from DiMasi et al. 2016 (J Health Econ); attrition from Wong et al. 2019 (Biostatistics).</text>
</svg>
