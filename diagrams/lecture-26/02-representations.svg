<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }</style></defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Molecular representations — same molecule (caffeine), four ways to encode it</text>

  <!-- 2D structure -->
  <g transform="translate(40,80)">
    <rect width="280" height="220" fill="#fff" stroke="#1e3a8a" stroke-width="2" rx="6"/>
    <text x="140" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">2D structure</text>
    <text x="140" y="38" text-anchor="middle" font-size="9" fill="#525252">human-readable, layout-dependent</text>
    <!-- caffeine sketch -->
    <g transform="translate(140,130)" stroke="#111827" stroke-width="1.5" fill="none">
      <!-- imidazole ring -->
      <polygon points="-50,-30 -30,-50 -10,-30 -20,-10 -45,-10" fill="#fff"/>
      <!-- pyrimidine ring -->
      <polygon points="-10,-30 30,-50 60,-30 50,0 0,0" fill="#fff"/>
      <!-- N labels -->
      <g font-size="11" fill="#dc2626" stroke="none" font-weight="700" text-anchor="middle">
        <text x="-50" y="-26">N</text>
        <text x="-30" y="-54">N</text>
        <text x="30" y="-54">N</text>
        <text x="60" y="-26">N</text>
      </g>
      <!-- methyl groups & oxygens -->
      <g font-size="10" fill="#374151" stroke="none">
        <text x="-72" y="-50">CH₃</text>
        <text x="-12" y="-66">CH₃</text>
        <text x="60" y="-58">CH₃</text>
        <text x="0" y="20" fill="#dc2626">O</text>
        <text x="65" y="-8" fill="#dc2626">O</text>
      </g>
    </g>
    <text x="140" y="200" text-anchor="middle" font-size="10" fill="#525252">C₈H₁₀N₄O₂ · MW 194.19</text>
  </g>

  <!-- SMILES -->
  <g transform="translate(340,80)">
    <rect width="280" height="220" fill="#fff" stroke="#7c3aed" stroke-width="2" rx="6"/>
    <text x="140" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">SMILES (string)</text>
    <text x="140" y="38" text-anchor="middle" font-size="9" fill="#525252">canonical, ML-ready, ambiguous if non-canonical</text>
    <text x="140" y="80" text-anchor="middle" class="mono" fill="#111827" font-weight="700">CN1C=NC2=C1C(=O)N(C(=O)N2C)C</text>
    <g font-size="10" fill="#525252">
      <text x="20" y="120">C, N, O = atoms</text>
      <text x="20" y="135">[ ] = explicit charge / valence</text>
      <text x="20" y="150">= triple bond, # double, ring numbers</text>
      <text x="20" y="165">parens = branches</text>
      <text x="20" y="180">canonical = same atom order regardless of input</text>
      <text x="20" y="200" fill="#dc2626" font-style="italic">non-canonical SMILES → same mol, different string</text>
    </g>
  </g>

  <!-- InChI -->
  <g transform="translate(640,80)">
    <rect width="280" height="220" fill="#fff" stroke="#065f46" stroke-width="2" rx="6"/>
    <text x="140" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">InChI / InChIKey</text>
    <text x="140" y="38" text-anchor="middle" font-size="9" fill="#525252">layered, IUPAC-standardized, hash for indexing</text>
    <text x="20" y="64" class="mono" font-size="9" fill="#111827">InChI=1S/C8H10N4O2/c1-10-4-9-6-5(10)</text>
    <text x="20" y="78" class="mono" font-size="9" fill="#111827">7(13)12(3)8(14)11(6)2/h4H,1-3H3</text>
    <text x="20" y="100" class="mono" font-size="10" fill="#dc2626" font-weight="700">InChIKey:</text>
    <text x="20" y="115" class="mono" font-size="10" fill="#111827">RYYVLZVUVIJVGH-UHFFFAOYSA-N</text>
    <g font-size="10" fill="#525252">
      <text x="20" y="145">14-block hash, fixed length</text>
      <text x="20" y="160">first block = connectivity</text>
      <text x="20" y="175">second = stereo + isotope</text>
      <text x="20" y="190">third = protonation</text>
      <text x="20" y="205" fill="#065f46" font-style="italic">use as primary key in databases</text>
    </g>
  </g>

  <!-- Molecular graph -->
  <g transform="translate(940,80)">
    <rect width="220" height="220" fill="#fff" stroke="#b45309" stroke-width="2" rx="6"/>
    <text x="110" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Molecular graph</text>
    <text x="110" y="38" text-anchor="middle" font-size="9" fill="#525252">G = (V, E) for GNNs</text>
    <!-- nodes -->
    <g font-size="9" fill="#fff" font-weight="700">
      <circle cx="50" cy="80" r="11" fill="#1e3a8a"/><text x="50" y="83" text-anchor="middle">C</text>
      <circle cx="90" cy="80" r="11" fill="#dc2626"/><text x="90" y="83" text-anchor="middle">N</text>
      <circle cx="130" cy="80" r="11" fill="#1e3a8a"/><text x="130" y="83" text-anchor="middle">C</text>
      <circle cx="170" cy="80" r="11" fill="#dc2626"/><text x="170" y="83" text-anchor="middle">N</text>
      <circle cx="50" cy="130" r="11" fill="#1e3a8a"/><text x="50" y="133" text-anchor="middle">C</text>
      <circle cx="90" cy="130" r="11" fill="#1e3a8a"/><text x="90" y="133" text-anchor="middle">C</text>
      <circle cx="130" cy="130" r="11" fill="#dc2626"/><text x="130" y="133" text-anchor="middle">N</text>
      <circle cx="170" cy="130" r="11" fill="#b45309"/><text x="170" y="133" text-anchor="middle">O</text>
    </g>
    <g stroke="#374151" stroke-width="1.5">
      <line x1="50" y1="80" x2="90" y2="80"/>
      <line x1="90" y1="80" x2="130" y2="80"/>
      <line x1="130" y1="80" x2="170" y2="80"/>
      <line x1="50" y1="80" x2="50" y2="130"/>
      <line x1="50" y1="130" x2="90" y2="130"/>
      <line x1="90" y1="80" x2="90" y2="130"/>
      <line x1="90" y1="130" x2="130" y2="130"/>
      <line x1="130" y1="80" x2="130" y2="130"/>
      <line x1="130" y1="130" x2="170" y2="130"/>
    </g>
    <text x="110" y="180" text-anchor="middle" font-size="10" fill="#525252">node features: atom type, charge, hybridization</text>
    <text x="110" y="195" text-anchor="middle" font-size="10" fill="#525252">edge features: bond order, aromatic flag</text>
  </g>

  <!-- Comparison -->
  <g transform="translate(40,330)">
    <rect width="1120" height="240" fill="#eff6ff" stroke="#1e3a8a" rx="6"/>
    <text x="560" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Trade-offs by representation</text>

    <g transform="translate(20,40)">
      <line x1="0" y1="0" x2="1080" y2="0" stroke="#1e3a8a"/>
      <g font-size="10" font-weight="700" fill="#111827">
        <text x="0" y="20">Property</text>
        <text x="180" y="20">2D drawing</text>
        <text x="350" y="20">SMILES</text>
        <text x="520" y="20">InChI / InChIKey</text>
        <text x="720" y="20">Molecular graph</text>
        <text x="900" y="20">Fingerprint</text>
      </g>
      <line x1="0" y1="30" x2="1080" y2="30" stroke="#1e3a8a"/>

      <g font-size="10" fill="#374151">
        <text x="0" y="50">canonical?</text>
        <text x="180" y="50">no</text>
        <text x="350" y="50">if canonicalized</text>
        <text x="520" y="50" fill="#065f46">yes (standardized)</text>
        <text x="720" y="50">yes (atom-order invariant)</text>
        <text x="900" y="50">yes (hash)</text>

        <text x="0" y="72">ML input?</text>
        <text x="180" y="72" fill="#dc2626">no — needs OCR</text>
        <text x="350" y="72">tokenize or parse</text>
        <text x="520" y="72" fill="#dc2626">opaque hash</text>
        <text x="720" y="72" fill="#065f46">native for GNN</text>
        <text x="900" y="72" fill="#065f46">native for RF / DNN</text>

        <text x="0" y="94">stereo?</text>
        <text x="180" y="94">if drawn</text>
        <text x="350" y="94">@/@@/E/Z</text>
        <text x="520" y="94">layered</text>
        <text x="720" y="94">node/edge feature</text>
        <text x="900" y="94" fill="#dc2626">often dropped</text>

        <text x="0" y="116">good for...</text>
        <text x="180" y="116">papers, slides</text>
        <text x="350" y="116">SMILES LMs, search</text>
        <text x="520" y="116">DB primary key</text>
        <text x="720" y="116">GNN, message passing</text>
        <text x="900" y="116">similarity, RF</text>

        <text x="0" y="138">tools</text>
        <text x="180" y="138">ChemDraw, RDKit draw</text>
        <text x="350" y="138">RDKit, OpenSMILES</text>
        <text x="520" y="138">InChI Trust software</text>
        <text x="720" y="138">DGL-LifeSci, PyG</text>
        <text x="900" y="138">RDKit Morgan, MACCS</text>
      </g>
    </g>

    <g transform="translate(20,200)">
      <text x="0" y="0" font-size="10" fill="#92400e" font-weight="700">Conversion path:</text>
      <text x="120" y="0" font-size="10" fill="#92400e" class="mono">SMILES → RDKit Mol → 2D coords / InChI / Morgan FP / graph for GNN — RDKit is the lingua franca.</text>
    </g>
  </g>
</svg>
