<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }</style></defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Morgan / ECFP fingerprints — circular substructure → bit vector</text>

  <!-- Step 1: atom invariants -->
  <g transform="translate(40,70)">
    <rect width="270" height="220" fill="#fff" stroke="#1e3a8a" stroke-width="2" rx="6"/>
    <text x="135" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Step 1 — atom invariants (radius 0)</text>
    <text x="135" y="38" text-anchor="middle" font-size="9" fill="#525252">hash of (Z, charge, degree, H-count, ...)</text>

    <g transform="translate(135,130)">
      <circle cx="-50" cy="0" r="14" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5"/>
      <circle cx="0" cy="-30" r="14" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5"/>
      <circle cx="0" cy="30" r="14" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5"/>
      <circle cx="50" cy="0" r="14" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1.5"/>
      <line x1="-36" y1="0" x2="-14" y2="-30" stroke="#374151"/>
      <line x1="-36" y1="0" x2="-14" y2="30" stroke="#374151"/>
      <line x1="14" y1="-30" x2="36" y2="0" stroke="#374151"/>
      <line x1="14" y1="30" x2="36" y2="0" stroke="#374151"/>
      <text x="-50" y="3" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">C</text>
      <text x="0" y="-27" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">N</text>
      <text x="0" y="33" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">O</text>
      <text x="50" y="3" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">C</text>
    </g>
    <!-- Hash example — third entry dropped; the three-entry line at fs 10
         mono was ≈45 chars × 6 px ≈ 270 px, exactly the box width. -->
    <text x="135" y="200" text-anchor="middle" class="mono" font-size="10" fill="#374151">h(C) = 0x4f3a · h(N) = 0x9c12</text>
  </g>

  <!-- Step 2: aggregate r=1 -->
  <g transform="translate(330,70)">
    <rect width="270" height="220" fill="#fff" stroke="#7c3aed" stroke-width="2" rx="6"/>
    <text x="135" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">Step 2 — radius 1 hash</text>
    <text x="135" y="38" text-anchor="middle" font-size="9" fill="#525252">aggregate atom + neighbour bonds + invariants</text>

    <g transform="translate(135,130)">
      <!-- center atom highlighted with circle of radius 1 -->
      <circle cx="0" cy="0" r="42" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="3 3"/>
      <circle cx="-50" cy="0" r="14" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1"/>
      <circle cx="0" cy="-30" r="14" fill="#fde68a" stroke="#b45309" stroke-width="1"/>
      <circle cx="0" cy="30" r="14" fill="#fde68a" stroke="#b45309" stroke-width="1"/>
      <circle cx="50" cy="0" r="14" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1"/>
      <line x1="-36" y1="0" x2="-14" y2="-30" stroke="#374151"/>
      <line x1="-36" y1="0" x2="-14" y2="30" stroke="#374151"/>
      <line x1="14" y1="-30" x2="36" y2="0" stroke="#374151"/>
      <line x1="14" y1="30" x2="36" y2="0" stroke="#374151"/>
      <text x="-50" y="3" text-anchor="middle" font-size="10" font-weight="700">C</text>
      <text x="0" y="-27" text-anchor="middle" font-size="10" font-weight="700">N</text>
      <text x="0" y="33" text-anchor="middle" font-size="10" font-weight="700">O</text>
      <text x="50" y="3" text-anchor="middle" font-size="10" font-weight="700">C</text>
    </g>
    <text x="135" y="200" text-anchor="middle" class="mono" font-size="10" fill="#374151">h(C; aromatic-N, aromatic-N) = 0x82d1</text>
  </g>

  <!-- Step 3: r=2 -->
  <g transform="translate(620,70)">
    <rect width="270" height="220" fill="#fff" stroke="#065f46" stroke-width="2" rx="6"/>
    <text x="135" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">Step 3 — radius 2 hash</text>
    <text x="135" y="38" text-anchor="middle" font-size="9" fill="#525252">expand neighbourhood; new substructure id</text>

    <g transform="translate(135,130)">
      <circle cx="0" cy="0" r="68" fill="#d1fae5" stroke="#065f46" stroke-width="1.5" stroke-dasharray="3 3"/>
      <circle cx="-50" cy="0" r="14" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1"/>
      <circle cx="0" cy="-30" r="14" fill="#fde68a" stroke="#b45309" stroke-width="1"/>
      <circle cx="0" cy="30" r="14" fill="#fde68a" stroke="#b45309" stroke-width="1"/>
      <circle cx="50" cy="0" r="14" fill="#dbeafe" stroke="#1e3a8a" stroke-width="1"/>
      <line x1="-36" y1="0" x2="-14" y2="-30" stroke="#374151"/>
      <line x1="-36" y1="0" x2="-14" y2="30" stroke="#374151"/>
      <line x1="14" y1="-30" x2="36" y2="0" stroke="#374151"/>
      <line x1="14" y1="30" x2="36" y2="0" stroke="#374151"/>
      <text x="-50" y="3" text-anchor="middle" font-size="10" font-weight="700">C</text>
      <text x="0" y="-27" text-anchor="middle" font-size="10" font-weight="700">N</text>
      <text x="0" y="33" text-anchor="middle" font-size="10" font-weight="700">O</text>
      <text x="50" y="3" text-anchor="middle" font-size="10" font-weight="700">C</text>
    </g>
    <!-- Hash label — y dropped 200→214 so the radius-2 dashed circle
         (bottom edge at panel y=198) stops cutting through the glyph
         row at y=192-202. Now sits comfortably below the circle. -->
    <text x="135" y="214" text-anchor="middle" class="mono" font-size="10" fill="#374151">ECFP4 = radius 2 (diameter 4)</text>
  </g>

  <!-- Step 4: hash to bit vector -->
  <g transform="translate(910,70)">
    <rect width="250" height="220" fill="#fff" stroke="#dc2626" stroke-width="2" rx="6"/>
    <text x="125" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Step 4 — fold to bit vector</text>
    <text x="125" y="38" text-anchor="middle" font-size="9" fill="#525252">id mod n_bits → set bit</text>

    <text x="125" y="70" text-anchor="middle" class="mono" font-size="10" fill="#525252">0x82d1 mod 1024 = 209 → bit 209</text>
    <text x="125" y="86" text-anchor="middle" class="mono" font-size="10" fill="#525252">0x4f3a mod 1024 = 826 → bit 826</text>
    <text x="125" y="102" text-anchor="middle" class="mono" font-size="10" fill="#525252">...</text>

    <g transform="translate(20,120)">
      <text x="0" y="0" font-size="10" fill="#525252">1024-bit vector:</text>
      <g class="mono" font-size="9" fill="#374151">
        <text x="0" y="22">0 ... 0 0</text>
        <text x="65" y="22" fill="#dc2626" font-weight="700">1</text>
        <text x="76" y="22">0 0</text>
        <text x="100" y="22" fill="#dc2626" font-weight="700">1</text>
        <text x="111" y="22">0 0 0 0 0</text>
        <text x="161" y="22" fill="#dc2626" font-weight="700">1</text>
        <text x="172" y="22">0 0 ... 0</text>
      </g>
      <text x="0" y="60" font-size="10" fill="#dc2626" font-style="italic">collisions: 2 fragments share a bit</text>
    </g>
  </g>

  <!-- Bottom: parameters and uses -->
  <g transform="translate(40,310)">
    <rect width="1120" height="270" fill="#eff6ff" stroke="#1e3a8a" rx="6"/>
    <text x="560" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Parameters &amp; trade-offs</text>

    <g transform="translate(20,50)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#1e3a8a">Naming</text>
      <g font-size="10" fill="#374151">
        <text x="0" y="20">ECFP / Morgan are equivalent algorithms.</text>
        <text x="0" y="36">ECFP<tspan baseline-shift="sub">k</tspan> means radius k/2 (so ECFP4 = radius 2, diameter 4).</text>
        <text x="0" y="52">RDKit calls them GetMorganFingerprintAsBitVect.</text>
        <text x="0" y="68">Pharma default: ECFP4 at 1024 or 2048 bits.</text>
      </g>
    </g>

    <g transform="translate(370,50)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#1e3a8a">Radius</text>
      <g font-size="10" fill="#374151">
        <text x="0" y="20">r=1 (ECFP2): atom + nearest neighbours.</text>
        <text x="0" y="36">r=2 (ECFP4): typical default — captures functional groups.</text>
        <text x="0" y="52">r=3 (ECFP6): larger fragments; collision rate rises.</text>
        <text x="0" y="68">Larger r → more specific bits, fewer set per molecule.</text>
      </g>
    </g>

    <g transform="translate(720,50)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#1e3a8a">Bit-vector size</text>
      <g font-size="10" fill="#374151">
        <text x="0" y="20">1024 → fast, ~5–10% collision rate.</text>
        <text x="0" y="36">2048 → standard, &lt;3% collisions.</text>
        <text x="0" y="52">Sparse counts → no folding, no collisions, larger.</text>
        <text x="0" y="68">Use folded for similarity; sparse for ML features.</text>
      </g>
    </g>

    <g transform="translate(20,140)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#1e3a8a">Uses</text>
      <g font-size="10" fill="#374151">
        <text x="0" y="20">Tanimoto similarity for analog search.</text>
        <text x="0" y="36">RF / SVM / DNN inputs for QSAR (still competitive).</text>
        <text x="0" y="52">Cluster libraries by structure.</text>
      </g>
    </g>

    <g transform="translate(370,140)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#1e3a8a">Limitations</text>
      <g font-size="10" fill="#374151">
        <text x="0" y="20">Loses 3D — stereo, conformation.</text>
        <text x="0" y="36">Hash collisions blur substructures.</text>
        <text x="0" y="52">Activity cliff insensitivity (single atom flip).</text>
      </g>
    </g>

    <g transform="translate(720,140)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#dc2626">Activity cliff example</text>
      <g font-size="10" fill="#dc2626">
        <text x="0" y="20">Tanimoto(SAR neighbours) = 0.95</text>
        <text x="0" y="36">but pIC50 differs by 3 log units.</text>
        <text x="0" y="52">FP-only models miss cliffs entirely.</text>
      </g>
    </g>

    <g transform="translate(20,230)">
      <text x="0" y="0" font-size="10" fill="#92400e" class="mono">RDKit: GetMorganFingerprintAsBitVect(mol, radius=2, nBits=2048)</text>
    </g>
  </g>
</svg>
