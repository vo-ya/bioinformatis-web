<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }</style></defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Molecular docking — pose search inside a binding pocket, scored by physics-inspired energy</text>

  <!-- Left: protein pocket cartoon -->
  <g transform="translate(40,70)">
    <rect width="540" height="440" fill="#fff" stroke="#1e3a8a" stroke-width="2" rx="6"/>
    <text x="270" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Pocket + ligand poses</text>
    <text x="270" y="40" text-anchor="middle" font-size="10" fill="#525252">grid box defines search volume</text>

    <!-- protein blob -->
    <path d="M 80 200 Q 60 80 200 70 Q 360 60 460 130 Q 510 200 470 320 Q 420 420 280 410 Q 120 410 80 320 Z" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
    <text x="120" y="370" font-size="11" fill="#1e3a8a" font-weight="700">Protein receptor</text>

    <!-- pocket cavity -->
    <path d="M 200 180 Q 200 150 240 150 Q 320 150 360 180 Q 400 200 380 260 Q 350 320 280 320 Q 210 320 200 260 Z" fill="#fff" stroke="#7c3aed" stroke-width="2" stroke-dasharray="4 4"/>
    <text x="290" y="160" font-size="10" fill="#7c3aed" font-style="italic">binding pocket</text>

    <!-- grid box -->
    <rect x="195" y="155" width="195" height="170" fill="none" stroke="#b45309" stroke-width="1.5" stroke-dasharray="2 2"/>
    <text x="395" y="160" font-size="9" fill="#b45309">grid: 20×20×20 Å</text>

    <!-- pose 1 (best) -->
    <g transform="translate(280,235)" stroke="#dc2626" stroke-width="1.5" fill="none">
      <line x1="-30" y1="0" x2="-15" y2="-15"/>
      <line x1="-15" y1="-15" x2="0" y2="0"/>
      <line x1="0" y1="0" x2="15" y2="-15"/>
      <line x1="15" y1="-15" x2="30" y2="0"/>
      <line x1="0" y1="0" x2="0" y2="20"/>
      <circle cx="-30" cy="0" r="4" fill="#dc2626"/>
      <circle cx="-15" cy="-15" r="4" fill="#dc2626"/>
      <circle cx="0" cy="0" r="4" fill="#dc2626"/>
      <circle cx="15" cy="-15" r="4" fill="#dc2626"/>
      <circle cx="30" cy="0" r="4" fill="#dc2626"/>
      <circle cx="0" cy="20" r="4" fill="#dc2626"/>
    </g>
    <text x="280" y="280" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="700">pose 1: −9.4 kcal/mol</text>

    <!-- key residues -->
    <g font-size="10" font-weight="700">
      <circle cx="220" cy="200" r="11" fill="#fde68a" stroke="#b45309"/><text x="220" y="203" text-anchor="middle" fill="#92400e">D</text>
      <circle cx="350" cy="200" r="11" fill="#a7f3d0" stroke="#065f46"/><text x="350" y="203" text-anchor="middle" fill="#065f46">H</text>
      <circle cx="370" cy="290" r="11" fill="#dbeafe" stroke="#1e3a8a"/><text x="370" y="293" text-anchor="middle" fill="#1e3a8a">F</text>
    </g>
    <g font-size="9" fill="#525252">
      <text x="195" y="218">Asp82</text>
      <text x="375" y="200">His164</text>
      <text x="380" y="295">Phe211</text>
    </g>

    <!-- H-bonds -->
    <g stroke="#7c3aed" stroke-width="1" stroke-dasharray="2 2">
      <line x1="231" y1="200" x2="250" y2="220"/>
      <line x1="339" y1="200" x2="320" y2="220"/>
    </g>
  </g>

  <!-- Right: scoring function -->
  <g transform="translate(610,70)">
    <rect width="550" height="440" fill="#fff" stroke="#7c3aed" stroke-width="2" rx="6"/>
    <text x="275" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">AutoDock Vina scoring</text>
    <text x="275" y="40" text-anchor="middle" font-size="10" fill="#525252">empirical ΔG ≈ ∑ weighted pairwise terms</text>

    <!-- formula -->
    <g transform="translate(20,60)">
      <text x="0" y="20" class="mono" font-size="13" fill="#111827">ΔG = w₁·gauss + w₂·repulsion + w₃·H-bond</text>
      <text x="56" y="40" class="mono" font-size="13" fill="#111827">+ w₄·hydrophobic + w₅·rotors</text>
    </g>

    <!-- term breakdown -->
    <g transform="translate(20,130)">
      <line x1="0" y1="0" x2="510" y2="0" stroke="#7c3aed"/>
      <g font-size="10" font-weight="700" fill="#7c3aed">
        <text x="0" y="18">Term</text>
        <text x="200" y="18">Form</text>
        <text x="380" y="18">Captures</text>
      </g>
      <line x1="0" y1="28" x2="510" y2="28" stroke="#7c3aed"/>

      <g font-size="10" fill="#374151">
        <text x="0" y="48">Gauss attraction</text>
        <text x="200" y="48" class="mono">exp(−(d/0.5)²)</text>
        <text x="380" y="48">close vdW contact</text>

        <text x="0" y="70">Repulsion</text>
        <text x="200" y="70" class="mono">d&lt;0 → d²</text>
        <text x="380" y="70">steric clash</text>

        <text x="0" y="92">Hydrogen bond</text>
        <text x="200" y="92" class="mono">linear, d∈[0,0.7Å]</text>
        <text x="380" y="92">N/O donor↔acceptor</text>

        <text x="0" y="114">Hydrophobic</text>
        <text x="200" y="114" class="mono">linear, d∈[0.5,1.5Å]</text>
        <text x="380" y="114">non-polar contact</text>

        <text x="0" y="136">Rotors penalty</text>
        <text x="200" y="136" class="mono">+0.06 · n_rot</text>
        <text x="380" y="136">entropic cost</text>
      </g>
    </g>

    <!-- search algorithm -->
    <g transform="translate(20,290)">
      <rect width="510" height="50" fill="#fef3c7" stroke="#b45309" rx="4"/>
      <text x="10" y="20" font-size="11" font-weight="700" fill="#92400e">Search</text>
      <text x="60" y="20" font-size="10" fill="#92400e">Iterated local search (Vina)</text>
      <text x="10" y="40" font-size="10" fill="#92400e">Mutate torsions/translation → BFGS local minimization → accept/reject by Metropolis</text>
    </g>

    <!-- typical ranges -->
    <g transform="translate(20,360)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#1e3a8a">Score interpretation (very rough)</text>
      <g font-size="10" fill="#374151">
        <text x="0" y="22">ΔG &gt; −5 kcal/mol → unlikely binder</text>
        <text x="0" y="38">ΔG ∈ [−7, −9] → weak/moderate binder, worth follow-up</text>
        <text x="0" y="54">ΔG &lt; −9 → strong predicted binder, but rank ordering is noisy</text>
      </g>
    </g>
  </g>

  <!-- footer -->
  <g transform="translate(40,530)">
    <rect width="1120" height="50" fill="#fee2e2" stroke="#dc2626" rx="4"/>
    <text x="560" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">Vina is a SCORING function, not a true ΔG. Use it to rank, not to predict affinity. Top-N from docking → MD/FEP for refinement.</text>
    <text x="560" y="40" text-anchor="middle" font-size="10" fill="#991b1b">Vina paper: Trott &amp; Olson 2010 (J Comput Chem). AutoDock Vina is open source — github.com/ccsb-scripps/AutoDock-Vina</text>
  </g>
</svg>
