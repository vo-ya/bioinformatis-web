<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }</style></defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">ADMET radar — Absorption · Distribution · Metabolism · Excretion · Toxicity at-a-glance</text>

  <!-- Compound A radar -->
  <g transform="translate(60,80)">
    <rect width="380" height="440" fill="#fff" stroke="#065f46" stroke-width="2" rx="6"/>
    <text x="190" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Compound A — clean profile</text>
    <text x="190" y="40" text-anchor="middle" font-size="10" fill="#525252">all 8 axes within green band</text>

    <g transform="translate(190,240)">
      <!-- background grid -->
      <g fill="none" stroke="#e5e7eb">
        <polygon points="0,-150 130,-75 130,75 0,150 -130,75 -130,-75" stroke-width="1" stroke-dasharray="2 2"/>
        <polygon points="0,-100 87,-50 87,50 0,100 -87,50 -87,-50" stroke-width="1" stroke-dasharray="2 2"/>
        <polygon points="0,-50 43,-25 43,25 0,50 -43,25 -43,-25" stroke-width="1" stroke-dasharray="2 2"/>
      </g>
      <!-- green target band (good zone) -->
      <polygon points="0,-110 95,-55 95,55 0,110 -95,55 -95,-55" fill="#d1fae5" opacity="0.4"/>

      <!-- axes -->
      <g stroke="#9ca3af" stroke-width="1">
        <line x1="0" y1="0" x2="0" y2="-150"/>
        <line x1="0" y1="0" x2="130" y2="-75"/>
        <line x1="0" y1="0" x2="130" y2="75"/>
        <line x1="0" y1="0" x2="0" y2="150"/>
        <line x1="0" y1="0" x2="-130" y2="75"/>
        <line x1="0" y1="0" x2="-130" y2="-75"/>
      </g>

      <!-- compound A polygon (good values) -->
      <polygon points="0,-100 90,-52 80,46 0,90 -85,49 -90,-52" fill="#065f46" fill-opacity="0.35" stroke="#065f46" stroke-width="2"/>
      <g fill="#065f46">
        <circle cx="0" cy="-100" r="4"/>
        <circle cx="90" cy="-52" r="4"/>
        <circle cx="80" cy="46" r="4"/>
        <circle cx="0" cy="90" r="4"/>
        <circle cx="-85" cy="49" r="4"/>
        <circle cx="-90" cy="-52" r="4"/>
      </g>

      <!-- axis labels -->
      <g font-size="10" fill="#374151" text-anchor="middle">
        <text x="0" y="-160">Solubility</text>
        <text x="150" y="-72">Permeability</text>
        <text x="150" y="86">Metabolism</text>
        <text x="0" y="172">hERG safety</text>
        <text x="-150" y="86">CYP3A4</text>
        <text x="-150" y="-72">PPB</text>
      </g>
    </g>

    <text x="190" y="420" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">→ progress to lead optimization</text>
  </g>

  <!-- Compound B radar -->
  <g transform="translate(450,80)">
    <rect width="380" height="440" fill="#fff" stroke="#dc2626" stroke-width="2" rx="6"/>
    <text x="190" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">Compound B — hERG flag</text>
    <text x="190" y="40" text-anchor="middle" font-size="10" fill="#525252">cardiac liability outside band</text>

    <g transform="translate(190,240)">
      <g fill="none" stroke="#e5e7eb">
        <polygon points="0,-150 130,-75 130,75 0,150 -130,75 -130,-75" stroke-width="1" stroke-dasharray="2 2"/>
        <polygon points="0,-100 87,-50 87,50 0,100 -87,50 -87,-50" stroke-width="1" stroke-dasharray="2 2"/>
        <polygon points="0,-50 43,-25 43,25 0,50 -43,25 -43,-25" stroke-width="1" stroke-dasharray="2 2"/>
      </g>
      <polygon points="0,-110 95,-55 95,55 0,110 -95,55 -95,-55" fill="#d1fae5" opacity="0.4"/>

      <g stroke="#9ca3af" stroke-width="1">
        <line x1="0" y1="0" x2="0" y2="-150"/>
        <line x1="0" y1="0" x2="130" y2="-75"/>
        <line x1="0" y1="0" x2="130" y2="75"/>
        <line x1="0" y1="0" x2="0" y2="150"/>
        <line x1="0" y1="0" x2="-130" y2="75"/>
        <line x1="0" y1="0" x2="-130" y2="-75"/>
      </g>

      <!-- compound B polygon: bad on hERG (south) -->
      <polygon points="0,-90 95,-55 75,42 0,140 -85,49 -75,-43" fill="#dc2626" fill-opacity="0.35" stroke="#dc2626" stroke-width="2"/>
      <g fill="#dc2626">
        <circle cx="0" cy="-90" r="4"/>
        <circle cx="95" cy="-55" r="4"/>
        <circle cx="75" cy="42" r="4"/>
        <circle cx="0" cy="140" r="6" stroke="#dc2626" stroke-width="2" fill="#fff"/>
        <circle cx="-85" cy="49" r="4"/>
        <circle cx="-75" cy="-43" r="4"/>
      </g>

      <g font-size="10" fill="#374151" text-anchor="middle">
        <text x="0" y="-160">Solubility</text>
        <text x="150" y="-72">Permeability</text>
        <text x="150" y="86">Metabolism</text>
        <text x="0" y="172" fill="#dc2626" font-weight="700">hERG ⚠ FAIL</text>
        <text x="-150" y="86">CYP3A4</text>
        <text x="-150" y="-72">PPB</text>
      </g>
    </g>

    <text x="190" y="420" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">→ kill or redesign (hERG → arrhythmia)</text>
  </g>

  <!-- Right: ADMET endpoints reference -->
  <g transform="translate(840,80)">
    <rect width="320" height="440" fill="#fff" stroke="#1e3a8a" stroke-width="2" rx="6"/>
    <text x="160" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Key ADMET endpoints</text>
    <text x="160" y="40" text-anchor="middle" font-size="10" fill="#525252">representative datasets / models</text>

    <g transform="translate(20,60)">
      <g font-size="10" fill="#111827">
        <text x="0" y="0" font-weight="700" fill="#1e3a8a">A — Absorption</text>
        <text x="0" y="16">Caco-2 permeability (Wang 2016, n=906)</text>
        <text x="0" y="32">HIA (Hou 2007, n=578)</text>
        <text x="0" y="48">Pgp substrate / inhibitor</text>

        <text x="0" y="78" font-weight="700" fill="#1e3a8a">D — Distribution</text>
        <text x="0" y="94">Plasma protein binding</text>
        <text x="0" y="110">Volume of distribution (Lombardo)</text>
        <text x="0" y="126">BBB permeability (Martins 2012)</text>

        <text x="0" y="156" font-weight="700" fill="#1e3a8a">M — Metabolism</text>
        <text x="0" y="172">CYP450 inhibition (1A2, 2C9, 2C19, 2D6, 3A4)</text>
        <text x="0" y="188">CYP substrate flag</text>
        <text x="0" y="204">Microsomal clearance</text>

        <text x="0" y="234" font-weight="700" fill="#1e3a8a">E — Excretion</text>
        <text x="0" y="250">Half-life (t<tspan baseline-shift="sub">1/2</tspan>)</text>
        <text x="0" y="266">Renal clearance</text>

        <text x="0" y="296" font-weight="700" fill="#dc2626">T — Toxicity</text>
        <text x="0" y="312" fill="#dc2626">hERG (Wang 2016)</text>
        <text x="0" y="328" fill="#dc2626">AMES mutagenicity</text>
        <text x="0" y="344" fill="#dc2626">DILI / hepatotoxicity</text>
        <text x="0" y="360" fill="#dc2626">LD50 (acute oral, Tox21)</text>
      </g>
    </g>
  </g>

  <!-- footer -->
  <g transform="translate(60,540)">
    <rect width="1100" height="50" fill="#eff6ff" stroke="#1e3a8a" rx="4"/>
    <text x="20" y="20" font-size="10" font-weight="700" fill="#1e3a8a">Free tools:</text>
    <text x="100" y="20" font-size="10" fill="#1e3a8a">ADMETlab 3.0 (admetlab3.scbdd.com), SwissADME (swissadme.ch), pkCSM, DeepPurpose.</text>
    <text x="20" y="38" font-size="10" font-weight="700" fill="#92400e">Use as triage:</text>
    <text x="120" y="38" font-size="10" fill="#92400e">predictions are noisy in absolute terms but rank-correlate well — apply gating not absolute filters.</text>
  </g>
</svg>
