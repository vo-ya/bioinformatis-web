<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }</style></defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Deep learning workflow for molecular property prediction</text>

  <!-- Step boxes across top -->
  <g transform="translate(40,80)">
    <!-- Data -->
    <g>
      <rect width="200" height="140" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2" rx="6"/>
      <text x="100" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">1. Data</text>
      <g font-size="10" fill="#1e3a8a">
        <text x="14" y="42">SMILES + label</text>
        <text x="14" y="58">e.g., (CCO, soluble=1)</text>
        <text x="14" y="78">Sources:</text>
        <text x="14" y="94">· ChEMBL (2.4M)</text>
        <text x="14" y="110">· PubChem BioAssay</text>
        <text x="14" y="126">· MoleculeNet, TDC</text>
      </g>
    </g>

    <!-- Featurize -->
    <g transform="translate(220,0)">
      <rect width="200" height="140" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" rx="6"/>
      <text x="100" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">2. Featurize</text>
      <g font-size="10" fill="#7c3aed">
        <text x="14" y="42">Choices:</text>
        <text x="14" y="58">· ECFP4 (2048-bit)</text>
        <text x="14" y="74">· Tokenized SMILES</text>
        <text x="14" y="90">· Graph (atoms+bonds)</text>
        <text x="14" y="106">· 3D conformers</text>
        <text x="14" y="126">RDKit, DGL-LifeSci</text>
      </g>
    </g>

    <!-- Split -->
    <g transform="translate(440,0)">
      <rect width="200" height="140" fill="#fef3c7" stroke="#b45309" stroke-width="2" rx="6"/>
      <text x="100" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">3. Split</text>
      <g font-size="10" fill="#92400e">
        <text x="14" y="42">Random ❌ leaks SAR</text>
        <text x="14" y="58">Scaffold ✓ realistic</text>
        <text x="14" y="74">Time / chronological ✓</text>
        <text x="14" y="90">Stratified by activity</text>
        <text x="14" y="110">80/10/10 train/val/test</text>
        <text x="14" y="126" font-weight="700">scaffold split for SAR</text>
      </g>
    </g>

    <!-- Train -->
    <g transform="translate(660,0)">
      <rect width="200" height="140" fill="#d1fae5" stroke="#065f46" stroke-width="2" rx="6"/>
      <text x="100" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">4. Train</text>
      <g font-size="10" fill="#065f46">
        <text x="14" y="42">Model zoo:</text>
        <text x="14" y="58">· RF / GBT (FP)</text>
        <text x="14" y="74">· MPNN, GIN (graph)</text>
        <text x="14" y="90">· Chemprop (D-MPNN)</text>
        <text x="14" y="106">· SMILES-LM</text>
        <text x="14" y="126">PyTorch + DGL/PyG</text>
      </g>
    </g>

    <!-- Validate -->
    <g transform="translate(880,0)">
      <rect width="240" height="140" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="6"/>
      <text x="120" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">5. Validate &amp; deploy</text>
      <g font-size="10" fill="#991b1b">
        <text x="14" y="42">Metrics:</text>
        <text x="14" y="58">· ROC-AUC, PR-AUC</text>
        <text x="14" y="74">· R², RMSE for regression</text>
        <text x="14" y="90">Applicability domain</text>
        <text x="14" y="106">Calibration (Brier, ECE)</text>
        <text x="14" y="126">Prospective test set</text>
      </g>
    </g>

    <!-- arrows -->
    <g stroke="#374151" stroke-width="2" fill="none">
      <line x1="200" y1="70" x2="220" y2="70" marker-end="url(#a26b)"/>
      <line x1="420" y1="70" x2="440" y2="70" marker-end="url(#a26b)"/>
      <line x1="640" y1="70" x2="660" y2="70" marker-end="url(#a26b)"/>
      <line x1="860" y1="70" x2="880" y2="70" marker-end="url(#a26b)"/>
    </g>
    <defs>
      <marker id="a26b" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 z" fill="#374151"/>
      </marker>
    </defs>
  </g>

  <!-- Architecture diagram (graph NN) -->
  <g transform="translate(40,260)">
    <rect width="700" height="300" fill="#fff" stroke="#1e3a8a" stroke-width="2" rx="6"/>
    <text x="350" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Architecture: D-MPNN (Chemprop)</text>

    <!-- input mol -->
    <g transform="translate(60,150)">
      <text x="40" y="-40" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Input molecule</text>
      <g font-size="9" fill="#fff" font-weight="700">
        <circle cx="0" cy="0" r="10" fill="#1e3a8a"/><text x="0" y="3" text-anchor="middle">C</text>
        <circle cx="40" cy="-30" r="10" fill="#1e3a8a"/><text x="40" y="-27" text-anchor="middle">C</text>
        <circle cx="40" cy="30" r="10" fill="#dc2626"/><text x="40" y="33" text-anchor="middle">N</text>
        <circle cx="80" cy="0" r="10" fill="#b45309"/><text x="80" y="3" text-anchor="middle">O</text>
      </g>
      <g stroke="#374151" stroke-width="1.5">
        <line x1="10" y1="-3" x2="30" y2="-27"/>
        <line x1="10" y1="3" x2="30" y2="27"/>
        <line x1="50" y1="-25" x2="70" y2="-3"/>
        <line x1="50" y1="25" x2="70" y2="3"/>
      </g>
    </g>

    <!-- arrow -->
    <g stroke="#374151" stroke-width="2" fill="none">
      <line x1="170" y1="150" x2="220" y2="150" marker-end="url(#a26b)"/>
    </g>
    <text x="195" y="135" text-anchor="middle" font-size="9" fill="#525252">embed</text>

    <!-- message passing -->
    <g transform="translate(240,90)">
      <rect width="200" height="120" fill="#ede9fe" stroke="#7c3aed" rx="4"/>
      <text x="100" y="24" text-anchor="middle" font-size="11" font-weight="700" fill="#7c3aed">Message passing × T</text>
      <text x="100" y="48" text-anchor="middle" class="mono" font-size="10" fill="#7c3aed">m_uv = ReLU(W·[h_u, e_uv])</text>
      <text x="100" y="68" text-anchor="middle" class="mono" font-size="10" fill="#7c3aed">h_v = h_v + Σ m_uv</text>
      <text x="100" y="92" text-anchor="middle" font-size="10" fill="#525252">T = 3 hops typical</text>
    </g>

    <line x1="450" y1="150" x2="490" y2="150" stroke="#374151" stroke-width="2" marker-end="url(#a26b)"/>
    <text x="470" y="135" text-anchor="middle" font-size="9" fill="#525252">read out</text>

    <!-- pool + MLP -->
    <g transform="translate(510,90)">
      <rect width="170" height="120" fill="#d1fae5" stroke="#065f46" rx="4"/>
      <text x="85" y="24" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">Sum-pool → MLP</text>
      <text x="85" y="48" text-anchor="middle" class="mono" font-size="10" fill="#065f46">h_G = Σ h_v</text>
      <text x="85" y="68" text-anchor="middle" class="mono" font-size="10" fill="#065f46">ŷ = σ(W₂·ReLU(W₁·h_G))</text>
      <text x="85" y="96" text-anchor="middle" font-size="10" fill="#525252">single scalar output</text>
    </g>

    <text x="350" y="260" text-anchor="middle" font-size="10" fill="#525252">Yang et al. 2019, Analyzing Learned Molecular Representations for Property Prediction (J Chem Inf Model)</text>
  </g>

  <!-- Pitfalls box -->
  <g transform="translate(760,260)">
    <rect width="400" height="300" fill="#fef3c7" stroke="#b45309" stroke-width="2" rx="6"/>
    <text x="200" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Common pitfalls</text>

    <g transform="translate(20,50)" font-size="10" fill="#92400e">
      <text x="0" y="0" font-weight="700">1. Random splits leak SAR</text>
      <text x="0" y="16">Scaffold split → 5–15% AUC drop</text>
      <text x="0" y="32">— this is the realistic number</text>

      <text x="0" y="60" font-weight="700">2. Activity cliffs</text>
      <text x="0" y="76">Models smooth past them.</text>
      <text x="0" y="92">Test on MoleculeACE benchmark.</text>

      <text x="0" y="120" font-weight="700">3. Out-of-domain inputs</text>
      <text x="0" y="136">Fingerprint Tanimoto &lt; 0.4 to train</text>
      <text x="0" y="152">→ predictions ~ noise.</text>

      <text x="0" y="180" font-weight="700">4. Overestimating performance</text>
      <text x="0" y="196">Reproducible benchmarks: TDC,</text>
      <text x="0" y="212">MoleculeNet, Therapeutic Data Commons.</text>

      <text x="0" y="240" font-weight="700">5. Confusing classification &amp; regression</text>
      <text x="0" y="256">log-K_i → regression; binder/non- → cls.</text>
    </g>
  </g>
</svg>
