<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }</style></defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Chemical space — synthesizable space ≈ 10⁶⁰; drug-like enumerated ≈ 10¹⁰; we screen 10⁵</text>

  <!-- Universe -->
  <g transform="translate(60,80)">
    <rect width="700" height="440" fill="#fff" stroke="#1e3a8a" stroke-width="2" rx="6"/>
    <text x="350" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Nested chemical-space view</text>

    <!-- universe -->
    <ellipse cx="350" cy="240" rx="320" ry="180" fill="#eff6ff" stroke="#1e3a8a" stroke-width="2"/>
    <text x="350" y="86" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Theoretical chemical space</text>
    <text x="350" y="102" text-anchor="middle" font-size="11" fill="#1e3a8a" class="mono">~10⁶⁰ molecules ≤30 heavy atoms</text>

    <!-- synthesizable -->
    <ellipse cx="350" cy="270" rx="240" ry="130" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="350" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">Practically synthesizable</text>
    <text x="350" y="194" text-anchor="middle" font-size="11" fill="#7c3aed" class="mono">~10¹⁵–10²⁰ (Enamine REAL: 4.6B)</text>

    <!-- drug-like -->
    <ellipse cx="350" cy="295" rx="170" ry="90" fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
    <text x="350" y="246" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">Drug-like (Lipinski-ish)</text>
    <text x="350" y="262" text-anchor="middle" font-size="11" fill="#065f46" class="mono">~10¹⁰</text>

    <!-- screened -->
    <ellipse cx="350" cy="320" rx="100" ry="50" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
    <text x="350" y="312" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Screened (HTS lib)</text>
    <text x="350" y="326" text-anchor="middle" font-size="10" fill="#92400e" class="mono">10⁵–10⁶</text>

    <!-- known drugs -->
    <ellipse cx="350" cy="345" rx="40" ry="20" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="350" y="350" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b">approved ~5K</text>
  </g>

  <!-- Numbers and methods (right) -->
  <g transform="translate(790,80)">
    <rect width="370" height="440" fill="#fff" stroke="#374151" stroke-width="2" rx="6"/>
    <text x="185" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">Why this matters</text>

    <g transform="translate(20,50)" font-size="10" fill="#111827">
      <text x="0" y="0" font-weight="700" fill="#1e3a8a">10⁶⁰ — combinatorics</text>
      <text x="0" y="16">All molecules with ≤30 heavy atoms</text>
      <text x="0" y="32">(Bohacek et al. 1996).</text>
      <text x="0" y="48">Most are unsynthesizable / unstable.</text>

      <text x="0" y="76" font-weight="700" fill="#7c3aed">10¹⁵ — REAL space</text>
      <text x="0" y="92">Enumerable from reliable reactions</text>
      <text x="0" y="108">(Enamine REAL = 4.6B + variants).</text>
      <text x="0" y="124">"Make-on-demand" libraries.</text>

      <text x="0" y="152" font-weight="700" fill="#065f46">10¹⁰ — drug-like</text>
      <text x="0" y="168">Lipinski / QED filters applied.</text>
      <text x="0" y="184">GDB-17: 166B "small" molecules.</text>

      <text x="0" y="212" font-weight="700" fill="#92400e">10⁵–10⁶ — HTS</text>
      <text x="0" y="228">Pharma screening collection.</text>
      <text x="0" y="244">Each well ≈ $1 → $1M for 1M cmpd.</text>

      <text x="0" y="272" font-weight="700" fill="#dc2626">~5,000 — approved drugs</text>
      <text x="0" y="288">DrugBank approved set.</text>
      <text x="0" y="304">After 75+ years of medicinal chemistry.</text>

      <text x="0" y="340" font-weight="700">Implication for AI</text>
      <text x="0" y="356">Generative models can sample 10⁶ candidates;</text>
      <text x="0" y="372">filter to 10² for synthesis ⇒ enrichment by 10⁴.</text>
      <text x="0" y="388">But: must score AND respect chemistry.</text>
    </g>
  </g>
</svg>
