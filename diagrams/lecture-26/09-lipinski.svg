<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }</style></defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Lipinski Ro5, Veber, QED — drug-likeness rules of thumb (orally bioavailable small molecules)</text>

  <!-- Lipinski card -->
  <g transform="translate(40,80)">
    <rect width="370" height="240" fill="#fff" stroke="#1e3a8a" stroke-width="2" rx="6"/>
    <text x="185" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Lipinski Ro5 (1997)</text>
    <text x="185" y="40" text-anchor="middle" font-size="10" fill="#525252">≥2 violations → poor oral bioavailability</text>

    <g transform="translate(20,60)" font-size="11" fill="#111827">
      <text x="0" y="0">⃝ MW ≤ 500 Da</text>
      <text x="0" y="22">⃝ logP ≤ 5</text>
      <text x="0" y="44">⃝ H-bond donors ≤ 5 (NH, OH)</text>
      <text x="0" y="66">⃝ H-bond acceptors ≤ 10 (N, O)</text>

      <text x="0" y="100" font-weight="700" fill="#1e3a8a">Origin</text>
      <text x="0" y="118" fill="#374151">Pfizer set of 2,245 drug candidates;</text>
      <text x="0" y="134" fill="#374151">these were the cutoffs at the 90th percentile</text>
      <text x="0" y="150" fill="#374151">of the orally administered subset.</text>

      <text x="0" y="180" fill="#dc2626" font-style="italic">Not a hard filter — antibiotics, peptides,</text>
      <text x="0" y="196" fill="#dc2626" font-style="italic">PROTACs routinely violate.</text>
    </g>
  </g>

  <!-- Veber card -->
  <g transform="translate(420,80)">
    <rect width="370" height="240" fill="#fff" stroke="#7c3aed" stroke-width="2" rx="6"/>
    <text x="185" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">Veber Rules (2002)</text>
    <text x="185" y="40" text-anchor="middle" font-size="10" fill="#525252">complements Ro5 — focuses on flexibility</text>

    <g transform="translate(20,60)" font-size="11" fill="#111827">
      <text x="0" y="0">⃝ Rotatable bonds ≤ 10</text>
      <text x="0" y="22">⃝ TPSA ≤ 140 Å² (or HBD+HBA ≤ 12)</text>

      <text x="0" y="60" font-weight="700" fill="#7c3aed">Why TPSA?</text>
      <text x="0" y="78" fill="#374151">Topological polar surface area predicts</text>
      <text x="0" y="94" fill="#374151">membrane permeability (Caco-2) better</text>
      <text x="0" y="110" fill="#374151">than HBD+HBA alone.</text>

      <text x="0" y="140" font-weight="700" fill="#7c3aed">Why rotatable bonds?</text>
      <text x="0" y="158" fill="#374151">Each free torsion costs ~0.6 kcal/mol</text>
      <text x="0" y="174" fill="#374151">in entropic penalty on binding.</text>

      <text x="0" y="204" fill="#525252">Source: GlaxoSmithKline rat oral data,</text>
      <text x="0" y="220" fill="#525252">n=1,100 compounds.</text>
    </g>
  </g>

  <!-- QED card -->
  <g transform="translate(800,80)">
    <rect width="370" height="240" fill="#fff" stroke="#065f46" stroke-width="2" rx="6"/>
    <text x="185" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">QED (Bickerton 2012)</text>
    <text x="185" y="40" text-anchor="middle" font-size="10" fill="#525252">Quantitative Estimate of Drug-likeness</text>

    <g transform="translate(20,60)" font-size="11" fill="#111827">
      <text x="0" y="0" font-weight="700" fill="#065f46">QED ∈ [0, 1]</text>
      <text x="0" y="20" fill="#374151">geometric mean of 8 desirability functions:</text>
      <text x="0" y="38" class="mono" fill="#374151">MW, logP, HBA, HBD, TPSA, RotB, AROM, ALERTS</text>

      <text x="0" y="68" font-weight="700">Interpretation</text>
      <text x="0" y="86" fill="#374151">QED &gt; 0.8 → highly drug-like (top decile)</text>
      <text x="0" y="102" fill="#374151">QED &gt; 0.6 → drug-like</text>
      <text x="0" y="118" fill="#374151">QED &lt; 0.4 → unlikely drug</text>

      <text x="0" y="148" font-weight="700">Why useful?</text>
      <text x="0" y="166" fill="#374151">Single continuous score → great for</text>
      <text x="0" y="182" fill="#374151">multi-objective optimization in generative</text>
      <text x="0" y="198" fill="#374151">models (RL reward, scaffold hopping).</text>
    </g>
  </g>

  <!-- Examples table -->
  <g transform="translate(40,340)">
    <rect width="1120" height="240" fill="#fff" stroke="#374151" stroke-width="2" rx="6"/>
    <text x="560" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">Examples — pass/fail by drug class</text>

    <g transform="translate(20,50)">
      <line x1="0" y1="0" x2="1080" y2="0" stroke="#374151"/>
      <g font-size="10" font-weight="700" fill="#111827">
        <text x="0" y="20">Compound</text>
        <text x="160" y="20">MW</text>
        <text x="240" y="20">logP</text>
        <text x="320" y="20">HBD</text>
        <text x="400" y="20">HBA</text>
        <text x="480" y="20">TPSA</text>
        <text x="570" y="20">RotB</text>
        <text x="650" y="20">QED</text>
        <text x="740" y="20">Ro5 viol</text>
        <text x="850" y="20">Verdict</text>
      </g>
      <line x1="0" y1="30" x2="1080" y2="30" stroke="#374151"/>

      <g font-size="10" fill="#374151" class="mono">
        <text x="0" y="50">aspirin</text>
        <text x="160" y="50">180</text><text x="240" y="50">1.2</text><text x="320" y="50">1</text><text x="400" y="50">3</text><text x="480" y="50">63.6</text><text x="570" y="50">3</text><text x="650" y="50">0.55</text><text x="740" y="50">0</text>
        <text x="850" y="50" fill="#065f46" font-weight="700">PASS</text>

        <text x="0" y="72">caffeine</text>
        <text x="160" y="72">194</text><text x="240" y="72">−0.1</text><text x="320" y="72">0</text><text x="400" y="72">3</text><text x="480" y="72">58.4</text><text x="570" y="72">0</text><text x="650" y="72">0.54</text><text x="740" y="72">0</text>
        <text x="850" y="72" fill="#065f46" font-weight="700">PASS</text>

        <text x="0" y="94">imatinib (Gleevec)</text>
        <text x="160" y="94">493</text><text x="240" y="94">3.5</text><text x="320" y="94">2</text><text x="400" y="94">7</text><text x="480" y="94">86.3</text><text x="570" y="94">7</text><text x="650" y="94">0.45</text><text x="740" y="94">0</text>
        <text x="850" y="94" fill="#065f46" font-weight="700">PASS (borderline MW)</text>

        <text x="0" y="116">atorvastatin</text>
        <text x="160" y="116">559</text><text x="240" y="116">5.0</text><text x="320" y="116">2</text><text x="400" y="116">5</text><text x="480" y="116">112</text><text x="570" y="116">12</text><text x="650" y="116">0.34</text><text x="740" y="116">2</text>
        <text x="850" y="116" fill="#b45309" font-weight="700">2 viol — yet billion-$ drug</text>

        <text x="0" y="138">cyclosporin A</text>
        <text x="160" y="138">1203</text><text x="240" y="138">3.0</text><text x="320" y="138">5</text><text x="400" y="138">12</text><text x="480" y="138">279</text><text x="570" y="138">15</text><text x="650" y="138">0.13</text><text x="740" y="138">3</text>
        <text x="850" y="138" fill="#dc2626" font-weight="700">3 viol — peptide; works!</text>

        <text x="0" y="160">rapamycin</text>
        <text x="160" y="160">914</text><text x="240" y="160">6.0</text><text x="320" y="160">3</text><text x="400" y="160">13</text><text x="480" y="160">195</text><text x="570" y="160">6</text><text x="650" y="160">0.18</text><text x="740" y="160">3</text>
        <text x="850" y="160" fill="#dc2626" font-weight="700">3 viol — natural product</text>
      </g>
    </g>

    <g transform="translate(20,220)">
      <text x="0" y="0" font-size="10" fill="#92400e" font-weight="700">Bottom line:</text>
      <text x="100" y="0" font-size="10" fill="#92400e">Use Ro5/QED to triage chemical libraries and bias generative models — never to kill a real lead.</text>
    </g>
  </g>
</svg>
