<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }</style></defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Hit → Lead → Candidate — the three SAR cycles that turn an HTS hit into a clinical molecule</text>

  <!-- Phase boxes -->
  <g transform="translate(40,80)">
    <!-- HIT -->
    <g>
      <rect width="240" height="100" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2" rx="6"/>
      <text x="120" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">HIT</text>
      <g font-size="10" fill="#1e3a8a">
        <text x="14" y="46">IC50: ~1–10 µM</text>
        <text x="14" y="62">drug-like? maybe</text>
        <text x="14" y="78">selectivity: unknown</text>
        <text x="14" y="94">~10,000 hits / screen</text>
      </g>
    </g>

    <!-- LEAD -->
    <g transform="translate(380,0)">
      <rect width="240" height="100" fill="#fef3c7" stroke="#b45309" stroke-width="2" rx="6"/>
      <text x="120" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">LEAD</text>
      <g font-size="10" fill="#92400e">
        <text x="14" y="46">IC50: ~50–500 nM</text>
        <text x="14" y="62">drug-like (Ro5 mostly)</text>
        <text x="14" y="78">selectivity: 10–100×</text>
        <text x="14" y="94">~25 leads</text>
      </g>
    </g>

    <!-- CANDIDATE -->
    <g transform="translate(760,0)">
      <rect width="240" height="100" fill="#d1fae5" stroke="#065f46" stroke-width="2" rx="6"/>
      <text x="120" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">CANDIDATE</text>
      <g font-size="10" fill="#065f46">
        <text x="14" y="46">IC50: ≤10 nM</text>
        <text x="14" y="62">all ADMET green</text>
        <text x="14" y="78">selective, clean tox</text>
        <text x="14" y="94">1–3 PCC</text>
      </g>
    </g>

    <!-- arrows -->
    <g stroke="#374151" stroke-width="2" fill="none">
      <line x1="240" y1="50" x2="380" y2="50" marker-end="url(#a26h)"/>
      <line x1="620" y1="50" x2="760" y2="50" marker-end="url(#a26h)"/>
    </g>
    <defs>
      <marker id="a26h" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
        <path d="M0,0 L8,4 L0,8 z" fill="#374151"/>
      </marker>
    </defs>

    <!-- arrow labels -->
    <text x="310" y="42" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">hit-to-lead</text>
    <text x="310" y="62" text-anchor="middle" font-size="9" fill="#525252">3–6 mo · 1000s of analogues</text>

    <text x="690" y="42" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">lead optimization</text>
    <text x="690" y="62" text-anchor="middle" font-size="9" fill="#525252">12–24 mo · 100s synthesized</text>
  </g>

  <!-- DMTA cycle -->
  <g transform="translate(60,220)">
    <rect width="540" height="340" fill="#fff" stroke="#7c3aed" stroke-width="2" rx="6"/>
    <text x="270" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">Design–Make–Test–Analyse cycle (DMTA)</text>

    <g transform="translate(270,180)">
      <!-- four nodes around a circle -->
      <circle cx="0" cy="-90" r="48" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
      <text x="0" y="-94" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Design</text>
      <text x="0" y="-78" text-anchor="middle" font-size="9" fill="#1e3a8a">SAR + ADMET in silico</text>

      <circle cx="90" cy="0" r="48" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
      <text x="90" y="-4" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Make</text>
      <text x="90" y="12" text-anchor="middle" font-size="9" fill="#92400e">synthesis (3–10/wk)</text>

      <circle cx="0" cy="90" r="48" fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
      <text x="0" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">Test</text>
      <text x="0" y="102" text-anchor="middle" font-size="9" fill="#065f46">in vitro assay</text>

      <circle cx="-90" cy="0" r="48" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
      <text x="-90" y="-4" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">Analyse</text>
      <text x="-90" y="12" text-anchor="middle" font-size="9" fill="#991b1b">SAR review</text>

      <!-- arrows -->
      <g stroke="#374151" stroke-width="2" fill="none">
        <path d="M 36 -75 A 80 80 0 0 1 75 -36" marker-end="url(#a26ar)"/>
        <path d="M 75 36 A 80 80 0 0 1 36 75" marker-end="url(#a26ar)"/>
        <path d="M -36 75 A 80 80 0 0 1 -75 36" marker-end="url(#a26ar)"/>
        <path d="M -75 -36 A 80 80 0 0 1 -36 -75" marker-end="url(#a26ar)"/>
      </g>
      <defs>
        <marker id="a26ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
          <path d="M0,0 L8,4 L0,8 z" fill="#374151"/>
        </marker>
      </defs>
    </g>

    <text x="270" y="320" text-anchor="middle" font-size="10" fill="#525252">2–6 weeks per cycle, 5–10 cycles per project</text>
  </g>

  <!-- AI insertion points -->
  <g transform="translate(620,220)">
    <rect width="540" height="340" fill="#eff6ff" stroke="#1e3a8a" stroke-width="2" rx="6"/>
    <text x="270" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Where ML accelerates each step</text>

    <g transform="translate(20,50)" font-size="10" fill="#111827">
      <text x="0" y="0" font-weight="700" fill="#1e3a8a">Design</text>
      <text x="0" y="16">· generative models propose candidates</text>
      <text x="0" y="32">· active learning chooses next batch</text>
      <text x="0" y="48">· ChemProp / RFs predict potency, ADMET</text>

      <text x="0" y="76" font-weight="700" fill="#92400e">Make</text>
      <text x="0" y="92">· retrosynthesis (AiZynthFinder, Chemformer)</text>
      <text x="0" y="108">· yield prediction</text>
      <text x="0" y="124">· make-on-demand catalogues (Enamine REAL)</text>

      <text x="0" y="152" font-weight="700" fill="#065f46">Test</text>
      <text x="0" y="168">· virtual screening (docking, ChemBL match)</text>
      <text x="0" y="184">· image-based phenotype clustering</text>
      <text x="0" y="200">· high-content imaging readouts</text>

      <text x="0" y="228" font-weight="700" fill="#991b1b">Analyse</text>
      <text x="0" y="244">· SAR matched-pair analysis</text>
      <text x="0" y="260">· model retraining with new data points</text>
      <text x="0" y="276">· uncertainty-aware acquisition for next cycle</text>
    </g>
  </g>
</svg>
