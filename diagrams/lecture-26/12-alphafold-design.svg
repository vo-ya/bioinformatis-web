<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }</style></defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">AlphaFold + structure-based design — what changed when we got 200M predicted structures</text>

  <!-- Before -->
  <g transform="translate(40,80)">
    <rect width="540" height="240" fill="#fff" stroke="#dc2626" stroke-width="2" rx="6"/>
    <text x="270" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">Before AlphaFold (pre-2021)</text>

    <g transform="translate(20,50)" font-size="11" fill="#111827">
      <text x="0" y="0" font-weight="700" fill="#dc2626">Coverage</text>
      <text x="0" y="20">~180,000 PDB entries · ~80,000 unique sequences</text>
      <text x="0" y="36">Most human proteins had no structure</text>

      <text x="0" y="64" font-weight="700" fill="#dc2626">Bottleneck</text>
      <text x="0" y="84">X-ray / cryo-EM took months/years per target</text>
      <text x="0" y="100">Many targets impossible to crystallize</text>

      <text x="0" y="128" font-weight="700" fill="#dc2626">Implication</text>
      <text x="0" y="148">Structure-based design limited to a few "lucky" targets:</text>
      <text x="0" y="164">kinases, GPCRs (post-2007), nuclear receptors</text>

      <text x="0" y="192" fill="#374151" font-style="italic">Most pharma programs ran "ligand-based" — Tanimoto + pharmacophores from known actives.</text>
    </g>
  </g>

  <!-- After -->
  <g transform="translate(620,80)">
    <rect width="540" height="240" fill="#fff" stroke="#065f46" stroke-width="2" rx="6"/>
    <text x="270" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">After AlphaFold 2 (2021–)</text>

    <g transform="translate(20,50)" font-size="11" fill="#111827">
      <text x="0" y="0" font-weight="700" fill="#065f46">Coverage</text>
      <text x="0" y="20">200M+ predicted structures (UniProt scale)</text>
      <text x="0" y="36">~98% of human proteome predicted</text>

      <text x="0" y="64" font-weight="700" fill="#065f46">Quality</text>
      <text x="0" y="84">pLDDT ≥ 90 → sub-Å accuracy where data exists</text>
      <text x="0" y="100">~50% of residues at high confidence overall</text>

      <text x="0" y="128" font-weight="700" fill="#065f46">Implication</text>
      <text x="0" y="148">Hit-finding now possible for "undruggable" targets</text>
      <text x="0" y="164">Genome-wide structure-based screening enabled</text>

      <text x="0" y="192" fill="#374151" font-style="italic">Now: AlphaFold-Multimer, RoseTTAFold, ESMFold; AlphaFold 3 adds ligands &amp; ions.</text>
    </g>
  </g>

  <!-- What works / what doesn't -->
  <g transform="translate(40,340)">
    <rect width="540" height="240" fill="#d1fae5" stroke="#065f46" rx="6"/>
    <text x="270" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">What works</text>

    <g transform="translate(20,50)" font-size="11" fill="#065f46">
      <text x="0" y="0">✓ Identifying druggable pockets (FPocket, P2Rank)</text>
      <text x="0" y="20">✓ Homology / orphan-target docking</text>
      <text x="0" y="40">✓ Mutation effect prediction (kinase resistance)</text>
      <text x="0" y="60">✓ Selectivity panels across kinome</text>
      <text x="0" y="80">✓ Antibody / binder design (RFdiffusion, AlphaFold-Multimer)</text>
      <text x="0" y="100">✓ Quick triage when no crystal exists</text>

      <text x="0" y="138" font-weight="700">High-confidence regions only</text>
      <text x="0" y="158">Always check pLDDT &gt; 70 for the binding pocket</text>
      <text x="0" y="178">before docking against an AF model.</text>
    </g>
  </g>

  <g transform="translate(620,340)">
    <rect width="540" height="240" fill="#fee2e2" stroke="#dc2626" rx="6"/>
    <text x="270" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">What doesn't (yet)</text>

    <g transform="translate(20,50)" font-size="11" fill="#991b1b">
      <text x="0" y="0">✗ Predicting accurate ligand binding affinities</text>
      <text x="0" y="20">✗ Disordered regions, IDPs, signal peptides</text>
      <text x="0" y="40">✗ Conformational dynamics (cryptic pockets)</text>
      <text x="0" y="60">✗ Allosteric states &amp; multiple conformers</text>
      <text x="0" y="80">✗ De novo enzyme design without retraining</text>
      <text x="0" y="100">✗ Membrane embedding for GPCRs (limited)</text>

      <text x="0" y="138" font-weight="700">AlphaFold 3 caveat</text>
      <text x="0" y="158">Predicts ligand poses but ~40% accuracy (vs. ≥80%</text>
      <text x="0" y="178">for protein-only). Use with crystal verification.</text>
    </g>
  </g>
</svg>
