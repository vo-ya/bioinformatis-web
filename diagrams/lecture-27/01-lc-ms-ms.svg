<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; }</style>
    <marker id="a27" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#374151"/></marker>
  </defs>
  <rect width="1200" height="720" fill="#fafaf9" rx="6"/>
  <text x="600" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">LC-MS/MS proteomics workflow — sample to protein matrix</text>

  <!-- Vertical pipeline -->
  <g transform="translate(60,70)">
    <!-- Step 1 -->
    <g transform="translate(0,0)">
      <rect width="220" height="60" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2" rx="6"/>
      <text x="110" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">1. Sample</text>
      <text x="110" y="48" text-anchor="middle" font-size="10" fill="#1e3a8a">cell · tissue · plasma · serum</text>
    </g>
    <line x1="110" y1="60" x2="110" y2="80" stroke="#374151" stroke-width="1.5" marker-end="url(#a27)"/>

    <g transform="translate(0,80)">
      <rect width="220" height="60" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2" rx="6"/>
      <text x="110" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">2. Lysis + extraction</text>
      <text x="110" y="48" text-anchor="middle" font-size="10" fill="#1e3a8a">SDS / urea · denature · reduce</text>
    </g>
    <line x1="110" y1="140" x2="110" y2="160" stroke="#374151" stroke-width="1.5" marker-end="url(#a27)"/>

    <g transform="translate(0,160)">
      <rect width="220" height="60" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2" rx="6"/>
      <text x="110" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">3. Tryptic digestion</text>
      <text x="110" y="48" text-anchor="middle" font-size="10" fill="#1e3a8a">cleaves after K and R · 5–25 aa</text>
    </g>
    <line x1="110" y1="220" x2="110" y2="240" stroke="#374151" stroke-width="1.5" marker-end="url(#a27)"/>

    <g transform="translate(0,240)">
      <rect width="220" height="60" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2" rx="6"/>
      <text x="110" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">4. Peptide cleanup</text>
      <text x="110" y="48" text-anchor="middle" font-size="10" fill="#1e3a8a">C18 stagetip · desalt</text>
    </g>
    <line x1="110" y1="300" x2="110" y2="320" stroke="#374151" stroke-width="1.5" marker-end="url(#a27)"/>

    <g transform="translate(0,320)">
      <rect width="220" height="60" fill="#fef3c7" stroke="#b45309" stroke-width="2" rx="6"/>
      <text x="110" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">5. LC separation</text>
      <text x="110" y="48" text-anchor="middle" font-size="10" fill="#92400e">reverse-phase · 1–3 hr gradient</text>
    </g>
    <line x1="110" y1="380" x2="110" y2="400" stroke="#374151" stroke-width="1.5" marker-end="url(#a27)"/>

    <g transform="translate(0,400)">
      <rect width="220" height="60" fill="#fef3c7" stroke="#b45309" stroke-width="2" rx="6"/>
      <text x="110" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">6. ESI ionisation</text>
      <text x="110" y="48" text-anchor="middle" font-size="10" fill="#92400e">electrospray · multiply charged</text>
    </g>
    <line x1="110" y1="460" x2="110" y2="480" stroke="#374151" stroke-width="1.5" marker-end="url(#a27)"/>

    <g transform="translate(0,480)">
      <rect width="220" height="60" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="6"/>
      <text x="110" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">7. MS1 scan</text>
      <text x="110" y="48" text-anchor="middle" font-size="10" fill="#991b1b">parent peptide masses</text>
    </g>
    <line x1="110" y1="540" x2="110" y2="560" stroke="#374151" stroke-width="1.5" marker-end="url(#a27)"/>

    <g transform="translate(0,560)">
      <rect width="220" height="60" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="6"/>
      <text x="110" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">8. MS/MS (HCD)</text>
      <text x="110" y="48" text-anchor="middle" font-size="10" fill="#991b1b">fragment selected peptides</text>
    </g>
  </g>

  <!-- Right side: detector + analysis -->
  <g transform="translate(420,70)">
    <g>
      <rect width="220" height="60" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="6"/>
      <text x="110" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">9. Detector → spectra</text>
      <text x="110" y="48" text-anchor="middle" font-size="10" fill="#991b1b">m/z resolved ion counts</text>
    </g>
    <line x1="110" y1="60" x2="110" y2="80" stroke="#374151" stroke-width="1.5" marker-end="url(#a27)"/>

    <g transform="translate(0,80)">
      <rect width="220" height="60" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" rx="6"/>
      <text x="110" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">10. Database search</text>
      <text x="110" y="48" text-anchor="middle" font-size="10" fill="#7c3aed">UniProt · MaxQuant / Fragger</text>
    </g>
    <line x1="110" y1="140" x2="110" y2="160" stroke="#374151" stroke-width="1.5" marker-end="url(#a27)"/>

    <g transform="translate(0,160)">
      <rect width="220" height="60" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" rx="6"/>
      <text x="110" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">11. FDR control</text>
      <text x="110" y="48" text-anchor="middle" font-size="10" fill="#7c3aed">target-decoy &lt; 1%</text>
    </g>
    <line x1="110" y1="220" x2="110" y2="240" stroke="#374151" stroke-width="1.5" marker-end="url(#a27)"/>

    <g transform="translate(0,240)">
      <rect width="220" height="60" fill="#d1fae5" stroke="#065f46" stroke-width="2" rx="6"/>
      <text x="110" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">12. Quantification</text>
      <text x="110" y="48" text-anchor="middle" font-size="10" fill="#065f46">LFQ · SILAC · TMT</text>
    </g>
    <line x1="110" y1="300" x2="110" y2="320" stroke="#374151" stroke-width="1.5" marker-end="url(#a27)"/>

    <g transform="translate(0,320)">
      <rect width="220" height="80" fill="#d1fae5" stroke="#065f46" stroke-width="2" rx="6"/>
      <text x="110" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">13. Protein × sample matrix</text>
      <text x="110" y="48" text-anchor="middle" font-size="10" fill="#065f46">5,000–8,000 proteins</text>
      <text x="110" y="64" text-anchor="middle" font-size="10" fill="#065f46">30–100 samples</text>
    </g>
  </g>

  <!-- LC chromatogram + MS spectrum mini-plots -->
  <g transform="translate(700,70)">
    <rect width="440" height="200" fill="#fff" stroke="#b45309" stroke-width="1.5" rx="6"/>
    <text x="220" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">LC chromatogram (peptide elution)</text>
    <g transform="translate(20,40)">
      <line x1="0" y1="120" x2="400" y2="120" stroke="#374151"/>
      <line x1="0" y1="0" x2="0" y2="120" stroke="#374151"/>
      <text x="200" y="148" text-anchor="middle" font-size="10" fill="#525252">retention time (min)</text>
      <text x="-12" y="60" text-anchor="middle" font-size="10" fill="#525252" transform="rotate(-90 -12 60)">intensity</text>
      <path d="M 0 120 Q 30 110, 60 88 Q 80 60, 100 100 Q 120 70, 140 50 Q 160 80, 180 100 Q 200 50, 220 30 Q 240 60, 260 90 Q 280 50, 300 80 Q 320 100, 340 70 Q 360 110, 400 120 Z" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
    </g>
  </g>

  <g transform="translate(700,290)">
    <rect width="440" height="200" fill="#fff" stroke="#dc2626" stroke-width="1.5" rx="6"/>
    <text x="220" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">MS2 spectrum (one peptide)</text>
    <g transform="translate(20,40)">
      <line x1="0" y1="120" x2="400" y2="120" stroke="#374151"/>
      <line x1="0" y1="0" x2="0" y2="120" stroke="#374151"/>
      <text x="200" y="148" text-anchor="middle" font-size="10" fill="#525252">m/z</text>
      <text x="-12" y="60" text-anchor="middle" font-size="10" fill="#525252" transform="rotate(-90 -12 60)">intensity</text>
      <g stroke-width="1.5">
        <line x1="40" y1="120" x2="40" y2="80" stroke="#1e3a8a"/>
        <line x1="80" y1="120" x2="80" y2="60" stroke="#dc2626"/>
        <line x1="120" y1="120" x2="120" y2="40" stroke="#1e3a8a"/>
        <line x1="160" y1="120" x2="160" y2="20" stroke="#dc2626"/>
        <line x1="200" y1="120" x2="200" y2="50" stroke="#1e3a8a"/>
        <line x1="240" y1="120" x2="240" y2="35" stroke="#dc2626"/>
        <line x1="280" y1="120" x2="280" y2="70" stroke="#1e3a8a"/>
        <line x1="320" y1="120" x2="320" y2="65" stroke="#dc2626"/>
        <line x1="100" y1="120" x2="100" y2="105" stroke="#9ca3af"/>
        <line x1="140" y1="120" x2="140" y2="110" stroke="#9ca3af"/>
        <line x1="220" y1="120" x2="220" y2="100" stroke="#9ca3af"/>
        <line x1="300" y1="120" x2="300" y2="108" stroke="#9ca3af"/>
      </g>
      <text x="40" y="76" font-size="9" fill="#1e3a8a" font-weight="700">b</text>
      <text x="80" y="56" font-size="9" fill="#dc2626" font-weight="700">y</text>
      <text x="160" y="16" font-size="9" fill="#dc2626" font-weight="700">y</text>
    </g>
  </g>

  <!-- Stats panel -->
  <g transform="translate(700,510)">
    <rect width="440" height="170" fill="#eff6ff" stroke="#1e3a8a" rx="6"/>
    <text x="220" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Typical scales</text>
    <g transform="translate(20,40)" font-size="10" fill="#111827">
      <text x="0" y="0">~50,000 peptides identified per LC-MS/MS run</text>
      <text x="0" y="20">~5,000–8,000 proteins quantified per sample</text>
      <text x="0" y="40">1–3 hours of LC gradient per sample</text>
      <text x="0" y="60">~$300 per sample (DDA), ~$200 (DIA, multiplexed)</text>
      <text x="0" y="80">Mass accuracy: 1–5 ppm at MS1, 5–20 ppm at MS2</text>
      <text x="0" y="100">Target FDR: &lt;1% peptide-level, &lt;1% protein-level</text>
      <text x="0" y="120">Reproducibility: ~70% (DDA), ~85% (DIA) ID overlap</text>
    </g>
  </g>

  <!-- Pipeline arrow connecting columns — replaced the steep diagonal with
       an L-shape that exits Step 8's right edge, runs vertically up the
       gap between the two columns, then enters Step 9 from the left. -->
  <path d="M 280 660 L 350 660 L 350 100 L 420 100" stroke="#374151" stroke-width="1.5" stroke-dasharray="4 3" fill="none" marker-end="url(#a27)"/>
</svg>
