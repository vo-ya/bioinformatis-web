<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }</style></defs>
  <rect width="1200" height="720" fill="#fafaf9" rx="6"/>
  <text x="600" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">From MS2 spectrum to identified peptide — and how we control FDR</text>

  <!-- Top: example MS2 spectrum -->
  <g transform="translate(60,60)">
    <rect width="1080" height="240" fill="#fff" stroke="#1e3a8a" stroke-width="2" rx="6"/>
    <text x="540" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">MS2 spectrum — peptide LSDPYHRGSP, b/y peaks annotated</text>

    <g transform="translate(60,50)">
      <line x1="0" y1="160" x2="960" y2="160" stroke="#374151"/>
      <line x1="0" y1="0" x2="0" y2="160" stroke="#374151"/>
      <text x="480" y="186" text-anchor="middle" font-size="10" fill="#525252">m/z</text>
      <text x="-18" y="80" text-anchor="middle" font-size="10" fill="#525252" transform="rotate(-90 -18 80)">intensity</text>
      <g class="mono" fill="#525252" font-size="9">
        <text x="0" y="178">100</text>
        <text x="240" y="178">400</text>
        <text x="480" y="178">700</text>
        <text x="720" y="178">1000</text>
        <text x="960" y="178">1300</text>
      </g>

      <!-- b-ions (cobalt) -->
      <g stroke="#1e3a8a" stroke-width="2">
        <line x1="60" y1="160" x2="60" y2="115"/>
        <line x1="160" y1="160" x2="160" y2="80"/>
        <line x1="240" y1="160" x2="240" y2="60"/>
        <line x1="320" y1="160" x2="320" y2="100"/>
        <line x1="420" y1="160" x2="420" y2="50"/>
        <line x1="540" y1="160" x2="540" y2="90"/>
        <line x1="640" y1="160" x2="640" y2="110"/>
        <line x1="740" y1="160" x2="740" y2="70"/>
      </g>
      <g fill="#1e3a8a" font-size="9" font-weight="700">
        <text x="60" y="108" text-anchor="middle">b₁</text>
        <text x="160" y="73" text-anchor="middle">b₂</text>
        <text x="240" y="53" text-anchor="middle">b₃</text>
        <text x="320" y="93" text-anchor="middle">b₄</text>
        <text x="420" y="43" text-anchor="middle">b₅</text>
        <text x="540" y="83" text-anchor="middle">b₆</text>
        <text x="640" y="103" text-anchor="middle">b₇</text>
        <text x="740" y="63" text-anchor="middle">b₈</text>
      </g>

      <!-- y-ions (red) -->
      <g stroke="#dc2626" stroke-width="2">
        <line x1="80" y1="160" x2="80" y2="120"/>
        <line x1="170" y1="160" x2="170" y2="40"/>
        <line x1="280" y1="160" x2="280" y2="30"/>
        <line x1="370" y1="160" x2="370" y2="65"/>
        <line x1="470" y1="160" x2="470" y2="40"/>
        <line x1="580" y1="160" x2="580" y2="55"/>
        <line x1="680" y1="160" x2="680" y2="80"/>
        <line x1="800" y1="160" x2="800" y2="55"/>
      </g>
      <g fill="#dc2626" font-size="9" font-weight="700">
        <text x="80" y="113" text-anchor="middle">y₁</text>
        <text x="170" y="33" text-anchor="middle">y₂</text>
        <text x="280" y="23" text-anchor="middle">y₃</text>
        <text x="370" y="58" text-anchor="middle">y₄</text>
        <text x="470" y="33" text-anchor="middle">y₅</text>
        <text x="580" y="48" text-anchor="middle">y₆</text>
        <text x="680" y="73" text-anchor="middle">y₇</text>
        <text x="800" y="48" text-anchor="middle">y₈</text>
      </g>

      <!-- Noise -->
      <g stroke="#9ca3af">
        <line x1="100" y1="160" x2="100" y2="148"/>
        <line x1="200" y1="160" x2="200" y2="150"/>
        <line x1="290" y1="160" x2="290" y2="153"/>
        <line x1="500" y1="160" x2="500" y2="146"/>
        <line x1="600" y1="160" x2="600" y2="152"/>
        <line x1="700" y1="160" x2="700" y2="148"/>
        <line x1="850" y1="160" x2="850" y2="155"/>
        <line x1="900" y1="160" x2="900" y2="146"/>
      </g>
    </g>
  </g>

  <!-- Middle: target-decoy histograms -->
  <g transform="translate(60,320)">
    <rect width="540" height="240" fill="#fff" stroke="#7c3aed" stroke-width="2" rx="6"/>
    <text x="270" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">Target vs decoy score distributions</text>

    <g transform="translate(40,50)">
      <line x1="0" y1="160" x2="460" y2="160" stroke="#374151"/>
      <line x1="0" y1="0" x2="0" y2="160" stroke="#374151"/>
      <text x="230" y="184" text-anchor="middle" font-size="10" fill="#525252">score</text>
      <text x="-14" y="80" text-anchor="middle" font-size="10" fill="#525252" transform="rotate(-90 -14 80)">count</text>

      <!-- Decoy distribution (red, lower) -->
      <path d="M 20 160 Q 60 145, 90 100 Q 120 70, 150 90 Q 180 130, 220 152 Q 260 158, 460 160" fill="#fee2e2" stroke="#dc2626" stroke-width="2" opacity="0.85"/>
      <text x="120" y="60" font-size="10" fill="#dc2626" font-weight="700">decoy</text>

      <!-- Target distribution (cobalt, higher mode) -->
      <path d="M 20 160 Q 60 156, 90 145 Q 130 110, 200 50 Q 250 30, 300 60 Q 360 130, 460 160" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2" opacity="0.7"/>
      <text x="290" y="40" font-size="10" fill="#1e3a8a" font-weight="700">target</text>

      <!-- 1% FDR threshold -->
      <line x1="220" y1="0" x2="220" y2="160" stroke="#b45309" stroke-width="2" stroke-dasharray="4 3"/>
      <text x="220" y="-4" text-anchor="middle" font-size="9" fill="#b45309" font-weight="700">1% FDR cutoff</text>
    </g>
  </g>

  <!-- FDR vs threshold curve -->
  <g transform="translate(620,320)">
    <rect width="520" height="240" fill="#fff" stroke="#dc2626" stroke-width="2" rx="6"/>
    <text x="260" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">FDR vs score threshold</text>

    <g transform="translate(50,50)">
      <line x1="0" y1="160" x2="440" y2="160" stroke="#374151"/>
      <line x1="0" y1="0" x2="0" y2="160" stroke="#374151"/>
      <text x="220" y="184" text-anchor="middle" font-size="10" fill="#525252">score threshold (lower = more permissive)</text>
      <text x="-14" y="80" text-anchor="middle" font-size="10" fill="#525252" transform="rotate(-90 -14 80)">FDR (%)</text>

      <!-- Curve: FDR drops as threshold rises -->
      <path d="M 0 5 Q 100 10, 200 30 Q 280 70, 340 130 Q 400 155, 440 158" fill="none" stroke="#dc2626" stroke-width="2.5"/>

      <!-- 1% line -->
      <line x1="0" y1="142" x2="440" y2="142" stroke="#b45309" stroke-dasharray="3 3"/>
      <text x="6" y="138" font-size="9" fill="#b45309" font-weight="700">1% FDR</text>

      <!-- 5% line -->
      <line x1="0" y1="116" x2="440" y2="116" stroke="#9ca3af" stroke-dasharray="3 3"/>
      <text x="6" y="112" font-size="9" fill="#525252">5% FDR</text>

      <!-- selected point -->
      <circle cx="320" cy="142" r="5" fill="#b45309"/>
      <text x="320" y="135" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">chosen</text>

      <g class="mono" fill="#525252" font-size="9">
        <text x="0" y="178">10</text>
        <text x="220" y="178">25</text>
        <text x="440" y="178">40</text>
      </g>
    </g>
  </g>

  <!-- Footer: ML scorers -->
  <g transform="translate(60,580)">
    <rect width="1080" height="110" fill="#eff6ff" stroke="#1e3a8a" rx="6"/>
    <text x="540" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Modern tools use ML scorers trained on target/decoy features</text>

    <g transform="translate(20,40)" font-size="10" fill="#111827">
      <text x="0" y="0" font-weight="700">Percolator (Käll 2007)</text>
      <text x="0" y="16">SVM on Comet/Sequest features → reranks by P(target | features)</text>

      <text x="350" y="0" font-weight="700">MS2Rescore</text>
      <text x="350" y="16">Adds DeepLC retention time + MS²PIP fragment intensity prediction</text>

      <text x="700" y="0" font-weight="700">PeptideProphet / iProphet</text>
      <text x="700" y="16">Mixture-model probabilities; widely used in TPP pipelines</text>

      <text x="0" y="56" fill="#92400e" font-style="italic">Bottom line: target-decoy is the gold-standard FDR estimator; ML rescorers boost the target-decoy separation with extra features.</text>
    </g>
  </g>
</svg>
