<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }</style></defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Quantification methods — four ways to turn peptide signals into protein abundances</text>

  <!-- LFQ -->
  <g transform="translate(40,70)">
    <rect width="270" height="280" fill="#fff" stroke="#525252" stroke-width="2" rx="6"/>
    <text x="135" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">Label-free (LFQ)</text>
    <text x="135" y="38" text-anchor="middle" font-size="10" fill="#525252">MS1 peak integration per sample</text>

    <g transform="translate(20,60)">
      <line x1="0" y1="120" x2="230" y2="120" stroke="#374151"/>
      <line x1="0" y1="0" x2="0" y2="120" stroke="#374151"/>
      <text x="115" y="140" text-anchor="middle" font-size="9" fill="#525252">retention time</text>
      <path d="M 0 120 Q 30 100 50 70 Q 70 50 90 70 Q 110 100 230 120 Z" fill="#9ca3af" opacity="0.55"/>
      <text x="115" y="60" text-anchor="middle" font-size="9" fill="#374151" font-weight="700">∫ peak area</text>
    </g>

    <g transform="translate(20,200)" font-size="10" fill="#374151">
      <text x="0" y="0" font-weight="700">Pros</text>
      <text x="0" y="16">cheap, scalable, no labels</text>
      <text x="0" y="32" font-weight="700">Cons</text>
      <text x="0" y="48">~10–15% CV; missing values across samples</text>
    </g>
  </g>

  <!-- SILAC -->
  <g transform="translate(330,70)">
    <rect width="270" height="280" fill="#fff" stroke="#1e3a8a" stroke-width="2" rx="6"/>
    <text x="135" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">SILAC</text>
    <text x="135" y="38" text-anchor="middle" font-size="10" fill="#1e3a8a">heavy/light pairs in MS1</text>

    <g transform="translate(20,60)">
      <line x1="0" y1="120" x2="230" y2="120" stroke="#374151"/>
      <line x1="0" y1="0" x2="0" y2="120" stroke="#374151"/>
      <text x="115" y="140" text-anchor="middle" font-size="9" fill="#525252">m/z</text>

      <!-- Light peak -->
      <line x1="80" y1="120" x2="80" y2="40" stroke="#1e3a8a" stroke-width="3"/>
      <text x="80" y="34" text-anchor="middle" font-size="9" fill="#1e3a8a" font-weight="700">L</text>
      <!-- Heavy peak (smaller) -->
      <line x1="160" y1="120" x2="160" y2="60" stroke="#b45309" stroke-width="3"/>
      <text x="160" y="54" text-anchor="middle" font-size="9" fill="#b45309" font-weight="700">H</text>

      <!-- delta marker -->
      <path d="M 80 105 L 160 105" stroke="#525252" stroke-dasharray="2 2"/>
      <text x="120" y="100" text-anchor="middle" font-size="9" fill="#525252">Δm = +8 Da</text>
    </g>

    <g transform="translate(20,200)" font-size="10" fill="#374151">
      <text x="0" y="0" font-weight="700">Pros</text>
      <text x="0" y="16">~5% CV; paired comparison</text>
      <text x="0" y="32" font-weight="700">Cons</text>
      <text x="0" y="48">cell culture only — no tissue, no plasma</text>
    </g>
  </g>

  <!-- TMT -->
  <g transform="translate(620,70)">
    <rect width="270" height="280" fill="#fff" stroke="#7c3aed" stroke-width="2" rx="6"/>
    <text x="135" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">TMT (multiplexed)</text>
    <text x="135" y="38" text-anchor="middle" font-size="10" fill="#7c3aed">reporter ions in MS2 (low m/z)</text>

    <g transform="translate(20,60)">
      <line x1="0" y1="120" x2="230" y2="120" stroke="#374151"/>
      <line x1="0" y1="0" x2="0" y2="120" stroke="#374151"/>
      <text x="115" y="140" text-anchor="middle" font-size="9" fill="#525252">reporter m/z (126–135)</text>

      <g stroke-width="3">
        <line x1="20" y1="120" x2="20" y2="55" stroke="#1e3a8a"/>
        <line x1="40" y1="120" x2="40" y2="80" stroke="#7c3aed"/>
        <line x1="60" y1="120" x2="60" y2="50" stroke="#dc2626"/>
        <line x1="80" y1="120" x2="80" y2="65" stroke="#b45309"/>
        <line x1="100" y1="120" x2="100" y2="48" stroke="#065f46"/>
        <line x1="120" y1="120" x2="120" y2="78" stroke="#525252"/>
        <line x1="140" y1="120" x2="140" y2="60" stroke="#1e3a8a"/>
        <line x1="160" y1="120" x2="160" y2="85" stroke="#7c3aed"/>
        <line x1="180" y1="120" x2="180" y2="55" stroke="#dc2626"/>
        <line x1="200" y1="120" x2="200" y2="70" stroke="#b45309"/>
        <line x1="220" y1="120" x2="220" y2="62" stroke="#065f46"/>
      </g>
      <text x="115" y="36" text-anchor="middle" font-size="9" fill="#374151" font-weight="700">11-plex reporters</text>
    </g>

    <g transform="translate(20,200)" font-size="10" fill="#374151">
      <text x="0" y="0" font-weight="700">Pros</text>
      <text x="0" y="16">6–16 samples/run; low LC time/sample</text>
      <text x="0" y="32" font-weight="700">Cons</text>
      <text x="0" y="48">ratio compression; reagent cost (~$5k/16-plex)</text>
    </g>
  </g>

  <!-- PRM -->
  <g transform="translate(910,70)">
    <rect width="250" height="280" fill="#fff" stroke="#065f46" stroke-width="2" rx="6"/>
    <text x="125" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Targeted (PRM)</text>
    <text x="125" y="38" text-anchor="middle" font-size="10" fill="#065f46">selected reaction monitoring</text>

    <g transform="translate(20,60)">
      <line x1="0" y1="120" x2="210" y2="120" stroke="#374151"/>
      <line x1="0" y1="0" x2="0" y2="120" stroke="#374151"/>
      <text x="105" y="140" text-anchor="middle" font-size="9" fill="#525252">retention time</text>

      <path d="M 0 120 Q 40 110 70 60 Q 100 30 130 60 Q 160 110 210 120 Z" fill="#d1fae5" opacity="0.7"/>
      <text x="105" y="50" text-anchor="middle" font-size="9" fill="#065f46" font-weight="700">single peptide curve</text>
      <text x="105" y="80" text-anchor="middle" font-size="9" fill="#065f46">+ heavy AQUA standard</text>
    </g>

    <g transform="translate(20,200)" font-size="10" fill="#374151">
      <text x="0" y="0" font-weight="700">Pros</text>
      <text x="0" y="16">absolute quant; clinical-grade</text>
      <text x="0" y="32" font-weight="700">Cons</text>
      <text x="0" y="48">low throughput; need standards</text>
    </g>
  </g>

  <!-- Comparison table -->
  <g transform="translate(40,380)">
    <rect width="1120" height="200" fill="#fff" stroke="#374151" stroke-width="1.5" rx="6"/>
    <text x="560" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">Method comparison</text>

    <g transform="translate(20,50)">
      <line x1="0" y1="0" x2="1080" y2="0" stroke="#374151"/>
      <g font-size="11" font-weight="700" fill="#111827">
        <text x="0" y="20">Property</text>
        <text x="220" y="20">LFQ</text>
        <text x="420" y="20">SILAC</text>
        <text x="640" y="20">TMT</text>
        <text x="860" y="20">PRM (targeted)</text>
      </g>
      <line x1="0" y1="30" x2="1080" y2="30" stroke="#374151"/>

      <g font-size="10" fill="#374151">
        <text x="0" y="50">CV</text>
        <text x="220" y="50">10–15%</text>
        <text x="420" y="50" fill="#065f46">~5%</text>
        <text x="640" y="50">~10% (compressed)</text>
        <text x="860" y="50" fill="#065f46">2–5%</text>

        <text x="0" y="72">Multiplexing</text>
        <text x="220" y="72">no (1 sample/run)</text>
        <text x="420" y="72">2–3-plex</text>
        <text x="640" y="72" fill="#065f46">6–16-plex</text>
        <text x="860" y="72">no</text>

        <text x="0" y="94">Cost / sample</text>
        <text x="220" y="94" fill="#065f46">~$200</text>
        <text x="420" y="94">~$500</text>
        <text x="640" y="94">~$300</text>
        <text x="860" y="94">$500–1k</text>

        <text x="0" y="116">Applicability</text>
        <text x="220" y="116" fill="#065f46">universal</text>
        <text x="420" y="116" fill="#dc2626">cell culture only</text>
        <text x="640" y="116">universal</text>
        <text x="860" y="116">few peptides</text>

        <text x="0" y="138">Best use case</text>
        <text x="220" y="138">large discovery cohorts</text>
        <text x="420" y="138">paired in vitro mech</text>
        <text x="640" y="138">cohort cohort, depth</text>
        <text x="860" y="138">clinical biomarker</text>
      </g>
    </g>
  </g>
</svg>
