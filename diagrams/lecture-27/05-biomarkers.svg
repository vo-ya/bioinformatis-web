<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }</style></defs>
  <rect width="1200" height="720" fill="#fafaf9" rx="6"/>
  <text x="600" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Plasma proteome — 10 orders of magnitude in abundance, only some assays reach the bottom</text>

  <!-- Main log axis -->
  <g transform="translate(80,90)">
    <rect width="1040" height="160" fill="#fff" stroke="#1e3a8a" stroke-width="2" rx="6"/>
    <text x="520" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Plasma protein abundance landscape</text>

    <g transform="translate(40,90)">
      <line x1="0" y1="0" x2="960" y2="0" stroke="#374151" stroke-width="2"/>
      <!-- ticks at log10 = -3, -4, ..., -13 -->
      <g class="mono" font-size="9" fill="#525252" text-anchor="middle">
        <line x1="0" y1="-6" x2="0" y2="6" stroke="#374151"/>
        <text x="0" y="22">10⁻³</text>
        <line x1="96" y1="-6" x2="96" y2="6" stroke="#374151"/>
        <text x="96" y="22">10⁻⁴</text>
        <line x1="192" y1="-6" x2="192" y2="6" stroke="#374151"/>
        <text x="192" y="22">10⁻⁵</text>
        <line x1="288" y1="-6" x2="288" y2="6" stroke="#374151"/>
        <text x="288" y="22">10⁻⁶</text>
        <line x1="384" y1="-6" x2="384" y2="6" stroke="#374151"/>
        <text x="384" y="22">10⁻⁷</text>
        <line x1="480" y1="-6" x2="480" y2="6" stroke="#374151"/>
        <text x="480" y="22">10⁻⁸</text>
        <line x1="576" y1="-6" x2="576" y2="6" stroke="#374151"/>
        <text x="576" y="22">10⁻⁹</text>
        <line x1="672" y1="-6" x2="672" y2="6" stroke="#374151"/>
        <text x="672" y="22">10⁻¹⁰</text>
        <line x1="768" y1="-6" x2="768" y2="6" stroke="#374151"/>
        <text x="768" y="22">10⁻¹¹</text>
        <line x1="864" y1="-6" x2="864" y2="6" stroke="#374151"/>
        <text x="864" y="22">10⁻¹²</text>
        <line x1="960" y1="-6" x2="960" y2="6" stroke="#374151"/>
        <text x="960" y="22">10⁻¹³</text>
      </g>
      <text x="480" y="50" text-anchor="middle" font-size="11" fill="#525252">Plasma concentration (M)</text>

      <!-- protein markers -->
      <g>
        <circle cx="48" cy="-22" r="8" fill="#1e3a8a"/>
        <text x="48" y="-32" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">Albumin</text>
        <line x1="48" y1="-15" x2="48" y2="0" stroke="#1e3a8a" stroke-width="1"/>

        <circle cx="144" cy="-22" r="7" fill="#1e3a8a"/>
        <text x="144" y="-32" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">IgG</text>
        <line x1="144" y1="-15" x2="144" y2="0" stroke="#1e3a8a" stroke-width="1"/>

        <circle cx="288" cy="-22" r="6" fill="#1e3a8a"/>
        <text x="288" y="-32" text-anchor="middle" font-size="10" fill="#1e3a8a">Transferrin</text>
        <line x1="288" y1="-15" x2="288" y2="0" stroke="#1e3a8a" stroke-width="1"/>

        <circle cx="480" cy="-22" r="5" fill="#7c3aed"/>
        <text x="480" y="-32" text-anchor="middle" font-size="10" fill="#7c3aed">CRP</text>
        <line x1="480" y1="-15" x2="480" y2="0" stroke="#7c3aed" stroke-width="1"/>

        <circle cx="576" cy="-22" r="5" fill="#7c3aed"/>
        <text x="576" y="-32" text-anchor="middle" font-size="10" fill="#7c3aed">PSA</text>
        <line x1="576" y1="-15" x2="576" y2="0" stroke="#7c3aed" stroke-width="1"/>

        <circle cx="672" cy="-22" r="5" fill="#dc2626"/>
        <text x="672" y="-32" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">Troponin I</text>
        <line x1="672" y1="-15" x2="672" y2="0" stroke="#dc2626" stroke-width="1"/>

        <circle cx="768" cy="-22" r="5" fill="#dc2626"/>
        <text x="768" y="-32" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">BNP</text>
        <line x1="768" y1="-15" x2="768" y2="0" stroke="#dc2626" stroke-width="1"/>

        <circle cx="864" cy="-22" r="5" fill="#b45309"/>
        <text x="864" y="-32" text-anchor="middle" font-size="10" fill="#b45309">CA 19-9</text>
        <line x1="864" y1="-15" x2="864" y2="0" stroke="#b45309" stroke-width="1"/>

        <circle cx="940" cy="-22" r="5" fill="#dc2626"/>
        <text x="940" y="-32" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">Aβ-42</text>
        <line x1="940" y1="-15" x2="940" y2="0" stroke="#dc2626" stroke-width="1"/>
      </g>
    </g>
  </g>

  <!-- Detection technology bands — rect width 1040→1100 because the Simoa
       band's "10⁻³ to 10⁻¹³ M" label sat at panel x=1010-1085 and the
       original 1040-px panel cut it off ~45 px past the right edge. -->
  <g transform="translate(80,290)">
    <rect width="1100" height="270" fill="#fff" stroke="#374151" stroke-width="1.5" rx="6"/>
    <text x="520" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">Detection technology by reachable abundance</text>

    <g transform="translate(40,40)">
      <!-- Bands -->
      <rect x="0" y="0" width="640" height="32" fill="#fef3c7" stroke="#b45309"/>
      <text x="10" y="20" font-size="11" fill="#92400e" font-weight="700">LC-MS/MS untargeted</text>
      <text x="650" y="20" font-size="10" fill="#92400e">10⁻³ to 10⁻⁹ M</text>

      <rect x="0" y="44" width="850" height="32" fill="#dbeafe" stroke="#1e3a8a"/>
      <text x="10" y="64" font-size="11" fill="#1e3a8a" font-weight="700">LC-MS/MS targeted (PRM/MRM)</text>
      <text x="860" y="64" font-size="10" fill="#1e3a8a">10⁻³ to 10⁻¹¹ M</text>

      <rect x="0" y="88" width="780" height="32" fill="#d1fae5" stroke="#065f46"/>
      <text x="10" y="108" font-size="11" fill="#065f46" font-weight="700">Olink (Proximity Extension)</text>
      <text x="790" y="108" font-size="10" fill="#065f46">10⁻³ to 10⁻¹⁰ M</text>

      <rect x="0" y="132" width="780" height="32" fill="#d1fae5" stroke="#065f46"/>
      <text x="10" y="152" font-size="11" fill="#065f46" font-weight="700">SomaScan (aptamer)</text>
      <text x="790" y="152" font-size="10" fill="#065f46">10⁻³ to 10⁻¹⁰ M</text>

      <rect x="0" y="176" width="960" height="32" fill="#fee2e2" stroke="#dc2626"/>
      <text x="10" y="196" font-size="11" fill="#991b1b" font-weight="700">Simoa (single-molecule)</text>
      <text x="970" y="196" font-size="10" fill="#991b1b">10⁻³ to 10⁻¹³ M</text>
    </g>
  </g>

  <!-- Bottom annotations -->
  <g transform="translate(80,580)">
    <rect width="1040" height="120" fill="#eff6ff" stroke="#1e3a8a" rx="6"/>
    <text x="520" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Why abundance is the limit</text>

    <g transform="translate(20,40)" font-size="10" fill="#111827">
      <text x="0" y="0">· Plasma is dominated by albumin (50% of total mass) — depletion adds ~3 orders of magnitude of dynamic range.</text>
      <text x="0" y="20">· Below 10⁻⁹ M, you need affinity capture (Olink/SomaScan) or single-molecule sensitivity (Simoa) — untargeted MS bottoms out.</text>
      <text x="0" y="40">· Many disease biomarkers (cardiac troponin, neurofilament, amyloid-β) live below 10⁻¹⁰ M — assay choice gates the question.</text>
      <text x="0" y="60" fill="#92400e" font-style="italic">Rule of thumb: pick the assay <em>after</em> you know the target abundance. The plasma proteome has ~5,000 detectable proteins; ~50 are widely-used clinical biomarkers.</text>
    </g>
  </g>
</svg>
