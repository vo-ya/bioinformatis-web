<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="1200" height="620" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }</style>
    <marker id="a27c" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#374151"/></marker>
  </defs>
  <rect width="1200" height="620" fill="#fafaf9" rx="6"/>
  <text x="600" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Chemoproteomics — find what a drug actually binds in live cells (not what we predict)</text>

  <!-- Workflow column -->
  <g transform="translate(40,70)">
    <g>
      <rect width="280" height="60" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2" rx="6"/>
      <text x="140" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">1. Drug + reactive linker</text>
      <text x="140" y="46" text-anchor="middle" font-size="10" fill="#1e3a8a">photoaffinity / click chemistry probe</text>
    </g>
    <line x1="140" y1="60" x2="140" y2="80" stroke="#374151" stroke-width="1.5" marker-end="url(#a27c)"/>

    <g transform="translate(0,80)">
      <rect width="280" height="60" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2" rx="6"/>
      <text x="140" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">2. Apply to live cells</text>
      <text x="140" y="46" text-anchor="middle" font-size="10" fill="#1e3a8a">drug binds intended targets + off-targets</text>
    </g>
    <line x1="140" y1="140" x2="140" y2="160" stroke="#374151" stroke-width="1.5" marker-end="url(#a27c)"/>

    <g transform="translate(0,160)">
      <rect width="280" height="60" fill="#fef3c7" stroke="#b45309" stroke-width="2" rx="6"/>
      <text x="140" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">3. UV crosslink</text>
      <text x="140" y="46" text-anchor="middle" font-size="10" fill="#92400e">covalently fix drug to bound proteins</text>
    </g>
    <line x1="140" y1="220" x2="140" y2="240" stroke="#374151" stroke-width="1.5" marker-end="url(#a27c)"/>

    <g transform="translate(0,240)">
      <rect width="280" height="60" fill="#fef3c7" stroke="#b45309" stroke-width="2" rx="6"/>
      <text x="140" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">4. Lyse + digest</text>
      <text x="140" y="46" text-anchor="middle" font-size="10" fill="#92400e">trypsin → peptide mixture</text>
    </g>
    <line x1="140" y1="300" x2="140" y2="320" stroke="#374151" stroke-width="1.5" marker-end="url(#a27c)"/>

    <g transform="translate(0,320)">
      <rect width="280" height="60" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" rx="6"/>
      <text x="140" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">5. Affinity pull-down</text>
      <text x="140" y="46" text-anchor="middle" font-size="10" fill="#7c3aed">click handle → biotin → streptavidin</text>
    </g>
    <line x1="140" y1="380" x2="140" y2="400" stroke="#374151" stroke-width="1.5" marker-end="url(#a27c)"/>

    <g transform="translate(0,400)">
      <rect width="280" height="60" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="6"/>
      <text x="140" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">6. LC-MS/MS</text>
      <text x="140" y="46" text-anchor="middle" font-size="10" fill="#991b1b">identify modified peptides</text>
    </g>
    <line x1="140" y1="460" x2="140" y2="480" stroke="#374151" stroke-width="1.5" marker-end="url(#a27c)"/>

    <g transform="translate(0,480)">
      <rect width="280" height="60" fill="#d1fae5" stroke="#065f46" stroke-width="2" rx="6"/>
      <text x="140" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">7. Map → drug-target list</text>
      <text x="140" y="46" text-anchor="middle" font-size="10" fill="#065f46">intended targets + off-targets</text>
    </g>
  </g>

  <!-- Right side: example outcome -->
  <g transform="translate(380,70)">
    <rect width="780" height="240" fill="#fff" stroke="#374151" stroke-width="1.5" rx="6"/>
    <text x="390" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">Example: kinase inhibitor X — Kinobeads pulldown</text>

    <g transform="translate(20,50)">
      <!-- Volcano-style scatter: log2 enrichment vs -log10 p -->
      <line x1="0" y1="160" x2="740" y2="160" stroke="#374151"/>
      <line x1="370" y1="0" x2="370" y2="160" stroke="#374151"/>
      <text x="370" y="180" text-anchor="middle" font-size="10" fill="#525252">log₂(enrichment over DMSO)</text>
      <text x="-14" y="80" text-anchor="middle" font-size="10" fill="#525252" transform="rotate(-90 -14 80)">-log₁₀ p</text>

      <!-- background dots (non-binders) -->
      <g fill="#9ca3af" opacity="0.5">
        <circle cx="350" cy="148" r="3"/><circle cx="365" cy="135" r="3"/><circle cx="375" cy="140" r="3"/>
        <circle cx="380" cy="125" r="3"/><circle cx="345" cy="120" r="3"/><circle cx="395" cy="142" r="3"/>
        <circle cx="360" cy="105" r="3"/><circle cx="385" cy="115" r="3"/><circle cx="370" cy="95" r="3"/>
        <circle cx="355" cy="130" r="3"/><circle cx="400" cy="138" r="3"/><circle cx="378" cy="148" r="3"/>
      </g>

      <!-- intended targets (red, far right + high y) -->
      <g fill="#dc2626">
        <circle cx="630" cy="20" r="6"/>
        <text x="640" y="20" font-size="9" font-weight="700" fill="#991b1b">ABL1</text>
        <circle cx="600" cy="30" r="6"/>
        <text x="610" y="30" font-size="9" font-weight="700" fill="#991b1b">BCR-ABL</text>
        <circle cx="610" cy="50" r="5"/>
        <text x="620" y="50" font-size="9" font-weight="700" fill="#991b1b">SRC</text>
        <circle cx="580" cy="60" r="5"/>
        <text x="590" y="60" font-size="9" font-weight="700" fill="#991b1b">YES1</text>
        <circle cx="560" cy="75" r="5"/>
        <text x="570" y="75" font-size="9" font-weight="700" fill="#991b1b">LYN</text>
      </g>

      <!-- off-targets (amber) -->
      <g fill="#b45309">
        <circle cx="500" cy="40" r="5"/>
        <text x="510" y="40" font-size="9" fill="#92400e">EPHA2</text>
        <circle cx="520" cy="65" r="5"/>
        <text x="530" y="65" font-size="9" fill="#92400e">DDR1</text>
        <circle cx="540" cy="80" r="5"/>
        <text x="550" y="80" font-size="9" fill="#92400e">CSK</text>
        <circle cx="490" cy="90" r="4"/>
        <text x="500" y="90" font-size="9" fill="#92400e">FRK</text>
        <circle cx="510" cy="110" r="4"/>
        <text x="520" y="110" font-size="9" fill="#92400e">BMX</text>
        <circle cx="530" cy="125" r="4"/>
        <text x="540" y="125" font-size="9" fill="#92400e">ZAK</text>
        <circle cx="475" cy="68" r="4"/>
        <text x="485" y="68" font-size="9" fill="#92400e">GAK</text>
        <circle cx="490" cy="50" r="4"/>
        <text x="500" y="50" font-size="9" fill="#92400e">RIPK2</text>
        <circle cx="465" cy="100" r="4"/>
        <text x="450" y="100" font-size="9" fill="#92400e">NQO2</text>
        <circle cx="455" cy="80" r="4"/>
        <text x="440" y="80" font-size="9" fill="#92400e">FECH</text>
      </g>
    </g>
  </g>

  <!-- Outcome banner — height 240→270 so the trailing "Why MS, not
       predictions:" section (header at y=196, content at y=214 → outer
       y=266) lands inside the box instead of dangling past the bottom. -->
  <g transform="translate(380,330)">
    <rect width="780" height="270" fill="#fef3c7" stroke="#b45309" rx="6"/>
    <text x="390" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Typical chemoproteomics outcome</text>

    <g transform="translate(20,52)" font-size="11" fill="#111827">
      <text x="0" y="0" font-weight="700" fill="#dc2626">Intended targets identified: ~5</text>
      <text x="0" y="18" fill="#525252">match the published mechanism — confirms drug engages designed binders</text>

      <text x="0" y="48" font-weight="700" fill="#b45309">Off-targets identified: ~15</text>
      <text x="0" y="66" fill="#525252">unexpected hits — explain side effects, suggest repurposing, flag toxicity</text>

      <text x="0" y="96" font-weight="700" fill="#1e3a8a">Off-target promiscuity is the rule, not the exception</text>
      <text x="0" y="114" fill="#525252">most "selective" kinase inhibitors hit 5–15 unintended kinases at therapeutic doses</text>

      <text x="0" y="146" font-weight="700" fill="#7c3aed">Tools / variants</text>
      <text x="0" y="164" fill="#525252">CETSA (cellular thermal shift) · TPP (thermal proteome profiling) · ABPP · KiNativ · Kinobeads</text>

      <text x="0" y="196" font-weight="700" fill="#065f46">Why MS, not predictions:</text>
      <text x="0" y="214" fill="#525252">measures actual cellular binding under physiological conditions — what a drug <em>does</em>, not what it <em>should</em></text>
    </g>
  </g>
</svg>
