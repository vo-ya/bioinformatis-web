<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 770" width="1200" height="770" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }</style>
    <marker id="a27w" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#374151"/></marker>
  </defs>
  <rect width="1200" height="770" fill="#fafaf9" rx="6"/>
  <text x="600" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">End-to-end proteomics analysis workflow with reproducibility checkpoints</text>

  <!-- Banded flow -->
  <g transform="translate(60,70)">
    <!-- Stage 1 -->
    <g>
      <rect width="1080" height="70" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2" rx="6"/>
      <text x="20" y="28" font-size="13" font-weight="700" fill="#1e3a8a">1. Sample acquisition + extraction</text>
      <text x="20" y="48" font-size="10" fill="#1e3a8a">cells / tissue / plasma → lysis (SDS, urea) → reduce + alkylate → tryptic digest</text>
      <text x="800" y="28" font-size="10" font-weight="700" fill="#92400e">⚠ check: keratin contamination</text>
      <text x="800" y="48" font-size="10" fill="#92400e">protocol version, batch ID, extraction date</text>
    </g>

    <line x1="540" y1="70" x2="540" y2="90" stroke="#374151" stroke-width="1.5" marker-end="url(#a27w)"/>

    <!-- Stage 2 -->
    <g transform="translate(0,90)">
      <rect width="1080" height="70" fill="#fef3c7" stroke="#b45309" stroke-width="2" rx="6"/>
      <text x="20" y="28" font-size="13" font-weight="700" fill="#92400e">2. LC-MS/MS acquisition</text>
      <text x="20" y="48" font-size="10" fill="#92400e">DDA (top-N) or DIA (m/z windows); HCD fragmentation; instrument calibration weekly</text>
      <text x="800" y="28" font-size="10" font-weight="700" fill="#92400e">⚠ check: mass-accuracy drift</text>
      <text x="800" y="48" font-size="10" fill="#92400e">QC peptides every 10 samples; carryover blanks</text>
    </g>

    <line x1="540" y1="160" x2="540" y2="180" stroke="#374151" stroke-width="1.5" marker-end="url(#a27w)"/>

    <!-- Stage 3 -->
    <g transform="translate(0,180)">
      <rect width="1080" height="70" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" rx="6"/>
      <text x="20" y="28" font-size="13" font-weight="700" fill="#7c3aed">3. Database search</text>
      <text x="20" y="48" font-size="10" fill="#7c3aed">MaxQuant · MS-Fragger / FragPipe · DIA-NN · Spectronaut</text>
      <text x="800" y="28" font-size="10" font-weight="700" fill="#92400e">⚠ check: database version + species</text>
      <text x="800" y="48" font-size="10" fill="#92400e">PTM search list, search engine version, parameters</text>
    </g>

    <line x1="540" y1="250" x2="540" y2="270" stroke="#374151" stroke-width="1.5" marker-end="url(#a27w)"/>

    <!-- Stage 4 -->
    <g transform="translate(0,270)">
      <rect width="1080" height="70" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="6"/>
      <text x="20" y="28" font-size="13" font-weight="700" fill="#991b1b">4. FDR control</text>
      <text x="20" y="48" font-size="10" fill="#991b1b">target-decoy at 1% peptide-level + 1% protein-level (Percolator-style ML rescoring optional)</text>
      <text x="800" y="28" font-size="10" font-weight="700" fill="#92400e">⚠ check: protein-level FDR ≤ peptide</text>
      <text x="800" y="48" font-size="10" fill="#92400e">Razor peptide assignment; minimum unique peptides</text>
    </g>

    <line x1="540" y1="340" x2="540" y2="360" stroke="#374151" stroke-width="1.5" marker-end="url(#a27w)"/>

    <!-- Stage 5 -->
    <g transform="translate(0,360)">
      <rect width="1080" height="70" fill="#d1fae5" stroke="#065f46" stroke-width="2" rx="6"/>
      <text x="20" y="28" font-size="13" font-weight="700" fill="#065f46">5. Quantification</text>
      <text x="20" y="48" font-size="10" fill="#065f46">LFQ / SILAC / TMT — normalisation (median, quantile, VSN)</text>
      <text x="800" y="28" font-size="10" font-weight="700" fill="#92400e">⚠ check: normalisation method</text>
      <text x="800" y="48" font-size="10" fill="#92400e">Sample loading variance; batch correction (ComBat)</text>
    </g>

    <line x1="540" y1="430" x2="540" y2="450" stroke="#374151" stroke-width="1.5" marker-end="url(#a27w)"/>

    <!-- Stage 6 -->
    <g transform="translate(0,450)">
      <rect width="1080" height="70" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2" rx="6"/>
      <text x="20" y="28" font-size="13" font-weight="700" fill="#1e3a8a">6. Statistical analysis</text>
      <text x="20" y="48" font-size="10" fill="#1e3a8a">limma · DEqMS · MSstats · ProDA — design matrix, contrasts, FDR &lt; 0.05</text>
      <text x="800" y="28" font-size="10" font-weight="700" fill="#92400e">⚠ check: missing-value strategy</text>
      <text x="800" y="48" font-size="10" fill="#92400e">half-min / KNN / probabilistic; document choice</text>
    </g>

    <line x1="540" y1="520" x2="540" y2="540" stroke="#374151" stroke-width="1.5" marker-end="url(#a27w)"/>

    <!-- Stage 7 -->
    <g transform="translate(0,540)">
      <rect width="1080" height="70" fill="#fef3c7" stroke="#b45309" stroke-width="2" rx="6"/>
      <text x="20" y="28" font-size="13" font-weight="700" fill="#92400e">7. Pathway enrichment</text>
      <text x="20" y="48" font-size="10" fill="#92400e">ORA / GSEA on KEGG · Reactome · GO; protein-set permutation</text>
      <text x="800" y="28" font-size="10" font-weight="700" fill="#92400e">⚠ check: background set</text>
      <text x="800" y="48" font-size="10" fill="#92400e">use detected proteome, not full proteome</text>
    </g>

    <line x1="540" y1="610" x2="540" y2="630" stroke="#374151" stroke-width="1.5" marker-end="url(#a27w)"/>

    <!-- Stage 8 -->
    <g transform="translate(0,630)">
      <rect width="1080" height="0" fill="none"/>
    </g>
  </g>

  <!-- Stage 8 — y dropped 640→700 because the original abs-y range
       640-700 overlapped Stage 7 (which ends at abs y=680) by 40 px.
       Canvas extended 720→770 to accommodate the new bottom. -->
  <g transform="translate(60,700)">
    <rect width="1080" height="60" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" rx="6"/>
    <text x="20" y="28" font-size="13" font-weight="700" fill="#7c3aed">8. Network analysis</text>
    <text x="20" y="48" font-size="10" fill="#7c3aed">STRING / BioGRID PPI; modules; hub-protein analysis; cross-omics linkage to RNA-seq + GWAS</text>
  </g>
</svg>
