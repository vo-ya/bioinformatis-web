<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }</style></defs>
  <rect width="1200" height="540" fill="#fafaf9" rx="6"/>
  <text x="600" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Peptide fragmentation — backbone cleavage produces b/y ion pairs</text>

  <!-- Peptide diagram -->
  <g transform="translate(60,70)">
    <rect width="1080" height="200" fill="#fff" stroke="#374151" stroke-width="1.5" rx="6"/>
    <text x="540" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Peptide LSDPYHRGSP — cleavage points and fragment masses</text>

    <!-- Residues -->
    <g transform="translate(60,80)">
      <g font-size="14" font-weight="700" font-family="JetBrains Mono">
        <rect x="0" y="-26" width="80" height="48" fill="#dbeafe" stroke="#1e3a8a" rx="4"/>
        <text x="40" y="6" text-anchor="middle" fill="#1e3a8a">L</text>
        <rect x="100" y="-26" width="80" height="48" fill="#dbeafe" stroke="#1e3a8a" rx="4"/>
        <text x="140" y="6" text-anchor="middle" fill="#1e3a8a">S</text>
        <rect x="200" y="-26" width="80" height="48" fill="#dbeafe" stroke="#1e3a8a" rx="4"/>
        <text x="240" y="6" text-anchor="middle" fill="#1e3a8a">D</text>
        <rect x="300" y="-26" width="80" height="48" fill="#dbeafe" stroke="#1e3a8a" rx="4"/>
        <text x="340" y="6" text-anchor="middle" fill="#1e3a8a">P</text>
        <rect x="400" y="-26" width="80" height="48" fill="#dbeafe" stroke="#1e3a8a" rx="4"/>
        <text x="440" y="6" text-anchor="middle" fill="#1e3a8a">Y</text>
        <rect x="500" y="-26" width="80" height="48" fill="#dbeafe" stroke="#1e3a8a" rx="4"/>
        <text x="540" y="6" text-anchor="middle" fill="#1e3a8a">H</text>
        <rect x="600" y="-26" width="80" height="48" fill="#dbeafe" stroke="#1e3a8a" rx="4"/>
        <text x="640" y="6" text-anchor="middle" fill="#1e3a8a">R</text>
        <rect x="700" y="-26" width="80" height="48" fill="#dbeafe" stroke="#1e3a8a" rx="4"/>
        <text x="740" y="6" text-anchor="middle" fill="#1e3a8a">G</text>
        <rect x="800" y="-26" width="80" height="48" fill="#dbeafe" stroke="#1e3a8a" rx="4"/>
        <text x="840" y="6" text-anchor="middle" fill="#1e3a8a">S</text>
        <rect x="900" y="-26" width="80" height="48" fill="#dbeafe" stroke="#1e3a8a" rx="4"/>
        <text x="940" y="6" text-anchor="middle" fill="#1e3a8a">P</text>
      </g>

      <!-- backbone bonds -->
      <g stroke="#374151" stroke-width="1.5">
        <line x1="80" y1="0" x2="100" y2="0"/>
        <line x1="180" y1="0" x2="200" y2="0"/>
        <line x1="280" y1="0" x2="300" y2="0"/>
        <line x1="380" y1="0" x2="400" y2="0"/>
        <line x1="480" y1="0" x2="500" y2="0"/>
        <line x1="580" y1="0" x2="600" y2="0"/>
        <line x1="680" y1="0" x2="700" y2="0"/>
        <line x1="780" y1="0" x2="800" y2="0"/>
        <line x1="880" y1="0" x2="900" y2="0"/>
      </g>

      <!-- cleavage scissors -->
      <g stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3 2">
        <line x1="90" y1="-40" x2="90" y2="40"/>
        <line x1="190" y1="-40" x2="190" y2="40"/>
        <line x1="290" y1="-40" x2="290" y2="40"/>
        <line x1="390" y1="-40" x2="390" y2="40"/>
        <line x1="490" y1="-40" x2="490" y2="40"/>
        <line x1="590" y1="-40" x2="590" y2="40"/>
        <line x1="690" y1="-40" x2="690" y2="40"/>
        <line x1="790" y1="-40" x2="790" y2="40"/>
        <line x1="890" y1="-40" x2="890" y2="40"/>
      </g>

      <!-- b labels (top) -->
      <g font-size="9" font-weight="700" fill="#1e3a8a" text-anchor="middle" font-family="JetBrains Mono">
        <text x="90" y="-52">b₁</text>
        <text x="190" y="-52">b₂</text>
        <text x="290" y="-52">b₃</text>
        <text x="390" y="-52">b₄</text>
        <text x="490" y="-52">b₅</text>
        <text x="590" y="-52">b₆</text>
        <text x="690" y="-52">b₇</text>
        <text x="790" y="-52">b₈</text>
        <text x="890" y="-52">b₉</text>
      </g>

      <!-- y labels (bottom) -->
      <g font-size="9" font-weight="700" fill="#dc2626" text-anchor="middle" font-family="JetBrains Mono">
        <text x="90" y="62">y₉</text>
        <text x="190" y="62">y₈</text>
        <text x="290" y="62">y₇</text>
        <text x="390" y="62">y₆</text>
        <text x="490" y="62">y₅</text>
        <text x="590" y="62">y₄</text>
        <text x="690" y="62">y₃</text>
        <text x="790" y="62">y₂</text>
        <text x="890" y="62">y₁</text>
      </g>

      <!-- N-term / C-term labels -->
      <text x="-30" y="6" font-size="11" font-weight="700" fill="#374151">N</text>
      <text x="990" y="6" font-size="11" font-weight="700" fill="#374151">C</text>
    </g>

    <text x="540" y="180" text-anchor="middle" font-size="10" fill="#525252">Each cleavage produces a b-ion (N-terminal, cobalt) and a y-ion (C-terminal, red) — full b/y series uniquely determines the sequence.</text>
  </g>

  <!-- Predicted MS2 spectrum -->
  <g transform="translate(60,290)">
    <rect width="1080" height="220" fill="#fff" stroke="#7c3aed" stroke-width="2" rx="6"/>
    <text x="540" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">Predicted MS2 spectrum (b cobalt, y red)</text>

    <g transform="translate(40,50)">
      <line x1="0" y1="140" x2="1000" y2="140" stroke="#374151"/>
      <line x1="0" y1="0" x2="0" y2="140" stroke="#374151"/>
      <text x="500" y="166" text-anchor="middle" font-size="10" fill="#525252">m/z</text>
      <text x="-14" y="70" text-anchor="middle" font-size="10" fill="#525252" transform="rotate(-90 -14 70)">intensity</text>

      <!-- masses computed: b ions: L=113, LS=200, LSD=315, LSDP=412, LSDPY=575, LSDPYH=712, LSDPYHR=868, LSDPYHRG=925, LSDPYHRGS=1012 -->
      <!-- y ions: P=116, SP=203, GSP=260, RGSP=416, HRGSP=553, YHRGSP=716, PYHRGSP=813, DPYHRGSP=928, SDPYHRGSP=1015 -->

      <g stroke="#1e3a8a" stroke-width="2">
        <line x1="50" y1="140" x2="50" y2="80"/>
        <line x1="100" y1="140" x2="100" y2="60"/>
        <line x1="170" y1="140" x2="170" y2="40"/>
        <line x1="230" y1="140" x2="230" y2="50"/>
        <line x1="320" y1="140" x2="320" y2="20"/>
        <line x1="400" y1="140" x2="400" y2="35"/>
        <line x1="490" y1="140" x2="490" y2="55"/>
        <line x1="525" y1="140" x2="525" y2="75"/>
        <line x1="580" y1="140" x2="580" y2="48"/>
      </g>
      <g fill="#1e3a8a" font-size="8" font-weight="700" text-anchor="middle" font-family="JetBrains Mono">
        <text x="50" y="74">b₁:113</text>
        <text x="100" y="54">b₂:200</text>
        <text x="170" y="34">b₃:315</text>
        <text x="230" y="44">b₄:412</text>
        <text x="320" y="14">b₅:575</text>
        <text x="400" y="29">b₆:712</text>
        <text x="490" y="49">b₇:868</text>
        <text x="525" y="69">b₈:925</text>
        <text x="580" y="42">b₉:1012</text>
      </g>

      <g stroke="#dc2626" stroke-width="2">
        <line x1="60" y1="140" x2="60" y2="65"/>
        <line x1="105" y1="140" x2="105" y2="55"/>
        <line x1="135" y1="140" x2="135" y2="80"/>
        <line x1="220" y1="140" x2="220" y2="40"/>
        <line x1="300" y1="140" x2="300" y2="30"/>
        <line x1="395" y1="140" x2="395" y2="45"/>
        <line x1="450" y1="140" x2="450" y2="60"/>
        <line x1="520" y1="140" x2="520" y2="35"/>
        <line x1="585" y1="140" x2="585" y2="38"/>
      </g>
      <g fill="#dc2626" font-size="8" font-weight="700" text-anchor="middle" font-family="JetBrains Mono">
        <text x="60" y="59">y₁:116</text>
        <text x="105" y="49">y₂:203</text>
        <text x="135" y="74">y₃:260</text>
        <text x="220" y="34">y₄:416</text>
        <text x="300" y="24">y₅:553</text>
        <text x="395" y="39">y₆:716</text>
        <text x="450" y="54">y₇:813</text>
        <text x="520" y="29">y₈:928</text>
        <text x="585" y="32">y₉:1015</text>
      </g>

      <g class="mono" font-size="9" fill="#525252">
        <text x="0" y="160" text-anchor="middle">100</text>
        <text x="500" y="160" text-anchor="middle">600</text>
        <text x="1000" y="160" text-anchor="middle">1100</text>
      </g>
    </g>
  </g>
</svg>
