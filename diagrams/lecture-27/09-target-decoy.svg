<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }</style></defs>
  <rect width="1200" height="540" fill="#fafaf9" rx="6"/>
  <text x="600" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Target-decoy FDR — decoys are false by construction; their rate calibrates target false positives</text>

  <!-- Histogram panel -->
  <g transform="translate(60,80)">
    <rect width="720" height="420" fill="#fff" stroke="#374151" stroke-width="1.5" rx="6"/>
    <text x="360" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">Score distributions</text>

    <g transform="translate(60,60)">
      <line x1="0" y1="320" x2="600" y2="320" stroke="#374151"/>
      <line x1="0" y1="0" x2="0" y2="320" stroke="#374151"/>
      <text x="300" y="350" text-anchor="middle" font-size="11" fill="#525252">PSM score (e.g., XCorr, Andromeda, hyperscore)</text>
      <text x="-22" y="160" text-anchor="middle" font-size="11" fill="#525252" transform="rotate(-90 -22 160)">PSM count</text>

      <g class="mono" font-size="9" fill="#525252">
        <text x="0" y="335" text-anchor="middle">10</text>
        <text x="150" y="335" text-anchor="middle">20</text>
        <text x="300" y="335" text-anchor="middle">30</text>
        <text x="450" y="335" text-anchor="middle">40</text>
        <text x="600" y="335" text-anchor="middle">50</text>
      </g>

      <!-- Decoy distribution: peaked low -->
      <path d="M 0 320 Q 30 270, 80 200 Q 130 150, 180 200 Q 230 280, 330 315 L 600 320 Z" fill="#fee2e2" stroke="#dc2626" stroke-width="2" opacity="0.85"/>
      <text x="170" y="170" font-size="11" fill="#dc2626" font-weight="700">decoy hits</text>
      <text x="170" y="186" font-size="9" fill="#991b1b">false by construction</text>

      <!-- Target distribution: bimodal -->
      <path d="M 0 320 Q 30 290, 80 240 Q 130 200, 180 230 Q 230 285, 290 280 Q 330 240, 380 130 Q 430 50, 480 90 Q 530 200, 600 320 Z" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2" opacity="0.7"/>
      <text x="430" y="100" font-size="11" fill="#1e3a8a" font-weight="700">target hits</text>
      <text x="430" y="116" font-size="9" fill="#1e3a8a">good matches</text>
      <text x="180" y="216" font-size="9" fill="#525252">poor matches</text>

      <!-- 1% FDR threshold -->
      <line x1="320" y1="0" x2="320" y2="320" stroke="#b45309" stroke-width="2.5" stroke-dasharray="5 3"/>
      <text x="320" y="-6" text-anchor="middle" font-size="10" font-weight="700" fill="#b45309">1% FDR cutoff (score=30)</text>

      <!-- shaded "accepted" region right of threshold -->
      <path d="M 320 320 Q 330 300, 380 130 Q 430 50, 480 90 Q 530 200, 600 320 Z" fill="#1e3a8a" fill-opacity="0.15"/>

      <!-- decoy accepted (small area) -->
      <path d="M 320 320 L 600 320 L 600 318 Q 400 318, 320 318 Z" fill="#dc2626" fill-opacity="0.6"/>
    </g>
  </g>

  <!-- Math panel -->
  <g transform="translate(800,80)">
    <rect width="340" height="420" fill="#fff" stroke="#1e3a8a" stroke-width="2" rx="6"/>
    <text x="170" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">FDR estimation</text>

    <g transform="translate(20,50)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#374151">Target-decoy formula</text>
      <text x="0" y="22" class="mono" font-size="13" fill="#111827">FDR(t) = D(t) / T(t)</text>
      <text x="0" y="42" font-size="10" fill="#525252">where D, T = decoy/target hits ≥ threshold t</text>

      <text x="0" y="80" font-size="11" font-weight="700" fill="#374151">At score = 30</text>
      <g class="mono" font-size="11" fill="#374151">
        <text x="0" y="102">target hits accepted: 7,200</text>
        <text x="0" y="120">decoy hits accepted: 80</text>
        <text x="0" y="138" fill="#b45309" font-weight="700">FDR = 80 / 7,200 = 1.1%</text>
      </g>

      <text x="0" y="178" font-size="11" font-weight="700" fill="#374151">Why decoys?</text>
      <text x="0" y="198" font-size="10" fill="#525252">Reverse / shuffle the protein DB.</text>
      <text x="0" y="214" font-size="10" fill="#525252">Decoy peptides cannot exist in the</text>
      <text x="0" y="230" font-size="10" fill="#525252">sample → any decoy hit is false.</text>

      <text x="0" y="262" font-size="11" font-weight="700" fill="#374151">Common thresholds</text>
      <g font-size="10" fill="#374151">
        <text x="0" y="282">· peptide-level: 1% FDR</text>
        <text x="0" y="298">· protein-level: 1% FDR</text>
        <text x="0" y="314">· phosphosite: 1% FDR + localisation prob &gt; 0.75</text>
      </g>

      <text x="0" y="350" font-size="11" font-weight="700" fill="#dc2626">Limitations</text>
      <g font-size="10" fill="#525252">
        <text x="0" y="368">· assumes target/decoy distributions match</text>
      </g>
    </g>
  </g>
</svg>
