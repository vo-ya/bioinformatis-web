<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="Inter, sans-serif">
  <defs><style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }</style></defs>
  <rect width="1200" height="600" fill="#fafaf9" rx="6"/>
  <text x="600" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Missing-value patterns in proteomics — MNAR vs MAR, and what to do about them</text>

  <!-- Heat map -->
  <g transform="translate(60,70)">
    <rect width="720" height="480" fill="#fff" stroke="#374151" stroke-width="1.5" rx="6"/>
    <text x="360" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">50 proteins × 30 samples — abundance heatmap (white = missing)</text>

    <g transform="translate(40,60)">
      <text x="320" y="-12" text-anchor="middle" font-size="10" fill="#525252">samples (n=30)</text>
      <text x="-12" y="180" text-anchor="middle" font-size="10" fill="#525252" transform="rotate(-90 -12 180)">proteins (n=50, sorted by abundance)</text>

      <!-- 50 rows × 30 cols -->
      <g>
        <!-- top half (rows 0–24): abundant proteins, all detected -->
        <g id="abundant">
          <!-- row 0 (most abundant) -->
        </g>
        <!-- We'll generate via repeated rect blocks -->

        <!-- Programmatically write rects: row by row, 30 columns of 20px -->
        <!-- Top 25 rows: dense, intense -->
        <!-- Each row 10px tall, 20px wide -->

        <!-- Top abundant block -->
        <g>
          <!-- Generate 25 rows of varying intensity, no missing -->
          <!-- We approximate with stacked rects -->
        </g>
      </g>

      <!-- Top half (rows 0–24, abundant proteins) -->
      <g>
        <!-- We'll draw a gradient-shaded block + scattered missing for realism -->
        <rect x="0" y="0" width="600" height="180" fill="#1e3a8a" fill-opacity="0.85"/>
      </g>
      <!-- subtle row stripes -->
      <g stroke="#fff" stroke-width="0.5" opacity="0.3">
        <line x1="0" y1="20" x2="600" y2="20"/>
        <line x1="0" y1="40" x2="600" y2="40"/>
        <line x1="0" y1="60" x2="600" y2="60"/>
        <line x1="0" y1="80" x2="600" y2="80"/>
        <line x1="0" y1="100" x2="600" y2="100"/>
        <line x1="0" y1="120" x2="600" y2="120"/>
        <line x1="0" y1="140" x2="600" y2="140"/>
        <line x1="0" y1="160" x2="600" y2="160"/>
      </g>

      <!-- Random MAR missing in top half: scattered cells -->
      <g fill="#fafaf9">
        <rect x="40" y="22" width="20" height="18"/>
        <rect x="180" y="44" width="20" height="18"/>
        <rect x="360" y="62" width="20" height="18"/>
        <rect x="240" y="120" width="20" height="18"/>
        <rect x="500" y="100" width="20" height="18"/>
        <rect x="80" y="142" width="20" height="18"/>
        <rect x="420" y="160" width="20" height="18"/>
      </g>

      <!-- Bottom half (rows 25–49, low-abundance proteins) — mostly missing -->
      <g>
        <rect x="0" y="180" width="600" height="180" fill="#fafaf9" stroke="#e5e7eb"/>
      </g>
      <!-- scattered detection in bottom half (MNAR — mostly low signal) -->
      <g>
        <!-- present in just a few samples -->
        <rect x="60" y="184" width="20" height="18" fill="#1e3a8a" fill-opacity="0.45"/>
        <rect x="120" y="184" width="20" height="18" fill="#1e3a8a" fill-opacity="0.4"/>
        <rect x="200" y="184" width="20" height="18" fill="#1e3a8a" fill-opacity="0.5"/>

        <rect x="100" y="206" width="20" height="18" fill="#1e3a8a" fill-opacity="0.35"/>
        <rect x="220" y="206" width="20" height="18" fill="#1e3a8a" fill-opacity="0.3"/>

        <rect x="40" y="228" width="20" height="18" fill="#1e3a8a" fill-opacity="0.5"/>
        <rect x="320" y="228" width="20" height="18" fill="#1e3a8a" fill-opacity="0.4"/>
        <rect x="440" y="228" width="20" height="18" fill="#1e3a8a" fill-opacity="0.45"/>

        <rect x="160" y="250" width="20" height="18" fill="#1e3a8a" fill-opacity="0.3"/>
        <rect x="280" y="250" width="20" height="18" fill="#1e3a8a" fill-opacity="0.4"/>

        <rect x="80" y="272" width="20" height="18" fill="#1e3a8a" fill-opacity="0.35"/>
        <rect x="380" y="272" width="20" height="18" fill="#1e3a8a" fill-opacity="0.3"/>

        <rect x="20" y="294" width="20" height="18" fill="#1e3a8a" fill-opacity="0.45"/>
        <rect x="240" y="294" width="20" height="18" fill="#1e3a8a" fill-opacity="0.3"/>
        <rect x="500" y="294" width="20" height="18" fill="#1e3a8a" fill-opacity="0.35"/>

        <rect x="140" y="316" width="20" height="18" fill="#1e3a8a" fill-opacity="0.4"/>
        <rect x="360" y="316" width="20" height="18" fill="#1e3a8a" fill-opacity="0.3"/>

        <rect x="60" y="338" width="20" height="18" fill="#1e3a8a" fill-opacity="0.3"/>
      </g>

      <!-- Annotation lines -->
      <line x1="-10" y1="0" x2="-10" y2="180" stroke="#1e3a8a" stroke-width="3"/>
      <text x="-30" y="90" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a" transform="rotate(-90 -30 90)">abundant</text>

      <line x1="-10" y1="180" x2="-10" y2="360" stroke="#dc2626" stroke-width="3"/>
      <text x="-30" y="270" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626" transform="rotate(-90 -30 270)">low-abundance</text>

      <!-- legend -->
      <g transform="translate(0,390)" font-size="10" fill="#374151">
        <rect x="0" y="-10" width="14" height="14" fill="#1e3a8a"/>
        <text x="20" y="2">detected (high)</text>
        <rect x="120" y="-10" width="14" height="14" fill="#1e3a8a" fill-opacity="0.45"/>
        <text x="140" y="2">detected (low)</text>
        <rect x="240" y="-10" width="14" height="14" fill="#fafaf9" stroke="#9ca3af"/>
        <text x="260" y="2">missing</text>
      </g>
    </g>
  </g>

  <!-- Imputation panel — height 480→520 so the trailing "Practical rule"
       block (header at inner y=424; content at y=440 and 456 → outer
       y=490 and 506) lands inside instead of overshooting the bottom. -->
  <g transform="translate(800,70)">
    <rect width="360" height="520" fill="#fff" stroke="#7c3aed" stroke-width="2" rx="6"/>
    <text x="180" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">Imputation strategies</text>

    <g transform="translate(20,50)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#dc2626">Missing-Not-At-Random (MNAR)</text>
      <text x="0" y="16" font-size="10" fill="#525252">low-abundance proteins below detection</text>
      <text x="0" y="30" font-size="10" fill="#525252">limit — block-shaped missing</text>

      <text x="0" y="58" font-size="11" font-weight="700" fill="#1e3a8a">Missing-At-Random (MAR)</text>
      <text x="0" y="74" font-size="10" fill="#525252">stochastic acquisition gaps —</text>
      <text x="0" y="88" font-size="10" fill="#525252">scattered cells</text>

      <line x1="0" y1="110" x2="320" y2="110" stroke="#7c3aed"/>

      <text x="0" y="134" font-size="11" font-weight="700" fill="#374151">half-min</text>
      <text x="0" y="150" font-size="10" fill="#525252">impute = min observed / 2</text>
      <text x="0" y="166" font-size="10" fill="#525252" font-style="italic">good for MNAR; biased if MAR</text>

      <text x="0" y="194" font-size="11" font-weight="700" fill="#374151">KNN imputation</text>
      <text x="0" y="210" font-size="10" fill="#525252">average of k nearest neighbours</text>
      <text x="0" y="226" font-size="10" fill="#525252" font-style="italic">good for MAR; bad for MNAR (inflates)</text>

      <text x="0" y="254" font-size="11" font-weight="700" fill="#374151">Multiple imputation</text>
      <text x="0" y="270" font-size="10" fill="#525252">bootstrap-based; account for uncertainty</text>

      <text x="0" y="298" font-size="11" font-weight="700" fill="#374151">Probabilistic (ProDA, MSstats)</text>
      <text x="0" y="314" font-size="10" fill="#525252">model dropout in the likelihood</text>
      <text x="0" y="330" font-size="10" fill="#525252" font-style="italic">no separate imputation step</text>

      <text x="0" y="358" font-size="11" font-weight="700" fill="#065f46">DIA approach</text>
      <text x="0" y="374" font-size="10" fill="#525252">deterministic acquisition →</text>
      <text x="0" y="388" font-size="10" fill="#525252">few missing values to impute</text>

      <line x1="0" y1="402" x2="320" y2="402" stroke="#7c3aed"/>

      <text x="0" y="424" font-size="11" font-weight="700" fill="#92400e">Practical rule</text>
      <text x="0" y="440" font-size="10" fill="#92400e">Diagnose: are missings block (MNAR) or scattered (MAR)?</text>
      <text x="0" y="456" font-size="10" fill="#92400e">Pick imputation accordingly. Or use a probabilistic model.</text>
    </g>
  </g>
</svg>
