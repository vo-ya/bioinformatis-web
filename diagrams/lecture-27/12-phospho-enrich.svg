<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" width="1200" height="640" font-family="Inter, sans-serif">
  <defs>
    <style>text { font-family: Inter, sans-serif; } .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }</style>
    <marker id="a27p" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#374151"/></marker>
  </defs>
  <rect width="1200" height="640" fill="#fafaf9" rx="6"/>
  <text x="600" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Phosphoproteomics — enrich phosphopeptides, search for +79.97 Da, localise to S/T/Y</text>

  <!-- Workflow column -->
  <g transform="translate(40,70)">
    <g>
      <rect width="280" height="60" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2" rx="6"/>
      <text x="140" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">1. Tryptic digest</text>
      <text x="140" y="46" text-anchor="middle" font-size="10" fill="#1e3a8a">~50,000 peptides; ~1% phosphorylated</text>
    </g>
    <line x1="140" y1="60" x2="140" y2="80" stroke="#374151" stroke-width="1.5" marker-end="url(#a27p)"/>

    <g transform="translate(0,80)">
      <rect width="280" height="60" fill="#fef3c7" stroke="#b45309" stroke-width="2" rx="6"/>
      <text x="140" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">2. TiO₂ / IMAC enrichment</text>
      <text x="140" y="46" text-anchor="middle" font-size="10" fill="#92400e">phosphopeptides bind metal oxide affinity</text>
    </g>
    <line x1="140" y1="140" x2="140" y2="160" stroke="#374151" stroke-width="1.5" marker-end="url(#a27p)"/>

    <g transform="translate(0,160)">
      <rect width="280" height="60" fill="#fef3c7" stroke="#b45309" stroke-width="2" rx="6"/>
      <text x="140" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">3. Elute + cleanup</text>
      <text x="140" y="46" text-anchor="middle" font-size="10" fill="#92400e">~50% phosphopeptide enrichment</text>
    </g>
    <line x1="140" y1="220" x2="140" y2="240" stroke="#374151" stroke-width="1.5" marker-end="url(#a27p)"/>

    <g transform="translate(0,240)">
      <rect width="280" height="60" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="6"/>
      <text x="140" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">4. LC-MS/MS</text>
      <text x="140" y="46" text-anchor="middle" font-size="10" fill="#991b1b">standard HCD MS2 acquisition</text>
    </g>
    <line x1="140" y1="300" x2="140" y2="320" stroke="#374151" stroke-width="1.5" marker-end="url(#a27p)"/>

    <g transform="translate(0,320)">
      <rect width="280" height="60" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" rx="6"/>
      <text x="140" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">5. Variable phospho search</text>
      <text x="140" y="46" text-anchor="middle" font-size="10" fill="#7c3aed">+79.97 Da on S/T/Y; PTM-Prophet</text>
    </g>
    <line x1="140" y1="380" x2="140" y2="400" stroke="#374151" stroke-width="1.5" marker-end="url(#a27p)"/>

    <g transform="translate(0,400)">
      <rect width="280" height="60" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" rx="6"/>
      <text x="140" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">6. Site localisation</text>
      <text x="140" y="46" text-anchor="middle" font-size="10" fill="#7c3aed">Andromeda PTM score; localisation prob &gt; 0.75</text>
    </g>
    <line x1="140" y1="460" x2="140" y2="480" stroke="#374151" stroke-width="1.5" marker-end="url(#a27p)"/>

    <g transform="translate(0,480)">
      <rect width="280" height="60" fill="#d1fae5" stroke="#065f46" stroke-width="2" rx="6"/>
      <text x="140" y="26" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">7. Phosphosite × sample matrix</text>
      <text x="140" y="46" text-anchor="middle" font-size="10" fill="#065f46">~20,000 sites quantified per experiment</text>
    </g>
  </g>

  <!-- Right side: kinase map / signalling -->
  <g transform="translate(380,70)">
    <rect width="780" height="240" fill="#fff" stroke="#1e3a8a" stroke-width="1.5" rx="6"/>
    <text x="390" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Phosphosite distribution by residue (typical experiment)</text>

    <g transform="translate(40,50)">
      <text x="0" y="20" font-size="11" font-weight="700" fill="#374151">Phospho-S</text>
      <rect x="100" y="6" width="600" height="22" fill="#dbeafe" stroke="#1e3a8a"/>
      <rect x="100" y="6" width="510" height="22" fill="#1e3a8a"/>
      <text x="710" y="22" font-size="11" font-weight="700" fill="#1e3a8a">~85%</text>

      <text x="0" y="60" font-size="11" font-weight="700" fill="#374151">Phospho-T</text>
      <rect x="100" y="46" width="600" height="22" fill="#dbeafe" stroke="#1e3a8a"/>
      <rect x="100" y="46" width="78" height="22" fill="#1e3a8a"/>
      <text x="710" y="62" font-size="11" font-weight="700" fill="#1e3a8a">~13%</text>

      <text x="0" y="100" font-size="11" font-weight="700" fill="#374151">Phospho-Y</text>
      <rect x="100" y="86" width="600" height="22" fill="#dbeafe" stroke="#1e3a8a"/>
      <rect x="100" y="86" width="12" height="22" fill="#1e3a8a"/>
      <text x="710" y="102" font-size="11" font-weight="700" fill="#1e3a8a">~2%</text>

      <text x="0" y="140" font-size="11" fill="#525252" font-style="italic">pY is rare but functionally critical (RTKs, JAK-STAT)</text>
      <text x="0" y="158" font-size="11" fill="#525252" font-style="italic">requires anti-pY antibody enrichment in addition to TiO₂/IMAC</text>
    </g>
  </g>

  <!-- Bottom-right scale + connections — height 230→270 so the "Pitfalls"
       block (header at inner y=156; two bullets at y=174 and 190 → outer
       y=224 and 240) fits inside. Canvas also extended 600→640 because
       workflow box 7 was previously ending 10 px past the bottom edge. -->
  <g transform="translate(380,330)">
    <rect width="780" height="270" fill="#fef3c7" stroke="#b45309" rx="6"/>
    <text x="390" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Scale and connections</text>

    <g transform="translate(20,50)" font-size="11" fill="#111827">
      <text x="0" y="0" font-weight="700" fill="#92400e">Per experiment</text>
      <text x="0" y="18">~20,000 phosphosites identified at 1% FDR</text>
      <text x="0" y="34">~5,000 unique phosphoproteins represented</text>
      <text x="0" y="50">~70% sites confidently localised (prob &gt; 0.75)</text>

      <text x="380" y="0" font-weight="700" fill="#92400e">Bridges to</text>
      <text x="380" y="18">· Kinase signalling networks (L22)</text>
      <text x="380" y="34">· CRISPR perturbation screens (L24)</text>
      <text x="380" y="50">· Drug pharmacodynamics (chemoproteomics)</text>

      <text x="0" y="92" font-weight="700" fill="#92400e">EE framing</text>
      <text x="0" y="110" fill="#374151">a phosphosite is a binary signal (on/off) at a residue × sample × time point —</text>
      <text x="0" y="126" fill="#374151">phosphoproteomics is the high-dimensional readout of cellular signalling state.</text>

      <text x="0" y="156" font-weight="700" fill="#dc2626">Pitfalls</text>
      <text x="0" y="174" fill="#dc2626">· phospho-isobars (S vs T at same position): localisation ambiguity</text>
      <text x="0" y="190" fill="#dc2626">· enrichment efficiency varies by lab — keep batch-aware in cohort studies</text>
    </g>
  </g>
</svg>
